name: CI

# Builds and tests the .NET tooling under tools/. Runs on every PR and main push that
# touches source, so regressions (incl. dependency bumps) are caught before merge.

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Directory.Packages.props'
      - 'WarHub.Catalog.slnx'
      - 'global.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'tools/**'
      - 'Directory.Packages.props'
      - 'WarHub.Catalog.slnx'
      - 'global.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      # Warnings fail the build: obsolete APIs and nullability holes introduced by a
      # dependency bump must be fixed, not merged.
      - name: Build
        run: dotnet build -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test -c Release --no-build --logger trx --results-directory test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 7
