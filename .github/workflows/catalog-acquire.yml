name: Nightly Acquisition

# Harvests live product data from manufacturer/retailer sources into the evidence ledger
# (data/evidence/), resolves it into the canonical catalog (data/catalog/), and opens/updates a
# sticky PR. Merging that PR triggers catalog-publish.yml.
#
# Source roster (only these have descriptors today; ret-miniaturicum -- site 520s -- and
# mfr-cmon -- Cloudflare-blocked, Plan-5 alternative pending -- are deferred and deliberately
# absent):
#   group A1: mfr-warlord-store                                       (budget 2000 nightly)
#   group A2: mfr-steamforged, mfr-wyrd-store                         (budget 1000 nightly)
#   group B:  mfr-gw-algolia, mfr-manticgames, mfr-para-bellum,
#             mfr-corvus-belli                                        (budget 3000)
#   group C:  ret-goblingaming, ret-tistaminis                        (budget 1500 nightly)
#   group D:  ret-radaddel, ret-gamenerdz                             (budget 1000 nightly,
#                                                                       2500 weekly override)
#   group E:  arc-goblingaming, arc-gw-webstore -- WEEKLY ONLY        (budget 500 each; same
#             host, web.archive.org -- naturally sequential+paced within one job since `acquire`
#             already loops sources one at a time in-process, never in parallel)
#   group F:  bdb-upcitemdb (budget 80), bdb-goupc (budget 50) -- WEEKLY ONLY, always these
#             explicit per-source budgets, never the global `budget` dispatch override --
#             upcitemdb's trial quota is ~100 requests/day and must never be blown by an
#             unrelated global override.
#   group G:  mfr-gw-trade -- WEEKLY ONLY, UNCAPPED (empty budget). The GW trade sheets are a
#             cumulative register, not a paginated store: the strategy's `budget` slices the
#             WORKBOOK list (`workbooks[:budget]`), and cutting it could drop the flagship
#             InsertDelete file, so it must never be budgeted. A full sweep is ~36 workbooks at
#             the descriptor's rps 0.125 (~35 min) -- its own group so that pacing runs in
#             parallel with the others and keeps its own 120-min timeout.
#
# GitHub-runner IPs are heavily throttled by Shopify/Cloudflare (observed first real nightly run,
# 29229516710): the pre-split group A and group C both hit the 120-minute timeout; group B took
# ~90 min. Splitting A into A1/A2 and lowering C's budget reduces load, but the underlying reality
# doesn't go away -- a throttled job is a DEGRADED run, not a broken one. Every source's cursor
# persists in data/evidence/products/<source>/cursor.yaml, so forward progress accrues and
# converges to full coverage across multiple nights.
#
# Two degradation modes are handled distinctly -- the goal is that a throttled night never paints
# the job red (which hides genuine failures) yet never silently loses work:
#   1. A source whose enumeration is 429'd (or Cloudflare-403'd) mid-run, after PoliteClient's
#      bounded 429 retry/backoff (which honors Retry-After up to a cap -- see client.py) is
#      exhausted, no longer FAILS the run. `acquire` records it as `rate-limited` in the health
#      report and exits 3 (DEGRADED) when rate-limits are the ONLY failures; the "Run acquire" step
#      below treats exit 3 as success + a ::warning:: annotation. A GENUINE failure (contract
#      violation, parse error, unexpected exception) still exits 4 and fails the job loudly, even
#      when a rate-limit is also present -- a real fault always wins. (Exit-code contract lives in
#      cli.py's _run_acquire.)
#   2. A per-group startup stagger (matrix.startupDelay; see the "Stagger group start" step) keeps
#      the groups from opening connections to the shared hosts at the same instant -- every group's
#      job starts together (one scheduled workflow) from GitHub's shared Azure egress range, and
#      that synchronized burst is itself part of what earns the 429s. The heaviest group (A1) waits
#      0s to keep its full timeout budget; the others are spaced ~1 min apart.
# Even so, timeout-minutes remains the ultimate backstop: cursor/evidence for a source is written
# only when its run_source completes (not incrementally), so a hard timeout cancellation still
# loses that source's in-flight night -- which is exactly why group A1's budget is sized (2000, see
# below) to finish well inside 120 min rather than relying on the timeout.
#
# Weekly deep-sweep mode: the Saturday-02:00-UTC schedule (or workflow_dispatch mode=weekly) adds
# groups E, F and G above and raises group D's budget to 2500 (converges its ~14k-URL backlog in
# ~3 weeks). Nightly runs (the Sun-Fri 04:00 UTC schedule, or workflow_dispatch mode=nightly/unset)
# never include E, F or G. The nightly cron deliberately EXCLUDES Saturday: weekly mode already runs
# every nightly group PLUS E/F, so a Saturday nightly run at 04:00 (2h after the 02:00 weekly run
# starts) would gain nothing -- and integrate's create-pull-request step force-resets
# catalog/acquisition from main + its own artifacts, so a same-day nightly run would silently
# destroy that Saturday's archive/barcode-db evidence before the weekly PR could ever be reviewed
# or merged. This is mode-gated within the SAME workflow/matrix rather than a separate
# workflow file: GitHub Actions matrices can't be conditionally composed at the strategy level, so
# every group is always listed in `strategy.matrix.include`, and weekly-only groups instead get
# `run_sources` forced empty (same "ran=false" skip path already used for an empty dispatch
# override) whenever the derived MODE isn't "weekly". LLM spend (classification) stays entirely
# out of this workflow -- see classify.yml, which is workflow_dispatch-only and never runs on a
# schedule.

on:
  schedule:
    # Sun-Fri only (day-of-week 0-5) -- Saturday is covered exclusively by the weekly schedule
    # below; see the roster comment above for why a same-day nightly run would destroy the
    # weekly run's evidence.
    - cron: '0 4 * * 0-5'
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Space-separated source ids to run (overrides group defaults; empty = all groups)'
        required: false
        type: string
      budget:
        description: 'Override budget for every group (empty = per-group default; never applies to group F -- see roster comment above)'
        required: false
        type: string
      mode:
        description: 'nightly (default) or weekly -- weekly adds the archive/barcode-db groups and raises group D''s budget; auto-selected on the Saturday 02:00 UTC schedule regardless of this input'
        required: false
        type: choice
        options:
          - nightly
          - weekly
        default: nightly

permissions:
  contents: read

concurrency:
  group: catalog-acquire
  cancel-in-progress: false

jobs:
  acquire:
    name: Acquire (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # startupDelay (seconds) de-synchronizes each group's first outbound connections -- see
        # the "Stagger group start" step and the throttling note in this file's header. Heaviest
        # group A1 waits 0 (keeps its full 120-min budget); the rest are spaced ~1 min apart.
        include:
          # A1 budget sized to finish inside timeout-minutes rather than lean on it: at rps 0.5
          # (2s/request pacing -> ~1800 req/hr ceiling) budget 3000 + full enumeration did NOT
          # finish in 120 min on 2026-07-16 (run cancelled at 2h, losing the night's cursor -- see
          # header), implying real throughput <~1500/hr once latency + 429 backoffs stack. Budget
          # 2000 detail fetches ~= 80 min, + ~1 min enumeration + setup/upload, leaving ample
          # headroom under 120 min. Enumeration is always full and budget-independent, so every run
          # still yields all ~4k observations (>= minCount 3500); the budget only rations per-handle
          # barcode detail fetches, which converge across nights via the persistent cursor.
          - group: A1
            sources: mfr-warlord-store
            budget: 2000
            weeklyBudget: ''
            weeklyOnly: false
            startupDelay: 0
          - group: A2
            sources: mfr-steamforged mfr-wyrd-store
            budget: 1000
            weeklyBudget: ''
            weeklyOnly: false
            startupDelay: 60
          - group: B
            sources: mfr-gw-algolia mfr-manticgames mfr-para-bellum mfr-corvus-belli
            budget: 3000
            weeklyBudget: ''
            weeklyOnly: false
            startupDelay: 120
          - group: C
            sources: ret-goblingaming ret-tistaminis
            budget: 1500
            weeklyBudget: ''
            weeklyOnly: false
            startupDelay: 180
          - group: D
            sources: ret-radaddel ret-gamenerdz
            budget: 1000
            weeklyBudget: 2500
            weeklyOnly: false
            startupDelay: 240
          - group: E
            sources: arc-goblingaming arc-gw-webstore
            budget: 500
            weeklyBudget: ''
            weeklyOnly: true
            startupDelay: 300
          - group: F
            sources: bdb-upcitemdb bdb-goupc
            budget: 0
            weeklyBudget: ''
            weeklyOnly: true
            startupDelay: 360
          # Empty budget = UNCAPPED (see the roster comment): the trade register must sweep every
          # workbook, never a `workbooks[:budget]` slice. The acquire step omits --budget when it's
          # empty. Longest stagger (heaviest weekly-only source, own group).
          - group: G
            sources: mfr-gw-trade
            budget: ''
            weeklyBudget: ''
            weeklyOnly: true
            startupDelay: 420
    defaults:
      run:
        working-directory: tools/acquisition
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --locked

      # Inputs (github.event.inputs.*) are routed through env: rather than interpolated directly
      # into the script body -- GitHub substitutes ${{ }} textually before bash ever parses the
      # script, so free-text workflow_dispatch input belongs in an env var, not inline.
      - name: Plan sources + budget for this group
        id: plan
        env:
          GROUP: ${{ matrix.group }}
          GROUP_SOURCES: ${{ matrix.sources }}
          GROUP_BUDGET: ${{ matrix.budget }}
          GROUP_WEEKLY_BUDGET: ${{ matrix.weeklyBudget }}
          GROUP_WEEKLY_ONLY: ${{ matrix.weeklyOnly }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_EXPR: ${{ github.event.schedule }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          OVERRIDE_SOURCES: ${{ github.event.inputs.sources }}
          OVERRIDE_BUDGET: ${{ github.event.inputs.budget }}
        run: |
          # MODE: weekly if the Saturday-02:00-UTC cron fired, or workflow_dispatch explicitly
          # asked for it; nightly otherwise. Weekly-only groups (E, F) are skipped below by
          # forcing run_sources empty -- the SAME "ran=false" path already used when a dispatch
          # `sources` override selects nothing from this group -- rather than a separate branch,
          # so every downstream step's existing `if: steps.plan.outputs.ran == 'true'` guard just
          # works unchanged.
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DISPATCH_MODE" = "weekly" ]; then
            MODE="weekly"
          elif [ "$SCHEDULE_EXPR" = "0 2 * * 6" ]; then
            MODE="weekly"
          else
            MODE="nightly"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

          if [ "$GROUP_WEEKLY_ONLY" = "true" ] && [ "$MODE" != "weekly" ]; then
            echo "run_sources=" >> "$GITHUB_OUTPUT"
            echo "budget=" >> "$GITHUB_OUTPUT"
            echo "ran=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Group $GROUP: weekly-only group, MODE=$MODE; skipping."
            exit 0
          fi

          if [ -n "$OVERRIDE_SOURCES" ]; then
            RUN_SOURCES=""
            for s in $OVERRIDE_SOURCES; do
              for g in $GROUP_SOURCES; do
                if [ "$s" = "$g" ]; then RUN_SOURCES="$RUN_SOURCES $s"; fi
              done
            done
            RUN_SOURCES="$(echo "$RUN_SOURCES" | xargs)"
          else
            RUN_SOURCES="$GROUP_SOURCES"
          fi

          if [ -n "$OVERRIDE_BUDGET" ]; then
            BUDGET="$OVERRIDE_BUDGET"
          elif [ "$MODE" = "weekly" ] && [ -n "$GROUP_WEEKLY_BUDGET" ]; then
            BUDGET="$GROUP_WEEKLY_BUDGET"
          else
            BUDGET="$GROUP_BUDGET"
          fi

          echo "run_sources=$RUN_SOURCES" >> "$GITHUB_OUTPUT"
          echo "budget=$BUDGET" >> "$GITHUB_OUTPUT"
          if [ -n "$RUN_SOURCES" ]; then
            echo "ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "ran=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Group $GROUP: no sources selected (sources override='$OVERRIDE_SOURCES'); skipping acquire."
          fi

      # De-synchronize the matrix groups' first outbound connections. Every group's job starts at
      # the same instant (one scheduled workflow), so without this they all open connections to
      # Shopify/Cloudflare simultaneously from GitHub's shared Azure egress range -- part of what
      # gets these runner IPs 429'd. A short per-group stagger (matrix.startupDelay, ~1 min apart;
      # heaviest group A1 = 0 so it keeps its full 120-min budget) spreads the initial load. `sleep
      # 0` (group A1) is a harmless no-op. Cheap relative to timeout-minutes; only the tiny weekly F
      # group waits longest.
      - name: Stagger group start
        if: steps.plan.outputs.ran == 'true'
        run: sleep ${{ matrix.startupDelay }}

      # Exit-code contract (defined in tools/acquisition/src/warhub_acquisition/cli.py::_run_acquire):
      #   0 = every source ok; 4 = at least one GENUINE failure (contract violation / parse error /
      #   unexpected exception); 3 = DEGRADED -- the only failures were upstream rate-limits (HTTP
      #   429 / Cloudflare 403). Exit 4 is intentionally NOT swallowed: the step (and job) fails, so
      #   a broken source is loud in the Checks tab. Exit 3 IS tolerated: the job stays green with a
      #   ::warning:: annotation, because a throttled runner IP is an environment condition, not a
      #   code/data fault -- the rate-limited source kept its cursor and retries next run, and
      #   painting the job red would only hide real failures. The integrate job below runs
      #   regardless (needs: + if: always()), so a partial/degraded harvest never blocks integration
      #   of the sources that did succeed.
      - name: Run acquire
        id: acquire
        if: steps.plan.outputs.ran == 'true'
        env:
          RUN_SOURCES: ${{ steps.plan.outputs.run_sources }}
          BUDGET: ${{ steps.plan.outputs.budget }}
          GROUP: ${{ matrix.group }}
        run: |
          if [ "$GROUP" = "F" ]; then
            # Group F (barcode-db) needs distinct, always-explicit per-source budgets --
            # upcitemdb=80, go-upc=50 -- because `acquire --budget N` applies N to every source in
            # a single invocation (AcquireContext.budget is one shared value), not divided across
            # sources. data/review/acquisition-health.md is a TRACKED committed file (always
            # present from checkout), so its mere existence after an invocation can't signal
            # freshness on its own -- it's rm -f'd immediately before EACH of the two
            # sub-invocations, so the post-invocation `-f` check genuinely means "this invocation
            # produced/updated the file" (and a pre-try/finally crash before any write correctly
            # yields no stash for that source, instead of mislabelling stale/other-source content
            # as fresh). Each surviving per-source stash is concatenated below. $BUDGET
            # (steps.plan.outputs.budget) is deliberately ignored here -- see the roster comment at
            # the top of this file.
            shopt -s nullglob
            crashed=0
            ran_any=0
            for entry in "bdb-upcitemdb:80" "bdb-goupc:50"; do
              src="${entry%%:*}"
              bud="${entry##*:}"
              case " $RUN_SOURCES " in
                *" $src "*)
                  rm -f ../../data/review/acquisition-health.md
                  set +e
                  uv run warhub-data acquire --data ../../data --source "$src" \
                    --budget "$bud" \
                    --run-date "$(date -u +%F)"
                  sub=$?
                  set -e
                  # Exit 3 = DEGRADED (source rate-limited): tolerate + annotate, don't fail. Any
                  # other non-zero is a genuine crash for this source -> crashed=1 -> exit 4 below.
                  if [ "$sub" = "3" ]; then
                    echo "::warning::Group F ($src): DEGRADED -- source rate-limited (HTTP 429/403). Cursor intact; retries next run. See data/review/acquisition-health.md (status 'rate-limited')."
                  elif [ "$sub" != "0" ]; then
                    crashed=1
                  fi
                  if [ -f ../../data/review/acquisition-health.md ]; then
                    cp ../../data/review/acquisition-health.md "../../_health-F-$src.md"
                  fi
                  ran_any=1
                  ;;
              esac
            done
            if [ "$ran_any" = "1" ]; then
              { for f in ../../_health-F-*.md; do cat "$f"; echo; echo "---"; echo; done; } > ../../data/review/acquisition-health.md
            fi
            [ "$crashed" = "0" ] || exit 4
          else
            SRC_ARGS=""
            for s in $RUN_SOURCES; do
              SRC_ARGS="$SRC_ARGS --source $s"
            done
            # An empty group budget means UNCAPPED (--budget is omitted, so AcquireContext.budget
            # stays None) -- used by group G (mfr-gw-trade), whose full workbook register must never
            # be sliced by `workbooks[:budget]`. Every other group passes a numeric budget as before.
            BUDGET_ARG=""
            [ -n "$BUDGET" ] && BUDGET_ARG="--budget $BUDGET"
            set +e
            uv run warhub-data acquire --data ../../data $SRC_ARGS \
              $BUDGET_ARG \
              --run-date "$(date -u +%F)"
            code=$?
            set -e
            # Exit 3 = DEGRADED (only rate-limits): tolerate with a ::warning:: so the job stays
            # green and the throttle is still visible. Exit 4 (or anything else non-zero) fails the
            # job. Exit 0 = clean. See the exit-code contract comment above this step.
            if [ "$code" = "3" ]; then
              echo "::warning::Group $GROUP: DEGRADED acquire run -- one or more sources were rate-limited (HTTP 429 / Cloudflare 403) and made no progress this run. Their cursors are intact and they retry next run; successful sources committed normally. See data/review/acquisition-health.md (status 'rate-limited')."
            elif [ "$code" != "0" ]; then
              exit "$code"
            fi
          fi

      # Stage exactly this group's evidence dirs (cursor.yaml + observations.jsonl live together
      # under data/evidence/products/<source>/) plus its own health file, under a group-distinct
      # name -- disjoint by source, so a plain copy on download in the integrate job is safe. Runs
      # even if the acquire step above failed (exit 4): partial results must not be lost.
      - name: Stage artifact payload
        if: always() && steps.plan.outputs.ran == 'true'
        env:
          RUN_SOURCES: ${{ steps.plan.outputs.run_sources }}
          GROUP: ${{ matrix.group }}
        run: |
          mkdir -p ../../_stage/evidence
          for s in $RUN_SOURCES; do
            if [ -d "../../data/evidence/products/$s" ]; then
              cp -r "../../data/evidence/products/$s" "../../_stage/evidence/$s"
            fi
          done
          if [ -f ../../data/review/acquisition-health.md ]; then
            cp ../../data/review/acquisition-health.md "../../_stage/health-${GROUP}.md"
          fi

      - name: Upload evidence + health artifact
        if: always() && steps.plan.outputs.ran == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: acquire-data-${{ matrix.group }}
          path: _stage
          if-no-files-found: warn

  integrate:
    name: Integrate + sticky PR
    needs: acquire
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: uv sync
        working-directory: tools/acquisition
        run: uv sync --locked

      # actions/download-artifact@v8 has no `if-no-artifact-found` input (that was a v3-only
      # input; v4's action.yml only accepts name/artifact-ids/path/pattern/merge-multiple/
      # github-token/repository/run-id -- verified against the action's own action.yml, final fix
      # wave item 4). v4 already doesn't fail the step when a pattern matches zero artifacts (e.g.
      # every acquire matrix job was skipped), so no replacement input is needed.
      - name: Download acquisition artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: acquire-data-*
          path: artifacts

      # Disjoint by source (each matrix group only ever staged its own sources), so this is a
      # plain copy -- no merge logic needed.
      - name: Merge evidence directories
        run: |
          mkdir -p data/evidence/products
          shopt -s nullglob
          for group_dir in artifacts/acquire-data-*/; do
            [ -d "${group_dir}evidence" ] || continue
            for src_dir in "${group_dir}evidence"/*/; do
              src="$(basename "$src_dir")"
              mkdir -p "data/evidence/products/$src"
              cp -r "$src_dir"* "data/evidence/products/$src/"
            done
          done

      # KNOWN GAP: `acquire` overwrites data/review/acquisition-health.md with only its own run's
      # rows, and each matrix job runs a disjoint source set. Since matrix jobs can't share a
      # single working tree, the combined health state is regenerated here by concatenating each
      # group's staged health file (deterministic group-letter order A1-F) rather than by rerunning
      # `acquire` (which would require live network access again, defeating the point).
      - name: Combine health reports
        run: |
          shopt -s nullglob
          mkdir -p data/review
          # Bash glob results are lexicographically sorted, so this naturally comes out in group
          # order (health-A1.md < health-A2.md < health-B.md < health-C.md < health-D.md <
          # health-E.md < health-F.md).
          health_files=(artifacts/acquire-data-*/health-*.md)
          {
            echo "# Acquisition health (combined)"
            echo
            echo "_Run $(date -u +%F) -- combined per-group reports, group order A1-F._"
            if [ "${#health_files[@]}" -eq 0 ]; then
              echo
              echo "_No matrix group reported a health file this run (no sources were selected)._"
            else
              for f in "${health_files[@]}"; do
                group="$(basename "$f" | sed -E 's/^health-(.*)\.md$/\1/')"
                echo
                echo "---"
                echo
                echo "## Group $group"
                echo
                cat "$f"
              done
            fi
          } > data/review/acquisition-health.md

      # Conflicts (exit 2) are expected review material during early live-source rollout, not a
      # failure -- capture the exit code and continue either way.
      - name: Resolve catalog
        id: resolve
        working-directory: tools/acquisition
        run: |
          set +e
          uv run warhub-data resolve --data ../../data > ../../_resolve.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat ../../_resolve.txt

      - name: Coverage report
        id: report
        working-directory: tools/acquisition
        run: |
          set +e
          uv run warhub-data report --data ../../data > ../../_report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat ../../_report.txt

      # Exit 5 = confirmed-EAN guard found hits. Captured here, not failed immediately: the PR
      # must still be opened/updated with the findings before the job is marked failed (see the
      # final step below), so the guard hits are visible both in the PR body and loud in Checks.
      - name: Confirmed-EAN guard report
        id: guard
        working-directory: tools/acquisition
        run: |
          set +e
          uv run warhub-data report --data ../../data --ean-guard > ../../_report_guard.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          # Capture from EITHER guard header: "## Confirmed-EAN changes" (regressions, exit 5)
          # or "## Confirmed-EAN repackaging ..." (tracked repackagings, still exit 0) -- a
          # repackaging-only run must surface its section in the PR body too, not render "clean".
          awk '/^## Confirmed-EAN/{flag=1} flag' ../../_report_guard.txt > ../../_guard_section.txt || true
          cat ../../_guard_section.txt

      - name: Build PR body
        run: |
          {
            echo "Automated nightly acquisition run."
            echo
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Trigger:** ${{ github.event_name }}"
            echo
            echo "### Resolve"
            echo
            cat _resolve.txt
            if [ "${{ steps.resolve.outputs.exit_code }}" = "2" ]; then
              echo
              echo "> Conflicts detected -- expected during early live-source rollout. See \`data/review/conflicts.yaml\`; treat as review material, not a failure."
            elif [ "${{ steps.resolve.outputs.exit_code }}" != "0" ]; then
              echo
              echo "> :warning: \`resolve\` exited ${{ steps.resolve.outputs.exit_code }} (expected 0 or 2)."
            fi
            echo
            echo "### Coverage report"
            echo
            cat _report.txt
            echo
            if [ "${{ steps.guard.outputs.exit_code }}" = "5" ]; then
              echo "### :rotating_light: Confirmed-EAN guard: HITS FOUND"
              echo
              echo "A previously **confirmed** EAN changed since the last HEAD -- review carefully before merging this PR."
              echo
              cat _guard_section.txt
            elif [ -s _guard_section.txt ]; then
              echo "### Confirmed-EAN guard: repackaging tracked (no losses)"
              echo
              echo "A primary EAN changed but the previous confirmed barcode was **retained** in \`additionalEans\` -- a tracked repackaging, informational only, not a failure."
              echo
              cat _guard_section.txt
            else
              echo "### Confirmed-EAN guard: clean"
              echo
              echo "No confirmed-EAN changes detected."
            fi
          } > pr-body.md

      - name: Create or update sticky PR
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: data
          branch: catalog/acquisition
          base: main
          title: 'Nightly acquisition update'
          body-path: pr-body.md
          commit-message: 'Nightly acquisition data update'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          delete-branch: true

      # Runs AFTER the PR step (mirrors the ean-guard's original fail-after-PR pattern) so a
      # sticky PR carrying the run's findings always gets opened/updated before the job is marked
      # failed. Covers two previously-quiet failure modes, both final fix wave item 4:
      #   1. resolve/report exiting outside their documented code sets ({0,2} / {0,5}) -- a crash
      #      (uncaught exception, interpreter fault, mid-write abort) previously only earned a
      #      soft ":warning:" line in the PR body; `steps.report.outputs.exit_code` was captured
      #      but never actually read anywhere. Now any unexpected exit code fails the job loudly.
      #   2. the confirmed-EAN guard's own exit-5 "hits found" case, unchanged in substance from
      #      before, just folded into this single combined check.
      - name: Fail job on unexpected resolve/report/guard exit codes
        run: |
          resolve_exit="${{ steps.resolve.outputs.exit_code }}"
          report_exit="${{ steps.report.outputs.exit_code }}"
          guard_exit="${{ steps.guard.outputs.exit_code }}"

          crashed=0

          if [ "$resolve_exit" != "0" ] && [ "$resolve_exit" != "2" ]; then
            echo "::error::resolve exited $resolve_exit (expected 0 or 2) -- possible crash, possibly mid-write. See the sticky PR body / job log for details."
            crashed=1
          fi

          if [ "$report_exit" != "0" ] && [ "$report_exit" != "5" ]; then
            echo "::error::report (coverage) exited $report_exit (expected 0 or 5) -- possible crash. See the sticky PR body / job log for details."
            crashed=1
          fi

          if [ "$guard_exit" != "0" ] && [ "$guard_exit" != "5" ]; then
            echo "::error::Confirmed-EAN guard report exited $guard_exit (expected 0 or 5) -- possible crash. See the job log for details."
            crashed=1
          fi

          if [ "$crashed" = "1" ]; then
            exit 1
          fi

          if [ "$guard_exit" = "5" ]; then
            echo "::error::Confirmed-EAN guard found hits this run -- see the sticky PR body and data/review for details. Failing job so this is loud in Checks."
            exit 5
          fi
