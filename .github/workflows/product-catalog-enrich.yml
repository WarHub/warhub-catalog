name: Product Catalog EAN Enrichment

# Parallel EAN (barcode) enrichment across retailer Shopify stores. Each matrix job
# enriches a group and uploads only its changed files; a final job merges them into
# data/products/ and opens a sticky PR. Merging that PR triggers catalog-publish.yml.

on:
  workflow_dispatch:
    inputs:
      ean-budget:
        description: 'Max UPCitemdb API calls per run'
        required: false
        default: '80'
        type: string
      manufacturer:
        description: 'Enrich specific manufacturer only (empty = all)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: steamforged,     stores: "https://steamforged.com" }
          - { group: wyrd,            stores: "https://giveusyourmoneypleasethankyou-wyrd.com" }
          - { group: gw-retailers,    stores: "https://goblingaming.co.uk https://dicesaloon.co.uk" }
          - { group: distributor,     stores: "https://www.asmodee.co.uk" }
          - { group: cb-pb-retailers, stores: "https://bellfordtoysandhobbies.com https://tistaminis.com https://www.elrikshobbies.com" }
          - { group: warlord-retailer, stores: "https://www.mightylancergames.co.uk" }
          - { group: entoyment,       stores: "https://entoyment.co.uk" }
          - { group: flipside,        stores: "https://flipsidegaming.com" }
          - { group: athena,          stores: "https://athenagames.com" }
          - { group: 401games,        stores: "https://store.401games.ca" }
          - { group: lvlup,           stores: "https://www.lvlupgaming.co.uk" }
          - { group: merlins,         stores: "https://merlinsminiatures.co.uk" }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Build tool
        run: dotnet build tools/WarHub.ProductCatalog.Tool -c Release -v:q

      - name: Run enrichment (${{ matrix.group }})
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $toolArgs = @('--output', 'data/products', '--enrich-only', '--ean-shopify-stores')
          $toolArgs += ('${{ matrix.stores }}' -split '\s+')
          $toolArgs += '--enrich-ean', '--ean-budget', '${{ github.event.inputs.ean-budget || '80' }}'
          if ('${{ github.event.inputs.manufacturer }}') { $toolArgs += '--manufacturer', '${{ github.event.inputs.manufacturer }}' }
          $toolArgs += '--verbose'
          & dotnet run --project tools/WarHub.ProductCatalog.Tool -c Release -- @toolArgs

      - name: Collect changed files
        id: changes
        shell: pwsh
        run: |
          git add -A data/products
          $diff = git diff --cached --name-only -- data/products
          git reset -q HEAD
          if (-not $diff) { "changed=false" >> $env:GITHUB_OUTPUT; return }
          "changed=true" >> $env:GITHUB_OUTPUT
          foreach ($file in $diff) {
            $dest = Join-Path '/tmp/enriched' (Split-Path $file)
            New-Item -ItemType Directory -Path $dest -Force | Out-Null
            Copy-Item $file (Join-Path '/tmp/enriched' $file)
          }

      - name: Upload enriched data
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: enriched-${{ matrix.group }}
          path: /tmp/enriched/
          retention-days: 1

  create-pr:
    needs: enrich
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all enrichment artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: enriched-*

      - name: Merge enriched data
        shell: pwsh
        run: |
          foreach ($dir in (Get-ChildItem -Directory 'artifacts/enriched-*' -ErrorAction SilentlyContinue)) {
            if (Test-Path (Join-Path $dir.FullName 'data')) {
              Copy-Item "$($dir.FullName)/*" '.' -Recurse -Force
              Write-Host "Merged $($dir.Name)"
            }
          }

      - name: Summary
        run: |
          git add -A data/products
          echo "### 🏷️ EAN Enrichment" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git diff --cached --stat -- data/products | tail -30 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git reset -q HEAD

      - name: Create or update enrichment PR
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: data/products
          branch: catalog/ean-enrichment
          base: main
          title: 'Enrich product catalog with EAN codes'
          body: |
            Automated EAN enrichment from retailer Shopify stores + UPCitemdb lookups.

            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            **Budget:** ${{ github.event.inputs.ean-budget || '80' }} UPCitemdb calls/run
          commit-message: 'Enrich product catalog with EAN codes'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          delete-branch: true
