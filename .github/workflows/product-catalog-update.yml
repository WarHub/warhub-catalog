name: Product Catalog Update

# Refreshes the product source data under data/products/ by scraping vendor sites,
# then opens a sticky PR. Merging that PR triggers catalog-publish.yml.

on:
  workflow_dispatch:
    inputs:
      sample:
        description: 'Sample N products per faction (0 = all)'
        required: false
        default: '0'
        type: string
      skip-scrape:
        description: 'Skip web scraping, only use seed data'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      manufacturer:
        description: 'Scrape specific manufacturer only (empty = all)'
        required: false
        default: ''
        type: string
      direct-push:
        description: 'Push directly to main (instead of a PR)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
  schedule:
    - cron: '0 5 * * 0'   # weekly, Sunday 05:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Build tool
        run: dotnet build tools/WarHub.ProductCatalog.Tool -c Release -v:q

      - name: Install Playwright browsers
        run: pwsh tools/WarHub.ProductCatalog.Tool/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Run tests
        run: dotnet test tools/WarHub.ProductCatalog.Tool.Tests -c Release -v:q --no-build

      - name: Run product catalog tool
        run: |
          ARGS="--output data/products --overrides data/products/overrides.yaml"
          ARGS="$ARGS --sample ${{ github.event.inputs.sample || '0' }}"
          [ "${{ github.event.inputs.skip-scrape }}" = "true" ] && ARGS="$ARGS --skip-scrape"
          [ -n "${{ github.event.inputs.manufacturer }}" ] && ARGS="$ARGS --manufacturer '${{ github.event.inputs.manufacturer }}'"
          # Light EAN pass (2 GW retailers); full enrichment runs in product-catalog-enrich.yml
          ARGS="$ARGS --ean-shopify-stores https://goblingaming.co.uk https://dicesaloon.co.uk"
          ARGS="$ARGS --enrich-ean --ean-budget 80 --verbose"
          eval dotnet run --project tools/WarHub.ProductCatalog.Tool -c Release -- $ARGS

      - name: Summary
        run: |
          git add -A data/products
          echo "### 📦 Product Catalog Update" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git diff --cached --stat -- data/products | tail -30 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git reset -q HEAD

      - name: Create or update sticky PR
        if: github.event.inputs.direct-push != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: data/products
          branch: catalog/product-update
          base: main
          title: 'Update product catalog data'
          body: |
            Automated product data refresh.

            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            **Trigger:** ${{ github.event_name }}
          commit-message: 'Update product catalog data'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          delete-branch: true

      - name: Direct push
        if: github.event.inputs.direct-push == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/products
          git diff --cached --quiet || git commit -m "Update product catalog data"
          git push
