# entity being folded in -> the surviving entity id it should merge into; `aliases` maps a
# retired entity id -> its surviving replacement id. See resolve/join.py's docstring and
# data/review/join-proposals.yaml's header for the promotion procedure. After editing, re-run
# `warhub-data resolve` then `warhub-data report --ean-guard`.
