  # 13436 products store-wide) found exactly 2923 products with vendor "Games Workshop" -- the
  # scope.vendors allow-list above. Controller decision, task-6-report.md.
  minCount: 2500
  maxDropPct: 30
  requiredFieldRates:
    name: 1.0
    sku: 0.8
