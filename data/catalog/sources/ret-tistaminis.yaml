id: ret-tistaminis
kind: retailer
strategy: shopify
# Live-verified 2026-07-13: the apex host serves /products.json directly with a 200 (no
# www redirect, unlike ret-goblingaming) -- confirmed Shopify (powered-by: Shopify header,
# cart_currency=CAD cookie, content-language: en-CA).
baseUrl: https://tistaminis.com
scope:
  # scope.vendors REMOVED 2026-07-13 (Plan 5 Task 1): the [Games Workshop, GW-Local,
  # GW-LOCAL] allow-list was throwing away most of this store's barcoded catalog. This
  # store enumerates 25,000 products (Shopify's platform-wide pagination cap; the real
  # catalog is larger) vs. 1,178 harvested under the old GW-only scope. Live full
  # enumeration (up to the 100-page/25000-product cap) also found the store's
  # brand-format vendor-tagging convention extends past GW: "Warlord-BLISTER" and
  # "Warlord-WEB" (Warlord Games), plus "GW-Web" and "GW-OOP" alongside the known
  # "GW-Local"/"GW-LOCAL" (Games Workshop) -- all four newly added as vendorNames
  # aliases in data/catalog/taxonomy/manufacturers.yaml (see comments there for the
  # live product-sample evidence). Taxonomy attribution now governs inclusion instead
  # of the old allow-list; unmapped vendors count as skipped_unknown_vendor. This is
  # existing, tested strategy behavior (test_scope_vendors_absent_behaves_unchanged) --
  # no shopify.py code change was needed.
  # "Games Workshop Used" remains deliberately UNTRACKED (not aliased): those are
  # one-off second-hand listings (unique -aNN handle suffixes) that would flood
  # evidence with unjoinable single-item entities while duplicating new-stock barcodes
  # -- taxonomy attribution naturally excludes it since no manufacturer claims that
  # exact vendor string, and it correctly falls into skipped_unknown_vendor.
  currency: cad
politeness:
  rps: 0.5
budget:
  # Documentation only -- shopify.py never reads descriptor.budget; the actual per-run cap
  # is context.budget (the acquire CLI's --budget flag). 1500 is the intended workflow
  # budget for this source (wired into .github/workflows/catalog-acquire.yml separately,
  # out of Task-8's BUILD scope).
  detailsPerRun: 1500
# Live-verified twice (2026-07-13): Shopify's /products.json enforces a platform-wide cap --
# any request where page * limit exceeds 25000 fails with HTTP 400 ("Page * Limit exceeds the
# 25000 limit."). This store has >25k products and never returns an empty page before hitting
# that cap, so shopify.py's enumeration stops itself cleanly at page 100 (25000 / PAGE_LIMIT
# 250) instead of enumerating the full catalog. Coverage of this source is therefore partial
# by design -- the shopify strategy forces full_sweep=False whenever enumeration ends via the
# cap, so a capped run never inflates missStreak on the store's unobserved remainder.
contract:
  # No live enumeration run yet (Task-8 BUILD is scoped to descriptor + stack plumbing
  # only; the harvest is a separate EXECUTE step). Conservative floor pending first live
  # sweep; raise from evidence after Task-8 EXECUTE. Left unchanged despite the 25k
  # enumeration cap above -- the first ~25k-product slice comfortably clears 1000.
  # STILL left unchanged after the scope.vendors removal (Plan 5 Task 1, 2026-07-13) --
  # the controller re-floors minCount from the first wide harvest's evidence (Step 4).
  minCount: 1000
  maxDropPct: 30
  requiredFieldRates:
    name: 1.0
    sku: 0.8
