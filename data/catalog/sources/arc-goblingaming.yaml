id: arc-goblingaming
kind: archive
strategy: cdx-archive
baseUrl: https://web.archive.org
scope:
  # Both the CDX endpoint and the snapshot server live on baseUrl -- cdxUrlPattern is the CDX
  # `url=` query target, scoped to /products/* (Shopify product pages only, no category noise) --
  # see docs/research/2026-07-12-source-probe-webarchive.md and cdx_archive.py's module docstring.
  cdxUrlPattern: goblingaming.co.uk/products/*
  extractor: shopify-jsonld
  # snapshotTo bounds the CDX `to=` param: captures at/before end-of-2023, predating the current
  # live shopify harvest (ret-goblingaming) so this source recovers products delisted since then.
  # Value is passed through str() unchanged into the CDX query -- CDX partial-timestamp convention
  # (a bare year pads to the END of that year for a `to` bound), matching cdx_archive.py exactly.
  snapshotTo: "2023"
politeness:
  rps: 1.0
contract:
  # Archived-only recovery of out-of-print products: no population floor to enforce (an empty
  # result on any given run is not a failure signal the way a live-storefront sweep would be).
  minCount: 0
  maxDropPct: 30
  requiredFieldRates:
    # Live-verified 2026-07-13 (task-2-report.md): the real captured Goblin Gaming Shopify page
    # carries JSON-LD gtin13 -- this is the probe doc's confirmed "archived Shopify retailers are
    # the primary archived-EAN source" pattern. 0.5 floor pending full-harvest evidence.
    ean: 0.5
