id: mfr-cmon
kind: manufacturer
strategy: playwright-wp
baseUrl: https://www.cmon.com
scope:
  # CMON's site has no per-product vendor field at all (no store, marketing pages only) -- every
  # enumerated page IS cmon.com's own catalog, pinned the same way woo.py pins mfr-manticgames's
  # manufacturer. Resolved through Taxonomy.manufacturer_for_vendor against
  # taxonomy/manufacturers.yaml's cmon entry (vendorNames: [CMON, Cool Mini or Not]).
  manufacturer: CMON
  # Cloudflare evidence (task-10-report.md, confirmed live 2026-07-13): vanilla headless Chromium
  # got the "Just a moment..." managed-challenge interstitial 3/3 independent attempts, no
  # cf_clearance cookie ever set. A HEADED browser clears it outright (status 200, cf-cache-status
  # BYPASS, real 37,770-byte sitemap, no interstitial). Re-probed 2026-07-13 AFTER the unrelated
  # response.text()/XML fetcher fix: headless STILL gets the challenge (zero <loc> tags) while
  # headed still gets real content -- so this override is load-bearing, not a workaround for that
  # other bug. CONSEQUENCE: this source cannot run in headless CI; it is local-only.
  # `headless` defaults True in `_playwright_browser.py`/`playwright_wp.py` for every other
  # caller/CI -- this is the one descriptor overriding it.
  headless: false
politeness:
  rps: 0.5
contract:
  # Evidence-based floor (0.85 x observed): live wp-sitemap-posts-products-1.xml, 2026-07-13
  # (fetched via an authenticated browser session -- Cloudflare walls this XML to curl/httpx too,
  # see docs/research/2026-07-12-source-probe-manufacturers.md's CMON section and
  # task-10-report.md) read exactly 320 <url> entries. 320 * 0.85 = 272.
  minCount: 272
  maxDropPct: 30
  requiredFieldRates:
    name: 1.0
