# tradeCategory -> catalog taxonomy, consumed at RESOLVE time (resolve/attributes.py), NOT by the
# strategy. gw_trade_sheets.py emits the China Order Form's `Category (ENG)` value verbatim as the
# `tradeCategory` hint (e.g. "40K - Imperium - Astra Militarum"); the resolver folds that
# manufacturer-authoritative taxonomy into the catalog's own coarse (gameSystem, faction) vocabulary
# below, but ONLY as a fallback for products no source classified directly -- it never overrides a
# gameSystem another source already supplied. Applied at resolve (not harvest) so refining this file
# reclassifies on the next `resolve`, with no 30-minute trade re-harvest.
#
# `gameSystem` is keyed by the range PREFIX (first " - " segment): a system is decided by the range a
# product sells under, so a new "40K - <faction>" category is a 40K product the moment it appears.
# `faction` is keyed by the FULL category string: GW's fine factions fold into the catalog's coarse
# ones context-dependently (every "AOS - Order - *" -> grand-alliance-order; each "40K - Xenos - *"
# race is its own faction), and the same leaf ("Imperial Agents") means different things under
# different systems -- so faction cannot be keyed on a single token. A category present here for
# gameSystem but absent from `faction` classifies the system only (faction stays null -- honest, not
# guessed). Built + cross-checked against the (gameSystem, faction) already carried by co-occurring
# classified products; see docs/research and the PR body. Paints/sprays/brushes/hobby accessories and
# the cross-system "Chaos Daemons" bucket are deliberately absent -> no gameSystem (paints already
# carry category=paint from the strategy).
gameSystem:
  '40K': warhammer-40k
  'KT': warhammer-40k
  'AOS': age-of-sigmar
  'Old World': the-old-world
  'HH Astartes': horus-heresy
  'HH Imperium': horus-heresy
  'HH Mechanicum': horus-heresy
  'The Horus Heresy': horus-heresy
