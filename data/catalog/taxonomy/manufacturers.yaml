manufacturers:
  - slug: games-workshop
    name: Games Workshop
    codePattern: '\d{11}'
    codeStrip: [GWS, GW-]
    gs1Prefixes: ['5011921']
    # GW-Local: tistaminis.com vendors its new GW stock this way (taxonomy matching is
    # casefolded, so one spelling also covers GW-LOCAL). Live-verified 2026-07-13.
    # GW-Web / GW-OOP: same store, same brand-format tagging convention, discovered on a
    # full 100-page live enumeration of tistaminis.com/products.json 2026-07-13 (Plan 5
    # Task 1). Confirmed by product sample: "GW-Web" skus are raw GS1 5011921xxxxxx
    # barcodes (e.g. sku 5011921221493, "High Elves Ellyrian Reavers"); "GW-OOP" titles
    # are GW lines (Chaos Space Marines, Blood Bowl, Middle-earth SBG). Casefolded
    # matching also covers "GW-WEB".
    vendorNames: [Games Workshop, Citadel, Forge World, GW-Local, GW-Web, GW-OOP]
  - slug: atomic-mass-games
    name: Atomic Mass Games
    codePattern: '(SWL|SWP|SWM|CP|AMG)[A-Z]?\d+[A-Z]*'
    vendorNames: [Atomic Mass Games]
  - slug: cmon
    name: CMON
    codePattern: 'CMN[A-Z0-9]+'
    vendorNames: [CMON, Cool Mini or Not]
  - slug: corvus-belli
    name: Corvus Belli
    codePattern: '\d{6}'
    codeStrip: [COR]
    vendorNames: [Corvus Belli]
  - slug: mantic-games
    name: Mantic Games
    codePattern: '[A-Z]{2,10}\d{2,6}[A-Z]*'
    vendorNames: [Mantic Games, Mantic]
  - slug: para-bellum
    name: Para Bellum
    codePattern: 'PB[A-Z]?\w+'
    vendorNames: [Para Bellum, Para Bellum Wargames]
  - slug: steamforged-games
    name: Steamforged Games
    codePattern: 'SF[A-Z0-9-]+'
    # steamforged.com (own Shopify store, probed 2026-07-13) tags vendor per in-house game line
    # rather than by company name; these four (+ the "(app subscribers only)"/"Local Legends"
    # variants) are exactly the game lines the retired .NET tool's own vendorMap attributed to
    # "Steamforged Games" (git show 1593ee1^:tools/WarHub.ProductCatalog.Tool/ProductCatalogApp.cs,
    # ~line 1154) -- see task-6-report.md for full live vendor-tag counts. Deliberately excludes
    # the store's many licensed board-game/RPG vendor tags (Dark Souls, Elden Ring, Monster
    # Hunter, P3 Paints, Iron Kingdoms, ...), which the old tool never scraped either.
    vendorNames: [Steamforged Games, Steamforged, Warmachine, 'Warmachine (app subscribers only)', Guild Ball, Godtear, Epic Encounters, 'Epic Encounters: Local Legends']
  - slug: warlord-games
    name: Warlord Games
    codePattern: '[0-9]{9,12}(-[0-9]{1,2})?|(?=[A-Z0-9-]*[A-Z])[A-Z0-9-]{6,}'
    # Warlord-BLISTER / Warlord-WEB: tistaminis.com's brand-format tagging convention
    # (same pattern as GW-Local/GW-Web/GW-OOP above) for Warlord Games stock. Discovered
    # on a full 100-page live enumeration of tistaminis.com/products.json 2026-07-13
    # (Plan 5 Task 1); "Warlord-BLISTER" alone was 77 products in a 1,500-product sample
    # -- by far the largest unmapped tracked-brand vendor string found. Confirmed by
    # product sample: titles/skus are Warlord Games lines (Hail Caesar sku WGH-IR-22,
    # Bolt Action sku WGB-RI-130).
    vendorNames: [Warlord Games, Warlord-BLISTER, Warlord-WEB]
  - slug: wyrd-games
    name: Wyrd Games
    codePattern: 'WYR\d+[A-Z ]*'
    # giveusyourmoneypleasethankyou-wyrd.com (own Shopify store, probed 2026-07-13) uses these 5
    # vendor tag variants across its ~707 products (518 "Wyrd Miniatures - Online Store", 185
    # "Wyrd", 2 "Wyrd Games", 1 "Wyrd Miniatures", 1 "WYRD - PROMO") -- all the same company's
    # own catalog, no other vendor observed. See task-6-report.md.
    vendorNames: [Wyrd Games, Wyrd Miniatures, Wyrd, 'Wyrd Miniatures - Online Store', 'WYRD - PROMO']
  # --- Paint manufacturers (paint harvest sources; see
  # docs/research/2026-07-23-paint-manufacturer-harvest-design.md) ---
  - slug: vallejo
    name: Vallejo
    codePattern: '\d{2}\.\d{3}'
    # GS1 prefix verified by the paint tool's EanComputer (computed Vallejo EANs are
    # 8429551 + code digits + check digit).
    gs1Prefixes: ['8429551']
    vendorNames: [Vallejo, Acrylicos Vallejo, AV]
  - slug: ak-interactive
    name: AK Interactive
    codePattern: '(AK|RC|ABT)\s?\d{2,5}[A-Z]?(-[A-Z0-9]+)?'
    vendorNames: [AK Interactive, AK-Interactive]
  - slug: army-painter
    name: The Army Painter
    codePattern: '(WP|AW|CP|SM|GM|QS|BF|ST)\d{4}[A-Z]?'
    # EAN 5713799314009 observed live on thearmypainter.com variant barcode (Warpaints
    # Fanatic: Moldy Wine, WP3140P) -> GS1 Denmark company prefix.
    gs1Prefixes: ['5713799']
    # thearmypainter.com (own Shopify store, probed 2026-07-23) tags every product with
    # vendor "The Army Painter (B2C)".
    vendorNames: [The Army Painter, 'The Army Painter (B2C)', Army Painter]
  - slug: monument-hobbies
    name: Monument Hobbies
    codePattern: 'MPA-[A-Z0-9]+'
    # UPC-12 655368409059 observed live on monumenthobbies.com variant barcode
    # (Pro Acryl 1-Step 501) -> EAN-13 zero-padded prefix.
    gs1Prefixes: ['0655368']
    vendorNames: [Monument Hobbies]
  - slug: turbo-dork
    name: Turbo Dork
    codePattern: 'TDK\d+(_\d)?'
    vendorNames: [Turbo Dork, TurboDork]
  - slug: mr-hobby
    name: Mr Hobby
    # Item codes are a 1-4 letter line prefix + 1-4 digits (+ rare letter suffix): C74, H55,
    # N32, GX112, SMS1, SP2, XC01, CMC04, SF284, B601, WTT111, PSMS01... (live site + catalog
    # brand data, 2026-07-24). Letters optional because the catalog's Mr Color / Mr Metal
    # Color productCodes are stored as bare digits ('74', '218') with the C prefix implied.
    codePattern: '[A-Z]{0,4}\d{1,4}[A-Z]?'
    # No gs1Prefixes on purpose: mr-hobby.com publishes no JAN/EAN anywhere (live-probed
    # 2026-07-24 across EN+JA detail pages, no ld+json/gtin either) -- nothing verified to pin.
    vendorNames: [Mr Hobby, GSI Creos, Mr. Hobby]
  - slug: reaper
    name: Reaper
    # 5-digit skus straight off reapermini.com's embedded line-page data (09001 Red Brick,
    # 29237 UV Reactive, 08906 LTPK). No gs1Prefixes: no EAN/UPC appears anywhere in the
    # site's data (live-mapped 2026-07-24) -- add one only once a real barcode is observed.
    codePattern: '\d{5}'
    vendorNames: [Reaper, Reaper Miniatures]
