    description: |-
      **This is a breakout model which you can also find in the Southern Kriels Kithguard Battlegroup Box**

      Swinging from trees into the fray are the natives to Alchiere’s dense canopies. The Jungle Trolls are easily some of the most intelligent full-blooded trolls ever discovered.

      A staple of the Southern Kriels Kithguard, they take easily to weapons training and though simple-minded and primarily food motivated, can be forged into the rough semblance of a soldier.

      Their lanky, long-limbed forms are ideal to life in the jungle, where they use the canopy like a series of roads and ladders to cross great distances quickly, they’re natural treewalkers.

      The Jungle Trolls sport a field allowance of four, meaning crafty Kithguard players can take full advantage of their wide range of combat tools at the Jungle Troll’s disposal, from Flamethrowers, to the mighty momentum carrying siege weapon that is the Thumper, both incredibly deadly in the right hands, especially when taking both.

      The right loadout lets a Jungle Troll meddle with the terrain itself. Machete wielders can compost the ground to sprout instant forest cover, a deadly Thumper’s Fire in the Hole! can leave rubble in just the right place, and their flamethrower’s Fire Bomb can permanently turn a forest into burning earth.

      Also savagely masterful in melee combat, Jungle Trolls are no strangers to getting up close and personal. Often seen sporting a Machete in one hand and a Combat Knife in the other, brutally charging into a freshly sprung ambush.

      **What’s in the box?**

      - Jungle Troll \(Light warbeast\)
      - Multiple heads, left, and right arm weapons for customising your warbeast

