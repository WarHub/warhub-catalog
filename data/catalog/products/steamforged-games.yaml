    description: |-
      Tunnel Rats are a distinctly pyg fighting force that originated in the jungles of Alchiere. Small but physically powerful pygs make excellent sappers and can quickly dig whole networks of trenches and tunnels. Once they begin digging they quickly become overwhelmed with traditional pyg enthusiasm and it can be difficult to get them to stop. With such tunnels at their disposal throughout their territories across the Southern Kriels, the potential for utilizing these networks to surprise potential enemies was not lost of the leadership of the Kithguard.

      They even sought out particularly bloodthirsty and manic pygs to for form a close combat strike force that could dwell in the tunnels until called to strike. Living for up to weeks underground without surfacing, these pygs maintain and defend their tunnels from attack. When they are called upon to fight, the Tunnel Rats do so with a ferocity and savagery that has already become legend throughout the Kithguard.

      Though the ground of Western Immoren is packed differently than the jungles of Alchiere, the Tunnel Rats have adapted well. The Kithguard makes great use of their tunnel networks to surprise the enemy fro ambush even in territories they believed were well reconnoitered.

