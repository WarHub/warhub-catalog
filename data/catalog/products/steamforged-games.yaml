      Playable in [**Southern Kriels Kithguard**](https://steamforged.com/en-gb/collections/southern-kriels-copy), the **Mistborne Dire Trolls** call the mountain peaks high above the jungles of Alchiere home. Though given to the boundless rage that typifies their kind, these beasts are also clever like the jungle trolls.

      They possess the limited capacity for tool use and can be trained to wield weapons. Even more surprising, however, is their willingness to subject themselves to having heavy arms lashed to their backs to be crewed by pygs.

      With an array of back-mounted armaments at the behest of the **Mistborn Dire Troll** **** & its brave pyg pilot, this spiny beast can deliver arcing fire from its **** **Bombard**, blast things to smithereens with **Cannon** fire, or turn foes into swiss cheese with **Dual Metal Storm** volume fire.

      Efficient in both ranged and melee combat, and with a field allowance of four, facing a group of Mistborn Dire Trolls in combat is akin to staring down bristly blue hurricanes of death hurtling towards you.

      Being blasted to smithereens by the beast is a mercy compared to what happens when it reaches melee range. If you’re not already torn asunder by its **Ice Cleaver**, pounded into mincemeat with a **Punching Blade**, or pulverized with its **Quake Hammer**, the most grisly of all fates awaits. You’re supper.

