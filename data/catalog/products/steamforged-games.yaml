      Now they’re learning teamwork the old-fashioned way — by chopping, hauling, and sweating for every inch of ground. These sculpts capture Flint and Mallet as you’ve never seen them before: rougher, readier, and just a little more splintered around the edges.

      Bring them onto your Lumberjacks team and see how the old guard handle life off the marble. You might just find they’ve still got plenty of swing in them.

