    description: |-
      DIGITAL STL FILES • ONLINE ONLY

      *This free starter set comes in the form of digital STL files to print yourself. If you don’t have access to a 3D printer, you can order the starter set here instead.*

      Get started with Guild Ball with the **FREE** starter set, based on the original Kick-Off starter set!

      In Kick Off!, two players become team coaches for either the rowdy Brewers or the tactical Masons and play a match of Guild Ball, a bloody mob football game of intense action and high stakes. Claim victory by scoring goals or by taking out your opposition!

      As the coach, you’ll make strategic decisions and exciting plays to rack up victory points. Be the first to score 12 points and victory is yours! Win points by scoring goals or by sending opposing players back to the bench. Make exciting plays to generate momentum so you can play even harder, and bring the Guild Ball crowds roaring to their feet!

      This free starter set gets you all the STL files you need to print the Kick Off! miniatures and start playing Guild Ball. That includes:

      - 13 players with unique personalities and playstyles \(6 players per side, plus one crossover model, Lucky\)
      - An 8-piece terrain set
      - Tokens, templates, a ball, and a goal.

      To download and print the rules and cards, [click here](/blogs/resources).

