    description: |-
      **Welcome to Malifaux.**

      Step through the Breach into a world where monsters are real, magic is unpredictable, and cheating fate is all part of the game.

      Malifaux is a perilous world discovered beyond our own, a place steeped in gothic horror, crumbling Victorian elegance, arcane technology, and choking gun smoke. From steampunk constructs to vengeful spirits, undead nightmares to gun-slinging outlaws, danger lurks around every corner. Yet for those willing to risk it all, the promise of power and soulstones is too great to ignore. Luckily, here, death is often a new beginning.

      Malifaux Fourth Edition continues the game's legacy of blending deep narrative with tactical skirmish gameplay. Every battle is a story, and every character carries the weight of the lore in their mechanics. With refined rules, a smooth hiring system, and enhanced gameplay, Malifaux Fourth Edition welcomes both new players and seasoned veterans to dive headfirst into the mayhem.

      In Malifaux, victory isn’t left to chance. It’s taken with a deck of cards and a well-timed decision or two. Manage your crew, outthink your opponent, and when the chips are down, Cheat Fate.

      The Malifaux Fourth Edition Rules Manual provides a streamlined ruleset designed to teach you the fundamentals of the game, with everything you need to get started packed into one concise volume.
