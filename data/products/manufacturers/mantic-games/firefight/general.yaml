    **Description:**

    This is a ticket to attend the first Firefight: Second Edition playtest day at Mantic HQ. This will be a great opportunity to test the game and potentially play some new, experimental scenarios.

    Please make sure you have read the latest version of the rules and bring a 750pt army that uses the latest army lists.

    Tickets are limited to 16 spaces. We will, of course, be adhering to any social distancing measures required by the government and the event may be cancelled should these change.

