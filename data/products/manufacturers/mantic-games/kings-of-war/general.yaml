- name: Clash of Kings Tournament 2021
  sku: mgev003
  productType: single_kit
  priceUsd: 50
  url: https://www.manticgames.com/events/tickets/kings-of-war-tickets/clash-of-kings-tournament-2021/
  imageUrl: https://www.manticgames.com/wp-content/uploads/2019/03/CLASH2021.jpg
  status: current
  description: |-
    Get ready for the biggest Clash of Kings tournament ever! Using the all-new Kings of War: Third Edition rules, this is your chance to be the first Clash of Kings: Third Edition winner in the UK!

    To ensure we can cope with demand, we’re heading to Firestorm Games in Cardiff on the weekend of October 9th-10th, 2021. This is must-attend tournament for all fans of Kings of War, with more chances to win great prizes.

    This ticket entitles one person entry to the Tournament. Highlights at the 2021 event include:

    - Six challenging games of Kings of War throughout the weekend
    - Points limit increased to 2,300 points!
    - Awards for 1st, 2nd and 3rd place
    - Team Prize
    - Brush with Death Painting Competition (Single figure, Unit and Army)
    - Best in Faction awards (Basileans, Dwarfs, Elves, Northern Alliance, Forces of Nature, Ogres, Trident Realm of Neritica, Abyssal Dwarfs, Empire of Dust, Forces of the Abyss, Goblins, Nightstalkers, Orcs and Undead)
    - Goody bag for all attendees
    - Mantic Night Shenanigans – prize quiz, Kings of War keynote, open gaming
    - Lunch both days
    - Free on-site parking

    **Each player must bring a fully painted Kings of War army. Further information can be found in the rules pack, which can be downloaded [here](https://www.dropbox.com/sh/yxbf04axbjuleky/AAA1-UaFSCgNitFzHozyWvxka?dl=0).**

    **PLEASE NOTE: You won’t receive a physical ticket for the event, instead please print out your email confirmation.**
- name: 'Clash of Kings: 2019 Digital 2nd Edition'
  sku: MGDG018
  productType: single_kit
  priceUsd: 4.99
  url: https://www.manticgames.com/kings-of-war/clash-of-kings-2019/
  imageUrl: https://www.manticgames.com/wp-content/uploads/2019/05/Clash-of-Kings-2019.jpeg
  status: current
  description: |-
    ***Please note this book will not work with the current edition.***

    *The world trembles once again as armies march to war. This year’s annual organised play supplement includes all of the balance tweaks to continue to keep the game fun and competitive. There’s also new magic rules, stats for new epic monsters, rules for playing grand sieges, and stats for using the brand new units from Kings of War: Vanguard in your games of Kings of War!*

    **It’s the biggest Clash of Kings ever!** Inside this mighty 80-page supplement, not only will you find all the regular unit, spell and scenario updates you’ve come to expect, but this year explores a new way to play the game – the epic spectacle of Kings of War Siege!

    **Siege Warfare** Rules and scenarios for epic Siege games with your Kings of War armies. Outwit and outfight your opponent with siege towers, might artillery and secret tunnels. To the ramparts!

    **All-New 2019 Rules** Get up to speed with the very latest Kings of War balance updates, new units, and formations, spells, and artifacts for the 2019 tournament season. This year, we’ve consolidated all the various units and rules changes across the various books in the Kings of War range, as well as from the previous Clash of Kings and Edge of the Abyss, so you have them all in one convenient place.

    **New Legendary Spells** Legendary spells represent powerful magic, forbidden lore, and temperamental incantations. Cause all sorts of mischief, including Disordering units, teleporting Heroes and even stealing opponent’s spells!

    **Latest Scenarios** The latest set of amendments to the suite of scenarios available for players at your events.
- name: 'Clash of Kings: 2018 Digital'
  sku: MGDG019
  productType: single_kit
  priceUsd: 4.99
  url: https://www.manticgames.com/kings-of-war/clash-of-kings-2018/
  imageUrl: https://www.manticgames.com/wp-content/uploads/2019/07/7294.1.1000.1000.FFFFFF.0.jpeg
  status: current
  description: |-
    *Kings of War continues to hold up as an extremely well balanced and tactical game, ideal for tournaments and casual pick-up games. In the Clash of Kings 2017 book we explored different ways of running an event and heard from a number of Tournament Organisers about their experiences. All that great content is just as applicable now as it was then so this year’s book will only cover and repeat a small amount of those thoughts. This year is all about shaking things up even more than before!*

    Inside this book you will find the concluding narrative to our epic Kings of War summer campaign that ran last year as well as the altered map of Mantica! Most exciting for players though will be all the new and changed units, spells and artefacts which we have concocted along with the Rules Committee to help put a whole new spin on armies and the way the game is played.

    So sharpen your swords, polish that armour and let’s march to war!

    - **Conclusion** **to** **the Edge of the Abyss campaign –** see the new map, which was changed by YOUR games and read what’s happened to the theatres of war detailed in the course of the campaign
    - **New units –** the majority of factions will receive brand new units or Living Legends, such as a legendary Rock Thrower for the Goblins and a mythical Fire Elemental for the Salamanders/Forces of Nature
    - **New formations –** after launching a handful of formations in the Edge of the Abyss campaign, the Rules Committee has now added extra formations for the remaining armies
    - **New and updated spells!**
    - **Update** **d** **unit stats –**plenty of units have been tweaked in Clash of Kings to ensure the game stays as competitive as possible
    - **New and updated scenarios**
