- name: Kings of War Historical Digital
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: MGDG045
  priceUsd: 14.99
  url: https://www.manticgames.com/kings-of-war/kings-of-war-historical/
  imageUrl: https://www.manticgames.com/wp-content/uploads/2019/02/cover-6.jpg
  description: |-
    *Kings of War is the mass-battle table-top game from Mantic that is loved by thousands of players around the world as mighty armies clash across myriad battlefields. The ruleset has its roots very firmly bedded in historical wargaming. The sight of legions of beautifully painted infantry and cavalry models lined up ready to outwit and outfight their foes across the table is one that fires the imaginations of both historical and fantasy war gamers alike. History has taught us how such battles were fought and so it is to history that Kings of War players can now turn to relive ancient battles, alliances, and animosities.*

    Within this book, you will find the rules and army lists to allow you to play Kings of War with a range of different armies from across a wide swathe of history, from antiquity to the late middle ages. You can tailor your units with veteran abilities and even introduce mythical elements to your force. Existing players will also find some new ways to play. We sincerely hope you have great fun with it.

    This book includes:

    - The core Kings of War rules.
    - 33 new lists for historical armies from Antiquity to the Late Middle Ages. Use a combination of a master list, themes, and mercenary units to build your army.
    - Veteran abilities to create unique units and represent elite fighters.
    - New rules and scenarios.
    - Add mythical units to recreate legends \(or make new ones\).
    - Play your historical army against Kings of War fantasy armies!
