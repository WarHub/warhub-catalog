  description: |-
    Kings of War is the game of fantasy battles. This set contains game aids for tracking damage on individual units.The Kings of War Damage Trackers contain two different ways of keeping track of the number of wounds on a unit.

    Option A: Pole and Rings – the set features three different sizes of ring, which you can paint in different colours and assign different values too. For example, each small ring could represent one point of damage, each medium ring could represent five points of damage and so on. Simply change the rings to match the amount of damage suffered by the unit.

