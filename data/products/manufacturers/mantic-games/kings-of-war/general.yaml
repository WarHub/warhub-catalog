  description: |-
    Event Date: **Saturday March 25^th^ 2023 8pm – midnight**

    Join us for our Mantic Open Night at AdeptiCon. For your ticket price, you’ll get a drink ticket good for any beverage at the bar, a limited edition campfire mug, a $20 voucher good for anything at the booth, and other little goodies!

    The evening will start with a Q&A by Martin and the Mantic boys. From there we will break for open gaming including Dungeon Saga: Bar Room Brawl! Doom Ball – the favourite Veer-myn sports pastime – will rear it’s head again. Hellboy will also be available to be played as well as Armada: Kraken hunt. Hang out and catch up with the Mantic Staff and just shoot the breeze.

