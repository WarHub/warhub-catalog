- name: Clash of Kings 2021 Digital – DISCONTINUED
  sku: mgdg147
  productType: single_kit
  priceUsd: 15
  url: https://www.manticgames.com/kings-of-war/books-kings-of-war/clash-of-kings-2021-halpis-rift-digital-edition/
  imageUrl: https://www.manticgames.com/wp-content/uploads/2020/09/halpi-rifts.jpg
  status: current
  description: |-
    **PLEASE NOTE – THIS IS THE DIGITAL EDITION.**

    Halpi’s Rift is a brand new campaign book for Kings of War, which includes rules for using the magic bleeding into the world of Pannithor in your games!

    Each campaign location is affected by the magical energies running through Pannithor differently – providing players with additional location-specific spells and artefacts, which can be used to vanquish their foes and turn the tide of the campaign.

    The increase in magical activity in these locations may also provide Spellcasters with powerful, if sometimes unpredictable, abilities. Such is the power of these magical energies, that even the nature of the battlefield terrain itself may be blessed or cursed by it, causing generals to adapt their tactics for the unique scenarios found in each location.

    Also includes the latest Clash of Kings rules updates.

    You can read more about Halpi’s Rift [here](https://www.manticgames.com/news/kings-of-war-halpis-rift-preview/).
