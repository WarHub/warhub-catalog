  description: |-
    PRIZE SUPPORT • DIGITAL CODES • ONLINE ONLY

    This prize pack grants not one, not two, but **THREE codes** for surprise, limited edition miniatures!

    One for you (the Tournament Organiser) to keep — as a thank you for running an event and supporting the community — and two to give out as prizes.

    You’ll also get a **one-time 25% discount code** that can be used for anything in the Guild Ball range (up to a maximum spend of $199). With it, you can get access to other minis and prize support for your event.

    The winner of each prize code only needs to pay the shipping cost of the miniature they’ve won; the miniature itself is free!

    **Which limited edition minis could be won?** Each code grants its winner a random miniature, each with a different rarity level. [Get a sneak peek here](https://steamforged.com/blogs/brands/guild-ball-update-6).

    **How do I get the codes?** Simply add this item to your cart and check out. Soon after, you’ll get an automatic email including your prize codes and instructions on how to redeem them.

    If you haven’t received the email within a couple of hours, please check your junk folder, then [get in touch with our support team](https://steamforged-games.gorgias.help/en-US/contact).
