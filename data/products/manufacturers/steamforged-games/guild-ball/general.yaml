  description: |-
    MADE TO ORDER • RESIN • NO ASSEMBLY NEEDED • ONLINE ONLY

    *”The Falconers are a damn mystery to everyone, between the rumours surrounding their origins and their enigmatic ties to the Hunters. One thing’s for sure, though—the Falconer’s Guild represent an unwelcome wildcard for the Guilds; their sudden appearance an omen the feral Hunters are on the rise once more...”* - Lucky, Free Agent

    Leader of her flock, the Daughter of Falcons directs her team with merciless efficiency, methodically isolating her prey before the skies darken and death plummets from above. On the rare occasion her victim might escape their fate, it is only because Devana has instead chosen to steal the ball, directing it away to her teammates and safety.

    With ruthless stares akin to the flash of cold steel, the Falconer’s Guild stalk their prey with relentless focus, harrying their foes from afar before closing in for the kill. Nowhere on the pitch can truly be safe from a fate borne upon the wings of the great birds, command of the skies affording the Falconers a tactical breadth previously unknown to the Empire of the Free Cities.

    Begin the nocturnal hunt — this set includes a ball, goalpost and 6 players: Devana, Frelsi, Mataagi, Rundaas, Minerva, and Ikaros.

