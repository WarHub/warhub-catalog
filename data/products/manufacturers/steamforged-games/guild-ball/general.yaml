- name: Guild Ball - Lumberjacks Minor Guild
  sku: af019c2d-b9c5-44fa-a720-dd851e313a16
  ean: 5063231789927
  eanSource: shopify:steamforged.com
  productType: single_kit
  priceUsd: 54.99
  url: https://steamforged.com/products/guild-ball-lumberjacks
  imageUrl: https://cdn.shopify.com/s/files/1/0602/0156/6449/files/GB-Product-Image-2048x2048-Lumberjacks-v5.png?v=1763223414
  status: current
  description: |-
    The Lumberjacks are as straight up and down as the trees they fell. Honest professionals with no duplicity or ulterior motives, they’re forged through long days in the wilderness and years of teamwork. Weathered craftsfolk at heart, they bring their discipline to the pitch.

    Fresh from the forests and mills beyond the Free Cities, the Lumberjacks are a Minor Guild allied with the Masons who’ve swapped sawdust for the spotlight of the pitch.

    At the heart of the Lumberjacks’ game plan are their **Log Piles**: Sturdy stacks of timber that turn the pitch into their workshop. Timber! After kick-off two mighty stacks are felled onto the field.

    These trusty piles stick around, and can be hauled around with the right plays, giving the crew cover, better movement, and stronger attacks. With only two on the pitch, smart positioning is key. Keep close to the logs and you’ll see the Lumberjacks at their best.

    With the Lumberjacks, every play hits like a well-swung axe. Their teamwork turns structure into strength, each pass and strike honed sharp enough to split any defense.

    So grab your boots, sharpen your axe, and get ready to make your mark. The Lumberjacks are here to prove their roots in the sport run deep, and they’re not afraid to leave a few stumps behind.

    **What’s in the Box?**

    - 10 finely detailed Lumberjacks miniatures
     - Oak (Captain)
     - Tinder (Squaddie)
     - Bucker (Squaddie)
     - Itsa (Squaddie)
     - Cross( Squaddie)
     - Cut (Squaddie)
     - Cross Cut (Squaddie)
     - Chipper (Mascot)
     - Two Log Piles
- name: Guild Ball - Lumberjacks Flint & Mallet Crossover Pack
  sku: c52f06e6-37ed-4b89-baaf-1117512e1ac5
  ean: 5063231789910
  eanSource: shopify:steamforged.com
  productType: single_kit
  priceUsd: 17.99
  url: https://steamforged.com/products/guild-ball-lumberjacks-crossover-pack
  imageUrl: https://cdn.shopify.com/s/files/1/0602/0156/6449/files/GB-Product-Image-2048x2048-Flint_MalletAlts.png?v=1761926085
  status: current
  description: |-
    **From brick to bark.**

    Looks like a couple of Masons fancied a change of scenery. Flint and Mallet of the Masons Guild have packed up their tools, left the city behind, and thrown in with the Lumberjacks. Turns out a bit of dirt under the nails and sap on the boots suits them just fine.

    Now they’re learning teamwork the old-fashioned way — by chopping, hauling, and sweating for every inch of ground. These sculpts capture Flint and Mallet as you’ve never seen them before: rougher, readier, and just a little more splintered around the edges.

    Bring them onto your Lumberjacks team and see how the old guard handle life off the marble. You might just find they’ve still got plenty of swing in them.

    **What’s in the Box?**

    - Flint Alt. Sculpt (Lumberjacks Variant)
    - Mallet Alt. Sculpt (Lumberjacks Variant)
