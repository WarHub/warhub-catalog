  status: current
  description: |-
    **Where craft meets graft.**

    When the Masons and Lumberjacks get together, things get… interesting. Tinder’s traded his stamp hammers for a more traditional mason set of tools, learning the patient precision of the Masons, though you can still see his outdoorsman’s wild spark in every strike.

    And he’s not the only one. The Lumberjacks grizzled Raedlander Bucker, brings the hammer down onto the pitch in Masons Style. Both playable in the Masons Guild, Bucker & Tinder step into Mason's blue, and they’re ready to carve their mark in stone.

    **What’s in the Box?**

    - Tinder Alt. Sculpt (Masons Variant)
    - Bucker Alt. Sculpt (Masons Variant)
