    The Shadow Seraph is a triumph amongst the Khymaera, and held in awe by the entire Shadowflame Shard. Where other creatures lurk within the shadows and skulk through the gloom as they go about their clandestine activities, the Shadow Seraph is darkness incarnate, shrouded in a roiling mass of blighted twilight.

    Inky blackness falls from the Shadow Seraph’s wings and quills, leaving streaks of blight in its wake that scald exposed skin and blind those unfortunate enough to be in the creature’s vicinity. Its jaws and talons bleed darkness into anything they seize, swallowing prey in a murky haze that dulls the senses.

    Most feared of all is the vicious barb at the tip of its tail, a lethal weapon wrought as a deliberate answer to Everblight’s own horrors, capable of piercing thick hide and armour plate with terrifying speed.

