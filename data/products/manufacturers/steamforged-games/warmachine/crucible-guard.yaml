  description: |-
    In the late years of the Llaelese liberation, using Ordic production facilities and crews overseen by Crucible Arms foremen, the Order of the Golden Crucible not only managed to triple warjack production but also to launch the Crucible Guard’s magnum opus — the Vulcan.

    As large as the colossals of the time, the Vulcan functions as a rolling alchemical laboratory. This towering colossal stands on a 120mm base and contains hundred-gallon vats that allow it to produce various alchemical effects, which it can deploy through its main weapon system.

    At the start of Vulcan’s activation, it can vent a chosen alchemical effect that lingers around it, turning the space nearby into a hazard zone for anything reckless enough to close in.

    A series of dispersal nozzles along the chassis can spread a debilitating fog of alchemical toxins over a wide area. Its primary weapon, the Aqua Mortuum rocket, imbued with a chosen Alchemical Vent effect, leaves trails of alchemical poison in the air and explodes with a burst of toxic gas, while its smaller vitriolic deflagrators spray high-molarity acid to hose down squadrons.

    Bring the Vulcan to your Crucible Guard army and turn every battlefield into a hazard zone.

    **What’s in the box?**

    - Vulcan \(120mm Colossal Warjack\)

    **Full rules on Vulcan can be found FREE on the [Warmachine App](https://steamforged.com/en-gb/pages/warmachine-app) download now and begin building your Crucible Guard army.**
