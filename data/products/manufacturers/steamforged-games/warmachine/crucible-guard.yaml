    The sizzle of acid eating through armor, the roar of pyrophoric from grenades and rocket shells—these are the sounds that accompany the Crucible Guard in battle. From its headquarters in the Midfast Foundry, and in hundreds of smaller laboratories across Ord, Llael, and Cygnar, the Order’s ingenious alchemists constantly toil to invent new weapons for their formidable arsenal, continuing their tradition as one of the most scientifically sophisticated militaries to be seen on the battlefields of the Iron Kingdoms.

    **Failed Experiments**

    Alchemy can be a messy art, a fact known by the Order of the Golden Crucible more than many other scientists in the Iron Kingdoms. The Crucible Guard isn’t shy about human experimentation, which has led to several messy failures over the years.

    Many of these failed experiments stem from efforts to stabilize the serum originally developed by Alice di Marc, a remarkable compound that enabled her to transform from her normal form into a massive, hulking beast.

    Not every failed attempt results in disintegration or a sentient mass of quivering flesh. Some subjects instead become bestial, monstrous, and highly destructive, their bodies warped by the unstable serum.

    Like loyal canines, these failed experiments are given simple commands and sent howling at the enemies of the Crucible Guard, unleashing unimaginable havoc. Whether they survive or die in the process doesn’t matter, as this secondary experiment is almost always a tremendous success.

    ### What’s in the box?

    - Failed Experiments (Unit)
