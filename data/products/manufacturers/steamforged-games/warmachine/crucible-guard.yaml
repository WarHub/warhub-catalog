    This multi-part kit can be assembled as Captain Eira Mackay commanding her signature Railless Interceptor, or as a fully independent Railless Interceptor battle engine.

    The youngest scion of a respected alchemical line, warcaster Eira Mackay rejected her family’s expectations and joined the Crucible Guard, eager to use her arcane talents on the front lines of Llael. Her father’s fear for her safety led to the creation of the Railless Interceptor, a mobile bulwark born of alchemical and mechanical innovation.

    Designed and developed by Callum MacKay in 610 AR in anticipation of eventual battle against Khador, the Railless Interceptor was one of the most distinctive pieces of military hardware to hit the field of battle at the time of its inception.

    Weighing in excess of 150 tons, the Railless Interceptor is a rolling fortress of weapons and armor plating. It is crewed by a dedicated team of warriors who must serve as a hybrid of traditional crew, artillery specialists, and field mechaniks to keep their vehicle at peak operational readiness during a battle.

    Crewed by a six-man team who operate, load, maintain, and direct the machine in constant motion, the Railless Interceptor has become a vital asset of the Crucible Guard’s arsenal.

