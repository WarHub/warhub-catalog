    The sizzle of acid eating through armor, the roar of pyrophoric from grenades and rocket shells—these are the sounds that accompany the Crucible Guard in battle. From its headquarters in the Midfast Foundry, and in hundreds of smaller laboratories across Ord, Llael, and Cygnar, the Order’s ingenious alchemists constantly toil to invent new weapons for their formidable arsenal, continuing their tradition as one of the most scientifically sophisticated militaries to be seen on the battlefields of the Iron Kingdoms.

    **Crucible Guard Auxiliary Expansion**

    The [Crucible Guard Auxiliary Expansion](https://steamforged.com/products/warmachine-crucible-guard-auxiliary-expansion) is where the Order of the Golden Crucible’s obsession with innovation reveals its destructive edge. It’s ideal for Crucible Guard players who want more experimental, alchemy-fuelled firepower, especially if you’re building into a bigger army, or upgrading a [Command Starter](https://steamforged.com/en-gb/products/warmachine-crucible-guard-command-starter) force, ready to build around specialist support, flexible warjack loadouts, and hard-hitting assault infantry.

    Leader of the guard’s active armed forces is warcaster Marshal General Baldwin Gearhart, the hard-laughing warcaster who leads the Guard’s active army, and insists every one of his long-suffering assistants are simply referred to as “Mr. Clogg”.

    Gearhart’s dragged successive “Cloggs” across the Iron Kingdoms and into the wild yonder beyond the civilised world on countless hunting expeditions, and to defend strategic Golden Crucible facilities from attack. Whatever enemies the Crucible Guard faces, the Marshal General’s ready to deploy his unusual arsenal against them.

    He’s backed by armoured specialists who fight like they were built for one job and one job only: Storm Troopers to hold the cordon, Assault Troopers to breach the line, and alchemists to bottle the dregs.

    Meanwhile, Containment Operatives enter the danger zone, locking down threats from a distance and recording valuable results. And when the lines buckle, Doctor Alejandro Mosby’s there to keep the experiment running, whether his “patients” approve of his methods or not.

    Deploy the machines and the mistakes. The Liberator, Retaliator, and Vanguard warjack options bring adaptable firepower to the table, and the Failed Experiments are living proof that not every breakthrough survives the testing phase with its dignity intact. Unleash the Order’s mistakes upon your foes and observe as they’re flayed asunder.

    You can find the rules for the Crucible Guard’s alchemical forces on the [Warmachine App](https://steamforged.com/en-gb/pages/warmachine-app).

    ### What’s in the box?

