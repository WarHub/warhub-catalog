    - Doctor Alejandro Mosby (Character Solo)
    - Containment Operatives (3-model Unit)
    - Crucible Guard Assault Troopers (3-model Unit)
    - Crucible Guard Storm Troopers (3-model Unit)
    - Trancer (Solo)
    - Failed Experiments (3-model Unit)
    - Hutchuk, Ogrun Bounty Hunter (Character Solo)
