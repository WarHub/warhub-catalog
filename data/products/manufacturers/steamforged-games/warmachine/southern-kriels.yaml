    The Kithguard were originally formed to defend the Southern Kriels against any threat that would encroach upon their territories.

    One of the organization’s first acts was to establish a network of guard posts and watch towers across Alchiere to alert their forces in case of an enemy incursion.

    Virtually from the inception of the Kithguard, its infantry forces have been trained to coordinate their operations with these lightly fortified positions and to depend upon them for logistical and fire support.

