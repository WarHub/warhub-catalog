  description: |-
    The Steelbacks are the skilled smiths, fabricators, armorers, and combat mechaniks of the Kithguard. They are charged with maintaining the Kithguard’s advanced weapon systems, most especially the Ramhead warjacks they skillfully assemble from parts salvaged from the battlefields of the Iron Kingdoms.

    The Steelbacks are also responsible for retrofitting scavenged heavy weapons for use by the Kithguard’s mighty warbeasts.

    The term “Steelback” is a reference to heavy steam powered exo-armor they wear in combat.

    These armored suits not only enhance the trollkin wearer’s natural strength allowing them to bear the weight of a vast range of tools and replacement parts, but also tend to integrate an array of close combat weaponry, especially the flamethrowers they use to flash up their Ramheads.

    Steelbacks operate in teams of three on the battlefield where they are regularly called to repair warjacks and reload warbeast munitions.

