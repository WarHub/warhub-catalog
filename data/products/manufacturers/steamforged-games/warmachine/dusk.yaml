  description: |-
    SCYRAFAEL, NIS-ISSYR OF DESOLATION Warcaster

    A noble scion of House Eyvreyn, Scyrafael was to be a master scribe of the Consulariat Athenaeum, like her forbearers, but the fates had other plans in store. With the discovery of her oracular and psychokinetic powers, Scyrafael devoted herself in service to the Fane of Scyrah, where she would become a sibyl. She used her powers throughout the Infernal War to safeguard her people by studying the skeins of fate and reading their potential outcomes to any action, making her way through the world with painstaking care. Then came the day the gods died, and Scyrafael clung to her shattered flesh, howling for revenge.

    That morning, she was overwhelmed with a torrent of paralytic suffering and mind-rending despair. Witnessing firsthand the deaths of the gods through her strange vision, Scyrafael was transformed forever into the Nis-Issyr of Desolations. Though her vision has dimmed in death, her other powers have only grown in her dark rage. Now, she stalks the battlefields of Caen like an unrelenting force of nature, unleashing tides of steel to drive back the enemies of House Kallyss and any who would disturb the dust and ashes of her homeland.
