  description: |-
    In the frozen wilds of western Immoren, vengeance and death march to war. Across the blizzard-swept wastes, two forces; one living, one long dead, are set to collide in battles that will decide the fate of more than just the snow-choked frontier.

    Inside **Frozen & Forgotten**, you’ll find two opposing Command Cadres in the form of highly detailed hard plastic miniatures, ideal for starting a Warmachine army or expanding your collection.

    Lead the last survivors of the Nyss hunters in the **Dusk Final Hunt**, guided by Lanyssa Ryssyl, a deadly lesser warlock who fights to preserve the dying traditions of her people. Or command the **Orgoth Graveborn**, led by Anathia, the Imperishable Desolation — a deathless warlord returned from centuries of slumber with a host of immortal horrors at her back.

    Give one cadre to a friend and face off in epic, narrative-ready battles that bring the clash of steel, sorcery, and bone to your tabletop.

    **What’s in the box?**

    **Dusk Final Hunt**

    - Lanyssa Ryssyl \(Dusk lesser warlock\)
    - Cylena Raefyll \(Dusk character solo\)
    - Benkei \(Dusk character warbeast\)
    - Sasha \(Dusk character warbeast\)
    - Last Watch \(Dusk 3-model character unit\)

    **Orgoth Graveborn**

    - Anathia, the Imperishable Desolation \(Orgoth lesser warlock\)
    - Revenant Champion \(Orgoth character solo\)
    - Barrow Ghoul \(Orgoth character warbeast\)
    - Charnel Hound \(Orgoth character warbeast\)
    - The Execrators \(Orgoth 3-model character unit\)

    Models are supplied unpainted and some assembly is required.

    **Dusk Final Hunt – Nyss hunters**

    Playable with Dusk House Kallyss and another upcoming army.

    Once the silent killers of the Shard Spires, the Nyss hunters are now reduced to a handful of warriors under Lanyssa Ryssyl’s command. Bonded with lethal warbeasts Sasha and Benkei, and supported by the oathbound veterans of the Last Watch, they strike with the precision of a blizzard’s edge. Every battle is a step toward preserving their people’s legacy.

    **Orgoth Graveborn – Deathless conquerors**

    Playable with Orgoth Sea Raiders and another upcoming army.

    Entombed for centuries with their warlord, the Graveborn march again at Anathia’s call. These armoured horrors include the bone-wrapped Charnel Hound, the towering Revenant Champion with his cursed axe, and the silent Execrators who have never left their mistress’s side. Together, they are an unyielding tide of death, fighting to reclaim the glories of their first conquest.
