  description: |-
    Colossal by name and by nature, the Phantasm is one of the largest miniatures Warmachine has ever seen. Towering over its foes, it demands attention and repays it in obliteration.

    Haunting the battlefield from the skies like a primordial avatar of death, the Phantasm is a triumph of eldritch engineering. The nodes of its great wings crackle with radiant teleforce energies, providing the motive force behind both its most explosive attacks and its capacity for flight.

    A relic of Vyre and Shyeel genius, this colossal myrmidon answers only to the cold will of the undead warcasters of Dusk. Awash in luminous arcs of teleforce and draped in the shimmering distortion of its Phantasmal Field, the Phantasm descends upon a battlefield like a harbinger of ruin.

    Armed with an arsenal that’d make the old gods weep, the Phantasm wields time rending Chronophage Cannons, void projecting Desolators, and necromantic Revivifiers with the power to seize control of the dead before their bodies fall insensate to the earth.

    Each one of its arcanika Hex Blades is a brutal marvel; metallurgic wonders honed to razor sharpness and thrumming with raw destructive energies.

    The Phantasm comes with two interchangeable options each for its head, chest, and hex blades for six configurations in total — letting you tailor this nightmare engine to your preferred form of annihilation.

    The Phantasm is playable in Dusk’s House Kallyss army. This is the centrepiece your forces deserve, and your enemies fear.

    Unleash total desolation. The Phantasm has arrived.

    Full rules for the Phantasm can be found FREE on the [Warmachine App](https://steamforged.com/en-gb/pages/warmachine-app). Download now and begin building your House Kallyss army.

