    VOID SHAPER Solo

    The void shapers are the eldritch engineers and arcanists serving to construct House Kallyss’ myrmidons and potent arcantrik weaponry. Though most formerly served either House Shyeel or Vyre, they have put aside their longstanding rivalries in the aftermath of the doom of Ios. Their name comes from their willingness to draw on the lessons of their new undead condition and to draw theoretical sciences from the darkness of the void.

    Such dark mysteries are often too much even for the minds of the dead, and the void shapers are under constant threat from the ravages of the abysses they explore. In addition to being skilled mechaniks and arcane researchers, each is also a dangerous combatant, armed with experimental void-wrought weapons.
