    With raw galvanic power sparking across their armour, the Stormblade Legionnaires take to battle in formidable shield walls, prepared to defend to the last. The Stormguard go on the offensive, seeking and destroying enemy warjacks on the field. Among Cygnar’s most advanced soldiers, the Stormthrowers unleash lightning with devastating effects.

    Rounding out the force are a Standard Bearer to charge the very air and inspire the ranks, and a battle-proven Officer to keep the force in line. This is the steel heart of Storm Legion — disciplined, deadly, and impossible to break.

    What’s in the box?

    - Major Anson Wolfe (Warcaster)
    - The General (Character Heavy Warjack)
    - Legionnaire Officer (Solo)
    - Stormblade Legionnaires (Unit)
    - Stormthrower Legionnaires (Unit)
    - Stormguard Legionnaires (Unit)
    - Legionnaire Standard Bearer (Command Attachment)

    Models supplied unpainted.

