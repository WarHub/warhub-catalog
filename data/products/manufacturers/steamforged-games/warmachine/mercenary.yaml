    This pairing rewards aggressive, clever play—perfect for Warmachine commanders who want to dominate with unconventional tactics, psychic control, and raw destructive power.

    This dynamic mercenary duo introduces a powerful new warcaster and her horrifying construct. Playable in any army, Nostilla & her hulking Aberration offer both new players and veterans a versatile and deadly new tactical option on the battlefield.

