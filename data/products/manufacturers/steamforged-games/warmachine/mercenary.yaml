    **A union of mind and monstrosity**

    Amongst the dreaded Cephalyx, there is no greater survivor than Exulon Nostilla. While Cephalyx hives across Western Immoren have been purged, their territories claimed by enemies, Nostilla moves across the continent with an air of calm control, certain she and her towering monstrosity, Aberration, can insert themselves wherever she desires.

