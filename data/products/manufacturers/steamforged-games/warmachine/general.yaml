  status: current
  description: |-
    **Thornfall Alliance Razor Boars**

    For as long as the tribes of the farrow have gone to war, they have been accompanied by vicious razor boars. Far larger than the wolves utilized by the nations of man for similar purposes, razor boars are primitive and deadly creatures that require little incentive or training to join the farrow in battle.

    The farrow have spent generations breeding razor boars with the sole intent of making them larger and more dangerous. Only the boars with the most savage disposition are chosen to be mated. They are then conditioned to develop a strong taste for just about any type of flesh their masters can get their hands on, including human, trollkin, skorne, and other farrow.

    When loosed upon an enemy, razor boars are heedless of their own well-being and charge ahead, intent only on goring their prey to the ground and then feasting. It is common for survivors of farrow raids to grow pale while recalling the speed with which a group of razor boars descended upon their fallen compatriots, and the terrible screams as the soldiers were turned into heaps of rags and bloody bones.

    Full rules can be found **FREE** on the [Warmachine App](https://steamforged.com/en-gb/pages/warmachine-app) download now and begin building your Thornfall Alliance army.

    **What’s in the box?**

    - Razor Boars \(Lesser Warbeast\)
- name: 'Warmachine: Bone Grinders'
