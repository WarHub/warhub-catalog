    Led by the warlock Midas, your Thornfall Alliance Command Starter puts ferocity and cunning front and centre. A potent bone grinder empowered by lives stolen and feasted upon, he treats the energies released in death as weapons and tools, commanding bones to animate and dead flesh to knit back together so the fight can keep going.

