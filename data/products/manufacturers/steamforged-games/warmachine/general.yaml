  description: |-
    The Warmachine Organised Play Kit is your go-to event support pack to bring your Warmachine community together.

    Inside, you’ll find art prints, focus tokens, exclusive command cards, and an official sign-up sheet to help run your events. There’s also a QR code that unlocks downloadable trophy STL files, including designs for the Steamroller and P3 Painting Competition trophies, so you can print custom prizes for your community.

    ### Running an Iron Gauntlet qualifier? We’ve got something special for you

    If your event’s approved as a sanctioned Iron Gauntlet qualifier, you’ll get a free Organised Play Kit and a physical exclusive Iron Gauntlet trophy to award to your champion. Only a limited number of events can be sanctioned each year. To apply, [fill out this form](https://forms.monday.com/forms/e534192775ae4f497212719cdddc1370).

    ### Warstores, your first kit’s on us

    If you’re a registered Warstore, you can grab your first Organised Play Kit for free. Just get in touch with your account manager to claim yours and start hosting events in-store.

    Not a stockist yet? [Email our trade team](mailto:b2b@steamforged.com) to join the programme and reap the benefits!

    **What’s in the box?**

    - 3 Warmachine art prints
    - 16 Focus tokens
    - 8 Exclusive command cards
    - Event sign-up sheet
    - QR code to download and print trophies at home
