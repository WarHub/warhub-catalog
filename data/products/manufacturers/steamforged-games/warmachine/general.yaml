  status: current
  description: |-
    **Thornfall Alliance Bone Grinders**

    Necromancers and mortitheurges have long since proven the power inherent in flesh and bone lingers after death. Bone grinders, well versed in the anatomy of a wide variety of creatures, are a strange offshoot of both disciplines, that gather the parts of slain beasts in order to tap into latent energies that linger within such grisly corpses.

    The bone grinder methodology, part alchemy and part occultism, fuses mysticism and practical knowledge to craft a variety of charms and powders. As fresher corpses better suit their needs, they are a regular sight on the battlefield, where they race to descend on the recently fallen with knives, cleavers, and serrated saws. From these remains bone grinders carve talismans or grind bone into powder and add ingredients such as blood, bile, and lymph to create a paste possessing tremendous mystical potency.

    The products of this battlefield butchery are blessings that enhance the weapons of allies, and bitter hexes that curse foes. Both are welcome additions to the arsenal of the Thornfall Alliance, especially when combating the undead legions of Cryx or enemy warbeasts.

    Full rules can be found **FREE** on the [Warmachine App](https://steamforged.com/en-gb/pages/warmachine-app) download now and begin building your Thornfall Alliance army.

