  description: |-
    **They dropped what from a skyship?**

    Crewed by a team of Artillery Corps engineers, the Heavy Field Gun is the primary battlefield support weapon of the Cygnar Gravediggers.

    Despite its formidable size and weight, the gun is designed to be dropped from skyships alongside its crew and ammunition. Because setup takes time, these crews are often deployed ahead of the main force to get the gun into position.

    Once set-up, the Heavy Field Gun is a terrifying instrument of destruction. Able to pound targets at impossible distances with a variety of specialized munitions, as long as a target has been painted with flares, the Heavy Field Guns can hit it.

    A natural fit for Gravedigger forces looking to dominate the battlefield from range.

