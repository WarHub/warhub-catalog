  url: https://steamforged.com/products/warmachine-captain-connor-boom-boom-mccoy
  imageUrl: https://cdn.shopify.com/s/files/1/0602/0156/6449/files/Warmachine-Cygnar-ProductShot-2000x2000-BoomBoom.png?v=1746853656
  description: |-
    Uniquely amongst his peers, Captain Connor McCoy—affectionately known as ‘Boom Boom’ to the soldiers serving under his command—McCoy takes to the battlefield not on foot but from atop the turret of his custom outfitted assault strider.

    An engineering savant with a fascination with explosives and artillery, McCoy discovered his aptitude as a prospective warcaster at fifteen years old when he realised he could communicate directly with the mind of a warjack.

    McCoy’s command style reflects his inner turmoil. Still haunted by the deaths of his parents during the Infernal War, only when surrounded by chaos and the deafening concussive blasts of his cannons can McCoy hold the inner demons that scream for vengeance at bay.

    Armed with a heavy mortar and twin organ guns, Boom Boom McCoy doesn’t do subtle.

    Lobbing high-arcing shells deep into enemy lines, McCoy’s heavy mortar leaves craters where battle lines used to be.

    But it’s his twin organ guns that really earn him the nickname “Boom Boom.” Mounted on his strider, they spit out a relentless storm of fire that sends enemies flying—sometimes through the air, sometimes straight through walls.

    McCoy’s feat, Shock and Awe, lets his battlegroup unleash a punishing, coordinated barrage—breaking enemy lines and seizing momentum in one thunderous volley. Paired with the Gravediggers’ mobile warjacks, McCoy turns ranged supremacy into total field control.

    Boom Boom McCoy isn’t just loud he’s massive. Towering over the battlefield on an 80mm base, he’s a true centrepiece

    If you want a warcaster who brings the boom and leads from the front, McCoy’s your man.

    **What’s in the box?**

    - Captain Connor “Boom Boom” McCoy \(Warcaster\)
