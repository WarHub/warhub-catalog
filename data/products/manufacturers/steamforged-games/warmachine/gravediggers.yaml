  description: |-
    The Commando Officer is the tip of the spear — coordinating scattered forces, exploiting weak points, and turning confusion into opportunity.

    These elite leaders are cut from a different cloth: disciplined yet unpredictable, methodical but fearless. Armed with small arms, flares, and grenades, they bring both tactical cohesion and brutal close-quarters lethality to any Gravedigger operation.

    Once per game, the Commando Officer can call a mission objective, marking an enemy for destruction. When they do, nearby Commandos gain a +2 bonus to attack and damage rolls against that target — turning a coordinated strike into a ruthless takedown.

    Perfect for pairing with Gravedigger Commandos, the Commando Officer is a force multiplier who turns stealth strikes into total disruption.

