  description: |-
    **Four legs. One boiler. Zero subtlety.**

    Say hello to Cygnar’s grumpiest gun platform. The Assault Strider is a squat, heavy quadrupedal walker developed from the mechanics of the experimental Stormsmith Storm Strider

    Airdropped into battle and brought to life by a coal-fuelled steam plant rather than a voltaic stormchamber, this mobile beast is piloted by a four-person crew and loaded with serious firepower. Between the battle cannon and twin machine guns, there’s not much it can’t soften — or flatten.

    Ideal for Cygnar Gravedigger players who want a walking bunker that means business.

    **What’s in the Box?**

