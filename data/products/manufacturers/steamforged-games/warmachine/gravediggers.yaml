    This Auxiliary Expansion includes a sizable force ideal for 30-point Warmachine games. Combine it with other sets to introduce a host of new strategies and tactics to your Cygnar Gravediggers army.

    A decorated leader and skilled duellist, Colonel Allison Jakes is known for surgical strikes. Quirky and fearless, Beaker is the Gravedigger’s field testing platform for experimental loadouts. It’s been blasted apart in countless accidents, only to have its cortex salvaged from the wreckage and implanted in a fresh chassis. After surviving so long, the warjack has developed a strange sense of its own indestructibility and pitches headlong into the heaviest fighting.

    A squad-support variant of the Patriot, the Raider is the ideal airdrop to clear any problematic infantry, while former Trench Buster, Captain Argo Brock, leads an expert squadron of infiltration Commandos to bring victory home.

