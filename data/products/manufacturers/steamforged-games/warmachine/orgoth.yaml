  description: |-
    Command the **Orgoth Graveborn**, led by Anathia, the Imperishable Desolation — a deathless warlord returned from centuries of slumber with a host of immortal horrors at her back.

    Your Orgoth Graveborn Command Cadre brings this ancient tyrant to the tabletop with a full force of undead champions and nightmare constructs bound by oaths older than the Iron Kingdoms themselves.

    The Revenant Champion strides at Anathia’s side — a fearsome relic of the first Orgoth Invasion restored to grim purpose. The Barrow Ghoul lumbers behind them, an infernal-built altar of bone and iron animated by dark sorcery.

    Hunting ahead of the host is the Charnel Hound, a dreadful beast that tracks prey across the lands. And completing the cadre are the Execrators, a three-model character unit of barrow-entombed warriors ready to carve a path of ruin.

    This 30-point cadre is your gateway to commanding the risen terror of the Orgoth. Whether you’re starting a new army or expanding your Orgoth collection, the Graveborn bring a brutal blend of undead resilience and ancient hatred to every battlefield they haunt.

