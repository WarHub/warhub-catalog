- name: 'Godtear: Durthax, Branchlord of the Weald & Treekin'
  sku: SFGT-031
  ean: 5060453696736
  eanSource: shopify:steamforged.com
  productType: single_kit
  priceUsd: 34.99
  url: https://steamforged.com/products/godtear-durthax-branchlord-of-the-weald-treekin
  imageUrl: https://cdn.shopify.com/s/files/1/0602/0156/6449/files/GT-Product-Image-2048x2048-Box_Group.png?v=1743077161
  status: current
  description: |-
    ## Unleash the unyielding wrath of nature with Durthax, Branchlord of the Weald.

    Something extraordinary happened when a falling godtear pierced the bark of an ancient tree: its branches shuddered with life, and its trunk heaved roots from the clutches of the earth.

    Durthax—protector and warden of the forest—was born. Along with their steadfast Treekin followers Durthax aims to guard and nurture all living beings from those who seek to exploit them.

    A stalwart protector of all living things, Durthax embodies the brutal strength of nature, using their abilities to protect their four Treekin followers. Durthax excels manipulating the field to your advantage, armed with the ability to teleport banners. They also work well with larger groups of small followers, helping defend them from danger with a strong set of support abilities.

    The Branchlord of the Weald is a hard counter to some of the toughest current champions in the game, with an unique range of stats and abilities. Slow and methodical, Durthax is unable to move during the plot phase, but makes up for it with a whopping 14 health, the highest of any Godtear champion.

    In this box you’ll find everything you need to plant Durthax in the thick of it, and start manipulating the battlefield to your advantage. Combine Durthax with either Godtear starter set, and you’ll have a warband ready to play.

    #### What's in the box?

    - 1 Durthax Miniature
    - 4 Treekin Miniatures
    - 1 Durthax’s Banner Miniature
    - 2x double-sided Durthax profile cards
    - 1x double-sided Treekin profile card

    Godtear is an out-of-the-box experience, so all minis are pre-assembled and coloured according to their champion class—blue for Durthax, as a Guardian champion.

    Godtear is also a factionless game—mix and match Durthax with any other champions you like to create your custom warband.
