    Get a free exclusive model with this book, only when purchased from the warlord webstore!

    Noshiro was an Agano-class cruiser that served with the Imperial Japanese Navy. This class was designed to serve as the flagship of a destroyer flotilla. Completed in mid-1943, Noshiro participated in battles in the Gilbert and Solomon Islands and later escaped the Battle of the Philippine Sea of 19 June 1944 unscathed. At the Battle of Leyte Gulf, beginning 22 October 1944, Noshiro was ordered to Brunei as flagship of DesRon 2. At the Battle off Samar, the following day Noshiro was credited with hits on the US escort carrier USS White Plains and was partially responsible for the sinking of the carrier USS Gambier Bay, one of only two cases of carriers being sunk by naval gunfire alone. She met her end days later, however, at the hands of Grumman TBM-1C Avenger torpedo bombers, on 26 October.
