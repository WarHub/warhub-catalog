  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/7452412005-Victory-at-Sea-HMS-Dido-1940-1.jpg?v=1605873671
  description: |-
    The first WWII mission of Dido was the escort the carrier, Furious to West Africa in November 1940, before spending four months on convoy escort duty in the Atlantic. She then joined operations in the Mediterranean in 1941, assisting in the evacuation of British forces from Crete in May. Badly damaged in these efforts she spent the latter half of that year in the Brooklyn shipyard of New York.

    She would return to service in the East Mediterranean, being a key component with only four British ships covering the area. She later served in the Western Mediterranean and supported the Normandy landings in 1944. Her final mission of WWII was to travel to Copenhagen to accept the surrender of the Kriegsmarine. Along the way, she fired the final naval shot of the war in Europe.

    *Models supplied unassembled and unpainted*
- name: Victory at Sea - HMS Duke of York
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '745102002'
  priceGbp: 20.50
  url: https://store.warlordgames.com/products/victory-at-sea-hms-duke-of-york
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/745102002-Victory-at-Sea-HMS-Duke-of-York1.jpg?v=1605871981
  description: |-
    Laid down in 1937 and commissioned in 1941, HMS Duke of York was a King George V-class of battleship. She had the distinction of transporting Winston Churchill across the Atlantic to meet Franklin D. Roosevelt in the Winter of 1941. Churchill wrote of his experience, “Being in a ship in weather such as this is like being in a prison, with the extra chance of being drowned”. Between March and September of the next year she was involved mainly in convoy escort duties, but in October was dispatched to Gibraltar to become the flagship of Task Force H.

    She saw little action during this period, her main role being protection of the task force’s aircraft carriers, but nevertheless assisted the Allied invasion of North Africa. She subsequently participated in operations to divert Axis attentions away from Sicily in Operation Husky, and Operation Leander in an attempt to disrupt German merchant shipping of the coast of Norway.

    On December 26th 1943 HMS Duke of York encountered the German battleship Scharnhorst. Exchanging fire, HMS Duke of York suffered some hits with little effect, but for her part landed several hits upon Scharnhorst, silencing a turret and hitting a boiler room. This forced Scharnhorst on the defensive, and she was sunk by torpedoes as well as further heavy fire from Duke of York.

    *Models supplied unassembled and unpainted*
- name: Victory at Sea - HMS Eagle
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '745102001'
  priceGbp: 24.50
  url: https://store.warlordgames.com/products/victory-at-sea-hms-eagle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/745102001-Victory-at-Sea-HMS-Eagle-1940-1.jpg?v=1605871708
  description: |-
    An early aircraft carrier of the Royal Navy, HMS Eagle was originally a super-dreadnought of the Chilean Navy \(named Almirante Cochrane\), laid down in 1913, but was purchased by the Royal Navy for conversion to a carrier in 1918. This work was not finished until 1924.

    Initially deployed in the Indian Ocean against the threat of German commerce raiders, Eagle also saw service in the Mediterranean and the China station. At the outset of the war, the Fleet Air Arm was severely lacking fighters, so her complement of aircraft was limited to solely Fairey Swordfish Torpedo bombers until late 1940.

    Upon the Italian entry into the war on the side of the Axis, HMS Eagle was the only Royal Navy carrier available to the British in the Mediterranean but performed sterling service in ferrying fighters to the island of Malta. It was whilst performing this latter duty that she was sunk in August 1942, when torpedoed by the German Submarine U-73.

    *Models supplied unassembled and unpainted*
- name: Victory At Sea - HMS Nelson
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '742412019'
  priceGbp: 20.50
  url: https://store.warlordgames.com/products/victory-at-sea-hms-nelson
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/742412019_VaS_HMSNelson01.jpg?v=1665079310
  description: |-
    An oddity among other capital ships of the Royal Navy, the Nelson-class had a triple configuration of turrets in front of the bridge structure and no rearward facing main guns. It was also the only British battleship to be armed with 16-inch guns and, though it could not fire to its aft, having nine of these massive weapons to the fore negated any tactical disadvantage. A more painful disadvantage was the ship’s slow speed.

    Along with her sister ship, Nelson supported many key operations throughout WWII. These included escort duty of convoys to Malta in mid-1941, supporting the British invasion of French Algeria as part of Operation Torch in 1942, as well as the invasions of Sicily and Italy the following year. She was performing gunfire support during the Normandy D-Day landings when struck by a mine. After repairs she saw the remainder of the war as part of the Eastern fleet.

    Both ships of the class survived the Second World War and though they always seemed ungainly in appearance, proved to be solid warships.

    Contains 1 resin and metal vessel with game stat card.

    *Models supplied unassembled and unpainted*
