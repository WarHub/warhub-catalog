  description: |-
    See what the fates have in store for your games of Hail Caesar Epic Battles with the aid of the visionary Haruspex!

    In Roman religion, haruspicy \(the practice of divining the future or will of the gods by examining the internal organs of a sacrificial animal\) was a well-established part of life, with the liver in particular being seen as significant in discerning the will and attitude of the gods towards a plan or course of action. A haruspex would often be consulted by Roman commanders on the eve of battle, to see if their strategies would bring victory or defeat, and their interpretations are believed to have influenced some of the most important engagements of antiquity.

    Every good Roman knows that the will of the gods must never be ignored! This Haruspex \(and his sacrificial bull!\) are ready to bring vital information and great character to any Roman collection.

