  eanSource: shopify:goblingaming.co.uk
  sku: '112010007'
  priceGbp: 31.00
  url: https://store.warlordgames.com/products/hail-caesar-epic-battles-allied-troops-division
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/112010007_HCEpicBattles_AlliedTroopsDivision01.jpg?v=1715605388
  description: |-
    If you’re playing Hail Caesar Epic Battles, you’ll be needing allies – neither Rome nor Carthage can win the war alone – and this plastic boxed set nets you allies aplenty, perfect for bolstering your ranks, whichever side you command!

    Both Rome and Carthage employed a myriad of different allied troops in their armies, whether conquered peoples, mercenaries, or barbarian tribes eager for plunder. Most famously, Carthage’s armies were mostly composed of mercenary troops as the North African city could not call upon the seemingly endless manpower available to Rome.

    The Romans also made great use of the surrounding Italian tribes, although the loyalties of these peoples could be fickle at best, with many defecting to Hannibal's side during his invasion of Italy. The miniatures in this set give players a wide variety of different troops to reinforce their armies, from swift Numidian light cavalry to the fierce Gallic Celts and Celtiberians and the renowned Spanish Scutarii.

    The *Allied Troops division* boxed set contains:

    - The following hard plastic miniatures:
     - 6 bases of Celtiberian warriors \(20 soldiers each\)
     - 6 bases of Italian allied infantry \(20 soldiers each\)
     - 4 bases of Numidian skirmishers with bows
     - 4 bases of Balearic Slingers
     - 4 bases of Ligurian light infantry skirmishers
     - 4 bases of Spanish Caetrati skirmishers
     - 4 bases of Gallic Celt cavalry
     - 4 bases of Spanish cavalry
    - Plastic bases
    - Full colour shield decals

    *Models supplied unassembled and unpainted*
