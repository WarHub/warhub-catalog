  description: |-
    A baggage train is an essential supporting element of any army, and this characterful pack of beasts of burden is the perfect accompaniment to your Epic Battles army!

    All military forces require a huge amount of materiel to sustain them; equipment, food, drink and more must all come along when the army moves. The logistical transport of such goods would be known as a baggage train, and would be composed of whatever beasts of burden hands could be laid upon – in the ancient world, horses, oxen and camels would all suffice.

    In addition to looking great on the tabletop, making a camp look complete or a fort populated, a baggage train could also form the central objective of a scenario, as an unprotected baggage train is an unsupplied army!

    Box contains one Hail Caesar Epic Battles Baggage Train composed of five elements, cast in high quality Warlord Resin^TM^:

    - Two oxen-pulled carts
    - One Horse-Dawn Cart
    - One set of laden Horses
