  description: |-
    Antigonus Monopthalmus \('the One-Eyed'\) was one the the greatest of the Macedonian generals who fought under Alexander the Great and his father Philip II of Macedon. After Alexander's death, he initially ruled the obscure province of Phrygia, but would both war against, and make fractious alliances with, the other Macedonian Successors. Through these conquests, Antiginus arguably came the closest to reuniting Alexander's fractured empire, and although eventually defeated and killed at the Battle of Ipsus in 301BC, he founded the Antigonid dynasty that would go on to rule Macedonia and eventually come into conflict with Rome. Demetrius Poliorcetes \('the Besieger'\) was the son of Antigonus, and briefly King of both Asia and Macedonia. Famed for conducting the Siege of Rhodes, and his subsequent involvement with siegecraft, he both helped to develop mighty seige engines and lent his expertise to fortify many Greek cities, such as Athens and Corinth. Initially allied with Pyrrhus of Epirus, Demetrius was deposed as King of Macedon by his former friend and was defeated in battle by Seleucus, eventually dying under house arrest shortly thereafter.

    *Miniature sculpted by Toma Axelsson. Studio Miniatures painted by Andres Amian.*

