- name: Julius Caesar & Mark Antony
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '103011102'
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/julius-caesar-mark-antony
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/103011102-Caesar-Mark-Antony-a.jpg?v=1575566432
  description: |-
    **Julius Caesar**

    Gaius Julius Caesar \(13 July 100BCE – 15 March 44 BCE\) - an author of prose, formidable general and politician. His actions brought down the stuttering old Roman Republic leading to the rise of the early Imperial era. Forming a triumvirate with fellow political heavy hitters Marcus Crassus and Pompey the Great who watched the home fires of the senate whilst Caesar brought conquest to Gaul; even finding time to launch several adventures to the mysterious island of Britannia. He was also the first of his ilk to bridge the infamous Rhine to subdue the ever present threats of the Germanic tribes. His greatest act \(some may say of treason\) was to break all known convention and lead his legions across the Rubicon river starting several years of civil war.

    **Mark Antony**

    Known as Marcus Antonius \(January 14, 83 BCE – August 1, 30BCE\), Antony was a general and politician whose support was crucial for the changes that engulfed the latter half of the Republic. Antony was administrator of Italy. His early career saw him serve as a cavalry commander in Syria under Aulus Gabinius. After Caesar’s death he took the helm of the Caesarian party attempting to restore order to a fragmented Rome, later going to war against Caesar’s adopted son Gius Octavius.

    *Models supplied unassembled and unpainted*
- name: King Juba I of Numidia
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5060393705420'
  eanSource: shopify:entoyment.co.uk
  sku: '103011301'
  priceGbp: 5.75
  url: https://store.warlordgames.com/products/king-juba-i-of-numidia
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/103011301_King_Juba_I_of_Numidia1.jpg?v=1708336482
  description: |-
    King Juba of Numidia owed his position and the power that came with it to the great Roman general Pompey. After all, it was Pompey who came from Rome to reinstate Juba’s father King Hiempsal II in 81BC. Juba also had cause to hate Julius Caesar who had provoked him while on a visit to Rome. When war broke out between Pompey and Caesar, Juba’s loyalty to the Pompeian cause was certain. Caesar’s apparent unconcern at that proved the downfall of his emissary Gaius Scribonius Curio whom he sent to take control of Numidia.

    Curio travelled to Africa more in expectation than hope. He easily dealt with anything the sitting Pompeian Governor could throw at him, but when he launched an ill-considered attack on Juba’s army, Curio soon realized his mistake. The Numidians must have been surprised at Curio’s audacity in attacking them but recovered quickly: hardly a Roman escaped with his life. Curio didn’t. Juba was jubilant and prepared to fight with his Roman allies against Caesar when the latter landed in Africa. However, Caesar was not Curio. When Juba joined Publius Cornelius Scipio before the Battle of Thapsus, the two failed to coordinate their attack on Caesar, resulting in a stinging defeat for Scipio and Juba fleeing the scene with his army. Humiliated with nowhere to turn, Juba did the honourable thing and committed suicide. Such was the effect Caesar had on his enemies by now that though he had barely laid a glove on Juba, his victory over the Numidian king was total.

    *Models supplied unassembled and unpainted*
