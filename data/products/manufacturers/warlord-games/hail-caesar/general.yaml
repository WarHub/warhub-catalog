  description: |-
    Between 58 BC and 50 BC, the military might of the Roman Republic waged a brutal war on the Gallic Celt tribes living in the lands of Gaul. What the Gaul warriors lacked in the drilled discipline of their Roman foes they more than matched them with in ferocity and individual fighting prowess. The Gallic Wars, a deadly clash of cultures and military doctrine, would shape Western Europe for centuries to come. Gaius Julius Caesar's aggressive campaign would ultimately end with Gaul being subsumed into the Roman Republic, and ensure his name would become legendary.

    Hail Caesar is a game of tabletop massed battles set in the Ancients era. Pit your wits and tactics against your friends as your armies clash in combat on the tabletop. Can you wield the legions of Rome with the same skill and success as Caesar? Or would you prefer to lead Gallic tribes such as the Nervii, Helvetii and Venetii against the invaders as the renowned chieftain Vercingetorix did?

    The Caesar's Gallic Wars starter set gives you two starter forces: the barbaric Gauls and the legions of the late Roman Republic – a fantastic start to your campaign to conquer all comers and write your name in the annals of history!

    Starter set contains:

    - Softback A5 Hail Caesar Gamer's Edition rulebook
    - Gallic Wars introductory guide
    - 80 hard plastic Gallic Celtic Infantry
    - 48 hard plastic Caesarian Roman Infantry
    - Celtic and Roman waterslide shield decals
