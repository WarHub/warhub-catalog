  description: |-
    The various tribes known to the Egyptians as The Sea Peoples wrought havoc throughout the eastern Mediterranean and settled into the southern Levant. The Sherden allied with the Libyans and attacked Egypt from the west. After their defeat the Sherden were incorporated into the guard of the pharaoh. The Lukka probably came from Lycia in the South West of Anatolia – they were notorious and skilled pirates into later times. The Philistines are probably to be identified with the Peleset who settled into the southern Levant after their defeat by Rameses III. Their name is recorded in several Egyptian sources, most notably at the mortuary temple of Rameses at Medinet Habu. Exactly where the Sea Peoples came from is a bit of a mystery. Favourites are eastern Anatolia, the Islands of the Aegean, and mainland Greece.

    We've put together this fantastic army deal to get you started with a Sea Peoples force. This bundle gives you 108 infantry \(including command\) and two light chariots - the perfect starting point for a Bronze Age army!

