    Battle for control of England’s future in the bloody Wars of the Roses!

    This supplement lets you fight through the savage medieval civil wars that raged across England in the Fifteenth Century using *Hail Caesar.* Fought between the great houses of Lancaster and York, the Wars of the Roses would see hugely bloody battles, bitter familial feuds, and the downfall of the Plantagenet dynasty, and go on to inspire the hugely popular *Game of Thrones.*

    Late Medieval warfare is ideally suited to wargaming with *Hail Caesar*, and this tome is packed with rules for representing the massed ranks of archers, billmen, and men-at-arms so common in English armies of the period, and the tactics they used. Accompanying these rules is a wide selection of scenarios allowing you to re-fight some of the most dramatic battles ever fought on English soil – Tewkesbury, St Albans, Towton, and of course Bosworth – as well as plenty of historical inspiration for painting and modelling!

