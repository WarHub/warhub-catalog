  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-cr-27-pullo-vorenus-a.jpg?v=1575565924
  description: |-
    Pullo and Vorenus are two names that many of you will be familiar with from the television series *Rome*. In the series, the two main characters are Centurion Lucius Vorenus and Legionary Titus Pullo. What you may not know is that the two characters were, in reality, two Roman centurions of the 11th Legion \(Legio XI Claudia\) mentioned in the writings of Julius Caesar; they appear in Caesar's *Commentarii de Bello Gallico*.

    Fierce rivals for promotion to primus pilus, both distinguished themselves in 54 BC when, in an effort to outdo Vorenus, Pullo charged out of the fortified camp and attacked the enemy, but was soon wounded and surrounded. Vorenus followed engaging his attackers, killing one and driving the rest back, but when he too lost his footing he was himself soon surrounded. Pullo in turn rescued Vorenus, and after killing several of the enemy, the pair returned to camp amid rapturous applause from their legion.

    We have chosen to be inspired by the TV characters so have Vorenus in his horsehair plumed helmet and Pullo in legionary armour. Because we know you love the two Roman soldiers we've also provided bare heads for each so you can choose how to represent them on the field of battle. Of course, you can also use the heads with your plastic Caesarian Romans for extra variety!

    Pack contains 2 metal figures.

    *Note: Models supplied unassembled and unpainted*
