  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-ce-39-regt-archer-regiment.jpg?v=1575565675
  description: |-
    We have produced a set of what may better be called Barbarian archers as we think that these lads would look great in a Dacian army, a German horde as well as most Celtic tribes.

    Use of the bow in Britain seemed to have been only for hunting, the slingshot the favoured missile weapon, but on the continent the bow seems to have been used in war, certainly at Gergovia as Caeser noted.

    Our four archers then can represent either skilled huntsmen used to stalking their prey or the younger or older warriors not considered suitable for the clash of steel, but eager to add to the action from afar.

    This regiment contains 16 random metal Celt Archers
