  priceGbp: 14.50
  url: https://store.warlordgames.com/products/roman-generals-lucius-cornelius-sulla-gaius-marius
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/103011112_RomanGeneralsLuciusCorneliusSulla_GaiusMarius01.jpg?v=1744647121
  description: |-
    Take the East by storm with a pair of legendary Roman generals!

    Roman politics of the 1st Century BC were a fraught and often violent affair, with the Republic thrown into crisis with the Social War against its Italian allies, as well as numerous smaller civil conflicts between powerful magnates - and that’s without considering any fighting against foreign foes!

    Gaius Marius and Lucius Cornelius Sulla were both men firmly in the mould of their time - powerful and shrewd politicians, diplomats, and military commanders, who thought nothing of ruthless conquest to advance both their own and Roman aims. Both held high political office, and fought both overseas against Rome’s enemies, and against each other on Italian soil. The older Marius would hold the position of Consul no fewer than seven times, while Sulla would go on to win victory in the First Mithridatic War, and become the first man to seize dictatorial power in Rome by force, setting a precedent that would lead to centuries of violence.

    Our miniatures depict both men mounted and armoured for war, leading their men forward into battle. Exactly where that battle is, and against whom, is for you to decide. Full rules for fielding Lucius Cornelius Sulla and Gaius Marius in games of *Hail Caesar* can be found in the *Rome’s Conquest of the East* supplement.

