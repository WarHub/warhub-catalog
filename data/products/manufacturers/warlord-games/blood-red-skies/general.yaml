    In May 1943, Lieutenant James ‘Boss’ Farrell piloted his B-26 Marauder, christened ‘Flak-Bait’ after the family dog, across the Atlantic to join the USAAF 322nd Bombardment Group in England. ‘Boss’ Farrell soon found his bomber was aptly named as it collected numerous hits in his 72 combat missions flown up to and including D-Day. Yet, even when on only one engine, ‘Flak-Bait’ always brought Farrell home. After 102 total missions, Farrell returned to the U.S. in July 1944, but ‘Flak-Bait’ fought on and survived the war with 207 missions in total.

