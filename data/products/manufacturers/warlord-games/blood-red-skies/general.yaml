- name: US 352nd Fighter Group 'Blue Nosed Bastards' P-51 Mustang decal sheet
  sku: 7760200001
  productType: single_kit
  priceGbp: 3.25
  url: https://store.warlordgames.com/products/us-352nd-fighter-group-blue-nosed-bastards-p-51-mustang-decal-sheet
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/7760200001-352nd-Fighter-Group-Blue-Nosed-Bastards-P-51-Mustang.jpg?v=1575566772
  status: current
  description: |-
    This waterslide decal sheet contains markings to decorate 6 planes in the markings of the USAAF 352nd Fighter Group and the Ace pilot George Preddy.

    The 352nd Fighter Group was one of the most highly decorated United States Army Air Forces Fighter Groups in World War II, producing many leading aces of the war. They took apart in engagements all over Europe including Normandy, France, Rhineland, Battle of the Bulge and the invasion of Germany.

    They moved from the US to RAF Bodney in Norfolk England on 5 July 1943, initially with the P-47 Thunderbolt. They later transferred to the P-51 D Mustang in April 1944, adopting their unique blue nose marking and the nickname the "Blue Nosed Bastards of Bodney."

    *Decals are scaled to fit 1/200th Blood Red Skies aircraft.*
