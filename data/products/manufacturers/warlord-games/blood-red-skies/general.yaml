- name: German JG-26 Schlageter Messerschimtt Bf109-E decal sheet
  sku: 7760100001
  productType: single_kit
  priceGbp: 3.25
  url: https://store.warlordgames.com/products/german-jg-26-schlageter-messerschimtt-bf109-e-decal-sheet
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/7760100001-JG-26-Schlageter-Messerschimtt-Bf109-E-German.jpg?v=1575566769
  status: current
  description: |-
    This waterslide decal sheet contains markings to decorate 6 planes in the markings of JG-26 Schlageter and the Ace pilot Adolf Galland.

    The Jagdgeschwader 26 (JG 26) Schlageter was a German fighter-wing for the Luftwaffe, mainly deployed in Western Europe but they also saw service against the Soviet Union in the East. JG26 took part in the fall of France and the battle for Britain, and the Dieppe raid, remaining active all the way to the end of the war.

    Major Adolf Galland was given command of JG 26 on 22 August 1940. During the Battle of Britain, the Geschwader claimed 285 fighters shot down, at least 50 confirmed by Galland.

