  description: |-
    Furio Niclot Doglio was a famed test pilot pre-war and held nine world records. He flew in the Battle of Britain before transferring first to North Africa, where he gained his first victory, and then to participate in the aerial assault on Malta. There he quickly gained a reputation for his daring head-on attacks and claimed six Spitfires in quick succession. Doglio’s luck ran out on 27th July 1942 when he was shot down by Canadian Ace George Beurling.

