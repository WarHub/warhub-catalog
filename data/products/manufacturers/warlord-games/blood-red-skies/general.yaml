  description: |-
    Leonardo Ferrulli was one of the top-scoring Aces of the Regia Aeronautica flying everything from CR.42 biplanes to C.200 and C.202 monoplanes with great success. He volunteered to fight in the Spanish Civil War in 1937 and scored his first victory there by shooting down a Republican bomber.

    During the Second World War he fought in North Africa, Yugoslavia, and in the fierce aerial battles over Malta, taking a heavy toll of Allied fighters and bombers. Over Sicily, on 5 July 1943, while intercepting a raid, he brought down a B-17 Flying Fortress and a P-38 Lightning in quick succession (his 21st and 22nd victories) before being killed by escorting Spitfires shortly afterwards.

