  status: current
  description: |-
    This waterslide decal sheet contains markings to decorate 6 planes in the markings of the Mitsubishi Zeros flying from the IJN Carrier Akagi and the Ace pilot Saburō Sakai, plus spare with an outer white disc for late war.

    The Japanese aircraft carrier, the Akagi (meaning Red castle) took part in the Attack on Pearl Harbour, the invasion of Rabaul and the battle for Midway, which was where it was finally sunk by the American Navy.

    These decals are suitable for planes which belonged to the Akagi air group.

