  description: |-
    Giuseppe Cenni was a career officer in the Regia Aeronautica and fought in the Spanish Civil War. At the outbreak of the Second World War Cenni undertook training on the Ju 87 Stuka dive bomber. He commanded a squadron of Ju 87s (known as ‘Picchiatelli’ in Italian service) in the Mediterranean and North Africa with great success. In the face of increasingly fierce aerial opposition, Cenni’s squadron re-equipped with Re.2002 fighter-bombers in July 1943. Cenni was killed leading his men against the Allied landings in Sicily, just five days before the announcement of the armistice.

