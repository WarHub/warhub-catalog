  url: https://store.warlordgames.com/products/british-74-squadron-raf-spitfire-decal-sheet
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/7760300001-British-74-Squadron-RAF-Spitfire.jpg?v=1575566774
  status: current
  description: |-
    This waterslide decal sheet contains markings to decorate 6 planes in the markings of 74 Squadron RAF and the Ace pilot 'Sailor' Milan.

    No. 74 Squadron RAF first formed on the 1st of July 1917, it was a training unit flying Avro 504Ks and became known as "Tiger Squadron" due to its tiger head motif. In WWII they first saw combat during the evacuation from Dunkirk, going on to fly Mk1 Spitfires during the Battle of Britain and later Mk X Spitfires over the Normandy beaches.

