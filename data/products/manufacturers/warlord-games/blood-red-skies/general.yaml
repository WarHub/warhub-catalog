- name: 'Korean War Ace Pilot: Zhao Baotong'
  sku: 775113003
  productType: single_kit
  priceGbp: 14.50
  url: https://store.warlordgames.com/products/korean-war-ace-pilot-zhao-baotong
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/775113003-Korean-War-Ace-Pilot-Zhao-Baotong1.jpg?v=1681404075
  status: current
  description: |-
    Zhao Baotong is credited as the first Chinese jet pilot to achieve ace status during the Korean War. Zhao was deputy commander of the 3rd Flying Group of the 7th PLAAF Regiment when China intervened in the Korean conflict.

    His first combat with USAF F-84 Thunderjets in November 1951, showed his willingness to attack superior numbers of enemy aircraft and risk G-induced blackouts to achieve favourable shots. Over the next three months, he accounted for seven enemy aircraft destroyed and two damaged. Given the award of Combat Hero-First Class, Chairman Mao Zedong himself praised the pilot saying that Zhao Baotong was worthy of the title ‘King of Air Combat’.

    Contains one Warlord Resin^TM^ Mig 15 bis aircraft plus game accessories.

    *Models supplied unassembled and unpainted*
- name: 'Korean War Ace Pilot: Gan Gyong-Duk'
  sku: 775113004
  productType: single_kit
  priceGbp: 14.50
  url: https://store.warlordgames.com/products/korean-war-ace-pilot-gan-gyong-duk
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/775113004-Korean-War-Ace-Pilot-Gan-Gyong-Duk1.jpg?v=1681403654
  status: current
  description: |-
    Captain Gan Gyong-Duk led the 59th FAR, a North Korean MiG-15 squadron which was pulled from the frontlines to form a ‘Special Attack Group’ in 1951. Gyong-Duk’s command was tasked with intercepting enemy aircraft of the USN’s Task Force 77, which were then operating over the eastern parts of North Korea largely unopposed.

    Gyong-Duk’s early model MiG-15s achieved significant results against American piston-engine Corsairs and Skyraiders. At least 15 USN aircraft were claimed destroyed, with Captain Gyong-Duk being credited with no less than 10 victories. The USN was forced to re-task F9F Panthers as escorts, pulling them away from vital ground-attack missions. For his efforts, Gyong-Duk was awarded with the Hero of the DPRK honour.

    Contains one Warlord Resin^TM^ Mig 15 bis aircraft plus game accessories.

    *Models supplied unassembled and unpainted*
- name: 'Korean War Ace Pilot: John F. Bolt'
  sku: 775113002
  productType: single_kit
  priceGbp: 14.50
  url: https://store.warlordgames.com/products/korean-war-ace-pilot-john-f-bolt
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/775113002-Korean-War-Ace-Pilot-John-F.-Bolt1.jpg?v=1681403221
  status: current
  description: |-
    Bolt was the only U.S. Marine aviator to gain ace status in both WWII and Korea. He scored six victories with the famous ‘Black Sheep Squadron’, VMF-214, in the Pacific.

    He started the Korean War flying F9F Panthers with VMF-115, but in 1953 he entered an exchange programme to fly F-86F Sabres with the USAFs 39th Fighter-Interceptor Squadron. Within three months, Bolt downed six MiGs in the notorious ‘MiG Alley’. Bolt retired with the rank of Lieutenant Colonel and was awarded the Navy Cross for his actions, he remains the only USMC jet ace.

    Contains one Warlord Resin^TM^ F86F Sabre aircraft plus game accessories.

    *Models supplied unassembled and unpainted*
- name: 'Korean War Ace Pilot: James ‘Jabby’ Jabara'
  sku: 775113001
  productType: single_kit
  priceGbp: 14.50
  url: https://store.warlordgames.com/products/korean-war-ace-pilot-james-jabby-jabara
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/775113001-Korean-War-Ace-Pilot-James-_Jabby_1.jpg?v=1681402607
  status: current
  description: |-
    James ‘Jabby’ Jabara was America’s first pure jet ace. After flying P-51 Mustangs in WWII, Jabara became highly proficient on the new jets entering service, describing his first flight in the F-80 Shooting Star as the happiest moment of his life.

    In the Korean War, Jabara’s 4th Fighter-Interceptor Wing, with the new F-86A Sabre, was deployed to counter the MiG threat. He downed his first MiG on 3 April 1951 and his fourteenth MiG in July 1953. This, with his one victory from WWII, earned him triple ace status. Jabara credited his success to following his three A’s - air discipline, aggressiveness, and aerial gunnery.

    Contains one Warlord Resin^TM^ F86F Sabre aircraft plus game accessories.

