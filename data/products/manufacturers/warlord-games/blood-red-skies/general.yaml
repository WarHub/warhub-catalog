  status: current
  description: |-
    William F Fiedler has the distinction of being the only American flyer to achieve Ace status exclusively while flying the P39 Airacobra. Fiedler enlisted in the Army on 31st December 1941 and became an Aviation Cadet. On completing his training he was assigned to the Pacific island of Guadalcanal. Fiedler brought down two Zeros while with the 70th Fighter Squadron before being reassigned to the 68th Fighter Squadron in June 1943. Fiedler shot down another Zero and two Val bombers during intense air battles that month making him an Ace. Tragically on June 30th 1943 while waiting to take off Fiedler’s aircraft was struck by a crash-landing P38 and Fiedler was killed. He was 23 years old.

