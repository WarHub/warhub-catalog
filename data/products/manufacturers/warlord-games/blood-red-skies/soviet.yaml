  url: https://store.warlordgames.com/products/mig-alley
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/772211016_MiGAlley01.jpg?v=1681399484
  status: current
  description: |-
    'MiG Alley' was the name given by the United Nations (UN) pilots during the Korean War for the northwestern portion of North Korea, where the Yalu River empties into the Yellow Sea.

    The area's nickname was derived from the Soviet-built Mikoyan-Gurevich MiG-15 flown by North Korea (some unofficially crewed by Soviet airmen) and the People's Republic of China airmen.

    In response to the MiG threat the UN's P-51 Mustang squadrons began to convert to jet fighters – enter the North American F-86 Sabre.

    The Mig Alley! set contains all the aircraft cards, pilot discs, traits doctrine and equipment cards you need to take your games of Blood Red Skies into the Jet Age!

    Contains: two Warlord Resin^TM^MiG 15 aircraft, two Warlord Resin^TM^F86F Sabre aircraft and game aids.

    *Models supplied unassembled and unpainted*
