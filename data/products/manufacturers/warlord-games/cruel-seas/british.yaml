- name: 'Cruel Seas: HMS Medusa - Harbour Defence Motor Launch'
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '785101016'
  priceGbp: 19.50
  url: https://store.warlordgames.com/products/cruel-seas-hdml-hms-medusa
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/785101016-HMSMedusa-HDML1_1.png?v=1705682487
  description: |-
    This set contains:

    - x1 Harbour Defence Motor Launch \(HDML\) - HMS Medusa model
    - x1 Small Wake card and x1 sheet of Royal Navy flags.

    The only survivor of almost 500 Harbour Defence Motor Launches \(*HDMLs*\) built during the Second World War, HMS *Medusa* played a crucial role during the D-Day landings as a navigational leader. Under the command of Temporary Sub-Lieutenant Arthur Maurice Liddiard RNVR throughout her wartime service, she was commissioned into service in late December 1943 as *HDML 1387*. Following a period of convoy escort work in the Western Approaches, she then began working up in preparation for the June landings, where she would mark minefields to be cleared by minesweepers, and then subsequently direct elements of the invasion force through the cleared channels. Postwar, she would be converted to first a Fast Despatch Boat, and then a hydrographic survey vessel and renamed *Medusa*, before being sold for scrap in 1968.

    Instead of going to the breakers, *Medusa* was purchased by a group of enthusiasts led by Mike Boyce, who would spend almost two decades restoring her to seaworthy condition. In 2002, **[The Medusa Trust](https://www.hmsmedusa.org.uk/the-medusa-trust/)** was formed to take ownership of the vessel and raise funds for a major restoration programme. At the same time the Medusa Support Group was formed and now provides volunteers for maintenance, crew for the vessel when she goes to sea as well as guides to show visitors around the vessel in port. Currently, they’re working towards their 80^th^ anniversary D-Day trip this summer, and as such **for every purchase of HMS Medusa through Skytrex or Warlord Games, a donation will go to The Medusa Trust!**

    Armed with a 2pdr, 20mm Oerlikon, and a pair of Vickers ‘K’ guns, alongside depth charges and a sophisticated radar set, *Medusa* is an excellent addition to any Royal Navy fleet for Cruel Seas, and an absolutely essential piece for anyone wanting to recreate the crucial work of the small ships during the D-Day landings on the tabletop! If you need any painting inspiration, why not pop over to Gosport and have a look at the real thing!

    **Please note that no physical ship card will be included with this model. Rules can be downloaded from the link below and a downloadable, printable version of the ship card will be added shortly.**

    Ship Cards for HDMLs can be found here: [Front](https://cdn.shopify.com/s/files/1/0524/3774/5845/files/Harbour_Defense_Motor_Launch_early_ship_card_side_A_fa5077e0-fdf4-4e37-a18b-d47f4cc8077d.pdf?v=1706187647) & [Back](https://cdn.shopify.com/s/files/1/0524/3774/5845/files/Harbour_Defense_Motor_Launch_early_ship_card_side_B.pdf?v=1706187647).
    Ship Cards specifically for HMS Medusa can be found here: [Front](https://cdn.shopify.com/s/files/1/0524/3774/5845/files/HMS_Medusa_early_ship_card_side_A_76c188e6-73b2-48f9-add3-69fc3b7f27b8.pdf?v=1706187628) & [Back](https://cdn.shopify.com/s/files/1/0524/3774/5845/files/HMS_Medusa_early_ship_card_side_B.pdf?v=1706187628)

    Rules for HDMLs \(*HMS Medusa*\) can be found [here](https://cdn.shopify.com/s/files/1/0524/3774/5845/files/HMS_Medusa_HDML_Rules_250124.pdf?v=1706184296).

    #####

    #####

    ###### Contains; a 3D Printed Resin and Metal Ship 1/300th scale.

    ***Model supplied unassembled and unpainted***
