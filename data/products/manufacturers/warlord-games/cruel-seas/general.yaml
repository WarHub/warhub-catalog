  description: |-
    A lot of naval vessels were armed to the teeth with a variety of weaponry. Ranging from anti-infantry to anti-vessel and anti-air, a lot of ships were basically made to be a 'jack of all trades' type of threat, able to combat many different threats.

    Additionally, a lot of them were upgraded over time, using new and old guns to improve their combat capability.

    These weapon packs allow you to alter your ships as you see fit. Using the damage table on page 26 and the ship points on page 92, you can identify and alter your ships and calculate their points accurately!

    **This pack contains:**

    - 2 x USN Crew
    - 4 x HMG
    - 4 x 20mm Oerlikon
    - 4 x 40mm Bofors
    - 2 x Thunderbolt
    - 1 x Cobra 37mm Semi-auto
    - 2 x Twin HMG
    - 1 x Uncrewed Deck Gun

    #### Thunderbolts in Cruel Seas

    Always eager to increase firepower the US Navy developed a particularly unpleasant weapon system for their PT boats in 1944. Their weapons specialists managed to install an electrically powered turret with four 20mm guns onto the rear deck of their ships.

    This made for a lethal weapon and must have proven most useful in covering a withdraw let alone in sampan-busting!

    Not very many were fitted, but it's too tempting not to field one or two in your flotilla – you are American, after all!

    For use in games of Cruel Seas simply use the rules for quad 20mm guns:

    - Damage 6D6
    - Cost is 15pts.
    - \(Cannot be fitted to Tiny or Small vessels other than the Elco or Higgins PT Boats\)

    *Models supplied unassembled and unpainted*
- name: 'Cruel Seas: Drache helicopter carrier'
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '785102005'
  priceGbp: 52.00
  url: https://store.warlordgames.com/products/cruel-seas-drache-helicopter-carrier
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/785102005_CS_Drache01.jpg?v=1626049928
  description: |-
    The Drache started as a seaplane tender built in Hamburg for the Royal Yugoslavian Navy in 1928. She was converted into a minelayer in 1937. Captured by the Germans in 1941, the Kriegsmarine renamed her the Drache \(dragon\) and converted her back to a Flugzeugbergungsschiff – an aircraft rescue ship. Drache underwent a refit back to being a minelayer in the spring or summer of 1942 and was moved to the Aegean. She was re-equipped with two 105 mm \(4.1"\) guns, five 37 mm and six 20 mm cannons. A rear platform was added with space for 240 mines on four rails. The Kriegsmarine renamed her Schiff, but she is better known as Drache so the name is retained here. The large flat rear deck made her suitable to test the concept of a helicopter carrier – the world’s first – using a Flettner Fl 282 Kolibri \(Hummingbird\) as a spotter aircraft.

    The Kolibri was the world’s first naval helicopter. It was unarmed but the Kriegsmarine intended to use it for submarine spotting. It could also be used for artillery spotting and reconnaissance.

    Pack contains 1 resin & metal vessel and game cards. The full rules for fielding Drache \(and helicopter\) in Cruel Seas can be found in the Close Quarters supplement \(Page 59\).

    *Models supplied unassembled and unpainted*
