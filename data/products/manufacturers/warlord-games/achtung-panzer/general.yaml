  description: |-
    US tankers have been the heroes of script and screen since their entry into the Second World War, and this band of furious tank-men display the fighting spirit and grit that made them Hollywood legends. The four partial mounted figures \(and a fifth firing the ubiquitous pintle-mounted HMG so beloved of US armour crews\) alongside the pair of dismounts fighting their way to safety are the perfect addition to make any American Achtung Panzer or Bolt Action force really stand out!

    Pack contains four partial mounted figures, one figure firing pintle-mounted HMG \(included\), and three dismounted figures \(Warlord Resin\) with plastic bases.

