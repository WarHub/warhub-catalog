  description: |-
    The *Achtung Panzer!* US Army Tank Force gives you five classic American tanks to help liberate the oppressed nations of Europe and bring the might of US industry to the tabletop. This balanced, powerful force is built around a trio of the ubiquitous Sherman M4A3E8 ‘Easy Eights’, which combine serious firepower from their 76mm guns with decent levels of mobility and protection, supported by a pair of fast lighter elements – the M18 tank destroyer is capable of annihilating enemy armour from ambush, while the M5 Stuart is perfect for scouting, flanking, and harassing the foe.

    In addition to these five awesome plastic vehicles \(and a fantastic set of characterful stowage items\), the included US-specific Asset cards, plus Datacards for 16 different tanks \(allowing you to field an even greater range of American armour!\), Tank Ace and Ace Skill cards, game tokens and markers along with mounted and dismounted tank crew figures give you everything you need to take the fight to the Axis. Give 'em hell!

    The Achtung Panzer! US Army Tank Force contains:

    - 1/56th scale hard plastic kits of the following:
     - 3x M4A3E8 Sherman 'Easy Eight' medium tanks
     - 1x M18 Hellcat tank destroyer
     - 1x M5 Stuart light tank
    - Assembly guides and full-colour waterslide decals
    - Vehicle damage markers
    - 10x Achtung Panzer! asset cards
    - 2x Achtung Panzer! Tank Ace Datacards
    - 4x Achtung Panzer! Tank Ace Skill cards
    - Achtung Panzer! phase & time tracker
    - Achtung Panzer! Datacards for 16 vehicles
    - Achtung Panzer! tokens & markers
    - Tank stowage & accessories
    - Mounted & Dismounted tank crew \(Warlord Resin\)

    *Models supplied unassembled and unpainted*
