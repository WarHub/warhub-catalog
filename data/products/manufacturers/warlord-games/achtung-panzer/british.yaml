  description: |-
    Upgrade your *Achtung Panzer!* experience with *Iron Coffins!*

    Packed with special rules, missions, and lots of tank statistics, *Iron Coffins* is an essential addition to your gaming library. Designed to expand and build upon the core rulebook, this tome contains everything you need to take your armoured warfare to the next level. From expanded campaign rules, new historical scenarios, and tank aces, to over a hundred new asset and event cards and guidance on taking *Achtung Panzer!* into every theatre of World War II, this book has something for everyone.

    Accompanying the book, exclusively when purchased on our webstore, is a pair of special miniatures both representing Stanley Christopherson. Rules for fielding Christopherson, the legendary Sherwood Rangers Yeomanry commander, can be found in the book, and he’s a great choice to lead your British tanks into action. As such, you'll get both a version of him on foot, and a tank commander 'half' figure for mounting in a suitable commander's hatch!

    *Written by Mike Bradford and Roger Gerrish. Stanley Christopherson sculpted by Marco Sano. Studio miniature painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
