- name: C3 Targeter Probes
  sku: WGA-CON-26
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/concord-targeter-probes
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-CON-26-C3-Targeter-Probes-a1.jpg?v=1575566134
  status: current
  description: |-
    Probes are small hovering unarmed drones surrounded by a cloud of nanobots. They are simple machines with limited and specific intelligence. Targeter probes exude nanobots that feed information back to the parent probe, which in turn sends its nanobots to nearby friendly units, where they feed information into the unit's combat shard. As spies in the sky, targeter probes guide fire onto enemy positions.

    Targeter probes are organised into sharded units. A typical shard consists of four probes. For most purposes each targeter probe is treated as a unit in its own right, but the entire shard contributes only one order dice to the dice bag.

    *Note: Models supplied unassembled and unpainted*
- name: Concord Strike Command Team
  sku: WGA-CON-21
  productType: single_kit
  priceGbp: 17.00
