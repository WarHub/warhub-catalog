  status: current
  description: |-
    The military arm of the Concord is organised and directed by a branch called the C3 \(or Concord Combined Command\) and they responds to threats with logical ruthlessness - dispatching heavily armed forces throughout Antarean space.

    Headed by Strike Commanders, C3 Strike Units form the bulk of Concord forces - backed-up by Support Teams - the Concord have access to the most advanced weaponry in all of Antarean space - with their standard Strike Troopers going to battle armed with heavy-duty plasma weaponry and protected by advanced hyper-light shielding.

    *Note: Models supplied unassembled and unpainted*
- name: Algoryn AI Assault Squad
  sku: WGA-ALG-01
  productType: single_kit
  priceGbp: 21.50
  url: https://store.warlordgames.com/products/algoryn-ai-assault-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ALG-01-Algoryn-Assault-Squad-a.jpg?v=1575566097
  status: current
  description: |-
    The Algoryn Armoured Infantry - or AI - are the elite fighting force of the beleaguered Algoryn Prosperate. For centuries the Algoryn have been at war with their brutal neighbours, the barely human and utterly merciless race of Ghar. To survive against these implacable aggressors the Algoryn have developed a militarised society in which every citizen is a warrior, where service and duty override everything else, and where the greatest honour of all is to serve in the Armoured Infantry. Even amongst the veterans of the AI the Assault Squads are held in awe as the best of the best of a proud and courageous warrior race.

    Assault Squads carry compact mag rapid repeaters, weapons capable of hurling a barrage of metalised shells that can cut through armour and overwhelm field defences by sheer weight of fire. They are also armed with forearm-mounted distort spinner also known as D-Spinners or Spinners for short. Spinners hurl a mix of distort shells, which break apart local space fabric, and plasma energy strings that entangle and erupt whatever they strike. D-Spinners have a range of only a few metres, but can cause tremendous destruction even against the most heavily armoured targets. The Assault trooper's armour consists of impact resistant plates that carry an enclosing reflex field, a robust and practical defence that offers protection against most weapons of Antarean space.

    *Base type shown is for illustrative purpose only, standard 25mm x 25mm bases included.*

    *Note: Models supplied unassembled and unpainted*
