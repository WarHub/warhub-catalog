- name: Algoryn Infiltrator leader with mag repeater
  sku: 503011008
  productType: single_kit
  priceGbp: 5.00
  url: https://store.warlordgames.com/products/algoryn-infiltrator-leader-with-mag-repeater
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503011008-Algoryn-Infiltrator-Leader-with-Mag-Repeater-06.jpg?v=1575566737
  status: current
  description: |-
    Even amongst a group of experts of espionage or reconnaissance, the Algoryn Infiltrator leader stands out as being almost a master of these subjects. The ability to order the squad with speed and clarity has proven to be the difference between life and death for their teammates.

    Armed with a mag repeater, and accompanied by a camo drone, this leader can make short work of anything in their way.

    Contains:

    - 1 Infiltrator Leader
    - 1 Camo Drone

    *Models supplied unassembled and unpainted*
- name: Algoryn AI Defiant transport skimmer
  sku: 502411012
  productType: single_kit
  priceGbp: 45.00
  url: https://store.warlordgames.com/products/algoryn-ai-defiant-transport-skimmer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502411012-Algoryn-AI-Defiant-Transport-Skimmer-box-front.jpg?v=1575566732
  status: current
  description: |-
    The Algoryn are a proud and warlike people whose society has evolved over many centuries of constant warfare. All Algoryn are fighters in some fashion, dedicated to the furtherance of their unending conflict against an implacable neighbour: the strangely inscrutable Ghar. Algoryn forces are some of the most experienced and effective in the whole of Antarean space.

    Contains the following multi-part resin and metal model:

    - 1 AI Defiant Transport Skimmer - multi-part resin
    - 1 mag light support weapon option

    The Defiant is a universal transporter that serves as a troop transporter and cargo carrier. It is the ultimate workhorse of the Algoryn forces, capable of shifting men or equipment rapidly over long distances. Sharing its core design feature with the Liberator Combat Skimmer, it retains gravity-defying suspensors, composite skin and hyperlight envelope.

    This armoured envelope can be boosted to intermediate or full combat specification depending upon the role undertaken. Defiants are not just transporters, but fully-functional fighting vehicles designed to mount the reliable mag light support. All Algoryn Skimmers carry crews enabling machines to function semi-manually as well as fully independently, a characteristic quality of Algoryn fighting doctrine which emphasises human control and decision making over that of machine intelligence.

    **On the Battlefield**

    **Tactical Order Directive 020318-RoC**

    - Algoryn commander RoCar 21st Protectorate

    "Embark your assault troops \(consisting of 8 member teams\) and advance toward the weakest enemy flank - Use appropriate cover to avoid larger enemy weaponry and disembark in suitable cover to then,with support from your transports gun, pursue the enemy with maximum force!"

    | **Vehicle** | **Ag** | **Acc** | **Str** | **Res** | **Init** | **Co** | **Special** |
    | --- | --- | --- | --- | --- | --- | --- | --- |
    | Defiant Transporter Skimmer | 5 | 6 | 1 | 13 | 8 | 8 | MOD2, Transporter 10, Large |

    *Models supplied unassembled and unpainted*
- name: Algoryn AI Plastic Frame
  sku: 5030300001
  productType: single_kit
  priceGbp: 13.50
  url: https://store.warlordgames.com/products/algoryn-ai-plastic-frame
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/5030300001-Algoryn-AI-Plastic-Frame.jpg?v=1575566730
  status: current
  description: |-
    This plastic sprue allows you to create 5 Algoryn AI troopers, 3 marching and 2 in a dynamic standing position.

    It also has 9 weapons including mag guns, mag pistols, mag repeaters and micro x-launchers!

    With 7 heads with 5 helmets and 2 exposed heads!

    It also comes with an Algoryn spotter drone!

    *Models supplied unassembled and unpainted*
