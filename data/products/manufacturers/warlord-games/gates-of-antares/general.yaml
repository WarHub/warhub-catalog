- name: Privateer Admiral Taras Kalemon
  sku: 503014012
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/privateer-admiral-taras-kalemon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503014012-Privateer-Admiral-Taras-Kalemon-01.jpg?v=1575566776
  status: current
  description: |-
    Captain, now Admiral, Kalemon is one of Antares’ most opportunistic adventurers. Privateer Admiral Taras Kalemon is wily and ambitious and has been accused of lacking any morals.

    He is, perhaps, the ultimate opportunist but knows when a little planning ahead could go a long way. Experience has taught him that caution is the better part of valour, so he has been able to survive many a gunﬁght by rapidly moving to a better position – or even somewhere else entirely.

    He has been patched up so many times that many think his skin has had a layer of subdermal armour added, a rumour he is keen to promote as he ﬁgures it makes people less likely to attack him personally.

