  description: |-
    The Outcast Rebels are very short of fighting machines and any Wrecker vehicles they capture are quickly rebuilt by Army Lists Fartok’s enterprising engineers to serve as Scutters. In the Outcast Rebel army this function is served by Wrecking Squads on foot carrying mechanical grabbers – powerful assisted grabbers that can cut, pull apart, or pick up heavy objects in the same way as the larger Ghar Grabber.

    The unit is treated the same way as a Wrecker vehicle equipped with a Grabber! Basically, the Grabber can be used to assist any unit in battle armour, any Scutter unit, and any vehicles. Aside from assisting other units, the chief advantage of carrying a mechanical grabber is that it confers a trooper with massive strength; a considerable advantage at close quarters, making Wrecking Squads one of the few Outcast Rebel units capable of fighting other troops hand-to-hand.

