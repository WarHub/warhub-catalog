- name: Isorian Senatex support team with X-Launcher
  sku: WGA-ISO-24
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/isorian-senatex-support-team-with-x-launcher
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ISO-24-Isorian-X-launcher-a.jpg?v=1575566376
  status: current
