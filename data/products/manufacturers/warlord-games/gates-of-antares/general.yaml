  url: https://store.warlordgames.com/products/concord-c3d2-medium-support-drone-with-plasma-light-support
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503013001-Concord-C3D2-medium-support-drone-with-plasma-light-support-01.jpg?v=1575566726
  status: current
  description: |-
    The D2 medium support drone is a more heavily built vehicle than the D1 and eminently suitable as a weapons carrier. Its composite shell provides excellent all-round protection and carries a highly effective kinetic shield.

    D2s are used both to support other troops and as the basis of drone formations alongside the bigger combat drones. The D2’s weapon mount is capable of bearing a number of different weapons but is usually armed with either plasma light support or plasma cannons.

    *Models supplied unassembled and unpainted*
- name: Freeborn Support Team with Fractal Cannon
  sku: 503011007
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/freeborn-support-team-with-fractal-cannon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503011007-Freeborn-Support-Team-with-Fractal-Cannon-01.jpg?v=1575566722
  status: current
  description: |-
    Fractal weapons are primarily used for attacking static defences. They are relatively specialist weapons found in the arsenals of most Antarean forces but reserved for urban warfare where they are supremely useful. Fractal weapons utilise molecular resonance to break apart solid material.

    Although slow to develop full power, their ability to break apart buildings and machines is almost limitless. They are also known as fractal disintegrators. The fractal cannon is the smallest of these machines and the most readily mobile, but it is correspondingly less powerful that the larger ‘siege’ weapons.

    *Models supplied unassembled and unpainted*
- name: Algoryn AI Heavy Support Team with X-Howitzer
  sku: 502411008
  productType: single_kit
  priceGbp: 32.50
  url: https://store.warlordgames.com/products/algoryn-ai-heavy-support-team-with-x-howitzer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502411008_Algoryn_AI_Heavy_Support_team_with_X-Howitzer_box_front.jpg?v=1575566689
  status: current
  description: |-
    The Algoryn are a proud warrior race ruled by military elites who have earned their place in combat. The Algoryn Prosperate boasts some of the most highly-trained, motivated and best-equipped forces in Antarean space. Its arsenals produce basic but effective and sturdy weapons, able to endure the toughest conditions and serve in the most demanding of battles.

    **This product contains the following models:**

    - 1 Algoryn X-howitzer
    - 3 Algoryn AI crew
    - 1 Algoryn Spotter Probe
    - 1 munitions pod

    Of all the heavy weaponry employed by the elite Vector formations the unibore artillery type magnetic launcher - or X-howitzer - is the most common. The X-howitzer is capable of shooting explosive projectiles or a wide variety of special munitions.

    The machine’s long magnetic rails generate tremendous kinetic energy endowing it with a long range and making it highly effective against all kinds of enemy targets whether troops, buildings or vehicles. X-howitzer crews are expert technicians ably assisted by spotter drones. Position for maximum field of fire and dominate the battlefield!

    *Models supplied unassembled and unpainted*
- name: Algoryn Assault Command
  sku: 502211010
  productType: single_kit
  priceGbp: 21.50
  url: https://store.warlordgames.com/products/algoryn-assault-command
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502211010-Algoryn-AI-Assault-Command-Squad-01.jpg?v=1575566670
  status: current
  description: |-
    The Algoryn Vector formations comprise the prime fighting establishment of the Algoryn Prosperate. They are rightly feared and respected as one of the most potent armed forces in all Antarean space. Armoured Infantry \(AI\) units form the core of all Vector formations. AI troopers are protected by flexible all-enclosing enviro-armoured suits. They are equipped with a full array of personal sensors and a standard interface with their unit’s combat shard. AI Command Squads carry enhanced sensors and communications equipment that enables them to coordinate the actions of several squads as part of their command shard.

    Assault units specialise in aggressive close-quarter combat, and are often to be found at the forefront of the fighting. AI Assault Command units are armed with plasma carbines, enabling them to function as a superior fire-base as well as directing the combat shards under their command. This integrated approach is used to create powerful assault groups with command units at their head. As with other assault troops, command units carry a distort or D-spinner as secondary armament, a weapon that combines a distortion field generator for defence together with a deadly small plasma launcher for attack. Commanders are also armed with X-slings, often with powerful Overload ammo or disabling SlingNet shells that cast a suspensor net over enemies, pinning them to the ground.

    This box set contains the following metal models:

    - 1 AI Assault Commander armed with plasma carbine and D-spinner
    - 4 AI Assault Troopers armed with plasma carbines and D-spinners

    *Models supplied unassembled and unpainted*
- name: Freeborn Support team with Compression Cannon
  sku: 503014010
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/freeborn-support-team-with-compression-cannon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503014010-Freeborn-Compression-Cannon-01.jpg?v=1575566637
  status: current
  description: |-
    The compression cannon is a relatively exotic light support weapon mostly used in specialist roles by Concord forces where it is likely to be drone or vehicle mounted.

    Compression weapons use compression field technology to quantum reduce everything within a narrow field projected by the weapon – effectively scrunching matter to nothing. As with other compression weapons, the compression cannon doesn’t function at very short ranges and its effectiveness drops off very quickly over long range.

    *Models supplied unassembled and unpainted*
- name: Boromite Heavy Support team with Mag Heavy Support
  sku: 503012010
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/boromite-heavy-support-team-with-mag-heavy-support
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503012010-Boromite-Heavy-Mag-Support-01.jpg?v=1575566624
  status: current
  description: |-
    The heavy mag cannon is a larger and more powerful version of the standard mag cannon. It is designed to deliver a single shot at an incredible velocity.

    Ammunition is designed to defeat heavily armoured targets and release a mass‐ sensitised disruptor field that inverts and crushes local space. A target struck and penetrated by a heavy mag cannon suffers massive internal damage and is unlikely to survive.

    *Models supplied unassembled and unpainted*
- name: Concord C3D2 Medium Support Drone with Compression Cannon
  sku: 503073008
  productType: single_kit
  priceGbp: 14.00
  url: https://store.warlordgames.com/products/concord-c3d2-medium-support-drone-with-compression-cannon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503013008-C3D2-Medium-Support-Drone-Compression-Cannon-01.jpg?v=1575566636
  status: current
  description: |-
    The compression cannon is a relatively exotic light support weapon mostly used in specialist roles by Concord forces where it is likely to be drone or vehicle mounted. Compression weapons use compression ﬁeld technology to quantum reduce everything within a narrow ﬁeld projected by the weapon – eﬀectively scrunching matter to nothing.

    **In-game tip:**

    As with other compression weapons, the compression cannon doesn’t function at very short ranges and its eﬀectiveness drops oﬀ very quickly over long range. The chief advantages of the weapon compared to plasma equivalents are its eﬀectiveness against close targets – so long as they don’t come within the weapon’s limited compression range – and its ability to compress any cover the target is taking advantage of.

    | | | Range | | | |
    | --- | --- | --- | --- | --- | --- |
    | Type of Weapon | Effective | Long | Extreme | Strike Value | Special |
    | Compression Cannon | 10-30 | 40 | 80 | 7/4/2 | Compressor, No Cover Cycle |

    *Models supplied unassembled and unpainted*
- name: Concord C3D2 Medium Support Drone with Fractal Cannon
  sku: 503013007
  productType: single_kit
  priceGbp: 14.00
  url: https://store.warlordgames.com/products/concord-c3d2-medium-support-drone-with-fractal-cannon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503013007-C3D2-Medium-Support-Drone-Fractal-Cannon-01.jpg?v=1575566635
  status: current
  description: |-
    The D2 medium support drone is a more heavily built vehicle than the D1 and eminently suitable as a weapons carrier. Its composite shell provides excellent all round protection and carries a highly eﬀective kinetic shield. D2s are used both to support other troops and as the basis of drone formations alongside the bigger combat drones. The D2’s weapon mount is capable of bearing a number of diﬀerent weapons but is usually armed with either plasma light support or plasma cannons.

    **The Fractal Cannon**

    Fractal weapons are primarily used for attacking static defences. They are relatively specialist weapons found in the arsenals of most Antarean forces but reserved for urban warfare where they are supremely useful. Fractal weapons utilise molecular resonance to break apart solid material. Although slow to develop full power, their ability to break apart buildings and machines is almost limitless. They are also known as fractal disintegrators. The fractal cannon is the smallest of these machines and the most readily mobile, but it is correspondingly less powerful that the larger ‘siege’ weapons.

    | | | Range | | | |
    | --- | --- | --- | --- | --- | --- |
    | Type of Weapon | Effective | Long | Extreme | Strike Value | Special |
    | Fractal cannon | 30 | 40 | 80 | 2 \(+1 max 10\) | Fractal Lock |

    Fractal Lock is the special rule for this cannon. If a frag borer hits its target it ‘locks on’. So long as the fractal cannon receives a ﬁre order in each following turn, and so long as the target does not move, the weapon will automatically hit the target and no Acc test is necessary.

    *Models supplied unassembled and unpainted*
- name: C3 Drone Commander
  sku: 503213002
  productType: single_kit
  priceGbp: 11.00
  url: https://store.warlordgames.com/products/c3-drone-commander
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503213002-C3-Drone-Commander-01.jpg?v=1575566624
  status: current
  description: |-
    There are any number of situations that the IMTel of the Panhuman Concord deems too dangerous for human troops. Admittedly the military shards of the C3 have some discretion to override the extremes of risk­aversion that dominate the Concord’s civil shards, but even so, there are many reasons why some ventures must be undertaken by machines.

    Drone commanders often lead formations comprising only other machines, or with only limited and carefully protected human elements. Other drone commanders lead ordinary formations of Strike troops or fulfil the same functions as human commanders.

    *Models supplied unassembled and unpainted*
- name: Ghar Stench Vent
  sku: GR01
  productType: single_kit
  priceGbp: 12.00
  url: https://store.warlordgames.com/products/ghar-stench-vent
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Ghar_Stench_vent_2.jpg?v=1575566623
  status: current
  description: |-
    The Ghar aren't the most hygienic creatures in the Antares universe, so to compensate when they live a prolonged amount of time in a closed environment, they have to have stench holes or vents, to *literally*, let all the stink out.

    They can be found in any Ghar base, making them essential for those Ghar-ified battlfields and bases. Because of their frequent use, the Ghar had the forethought to reinforce the vent with a barricade at the ground base, making it a fortifiable structure.

    *Models supplied unassembled and unpainted*
- name: Ghar Block House
  sku: GR04
  productType: single_kit
  priceGbp: 12.00
  url: https://store.warlordgames.com/products/ghar-block-house
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Ghar_Block_House_Store_Image.jpg?v=1575566634
  status: current
  description: |-
    Serving a double function as a bunker and a lookout, the Ghar fortify their positions with these bunkers making any attack onto the Ghar a dangerous prospect.

    Sit your troops in a reinforced position with a full 360º viewpoint, this will make even the weakest of troops immensely durable within a firefight!

    *Models supplied unassembled and unpainted*
- name: x3 Hazard Strike Capsules set
  sku: AG09
  productType: single_kit
  priceGbp: 12.50
  url: https://store.warlordgames.com/products/x3-hazard-strike-capsules-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/AG09_Sarissa_Hazard_Strike_Capsules_x3_Intact.jpg?v=1575566594
  status: current
  description: |-
    The Strike capsule has been specifically designed for surgical insertion of a single Hazard suit. Employed by the SD \(Special Division\) in selective operations, the individual trooper is synced to external holovids and sensor array feeds, allowing for advanced combat readiness. A proximity anchor is also available to maintain a capsule coherency throughout insertion, helping to reduce casualties from any enemy counter ordnance or alien nanospore.

    *NB this is such a top secret design that only this image available to IMTeL at this time - more information will be processed as further details arrive!*

    **Contains:** 3 complete MDF and card Hazard Strike Capsules from Sarissa Precision

    *Models supplied unassembled and unpainted*
- name: x5 Hazard Strike Capsules Deployed set
  sku: AG08
  productType: single_kit
  priceGbp: 12.50
  url: https://store.warlordgames.com/products/x5-hazard-strike-capsules-deployed-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/AG08_Sarissa_Hazard_Strike_Capsules_x5_Deployed_A.jpg?v=1575566584
  status: current
  description: |-
    The Strike Capsule’s design also incorporates localised transmat beacons as well as upgrades to a compacted squad support weapon.

    A typical Hazard vector formation might comprise 15 suits \(Command and 2 to 4 units\) in strike capsules, occasionally with hazard drone landers – depending on mission parameters – and sometimes accompanied by an attached weapon drone lander.

    *NB can be made in a variety of positions with extra panelling allowing for a dynamic and intimidating game piece and effective terrain.*

    **Contains:** 5 MDF and card Hazard Strike Capsules in deployed array from Sarissa Precision

    *Models supplied unassembled and unpainted*
- name: Algoryn Hazard Squad
  sku: 502211002
  productType: single_kit
  priceGbp: 21.50
  url: https://store.warlordgames.com/products/algoryn-hazard-squad
