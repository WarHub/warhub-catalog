- name: Virai Dronescourge Mining Team
  sku: 502216502
  productType: single_kit
  priceGbp: 21.50
  url: https://store.warlordgames.com/products/virai-dronescourge-mining-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502216502-Virai-Dronscourge-Mining-Team-box-front.jpg?v=1575566816
  status: current
  description: |-
    Virai Mining drones are specialised versions of Constructor drones. Typically placed under the command of, or escorting, lessor architectors such as Mining Supervisors. Mining squads are tasked with seeking out material, metals and minerals from underground or the collapsed depths of a ruined arcology.

    This box set contains:

    - 6 x Virai Mining Drones with tool appendages and flying bases.

    The basic equipment of a Mining drone is similar to other constructors: multi-layered, honeycombed, cerametallic shells and manipulator appendages with a variety of tools. The principal difference between Mining drones and other Constructors is that each drone is also equipped with either a tractor maul or a mass compactor.

    Though mining tools, intended to tear away material from the rock faces on which the Mining drones are working, tractor mauls and mass compactors are equally useful in stripping armour from invaders of the hive! With such equipment, and especially when given explosives in the form of fractal charges, a simple group of Virai Mining drones becomes a surprisingly potent unit on the battlefield.

    *Models supplied unassembled and unpainted*
- name: Virai Dronescourge mining support team with fractal DBC/frag borer
  sku: 503016502
  productType: single_kit
  priceGbp: 15.50
  url: https://store.warlordgames.com/products/virai-dronescourge-mining-support-team-with-fractal-dbc-frag-borer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503016502-Virai-Mining-Support-Team-with-fractal-DBC-frag-borer-01.jpg?v=1575566813
  status: current
  description: |-
    This is an adaptation of the existing fractal and frag borer mining technology for a breaching and demolitions role. It is sometimes referred to by its full name, a Fractal Demolitions and Breaching Cannon or Fractal DBC, though Boromites tend to just refer to the weapon as ‘the Demolisher’. The Fractal Demolisher is occasionally used by specialist units in the C3, Senatex and Prosperate in place of a compression cannon, but is most likely to be found in Freeborn and Boromite urban and salvage forces.

    Demolishers look identical to the existing Fractal Cannon or Frag Borers because they are merely adaptations of the existing weaponry. Internally, the alignment is significantly altered – the demolisher’s fractal resonance is deliberately focused at the very short ranges and high intensity required for demolition work. As a result, its use is limited on the battlefield, but its capabilities against stationary targets such as doors, buildings, walls and minefaces are much appreciated by its wielders. The resonance escalates rapidly, quickly disrupting the molecular structure of very close and shallow objects. However, such adaptations can affect the longevity of the equipment.

    *Models supplied unassembled and unpainted*
