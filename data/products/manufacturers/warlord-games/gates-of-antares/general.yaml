- name: Ghar Outcast squad
  sku: 505005003
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/ghar-outcast-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/505005003_Ghar-Outcast-Squad_10cb1f7e-defb-4ef9-86ad-d3caa8dc762a.jpg?v=1659349636
  status: current
  description: |-
    Ghar Outcasts are the most pitiful dregs of Ghar society. They are the lowest of the low; retaining no status and pressed into the most menial and most dangerous tasks.

    The Outcasts are armed with crude Lugger Guns, and are not very adept with them! They are ill-equipped in the context of Antares. As it is futile to hope for much in the way of prowess from a singular Outcast, there is little point in arming them with expensive trickery! They really come into their own as a meat shield sent to scout \(and likely become victims of\) enemy positions.

    **In the Game**

    Ghar Outcasts are not particularly effective. No Ghar would choose to fight without battlesuit, yet these are pressed to do so. Their senses are poor and their bodies weak. However, they are numerous. They are also normally unable to benefit from command, hero, or follow special rules from non-outcast units \(with the exception of a Ghar High Commander\).

    | **Outcasts \(Infantry\)** | **Ag** | **Acc** | **Str** | **Res** | **Init** | **Co** |
    | --- | --- | --- | --- | --- | --- | --- |
    | Outcast Leader with Lugger Gun | 6 | 5 | 3 | 4 | 7 | 7 |
    | 5-11 x Empire or Rebel Outcasts with Lugger Gun | 6 | 5 | 3 | 4 | 6 | 6 |

    The Lugger gun they carry isn't hugely effective, but benefits from being wielded by massed ranks of Outcasts.

    | | Range | Range | Range | | |
    | --- | --- | --- | --- | --- | --- |
    | Type of Weapon | Effective | Long | Extreme | Strike Value | Special |
    | Lugger Gun | 20 | 30 | None | 0 | RF2, Limited Ammo |

    **Ghar Outcasts**

    This blister pack gives you six new Ghar Outcast sculpts including an Outcast Leader, all armed with Lugger Guns.

    Contains six metal figures

    *Models supplied unassembled and unpainted*
- name: Ghar Outcast command squad
  sku: WGA-GAR-26
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/ghar-outcast-command-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-26-Ghar-Outcast-Command-Squad.jpg?v=1575566222
  status: current
  description: |-
    Such is the Nature of the Ghar that even Outcasts continue to value power, still rating their status in terms of the number of other Ghar who must answer to them. Betrayal can advance even the lowliest Outcast and if they're lucky they may receive their own maglash and become a slave driver, a leader of sorts, to those unfortunate Outcasts beneath them.

    The Outcast Maglash is a short ranged magnetic impulse weapon that can also be used in hand-to-hand fighting after the fashion of a whip. They're not an especially common weapon amongst Antarean space, as most factions consider it unnecessarily cruel and barbaric. The magnetic field can be extended, allowing a skilled user to ‘throw’ a burst of energy a limited distance.

    This set contains a 40 point Command Squad and includes:

    - 1 Ghar Outcast Slave Drive with Maglash

    - 2 Ghar Outcasts with Maglash

    *Models supplied unassembled and unpainted*
- name: Ghar Flitters
  sku: WGA-GAR-25
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/ghar-flitters
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-25-Ghar-Flitters.jpg?v=1575566214
  status: current
  description: |-
    Ghar Flitters are not probes in the same way as those of advanced Antarean societies such as the Concord. Flitters are tiny fragile ﬂying cameras with mechanical wings a little like a bat. They ﬂy in a jerky, irregular manner and are attracted towards movement, but are not even remotely intelligent machines. They broadcast pictures that can be picked up by Ghar battlesuit and vehicle interfaces, giving Ghar troops a glimpse of the battleﬁeld from the ﬂitter’s perspective.

    This set contains a 30 point Flitter Squad and includes:

    - 6 Flitters

    *Models supplied unassembled and unpainted*
- name: Concord Nu-Hu Mandarin (Female)
  sku: WGA-CON-28
  productType: single_kit
  priceGbp: 11.00
  url: https://store.warlordgames.com/products/concord-nuhu-mandarin-female
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-CON-28-NuHu-Mandarin-Female-a.jpg?v=1575566181
  status: current
  description: |-
    The ruling elites of this society are New Humans or NuHu. Hyper-intelligent, tall, and eerily androgynous, the NuHu are the undisputed Mandarins of the Panhuman Concord. They are very few in number and spread thinly amongst the vast population of the Concord.

    What makes the NuHu different from other humans is that they have co-evolved with the sentient integrated machine intelligence – or IMTel - that controls all aspects of Concord society. They are its living symbiotic component, simultaneously masters and slaves of an all powerful, benign technocracy.

    All worlds of the Concord are encased in a nanosphere – a cloud of nanorobotic machines that acts as a universal medium of communication and micro-energy transference. By this means worlds and ultimately the whole concord is run and directed by the data-driven machine-minds of the IMTel and its NuHu Mandarin elite.

    *Note: Models supplied unassembled and unpainted*
- name: Freeborn Command Squad
  sku: WGA-FRB-20
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/freeborn-command-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-FRB-20-Freeborn-Command-squad-a.jpg?v=1575566182
  status: current
  description: |-
    The Freeborn are merchants and traders, pursuers of wealth, inﬂuence and power within Antarean space. Their numerous ﬂeets maintain a free-ﬂow of commodities and technology between human worlds and beyond. The neutral status of the Freeborn allows their ships to travel easily between antagonistic societies such as the Isorian Shard and Panhuman Concord, and the Ghar and Algoryn. Although the Freeborn maintain a number of hidden worlds as supply bases, for the most part they stand aside and apart from other human societies, recognising no masters but the lord of their own household.

    The Freeborn Command Squad blister contains one Freeborn Commander - accompanied by a pair of Vardanari, and a Spotter Drone.

    *Note: Models supplied unassembled and unpainted*
- name: Freeborn Support Team with Mag Light Support
  sku: WGA-FRB-24
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/freeborn-support-team-with-mag-light-support
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-FRP-24-Freeborm-mag-light-support-team1.jpg?v=1575566179
  status: current
  description: |-
    Magnetic weapons \(or ‘Mag Weapons’ for short\) propel a metallic, metal-coated or metal-cored projectile by means of a powerful magnetic pulse. The projectile itself takes the form of a spike, needle, sliver or plug. Small Mag weapons are fed by a magazine, however the larger, more sophisticated weapons carry their ammunition inside of an inbuilt compression field which is capable of carrying thousands of rounds – these larger weapons are also able to synthesise their own ammunition from an integral HCM \(Hyper Compressed Material\) core given a few hours.

    Freeborn Support Team with Mag Light Support contains 3 metal crewmen, the Mag Light Support itself, and 1 Spotter Drone.

    *Note: Models supplied unassembled and unpainted*
- name: Freeborn X launcher Team
  sku: WGA-FRB-23
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/freeborn-x-launcher-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-FRB-23-Freeborn-X-launcher-a1.jpg?v=1575566169
  status: current
  description: |-
    An X-Launcher is a portable magnetic launcher that hurls explosive missiles, bombs, or special munitions packages, such as Arc, Blur, Scramble, and Scoot.

    They are bulky weapons, and their regular explosive ammunition resists full compression due to the charge. They are of limited value on the battlefield unless they can be emplaced or setup in a static position. However, they are excellent for lobbing shots onto fixed targets. The bombs themselves are usually guided either by internal sensors or by means of mobile targeting probes. The standard X ammunition contains high-concussion explosives. The X simply standing for explosive. The smallest X-Slinger version shoots a micro-bomb and is often built into a wrist-mounted unit, or it can be sub-mounted onto another weapon or device.

    *Note: Models supplied unassembled and unpainted*
