- name: Compactor Drones
  sku: 503019905
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/compactor-drones
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503019905-Compactor-Drones-01.jpg?v=1575566766
  status: current
  description: |-
    A compactor drone carries a generous material load in a stable compressor ﬁeld. It is employed to transport equipment up to a certain size. One in-game use is to enable a bike mounted unit to function temporarily as infantry by folding its machines into its compression ﬁeld.

    *Models supplied unassembled and unpainted*
- name: Batter Drones
  sku: 503019904
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/batter-drones
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503019904-Batter-Drones-01.jpg?v=1575566769
  status: current
  description: |-
    The batter drone is a defensive buddy drone that projects a kinetic energy shield or batter shield that can deﬂect or absorb incoming attacks. Kinetic shields are kinds of suspensor ﬁelds – the same sort of invisible energy ﬁelds that enable drones to hover and vehicles to move eﬀortlessly through the air.

    *Models supplied unassembled and unpainted*
- name: C3M25 Heavy Combat Drone
  sku: 502413004
  productType: single_kit
  priceGbp: 65.00
  url: https://store.warlordgames.com/products/c3m25-heavy-combat-drone
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502413004_C3M25_Heavy_Combat_Drone_box_front.jpg?v=1575566728
  status: current
  description: |-
    The M25 series provides the basis for the ultimate fighting machines available to the armed forces of the Concord Combined Command or C3. These are extremely heavily armed and armoured drones used to spearhead major offensives or assault massive defences. M25 drones are also used in static defence and to eliminate enemy drones from long ranges. M25 heavy combat drones are unsurpassed in terms of armament and ability to withstand retaliatory fire.

    There are a number of variants of which the M25 armed with a plasma bombard is most commonly used as a heavy break-through vehicle. Other variants armed with compression weapons are used to reduce enemy fortifications and in other specialist roles. They follow the usual layout for combat drones of suspensor propulsion with reactive kinetic shielding though on a massive scale.

    The box contains:

    - Multi-part resin and metal model of C3M25 heavy combat drone armed with plasma light support and a choice of plasma bombard or compression bombard.
    - Metal Concord/Freeborn spotter drone

    *Models supplied unassembled and unpainted*
- name: Synchroniser Drone shard
  sku: 503010002
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/synchroniser-drone-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503010002-Sychroniser-Buddy-Drones-01.jpg?v=1575566737
  status: current
  description: |-
    The synchroniser drone is a buddy drone that enables the combat shard of one unit to synchronise its actions with another unit within the same broad combat net.

    *Models supplied unassembled and unpainted*
- name: Homer Drone Shard
  sku: 503010001
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/homer-drone-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503010001-Homer-Buddy-Drones-01.jpg?v=1575566734
  status: current
  description: |-
    A homer drone emits a transmat modulation signal – or homer signal ‐ that can be used as a temporary transmat node enabling a larger array to pluck a unit from a planet’s surface. However, the range is limited compared to a fixed array, and the modulation signal can potentially collapse mid-transport.

    *Models supplied unassembled and unpainted*
- name: Algoryn specialist support team with plasma light support
  sku: 503011009
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/algoryn-specialist-support-team-with-plasma-light-support
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503011009-Algoryn-Specialist-Support-Team-with-Plasma-Light--Support-01.jpg?v=1575566734
  status: current
  description: |-
    The plasma light support gun – often abbreviated to Plasma LS – is the ultimate in rapid firing infantry support weapons and the mainstay of Concord and Isorian weapon drone units.

    The plasma light support gun is easily recognised by its hefty plasma coil and substantial size as well as the characteristic double vane barrel that houses the necessary magnetic containment generators.

    *Models supplied unassembled and unpainted*
- name: Boromite specialist support team with plasma cannon
  sku: 503012011
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/boromite-specialist-support-team-with-plasma-cannon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503012011-Boromite-Specialist-Support-Team-with-Plasma-Cannon-01.jpg?v=1575566728
  status: current
  description: |-
    The plasma cannon is the hardest hitting light support weapon available to any force in Antarean space and frequently used to arm ‘Hunter’ type weapon drones.

    The plasma cannon is the ultimate light support weapon. It is calibrated to deliver a single very strong pulse, for which an especially long plasma coil is required. All plasma weapons have a defect inherent in plasma coils in that they gradually weaken over time. This problem is normally overcome by the weapon’s own self‐repair facility. In the case of the plasma cannon the weapon is so powerful that its battlefield performance can sometimes be affected, causing temporary plasma fade.

    *Models supplied unassembled and unpainted*
