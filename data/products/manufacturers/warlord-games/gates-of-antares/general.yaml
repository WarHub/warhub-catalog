- name: Algoryn AI specialist heavy support team with Fractal Bombard
  sku: 502411009
  productType: single_kit
  priceGbp: 32.50
  url: https://store.warlordgames.com/products/algoryn-ai-specialist-heavy-support-team-with-fractal-bombard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502411009-Algoryn-AI-Specialist-Heavy-Support-Team-with-Fractal-Bombard-01.jpg?v=1575566791
  status: current
  description: |-
    Fractal bombards are designed to destroy fortresses, buildings and other large static constructions from long range. They are essentially siege weapons that are designed to break apart immobile targets, and any enemy defending them. They are a specialised but essential weapon in the armouries of the Algoryn Prosperate as they are in all advanced forces of Antarean space.

    This weapon is especially useful against the Ghar because they abhor sunlight and naturally cluster into or under the ruins of buildings and the fortifications that they quickly raise upon any world they attack. Only by destroying these bases can the cursed Ghar be driven from a planet, and a fractal bombard is an essential tool in accomplishing this task.

    The fractal bombard is the largest and most powerful of all fractal weapon but it works in the same way as more mobile and smaller versions. Fractal weapons or fraction disintegrators utilise molecular resonance to break apart solid material.

    They are designed to lock on to a target and tear it apart. Against a static target this is very effective, whilst mobile targets finding that a fractal weapon has ‘locked-on’ must either escape immediately or risk certain destruction.

    Contains the following metal and resin models:

    - 1 Algoryn fractal bombard
    - 3 Algoryn crew
    - 1 Algoryn spotter drone

    *Models supplied unassembled and unpainted*
- name: Algoryn AI Bastion heavy combat skimmer
  sku: 502411010
  productType: single_kit
  priceGbp: 65.00
  url: https://store.warlordgames.com/products/algoryn-ai-bastion-heavy-combat-skimmer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502411010-Algoryn-AI-Bastion-Heavy-Combat-Skimmer-box-front.jpg?v=1575566777
  status: current
  description: |-
    The Bastion heavy combat skimmer is the largest and most powerful of the military grade semi-autonomous weapon platforms in the armoury of the Algoryn Prosperate. It is heavily protected with a combination of fixed-emission hyperlight defences and strategic kinetic shielding. The Bastion is capable of carrying the largest and heaviest of mobile weapons, and is generally armed with a heavy magnetic cannon as its principal armament.

    This is a proven and highly effective weapon with immense penetration power, easily capable of destroying even the most heavily armoured drones and vehicles. Secondary armament can vary from the highly effective mag light support or twin version of the same weapon, or the even more powerful plasma light support.

    Its long range enables it to operate from fixed positions from which it can dominate the battlefield. Its suspensors are augmented by pulse thrusters propelling the Bastion at a moderate pace. The Bastion is one of the most effective assets available to the Prosperate’s forces and one that dominates the largest and fiercest of battles.

    Contains the following multi-part resin and metal model:

    - 1 Algoryn AI Bastion heavy combat skimmer armed with heavy mag cannon
    - 3 optional light support weapons: mag light support, twin mag light support and plasma light support
    - 1 spotter drone

    *Models supplied unassembled and unpainted*
- name: Concord Intelligence NuHu Mandarin Jai Galeyous
  sku: 503013009
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/concord-intelligence-nuhu-mandarin-jai-galeyous
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503013009-Concord-Intelligence-Nuhu-Mandarin-Jai-Galeyous-01.jpg?v=1575566769
  status: current
  description: |-
    Jai Galeyous is cautious, but extraordinarily intelligent, even for a NuHu. Having studied the Chryseis Locus and the Shamasai Shard, she is aware of just how vulnerable she is in a frontline role against nanospheres that can easily destroy her protective nano-drone.

    This has made her very wary of relying just on her gun drones, often preferring to be accompanied by a bodyguard of well-armed intelligence agents instead. Jai’s focus on research makes her a highly eﬀective analyst in her area – though she possibly lacks interest, contacts and awareness in unrelated areas.

    *Models supplied unassembled and unpainted*
