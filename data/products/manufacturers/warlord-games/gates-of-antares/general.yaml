    The plasma cannon is the ultimate light support weapon. It is calibrated to deliver a single very strong pulse, for which an especially long plasma coil is required. All plasma weapons have a defect inherent in plasma coils in that they gradually weaken over time. This problem is normally overcome by the weapon’s own self­repair facility. In the case of the plasma cannon the weapon is so powerful that its battleﬁeld performance can sometimes be aﬀected, causing temporary plasma fade.

    *Models supplied unassembled and unpainted*
- name: Isorian Andhak Plasma Drone
  sku: 503015010
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/isorian-andhac-plasma-drone
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503015010-Isorian-Andhak-Drone-with-Plasma-Cannon-a.jpg?v=1575566466
  status: current
  description: |-
    The Isorian Andhak SC2 series of drones is a stalwart of Isorian forces.

    Like its Concord counterparts it is a sentient IMTel integrated machine capable of carrying a variety of different weapons. It is protected by phaseshift shielding as well as conventional nano­cored shell and kinetic shields.

    *Models supplied unassembled and unpainted*
- name: Algoryn Avenger Attack Skimmer
  sku: 502411002
  productType: single_kit
  priceGbp: 26.00
  url: https://store.warlordgames.com/products/algoryn-avenger-attack-skimmer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502411002-Algoryn-Avenger-a_6e9febce-3faf-4d3c-affa-6a439f4b2a7d.jpg?v=1575566439
  status: current
  description: |-
    Able to be armed with either the Mag Light Support, Mag Cannon, or Twin Mag Light Support, the Avenger is a key strike weapon in the Algoryn arsenal which benefits from being a MOD2 unit... meaning that it gets two Order Dice rather than one... so you can fire those Twin Mag Light Supports **TWICE** in a turn if you so desire!

    The Avenger type skimmer is a lightly built two man fighting machine designed for raids and support missions. It is modestly armed and armoured compared to larger fighting machines but is ideally designed as a strike weapon relying upon its speed to launch its attack and evade enemy retaliation. It is sometimes used in company with Intruder skimmers as part of a long-range raider force, providing additional firepower where needed.

    Like the smaller and lighter Intruder it is buoyed upon suspensors that carry it easily over most ground surfaces and employs pulse thrusters for sustained forward momentum.

    *Models supplied unassembled and unpainted*
- name: Male Freeborn NuHu Renegade
  sku: 503014001
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/male-freeborn-nu-hu-renegade
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503014001-Male-Freeborn-NuHu-Renegade-a.jpg?v=1575566436
  status: current
  description: |-
    NuHu –a contraction of New Human – are extremely tall, long‐limbed morphs with bodies that are slight or even frail. However, it is their considerable mental abilities that make them distinct from other humans. NuHu are hyper‐intelligent and possess machine‐like powers of recall. This alone makes them formidable individuals, but what really sets them apart is their capacity to interact with nano‐based technology.

    Whilst other humans must rely upon interfaces or implanted devices to interact with the many machine intelligences of advanced Antarean societies, the NuHu can do so with their minds alone. This power is seated deep within a part of the brain that is sensitive to electro‐magnetic radiation and which forms a bond with the tiny nanites that saturate the worlds of human space.

    In this way NuHu are born and grow up immersed in an environment that is part of the nanosphere. To them it is entirely normal to live co‐joined lives with the IMTel\(Integrated Machine Intelligence\) that controls all aspects of advanced human societies. They are at the same time the masters of this technology and expressions of it, living creatures that are also part of a greater machine mind. Scarce wonder that to many ordinary humans they often appear to be living machines, cold and inhuman.

    Full rules can be found in the Beyond the Gates of Antares rulebook page 191

    *Models supplied unassembled and unpainted*
- name: Female Freeborn NuHu Renegade
  sku: 503014002
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/female-freeborn-nu-hu-renegade
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503014002-Female-Freeborn-NuHu-Renegade-a.jpg?v=1575566428
  status: current
  description: |-
    NuHu –a contraction of New Human – are extremely tall, long‐limbed morphs with bodies that are slight or even frail. However, it is their considerable mental abilities that make them distinct from other humans. NuHu are hyper‐intelligent and possess machine‐like powers of recall. This alone makes them formidable individuals, but what really sets them apart is their capacity to interact with nano‐based technology.

    Whilst other humans must rely upon interfaces or implanted devices to interact with the many machine intelligences of advanced Antarean societies, the NuHu can do so with their minds alone. This power is seated deep within a part of the brain that is sensitive to electro‐magnetic radiation and which forms a bond with the tiny nanites that saturate the worlds of human space.

    In this way NuHu are born and grow up immersed in an environment that is part of the nanosphere. To them it is entirely normal to live co‐joined lives with the IMTel\(Integrated Machine Intelligence\) that controls all aspects of advanced human societies. They are at the same time the masters of this technology and expressions of it, living creatures that are also part of a greater machine mind. Scarce wonder that to many ordinary humans they often appear to be living machines, cold and inhuman.

    Full rules can be found in the Beyond the Gates of Antares rulebook page 191

    *Models supplied unassembled and unpainted*
- name: Isorian Drone Commander Xan Tu
  sku: WGA-ISO-29
  productType: single_kit
  priceGbp: 11.00
  url: https://store.warlordgames.com/products/isorian-drone-commander-xan-tu
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ISO-29-Xan-Tu-a.jpg?v=1575566438
  status: current
  description: |-
    In a previous and entirely organic existence, Xan Tu was a successful commander of Senatex forces whose career spanned almost two centuries and warzones from the Northern Spill to the Vorl frontiers in the Deep South. Reaching what was a natural end to a long and active life Xan Tu elected to live on in machine form – transitioning his mind into a drone body.

    Transitioning as a drone was for Xan Tu a logical choice – for it would allow him to do what he had always done – to continue to lead Senatex forces wherever they were needed. As a machine he would lose much of his human personality, but his mind would gain so much more by direct association with the IMTel.

    The promise of machine existence was as close to immortality as it was possible to get. Xan Tu understood that the machine which he would become would evolve ever further from the person he had once been, but that did not seem such a terrible thing. It was, he considered, certainly no worse than the perpetual erosion of purpose and disillusionment of mere human existence.

    Drone Commander Xan Tu is the first drone commander introduced into the Antares game and as a transitioned human his qualities are perhaps a little different from those of a pure machine intellect. He is a weapon drone type unit as well as a command unit, and can include further Nhamak type drones too.

    Xan Tu works out relatively cheaply compared to a regular Command Squad and this is largely down to the fact he is unarmed, while his nano probe net ability is an upgrade. By adding [Nhamak drones](https://store.warlordgames.com/collections/isorian/products/isorian-nhamak-light-support-drone) you can change things up a level, coupled with his special leadership through the Nano Probe Net \(full rules on page 117 in the supplement ''\) he becomes quite an asset to a larger force.

    *Models supplied unassembled and unpainted*
- name: Algoryn AI heavy support team with Compression bombard
  sku: 502411001
  productType: single_kit
  priceGbp: 29.00
  url: https://store.warlordgames.com/products/algoryn-ai-heavy-support-team-with-compression-bombard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502411001-Algoryn-Compression-Bombard-a.jpg?v=1575566435
  status: current
  description: |-
    This weapons huge range combined with the compression effect removing all cover makes for one devastation addition to your Algoryn forces!

    Compression weapons use compression ﬁeld technology to quantum reduce everything within a narrow ﬁeld projected by the weapon – eﬀectively scrunching matter to nothing. As with other compression weapons, the compression cannon doesn’t function at very short ranges and its eﬀectiveness drops oﬀ very quickly over long range.

    The chief advantages of the compression weapon compared to plasma equivalents are its eﬀectiveness against close targets – so long as they don’t come within the weapon’s limited compression range – and its ability to compress any cover the target is taking advantage of. As with all larger compression weapons it can suﬀer from momentary ﬁeld collapse but that's a minor issue when you can crush all before you!

    *Models supplied unassembled and unpainted*
- name: Algoryn Mag Mortar
  sku: WGA-ALG-08
  productType: single_kit
  priceGbp: 35.00
  url: https://store.warlordgames.com/products/algoryn-mag-mortar
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ALG-08-Algoryn-Mag-Mortar-a.jpg?v=1575566436
  status: current
  description: |-
    Mag mortars very large calibre magnetic launchers designed to lob a very heavy shell at low velocity over relatively short ranges. This means they can be more compact than X­howitzers although they sacriﬁce range.

    Mag mortars make excellent close support artillery but can be vulnerable to enemy action, so protect them well! They are especially useful against massed targets because of their double template blast area. With D10 hits they can smash even the most substantial units.

    *Models supplied unassembled and unpainted*
- name: Commander Josen, C3 XEF
  sku: WGA-CON-37
  productType: single_kit
  priceGbp: 6.75
  url: https://store.warlordgames.com/products/commander-josen-c3-xef
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-CON-37-Commander-Josen-C3-XEF-a.jpg?v=1575566440
  status: current
  description: |-
    The Kamrana Josen of the Xilos expedition is an older and more responsible commander than the hero Josen of Aan Four \(depicted in the Antares rulebook on page 229\), but deep down he has lost little of his old determination. Experience, promotion and the demands of increased responsibility mean that his role has changed from that of a ﬁeld commander to the Commander-in-Chief of an entire army.

    In this version of Command Josen his greatest asset is his sheer ability to endure, with Leader 3 and Wound 3, and we dispense with the ‘unstoppable’ rule that allowed us to represent his solo-heroics on Aan Four. Instead we give Josen the ability to allow nearby troops to reroll a failed test against Command, and the chance to build up extra Well Prepared Army Options which can be used to boost the tested value of any rerolls taken by the force.

    *Models supplied unassembled and unpainted*
- name: Algoryn Compression Cannon
  sku: WGA-ALG-38
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/algoryn-compression-cannon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ALG-38-Algoryn-Compression-Cannon-a.jpg?v=1575566434
  status: current
  description: |-
    The compression cannon is a relatively exotic, sleek looking, light support weapon mostly used in specialist roles by Algoryn forces.

    Compression weapons use compression ﬁeld technology to quantum reduce everything within a narrow ﬁeld projected by the weapon – eﬀectively scrunching matter to nothing. As with other compression weapons, the compression cannon doesn’t function at very short ranges and its eﬀectiveness drops oﬀ very quickly over long range.

    The chief advantages of the weapon compared to plasma equivalents are its eﬀectiveness against close targets – so long as they don’t come within the weapon’s limited compression range – and its ability to compress any cover the target is taking advantage of. As with all larger compression weapons it can suﬀer from momentary ﬁeld collapse, so best avoid rolling that 10.

    *Models supplied unassembled and unpainted*
- name: C3 Drop Command Squad
  sku: WGA-CON-31
  productType: single_kit
  priceGbp: 17.00
  url: https://store.warlordgames.com/products/c3-drop-command-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-CON-31-C3-Drop-Command-a.jpg?v=1575566431
  status: current
  description: |-
    Using a transmat beam for the first phase of the drop, to then free fall. Their anti gravity chutes enable them to refine and direct their decent away from the restriction of the suspensor envelop aloowing for more surgical strikes, leading the way for the rest of the shard.

    A natural addition to any drop troops, see page 161/162 of the for more detail.

    *Models supplied unassembled and unpainted*
- name: Algoryn medic team
  sku: WGA-ALG-37
  productType: single_kit
  priceGbp: 14.00
  url: https://store.warlordgames.com/products/algoryn-medic-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ALG-37-Algoryn-Medic-team-a.jpg?v=1575566432
  status: current
  description: |-
    Algoryn Medics are trained battlefield emergency medical technicians who carry all the equipment necessary to save lives and to immediately rehabilitate troops suffering minor trauma who might otherwise be rendered ineffective.

    Medic Teams are common amongst the forces of the Algoryn – and are highly regarded by the troopers who rely upon them in the field.

    *Models supplied unassembled and unpainted*
- name: General Tar Es Janar
  sku: WGA-ALG-39
  productType: single_kit
  priceGbp: 6.75
  url: https://store.warlordgames.com/products/general-tar-es-janar
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ALG-39-General-Tar-Es-Janar-a.jpg?v=1575566427
  status: current
  description: |-
    Janar is the commander in charge of the outlying sector of the Prosperate closest to Xilos – his home world.

    Recognising the Ghar threat to his home world, Janar went against usual Algoryn protocol \(not consulting the Prosperity’s leaders before despatching forces to the planet\) – he assembled his troops into a relief force and headed for Xilos in order to relieve the trapped Concord expedition, and to deny the planet to the Ghar.

    That he did so without the mandate of the Council meant that he was guilty of treason. That would however have to be a problem for another day.

    *Models supplied unassembled and unpainted*
- name: Freeborn Hound Probe Shard
  sku: WGA-FRB-22
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/freeborn-hound-probe-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-FRB-22-Freeborn-Hound-Probe-Shard-a.jpg?v=1575566422
  status: current
  description: |-
    Hound probes are used by the Freeborn to keep Feral troops in order and are especially effective when used on troops with Soma grafts. They make use of cranial implants and nano­ neurosurgery to manipulate the human = mind, causing troops to become fearless, enraged, and otherwise suggestive to their masters’ commands.

    *Models supplied unassembled and unpainted*
- name: Amano Harran, Freeborn Mercenary Captain
  sku: WGA-FRB-38
  productType: single_kit
  priceGbp: 6.75
  url: https://store.warlordgames.com/products/amano-harran-freeborn-mercenary-captain
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-FRB-38-Amano-Harran-a.jpg?v=1575566390
  status: current
  description: |-
    Amano Harran has certainly made a name for himself among the worlds of the Determinate, and his ship – the Nebula – has become almost as famous as its captain. Utilising some of the most advanced technologies of Antarean space, it is often assumed that the Nebula is equipped with alien derived space drives as yet unknown to the human civilisations of Antarean space. That may indeed be so, for Amano’s travels have certainly taken him to worlds beyond the ordinary congress of human space.

    With his warband of hand-picked Freeborn fighters, he became one of the most spectacularly successful and best known mercenary leaders in the whole Determinate. The Oszoni celebrated enthusiastically when they heard of Amano’s daring raids and courageous deeds. Amano naturally took great pains to ensure that they did!

    *Models supplied unassembled and unpainted*
- name: Xilos Drummer and Snappers
  sku: WGA-GEN-22
  productType: single_kit
  priceGbp: 11.00
  url: https://store.warlordgames.com/products/xilos-drummer-and-snappers
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GEN-22-Xilos-Drummer-and-Snappers-a.jpg?v=1575566382
  status: current
  description: |-
    Snappers are fairly small arthropods that live in great numbers both in the jungles and amongst the ruins of Xilos. The explorers dub these creatures ‘snappers’ because of the snap-snap-snapping noise they make as they scuttle about in search of food. Snappers are communal animals that live in burrows in the ground, amongst leaf litter, and sometimes within the rotting carcasses of the world’s tree-like ﬂora. They are common in the Builder ruins where they dig amongst the debris and prey upon other small animals as well as scavenging the carcasses of larger creatures.

    Drummers are large, solitary arthropod predators, one of the most deadly creatures of the Xilos jungles. The explorers dub these powerful hunters ‘Drummers’ because the noise they make when they attack is like a staccato of drum beats. Whilst Drummers are essentially creatures of the jungles they can also be found deep in the subterranean ruins, where they squeeze along the passages made by smaller creatures such as Snappers.

    *Models supplied unassembled and unpainted*
- name: Ghar Outcast Rebels Command Team
  sku: WGA-GAR-38
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/ghar-outcast-rebels-command-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-38-Outcast-Rebels-Command-a.jpg?v=1575566381
  status: current
  description: |-
    The Ghar Outcast Rebel Army, lead by Fartok has to rely on what they can capture, repair or fabricate using the modest resources available to them. This has resulted in a force with a wide variety of troops and equipment, at least compared to the relatively homogenous armies of the Ghar Empire. Most significantly, it means that a rebel army is fundamentally an army of ordinary outcast infantry supported by a lesser number of machines including refurbished battle armour and captured crawler vehicles.

    The rebel army is itself growing so large that Fartok has divided his forces into several smaller commands, each under the eye of a trusted rebel leader. It is not yet certain whether Fartok has established permanent planetary bases, although this seems likely. Most rebel action takes place in space, in the form of attacks upon Ghar and other convoys, and raids upon Ghar outposts, often with the express purpose of freeing slaves. The rebel fleets pose a threat not only to the ships of the Ghar Empire but to all those traversing the western Determinate.

    *Models supplied unassembled and unpainted*
- name: Boromite Micromite probe shard
  sku: WGA-BOR-35
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/boromite-micromite-probe-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-BOR-35-Boromite-Micromite-a.jpg?v=1575566380
  status: current
  description: |-
    A micromite probe is something of an exception to the normal run of the mill probes because it is – or was – a living creature. Lavamite hatchlings are produced in vast numbers by Lavamite Brood Mothers and grow quickly. Part grown hatchlings are used by Boromites to create living micromite probes. As this involves scooping out what passes for the hatchling’s brain and replacing its nervous system with a nano­net it is doubtful whether the resultant micromite could be said to be really alive.

    Despite this maltreatment micromites still preserve something of their native cunning and have a keen sense of self-preservation. They are used to locate enemy and to direct fire onto targets in exactly the same way as targeter probes.

    *Models supplied unassembled and unpainted*
- name: Isorian Scout probe shard
  sku: WGA-ISO-34
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/isorian-scout-probe-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ISO-34-Isorian-Scout-Probe-Shard-a.jpg?v=1575566391
  status: current
  description: |-
    Spotter Drones operate in two fashions – they can often be seen working alongside Isorian Troops as part of their unit – acting as another pair of eyes to spot targets. They have however also been sighted working as independent Drone Shards – these groups work in a reconnaissance role – scouting the battlefield, spotting targets and potential dangers, feeding information back to the combat hard and guiding the Senatex to its’ objectives more effectively.

    *Models supplied unassembled and unpainted*
- name: Isorian Targeter Probe Shard
  sku: WGA-ISO-26
  productType: single_kit
  priceGbp: 6.75
  url: https://store.warlordgames.com/products/isorian-targeter-probe-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ISO-26-Isorian-Targeter-Probe-Shard-a.jpg?v=1575566385
  status: current
  description: |-
    Targeter Probes operate independently of troops – working as Probe Shards. These groups of drones scout the battlefield, identifying targets and relaying their positions back to their combat shard – acting as reconnaissance to guide the Senatex troopers toward the enemy.

    *Models supplied unassembled and unpainted*
- name: Isorian phase sniper
  sku: WGA-ISO-30
  productType: single_kit
  priceGbp: 11.00
  url: https://store.warlordgames.com/products/isorian-phase-sniper
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ISO-30-Isorian-Phase-Sniper-a.jpg?v=1575566393
  status: current
  description: |-
    Phase Snipers of the Isorian Senatex are equipped with Phase rifles – complex weapons which utilise some of the same technology as phase armour, also unique to the Senatex. To date the Concord has been unable to replicate phase technology accurately. In part this is due to the risks in accessing Isorian nanospore.

    The phase rifle is an unusual and relatively large weapon. It has a great range and the ability to fold into time effectively enabling its operator to shoot multiple times at the same moment. It is useful for picking off commanders and other individuals amongst units, and for shooting at targets in cover.

    The Phase Sniper is a potent and deadly addition to the ranks of the Isorian Senatex – a must-have unit for all Isorian forces.

    *Models supplied unassembled and unpainted*
- name: Ghar Tectorists Scouts
  sku: WGA-GAR-23
  productType: single_kit
  priceGbp: 11.00
  url: https://store.warlordgames.com/products/ghar-tectorists-scouts
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-23-Ghar-Tectorist-Scouts-a.jpg?v=1575566390
  status: current
  description: |-
    Tector rods are simple direction finding instruments that detect the presence of enemy and enable their operators to direct fire onto them. Ghar Tectorists are a rare breed – Ghar that are immune to fear and unmotivated by any sense of self preservation. This is almost certainly due to prolonged exposure to mind numbing plasma reactor overspill, although you can never be sure.

    *Models supplied unassembled and unpainted*
- name: Algoryn Scout Probe Shard
  sku: WGA-ALG-36
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/algoryn-scout-probe-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ALG-36-Algoryn-Scout-Probe-Shard-a.jpg?v=1575566383
