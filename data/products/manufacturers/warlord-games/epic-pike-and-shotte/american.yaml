  description: |-
    John Stallard's Jacobite army for the battle of Culloden shows how much fun you can have converting and combining our Epic miniatures. This bundle gives you everything you need to approximate John's Jacobite force, though of course you can follow you own inspiration, or combine these with other models from the Pike & Shotte and Revolution! ranges. We've also teamed up with author Pete Brown to create a FREE PDF supplement dedicated to the Battle of Culloden, allowing you to use this bundle in your games of Black Powder. Download it [HERE!](https://warlord-community.warlordgames.com/wp-content/uploads/2025/12/BP_Culloden-Booklet_121225_Final.pdf)

    Bundle includes:

    *PLEASE NOTE - The contents of this bundle differ slightly from John's army shown in the image, but still give you a very similar force! The clansmen are available separately [here](https://store.warlordgames.com/products/epic-pike-shotte-highland-clansmen).*

    - Epic Highlanders - 3 command strips and 21 strips of troops \(three different designs\) gives you enough to make 12 stands of Highland infantry.
    - Epic AWI Continental Army Sprue - to use to create Lowland Militia and regulars in tricorns.
    - Epic AWI British Army Sprue 2 \(Hessians\) - more regulars in tricorns and the mitre hats can be used to make grenadiers to add to the right of each infantry unit, plus the Hessian Jaegers can be used as dismounted infantry.
    - Epic Pike & Shotte Scots Covenanters Sprue - for your commanders and the artillery
    - Epic Black Powder Nassau Flank Companies heads - to use with the Light Dragoons from the British Army Sprue 2 to make Bagot's Hussars.
    - Epic Battles bases large sprue \(4\)

    *Models supplied unassembled and unpainted*
