    - 54 commanded shotte
    - 9 saker medium guns
    - 9 falconet light guns
    - 9 mounted battalia commanders
    - 9 ensigns on foot
    - 3 full-colour flag sheets with Thirty Years’ War colours.

    *Models supplied unassembled and unpainted*
