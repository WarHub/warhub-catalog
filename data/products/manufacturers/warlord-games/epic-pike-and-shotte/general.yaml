- name: Pike & Shotte Epic Battles - Battle of Breitenfeld Thirty Years' War Collection
  sku: 219912003-01
  productType: box_set
  priceGbp: 189.00
  url: https://store.warlordgames.com/products/pike-shotte-epic-battles-battle-of-breitenfeld-thirty-years-war-collection-1
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/219912003-Pike-_-Shotte-Epic-Battles---Battle-of-Breitenfeld-Thirty-Years-War-Collection1_fef2b904-d18d-4ae5-9dc2-2ebd567f6997.jpg?v=1681927588
  status: current
  description: |-
    The Battle of Breitenfeld \(September 17, 1631\), in which the Swedish-Saxon army of King Gustav II Adolf of Sweden defeated and destroyed the imperial army of Ferdinand II \(commanded by Count Tilly\), was the first major Protestant victory of the Thirty Years' War. The battle demonstrated that Swedish tactics could triumph over the increasingly-dated massive infantry formations that had dominated European warfare for decades prior, and earned Adolphus the moniker the "Lion of the North".

    In this battle both sides set up with their cavalry supporting the flanks. To make sure you are able to do the same on the tabletop, we’ve included three Pike & Shotte Epic Battles – Thirty Year’s War cavalry boxed sets in this Battle of Breitenfeld Collection. When combined with the cavalry in the Push of Pike starter set, you’ll have the makings of a fine Thirty Years’ War Epic Battles cavalry wing.

    Full Contents:

    - Push of Pike Starter Set
    - 3x Thirty Years’ War cavalry boxed sets

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte Epic Battles - Battle of Winceby English Civil Wars Collection
  sku: 219913003-01
  productType: box_set
  priceGbp: 189.00
  url: https://store.warlordgames.com/products/pike-shotte-epic-battles-battle-of-winceby-english-civil-wars-collection-1
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/219913003-Pike-_-Shotte-Epic-Battles---Battle-of-Winceby-English-Civil-Wars-Collection1_2e3b797c-652e-4f4d-a533-ceae83805e7b.jpg?v=1681927211
  status: current
  description: |-
    The Battle of Winceby took place on 11 October 1643, part of the First English Civil War, in the county of Lincolnshire. The Parliamentarian cavalry of the Earl of Manchester deftly defeated Sir William Widdrington's Royalist reliving force. Though viewed as a lesser battle fo the Civil Wars in terms of scale and its paltry thirty minute length, its ramifications paint a far-greater significance - being the first nationally major victory for Cromwell's cavalry.

    As this was chiefly a battle of cavalry and dragoons, we've made sure to include three sets of our Pike & Shotte Epic Battles - English Civil Wars cavalry boxed sets in this Battle of Winceby Collection. When combined with the cavalry in the Push of Pike starter set, these will set you well on your way to a resplendent English Civil Wars Epic Battles mounted collection.

    Full Contents:

    - Push of Pike Starter Set
    - 3x English Civil Wars cavalry boxed sets

    *Models supplied unassembled and unpainted*
