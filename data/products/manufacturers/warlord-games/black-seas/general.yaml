- name: Small 3rd rate squadron with Spanish Vessels of Renown 1
  sku: 792010002KS1
  productType: single_kit
  priceGbp: 48.00
  url: https://store.warlordgames.com/products/small-3rd-rate-squadron-with-spanish-vessels-of-renown-1
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/792010002KS1_Small-3rd-rate-squadron-with-Spanish-Vessels-of-Renown-1_01.jpg?v=1721398223
  status: current
  description: |-
    A 3rd rate ship, as defined by the British rating system, was a ship of the line which mounted between 64-80 guns. Usually, this would mean two gun decks. Despite their relative size and power compared to larger 1st and 2nd rates, it was considered that 3rd rates maintained an effective, perhaps even superior balance between sailing ability, firepower and cost.

    For a number of nations, 3rd rates were the most popular ship size. Cheaper to operate and easier to sail without the sacrifice of offensive capability, the only ships a 3rd rate could not single-handedly engage were larger three-decked ships. A large number of 3rd rates were built and employed on a variety of missions.

    In Black Seas, a small 3rd Rate is classified as a large ship of 64 ship points. It lacks a broadside carronade and stern light cannon that its larger brethren, but can easily outpace the larger 1st and 2nd rates.

    Upgrade your Spanish Small Third Rates with this pack of finely detailed metal figureheads and backplates, allowing you to field *San Leandro, San Isidoro,* and *San Fulgencio.*

    *Models supplied unassembled and unpainted*
- name: 1st Rate with Principe de Asturias back plate and figure head
  sku: 792410017KS1
  productType: single_kit
  priceGbp: 35.00
  url: https://store.warlordgames.com/products/1st-rate-with-principe-de-asturias-back-plate-and-figure-head
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/792410017KS1-1st-Rate-with-Principe-de-Asturias-back-plate-and-figure-head01.jpg?v=1721398583
  status: current
  description: |-
    The largest of the ships-of-the-line under the Royal Navy's rating system, the 1st Rate would generally have over 850 crew and more than 100 guns across three decks. Extremely expensive build and maintain, 1st Rates tended to be reserved for flagship duty with admirals. They were more often than not mothballed during peacetime \(known as being put into 'Ordinary'\) only to be activated \('commissioned'\) in times of war.

    This is a generic 1st Rate suitable for navies of all nations represented in Black Seas.

    Upgrade your Spanish First Rate to the *Principe de Asturias* with this finely detailed metal figurehead and backplate.

    *Models supplied unassembled and unpainted*
