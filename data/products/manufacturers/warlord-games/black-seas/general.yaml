- name: Master & Commander With Scenery Pack Upgrade
  sku: Black-Seas-01
  productType: terrain
  priceGbp: 83.00
  url: https://store.warlordgames.com/products/master-commander-with-scenery-pack-upgrade
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/BRSandTerrainBundles_1.png?v=1631878015
  status: current
  description: |-
    Black Seas, is the acclaimed naval battles game , set in the 1700s, from warlord games, with unique game mechanics such as wind direction and sailing speed, rules for various cannons, chasers and damage tables based on tactical positioning and pulling off tactical maneuvers such as crossing the T, loading chain shot and boarding other vessels - this exclusive bundle saving sets you up with the entire starter set \(containing a playmat, rulebook, miniatures, dice, counters - everything you'd expect from a Warlord Games 2-player set and pairs it with our incredibly high quality 1/700 scale at sea terrain, which includes destroyed ships, rocks, defensive structures and more, to not only visually enhance your games, but allow you to add new gameplay elements to the table - If you want to dip your toes into Black seas, this is the ultimate bundle and the ultimate saving!

    **The Core Set:**

    Alongside a softback copy of the Black Seas core rules, you'll get nine beautifully detailed plastic miniatures; three frigates and six brigs. You'll also get sails, rigging and flag sheets for all your ships and all the ship cards, wake markers, and tokens that you'll need to play. We've also included an A0 battle mat, dice and rulers!

    **The terrain set:**

    Rocks of various shapes and sizes can provide tricky obstacles to negotiate with your vessels. They are also capable of blocking line of sight - a wily Captain, should his sailing be savvy enough, can use them to stalk an enemy in relative safety before pouncing upon his prey. But be careful not to collide. They are particularly useful in Scenario 11 \(Page 48 of the Black Seas Rulebook\). Sinking vessels can lend a game an extra layer of authenticity. Use them to replace your own ships as they fall in battle. Wrecks are treated the same as rocks, as such a sinking vessel can provide a sudden and unexpected obstacle for either side to negotiate. Alternatively, they could be used as the objective for a scenario - to rescue a crew or a valuable cargo - The rocks included in the terrain pack also work perfectly on ANY other games table as smaller hills, rocks and mounds to add obstacles, cover, and visual excitement to any other warlord games, game.

    *Models supplied unassembled and unpainted*
- name: Black Seas Rulebook
  sku: 799910002
  ean: 9781911281504
  eanSource: shopify:entoyment.co.uk
  productType: book
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/black-seas-rulebook
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/799910002_BSRulebookandspecialmini01_88a271c6-fd3a-4ee7-b794-a2d4dfc883ce.jpg?v=1657715061
  status: current
  description: |-
    Take control of your very own fleet of the greatest sailing warships of all time in this action packed, exciting naval wargame! Recreate the thrilling battles of the age of sail in all their glory, with a unique and innovative initiative game system based around the most important factor of sail powered combat: the wind. From majestic fleet engagements of ships of the line to daring clashes of frigates and nimble brigs, rake your enemies with withering broadsides or launch heroic boarding actions.

    These comprehensive rules allow you to fields fleets of vessels from the tiniest of gunboats to first raters; true giants of the waves with three decks of heavy cannon. Rules for the main protagonists of the era - the French, Spanish, American and Royal Navies - are covered, including special characters like Nelson and Villeneuve and famous ships such as Victory, the USS Constitution and the hulking Santissima Trinidad.

    Thirteen scenarios range between merchant raids, running blockades and fighting pitched battles, including the defining battle of the age - Trafalgar. Land lubbers needn't worry as there's a handy guide to sailing vessels and naval terms.

    The Rulebook comes with a web-store-only exclusive 28mm miniature - the Sea Wolf! Brandishing a pistol, with a dirk strapped to his arm, this ferocious fighter is the perfect starting point for a Black Powder landing party!
