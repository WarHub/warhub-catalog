    Bundle Contains:

    - **Black Seas: Santa Ana** - A 112-gun 1st rate ship of the line of the Spanish Navy who saw her most famous action at the Battle of Trafalgar, where she was involved in a tremendous battle with Collingwood’s HMS Royal Sovereign.
    - **Black Seas: La Princesa** - A 6th rate frigate launched in 1778, she served for over three decades, playing an important role in the exploration of the Pacific Northwest as well as the routine work of provisioning other ships stationed off the coast of America. She was very sturdily built and used to take control of key land positions.
    - **Black Seas: Santisima Trinidad** - The Santisima Trinidad was a Spanish first-rate ship of the line. At launch in 1769, she had 112 guns, though this number gradually increased. between 1795 and 1796 she was upgraded to 130 guns, and in 1802 this number was increased to 140. Following this last rebuild, she was the heaviest armed ship in the world, bearing more guns than any other ship in the Age of Sail. At Trafalgar she served as the flagship of Rear Admiral Baltasar Hidalgo de Cisneros as part of a combined Franco-Spanish fleet.
    - **Black Seas: Spanish Navy 3rd Rates of Renown** – Containing Monarca, Argonauta & San Justo
