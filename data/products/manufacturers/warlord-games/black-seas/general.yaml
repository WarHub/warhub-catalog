- name: 'Black Seas: Russian Navy Famous Ships Bundle'
  sku: 799915001
  productType: single_kit
  priceGbp: 72.25
  url: https://store.warlordgames.com/products/black-seas-russian-navy-famous-ships-bundle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/799915001_BlackSeasRussianFamousShipsBundle01.jpg?v=1657212842
  status: current
  description: |-
    This bundle conveniently collects all the named famous vessels for the Russian Navy available in Black. As an added bonus, you’ll get a digital version of the Black Seas Hold Fast! absolutely free.

    Bundle Contains:

    - **Black Seas: Blagodat** - A huge 130-gun first rate ship-of-the-line, possibly based on the designs of the Spanish Santisima Trinidad.
    - **Black Seas: St Pavel** - A 2nd rate ship-of-the-line built on the Black Sea and became part of the Black Sea fleet. She also saw action in the Mediterranean, where she helped capture several coastal towns and fortifications.
    - **Black Seas: Azov** - A 74-gun ship-of-the-line armed with 24-pdrs and 36-pdrs. This ship was at the centre of the fight in the Battle of Navarino in 1827. She was regarded as the finest ship in the Russian Navy for at least four years, after which she was left to rot.
    - **FREE Black Seas: Hold Fast! Digital Edition \(PDF\)** - Hold Fast! is a supplement for the Black Seas age of sail game. Inside, find new ways to play, such as charting your course as an independent smuggler or following a navy career from lieutenant to admiral, 16 new scenarios and rules for entirely new fleets and vessels.

    *Models supplied unassembled and unpainted*
- name: 'Black Seas: United States Famous Ships Bundle'
  sku: 799914003
  productType: box_set
  priceGbp: 120.70
  url: https://store.warlordgames.com/products/black-seas-united-states-famous-ships-bundle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/799914003_BlackSeasUSFamousShipsBundle01_757bf1c5-b50d-4eab-a0ec-0be2f0b17b01.jpg?v=1657274408
  status: current
  description: |-
    This bundle conveniently collects all the named famous vessels for the U.S. Navy available in Black Seas \(excepting for those that can be found in the [U.S Starter Fleet\)\).](https://store.warlordgames.com/products/u-s-navy-fleet-1770-1830) As an added bonus, you’ll get a digital version of the Black Seas Hold Fast! absolutely free.

    Bundle Contains:

    - **Black Seas: USS Independence** - USS Independence was the first ship of the line launched by the US Navy. She operated mainly as a deterrent as, during her lifetime, she was not involved in any major conflict, being blockaded in port alongside USS Constitution until the end of the War of 1812.
    - **Black Seas: USS Ohio** - One of the few US 3rd rate ships built after the War of 1812, sailing as part of the Mediterranean Squadron under Commodore Isaac Hull in the late 1830s.
    - **Black Seas: USS North Carolina** - Considered to be the most powerful naval vessel afloat during her time as flagship to US Commodore John Rodgers in the Mediterranean from 29 April 1825 to 18 May 1827.
    - **Black Seas: USS Constitution** - USS Constitution was one of six Heavy Frigates commissioned by the United States Congress in 1794 to protect American shipping against Barbary Pirates in the Mediterranean. These frigates were designed to outmatch the frigates of any other nation while remaining nimble enough to slip away from larger ships-of-the-line.
    - **Black Seas: USS Essex** - The USS Essex was a 36-gun frigate that participated in the Quasi-War with France, the First Barbary War, and the War of 1812. She was very successful in disrupting British whaling in the Pacific, before being captured in 1814, and re-purposed as the HMS Essex under the Royal Navy.
    - **FREE Black Seas: Hold Fast! Digital Edition \(PDF\)** - Hold Fast! is a supplement for the Black Seas age of sail game. Inside, find new ways to play, such as charting your course as an independent smuggler or following a navy career from lieutenant to admiral, 16 new scenarios and rules for entirely new fleets and vessels.

    *Models supplied unassembled and unpainted*
