  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/799912004_BlackSeasFrenchFamousShipsBundle01.jpg?v=1657211065
  description: |-
    This bundle conveniently collects all the named famous vessels for the French Navy available in Black Seas \(excepting for those that can be found in the [French Navy Starter Fleet\).](https://store.warlordgames.com/products/french-navy-fleet-1770-1830) As an added bonus, you’ll get a digital version of the Black Seas Hold Fast! absolutely free.

    Bundle Contains:

    - **Black Seas: L'Orient** – Orient was of the Océan-class of ships. These were a series of 118-gun three-decker ships of the line of the French Navy, designed by engineer Jacques-Noël Sané. At the Battle of the Nile, she served as flagship of the invasion of Egypt, where she suffered an infamous fate – the ship detonating in an explosion so violent that night briefly turned into day.
    - **Black Seas: French Navy 3rd Rates of Renown** – Containing Indomptable, Formidable, & Argonaute.
    - **FREE Black Seas: Hold Fast! Digital Edition \(PDF\)** - Hold Fast! is a supplement for the Black Seas age of sail game. Inside, find new ways to play, such as charting your course as an independent smuggler or following a navy career from lieutenant to admiral, 16 new scenarios and rules for entirely new fleets and vessels.

    *Models supplied unassembled and unpainted*
