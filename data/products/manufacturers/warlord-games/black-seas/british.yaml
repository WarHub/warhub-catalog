- name: 'Black Seas: Cutters Squadron'
  sku: 795000001
  productType: single_kit
  priceGbp: 29.50
  url: https://store.warlordgames.com/products/black-seas-cutters-squadron
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/795000001_Black-Seas---Cutters-squadron1.jpg?v=1626049819
  status: current
  description: |-
    Cutters were usually tiny or small vessels with a single mast. Designed for speed more than transport capacity, the mast has a triangular aft \(behind the mast\) sail rigged fore and aft \(from the front to the rear\) and a headsail \(a triangular sail rigged in front of the mast\).

    Though unable to compare in power to the heavily armed ships of the line, these vessels nevertheless played an important role in the Napoleonic Wars, ferrying supplies & troops, as well as carrying information around the fleet. Their swiftness made them especially suited for this latter purpose.

    In Black Seas, Cutters are considered unrated ships with 2 broadside light cannons. They share the highest Rate of Knots value in the game and thus provide an extra dimension to gameplay as they zip about the ocean battlefield.

    *Models supplied unassembled and unpainted*
- name: 'Black Seas: Bomb Ketch Squadron'
  sku: 792410006
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/black-seas-bomb-ketch-squadron
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/792410006_Black-Seas_Bomb-Ketch-Squadron1.jpg?v=1626049818
  status: current
  description: |-
    A bomb ketch’s primary armament was not cannon or carronade, but a mortar mounted near the bow elevated at a high angle, that employed explosive shells rather than solid shot. They were designed primarily as bombardment vessels \(hence the name bomb ketch\), and were deployed against fixed land positions.

    Though the British first employed a bomb vessel in 1347, it was the French who would develop a design \(in the late 17^th^ century\) closer to those seen in the Age of Sail. The British copied and refined those designs over the next century, which led to two-masted ketches. Further development over the age of sail would result in bomb vessels designed as full-rigged ships \(with three masts\) – which allowed them to function as escort sloops between battles.

    A bomb ketch is treated as a small vessel in Black Seas with a mortar mounted on the bow. It functions similarly to a gunboat, but benefits from greater speed and durability.

    *Models supplied unassembled and unpainted*
