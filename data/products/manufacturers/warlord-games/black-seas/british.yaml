- name: 'Black Seas: Galleon squadron'
  sku: 792410018
  productType: single_kit
  priceGbp: 32.00
  url: https://store.warlordgames.com/products/black-seas-galleon-squadron
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/792410018_Black-Seas_Galleonsquadron01.jpg?v=1649166677
  status: current
  description: |-
    Galleons were large, multi-decked sailing ships that fell out of favour as naval-war vessels as that role was supplanted by purpose-built ships-of-the-line during the latter period of the Age of Sail. Regardless, they remained a mainstay of maritime commerce well into the 19th century. Generally carrying three or more masts, they are recognizable by their prominent squared off raised sterns. They remained a mainstay of maritime commerce well into the 19th century.

    Though Black Seas is primarily concerned with the Carronade era, Hold Fast! introduces guidance for playing games set during a 'simpler time'. You'll thus find their rules for inclusion in games as large ships. The ship profile of a galleon varies dependent on the era in which the game you are playing is set.

    Contains 3 resin & metal vessels plus game aids

    *Models supplied unassembled and unpainted*
- name: 'Black Seas: 2nd Rate'
  sku: 792411004
  productType: single_kit
  priceGbp: 28.50
  url: https://store.warlordgames.com/products/black-seas-2nd-rate
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/792411004_Black-Seas_2nd-Rate01.jpg?v=1648045817
  status: current
  description: |-
    Within the Royal Navy system of rating the ships of a fleet were designated based on the number of guns they carried. A 2nd rate ship-of-the-line was something of a hybrid; carrying between 90 and 98 guns, sitting in between the larger statures of 1st rates and the smaller but far-more popular 3rd-rates, there were relatively few 2nd rates built during the Carronade era.

    Three-decker 2nd-rates were primarily used by the British. Their height relative to their length lent them a reputation as handling poorly. They were, however, able to withstand great punishment, and could often be mistaken as 1st rates at a distance, giving enemy commanders much pause for thought where engaging was concerned.

    Contains 1 resin & metal vessel plus game aids

    *Models supplied unassembled and unpainted*
- name: 'Black Seas: Galleys'
  sku: 792410013
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/black-seas-galleys
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/792410013-Black-Seas-Galleys1.jpg?v=1626049926
  status: current
  description: |-
    Though galleys were out of favour by the Age of Sail, they were still used. Galleys are very low, long, and slender ships that use banks of oars as their main mode of propulsion. Identified easily by their long hulls and shallow drafts, they still maintained sails that could be used should the winds prove favourable – though this never superseded manpower as the primary means of manoeuvrability.

    In Black Seas, galleys can deploy oars and, if needed, move independently of the wind. While moving under oars, these ships can move as if at Battle Sails, no matter where the wind is coming from. However, as the crew is busy rowing, the ship will shoot with an additional -2 penalty. Galleys may also deploy their sails, following the same rules as all other sailing ships. However, in order to switch from sails to oars, or vice versa, a ship must spend one full Turn without shooting.

    Originating in the Mediterranean by the early naval powers – notably the Greeks, Illyrians, Phoenicians, and Romans, the galley remained the predominantly used types of vessels used for both war and piracy in those seas until the end of the 16th century. Though the advent of the lateen sail used in hybrid vessels like xebecs had displaced the use of galleys by the 18th century, the vessels still saw some use. The last recorded battle where galleys took a significant part in the Mediterranean was at Matapan in 1717; however, the vessels enjoyed a brief resurgence in the wars of the 18th century between Russia, Sweden and Denmark.

    This pack includes a squadron of three galleys for inclusion in Black Seas fleets. You’ll find rules for their use with the included ship cards.

    *Models supplied unassembled and unpainted*
