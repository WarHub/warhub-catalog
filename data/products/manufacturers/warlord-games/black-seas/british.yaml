- name: 3rd Rates Squadron (1770 - 1830)
  sku: 792010002
  ean: 5060572505148
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 37.50
  url: https://store.warlordgames.com/products/3rd-rates-squadron-1770-1830
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/792010002_3rdRatesSquadron02_84ec2bbf-1c2c-45a5-8aa7-768fd1f8e628.jpg?v=1653478192
  status: current
  description: |-
    A 3^rd^ rate ship, as defined by the British rating system, was a ship of the line which mounted between 64-80 guns. Usually, this would mean two gun decks. Despite their relative size and power compared to larger 1^st^ and 2^nd^ rates, it was considered that 3^rd^ rates maintained an effective, perhaps even superior balance between sailing ability, firepower and cost.

    For a number of nations, 3rd rates were the most popular ship size. Cheaper to operate and easier to sail without the sacrifice of offensive capability, the only ships a 3rd rate could not single-handedly engage were larger three-decked ships. A large number of 3rd rates were built and employed on a variety of missions.

    Read more about 3rd Rates and their role in Black Seas **[here &gt;&gt;](http://www.warlordgames.com/focus-third-rates-1770-1830/)**

    **The Kit**

    The 3rd Rates Squadron kit is generic, meaning you can use it to represent ships of any nation. The frame has options for you to customise your ships, in the form of differing figureheads and stern plates; enabling you to make your fleet truly unique.

    The 3rd Rates Squadron box contains all you need to get these vessels to the tabletop. These are suitable for navies of any nation. The kit includes a bobbin for rigging your vessels, sails and decals for every nation capable of building & sailing third rates, as well as all the gaming materials for using the vessels in your games of Black Seas.

    **This box set contains:**

    - 3 plastic 3rd Rates
    - Printed sails
    - ship cards
    - Wake markers
    - Bobbin for rigging
    - Acetate Ratlines
    - Sheets of flags & pennants

    *Models supplied unassembled and unpainted*
