- name: 'Digital Black Seas: Hold Fast PDF'
  sku: 799410005
  productType: single_kit
  priceGbp: 5.00
  url: https://store.warlordgames.com/products/digital-black-seas-hold-fast-pdf
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/799410005_BlackSeas_HoldFastPDF01.jpg?v=1682533014
  status: current
  description: |-
    Note that this a digital version of the Hold Fast supplement.

    **Black Seas** focuses on the golden age of sail, which encompasses the period between 1770 and 1830. During this period the navies of Europe and beyond fight for dominance of the high seas. Hold Fast! is a supplement for the Black Seas age of sail game. Inside, find new ways to play, such as charting your course as an independent smuggler or following a navy career from lieutenant to admiral.

    Fight in 16 new scenarios that range between cat-and-mouse chases, shallow river battles, passenger escorts, and mutinies. All culminating in the explosive Battle of the Nile which saw the spectacular demise of the French Flagship, L’Orient. Launch new famous ships, such as HMS Agamemnon, Santa Ana, or USS Niagara. Commission new captains of renown for the British, French, Spanish and US navies, such as Louis-Antoine-Cyprien Infernet or John Paul Jones. Or set sail with entirely new fleets from the Russian, Swedish, Dutch, Portuguese, or Ottoman Empire navies. Alternatively, become the scourge of the Mediterranean at the head of a Barbary Coast pirate fleet. Finally, alongside all the new additional advanced rules and ship statistics, enjoy three solo scenarios or introduce the nightmare terrors of the deep that are born from sailors’ superstitions.

    When the continuous thunder of enemy cannon fire and splintering shards of flying wood are erupting all around you, remember: do your duty and hold fast!

    A copy of Black Seas is needed to use this supplement.
- name: 'Black Seas: Royal Navy Famous Ships Bundle'
  sku: 799911004
  productType: box_set
  priceGbp: 134.30
  url: https://store.warlordgames.com/products/black-seas-royal-navy-famous-ships-bundle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/799911004_BlackSeasRNFamousShipsBundle01.jpg?v=1657210373
  status: current
  description: |-
    This bundle conveniently collects all the named famous vessels for the Royal Navy available in Black Seas \(excepting for those that can be found in the [Royal Navy Starter Fleet\).](https://store.warlordgames.com/products/royal-navy-fleet-1770-1830) As an added bonus, you’ll get a digital version of the Black Seas Hold Fast! absolutely free.

    Bundle Contains:

    - **Black Seas: HMS Agamemnon** - Known to be Lord Nelson’s favourite ship, HMS Agamemnon was a 64-gun 3rd rate ship-of-the-line with a sleek hull. She saw plenty of active service during the American War of Independence, French Revolutionary War and Napoleonic Wars, most notably at Trafalgar as part of Nelson's weather column, where she helped force the surrender of the colossal Spanish four decker Santisima Trinidad.
    - **Black Seas: HMS Surprise** - A 5th rate ship launched as the Unité, sailing for the French Navy before being captured in 1796 by the Royal Navy and renamed HMS Surprise. Perhaps most famously the Surprise served as the main ship for author Patrick O'Brien's Jack Aubrey and also in the associated film, Master & Commander.
    - **Black Seas: HMS Speedy** - A 14-gun brig with a very colourful history. She was captured by France in 1794, then re-taken by the British in 1795, captured again by France in 1801 and finally donated to the Papal States in 1802. Furthermore, HMS Speedy was one of the ships that made Thomas Cochrane famous for capturing so many enemy vessels, sometimes even those much larger than his own.
    - **Black Seas: HMS Victory** - HMS Victory was a terrible and awe-inspiring sight to both enemies and allies. It has become one of the most famous ships in the world and is still in commission in the Royal Navy to this day; as of 2019 a total of 241 years of service.
    - **Black Seas: HMS Royal Sovereign** - Prior to her famous role at the Battle of Trafalgar, HMS Royal Sovereign participated in the battles of "The Glorious First of June" as the flagship of Vice-Admiral Thomas Graves, and was Cornwallis' flagship in his famous retreat of 16 June 1795. At Trafalgar, HMS Royal Sovereign was the flagship of Admiral Collingwood, at the head of the Leeward line. It was the first ship to engage in the action, breaking the Franco-Spanish Line and engaging the Spanish Santa Ana.
    - **Black Seas: Royal Navy 3rd Rates of Renown** – Containing HMS Bellereophon, HMS Revenge & HMS Tonnant.
    - **FREE Black Seas: Hold Fast! Digital Edition \(PDF\)** - Hold Fast! is a supplement for the Black Seas age of sail game. Inside, find new ways to play, such as charting your course as an independent smuggler or following a navy career from lieutenant to admiral, 16 new scenarios and rules for entirely new fleets and vessels.

    *Models supplied unassembled and unpainted*
- name: 'Black Seas: 6th Rates Squadron'
  sku: 795110002
  productType: single_kit
  priceGbp: 37.00
  url: https://store.warlordgames.com/products/black-seas-6th-rates-squadron
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/795110002_Black-Seas_6th-Rates-squadron01.jpg?v=1657209838
  status: current
  description: |-
    6th Rates were the smallest of the warships in the Royal Navy rating system, which would have been generally adopted worldwide. This category covered ships with between 20 and 28 guns on a single deck. Although not considered to be powerful enough to take their place alongside larger ships of the line they performed well in other duties and in smaller engagements where the 1st and 2nd Rate man-o-war weren't necessary. Well known 6th Rates include the fictional vessel HMS Surprise as captained by author Patrick O'Brian's Capt. Jack Aubrey whilst C.S. Forester's Horatio Hornblower takes command of HMS Atropos in one of his novels.

    Contains three vessels \(a mixture of resin, plastic & metal\) and game aids.

    *Models supplied unassembled and unpainted*
- name: 'Black Seas: 1st Rate'
  sku: 792410017
  productType: single_kit
  priceGbp: 33.50
  url: https://store.warlordgames.com/products/black-seas-1st-rate
