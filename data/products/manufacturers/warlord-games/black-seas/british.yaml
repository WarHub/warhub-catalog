    Take control of your very own fleet of the greatest sailing warships of all time in this action packed, exciting naval wargame! Recreate the thrilling battles of the age of sail in all their glory with a unique and innovative initiative game system based around the most important factor of sail powered combat: the wind. From majestic fleet engagements of ships of the line to daring clashes of frigates and nimble brigs, rake your enemies with withering broadsides or launch heroic boarding actions.

    The Master & Commander starter set gives you everything you need to get started. Alongside a softback copy of the Black Seas Rulebook, you'll get nine beautifully detailed plastic miniatures; three frigates and six brigs. You'll also get sails, rigging and flag sheets for all your ships and all the ship cards, wake markers and tokens that you'll need to play. We've also included an A0 battle mat, dice and rulers!

    The Starter Set comes with a web-store-only exclusive 28mm miniature - the Sea Wolf! Brandishing a pistol, with a dirk strapped to his arm, this ferocious fighter is the perfect starting point for a Black Powder landing party!

    Contents:

    - Softback 96 page rulebook
    - Highly detailed 1:700 scale plastic ship models - three Frigates and six Brigs
    - Assembly guides, printed acetate ratlines, full-colour sails sheets, rigging thread, full colour Royal Navy, French Navy and privateer / pirate flags
    - A0 size double-sided battle mat
    - 3 die-cut punchboards \(islands, sandbars, Martello Tower, rulers, game tokens etc\), wake sheets, ship datacards, Black Seas wool for smoke & fire
    - Game dice \(8 D10s, 2 D6s and 1 D3\)

    *Models supplied unassembled and unpainted*
