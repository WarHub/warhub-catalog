  description: |-
    Not all Citi-Def units have a Jaeger Squad but those who do often consider them to be an elite force. Each member of the Jaeger Squad is a full-time Citi-Def soldier dedicated to protecting their block against all enemies. Training hard in infiltration skills and the disruption of communications, the Jaeger Squad is as close to a commando unit as any Citi-Def is likely to get.

    Though still far from the highly disciplined Judges, members of the Jaeger Squad gain a great deal of respect from other soldiers of their Citi-Def unit and can prove to be quite lethal in block wars.

