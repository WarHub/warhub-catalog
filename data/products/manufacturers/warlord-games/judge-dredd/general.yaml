  status: current
  description: |-
    There are many types who join the Citi-Def for many different reasons. Those who join the crew of a weapon emplacement embrace raw destruction above all else. With a tendency to shout in normal conversation due to time spent so close to heavy weaponry, these Citi-Def soldiers are loud, bombastic, and have an unhealthy passion for big guns - which they normally give a girl’s name.

    Only mounted on vehicles and semi-mobile emplacements, the sonic cannon is a massive weapon intended to incapacitate large crowds through ultrasonic waves causing nausea, shortness of breath, or even more unpleasant results. Found in the armouries of both the Justice Department and the Citi-Def, its only real purpose is to be used against the citizens of Mega-City One.

    Contains one Warlord Resin^TM^ weapon emplacement with two crew and three game cards.

    *Models supplied unassembled and unpainted*
