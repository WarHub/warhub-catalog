  description: |-
    Lead the attack in the name of the Motherland with these Soviet HQ models.

    Soviet junior officers needed to be aggressive, competent, and above all brave, as they led their men in defence and attack, regardless of danger. They would not do this alone, however, as many specialists would often accompany officers in battle, to accomplish a variety of different tasks.

    Leadership is absolutely essential in *Bolt Action*, with the platoon system meaning you’ll always be in need of good officers! You get two in this set, along with an always-useful Medic, plus a radio operator – perfect for serving as a Forward Observer or as a Spotter for one of your indirect-fire weapons.

    Contains four Soviet Army HQ figures, in Warlord Resin, with plastic bases.

