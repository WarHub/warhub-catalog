  status: current
  description: |-
    Get those heavy weapons into action!

    Soviet forces made extensive use of mortars and machine guns to support their infantry - directly and indirectly - at the front, allowing their massed attacks and dogged defensive actions to succeed.

    Heavy Weapons Platoons are a crucial part of any *Bolt Action* army - as the name suggests, they’re where you find your infantry support weapons, particularly mortars and machine guns! These can play a huge role in the game, providing you with the firepower you need to back up your Rifle Platoons. This box gives you everything you need to support your winter-themed British and Canadian troops with a Heavy Weapons Platoon - two medium machine guns lay down direct fire, while a medium mortar team brings destruction from on high, plus a Platoon Commander to lead them!

    Box contains one Soviet officer, two metal medium machine guns with three Warlord Resin Soviet crew each and one metal medium mortar with three Warlord Resin Soviet crew, with plastic bases.

    *Sculpted by Wojciech Flis. Studio miniatures painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
- name: Soviet Army Medium Mortar Team
  sku: 403214006
  ean: 5060917995948
  eanSource: shopify:flipsidegaming.com
  productType: single_kit
  priceGbp: 11.50
  url: https://store.warlordgames.com/products/soviet-army-medium-mortar-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403214006_SovietArmyMediumMortarTeam01.jpg?v=1754045339
  status: current
  description: |-
    Call upon indirect fire to support your Soviet troops!

    The Soviet Union made good use of medium-calibre mortars to support their infantry, with the 82mm M-37 and M-41 types being the most common. These were very similar to those used around the world, the basic design being simple and almost foolproof.

    A vital part of Heavy Weapons Platoons in *Bolt Action*, medium mortars provide commanders with the ability to arc indirect fire over the heads of their troops, and crucially ignore cover when they hit their targets. Ranging in on the enemy, directed by spotters, medium mortars can control huge areas of the battlefield when well-used.

    Targets sighted - start ranging in today!

    Contains one metal medium mortar with three Warlord Resin Soviet crew, and plastic base.

    *Sculpted by Wojciech Flis. Studio miniatures painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
- name: Soviet Army MMG Team
  sku: 403214005
  ean: 5060917995931
  eanSource: shopify:flipsidegaming.com
  productType: single_kit
  priceGbp: 11.50
  url: https://store.warlordgames.com/products/soviet-army-mmg-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403214005_SovietArmyMMGTeam01.jpg?v=1754044986
  status: current
  description: |-
    Give your Soviet troops the covering fire of a machine gun!

    The venerable PM 1910 served as the Soviet Union’s primary medium machine gun during the Second World War. A derivative of the legendary Maxim Gun, it provided reliable, accurate direct fire capability to all branches of the military, and would continue to serve long after the war’s end, despite its advancing years.

    MMG teams are the backbone of Heavy Weapons Platoons in *Bolt Action*, providing lethal anti-infantry fire that can sweep units from the board. No self-respecting Soviet commander should be without at least one, to support their troops as they advance.

    Bring up the machine guns, now!

    Contains one metal medium machine gun with three Warlord Resin Soviet crew, and plastic base.

    *Sculpted by Wojciech Flis. Studio miniatures painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
