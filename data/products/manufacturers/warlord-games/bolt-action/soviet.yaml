  status: current
  description: |-
    Tachanka were simply horse-drawn carts or wagons with a machine gun mounted on the back. They were a common feature of the Russian Civil War when they were employed with great success to bring fast-moving heavy weapons support to cavalry formations. Purpose-built Tachankas were produced for the Red Army and were deployed with Cossacks and other cavalry. Although by 1941 they were as anachronistic as the cavalry they supported, Tachanka continued to see service until the end of the Great Patriotic War, most commonly on the open steppes of the south.

    Pack contains 3 metal crew figures and 1 metal gun.

