- name: Ford GPA Amphibious Jeep with Soviet Army Crew
  sku: 402604001
  productType: single_kit
  priceGbp: 20.50
  url: https://store.warlordgames.com/products/ford-gpa-amphibious-jeep-with-soviet-army-crew
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402604001_FordGPAwithSovietArmycrew01.jpg?v=1754045528
  status: current
  description: |-
    Cross all kinds of terrain - even water - with the Ford GPA!

    A development of the ubiquitous Jeep, the GPA \(commonly known as the ‘Sea Jeep’ or ‘Seep’\) was intended to give US forces a lightweight amphibious utility vehicle to support beach assaults. Over 12,000 would be built, and around a third of these would go to Russia as Lend-Lease, with the majority remaining in US service across the conflict.

    The GPA is a great choice for any Soviet *Bolt Action* force themed around an amphibious assault, or players with a fondness for slightly more unusual vehicles! On the tabletop, it’s simply represented by giving the standard Gaz Jeep the Amphibious special rule for no additional points cost. This allows it to take up to three men across water-filled obstacles, providing extra tactical mobility and looking great while doing it!

    Soggy battlefield? No problem for the Ford GPA!

    *Studio model painted by Darek Wyrozebski.*

    *Models supplied unassembled and unpainted*
- name: Katyusha
  sku: 402014009
  ean: 5060917995528
  eanSource: shopify:flipsidegaming.com
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/katyusha
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402014009_Katyusha01_0abe5fbd-7552-43b9-94dd-6b0d79d7b9d3.jpg?v=1756310900
  status: current
  description: |-
    Rain fire from the skies with the mighty Katyusha!

    A simple and very Soviet concept, the name ‘Katyusha’ refers to a long series of truck-mounted multiple rocket launcher systems, designed to provide a massive barrage against a target, then quickly reposition and strike again to avoid counterbattery fire. A wide variety of rocket sizes and trucks would be used, with one of the most common being the BM-13 launcher mounted on Lend-Lease Studebaker trucks.

    On the *Bolt Action* tabletop, the Katyusha sports a powerful Multiple Rocket Launcher, a weapon which requires both skill and luck to employ, but has absolutely devastating potential to cause damage. It’s a great piece of low-cost self-propelled artillery, and no Soviet Armoured Platoon is complete without at least one!

    Deliver a deadly barrage today!

    Box contains one plastic Kayusha multiple rocket launcher with two crew miniatures, assembly booklet, decal sheet and vehicle damage markers.

    *Studio models painted by Darek Wyrozebski.*

    *Models supplied unassembled and unpainted*
