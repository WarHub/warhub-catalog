  description: |-
    Built on the chassis developed for the L6/40, the Semovente 47/32 was an easy-to-produce tank hunter built as a stopgap measure to combat enemy armour. Mounting the excellent Elefantino anti-tank gun in an open-topped chassis gave the Italian forces some much-needed mobility in their anti-tank assets. The tank hunter initially fared well in the western desert, but lack of an armoured crew compartment became a glaring drawback in the system’s design. The Semovente 47/32 served from 1942 all the way through to 1945, finding use in the German army after the Italian capitulation.

