- name: SPA-Viberti Camionetta AS. 42
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '402418004'
  priceGbp: 30.00
  url: https://store.warlordgames.com/products/spa-viberti-camionetta-as-42
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402418004_SPA-VibertiCamionettaAS4201.jpg?v=1681408118
  description: |-
    The AS42 provided Italian forces with vehicles inspired by the effective tactics of the British SAS and Long Range Desert Group who were wreaking havoc in the Axis rear areas and providing valuable reconnaissance intelligence.

    Entering service in August 1942, the AS42 was very manoeuvrable with a top speed of 52 mph. Like their British counterparts, the Italian vehicles were armed with a variety of weaponry - 8mm Breda machine guns being supplemented by anti-tank rifle, anti-tank gun or anti-aircraft automatic cannon. Although designed to serve in the harsh conditions of North Africa, the AS.42 would also see action on the Western and Eastern Fronts.

    Often referred to as the 'Sahariana', this designation was more correctly attached to the vehicle sent into the desert. These vehicles are easily recognizable by the racks of fuel cans along their flanks. In 1943 another version of this vehicle would see the fuel racks replaced by ammunition stowage boxes and be referred to as the 'Metropolitana'.

    Initially forming the Raggruppamento Sahariano AS, seeing welcome results against the LRDG, four new units were raised – the Compagnie Arditi Camionettista \(Jeep Scouting Companies\). The new formations served more as long-range reconnaissance units than directly tackling the LRDG and SAS.

    This vehicle is supplied with parts to make either a Sahariana or Metropolitana along with two medium machine guns and four Arditi crew figures. In games of Bolt Action it can be included in Armoured Platoons \(use the Sahariana army list entry\).

    *Models supplied unassembled and unpainted*
