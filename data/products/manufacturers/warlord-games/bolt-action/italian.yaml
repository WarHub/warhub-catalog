- name: Camionettisti - Sahariana AS42 Squadron
  category: miniatures
  packaging: box
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '409905801'
  priceGbp: 114.00
  url: https://store.warlordgames.com/products/camionettisti-sahariana-as42-squadron
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/409905801_CamionettistiSaharianaAS42Squadron01.jpg?v=1681409152
  description: |-
    The examples set by British special forces soon led to the development of similar units by the Italian Army. One such company was the light vehicle mounted X Reggimento Arditi; formed of the 103rd Arditi Camionettisti, a HQ unit and a special Carabinieri military police, and placed at the disposal of the Italian Army Supreme Command for operations in the Western Desert.

    As befitted their mobile role in the harsh conditions of the desert, the Camionettisti were provided with a vehicle specifically designed for that environment, the Camionetta Sahariana AS .42. Based on the chassis of the AB42 armoured car, its powerful engine and large tyres allowed it to negotiate even the harshest of desert terrains. Despite being late to be put into service as compared to other special forces’ equipment, the Camionetta was arguably the best such vehicle suited for such a role.

    Whilst the AS. 42 generally bristled with machine guns, the Camionettetisti also knew they would be liable to encounter other lightly armed forces such as armoured cars. To counter such threats, Sahariana were often fitted with either a Solothurn anti-tank rifle, a 20mm Breda or a 47mm anti-tank gun. Get one of each of the variants in this great value bundle.

    In games of Bolt Action these are armoured cars \(use the Saharina army list entry\) and this bundle makes up an Armoured Platoon. Additional rules for fielding Italian special forces and desert raiders in games of Bolt Action can be found in the campaign supplement, The Western Desert.

    Full Contents:

    - SPA-Viberti Camionetta AS. 42
    - SPA-Viberti Camionetta AS. 42 with Breda 2cm gun
    - SPA-Viberti Camionetta AS. 42 with Solothurn ATR
    - SPA-Viberti Camionetta AS. 42 with 47mm ATG

    *Models supplied unassembled and unpainted*
- name: Carro Armato M13 Platoon
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '402018004'
  priceGbp: 62.00
  url: https://store.warlordgames.com/products/carro-armato-m13-platoon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402018004_CarroArmatoM13platoon01.jpg?v=1600960162
  description: |-
    Produced by Fiat Ansaldo, the **M13/40** was the main battle tank of the Italian army in World War II and served throughout the war following its introduction in 1940. Although designated as a medium tank it was more in line with the light tanks of other nations at the time.

    With armour up to 42mm thick, and armed with a 47mm main gun backed up by up to four 8mm machine guns, it carried a four-man crew. Its diesel engine, whilst underpowered, giving a top speed of around 20mph, was less vulnerable to catching fire and had better range than petrol-fuelled vehicles.

    The most widely produced Italian tank of the war, the M13/40 battled on in the Western Desert and Italy despite Allied tanks far eclipsing it in firepower, speed and protection.

    This superb plastic kit can alternatively be assembled as a **Semovente Platoon**. The Semovente 75/18 self-propelled gun brings some much needed armoured reinforcements to Italian forces.

    The Semovente was an Italian self-propelled gun, built by mounting the 75mm Obice da 75/18 modello 34 mountain gun on the chassis of a M13/40 or M14/41 tank. It had riveted steel plates, which were thicker but also less sloped than in the original tank. Frontal armour was almost vertical, but it consisted of two plates rather than a single layer, which improved stopping power.

    Contains 3 plastic tanks

    *Models supplied unassembled and unpainted*
