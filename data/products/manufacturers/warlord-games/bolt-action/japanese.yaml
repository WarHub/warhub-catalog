  description: |-
    Sōkō Sagyō Ki also known as the SS-Ki, a fully tracked engineering vehicle, designed and brought into use in the 1930s in preparation for war against the Soviet Union. The Imperial Japanese Army \(IJA\) considered it to be one of its most versatile multi-function support vehicles, with 6 variants able to complete rolls from obstacle clearance to bridge laying

    The SS-KI actually had three flamethrowers \(five on the Bo!\) mounted on the hull, each pointing in a different direction!

    You can use this awesome flame thrower variant by using the rules from page 30 of the Empires in Flames - the Pacific and Far East Bolt Action supplement.

    *Model supplied unassembled and unpainted*
