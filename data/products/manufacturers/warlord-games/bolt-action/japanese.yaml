- name: Japanese Type 2 Ka-Mi amphibious tank
  sku: WGB-JI-113
  ean: 5060572506909
  eanSource: shopify:flipsidegaming.com
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/japanese-type-2-ka-mi-amphibious-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402416006_KaMiAmphibiousTank1.jpg?v=1706264850
  status: current
  description: |-
    The Type 2 Ka-Mi was the Imperial Japanese Navy’s first amphibious tank. Based upon the ubiquitous Ha-Go chassis with detachable pontoons and a boat hull to aid water travel. The Japanese Navy developed a series of amphibious tanks to support the Special Naval Landing Force during amphibious operations, such as those which the Japanese launched throughout their conquests of early 1941 and 1942.

    The main armament of the Ka-Mi was a high-velocity 37mm gun with a co-axial Type 97 light machine gun. It was also known to have been fitted with torpedoes on occasion – the tank could even be launched from the deck of Japanese submarines!

    Japan found itself fighting a defensive war, and so tanks changed their role to infantry support, functioning as mobile pillboxes. The Ka-Mi reportedly saw action in Marianas, the Marshall Islands, Guam, New Guinea, and during the invasion of Leyte.

    Contains one resin and metal amphibious tank, Bolt Action stat card, vehicle damage markers, full colour waterslide decals, Bolt Action order die.

    *Models supplied unassembled and unpainted*
- name: Japanese Type 4 Ke-Nu  light tank
  sku: WGB-JI-109
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/japanese-type-4-ke-nu-light-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-JI-109-Ke-Nu-a.jpg?v=1575566098
  status: current
  description: |-
    With the Type 97 Chi-Ha medium tanks undergoing up-armament and therefore a new turret, older Chi-Ha turrets were surplus to requirements. A use was found for them by marrying them to the hulls of the Type 95 Ha-Go light tank, giving birth to the Ke-Nu. Approximately 100 of this hybrid light tank were produced.

    Although the Ke-Nu's new 57mm gun gave it marginally better firepower than the Ha-Go, the larger turret added further weight and therefore more strain on the engine. This extra ton of weight dropped the maximum speed of the Ke-Nu down to 40 km/h. However, the Ke-Nu still suffered from the same weakness as it's forebears - armour that was too thin to be effective against Allied anti-tank weaponry.

    Pack contains 1 metal and resin tank and 1 metal crewman.

    *Note: Models supplied unassembled and unpainted*
