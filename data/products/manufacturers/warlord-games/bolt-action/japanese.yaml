    - Kempeitai Officer
    - Medic
    - IJA Infantry Squad
    - IJA Grenadier Squad
    - SNLF Squad
    - SNLF Grenadier Squad
    - Sennyuu Infiltration Team
    - IJA Engineer Squad
    - Medium Machine Gun Team
    - Suicide Anti-tank Team
    - Suicide Anti-infantry Team
    - Sniper Team
    - Lone Sniper
    - Light Mortar Team

