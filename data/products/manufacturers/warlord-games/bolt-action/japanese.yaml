  description: |-
    Infantry weapons teams are a vital part of any Bolt Action army, providing tactical flexibility for your force. This set includes three types of team to deal with different challenges.

    Sniper teams are perfect for taking out enemy officers, forward observers and team leaders, and their telescopic sights allow them to ignore cover saves. They can be included in Rifle Platoons.

    Suicide anti-tank teams are a unique feature of Japanese armies. Their lack of anti-tank guns capable of taking on heavier tanks such as the Sherman led the Japanese infantry to develop desperate anti-tank weapons, which often called upon a soldier to take an extreme risk or even to sacrifice his life. This set includes two single man teams that can be included in Rifle and Heavy Weapons Platoons.

    Flamethrowers are terrifying weapons, often used for assaulting defended positions. In Bolt Action they ignore cover saves so are well suited for this role, and can be included in Engineer Platoons.

    Contains:

    - Six Warlord Resin™ Figures
    - Plastic Bases
    - Four Order Dice

    Note that one of the sprues includes a spare bipod - you can use this to replace the monopod on the sniper rifle if you prefer. These figures are cast in our new and improved Warlord Resin Plus™. For more information on this material click [here](https://warlord-community.warlordgames.com/introducing-warlord-resin-plus/)

