- name: French Old Guard Grenadiers
  sku: WGN-FR-14
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/french-old-guard-grenadiers
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGN-FR-14-French-Old-Guard-Grenadiers-a.jpg?v=1575566140
  status: current
  description: |-
    There are few soldiers more famous than the Grenadiers of the Old Guard, veteran soldiers of many campaigns who would literally give their lives for their Emperor if needed.

    Formed from the Consular Guards in 1804, they were the elite of an elite, each man hand-picked for his height and military bearing. They proudly grew fierce moustaches, powdered their pigtailed hair, and wore gold earrings which gave them a glamorous if wild countenance.

    These loyal soldiers served their Emperor well and earned their nickname ‘Les Grognards’ (grumblers) as they marched all over Europe, smashing France’s foes on battlefield after battlefield.

    They were finally defeated in the savage fighting at the Battle of Waterloo in June 1815. Much of their action at this battle was hand-to-hand against Prussian troops and British firepower under the darkening skies. Such was their reputation and prowess in battle that they left a fighting legacy none could match.

    This boxed set contains Old Guard Grenadiers in campaign overalls, ready to fight for the honour of France and her Emperor.

    Contains:

    - 24 metal French Grenadiers of the Old Guard:
     - 4 metal command miniatures (officer, pioneer, standard bearer and drummer)
     - 20 Grenadiers
    - Background and painting guide including three full-colour flags.

    *Models supplied unassembled and unpainted*
- name: French Chasseurs a Cheval
  sku: WGN-FR-12
  ean: 5060393701927
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/french-chasseurs-a-cheval
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGN-FR-12-Chasseurs-a-cheval-a.jpg?v=1575566130
  status: current
  description: |-
    Formed originally back in 1743, the Chasseurs à Cheval (mounted hunters) were hard riding, green clad light cavalry whose main role was patrolling and raiding for the French armies. A good Chasseur was at home on his light horse, skirmishing with the enemy cavalry or scouting enemy movements and thus providing valuable intelligence for their commanders.

    Armed with carbine, curved sabre and bayonet (an item disliked by the cavalrymen who used it to dig up vegetables or ‘lost’ it on campaign) the Chasseurs were most happy in the saddle, although they were also trained to fight on foot should the need arise.

    At the height of the French Army under Bonaparte’s reign there were 31 regiments of Chasseurs à Cheval although only 15 regiments were available for the titanic Hundred Days campaign that culminated at the Battle of Waterloo. Our superbly detailed Chasseurs à Cheval are provided with covered and uncovered shakos as well as the colpacks favoured by the elite companies.

    Although requested not to wear the sabretache beyond 1808 many Chasseurs would keep this item well beyond this decree and thus we’ve included it on our models. For those of you wishing to follow regulations over reality simply snip the sabretache off.

    Contains:

    - 12 plastic easy-build French Light Cavalry
    - 1 metal officer and horse
    - Optional metal parts to make a trumpeter and eagle bearer
    - Includes options for shako, oilskin covered shakos and the elite company Colpack fur hat.

    *Models supplied unassembled and unpainted*
- name: Senegalese Tirailleurs Infantry section
  sku: WGB-FI-03
  productType: single_kit
  priceGbp: 26.50
  url: https://store.warlordgames.com/products/senegalese-tirailleurs-infantry-section
