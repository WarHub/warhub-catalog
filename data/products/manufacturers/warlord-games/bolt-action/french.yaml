    The six-wheeled truck was designed for the motorized dragoon regiments, which were part of the French cavalry's light mechanised divisions (DLM). The vehicle is also know as the *voiture de dragons portes*. It could carry ten men and was provided with machine gun mounts to be used by transported infantry.

    As well as a troop transporter it acted as a portee carrier for the 25mm Hotchkiss gun. The 3e BDP started carrying their anti-tank guns in their vehicles with the guns mounted facing backwards or forward with the windscreen lowered. Perfect material for conversion work!

