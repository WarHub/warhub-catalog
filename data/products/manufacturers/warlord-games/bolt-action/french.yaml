- name: AMC Schneider P16 Half-track
  sku: WGB-FI-102
  productType: single_kit
  priceGbp: 29.00
  url: https://store.warlordgames.com/products/french-amc-schneider-p16-half-track
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgb-fi-102-p16-schneider-1.jpg?v=1575565796
  status: current
  description: |-
    Mounting a 3.7cm gun and a co-axial 7.5mm machine gun this armoured half track was in use by the French military long before the start of the Second World War. As the war began the French army was in the process of phasing the Schneider's out and replacing them with the light Hotchkiss tank.

    The crew consists of a commander and two drivers - one facing forward and the other in position to drive the vehicle in the opposite direction should the need arise. We won't comment on the frequency of this strategy...

    Contains a resin and metal vehicle.

    *Models supplied unassembled and unpainted*
- name: Char D-1 Infantry tank
  sku: WGB-FI-106
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/char-d-1-infantry-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgb-fi-106-char-d1-a.jpg?v=1575565794
  status: current
  description: |-
    The French plan of 1926, calling for the creation of a Light Infantry Support Tank, led to the development of the existing Renault NC1 prototype into the Char D1. One hundred and sixty vehicles of this type were produced between 1931 and 1935.

    There was a pre-series of ten vehicles and later 150 standard vehicles were built. Until 1936 the vehicles were fitted with turrets because the intended cast ST2 turrets were not ready yet. The ST2 turret was armed with a short 47mm SA34 tank gun with a coaxial 7.5mm MG. The hull carried a 7.5mm MG in the bow.

    The type did not serve as an infantry support tank as originally intended, but as France's major battle tank of the early thirties.

    Pack contains 1 vehicle.

    *Note: Models supplied unassembled and unpainted*
- name: French Army 75mm light artillery
  sku: WGB-FI-25k
  productType: single_kit
  priceGbp: 22.50
  url: https://store.warlordgames.com/products/french-army-75mm-light-artillery
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-FI-25-French-Army-75mm-light-artillery1.jpg?v=1664462328
  status: current
  description: |-
    **Webstore Exclusive!** *This artillery piece is supplied with a laser-cut oval MDF base (100mm x 80mm) - only available through this webstore. You can now base your complete gun and crew together, making attractive mini-dioramas!*

    The famous seventy five millimetre gun of the Great War served France and other countries well in the Second World War too. Used extensively throughout the war this model was reliable and could take on bombardments or anti tank duties.

    *Note: Models supplied unassembled and unpainted*
- name: French Army MMG team
  sku: WGB-FI-23
  productType: single_kit
  priceGbp: 11.50
  url: https://store.warlordgames.com/products/french-army-mmg-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-FI-23-French-Army-MMG-team1.jpg?v=1664461927
  status: current
  description: |-
    The classic Hotchkiss medium machine gun had served France well in the Great war, and went on again, as did the Vickers in the British army to give solid reliable firepower to companies in defence and supporting fire on the advance. Rugged, slow firing but dependable , it was a good enough weapon for the Great war, but was showing its age, particularly against the German weaponry of 1940.Never the less, a must for your Infantry force

    *Note: Models supplied unassembled and unpainted*
- name: French Army 81mm medium mortar team
  sku: WGB-FI-24
  productType: single_kit
  priceGbp: 11.50
  url: https://store.warlordgames.com/products/french-army-81mm-mortar-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-FI-24-French-Mortar-a.jpg?v=1575565757
  status: current
  description: |-
    This pack is a great support choice, the Brandt 81mm mortar. Just prior to the war, the French army could field 2000 British 3”mortars, but it was of a metric calibre of 81mm. By the outbreak of war, French regiments could put out 9 x 60mm mortars and 8 x 81mm mortars, totalling 8000 in total. Mortars can put down short savage barrages that were justly feared by infantry on all sides. Gamers tip; one mortar is never enough....

    *Note: Models supplied unassembled and unpainted*
- name: Renault R39 Tank
  sku: WGB-FI-103
  productType: single_kit
  priceGbp: 24.50
  url: https://store.warlordgames.com/products/french-renault-r39-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-FI-103-R39-a.jpg?v=1575565795
  status: current
  description: |-
    The R39 is a variant of the R35 but armed with the heavier 37mm SA38 L/33 gun allowing it to operate in an anti-tank capacity.

    *Models supplied unassembled and unpainted*
- name: Renault R40 Tank
  sku: WGB-FI-105
  productType: single_kit
  priceGbp: 24.50
  url: https://store.warlordgames.com/products/french-renault-r40-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgb-fi-105-r40-d.jpg?v=1575565792
  status: current
  description: |-
    The Renault R40 or Char léger modèle 1935 R modifié 1939 was a French light infantry tank that was used early in World War II, an improvement of the Renault R35, of which it is often considered a variant.

    One of the key changes was an improvement on the suspension system that in the R35 had provided an uncomfortable ride and high track wear as well as being unreliable. Another addition is the inclusion of a radio set making the R40 much more tactically flexible than its predecessor.

    As well as being used by the French Army the Polish 10^th^ Armoured Cavalry Brigade was also equipped with R40's.

    *Models supplied unassembled and unpainted*
- name: 'Napoleonic Wars: French Heavy Cavalry 1812-1815'
  sku: FN120
  productType: single_kit
  priceGbp: 28.00
  url: https://store.warlordgames.com/products/napoleonic-wars-french-heavy-cavalry-1812-1815
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/fn120-french-heavy-cavalry-b_1.jpg?v=1575565689
  status: current
  description: |-
    The box contains 14 cavalrymen, including 1 officer, 1 trumpeter, 1 standard bearer. Although you can substitute the trumpeter and standard bearer for troopers giving you 13 rank and file if you like. All the figures come with both Cuirassier and Carabinier heads to allow you to build up units of either of these famous Heavy cavalry types. We are also providing enough arms to allow the whole unit to be ‘at the charge’ or a more relaxed shoulder swords. As there was spare room on the horse frame ( if we’d put another horse on it, it wouldn’t be the right ratio for the riders frame) we decided to add a dead British Infantryman, as well as a French one and some battlefield debris. So you’ll have 3 of each casualty in the box. The Carabiniers are using the square service portemanteau.

    *Models supplied unassembled and unpainted*
- name: "Napoleonic Wars: Vivandiere - The Soldier's Comfort 1789-1815"
  sku: WGN-FR-22
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/napoleonic-wars-vivandiere-the-soldier-s-comfort-1789-1815
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgn-fr-22-vivandiere-b.jpg?v=1575565677
  status: current
  description: |-
    Exempt from the 1793 "Law to Rid the Army of Useless Women" vivandieres would follow the French army and sell the soldiers food, drink, and sundries like tobacco, wig powder, and writing paper and ink. They were married to soldiers called "Vivandiers" who were the only soldiers granted permission to sell goods. Too busy fighting and drilling to sell, naturally this duty fell to their wives.

    Vivandieres would be a regular sight in many armies over the years that followed. They were to be seen in the armies of the Napoleonic wars, in the Crimean right up until the Great War. The United States' War Department even copied the idea and in the American Civil War patriotic women joined up on both sides.

    Warlord Games' Vivandiere is modelled preparing to defend her wares, pistol at the ready. The donkey is laden with characterful paraphenalia, looking like the loser in a game of Buck-a-roo. Never fear though Daphne! Our fearless generals will send their men to protect you!

    The model comes with two heads and two arms for you to choose from. For after the fight the Vivandiere can be equipped with a barrel of brandy and a glass - that will help get the lads back in action!

    *Contains a metal donkey and figure, supplied unpainted and will require assembly.*
