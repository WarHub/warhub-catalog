    Band of Brothers is the best way to get started with Bolt Action: Third Edition, whether you’re an absolute beginner or a hardened veteran of tabletop battles. Inside this box, you’ll find finely detailed plastic infantry - daring US Airborne and hard-bitten German Grenadiers - as well as two plastic half-tracks to support them in battle, and a double-sided battle mat with plastic scenery to set the stage for your games.

