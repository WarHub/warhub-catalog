    The Jagdtiger, or Hunting Tiger, was the heaviest and most powerful German tank destroyer of World War II. Based on the Tiger II, the turret was replaced by a fixed casement mounting a huge 128mm Pak 44 anti-tank gun.

    At 71 tons, the behemoth had nearly 10 inches of armour to the front of its casement housing, making it one of the most well protected tanks of the war. However, all this weight and protection came at the cost of reliability. Many roads and bridges simply couldn’t take its weight, and with only around 80 Jagdtigers reaching the front from late 1944, it could not have a decisive impact on the war.

