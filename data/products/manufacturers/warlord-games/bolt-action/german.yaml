    Your German Veterans need good leadership - these men have it in spades!

    The crucible of battle quickly forged raw recruits into disciplined and respected leaders of men, capable of achieving victory in seemingly impossible situations and keeping their troops alive through even the bloodiest battles. These men, and the specialists who made up their command groups, were essential to the German war effort.

    Officers, medics, and spotters are an essential part of any *Bolt Action* collection, supporting their troops with both leadership and powerful special abilities. Every Platoon needs a commander, and this set includes a brace - one senior leader directing the attack, while his junior colleague springs forward to lead it, armed to the teeth. Alongside them, a medic sprints to the aid of a wounded comrade, while a radio operator calls down powerful fire support.

