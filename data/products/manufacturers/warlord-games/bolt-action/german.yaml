    Lead your German forces to victory with these *Heer* Platoon Commanders!

    Officers are an essential part of any army – without them, there’s no-one to give orders! This is just as true in *Bolt Action* as in life, with each of your Platoons requiring an officer to lead them. These German *Heer* Platoon Commanders are just what your troops and your army list need, giving orders and leading their men into combat. Each of these fantastic sculpts is themed to lead a Rifle, Recce Infantry, Artillery, or Heavy Weapons Platoon, and of course can be used singly or with attendants!

