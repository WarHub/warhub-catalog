- name: Flak 37 8.8cm
  sku: 402012026K
  productType: single_kit
  priceGbp: 34.50
  url: https://store.warlordgames.com/products/flak-37-8-8cm
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402012026-8.8cm-flak-37-box-front.jpg?v=1575566787
  status: current
  description: |-
    **Webstore Exclusive!** This artillery piece is supplied with a laser-cut oval MDF base (170mm x 105mm) - only available through this webstore.

    Originally developed as an anti-aircraft weapon, the Flak 37 8.8cm (or Eighty-eight as it became known by Allied troops) had a high muzzle velocity, making it an exceptionally deadly anti-tank weapon as many Allied tank crews would learn to their peril. The 88 could also be deployed as a conventional artillery piece – as one infantryman noted, the 88 was 'anti-everything'...

    The 88 saw service on all fronts in which the Germans fought during WWII, including the Western Desert where it was one of the very few weapons capable of dealing with the British Matilda II infantry tanks, and on the Eastern Front where the 88 was among the rare weapons able to tackle the new Soviet T-34 and KV tanks.

    In games of Bolt action the 88 can be included in Artillery Platoons and is a Superheavy anti-tank gun on a rotating platform, with the option to fire as a Medium howitzer, making it the most versatile artillery in the game. It can be towed by the Sd.Kfz 7 half-track.

    Contents: One hard plastic 8.8cm Flak 37 dual-purpose AA/AT gun, which can both elevate and rotate, with 7 metal German Army crew. Full-colour waterslide decal sheet and Construction leaflet included.

    *Models supplied unassembled and unpainted*
- name: Infanterie schlepper UE (f) mit wurfrahmen
  sku: 403212002
  productType: single_kit
  priceGbp: 24.00
  url: https://store.warlordgames.com/products/infanterie-schlepper-ue-f-mit-wurfrahmen
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403212002_InfanterieschlepperUE_f_MitWurfrahmen01_6d768f6e-3a59-4d54-8604-d4fe1b7c9aa6.jpg?v=1775077672
  status: current
  description: |-
    The 21st Panzer division would be the only tank division to oppose the Allied landings in Normandy. Having been rebuilt after the defeat in Afrika the 21st was refitted with a variety of vehicles including specialist repurposed equipment, known as Becker's Conversions ([Battleground Europe](https://store.warlordgames.com/products/battleground-europe-d-day-to-germany-bolt-action-theatre-book) page 40).

    During the early part of 1944, Major Alfred Becker and his artillery command were responsible for taking obsolete captured British and French vehicles and refurbishing and redesigning them into useful machines. One such was the French UE carrier which Becker re-designed into rocket launchers mounting 28/32cm heavy rockets for infantry support. Its principal service was during 1943-45 with roughly 40 vehicles being made into this variant.

    | Cost: | 92pts (inexperienced), 115pts (Regular), 138pts (Veteran). |
    | --- | --- |
    | Weapons: | 1 forward-facing multiple rocket launcher. |
    | Damage value: | 7+ (armoured carrier). |
    | Special Rules: | Multiple Launcher |
    | Found in: | Page 64 of the Armies of Germany Second Edition. |

    The multiple rocket launcher can be a very devastating weapon, it has the ability to cause a lot of damage to many different units simultaneously. With 7+ armour the Infanterie schlepper is impervious to all forms of small arms fire but keep it out of harm's way in preparation for a devastating coup de grâce.

    *Models supplied unassembled and unpainted*
- name: Sd.Kfz 250/1 Neu Halftrack
  sku: 402412009
  productType: single_kit
  priceGbp: 24.50
  url: https://store.warlordgames.com/products/sd-kfz-250-1-neu-halftrack
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402412009-Sd-Kfz-250-1-Neu-half-track-02.jpg?v=1611139256
  status: current
  description: |-
    The Sd. Kfz (abbreviation for the German word Sonderkraftfahrzeug that means special motor vehicle) 250/1 was a reconnaissance and transport vehicle mainly used by scouts and HQ units.

    The vehicle was a shortened version of the Sd Kfz 251 Hanomag and came in many variants fulfilling many different roles like cable carriers, ammunition carriers and radio carriers. It carried six men including the driver and the co-driver and was armed with a pintle-mounted MG34 machine gun.

    Our model represents the “Neu” version of the vehicle that was in use from 1943 onwards in most theatres, however the model can also be used to represent the earlier version in operation since 1941, as it was not too different.

    #### Contents:

    - 1 resin Sd. Kfz 250/1 + 1 gunner
    - 1 metal gunner
    - Metal pieces for detailing
    - Bolt Action stat card
    - Damage markers
    - Decal sheet

    #### Bolt Action stats

    - Type: Transport and Tows
    - Weapons: One forward facing pintle-mounted MMG covering the front arc
    - Damage Value: 7+ (armoured carrier)
    - Transport: up to 5 men
    - Tow: Light howitzer, light or medium anti-tank guns
    - Special Rules: Open-topped, Flak (pintle-mounted MMGs)
    - *NB: Can also be inexperienced and veteran, and may add a rear facing MMG, see Bolt Action rulebook for more details*

    *Models supplied unassembled and unpainted*
- name: Sd.Kfz 251/10 ausf D (37mm Pak) Half Track
  sku: 402012013
  ean: 5060393702269
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 23.00
  url: https://store.warlordgames.com/products/sd-kfz-251-10-ausf-d-37mm-pak-half-track
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402012013-Sd.Kfz-251-10-Ausf-D-Pak36-01_c00ed686-df09-418c-b909-a545ec9d6ebd.jpg?v=1575566773
  status: current
  description: |-
    Panzergrenadier units in armoured half-tracks, trucks and field cars helped the infantry to keep pace with their armoured brethren. By the time of the invasion of Russia in 1941 the panzergrenadiers had equipped their troop leaders' half-tracks with the standard anti-tank gun of the day - the 37mm PaK 36. By replacing the front machine gun with this useful light gun the panzergrenadier units could rely on a modicum of fire support as they charged swiftly across the battlefield, supported by their platoon’s personnel carriers.

    Although not the most potent of anti-tank weapons (its crews nicknamed it the 'doorknocker'), the PaK 36 was best served in a fire support role rather than anti-tank. More than 300 half-tracks were converted into Sd.Kfz 251/10 variants which saw battle in Russia and North Africa as well as in North West Europe. The D variant replaced the C's more complicated multi angled rear armour with a single sloped face, the command variant keeping the old but still useful 'door knocker'.

    *Models supplied unassembled and unpainted*
- name: Jagdpanzer 38(t) Hetzer
  sku: 402012020
  ean: 5060393709268
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/hetzer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402012020_Jagdpanzer_38_t_Hetzer_box_front.jpg?v=1575566788
  status: current
  description: |-
    Based on the reliable Czechoslovakian Panzer 38(t) chassis, almost 3,000 Hetzers (Baiters) were built by the war’s end. Their small size and very low profile gave them distinct advantages in the role of tank hunters. The Hetzer wasn’t hampered by the mechanical problems associated with the larger tank destroyers such as the Jagdpanther and Jagdtiger, nor did it have the unprotected fighting compartment of the Nashorn or Marder tank hunters. plus its remote control roof machine gun gave it good close defence capability.

    Hetzers equipped many Waffen-SS and Wehrmacht formations, seeing action on all fronts on which Germany fought as well as with the Hungarian army. The first Hetzers entered service with 731st and 743rd Heeres Panzerjäger Abteilung in May/June of 1944.

    This plastic boxed set allows you to build one of three vehicle types: a mid/late production Hetzer, a Flammpanzer 38(t) or a 2cm FlaK auf Hetzer reconnaissance/AA vehicle. In games of Bolt Action this is a medium tank with a heavy anti-tank gun that can be replaced by a flamethrower. For the AA version use the Flakpanzer 38(t) rules from Armies of Germany.

    **Includes:** one 1/56th scale hard plastic Jagdpanzer 38(t) Hetzer tank destroyer, vehicle damage markers, full-colour assembly and painting guide, Bolt Action stat cards and waterslide decal sheet (for German and Hungarian vehicles).

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Models supplied unassembled and unpainted*
- name: Germans Grenadiers (Winter) Platoon
  sku: 402012027
  ean: 5060572500235
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 37.00
  url: https://store.warlordgames.com/products/germans-infantry-winter
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/GermanGrenadiers_winter_platoon_RTE_3D_box_render.png?v=1768240497
  status: current
  description: |-
    Adolph Hitler’s aggressive campaigns across the world ensured his troops would face the enemy in all environments and climates. None were more unforgiving than the harsh winters on the Eastern Front or in the Italian hills and mountains.

    The resourceful German landser (common soldiers) often had to make do with little more than their standard issue woollen greatcoat, gloves, scarves and a steely determination to not only stave off the cold, but also be able to fight and win.

    These highly detailed plastic figures are ideal to represent German Infantry (Winter) – be they Heer or Waffen-SS – facing the enemy in cold weather or in the very depths of the bitter winter snows. Weapons, equipment and headgear options allow you to build the figures for all periods of the war from the Blitzkrieg operations of 1939 and 1940 right through to the death throes of the Third Reich in Berlin during 1945.

    **German Infantry (Winter) Contains:**

    Plastic components to make:

    - 30 German infantry figures in greatcoats. Includes options for different weapon configurations and command models.

    Equipment included:

    - STG44 assault rifle, Kar 98K rifle, MG34 light machine gun, MG42 light machine gun, MP40 sub-machine gun, Gewehr 43 rifle, stick grenades and Panzerfaust.
    - Round plastic bases (25mm diameter).
    - Construction leaflet.
    - Full-colour waterslide decals.

    *Models supplied unassembled and unpainted*
