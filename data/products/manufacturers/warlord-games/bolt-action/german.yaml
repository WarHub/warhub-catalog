  description: |-
    The Panzer II Ausf. L Luchs (German for *Lynx*) was developed from the earlier models of Panzer II that had served well as reconnaissance tanks earlier in the war. With a redesigned roadwheel configuration and new transmission it was highly mobile and well suited to its role, serving on both Eastern and Western fronts.

    In games of Bolt Action the Luchs is a Light Tank armed with a light autocannon and coaxial MMG that can be included in any armoured platoon. It has the Recce and Fast special rules.

