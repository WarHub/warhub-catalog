    Fighting alongside the smaller [Panzer I Ausf. A](http://store.warlordgames.com/collections/german-army/products/panzer-ia),the Ausf B initially formed a key element in the German-led Condor Legion during the civil war in Spain, facing the Soviet-supplied T-26 light tanks of the Republican cause.

