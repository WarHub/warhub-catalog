  description: |-
    Transport your German officers in style with the VW Beetle staff car!

    The Type 87 *‘Kommandeurswagen’* was a lightweight 4-wheel-drive staff car developed from the ubiquitous VW Beetle and its *Schwimmwagen* derivative. With enlarged running boards, off-road tires, and a long sunroof, it provided the Wehrmacht with a cheap, reliable vehicle that could handle more difficult terrain than its civilian counterparts while still protecting the occupants from the weather.

    The perfect choice for any German force needing to move a small unit or team around in style, the VW Beetle staff car can be fielded as a Transport selection using either the *Kübelwagen* entry from *Armies of Germany*, or as a Civilian Car from the Common Transport Vehicles section of the *Bolt Action: Third Edition rulebook.* Tactical mobility is a huge asset on the battlefield, and this little motor provides it for very few points, allowing it to fit into every army list with ease.

    Bring the car around!

    *Models supplied unassembled and unpainted*
