  description: |-
    Own the road with the Autoblinda!

    One of the most successful Italian armoured cars of the Second World War, the Autoblinda AB41 combined excellent mobility with reasonable armament and decent protection, making for a perfect light reconnaissance vehicle. Several hundred would be produced in both the AB41 and later AB43 variants, with the latter almost exclusively seeing service in German hands after the Italian surrender.

    Armoured cars like the AB41/43 are ideal for forming *Bolt Action* Armoured Platoons at a lower points cost than their heavier counterparts. Packing a deadly light autocannon and with the always-useful **Recce** special rule, it’s a great choice for harassing enemy infantry and light armour alike.

    The AB43 can also be considered for use in German armies as an addition to the Captured and Repurposed Vehicles list. Simply use the rules for the AB41/43 presented in *Armies of Italy.*

    Box contains one plastic Autoblinda Armoured Car which can be assembled as either an AB41 or an AB43, plus a decal sheet, Bolt Action vehicle stat card, and vehicle damage markers.

    *Studio Models painted by Steff Sorensen.*

    *Models supplied unassembled and unpainted*
