- name: The Reich's Praetorians - Waffen-SS Starter Army
  sku: 402012103
  productType: box_set
  priceGbp: 104.00
  url: https://store.warlordgames.com/products/the-reichs-praetorians-waffen-ss-starter-army
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402012103_The-ReichsPraetoriansWaffen-SSstarterarmy01.jpg?v=1776421676
  status: current
  description: |-
    Command the fearsome might of the *Waffen-SS* with this all-plastic Starter Army!

    The *Waffen-SS* were the infamous political troops of Nazi Germany. Given priority for the best and newest equipment, they held themselves as an elite corps, separate from the wider German military, and were regarded by their enemies as the best troops Germany had to offer. Their political indoctrination imbued them with a fanaticism which made them often terrifying foes on the battlefield, albeit ones capable of truly horrific acts. While later-war recruitment somewhat diluted the elite status of the SS, these units remained loyal and fought with grim determination to the bitter end.

    This Starter Army allows you to field a fully legal *Waffen-SS* force for Bolt Action: Third Edition - entirely in plastic! With 36 infantry forming a Rifle Platoon, backed up by the mortar teams and machine guns of the Heavy Weapons Platoon, you have a great core of elite footsoldiers to take and hold objectives, ably supported against armour by the Sd.Kfz. 251/10 commander’s half-track and the ubiquitous StuG III assault gun, which form an Armoured Platoon. As if that wasn’t enough firepower, a PaK 40 anti-tank gun gives you an Artillery Platoon to pile on the punishment.

    Able to be built and customised to an incredible degree, or built and played straight out of the box, The Reich’s Praetorians is the perfect way to start a new Bolt Action force.

    *Miniature sculpted by Wojtek Flis. Studio miniatures painted by Andres Amian.*

    *Models supplied unassembled and unpainted*
- name: Cross of Iron - German Grenadiers Starter Army
  sku: 402012011
  productType: box_set
  priceGbp: 104.00
  url: https://store.warlordgames.com/products/cross-of-iron-german-grenadiers-starter-army
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402012011_CrossofIronGermanGrenadiersstarterarmy01.jpg?v=1776418346
  status: current
  description: |-
    Bring the might of the *Wehrmacht* to bear with this all-plastic Starter Army!

    The backbone of the *Heer* - the German Army - was its Grenadiers. These were the men in field grey and *Stahlhelms* who had conquered Western Europe, and brought the Soviet Union to the very brink. By the time the tide of the war began to turn in 1943, the survivors had become hard-bitten veterans, and the new replacements had to learn quickly. Well-equipped, well-trained, and led by experienced officers, Grenadier units remained dangerous opponents throughout the war.

    This Starter Army allows you to field a fully legal German force for Bolt Action: Third Edition - entirely in plastic! With 36 infantry forming a Rifle Platoon, backed up by the mortar teams and machine guns of the Heavy Weapons Platoon, you’ve got a flexible core of troops ready for any tactical challenge. Backing them up is an Armoured Platoon composed of the iconic Panzer IV and versatile Sd.Kfz. 251/9 ‘Stummel’ half-track howitzer carrier, with a PaK 40 in an Artillery Platoon providing still more firepower.

    Able to be built and customised to an incredible degree, or built and played straight out of the box, Cross of Iron is the perfect way to start a new Bolt Action force.

    *Miniature sculpted by Wojtek Flis. Studio miniatures painted by Andres Amian.*

    *Models supplied unassembled and unpainted*
- name: German Heavy Weapons Platoon
  sku: 402012058
  productType: single_kit
  priceGbp: 30.00
  url: https://store.warlordgames.com/products/german-heavy-weapons-platoon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402012058_GermanHeavyweaponsplatoon01.jpg?v=1776268855
  status: current
  description: |-
    Get the support weapons to the front!

    German troops were well equipped with support weaponry, with two of the most notable examples being emplaced machine guns and mortars. The 'universal' MG 34 and 42 machine guns, when mounted on the 'Lafette' tripod, were capable of performing the role of much heavier weapons employed by other armies, providing intense suppressing fire over a wide area. They could also be used to set up lethal ambushes, or cover specific potential lines of advance. Supporting them with indirect fire, the standard German 8cm mortar was a simple, effective, and rugged weapon, capable of raining down high explosives, even at short ranges.

    Medium Mortar and MMG teams are staples of any Bolt Action force, providing your Heavy Weapons Platoons with all the firepower they need. This box lets you build just such a platoon, with an Officer to lead them, and even a Panzerschreck Team to ward off enemy armour! The crew are perfect for late-war Heer, and can also be painted as Waffen-SS. In addition, the crew sprue is compatible with many of our other German kits, allowing you to kitbash to your heart's content!

    Contents:

    - Two heavy weapons frames each containing one MG34, MG42, 8cm mortar, Panzershcreck, two tripods and a selection of ammunition.
    - Three crew frames totalling twelve infantry models that can be assembled as crew or command squads, with a selection of heads, arms and equipment.
    - Four 60mm and three 25mm bases, allowing you to construct up to four heavy weapons teams **or** three heavy weapons plus a platoon commander and a Panzerschreck team.

    *Miniature sculpted by Wojtek Flis and Jon Heeney. Studio miniatures painted by Darek Wyrozebski and Kirsten Williams.*

    *Models supplied unassembled and unpainted*
- name: German Pak 40 Anti-Tank Gun
  sku: 402012057
  productType: single_kit
  priceGbp: 20.00
  url: https://store.warlordgames.com/products/german-pak-40-anti-tank-gun
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402012057_GermanPaK40anti-tankgun01.jpg?v=1776268452
  status: current
  description: |-
    Bring up the anti-tank gun!

    The PaK 40 served as Germany's main anti-tank gun throughout the latter part of World War II. A powerful 75mm weapon, it remained effective against the majority of Allied tanks until the very end of the war, and was used in great numbers on both the Eastern and Western fronts. Particularly deadly when firing from concealed positions, it was also modified for service in a number of tanks and tank destroyers, becoming the basis for the main gun of both the StuG III and later-model Panzer IV.

    As a Heavy Anti-tank Gun, it's a great choice for taking out enemy armour in Bolt Action, and can also blast enemy infantry with surprisingly effective high explosive rounds. The crew are perfect for late-war Heer, and can also be painted as Waffen-SS. In addition, the crew sprue is compatible with many of our other German kits, allowing you to kitbash to your heart's content!

    Includes 1 order die plus decals for German Heer and Waffen SS.

    *Miniature sculpted by Wojtek Flis and Jon Heeney. Studio miniatures painted by Darek Wyrozebski and Kirsten Williams.*

    *Models supplied unassembled and unpainted*
