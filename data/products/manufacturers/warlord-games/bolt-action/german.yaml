  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402212001_Gebirgsjagersquad01.jpg?v=1708336682
  status: current
  description: |-
    Specialist training bred hardened fighters and the Gebirgsjäger (mountain infantry) were regarded as elite alongside Fallschirmjager. Gebirgsjäger originated from the Alpenkorps of WWI, where they were used to defend the mountain passes from their Italian equivalent, Alpini.

    Their symbol was the edelweiss, a flower that they also traditionally wore in their caps and collars, adopted in 1907 it eventually became the universal emblem worn by all mountain troops. The flower only grows at higher altitudes and means "noble purity."

    Specially trained to operate in mountainous and other difficult terrain and extreme climatic conditions, Gebirgsjäger divisions were used in virtually every theatre from Poland, Norway, Africa, Crete and the Balkans, and Soviet Russia throughout the war.

    As the Allied forces pushed ever onward toward the German homeland, Gebirgsjäger would often fight alongside regular infantry. Particularly in the final months of the war, when the quality of new conscripts was poor, Gebirgsjäger would often be relied upon to defend strategically critical areas.

    **In Bolt Action**

    These elite troops are classed as Veterans, 1 NCO and 4 men armed with rifles start at 65 points.

    Options include the usual submachine guns for the NCO and 1 man, or a light machine gun upgrade for 1 man and a loader. Add on 5 further men, Anti tank Grenades, and/or skis and they really start giving you a very hard hitting and mobile force for winter themed battles. The Skis special rule is a great extra, allowing them to ignore movement penalties on snow and other winter conditions!

    Rules for the Gebirgsjager squad can be found in the [Armies of Germany book](https://store.warlordgames.com/products/armies-of-germany-2nd-edition)

    Contains: 10 finely detailed metal models

    *Models supplied unassembled and unpainted*
- name: Hollywood Tiger
  sku: 402412001
  ean: 5060390000000
  eanSource: shopify:flipsidegaming.com
  productType: single_kit
  priceGbp: 34.50
  url: https://store.warlordgames.com/products/hollywood-tiger
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402412001_HollywoodTiger01_b3d1f1eb-1eb0-402c-b5a4-2c8ae382d4df.jpg?v=1774883220
  status: current
  description: |-
    *Rarely, if ever, have the words ‘war’ and ‘comedy’ somehow been so successfully combined as in MGM’s 1970 classic movie ‘Kelly’s Heroes’. However, the movie which was originally entitled ‘The Warriors’ underwent a major transformation process from its inception to its release, including the cutting of entire scenes and characters and the addition of extended action sequences.*

    *Several members of the cast and crew voiced their disapproval of the changes which altered a grittier war movie with depth of character and an integral romantic sub-plot into an action-packed, farcical comedy. However, the cult following which Kelly’s Heroes enjoys nearly 50 years later and the plethora of infinitely quotable lines is perhaps the best proof that the final cut hit the nail right on the head.*

    *We've taken information from the final cut of the movie, Burt Hirschfeld’s accompanying 1970 novel of the same name, (based heavily on the original script) and the real life history behind the units portrayed in the movie to bring a slice of Hollywood to your battlefields...*

    For the movie industry, the Tiger is often the ‘go to’ tank when depicting German armour in the Second World War. Unfortunately Tigers are exceedingly rare to the point that there is currently only one working Tiger left in the entire world. The 1969 Yugoslavian war epic ‘The Battle of Neretva’ found a clever way around this by converting a number of T-34 tanks to look like Tigers, a cost effective film solution.

    There's a superb bonus within every box of Hollywood Tiger! A full colour, 8 page, booklet provides every hero and vehicle with their own personalised themed special rules to add that 'Hollywood'flair and daring to your movie inspired games of Bolt Action.

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Models supplied unassembled and unpainted*
