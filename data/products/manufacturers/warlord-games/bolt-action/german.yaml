- name: Waffen-SS MG42 MMG team firing (1943-45)
  sku: WGB-LSS-04
  productType: single_kit
  priceGbp: 11.50
  url: https://store.warlordgames.com/products/waffen-ss-mg42-mmg-team-firing-1943-45
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-LSS-04A-SS-MMG-team-firing-a.jpg?v=1575566047
  status: current
  description: |-
    **Note: plastic German heavy weapons are available [here](https://store.warlordgames.com/products/german-heavy-weapons-platoon).**

    Known as "Hitler's Buzzsaw" on account of its high rate of fire. The MG42 fired 1250 rounds/minute, more than twice that of the British Vickers Machine Gun and American Browning. Add this tremendous firepower to your Germans and give your infantry some much needed support.

    Unlike other armies, the Germans used the same machine gun both as a squad weapon and as a tripod mounted support weapon. The tripod mount provided a much more stable firing platform and made it easier to keep up a continuous fire using a belt feed.

    This version features a three man team with a tripod mounted MG42 in position and is manned by Waffen-SS soldiers.

    **Contents:**

    - 1 metal MG42
    - 3 metal crew members

    **Bolt Action stats**

    - Type: Infantry
    - Weapon: One MMG
    - Special Rules: Team Weapon, fixed
    - *NB: see Bolt Action rulebook for more details*

    *Note: Models supplied unassembled and unpainted.*
- name: Barbarossa Bundle
  sku: PANZERBUNDLE2
  productType: box_set
  priceGbp: 195.00
  url: https://store.warlordgames.com/products/barbarossa-bundle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/Barbarossa_Bundle.png?v=1779464509
  status: current
  description: |-
    Drive east with the Barbarossa Bundle!

    The German invasion of the Soviet Union was a colossal undertaking, with vast columns of men and vehicles stretching across the vast spaces of Russia. At the head of the invading troops were the Panzer divisions, with their tanks supported by motorised infantry and cyclists, driving deep into the Soviet heartlands. While propaganda footage extensively showed the newest tank designs, the majority of German armoured units were still composed of a mixture of older types, and many infantrymen were forced to march the huge distances into battle. Nevertheless, the forces assembled for Operation Barbarossa were truly enormous in scale.

    This bundle lets you field a German force typical of the opening stages of the invasion, with light tanks supported by mobile infantry. Some of the footsoldiers are fortunate enough to ride in the truck and half-track, but others are forced to rely on bicycles, or even walk. However it gets to the battlefield, this force is a potent one! An Armoured Platoon featuring two Panzer IIs and a Czech-designed Panzer 38(t) provides a solid core of mobile firepower, able to take out light armour and infantry, while a Heavy Weapons Platoon ensures that the infantry can go in supported by plenty of direct and indirect fire. The Rifle Platoon itself has great mobility, with cyclists able to range ahead of the main force and seize crucial locations, while truck- and halftrack-mounted troops follow up and consolidate.

    Giving you a complete force with a huge range of options for squads and weapons teams, and representing a great saving on buying the components individually, this bundle is the perfect way to launch your own invasion on the tabletop, and can also be used to represent earlier forces in the latter stages of the Blitzkrieg across Western Europe.

    Contains 42 plastic infantry and heavy weapons, 5 plastic vehicles and 10 3D printed resin troops on bicycles.

    *Models supplied unassembled and unpainted*
- name: Panzer II platoon bundle
  sku: PANZERBUNDLE1
  productType: single_kit
