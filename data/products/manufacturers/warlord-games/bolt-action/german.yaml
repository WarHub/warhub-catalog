  status: current
  description: |-
    Give your German Veterans some much-needed supporting fire!

    Arguably the best machine gun in the world at the start of the war, the MG 34 would be the mainstay of the German military throughout the first half of the conflict. When deployed on a tripod and served by a dedicated crew, it was capable of laying down a withering hail of fire.

    MMG teams are the backbone of Heavy Weapons Platoons in *Bolt Action*, providing lethal anti-infantry fire that can sweep units from the board. German machine guns are even better, benefiting from an extra shot, making MMG teams a great choice to support your German Veteran infantry in battle.

    Get that gun up and on target today!

