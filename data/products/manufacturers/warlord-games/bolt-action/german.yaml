  url: https://store.warlordgames.com/products/panzer-viii-maus-super-heavy-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/405102002-Panzer-VIII-Maus-super-heavy-tank-01.jpg?v=1575566474
  status: current
  description: |-
    One of the most enigmatic armoured fighting vehicles of the Second World War, this vehicle has the fairly innocuous designation VK100.01 Porsche Type 205, yet to any student of WW2 AFVs it is better known as the Panzerkampfwagen VIII 'Maus' (Mouse).

    With 200mm of armour and weighing an astonishing 188 metric tons, the ironically-named Maus still holds the record as the heaviest fully enclosed armoured fighting vehicle ever built. Unlike the majority of the so-called ‘paper panzers’ (advanced German tank designs which only existed in technical schematics and project documentation), the Maus was actually built, with two prototypes almost complete and perhaps as many as 9 others under construction when Hitler cancelled the programme in late 1943.

    In games of Bolt Action the Maus is a super-heavy tank armed with a super heavy anti-tank gun and a coaxial light howitzer, and can be included in any German armoured platoon. While it suffers from special rules that make it quite likely to run out of fuel, the Mobile Fortress special rule makes it far less vulnerable to being flanked.

    Contains: One resin tank with metal parts.

    *Models supplied unassembled and unpainted*
