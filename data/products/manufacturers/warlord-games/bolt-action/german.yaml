  status: current
  description: |-
    The Panzer II was the most numerous German tank at the start of World War II, and thus formed the backbone of the Panzer divisions made legendary in the Blitzkrieg campaigns across Western Europe. Lightly armed and armoured, and already technologically outclassed by heavier vehicles, it nonetheless gave good service, particularly against enemy infantry. Panzer IIs saw extensive service in Europe and North Africa in the early part of the war, and would also play a significant role in Operation Barbarossa, the invasion of the Soviet Union.

    This great bundle gives you a full armoured platoon of three Panzer IIs.

    Included are assembly instructions and waterslide decals to customise your armour.

    *Models supplied unassembled and unpainted*
- name: Panzer II (Plastic)
  sku: 402012104
  productType: single_kit
  priceGbp: 23.00
  url: https://store.warlordgames.com/products/panzer-ii-plastic
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402012104_PanzerII01.jpg?v=1779206853
  status: current
  description: |-
    Reinforce your light armour with the Panzer II!

    The Panzer II was the most numerous German tank at the start of World War II, and thus formed the backbone of the Panzer divisions made legendary in the Blitzkrieg campaigns across Western Europe. Lightly armed and armoured, and already technologically outclassed by heavier vehicles, it nonetheless gave good service, particularly against enemy infantry. Panzer IIs saw extensive service in Europe and North Africa in the early part of the war, and would also play a significant role in Operation Barbarossa, the invasion of the Soviet Union. Replaced in frontline service by the larger and more modern Panzer III and IV, some Panzer IIs remained in service with training units and second-line formations until the end of the war.

    On the tabletop, the Panzer II is a powerful addition to early-war German Armoured Platoons, giving you a low-cost armoured platform mounting the incredibly useful light autocannon. Capable of gunning down enemy infantry with ease and threatening lighter armoured vehicles, it can punch far above its weight in games of Bolt Action.

    *Models supplied unassembled and unpainted*
- name: Early War German Infantry on Bicycles
  sku: 402412015
  productType: single_kit
  priceGbp: 28.00
  url: https://store.warlordgames.com/products/early-war-german-infantry-on-bicycles
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402412015_EarlyWarGermanInfantryonBicycles01.jpg?v=1779206571
  status: current
  description: |-
    Ride hard for the objective with these Early War German Infantry on Bicycles!

    Bicycle-mounted troops were a key component of many armies early in the Second World War, providing light infantry with excellent on-road mobility without the need for fuel or expert maintenance. The Wehrmacht made good use of Radfahrtruppen in its invasions of Poland, France, and the Soviet Union, both for reconnaissance and liaison duties, and rapid advances.

    On the Bolt Action tabletop, equipping your infantry with bicycles gives them excellent early-game mobility before they dismount to fight, allowing you to seize key objectives and get to cover before the shooting really starts. Perfect for Recce and Rifle Platoons, they're a great way to get your force moving without spending extra points on transport vehicles!

    Contains five miniatures made from 3D printed resin.

    *Studio miniature painted by Andres Amian.*

    *Models supplied unassembled and unpainted*
