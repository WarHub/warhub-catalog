  sku: 403212008
  ean: 5060917994286
  eanSource: shopify:athenagames.com
  productType: single_kit
  priceGbp: 11.50
  url: https://store.warlordgames.com/products/german-veteran-infantry-medium-mortar-team
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403212008_GermanVeteranInfantrymediummortarteam01.jpg?v=1739361549
  status: current
  description: |-
    Call up indirect fire support for your German Veteran infantry!

    Mortars were some of the most extensively used support weapons of the Second World War, with their relatively light weight and ability to fire indirectly over a wide variety of ranges making them incredibly useful in virtually every combat situation. Germany’s 81mm ‘medium’ mortar was used by all arms of the *Wehrmacht*, and was particularly appreciated by veteran troops for its destructive power against enemy troops in cover.

    A vital part of Heavy Weapons Platoons in *Bolt Action*, medium mortars provide commanders with the ability to arc indirect fire over the heads of their troops, and crucially ignore cover when they hit their targets. Ranging in on the enemy, directed by spotters, medium mortars can control huge areas of the battlefield when well used.

    Targets sighted - start ranging in today!

    Contains one metal medium mortar with three Warlord Resin German Veteran Infantry crew, and plastic base.

    *Sculpted by Wojciech Flis. Studio miniatures painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
