  description: |-
    The Jagdpanther tank destroyer was based on the Panther chassis and combined that tank's excellent mobility with a hard-hitting KwK 43 88mm gun as used in the Tiger II. This powerful gun was mounted into an extended front glacis that created a heavily armoured casement for the crew.

    Jagdpanthers took part in the fighting from 1944 onwards on both Eastern and Western fronts and were used during the battle of the Bulge. However, like all German tank destroyers, its arc of fire was limited, reducing its effectiveness when deployed in a mobile role.

