  status: current
  description: |-
    Developed in 1941, the 12 cm GrW 42 was an attempt to give German infantry units a close support weapon with a heavier performance than the mortars used in general service at the time. The weapon was a copy of the mortar used by Soviet forces on the Eastern Front after caputuring several examples, which were also pressed into service as the Granatwerfer 378 (r).

    The GrW 42 was the usual three part construction made up of a circular base plate like the Soviet weapon, the tube itself and the supporting bipod. Because of the greater weight of the weapon a two wheeled axle was utilised, enabling the mortar to be towed into action. The axle could then be quickly removed before firing.

    In games of Bolt Action this is a heavy mortar that can be includded in heavy weapons platoons.

    Pack contains 1 metal mortar and 4 metal crew figures

