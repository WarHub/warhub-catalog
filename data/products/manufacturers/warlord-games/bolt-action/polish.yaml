  description: |-
    Designed in 1929, the Samochd Pancerny wzr 29('armoured car 1929 pattern'), was more commonly known as Ursus or CWS. Based on the chassis of a 2-ton truck, the Ursus mounted a 37mm anti-tank gun and multiple machine guns. Although adequately armoured for the inter-war period, the Ursus was the poor relation when facing more modern opposition in 1939.

