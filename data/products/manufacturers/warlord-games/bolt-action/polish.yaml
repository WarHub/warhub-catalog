- name: Early War Polish Lancer Regiment
  sku: WGB-PI-02
  productType: single_kit
  priceGbp: 46.50
  url: https://store.warlordgames.com/products/early-war-polish-lancer-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgb-pi-02-ew-polish-lancer-regt.jpg?v=1575565754
  status: current
  description: |-
    There are few more heroic and stirring sights than Polish cavalry dashing themselves in a desperate charge against German armoured might; lance against Krupp steel... Only, it largely of course didn't happen. Gallant though they were, the Polish Cavalryman was no fool. After reforms in 1936 the Polish cavalry was reorganised into twenty six regiments, of four squadrons each with one hundred and twenty men in each squadron. They were supported by HMG and anti-tank squadrons, backed too with tankettes and infantry on bicycles. Sadly for the romantics amongst us, the lance had been retired and was used largely for ceremonial purposes.

    The cavalry force was still the best equipped, best trained and indeed largest mounted force in the world, but its role of dashing cavalry had been sensibly changed to that of a "fire brigade", that is a mounted reserve of quality mounted infantry. They rode to the theatre of operations then dismounted and fought with conventional rifle and machine guns, where they fought well against a determined and more mechanised aggressor.

    This is not to deny the Polish cavalry their due however, as there were recorded sixteen cavalry charges in World War 2, some of which carried the day, though most were with sabre , and few , if any at all, against armoured units..

    Warlord Games however salute the brave Poles, whose motto was "Honour and Fatherland", and we supply models with lances for the old fashioned cavalry types who still hear the snorting of the horses and the jangle of the bits before the trumpeter sounded the Charge!

    This set provides you with 10 Polish Cavalry including a full command.

    *Note: Models supplied unassembled and unpainted*
- name: Polish 7TP Tank
  sku: WGB-PI-101
  productType: single_kit
  priceGbp: 29.00
  url: https://store.warlordgames.com/products/polish-7tp-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgb-pi-101-7tp-b_2.jpg?v=1575565794
  status: current
  description: |-
    A development of the British Vickers 6-ton light tank the Polish 7TP saw combat in the Defence of Poland in 1939. Although significantly better armed than the German’s Panzer I and Panzer II the 7TP was never fielded in enough numbers to change the outcome of the war – indeed there were only ever 108 of the single turret versions in Polish service.

    The 7TP designation meant “7 Tonne, Polish” although the final version weighed in at 9.9 tonnes.

    *This set contains ONE metal and resin vehicle.*
- name: Polish Army 75mm light artillery
  sku: WGB-PI-28K
  productType: single_kit
  priceGbp: 23.50
  url: https://store.warlordgames.com/products/polish-wz-1897-17-75mm-gun
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-PI-28_PolishArmy75mmlightartillery01.jpg?v=1669453424
  status: current
  description: |-
    ***Webstore Exclusive!** This artillery piece is supplied with a laser-cut oval MDF base (120mm x 92mm) - only available through this webstore. You can now base your complete gun and crew together, making attractive mini-dioramas!*

    The famous 75mm Mle 1897 field gun of the Great War served France and other countries well in the Second World War. Used extensively throughout WWII this model was reliable and could act in anti-tank gun or field artillery roles.

    In Polish service the gun was known as the 75mm armata wz. 1897 (1897 Pattern cannon). At the beginning of hostilities in Poland in 1939 the Polish army had well over a thousand of this gun at its disposal.

    Many Polish armata wz. 1897 retained their original spoked wheels as opposed to the newer pneumatic tyres which were mainly used in the mobile batteries of two Polish motorized brigades.

    Contains: 1 metal gun, 3 metal crew and individual plastic bases

    *Models supplied unassembled and unpainted*
- name: Polish Army infantry section
