  description: |-
    Add the legendary Bielski Brothers to your Partisan collection!

    Made famous by the 2008 film *Defiance*, the Bielski Brothers would lead a band of Jewish resistance fighters against the German occupation of Poland. Determined to avenge the deaths of many of their friends and family, and drive out the hated invaders, they would become some of the most legendary partisan leaders of the Second World War.

    Optional rules for fielding the Bielski Brothers can be found in the *Bolt Action Compendium*, but these crisply detailed Warlord Resin miniatures are perfect for inclusion in any Partisan force, whether as Platoon Commanders or NCOs.

    *Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
