  status: current
  description: |-
    **Webstore Exclusive!** *This artillery piece is supplied with a laser-cut oval MDF base \(100mm x 80mm\) - only available through this webstore.*

    The 57mm M1 anti-tank gun was a close copy of the British QF 6pdr which was itself also used by some American forces, being introduced in 1943 into US Army units.

    After their experiences in North Africa, where the smaller 37mm gun struggled to penetrate German armour, the M1 was introduced into the US Army and was the standard anti-tank gun by mid 1944, serving in Italy and Northern Europe.

    In games of Bolt Action this can be included in Artillery Platoons and is a Medium Anti-tank gun, that can be towed by most vehicles.

