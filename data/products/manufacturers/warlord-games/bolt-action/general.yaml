- name: USMC M3A1 37mm anti-tank gun
  sku: WGB-AM-25
  ean: 5060200844977
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 19.00
  url: https://store.warlordgames.com/products/usmc-m3a1-37mm-anti-tank-gun
