- name: US Airborne 1000pt D-Day Invasion
  sku: 409913001
  productType: box_set
  priceGbp: 104.25
  url: https://store.warlordgames.com/products/us-airborne-1000pt-d-day-invasion
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/409913001_-_US_Airborne_1000pt_D-Day_Invasion.jpg?v=1575566382
  status: current
  description: |-
    Dropped from their C-47 Dakotas high above the Normandy countryside, the US Airborne found themselves helplessly scattered and separated deep behind enemy lines amid the hedgerow country of Normandy. They had to carry all of the necessary equipment - prepared to drop into entirely surrounded pockets in order to achieve their objectives.

    Their heroic actions have immortalised their units - the likes of the 82nd 'All American' and the 101st 'Screaming Eagles' - whose exploits were captured in the Hanks/Spielberg series 'Band of Brothers' - fighting their way through the likes of Carentan, Foy, Bastogne, and right up to capturing the Eagle's Nest at Berchtesgaden - deep in the heart of Germany.

    ## The 1000 point army

    | US Airborne HQ | 1st lt with 2 men | 116pts |
    | --- | --- | --- |
    | US Airborne Medic | | 30pts |
    | US Airborne Squad A - 10 men | NCO with SMG + 6 men \(Rifles/Carbines\), 2 SMGs 1 LMG. | 159pts |
    | US Airborne Squad B - 10 men | As Squad A. | 159pts |
    | US Airborne Squad C - 6 men - Tank Hunters | NCO with SMG + 1 Rifle/Carbine, 1 SMG, 1 LMG, all equipped with Anti-Tank Grenades. | 114pts |
    | Pathfinders Squad - 8 men | NCO with SMG + 6 men \(Rifles/Carbines\), 1 SMG. | 126pts |
    | US Airborne Bazooka Team | | 78pts |
    | US Airborne 60mm Light Mortar Team | | 52pts |
    | US Airborne MMG Team | | 65pts |

    Yes a total of 899 points on to which you can bolt your own choices of support \(such as more Glider troops\) at a later date.

    Rules for Pathfinders can be found on Page 12 of Battleground Europe whilst the Veteran Airborne come from the Market Garden Selector on page 71 of Armies of The United States

    Deal contains:

    - 1 x Blister of 4 men for the US Airborne HQ & Medic teams.
    - 3 x Squad Boxes of 10 men for US Paratrooper Squads.
    - 1 x Loose Figure of a US Airborne Pathfinder with M1 Carbine.
    - 1 x Loose Figure of a US Airborne Pathfinder with Signal Gun
    - 1 x Loose Figure of a US Airborne Pathfinder with M1 Carbine.
    - 1 x Loose Figure of the US Airborne Pathfinder with Thompson SMG.
    - 1 x Blister of 4 men for the US Airborne Bazooka & 60mm Light Mortar teams.
    - 1 x Blister of 3 men plus weapon for the US Airborne 30cal. MMG team \(either in firing or redeploying poses\).

    *\(You'll be left 1 spare figure from the above packs when making the 1000pt force, use him for a casualty or an objective marker perhaps?\)*

    *Models supplied unassembled and unpainted*
- name: Japanese Metal Pill Boxes
  sku: K016
  productType: single_kit
  priceGbp: 9.00
  url: https://store.warlordgames.com/products/japanese-metal-pill-boxes
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/K016_1.jpg?v=1622739321
  status: current
  description: |-
    Hexagonal Japanese Pillboxes \(28mm\) are the ideal addition to any Pacific battlefield. Protect your lines of communication or hinder an enemy attack route.

    First encountered amongst the extensive defences on Betio Island, Battle of Tarawa in 1943, they were used as a command post for the primary beach defences. These pre-fabricated 1/4 inch steel, six-sided, truncated pyramids with double walls were designed to be reinforced with sand and concrete then camouflaged. Inside, these pillboxes had an upper and a lower compartment. The upper compartment was designed for an observer or commander whilst the lower compartment was designed to house two machine guns.

    Also possibly used on Kiska in the Aleutian Islands.

    Supplied unassembled and unpainted in kit form with full instructions.
