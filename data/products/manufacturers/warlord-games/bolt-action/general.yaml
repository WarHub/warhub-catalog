- name: "Soldier of Fortune 004: The Emperor's New Clothes"
  sku: 305112035
  productType: single_kit
  priceGbp: 2.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-004-the-emperors-new-clothes
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/305112035_SoF004_TheEmperorsNewClothes01.jpg?v=1698839683
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 30th of November 2023, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in December…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    **Emperor's New Clothes - Painting Competition**

    **The best Community-painted Emperors New Clothes Soldier of Fortune \(both Napoleon and Portrait Artist\) as judged by Warlord's Studio Painter Kirsten Williams will receive a prize fit for an Emperor - the complete [Farmhouse Assault - La Haye Sainte Collector's Edition Battle-Set](https://store.warlordgames.com/products/farmhouse-assault-la-haye-sainte-collectors-edition)!**

    **You've got until the 10th of December to paint your Soldiers of Fortune, and email the images to submissions@warlordgames.com**

    Following our run of 'SAS Rogue Heroes' as our monthly Soldier of Fortune miniature, we're taking something of a step back in time with November's model - Napoleon Bonaparte!

    Any good ruler needs a suitably impressive portrait to further impress their subjects, and Napoleon I was no exception. November's Soldier of Fortune has been painstakingly sculpted by Warlord sculptor Wojtek Flis and depicts François Gérard in the act of creating the famous painting Portrait de l’empereur Napoléon Ier en robe de sacre in 1804-5, with the great man himself posing for the artist.

    The Emperor's New Clothes is a fantastic, strictly limited-edition piece that is the perfect challenge for any painter looking to show off their brush skills, and a must-have for anyone with a Black Powder French army - we've even included a print of the portrait to stick to the artist's easel!

    Napoleon I is a busy man, and is only available during the month of November 2023. After that, his sitting will be finished, Gérard will retire to his studio, and the Emperor will head back out on campaign...

    *Models supplied unassembled and unpainted*
