  status: current
  description: |-
    The LVT\(A\)-1 was the first dedicated infantry support Landing Vehicle Tracked. Based on the LVT-2 \(the A standing for armoured\), this armoured fire support version had a turret similar to the M3 light tank, with a 37 mm gun whilst also mounting two machine guns in turrets just behind the main gun. It had a quite respectable speed of 25 mph or land and 6.5 mph in water, and an operational range of 125 miles on land or 75 miles in water.

    Intended to provide fire support to the assaulting Marines in the early stages of establishing a beachhead, it was common for the LVT\(A\)-1s to commence firing whilst still in the water.

    Battles include Roi-Namur \(with the 24th Marines\) and Engebi \(with the 22nd Marines\).

    **Includes:**

    - 1 resin LVT\(A\)-1
    - 2 metal MMG crew

    *Models supplied unassembled and unpainted*
- name: LVT(A)-4 75mm AMTANK
  sku: 405103003
  productType: single_kit
  priceGbp: 35.50
  url: https://store.warlordgames.com/products/lvta-4-75mm-amtank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/405103003_LVTA4_75mmAMT01.jpg?v=1626049448
  status: current
  description: |-
    As the re-taking of the islands continued in the Pacific it was quickly realised that the 37mm of the [LVT\(A\)-1](http://articles.warlordgames.com/lvta-1-37mm-amtank/) didn't quite have the firepower needed to dig out an entrenched enemy. The need for a heavier fire support version saw the turret of the 75 mm Howitzer M8 being fitted to the LVT-2 hull producing the LVT\(A\)-4.

    A single .50 cal machine gun was originally installed on the ring mount above the turret rear whilst late production vehicles had the heavy machine gun replaced with two M1919A4 .30 cal. MMGs on pintle mounts and one more in the bow mount.

    **Contains:**

    - 1 resin LVT\(A\)-4 Hull & Turret
    - 1 metal HMG
    - 2 metal crew heads

    *Models supplied unassembled and unpainted*
- name: US LCVP Landing Craft Vehicle Personnel
  sku: 409913015
  productType: single_kit
  priceGbp: 14.50
  url: https://store.warlordgames.com/products/us-lcvp-landing-craft-vehicle-personnel
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/409913015_US_LCVP_Landing_Craft_Vehicle_Personnel_-_With_MG_crew.jpg?v=1575566775
  status: current
  description: |-
    The LCVP \(Landing Craft Vehicle Personnel\) Higgins boat could hold either a 36-man platoon, a jeep and a 12-man squad, or 8,000 lb \(3.6 t\) of cargo. Its shallow draft \(3 feet aft and 2 feet, 2 inches forward\) & clever design that protected the propeller, enabled it to run right up onto the shoreline.

    The steel ramp at the front could be lowered quickly allowing troops to swiftly disembark, the boat could then reverse itself off the beach, and head back out to the supply ship for another load within three to four minutes.

