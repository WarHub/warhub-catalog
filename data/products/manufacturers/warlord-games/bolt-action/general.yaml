  status: current
  description: |-
    Every since the great storm that destroyed the city, Frost Giants have occasionally wandered down from the northern mountains. Possessed of rudimentary intelligence, they can occasionally be reasoned with, but generally they see humans \(and most other animals\) as little more than food.

    Metal figurine, supplied unpainted. Stands 48mm tall.

