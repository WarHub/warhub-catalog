- name: C3 Plasma Bombard
  sku: 502413003
  productType: single_kit
  priceGbp: 32.50
  url: https://store.warlordgames.com/products/c3-plasma-bombard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502413003-C3-Plasma-bombard-01.jpg?v=1575566606
  status: current
  description: |-
    The plasma bombard is the largest and most powerful mobile plasma weapon and uses multiple-coils to generate an extraordinary potent pulse of energy. It is used by heavy support units in most Antarean forces and often carried by heavy combat drones and other heavy vehicles.

    **This box set contains:**

    - One resin/metal Plasma Bombard
    - Three metal Crewmen
    - One metal Drone

    Plasma bombards are used to equip heavy support units and are the most powerful plasma based weapon available to most forces. They are constructed with multiple plasma coils, which loop together, a design that is necessary to preserve the integrity of the coils. Even so, the weapon is prone to plasma fade, a recurrent problem with all plasma weapons over time but especially acute with larger weapons such as the plasma bombard.

    Being your standard artillery, it would certainly benefit being in cover and towards the back end of your army. However, with such a high strike value \(7\) you can point the weapon in any direction and nearly guarantee that your opponent will be worrying which unit he'll have to say goodbye to!

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte General's coach
  sku: 202413001
  productType: single_kit
  priceGbp: 44.50
  url: https://store.warlordgames.com/products/pike-shotte-generals-coach
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/202413001-PS-Generals-Coach-01.jpg?v=1575566514
  status: current
  description: |-
    The European wars that devastated the continent in the 17th Century were commanded by kings, nobles and the gentry, some of whom were well versed in the minutiae of battlefield strategy and tactics. Although many led by example, sometimes bravely leading their troops in hand-to-hand combat if necessary, a General’s main role was to thoroughly plan his campaigns rather than getting involved with the riff raff. He is a gentleman after all...

    Many Generals went to the battlefield in their personal coach. As the old adage says, any fool can be uncomfortable!

    Pulled by four fine steeds and driven by a trusty retainer, the Warlord Games General’s coach is the ideal place for an army commander to consider the upcoming campaign and enjoy a glass or two with what looks like his ‘niece’...

    The Earl of Essex famously travelled with his own coffin in his coach, just in case. That may have been a little dispiriting for his troops!

