- name: Early Greek Hoplites
  sku: WGH-GR-02
  ean: 5060200843314
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/greeks-ancient-greek-hoplites
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/Early_Greek_hoplites_3D_box_render_copy.png?v=1765968377
  status: current
  description: |-
    The hoplite phalanx was one of the most formidable fighting formations of the ancient world, enabling the Greeks to dominate the battlefields of their homelands and much of the Near East for hundreds of years.

    Each hoplite was equipped with the best armour and equipment he could afford, which often gave the phalanx a rag-tag appearance. The front ranks were reserved for the wealthiest, and therefore best-equipped, men where they hoped to perform heroic deeds in their rich panoply, while the poorer labourers and farmers arguably those most suited to fighting took their place behind.

    These figures can be used to represent the armies of the Greek city states and the mercenaries that fought abroad from the mid-6th century to the 4th century BC.

    This box contains 42 hard plastic multi-part 28mm figures 25 in linen armour, 10 unarmoured, 5 in bronze armour, 1 piper and 1 optional command model and a sheet of full-colour waterslide shield transfers. Two arrow sprues, ideal for decorating the shields and bases, are also included.

    *Models supplied unassembled and unpainted*
- name: 'Early Imperial Romans: Camel Riders'
  sku: WGH-IR-26
  productType: single_kit
  priceGbp: 14.00
  url: https://store.warlordgames.com/products/early-imperial-romans-camel-rider-unit
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-ir-26-camel-riders-a.jpg?v=1575565666
  status: current
  description: |-
    Dromedarii were camel riding auxiliary forces recruited in the eastern, desert, provinces of the Roman empire. The best-known unit was the "ala I ulpia dromedariorum milliaria" \(The Ulpian Wing of Camel-riders, One Thousand strong\), raised by the Emperor Trajan and stationed in Syria. Roman 'mixed' auxiliary cohorts \(cohortes equitatae\) in the East often contained some dromedarii - about three dozen in the case of cohors XX palmyrenorum equitata stationed at Dura Europos in the early Third Century. A few would be sent out on patrol with the infantry and cavalry.

    We are not entirely sure how these fine fellows were dressed, but Warlords' take on them is more of an ancient SAS long range desert patrol.

    Robed against the beating sun, cluttered with amphorae and water skins, these fellows are tooled up for business, be it dismounted skirmishing or a full bloodied camel charge!

    This pack contains 3 random metal Camel Riders.

    *Models supplied unassembled and unpainted*
- name: 'Napoleonic Wars: Prussian Landwehr at Trail 1789-1815'
  sku: WGN-PR-22
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/napoleonic-wars-prussian-landwehr-at-trail-1789-1815
