- name: Safe & Sound Bolt Action Army Box
  sku: SAFEBA01
  productType: army_box
  priceGbp: 32.50
  url: https://store.warlordgames.com/products/safe-sound-bolt-action-army-box
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/SAFEBA01_Safe___Sound_Army_Box_01.jpg?v=1733935472
  status: current
  description: |-
    Safe and Sound presents the *BOLT ACTION ARMY BOX* – an officially licensed storage and transport box for Bolt Action miniatures.

    Provide your models with safety and transport convenience using this new cardboard box with foam inserts! This sturdy organizer is designed specifically for *Bolt Action* players, offering space for up to 90 infantry models and several vehicles from the game.

    **Design**

    The exterior of the box is styled to resemble a WWII ammo crate, complete with realistic wear, offering a rugged, authentic feel. Inside, the theme shifts to evoke the personal side of a soldier’s journey. The interior artwork showcases war memorabilia, including faded photographs, aged newspapers, maps, and keepsakes, creating the feel of a soldier’s private collection stored away in a trusty crate.

    **Key Features**

    - **Optimal Dimensions:** Compact yet spacious, perfect for transportation and storage.
    - **Protective Foam Inserts:** Soft yet durable foam inserts provide a snug fit for models, protecting them from scratches, damage, and shocks.
    - **Modularity:** Thoughtful layout with foam inserts for models and customizable raster foam allows for storing both infantry and heavier equipment, including vehicles like tanks.
    - **Durability:** Made from robust, long-lasting cardboard that withstands transportation and regular use.
    - **Lightweight:** The box is easy to carry, making it perfect for tournaments and casual games alike.

    This is an ideal solution for tabletop gaming enthusiasts who want to keep their models safe and organized, ensuring they’re always ready for battle. The box not only provides protection but also keeps everything tidy, allowing you to focus entirely on the game.

    **Included in the Bolt Action Army Box**

    - **Cardboard box**, crafted from high-quality double-sided foil-coated cardboard.
    - **Set of three foam trays**, each designed to securely hold 30 models. Each tray features:
     - 24 slots measuring 40mm x 25mm x 25mm for standard infantry.
     - 6 slots measuring 60mm x 25mm x 25mm for heavy weapon teams.
    - **Raster foam insert**, measuring 267mm x 197mm x 80mm, dedicated to vehicles. The raster foam is divided into each with a side length of 14 mm, which can be gently removed by plucking.
     - **Efficient Planning:** To maximize space usage, we recommend carefully planning the layout of your models before removing squares.
     - **Adhesive Backing:** The underside of the raster foam is coated with a special adhesive that is non-marking and non-drying, protected by a layer of paper. After removing some squares and shaping the resulting spaces to fit your models, you should peel off the protective paper layer and attach the bottom separator to secure the configuration.

    **Box Dimensions**

    - Internal dimensions: 394mm x 267mm x 98mm.
    - External dimensions: 420mm x 280mm x 102mm.

    This organizer ensures your *Bolt Action* miniatures are protected, organized, and always ready for battle!

    *Miniatures shown for illustrative purposes only and are not included.*
