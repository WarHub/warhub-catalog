- name: Plastic Gabions (20)
  sku: REN-GAB
  productType: single_kit
  priceGbp: 10.00
  url: https://store.warlordgames.com/products/gabions
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/gabions-big.jpg?v=1575565923
  status: current
  description: |-
    Gabions are military fortifications made from wickerwork in the shape of large round cages with open tops and bottoms, Early examples were most commonly used to protect field artillery gunners and could be stood on end, staked in position, and filled with soil to form an effective wall around the gun.

    The wickerwork cylinders were light and could be carried relatively conveniently in the ammunition train, particularly if they were made in several diameters to fit one inside another.

    Gabions were not only used during the Pike & Shotte era and in more modem times were often used to protect forward operating bases against explosive shells and indirect fires such as mortar or artillery fire.

    Examples of areas that make extensive use of gabions would be sleeping quarters, mess halls, or any place where there will be a large concentration of unprotected soldiers.

    Pack contains 2 sprues which will make a total of 20 gabions!

    *Note: Models supplied unassembled and unpainted*
