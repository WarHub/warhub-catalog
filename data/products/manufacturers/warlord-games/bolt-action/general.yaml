    Crisis in Stalingrad is a fantastic addition to any German *Bolt Action* collection, whether as a thematic diorama or as a Company Commander team. Featuring two beautifully sculpted senior German officers and a map table, this Warlord Resin set is a great opportunity to show off your scene-setting skills, and of course a must-have for Soldier of Fortune collectors.

