- name: Later City-State spearmen with shields
  sku: WG-EMB-30
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/later-city-state-spearmen-with-shields
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGH-EMB-30-Later-City-State-Spearmen-Shields-a_437c7452-6215-46b1-a479-e2571bcb6c98.jpg?v=1575566006
  status: current
  description: |-
    These figures are appropriate as the main battle-line spearmen of the Akkadian and Neo-Sumerian Successor State armies at the end of the Early Bronze Age. They can also be used in Early Elamite and Early Highlander armies as household troops or mercenaries. It is possible that the front rank spearmen did not carry a spear, but rather carried only an axe and large body shield to protect the rear ranks of the phalanx. This is dependant on how the earlier Sumerian Stele of Vultures is interpreted. Akkadian practice is taken to follow this precedent, as there is no pictorial evidence of Akkadians using shields. However, as some wargames rules only provide for 2 actual ranks of spearmen to represent the body of spearmen, the visual impact of a phalanx of spears would be lost if only the rear rank had a spear. Hence, these figures have the front rank with a shield and a spear and the rear ranks with a spear only.

    Following on from earlier Sumerian practice it is possible therefore that the weight of the shield was taken by a strap attached to the shield and which hung over the shoulder. Indeed there is possible evidence of large wicker shields from an Akkadian stela from Nasriyah, and which show shoulder straps. It seems logical that shields would start to become smaller before the eventual adoption of the Amorite shield at the beginning of the Middle Bronze Age.

    Pack contains 8 metal figures

    *Note: Models supplied unassembled and unpainted*
- name: Later City-State spearmen
  sku: WG-EMB-29
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/later-city-state-spearmen
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGH-EMB-29-Later-City-State-Spearmen-a_6770bda3-eb40-466a-bd32-34b21db384f5.jpg?v=1575566004
  status: current
  description: |-
    These figures are appropriate as the main battle-line spearmen of the Akkadian and Neo-Sumerian Successor State armies at the end of the Early Bronze Age. They can also be used in Early Elamite and Early Highlander armies as household troops or mercenaries. It is possible that the front rank spearmen did not carry a spear, but rather carried only an axe and large body shield to protect the rear ranks of the phalanx. This is dependant on how the earlier Sumerian Stele of Vultures is interpreted. Akkadian practice is taken to follow this precedent, as there is no pictorial evidence of Akkadians using shields. However, as some wargames rules only provide for 2 actual ranks of spearmen to represent the body of spearmen, the visual impact of a phalanx of thrusting spears would be lost if only the rear rank had a spear. Hence, these figures have the front rank with a shield and a spear and the rear ranks with a spear only. **These are Spearmen without Shields.**

    In later Akkadian armies it appears that such troops also operated independently in situations where it would be cumbersome to carry a large body shield. Such shieldless Spearmen are depicted in the Victory Stele of Naram-Sin attacking Lullubi Highlanders in wooded mountainous terrain.

    Pack contains 8 metal figures

    *Note: Models supplied unassembled and unpainted*
