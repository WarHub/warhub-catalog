    **OBSERVATION POST**

    In this month’s OP we review *Bolt Action* Soviets, *The Silver Bayonet* undead in Britain, Gunpowder Plot inspired Bloody Miniatures, and Frostgrave plastic Cultists III.

    **RELEASE RADAR**

    Dom Sore brings a broad selection of new releases to your attention thanks to his Release Radar.

    **THEME: DESIGNER’S NOTES: KONFLIKT ’47**

    We talk to two of the creatives behind the reimagined *Konflikt ’47* and learn about the development of the game, background, and miniature range.

    **PAINTING VICTRIX’S LATE WAR GERMAN INFANTRY AND HEAVY WEAPONS**

    Matt Parkes paints a selection of Victrix’s German plastics, adding camo and basing detail to fit them into various World War Two theatres.

    **THEME: FRAME FOCUS: KONFLIKT ’47 FREEBIE FIREFLIES**

    Wondering what to do with your free frame of US Firefly Airborne Infantry? Wonder no more as Matt Parkes shares his method, using The Army Painter’s Warpaints range.

    **THE BATTLE OF ALIWAL 1846 - PART TWO**

    Ian Cluskey of the Boondock Sayntes returns to discuss his board building for this excellent Partizan 2025 game.

    **THEME: PAINTING THE WEIRD WAR**

    Kirsten Williams gives us the inside track on painting Warlord Games’ *Konflikt ‘47* studio miniatures.

    **BATTLE OF ATTU**

    Adam J. Sharp, of the Thomas Hill Wargamers Club, presents an impressive recreation of one of World War Two’s lesser-known clashes.

    **THEN WENT FORTH THE PROUD THANES**

    Simon MacDowall reports on the game he played at 2025’s Maldon battle day.

    **FROSTGRAVE TENTH ANNIVERSARY Q&A**

    James interviews *Frostgrave* Author Joe McCullough and Editorial Director Phil Smith to celebrate the fantasy skirmish game’s tenth birthday.

    **THE FLOWER OF CHIVALRY**

    James Titterton and Dean Heathcote present the gaming side of a battle they know a lot about. They wrote the book on it - literally!
