    There are few more iconic images of the Celt army than squadrons of chariots hurtling across the battlefield harrying the enemy flanks or providing shock tactics to test the mettle of the enemy battleline

    This chariot encapsulates the consummate skill charioteers had as he balances on the pole and yoke as the chariot speeds across the battlefield. Julius Caesar was in awe of the skill of the Biritish Charioteers so one can only think what the common Roman soldier thought as he faced hordes of light chariots!

