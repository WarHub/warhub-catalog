- name: M36/B1 tank destroyer
  sku: WGB-AI-121
  productType: single_kit
  priceGbp: 33.50
  url: https://store.warlordgames.com/products/m36-b1-tank-destroyer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgb-ai-121-m36b1-td-a_1.jpg?v=1575565885
  status: current
  description: |-
    With the advent of heavy German armour such as the Panther and Tiger, the standard U.S. tank destroyer, the 3" Gun Motor Carriage M10, was rapidly becoming obsolete, because its main armament, the 3" M7 gun, had difficulty engaging these new tanks past 500 meters. This was foreseen, however, and in September, 1942 American engineers had begun designing a new tank destroyer armed with the M3 90 mm gun.

    The first M36 prototype was completed in March 1943, with a new turret mounting the 90 mm M3 gun on a standard M10 chassis. Like all US tank destroyers, the turret was open-topped to save weight and provide better observation.

    It was not until September 1944 that the vehicle first began to appear in the European Theatre of Operations. The need for 90 mm gunned tank destroyers was so urgent that, during October-December 1944, 187 conversions of standard Medium Tank M4A3 hulls were produced by Grand Blanc Arsenal.

    These vehicles, designated M36B1, were rushed to the European Theatre of Operations and used in combat alongside standard M36s. The M36 was well liked by its crews, being one of the few armoured fighting vehicles available to US forces that could destroy heavy German tanks from a distance.

    Pack contains 1 metal & resin vehicle..

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Note: Models supplied unassembled and unpainted*
