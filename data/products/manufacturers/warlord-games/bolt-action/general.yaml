    This month's Soldier of Fortune is another heavy hitter of early Imperial Rome - Tiberius! Before becoming the second Emperor in 14AD, Tiberius was one of Rome's most capable diplomats and military leaders. The stepson of Augustus, the first Emperor, Tiberius would win significant victories in Pannonia and Dalmatia, bringing the regions into the Empire, as well as conducting significant campaigns in Germania that his adopted nephew Germanicus \(last month's Soldier of Fortune figure!\) would build upon.

    The Soldier of Fortune set shows Tiberius in both of his aspects. The mounted figure reads from a proclamation, stamping Roman authority on some newly conquered territory, while the foot figure holds up the severed head of a German warrior - a bloody reminder of the consequences of resistance! Both are clad in the gorgeously appointed uniform of a roman general, providing an amazing opportunity for painters to really show off their skills. Both figures make great command pieces for *Hail Caesar*, leading your legions into battle against all challengers.

    Historically, Tiberius would only reluctantly take up the role of Emperor, and this Soldier of Fortune set will only be around for the month of December. After that, he'll have to disappear to perform his Imperial duties, and won't be seen again for many years!

