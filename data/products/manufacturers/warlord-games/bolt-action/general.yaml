- name: M46 Patton heavy tank
  sku: 405108004
  ean: 5060572504578
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.50
  url: https://store.warlordgames.com/products/m46-patton-heavy-tank-1
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/405108004_KoreaM46Patton02_6a51d75a-ff48-46d5-bd23-fd300c09a7dc.jpg?v=1710333975
  status: current
  description: |-
    The only American combat use of the M46 Patton was during the Korean War. On 8 August 1950, the first M46 Patton tanks, belonging to the 6th Tank Battalion, landed in South Korea. The M46 proved to be capable against North Korean T-34 medium tanks.

    Though the Armaments Board designated the M46 a 'medium' tank, its capabilities equalled those of the M26 Pershing. Sporting a similar 90mm gun \(though enhanced a little\), the M46 didn't lack firepower. The deployment of the M46 enabled the Pershings to be withdrawn.

    The M46 proved a critical component in the defence of the Pusan perimeter during 1950. Subsequently, it was used at Inchon to support the US Marine amphibious landings. Replaced by the M47 \(developed in 1952\), its US combat service was limited to the Korean War.

    The M46 Patton comes to Bolt Action Korea as a powerful addition to any US force in the Korean war. Its main weapon is gyro-stabilised, providing a great boon to any experienced tank crew!

    Contains: One resin and metal heavy tank, Bolt Action stat card, vehicle damage markers, full colour waterslide decals.

    *Models supplied unassembled and unpainted*
