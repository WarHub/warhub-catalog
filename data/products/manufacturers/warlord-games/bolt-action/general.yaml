- name: Ghar Assault Squad (plastic)
  sku: WGA-GAR-06
  ean: 5060393703037
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 24.00
  url: https://store.warlordgames.com/products/ghar-assault-squad-plastic
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-06-Ghar-Assault-Squad-a.jpg?v=1575566231
  status: current
  description: |-
    The Ghar exist only to fight, having been engineered in the distant past to fight some long-forgotten war. Whoever created them perished eons ago, leaving the Ghar to pursue their one and only purpose remorselessly until the end of time. The Ghar will prevail! Genetically engineered to form the biological component of an armoured fighting machine, they are weak and helpless creatures without their battle armour. Encased within their armoured suits, and propelled by plasma generators, they are many times more powerful than a mere human. Pitiless and impossible to reason with, they care little for casualties, and will fight to the death rather than surrender.

    Ghar Assault Squads are equipped with powerful plasma claws that drip with raw energy, giving them the ability to tear apart even the toughest enemy. They also carry electro-magnetic Gouger missiles. These short ranged hook-like missiles spin towards their target generating a powerful electro-magnetic charge as they do so. When they strike this charge is released, crippling the target’s nanite infrasphere, knocking out mechanical components, and frying the nervous systems of living creatures.

    Contains the following multi-part plastic models:

    - 3 Ghar in battle armour with Gouger, Plasma Claw and Disruptor Discharger

    *Models supplied unassembled and unpainted*
