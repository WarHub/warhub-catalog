- name: Wargames Illustrated WI452 August 2025 Edition
  sku: WI452
  productType: single_kit
  priceGbp: 1.00
  url: https://store.warlordgames.com/products/wargames-illustrated-wi452-august-2025-edition
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/WI452_Cover.jpg?v=1753115429
  status: current
  description: |-
    **OBSERVATION POST**

    In this month’s reviews we look at new early Medieval skirmish rules, the latest *Bolt Action Armies of*… book, and plastic tanks and animals.

    **RELEASE RADAR**

    Dom Sore returns with his monthly missive on what’s new in the world of wargaming.

    **QUICK FIRE**

    Short, quick-read posts from *WI* readers about their hobby projects, notes, news, and observations.

    **DESIGNER’S NOTES: DEATH AND THE LANDSKNECHT**

    Author Charles Singleton introduces us to the new Warlord Games Italian Wars *Pike and Shotte* supplement.

    **FIGHT FOR AMERICA!**

    *WI* Editor Dan visits Stone Nest in Central London to speak to Christoper McElroen and Neil Wilkinson, co-creators of a wargame-*cum*-art installation, which intrigues and shocks in equal measure.

    **THE SHIFTING SANDS PART TWO**

    Bob Giglio finishes his thrilling 7TV *Pulp* adventure in the desert with two more exciting tales of adventure.

    **COVER MOUNT FOCUS: EPIC BATTLES REVOLUTION! FREEBIE FRAMES**

    We examine the free *Black Powder* Epic Battles Revolution! frames bagged up with this month’s issue.

    **WARGAMING WITH SNIPERS: THROUGHOUT HISTORY**

    After his piece on Simo Häyhä in *WI*450, James is back to discuss how to use sharpshooters in more varied theatres and other historical periods.

    **BATTLE REPORT: NEVER MIND THE BUSHIDO**

    *Never Mind the Billhooks* heads East in this battle report, which sees Ashigaru, Samuria, Ronin and Ninjas clash in this variant of the popular small battles rules.

    **OVERLORD 1944**

    Sébastien Clément provides us with a guide to his award-winning Salute 52 Painting Competition entries.

    **BATTLE FOR SUPREMACY**

    Matthew Spurling reports on this year’s premiere competitive *Bolt Action* gaming event!

    **A TABLETOP TRIUMPH**

    Bill Gaskin’s board at Partizan 2025 was an awe-inspiring spectacle and *WI*’s James was lucky enough to get a guided tour from the legendary hobbyist.

    **FIGURE SPOTLIGHT: WINTER WARRIORS**

    Hot on the heels of Victrix’s Late War Germans comes another set of fantastic plastic figures, this time from Warlord Games, with their new British & Canadian Infantry \(Winter\) box.
