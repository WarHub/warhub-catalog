- name: Kelly's Heroes Bundle
  sku: 409913004
  productType: box_set
  priceGbp: 105.50
  url: https://store.warlordgames.com/products/kellys-heroes-bundle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/409913004_Kelly_s_Heroes_Bundle.jpg?v=1713802531
  status: current
  description: |-
    *Rarely, if ever, have the words ‘war’ and ‘comedy’ somehow been so successfully combined as in MGM’s 1970 classic movie ‘Kelly’s Heroes’. However, the movie which was originally entitled ‘The Warriors’ underwent a major transformation process from its inception to its release, including the cutting of entire scenes and characters and the addition of extended action sequences.*

    *Several members of the cast and crew voiced their disapproval of the changes which altered a grittier war movie with depth of character and an integral romantic sub-plot into an action-packed, farcical comedy. However, the cult following which Kelly’s Heroes enjoys nearly 50 years later and the plethora of infinitely quotable lines is perhaps the best proof that the final cut hit the nail right on the head.*

    *We've taken information from the final cut of the movie, Burt Hirschfeld’s accompanying 1970 novel of the same name, \(based heavily on the original script\) and the real life history behind the units portrayed in the movie to bring a slice of Hollywood to your battlefields...*

    Bundle contains:

    - 1 x Oddball Heroes box
    - 1 x Oddball Sherman
    - 1 x Hollywood Tiger

    *Models supplied unassembled and unpainted*
- name: M8 Scott HMC
  sku: 402013013
  ean: 5060572507197
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22.00
  url: https://store.warlordgames.com/products/m8-scott-hmc
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402013013_M8ScottHMC01.jpg?v=1626049931
  status: current
  description: |-
    Based on the ubiquitous M5 Stuart light tank hull, the M8 75mm Howitzer Motor Carriage \(HMC\) provided much needed mobile artillery support to US assault forces. The M8 replaced the M5 Stuart turret with a more spacious open-topped turret to house a short-barrelled M2 75mm howitzer, with a pintle-mounted .50 Cal heavy machine gun to provide additional defensive firepower. It saw extensive US Army and USMC service in the Pacific Theatre, the Italian campaign, and in North West Europe, where it was also used by Free French forces.

    In games of Bolt Action the M8 Scott is a light tank armed with a light howitzer and a pintle-mounted heavy machine gun that can be used to defend against air strikes, and can be included in Armoured Platoons.

    Contains 1 Plastic Vehicle, Assembly Guide, Decals, Stats Cards and Damage Markers

    *Note: Models supplied unassembled and unpainted*
