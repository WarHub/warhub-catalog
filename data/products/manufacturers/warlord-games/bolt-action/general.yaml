- name: Virai Dronescourge Constructor squad
  sku: 502216501
  productType: single_kit
  priceGbp: 21.50
  url: https://store.warlordgames.com/products/virai-dronescourge-constructor-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502216501-Virai-Dronescourge-Constructor-Squad-box-front.jpg?v=1575566775
  status: current
  description: |-
    The most numerous drones in a Virai Hive are the Constructor drones. Typically placed under the command of lessor architectors called ‘Tertiary Supervisors’, Virai Constructors are the multi-limbed workers, builders, scouts, miners or engineers, dependent on the task they have been created to perform. Their equipment can vary on a daily basis as they become reassigned to different tasks.

    Each Constructor is protected by a lighter version of the multi-layered, honeycombed, cerametallic shells that all Virai bear. Their manipulator appendages and equipment varies depending on their exact role but include tools such as molecular bonders, power jacks and vices that can be lethal when used in close combat. Each constructor is also equipped with a multi-purpose fusion cutter, a general-purpose slicing tool that can have its focus adjusted for use in combat. Like many Virai fusion weapons, the cutter is much more effective up close before its destructive power becomes too dispersed.

    *Models supplied unassembled and unpainted*
- name: Virai Dronescourge - Virai STAA probe shard
  sku: 503016501
  productType: single_kit
  priceGbp: 8.50
  url: https://store.warlordgames.com/products/virai-dronescourge-virai-staa-probe-shard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/503016501-Virai-STAA-Probe-Shard-01_f23bfa06-9dd3-4ed4-827c-a607219aaf0c.jpg?v=1575566768
  status: current
  description: |-
    Virai drones are occasionally equipped with enhanced sensors and additional targeting algorithms so they can act in a fashion similar to targeter probes used by the more advanced Antarean factions.

    Using their targeting sensors, Virai STAA probes gather a broad range of target acquisition data which is then fed into the swarm’s shared target acquisition algorithms \(STAA\). Such success can be short-lived, however, as battlefield conditions change.

    *Models supplied unassembled and unpainted*
- name: Virai Dronescourge - First Instance
  sku: 502416502
  productType: single_kit
  priceGbp: 19.50
  url: https://store.warlordgames.com/products/virai-dronescourge-first-instance
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502416502-First-Instance-box-front.jpg?v=1575566789
  status: current
  description: |-
    The Virai Dronescourge are a species of artificial life, drones with machine intelligences conforming to a strict, hierarchical structure. They are feared by all Antarean nations due to their purposeful disregard for both biological life and integrated, cooperative intelligences such as the IMTel. Their leaders are specialised drones called architectors, and the Virai First Instance is the sole commander of a Dronescourge Hive.

    This box contains:

    - 1 x Virai First Instance with tool appendages and dual fusion cutters
    - 2 x Virai Warrior Drone Bodyguard with ripclaws and fusion flamers

    Each First Instance has comprehensive data cores holding the memories of all of its predecessors. Amongst the memories are blueprints for all the drones, weapons, tools and machinery a Hive could possibly need dependent on what resources it can mine or scavenge. A First Instance can back itself up to lesser architectors or clone itself into a NuFirst, a drone whose task is to leave the Hive and establish a new colony.

    Virai First Instances are equipped with repair swarms to fix battle damage, multiple tool appendages and a pair of heavy duty fusion cutters, and are protected by multi-layered, honeycombed, cerametallic shells. They are normally accompanied by a bodyguard, either of Weapon or Warrior drones, the latter armed with vicious ripclaws for tearing at rock and enemy armour as well as deadly, dual-purpose fusion flamers.

    *Models supplied unassembled and unpainted*
- name: LVT(A)-1  37mm AMTANK
  sku: 405103004
  productType: single_kit
  priceGbp: 35.50
  url: https://store.warlordgames.com/products/lvta-1-37mm-amtank
