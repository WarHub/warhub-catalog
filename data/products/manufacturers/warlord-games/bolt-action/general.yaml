- name: Soldier of Fortune 32 - 'Paddy' Mayne, SAS Hero
  sku: 403019921
  productType: single_kit
  priceGbp: 8.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-32-paddy-mayne-sas-hero
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403019921_PaddyMayneScenic1.jpg?v=1772120904
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of March 2026, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in April…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    March’s Soldier of Fortune figure continues the trend of returning legends!

    This awesome sculpt of Paddy Mayne, based on his appearance in Egypt in 1942, previously served as the 2022 Open Day special figure, and he’s returned to duty once more!

    One of the legendary ‘rogue heroes’ of the British Special Air Service, Mayne was also a solicitor, international rugby player, and infamous hell-raiser - truly the stuff of legends. With Thompson gun in hand \(and inquisitive ape by his side\) he’s a natural choice to become a Soldier of Fortune - again!

    *Models supplied unassembled and unpainted*
- name: Wargames Illustrated WI459 March 2026 Edition
  sku: WI459
  productType: single_kit
  priceGbp: 5.99
  url: https://store.warlordgames.com/products/wargames-illustrated-wi459-march-2026-edition
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/WI459Cover.jpg?v=1771956277
  status: current
  description: |-
    **OBSERVATION POST**

    In this month’s OP we’ve got skirmish campaigning in mythical Greece, campaigning anywhere, and campaigning in the Franco-Prussian War.

    **RELEASE RADAR**

    Dom Sore’s always keeping an eye out for new and exciting wargaming releases.

    **QUICK FIRE**

    Short, quick-read posts from *WI* readers about their hobby projects, notes, news, and observations.

    **THE WARGAMES ILLUSTRATED READERS’ AWARDS**

    We present the results of the ninth annual *Wargames Illustrated* Readers’ Awards and hear from the winners.

    **2025 HOBBY HERO: CHRIS ‘PEACHY’ PEACH**

    Your Hobby Hero for 2025 is Chris ‘Peachy’ Peach of the Peachy Tips YouTube channel. We lured him to *WI*Towers with a cheap trophy and mug of Yorkshire Tea, then James threw some questions his way!

    **THE MARKER QUEST**

    Manuel Barros Silva learns how to paint with pens!

    **CHUGGING ALONG THE CHITTAGONG**

    Glenn Clarke describes his latest foray into another of wargaming’s less explored conflicts, the Third Burma War.

    **LILY BANNERS GOES FORTH**

    *Beneath the Lily Banners* returns for a fourth edition; we invited the game’s designer, Barry Hilton, to *WI*HQ to play through a game with fellow Marlburian maven Nick Eyre of North Star.

    **TILTS, TROLLS, AND TROUBLE**

    Tom Hill bolts fresh scenarios, new objectives, and new ideas onto Joe McCullough’s crazy fantasy sports game, *Hairfoot Jousting*!

    **MESSING ABOUT IN BOATS**

    Australian wargamer Mark Piper continues his tabletop gaming set in New Zealand from 1800-1850, with three scenarios that explore Crown and Māori waterborne operations.

    **BATTLE AT MONTE CASSEL, 1677**

    Colonel Bill Gray mixes history, playtesting, and wargaming fun as he brings an expansion for his *Age of Eagles II* rules to its conclusion.

    **MIDGARD - GREAT NORTHERN WAR**

    Matt Moran expands James Morris’ *Midgard* rules beyond their initial intended scope, testing them out in the Great Northern War \(1700 - 1721\).

    **STRALSUND 1628**

    Jan Karrman gives us a preview of the game he’ll bring to this year’s Salute wargames show.

    **GOING GREEK WITH GAMERS GRASS TERRAIN PART TWO**

    James completes the *Warriors of Athena* terrain he built in our last issue.

    **BUILDING A BURMESE TEMPLE**

    Glenn Clarke shows how he constructed a Burmese temple, as featured in his article on page 38.
