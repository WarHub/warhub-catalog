    Mounting a pair of .50cal heavy machine guns and a 37mm autocannon on the back of an M3 half-track, the M15 was designed to provide US forces with powerful and versatile mobile anti-aircraft firepower. It proved extremely capable in this regard, and was well-liked by its crews and commanders. When deployed against infantry and light vehicles, the effect was predictably destructive!

