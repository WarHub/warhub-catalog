- name: Samurai
  sku: 202014004
  ean: 5060393706946
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/samurai
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/202014004_Samurai_GW22_box_front.jpg?v=1575566747
  status: current
  description: |-
    The Samurai is an almost mythical warrior caste of Japanese history. Their most famous exploits occurred during the Sengoku period between 1467 and 1603. With the Emperor and the Shogun unable to control the many Daimyos, there was near constant fighting between the various factions. In these times the Samurai code \(Bushido\) became more defined and standards of fighting improved. Even the introduction of the musket in 1543 was seen as an opportunity rather than a threat.

    **This product contains:**

    - 20 plastic foot Samurai
    - Decal sheet with Takeda clan markings
    - Assembly leaflet
    - Plastic bases

    Samurai would train with many weapons and today are most associated with the katana. This was only one part of their arsenal; yari \(spear\), yumi \(bow\) and no-dachi \(greatsword\) were often used as well.

    Each Samurai would be a master at one weapon or more as well as expected to follow an increasingly rigid moral code. Able to fight on their own or in coordinated groups they are the best fighters at a Daimyo’s disposal.

    *Models supplied unassembled and unpainted*
- name: Ashigaru Spearmen
  sku: 202014002
  ean: 5060393706922
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/ashigaru-spearmen
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/202014002_Ashigaru_Spearmen_GW22_box_front.jpg?v=1575566731
  status: current
  description: |-
    Ashigaru \(literally “light foot”\) were so named as they had lighter armour than the Samurai. They also formed the bulk of the armies of the day. Each Samurai was expected to provide two armed Ashigaru. Many of these would be armed with the yari \(spear\).

    **This product contains:**

    - 20 plastic Ashigaru with Yari spears
    - Decal sheet with Takeda clan markings
    - Assembly leaflet
    - Plastic bases

    These are not the pike blocks of contemporary Europe as the Ashigaru were trained to fight in a looser formation, travel quicker and their spear was for slicing and thrusting. Many a battle was won by the Ashigaru, especially if cavalry were foolish enough to attack them from the front.

    As time went on in the Sengoku \(1467-1603\) period the proportion of Ashigaru spearmen increased. Their relative ease and speed of training meant they were easier to replace \(and cheaper\). Marching into battle with drums beating, worn on the backs of troops and beaten by the man behind, and displaying their masters Mon on their sashimono, they would be a formidable sight to behold. Tokugawa Ieyasu, the Shogun that pacified Japan, was himself the son of an Ashigaru.

    *Models supplied unassembled and unpainted*
- name: Samurai Horsemen
  sku: 202014005
  ean: 5060393706953
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/samurai-horsemen
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/202014005_Samurai_Horsemen_GW22_box_front.jpg?v=1575566729
  status: current
  description: |-
    The Samurai began life as retainers to the nobility and over time became known as the main warrior body of Japan. Initially, they were cavalry, armed with hand weapons and missile weapons. Hard hitting and superbly trained they were a professional force given many privileges as long as they served well.

    **This product contains:**

    - 12 plastic Samurai horsemen
    - Decal sheet with Takeda clan markings
    - Assembly leaflet
    - Plastic bases

    Eventually, they would become a political force in their own right, often answering to no master other than in name. This also led to internecine fighting between various factions for territory, revenge or simple pride.

    By the 16th and 17th centuries, warfare was changing and the Samurai were changing with it. They did not forget their horse-riding roots while this change happened. Even though the introduction of the long spear made cavalry charges more difficult to pull off they were still performed. A well-timed strike by a unit of Samurai horsemen could turn the tide of a battle. These cavalry attacks continued throughout the Sengoku period and many a daimyo lost his head to one.

    *Models supplied unassembled and unpainted*
