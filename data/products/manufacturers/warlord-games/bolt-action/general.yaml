  productType: single_kit
  priceGbp: 6.99
  url: https://store.warlordgames.com/products/decalfix-28ml-bottle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/ac6134-28ml-decalfix.jpg?v=1746547004
  status: current
  description: |-
    **Usage**

    A water-based solution for softening decals and securing them into position.

    **Substrate**

    Decals are usually applied onto painted surfaces. Care should be taken to avoid ‘silvering’ over matt paints.

    **Application**

    Brush on to decals or immerse them in Decal fix for approx. 45 seconds or until softened. Slide off using a brush and dab dry with tissue paper.

    **Drying Time**

    20-30 minutes. Do not force dry decals as they may crease or shrivel.

    **How To Clean**

    Excess product should be wiped away using a damp cloth.
