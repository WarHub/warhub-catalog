- name: US Army weapons teams
  sku: 402213109
  ean: 5060917991278
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 16.00
  url: https://store.warlordgames.com/products/us-army-weapons-teams
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402213109_USArmyWeaponsTeams01.jpg?v=1684337704
  status: current
  description: |-
    Infantry weapons teams are a key component of any Bolt Action army, providing as they do great tactical flexibility for your force. Anti-tank teams and flamethrower teams are among the most prevalent, presenting your opponent with multiple challenges to overcome.

    The tasks of scouting and sniping were similar in American doctrines. In the US manual it was clearly stated that the duty of a sniper was to kill enemy officers in order to damage the morale of enemy troops. They were equipped with a telescopic sight on a M1903 bolt-action Springfield rifle, and also had close-combat weapons such as pistols and shotguns with which to defend themselves if discovered. Both members of the team had sniper training so the role of spotter was interchangeable.

    Mortars were the most commonly available type of support weapon. Paratroopers and Rangers had one mortar per platoon, in addition to those that may have been assigned at company level. Normally they were deployed in a suitable rear position, no further than 100 yards from the observer in order to ‘cover the most dangerous approaches to the platoon area’. The standard light mortar was of relatively large calibre at 60mm. It fired a correspondingly larger and more effective shell over a greater range than the smaller mortars used by the Germans and the British. The only problem was the weight \(19kg\) that meant a larger team was needed to move it.

    Flamethrowers were used throughout the war, especially in the Pacific, to clear out tunnels and bunkers. During the Normandy landings, the number of flamethrowers was increased to allow the men to open a gap in the fortified lines.

    Contains the following Warlord Resin PlusTM figures:

    - 2-man Sniper team
    - 3-man Light Mortar team
    - 2-man Flamethrower team

    These figures are cast in our new and improved Warlord Resin Plus™. For more information on this material click [here](https://warlord-community.warlordgames.com/introducing-warlord-resin-plus/)

    *Models supplied unassembled and unpainted*
- name: M4A3E8 Sherman Easy Eight
  sku: 402013015
  ean: 5060917991940
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/m4a3e8-sherman-easy-eight
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402013015_M4A3E8ShermanEasyEight01.jpg?v=1684252522
  status: current
  description: |-
    Initially designated the M4A3\(76\)W HVSS but shortened to M4A3E8 , this medium tank was eventually nicknamed the 'Easy Eight' by the US soldiers who fought in and alongside them. The Easy Eight boasts several improvements over earlier M4 Sherman designs, such as the Horizontal Volute Suspension System \(HVSS\) and wider tracks, welded hull instead of cast, and most importantly a high velocity 76mm main gun.

    The first Easy Eights were introduced in December 1944, just in time to see action in the Battle of the Bulge, where they proved their worth in the treacherous conditions. Over 2,500 Easy Eights were produced during the Second World War, and the design proved successful enough to see it continue to fight during the Korean War and even into the Vietnam conflict.

    In games of Bolt Action this is a medium tank with a heavy anti-tank gun and co-axial MMG, a hull mounted MMG and the option to add a pintle mounted HMG; it can be included in Armoured Platoons.

    *This model can be used to represent any of the various 76mm armed Shermans.*

    Contains:

    - Plastic 'Easy Eight' medium tank
    - Bolt Action stat card and Order Dice
    - Assembly guide
    - Full-colour waterslide decal sheet for US and Canadian vehicles
    - Vehicle damage markers.

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Models supplied unassembled and unpainted*
