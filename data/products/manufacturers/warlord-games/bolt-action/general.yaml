- name: Frostgrave Gnolls
  sku: FGVP03
  ean: 9781472896155
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22.00
  url: https://store.warlordgames.com/products/frostgrave-gnolls
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/FrostGrave_Gnolls_plastic_box.jpg?v=1575566424
  status: current
  description: |-
    The Frostgrave Gnolls plastic box set contains enough parts to make 20 different figures. There are multiple heads, arms, weapons and accoutrements per frame, no two warbands will ever be the same.

    Gnolls feature in Into The Breeding Pits as opponents in the scenarios and as random encounters. They should also be used as the soldiers for Warbands of Beastcrafter Wizards.

    The plastic figures are 28mm sized, supplied unpainted and require assembly with glue.
- name: Beastcrafter & Apprentice
  sku: FGV112
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/beastcrafter-apprentice
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/FGV112_Beast_crafter.jpg?v=1575566422
  status: current
  description: |-
    Amongst the most famous and feared of Felstad’s underground residents were the Beastcrafters. Officially, the name belonged to a specific guild of magic, but in practice the term was applied to any wizard that worked in the breeding pits creating hybrid animals and other monsters. Most of their creations ended up in arenas or exported to foreign lands, but some were sold as guardians, mounts, or exotic pets.

    Since the great cataclysm, most of the knowledge of the Beastcrafters has been lost, and even where the knowledge does still exist, the massive laboratories, vats, and animal-handling facilities demanded by their craft simply no longer exist. It would take the wealth of a kingdom and several decades of work to recreate even the smallest of ancient Felstad’s breeding pits. All of that said, there are a few remaining strains of Beastcrafter magic that tempt wizards into explorations beneath the Frozen City. The most sought-after is the formula for the Elixir of the Beastcrafter, a potion that the ancient wizards used to fuse their own blood with that of animals, allowing them a greater understanding of these creatures and also imbuing them with some of their bestial qualities. Prolonged use of the elixir also caused the imbiber to take on a more animalistic appearance, making them outcasts from polite society, and driving them to spend even more time underground with their monstrous creations.

    28mm sized metal miniatures, supplied unpainted.
- name: Elementalist & Apprentice II
  sku: FGV113
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/elementalist-apprentice-ii
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/FGV113_Elementalist.jpg?v=1575566430
  status: current
  description: |-
    Elementalists are the most outwardly powerful type of wizard. Their magic is centred around controlling the four elements, usually in loud, explosive, and unsubtle ways. Their clothes tend to feature one bold colour, and they are more prone to flashy decorations than other wizards – facial tattoos are not uncommon.

    Most Elementalists, especially those that specialize in the control of fire, tend to have short tempers. While Fire Elementalists may specialize in Fire magic, he or she is more than capable of harnessing the powers of Water, Wind or Earth, should it be necessary.

    Two 28mm sized Pewter miniatures, supplied unpainted.
- name: Frostgrave - In to the Breeding pits
  sku: BP1529
  ean: 9781472815743
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 9.99
  url: https://store.warlordgames.com/products/frostgrave-in-to-the-breeding-pits
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/FrostGrave_into_the_breeding_pits.jpg?v=1575566430
  status: current
  description: |-
    With this new supplement for Frostgrave, players can lead their warbands into the vast network of catacombs, sewers, and dungeons that run underneath the Frozen City. It was in these dark confines that the ancient wizards known as Beastcrafters experimented on living creatures, creating strange hybrids and deadly monsters, many of which still roam the forgotten passageways. Along with a host of new scenarios, treasures, soldiers, and creatures, the book also contains rules for the traps and secret passages that are often found in the dungeons. With wonderful and rare magical treasures to be discovered, will players risk taking their warbands down into the Breeding Pits?

    You need a copy of rulebook to use this supplement.
- name: 'Early Imperial Romans: Marines Regiment'
  sku: WGH-IR-51-REGT
  productType: single_kit
  priceGbp: 35.50
  url: https://store.warlordgames.com/products/early-imperial-romans-marines-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGH-IR-51-REGT-EI-Roman-Marines-Regiment.jpg?v=1575565661
  status: current
  description: |-
    The Romans fielded all manner of specialist troops over their extensive empire, many who’s roles are still to be seen today in existing armies.

    Here we present the Marines, who fought all over the known world as detachments on naval ships, accompanied merchant ships on occasion and also took part in amphibious operations.

    They are not much written about, and our models are based on best guess and evidence that we have available to us. We have given them non ferrous helmets as the last thing you need is more iron to clean of rust! Chain mail rather than Lorica we thought more appropriate to the flexibility of their tasks, and a more manageable shield, with appropriate naval markings of course. Spear and javelin rather than heavy pilum and a good warm cloak complete our study of these tough fellows.

    *NOTE: Miniatures supplied unassembled and unpainted. Contains 16 Roman Marines.*
- name: Freeborn Striker Attack Skimmer
  sku: WGA-FRB-09
  ean: 5060393703907
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 23.00
  url: https://store.warlordgames.com/products/freeborn-striker-attack-skimmer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-FRB-09-Freeborn-Striker-a.jpg?v=1575566430
  status: current
  description: |-
    The Striker Attack Skimmer is a templated two man transporter that emulates aspects of Concord drone design. It is similar in concept and appearance to many civilian skimmers found throughout Antarean space. Concord military regard such machines as too vulnerable and therefore too great a risk for their crew and therefor have traded this technology with the more flamboyant Freeborn.

    The Striker is a general type of vehicle the appearance of which can vary to some extent. Its outer panels serve as ﬁxed points for the vehicle’s hyperlight armour carrier nodes but are otherwise cosmetic. The machine is buoyed upon powerful suspensors providing the Striker with a high degree of manoeuvrability as well as an eﬀective means of low speed propulsion. Reaction thrusters augmented by suspensors are used to attain higher speeds.

    *Models supplied unassembled and unpainted*
- name: C3T7 Transporter Drone
  sku: WGA-CON-10
  productType: single_kit
  priceGbp: 29.50
  url: https://store.warlordgames.com/products/c3t7-transporter-drone
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-CON-10-C3T7-Tranzport-drone-z.jpg?v=1575566444
  status: current
  description: |-
    The T7 series Transporter Drone is a variant of the M4 series Combat Drone and shares most of its characteristics along with its general appearance.

    It is armed with a plasma light support which also enables it to operate as a lightly armed combat drone, making it something of a universal ﬁghting machine.

    Its wide opening side doors give access to a cavernous interior. As it is designed to carry humans in safety its armour is a mix of kinetic shields and ﬁxed emission hyperlight type armour combined with a composite armoured transport shell.

    This plastic kit comes with the C3T7 Transporter Drone and 2 accompanying shield drones \(Can be used as Spotter or Batter drones\)

    You can find the C3T7 Transporter Drone commonly deployed in both Concord and Freeborn armies and the rules can be found on page 101 and pages 164 and 195 of the Beyond the Gates of Antares rule book.

    *Models supplied unassembled and unpainted*
- name: Boromite Hatchling Swarms
  sku: WGA-BOR-37
  productType: single_kit
  priceGbp: 11.00
  url: https://store.warlordgames.com/products/boromite-hatchling-swarms
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-BOR-37-Boromite-Hatchling-Swarm-a_39ef73c3-a6ec-4f6e-9bf8-3fd6624f996f.jpg?v=1575566429
  status: current
  description: |-
    Lavan species abound within Boromite enclaves, kept, bred, and made use of as part of mining operations and to some extent simply as pets. Lavan creatures are ﬁtted with technological implants that allow the Boromites to monitor them and control them to a degree...

    Lavan hatchlings are the first hatch stage of the Lavan creature. As the hatchling grows it moults its stony exterior shell and from it emerges a new, larger and sometimes quite different secondary stage juvenile. Most hatchlings mature into lavamites, moulting and shedding their outer shell several times during the process. Some just keep growing and gradually become creatures of vast size and awesome appearance. Hatchlings are tiny when they first emerge but quickly expand until they are ready for their first moult. This means hatchlings can be various sizes all mixed up together.

    Quite how many make a swarm is anyone’s guess and depends upon the size and maturity of the hatchlings as much as anything. As mere babies hatchlings have a lower resist \(Res\) than adult lavamites, but what they otherwise lack as individuals they make up for in terms of sheer mass.

    *Models supplied unassembled and unpainted*
- name: Isorian Tsan Ra Phase Squad
  sku: WGA-ISO-10
  productType: single_kit
  priceGbp: 28.00
  url: https://store.warlordgames.com/products/isorian-tsan-ra-phase-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-ISO-10-Isorian-Tsan-Ra-Phase-Squad-a.jpg?v=1575566429
  status: current
  description: |-
    After the Isor-Tsan Kiri War and the disaperance of the remanents of the enemy Tsan Kiri it was some time before the Isorians were to discover an abandoned hatchery of what wer to become known as the Tsan Ra.

    Biologically a form of the silicate creature the Isorians called the Tsan Kiri. These newly discovered creatures were born into the shard of the Isorian Senatex. Because the Isorian IMTel had already absorbed data from Tsan Kiri bio-spores, the melded nanosphere was perfectly adapted to interface with the new hatchlings. The creatures eﬀectively became part of the Isorian shard in the same way as the human populations of the Senatex. In a strange way the Tsan Kiri were reborn not as enemies but as part of the Isorian shard itself. To distinguish them from the Isorian’s former enemies the new human-inﬂuenced race became known as the Tsan Ra.

    The physical prowess of the Tsan makes them eﬀective troopers in countless combat situations. Their psychological make-up is in many ways more compatible with the business of waging war than is that of Isor’s human population.

    *Models supplied unassembled and unpainted*
- name: Outcast Rebel Black Guard
  sku: WGA-GAR-11
  productType: single_kit
  priceGbp: 28.00
  url: https://store.warlordgames.com/products/fartoks-black-guard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-11-Fartoks-Black-Guard-b.jpg?v=1575566430
  status: current
  description: |-
    The core of Fartok’s rebel army is the Black Guard comprising the most experienced and loyal of his ﬁghters. This is mostly made up of veterans of Fartok’s Battlegroup Nine, although as the rebellion has gathered pace the Black Guard has grown with the addition of many other seasoned warriors freed by the rebel army. The rebel army is itself growing so large that Fartok has divided his forces into several smaller commands, each under the eye of a trusted rebel leader.

    *Models supplied unassembled and unpainted*
- name: Xilos Gulper
  sku: WGA-GEN-24
  productType: single_kit
  priceGbp: 26.00
  url: https://store.warlordgames.com/products/xilos-gulper
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GEN-24-Xilos-Gulper-a.jpg?v=1575566432
  status: current
  description: |-
    The long-abandoned subterranean ruins of the Builders have become the lairs to many creatures, and some even appear to have evolved to take advantage of this considerable ecological niche in the bowels of Xilos. Now, as you fight across the surface against common foe, you will have to deal with the local denizens striking from underneath!

    Gulpers are amongst the largest Xilos arthropods, although it’s rather hard to tell how big they are because what is seen of them above ground is only the fore-portion of a much longer and bulkier burrowing creature. Although the visible part of their segmented bodies appear worm-like, this is merely the front or ‘neck’ part of a complex arthropod, similar in its general anatomy to smaller Snappers.

    Moving under impassible terrain to appear suddenly from beneath troopers feet, when the Gulper assaults its prey there's no time for point-blank shooting before it engulfs you in its multiple maws of serrated rotating teeth!

    *Models supplied unassembled and unpainted*
- name: M4A3E2 Sherman Jumbo heavy assault tank
  sku: WGB-AI-137
  productType: single_kit
  priceGbp: 33.50
  url: https://store.warlordgames.com/products/m4a3e2-sherman-jumbo-heavy-assault-tank
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-AI-137-Sherman-Jumbo-a.jpg?v=1575566428
  status: current
  description: |-
    Knowing D-Day approached, and in order to assault fortifications, the US army looked to 'upgrade' the standard M4A3 Shermans.

    The resultant tank arrived in the June–July 1944, with the US Army receiving a limited run of some 250 M4A3E2 Jumbo heavy assault tanks. Equipped with very thick \(100mm\) frontal armor \(glacis plate\), sloped at a steeper angle than normal to eliminate the hull bulges on the standard glacis, and a further 150mm of armour to the front of the turret. It was praised for being the only US tank able to survive a direct hit from a German 88. The 43 ton heavy assault tank arrived armed with the reliable 75mm gun in a new, heavier, T23-style turret.

    As the Americans gained more bitter experience against the heavier armoured and better gunned German tanks the call went out to re-arm all the M4s to the 76mm, this project would eventually be canceled due to the many difficulties presented by the small turrets of the M4, the Jumbo however had the larger turret already, so in February 1945 Patton's third army was to refit in field workshops \(adding the .50cal mount at the same time to replace the older .30cal\). Eventually other armies followed suit and some 100 M4A3E2 were converted with the new 76mm.

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Models supplied unassembled and unpainted*
