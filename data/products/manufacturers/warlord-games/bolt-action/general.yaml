- name: 'Soldier of Fortune 003: SAS Heroes - Paddy Mayne, The Irish Lion'
  sku: 405011005
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-003-sas-heroes-paddy-mayne-the-irish-lion
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/405011005-Soldier-of-Fortune-003-SAS-Heroes---Paddy-Mayne_-The-Irish-Lion1.png?v=1761333092
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of October 2023, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in November…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    Soldier of Fortune 003 is none other than 'Paddy' Mayne, available to buy again for a limited period. A 6' 3" Ireland and British Lions Rugby Union player, Mayne was also a solicitor and a founding member of the SAS. After Stirling and Lewes, we couldn’t omit Mayne!

    A larger-than-life figure once described as spending his free time on tour with the Lions "wrecking hotels and fighting dockers", was one of the most decorated British servicemen of the war. Through 1941 and ’42, Mayne served with distinction in the SAS’s campaign of destruction across the Western Desert, sabotaging German airfields and supply dumps and destroying enormous amounts of war materiel. including in the infamous raid on Sidi Haneish Airfield, the most successful operation of the campaign.

    Despite his successes, Mayne would controversially be denied the Victoria Cross. King George VI himself enquired why Mayne had not received the VC and a campaign is underway to rectify this injustice.

    Soldier of Fortune 003 depicts the Irish Lion battle-ready, with native headwear to combat the harshness of the desert, and Thompson SMG to sow chaos and destruction amongst the next Axis airfield.

    *Models supplied unassembled and unpainted*
- name: "Soldier of Fortune 002: SAS Heroes - John 'Jock' Lewes"
  sku: 405011004
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-002-sas-heroes-john-jock-lewes
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/405011004-Soldier-of-Fortune-002-SAS-Heroes---John-_Jock_-Lewes1.png?v=1761332877
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 30th of September 2023, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in October…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    The second limited-edition Soldier of Fortune miniature, John ‘Jock’ Lewes, of the Special Air Service is available again for a limited period.

    Aside from his oft-overlooked but vital contributions as the SAS' training officer, Lewes would also invent the imaginatively named 'Lewes Bomb', a combination explosive and incendiary device designed specifically to meet the unique requirements of the SAS.

    Soldier of Fortune 002 depicts Lewes in the thick of the action, Lewes bomb in hand, ready to destroy a German or Italian aircraft and dressed in battledress with a Commando-style cap comforter on his head against the desert night chill.

    *Models supplied unassembled and unpainted*
- name: 'Soldier of Fortune 001: SAS Heroes - David Stirling, The Phantom Major'
  sku: 405011003
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-001-sas-heroes-david-stirling-the-phantom-major
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/405011003-Soldier-of-Fortune-001-SAS-Heroes---David-Stirling_-The-Phantom-Major1.png?v=1761332617
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of August 2023, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in September…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    With Stirling often leading from the front, the SAS embarked on a series of lightning raids on Axis airfields, machine-gunning and burning aircraft and supplies to great effect. Ably assisted by men such as ‘Paddy’ Mayne and ‘Jock’ Lewes, Stirling and the SAS embarked on a reign of terror across the Western Desert, proving frustratingly difficult to get to grips with for the German and Italian troops. His elusiveness was a source of endless frustration to the Axis commanders, with Rommel nicknaming Stirling the ‘Phantom Major’.

    Available for a limited period, the original Soldier of Fortune miniature depicts Stirling about to kick off one of his night-time airfield raids. Clad in a warm coat against the cold desert night, with a Thompson SMG in one hand, he brandishes a flare gun in the other, ready to give the signal to unleash mayhem!

    *Models supplied unassembled and unpainted*
- name: 'Soldier of Fortune 28: Claus von Stauffenberg'
  sku: 403212013
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-28-claus-von-stauffenberg
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403212013_Soldier_of_Fortune_28_Claus_von_Stauffenberg01.jpg?v=1761318839
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 30th of November 2025, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in December…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    Claus Von Stauffenberg is best-known for the failed attempt on Adolf Hitler’s life as part of Operation *Valkyrie*, a plan that, had it been successful, would have resulted in the arrests of the German leadership and led to an earlier end to WWII. The explosive that Stauffenberg placed at the Wolf’s Lair on 20 July 1944 only caused Hitler to sustain minor injuries, however, and he and his co-conspirators were arrested, with most, including Stauffenberg, executed the next day.

    Our miniature depicts Stauffenberg prior to the failed assassination attempt, and before he sustained his life-changing injuries. In November 1943, Stauffenberg was an *Oberstleutnant* in the 10th Panzer Division as Operations Officer in the General Staff, operating in Tunisia. It was here, on 7 April whilst, that he sustained severe injuries as the result of a strafing attack from Desert Air Force fighter bombers, resulting in the loss of his left eye, right hand, and two fingers of his left hand. Our model is not so afflicted, and depicts von Stauffenberg in a dynamic pose brandishing a pistol. He makes for a superb alternative to represent an *Afrika Korps* Platoon Commander.

    Von Stauffenberg has secretive things to attend to, so this model is only available for the month of November 2025. Thereafter, it will not return for at least two years. Don’t miss out on adding him to your collection.

    *Sculpted by Wojciech Flis. Studio miniatures painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
