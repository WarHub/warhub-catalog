- name: Ghar Battle Squad (Plastic)
  sku: WGA-GAR-02
  ean: 5060393702870
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 24.00
  url: https://store.warlordgames.com/products/wga-gar-02-ghar-battle-squad-plastic
