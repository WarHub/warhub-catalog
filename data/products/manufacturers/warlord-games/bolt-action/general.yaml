    **OBSERVATION POST**

    *The Silver Bayonet* visits Canada, there’s a roundup of releases from the Other Partizan, and mounted Bloody Miniatures in this month’s reviews.

    **RELEASE RADAR**

    Dom Sore’s fired up his festive radar to search out the latest wargaming releases.

    **QUICK FIRE**

    Short, quick-read posts from *WI* readers about their hobby projects, notes, news, and observations.

    **THEME: GUERRILLAS IN THE MIDST**

    Editor Dan joins Ron Ringrose and his Essex Gamester chums for a Peninsular War mega-game.

    **PAINTING WARS OF THE ROSES ARMOUR**

    Paul Mackay suggests some effective and relatively simple ways to add interest to your rank-and-file and character figures in armour.

    **THEME: ZARAGOZA BESIEGED**

    As part of our Peninsular War theme James shares how he modified *Valour & Fortitude* to play the first siege of Zaragoza.

