  description: |-
    This 144-page book is the first in an ongoing series of publications that presents the glorious miniatures artwork of artists from around the globe in full-colour, quality photos, supported by descriptions from the artists themselves.

    THE ART OF... MINIATURE MONTHLY contains nine chapters, three chapters each from professional miniatures artists Aaron Lovejoy, Elizabeth Beckley, and Matt DiPietro. These cover an introduction to the artist and their journey through miniatures painting, a look at how they approach their art, and the ways they apply their motivations and techniques to some fantastic art.

    This book is unique in that while each of the artists that make up the Miniature Monthly team is incredibly talented and have honed their skills over many years, they each have a very different approach to creating their wonderful miniatures art.

    Topics include:

    - The Impact of Art Education
    - The Human Form
    - The Business of Painting
    - Never Stop Learning
    - Ancient Methods and Infinite Possibilities
