  status: current
  description: |-
    The Naval Act of 1794 established a permanent standing navy on 27 March 1794, in the US. Prior to this, a US Naval military presence had been left wanting for 10 years. By October 1797, the first three of six frigates launched; the USS United States, USS Constellation, and USS Constitution. Between 1798 and 99, several engagements took place between the US and France - though this was not a declared war. The First Barbary War of 1801-1805 saw actions against the Barbary pirates.

    The fleet would then see substantial action in the War of 1812 - achieving victory in 11 single ship engagements against the Royal Navy. British forces were forced off Lake Erie and Lake Champlain, effectively preventing the invasion of New York State. The fleet was, however, unable to prevent British blockades of US ports, the British Navy being significantly larger.

    **Why sail the US Navy?**

    The largest ships of the US Navy may pail in size in comparison to other nations, especially when using the National Special Rules \(being unable to field any large or extra-large vessels\). However, their frigates were exceptionally reinforced with many guns. To represent this, US fleets gain discounts to both the *Over Gunned* and *Sturdy* upgrades. They are both able to better weather punishment whilst dealing out a substantial portion themselves.

    Additionally, in a similar vein to British crews, US crews were routinely drilled and always receive the +1 bonus to hit rolls. This makes US frigates, the core of your fleet exceptionally dependable, though remember if you do purchase both upgrades on all your ships \(even at a discount\), you may find yourself outnumbered.

    **US Navy Fleet**

    Contents:

    - 2 over gunned resin frigates - the USS President & the USS United States
    - 3 plastic frigates
    - 6 plastic brigs
    - 1 gun boats base
    - A selection of metal figureheads and backplates for famous US Navy Ships:
     - USS Chesapeake - a 38 gun frigate
     - USS Congress - a 38 gun frigate
     - USS Constellation - a 38 gun frigate
    - US Navy Flags, Sails & ratline sheets + Bobbin for Rigging
    - Game cards and wake markers

    *Models supplied unassembled and unpainted*
- name: Spanish Navy Fleet (1770 - 1830)
  sku: 792013001
  ean: 5060572505339
  eanSource: shopify:goblingaming.co.uk
  productType: box_set
  priceGbp: 103.00
  url: https://store.warlordgames.com/products/spanish-navy-fleet-1770-1830
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/792013001-Spanish-Navy-Fleet-_1779-1820_1.jpg?v=1653478339
  status: current
  description: |-
    The Spanish Navy was beset by mixed fortunes in the Age of Sail, achieving great victories and major defeats in an interesting balance. Particularly during the Napoleonic era, Spanish allegiances were subject to fluctuations, oftentimes at odds with the British, yet allying with them when the situation suited \(such as their rejection of Napoleon in 1808 - even in the wake of Trafalgar in which a quarter of the Spanish Navy had been lost\).

    The Spanish Navy was the largest in the world at the outset of the 1700s, though this diminished to third-largest as the century wore on. Not only fighting close to home, the Spanish Navy fought engagements as far away as the Carribean and South America, where they achieved similarly mixed results.

    **Why sail the Spanish Navy?**

    When using the National Special Rules, the Spanish Navy allows you to bring a huge level of firepower in your fleets. Spanish 1st Rates are allowed to take the *Over Gunned* upgrade for free adding a heavy and a light cannon to each broadside. This is not without compromise, however, as these vessels need to successfully pass a test to travel at full sails, and can never be crewed by veterans. Additionally, veterans for other ships cost more in Spanish fleets.

    This means that a Spanish Admiral will need to use extra cunning in the selection of vessels for their fleet, carefully selecting upgrades for the extremely powerful *Over Gunned* vessels, to offset the decreased manoeuvrability and penalty to hit. At the same time, enemy fleets will need to be extremely wary of exposing themselves to the initial broadside of a fully tooled-up Spanish 1st Rate.

    **Spanish Navy Fleet**

    Contents:

    - 3 plastic frigates
    - 6 plastic brigs
    - 3 plastic third rates
    - 1 resin first-rate
    - 1 gun boats base
    - A selection of metal figureheads and backplates for famous Spanish Navy Ships:
     - San Juan Nepomuceno - a 74 gun third-rate ship of the line
     - Neptuno - an 80 gun third-rate ship of the line
     - Montañés - a 74 gun third-rate ship of the line
     - Ceres - a 40 gun frigate
     - Diana - a 34 gun frigate
     - Ninfa - a 36 gun frigate
    - Spanish Navy Flags, Sails & ratline sheets + Bobbin for Rigging
    - Game cards and wake markers

    *Models supplied unassembled and unpainted*
- name: Merrill's Marauders Squad
  sku: 402213103
