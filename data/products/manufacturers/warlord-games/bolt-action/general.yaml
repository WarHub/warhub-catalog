    The result was the upscaled No. 103-class This landing ship was a class of amphibious assault ships capable of carrying a wide selection of equipment and men; for example 13 × Type 95 Ha-Go, or 9 × Type 97 Chi-Ha, or 7 × Type 2 Ka-Mi or 5 × Type 3 Ka-Chi.

