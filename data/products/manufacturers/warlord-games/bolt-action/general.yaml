- name: M21 Mortar Carrier Half-track
  sku: 402613002
  ean: 5060572501379
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/m21-mortar-carrier-half-track
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-AI-507-M21-Mortar-Carrier-a.jpg?v=1575566196
  status: current
  description: |-
    Bringing support fire to your mobile forces with the M21 Mortar carrier, ideal for winkling out those dug in infantry!

    By the middle of the war the US Army could field legions of tanks and support vehicles, backed by the industrial might of the USA. Using their reliable M3 Half-track as a basis, they created the M21, a mobile mortar carrier that could keep up with advancing tanks and armoured infantry.This useful vehicle carried the simple but effective 81mm mortar, with 97 ready-use rounds, and crewed by a team of six men.

    In general the mortar would be carried to a firing position and deployed, however it was not uncommon to sight and fire the mortar straight from the half-track, keeping the team on the move if needs be and sheltering from shrapnel or small arms fire. 110 M21s were built by the White company and saw service in Western Europe, predominantly by US forces, but some were also deployed by the Free French. The best tactic in Bolt Action is to shoot and scoot, before return fire catches you

    This fantastic support Half-track comes complete 1 pintle-mounted HMG, 1 hull-mounted rear facing medium mortar and a full decal sheet.

    *Model supplied unassembled and unpainted*
- name: LCVP Landing Craft Vehicle Personnel - Higgins Boat
  sku: N061
  productType: single_kit
  priceGbp: 11.50
  url: https://store.warlordgames.com/products/lcvp-landing-craft-vehicle-personnel-higgins-boat
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/LCVP-n061_2.jpg?v=1575566187
  status: current
  description: |-
    The LCVP \(Landing Craft Vehicle Personnel\) Higgins boat could hold either a 36-man platoon, a jeep and a 12-man squad, or 8,000 lb \(3.6 t\) of cargo. Its shallow draft \(3 feet aft and 2 feet, 2 inches forward\) & clever design that pretected the propeller, enabled it to run right up onto the shoreline.

    The steel ramp at the front could be lowered quickly allowing troops to swiftly disembark, the boat could then reverse itself off the beach, and head back out to the supply ship for another load within three to four minutes.

    - Kit Dimensions: L220 x W70 x H45mm approx.
    - Features working ramp & etched detailing.
    - Made from MDF & Greyboard

    *Kits are supplied unassembled and unpainted*
