  url: https://store.warlordgames.com/products/t27-xylophone-rocket-launcher-on-deuce
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403413002_T27XylophonerocketlauncheronDeuce01.jpg?v=1767354320
  status: current
  description: |-
    Fire a mighty barrage with the T27!

    The US Army conducted significant experiments with ground-launched versions of the M8 air-to-ground rocket towards the end of the war, with one of the most widely used being the 8-tube T27, codenamed ‘Xylophone’. While inaccurate, the rockets packed a serious punch, particularly against unarmoured vehicles and troops caught in the open. Some of these launchers would be mounted on the backs of trucks to produce a mobile system akin to the Soviet Katyusha.

    On the Bolt Action tabletop, the Deuce-mounted T27 sports a powerful Multiple Rocket Launcher, a weapon which requires both skill and luck to employ, but has absolutely devastating potential to cause damage. It’s a great piece of experimental low-cost self-propelled artillery for a late-war US force, using the Rocket Truck profile from Armies of the United States: Third Edition.

    Rocketeers… stand by!

    *Sculpted by Darek Wyrozebski. Studio miniatures painted by Darek Wyrozebski.*

    *Models supplied unassembled and unpainted*
