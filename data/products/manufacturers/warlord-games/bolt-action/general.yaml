- name: "Soldier of Fortune 26: “The Cause is Greater than I...” - Hershel W.  'Woody' Williams (Medal of Honour recipient) (Copy)"
  sku: 403213107X
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/xsoldier-of-fortune-26-the-cause-is-greater-than-i-hershel-w-woody-williams-medal-of-honour-recipient-copy
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403213107_SoF26_TheCauseisGreaterthanI_1.jpg?v=1756379855
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 30th of September 2025, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in October…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    September’s Soldier of Fortune figure is packing a flamethrower, and coming in hot - let’s meet Hershel W. ‘Woody’ Williams!

    Hailing from West Virginia, Williams was not a large man - standing only 5’6” tall, he was actually rejected on his initial attempt at joining the United States Marine Corps in 1942 for being too short! These restrictions would soon be relaxed, however, and in 1943 he was able to join up.

    Trained as a flamethrower operator, Williams shipped out to the Pacific, seeing action on Guam, before landing on Iwo Jima on 21st February 1945. Two days later, he would earn the Medal of Honor for extreme valour and courage under enemy fire.

    American tanks attempting to push off the beach had encountered a network of Japanese pillboxes, and Williams was part of a small storming group tasked with destroying them. Under withering machine gun fire, all of Williams’ comrades would become casualties, but, undeterred, he stormed on alone, wielding his flamethrower to lethal effect at point-blank range.

    Having destroyed the first bunker, he returned to friendly lines to refuel, and made a total of five more trips back and forth to destroy the remainder, under fire all the while. He was even forced to use his flamethrower on a group of Japanese infantrymen who launched a desperate bayonet charge, before continuing his methodical destruction.

    Williams would go on to fight throughout the entire five-week Battle of Iwo Jima, being wounded by shrapnel, before returning to the US to a hero’s welcome at the White House. After the war, he remained in the Marine Corps reserve before retiring in 1969, subsequently serving with the Department of Veterans Affairs for three decades thereafter.

    Our Soldier of Fortune figure depicts Williams in the thick of the fighting on Iwo Jima, bravely carrying his flamethrower alone against the enemy. He’s a perfect addition to any USMC collection, where he’ll no doubt be the centrepiece of an Engineer Platoon, and of course a must-have for Soldier of Fortune completionists!

    Hershel Williams is a busy man, and his fuel won’t last for long. He’s only available for the month of September, after which time he’ll have to head back to refuel. After that, he’ll be off to take out another bunker, and won’t be available again for a long time to come. Don’t miss out!

    *Sculpted by Wojciech Flis. Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
