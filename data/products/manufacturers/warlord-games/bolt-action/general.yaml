  status: current
  description: |-
    Once amusing household plants that caught flies, these have grown to giant size. They have huge flowers with many petals, on the surface of which are fine, soft hairs. The plants exude an attractive, heady scent that is intoxicating to most oxygen-breathing life and is difficult to filter through most rebreathers.

