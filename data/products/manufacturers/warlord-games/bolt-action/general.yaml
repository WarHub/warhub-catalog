- name: 'Early Imperial Romans: Auxiliary Command'
  sku: WG-IR-AUX-2
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/auxiliary-command
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-ir-74-auxiliaries-command.jpg?v=1575565820
  status: current
  description: |-
    Auxiliary troops fought in line much like their legionary counterparts and were not, as is fashionable to suggest, lesser quality troops - in fact they were the equal of the legionary in training, drill and combat capability.

    Recruited initially from free provincial Roman subjects they went on to be recruited from the indigenous population as the Legions conquered new territory. It was not uncommon to see Celtic auxiliary units.

    Armed with their spear, gladius and protected by a chainmail coat and their distinctive oval shield the auxiliary cohorts performed sterling work in the name of the various Emperors!

    The Auxiliary Command pack contains a Centurion, Cornicen, Singifer and a signum standard.
- name: 'Early Imperial Romans: Camel Rider Unit'
  sku: WGH-IR-26-REGT
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/eir-camel-rider-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-ir-26-regt-camel-rider-regt-a.jpg?v=1575565821
  status: current
  description: |-
    Dromedarii were camel riding auxiliary forces recruited in the eastern, desert, provinces of the Roman empire. The best-known unit was the "ala I ulpia dromedariorum milliaria" \(The Ulpian Wing of Camel-riders, One Thousand strong\), raised by the Emperor Trajan and stationed in Syria. Roman 'mixed' auxiliary cohorts \(cohortes equitatae\) in the East often contained some dromedarii - about three dozen in the case of cohors XX palmyrenorum equitata stationed at Dura Europos in the early Third Century. A few would be sent out on patrol with the infantry and cavalry.

    We are not entirely sure how these fine fellows were dressed, but Warlords' take on them is more of an ancient SAS long range desert patrol.

    Robed against the beating sun, cluttered with amphorae and water skins, these fellows are tooled up for business, be it dismounted skirmishing or a full bloodied camel charge!

    This regiment pack contains 6 random metal Camel Riders.

    *Models supplied unassembled and unpainted*
