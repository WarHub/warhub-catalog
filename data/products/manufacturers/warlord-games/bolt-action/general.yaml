  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/Later_Greek_hoplites_3D_box_render_copy.png?v=1765968730
  status: current
  description: |-
    This set allows you to recreate the warriors that fought in some of the classical world's most famous battles and campaigns. Fight against the Spartan alliance in the Peloponnesian War, undertake the massive but ultimately disastrous invasion of Sicily, lead Xenophon’s 10,000 mercenaries across Asia, crush the might of Sparta at the battle of Leuctra or fight alongside Alexander to the edges of the known world.

    This box contains sufficient components to build 40 Hoplites representing warriors of the Greek city states of the era c.450 to 323 BC \(from the start of the first Peloponnesian War to the death of Alexander the Great\). Included are variants of types of helmets that were in use during these years, such as the Thracian, Pilos and Phrygian styles.

    Also included is a sheet of full-colour shield decals, and two sprues of metal arrows to further embellish your shields and bases.
- name: 'Ancient Celts: Celtic Warriors plastic boxed set'
  sku: WGH-CE-01
  ean: 5060200842416
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/ancient-celts-warriors
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-ce-01-celtic-wariors-b.jpg?v=1662734675
  status: current
  description: |-
    The Celts were a proud warrior people who dominated much of Europe for a thousand years and dared to defy the might of Rome and her all-conquering armies.

    Renowned for their ferocity in battle, what they lacked in drill or armour they made up for with determination and spirit. Fighting with sword, spear and javelin, they would hurl themselves at the enemy or die trying.

    A Celtic army is one of history's greatest spectacles - a mass of brightly patterned clothing and tattoos charging headlong at their enemy, supported by speeding chariots, fast cavalry and missile troops armed with sling, bow and javelin.

    Romans viewed Celts with a mixture of loathing, fear and awe. To them, Celts were savages, dangerous barbarians who, centuries before the first Emperor, had sacked Rome itself. They must be bought as mercenaries or destroyed in pitched battle!

    The Legion may have been a near invincible fighting machine, but the Celts time and gain would prove to be the undoing of many of Rome's soldiers. Fighting for their tribe or for freedom, they proved a valorous and worthy adversary.

    This boxed set contains 40 multi-part, hard plastic 28mm Celtic Warriors.

    Comes with weapon options such as spear, sword and javelins and with great extras such as spare weapons, helmet icons and severed heads!

    Also contains superb, full-colour waterslide shield transfers to bring your models to life!

    *Note: miniatures are supplied unassembled and unpainted.*
