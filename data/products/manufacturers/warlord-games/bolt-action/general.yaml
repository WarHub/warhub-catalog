- name: Sir Thomas Fairfax
  sku: WGP-EC-24
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/royalist-parliamentarian-sir-thomas-fairfax
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-EC-24_ECW_SirThomasFairfax01.jpg?v=1666010136
  status: current
  description: |-
    Sir Thomas Fairfax ,also known as "Black Tom" due to his dark hair and eyes was a leading Parliament General in the English civil wars. A no-nonsense Yorkshireman, he was well qualified to command as he had fought as a volunteer in the Low Countries in the huge Continental wars that plagued Europe in the seventeenth century.

    This dashing and popular man pledged his allegiance to Charles the First in 1640 leading a cavalry troop in the disputes with Scotland but later, exasperated by Charles' high handed manner firmly joined the Parliament cause.

    As such, with his father, he campaigned in the North and though suffering defeats, rallied to win with overwhelming force when the allied armies closed in at York to defeat Rupert and Newcastle at Marston Moor, Fairfax suffering a wound in the action.

    Popular with his men, he emerged to become Lord General of the newly formed New Model Army which would go on to become a dominant force in the British Isles. Its crowning glory in England was at Naseby where the King was defeated and ultimately his cause doomed.

    Fairfax went on to crush the Levellers, a dangerous radical group that emerged from his own army, and, to his eternal credit, refused to join the Regicides in their illegal execution of the King.

    He was perhaps the most capable and popular Roundhead General, perhaps not as inspiring as Cromwell himself, but without his fanaticism, and was much loved by the men he commanded.

    *Contains one mounted metal miniature, supplied unpainted*
- name: James Graham, The Marquis of Montrose
  sku: WGP-EC-27
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/irish-brigade-the-marquis-of-montrose
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-EC-27_ECW_MarquisofMontrose01.jpg?v=1666010148
  status: current
  description: |-
    The Marquis of Montrose was perhaps the most tragic, brilliant and romantic figure of the British civil wars.He became the King's Champion in all of Scotland and fought a brilliant campaign against extraordinary odds battling the grim Government Covenanter forces.

    With a cadre of three Irish regiments, largely veterans from the Continent and aided by an ever changing alliance of Highland Clans, Montrose smashed army after army, sometimes in pitched battle, other times in skirmishes and raids.

    He was a very accomplished general, winning so much with so little, time and again. It was his ability to enthuse and inspire his men and keep them together long enough for a common cause that perhaps was his greatest virtue, though his personal bravery in a madcap campaign must also be applauded.

    Warlord Games have captured Montrose reigning in his horse, telescope in hand , once again attempting to out- fox his wily Scot enemies.

    *Metal mounted model supplied unpainted*
