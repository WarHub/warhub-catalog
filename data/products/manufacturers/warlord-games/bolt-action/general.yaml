  description: |-
    Cross all kinds of terrain - even water - with the Ford GPA!

    A development of the ubiquitous Jeep, the GPA \(commonly known as the ‘Sea Jeep’ or ‘Seep’\) was intended to give US forces a lightweight amphibious utility vehicle to support beach assaults. Over 12,000 would be built, and around a third of these would go to Russia as Lend-Lease, with the majority remaining in US service across the conflict.

    The GPA is a great choice for any American *Bolt Action* force themed around an amphibious assault, or players with a fondness for slightly more unusual vehicles! On the tabletop, it’s simply represented by giving the standard US transport Jeep the **Amphibious** special rule for no additional points cost. This allows it to take up to three men across water-filled obstacles, providing extra tactical mobility and looking great while doing it!

    Soggy battlefield? No problem for the Ford GPA!

