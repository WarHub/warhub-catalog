- name: 2-horse proto chariot
  sku: WG-EMB-42
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/2-horse-proto-chariot
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WG-EMB-42-2-horse-proto-chariot-a.jpg?v=1575566055
  status: current
  description: |-
    The earliest representations of chariots can be found on such archaeological finds as cylinder seals and which show a hybrid vehicle between a chariot proper and an earlier Platform Cart.

    So-called proto-chariots date from the first half of the Middle Bronze Age and some were constructed as the older style Platform Cart in shape but were now pulled by two horses. Representations in art of this type of vehicle vary in style but all show the axle in the centre of the vehicle rather than at the rear, as did the later chariots, and so were not quite as manaeovrable as the chariots proper. This model is the same as the *Later Platform Cart* but is pulled by 2 horses instead of the 4 Onager-Hybrids.

    The chariot was still crewed by only one man and therefore generally used as a Commander's or Scout's vehicle. Alternatives are provided for a Javelinman or a Commander. The 4 Equid yoke pole included in this kit should be cut down as appropriate for the 2 Horses.

    This proto-chariot can be used in **Neo-Sumerian & Successor States, early Amorite Kingdoms**, **Zagros Highlander** and **early Elamite** armies of the first half of the Middle Bronze Age.
- name: Early/Middle Bronze Age Command
  sku: WG-EMB-11
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/early-middle-bronze-age-command
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WG-EMB-11-Earl-Middle-Bronze-Age-Command.jpg?v=1626048821
  status: current
  description: |-
    These models can be used to command armies of the Early and Middle Bronze Age, including those of the Amorite Kingdoms & Desert Nomads; Later Akkadian & Neo-Sumerian City-States; Later Highlanders and Elamites.

    Includes figures that can be used for Naram-Sin of Akkad, Hammurabi of Babylon, Shamshi-Adad of Ashur, Rim-Sin of Larsa, Ishbi-Irva of Isin, Zimri-Lim of Mari and Ibbi-Sin or Shulgi of the 3rd Dynasty of Ur. Also Includes a figure appropriate for a Later Highlander or even early Hittite King; and a figure suitable as a Desert and Dry Steppe Nomad Chief.
- name: Early 4-equid platform cart II
  sku: WG-EMB-36
  productType: single_kit
  priceGbp: 22.50
  url: https://store.warlordgames.com/products/early-4-equid-platform-cart-ii
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WG-EMB-36-Early-4-equid-platform-cart-II.jpg?v=1575566032
  status: current
  description: |-
    Pulled by 4 equids, the early Platform Carts were a two-wheeled variant of the four-wheeled Battle-Wagon. They were similar in construction with a high front and low sidings. Unfortunately, pictorial evidence for these types of carts is scanty and there is no consistency as to their appearance. Some show a seat at the back, but it is difficult to envisage how this would be practical with the crewman’s view blocked by the high front of the cart. The seat, therefore, is not present in this model.

    With only two wheels, these carts would have been more manoeuvrable and faster than the heavier Battle-Wagons. With only enough room for one crewman, it is perhaps likely they were not used in the same capacity as the Battle-Wagons, and hence used as Command or Scout vehicles.

    *Note: Models supplied unassembled and unpainted*
