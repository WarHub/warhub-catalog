- name: The Ghoul King
  sku: FGV402
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/the-ghoul-king
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/The_Ghoul_King.jpg?v=1575566229
  status: current
  description: |-
    Despite his title and appearance, the Ghoul King is a revenant, not a ghoul. How he escaped his necromantic master and rose to lead a pack of ghouls will likely never be known. The Ghoul King has been a minor power amongst the ruins since the city's rediscovery, though few wizards actually know of his existence. The Lich Lord has gained his services through a variety of promises, most of which involve vast quantities of human flesh.

    28mm sized metal figure, supplied unpainted.

    *Models supplied unassembled and unpainted*
- name: Wraith Knights
  sku: FGV312
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/wraith-knights
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Wraith_Knights.jpg?v=1575566229
  status: current
  description: |-
    Wraith knights are the most powerful creations of the Lich Lord. They appear to be suits of heavy armour containing nothing but a black emptiness and a pair of burning eyes. Although capable of some independent thought, they are unfailingly loyal to the Lich Lord and are thus immune to control by any other spellcaster. Protected by the Lich Lord's magic, wraith knights can only be harmed by magic attacks.

    Contains two metal models, supplied unpainted.

    *Models supplied unassembled and unpainted*
- name: The Lich Lord
  sku: FGV401
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/the-lich-lord
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/The_Lich_Lord.jpg?v=1575566227
  status: current
  description: |-
    The Lich Lord.

    The central character in the Frostgrave campaign book 'Thaw of the Lich Lord.

    28mm sized metal figure, supplied unpainted.

    *Models supplied unassembled and unpainted*
- name: Frostgrave Cultists
  sku: FGVP02
  ean: 9781472819321
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22.00
  url: https://store.warlordgames.com/products/frostgrave-cultists
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Frostgrave_Cultists.jpg?v=1575566226
  status: current
  description: |-
    Death cultists are mortal men and women who have sworn their service to an undead master, usually in the hope of achieving some form of immortality. They normally come from the lowest rung of society and have few useful skills and little combat training. What they lack in ability, however, they make up for in fanaticism and fearlessness in the face of death. When sent out by their masters, death cultists generally conceal their identities behind masks and hoods, but proclaim their allegiances by adorning themselves with bones, chains and other symbols of death.

    The Frostgrave Cultists box set contains enough parts to make 20 different figures. There are multiple heads, arms, weapons and accoutrements per frame, no two warbands will ever be the same.

    Cultists feature in Thaw of the Lich Lord as opponents in the scenarios and as random encounters. They should also be used as the soldiers for Warbands of evil wizards, especially ones who've embraced Lichdom.

    The Cultists have been designed to compliment the Frostgrave Soldiers plastic box set. By that we mean the arms, heads and equipment are interchangeable, giving you even MORE choice to built a unique and personal Warband.

    And as an extra bonus, the Cultist plastic frame includes heads and arms to convert your Soldiers or Cultists into skeletons and Zombies. True Frostgrave Undead! Perfect to represent your 'risen from the dead' ex-soldiers.

    The plastic figures are 28mm sized, supplied unpainted and require assembly with glue. We recommend you use glue designed for plastic to get the best results.

    *Models supplied unassembled and unpainted*
- name: Genie & Lamp
  sku: FGV403
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/genie-lamp
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Genie_Lamp.jpg?v=1575566225
  status: current
  description: |-
    While searching the ruins, one warband discovers a golden lamp that contains a very old and very angry genie. He has no interest in granting wishes...

    This character set is based on the scenario in the Frostgrave rulebook, 'Genie in the Bottle'.

    Metal models, supplied unpainted. Designed to go with 28mm sized figurines.

    *Models supplied unassembled and unpainted*
- name: Lich & Apprentice
  sku: FGV111
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/lich-apprentice
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Lich_Apprentice.jpg?v=1575566215
  status: current
  description: |-
    In Thaw of the Lich Lord, you can cast a certain spell called Lichdom:

    This spell may only be cast by a wizard. It is a dramatic and horrifying process wherein the wizard tears his soul from his body, animates his own lifeless corpse, and then returns his soul to his new undead form. It is an agonising experience that can go catastrophically wrong, and is only practised by the most insane or foolhardy wizards. A wizard that successfully casts Lichdom immediately becomes a lich.

    Two 28mm sized Pewter miniatures, supplied unpainted.

    *Models supplied unassembled and unpainted*
- name: Soothsayer & Apprentice
  sku: FGV107
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/soothsayer-apprentice
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Soothsayer_Apprentice.jpg?v=1575566186
  status: current
  description: |-
    The subtle magic of a Soothsayer allows the wizard to expand his senses outside of his body, including through time itself. They can reach into the past to learn the secrets of history, or they can look into the future and try to catch a glimpse of things to come. There are very few young Soothsayers. Something about the patience and concentration required favours the old. Soothsayers are most easily recognizable by their eyes, which are almost always very pale, and often posses a somewhat empty stare. Because Soothsayers often collect items of clothing with interesting past histories, they tend to wear an odd mix of clothing and equipment; a Soothsayer sees nothing odd about wearing an expensive and stylish cloak over worn and badly stained robes, or having an old seashell hanging on a leather strap right next to a priceless emerald.

    Two 28mm sized Pewter miniatures, supplied unpainted.

    *Models supplied unassembled and unpainted*
- name: Thaumaturge & Apprentice
  sku: FGV109
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/thaumaturge-apprentice
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Thaumaturge_Apprentice.jpg?v=1575566186
  status: current
  description: |-
    Thaumaturges draw their magical powers from positive energy. Most, though not all, believe this energy comes from some form of deity. These wizards are healers and protectors, who often spend as much time on good works as they do on the study of magic. Thamaturges rarely openly carry any weapon other than a staff and some find even that a bit aggressive. This is not to say that Thaumaturges are pacifists, they just prefer to not rely on obvious displays of force. In appearance, they tend to wear plain, simple robes, usually of a light colour. They tend to favour hoods over hats, and wood and leather over gold and silk.

    Two 28mm sized Pewter miniatures, supplied unpainted.

    *Models supplied unassembled and unpainted*
- name: Wild Dogs
  sku: FGX001
