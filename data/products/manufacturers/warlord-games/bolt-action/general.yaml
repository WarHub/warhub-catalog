- name: "Soldier of Fortune 22: 'Frankly, I had enjoyed the war' - Lieutenant-General Sir Adrian Carton de Wiart VC"
  sku: 403411002
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-22-frankly-i-had-enjoyed-the-war-lieutenant-general-sir-adrian-carton-de-wiart-vc
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403411002_SoF22_LtGeneralSirAdrianCartondeWiartVC01.jpg?v=1745835117
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of May 2025, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in June…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    A good Soldier of Fortune needs plenty of experience, and May’s miniature has been almost everywhere, and done almost everything!

    Depicting the legendary Lieutenant-General Sir Adrian Carton de Wiart, VC, ‘Frankly, I had enjoyed the war’ brings perhaps the single most colourful character yet to the Soldier of Fortune series. Carton de Wiart was born a Belgian aristocrat, raised in Egypt, and educated in England, before enlisting in the British Army in 1899 for service as a trooper in the Boer War. From there he would win the Victoria Cross \(and lose a hand and an eye!\) in the First World War, retire to a country estate in Poland, be recalled to service in 1939, command the Anglo-French Namsos campaign, be taken prisoner in Libya, and then sent back to England to negotiate a potential peace treaty with Italy. He would then be sent to China as Churchill’s personal representative, and would continue to work as a military advisor, reporter, and diplomat until the end of the war. How’s that for a resumé?!

    This month’s Soldier of Fortune figure’s title comes from Carton de Wiart’s infamous quote regarding the First World War - ‘Frankly, I had enjoyed the war’, and the model depicts him getting stuck in on campaign in Norway, leading his troops forward with revolver in hand - not the usual job of a divisional commander, but all in a day’s work for Carton de Wiart! Cast in crisply detailed Warlord Resin, he’s a perfect addition to any British force looking for some serious \(if unconventional\) leadership. You can download an exclusive scenario to reenact his heroics [here](https://warlord-community.warlordgames.com/wp-content/uploads/2025/05/BA3_Scenario_Just-Another-Day_FINAL.pdf).

    Lieutenant-General Sir Adrian Carton de Wiart VC is always on the hunt for a new adventure - he’s only available until 31st May 2025, at which point he’ll disappear off on another improbable escapade, not to return for many years!

    *Sculpted by Marco Sano. Studio miniature painted by Kirsten Williams.*

    *Models supplied unassembled and unpainted*
