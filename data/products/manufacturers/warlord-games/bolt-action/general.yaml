  status: current
  description: |-
    The Phase-shift projector is a speciﬁcally Isorian ﬁeld engineering weapon. It is based on the Isorian phase-shift technology used in their armour, phase riﬂe and other devices, and has not been able to be replicated outside an Isorian nanosphere.

    *Isorian Andhak SC2 Medium Support Drone Weapon Options*: The support drone can be rearmed with a phase-shift projector instead of a plasma light support - 0 points \(See page 84 The Dronescourge returns\).

    **Phased synchronisation**

    Any solid target becomes temporarily unsynchronised from normal space and synchronised with phase armour. When the projector hits a door, wall or similar obstacle, including terrain obstacles up to 2” thick, not only does the target inside take damage but a friendly unit within 10” that is fully equipped with phase armour can make an immediate, synchronised ***Advance*** or ***Run*** action to move straight through the targeted obstacle as if it was not there.

    The synchronised unit’s order dice and actions follow the rules for synchroniser drones \(see The Battle for Xilos, p.79\). If any model in the synchronised unit ends its movement within solid material, the unit takes a pin for each model and the model is destroyed at the end of its action.

    *Models supplied unassembled and unpainted*
- name: Markov's Prize Book
  sku: GOAOS03
  productType: single_kit
  priceGbp: 9.99
  url: https://store.warlordgames.com/products/markovs-prize-book
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Markov_s_Prize_book_Mark_Barber.jpg?v=1575566814
  status: current
  description: |-
    Written by Mark Barber, Markov's Prize is the latest in our series of Gates Of Antares novels, setting the scene and delving deep into the 7th age of mankind and the struggles faced on a myriad of worlds...

    - Paperback: 285 pages
    - Publisher: Zmok \(26 Jun. 2018\)
    - Language: English

    **A small combat group are stranded on a hostile planet**

    Markov's Prize is an isolated planet within the Determinate, cut off since the 6th Age. Its human population have thrived and advanced over the centuries but now, recently rediscovered, they find themselves simultaneously invaded by the aggressive and bloodthirsty Ghar Empire and the expansionist PanHuman Concord. The Ghar are looking to plunder the planet for resources and slaves while the Concord desire to assimilate the planet into their collective whole, believing it to be the best course of action for the Concord and the planet's people.

    Strike Commander Ryen Tahl is a soldier in the PanHuman Concord, responsible for a Company of some sixty troopers who are at the forefront of the invasion. Previously a famous martial arts champion with a deadly reputation, he has softened and matured over the years and now prioritizes the safety of his men and women above all else.

    Tahl's Company is not Special Forces; there is no secret mission and no universe changing event they will be involved in. They are ordinary people embroiled in the daily operations of a frontline war against a vicious adversary and the stoic defenders of Markov's Prize.

    Published by ZMOK Books: www.wingedhussarpublishing.com
