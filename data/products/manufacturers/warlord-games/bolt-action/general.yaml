- name: Concord Strike Squad & Support Drones
  sku: WGA-CON-16
  productType: single_kit
  priceGbp: 24.00
  url: https://store.warlordgames.com/products/concord-strike-squad-support-drones
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-CON-16-Strike-Squads-_-Drones-a.jpg?v=1575566225
  status: current
  description: |-
    Strike Squads form the core of the Concord Combined Command’s armed forces wherever they are deployed. Strike Troopers are amongst the best-equipped fighters in all of Antarean space. They carry multi-function plasma carbines capable of punching a hole through most armour or shooting rapid bursts of deadly plasma bolts. Strike Troopers are protected by invisible hyperlight armour suspended from the nano-cored casing of their battle suits. This advanced armour provides complete atmospheric isolation as well as effective shielding against enemy weapons. Strike units are often accompanied by small buddy drones, such as spotter drones that act as the unit’s ‘eye in the sky’ feeding vital targeting information into the squad’s sophisticated combat shard.

    Strike formations are often accompanied y units of C3D1 Light Support Drones. These lightly built drones are self-sufficient fighting machines that are ideally suited to the mobile support role. They are armed with plasma light support weapons, which are easily capable of dealing with even relatively well-protected targets. Although not as heavily armoured as larger drones, their composite skin and reactive kinetic shields enable them to withstand hits from most light arms.

    C3 Strike Squads & Support Drones contains the following multi-part hard plastic models:

    - 2 x C3 Strike Squads - Each squad includes Squad leader with plasma carbine and x-sling, 4 C3 Strike Squad Troopers with plasma carbines \(1 may be upgraded to a plasma lance\) and 1 spotter drone.
    - 2 C3D1 Light Support Drones with plasma light support or subverter matrix and 2 C3 Spotter Drones.

    *Models supplied unassembled and unpainted*
- name: C3 Interceptor Squad
  sku: 502413002
  productType: single_kit
  priceGbp: 26.00
  url: https://store.warlordgames.com/products/c3-intercept-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/C3_Interceptor_Squad_box.jpg?v=1575566234
  status: current
  description: |-
    Interceptors form part of the Concord’s Strike Forces, the most advanced and most lavishly equipped fighting formations in all of Antarean space.

    Interceptor Squads ride high-speed Interceptor bikes that enable them to rapidly deploy in situations where convention transporters would be easily identified and destroyed. Their chief advantage over other troops is their incredible speed, making them ideal reconnaissance units where closed-down communications render it impossible to delay remote drones or other means of distant observation.

    These squads are often accompanied by a compactor drone, which can be used to carry the unit’s bikes or as a means of carrying other mechanised drones into combat.

    Interceptors are buoyed upon and propelled by their own suspensors. Like most machines of Antarean space the bikes are autonomous drones in their own right. They are equipped with hyper-light boosters, which intensify and redistribute the armour field worn by the bike’s rider, enabling them to more easily shrug off enemy fire. When it comes to offensive armament, Interceptors are fitted with twin plasma carbines, but can substitute this formidable armament for a punchier plasma lance capable of puncturing more heavily armoured targets.

    Contains the following resin and metal models:

    - 1 C3 Interceptor leader with plasma carbine riding Interceptor bike with twin plasma carbines.
    - 2 C3 Interceptor troopers with plasma carbine riding Interceptor bike with twin plasma carbines.
    - 3 Plasma lance upgrades.
    - 1 Concord Spotter Drone.

    *Models supplied unassembled and unpainted*

    *WGA-CON-02*
