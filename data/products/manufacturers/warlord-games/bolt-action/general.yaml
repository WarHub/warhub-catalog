- name: US Army M3A1 37mm anti-tank gun
  sku: WGB-AI-32
  productType: single_kit
  priceGbp: 19.00
  url: https://store.warlordgames.com/products/us-army-m3a1-37mm-anti-tank-gun
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-AI-32-US-Army-M3A1-37mm-anti-tank-gun1.jpg?v=1665842698
  status: current
  description: |-
    Introduced in 1940, the 37 mm Gun M3 became the standard US anti-tank gun with its size enabling it to be pulled by a jeep. The continuing improvement of German tanks quickly rendered the 37 mm ineffective, and by 1943 it was being gradually replaced in the European and Mediterranean theatres by the more powerful British-developed 57 mm Gun M1.

    In the Pacific, where the Japanese tank threat was less significant, the M3 was still effective, and its light weight made it easy to move through difficult terrain. It saw action for the first time during the defence of the Philippines in December 1941 and its ease of use meant the gun remained in service with the Marine Corps and with some Army units in the Pacific until the end of the war.

    In games of Bolt Action it can be included in Artillery Platoons and is a Light Anti-tank gun, that can be towed by most vehicles including Jeeps.

    Contents:

    - One metal 75mm gun
    - 3 metal US Marine Corps crew

    *Note: Models supplied unassembled and unpainted. No bases included.*
