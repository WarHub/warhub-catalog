- name: 'Spartans: Spartans plastic boxed set'
  sku: WGH-GR-01
  ean: 5060200843307
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/spartans-hoplites
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/WGH-GR-01_Spartans01.jpg?v=1704276642
  status: current
  description: |-
    The Spartans are possibly the most famous fighting men in history, and rightly so! Spartan Hoplites were respected and feared throughout Greece, and it was long thought that no land power could stand against them. Lacedaemon, with Sparta as its capital, stood firm against the imperial ambitions of the Athenians.

    The Classical period saw the height of Sparta's power as well as its eventual downfall at the hands of the Thebans. This box allows you to build 40 Spartan Hoplites, wearing their distinctive Pilos helmets, long hair and characteristic beards. Also included is a sheet of waterside transfers with a selection of uniform lambda for the Hoplites' shields, and two sprues of arrows to further decorate your shields and bases.

    Now march on Athens and crush their oppressive democracy!

    *Models supplied unassembled and unpainted*
- name: 'Macedonians: Phalangites plastic set'
  sku: WGH-MC-01
  ean: 5060200843352
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/macedonians-phalangites
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-mc-01-phalangites-a.jpg?v=1662735533
  status: current
  description: |-
    Few sights in the ancient world would have matched the thrill of the advance to contact of the Alexandrian or Macedonian phalanx. Thousands of well-armoured and superbly trained professional soldiers advancing at least eight men deep, often more slowly and methodically keeping apace with their fellow phalangites. As they neared the enemy they would use their shields to protect themselves from arrows or sling shots.

    With a given command the mighty pikes they carried, the famed sarissa, came down to present an impenetrable forest f wicked spear points mounted on sturdy wooden shafts of up to eighteen feet in length.

    The men gave Phillip II, and later his son Alexander, great victories as to face this moving wall of death invited defeat. Matching them with your own phalanx of sarissa and trying to disrupt the enemy or hit them in the vulnerable flank or rear was one of the only options to those facing the might of the Macedonian army.

    They marched across Asia, even fighting elephants in India and climbing the peaks of what is now Afghanistan, building cities behind them, a fitting tribute to perhaps the greatest and earliest trained fighting force.

    This set contains 40 multi-part Macedonian Phalangites plus shield decals.

    *Models supplied unassembled and unpainted*
- name: 'Dacians: Sarmatian Cataphracts boxed set'
  sku: WGH-CE-08
  productType: single_kit
  priceGbp: 38.50
  url: https://store.warlordgames.com/products/dacians-sarmatian-cataphracts
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgh-ce-08-sarmatian-cataphracts-regt-a.jpg?v=1575565677
  status: current
  description: |-
    When the Roman armies crossed the Danube and clashed with the tough Dacians of present day Romania they may not have counted on them bringing along their warlike allies, the Sarmatians. The Sarmatians seem to have become staunch friends of the Dacians, and together they proved to be a formidable opponent.

    Their primary military arm was their cavalry, which they employed by the thousand. Most effective of all was the cataphract, a warrior clad in a full armour from head to toe and riding a strong horse which itself was well protected by skirts of leather cloth and armour.This armour was commonly called scale mail and could be made of iron, bronze or indeed horn.

    They fought in massed units, using the Kontos, a wicked long spear wielded with both hands to skewer their opponents and secondary weapons included maces and, especially, long swords.

    Supported by fearsome horse archers, some of whom were warrior women, they were a mobile and hard hitting foe, evading where possible the less mobile Roman marching columns until conditions favoured their style of attack.

    Warlord's Sarmatians catch the wild look of these hard riding cavalry; woe betide your enemies when they break from their trot to a full charge!

    Contains 8 metal Cataphracts including Command.

    *Models supplied unassembled and unpainted*
- name: 'Ancient Celts: Cavalry boxed set'
