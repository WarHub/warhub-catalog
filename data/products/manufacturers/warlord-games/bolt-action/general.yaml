- name: Wargames Illustrated WI442 October 2024 Edition
  sku: WI442
  productType: single_kit
  priceGbp: 1.00
  url: https://store.warlordgames.com/products/wargames-illustrated-wi442-october-2024-edition
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/Wi442_-_Cover.jpg?v=1726765139
  status: current
  description: |-
    **OBSERVATION POST**

    We review multi-period wargaming rules from BelloLudi, Sengoku battles from Caliver, Wars of the Roses metals from Athena Miniatures, and an apocalyptic Starter Set from Modiphius.

    **RELEASE RADAR**

    Dom Sore’s here to tempt you with new and upcoming hobby releases.

    **QUICK FIRE**

    Short, quick-read posts from *WI* readers about their hobby projects, notes, news, and observations.

    **THEME: VALOUR & FORTITUDE AT BRITCON**

    *Valour & Fortitude* goes ‘live’ at Britcon 2024 with a trio of great games.

    **BOLT ACTION THIRD EDITION - EXCITING STUFF DOM SAW**

    *Bolt Action* superfan Dom Sore dives into Third Edition’s major changes, and tell us how he thinks they might impact the game.

    **PUBLIC ENEMIES - PART 2**

    We continue Nick Buxey’s pictorial story of the gangsters of the 1930s and the men who were known as Public Enemy Number One.

    **THEME: THE INDIAN REBELLION IN VALOUR & FORTITUDE**

    Ian Cluskey and Jervis Johnson provide a handy introductory guide, and Army Sheets, for ,em&gt;Valour & Fortitude gaming in the Indian Rebellion/Mutiny.

    **BRINGING A FANTASY CITY TO LIFE**

    Grey for Now Games’ Graham Davey explains the world design and rules in his new game, *Guards of Traitor’s Toll.*

    **BASIC BLENDING: HARD-EDGE HORSES**

    Matt Parkes shows a punchy but smooth-looking technique to paint horses, and shares some tips on completing caparisons and applying decals.

    **BILLHOOKS POLONIA**

    A new theatre for *Never Mind the Billhooks Deluxe* by Marcin Sowa, featuring the forces of the Polish Crown against the Teutonic Order.

    **HISTORICON PAINTING COMPETITION**

    We showcase some of the fantastic winners from this year’s competition.

    **TRAVELS THROUGH TOLLINGCHESTER**

    James talks to Sarissa’s Steve Cumming about their new, full-colour, modular Tollingchester terrain range, and builds some of the set.
