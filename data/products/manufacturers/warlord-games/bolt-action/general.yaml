    **STARTING WITH STARGRAVE**

    Paul J. Carney shares his *Stargrave* hobby experiences.

    **WHERE DID YOU GET THAT HAT?**

    *Wargames Illustrated* Editor Dan shares his latest Editor’s Exploits - his quest to bring a unique Iron Age warrior back from the grave, in miniature.

    **A FIGURE COLLECTION TRANSFORMED**

    Editor Dan shares his enthusiasm for the background and setting in new Osprey game *A War Transformed*.

    **THINGS FROM THE BASEMENT**

    Dave Taylor interviews Joerg Bender about his terrain company, his hobby passions, and gets him to share some model making tips.
