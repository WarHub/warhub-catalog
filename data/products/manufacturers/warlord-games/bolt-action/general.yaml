- name: 28mm Three Storey Detached House
  sku: 28S-WAW-105
  productType: single_kit
  priceGbp: 46.00
  url: https://store.warlordgames.com/products/28mm-three-storey-detached-house
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/detached-1.jpg?v=1575565931
  status: current
  description: |-
    Not just another house, this Three Storey Detached Dwelling is a great addition to any urban terrain collection, from the C18th to the modern day. It will give your troops greater elevation over the battlefield and is an ideal defensive position in case of desperate hand to hand fighting up the stairs and possible ambushes inside each fully detailed room.

    A really great piece of terrain designed to help you create a dynamic and interesting battlefield, whether it be as a solitary house or part of a huge city fight. This kit has many pre-painted parts and, as you would expect from 4Ground, comes to you with high levels of internal and external detailing. The external walls have seen a fire fight or two with optional damaged pieces; in places you are able to remove plaster for exposed brickwork or even remove the bricks to make a loop hole and get a better firing position for your soldiers.

    As usual each storey is removable allowing maximum in-game access to each one of the many rooms. Once placed floors are locked in with locator lugs in each corner.

    This sort of building is not just suitable for WWII. Buildings like this became more and more common from the 1700's onwards, making 4Ground's World At War range very versatile terrain.

    Pack contains 1 laser cut building. Miniatures not included.

    *Note: Models supplied unassembled and painted*
