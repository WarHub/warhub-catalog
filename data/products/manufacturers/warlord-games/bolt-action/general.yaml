- name: M18 Hellcat
  sku: 402013004
  ean: 5060393704775
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/hellcat
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402013004_M18_Hellcat.jpg?v=1575566478
  status: current
  description: |-
    The Hellcat’s prodigious speed was attained by keeping its armour to no more than 1″ thick. Hellcat crews quickly took advantage of the vehicle’s speed to avoid being fired on and to outflank the heavily armoured German tanks.

    The M18 Hellcat first saw service in Italy but rose to fame in North West Europe, dominating German tanks \(including Panthers\) at Arracourt then playing a key role in the Battle of the Bulge. It also saw action in the Pacific in US and Chinese Nationalist service, being used more in the fire support role as Japanese tanks posed little threat.

    In games of Bolt Action the Hellcat is classed as an armoured car \(Damage Value 7+\) with a heavy anti-tank gun and the option to add a pintle mounted HMG, with the Fast and Recce special rules. It can be included in Amoured Platoons.

    Contains:

    - 1 M18 Hellcat plastic kit
    - 1 Waterslide transfer set
    - 1 Full colour construction and paint guide
    - 1 Colour, Bolt Action stat card

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Model supplied unassembled and unpainted*
- name: Boromite Brood Mother
  sku: 502412001
  productType: single_kit
  priceGbp: 97.00
  url: https://store.warlordgames.com/products/boromite-brood-mother
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/502412001-Boromite-Brood-Mother.jpg?v=1575566471
  status: current
  description: |-
    The Brood Mother – or Matronite to give the creature its proper name – is the largest and most extraordinary Lavan species of them all. Yet it begins life as a hatchling quite indistinguishable from its siblings, and it is only its extraordinary capacity for growth than comes to mark it out as a species of a vast and diﬀerent kind.

    These creatures are an extreme physical morph that evolved to live with in the Borom asteriod belt. With the ability to survive in harsher environments they make a perfect platform for heavy weapons, carving out ﬁghting compartments within the beast’s stony hide to carry men and weapons. Normally a placid and gentle creature, suitably powerful neural implants are used to goad the Brood Mother into a savage killer.

    #### Awesome detail

    When eggs hatch the small hatchlings gravitate towards a Brood Mother and feed upon the gritty ﬂakes of scale that she sheds for this purpose.

    #### More Weaponry!

    The Brood Mother is a Humongous Beast unit and the crew’s role is simply to operate any weapons and direct the creature by means of neural implants much as if it were a vehicle. The stats are a mix of its crew’s abilities \(Acc, Init and Co\) and those of the creature itself. Full details can be found in the [Beyond the Gates of Antares](https://store.warlordgames.com/collections/rules-books/beyond-the-gates-of-antares) rulebook on page 188.

