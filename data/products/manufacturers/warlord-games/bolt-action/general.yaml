  url: https://store.warlordgames.com/products/hungarian-army-pak-36-light-anti-tank-gun
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/403017407_HungarianPak36lightATG01.jpg?v=1662987328
  status: current
  description: |-
    Supplied by the Germans, the Hungarians utilised the 37mm PaK 36 as a light anti-tank gun. A version of the PaK 36 was produced to use the 40mm calibre ammunition of the Hungarian made Skoda A17 anti-tank gun.

    The Pak 36 knocked out thousands of lightly armoured Soviet tanks- which in 1941 formed the bulk of the Soviet tank forces. However, the Hungarians quickly discovered that the guns were of little to no use against the Soviet T-34.

    Contains one gun and three crew.

    *Models supplied unassembled and unpainted. No bases included.*
