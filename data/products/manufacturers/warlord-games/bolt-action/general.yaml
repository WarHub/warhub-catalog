  description: |-
    This is the digital version of the Sláine rulebook. Quickly reference the rules, scenarios and unit profiles from your device wherever you happen to be.

    Sláine is a skirmish tabletop miniatures battle game for two or more players set in the Sláine universe created by the legendary comic creators Pat Mills and Angela Kincaid. Axes and swords clash whilst Earth and Sour magic lash out across the Land of the Young, as the Earth Tribes of the goddess Danu battle the decaying Drune Lords and the relentless Fomorian Sea Demons.

    In Sláine, players take control of a small band of Earth Tribe, Drune, or Fomorian warriors as they fight for glory and survival in the mist-shrouded lands of Tir Nan Og and beyond.

    This book contains all the rules you need to play Sláine including scenarios, advanced rules, and profile lists to create your own heroes and villains for them to vanquish.
