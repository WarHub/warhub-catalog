  description: |-
    **OBSERVATION POST**

    We examine the goodies from our Salute haul in this month’s reviews, including new plastic buildings, fantasy armies, fierce female fighters, and *The Barons’ War Second Edition.*

    **RELEASE RADAR**

    Dom Sore’s Release Radar keeps us updated on all kinds of cool hobby releases each month.

    **QUICK FIRE**

    Short, quick-read posts from *WI* readers about their hobby projects, notes, news, and observations.

    **THEME: FOLKLORE IN THE AMERICAN CIVIL WAR**

    We add a smattering of Folklore to our ACW battles and campaigns, translating some of America’s legends to the tabletop for this month’s theme.

    **A TRIBUTE TO PAUL SAWYER**

    In this article we pay tribute to former *White Dwarf* Editor and Warlord Games co-founder Paul Sawyer.

    **THEME: OUTLAW RETINUES IN RUCKUS**

    Folklore favourite, Robin Hood, hits the tabletop in games of *Ruckus*, thanks to these fresh new rules from Mike Peters!

    **DEMOING MIDGARD**

    Pete Jenkins gives us a look behind the scenes of the *Midgard* participation game he ran with James Morris at this year’s Hammerhead wargaming show in Newark.

    **THEME: DESIGNER’S NOTES: THE WOODS**

    Geoff Solomon-Sims discusses the finer points of his intriguing fantasy skirmish game in our semi-regular ‘Designer’s Notes’ series.

    **WARGAMING WITH SNIPERS PART ONE**

    James takes a stealthy trip through frozen Finland, observing the terror that history’s most deadly sniper - Simo Häyhä - brought to the Soviets during WWII’s Winter War.

    **THEME: FOLKLORE INFLUENCES IN MOONSTONE**

    V.G. Thorne provides insight into the vivid fantasy world of *Moonstone* and its folklore inspirations.

