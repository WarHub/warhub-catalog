- name: Boromite team with Heavy Frag Borer
  sku: WGA-BOR-01
  productType: single_kit
  priceGbp: 34.00
  url: https://store.warlordgames.com/products/boromite-team-with-heavy-frag-borer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-BOR-01-Frag-Borer-a.jpg?v=1575566093
  status: current
  description: |-
    The Boromites are amongst the mostly heavily mutated of all human morphs in Antarean Space, with skin that is thick and scaly, broad, powerful bodies, and an almost inhuman physical strength. Their ancestors were genetically engineered in eons past to undertake the arduous roles of asteroid mining and magma extraction upon hostile, alien worlds. Since then they have spread throughout Antarean space, an itinerant and insular people, homeless wanderers and outsiders, with little liking for the weaker, softer humans they live alongside. They prefer to keep to themselves. Their rival Labour Guilds are secretive and even sinister organisations that continue to operate unseen, even within the bosom of advanced societies such as the Concord and Isorian Shard.

    The heavy frag borer is a weaponised mining tool – a fractal drill – a machine designed for boring through solid rock. It is buoyed upon a suspensor ring that can carry it along a flat surface or rotate to allow the borer to tunnel horizontally. The ring supports a short ranged transmat that carries spoil from the tunnel to a receiver ring outside the mine. Such a heavy machine requires time to set-up and to develop its full power, but it is capable of rending apart the most formidable of static defences and fortified targets. Even the most heavily armoured targets are vulnerable to the frag borer’s devastating fractal beam.

    Contains the following metal models:

    - 1 Heavy Frag borer
    - 3 Boromite crew
    - 1 Spotter probe

    *Note: Models supplied unassembled and unpainted*
- name: English Army 1415-1429
  sku: AO40
  productType: single_kit
  priceGbp: 28.00
  url: https://store.warlordgames.com/products/english-army-1415-1429
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/EnglishArmy_cover.jpg?v=1575566094
  status: current
  description: |-
    The figures in this box represent the English Army at the height of the Hundred Years War, when the English bowmen dominated the field of battle in France. Specifically the figures cover the period from the Battle of Agincourt \(in 1415, when they were led by Henry V\) to the Siege of Orleans \(1429, when the French were led by Joan of Arc\) which became the turning point of the war. All the Men at Arms are represented in the full plate harness which was now the norm for gentry, and they cover the first flowering of real full plate armour. This being mostly rounded and 'globular'.

    Although they are described these as English they could be used as French too. The only differences being the English tending to fight in 'white' uncovered armour a little more more than the French. With armour styles the box covers the main types used during these 14 years. Things changed quite fast especially with the basinets at this time. More plates were being added to the basic basinet with aventail until the aventail disappeared altogether and you had the full great basinet. The houndskull visors also became globular during this period.

    Shields for Men at Arms had more or less been dropped from use in the field as the armour became more complete, so there’s only one on the sprue \(2 per box\). All the visors are separate as is the 'orle' or decorated circlet which was typically English. Two of the bodies have jupons and the other four are in 'white' armour. These designed these so some of the arms from the Wars of the Roses sets are interchangeable, the shoulders are the same width at least. So with some of the 'white' armoured bodies \(i.e. the ones in the great basinets\) you should be able to bridge the 1440’s with the WotR arms.

    The archers are represented in padded aketons, nocking, drawing and loosing as a cohesive body. We’ve included a few pairs for arms for close combat too. These will be available separately as you might want to raise the ratio of the archers to men at arms.

    The box contains 24 archers and 12 men at arms. With the archers there is also a trumpet arm, the men at arms frame includes a longer spear that can be used for a standard or banner. Commanders can be used from within the men at arms.

    The box contains: 36 figures, unit bases, 17 banners, 6 standards, painting guide and information sheet.

    *Models supplied unassembled and unpainted*
