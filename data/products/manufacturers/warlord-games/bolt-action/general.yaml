- name: Tribal Nations Warband Starter Army with FREE Mythic Americas Rulebook
  sku: 729914002
  productType: book
  priceGbp: 92.00
  url: https://store.warlordgames.com/products/tribal-nations-warband-starter-army-with-free-mythic-americas-rulebook
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/729914002_MA_TribalNationsStarterArmy_Rulebook01.jpg?v=1659519500
  status: current
  description: |-
    Get the Mythic Americas rulebook FREE with this Mythic Americas Starter Army, perfect for those setting out on a new tabletop journey with the fearsome warriors, deadly magic, and towering monstrosities that vie for dominance in the fabled lands of the Mythic Americas.

    The Mythic Americas version of Warlords of Erehwon still keeps at its heart a singular objective in mind – to allow for fast-paced and exciting miniature battles upon a standard-sized table between rival forces known as Warbands. A Warband represents your own band of warriors – courageous humans, blood-thirsty monsters, legendary heroes, and mythological entities from the depths of the darkest myths.

    Mythic Americas: Warlords of Erehwon provides a multi-level, scenario-driven approach to your games. This approach offers plenty of opportunities to reward tactical play, but at the same time keeps things manageable in terms of the size of forces and space required. The game still uses ten-sided and Order dice, making for a game with mechanical depth and considerable adaptability. The Order dice test system, at the mechanical core of Mythic Americas, and an extremely balanced rules set offers Warband leaders great tactical freedom, but the game still offers lots of opportunity for fate and chance to have a say in the outcome of your battles. But, every experienced general throughout the ages knows that fate and chance will test even the most ingenious battle plan!

    The rulebook contains all the rules you need to get playing, a wealth of scenarios and four full army lists for the Tribal Nations, The Aztecs, The Maya, and The Inca. It also includes background with tactical tips and painting tips for each of the four warbands.

    **Tribal Nations Warband**

    The Children of the Tribal Nations are designed to play as a hit and run, finesse army. They are a fast, lightly armoured force that seeks to attack from cover while flanking the enemy with packs of quick beasts. The Tribal Nations tend to avoid direct confrontation with enemy infantry as their lack of armour makes them vulnerable to enemy attacks. Nations units favour ranged attacks and always take advantage of terrain to gain resistance bonuses and to leverage their mobility.

    Tribal Nations warbands will centre around a core of Mohawk and Seneca infantry backed by packs of wild beasts acting as fast strike forces. Monsters like the Wendigo and Sasquatch are the hardier units that can take an enemy charge and deal out large amounts of damage.

    Many units in a Nations warband have the choice of taking tomahawks. These are a unique hand-to-hand weapon that can be thrown at close range. Warriors with tomahawks will be much hardier in a melee engagement. These weapons are only available to the Tribal Nations.

    Tribal Nations Warband contains:

    - 1 Sachem Warlord \(1 HERO model\)
    - 2 Mohawk Warrior UNITS \(10 models\)
    - 2 Seneca Warrior UNITS \(10 models\)
    - 1 Sasquatch MONSTER UNIT \(3 models\)

    *Models supplied unassembled and unpainted*
