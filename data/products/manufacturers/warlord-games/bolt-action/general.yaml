  status: current
  description: |-
    The US-designed small-calibre pack howitzer \(75mm\) was used widely throughout World War II, especially amongst special forces. The M1A1 could be moved easily, transported or dropped by parachute if broken down into its component parts. Lend-lease recipients of the M1 were the UK, China, and Australia, amongst others. In Australian use, it saw service in two mountain batteries and some other units.

    *Models supplied unassembled and unpainted*
- name: Australian 2-pdr light anti-tank gun (Pacific)
  sku: 403015008K
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/australian-2-pdr-light-anti-tank-gun-pacific
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/403015008_Australian2-pounder01.jpg?v=1666365242
