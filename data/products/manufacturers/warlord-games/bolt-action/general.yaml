- name: Spanish Blue Division Decals
  sku: 4060100020
  productType: single_kit
  priceGbp: 2.25
  url: https://store.warlordgames.com/products/spanish-blue-division-decals
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/4060100020_-Spanish-Blue-Division-decals1.jpg?v=1600960180
  status: current
  description: |-
    Drawn from volunteers of Francoist Spain, the Blue Division operated on the Eastern Front as part of the German Wehrmacht in World War Two. Officially designated the Spanish Volunteer Army by the Spanish Army, and the 250^th^ Infantry Division by the Wehrmacht. Though Spain, under the regime of Francisco Franco, remained a neutral power during the war, Franco sympathised with the Axis powers.

    The unit participated in the Siege of Leningrad but was withdrawn from the front in October 1943, though many chose not to, some forming the short-lived Blue Legion, or incorporated into other units like the Waffen-SS. They were singled out for praise by Hitler, receiving the “Spanish Volunteer Medal”, for displaying effectiveness in impeding the Red Army’s advance. The Red Army suffered 49,300 casualties in actions against the Blue Division.

    When combined with our German or Winter German Bolt Action kits, this decal sheet will enable you to field this iconic legion in holding back the tide of the Soviets on the tabletop in your eastern front campaigns.

