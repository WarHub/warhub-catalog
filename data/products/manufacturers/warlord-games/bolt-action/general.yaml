- name: Buffalo Soldiers - 92nd Infantry Division
  sku: 402413009
  productType: single_kit
  priceGbp: 22.50
  url: https://store.warlordgames.com/products/buffalo-soldiers-92nd-infantry-division
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402413009_BuffaloSoldiers92ndInfantryDivision01.jpg?v=1619610354
  status: current
  description: |-
    Taking the fight to the Axis forces in Italy, the US troops of the 92nd Infantry Division had to overcome not only the enemy but also the prejudice from within. Nicknamed Buffalo Soldiers in memory of their ancestors fighting in the American Civil War, they proved themselves and lived by their motto: Deeds not Words!

    The 92nd Infantry Division was the only complete Black American division to see front-line service in Europe in World War II - segregation still being the norm in US forces. They were shipped out to Northern Italy where pro-Mussolini Italian troops and German formations were doggedly slowing the Anglo-American advance to a crawl.

    Despite being raw troops, the Buffalo Soldiers \(as they were known in memory of their ancestors fighting in the American Civil War\) performed well - much better than many experienced soldiers expected. Mostly fighting as a division, they did attach units to other formations such as the 1st Armoured Division. They also temporarily teamed up with the famous 442nd Regimental Combat Team - American troops of Japanese origin who also had something to prove.

    They fought many actions and found reinforcements difficult to obtain. They faced the 4th Italian Mountain Division Monte Rosa, several German grenadier units and the 1st Bersaglieri division.

    The Buffalo Soldiers acquitted themselves well, with the casualties to prove it, suffering around 5,000 dead, wounded and missing in just over a year in the line, and received two Congressional Medals of Honour, 1,166 Bronze Stars and 1,891 Purple Hearts.

    *Models supplied unassembled and unpainted*
