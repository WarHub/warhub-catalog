  status: current
  description: |-
    This 112-page book is the third in an ongoing series of publications that presents the glorious miniatures artwork of artists from around the globe in full-color, quality photos, supported by descriptions from the arists themselves.

    THE ART OF... ANA POLANSCAK - For more than a decade, Ana Polanscak has been creating her own miniature worlds. Initially these worlds were a part of other wargaming settings, but over time they have been fleshed out and been made firmly her own. Ana, a professional miniatures artist, blends elements of European folklore with her own spin on classic tales.

    Ana’s dark and often macbre style is instantly recognizable and deeply intriguing. Not only is her conversion and paint work incredible in it’s own right; the way she presents her miniatures and worlds through her photography is art as well.

    In this volume, Ana guides us through the principles she uses to create her mysterious and magical worlds through the miniatures and scenery she builds. Are you ready to explore the darker corners of Ana’s imagination brought to life?
- name: THE ART OF... Volume Two - Christof Keil
  sku: 9781950423767
  productType: single_kit
  priceGbp: 30.00
  url: https://store.warlordgames.com/products/the-art-of-volume-two-christof-keil
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/TAO_Volume2_CK_CoverSilver.jpg?v=1646931284
  status: current
  description: |-
    This 112-page book is the second in an ongoing series of publications that presents the glorious miniatures artwork of artists from around the globe in full-color, quality photos, supported by descriptions from the arists themselves.

    THE ART OF... CHRISTOF KEIL leans heavily into the aspect of miniatures art that Christof is most known for – kitbashing – or combining parts from a variety of incongrous kits to create completely new miniatures. In these pages, he describes the ways his inspirations, motivations, and techniques have evolved over the years.

    Christof guides us through his early projects, including a detailed tutorial on building a modern version of a classic Necromunda miniature, before moving on to some larger endeavors such as his Black Phallanx Crusade collection for use in various Warhammer 40,000 settings.

    In addition, we get to see some of Christof’s larger scale work sculpting and painting busts, as well as his tribute to a piece of grimdark artwork particularly famous in the miniatures wargaming community.
