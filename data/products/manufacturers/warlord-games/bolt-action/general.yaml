- name: City in Ruins - Single Storey Internal Ruins (1)
  sku: SLC0051
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/city-in-ruins-single-storey-internal-ruins-1
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/SLC0051_CityinRuinsSingleStoreyInternalRuins_1_02.jpg?v=1772125601
  status: current
  description: |-
    The City in Ruins buildings allow you to populate your table with fantastically detailed and themed laser-cut terrain created by our sister company *Skytrex.*

    Perfect for any urban warfare setting, whether taking the fight to your opponents in games of Bolt Action, or battling against the heroes, horrors, monsters and mechs in Konflikt '47 your troops will appreciate the shelter.

    These kits have multiple access points so you can place your models inside to take accurate defensive positions during gameplay. Each City in Ruins kit is modular so they can interact with any other City in Ruins set.

    You can never have too much terrain in your collection!

    *Studio Miniatures painted by Darek Wyrozebski.*

    *Models supplied unassembled and unpainted. Instructions Supplied. Please note: The rubble featured in the product photography has been added as a scenic example to showcase how the piece can be integrated into a battlefield setting. These additional elements are not included.*
