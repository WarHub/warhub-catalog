  description: |-
    We present the latest FAQ for Bolt Action. This PDF is the most up to date source for rulings and replaces any previous documents \(most recent update- February 2024\).

    Errata are changes to the text of the published books, changes that will be made in future printruns of said books. This includes new units, which are officially added to the game. Note that we have not thought it worthwhile to show an errata for minor typographical or layout errors, except where these might affect the reading of the rules.

    FAQs are answers to common questions, which in our opinion do not require a change in the text of the published books. We have not dealt with any representational queries along the lines of ‘Why does such and such a tank have such and such a value?’, as these are matters of judgment within the parameters of the game.

    We aim to update and if necessary expand this document quarterly, based on players’ feedback.
