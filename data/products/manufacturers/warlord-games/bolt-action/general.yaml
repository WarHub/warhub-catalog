  status: current
  description: |-
    **OBSERVATION POST**

    This month’s Observation Post includes fantasy figures for *The Woods* and *Guards of Traitor’s Toll*, Ancient naval battles with *Thalassa*, and plastic Gallows for *Dead Man’s Hand*.

    **RELEASE RADAR**

    Dom Sore returns with his new-release early alerts in this month’s Release Radar!

    **THEME: ASSASSINS AND TEMPLARS: LIES, LEGENDS, AND WARGAMES**

    Crusader-era historian, author, and wargamer Steve Tibble introduces us to the subject of this of this month’s theme and freebie rules.

    **ZERO HOUR BATTLE REPORT**

    Gripping Beast showcase their new early-20th-Century mass battle game with an action-packed trench assault during World War One.

    **THEME: ASSASSINS AND TEMPLARS: BATTLEFIELD ESSENTIALS**

    Need ideas for populating your *Assassins and Templars* tabletop with minis, flora, and architecture? This is the article for you!

    **PAINTING A RAGGED STAFF MINIS VETERAN**

    Mike Peters paints a figure \(twice!\) from a compact range of Wars of the Roses miniatures sold by Martin Brook, winner of our inaugural Hobby Heroes award in the 2024 *Wargames Illustrated* Readers’ Awards!

    **THEME: A CONVERSATION IN MYTH AND BLOOD**

    We talk to author Steve Tibble about his latest release, *Assassins and Templars: A Battle in Myth* and Blood, the book that inspired the game that’s free with this issue.

    **FROSTGRAVE BATTLE REPORT**

    *WI*Towers hosts a four-player game of *Frostgrave* to celebrate the game’s tenth birthday! James reports on the action as magic erupts across the tabletop, and the Wizards seek out great riches.

    **THEME: ASSASSINS AND TEMPLARS SCENARIO: THE AMBASSADOR**

    Will the Templars make it to the safety of the nearby Inn with their important charge in this *Assassins and Templars* scenario?

    **THEME: ASSASSINS AND TEMPLARS PAINTING AND COLLECTING**

    Keen hobbyist Mike Peters explains how he painted the Retinues that grace the pages of his new ruleset.

    **ALTERNATE WORLD WAR TWO**

    Has *Konflikt ’47*’s release left you inspired, but wanting a differently skewed ‘What if?’ for WWII? James explores other weird possibilities with a Halloween-time ‘spooky’ focus!

    **BRYCHO’S CONSTELLATRON**

    Joseph A. McCullough presents the four-player *Frostgrave* scenario from this issue’s battle report.
- name: 'Soldier of Fortune 27: Defenders of Stalingrad'
  sku: 403214007
  productType: single_kit
  priceGbp: 10.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-27-defenders-of-stalingrad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403214007_SoF27_DefendersofStalingrad01.jpg?v=1758726416
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of October 2025, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in November…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    The forces of the Soviet Union hold strong in the defence of Stalingrad. With a new *Armies of…* book and plastic miniatures releasing this month, it’s time to introduce a new Soldier of Fortune, the Defenders of Stalingrad!

    Defenders of Stalingrad depicts Vasily Chuikov, commander of the 62nd Army, along with Colonel-General Rodimtsev, poring over a map and reviewing the city’s defences. The stoic and resilient defence of the 62nd Army is the stuff of legend, in part made possible by the determination Chuikov instilled in his men.

    Defenders of Stalingrad makes for a fine companion and counterpart to the earlier Soldier of Fortune 18: Crisis in Stalingrad, or in itself as a great addition to any Soviet Army collection – particularly handy with this month’s release of [Armies of the Soviet Union: Third Edition](https://store.warlordgames.com/products/armies-of-the-soviet-union-third-edition-with-olga-kovalyova-special-miniature). The vignette is finely detailed, with the two officers making their plans over a table adorned with accessories, including a radio, an ashtray, and even a hopeful rodent hoping to scrounge anything it possibly can.

    Chuikov will have soon drawn up his plans and will be off to enact them. This set is only available for the month of October 2025. Thereafter, it will not return for at least two years. Don’t miss out.

    *Sculpted by Wojciech Flis. Studio miniatures painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
