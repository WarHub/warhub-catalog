- name: Ghar Bomber Squad (plastic)
  sku: WGA-GAR-05
  productType: single_kit
  priceGbp: 24.00
  url: https://store.warlordgames.com/products/ghar-bomber-squad-plastic
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-05-Ghar-Bomber-Squad-b.jpg?v=1575566390
  status: current
  description: |-
    The Ghar live only to destroy lesser humans, and will not rest until they finally prevail over a universe emptied of all that verminous race. They were created in ages past – even they do not know when or why – and whoever engineered them eradicated all traces of pity and compassion from their being. Out of their armoured suits they are scrawny and wretched things, but once encased in battle armour, attached to their suit’s control by neural plugs driven into their spines, they are transformed into the ultimate warriors!

    The Disruptor Bomber Squad is built around Ghar armed with a deadly Disrupter Bomber accompanied by Ghar armed with Scourer Cannons to protect the squad from attack. The Disruptor Bomber is a primitive launcher use a plasma/steam mix to lob a disrupter bomb into the air and on top of the enemy. Disruptor bombs release a powerful quantum gravity blast when they explode. This tears apart physical matter, wreaking havoc with sophisticated nano-based technologies, and creating residual spacial distortion that can often render battlefields uninhabitable for years.

    **Ghar Bomber Squad contains the following plastic mutli-part plastic models:**

    - 1 Ghar in battle armour with Disruptor Bomber.
    - 2 Ghar in battle armour with Scourer Cannon.

    *Models supplied unassembled and unpainted*
- name: Ghar Command Crawler
  sku: WGA-GAR-01
  productType: single_kit
  priceGbp: 39.00
  url: https://store.warlordgames.com/products/ghar-command-crawler
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGA-GAR-01-Ghar-Command-Crawler-a_091856aa-d2f3-4c23-8363-c75dd7e619ca.jpg?v=1575566234
  status: current
  description: |-
    The Command Crawler is a multi-legged vehicle designed to carry a Ghar Commander into battle. Like other Ghar machines it is a primitive affair that is powered by a volatile plasma reactor. The reactor’s exposed magnetic feed lines bathe the machine and its occupants in an eerie blue glow – a radiance that the Crawler’s crew continue to enjoy for some hours after leaving the vehicle.

    The Crawler’s primary role is to allow its Commander to direct battlefield operations from behind the safety of the vehicle’s heavy metallic armoured shells and ancillary magnetic shielding that protects the open crew compartments.

    However, Ghar communications are primitive and uncertain \(not least due to radiation from the plasma reactor\), often Commanders find themselves caught up in the fighting so they have to carry suitable armaments. The Command Crawler is heavily armed, carrying two Scourer Cannons each capable of shooting concentrated bursts of plasma at armoured enemies, scattering plasma widely over dispersed targets, and shooting space-warping disruptor bombs using super-heated steam generated by mixing water with raw plasma. Effective weaponry, if somewhat hazardous to all and sundry.

    Contains the following multi-part resin and metal model:

    - 1 Ghar Command Crawler with 1 commander and 2 crew figures

    *Model supplied unassembled and unpainted.*
- name: Dodge Weapons Carrier
  sku: WGB-AI-125
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/dodge-weapons-carrier
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-AI-125-Dodge-Weapons-Carrier-a.jpg?v=1575566231
  status: current
  description: |-
    The Dodge WC series was a range of light military trucks produced by Dodge and Fargo during World War II. They were known as the WC series ‘W’ being the letter code for 1941 and ‘C’ designating the ½ ton truck – the same designation was retained for the ¾ tonner. They were also referred to as ‘Beeps’ or ‘Big Jeeps’.

    This light 4x4 truck was used as a staff vehicle for high-ranking officers, weapons carrier, reconnaissance, and in a variety of non-combatant roles such as ambulances, mobile workshops, and signals trucks.

    In total 123,541 were built. The open cab pickup could be fitted with an optional M24A1 machine gun mount, which bolted across the front of the bed. The mount could carry the M1918 Browning Automatic Rifle, the M1919 Browning machine gun, or the M2 Browning machine gun.

    - Length: 13 ft 11 in / 4.24 m
    - Height \(with canvas cover\): 6 ft 10 in / 2.08 m
    - Height \(with top down\): 5 ft 2 in / 1.57 m
    - Weight: 5,645 lb / 2 560 kg net
    - Width: 6 ft 11 in / 2.11 meters
    - Payload: 1,750 lb / 800 kg

    Although some were used for reconnaissance, the ¾ tonner was less popular in that role than the Jeep because its greater size and weight made it less manoeuvrable in a tight spot.

    Whether transporting or towing, this vehicle is a very utilitarian piece of kit found in any US army and in almost every theatre of combat across the world. A perfect and cheap in game addition to get teams where they're needed.

    *Note: Model supplied unassembled and unpainted*
