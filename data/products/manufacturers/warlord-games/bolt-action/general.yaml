- name: M4A3E8 Sherman Easy Eight Armoured Platoon
  sku: 402013014
  ean: 5060917991933
  eanSource: shopify:flipsidegaming.com
  productType: single_kit
  priceGbp: 62.00
  url: https://store.warlordgames.com/products/m4a3e8-sherman-easy-eight-platoon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402013014_M4A3E8ShermanEasyEightplatoon01.jpg?v=1680620700
  status: current
  description: |-
    Initially designated the M4A3\(76\)W HVSS but shortened to M4A3E8 , this medium tank was eventually nicknamed the 'Easy Eight' by the US soldiers who fought in and alongside them. The Easy Eight boasts several improvements over earlier M4 Sherman designs, such as the Horizontal Volute Suspension System \(HVSS\) and wider tracks, welded hull instead of cast, and most importantly a high velocity 76mm main gun.

    The first Easy Eights were introduced in December 1944, just in time to see action in the Battle of the Bulge, where they proved their worth in the treacherous conditions. Over 2,500 Easy Eights were produced during the Second World War, and the design proved successful enough to see it continue to fight during the Korean War and even into the Vietnam conflict.

    In games of Bolt Action these are medium tanks with a heavy anti-tank gun and co-axial MMG, a hull mounted MMG and the option to add a pintle mounted HMG; this set gives you an Armoured Platoon of three tanks.

    Includes **three** plastic Sherman M4A3E8 'Easy Eight' medium tanks, Bolt Action stat card, three Bolt Action Order Dice, assembly guide, three full-colour waterslide decal sheets for US and Canadian vehicles and vehicle damage markers.

    These vehicles can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Models supplied unassembled and unpainted*
- name: THE ART OF... Volume Six - Seyni N'diaye
  sku: 9781958872079
  productType: single_kit
  priceGbp: 30.00
  url: https://store.warlordgames.com/products/the-art-of-volume-six-seyni-ndiaye
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/TAO_06_CoverDRAFT_Silver.jpg?v=1679592860
  status: current
  description: |-
    Seyni N’diaye \(AKA nebruison\) is an amazing artist from France who is incredibly passionate about the application of colours, textures, and patterns on his miniatures.

    Buried in each of Seyni’s works are little stories, or nods to significant events in his life, or simple pop culture references. Sometimes these things lie close to the surface, and other times it is a joy to dig deeper.

    The sixth volume of THE ART OF… series takes us into the often chaotic and exploratory painting that has marked Seyni N’diaye out as a miniatures artist with a bright future ahead of him.

    This volume includes:

    - **Armies:** It all began with miniatures for tabletop wargaming. Then Seyni unleashed his creativity.
    - **Warbands:** As more ideas started flowing, it was easy to bring them to life as smaller warbands.
    - **Dioramas:** Although he started creating dioramas to tell larger stories, Seyni quickly switched to focus on the most important aspects.
    - **The Journey So Far:** Seyni presents his creative journey, including his sources of inspiration.
    - **Bringing the Colour:** Vibrant colour has always been an integral part of Seyni’s signature style.
- name: THE ART OF... Volume Five - Tommie Soule
  sku: 9781958872062
  productType: single_kit
  priceGbp: 30.00
  url: https://store.warlordgames.com/products/the-art-of-volume-five-tommie-soule
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/TAO_05_CoverDRAFT_Silver.jpg?v=1679590748
  status: current
  description: |-
    Tommie Soule \(AKA The Miniature Painting Tutor\) is an English painter with an incredible passion for teaching miniature painting to all who would like to learn. With decades of painting experience under his belt, Tommie has been able to break the painting process down into its key elements whilst celebrating the joy of creating art.

    This fifth volume of THE ART OF… series differs from the other volumes in that it is an instructional volume, featuring Tommie’s Fundamentals of Painting course. He invites you to take a very hands-on approach by stripping away the jargon that can be found in this hobby and focusing on simple, easy-to-learn skills that provide the foundations for all miniatures painting.

    This volume includes:

    - **Establish Your Mindset:** Making sure that you are learning for the right reasons.
    - **Setting Consistency:** The methods to create the right paint consistency for each occasion.
    - **Loading and Shaping the Brush:** A properly loaded brush gives the best chance for success.
    - **Applying the Brush to the Model:** Tommie presents the different brush strokes you’ll need to understand to improve.
    - **Analysing Paintjobs:** See this knowledge applied through the lens of Tommie’s miniatures.
- name: THE ART OF... Volume Four - Chris Suhre
  sku: 9781958872055
  productType: single_kit
  priceGbp: 30.00
  url: https://store.warlordgames.com/products/the-art-of-volume-four-chris-suhre
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/TAO_Vol4_CoverDRAFT_Silver.jpg?v=1679589907
  status: current
  description: |-
    Chris Suhre is a wonderfully creative miniatures artist from the United States with a love for storytelling and an incredible level of patience.

    Inspiration can strike at any moment. When it does, Chris can find himself with a painting desk covered in possibilities, and it is his steady, iterative approach that sees him complete awesome pieces of art on a regular basis.

    This fourth volume of THE ART OF… series takes us into the mind of an artist who works primarily in fantastical dioramas. As with all good art, there are stories we see immediately and the stories hidden beneath the surface. This book offers us a guided tour of both.

    This volume includes:

    - **Inspiration and Creativity:** Chris talks about his inspiration and where he goes looking for it.
    - **Painting To Tell a Story:** Presenting a story in miniature form often requires additional planning.
    - **Composition in Miniatures Art:** Carefully considering the arrangement of elements in a diorama, composition can make or break a piece.
    - **Featured Dioramas:** A deep dive into the creation of four major projects for Chris.
    - **The Gallery:** We take a look across the wide variety of wonderful pieces Chris has worked on.
- name: US Army (Winter) weapons teams
  sku: 402213110
  ean: 5060917991285
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 16.00
  url: https://store.warlordgames.com/products/us-army-winter-weapons-teams
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402213110_USArmy_Winter_weaponsteams01.jpg?v=1678976827
  status: current
  description: |-
    Infantry weapons teams are a key component of any Bolt Action army, providing as they do great tactical flexibility for your force. Sniper teams, anti-tank teams and flamethrower teams are among the most prevalent, presenting your opponent with multiple challenges to overcome.

    The American Bazooka was first used in North Africa and on Tarawa in November 1942. The first version \(M1A1\) had two grips and a wooden support. By 1943 the new version was released which no longer had the front grip but had an improved electrical firing system. The final version was longer \(1.55m\) and improved the range from 200-250 yards to 300 yards. The M6 HEAT rocket could easily penetrate 76mm of armour at 30 degrees or 110mm at 90 degrees.

    The tasks of scouting and sniping were similar in American doctrines. In the US manual it was clearly stated that the duty of a sniper was to kill enemy officers in order to damage the morale of enemy troops. They were equipped with a telescopic sight on a M1903 bolt-action Springfield rifle, and also had close-combat weapons such as pistols and shotguns with which to defend themselves if discovered. Both members of the team had sniper training so the role of spotter was interchangeable.

    Flamethrowers were used throughout the war, especially in the Pacific, to clear out tunnels and bunkers. During the Normandy landings, the number of flamethrowers was increased to allow the men to open a gap in the fortified lines.

    Contains the following Warlord Resin Plus™ figures:

    - 2-man Bazooka team
    - 2-man Sniper team
    - 2-man Flamethrower team

    These figures are cast in our new and improved Warlord Resin Plus™. For more information on this material click [here](https://warlord-community.warlordgames.com/introducing-warlord-resin-plus/)

    *Models supplied unassembled and unpainted*
