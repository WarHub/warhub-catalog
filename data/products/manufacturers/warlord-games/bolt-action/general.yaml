  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of January 2026, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in February…**

