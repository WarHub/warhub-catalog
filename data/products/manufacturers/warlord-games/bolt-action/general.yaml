- name: Pre-Painted WW2 Pacific Guard Tower (2)
  sku: H00285
  productType: single_kit
  priceGbp: 15.00
  url: https://store.warlordgames.com/products/pre-painted-ww2-pacific-guard-tower-2
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/H00285_WW2_Pacific_Guard_Tower.1.jpg?v=1772729984
  status: current
  description: |-
    Multicolor prepainted \(UV-printed\) WW2 Pacific Guard Towers \(2\) are 2 elevated watchtowers with a ladder, pefect to represent common South East Asia and Oceania architecture of 20th century.

    - Length: 7,3cm / 2,9in
    - Width: 6,5cm / 2,5in
    - Height: 14,6cm / 5,8in

    Scale: 28-30mm / 1:56

    This model is delivered as a pack, unassembled and PREPAINTED.
    Every model is cut from one or more panels of HDF \(high-density fiberboard\) of 3mm and/or 1,5mm thickness.

    WW2 series scenery might prove demanding to assemble, dry fit parts before applying the glue to avoid mistakes. PVA \(white\) glue is recommended.

    **Attention:** Before taking the elements out make sure they are fully cut. There are minor connections that prevent them from falling out. Parts are secured with a layer of protection paper, please remove it gently before assembly. Tiny paint chips may occur when removing the protective layer, if it happens, use colour marker or hobby paint to mask them.

    Miniatures not included and are shown for scale purposes only.

    *Models supplied unassembled and unpainted*
