- name: 'Soldier of Fortune 23: Banastre Tarleton'
  sku: 303203401
  productType: single_kit
  priceGbp: 7.75
  url: https://store.warlordgames.com/products/soldier-of-fortune-23-banastre-tarleton
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/303203401_SoF23_BanastreTarleton01.jpg?v=1748357293
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 30th of June 2025, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in June…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    A proper Soldier of Fortune should have ‘been there, and done that’. In the case of June’s figure, ‘there’ is America, and ‘that’ is plenty of light cavalry work in the service of the Crown!

    This month’s Solider of Fortune depicts Lieutenant-Colonel Banastre Tarleton, one of the best-known commanders of the American War of Independence. A hero to the British public of the time, and a malevolent foe to the Americans, Tarleton was most definitely a man of action - and a perfect choice to join the ranks of the Soldiers of Fortune!

    Our figure depicts Tarleton at the head of his troops, looking particularly dashing in the style of cavalry helmet he helped popularise \(and lent his name to\) - in every respect the mirror of his *Black Powder Epic Battles: Revolution!* counterpart, only larger! Cast in finely detailed Warlord Resin, he’s a worthy addition to the Soldier of Fortune series.

    During the American War of Independence, the young Tarleton would rise from the rank of Cornet to command the British Legion, an elite force of light cavalry and infantry designed for independent operations. Under his command, the Legion would gain a reputation for ruthless efficiency, but also became feared and despised for their brutality, frequently being accused of massacring prisoners. Tarleton himself became a figure of fear, but was equally respected for his obvious abilities as a commander, and returned to England after the war as a feted hero.

    Tarleton’s a busy man, with a Legion to command, and he’ll only be available for the month of June. After that, he’ll be rushing off on campaign again, and won’t be seen for several years!

    *Sculpted by Marco Sano. Studio miniature painted by Kirsten Williams.*

    *Models supplied unassembled and unpainted*
