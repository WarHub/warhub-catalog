    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    Depicting Hiroo Onoda in the moment of his final emergence from the Philippine jungle, January’s Soldier of Fortune is the perfect counterpart to the Armies of Imperial Japan book figure, and an essential addition to any Bolt Action Japanese collection.

    Onada was an IJA officer who is best known for being one of the last Japanese holdouts, continuing to fight for nearly 29 years after the conclusion of WWII on Lubang Island in the Philippines. He resolutely refused to believe any evidence supplied to him that the war was over, and only gave up his long war when his former commanding officer flew to Lubang to meet him, and issued him formal orders to surrender. Having survived for 28 years, 6 months, and 8 days, Onoda emerged with his weapons fully functional, and would go on live until 2014.

    *Sculpted by Wojciech Flis. Studio miniatures painted by Andrés Amián.*

