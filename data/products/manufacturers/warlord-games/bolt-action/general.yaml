- name: Talking Miniatures
  sku: 9781739476007
  productType: single_kit
  priceGbp: 55.00
  url: https://store.warlordgames.com/products/talking-miniatures-standard-edition
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/TakingMinis2covers_8cdf70c3-0985-44cf-8d79-3cd4edd9ac65.jpg?v=1687274807
  status: current
  description: |-
    Please note this book is published by Shaggy Dog Publishing Ltd and is not part of Warlord Games’ regular range. As such, it is unfortunately exempt from our usual postage and packing practices. Due to its prestige size and weight, any order containing it can only be sent via courier and will thus be subject to a postage and packing fee of £6.00, it is not possible to deliver any order that contains Talking Miniatures to a PO Box address. However, if any order that contains Talking Miniatures also includes £150.00 of other products it will qualify for free shipping. The Talking Miniatures book itself will not contribute to this threshold.

    Purchases of Talking Miniatures book will not generate Warlord Medals.

    Talking Miniatures is an exciting new book about the early years of Games Workshop and Citadel Miniatures. Written and compiled by former White Dwarf Editor and Design Studio Manager – Robin Dews, and ex-Citadel/GW Sales Director, now Head of Warlord Games - John Stallard, the book consists of a series of lavishly illustrated conversations with some of the eclectic cast of designers, sculptors, artists, rebels and similar non-conformists who in the early 1980s gravitated towards Bryan Ansell and the early Citadel Miniatures team.

    More a collection of conversations than a series of interviews, Talking Miniatures, allows the participants to tell us in their own words, exactly what it was like in those very early years. How did that first edition of Warhammer Fantasy Battle come to be written? Who was behind the incredible look and feel of the original Warhammer 40,000 – Rogue Trader? How did the iconic shape of the original RTB01 Space Marines develop, and how did Mike McVey create and then master the mid- 90s GW painting style? All these questions, and hundreds more, are answered in this book in the words, memories and recollections of the people who were actually there and doing these things!

    In addition to these incredible stories, the book is lavishly illustrated with photographs and images taken from the hundreds of the books, games, magazines and miniatures that Games Workshop has produced over the years. In addition, we have had privileged and unprecedented access to the personal collections of all the participants and present many of these artifacts and miniatures for the very first time.

    For anyone who has lifted their paintbrush, miniature in hand or rolled a fistful of dice across a tabletop battlefield, Talking Miniatures is an essential read. Even if you are not currently a hobbyist, Talking Miniatures will take you on a thrilling and insightful ride into that magical point where creativity and commerce coincide.

    Contents:

    - A 492-page softback book split into two volumes with a hardback slipcase.
