- name: Scots Covenanters plastic boxed set
  sku: WGP-04
  productType: single_kit
  priceGbp: 30.50
  url: https://store.warlordgames.com/products/scots-covenanter
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-04-Scots-Covenanters-b.jpg?v=1575565764
  status: current
  description: |-
    There is a compelling thrill about the sight of a Scottish Government army drawn up for battle. Dour-faced hardmen from the lowlands of Scotland drawn up in their trademark Hodden Grey uniforms, topped with their distinctive blue-knitted bonnets, the Covenanters fought hard in many bloody battles of the civil wars.

    Indeed they routed the English forces in the Bishops' Wars leading up to the great civil war where they first sided with Parliament, fighting mainly in the North, most famously at Marston Moor. Then they made a momentous decision and sold the captured Charles I, their King, to his bitter enemies, Parliament.

    This unholy alliance could not last and the Covenant army found itself allied with a doomed Royalist cause in the second and third civil wars.

    Well-equipped and organised, the Scottish infantry could give a good account of themselves. They scorned armour, and often helmets, in their pike divisions, but all too many of them died at catastrophic battles like Preston, Dunbar and, finally, Worcester or were slaughtered in the Highlands by Montrose's wild Highlanders and Irish. Survivors were shipped to the West Indies where many died of disease, a sad end to a once proud fighting force.

    Warlord's Covenanters are shown here fighting under the saltire flag, which was typical of the day, eager to get to grips with their English foes.

    Contains:

    - 36 multi-part hard plastic miniatures: 24 Musketeers, 12 Pikemen.
    - Captain, Ensign, Sergeant & Musician \(in metal\), and 36 metal bonnets.
    - Plastic bases
    - Background & Painting Guide & 8 Full colour flags, new and battleworn!

    *Models supplied unassembled and unpainted*
- name: Scots Lancers boxed set
  sku: WGP-08
  productType: single_kit
  priceGbp: 44.50
  url: https://store.warlordgames.com/products/scots-covenanter-scots-lancers
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-08-scots-lancers-c.jpg?v=1575565763
  status: current
  description: |-
    Scotland's Covenanter armies fought hard in all of the three civil wars in the British Isles and, indeed, on the Continent as mercenaries for various Protestant states and Kings. The Covenant armies were well-equipped and well-paid unusual for the times. However, they suffered from a lack of good quality cavalry horses.

    Formed into smaller troops than their English counterparts, the Scottish cavalry battled hard against superior numbers and quality of horse. To make up for their deficiencies in horseflesh they liberally equipped themselves with pistols, sticking them in sashes and boot-tops to fire them at their foe in close quarters!

    Where pistols and carbines were lacking, they gave their front ranks wicked looking lances, similar to the feared Border Reiver light spears, which would certainly intimidate their foes and make cornered infantry tremble.

    Warlord Games Scottish cavalry enable you to field Leslie's horse at Marston Moor, the feared Gordon horse of Montrose, or even represent the wild Moss Troopers who prowled the Scottish countryside.

    This boxed set contains 12 metal & plastic Scots Lancers, including 3 command models and a full-colour leaflet with banners

    *Models supplied unassembled and unpainted*
