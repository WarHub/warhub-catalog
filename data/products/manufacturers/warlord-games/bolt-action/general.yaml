- name: Storming party with petard
  sku: 202213002
  productType: single_kit
  priceGbp: 26.50
  url: https://store.warlordgames.com/products/storming-party-with-petard
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/202213002_Pike_ShotteStormingParty04.jpg?v=1650538666
  status: current
  description: |-
    When a fortification needed to be quickly breached a team carrying a petard – a wooden box filled with explosives – would be called on to blow open the defences.

    A petard team would be accompanied by other troops whose task it was to clear the way for the explosives to be placed and to protect the team from the enemy while they went about their dangerous task.

    This petard team is accompanied by a troop of dismounted cavalrymen. Clad in stiff buff coats, back and breast armour and helmet, the troopers run forward – as fast as their high cavalry boots will allow. They are well-equipped to take enemy fire, but they are able to dish it out too, most carrying a brace of pistols and a stout sword. The corporals have their carbines to keep the enemy’s heads down, and some have been issued by the Firemaster with grenades – simple hand-hurled bombs that may be as dangerous to the thrower as the enemy!

    When the Firemaster lights the fuse he slaps the team on the back and shouts “Run like the devil!”. Too many are slow on the uptake and are ‘hoist by their own petard’...

    Box contains 8 metal dismounted cavalrymen and two-man petard team.

    *Models supplied unassembled and unpainted*
- name: Armoured Pikemen
  sku: 202213001
  productType: single_kit
  priceGbp: 26.50
  url: https://store.warlordgames.com/products/armoured-pikemen
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/202213001-Armoured-Pikemen-02.jpg?v=1575566512
  status: current
  description: |-
    The pike blocks were the “Queen of the battlefield” in the 17th century, a solid block of the tallest and stoutest of the infantry and the basis for offensive or defensive actions. It was assumed to be a more ancient and hence more noble weapon than the modern caliver or matchlock muskets that were appearing in greater numbers on the field of battle in the 1600s.

    The pike itself started with a 16' ash wooden shaft with a secured sharp metal spear head giving the pikeman a lethal reach and when massed together, the ability to fend off either enemy pikemen or as often massed cavalry. A well-equipped pikeman would also have a short but sturdy sword to use at the closest quarters, when the ‘push of pike’ as it was termed had become a tangled mass.

    Pikemen were expected to wear a quality headpiece or helmet. Ideally each man would be issued with back and breastplates, which were pistol and sword proof. Front ranks were also often issued flexible thigh plates, or tassets, making them formidable opponents.

    As the wars dragged on soldiers tended to shed their heavy and expensive defensive armour, however the sight of a well-drilled pike block bristling with long pike staves clad in grim looking armour was a view that most soldiers would not forget in a hurry.

    Box contains 12 metal pikemen and 12 metal pikes.

    *Models supplied unassembled and unpainted*
