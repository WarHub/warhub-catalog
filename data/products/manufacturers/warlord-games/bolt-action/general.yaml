- name: 'Soldier of Fortune 31: Major Erwin König'
  sku: 993210001
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/soldier-of-fortune-31-major-erwin-konig
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/MajorErwinKonig1.jpg?v=1769776066
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 28th of February 2026, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in March…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    February's Soldier of Fortune figure is a familiar face, but one who's not been seen for a long time!

    Major Erwin König previously served as the first ever Bolt Action Tournament miniature, making him in incredibly high demand all over the world. Now, he's emerged from the rubble of Stalingrad once more, to bring his sniping expertise to the tabletop as February's Soldier of Fortune special figure.

    Inspired by the classic *Enemy at the Gates*, König is an elite German sharpshooter, brought in to deal with Soviet snipers such as the legendary Vasily Zaitsev. While evidence for his historical existence is scant, there's no denying how cool he looks as part of any German Bolt Action army!

    König will only be available during February - he's needed on the frontlines, after all - so don't miss your chance to add this iconic figure to your collection. At the end of the month, he'll disappear again, not to be seen for years to come.

    *Models supplied unassembled and unpainted*
- name: Wargames Illustrated WI458 February 2026 Edition
  sku: WI458
  productType: single_kit
  priceGbp: 1.00
  url: https://store.warlordgames.com/products/wargames-illustrated-wi458-february-2026-edition
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/WI458_Cover.jpg?v=1769702750
  status: current
  description: |-
    **OBSERVATION POST**

    It’s a rules special in this month’s reviews, covering pre-history all the way to the far future.

    **RELEASE RADAR**

    Dom Sore’s monthly look at the newest wargaming ephemera returns.

    **FRAME FOCUS: SOVIET ARMY INFANTRY**

    James takes this month’s versatile Soviet Army Infantry Platoon Freebie Frame and works it into the world of *Konflikt ’47*.

    **THEME: HEROES, GODS, AND STOP-MOTION MONSTERS**

    Pete Brown provides some scenario ideas for Greek myth games based on a Hollywood classic.

    **DESIGNER’S NOTES: TRENCH CRUSADE’S TWISTED HISTORY**

    James talks to *Trench Crusade’s* main man, discussing the varied historical inspirations behind the world and rules Tuomas Pirinen has created.

    **THEME: DESIGNER’S NOTES: WARRIORS OF ATHENA**

    Joe McCullough gives us the inside scoop on his new game, set in the world of Greek myth.

    **THE GERMANS ARE COMING**

    Andy Johnson reports on how his novel was transformed into a wargaming spectacular.

    **THEME: GOING GREEK WITH GAMERS GRASS TERRAIN**

    James makes a collection of terrain pieces for *Warriors of Athena* with the help of some new Gamers Grass kits.

    **BACK TO THE FUTURE - FOW EARLY WAR**

    We ask Battlefront’s Peter Simunovich \(Chairman\), Chris Townley \(Head of Studio\), and Wayne Turner \(Games Designer\) some probing questions about all things Early War.

    **MORE LIFE IN THE LANDSKNECHT**

    Charles Singleton revisits Warlord’s *Death and the Landsknecht* Italian Wars supplement for *Pike and Shotte.*

    **SLOGGING THROUGH THE MUD IN TRENCH CRUSADE**

    Rubén Torregrosa follows up on his previous *Trench Crusade* painting guide with a masterclass on muddy basing.

    **RON RINGROSE: MEGA WARGAMER**

    Dan takes a fond look at mega-wargamer Ron Ringrose’s last wargaming hurrah.
- name: Pacific Theatre L shaped building ruins
  sku: SLC0104
  productType: single_kit
  priceGbp: 20.00
  url: https://store.warlordgames.com/products/pacific-theatre-l-shaped-building-ruins
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/SLC0104_AsianVillages_LShapedBuildingRuins03.jpg?v=1769688441
  status: current
  description: |-
    The ‘Pacific Theatre’ buildings allow you to populate your gaming tables with highly detailed and themed laser-cut terrain representing what could be a number of areas from throughout the conflicts in the Pacific. These fantastically designed buildings have been created by our sister company Skytrex.

    Perfect for any Pacific gaming setting, whether taking the fight to your opponents in hard fought games of Bolt Action, or battling against the heroes, horrors, monsters, and mechs in Konflikt '47 your troops will appreciate the shelter which they can provide.

    As with the ‘City in Ruins’ sets these kits are designed with multiple access points so models can be placed inside to assume accurate defensive positions during gameplay.

    You can never have too much terrain in your collection!

    *Miniature sculpted by Skytrex. Studio Miniatures painted by Steffani Sorensen.*

    *Models supplied unassembled and unpainted. Instructions supplied.*
