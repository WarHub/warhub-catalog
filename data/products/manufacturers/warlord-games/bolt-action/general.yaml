  status: current
  description: |-
    Tengu are terrifying creatures that combine human and avian qualities to various degrees, appearing as dark and threatening birds or as winged and sometimes beaked men - though their beaks often take the form of extremely long noses. They are reckoned to be a kind of daemon, yokai or even as a holy spirit or Kami, but either way they are monstrous creatures.

    Originally seen as harbingers of war and troublesome spirits in the extreme, their reputation has softened over the ages. Yet they remain the powerful and dangerous protectors of the mountains and forests, inhabiting remote and desolate regions far from civilisation.

    In the Warlords of Erehwon game Tengu provide a potent flying unit gifted with high speed and multiple attacks, a formidable asset to any Samurai warband.

