    The Dodge 3/4 ton light truck was a 4x4 vehicle used for a wide variety of roles including staff vehicles, weapons carriers, ambulances and signals trucks. Often referred to as ‘Beeps’ or ‘Big Jeeps’, they were most often used in the transport and tow configurations.

