  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/403011033_SoF009_TheyCannaeTakeItCapn1.jpg?v=1711555071
  status: current
  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 30th of April 2024, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in May…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    Best known as Montgomery 'Scotty' Scott on the legendary TV series Star Trek, actor James Doohan had a colourful life prior to taking to the silver screen.

    Doohan landed on 'Nan' sector of Juno Beach on 6th June 1944 as a second lieutenant in the 13th Field Artillery Regiment of the 3rd Canadian Infantry Division. Shooting two snipers, Doohan led his men to higher ground through anti-tank minefields, where they took defensive positions for the night. Things were not to go so well for Doohan following this early success though. Whilst crossing between command posts at 23:30 that night, a nervous Canadian sentry let rip with his Bren gun, hitting Doohan six times – four in his leg, one in the chest, and one in his right hand. The bullet to his chest was stopped by a silver cigarette case gifted to him by his brother. His right middle finger had to be amputated, something he would try to conceal during his career as an actor, sometimes with a prosthetic finger.

    Doohan's war was not over however. He went on to graduate as an Air Observation Pilot, flying Auster Mark V aircraft for as a Royal Canadian Artillery officer. Although not technically a member of the Royal Canadian Air Force, Doohan was once regarded as the "craziest pilot in the Canadian Air Force". In the late spring of 1945, on Salisbury Plain north of RAF Andover, he slalomed a plane between telegraph poles "to prove it could be done", earning himself a serious reprimand. We hope he was saying "I'm giving her all she's got!" whilst doing so...

    *Models supplied unassembled and unpainted*
