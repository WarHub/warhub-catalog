  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of October 2024, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in November…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    This sergeant of the US Cavalry has dismounted to fight, and he’s clearly in a spot of bother, having dropped his carbine and drawn his revolver. He’s a steely-eyed sort, and his aim looks steady, but he’ll need to go for his sabre once he’s fired his last shot, and hope he’s got some comrades nearby to ride to his rescue! Last Shot is our Soldier of Fortune for October 2024!

    The perfect addition to any Black Powder American Civil War or later American Frontier collection, *Last Shot* is a versatile figure with a wide range of uses. Whether you integrate him into a unit of dismounted cavalrymen \(of whose support he’ll doubtless be glad!\), incorporate him as part of a command stand, or use him as a handy battlefield objective, he’ll look fantastic on the tabletop! Packed with crisp detail, he’s a great opportunity to flex your painting muscles as well – particularly on his magnificent moustache!

    As with all Soldier of Fortune figures, *Last Shot* can’t hang about – he’s in tricky situation, and looking to shoot his way out of it! At the end of October, he’ll disappear – either rescued by friendly troops, or overwhelmed by the enemy – and won’t be available again for several years. Don’t miss your chance to add *Last Shot* to your Soldier of Fortune figure collection!

    *Models supplied unassembled and unpainted*
