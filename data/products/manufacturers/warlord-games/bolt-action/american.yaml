  description: |-
    George Washington had served in the Crown forces against the French, and knew full well how the British regulars fought. He also knew that his militias and Minutemen, although numerous and individually brave, would not stand against the British Redcoat regulars.

    He therefore formed a regular force, the Continental army, that would be thoroughly drilled, and fight in the European manner of massed ranks. These regiments, when combined with Militia units, gave Washington a solid force that could and did stand toe-to-toe with British soldiers. It was these regulars that ultimately won the war for the Americans.

    Contains:

    - 30 plastic Continental Army infantry:
     - 24 musketeers including command group of two officers, drummer, Sergeant and two ensigns
     - 6 Light Infantry
    - 4-page background guide including eight full-colour flags

    *Models supplied unassembled and unpainted*
- name: Colonial Militia Men (Plastic Box)
  sku: 302013402
  ean: 5060393702610
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/colonial-militia-men-plastic-box
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGR-AWI-06-AWI-Militia-Men-a.jpg?v=1575566221
  status: current
  description: |-
    America was a dangerous place to live in the 18th century, the communities feeling under real or imagined danger from Indian attack or forays from France or Spain. The British army in America was tiny, so much of the defence was traditionally performed by the Militias. These were civilian bodies, locally manned and headed up by the great and the good, and equipped with state muskets. Their performance varied greatly, some behaving very well on the field whilst others deserted or broke and ran when under pressure. What they did do was add manpower to both armies. Militias fought for the American side, but thousands also fought as Loyalists for the Crown Forces. Militias rarely carried bayonets , so felt entitled not to close with regulars.

    The figures in this box wear either 18th century civilian clothes or hunting shirts and trousers. A variety of headgear is included allowing you to also make models ideal to use as French troops in the French Indian War of 1754-63.

    Contains:

    - 30 plastic Colonial Militia figures
    - 2-page background and assembly guide

    *Models supplied unassembled and unpainted*
- name: American War of Independence Continental Army starter set
  sku: WGR-ARMY2
  ean: 5060393702467
  eanSource: shopify:goblingaming.co.uk
  productType: starter_set
  priceGbp: 107.00
  url: https://store.warlordgames.com/products/american-war-of-independence-continental-army-starter-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGR-ARMY2_AWI_Continental_Starter_Army_a.jpg?v=1575566193
  status: current
  description: |-
    March 1776 - Continental artillery is placed overlooking the city of Boston forcing the evacuation of the British forces. For the next five years, the main bodies of the Continental and British armies campaigned against one another in New York, New Jersey, and Pennsylvania. These campaigns included the notable battles of Trenton, Princeton, Brandywine, Germantown, and Morristown, among many others.

    General Washington and other distinguished officers were instrumental leaders in preserving unity, learning and adapting, and ensuring discipline throughout the eight years of war.

    In the winter of 1777-1778, with the addition of Baron von Steuben, of Prussian origin, the training and discipline of the Continental Army began to vastly improve and in the late summer of 1781 the main body of the army travelled south to Virginia to rendezvous with the French West Indies fleet under Admiral Comte de Grasse. This resulted in the Siege of Yorktown, the decisive Battle of the Chesapeake, and the surrender of the British southern army.

    Prepare your Army and make your plans to fight these battles with the new American War of Independence Continental Army Starter Army:

    Contains the following 28mm hard plastic figures and bases:

    - 120 Continental Infantry including full command
    - 40 Colonial Militia
    - 1 Cannon and Crew \(Including Molly Pitcher\)
    - 1 Mounted Commander
    - 1 Casualty figure
    - Full-colour flag sheets

    *Models supplied unassembled and unpainted*
- name: American War of Independence British Army starter set
  sku: WGR-ARMY1
  ean: 5060393702450
  eanSource: shopify:goblingaming.co.uk
  productType: starter_set
  priceGbp: 107.00
  url: https://store.warlordgames.com/products/american-war-of-independence-british-army-starter-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGR-ARMY1-British-army-a.jpg?v=1575566187
  status: current
  description: |-
    New York - 1776, General Washington has been preparing his defences since April.

    After leading British troops to victory in the Battle of Bunker Hill, General William Howe took command of all British forces in America.

    General Howe plans an attack with a precision hitherto unknown in British operations in north America. His reinvigorated army sets sail from Halifax, arriving at new York in late June and capturing Staten Island on 2nd July.

    These troops are bolstered in August, first by the return of Clinton’s flotilla from Charleston and later by the arrival from England of a 150-ship fleet carrying reinforcements including the Foot Guards and numerous regiments raised from the German Principalities, who will become ever-known as “Hessians”.

    With an army now substantially outnumbering the defenders, Howe orders the first units to be landed on Long Island on 22nd August. Within three days there are 20,000 British and allied troops on Long Island, divided into two wings. Half of the force will engage the rebels frontally with feint attacks, while the other half swings far around the rebel left flank. The fighting results in overwhelming defeat for the rebels, but Howe stops short of finishing off the defenders, believing them trapped.....

    Prepare your Army and make your plans to fight this battle with the new American War of Independence British Starter Army:

    Contains the following 28mm hard plastic figures and bases:

    - 120 British line Infantry including full command
    - 30 Hessian Mercenaries
    - 8 Woodland Indians
    - 1 Cannon and Crew
    - 1 Mounted Commander
    - 1 Casualty figure
    - Full-colour flag sheets

    *Models supplied unassembled and unpainted*
