- name: Woodland Indian Tribes
  sku: 302015501
  ean: 5060393702603
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22.00
  url: https://store.warlordgames.com/products/woodland-indian-tribes
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/302015501-AWI-Indian-Tribe-a.jpg?v=1575566634
  status: current
  description: |-
    The Native Americans had a quandary in deciding who to back, in what must have seen to them a puzzling civil war. The Indian tribes, or Confederations, were themselves split on whether to join in a war or maintain the peace. As with most complicated conflicts, old alliances, promises and bribes – and some vengeance – all played their part in deciding which faction to support.

    The majority of the Indian tribes chose to side with the British forces, who also paid and supplied them to harass the American soldiery and, more controversially, their farms. This led to the war taking on a more sinister tone, as the Americans fought back, counter-raiding Indian settlements. Armed with muskets and tomahawks and skilled in fieldcraft, Indian war parties brought terror to men caught up in the woods, however they could get dismayed in defeat, leaving no place in the main battle line.

    Contains:

    - 24 plastic multi-pose Woodland Indians with a variety of armaments and equipment
    - 2-page background guide including construction details

    *Models supplied unassembled and unpainted*
- name: Digital Rebellion! - Black Powder Supplement PDF
  sku: WG-BP006-e
  productType: single_kit
  priceGbp: 5.00
  url: https://store.warlordgames.com/products/digital-rebellion-black-powder-supplement-pdf
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/Rebellion-front-cover_f5823084-916a-4910-aa21-d6e77539bf98.jpg?v=1575566384
  status: current
  description: |-
    In 1775 the simmering resentment of American colonists exploded into a bloody rebellion. Beginning in Boston, the conflict eventually stretched from Canada in the north to Florida in the south and lasted eight gruelling years. On one side stood the King’s redcoats and settlers loyal to their sovereign, later joined by regiments of ‘Hessian’ mercenaries. Ranged against them was a citizen army under the inspirational leadership of George Washington, supported by militia and eventually French troops eager to embarrass their old foe. Both sides were forced to learn new tactics for fighting in the wild terrain of North America in a conflict that saw heroism and ineptitude in equal measure.

    This supplement for Black Powder describes the history, armies, personalities and battles of this conflict. Included are scenarios allowing you to recreate many of the battles of the rebellion.

    A copy of the Black Powder rulebook is required to use this supplement.
