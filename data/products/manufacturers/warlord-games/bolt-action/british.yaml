  description: |-
    The Churchill was undoubtedly one of the most successful and famous British tanks of the Second World War, despite its involvement in the disastrous Dieppe raid. Initially under-armed, it was gradually up-gunned and was nevertheless loved by its crews: its cross-country ability was unrivalled and it was less inclined to ‘brew-up’ from a direct hit than the Sherman.

    Named after the Prime Minister, Winston Churchill, it went on to prove its worth in North Africa, including the famous battle of Longstop Hill, where it surprised the German defenders by climbing what had been assumed to be impassable slopes.

