  description: |-
    South African born Lt. Col. Dudley Clarke formed an initial plan for a highly trained raiding force whose tactics would be based on the hugely effective exploits of the Boer Commandos during the Second Boer War from 1899 to 1902. Churchill was very impressed with this proposal, and by 13 June the term ‘Commando’ was being used in an official capacity to describe both the proposed unit and the elite soldiers within it.

    Maj. Gen. RH Dewing, Director of Military Operations and Plans for the War Office, added more definition to the role: “The Commando organisation is really intended to provide no more than a pool of specialised soldiers from which irregular units of any size and type can be very quickly created to undertake any particular task. The main characteristics of a Commando in action are:

    a\) Capable only of operating independently for 24 hours;

    b\) Capable of very wide dispersion and individual action;

    c\) Not capable of resisting an attack or overcoming a defence of formed bodies of troops, i.e. specialising in hit and run tactics dependent for their success upon speed, ingenuity and dispersion.”

    In Bolt Action, commando armies are hard as nails, crammed with veteran infantry units able to dominate the battlefield at any range. Commando squads have access to a huge range of equipment – from close-range SMGs, to multiple LMGs. This bundle nets you two boxes of our fantastic Commandos, complete with their iconic green berets and bergen backpacks. You'll also get a Commandos Support Group, which includes a medium mortar and machine gun team, and a soldier carrying a suppressed DeLisle Carbine, perfect for taking out pesky sentries without making a fuss.

