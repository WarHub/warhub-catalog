  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/409410056_BoltActionCampaign_ToughGutebook01.jpg?v=1694105458
  description: |-
    **This listing is for a digital version of the Campaign Italy: Tough Gut supplement, in ebook format.**

    In Italy, the fight continues! As the Allies push north up the Italian Peninsula, they have encountered heavy resistance from the Axis and their multitude of fortified and defensive lines, slowing the allied advance to a crawl. The 'soft underbelly' of Europe proved to be false, instead it was a 'tough gut'.

    This supplement for Bolt Action, which acts as a counterpart to Soft Underbelly, focuses on the battles ranging from the Gustav Line in 1944 all the way to those of the Gothic Line in 1945, with the breakouts at Anzio and Monte Cassino of particular focus. Containing a host of scenarios to refight these famous battles, along with new units, special rules, and Theatre Selectors, this book contains everything players need to bring an end to the war and liberate Italy.
