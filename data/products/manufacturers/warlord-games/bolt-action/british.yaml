  description: |-
    Initially produced as a replacement for the M3/M5 Stuart light tanks, the armour of the M24 was purposely kept light, but it mounted a vastly upgraded lightweight 75mm gun \(compared to the 37mm gun found on the Stuart\) and its much lower silhouette made it popular with those crewing it.

    The M24 was nicknamed ‘Chaffee’ by the British after the US Army General Adna R. Chaffee, one of the key proponents of tank development and use in US armed forces. Nearly 5,000 M24 Chaffees were produced during World War II, the first arriving in Europe in November 1944 where they were issued to the 2nd Cavalry Reconnaissance Battalion and 42nd Cavalry Reconnaissance Battalion, both part of the 2nd Cavalry Group \(Mechanised\). During the Battle of the Bulge, in the Ardennes the following month, these units were rushed to the southern sector. Post war, the M24 Chaffee would go on to see action during the Korean War, Indo-Pakistani War and French actions in Indochina and Algeria.

    In games of Bolt Action the Chaffee is a light tank with a medium anti tank gun with the Improved HE rule and the option to take the Recce special rule. It can be included in Amoured Platoons.

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

