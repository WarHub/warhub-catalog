  description: |-
    Willkommen zur dritten Edition von Bolt Action! Das weltgrößte Tabletop Strategiespiel rund um den Zweiten Weltkrieg. In diesem Regelbuch findest du alle Regeln die du brauchst, um mit deiner Sammlung von Bolt Action-Miniaturen fantastische und rasante Spiele zu spielen.

    Bolt Action wurde von der Branchen Legende Alessio Cavatore geschrieben und basiert auf dem beliebten und bekannten Order Dice System: Die dritte Edition ist das rasante Spiel des Zweiten Weltkriegs, bei dem du das Kommando über Züge von Infanterie, schweren Waffen und Fahrzeugen auf den Schlachtfeldern der ganzen Welt übernimmst. Einfach und leicht zu erlernen, aber mit grenzenlosem taktischen Potenzial, wird Bolt Action dir endlose Stunden unterhaltsamen, erfüllenden Spielens bescheren!

    Neben den Spielregeln für Bolt Action, enthält dieser mächtige Band auch Armeelisten für Großbritannien, Deutschland, die Vereinigten Staaten von Amerika, das kaiserliche Japan und die Sowjetunion. So kannst du dich sofort in die Action stürzen sobald dein Exemplar eintrifft. Hinzu kommen Schnell-Referenztabellen und ein ausführlicher Index, sowie wunderschöne farbige Illustrationen und detaillierte Hintergrundinformationen zum Zweiten Weltkrieg im Allgemeinen - die perfekte Inspiration für deine Sammlung! Mit dem intuitiven Zugauswahlsystem kannst du deine Sammlung auf jeden Einsatz zuschneiden, während das neue Szenario-Generierungs System sicherstellt, dass keine zwei Spiele gleich sind. Schlussendlich kannst du mit einer ganzen Reihe zusätzlicher optionaler Sonderregeln deine eigenen und einzigartigen Schlachtfelder auf dem Spieltisch erschaffen.

    Zusammen mit diesem wunderschön gebundenen Buch erhälst du auch eine exklusive Sonderfigur - den Träger der Ehrenmedaille, Francis S. Currey! Dieser legendäre US-Soldat erhielt die höchste amerikanische Militärauszeichnung für seine mutigen und tapferen Leistungen während der Ardennenoffensive im Dezember 1944. Dabei setzte er zahlreiche deutsche Panzer außer Gefecht, rettete mehrere verwundete Kameraden, um zuletzt \(fast\) im Alleingang einen massiven deutschen Vorstoß aufzuhalten. Diese exklusive Sonderfigur aus detailgetreuen Warlord Resin zeigt Currey mitten im Geschehen und wird mit zwei verschiedenen Waffen geliefert - einem Gewehr mit Panzerabwehrgranate und einer Bazooka.

