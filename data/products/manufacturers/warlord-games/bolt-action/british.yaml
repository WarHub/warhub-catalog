    **Webstore Exclusive!** *This artillery piece is supplied with a laser-cut oval MDF base \(120mm x 92mm\) - only available through this webstore. You can now base your complete gun and crew together, making attractive mini-dioramas!*

    The pre-eminent field British artillery piece in WWII \(and beyond into the Korean War and Malayan Emergency in the 1950s and 60s\), the QF \(Quick Firing\) 25-pdr was capable of direct fire and howitzer roles, excelling in both.
    Although of lower calibre than many other guns in service during WWII, the 25-pdr had a longer range than most. This, coupled with the speed with which their crews could respond to the British artillery control system, cemented the 25-pdr’s reputation as one of the best artillery pieces in service during the war.

    Their Axis opponents were so in awe of the speed with which Royal Artillery crews could unleash shells they couldn’t believe the 25-pdr wasn’t an automatic weapon!

    Often towed by the Morris C8 field artillery tractor – more commonly known simply as the ‘Quad’ – the 25-pdr became a vital support weapon in the struggle to defeat Rommel’s Afrika Korps and Mussolini’s Italian forces.

    Contains one resin & metal Quad tractor, one resin & metal limber, and one metal artillery piece with three crew. Also includes Bolt Action stat cards, vehicle damage markers, full-colour decal sheet, Bolt Action Order dice and MDF base.

