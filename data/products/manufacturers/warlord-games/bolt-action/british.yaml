  description: |-
    **This is a digital version of the Bolt Action Compendium, in .pdf format.**

    Add a whole new dimension to your games of *Bolt Action* with the *Compendium*!

    Collecting a series of articles from our passionate community in one volume, the *Bolt Action Compendium* is packed with background, scenarios, and new units and special rules for some of the Second World War’s most fascinating campaigns. From the Chindits in Burma to partisan forces all across Europe, and much more besides, the *Compendium* is an essential part of any *Bolt Action* bookshelf. No matter what kind of games you like to play, you’ll find something to enhance your experience in this book! Inside you’ll find:

    - **The Polish Army in Exile** – Field the exiled Polish Carpathian Independent Brigade in North Africa
    - **Heroes Fight Like Greeks** – Recreate the exploits of the Greek mountain partisans
    - **Operation *Rösselsprung*** – Re-fight the assault on Tito’s hideout by the 500th SS Parachute Battalion
    - **The Brazilian Expeditionary Force** – Take the *Força Expedicionária* Brasileira into action at the Battle of Monte Castello
    - **The Japanese SNLF in Combat** – Play through the early battles of the Japanese Special Naval Landing Forces
    - **Operations Longcloth & Thursday** – Battle through the epic campaigns of the Chindits, deep in the jungles of Burma
    - **The Polish People’s Army in Soviet Service** – Field Polish communist forces alongside the Red Army
    - **The Battles of Tomaszów Lubelski** – Replay the largest armoured engagement of the German invasion of Poland
    - **Spectres of the Forest** – Use the legendary Bielski Brothers to lead your Eastern Front partisans against the occupying Germans
    - **The Spanish Blue Division at Krasny Bor** – Add Spanish *Wehrmacht* volunteers to the savage battles on the Eastern Front
    - **Resistance! – Partisans in France** – Find inspiration for a whole host of partisan forces, and bring one of the most famous *Maquis* operations to the tabletop
    - **Red Star–White Star** – Continue the war after the fall of Germany in a ‘what-if’ situation where Soviet and American forces clash
- name: 'Digital Bolt Action: Korea supplement Ebook'
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '9781472836670'
  eanSource: shopify:merlinsminiatures.co.uk
  sku: '409410046'
  priceGbp: 10.00
  url: https://store.warlordgames.com/products/digital-bolt-action-korea-supplement-ebook
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/BoltActionKorea_NewCoverJune19900x1103_dae83dbe-ce31-4b88-9ba1-d1aa0b3a4f0c.jpg?v=1600960169
  description: |-
    Fought between 1950 and 1953, the Korean War was one of the first major conflicts of the Cold War. Backed by the Soviet Union and Communist China, the North Korean regime battled for control of the peninsula against the South Korean government and a 21-country UN task force.

    The Korean War is unique and interesting in the annals of world and military history in its own right. An aspect rarely discussed is the cultural implications of so many Western, non-Western and European nations fighting against combatants from the Orient. Due to the vast cultural diversity of so many nations fighting in such a geographically small area, cultural differences would have a significant impact on how the combatants treated each other on the field of battle. These differences went beyond simple language barriers, they included problems in logistics, religion, personnel replacements and the method in which war was conducted.

    Inside the book, you'll find a comprehensive history of the conflict with details of every major battle fought between the two sides. It also includes details of the various forces and their organisation, commanders, and equipment. Scenarios are provided for many of the battles, along with comprehensive force selectors to help you assemble your force.

    A copy of the Bolt Action 2nd Edition rules is needed to use this supplement.
