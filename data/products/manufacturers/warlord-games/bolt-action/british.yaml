  description: |-
    Take the fight to the enemy beneath the blazing desert sun, and wage World War II on your tabletop!

    A Gentleman’s War is one of the best ways to get started with *Bolt Action: Third Edition*, whether you’re an absolute beginner or a hardened veteran of tabletop battles. Inside this box, you’ll find finely detailed plastic infantry - determined British 8th Army and German *Afrika Korps* veterans - as well as two plastic armoured cars to support them in battle, and a double-sided battle mat with MDF scenery to set the stage for your games.

    In the box, you’ll find a QR code. Simply scan it, and it will take you to the Bolt Action website, where you’ll find a free downloadable Bolt Action Field Manual. This incredibly useful document takes you through every stage of the hobby with simple, easy-to-follow instructions. Learn how to build your new models, then take them straight into the action! Through a series of fun, introductory missions, you’ll familiarise yourself with the key mechanics of Bolt Action. In no time at all, you’ll be leading your forces into battle!

    Once you’ve played through the introductory missions, you’ll be ready to dive into the full A5 Bolt Action rulebook in the set, and from there the possibilities are endless!

    A Gentleman’s War contains:

    - 12 hard plastic 28mm British 8th Army infantrymen
    - 12 hard plastic 28mm Afrika Korps infantrymen
    - 1 hard plastic 1/56 scale Humber MkII/IV armoured car
    - 1 hard plastic 1/56 scale Sd.Kfz. 222/223 armoured car
    - Bolt Action: Third Edition A5 rulebook
    - Assembly guides
    - Ruined North African house MDF terrain
    - Bolt Action Order dice
    - Dice bag
    - Double-sided gaming mat
    - Plastic pin markers and templates
    - 10 Six-sided dice

    *Models supplied unassembled and unpainted*
