- name: M3 Stuart
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5060393704706'
  eanSource: shopify:goblingaming.co.uk
  sku: '402013002'
  priceGbp: 22.00
  url: https://store.warlordgames.com/products/m3-stuart
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/402013002-M3-Stuart-a.jpg?v=1575566487
  description: |-
    As American tank designers began to recognise the outdated and obsolete nature of the M2 light tank, they realised they needed to create something new.

    The M3 Stuart was a direct upgrade from its predecessor, the M2 light tank, with thicker armour, modified suspension and new recoil system. The M3 Stuart used the 37mm M5 gun \(later to be replaced by the new, slightly longer M6 gun\) as well as five mounted Browning machine guns.

    This was the first U.S. tank to partake in tank-versus-tank combat in World War 2, where a platoon of five Stuarts engaged the Imperial Japanese Army \(IJA\) 4th Tank Regiment's [Type 95 Ha-Go light tanks](https://store.warlordgames.com/products/japanese-type-95-ha-go-light-tank).

    The Stuart stands tall, and was favoured by many crews due to its fairly high speed. It was mechanically reliable and obtained the nickname "Honey" due to its smooth ride.

    During 1942, the British Army decided to keep their Stuarts away from tank-versus-tank combat and instead use them for reconnaissance. A number of Stuart variations arose, including the Stuart Recce, the Stuart Kangaroo and the Stuart Command. Making a conversion of these is easy with the new plastic Stuart. The Recce had the turret removed in order to achieve an improved speed and range, while the Kangaroo had been converted into an armoured personnel carrier.

    The M3 proved itself as an effective armoured vehicle in jungle environments, where the Japanese infantrymen found themselves under-equipped and lacking anti-tank weaponry. This left them with only one option, which was to rely on close assault tactics. The Stuart was an impressive counter to this, and in this setting was barely any more vulnerable than a medium tank.

    Principal service: 1940–43. Numbers manufactured: 5,811.

    Principle combatants:

    - British
    - American
    - Soviet
    - Chinese

    Captured and used by:

    - German
    - Japanese

    This box contains 1 x plastic M3 Light tank with options to use:

    - 5 MMG
    - Flamethrower
    - External Fuel tanks
    - Sand guards
    - Rounded or plate turret variants

    *Models supplied unassembled and unpainted*
- name: M3 Stuart Platoon
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5060393704560'
  eanSource: shopify:flipsidegaming.com
  sku: '402013001'
  priceGbp: 62.00
  url: https://store.warlordgames.com/products/m3-stuart-platoon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/402013001-M3-Stuart-Platoon1.jpg?v=1725982516
  description: |-
    Before the war much effort went into building light tanks, which were felt to have a role analogous to cavalry in an earlier age. Once war began these precepts were quickly brought into question, and the need for more heavily armoured and better armed tanks became apparent. The M3 was derived from the pre-war M2A4 light tank: it retained that tank’s 37mm gun and 3 hull-mounted machine guns.

    The British Army was the first to use the "Stuart" in combat. About 170 Stuarts took part in Operation Crusader proving superior or comparable to most of the tanks used by the Axis forces.

    The high losses suffered by Stuart-equipped units during the operation had more to do with the better tactics and training of the Afrika Korps than the apparent superiority of German armoured fighting vehicles used in the North African campaign.

    Crews liked its relatively high speed, smooth ride and mechanical reliability, hence the name "Honey" was occasionally used by crews as it drove "Sweet like Honey".

    During 1942, the British started keeping Stuarts out of tank-to-tank combat, using them primarily for reconnaissance.

    After initial successes in Tunisia the US army took a beating at Kasserine Pass by the tactically superior German DAK and the infamous 88mm guns , \(some M3s were put back in use against the Americans\). Soon after the US army would disband the light tank battalions, adding them as recce to their medium tank battalions.

    Many upgrades were developed such as man packed flame throwers, or with the turret removed, as a "Stuart Recce". Some others were converted to armoured personnel carriers known as the "Stuart Kangaroo", and some were converted command vehicles.

    The M3 was also the first American crewed tank to engage an enemy tank. Fighting their first tank battle in December 1941, when a platoon of five M3s led by Lieutenant Ben R. Morin engaged the Imperial Japanese Army \(IJA\) 4th Tank Regiment's Type 95 Ha-Go light tanks north of Damortis.

    The M3A1 made its combat debut on Guadalcanal, where it was part the 1st Marine Tank Battalion in 1941 where it proved an excellent tank in jungles against the ill equipped Japanese, serving with both the US and British forces until gradual replacement by the Sherman from 1944.

    This platoon comprises x3 plastic M3 Light tanks with options to use:

    - 5 MMG
    - Flamethrower
    - External Fuel tanks
    - Sand guards
    - Rounded or plate turret variants

    *Models supplied unassembled and unpainted*
