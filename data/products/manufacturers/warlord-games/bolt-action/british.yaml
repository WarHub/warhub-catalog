    The Highlanders were good soldiers, showing great discipline and hardiness on the march. The Scots proved themselves time and again as doughty fighters – as adept with the Brown Bess musket as with their fearsome use of the bayonet in hand-to-hand fighting.

    The Highland regiments considered themselves a cut above other county regiments and their distinctive plumed bonnets and swinging kilts marked them out to an enemy as a unit to be avoided if at all possible. The skirl of the bagpipes could carry a long way over the battlefield, encouraging these fearsome warriors, and demoralising their foes.

