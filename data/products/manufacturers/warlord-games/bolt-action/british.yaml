  description: |-
    **Soldier of Fortune - This figure is only available via the Warlord Games webstore until the 31st of December 2025, 23.59 \(BST\). Thereafter, the figure will not be available in any other way, shape or form for a minimum of two years. A new Soldier of Fortune will take its place in January…**

    **Don’t miss your chance to get a hold of this limited-edition figure!**

    **Please note, that this product is limited to one per transaction. Discount codes cannot be redeemed on this item.**

    Depicting James Brudenell, 7th Earl of Cardigan, during the infamous Charge of the Light Brigade, December's Soldier of Fortune figure is a perfect accompaniment to Into the Valley of Death, and an essential addition to any British force for Crimea.

    The archetypal aristocratic officer, and seen by many as emblematic of the evils of the British system whereby officers could purchase their commissions, Cardigan was a deeply unpopular commander of first the 15th and later 11th Hussars. A tyrant to his officers, he nevertheless rose to the rank of Major General, in which capacity he commanded the Light Brigade during the Crimean War.

    At the Battle of Balaclava, Cardigan led the British Light Brigade in the charge that would make them legends. Although he queried his orders to charge the Russian guns, he obeyed them in full - at a truly horrific cost.

    Shown in his role as commander of the Light Brigade, as he begins his charge, Last of the Brudenells presents a fantastic opportunity for painters to really go to town on his gorgeous uniform, as well as making a perfect commander for games of Black Powder set in the Crimean War.

    *Models supplied unassembled and unpainted*
