  description: |-
    Bienvenue dans la troisième édition de Bolt Action, le meilleur jeu de figurines pour la Seconde Guerre mondiale ! Dans ce livre, vous trouverez toutes les règles nécessaires pour jouer des parties passionnantes et intenses avec votre collection de figurines Bolt Action.

    Écrit par Alessio Cavatore, véritable légende du monde du jeu, et basé sur le célèbre système de dés d'ordre, Bolt Action : Troisième Édition est un jeu de combat dynamique sur la Seconde Guerre mondiale qui vous place au commandement de pelotons d'infanterie, d'armes lourdes et de véhicules sur des champs de bataille à travers le monde. Facile à prendre en main, mais offrant un potentiel tactique illimité, Bolt Action vous procurera des heures de divertissement et une expérience de jeu enrichissante.

    Outre les règles pour jouer à Bolt Action, ce livre imposant comprend également les listes d'armées de la Grande-Bretagne, de l'Allemagne, des États-Unis d'Amérique, du Japon impérial et de l'Union soviétique, vous permettant de vous lancer dans l'action dès réception de votre exemplaire. Vous y trouverez également des tableaux de référence rapide et un index complet, ainsi que de superbes illustrations en couleur et des informations détaillées sur la Seconde Guerre mondiale en général et sur des opérations et campagnes notables en particulier, une source d'inspiration parfaite pour votre collection ! Le système intuitif de sélection de pelotons vous permet d'adapter votre collection à n'importe quelle mission, tandis que le nouveau système de génération de scénarios garantit que deux parties ne seront jamais identiques. Enfin, toute une série de règles spéciales optionnelles vous permettent de créer vos propres champs de bataille uniques.

    En plus de ce magnifique livre relié, vous recevrez également une figurine spéciale exclusive à la boutique en ligne : Francis S. Currey, récipiendaire de la « Medal of Honor » ! Ce soldat américain légendaire a reçu la plus haute distinction militaire américaine pour son courage et sa bravoure lors de la bataille des Ardennes en décembre 1944, où il a détruit de nombreux chars allemands, sauvé plusieurs camarades blessés et stoppé à lui seul une puissante avancée allemande. Réalisée en Warlord Resin avec un niveau de détail impressionnant, cette figurine exclusive représente Currey au cœur de l'action. Elle est fournie avec deux options d'armes différentes : un fusil équipé d'une grenade antichar et un bazooka.

