  description: |-
    The most produced Valentine variant, the Mk III was an improved design with a completely redesigned turret, internal mantlet and enlarged turret basket which gave additional room for the loader to operate the upgraded QF 2-pdr Mk V gun. This in turn freed up the commander for other duties. To offset the additional turret for the new turret the side armour was reduced slightly from 60mm to 50mm. The Mk III served from 1941.

