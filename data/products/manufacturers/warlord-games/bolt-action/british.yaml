  url: https://store.warlordgames.com/products/m8-m20-greyhound-scout-car-platoon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGB-START-32-M20-M8-Platoon-b.jpg?v=1655226264
  description: |-
    The M8 Greyhound was originally designed to replace the US military's portee gun in an anti-tank role, but was quickly repurposed once it was realised that its performance against German armour was lacking. It found use as a popular and successful armoured car that served American and British armies well throughout the war.

    Its crew of four served a 37mm gun, a co-axial .30 cal, the more aggressive crews adding a .50 cal on the roof for anti aircraft and local defence.

    It was very fast – hence its British name of Greyhound – capable of 55mph on good roads, but was known to bog down in mud. Its armour was enough to shrug off small arms fire, and these vehicles were best used in pairs to scout out enemy lines, supporting each other in a leap-frog fashion on the advance or covering a retreat.

    Replacing the armoured turret for a fixed, open fighting compartment, the M20 scout car was used primarily as a command vehicle, Sacrificing the turrets main gun in favour of extra radio capability, it also carried a portable Bazooka for extra anti-armour firepower.

    In contrast to many other nations the US developed just the one type of chassis for the role of reconnaissance, destined originally for the tank destroyer units it was eventually issue primarily to the cavalry squadrons.

    In conjunction with the M8 the M20 utility car was also developed becoming a command variant in many cases.

    Appearing in late 1943 in Italy to a baptism by fire on the roads to Rome, the cavalry squadrons gave the tactical commanders a unique unit offering a mix of speed and firepower. This led to the squadrons becoming the core of small, task specific, forces consisting typically of engineers, tank destroyers or self-propelled artillery depending on the mission.

    This kit will allow you to build both the M8 with its familiar turret and 37mm gun as well as the M20 utility.

    This vehicle can also be used in games of Achtung Panzer!, the game of close-quarters tank-on-tank combat, its rules can be found in the Achtung Panzer! rulebook.

    *Models supplied unassembled and unpainted*
- name: Martello Tower
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: BS01
  priceGbp: 9.00
  url: https://store.warlordgames.com/products/martello-tower
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/BS01_Martello_Tower.jpg?v=1575567033
  description: |-
    New from Sarissa Precision, the Martello Tower. This simple to construct structure not only looks great on the table but is a powerful fortification in Black Seas.

    **History**

    Martello towers are small defensive forts that were first built during the French Revolutionary Wars across the British Empire. Standing roughly 40 feet high, they each harboured a garrison of a single officer and between 15 and 25 men. Because they were constructed as round structures, they proved resistant to cannon fire, and their flat roof was ideally suited for a single artillery piece with a 360° arc of fire.

    The Tower's design was inspired by a particular round fortress which was part of a Genoese defence system, situated at Mortella Point in Corsica, built in 1565. In 1794, as part of the siege of Saint-Florent, two British ships, the HMS Fortitude and HMS Juno unsuccessfully attacked the fortress. It eventually succumbed to a land-based assault after two days of fierce fighting. Impressed by the Tower's resilience, the British copied its design. Martello is a misspelling of the original Mortella, which translates to 'hammer' in Italian.

    Martello Towers were situated across the British coastline - which numbered around 140 in total. Other governments such as Australia, Canada, Menorca and South Africa aped the British model. The towers were doomed to become obsolete as the 19th century wore on, with the development of more powerful rifled artillery weaponry.

    **In Black Seas**

    Black Seas allows you not only to recreate naval battle on the high seas but also conduct actions off the coast, including landing expeditions. To this end, as well as fleets, players are also able to purchase land fortifications. In fact, this is a crucial component of scenario 10, *Capture the Fort* \(page 47\), which sees two fleets compete to take a strategically important Martello Tower.

    A Martello Tower is a large target and is armed similarly to a small third rate in the game. It benefits greatly from a 360° arc of fire and like all land fortifications, gets bonuses in both range and accuracy. Games featuring Martello Towers can make for some highly thematic and narratively rich games.

    *Models supplied unassembled and unpainted*
