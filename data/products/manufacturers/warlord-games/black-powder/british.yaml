  description: |-
    An einem feuchten, bewölkten Sonntag im Juni 1815, kamen die zwanzig Jahre kontinuierlicher Kriegsführung der napoleonischen Kriege zu einem epischen und verlustreichen Abschluss, auf einem regennassen Feld in Belgien. Diese Kriege waren in der Tat eine weltweite Angelegenheit, in der die europäischen Großmächte nicht nur auf dem europäischem Festland, sondern auch an so weit entfernten Orten, wie Indien, Ägypten, der Karibik und Amerika kämpften. Die größten Generale der Epoche standen sich auf den Schlachtfeldern gegenüber. Der Herzog von Wellington, verteidigt einen wenig bekannten Hügelkamm gegen den Kaiser der Franzosen. Napoleon Bonaparte, Meister der Attacke steht britischen, deutschen, holländischen und belgischen Brigaden gegenüber. Brigaden einer unrühmlichen Armee, die trotz schrecklicher Verluste über 9 Stunden den Hügelkamm hielt und damit ermöglichte, dass die Ankunft der preußischen Armee unter Blücher den Sieg des Herzogs endgültig besiegelte.

    Die Schlacht von Waterloo wurde zu einem Meilenstein der Militärgeschichte. Ein Meilenstein, der niemals verblassen wird, und etwas Vergleichbares wird man nicht mehr zu Gesicht bekommen.

    Dieses neue 2 Spieler Starterset für Black Powder, enthält alles was du für deinen Feldzug zum Sieg bei Waterloo benötigst.

