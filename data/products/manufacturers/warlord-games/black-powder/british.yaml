  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/IntotheValleyofDeathBundle.png?v=1763140867
  status: current
  description: |-
    One of the most tantalising 'what-ifs' in historical wargaming is if the Charge of the Light Brigade had been supported by the entirety of the cavalry and horse artillery. Could the Chasseurs d'Afrique have run down the Russian guns on the Fedioukine Heights? Would the Heavy Brigade, supported by mobile guns, have been able to clear the Russian guns and rifles from the Causeway Heights to the South?

    If you've ever dreamed of fielding what would have been the most glorious cavalry charge in history then this bundle is for you, comprising:

    - **The Light Brigade** - two units of Light Dragoons, one of Lancers and two of Hussars.
    - **The Heavy Brigade** - the Scots Greys and four units of Heavy Dragoons plus Horse Artillery.
    - One unit of French Chasseurs d'Afrique

    *Models supplied unassembled and unpainted*
