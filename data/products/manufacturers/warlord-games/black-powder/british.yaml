    The failure of the British army from a wargaming perspective is not in its men, but in its leaders. The generals, with a couple of notable exceptions, were not experienced in warfare and beyond issuing initial orders usually played little part in the battle. Failure to issue orders or to effectively communicate them to the divisional or brigade commanders often left brigades paralysed whilst they awaited instructions. Additionally, a genuine loathing of one another, and some generals’ preference for elevating officers for their social standing, rather than command capability, exacerbated such problems.

    This pack contains three of the most famous personalities in command of British forces during the Crimean War, cast in metal:

    - Lord Raglan
    - Lord Campbell
    - Captain Nolan

    Rules for their use in Black Powder can be found in the *Into the Valley of Death* supplement.

    *Sculpted by Mike Percy. Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
- name: The Thin Red Line - Crimean War British starter army
  sku: 302613801
  ean: 5060917997010
  eanSource: shopify:goblingaming.co.uk
  productType: box_set
  priceGbp: 107.00
  url: https://store.warlordgames.com/products/the-thin-red-line-crimean-war-british-starter-army
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/302613801_TheThinRedLineCrimeanWarBritishstarterarmy01.jpg?v=1763042435
  status: current
  description: |-
    The thin red line! There are few more glorious military spectacles than the measured tread of Her Majesty’s line regiments wheeling by division the marching at their steady pace towards their enemies – unflinching, unafraid, and unstoppable.

    If war has any glory in it at all, it can be found in the splendid turnout and resplendence of the British Army and its fabulously dressed soldiery of the Crimean War.

    The men of the line regiments, of which over fifty served in the campaign into the Crimea, may not have been saints, and many had enlisted simply to avoid jail or the poorhouse, but they behaved magnificently when put to the test against the Russians.

    At the Alma, at Sevastopol, at Inkerman – the redcoats did their bit for Queen and country five-fold, many losing their lives or their limbs. The Crimean War has been described as the first modern war, but has just as accurately been described as the last old-fashioned war – the troops being led to death or glory by officers who had fought at Waterloo all those years earlier! Sadly neglect, incompetent commanders, and disease killed far more British soldiers than the Russians ever did – a poor reward for extraordinary service.

    Box Contains:

    - 60 Hard Plastic Crimean War British Line Infantry
    - 12 Metal British Line Infantry Command Figures
    - 8 Metal Crimean War British Lancers
    - 1 Metal Crimean War British Royal Artillery 9-Pdr Cannon with Crew
    - 1 Metal British Colonel (Mounted)
    - Full-colour Flag Leaflet
    - Plastic Bases

    *Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
- name: Into the Valley of Death (The Crimean War) Black Powder supplement with 'The Trooper' special miniature
  sku: 309913810
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/into-the-valley-of-death-the-crimean-war-black-powder-supplement-with-the-trooper-special-miniature
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/309913810_IntoTheValleyOfDeathWith_TheTrooper_SpecialMiniature_01.jpg?v=1763037806
  status: current
  description: |-
    *Half a league, half a league,*

    *Half a league onward,*

    *All in the valley of Death,*

    *Rode the six hundred.*

    Immortalised in Tennyson’s poem, the charge of the Light Brigade is probably the only part of the Crimean War that remains in the popular imagination. Fought between Russia and an alliance of the Ottoman Empire, Britain, France and Sardinia, the allied campaign was fought mainly on the Crimean Peninsula. Hoping to prop up the ailing Ottoman Empire and to save it from an expansionist Russian Tsar, the allies aimed to take the Russian port of Sevastopol to prevent Russia controlling the Black Sea. The campaign saw more than just the blunder of the Light Brigade, with poor leadership and logistics standing in stark contrast to the bravery and endurance of the men who fought there.

    Written by Pete Brown, this supplement for the award-winning *Black Powder*, contains full details for each of the armies that fought in the Crimea, including organisational and uniform information as well as special rules for each of the larger-than-life generals who led them. Alongside this is a full account of the campaign with each of the battles and skirmishes included as scenarios for your wargames table, including the famous Light Brigade action at Balaklava. Will you honour the Light Brigade and save the noble six hundred?

    **Special Miniature:** Order your copy of *Into the Valley of Death* from the Warlord Games webstore and you’ll also receive a **free** special figure – ‘The Trooper’! This brave fellow flies the British flag in the face of adversity at Balaklava, and looks determined to hold “the thin red line’ singlehandedly!

    *Into the Valley of Death written by Pete Brown.*

    *‘The Trooper’ sculpted by Marco Sano. Studio miniature painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
