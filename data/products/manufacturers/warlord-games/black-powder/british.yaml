- name: Napoleonic British Rocket Bombarding Frame 2
  sku: 305001003
  ean: 5060917993753
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 22.50
  url: https://store.warlordgames.com/products/napoleonic-british-rocket-bombarding-frame-2
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/305001003_NapoleonicBritishRocketBombardingFrame_2_1.jpg?v=1724932453
  status: current
  description: |-
    Destruction and flames from on high – that’s the Congreve style, and it’s a powerful addition to your British Black powder force!

    Designed by Sir William Congreve in 1808, based on rockets captured from the Indian state of Mysore, the eponymous Congreve rocket consisted of a sheet-iron tube filled with gunpowder, tipped with an explosive shell, and mounted on a long wooden rod. These would be fired from racks or frames, and while somewhat unreliable and at times frighteningly inaccurate, they had the great advantage of being both powerful, terrifying, and far easier to transport and supply than the equivalent battery of cannon. Used in increasing numbers throughout the Napoleonic Wars, they would grow in size and capability into a truly deadly weapon.

    This brave rocketeer and his fiendish devices are ready to rain fire and terror on the foes of your British Black Powder force – if he can score a hit!

    This pack contains one Rocket Bombarding Frame with four crew, cast in metal.

    *Models supplied unassembled and unpainted*
- name: Black Powder Epic Battles Waterloo - Wellington's British Army Starter Set (Spanish language)
  sku: 311511001sp
