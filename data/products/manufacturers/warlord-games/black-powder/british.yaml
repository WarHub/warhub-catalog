  description: |-
    'Horse Artillery' was intended to fulfil a mobile fire support role on the battlefield, with lighter guns towed at best possible speed to where they were needed most. Seen as more dashing than the heavier field pieces, the British Royal Horse Artillery was frequently used to support infantry and cavalry moving forwards in the Crimean War.

    This gun, which can be assembled either as a 12pdr howitzer or 6pdr cannon, is perfect for representing these fast-moving gunners on the Black Powder tabletop.

