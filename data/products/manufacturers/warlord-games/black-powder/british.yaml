- name: 'Army Muster: Napoleonic British Line Infantry (Waterloo Campaign)'
  sku: 309911052
  productType: single_kit
  priceGbp: 86.50
  url: https://store.warlordgames.com/products/army-muster-napoleonic-british-line-infantry-waterloo-campaign
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/309911052_ArmyMusterNapoleonicBritishLineInfantryWaterloo01.jpg?v=1666008882
  status: current
  description: |-
    Army Muster is a method of collecting tailored to those all-important core units in our mass-battle historical wargames. An easy way to expand existing and new collections alike, each Army Muster bundle contains three copies of one of our boxed sets, plus a complementary product that will support your new soldiers nicely on the tabletop.

    **British Line Infantry (Waterloo):** With the return of the French tyrant Napoleon Bonaparte from his exile on the island of Elba, Britain and her allies of the 7th Alliance once again prepared to face the might of the French Army in what would be known as the Hundred Days Campaign.

    The rain-lashed weekend of 17th and 18th June 1815 saw the Allied forces end twenty years of continuous warfare – warfare that spanned the globe – in a series of violent and bloody battles at Quatre Bras, Ligny, Wavre and Waterloo.

    At the decisive battle of Waterloo, redcoated British foot regiments, supported by their massed artillery and the noble cavalrymen, battled the rain and the mud as well as the hated French. Their Prussian Allies struggled to join with them, only reaching the fields of Waterloo late on Sunday 18th June.

    Sir Arthur Wellesley, Duke of Wellington, rooted his Allied army to the ridge at Waterloo for over nine hours as Bonaparte’s French threw everything at them. The steadfast British veterans of the Peninsular campaign served their King and country well once more and with the Prussians taking to the field before nightfall, the day was won for the Allies and the brilliant Bonaparte’s reign of terror was finally ended.

    This Army Muster Bundle Contains enough miniatures to make a total of 72 Napoleonic British Line Infantry, including three sets of metal command (officer, drummer and two ensigns). Additionally, this Army Muster contains a free British Mounted Infantry Officer (with accompanying adjutant), which will ably lead your new brigade to victory on the tabletop.

    *Models supplied unassembled and unpainted*
