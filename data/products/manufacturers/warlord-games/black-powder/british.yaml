- name: Digital Into the Valley of Death (The Crimean War) Black Powder supplement
  sku: 309913810-PDF
  productType: single_kit
  priceGbp: 10.00
  url: https://store.warlordgames.com/products/digital-into-the-valley-of-death-the-crimean-war-black-powder-supplement
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/DigitalIntotheValleyofDeath_TheCrimeanWar_BlackPowdersupplement.png?v=1773319035
  status: current
  description: |-
    *Half a league, half a league,*

    *Half a league onward,*

    *All in the valley of Death,*

    *Rode the six hundred.*

    Immortalised in Tennyson’s poem, the charge of the Light Brigade is probably the only part of the Crimean War that remains in the popular imagination. Fought between Russia and an alliance of the Ottoman Empire, Britain, France and Sardinia, the allied campaign was fought mainly on the Crimean Peninsula. Hoping to prop up the ailing Ottoman Empire and to save it from an expansionist Russian Tsar, the allies aimed to take the Russian port of Sevastopol to prevent Russia controlling the Black Sea. The campaign saw more than just the blunder of the Light Brigade, with poor leadership and logistics standing in stark contrast to the bravery and endurance of the men who fought there.

    Written by Pete Brown, this supplement for the award-winning *Black Powder*, contains full details for each of the armies that fought in the Crimea, including organisational and uniform information as well as special rules for each of the larger-than-life generals who led them. Alongside this is a full account of the campaign with each of the battles and skirmishes included as scenarios for your wargames table, including the famous Light Brigade action at Balaklava. Will you honour the Light Brigade and save the noble six hundred?
