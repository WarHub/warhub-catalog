- name: Napoleonic French Young Guard Brigade (Advancing)
  category: miniatures
  packaging: box
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '309902002'
  priceGbp: 234.00
  url: https://store.warlordgames.com/products/napoleonic-french-young-guard-brigade-advancing
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/309902002_NapoleonicFrenchYoungGuardBrigade_Advancing_01.jpg?v=1726155759
  description: |-
    Lead the advance with these elite infantry for your French Black Powder force!

    The newest units of Napoleon’s legendary Imperial Guard to be raised were known as the ‘Young Guard’, and grew to comprise well over a dozen regiments, with the Tirailleur and Voltigeur infantry being particularly numerous. Receiving greater pay than ‘line’ troops as well as preferential treatment overall, they were in return expected to show extreme bravery and unshakeable loyalty to Napoleon in battle, fighting wherever the battle was thickest and often refusing to surrender.

    These brave men are ready to join your French Black Powder force, marching ahead to victory! This convenient bundle nets you a Brigade’s worth of Young Guard troops. You’ll receive four regiments each of 24 men \(including a command group of four in each\).

    *Models supplied unassembled and unpainted*
