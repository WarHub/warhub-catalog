  description: |-
    This collection arms you with one each of the new Black Powder American Civil War boxed sets, which can be used to represent both Union and Confederate troops, at a discount against purchasing separately, and also includes an exclusive infantry commander (not available elsewhere).

    When war broke out with the South, the small regular army of the Union was reduced further as many switched allegiance to the Confederacy. Mass conscription on a previously unknown level was incepted, forming a vast army that would eventually put down the southern rebellion.

    Wearing dark blue tunics, light blue trousers and armed with percussion rifles, the Union soldiers learnt how to manoeuvre and march great distances to take the war to the south. Early regiments were of mixed quality with few having drilled before, let alone seen active service of any note. By the war’s end they were a tough and efficient fighting body of men, a match for their adversary, ‘Johnny Reb’.

    Confederate regiments were tough, with many in their ranks used to privation and familiar with firearms. This was just as well, as compared to their northern foes in the Union they were frequently poorly equipped, fed and armed – much of their equipment was taken from Federal prisoners or privately purchased. The better maintained troops favoured the Enfield muzzle-loading rifles if available, but many types of rifles were used during the war, even old flintlocks in reserve units. Ragtag they may look, but southern troops had a spring in their step and were renowned for their quick and terrifying charges, many emitting the unearthly, ululating ‘Rebel Yell’ to unnerve their ‘blue belly’ opponents.

    By the time of the American Civil War, artillery had become a deadly arm on the field of battle, used in huge numbers by both Union and Confederate armies. Some pieces were still old-fashioned muzzle-loading smoothbores similar to those fielded to such great effect during the Napoleonic wars. However, many more were superbly accurate rifled pieces capable of propelling shrapnel shells to 2,000 yards and more. If hard-pressed, guns could use canister at deadly close range to sweep away attacking troops.

    Full Bundle Contents:

    - Infantry Regiment (Firing Line) - 24 Warlord resin figures (including command group), plastic bases, MDF Snake Fence scenery, cap badge decal sheet and full-colour flag sheets for both Union and Confederate troops.
    - Infantry Regiment (Advancing) - 24 Warlord resin figures (including command group), plastic bases, MDF Snake Fence scenery, cap badge decal sheet and full-colour flag sheets for both Union and Confederate troops.
    - Artillery battery - 3 Warlord Resin American Civil War guns with 4 crew each and a variety of gun barrel options (3x Union 12-pdr Napoleon, 1x Confederate 12-pdr Napoleon, 1x 12-pdr howitzer, 1x 10-pdr Parrott rifle, 3x 6-pdr Napoleon & 1x 3-inch ordnance), MDF Snake Fence scenery and cap badge decal sheet.
