  eanSource: shopify:merlinsminiatures.co.uk
  productType: single_kit
  priceGbp: 29.50
  url: https://store.warlordgames.com/products/american-civil-war-infantry-regiment-charging
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/302414001_ACWInfantryRegimentCharging01.jpg?v=1726764652
  status: current
  description: |-
    Fix bayonets and take the fight to the enemy with these charging American Civil War infantrymen!

    While the rifle-muskets used by the vast majority of troops in the American Civil War made combat possible at far greater ranges than ever before, military doctrine still dictated that the enemy should be fought up close and personal, with bayonet charges used at the decisive moment of an engagement to break an enemy regiment. Artillery and massed rifle fire would account for the majority of casualties in battle, but there are numerous accounts of both Union and Confederate infantrymen fighting hand-to-hand with rifle-butts and bayonets, and many daring charges would go down in history as exemplary moments of the Civil War.

    Usable for both Union and Confederate forces, these fantastically detailed Warlord Resin figures are perfect for anyone wanting to add a more aggressive element to their collection, and represent their troops getting properly stuck in!

    Box contains 24 Warlord resin figures (including command group), plastic bases, MDF Snake Fence scenery, cap badge decal sheet and full-colour flag sheets for both Union and Confederate troops.

    *Models supplied unassembled and unpainted*
- name: 'American Civil War: Zouaves Regiment'
  sku: 302414003
  ean: 5060572506176
  eanSource: shopify:merlinsminiatures.co.uk
  productType: single_kit
  priceGbp: 29.50
  url: https://store.warlordgames.com/products/american-civil-war-zouaves-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/302414003_ACWZouavesRegiment01.jpg?v=1726763284
  status: current
  description: |-
    March into battle with *style* with these dashing American Civil War Zouaves!

    At the time of the American Civil War, all things French were fashionable in military circles – in particular the dashing uniforms of their *Zouave* colonial light infantry! Clad in extravagant, flowing pantaloons, ornately decorated jackets, and a variety of jaunty headgear, over 70 regiments would be raised by the Union, with a smaller number in Confederate service. Often beginning as light skirmishing infantry, some would convert to regular line troops (frequently due to a lack of suitably fancy replacement uniforms), while others would remain as Zouaves throughout the war. Zouave regiments often saw themselves as something of an elite fighting force, and many units earned deserved reputations as fierce and determined fighters.

    No Black Powder American Civil War collection is complete without a unit or two of Zouaves, and these gorgeously detailed Warlord Resin figures are perfect for both Union and Confederate forces, adding a splash of colour and vibrancy to your battleline!

    Box contains 24 Warlord resin figures (including command group), plastic bases, MDF Snake Fence scenery, cap badge decal sheet and full-colour flag sheets for both Union and Confederate troops.

    *Models supplied unassembled and unpainted*
