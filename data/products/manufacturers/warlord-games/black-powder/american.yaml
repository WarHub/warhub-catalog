  description: |-
    This Battalion set arms you with a trio of the new Black Powder American Civil War Artillery Battery boxed sets, which can be used to represent both Union and Confederate troops, at a discount against purchasing separately, and also includes an exclusive infantry commander (not available separately).

    By the time of the American Civil War, artillery had become a deadly arm on the field of battle, used in huge numbers by both Union and Confederate armies. Some pieces were still old-fashioned muzzle-loading smoothbores similar to those fielded to such great effect during the Napoleonic wars. However, many more were superbly accurate rifled pieces capable of propelling shrapnel shells to 2,000 yards and more. If hard-pressed, guns could use canister at deadly close range to sweep away attacking troops.

    Full Bundle Contents:

    - Three artillery batteries - 9 Warlord Resin American Civil War guns with 4 crew each and a variety of gun barrel options (3x Union 12-pdr Napoleon, 1x Confederate 12-pdr Napoleon, 1x 12-pdr howitzer, 1x 10-pdr Parrott rifle, 3x 6-pdr Napoleon & 1x 3-inch ordnance), MDF Snake Fence scenery and cap badge decal sheets.
    - American Civil War Infantry Officer in Frock Coat (Design B)

    *Models supplied unassembled and unpainted*
- name: American Civil War Infantry Brigade (Firing Line)
  sku: 309914013
  productType: single_kit
  priceGbp: 84.00
  url: https://store.warlordgames.com/products/american-civil-war-infantry-brigade-firing-line
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/309914013_ACWInfantryBrigade_FiringLine_01.jpg?v=1707394852
  status: current
  description: |-
    With rifles levelled, these regiments are an intimidating sight on the battlefield, ready to unleash a devastating volley at close range. This collection arms you with a trio of the new Black Powder American Civil War Infantry Brigades (in firing line) boxed sets, at a discount against purchasing separately, and also includes an exclusive infantry commander (not available separately).

    In many civil wars in history, both sides were equipped in a very similar fashion with the colour of their uniforms and the flags they fought under being the identifying features. This was no different for the forces of the Union and the Confederacy in the American Civil War, and these miniatures, presenting their arms at firing line, are equally suited to be painted as either a Union or Confederate regiment.

    Wearing dark blue tunics, light blue trousers and armed with percussion rifles, the Union soldiers learnt how to manoeuvre and march great distances to take the war to the south. Early regiments were of mixed quality with few having drilled before, let alone seen active service of any note. By the war’s end they were a tough and efficient fighting body of men, a match for their adversary, ‘Johnny Reb’.

    Confederate regiments were tough, with many in their ranks used to privation and familiar with firearms. This was just as well, as compared to their northern foes in the Union they were frequently poorly equipped, fed and armed – much of their equipment was taken from Federal prisoners or privately purchased. The better maintained troops favoured the Enfield muzzle-loading rifles if available, but many types of rifles were used during the war, even old flintlocks in reserve units. Ragtag they may look, but southern troops had a spring in their step and were renowned for their quick and terrifying charges, many emitting the unearthly, ululating ‘Rebel Yell’ to unnerve their ‘blue belly’ opponents.

    Full Bundle Contents:

    - Infantry Regiment (Firing Line) - 72 Warlord resin figures (including three command groups), plastic bases, MDF Snake Fence scenery, cap badge decal sheets and full-colour flag sheets for both Union and Confederate troops.
    - American Civil War Infantry Officer in Frock Coat (Design B in metal)

    *Models supplied unassembled and unpainted*
