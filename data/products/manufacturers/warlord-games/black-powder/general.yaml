  description: |-
    Army Muster is a set of bundles tailored to those all-important core units in our mass-battle historical wargames. An easy way to expand existing and new collections alike, each Army Muster bundle contains three copies of one of our plastic boxed sets, plus a free complementary product that will support your new soldiers nicely on the tabletop.

    Napoleonic Portuguese Line Infantry: The Portuguese have never been fond of their Spanish neighbours. This was doubly so when in 1807 Napoleon sent a large French and Spanish army across the border to crush Portugal and take its fleet to continue their war against the detested British. Great Britain and Portugal, however, had been old allies for countless years, and before long a largely untried British general called Wellesley was sent from London to eject the French from Portuguese soil.

    The Portuguese troops were brave but unskilled, and outnumbered in the early days of the conflict. Reforms of the Portuguese army taken by Sir Lt.General William Beresford changed that, adopting British drill and tactics. The changes transformed the Portuguese into an effective fighting force.

    The allied army was carefully organised with units of both nations mixed into divisions giving, it a distinctive character and indeed spurring on each nation to outperform the other.

    The line infantry in their blue coats, and their light troops in brown, performed very well and soon had Marshall Soult back over the Pyrenees with the allied army in hot pursuit.

    Wellington, as Wellesley famously became, applauded his Portuguese troops calling them his ‘fighting cocks’, praise indeed from a man who knew a good soldier when he saw one. Less magnanimous was the popular name British soldiers used – ‘pork and beans’ – with good-humoured respect.

    This Army Muster Bundle Contains enough miniatures to make a whole brigade of Portuguese Line Infantry, comprising 72 miniatures. Additionally, this bundle contains a mounted officer for free, with which to lead your new brigade.

    *Models supplied unassembled and unpainted*
