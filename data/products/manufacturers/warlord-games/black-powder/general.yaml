  description: |-
    Army Muster is a set of bundles tailored to those all-important core units in our mass-battle historical wargames. An easy way to expand existing and new collections alike, each Army Muster bundle contains three copies of one of our plastic boxed sets, plus a free complementary product that will support your new soldiers nicely on the tabletop.

    Prussian Landwehr Infantry: The Landwehr were militia formed from teenagers through to men in their forties. They were plucked from their fields, shops and offices and enrolled into the Prussian military machine to enlarge the forces that could finally depose Napoleon, the Tyrant of Europe. Prussia was a small State but her armies were well-trained and burning to avenge their past defeats.

    The Landwehr consisted of over sixty battalions and were equipped and trained as time and money allowed. A cheap but warm coat, comfortable cap and a musket were considered uniform enough to get thousands of troops out into the field for the restricted Prussian army of the time.

    The Landwehr fought bravely in the later wars of the period, fighting hard in the 1813 campaigns and ultimately at the climax of the Hundred Days campaign that was Ligny and Waterloo.

    Ill-equipped and half-trained they may have been, but after a few months hard fighting they went on to fight with determination alongside their brothers in the Prussian Line regiments.

    This Army Muster Bundle Contains enough miniatures to make a whole brigade of Prussian Landwehr, comprising 78 miniatures, Additionally, this bundle contains a pair of mounted Landwehr officers with which to lead your new troops for free.

    *Models supplied unassembled and unpainted*
