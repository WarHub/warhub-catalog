    Hundred Days Book: Napoleon Bonaparte, the Corsican Tyrant, plunged Europe back into war once again by leading an emboldened French army against a resolute England and her allies. The Hundred Days campaign raged, witnessing numerous battles both before and after that decisive day at Waterloo.

    This supplement for Black Powder Epic Battles presents 18 new scenarios covering the entire breadth of the campaign. Alongside the new units, rules, ‘what if?’ scenarios, and commanders is a system to link all your games in a grand campaign that follows the events of the Hundred Days, one battle at a time. Finally, full orders of battle are presented for all the French, Prussian, English and Allied forces involved in the fighting.

    The entire panoply of the Hundred Days awaits within.

    **British Commanders:** When the upstart Napoleon marched to war once again, the Seventh Coalition of European powers quickly gathered to halt him. The cream of British and Allied commanders took to the field, led by ‘Old Nosey’ himself, Arthur Wellesley, 1st Duke of Wellington.

    **French Commanders:** Marching once again to glory, the Grande Armée of Imperial France is set on crushing its enemies in a decisive battle. Taking to the field once again are France's stalwart and loyal commanders, led by ‘Boney’ himself, Napoleon Bonaparte. ‘Vive L'Empereur!’

    **Prussian Commanders:** With Napoleon once again on the rise, the Prussians wasted no time in mustering against him, spoiling for a fight. The Army of the Lower Rhine marched across Europe to join the Allies, led by the fiery General Gebhard Leberecht von Blücher.

    **Casualties:** Volley after volley of musket fire sends withering hails of lead shot slamming into the ranked enemy, each dropping brave soldiers by the dozens. Through the cloying smoke and thunderous noise of battle, such mounting casualties can make even the bravest regiments waver. Get a total of 54 casualty markers, evenly distributed to represent each of the three armies.

    Bundle contains the following:

    - Black Powder Epic Battles: The Hundred Days Campaign Supplement
    - Black Powder Epic Battles: Napoleonic British & Allied Commanders
    - Black Powder Epic Battles: Napoleonic French Commanders
    - Black Powder Epic Battles: Waterloo - Prussian Commanders
