    Unlike the North, the general policy of the Confederacy was to send raw recruits to reinforce existing regiments in an effort to keep them at fighting strength. This also bestowed the recruits with the benefit of learning from more experienced fighters.

    This bundle provides enough models to field a complete Confederate Division, comprising nine regiments of one hundred men each, nine cannons & nine mounted commanders. As an added bonus, you’ll get some Warlord ResinTM casualty markers completely free; vital to track proceedings on the Black Powder Epic Battles tabletop.

