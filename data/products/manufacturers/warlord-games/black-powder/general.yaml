    In the mid 19th century, Russia fielded the largest army in Europe, drawing from a vast pool of peasant and serf conscripts. Renowned for their immense numbers, bravery, and fervent loyalty to the Tsar, the Russian conscript had poor training, outdated equipment, and weak leadership, relying heavily on bayonet charges due to poor marksmanship. Although often clad in drab greatcoats, in the summer months these were often not worn, and the stoic Russian soldiers marched to the front resplendent in their distinctive green and white uniforms.

