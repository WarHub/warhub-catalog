- name: Prussian Cavalry, I Corps, 1st Brigade, Von Treskow
  category: miniatures
  packaging: box
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  sku: '309911807'
  priceGbp: 126.00
  url: https://store.warlordgames.com/products/prussian-cavalry-i-corps-1st-brigade-von-treskow
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/309911807PrussianCavalry_ICorps_1stBrigade_VonTreskow2.jpg?v=1600959144
  description: |-
    Prussia was renowned for its excellent infantry under Frederick the Great. Less well known is the efficacy of Prussian cavalry on the European battlefield in the 19th Century. Early in the Napoleonic wars, Bonaparte himself warned his generals of the excellent Prussian cavalry.

    The well-trained and disciplined Prussian horse during the Hundred Days campaign formed regiments of cuirassiers, dragoons, hussars and lancers on the whole with the lighter cavalry intended for raiding and skirmishing, but in reality took their place in the main battle lines during set piece battles.

    Hussars were ever-present in the Napoleonic wars, with twelve splendidly dressed regiments, composing 38% of all the Prussian cavalry at Waterloo. Commanded by the venerable 'Marschall Vorwärts' – Field Marshal Blücher – they were a tough nut to crack...

    Prussian Hussar regiments during the Hundred Days varied in uniform. The miniatures shown here follow the traditional attire for Hussars, and are ideal for the majority of Hussars regiments during the campaign.

    The Uhlans, or lancers, of the Prussian army fulfilled the role of both skirmishing light cavalry and line shock troops alongside the dragoon and cuirassier units. Equipped with a lethal 9-foot lance, they were an imposing sight. It was the Uhlans who saved Marshall Blücher when unhorsed at Ligny.

    Late war Uhlans principally wore simple dark blue uniforms and practical equipment. By the Battle of Waterloo in 1815, all units had their lance pennants with black and white swallow tail pattern.

    The Dragoons, alongside the cuirassiers, were the heavy cavalry of the Prussian army. Their uniform was business-like – a distinctive blue Litewka long coat and grey overalls topped with a basic shako, frequently covered in an oilskin wrap. Armed with a curved sabre in an iron scabbard, dragoons were unusual among Prussian cavalry in the Hundred Days campaign in that they carried cavalry guidons into battles.

    Contents:

    - 2 x Dragoons
    - 1 x Hussars
    - 1 x Uhlans

    *Models supplied unassembled and unpainted*
