  description: |-
    The Russian Napoleonic army underwent massive organisational changes in 1805, and the revamping of the artillery arm was a vital part of this as it was considered the most important branch of the Russian army at the time. Count ArakcheyevǃÙs reforms had led to a standardisation of gun types so the army could rely upon a uniform selection of 6-pounder and 12-pounder guns and the 10-pounder and 20-pounder Licornes. In conjunction with the Karbanov gun sight \(the most advanced of its time\) Russian artillery was a match for any enemy.

    The Licorne \(or Unicorn in English\) was a different breed of gun to its French howitzer counterpart. It was a uniquely Russian design, being a hybrid howitzer with a long barrel and chambering that allowed a flatter trajectory and improved range and accuracy. They came as quite a nasty surprise for NapoleonǃÙs veterans.

