- name: Konflikt '47 United States Starter Army
  category: miniatures
  packaging: box
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5060917996259'
  eanSource: shopify:www.mightylancergames.co.uk
  sku: '452010405'
  priceGbp: 110.00
  url: https://store.warlordgames.com/products/konflikt-47-united-states-starter-army
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452010405_Konflikt47UnitedStatesstarterarmy01_86613099-ee1d-4383-9921-3cff235d9625.jpg?v=1752073526
  description: |-
    Drop into combat with the US Army!

    This starter army is the perfect way to begin your *Konflikt '47* United States collection, giving you a battle-ready force packed with the latest technology in one box. It’s also the first place you can get your hands on two brand new war machines, before they go on individual sale later.

    This fast-moving force is centred around an **Assault Platoon**, comprising two six-man Firefly squads. These ultra-mobile jump troops are capable of getting up close and personal with the enemy, delivering a short-range punch with their powerful weaponry, and getting out again, before they can be pinned down. Supporting them is the **Armoured Platoon**, with a pair of powerful M2A5 Linebacker walkers descending from the skies to bring a whole host of heavy firepower to bear where it’s needed most. On the ground, an M5 Stuart light tank mounts a crackling Light Tesla Cannon, sending devastating arcs of electrical energy crackling across the battlefield to fry infantry and vehicles with equal ease.

    Leading the entire force is an exclusive **Platoon Commander**, available only in this box. This veteran Firefly is equipped with the same repulsorlift pack and M1X Thompson as his men, allowing him to lead from the front and employ his special abilities wherever necessary.

    *Konflikt '47* is the game of heroes, horrors, monsters, and mechs, putting you in command of the nightmarish struggle for supremacy as the old world is torn apart and remade in blood and crackling energy. Fast-paced, lethal gameplay provides countless cinematic moments, with fluctuating Rift energies and the ever-present fog of war ensuring that no two games are ever the same, and the outcome is never guaranteed. Heroes and villains on each side lend their unique abilities to turn the tide of battle, as mechs and monsters face off in brutal contests of flesh versus steel.

    This is not war. This is the end.

    The United States Starter Army contains:

    - 1 Warlord Resin United States Platoon Commander \(Exclusive to this set\)
    - 12 plastic Firefly Airborne Infantry
    - 2 plastic M2A5 Linebacker Jump Walkers
    - 1 plastic M5 Stuart with resin upgrade kit
    - *6 Konflikt ’47* olive Order Dice
    - *6 Konflikt ’47* green Rift Dice
    - Waterslide transfer sheet

    *Miniatures sculpted by Jon Heeney & Marco Sano.*

    *Studio Miniatures painted by Kirsten Williams & Darek Wyrozebski.*

    *Models supplied unassembled and unpainted.*
- name: Linebacker Jump Walker
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5060917995368'
  eanSource: shopify:www.mightylancergames.co.uk
  sku: '452010403'
  priceGbp: 39.00
  url: https://store.warlordgames.com/products/linebacker-jump-walker
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452010403_LinebackerJumpWalker01.jpg?v=1758885222
  description: |-
    Bring death from above and support the US Fireflies with the heavily armed Linebacker Jump Walker!

    Following the disastrous drop assault on Collegno in 1946, the limitations of the original M2 Mudskipper series became clear. While a perfectly satisfactory design, the Firefly jump infantry were in need of more versatile fire support when they dropped into combat. American designers developed an extensive series of refits for the Mudskipper to increase its tactical flexibility. An M21 Tesla cannon and innovative new universal mounts for secondary weapons enabled the walker to be quickly configured to face a wide variety of threats, more articulated legs and feet were much more resilient to the pressures of high-impact landings, and a new control system enabled it to be piloted by a single crewman without loss of utility. The new variant was dubbed the M2A5, and officially considered a continuation of the Mudskipper line rather than a distinct vehicle, but crews and Firefly troopers alike quickly dubbed it the ‘Linebacker’. The combat debut of the new model came in May 1947 when 200 Linebackers were rushed to the front line to help breach Axis lines during the siege of Stuttgart during Operation Valentine.

    This highly detailed, multi-part plastic kit allows you to assemble a Linebacker armed with its signature M21 Light Tesla Cannon on one arm, and any from a variety of options on the other, Twin HMGs, Twin Automatic Cannons, or Twin Super Bazookas. It also mounts an MMG in the “nose”, which can be substituted for a flamethrower. The model comes with a clear plastic canopy \(which can be assembled hinged\), allowing you to see the pilot nestled inside.

    In games of *Konflikt ’47*, a Linebacker is a formidable weapon, capable of darting around the battlefield thanks to its jump mechanic, or even deploying anywhere on the table from Reserve to bring its firepower to where you need it most. Coupling this mobility with its Light Tesla Cannon means you can exhaust a Rift Die and unleash a deadly Tesla Arc.

    *Model sculpted by Jon Heeney and Marco Sano. Studio Models painted by Darek Wyrozebski.*

    *Models supplied unassembled and unpainted*
