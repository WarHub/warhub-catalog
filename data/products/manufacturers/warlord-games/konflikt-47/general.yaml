  description: |-
    Drop into hell on Earth - and come out the other side!

    American advancements in repulsorlift Rift-tech have allowed a man to soar through the air in great bounds, or drop from an aircraft and control his descent safely. Using this technology, US Airborne paratroopers have been reborn as the Fireflies! These elite troops are used where surgical precision and lightning speed are called for, dropping behind enemy lines or as the vanguard of American assaults. Only the bravest and fittest men pass Firefly training, and their missions are some of the most hazardous imaginable.

    This plastic boxed set gives you 18 multi-part US Fireflies, equipped with a range of weapons including M1X Thompson Rift SMGs, lethal flamethrowers, and anti-tank rocket launchers. Packed with extra components, including alternate heads, extra equipment, and a choice of flying or ‘grounded’ legs, this kit offers incredible poseability and almost endless modelling options. The detail on these models is staggering, allowing you to go all-out with your painting and create a unit that looks truly impressive on the tabletop.

    On the *Konflikt '47* tabletop, Fireflies are some of the best Specialist Infantry available to an American player. With superb tactical mobility, courtesy of their **Regroup in Hell!** Rift ability, and armed with their signature M1X Thompsons, they can get in, hit hard, and get out again. Just make sure to keep these unarmoured troops away from anti-infantry weapons!

