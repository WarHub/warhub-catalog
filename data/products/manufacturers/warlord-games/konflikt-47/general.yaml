- name: Konflikt '47 Roberta Wells - Firefly Hero
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5060917998024'
  eanSource: shopify:goblingaming.co.uk
  sku: '453210402'
  priceGbp: 10.00
  url: https://store.warlordgames.com/products/konflikt-47-roberta-wells-firefly-hero
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/453210402_RobertaWells-FireflyHero01.jpg?v=1769775213
  description: |-
    A graduate in physics, the emergence of the Los Alamos Rift at the Trinity test site led to Roberta dedicating herself to the study of Rift Energy. The deployment of Axis Rift horrors, in particular the dread *Totenkorps*, in late 1944, led to her volunteering to ship out to the European theatre to conduct studies of the application of Rift-tech in warfare. Despite numerous objections from the US Army, her request was eventually granted.

    Her no-nonsense approach, resilience to the psychological horrors of the Rift War, and willingness to get stuck in marked her out amongst the raft of scientific advisors seconded to the front. Exhibiting a fierce independence, Roberta would often strike out separately from the squad to which she was attached, lest they constrain her in the pursuit of her studies. Nevertheless, she gradually earned the respect of the US Army soldiers entrusted with her safety in the field, having displayed a remarkable aptitude for combat situations.

    Roberta is considered the United States’ best hope in assessing the Dresden Rift in the goal of safely controlling or neutralising it, and has returned to the front line in 1947, attached to 109th Airborne Division bound for Dresden. As a high value asset, she has been granted the use of prototype armour designed specifically for use with the Firefly jump pack. Of course she has already begun to make her own modifications…

    Box contains one Warlord Resin miniature, with plastic base.

    *Miniature sculpted by Marco Sano. Studio miniatures painted by Kirsten Williams.*

    *Models supplied unassembled and unpainted*
