- name: Heuschrecke (Locust) Medium Panzermech
  sku: 452600202
  ean: 5060917996235
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 41.50
  url: https://store.warlordgames.com/products/heuschrecke-locust-medium-panzermech
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452600202_Heuschrecke_Locust_mediumpanzermech01_952bc6b9-9a33-4c08-bb81-fe620ea7aece.jpg?v=1758899803
  status: current
  description: |-
    The potency of Axis walkers dominated battlefields in a most satisfactory fashion until the Allies could bring their own walkers into service. Once they did so, however, the rough handling being meted out at close quarters by highly mobile bipedal walkers prompted a re-examination of Axis walker design philosophy. The most promising prototype - the Heuschrecke ('Locust'), clearly inspired by captured examples of the United States Mudskipper - was selected for further trials. The Pz.Kpfg. VII features a so-far unique variant of Axis gravitic technology that allows it to leap like its namesake. This added mobility combined with a bipedal frame has made it a powerful supporting vehicle for Falke and Nachtjäger squads.

    With multiple armament options, the Heuschrecke can be tailored to a number of battlefield roles. For instance, the Light Rocket System makes it a potent enemy infantry hunter, or it could instead be armed with a medium anti-tank gun; this coupled with the manoeuverability afforded it by its Jump capability should give any enemy armour pause for thought. Its MMGs can also be upgraded with Light Automatic Cannons, capable weapons even against the latest Rift-tech power armour and genetic experiments.

    Contains one resin and metal Heuschrecke with options for Light Rocket System or medium anti-tank gun and two MMGs that can be replaced with Light Automatic Cannons.

    *Models supplied unassembled and unpainted*
