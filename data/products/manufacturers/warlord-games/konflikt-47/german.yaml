- name: Stahltruppen Heavy Infantry
  sku: 452010202
  ean: 5060917995351
  eanSource: shopify:dicesaloon.co.uk
  productType: single_kit
  priceGbp: 37.00
  url: https://store.warlordgames.com/products/stahltruppen-heavy-infantry
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452010202_StahltruppenHeavyInfantry01.jpg?v=1751556066
  status: current
  description: |-
    Grind the enemies of the Axis under your armoured boots!

    Intended to spearhead assaults on the most heavily fortified strongpoints, and clad in armour the equal of many earlier tanks, the *Stahltruppen* are the cream of the Axis infantry. Rift-led advances in metallurgy and servo-motors have enabled the creation of enormously powerful armoured suits, capable of hefting heavy weaponry with ease. *Stahltruppen* think nothing of walking headlong into storms of machine-gun fire, shredding enemy infantry in a hail of automatic fire, and opening breaches for follow-up troops. Only veterans of the highest standing become *Stahltruppen*, and they rightly consider themselves the elite among Axis forces.

    This plastic boxed set gives you 9 multi-part Axis *Stahltruppen* heavy infantry, equipped with weapons such as the StG 44Z assault rifle, MG 42 light machine gun, and Panzerbüchse 41 anti-tank gun - a hand-held weapon to these behemoths! The kit is packed with extra components, including variant heads, wicked tri-edged daggers, and a choice of five leg poses per sprue for even greater customisability. With so much detail on the models, they’re a great opportunity to show off your painting and modelling skills, and their sheer bulk makes them a great centrepiece for any Axis force.

    On the *Konflikt '47* tabletop, *Stahltruppen* are the heaviest Specialist Infantry yet available to Axis players. Capable of shrugging off small arms fire as they advance across the table, and festooned with automatic weaponry, they spell death for any enemy infantry foolish enough to get in their way. Their **Vormarsch!** Rift ability ensures that, when the decisive moment comes, they will keep advancing - no matter how heavy the incoming fire might be!

    *Miniatures sculpted by Wojtek Flis. Studio Miniatures painted by Kirsten Williams.*

    *Models supplied unassembled and unpainted.*
- name: Konflikt '47 Axis Starter Army
  sku: 452010203
  ean: 5060917996198
  eanSource: shopify:www.mightylancergames.co.uk
  productType: box_set
  priceGbp: 110.00
  url: https://store.warlordgames.com/products/konflikt-47-axis-starter-army
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452010203_Konflikt47Axisstarterarmy_01.jpg?v=1751625392
  status: current
  description: |-
    March to war under the banner of the Axis!

    With the downfall of the Third Reich and the sudden rise of the shadowy Green Vault, Axis forces have consolidated into a single monolithic entity. Although the true ambitions of their leaders are shrouded in secrecy and misdirection, for the average Axis soldier, the goal is simple - survive, and throw back the enemies who press in from all sides!

    This starter army is the perfect way to begin your *Konflikt '47* Axis collection, giving you a battle-ready force packed with the latest technology in one box. It’s also the first place you can get your hands on two brand new war machines, before they go on individual sale later.

    At the core of this hard-hitting force is the **Assault Platoon**, composed of a three-man *Stahltruppen* squad and five *Nachtalben*. The *Stahltruppen* are incredibly tough, and all but invulnerable to small arms fire - send them forwards and get stuck in - while the *Nachtalben* are fast-moving horrors, combining the intelligence of an elite soldier with a monstrous genetically modified body.

    Backing them up is an **Armoured Platoon**, with a scuttling *Vogelspinne* light walker ranging ahead of the line. This fast, versatile walker can be equipped with a wide variety of weaponry to fulfill different missions, and makes up for its light armour with serious mobility. Alongside it strides a Panzer IV Ausf. X. Marrying the proven Panzer IV chassis to six powerful legs and a *Schwerefeld* gravitational projector, this walking tank can crush enemy infantry and vehicles alike - literally - both at range and up close.

    Leading the entire force is an exclusive **Platoon Commander**, available only in this box. Clad in the same massive armour as the *Stahltruppen*, this officer’s abilities can turn the tide of battle, and he’s no slouch in hand-to-hand fighting either!

    *Konflikt '47* is the game of heroes, horrors, monsters, and mechs, putting you in command of the nightmarish struggle for supremacy as the old world is torn apart and remade in blood and crackling energy. Fast-paced, lethal gameplay provides countless cinematic moments, with fluctuating Rift energies and the ever-present fog of war ensuring that no two games are ever the same, and the outcome is never guaranteed. Heroes and villains on each side lend their unique abilities to turn the tide of battle, as mechs and monsters face off in brutal contests of flesh versus steel.

    This is not war. This is the end.

    The Axis Starter Army contains:

    - 1 Warlord Resin Axis Platoon Commander (Exclusive to this set)
    - 3 plastic *Stahltruppen*
    - 5 Warlord Resin *Nachtalben*
    - 1 plastic *Vogelspinne Light Panzermech*
    - 1 plastic Panzer IV with resin upgrade kit
    - 5 *Konflikt ’47* grey Order Dice
    - 5 *Konflikt ’47* grey Rift Dice
    - Waterslide transfer sheet
    - Assembly guides

    *Miniatures sculpted by Steven Clark, Wojtek Flis, Jon Heeney, & Marco Sano.*

    *Studio Miniatures painted by Kirsten Williams & Darek Wyrozebski.*

    *Models supplied unassembled and unpainted.*
- name: Konflikt '47 Starter Set
