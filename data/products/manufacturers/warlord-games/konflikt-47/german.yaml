    - Waterslide transfer sheet
    - Plastic *Konflikt ‘47* ruins (4 plastic frames)
    - 1 A5 softback *Konflikt ‘47* Rulebook
    - 4 olive drab & 4 grey with black *Konflikt ‘47* Order Dice
    - 4 green & 4 grey *Konflikt ‘47* Rift Dice
    - Plain dice bag
    - 10 six-sided dice
    - Double-sided paper gaming mat
    - Plastic pin markers and templates sprue
    - Assembly guides

