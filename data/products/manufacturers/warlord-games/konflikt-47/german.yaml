  status: current
  description: |-
    Improvements in Rift-tech power sources have enabled the scientific minds in Dresden to gradually reduce the size of the earliest Rift-tech weaponry. One such system is the Towed Schwerefeld Projektor, the placing of a projector weapon system onto a towed artillery mount with a separate power unit also towed by the same vehicle.

    Entrusted to, and crewed by, the new elite Heavy Armoured Infantry, it has replaced some PaK 40 guns in many Heavy Infantry units as it is lighter and easier to manoeuvre.

    *Models supplied unassembled and unpainted*
- name: Italian Falco Paratroopers
  sku: 452211604
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/italian-falco-paratroopers
