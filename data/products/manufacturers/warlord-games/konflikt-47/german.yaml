    The Wotan panzermech was built to operate as a tank hunter in difficult terrain or to assist the Thor panzermechs in reaching their urban targets. Unsuited to the urban role, once the Thors were delivered to the target, the Wotan often protected the flanks of an assault, preventing enemy armour from cutting off the attacking forces’ lines of supply.

