- name: German Towed Schwerefeld Projektor
  sku: 452410208
  ean: 5060572500792
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 34.50
  url: https://store.warlordgames.com/products/german-towed-schwerefeld-projektor
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/452410208-German-Towed-Schwerefeld-Projektor-01.jpg?v=1662377484
  status: current
  description: |-
    As Dresden’s Rift technology scientists looked to enhance the weaponry they were creating they trialed a towed Schwerefeld Projektor to look at its suitability in infantry formations.

    Although it required a small generator trailer to make it independent of a larger powerpack or vehicle, the weapon was well received.

    It has since been issued to several new heavy infantry regiments, replacing the older and heavier PaK 40 anti-tank guns. Entrusted to, and crewed by, the new elite Heavy Armoured Infantry, it has replaced some PaK 40 guns in many units as it is lighter, more compact and easier to manoeuvre.

    *Models supplied unassembled and unpainted*
- name: Italian Centurion Heavy Infantry Squad
  sku: 452211602
  ean: 5060572500662
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/italian-centurion-heavy-infantry-squad
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/452211602-Italian-Centurion-Heavy-Infantry-Squad-01.jpg?v=1662377498
  status: current
  description: |-
    In response to the Allied landings on the Italian soil, in September 1943, Mussolini was arrested and his government overthrown by Royalist forces loyal to King Victor Emmanuel III. Italy immediately sought an armistice with the Allies which was agreed in that same month. This led to a short period of confusion within the Italian armed forces with differing elements receiving contradictory briefings and orders that led to the Army in particular splintering into several factions.

    With the country now divided and recognising their deficiencies in heavy armoured vehicles, the RSI and Kingdom of Italy have chosen divergent paths for the reconstruction of their armies. In the north, the fascist National Republican Army (Esercito Nazionale Repubblicano or ENR) have concentrated their mechanised forces into flying reinforcement columns, being designed to block any Allied breach in the defensive Gustav line. In the south, the Co-belligerent Italian Army (Esercito Cobelligerante Italiano or ECI) is forming more conventional armoured forces, utilising the Allied willingness to provided US and British tanks and walkers.

    On both sides of the imposing Gustav Line, the more elite Italian formations are built around newly acquired Rift-tech equipment such as heavy armour and jump infantry.

    Whilst the most fanatical soldiers within the National Republican Army (ENR) often find their way to the Legio Aquilla, many loyal soldiers choose a path into the Centurion Heavy Infantry battalions. The armour itself is more ornate than its German predecessor, with imagery reminiscent of ancient Rome. It is perhaps overly ornate for frontline combat, but it increases the protection afforded to its wearer through the addition of a ballistic shield.

    Unlike the German version, the assault rifle is fixed into the arm of the wearer, harder to reload, but easier to use with the ballistic shield. Nevertheless, the toughness and resilience of the Centurion suits are at the pinnacle of any nation’s Rift tech capability and presents a stiff obstacle for any Allied assault.

    *Contains: 9 ENR men in heavy armour*

    *Models supplied unassembled and unpainted*
- name: Sd.Kfz 234/X Puma
  sku: 452410207
  ean: 5060572500266
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 38.00
  url: https://store.warlordgames.com/products/sd-kfz-234-x-puma
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/452410207-German-Sd.Kfz-234-X-Puma-01.jpg?v=1662377787
  status: current
  description: |-
    The highly advanced SdKfz 234 series of armoured cars are an obvious platform on which to place the latest advances from the German Rift-tech workshops in Dresden. As refinements to the schwerefeld projektor continue to be made, its use on a variety of platforms is a natural result.

    **The box contains:**

    - 1 plastic, resin & metal German Sd.Kfz 234/X Puma suitable for Konflikt ‘47 German Army.
    - A full-colour waterslide decal sheet.
    - A detailed and thorough construction leaflet.

    The Puma chassis is capable of mounting heavier weapons than its recce role requires, so the addition of a lighter version of the Schwerefeld projector presents both doctrinal challenges and huge tactical advantages.

    The combination of Rift technology on a well armoured, manoeuvrable and fast vehicle creates an effective tank hunter, certainly more than a match for its Allied and Soviet armoured car and light tank counterparts.

    *Models supplied unassembled and unpainted*
- name: Panther-X
  sku: 452410209
  productType: single_kit
  priceGbp: 38.00
  url: https://store.warlordgames.com/products/panther-x
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/452410209-German-Panther-X-01.jpg?v=1662377784
  status: current
  description: |-
    Recognised as highly versatile by the senior officers that appraised its early performance, the Schwerefeld Projektor had a reasonable anti-tank capability, a higher rate of fire than a traditional gun and a latent gravity field that restricted free movement. However, it was a weapon that required further enhancements.

    Having proved itself on the older Panzer IV chassis, it was decided to place a Projektor on the much more capable Panther chassis, where it would benefit from enhanced mobility and protection. In addition, the Projektor was upgraded with better shielding for the crew and smaller power conduits connecting it to the powerpack in the hull.

    The result was the Panther-X turret that allowed the vehicle commander better visibility and a coaxial machine gun without sacrificing the Panther’s impressive armour.

    **Contains:**

    - 1 plastic Panther Tank
    - 1 Resin turret

    *Models supplied unassembled and unpainted*
