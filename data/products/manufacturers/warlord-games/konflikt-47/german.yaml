  status: current
  description: |-
    It is 1947. Humanity has breached the barrier between realities, using Rifts to create previously impossible technologies. Driven by this esoteric knowledge and Rift energy, a new era of both science and superstition has engulfed humankind. The fires of World War II rage as brightly as ever. Nations bloodied and scarred by years of fighting launch fresh offensives and counterattacks. Weapons of unprecedented destruction and beings of unnatural origin dominate countless battles across land, air, and sea.

    In this horrifying new world, the only victory lies in survival.

    *Konflikt '47* is the game of heroes, horrors, monsters, and mechs, putting you in command of the nightmarish struggle for supremacy as the old world is torn apart and remade in blood and crackling energy. Fast-paced, action-packed gameplay provides countless cinematic moments, with fluctuating Rift energies and the ever-present fog of war ensuring that no two games are ever the same, and the outcome is never guaranteed. Heroes and villains on each side lend their unique abilities to turn the tide of battle, as mechs and monsters face off in brutal contests of flesh versus steel.

    This is not war. This is the end.

    This starter set contains everything you need to start playing *Konflikt '47* - rulebook, models, dice, scenery, and more. Elite United States Firefly jump infantry, supported by the armoured punch of a Linebacker walker, drop from the skies into combat against hulking Axis *Stahltruppen* heavy infantry and a scuttling *Vogelspinne* light mech - the perfect introduction to the lethal battlefields of *Konflikt '47* and the foundation of a pair of powerful forces. In addition, each force is led by a powerful hero figure, unique to this set!

    The *Konflikt ’47* Starter Set contains:

    - The following Axis miniatures:
     - 1 Warlord Resin Axis Platoon Commander (Exclusive to this set)
