- name: Totenrotte Starter Army
  sku: 452610009
  ean: 5060917998352
  eanSource: shopify:entoyment.co.uk
  productType: box_set
  priceGbp: 110.00
  url: https://store.warlordgames.com/products/totenrotte-starter-army
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452610009_TotenrotteStarterArmy01.jpg?v=1769710952
  status: current
  description: |-
    A *Totenrotte* is an Axis military formation comprised of the walking dead. Initially the *Totenrotten* had the simple directive of deploying *Totenkorps* amongst enemy lines, sowing physical and psychological chaos amongst the enemy throughout Europe.

    However, with newly emergent technology originating from the minds of Axis scientists, led by the research of Albrecht von Zögling, which replicates the effects of the Dresden Rift on the newly dead, the operations of the *Totenrotten* have greatly expanded in a sinister new direction – recruitment. The *Totenrotten* now incorporate the Sd.Kfz. 501/1 *Nachtzehrer*, armoured walkers which can apply von Zögling’s serum on the battlefield itself, and immediately redeploy the newly dead against their former comrades in arms.

    This starter army contains the following:

    - 1x Totenrotte Platoon Commander with Bodyguards (3 Warlord Resin Miniatures)
    - 45x plastic Totenkorps miniatures
    - 2x Sd.Kfz. 501/1 Nachtzehrer (can also be assembled as Sd.Kfz 501/4 Infernospinne)
    - MDF and Plastic Bases
    - Assembly guides
    - 8 x Grey Rift Dice
    - 8 x Grey Order dice with black engravings

    *Miniatures sculpted by Marco Sano and Jon Heeney. Studio Miniatures painted by Kirsten Williams and Darek Wyrozebski.*

    *Models supplied unassembled and unpainted*
- name: Konflikt '47 Sd.Kfz. 501/1 Nachtzehrer
  sku: 452010205
  ean: 5060917997966
  eanSource: shopify:entoyment.co.uk
  productType: single_kit
  priceGbp: 28.00
  url: https://store.warlordgames.com/products/konflikt-47-sd-kfz-501-1-nachtzehrer
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452010205_SdKfz501_1Nachtzehrer01.jpg?v=1769709919
  status: current
  description: |-
    The development of a new serum solution by the enigmatic *Oberstarzt* Albrecht von Zögling, also required the development of a machine to effectively distribute it amongst the freshly dead.

    The ultimate design, dubbed the *Nachtzehrer* (named after the creatures of folklore; revenants said to drag the living to the realm of death), is reminiscent of a hermit crab; it consists of a small crew compartment within which scientists can operate external instruments without exposure, married to an armoured, temperature-controlled canister which houses the highly volatile serum. Large, bladelike forearms inject the serum directly into subject corpses with abject efficiency, and are themselves equally capable of striking down the living, to immediately convert into the walking dead.

    This plastic kit also allows you to make the Sd.Kfz.501/4 Infernospinne, which trades the serum housed in its cannister for napalm, and its medical implements for powerful flamethrowers, more potent than its *Flammenspinne* cousin, though slightly les nimble and somewhat more volatile.

    Box contains one plastic Sd.Kfz. 501/1 Nachtzehrer, Vehicle decal sheet, MDF base, and assembly guide.

    *Miniatures sculpted by Jon Heeney. Studio Miniatures painted by Darek Wyrozebski.*

    *Models supplied unassembled and unpainted*
- name: Konflikt '47 Totenkorps Horde
  sku: 452010204
  ean: 5060917997959
  eanSource: shopify:entoyment.co.uk
  productType: single_kit
  priceGbp: 37.00
  url: https://store.warlordgames.com/products/konflikt-47-totenkorps-horde
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452010204_TotenkorpsHorde01.jpg?v=1769709486
  status: current
  description: |-
    The *Totenkorps* were the first examples of Rift-derived forces encountered by the Allies and Soviets. Immune to pain and fear, they swamp their foes through sheer relentlessness and inhuman resilience. As such the *Totenkorps* are mostly employed as terror troops, soaking up enemy fire before closing and engaging in brutal close quarters combat. Even defeated *Totenkorps* can rise again, potentially many times, before being finally laid to rest. Their decayed forms invariably spread fear on the battlefield, making them a profound threat to even the most hardened enemy combatants.

    The initial *Totenkorps* originated from the dead caught in the vicinity of the opening of the Dresden Rift. In the years since, enigmatic Axis scientist Albrecht von Zögling has perfected a process to replicate the effects on the freshly deceased, and developed the Sd.Kfz. *Nachtzehrer*, a terrifying machine that can apply his serum to the dead of the enemy on the battlefield itself, so that be immediately employed against their erstwhile allies.

    The plastic *Totenkorps* sprue features reanimated soldiers in varying types of uniform taken from the dead of both the Axis and the United States, including a US Firefly and an Axis *Schwertruppen*!

    Box contains enough parts to make 30 plastic Totenkorps, plastic bases, and assembly guide.

    *Miniatures sculpted by Marco Sano. Studio miniatures painted by Kirsten Williams.*

    *Models supplied unassembled and unpainted*
