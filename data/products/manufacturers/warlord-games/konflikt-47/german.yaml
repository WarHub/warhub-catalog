    **Legio Aquila in Konflikt'47**

    Styled after the ancient Romans, the Legio Aquila combines patriotic fervour, dogged resilience, and aggressive tactics to achieve its goals. Led by experienced NCOs and officers, the effectiveness of the Legion is only hampered by its small size and limited mobility.

