- name: Konflikt '47 Introductory Set
  sku: 452610008
  ean: 5060917996433
  eanSource: shopify:www.mightylancergames.co.uk
  productType: single_kit
  priceGbp: 42.50
  url: https://store.warlordgames.com/products/konflikt-47-introductory-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/453010201_Konflikt47IntroductorySet01_18df4548-f6d3-44b7-a837-ad6b4442fc84.jpg?v=1761585330
  status: current
  description: |-
    This is not war. This is the end.

    *Konflikt '47* is the tabletop wargame of heroes, horrors, monsters, and mechs – set in an alternate universe in which WWII never ended, and terrifying new weapons of war are unleashed on the battlefield. This Introductory Set is a perfect way to leap into the world of *Konflikt ’47* for the very first time, regardless of if you are new to wargaming, or are the veteran of many a tabletop battlefield!

    Within this box are finely detailed, multi-part plastic miniatures, twelve jump-pack equipped United States Fireflies squaring off against six imposing Axis Stahltruppen. The Field Manual within walks you step-by-step through building and painting these finely detailed plastic miniatures and through playing your first games. With straightforward, easy-to-follow instructions, you'll quickly learn the basics of *Konflikt '47* and be ready to lead your troops to victory over and over again! It also includes dice, cardboard tokens and walkers, plastic terrain, and a battle mat upon which to play!

    The Konflikt ’47 Starter Set contains:

    - Full colour, 68-page book - The Konflikt ’47 Field Manual
    - 12 Plastic United States Fireflies
    - 6 Plastic Axis Stahltruppen
    - Plastic Ruined Buildings Scenery
    - Game Token Punchboard
    - Double-sided Gaming Mat (30” x 22.4” approx.)
    - Eight Order Dice (4 Green / 4 Grey)
    - Six Rift Dice (3 Green / 3 Grey)
    - Ten six-sided dice
    - Dice Bag
    - Cardboard Insert that doubles as an in-game Bunker

    *Models supplied unassembled and unpainted*
