    When you order this book, you’ll also receive the exclusive ‘Operation Touchdown’ special miniature, representing United States Hero, Roberta ‘Einstein’ Wells, making landfall in Germany in her experimental Firefly powered armour!

    *Miniature sculpted by Marco Sano. Studio Miniature painted by Kirsten Williams.*

