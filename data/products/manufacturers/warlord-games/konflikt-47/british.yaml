    Once the United States Armed forces had received the M8 Grizzly medium walker in sufficient numbers, excess production was diverted to the Commonwealth under the lend-lease scheme. By this time, research into equipping Commonwealth vehicles, including walkers, with automated assistance systems was well underway. Rather than being pressed into service, the entire shipment was diverted to Bovington for study. The Commonwealth had become nervous that relying entirely on the US to provide walkers left it too dependent on a foreign supplier, particularly with the growing cracks in the two nations' relationship. It was therefore urgent for the Commonwealth to be able to design and build its own examples. The result was the Percival, a distinct design from the Grizzly, owing to the need to incorporate the latest automated systems and a sufficient power plant for the Commonwealth’s new iteration of the Tesla cannon.

