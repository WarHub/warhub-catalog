- name: British Commonwealth starter army
  category: miniatures
  packaging: box
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5060917996464'
  eanSource: shopify:www.mightylancergames.co.uk
  sku: '452600603'
  priceGbp: 110.00
  url: https://store.warlordgames.com/products/british-commonwealth-starter-army
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/452600603_BritishCommonwealthstarterarmy01.jpg?v=1758886650
  description: |-
    Defend the Commonwealth!

    The opening of the Rifts has inured the people of Britain and its many overseas territories to new hardships of war. Enduring, British resolve is now at an all time high, and they stand ready to unleash their own new weapons of war upon the dread force of the Axis and the Empire of Japan.

    This starter army is the perfect way to begin a British Commonwealth collection for *Konflikt ’47*, arming you with a battle-ready force complete with Order and Rift Dice.

    Central to this force is an **Assault Platoon** comprised of two squads of Automated Infantry, a Mk I squad laying down a heavy weight of fire thanks to their MMGs, supported and uplifted by their heavy Mk II cousins, whose mere presence nearby improves their accuracy. Both units are immune to the psychological horrors of war and are implacable in the face of defeat. They are well supported by a power-armoured squad of human Galahad infantry. A **Platoon Commander**, exclusive to this set, leads this platoon from the front, armed with a personal Tesla Rifle.

    Backing them up is an **Armoured Platoon**, headed up by the new Percival Assault Walker. Packing an M17 Tesla Cannon and a Rocket system, it is a serious threat to anything that opposes it. A Humber Mk VII, fitted with the latest in auto-computational assistance and mounting twin automatic-cannons can fire on the move without penalty, and acts as an ideal supporting unit, using its mobility to quickly get where its most needed.

    *Konflikt '47* is the game of heroes, horrors, monsters, and mechs, putting you in command of the nightmarish struggle for supremacy as the old world is torn apart and remade in blood and crackling energy. Fast-paced, lethal gameplay provides countless cinematic moments, with fluctuating Rift energies and the ever-present fog of war ensuring that no two games are ever the same, and the outcome is never guaranteed. Heroes and villains on each side lend their unique abilities to turn the tide of battle, as mechs and monsters face off in brutal contests of flesh versus steel.

    This is not war. This is the end.

    The British Commonwealth Starter Army contains the following miniatures:

    - 1 British Commonwealth Platoon Commander in Galahad Powered Armour \(Warlord Resin; exclusive to this set\)
    - 5 Mk I Automated Infantry \(Warlord Resin\)
    - 3 Mk II Heavy Automated Infantry \(Warlord Resin\)
    - 5 Galahad Armoured Infantry \(Warlord Resin\)
    - 1 Percival Medium Assault Walker \(Resin/Warlord Resin\)
    - 1 Humber Mk VII Armoured Car \(Plastic with Resin/Warlord Resin components\)
    - 6 Konflikt ’47 brown Order Dice
    - 6 Konflikt ’47 blue Rift Dice
    - Waterslide transfer sheet
    - Assembly guides

    *Miniatures sculpted by Jon Heeney, & Marco Sano. Studio Miniatures painted by Kirsten Williams & Darek Wyrozebski.*

    *Models supplied unassembled and unpainted*
