    Although the early heavy infantry armour fielded by the Soviets was both effective and functional, it was clear there was room to improve the design. Initial trials to convert the existing design to a more anti-infantry role were of limited worth and a new suit was commissioned to take advantage of increased understanding of the other nations’ Rift-tech advances. The Mark II suits benefit from more power assisted movement, and engineers are working on diversifying the purpose built armaments for the suit. Overall production rates are not yet satisfactory so the MK II suit has only had only limited rollout to the elite Guards units.

