    The success of the Type 6 armed with the Light Shiboru Cannon led to the development of the Type 7. This improved on the previous design by incorporating an elongated chassis, leaving the crew less cramped, and a pair of front-mounted ‘claws’ equally useful for cutting through dense undergrowth as they are swatting away enemy infantry or even other light vehicles. An articulated tail purpose built for the Type 61 Light Shiboru Cannon was also fitted, affording the gunner much more control when gun laying. Given the Type 7’s even more apparent resemblance to an arachnid than its forerunner, and the addition of the tail sting, this inevitably resulted in the walker being named the Sasori (‘Scorpion’).

