- name: "Konflikt '47: Invasion Amerika & 'T2 Prototype Heavy Armor' book miniature"
  sku: 459910012
  productType: single_kit
  priceGbp: 30.00
  url: https://store.warlordgames.com/products/konflikt-47-invasion-amerika-t2-prototype-heavy-armor-book-miniature
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/459910012_K47InvasionAmerika_T2PrototypeHeavyArmor01.jpg?v=1781680510
  status: current
  description: |-
    It is 1947. Breaches in reality known as Rifts have provided the means for the warring nations to unleash unspeakable horrors upon one another in pursuit of victory. On the island fortress of Iwo Jima, away from prying eyes, the Empire of Japan has developed secret new technologies.

    Whilst fixated on the threat of the Axis in Europe, the Pan-Atlantic Alliance fights a holding war in the Far East and Pacific. However, the Empire is poised to irrevocably alter the trajectory of the Rift War on a global scale.

    Invasion Amerika is the second in a series of supplements for Konflikt ’47 detailing the background, history, and characters of the Rift War. This volume turns its attention to the Empire of Japan's expansionist ambitions, and their unprecedented attack against the heartland of the United States of America.

    Within its full-colour pages, rife with glorious photography, artwork, and illustrations, you’ll find timelines, short stories, game scenarios, and more.

    **Special Miniature**

    When you order this book, you’ll also receive the exclusive ‘T2 Prototype Heavy Armour’ special miniature. Under attack in the heart of the United States, the US will make use of any weapons they can, ready or not!

    *Miniature sculpted by Marco Sano. Studio miniature painted by Kirsten Williams.*

    *Models supplied unassembled and unpainted*
