  description: |-
    The advent of Rift-technology has allowed Japan to close the gap in some areas. Although increasing industrial capacity hasn’t been easy, the study of the Rift messages provided by Germany has allowed Japan to create a family of rapid firing compression weapons.

    This box contains:

