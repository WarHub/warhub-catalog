    Since their first deployment against United States forces in the Philippines in late 1945, the 'Ghosts' have proven invaluable. Their ability to phase into a state of existence separate yet parallel to our own has stymied enemy commanders. They can strike from anywhere, at anytime and without warning, laying down weight of fire with Shiboru compression rifles or spilling blood with the quick flash of a blade before disappearing into what Japanese researchers have come to call 'Shinobi Space', or 'the Spirit Realm'.

    In July 1947, Ghost Infiltration platoons would be the instrument of the Empire of Japan's invasion of America. Accompanying them would be Kimura Tadaaki, otherwise known as the Scourge of the Spirit Realm, ready to wreak devastation in service the Empire.

