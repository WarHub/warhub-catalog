  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/3010000005_PDF_BPEpicBattles_TheWaterlooCampaignPDF01.jpg?v=1750240249
  status: current
  description: |-
    The Hundred Days campaign ended on the rain-soaked Belgian field at Waterloo, where the Duke of Wellington, master of defensive actions, faced the mercurial Emperor of France, Napoleon Bonaparte, doyen of the attack, and proved a swan song for two decades of Napoleonic warfare in Europe.

    Based on the award-winning Black Powder rules system, Black Powder Epic Battles allows you to refight the key engagements of the Waterloo Campaign on a huge scale, with period specific additions that capture the tactics, conditions, and prominent personalities of the Napoleonic Wars.

    Will you take the French to victory and cement Bonaparte’s legacy? Or will you lead a diverse Anglo-allied Army to stop the Corsican tyrant from waging an endless war across the continent?
