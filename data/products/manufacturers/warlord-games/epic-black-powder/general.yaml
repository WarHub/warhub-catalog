  description: |-
    Populate your battlefields with these *Epic Battles: Revolution!* Townsfolk.

    The American War of Independence was fought through the towns, cities, and countryside of an emerging nation, and civilians were to be found wherever the armies were. These colourful figures are perfect for decorating your gaming tables and command bases, adding extra character to your collection.

    Of particular note is a figure representing ‘Molly Pitcher’, a nickname given to Mary Ludwig Hays who, by the account of Joseph Plumb Marin, fought in the Battle of Monmouth of June 1778, taking her husband’s place swabbing and loading a cannon when he had fallen.

    *Miniatures sculpted by Marco Sano. Studio miniatures painted by Andrés Amián.*

    *Models supplied unassembled and unpainted.*
