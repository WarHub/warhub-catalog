  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/315114018_BPEpicBattles_AmericanCivilWarAmbulance01.jpg?v=1691601597
  status: current
  description: |-
    The Letterman system for evacuating casualties to aid stations to the rear is one of the great advancements in battlefield medicine, saving countless soldiers who would likely have perished otherwise.

    Providing trained and dedicated crews in two or four-wheeled wagons, the ambulances could often be found putting themselves in danger to evacuate their wounded colleagues.

    Our ambulance is a four-wheeled Tripler wagon with a stretcher bearer party extricating a wounded soldier.

    Contains one resin / metal ambulance and stretcher bearer party.

    *Models supplied unassembled and unpainted*
- name: 'Black Powder Epic Battles - American Civil War: Signals Corps Tower'
  sku: 315114017
  productType: single_kit
  priceGbp: 16.50
  url: https://store.warlordgames.com/products/black-powder-epic-battles-american-civil-war-signals-corps-tower
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/315114017_BPEpicBattles_ACW_SignalsCorpsTower1.jpg?v=1691601454
  status: current
  description: |-
    The Confederate and Union Signal Corps both operated in a battlefield situation to provide intelligence gathering, battlefield observation, direct artillery fire and, in the case of the rebels, also including a level of espionage.

    Both sides constructed signal towers to overlook battlefields and provide information to commanders as to the status of their own troops and dispositions of the enemy. Signal Corps signallers used single large flags \(or occasionally torches\) to convey messages using a system called 'Wig Wag'.

    Contains one resin / metal signal tower and Signal Corps team.

    *Models supplied unassembled and unpainted*
- name: 'Black Powder Epic Battles - American Civil War: Siege Mortar battery'
  sku: 315114019
  productType: single_kit
  priceGbp: 10.50
  url: https://store.warlordgames.com/products/black-powder-epic-battles-american-civil-war-siege-mortar-battery
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/315114019_BPEpicBattlesSiegeMortarbattery01.jpg?v=1691601357
  status: current
  description: |-
    The primary roles of siege mortars are to reduce fortifications, firing explosive shells over intervening walls. The high trajectory of mortar shells allows for disruption and devastation of structures not usually able to be targeted by normal artillery fire. Conversely they can be used in defence of sieges by harassing enemy work parties who are preparing trenches and siege batteries.

    The 8-inch siege mortar had a maximum range of around 2,225 yards, although the effective range is more like 800 yards. Around half of the shells would fall within 50 yards of the target. Both Confederate and Union forces fielded siege mortars.

    Contains three metal siege mortars.

    *Models supplied unassembled and unpainted*
