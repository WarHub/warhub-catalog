- name: 'Black Powder Epic Battles: Waterloo All-In Three Army Mega Bundle'
  sku: EpicThreeArmyAllIn
  productType: box_set
  priceGbp: 687.00
  url: https://store.warlordgames.com/products/black-powder-epic-battles-waterloo-all-in-three-army-mega-bundle
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/EpicThreeArmyAllInBlackPowderEpicBattlesWaterlooAll-InThreeArmyMegaPre-OrderBundle.jpg?v=1649865991
  status: current
  description: |-
    Sunday, 18 June 1815; an unassuming rain-soaked field in Belgium; the scene of a battle the likes of which have not been seen since; Waterloo is a fascinating period of military history to study via the means of tabletop wargaming, and with the Prussian forces joining the fray, the game is truly becoming worthy of the Black Powder Epic Battles name.

    This is the ultimate Epic Battles: Waterloo bundle, designed for collectors who want to refight the battle in its most complete form. It contains one of every starter set, plastic boxed set and named scenery set released thus far for the game including those pertaining to the long-awaited Prussian Army.

    That’s three starter sets, eleven plastic brigades \(including three free infantry brigades – one for each army\), four MDF scenery packs, which complement the scenery elements in the starter sets and the resin sandpit & barricade add-on for La Haye Sainte, not forgetting the limited-edition miniatures exclusive to pre-orders:

    This bundle includes the limited-edition dioramic miniature set, Prussian Plancenoit Assault, depicting the Prussians storming into the fray at Waterloo late on the afternoon of June 18th 1815. We have based our miniatures on the moment as captured for posterity by artist Adolph Northen.

    It also gives you another chance to pick up the previous special edition miniatures from the initial Black Powder Epic Battles: Waterloo release:

    - Sous-lieutenant Legros - as he takes an axe to the gates at Hougoumont. He is accompanied by an infantryman and a drummer boy \(the only Frenchman left alive by the British at Hougoumont\).
    - Sergeant Ewart of the Scots Greys snatching the eagle from an ensign of the 45th line Infantry regiment.

    Full Bundle Contains:

    - Black Powder Epic Battles - Waterloo: Blücher's Prussian Army starter set
    - Black Powder Epic Battles - Waterloo: Wellington's British Army Starter Set
    - Black Powder Epic Battles - Waterloo: Bonaparte's French Army Starter Set
    - Black Powder Epic Battles - Waterloo: Prussian Cavalry Brigade
    - Black Powder Epic Battles - Waterloo: Prussian Landwehr Brigade
    - Black Powder Epic Battles - Waterloo: British Light Cavalry Brigade
    - Black Powder Epic Battles - Waterloo: British Heavy Cavalry Brigade
    - Black Powder Epic Battles - Waterloo: British Highlanders & Riflemen
    - Black Powder Epic Battles - Waterloo: French Middle & Old Guard
    - Black Powder Epic Battles - Waterloo: French Light Cavalry Brigade
    - Black Powder Epic Battles - Waterloo: French Heavy Cavalry Brigade
    - Black Powder Epic Battles - Waterloo: Plancenoit Scenery Pack
    - Black Powder Epic Battles - Waterloo: Papelotte Farm Scenery Pack
    - Black Powder Epic Battles - Waterloo: La Haye Sainte Scenery Pack
    - Black Powder Epic Battles - Waterloo: La Haye Sainte sandpit & barricade
    - Black Powder Epic Battles - Waterloo: Hougoumont Scenery Pack
    - FREE Black Powder Epic Battles - Waterloo: Prussian Infantry Brigade
    - FREE Black Powder Epic Battles - Waterloo: British Infantry Brigade
    - FREE Black Powder Epic Battles - Waterloo: French Infantry Brigade

    Plus, each of the pre-order exclusive limited-edition miniatures attributed to each of the three armies:

    - FREE Black Powder Epic Battles - Waterloo: Prussian Plancenoit Assault
    - FREE Black Powder Epic Battles - Waterloo: Ewart's Eagle
    - FREE Black Powder Epic Battles - Waterloo: L'Enfonceur's Hougoumont Assault

    *Models supplied unassembled and unpainted*
