  description: |-
    Deploy Britain’s elite infantry to crush the rebellious Americans!

    With the advent of hostilities in America, a detachment of the elite Guards regiments was formed from the three regiments of Foot Guards then in existence. These highly disciplined troops deployed to North America without their colours, but of course we have built in the option to include them for those players who like to have their units bedecked with flags. The Guards are just what every British player needs to provide a ‘hard core’ to their collection - if all else fails, you can rely on the Guards!

    This box gives you two full regiments of Foot Guards for *Epic Battles: Revolution!*, including command strips which can be modelled with or without standard bearers, as well as ten Guards light infantry models - perfect for skirmishing ahead of your line. Also included are two strips of Foot Guards in Grenadier headdress. These can either be assembled in two ranks on one base, or as the front rank of two bases. Traditionally, Grenadier companies would usually be positioned on the extreme right of each unit.

    These miniatures are also perfect for representing British Regulars in the latter stages of the American War of Independence, as by that stage of the conflict the uniforms very closely resembled those of the earlier Guards.

    It’s time to bring a touch of order to proceedings - let the Foot Guard show everyone how it’s done!

    *Miniatures sculpted by Marco Sano. Studio miniatures painted by Kelly Sherwood.*

    *Models supplied unassembled and unpainted.*
