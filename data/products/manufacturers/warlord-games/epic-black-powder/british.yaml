     - 1 Indian small regiment skirmishing \(15 soldiers\)
     - 1 Hessian small Jägers regiment skirmishing \(15 soldiers\)
     - 1 Hessian tiny Jägers regiment skirmishing \(10 soldiers\)
     - 8 mounted Continental Commanders
     - 1 Continental large Militia regiment \(100 soldiers\)
     - 5 Continental standard Militia regiments \(400 soldiers\)
