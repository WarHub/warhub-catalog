- name: 'Warlord of Erehwon: Sohei Warrior Monks with naginata'
  sku: 692215005
  productType: single_kit
  priceGbp: 37.00
  url: https://store.warlordgames.com/products/warlord-of-erehwon-sohei-warrior-monks-with-naginata
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/692215005-Warlords-of-Erewhon-Sohei-Warrior-Monks-with-naginata1.jpg?v=1575567055
  status: current
  description: |-
    These holy warriors are known as Sohei (monk soldiers), representing the militant arm of Buddhism on the islands of Japan between the 10th and 17th centuries. Like the crusading orders of European knights, these brotherhoods of battle-hardened warriors fought as cohesive units on the battlefield.

    Dressed in traditional monk robes, brandishing razor-sharp naginata, the Sohei were often used as shock troops, augmenting the serried ranks of Samurai and Ashigaru that formed the bulk of a Daimyo's army. While they are most known for their iconic naginata, the Sohei are pictured with swords, daggers, bows, and clubs - opening up plenty of conversion and modeling opportunities.

    In this set, you'll get ten fantastic metal miniatures (some of which you may have seen before), which are perfect for either Warlords of Erehwon or Pike & Shotte.

    **Sohei Monks on the Battlefield**

    **SOHEI WARRIOR MONKS**

    *Warrior Unit*

    *Points Value: 132*

    **Special:** You can include a maximum of one unit of Sohei Warrior Monks in your warband.

    | Unit: Warrior Monks | Ag | Acc | Str | Res | Init | Co | Special |
    | --- | --- | --- | --- | --- | --- | --- | --- |
    | 1x Monk Leader with stave | 5 | 5 | 5 | 6 | 7 | 8 | Tough, Zealous, 2x HtH |
    | 4x Monk Leader with stave | 5 | 5 | 5 | 6 | 7 | 7 | Zealous, 2x HtH |

    **Options**

    | <ul><br> <li>Give unit naginata @1pts per model</li><br> <li>Give unit longbows @4pts per model</li><br> <li>Give unit light armour @2pts per model increasing Res to 6(7)</li><br></ul> | <ul><br> <li>Give unit Divine Intervention rule @10pts</li><br> <li>Add up to 5 Warrior Monks @25pts per model</li><br></ul> |
    | --- | --- |

    With a strong stat line and a powerful array of weapons at their disposal, use your one unit of Sohei to crush an enemy flank, or shore up your defensive line. With multiple attacks in hand-to-hand, they can unleash a devastating whirlwind on an enemy unit, chewing through hordes or whittling down larger monsters.

    Add the Divine Intervention special rule to seize the initiative and support your wild charge across the battlefield.

    *Models supplied unassembled and unpainted*
