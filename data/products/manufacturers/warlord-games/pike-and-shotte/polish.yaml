- name: Polish Winged Hussars Regiment
  sku: 202210001
  productType: single_kit
  priceGbp: 38.50
  url: https://store.warlordgames.com/products/polish-winged-hussars-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/202210001_PolishWingedHussarsRegiment01.jpg?v=1777563538
  status: current
  description: |-
    The Polish Winged Hussars are amongst the most famous and easily recognisable units in history. They originated from exiled Balkan light cavalry that came to Poland in the early 1500s. The Polish Winged Hussars became much more heavily armoured than the Balkan cavalry from which they originated. They fought as shock cavalry, using long lances to make devastating charges. The famous ‘wings’ were developed to increase the fear caused by their charge; the sight of galloping horsemen with 20 foot-long lances and massive wings was a sight designed to provoke terror in even the most doughty footsoldier. On the battlefield, groups of hussars would fight together as units, known as kopie. The Winged Hussars flourished during the 1600s, winning dramatic battles against Poland’s many foes. The most famous victory was their dramatic cavalry charge when they relieved Vienna from the Ottomans in 1683.

    Contains:

    - 8 metal Polish Winged Hussars heavy cavalry (includes a command group of officer, standard bearer, and musician).
    - Flag leaflet.
    - Plastic bases.

    *Miniature sculpted by Wojtek Flis. Studio miniatures painted by Andres Amian.*

    *Models supplied unassembled and unpainted*
- name: Hajduks Regiment
  sku: 209910002
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/hajduks-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/209910002_HajduksRegiment01.jpg?v=1777562636
  status: current
  description: |-
    The Polish army had a strong Hungarian influence, due to the close ties between the two nations. In addition to the iconic Winged Hussars, some of the Polish infantry also had their origins in Hungary and the Balkans. These infantry were known as hajduks, sharing the same name as irregular fighters in Hungary. Unlike the Hungarians however, the Polish hajduks formed the core of the Polish infantry.

    The role of the hajduks in the Polish army was to support the cavalry by providing fire as the mounted troops prepared to charge. They were versatile soldiers armed with arquebuses and short swords for close quarters fighting should the enemy succeed in closing on them. This combination made them especially effective infantry in the late 1500s and early 1600s. However, the development of muskets made the arquebus-armed hajduks obsolete, and by the late 1600s, they had been replaced by Western-style musket troops.

    Contains:

    - 20 metal Hadjuk infantry (includes a command group of officer, standard bearer, and musician).
    - Flag leaflet.
    - Plastic bases.

    *Miniature sculpted by Wojtek Flis. Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
- name: Pancerni heavy cavalry regiment
  sku: 209901001
  productType: single_kit
  priceGbp: 36.00
  url: https://store.warlordgames.com/products/pancerni-heavy-cavalry-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/209901001_Pancerniheavycavalryregiment01.jpg?v=1777562444
  status: current
  description: |-
    The towarzysz pancerny (armoured companions) cavalry, often shortened to pancerni, were medium cavalry that were not as heavily armed or armoured as the Winged Hussars. They were distinguished by wearing chainmail armour throughout the entirety of the Pike & Shotte era, which gave them the appearance of an earlier time. Despite their slightly antique appearance, they were very effective troops, using their speed to attack the flanks of their opponents; their armour and hand weapons gave them an advantage in close combat.

    Often they would support the Winged Hussars’ charge, exploiting the gaps the hussars had made and pursuing fleeing troops. The Polish army could be brutally effective, with skilled hajduks providing covering fire while the Winged Hussars devastated enemy formations with their charges, followed by pancerni cavalry quickly exploiting any gaps and harrying routing enemy formations.

    Contains:

    - 8 multi-part metal Pancerni heavy cavalry (includes a command group of officer, standard bearer, and musician).
    - Flag leaflet.
    - Plastic bases.

    *Miniature sculpted by Wojtek Flis. Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
- name: Ottoman Sipahi Cavalry Regiment
  sku: 202250002
  productType: single_kit
  priceGbp: 36.00
  url: https://store.warlordgames.com/products/ottoman-sipahi-cavalry-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/202250002_OttomanSipahiCavalryRegiment01.jpg?v=1777560589
  status: current
  description: |-
    Cavalry was an important part of all armies during the Pike & Shotte era and were especially important in the Ottoman army. Although skilled horsemen throughout their history, the Ottomans had never fully embraced heavy cavalry in the fashion of western Europe, instead favouring light cavalry skirmishers.

    Despite this, most Ottoman armies featured fast-moving sipahi cavalry who fought with lances, and swords, and were equipped with shields and mail armour. The sipahis would attempt to break enemy formations and attack isolated units, retreating back to the Ottoman infantry before the enemy could regroup. They were joined by the sultan’s elite ‘Six Divisions of Cavalry’, the Kapikulu Sipahis, which formed the sultan’s bodyguard and were equipped with the finest equipment in the Ottoman army.

    Generally, the sipahis formed a large and important part of most Ottoman armies throughout the Pike & Shotte era, although the rise of gunpowder weapons reduced their effectiveness.

    Contains:

    - 8 multi-part metal Ottoman Sipahi cavalry (includes a command group of officer, standard bearer, and musician).
    - Brass spears.
    - Plastic bases.

    *Miniature sculpted by Ronnie Shilton. Studio miniatures painted by José Antonio Bustamante.*

    *Models supplied unassembled and unpainted*
- name: Ottoman Janissaries Regiment
  sku: 202250001
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/ottoman-janissaries-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/202250001_OttomanJanissariesRegiment01.jpg?v=1777560059
  status: current
  description: |-
    The Janissaries (from the Turkish for ‘new soldier’) were the elite infantry of the Ottoman Empire. The Janissary Corps was founded in 1383 by Sultan Murad I to provide him with well-disciplined and loyal troops for his expansionist campaigns. They were recruited from Christian vassal states of the Ottoman Empire in Europe by the ‘devsirme’ system of taking young boys aged 6-14 years and converting them to Islam. These children were indoctrinated and raised in an environment of harsh discipline and training, ideal for the creation of a fighting force.

    The Corps was divided into ‘Ortas’, the equivalent of a battalion, and at the height of the Janissaries’ powers in the late 1500’s there were 196 ortas. These were divided between frontier troops (Cemaat), Sultan’s Household and Bodyguard formations (Beyliks), provincial reserves (Sekbans) and cadet troops (Ajemi). Each Orta was led by a Cobaci or ‘Soup Maker’, a title that indicated humility before the Sultan, and an Asci Usta (Master Cook). Culinary traditions played an important role throughout the Janissary Corps as successful leaders should be able to provide for their men.

    Janissaries discipline and impressive war record notwithstanding, they were also at the forefront of many military advances. They wore uniforms and distinctive headgear at a time when army uniforms were practically unheard of. They were the first military units to march to music, and also the first to widely use firearms. The fact they were salaried fighters and lived in organised barracks was also unusual from a western standpoint.

    The social status of the Janissary Corps was also noteworthy; being neither free men nor ordinary slaves they created their own social class. The Agha, head of the Corps, was one of the most powerful men in the Ottoman Empire, and over the years the Janissaries came to fill important government roles and trades in society. This increase in power was to prove their downfall as they effectively became kingmakers, killing Sultans who they did not approve of and becoming a corrupt parody of their earlier glories and a law unto themselves. The end for the Janissary Corps came in 1826, when Sultan Mahmud II initiated the ‘Auspicious Incident’ which saw the execution of thousands of Janissaries and the disbandment of the Corps.

    This boxed set provides 24 metal miniatures that can represent a Janissary Orta, 12 miniatures with firearms and 12 with melee weapons, that highlight the both the uniformity and diversity of the Janissary formations.

    Contains:

    - 12 metal Janissaries armed with sword and shield (includes a command group of officer, standard bearer, drummer and sergeant).
    - 12 metal Janissaries armed with arquebus, led by an officer.
    - Plastic bases.

    *Miniature sculpted by Ronnie Shilton. Studio miniatures painted by José Antonio Bustamante.*

    *Models supplied unassembled and unpainted*
- name: The Highest Throne (The Ottoman Wars) Pike & Shotte supplement with Kara Mustafa Pasha book miniature
  sku: 209915007
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/the-highest-throne-the-ottoman-wars-pike-shotte-supplement-with-kara-mustafa-pasha-book-miniature
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/209915004_TheHighestThronewithKaraMustafaPashabookminiature01.jpg?v=1777559311
  status: current
  description: |-
    The Highest Throne covers the warfare between the Ottoman empire and their European adversaries throughout the 1500 and 1600s. It is a time of myths, legends, and battles that resonate even today and shaped European history. Within this supplement are rules for fighting some of the most famous battles in history: the Great Siege of Malta, the 1683 Ottoman attack on Vienna, and the devastating Hungarian defeat at Mohacs. Alongside these famous battles are lesser-known conflicts that were fought throughout the Mediterranean and even beyond as empires expanded, and nations sought to position themselves as global superpowers.

    This book provides a snapshot of a time when Venice fought the Ottomans for control of Crete and Cyprus, and when gold from the Spanish conquest of the Americas fuelled the Hapsburg family’s wars against the Ottomans in eastern Europe. Within these pages you will encounter Portuguese adventurers fighting in Ethiopia, outnumbered Hungarian and Croatian cavalry charging heroically out of besieged fortifications, Venetians fighting the Ottomans in the Parthenon’s shadow, Polish Winged Hussars leading devastating charges, and legendary figures like Suleiman the Magnificent and the Knights Hospitaller.

    The goal of the book is to help wargamers enjoy the dynamic and colourful period that coincides with the rise of the Ottoman empire as a global force. To this end, the book provides exciting army lists, entertaining characters, and collecting and gaming advice for a variety of forces. There also are some fun facts and interesting histories that hopefully inspire gamers to learn more and dive into this truly captivating historical timeframe.

    **Special Figure:** Included with the book is superbly detailed miniature of Kara Mustafa Pasha, a Grand Vizier of the Ottoman Empire and commander of its forces at the famous Siege of Vienna in 1683. Almost on the cusp of victory, the Ottomans were ultimately thrown back by the timely intervention of a Polish army led by King John III Sobieski at the head of a column of Winged Hussars. Kara Mustafa Pasha would pay for his life for this defeat, being ritually strangled with a silken cord on the orders of Sultan Mehmed IV.

    *Miniature sculpted by Shane Hoyle. Studio miniatures painted by Andres Amian.*

    *Models supplied unassembled and unpainted*
