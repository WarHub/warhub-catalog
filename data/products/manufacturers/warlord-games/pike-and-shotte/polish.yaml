- name: Polish-Lithuanian mercenary pikemen regiment
  sku: 209901005
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/polish-lithuanian-mercenary-pikemen-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/209901005_Polish-Lithuanianmercenarypikemenregiment01_413f393f-b29b-47b8-8c6d-8b3f886dbe7b.jpg?v=1777566257
  status: current
  description: |-
    Alongside the hadjuk infantry, the Polish-Lithuanian Commonwealth often employed foreign mercenaries to fill gaps in native manpower. These troops were often recruited from the German states' and also recruited from local levies. Tactically the Poles used their infantry differently than other European nations (besides the Ottomans who fought similarly).

    The Poles (and Ottomans) rarely used pikes on the battlefield because they used infantry to support their cavalry, which meant that the infantry were shooting/providing fire as the cavalry charged and maneuvered. And because the Poles and their Eastern rivals were often fast-moving light cavalry, the massed blocks of pike were less effective on the battlefield because the cavalry fought differently than the mounted arms of Western European armies. Despite that, these miniatures add rich element to any Polish army on the tabletop and serve as a visually distinct element to the rest of the army.

    Supplied with steel pikes.

    *Miniature sculpted by Wojtek Flis. Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
