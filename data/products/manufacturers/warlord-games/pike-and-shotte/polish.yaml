- name: Digital The Highest Throne (The Ottoman Wars) Pike & Shotte PDF
  sku: 201015001_PDF
  productType: single_kit
  priceGbp: 10.00
  url: https://store.warlordgames.com/products/digital-the-highest-throne-the-ottoman-wars-pike-shotte-pdf
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/201015001_PDF_TheHighestThronePDF01.jpg?v=1779893798
  status: current
  description: |-
    The Highest Throne covers the warfare between the Ottoman empire and their European adversaries throughout the 1500 and 1600s. It is a time of myths, legends, and battles that resonate even today and shaped European history. Within this supplement are rules for fighting some of the most famous battles in history: the Great Siege of Malta, the 1683 Ottoman attack on Vienna, and the devastating Hungarian defeat at Mohacs. Alongside these famous battles are lesser-known conflicts that were fought throughout the Mediterranean and even beyond as empires expanded, and nations sought to position themselves as global superpowers.

    This book provides a snapshot of a time when Venice fought the Ottomans for control of Crete and Cyprus, and when gold from the Spanish conquest of the Americas fuelled the Hapsburg family’s wars against the Ottomans in eastern Europe. Within these pages you will encounter Portuguese adventurers fighting in Ethiopia, outnumbered Hungarian and Croatian cavalry charging heroically out of besieged fortifications, Venetians fighting the Ottomans in the Parthenon’s shadow, Polish Winged Hussars leading devastating charges, and legendary figures like Suleiman the Magnificent and the Knights Hospitaller.

    The goal of the book is to help wargamers enjoy the dynamic and colourful period that coincides with the rise of the Ottoman empire as a global force. To this end, the book provides exciting army lists, entertaining characters, and collecting and gaming advice for a variety of forces. There also are some fun facts and interesting histories that hopefully inspire gamers to learn more and dive into this truly captivating historical timeframe.
