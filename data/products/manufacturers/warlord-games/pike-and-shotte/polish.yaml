- name: Pancerni heavy cavalry command
  sku: 203011011
  productType: single_kit
  priceGbp: 15.00
  url: https://store.warlordgames.com/products/pancerni-heavy-cavalry-command
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/203011011_Pancerniheavycavalrycommand01.jpg?v=1777635188
  status: current
  description: |-
    The towarzysz pancerny (armoured companions) cavalry, often shortened to pancerni, were medium cavalry that were not as heavily armed or armoured as the Winged Hussars. They were distinguished by wearing chainmail armour throughout the entirety of the Pike & Shotte era, which gave them the appearance of an earlier time. Despite their slightly antiqued appearance, they were very effective troops, using their speed to attack the flanks of their opponents; their armour and hand weapons gave them an advantage in close combat.

    Often they would support the Winged Hussars’ charge, exploiting the gaps the hussars had made and pursuing fleeing troops. The Polish army could be brutally effective, with skilled hajduks providing covering fire while the Winged Hussars devastated enemy formations with their charges, followed by pancerni cavalry quickly exploiting any gaps and harrying routing enemy formations.

    Contains:

    - 3 multi-part metal Pancerni miniatures; 1 leader on horseback, 1 flag bearer on horseback and 1 musician on horseback.

    *Miniature sculpted by Wojtek Flis. Studio miniatures painted by Jamie Getliffe.*

    *Models supplied unassembled and unpainted*
