- name: Wars of Religion Infantry Regiment
  sku: WGP-19
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/wars-of-religion-infantry-regiment
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-18-WoR-Infantry-Regiment-a.jpg?v=1575566137
  status: current
  description: |-
    The 16th Century was a period of conflict and discovery. All across Europe armies were formed to extend Empires and consolidate power. At the forefront was the might of the Spanish Empire which had developed the Tercio as a battlefield formation used to devastating effect. Pike blocks held the balance of power, often consisting of thousands of men. These were supported by troops with firearms to disorder enemy formations before contact, allowing the pikemen to drive all before them.

    Pikes were generally in excess of 16 feet long, and the strongest men were pressed into the ranks of this arm. The firearms which provided the support developed rapidly through the century from primitive arquebuses to muskets, and the musketeer was to play an increasing important role.

    National armies were practically unheard of; most armies being formed by those who could afford to keep men in the field. For this reason the size and quality of regiments varied greatly, and uniforms consisted largely of civilian dress unless the Colonel was wealthy enough to equip his men in the same manner.

    This box set contains all you need to field a Pike & Shotte Infantry regiment for many of the European powers, whether resisting the Ottoman menace from the East or conquering the New World to the West.

    Spanish Conquistadores, English Tudor armies or Christian defenders of Malta can all be represented by the figures within. Please be aware that model poses may vary from those shown in the pictures.

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte Ordnance Battery
  sku: WGP-18
  productType: single_kit
  priceGbp: 63.00
  url: https://store.warlordgames.com/products/pike-shotte-ordnance-battery
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-18-Ordnance-Battery-b.jpg?v=1613752954
  status: current
  description: |-
    It was a rare thing for a general in the 17th Century to take to the field without an artillery train to intimidate and pulverise the enemy lines. These cannon and mortars were terrifying weapons, belching smoke and flames with a frightening roar that no simple country lad was likely to have heard before. The cannon’s range of a thousand yards or more, although inaccurate at such extreme distances, could deliver its solid iron cannon balls to smash through the tightly packed enemy ranks to devatasting effect.

    A wily master gunner would position his guns where they could do the most damage whilst not risking them to the enemy – it being a great shame to lose ones guns in battle, not least because of the enormous cost incurred in manufacturing, transporting and crewing them.

    This box has three mighty weapons - a Demi-culverin, a Mortar and a Saker cannon - carefully protected by well-built gabion and wicker work defences, with the gunpowder barrels safely stowed in pits. Served by stoic crews and supported by a Sentinel, Master Gunner and an Engineer, these will wreak havoc in your opponent’s battle lines!

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte Infantry Regiment plastic boxed set
  sku: WGP-22
  ean: 5060393701347
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27.50
  url: https://store.warlordgames.com/products/pike-shotte-infantry-regiment-plastic-boxed-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-22-Infantry-Regiment-a.jpg?v=1575566141
  status: current
  description: |-
    The 17th Century saw the assembling of large regular armies equipped and supplied by the state. Many units, though not all, were uniformly attired for the first time, and formed into companies and regiments then finally brigaded together into tercios or battalias.

    Formations on the field could vary enormously as the situation dictated. On paper, a regiment may have ten companies of 100 men each but in reality, due to sickness, casualties and lack of money, regiments could be as small. The norm was to have two equal ‘wings’ of musketeers on the flanks and a central block of pikemen armed with sharp 16 foot ash pikes. While the slow-firing musketeers whittled down the enemy, the pikes’ primary role was to provide them with protection from cavalry.

    This box contains all you need to field a pike and musket-armed regiment of the period, be it for the Thirty Years War that ravaged Europe or the English Civil Wars where Royalist battled Parliament for control of the country.

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte Cavalry plastic boxed set
  sku: WGP-21
  ean: 5060393701330
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25.00
  url: https://store.warlordgames.com/products/pike-shotte-cavalry-plastic-boxed-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-21-Cavalry-Regiment-a.jpg?v=1575566135
  status: current
  description: |-
    The 17th Century saw large standing armies in action all over Europe, in numbers previously undreamt of, and huge numbers of infantry, artillery and cavalry were raised. The cavalry of the period were mostly of the heavy variety; big horses that could barge other enemy cavalry and intimidate infantry, while carrying a determined rider protected by, at the very least, a back-and-breastplate, and usually a sturdy helmet.

    The cavalryman’s offensive arms started with at least one pistol, a sword or pole axe for close-quarter fighting, and possibly a carbine. Cavalry were formed into squadrons, regiments and finally into brigades and were usually employed en masse in a cavalry wing on either flank of the infantry line.

    If a cavalry wing routed its opponents, that left it free to attack the flanks of engaged enemy infantry. This could be a battle winner, unless the jubilant horsemen galloped over the hills and far away in pursuit of plunder!

    These models can built to represent Royalist or Parliamentarian cavalry in the English Civil Wars or to be fielded as one of the many and varied regiments during the Thirty Years War.

    *Models supplied unassembled and unpainted*
