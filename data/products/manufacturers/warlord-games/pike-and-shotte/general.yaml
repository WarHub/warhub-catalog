  status: current
  description: |-
    Army Muster is a brand new set of bundles tailored to those all-important core units in our mass-battle historical wargames. An easy way to expand existing and new collections alike, each Army Muster bundle contains three copies of one of our plastic boxed sets, plus a free complementary product that will support your new soldiers nicely on the tabletop.

    **Landsknecht Pikemen:** The 17th Century saw the assembling of large regular armies equipped and supplied by the state. Many units, though not all, were uniformly attired for the first time, and formed into companies and regiments then finally brigaded together into tercios or battalias.

    Formations on the field could vary enormously as the situation dictated. On paper, a regiment may have ten companies of 100 men each but in reality, due to sickness, casualties and lack of money, regiments could be as small. The norm was to have two equal ‘wings’ of musketeers on the flanks and a central block of pikemen armed with sharp 16 foot ash pikes. While the slow-firing musketeers whittled down the enemy, the pikes’ primary role was to provide them with protection from cavalry.

    This Army Muster Bundle Contains enough miniatures to make 120 Pike & Shotte infantry. Additionally, this bundle contains a Pike & Shotte Mounted Commander for **free**.

    *Models supplied unassembled and unpainted*
- name: 'Army Muster: Pike & Shotte Cavalry'
  sku: 209916007
  productType: single_kit
  priceGbp: 76.00
  url: https://store.warlordgames.com/products/army-muster-pike-shotte-cavalry
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/209916007_ArmyMuster_Pike_ShotteCavalry01.jpg?v=1654531824
  status: current
  description: |-
    Army Muster is a brand new set of bundles tailored to those all-important core units in our mass-battle historical wargames. An easy way to expand existing and new collections alike, each Army Muster bundle contains three copies of one of our plastic boxed sets, plus a free complementary product that will support your new soldiers nicely on the tabletop.

    **Pike & Shotte Cavalry:** The 17th Century saw large standing armies in action all over Europe, in numbers previously undreamt of, and huge numbers of infantry, artillery and cavalry were raised. The cavalry of the period were mostly of the heavy variety; big horses that could barge other enemy cavalry and intimidate infantry, while carrying a determined rider protected by, at the very least, a back-and-breastplate, and usually a sturdy helmet.

    The cavalryman’s offensive arms started with at least one pistol, a sword or pole axe for close-quarter fighting, and possibly a carbine. Cavalry were formed into squadrons, regiments and finally into brigades and were usually employed en masse in a cavalry wing on either flank of the infantry line.

    If a cavalry wing routed its opponents, that left it free to attack the flanks of engaged enemy infantry. This could be a battle winner, unless the jubilant horsemen galloped over the hills and far away in pursuit of plunder!

    This Army Muster Bundle Contains enough miniatures to make 36 Pike & Shotte Cavalry. Additionally, this bundle contains a **free** English Civil War/Thirty Years War Army Standard Bearer, with which to proudly display your General’s colours.

    *Models supplied unassembled and unpainted*
- name: 'Army Muster: Pike & Shotte Firelock Storming Party'
  sku: 209916008
  productType: single_kit
  priceGbp: 61.00
  url: https://store.warlordgames.com/products/army-muster-pike-shotte-firelock-storming-party
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/209916008_ArmyMuster_Pike_ShotteFirelockStormingParty01.jpg?v=1654534660
  status: current
  description: |-
    Army Muster is a brand new set of bundles tailored to those all-important core units in our mass-battle historical wargames. An easy way to expand existing and new collections alike, each Army Muster bundle contains three copies of one of our plastic boxed sets, plus a free complementary product that will support your new soldiers nicely on the tabletop.

    **Firelock Storming Party:** Firelock companies were raised throughout the Civil Wars for a variety of purposes. Formed originally to fight in the wild bogs of Ireland where a flintlock was more easily handled than the clumsy matchlock, firelock-armed musketeers grew more common as the Civil Wars progressed, all armies sometimes fielding large units so armed.

    The firelock had numerous advantages over the older matchlock. It was ready to fire at a moment's notice, was more weatherproof and did not betray a night advance with glowing match cord. It was also much cheaper in the long run as they did not consume vast quantities of match cord.

    They were regularly used for baggage and artillery guards, as the flintlock mechanism was seen as infinitely more desirable in a gunpowder depot than spluttering, lit, match cord!

    By mid to late war, whole companies were fielded. For the Royalists, Legge's who fought at Edgehill, Rupert’s and Maurice’s redcoats and Sandford's from Ireland. Parliament issued them liberally and many of the New Model Army had whole companies so armed and later, whole regiments. The Scots Covenanter forces also used the firelock to good effect.

    This Army Muster Bundle Contains enough miniatures to make 54 Firelock Musketeers. Additionally, this bundle contains the Fire and Brimstone – Rabblerousers for **free**. These three figures are comprised of a ranter, a cleric and a preacher – just the chaps to rile up the men into battle-fervour!

    *Models supplied unassembled and unpainted*
- name: Get Started With Landsknechts
  sku: Get-Started-01
  productType: box_set
  priceGbp: 173.00
  url: https://store.warlordgames.com/products/get-started-with-landsknechts
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/MicrosoftTeams-image_23f5c3d5-1724-4839-b8f7-ef33f5610647.png?v=1643225632
  status: current
  description: |-
    The late 15th and early 16th centuries in Europe were defined by near-constant warfare. National ‘standing armies’ were unheard of and the ambitions of empires were reliant on the mercenaries they could afford to hire.

    Landsknechts were instigated by the Holy Roman Emperor, Maximillian I, as a reaction to the Swiss Mercenary Pikemen that had dominated battlefields for decades before the Italian Wars \(1494-1559\).

    Over the course of the Italian Wars, however, the Landsknecht tactics adapted far more than the Swiss and the use of firearms in conjunction with the Pike would give them the edge, at least tactically.

    This bundle is designed to get you started with a Landsknecht Pike & Shotte army. Anchored by a solid core of pikeman ably supported by missile troops to achieve the tactical edge that came to dominate the period of the 15th – 16th Century Italian Wars. We’ve included mobility by way of mounted Arquebusiers and Gendarmes, as well as officers to lead your new army.

    Free with this bundle, you’ll also receive the highly characterful Looting Party as well as additional fire support by way of a Handsbuchse Light Gun.

    *Models supplied unassembled and unpainted*
- name: Mac Colla "The Devastator", with bodyguards and Highlander Hero
  sku: 203013005
  productType: single_kit
  priceGbp: 9.00
  url: https://store.warlordgames.com/products/mac-colla-the-devastator-with-bodyguards-and-highlander-hero
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/1_45cb8359-506c-4fa9-89cc-6ed3e9866b47.png?v=1643123706
  status: current
  description: |-
    This is Warlord's take on perhaps the most dangerous man in the British Isles at the time...Alasdair MacColla "The Devastator", a man who went by many names, some rarely used out loud!

    This legendary Highland warrior came from the Isles and grew famous for his startling strength, size and ferocity in combat. He went on to lead the deadly Irish Brigade in most of their battles in the Highlands against the hapless forces of the Covenant and is credited with creating the famous Highland charge.

    Ferocious in battle, and sometimes needlessly cruel, this huge and frightening man inspired his men with his individual prowess with broadsword and targe. He formed a lifeguard of around one hundred and fifty men and had two, presumably hand-picked bodyguards, named Dubhaltach MacPhee and Calum Mor MacInnes, armed to the teeth here as you can see in all their atavistic glory!

    In an age and culture where personal strength and courage counted for much, the Highland hero was still a man of standing. Warlord’s Highland hero is stripped down to just a belted plaid, so wild is his determination to close with his despised foe. His foes were legion and could be cowering Covenanters, astonished English troops or as likely another loathed Highlander from a despised rival clan!

    We have our hero wielding an ancient weapon, the double-handed great sword that could smash down pikes or horsemen alike. This man is clearly the stuff of legends, bulging with energy and muscle and capable of great deeds on the field of battle. He is a dangerous man indeed…

    Paint these four up and put them up against any foes and see them blanche...

    *Models supplied unassembled and unpainted*
