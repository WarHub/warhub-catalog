  description: |-
    The Scots Covenanters fielded a huge array of artillery, ranging from huge siege pieces to tiny mobile "murderers" or frame guns. These are simple, small barrels attached to a sturdy wooden supporting frame, hence the name. Crewed by a just three or four men, they could be wheeled or indeed carried around on the battlefiled in a handy manner, firing a light cannon ball or as often we think, hail shot.

    Warlord's gun comes complete with a sturdy mule to carry the gun and its supplies and three trained gunners.

    Field this in all your Scottish armies of the period and keep your powder dry!

    Contains 3 metal gunners, 1 metal mule and metal artillery piece.

    *Models supplied unassembled and unpainted*
- name: King Charles I
  sku: WGP-CHA-01
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/royalist-parliamentarian-king-charles-i
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-CHA-01_ECW_KingCharlesI01.jpg?v=1666010080
  status: current
  description: |-
    Divisive but powerful, Charles I was the King of England, Ireland, and Scotland. Betrayed by the perfidious Scots he was defeated and eventually murdered \(or executed illegally\). He was praised as a Saint by the Anglican church during the reign of his son Charles II!

    This pack contains one mounted metal figure

