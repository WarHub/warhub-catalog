- name: Pike & Shotte Mule Train
  sku: WGP-EC-47
  productType: single_kit
  priceGbp: 15.00
  url: https://store.warlordgames.com/products/royalist-parliamentarian-pike-shotte-mule-train
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-47-ps-mule-train-a.jpg?v=1575565768
  status: current
  description: |-
    The roads of Britain and Europe in the 17th century were legendarily poor in the main. All heavy goods were moved by sea and river wherever possible, carts being suitable for light loads only. Day to day loads of food, forage and barrels of powder could more easily, and more reliably, be carried on the backs of men, horses or best of all, mules. Warlord’s baggage train has a muleteer leading his braying, stubborn charges in a daisy chain, hoping the loads will stay on and no enemy patrol pick up on their noisy passage.

    Contains 3x metal mules and 1x metal handler.

    *Models supplied unassembled and unpainted*
- name: Thirty Years War Swordsmen
  sku: WGP-SWO-01
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/thirty-years-war-swordsmen
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ty-25-tyw-swordsmen.jpg?v=1575565764
  status: current
  description: |-
    Amongst the dense pike columns and sleeves of shot, could sometimes be found soldiers like these sword and buckler men. Sometimes used to defend the colours, sometimes formed into assault parties, they would certainly be where the fighting was the most fierce.

    They would quite possibly be formed by young gentlemen and were highly skilled in swordplay, in many ways a throwback to the ancient idealism of the Roman Legionary.

    The Spanish forces used them in great numbers where they had a fearsome reputation, hewing their way through packed pike ranks or either assaulting or defending a breach, parrying with their shield and darting their swords into unarmoured spots on thier foes.

    They could also be fielded as bodyguards for generals and senior officers, the Prince of Orange bodyguard being a great example on the Protestant side.

    These great Warlord models are tooled up for the fray wih all manner of helmets, quality armour and of course the trademark sword and buckler. Two of the men are packing a pistol too, one with it on his belt and the other having a seperate arm, there being 3 differing bodies in total and a repeat body and loose arm to give the pistol option.

    These models would also work for armies of an earlier period, Elizabethan springs to mind immediatey...

    *In the pack there are 8 random metal swordsmen, supplied unpainted and unassembled*
- name: Oliver Cromwell
  sku: WGP-CRO-01
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/royalist-parliamentarian-oliver-cromwell
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-CRO-01_ECW_OliverCromwell01.jpg?v=1666010091
  status: current
  description: |-
    Cromwell. Our chief of Men.

    Oliver Cromwell had little inclination to become a great general, and indeed had no military experience at all before he felt compelled to resist the machinations of Charles, raising a troop of horse in East Anglia and join the forces of rebellion. Many minor gentry raised local forces to fight for either faction, and Cromwell’s troops were no different in those early days.

    After years of campaigning however and under Cromwell's studious and pious leadership his regiment of horse, a huge, double sized unit, became a well-oiled, disciplined machine - so much so, that the Royalists themselves named them *ironsides*.

    ****

    Cromwell went on to command armies all over Britain, culminating in devastating and bloody conquests in Scotland and Ireland, crushing Royalist resistance wherever it was met. As Lord Protector, he became in many ways a pastiche of the 'tyrant' Charles as he himself crushed Parliament and ruled with his generals in a military *Junta*. After a number of years his rule became unpopular and when he died, possibly of malaria, his son Richard was foolishly offered his post, a post no one else could hope to fill, so that shortly a grateful public recalled Charles' son to the throne.

    Be that as it may, Oliver Cromwell showed himself to be an able general, a superb strategist and a focus for reform in turbulent times. His military legacy was the emergence of the red-coated British army and a navy that would challenge all other nations to supremacy.

    Warlord Games have modelled the Lord Protector in full battle mode, flourishing his hat to show he is well and in command, wearing an iron cap, or 'secret' on the crown of his head,

    One king but Jesus!
- name: Count Tilly, Imperial Commander
  sku: WGP-TYW-03
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/thirty-years-war-count-tilly
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-TYW-03_TYW_CountTilly01.jpg?v=1666097827
  status: current
  description: |-
    Johann Tserclaes, Count of Tilly, commanded the Imperial forces during the Thirty Years War. He had a string on important victories against the Protestants but was then defeated by forces led by the King Gustavus Adolphus of Sweden. Along with Albrecht von Wallenstein he was one of two chief commanders of the Holy Roman Empire's forces.

    A great general, he met his end after being hit by a cannonball at the Battle of Rain against the Swedish forces. Gustavus sent his own personal physician to tend to his wounds leading Tilly to tell him "Your king is truly a noble knight". Sadly Tilly was to die of tetanus from his wound fifteen days later.

    *Contains one mounted metal miniature, supplied unpainted*
- name: The Earl of Essex
  sku: WGP-ESS-01
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/royalist-parliamentarian-the-earl-of-essex
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-ESS-01_ECW_EarlofEssex01.jpg?v=1666010151
  status: current
  description: |-
    Robert Devereux, eldest son of the 2nd Earl of Essex who was famously executed by Elizabeth I, was born in 1591. Although one of the wealthiest men in England at the time of the English Civil War, he was never a favourite at the court of Charles I.

    He gained his early military experience fighting in the Thirty Years War for the protestant cause in Germany and the Low Countries. Essex firmly tied himself to the cause of Parliament by warning the five MP's about to be arrested on the Kings orders. He was in fact the highest ranking noble to support Parliament and was made Lord General of al Parliament forces in 1642.

    Essex was a naturally cautious general, although undeniably brave. In fact, at Edgehill he was seen in the thick of the action with pike in hand. Beloved by his men, he was nicknamed 'Old Robin' by them as a term of endearment, his regiment becoming known as 'Olde Robin's Foote'

    This fantastic sculpt shows Essex mounted and his hat off taking a salute.
- name: Prince Rupert of the Rhine
  sku: WGP-RUP-01
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/royalist-parliamentarian-prince-rupert
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-RUP-01_ECW_PrinceRupert01.jpg?v=1666010157
  status: current
  description: |-
    Born in Prague in 1619 the son of Frederick V, Elector of Palatinate, Prince Rupert was the nephew of King Charles I.

    Rupert first campaigned in the Thirty Years War at the age of 14, and was held hostage in Austria for 3 years until released with Charles' aid. He came to England with his brother, Maurice, in 1642.

    Very gifted in langauges, the arts and mathematics, Rupert was a firm favourite and charismatic leader in the Royalist cause. He went on to become a feared and renowned cavalry commander, sweeping all before him in ferocious charges. Nicknamed 'Robert the Devil' by Parliament, it is clear the fear he instilled in them. Even his pet dog Boye was accused of being demonically possessed!

    Headstrong and impetuous, the success of these charges was sometimes diminished by an inability to rein in after initial contact, and this cost the Royalist cause key victories.

    This fantastic sculpt of Prince Rupert shows him leading his cavalrymen into the charge along with his fearsome dog Boye.
- name: Pike & Shotte Surgeon
  sku: WGP-EC-32
