- name: Clubmen Militia
  sku: WGP-EC-48
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/royalist-parliamentarian-clubmen-militia
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-48-clubmen-militia.jpg?v=1575565750
  status: current
  description: |-
    England in 1642 was a land of peace and sea of tranquillity compared to the horrors of the Continent’s terrible 30 Years War. So when the King and Parliament fell out and fisticuffs spread throughout the land it was like a bolt out of the blue…

    No doubt most thought it would all be over by Christmas, but the war dragged on and on and, as usual, it was the common folk who suffered the most. Raiding parties from both sides waged a small war as a fight for supplies and personal plunder took hold of the soldiery who were, it is fair to say, often poorly provided for. This became too much for the good yeoman people of the midlands, and firstly in Worcestershire, then the West Country, the locals organised…

    Led most often by their social betters, the villagers and small townsfolk formed associations, or ‘Clubs’, sworn to defend their livestock, beer and persons from any marauding soldiery whomever they were. They armed themselves from whatever were available, largely agricultural tools, and with whatever other weapons the local squirearchy could avail himself of. Some Clubmen groups even fielded cavalry!

    They fought a few actions, seeing off small raiding parties, and even sometimes allied with an army for temporary advantage, though no general could count on the goodwill of these bands for long.

    So Warlord present a savage looking bunch of villagers, led by their handsome squire \(directly above\), mustering on the village green before marching off to ‘beat the bounds’ of their parish and see off any intruders.

    Pack contains: 8 metal models - 1 Gentleman and 7 villagers plus 2 weapon frames.

    *Models supplied unassembled and unpainted*
- name: Montrose Irish boxed set
  sku: 202213004
  productType: single_kit
  priceGbp: 42.00
  url: https://store.warlordgames.com/products/montrose-irish-boxed-set
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-10-montrose-irish_ece882b9-c647-4b4c-8b32-1ce3ce1a5f31.jpg?v=1575566626
  status: current
  description: |-
    The Irish Brigade were a Brigade of three veteran regiments brought over from Ireland by Charles 1. They were all largely Irish and Catholic and had been fighting for some time in the Thirty Years War in Continental Europe.They formed the hard core of the Marquis of Montrose's forces in his titanic struggle for control of Scotland for the King.

    Arguably, because of their experience and coherence of having fought together abroad, this brigade may well have been the most deadly units in Britain at the time. They were quite wild men, used to living from the land and looting as they did when they raided Aberdeen and took what they needed,

    Desperate men, foreigners and Catholics in a Protestant country, the Irish fought hard knowing that defeat could mean disaster, and capture, execution or worse..

    Warlord brings you the Irish Brigade with its colourful flags, richly attired Officers and wild and ragged pike and shot, all eager to get to grips with their mortal enemies.

    Montrose Irish contains 4 metal pike, 4 metal command and 16 metal musket as well as a full-colour leaflet with full colour flags.

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte Marksman & Master Gunner
  sku: WGP-EC-33
  productType: single_kit
  priceGbp: 5.75
  url: https://store.warlordgames.com/products/royalist-parliamentarian-pike-shotte-specialists
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-33-marksman_gunner-c.jpg?v=1575565768
  status: current
  description: |-
    **Master Gunner Hertz Van Rental**

    When war broke out in 1642 in England all armies poured their money into forming large trains of expensive artillery. What was not readily available were the trained personnel to man the guns. Labourers and common soldiers were easy to employ, but Gun Captains and Battery commanders who really knew their trade were few and far between.

    Our master gunner, a Dutch mercenary, is laying a target with his gunner's sight. Gunnery in the 17^th^ Century was part science and part craft, but there was no substitute for experience in the field.

    He would be a civilian, richly dressed, well paid and not above swapping sides or returning to Europe's wars if the pay was not to his liking.

    **'Old Tom' - Marksman**

    Warlord Games are proud to release a superb new marksman model. 'Old Tom' as his subordinates call him has been the squire's gamekeeper for as long as most can remember.

    A skilled marksman, hunter and no friend to poachers, Tom rarely needs a second shot to fell any creature large or small.

    Tom jokes that it is his steady eye and sobriety that ensures his unerring accuracy, but his young understudies think that it may have more to do with trusted and valuable long wheel lock musket and given one any fool could shoot as well.

    Marksmen were rare in the Civil wars, but turn up in certain Swedish regiments in the Thirty Years' War in a regular fashion. Marksmen were principally used in sieges, where they were employed in towers to pick off besieging gunners and specialists, or in the siege lines where they tried to do precisely the same thing back.

    At the siege of Latham House in Lancashire, Lady Derby's small garrison held out against far larger besieging force. She used her gamekeepers to pick off unwary Parliamentarians.

    Incensed by this sniping, the Roundheads built a wooden 'sow', an enclosed stout wooden box to advance in safety. Sadly the keen-eyed snipers merely shot them in the ankles and feet which were still unprotected. Poor Parliamentarian Lord Brooke was also assassinated by a marksman named 'Dumb' Dyott who had placed himself in Lichfield Cathedral tower and shot him dead, and though we do not know what weapon he had it was an impressive shot by any standards.

    So, here we have Tom, who has crept out early between the lines to take a shot at an enemy officer who does his round at the same time each day. He has spannered his wheel lock, loaded carefully and even used his hunting sword embedded in the ground to rest his piece. Now to calm his breathing, allow for that forsaken wind and squeeze the trigger.

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte Mortar
  sku: WGP-MOR-01
  productType: single_kit
  priceGbp: 22.50
  url: https://store.warlordgames.com/products/royalist-parliamentarian-mortar
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-50-ps-mortar-b.jpg?v=1575565764
  status: current
  description: |-
    There were few more terrifying weapons in the 17th Century than the fearsome blast of the mortar bomb. Employed largely at sieges, mortars spat their fizzing, hissing shells high into the air clearing the tallest walls or towers to crash into streets or houses below before exploding in a shattering blast.

    They terrorised garrisons and townsfolk alike, sometimes leading to the civilians petitioning the city’s governor to surrender and avoid any more damage.

    Rarely used in the field, mortars needed a skilled crew to set the fuses, and lob the shells accurately without blowing themselves to kingdom come!

    Perhaps a master gunner could be useful….

    *Models supplied unassembled and unpainted*
- name: Cuirassiers boxed set
  sku: WGP-09
  productType: single_kit
  priceGbp: 44.50
  url: https://store.warlordgames.com/products/royalist-parliamentarian-cuirassiers
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/WGP-09_Pike_ShotteCuirassiers06.jpg?v=1650538794
  status: current
  description: |-
    Thundering across the field of battle, resplendent in their ornate plate armour and pistols held tightly in gauntleted hands the charge of a cuirassier regiment was something to behold!

    With luck the regiment would stop and perform their speciality – the ‘caracole’ - a complicated, but well-executed tactic, whereby the first ranks fired their pistols in the very faces of their foe, then wheeled away to reload whilst the next rank came up to volley.

    The alternative would see them smash home, pistolling men at close quarters, or wielding fearsome poleaxes to smash through armour or crush opponents.

    The 17th century saw large regiments of these steel-clad cavalry fighting epic battles in Europe in the devastating Thirty Years War. In England, Parliament massed enough money to put Haselrig’s ‘Lobsters’ \(as they were known from their bright hard shells\) into the field to take on Prince Rupert's feared Cavaliers.

    Warlord Games’ Cuirassiers are tooled up with horse pistols, swords and even war hammers. Sound the charge!

    Contains:

    - 12 multi-part metal Cuirassiers \(including command\) armed with swords, pistols and war hammers
    - 12 plastic horses
    - Plastic bases
    - Background guide
    - Seven Full-colour flags for English Civil Wars and Thirty Years War

    *Models supplied unassembled and unpainted*
