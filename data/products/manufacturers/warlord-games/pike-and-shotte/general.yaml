- name: Daimyos
  sku: 203214002
  ean: 5060917994620
  eanSource: shopify:athenagames.com
  productType: single_kit
  priceGbp: 15.00
  url: https://store.warlordgames.com/products/daimyos
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/203214002_Daimyos_01.jpg?v=1740496422
  status: current
  description: |-
    Lead your samurai and *ashigaru* into battle with these Daimyo commanders!

    The daimyo were powerful feudal lords who controlled huge swathes of territory across medieval Japan. Although nominally subordinate to the Shogun and Emperor, in reality many daimyo were warlords and landowners intent on improving their own lot by any means necessary. These men would frequently clash, wielding huge armies of samurai and *ashigaru* against each other and devastating the land in great battles and campaigns. Some would rise to greatness, while others would be remembered in infamy. No matter the motivation, if there was a battle during the Sengoku period, there was almost certainly at least one daimyo at the heart of it - often literally, leading their troops on the field!

    This set contains three legendary daimyos to lead your Japanese forces. Each is cast in crisply detailed Warlord Resin, and modelled after one of the three ‘Great Unifiers’ of Japan, arguably the most successful daimyo of their eras, but they can just as easily be used to depict any Japanese commander in your games of *Pike & Shotte.* Toyotami Hideyoshi is depicted on horseback, while Oda Nobunaga and Tokugawa Ieyasu are on foot - all are splendidly armoured and ready to command their forces in battle.

    *Sculpted by Marco Sano. Studio miniatures painted by Kirsten Williams.*

    *Models supplied unassembled and unpainted*
