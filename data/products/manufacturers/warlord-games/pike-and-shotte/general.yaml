  description: |-
    Strike the decisive blow for victory with the Seven Spears of Shizugatake!

    This Warlord Resin boxed set collects seven vassals of Toyotomi Hideyoshi, the legendary ‘Second Great Unifier’ of Japan, who won everlasting fame and immensely improved their social station for their actions at the 1583 Battle of Shizugatake. At the pivotal moment in the engagement, they led a bold attack which turned the tide of the battle and won victory for Hideyoshi. All would be richly rewarded for their work as Hideyoshi continued his meteoric rise, with many becoming daimyo in their own right.

    Clad in the height of Samurai fashion and wielding a variety of weapons, these dynamically posed figures are an absolute dream for any painter wanting to show off their skills. All seven figures are packed with detail, and each is worthy of being a centrepiece for an army in its own right. When fielded together, whether as a single unit or as individual commanders, they’re a stunning sight to behold on the *Pike & Shotte* tabletop.

