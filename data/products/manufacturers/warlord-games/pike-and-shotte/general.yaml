  description: |-
    Battle through the turbulent *Sengoku jidai* \(warring states\) period of Japanese history with Wars of the Samurai, the essential guide for recreating 15th and 16th Century Japanese warfare with *Pike & Shotte!*

    Packed with a wealth of historical background, army lists, new unit rules, and scenarios, alongside gorgeous miniatures and artwork to inspire your painting, *Wars of the Samurai* is perfect for *Pike & Shotte* veterans and new players alike, bringing a whole new dimension to the tried and tested game mechanics.

    *Wars of the Samurai* brings a century of battle and warfare to life on the *Pike & Shotte* tabletop. Command armies of commoners and elite Samurai warriors as you battle for control of Japan. Embrace ancient martial traditions and harness the powerful emerging technology of gunpowder as you strive for victory. Only the greatest of daimyos can hope to emerge from this chaotic period - will you be counted among their number?

    Alongside this mighty tome is a suitably legendary special edition figure - Yasuke, the Black Samurai! An African in the service of Portuguese Jesuits, Yasuke came to the attention of the powerful daimyo Oda Nobunaga when he was presented to him as a curiosity. Nobunaga took the man into his service, naming him Yasuke, and apparently conferring upon him the rank of Samurai. Yasuke would serve as Nobunaga’s loyal retainer for some years, allegedly even being present at Nobunaga’s death, whereafter he was returned to the Jesuits. While much of his life is either poorly documented or shrouded in mystery, Yasuke is a fantastic opportunity for painters to show off their abilities, and makes for a great accompaniment to any Oda Clan force on the tabletop, perhaps as part of the retinue of Nobunaga himself.

    *Written by D.G. Laderoute. Yasuke sculpted by Marco Sano. Studio miniature painted by Kirsten Williams.*

