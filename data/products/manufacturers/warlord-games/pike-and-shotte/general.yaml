- name: Scots Multi-barrelled Frame Gun
  sku: WGP-EC-35
  productType: single_kit
  priceGbp: 15.00
  url: https://store.warlordgames.com/products/scots-covenanter-frame-gun
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-35-scots-multi-barrel-frame-gun-a.jpg?v=1575565754
  status: current
  description: |-
    Scotland might not have been one of the richest lands in Europe, but when its well organised army marched to war, it went well equipped with artillery in quantity and in many forms.

    The Frame gun was a Scots favourite. Small and compact and easy to manoeuvre, frame guns come in all shapes and sizes. They could be single barrelled, double-barrelled or even quadruple barrelled as is our Warlord gun!

    They could be towed by mules, packed in carts or dismantled and carried by pack animals, making them very versatile, as artillery was frequently lost on campaigns or reaching the battlefield too late to make a difference.

    Frame guns could fire round shot or hail shot and would be able to keep up a quick rate of fire. Scots armies seemed to field many of these useful machines of destruction, indeed some people called small guns such as these ‘murderers’.

    We imagine that Montrose may well have picked up some of these on a campaigns though he did not record so doing, in his many victories against the Government forces.

    *Models supplied unassembled and unpainted*
- name: Pike & Shotte Command
  sku: WGP-CMD-01
  productType: single_kit
  priceGbp: 9.00
  url: https://store.warlordgames.com/products/royalist-parliamentarian-command
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-29-ps-command-a.jpg?v=1575565753
  status: current
  description: |-
    Officer. Lifted straight from page 116 of Wagner's classic TYW book, this officer is a classic study. He is richly dressed, in old fashioned jacket and possibly has served on the continent himself. He will be ideal for all early armies, as Royalist, Parliament or Covenanter and will serve as a captain or leiutenant of foot. He has a partizan and sword, and a pistol hung down from his belt. A lovely study.

    Ensign. This fellow is taken from the wonderful Haythornthwaite ECW book, and is a classic Ensign, with sword drawn and dressed in a cassock. Again he could be used in all armies, Rebel, Royalist, Scots or Montrose.

    Drummer. Every Company fielded at least one drummer and our fellow is neatly attired in a posh jacket with ribbon and braid attached. He wears a jaunty Montero with feathers too, something that the Colonel has thought it worth dipping into his own pockets for, which was common at the time. Being a warlord Drummer, although he is not carrying a sword, he is still packing a pistol for close defence.

    Sergeant. We asked for this sergeant to be a hard-bitten professional who has seen a thing or two in his time. He wears a Burgonet and sleeveless buff coat and is doing what sergeants do best, shouting! He could be slotted into any Civil war army.
- name: Scots Saker Cannon
  sku: WGP-EC-38
  productType: single_kit
  priceGbp: 20.00
  url: https://store.warlordgames.com/products/scots-covenanter-saker-cannon
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-38-scots-saker-a.jpg?v=1575565752
  status: current
  description: |-
    Due to popular demand we've spliced together the Scottish crew from our great little Frame Gun and the Saker cannon to give you a Scottish Saker!

    The Saker was the mainstay of the artillery park. Large and fearsome enough to pound the enemy in the field and also manageable \(just!\) so that it could arrive on the battlefield. We forget today that 350 years ago in Britain few had seen the savage effects of gunpowder weapons let alone heard such a terrific noise as a Saker giving fire!

    Crewed by a couple of specialists and a team of labourers who had to swab the gun and haul it back into position after each shot, artillery were much valued by generals of both sides. Their material effect on the enemy was often negligible, but the morale effect profound.

    The Warlord gun team can be painted to represent any gunners in the 17th Century. Don’t forget that cannon seem sometimes also to have been painted in surprisingly bright colours, though we recommend Black for the barrel and ironwork.

    Contains metal cannon with 3 metal crew.

    *Models supplied unassembled and unpainted*
- name: Scots Frame Gun with Mule
  sku: WGP-EC-36
  productType: single_kit
  priceGbp: 18.00
  url: https://store.warlordgames.com/products/scots-covenanter-frame-gun-with-mule
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/products/wgp-ec-36-scots-frame-gun-b.jpg?v=1575565751
