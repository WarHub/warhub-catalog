  description: |-
    Ride to death or glory with the final hurrah of the armoured knight!

    The French Gendarme \(literally ‘man at arms’\) was the ultimate evolution of the medieval knight, who had dominated European warfare for centuries. Fully encased in the pinnacle of plate armour technology, tilting a lance at the enemy, and thundering into combat on horseback, he was in many ways something of an anachronism when compared to the artillery and infantry arrayed against him. Nevertheless, Gendarmes proved that they could still be lethally effective when well used, and while the Italian Wars would prove something of a swansong, they’re an essential part of any *Pike & Shotte* battlefield in the period. This pack gives you a full regiment of French Gendarmes, perfect for adding some heavy cavalry punch to your forces.

    *Sculpted by Michael Percy. Studio miniatures painted by Shane Moore.*

    *Models supplied unassembled and unpainted*
