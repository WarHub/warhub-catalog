  status: current
  description: |-
    Bring the Italian Wars of the Fifteenth and Sixteenth Centuries to life on the *Pike & Shotte* tabletop!

    Fought between the Holy Roman Empire, Spain, France, and a whole host of Italian states, the Italian Wars would see a pivotal turning point in the history of warfare, marking the transition from the ‘bills and bows’ of medieval combat to the arquebus and pike. Packed with incredibly colourful characters, perhaps no forces better epitomise the period than the Landsknechts and Swiss. These legendary mercenaries waged war against each other across Italy and beyond, ushering in the new era of battlefield tactics. *Death & the Landsknecht* lets you bring these famous battles, and more, to the *Pike & Shotte* battlefield.

    Assemble the finest forces your paymasters can hire, and prepare for the Italian Wars! The era of the *Condottieri* and their great mercenary armies is upon us!

    *Written by Charles Singleton.*
- name: Death & the Landsknecht - Pike & Shotte Supplement with Richard de la Pole special miniature
  sku: 209916009
  productType: single_kit
  priceGbp: 22.00
  url: https://store.warlordgames.com/products/death-the-landsknecht-pike-shotte-supplement-with-richard-de-la-pole-special-miniature
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/209916006_Death_theLandsknechtwithRicharddelaPole01.jpg?v=1749659921
  status: current
  description: |-
    Bring the Italian Wars of the Fifteenth and Sixteenth Centuries to life on the *Pike & Shotte* tabletop!

    Fought between the Holy Roman Empire, Spain, France, and a whole host of Italian states, the Italian Wars would see a pivotal turning point in the history of warfare, marking the transition from the ‘bills and bows’ of medieval combat to the arquebus and pike. Packed with incredibly colourful characters, perhaps no forces better epitomise the period than the Landsknechts and Swiss. These legendary mercenaries waged war against each other across Italy and beyond, ushering in the new era of battlefield tactics. *Death & the Landsknecht* lets you bring these famous battles, and more, to the *Pike & Shotte* battlefield.

    Accompanying the book is the exclusive special figure, Richard de la Pole. A scion of English nobility following the Wars of the Roses, de la Pole would be central to the final Yorkist challenge to Henry VII's authority. Forced to leave England in the wake of many of his co-conspirators' and family members' executions, he would become an ally of King Francis I of France. He was in the process of arranging a French-backed invasion of England when peace broke out, but remained with Francis as the King went to fight in Italy. De la Pole would be killed at Pavia in 1525.

    Depicted in the thick of the fighting, sword and broken pike in hand, the special edition Richard de la Pole miniature is a fantastic opportunity for painters to show off their skills, and a great addition to any Italian Wars collection.

    Assemble the finest forces your paymasters can hire, and prepare for the Italian Wars! The era of the *Condottieri* and their great mercenary armies is upon us!

    *Written by Charles Singleton. Richard de la Pole sculpted by Marco Sano. Studio miniature painted by Andrés Amián.*

    *Models supplied unassembled and unpainted*
- name: Bartolomeo d'Alviano, Mercenary Captain
  sku: 203216000
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/bartolomeo-dalviano-mercenary-captain
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/203216000_BartolomeodAlvianoMercenaryCaptain01.jpg?v=1749661899
  status: current
  description: |-
    Fight for Venice with Bartolomeo d’Alviano, legendary mercenary captain of the Italian Wars!

    One of the truly great commanders of the early phase of the Italian Wars, Bartolomeo d’Alviano would distinguish himself in the service of Venice. Following a period in Spanish service early in his life, d’Alviano would join the Venetian cause in 1506, and over the next decade would rise to become the commander of Venice’s forces. A bold attacker and shrewd general, he played a vital role in helping prevent the Holy Roman Emperor Maximilian I from reaching Rome to be formally crowned.

    *Sculpted by Marco Sano. Studio miniature painted by Chris Bilewicz.*

    *Models supplied unassembled and unpainted*
- name: Giovanni of the Black Bands
  sku: 203216001
  productType: single_kit
  priceGbp: 7.25
  url: https://store.warlordgames.com/products/giovanni-of-the-black-bands
  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/203216001_GiovannioftheBlackBands01.jpg?v=1749662186
  status: current
  description: |-
    Strike hard and fast with Ludovico di Giovanni de' Medici, better known as ‘Giovanni of the Black Bands’!

    A scion of the hugely influential Medici family, the man who would become Giovanni of the Black Bands enlisted in the service of Pope Leo IX after a turbulent childhood. Distinguishing himself as the commander of a company of fast-moving mounted arquebusiers, he would earn his sobriquet after Leo’s death. As a symbol of mourning, he incorporated black bands into his heraldry, and continued in papal service, fighting both against and for the French. At the time of his death following the loss of his leg to a cannonball in 1526, he was symbolic of a class of warrior rapidly becoming obsolete, but was nevertheless a bold and dashing leader.

    *Sculpted by Marco Sano. Studio miniature painted by Chris Bilewicz.*

    *Models supplied unassembled and unpainted*
