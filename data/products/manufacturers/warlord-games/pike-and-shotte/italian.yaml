  status: current
  description: |-
    Rain bolts into the foe before your horsemen charge home!

    The rise of pike-armed infantry during the Italian Wars rendered the cavalry charge - traditionally the ultimate arbiter of the medieval battle - far less effective. To counter this, heavy cavalry units began incorporating men with small but powerful crossbows, who would screen the advance of their more traditionally armed fellows, and deliver a point-blank salvo to break the cohesion of a pike block in the instant before a charge. This would eventually evolve with technology, and continue to be a feature of cavalry for the remainder of their military relevance. This pack gives you everything you need to field a full regiment of crossbow-armed cavalrymen in heavy armour, perfect for games of *Pike & Shotte* set in the Italian Wars.

