- name: Digital Death & the Landsknecht- Pike & Shotte Supplement PDF
  sku: 201016001_PDF
  productType: single_kit
  priceGbp: 6.00
  url: https://store.warlordgames.com/products/digital-death-the-landsknecht-pike-shotte-supplement-pdf
