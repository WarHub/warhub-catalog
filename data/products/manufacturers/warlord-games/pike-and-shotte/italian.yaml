  status: current
  description: |-
    Support your Swiss Pikemen with reliable missile troops!

    Hailing from the cantons of the Swiss Confederacy, Swiss mercenary pikemen were the primary originators of the vast mercenary revolution in infantry warfare which would go on to sweep Europe and usher in the era of *Pike & Shotte*. Combining impressive martial skill and discipline with fierce bravery and a willingness to go on the offensive in their massed pike columns, these men were for a time the predominant force on the continent. At the start of the Italian Wars, Swiss units incorporated a significant number of men armed with crossbows, providing the pikemen with effective, reliable ranged support. These would later be superseded by arquebusiers, but the crossbow remained a potent weapon in the period.

    This set gives you everything you need to field a full regiment of Swiss crossbowmen, perfect for incorporating with your pike blocks or fielding as a standalone unit.

