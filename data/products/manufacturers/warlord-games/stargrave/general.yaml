  imageUrl: https://cdn.shopify.com/s/files/1/0255/0949/4864/files/img19256.webp?v=1749127148
  description: |-
    A horrific fusion of dead flesh and advanced cybernetics, automatons are drones in thrall to a synthetic intelligence. Though individually modified with a variety of implants, weapons, and armour, all automatons are driven by an unrelenting core directive to consume and integrate technology and organic matter alike.

    This boxed set offers enough parts to build 20 cyborg monstrosities for Stargrave that can be used to menace independent crews. These parts can also be combined with components from other Stargrave boxed sets to create characters with cybernetic implants or to add even more variety to an automaton horde.

    *Models supplied unassembled and unpainted*
