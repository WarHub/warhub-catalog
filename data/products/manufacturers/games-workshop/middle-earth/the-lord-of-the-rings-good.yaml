  description: |-
    The twin sons of Elrond and Celebrían, Elladan and Elrohir are every bit as skilled in combat as their father. The twins often rode alongside Aragorn in his youth, forging a strong bond with the future king through their battles with the Haradrim and Orcs. Whilst most Elves played little part in the War of The Ring, Elladan and Elrohir joined Aragorn as he ventured into the paths of the Dead and even followed him to the Pelennor and the Black Gate. Together, the brothers are a deadly foe, fighting with a whirl of flashing steel and the precision of the Elven lords of old.

    These inseparable Elven brothers are powerful Heroes from the Rivendell army list. Able to ride to battle on horseback or fight on foot, the twins fights as one, wielding their pairs of finely crafted Elven swords like a whirlwind of blades to hew any who would stand against them.

