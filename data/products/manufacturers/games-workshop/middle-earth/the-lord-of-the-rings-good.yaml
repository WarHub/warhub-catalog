  sku: 99061464196
  ean: 5011921133093
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Citadel-Guard-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464196_MECitadelGuard01.jpg
  status: current
  description: |-
    The Citadel Guard were founded from the most elite warriors Gondor had to offer. Sworn to obey none but the king of Gondor, the Citadel Guard will obey his commands until released from their oath either by their lord or by death. In the absence of the true king, their commands are given by the Steward of Gondor.

    As the elite soldiery of Gondor, the Citadel Guard are among the best fighters in the Minas Tirith army list. Each is a clad in the finest armour and equally skilled with sword, spear and bow.

    This set contains 6 Citadel Guard metal miniatures – 3 armed with spear and 3 with longbow– each supplied with a Citadel 25mm Round Base.

    Rules for these Warriors can be found in the Armies of *The Lord of the Rings*™.
- name: Personalities of the Shire™ – Will Whitfoot and Baldo Tulpenny
  productCode: prod4270150-99851461001
  sku: 99851461001
  productType: single_kit
  priceGbp: 16.5
  url: https://www.warhammer.com/en-GB/shop/Will-Whitfoot-And-Baldo-Tulpenny-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551461001_MEWillWhitfootBaldoTulpenny01.jpg
  status: current
  description: |-
    Plump and portly, Will Whitfoot was a jolly Hobbit who had held the post of mayor of Hobbiton for many years prior to the arrival of the big-folk. Meanwhile, there are few, if any, Hobbits who can claim to throw a stone as well as Baldo Tulpenny; his stone-throwing achievements at the Buckleberry games are legendary in the Shire.

    It may look like a walking cane but mayor Whitfoot isn't scared to use it to strike anyone who threatens the Shire. Baldo prefers to keep his distance, flinging stones to scare off interlopers. He also carries a length of rope for tying up any Ruffians that he knocks out with his well-aimed projectiles.

    This highly detailed multipart resin kit builds one Will Whitfoot and one Baldo Tulpenny and is supplied with two 25mm Citadel round bases.
