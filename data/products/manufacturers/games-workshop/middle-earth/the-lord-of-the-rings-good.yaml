  status: current
  description: |-
    One of the Istari, Gandalf has been sent to Middle-earth to see to the fall of Sauron once and for all, although he is there to guide the peoples of Middle-earth rather than to accomplish it himself. Over the years, Gandalf has become very fond of the Shire and the Hobbits who reside there, seeing them for the remarkable creatures they truly are. After discovering the Ring in the Shire, Gandalf sets about formulating a plan to see it destroyed, and the Evil of Sauron finally defeated.

    On the battlefield, Gandalf the Grey can utilise a number of useful Magical Powers. He is also an incredibly versatile Hero, with the choice of a horse and a unique mount in the form of his cart.

    **Contains three miniatures:**

    - Gandalf the Grey on foot (a metal miniature supplied with a Citadel 25mm Round Base)
    - Gandalf the Grey on horse (a metal miniature, supplied with a Citadel 40mm Round Base)
    - Gandalf the Grey on cart (a resin miniature, supplied with a Citadel 60mm Round Base)

    Rules for all three Gandalf the Grey miniatures can be found in the Armies of The Lord of the Rings™ and the Scouring of the Shire.
- name: Army of the Dead Banner Bearer
  productCode: prod4210151-99061466045
  sku: 99061466045
  productType: single_kit
  priceGbp: 15
  url: https://www.warhammer.com/en-GB/shop/Army-of-the-Dead-Banner-Bearer-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061466045_ArmyoftheDeadBannerBearer01.jpg
  status: current
  description: |-
    Those who broke the oath made to Isildur suffered from a terrible curse. Over the centuries of the Third Age their bodies decayed and slowly turned to dust. Yet they did not rest, instead becoming spectral forms of their former selves. Although their weapons have long since lost their edge, the armour of mortal beings holds no defence against them. A grim fate awaits any who stray into the realm of the dead, unless they should happen to be Isildur’s heir.

    Warriors of the Dead are formidable adversaries, able to cut down even the most heavily armoured foes… providing they win the Fight. Adding a banner bearer to your Army of the Dead will help you win those all-important Duel rolls.

    Contains one metal miniature – a Warrior of the Dead equipped with a banner, supplied with a Citadel 25mm Base. The model's rules can be found in Armies of *The Lord of The Rings*™.
- name: Warriors of the Fiefdoms
  productCode: prod4210148-99061464188
  sku: 99061464188
  ean: 5011921022748
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Warriors-of-the-Fiefdoms-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464188_WarriorsOfTheFiefdoms01.jpg
  status: current
  description: |-
    The stoic Axemen of Lossarnach wield broad-bladed axes instead of more conventional weapons. Although this seems strange to other warriors, it is believed this custom originates from when the first lord of Lossarnach wielded the same weapon in defence of his liege. By contrast, the Clansmen who hail from the foothills of the White Mountains are a brave and reckless people. Their ferocity makes them deadly skirmishers who can cause havoc amongst enemy lines with their long broadswords.

    Axemen of Lossarnach serve as excellent warriors to populate or reinforce a Fiefdoms battle line, while Clansmen of Lamedon are skilled fighters whose courage can be relied upon to hold even in the absence of a nearby Hero.

    Contains six metal miniatures – three Axemen of Lossarnach and three Clansmen of Lamedon, supplied with 6 Citadel 25mm Bases.
- name: Éowyn & Merry
  productCode: prod4170200-99121499042
  sku: 99121499042
  ean: 5011921118984
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Eowyn-and-Merry-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499042_EowynandMerry01.jpg
  status: current
  description: |-
    Éowyn is a valiant shield maiden of Rohan and niece to King Théoden. Unwilling to be left behind while the menfolk rode to war, she disguised herself as a Rider of Rohan, calling herself Dernhelm. Along with her plucky Hobbit friend, Meriadoc Brandybuck, she travelled with Théoden’s army in secret and fought with incredible valour at the Battle of Pelennor Fields.

    This multipart plastic kit contains the components necessary to assemble Éowyn and Merry, both on foot and mounted on horseback. When mounted, you have the option to remove Merry, leaving just Éowyn. On foot, Éowyn carries a sword and shield, but also bears a throwing spear when mounted. Merry is clothed in the uniform of a Squire of Rohan and also bears a sword and shield. Both versions of Éowyn can be assembled with either a head that features her flowing golden hair, or with a full helm in her guise as Dernhelm.

    These miniatures come as 23 components, and are supplied with 2 Citadel 25mm Round bases and a Citadel 40mm Round base.
- name: Gandalf™ the White and Peregrin Took™
  productCode: prod4070163-99121499037
  sku: 99121499037
  ean: 5011921111312
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Gandalf-The-White-and-Peregrin-Took-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99221499015_GandalfandPeregrinTook01.jpg
  status: current
  description: |-
    Following his victory over the Balrog, Gandalf returned to Middle-earth to see his task completed. Stripping Saruman of his power as Lord of the Istari, Gandalf is now a more powerful Wizard than ever. During the battle for Minas Tirith, it is Gandalf who rallies Gondor’s armies, inspiring them to hold back the Orc invaders.

    This multipart plastic kit contains the components necessary to assemble Gandalf the White and Peregrin Took, both on foot and mounted on Shadowfax. When mounted, you have the option to remove Peregrin Took, leaving just Gandalf on Shadowfax. On foot, Gandalf wields Glamdring and his wizard’s staff, while Peregrin Took is clothed in the uniform of the Citadel Guard of Minas Tirith with his helmet in his left hand.

    These miniatures come as 14 components, and are supplied with 2 Citadel 25mm Round bases and a Citadel 40mm Round base.
- name: Théoden™, King of Rohan™
  productCode: prod4070159-99121464027
  sku: 99121464027
  ean: 5011921111305
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 23.5
  url: https://www.warhammer.com/en-GB/shop/Theoden-King-Of-Rohan-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464027_TheodenKingofRohan01.jpg
  status: current
  description: |-
    Although the Wizard Saruman had poisoned his mind, Théoden was ultimately freed by Gandalf. Upon hearing Gondor’s call for aid, Théoden rallies his forces to prepare for war and rides to the Pelennor in defence of their allies. Although the battle will ultimately claim his life, the deeds done upon the Pelennor will become the stuff of legend – perhaps even rivalling those achieved by Théoden’s forebears.

    Théoden, King of Rohan on Foot and Horseback is a multipart plastic kit supplied as 2 models, 1 on foot and 1 mounted and charging. Both models feature options for a helmeted or unhelmeted head, and both are clad in heavy armour, and armed with his sword, Herugrim. On foot, Théoden holds a shield; mounted, that shield is stowed.

    This kit comes as 22 components, and is supplied with 1 Citadel 40mm Round base and 1 Citadel 25mm Round base.
- name: Denethor and Irolas
  productCode: prod4050156-99851464005
  sku: 99851464005
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/Denethor-and-Irolas-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464005_DenethorandIrolas01.jpg
  status: current
  description: |-
    Although he was once a great man and has ruled Gondor for many years, Denethor’s mind has been shattered by the loss of his beloved son Boromir. In the face of endless war, and with Sauron’s dread legions upon his own doorstep, Denethor abandons all reason and opts to join the heathen kings of old, attempting to burn himself and Faramir atop a pyre.

    Irolas is a Captain of the Citadel Guard who defended the uppermost level of the White City and guarded the Warden himself. When Faramir was returned wounded to the city, Irolas was among those who watched over the Warden's son.

    This set contains two resin miniatures in three parts representing Denethor and Irolas. Denethor is draped in heavy, ornate robes and carries a flaming torch as he hurries to set his son's pyre ablaze. Irolas is armoured as a Citadel Guard, with heavy plate and a long cloak. He is holding his helmet in one hand and the other grips the hilt of his sword.
- name: Ent™
  productCode: prod3960126-99121499038
  sku: 99121499038
  ean: 5011921112579
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Ent-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499020_EntNEW01.jpg
  status: current
  description: |-
    The Ents are the tree Shepherds of Fangorn Forest. They are slow to anger but once roused to action they can be nigh on unstoppable, their thick bark hides and long reaches making them formidable foes on the battlefield.

    This box set contains 1 multipart plastic Ent, including 2 head variants and a host of additional components - no 2 Ents in your army need ever be the same. Model supplied with a 60mm round base.
- name: Warriors of the Last Alliance
  productCode: prod3940212-99121499036
  sku: 99121499036
  ean: 5011921110629
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Warriors-Of-The-Last-Alliance-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499036_WarriorsofLastAlliance.jpg
  status: current
  description: |-
    At the end of the Second Age, the great King Elendil led the men of Númenor against the Dark Lord Sauron. At his side was Gil-galad, the High King of the Elves, and his greatest ally. Over many years they retook the lands that once belonged to Men and Elves and pushed back the ravening hordes of Mordor. When the Dark Lord finally struck back, his first blow fell against Gondor. Thus began the wars of the Last Alliance, when Men and Elves fought as one against the darkness of Mordor.

    This plastic boxed set contains 32 components, with which to build 16 Elves of the Last Alliance: 8 with bow, and 8 with Elven blade; and 8 Men of Númenor with sword and shield. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Fellowship Of The Ring
  productCode: prod3940209-99121499033
  sku: 99121499033
  ean: 5011921109227
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Fellowship-Of-The-Ring-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499028_TheFellowshipoftheRingPlasticNEW01.jpg
  status: current
  description: |-
    It was in Rivendell that Frodo made the decision to carry the Ring to Mordor and cast it into the fires of Mount Doom, thus ending its power forever. With him went eight companions, and collectively they were known as The Fellowship of the Ring.

    This multipart plastic The Fellowship of the Ring set contains nine wonderfully sculpted plastic figures - Gandalf the Grey, Aragorn, Legolas, Gimli, Boromir and the Hobbits, Frodo, Sam, Merry and Pippin - as well as one Ring Priority Marker. Each of these miniatures stand ready for combat - with swords, axe, staff and even a sturdy frying pan in hand and ready to strike the enemy. Garbed in an array of items, from elegant, flowing cloaks to sturdy chainmail, these incredibly dynamic The Fellowship of the Ring models will make an excellent addition to any The Lord of the Rings collection.

    This multipart plastic box set contains 13 components and ten 25mm Round Bases with which to make The Fellowship of the Ring as well as one Ring Priority Marker.

    These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Warriors of the Dead
  productCode: prod3940206-99121466011
  sku: 99121466011
  ean: 5011921109258
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Warriors-Of-The-Dead-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121466011_WarriorsoftheDead01.jpg
  status: current
  description: |-
    In scattered and isolated places across Middle-earth, the dead walk, ever bound to this world by sorcery or curse. Almost all undying beings are bound into the service of Sauron, he who forged their deathless existence. By contrast, the spirit-folk of the Dwimorberg are tied to an altogether different fate. When Elendil marched against Sauron, his son, Isildur, came to the Dwimorberg and obtained an oath-sworn promise of aid against the forces of Mordor from the people that lived there. Yet when Isildur called upon the people of the mountains to fight, they scattered and fled, entombing themselves in their fortress rather than fighting in fulfilment of their promise. In rage at their betrayer, Isildur cursed them to wander the hills for all eternity until their oath was met. To this day, their oath has yet to be fulfilled...

    This plastic boxed set contains 50 components, with which to build 20 Warriors of the Dead: 14 with hand weapon, and 6 with spear. This set comes with 20 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Dwarf Rangers
  productCode: prod3940202-99121465008
  sku: 99121465008
  ean: 5011921110612
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Dwarf-Rangers-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121465008_DwarfRangers.jpg
  status: current
  description: |-
    While many Dwarves live within the safety of great mountain halls, there are some that prefer the wandering life - those who will gladly sleep under an open sky rather than a rocky ceiling. These warriors are known as Rangers, and they will patrol the lands around every Dwarf Hold, ensuring the safety of their kin from the Dark Lord's servants and wandering monsters. While less-heavily armoured than they warrior brothers (but only just), they carry a formidable array of weapons into battle, which often includes a healthy selection of very sharp throwing axes.

    This plastic boxed set contains 24 components, with which to build 24 Dwarf Rangers: 8 with bow, 8 with two-handed weapon, and 8 with two hand weapons. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Dwarf Warriors
  productCode: prod3940201-99121465007
  sku: 99121465007
  ean: 5011921110605
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Dwarf-Warriors-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121465007_DwarfWarriors01.jpg
  status: current
  description: |-
    The Dwarfs of Erebor are hardy and fierce, tempered by years of war against the Easterlings and Khandish and their constant strivings against the Orcs from Mordor and the Goblins that infest Middle-earth. Dwarves are trained to fight in their youth, taking to the field of battle in kinbands next to wise veterans, who impart expertise gained through constant combat. This training creates skilful soldiers and a fighting spirit as strong as the mail that protects them. The sharp axes of the Dwarves and their stubborn courage are rightly feared among the servants of evil.

    This plastic boxed set contains 32 components, with which to build 24 Dwarf Warriors: 8 with bow, 8 with 2-handed weapon, and 8 with hand weapon and shield. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Knights Of Dol Amroth™
  productCode: prod3940200-99121464026
  sku: 99121464026
  ean: 5011921110599
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Knights-Of-Dol-amroth-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464005_KnightsofDolAmrothMountedNEW01.jpg
  status: current
  description: |-
    The tall Swan Knights of Dol Amroth are the very elite of the warriors of Gondor, fair and stern of aspect and peerless upon the field of battle. Where the Swan Knights of Dol Amroth ride, hope is reborn and victory is torn from the darkness of defeat.

    This box set contains six plastic Knights of Dol Amroth. This 39-piece set includes: five different head designs, five variations of lance arm, three designs of shield, three variations of horse, a banner with sculpted detailing and a trumpet arm. Models supplied with 40mm round bases.
- name: Rangers of Middle-earth™
  productCode: prod3940196-99121464022
  sku: 99121464022
  ean: 5011921110049
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Rangers-Of-Middle-earth-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464022_RangersofMiddleEarth.jpg
  status: current
  description: |-
    There are many Rangers in Middle-earth, from the Rangers of Arnor in the north, to the Rangers of Gondor in the south. The Rangers of Arnor are grim of face and worn as weathered rocks, having fought against the legions of the Witch King for many years. After the fall of Fornost, these Rangers took to patrolling the lands of Eriador, holding the servants of Sauron at bay wherever they could, and protecting the free people of Middle-earth.

    Meanwhile, far to the south, the finest warriors of Minas Tirith are recruited into the Ranger cadres that patrol the borders of Ithilien - a steep and heavily forested region that is no place for shieldwalls and charging knights. As such, the skills of a Ranger are that of forestcraft and archery, the ability to stalk prey without sound before striking with uncanny precision. With surprise on their side a dozen Rangers can slaughter a much more numerous foe.

    This plastic boxed set contains 26 components, with which to build 24 Rangers of Middle-earth: 8 with bow, 8 with sword, and 8 with spear. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Knights of Minas Tirith™
  productCode: prod3940189-99121464015
  sku: 99121464015
  ean: 5011921107711
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Knights-Of-Minas-Tirith-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464002_KnightsofMinasTirithNEW01.jpg
  status: current
  description: |-
    Those warriors who excel in riding a horse will join the Knights of Minas Tirith. Tall and stern, these knights are truly the pride of Gondor's armies. It is often the knights who lead the charge against Gondor's enemies, leaving the broken remnants of enemy formations in their wake.

    This box set contains 6 plastic Knights of Minas Tirith in 30 components, armed with lances and shields. Models supplied with 40mm round bases.
- name: Galadhrim™ Warriors
  productCode: prod3940187-99121463009
  sku: 99121463009
  ean: 5011921110643
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Galadhrim-Warriors-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121463009_GaladhrimWarriors01.jpg
  status: current
  description: |-
    Though the armies of the Elven Kingdoms seldom march to open war, they guard many of Middle-earth's chief havens, and shield many lands that would have no hope of protecting themselves. Amongst this glittering host are the armies of Lothlórien, who only march to war in the very direst of circumstances. These Elves, known as the Galadhrim, are some of the finest warriors in all of Middle-earth. Equipped with finely crafted Elven bows, and well-balanced glaives, they are exceptional fighters that have held back the forces of darkness for many centuries.

    This plastic boxed set contains 70 components, with which to build 24 Galadhrim Warriors: 8 with bow, 8 with Elven blade, and 8 with spear and shield. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: LOTHLÓRIEN™ Wood Elf Warriors
  productCode: prod3940186-99121463008
  sku: 99121463008
  ean: 5011921110636
  eanSource: shopify:goblingaming.co.uk
