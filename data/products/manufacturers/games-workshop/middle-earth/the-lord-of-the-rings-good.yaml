  status: current
  description: |-
    The Dwarven commanders of Khazad-dûm are veterans of many battles, each having proven themselves as doughty warriors on the battlefield many times over. Typically, these captains will lead their kinbands in times of war, for they command great respect from their followers.

    This metal kit builds a captain, banner bearer, and warrior with war horn for your Kingdom of Khazad-dûm armies in the Middle-earth Strategy Battle Game. They're ideal for bolstering your force, making them even more resolute, and inspiring them to victory.

    This kit comprises 3 metal components, and 3x Citadel 25mm Round Slotta Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using Khazad-dûm Dwarven Commanders in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, which is available separately.
- name: Rohan™ House
  productCode: P-202002-99121499063
  sku: 99121499063
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/rohan-house-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499063_MERohanHouseTerrain01.jpg
  status: current
  description: |-
    Rohan has seen much war and turmoil in its relatively brief history, but more recently, many of its settlements have been coming under attack by roving war parties of Uruk-hai and vengeful Dunlendings.

    This multipart plastic kit builds one Rohan House, a scenery piece for your Middle-earth Strategy Battle Game board. The versatile kit offers a number of assembly options with double-sided house walls, each with different details, and a choice of decorations for the timber roof lintels. There are three porch options, and the kit also includes a number of fences, barrels, and ropes for you to further decorate your house.

    This kit contains 80 plastic components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    This kit is also available in The War of the Rohirrim – Battle of Edoras boxed set.
- name: Rohan™ Watchtower & Palisades
  productCode: P-201907-99121499064
  sku: 99121499064
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/rohan-watchtower-and-palisades-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499064_MERohanWatchtowerPalisadesTerrain01.jpg
  status: current
  description: |-
    Rohan has seen much war and turmoil in its relatively brief history, and many watchtowers and small forts have been erected across the Riddermark to warn and protect its people from attack.

    This multipart plastic kit builds a Rohan Watchtower and four Palisade Walls to use as scenery on your Middle-earth Strategy Battle Game board. The lofty watchtower includes a warning bell with which defenders can sound the alarm, and is proudly adorned with the horse-head icons of Rohan. Each palisade includes a walkway that is 25mm wide to accommodate archers or fighters manning the walls. The palisade gate can be assembled to open or close freely, and can hold a removable crossbeam with which the defenders can lock the gate. This kit also includes four ladders to reach the palisades, of which two can be connected to make a taller ladder for infantry to reach the watchtower.

    This kit contains 100 plastic components. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Rohan™ Stronghold
  productCode: P-201901-99121499060
  sku: 99121499060
  ean: 5011921230235
