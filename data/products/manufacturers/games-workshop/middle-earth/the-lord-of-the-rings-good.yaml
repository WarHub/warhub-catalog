  productCode: P-198709-99121464036
  sku: 99121464036
  ean: 5011921244959
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/warriors-of-rohan-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464036_WarriorsRohan1.jpg
  status: current
  description: |-
    In times of war, the warriors of Rohan will take up arms to protect their homes and villages against any who would seek to invade their lands. When the armies of the hill tribes gather outside Edoras, these hardy warriors stand defiant, felling Hill Tribesmen with sword, axe, bow, and spear.

    This multipart plastic kit builds 24 Rohan Warrior infantry, ideal for defending positions while the nimble cavalry attacks. They can be taken by a variety of Good armies, including Kingdom of Rohan, Defenders of Helm's Deep, Army of Edoras, Defenders of the Hornburg, Men of the West, and Realms of Men. They can also be used to represent an Evil Rohirrim Traitor unit. Well equipped and trained, they retain individual character without a formal uniform. Armed with a mix of weapons and gear, eight of them carry a spear and shield, another eight wield a mix of hand weapons and shields, and the last eight hold bows. The shields have a mix of Rohan-themed markings, and are fully interchangeable across the miniatures that can take them.

    This kit contains 182 plastic components and 24x Citadel 25mm Round Bases. These miniatures are supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Eärnur, the Last King of Gondor™
  productCode: P-188915-99851464025
  sku: 99851464025
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/earnur-the-last-king-of-gondor-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851464025_MEEamurTheLastKingOfGondor01.jpg
  status: current
  description: |-
    At the time of Arnor's fall, Eärnur was the heir to the throne of Gondor, and it was he who led the armies of Gondor to the Battle of Fornost. When he eventually became king, the Witch-king challenged Eärnur to enter the city of Minas Morgul to challenge him. Eärnur famously accepted without hesitation, and rode to face this great threat.

    This multipart resin kit builds Eärnur, the Last King of Gondor, both on foot and on horseback. This mighty hero can lead Gondor armies in the Middle-earth Strategy Battle Game. Each of these miniatures is clad in fine heavy armour and carries an elegant shield decorated with the White Tree of Gondor. The mounted model wields a lance, while the on-foot version carries a sword. Both come with a choice of two heads – either helmeted or bare-headed – for you to personalise this mighty leader.

    This kit contains 21 resin components, 1x Citadel 25mm Round Base, and 1x Citadel 40mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectible item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
