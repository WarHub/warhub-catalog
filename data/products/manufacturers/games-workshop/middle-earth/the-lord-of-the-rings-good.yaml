  status: current
  description: |-
    The Swan Knights of Dol Amroth are amongst the most elite warriors that the kingdom of Gondor has to call upon. Brave, noble, and expertly trained in the ways of knightly combat, the Knights of Dol Amroth embody the lineage of Númenor from ages past. They charge fearlessly into the ranks of Sauron’s forces, their bravery rekindling the hope of the Free Peoples of Middle-earth.

    This multipart resin kit builds five Knights of Dol Amroth and one Captain of Dol Amroth, brave soldiers for use in The Fiefdoms, Defenders of the Pelennor, Men of the West, and The Grief of Éomer armies in the Middle-earth Strategy Battle Game. Highly trained and equipped with heavy armour and shields, they are formidable warriors. There are parts to build an optional musician and standard bearer. Three of the Knights and the Captain each have a choice of a bare head or a helmet, and there are nine interchangeable shields of three designs.

