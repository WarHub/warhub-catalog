  ean: 5011921171606
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/dunedain-of-the-north-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99111464212_DunedainNorth1.jpg
  status: current
  description: |-
    The Dúnedain are descendants of the Men of Arnor, and have dwelled in the wild places following the collapse of their ancestors’ kingdom. Seeking out Orcs and those creatures that threaten the safety of others, the Dúnedain keep an ever-watchful eye upon the borders of The Shire.

    This multipart metal kit builds six Dúnedain of the North, heroes who protect the Shire and lead the Rangers of the North in the Middle-earth Strategy Battle Game. Each of these skilled warriors has their own unique pose, and is armed with a bow to take down the forces of Evil at range. Two of these Dúnedain also carry spears.

    This kit contains 6 metal components and 6x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Rangers of the North
  productCode: P-188891-99111464211
  sku: 99111464211
  ean: 5011921171590
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/rangers-of-the-north-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99111464211_RangersoftheNorth1.jpg
  status: current
  description: |-
    The Rangers of the North are descended from the once-noble houses of Arnor, stern Men that patrol the lands around Eriador in order to protect them from Sauron's forces. These brave wanderers answered Aragorn's call to arms, and joined him at the Battle of the Pelennor Fields.

    This multipart metal kit builds six Rangers of the North for use in the Middle-earth Strategy Battle Game. These wandering warriors go into battle clad in thick cloaks, protected by light chainmail armour. Each of the Rangers is armed with a bow and sword, and three also carry spears into battle.

    This kit contains 6 metal components and 6x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Gondor™ Ruins
  productCode: prod5080156-99121499058
  sku: 99121499058
  ean: 5011921197057
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-gondor-ruins-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499051_GondorRuins2.jpg
  status: current
  description: |-
    Gondor was the most prominent kingdom of Men in Middle-earth. This battle-hardened realm was bordered by Mordor to the east, and stood as a bulwark against the shadow for thousands of years. While Minas Tirith was Gondor's capital in the Third Age, Osgiliath stood as its original capital, although the city soon fell into ruin. As the War of the Ring raged throughout Gondor itself, many townships and outposts would follow in its wake.

    This multipart plastic kit builds a set of Gondor Ruins – stone buildings shattered by time or warfare, featuring the elegant masonry of Gondor with ornate knotwork designs, arched windows, and wooden doors braced with iron. The kit creates two separate buildings, each of which can be built as single-storey ruins, or given a second storey over which your warriors can fight and your archers can fire, adding depth, breadth, and height to your battlefield.

    The Gondor Ruins are modular, allowing you to assemble the kit in a variety of ways to create your own scenery, or combine multiple kits to create even more complex ruins.

    This kit comprises 106 plastic components. This scenery is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Frodo Baggins™, Samwise Gamgee™ and Gollum™ in Emyn Muil
  productCode: prod5020146-99061499014
  sku: 99061499014
  ean: 5011921941018
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22
  url: https://www.warhammer.com/en-GB/shop/me-sbg-frodo-sam-and-gollum-in-emyn-muil-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061499014_MEFrodoSamGollumInEmynMuil01.jpg
  status: current
  description: |-
    Frodo Baggins and Samwise Gamgee travel with Sméagol, also known as Gollum, through Emyn Muil – with the fires of Mount Doom set as their eventual destination. The hobbits fight together, while Gollum leaps and climbs around them in order to keep up.

    This unusual trio of models can be added to any The Fellowship army, each acting individually. Frodo is well equipped and surprisingly resilient for his size, while Sam is able to pitch in and help Frodo in a tough scrap. Gollum is agile, and is never considered unarmed in combat. These classic models are a treat for painters, as well, offering the chance to bring the beloved characters to life on your display shelves.

    This kit contains 3 metal models, supplied in 3 components, and 3x 25mm Round Slotta Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.
- name: Boromir™ (Mounted)
  productCode: prod5000383-99061464214
  sku: 99061464214
  ean: 5011921176885
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 15
  url: https://www.warhammer.com/en-GB/shop/boromir-mounted-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464214_MEBoromirMountedLead.jpg
  status: current
  description: |-
    The eldest son of the Steward of Gondor, Boromir is arguably the greatest warrior in the Fellowship. Sent to Rivendell following his father's prophetic visions, Boromir sought to use the Ring as a weapon against Sauron. Desperate to carry out his father's will, Boromir pleaded for the Ring to be allowed to go to Gondor. However, it was this desperation that allowed the ring to poison Boromir's mind and drive him into madness – and thus to his doom.

    If you’re looking for a powerful and mobile leader for your Fellowship army, few can match Boromir blow for blow. This classic model returns to the range, ready to lead the charge against the forces of Evil.

    This metal model kit is comprised of three components, and comes supplied with a 40mm Round base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.
- name: Elendil & Isildur
  productCode: prod5000382-99061464213
  sku: 99061464213
  ean: 5011921176878
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 26
  url: https://www.warhammer.com/en-GB/shop/elendil-and-isildur
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464213_MEElendilIsildurLead.jpg
  status: current
  description: |-
    Arguably the greatest man in the history of Middle-earth, it was Elendil who led the men of Númenor to Eriador following the drowning of Westernesse. A wise and noble king, Elendil was unmatched by Men in battle. Together with his sons, Elendil led his followers in the war of the Last Alliance against Sauron, and following a gruelling battle with the Dark Lord, was slain upon the slopes of Mount Doom. There is no doubt, however, that this act delivered Middle-earth from the hands of the Lord of the Rings.

    History will remember Isildur as the victor of the war of the Last Alliance, for it was he that took up the shards of Narsil and cut the Ring from the hand of Sauron. Alas, the spirit of the Dark Lord was still potent and Isildur was swiftly corrupted by the power of the Ring, refusing to destroy it. The Ring betrayed Isildur to his death, and the will of Sauron was allowed to endure.

    Who better to lead your Númenor army than Elendil, the High King of Gondor, and his son Isildur? Both are powerful warriors who deserve a spot in your front lines. While Elendil excels in duels, Isildur has a model for both an infantry version, and a mounted option, allowing you to better match your army’s fighting style.

    This kit builds three metal models, comprising four components, and supplied with a 1x 40mm Round base, and 2x 25mm Round Slotta bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.
- name: Lords of the Fiefdoms
  productCode: prod4280197-99061464195
  sku: 99061464195
  ean: 5011921133086
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 26
  url: https://www.warhammer.com/en-GB/shop/Lords-Of-The-Fiefdoms-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464195_MELordsofFeifdoms01.jpg
  status: current
  description: |-
    The lord of Lossarnach, Forlong the Fat, is one of the most famous lords in all of the Fiefdoms. Although his name makes light at his immense girth, Forlong is still a fearsome warrior in his own right, possessing an exceptional martial prowess and tactical mind. His massive size also hides an impressive strength, making Forlong easily capable of shattering the shields of his foes and reducing the warrior behind to a pulp.

    Hailing from Lamedon, Angbor is the chief of the clansmen that reside there. A bold, if somewhat reckless leader, Angbor has spent his years fighting to hold the White Mountains against the armies of Orcs sent by Sauron to break his people. Such is the bravery of Angbor, that he has never once fled the field of battle – a quality that Gondor will need in the dark days that lie ahead.

    Duinhir is the lord of Morthond, the Blackroot Vale that lies beneath the shadows of the White Mountains. Through protecting his home from the raids of Orcs and Corsairs, Duinhir’s skill with a bow has become unrivalled in the Fiefdoms of Gondor, a skill which he has passed on to those that reside in Morthond. It is upon the Pelennor that Duinhir’s fate shall be decided, yet whatever the outcome, Duinhir will doubtless ensure that swathes of Orcs will fall before he does.

    These three valiant lords of Gondor's southern realms are at the heart of the Fiefdoms army list. Each is a powerful fighter and can lead a warband of ferocious warriors. Forlong carries a tall spear and a warhorn with which to inspire the warriors under his command; Angbor bears the iconic broadsword of his clan; Dunihir bears a sword, spear and bow, with which he is arguably Gondor's deadliest shot.

    This set contains three metal miniatures – Forlong the Fat, Angbor the Fearless, and Duinhir– each supplied with a Citadel 25mm Round Base.
