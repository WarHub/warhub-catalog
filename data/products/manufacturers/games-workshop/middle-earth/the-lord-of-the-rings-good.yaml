    Those who captain the forces of Rohan are the headsmen of her villages and the lords of the noble houses of Rohan. Accomplished fighters, these captains are used to fighting marauding Orcs and the Wildmen of Dunland in defence of their homes and kinsmen. Like all Rohirrim, they are experts atop a steed, able to strike down many foes from the back of a horse.

    These commanders offer your Rohirrim a variety of powerful options, whether you choose to field them mounted or on foot – the fighting skill and leadership of a Captain and the inspirational effects of a Banner Bearer.

    The set contains 4 metal miniatures – a Captain on foot and mounted, and a Banner Bearer on foot and mounted – as well as two plastic horses. The models come supplied with two Citadel 40mm Round Bases and two Citadel 25mm Round Bases. Their rules can be found in Armies of *The Lord of The Rings™*.
- name: Defenders of Helm's Deep™
  productCode: prod4320143-99851464011
  sku: 99851464011
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/The-Defenders-Of-Helms-Deep-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464011_DefendersofHelmsDeep01.jpg
  status: current
  description: |-
    As the armies of Isengard bear down upon Helm's Deep, all those who can wield a sword are called to its defence – even those who would normally be deemed too young to fight. Amongst these is Haleth, the young son of Hama. Haleth has never seen combat, yet he possesses the makings of a true warrior, one who could rise through the ranks of the Rohirrim should he survive the battle of the Hornburg. Even as he fights, Haleth remembers the words of encouragement spoken to him by Aragorn, spurring him on to deeds far beyond expectation.

    An ageing man of Rohan, Aldor has lived within the safety of Edoras since before the crowning of Théoden as king. When the fires of Isengard began to spread and threatened those within Edoras, Aldor had no choice but to join his people and journey to the sanctuary of Helm's Deep. However, as the armies of Isengard bear down upon the Hornburg, Aldor must take up a bow in defence of his people. His ageing frame cannot hold a bow steady for long, and it often means he will end up losing his bow before called upon – whether intentionally or not!

    Haleth and Aldor are two of the unlikeliest Heroes of the Rohan army list, yet the inspirational effect of Haleth's valour in battle and Aldor's skill (or some might say luck) with a bow is not to be underestimated!

    The set contains two resin miniatures, each supplied with a Citadel 25mm Round Base.
