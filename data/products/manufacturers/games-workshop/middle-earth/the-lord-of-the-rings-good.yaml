  productCode: P-188900-99061463054
  sku: 99061463054
  productType: single_kit
  priceGbp: 15.5
  url: https://www.warhammer.com/en-GB/shop/cirdan-and-erestor-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061463054_CirdanErestor2.jpg
  status: current
  description: |-
    Círdan is very old, even by the standards of the Elves, his life stretching back to before the First Age of Middle-earth. This venerable Elf is now in charge of the ships of the Grey Havens. Erestor is an Elf of Rivendell and the trusted chief advisor to Elrond. He uses a pair of ancient daggers in the swirling melee of combat.

    This multipart metal kit builds Círdan and Erestor, a pair of Elven heroes who fight for Rivendell armies in the Middle-earth Strategy Battle Game. Círdan wears simple robes and adds magical mastery to your army, while Erestor is clad in elegant heavy armour and wields twin Noldorin daggers, making him a force to be reckoned with in combat.

    This kit contains 2 metal components and 2x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
