    Gondor was the most prominent kingdom of Men in Middle-earth. This battle-hardened realm was bordered by Mordor to the east, and stood as a bulwark against the shadow for thousands of years. While Minas Tirith was Gondor's capital in the Third Age, Osgiliath stood as its original capital, although the city would soon fall into ruin. As the War of the Ring raged throughout Gondor itself, many townships and outposts would follow in its wake.

    This multipart plastic kit builds a Gondor Mansion – a grand construction that showcases the kingdom's masonry skills, with wooden doors reinforced by iron and small details such as stunning filigree adorning the balcony’s bannister. Its archways have been designed with miniatures in mind, allowing infantry models to move through them and fight easily, while those with larger bases, such as monsters or cavalry, cannot pass through. The mansion's roof is designed to be assembled without glue, allowing you to remove it and battle in its interior during gameplay.

    The Gondor Mansion is modular, allowing you to assemble the kit in a variety of ways to create your own scenery, or combine multiple kits to create an even larger building or estate. This kit comprises 188 plastic components. This scenery is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
