  status: current
  description: |-
    "In a hole in the ground there lived a hobbit…"

    Some call these homes “smials”, but most folks in Middle-earth simply call them Hobbit-holes. They're small, as are the inhabitants, and likewise full of good food and drink. Hobbits love the comforts in life, and their hearths rarely run cold, nor their larders empty. During the period known as the Scouring of the Shire, however, these peaceful sanctuaries became the backdrop of cruel war and destruction.

    Build your very own Hobbit-hole with a unique terrain kit. Apply these finely detailed resin pieces to your own foam hill to create a lovely home to protect – or destroy. You’ll find a double-sided front piece, both sides featuring a round door and window, as well as 2 different chimney stacks and 2 windows to hint at the contents and size of the interior space.

    Each kit is supplied in 5 pieces.
- name: Frodo Baggins™, Samwise Gamgee™ & Gollum™
  productCode: prod4570176-99061499078
  sku: 99061499078
  ean: 5011921153800
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22
  url: https://www.warhammer.com/en-GB/shop/Frodo-Baggins-Samwise-Gamgee-and-Gollum-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061499078_MEFrodoBagginsSamwiseGamgeeandGollumLead.jpg
  status: current
  description: |-
    After the Ring is passed to him by his uncle, Bilbo, Frodo sets out on the perilous journey to deliver it to Rivendell – only to find himself undertaking the gigantic task of taking the Ring to Mordor, and the fires of Mount Doom. Whilst certainly not a fearsome warrior, Frodo more than shows his worth, proving that the smallest creatures can indeed charge the course of history.

    Before setting out with The Fellowship, Sam had been a gardener and was happily content with his simple life. However, when the time called for it, Sam proved himself to be fiercely loyal to Frodo, overcoming seemingly insurmountable odds to help his companion in his struggle with the Ring. In fact, without Sam, it is likely that Frodo would not have got very far at all…

    The twisted creature known as Gollum has two very distinct sides to his personality, each constantly at war with the other within the creature's mind. However, the kindness and faith Frodo shows to him allows Sméagol to eclipse the vile Gollum and become seemingly trustworthy – for a time at least…

    Three of the most pivotal characters in the journey of the One Ring to Mordor, the actions of Frodo, Sam and Sméagol ruled the fate of many. This trio of miniatures depicts them near the end of Frodo’s quest, when exhaustion and the mental weight of such a burden have begun to take their toll.

    The set contains three metal miniatures, each supplied with a Citadel 25mm Round Base. Their rules can be found in the Armies of *The Lord of the Rings*™.
