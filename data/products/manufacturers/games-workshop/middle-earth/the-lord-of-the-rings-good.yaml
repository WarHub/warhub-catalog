    Gondor has been ruled by many great kings since its founding by Elendil during the Second Age. Although its stewards rule Gondor in the Third Age, these kings once led the great realm against the forces of Mordor. Many of these rulers met a warrior’s death, standing firm against Sauron’s minions upon the field of battle.

    This multipart metal set builds four distinct Kings of Men, each wearing intricate crowns and royal finery and wielding a fine sword. They can be taken by any Minas Tirith army in the Middle-earth Strategy Battle Game to represent a force of old, commanded by past kings and stewards of Gondor to protect the realms of men.

    This kit contains 4 metal components and 4x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
