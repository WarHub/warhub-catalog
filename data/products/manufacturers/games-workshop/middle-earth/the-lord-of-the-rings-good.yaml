  description: |-
    Gondor was the most prominent kingdom of Men in Middle-earth. This battle-hardened realm was bordered by Mordor to the east, and stood as a bulwark against the shadow for thousands of years. While Minas Tirith was Gondor's capital in the Third Age, Osgiliath stood as its original capital, although the city would soon fall into ruin. As the War of the Ring raged throughout Gondor itself, many townships and outposts would follow in its wake.

    This multipart plastic kit builds a Gondor Tower – a mighty spire of wrought stone, with wooden doors reinforced by iron. This tower stands roughly 12 inches tall, and can be built with one, two, or three doors. You can assemble the top of the tower in ruins – as though destroyed by a catapult or crumbled by time – with additional ruins to arrange at its base. Alternatively, you can build the tower with an intact domed roof, which is designed to be assembled without glue, allowing you to remove it and battle in its interior during gameplay. Either way, the detailed rooftop has ample room to place your miniatures inside.

    This kit comprises 54 plastic components. This scenery is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
