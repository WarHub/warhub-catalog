  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Wood-Elf-Warriors-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121463008_WoodElfWarriors.jpg
  status: current
  description: |-
    Though the armies of the Elven Kingdoms seldom march to open war, they guard many of Middle-earth's chief havens, and shield many lands that would have no hope of protecting themselves. Amongst this host are the Wood Elves of Mirkwood - a once great forest that has since fallen under the shadow of the Dark Lord Sauron. Those Elves that still live there are hardy but dour folk, who will defend their borders against attack, but will rarely leap to the aid of other races. Over the centuries, almost all Wood Elves have been called to fight at some time or another, using their deadly skills with bow, spear and blade in the defence of their homes.

    This plastic boxed set contains 24 components, with which to build 24 Wood Elf Warriors: 8 with bow, 8 with Elven blade, and 8 with spear. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Hobbit™ Militia
  productCode: prod1500444a-99061461010
  sku: 99061461010
  ean: 5011921919680
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 12
  url: https://www.warhammer.com/en-GB/shop/Hobbit-Militia
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061461010_HobbitMilitiaNEW01.jpg
  status: current
  description: |-
    The average Hobbit has literally no fighting ability whatsoever: The folk are peaceful and shun all adventure and dangerous living. Their peaceful nature should not be confused for inability to take up arms, however, for it is the combined strength of these good peaceful folk that drives the bullies off at the Battle of Bywater.

    This set contains a Hobbit Militia - 4 metal Hobbit miniatures, 2 armed with axes, 1 with a dagger and 1 with a hammer. Supplied with 4 25mm round bases.
- name: Elrond™ and Gil-galad
  productCode: prod1500405a-99801463001
  sku: 99801463001
  ean: 5011921023967
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Elrond-and-Gil-Galad
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801463001_ElrondGilGaladNEW01.jpg
  status: current
  description: |-
    Elrond is old even amongst the immortal Elves, having fought against Sauron in an earlier age and seen the Ring taken by Isildur before it was lost. He is the master of Rivendell with the power to command whole armies of Elven warriors. He is a highly competent warrior and a skilled spell caster, both of which make him a formidable adversary.

    Gil-galad was the mightiest warrior of his age and the leader of the Elves in the Last Alliance of Men and Elves against Sauron. He fell in that battle, but thanks to his sacrifice Sauron was defeated though not, alas, destroyed.

    This pack contains Elrond and Gil-galad. These models are finely detailed resin cast miniatures. They are supplied as two separate components, and come with two 25mm Round Bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Super Glue and Citadel Paints.
- name: Arwen™ Foot and Mounted
  productCode: prod1500398a-99061463022
  sku: 99061463022
  ean: 5011921914616
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22
  url: https://www.warhammer.com/en-GB/shop/Arwen-Foot-and-Mounted
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061463022_ArwenFootandMountedNEW01.jpg
  status: current
  description: |-
    The daughter of Lord Elrond, Arwen is destined to sail to the Undying Lands and live out her immortal life there. However, her love for Aragorn leads her towards a different fate, one where she must forsake the immortal life of her people and choose the mortal life of the race of Men. As the Third Age dwindles, Arwen must make her choice whether to sail into the west and live, or stay with one whom she loves and perish.

    This set contains 2 metal miniatures in 3 components representing Arwen - 1 on foot and 1 mounted. Supplied with a 40mm round base for the mounted model, and a 25mm round base for the model on foot.
- name: Rider of the Dead
  productCode: prod1500374a-99061466032
  sku: 99061466032
  ean: 5011921904051
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 12
  url: https://www.warhammer.com/en-GB/shop/Rider-of-the-Dead
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061466032_RideroftheDeadNEW01.jpg
  status: current
  description: |-
    Just as they were the vanguard of the army in life, these oath breakers ride ghostly steeds into battle. These dread apparitions are enough to chill the souls of their enemies and cause utter panic and disarray within the ranks of those they charge. Those who stand firm will be met by the Riders’ deadly spectral blades, weapons that care not for armour or mail.

    This set contains 1 Rider of the Dead from a random selection of 2, supplied with a 40mm round base.
- name: Aragorn (The Black Gate)
  productCode: prod1500325a-99801464006
  sku: 99801464006
  ean: 5011921024094
  eanSource: shopify:goblingaming.co.uk
