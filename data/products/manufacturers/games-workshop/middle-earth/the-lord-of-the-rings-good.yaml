  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Aragorn-The-Black-Gate
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801464006_AragornTheBlackGateNEW01.jpg
  status: current
  description: |-
    The King of Gondor has returned to his people after many centuries, but Aragorn must leave Minas Tirith immediately on a desperate mission to attack Mordor itself. Not many know that this is a willing sacrifice that Aragron makes, as he attempts to distract Sauron and his armies from the two Hobbits that are slowly and painfully making their way towards Mount Doom and the destruction of the Ring. Now clad in the armour and heraldry of the King of Gondor, and armed with the sword, Andúril, Flame of the West, Aragorn is a truly mighty hero of Middle-earth, and one that will fight to the death for his people and his friends.

    This pack contains 2 miniatures - Aragorn on foot, and riding a horse. These models are resin cast miniatures. They are supplied as 5 separate components, and come with 1 25mm round base and 1 40mm round base.
- name: Foot Knights of Dol Amroth™
  productCode: P-236864-99861464032
  sku: 99861464032
