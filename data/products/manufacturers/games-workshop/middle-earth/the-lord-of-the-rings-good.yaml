  ean: 5011921238569
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/kings-of-men-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464237_KingsofMen1.jpg
