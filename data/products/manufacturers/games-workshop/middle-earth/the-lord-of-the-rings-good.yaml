    Although he has forever lived in his brother's shadow, Faramir is still a capable captain in his own right. In fact, it is Faramir that commands the defence of Osgiliath following his brother's departure for Rivendell, and it was in Osgiliath where Faramir truly showed his quality. The soldiers under his command include Madril and Damrod – both experienced Rangers and veterans of many conflicts with Orcs of Mordor. One a captain and the other a long-serving warrior, each are ever ready and willing to take up their bows and swords against the servants of Sauron.

    This kit builds three separate infantry Heroes for the armies of Minas Tirith – Faramir, Madril, and Damrod. Each has their own strengths, equipped with swords, bows, and armour – you’ll find a place for them all no matter what size game you’re playing. They also feature a choice of optional scenic bases, allowing you to depict each hero either leaping through a forested area, or taking shelter in the ruins of Osgiliath.

    This kit comprises 23 plastic components, and comes with 3x Citadel 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
