  status: current
  description: |-
    Dwarven Ballistae are small, compact and incredibly accurate, unlike the cumbersome siege engines of other races. The shots they fire are capable of splintering the skull of a Cave Troll or sending an unfortunate Goblin flying back in a crumpled heap, allowing the Dwarven armies to pile into the newly created gaps in their enemy’s ranks.

    This multipart resin kit builds a Dwarven Ballista, plus a crew of two Dwarves, for your Kingdom of Khazad-dûm armies in the Middle-earth Strategy Battle Game. This potent siege engine is capable of taking out the biggest enemy targets, and can even take out multiple warriors with a single well-aimed shot.

    This kit comprises 5 resin components, 1x Citadel 40mm Round Base, and 2x Citadel 25mm Round Slotta Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Khazad-dûm Dwarven Ballista in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, which is available separately.
- name: Khazad-dûm™ Dwarven Commanders
  productCode: P-213906-99061465034
  sku: 99061465034
  productType: single_kit
  priceGbp: 21
  url: https://www.warhammer.com/en-GB/shop/khazad-dum-dwarven-commanders-2025
