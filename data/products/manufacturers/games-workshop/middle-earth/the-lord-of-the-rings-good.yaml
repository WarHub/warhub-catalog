  status: current
  description: |-
    The armies of Minas Tirith are the greatest of all the realms of Men – disciplined, superbly equipped, and led by veterans of the wars with Harad and Mordor. The Captains and heralds of Gondor that lead them have fought for many years against the Dark Lord Sauron, and now inspire their men to fight to the very last.

    This multipart metal kit builds a Captain, as well as a banner-bearing warrior, and another warrior rallying the troops with a horn, for use in your Minas Tirith, Garrison of Ithilien, Reclamation of Osgiliath, Atop the Walls, Defenders of the Pelennor, Men of the West, and Realms of Men armies. These essential leaders are protected by the same heavy armour and tall shields as the troops under their command. They add strength to your warriors, while enhancing their hitting power.

    This kit contains five metal components, and 3x Citadel 25mm Round Slotta Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Birchseed™, the Ent™
  productCode: P-198712-99861499020
  sku: 99861499020
  productType: single_kit
  priceGbp: 66.5
  url: https://www.warhammer.com/en-GB/shop/birchseed-the-ent-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861499020_BirchseedEnt1.jpg
  status: current
  description: |-
    Birchseed is relatively young and small for an Ent. Despite this, he exemplifies the nature of the Ents, taking his time to think before he acts. When the Ents march to war, Birchseed does not let the situation overwhelm him. Using his natural stoicism and reserved nature, he carefully reacts to the manoeuvres of Saruman's armies in order to cut them off and see Isengard fall.

    This multipart resin kit builds Birchseed, a highly detailed Ent for use in the Middle-earth Strategy Battle Game. Birchseed can be taken as part of your Fangorn army lists. He can react faster than his Ent kin, unlocking new tactical options for your army.

    This kit contains 19 resin components, and 1x Citadel 60mm Round Base. This miniature is supplied unassembled and unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
