- name: Guards of the Galadhrim™ Court
  productCode: prod4980287-99861463004
  sku: 99861463004
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-guards-of-the-galadhrim-court-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861463004_GuardsGaladhrimCourtLead.jpg
  status: current
  description: |-
    The most noble of the Galadhrim are honoured with promotion to the role of Guard of the Galadhrim Court, becoming a warden of Caras Galadhon. Each of these guards are from noble lineage which can be traced back to the earliest days of Middle-earth.

    Highly trained warriors, their fighting style is as varied as the leaves on the Mallorn, their pikes wielded in a fighting stance that allows for both a deadly attack and nigh-on impenetrable defence. The Guard of the Galadhrim Court are the pride of the armies of the Golden Wood, and its last line of defence against the forces of Darkness.

    Guards of the Galadhrim™ Court are the Elite warriors of Lothlórien, and thanks to their unique pike-wielding fighting style these warriors can support their allies while still able to use them as a shield should they be attacked.

    The set consists of 15 components cast in high-quality resin with which you can build three Guards of the Galadhrim models, and includes 3x 25mm Round bases. This kit requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.
- name: Glorfindel™ Lord of the West
  productCode: prod4980286-99851463003
  sku: 99851463003
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-glorfindel-lord-of-the-west-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851463003_GlorfindelLead.jpg
  status: current
  description: |-
    Arguably the greatest warrior that resides in Rivendell, Glorfindel's skill and swiftness with a blade is unmatched by any Elf in the Third Age, including Lord Elrond. Even the dreaded Nazgûl recoil from the mighty Elf lord and dare not face him openly, opting only to challenge him when all nine of them are united as one under the command of the Witch-king.

    Glorfindel was among the mightiest of the Elves, and stays true to that form on the tabletop with a Fight Value of 7 and 3 attacks – plus, they are equipped with an Elven-made Hand-and-a-half sword and the Armour of Gondolin.

    The set consists of 13 components cast in high-quality resin with which you can build two multi-part, single-pose miniatures – Glorfindel mounted, and on foot. The kit is provided with 1x 40mm Round Hex Hole base, and 1x 25mm Round base. These miniatures require assembly and are unpainted – we recommend using Citadel Colour paints.

    Rules for using Glorfindel in your games of Middle-earth™ Strategy Battle Game can be found in the *Armies of The Lord of the Rings*™ book.
- name: Galadhrim™ Elf Commanders
  productCode: prod4790149-99061463052
  sku: 99061463052
  ean: 5011921174027
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/galadhrim-elf-commanders-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061463052_GaladhrimElfCommandersMTO2.jpg
  status: current
  description: |-
    The armies of the Galadhrim are led by veteran Captains – expert warriors who have been part of many battles throughout their immortal lives. Defending the Golden Wood from Sauron's forces, these captains use their vast experience to fight with exceptional skill, felling enemy warriors with quick strikes from their blades or superbly aimed arrows.

    The Golden Wood is defended first and foremost by the warriors of the Galadhrim, steadfast soldiers who have honed their skills in combat across many wars throughout the ages. Like all Elves, the Galadhrim are skilled with blade, spear, and bow. Tasked with the protection of Lothlórien, these warriors will give their lives in defence, for should it fall, Middle-earth would surely follow.

    Lead and supplement your force of Wood Elves with this flexible combination of armoured Heroes and Warriors. Galadhrim Captains make superb warband leaders, while including a banner will help to give your highly skilled Wood Elf Warriors the edge once combat is joined in earnest, and the clarion call of a war horn will inspire them to stand their ground.

    This set contains four Galadhrim Elf Commanders: 1x Galadhrim Captain with Elven-made hand-and-a-half sword (metal), 1x Galadhrim Captain with Elf bow (metal), 1x Galadhrim Warrior with banner (metal), and 1x Galadhrim Warrior with war horn and Elf bow (resin). Each model is supplied with an appropriate base.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Wardens of Gondor™
  productCode: prod4580408-99851464006
  sku: 99851464006
  productType: single_kit
  priceGbp: 46.5
  url: https://www.warhammer.com/en-GB/shop/Wardens-of-Gondor-FW-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464006_WardensofGondor01.jpg
  status: current
  description: |-
    Add two new heroes to your armies of Minas Tirith with this set of resin miniatures representing two key figures from the battles against the forces of Mordor.

    A valiant captain of Minas Tirith, Ingold was placed in charge of guarding the northern road that passed through the Rammas Echor – the encircling wall that protected the White City. It was Ingold who provided Gandalf and Pippin with permission to pass into the realm of Gondor, for at that time Denethor had ordered that no strangers cross the borders of the Steward’s lands. Yet as the battle of the Pelennor approached, Ingold and his men were driven from their position by an army from the east – retreating to Minas Tirith to strike out at their enemies when they assailed the walls of the White City.

    An important officer within the armies of Minas Tirith, Húrin was the Warden of the Keys to the city during the War of the Ring. Also known as Húrin the Tall, he boasted an impressive stature and possessed strength enough to match. Fighting valiantly at the battle of the Pelennor, Húrin along with Imrahil came to the aid of Éomer following the new king’s fit of grief-fuelled rage. Following the defeat of Sauron and with Denethor dead, Faramir incapacitated in the houses of healing, and Aragorn not yet crowned, the rule of Minas Tirith briefly fell to Húrin as the Warden of the Keys.

    This multi-part resin kit contains the components necessary to assemble Ingold, Warden of the Rammas Echor, and Húrin the Tall, Warden of the Keys. There are two versions of Húrin – one on foot, and one mounted on a horse. These Hero miniatures can be added to your Minas Tirith armies. They come in 21 components and are supplied with two 25mm round bases and one 40mm round base.
- name: Hobbit-hole Upgrade Set
  productCode: prod4580404-99861499008
  sku: 99861499008
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Hobbit-Hole-Terrain-Set-FW-2020
