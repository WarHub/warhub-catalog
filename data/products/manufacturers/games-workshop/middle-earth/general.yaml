  description: |-
    Knights of Arnor are armed with long spears and clad in thick plate armour. The charge of these skilled horseback riders has a devastating impact upon those who stand before them, shattering shields and scattering battle lines as they defend their kingdom from the shadow of Angmar.

    This multipart resin kit builds two Knights of Arnor for use in the Middle-earth Strategy Battle Game. These mounted fighters charge into battle atop galloping horses, brandishing their war spears and protected by sturdy shields embellished proudly with the iconography of Arnor.

    This kit contains 18 resin components and 2x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectible item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Riders of Rohan™
  productCode: P-248800-99121464043
  sku: 99121464043
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-riders-of-rohan-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464043_MERidersOfRohan01.jpg
  status: current
  description: |-
    The pride of Rohan's armies are her riders. It has long been said that the skill of the horse lords of Rohan are without rival amongst the riders of Men, and some claim that they can even match that of the Elves. Regardless, their skill from horseback is undeniable, born out of generations of training, wisdom, and experience. Many a general has been on the receiving end of a devastating Rohirrim charge, only to find their forces scattered and cut down.

    **Ride For Ruin**

    This multipart plastic kit builds 6 Riders of Rohan, elite cavalry for your Kingdom of Rohan, Road to Helm's Deep, Ride Out, Riders of Éomer, Riders of Théoden, Army of Edoras, Defenders of the Pelennor, Fords of Isen, Paths of the Drúadan, and The Grief of Éomer armies in the Middle-earth Strategy Battle Game. These swift riders are equipped with armour and shields, hand weapons, and bows. Four of the miniatures include the option to wield throwing spears, and all 6 riders are interchangeable with the 6 different horses.

    **Contents:**
    – 82 plastic components
    – 6 Citadel 40mm Round Bases
    – 1 construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Warhammer Colour paints

    Rules for these miniatures can be found in the *Armies of The Lord of the Rings*™ publication, available separately.
