  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061499077_ThreeHuntersMounted01.jpg
  status: current
  description: |-
    When the Fellowship of the Ring was broken at Amon Hen, Aragorn, Legolas and Gimli chose to pursue the Uruk-hai who had abducted the Hobbits Merry and Pippin. These Three Hunters tracked the enemy to Rohan, where they journeyed alongside Théoden and the people of Edoras to the safety of Helm’s Deep.

    Yet when the vulnerable convoy was attacked by a pack of Warg Riders, the Three Hunters mounted up and fought to protect the convoy from Sharku’s Hunters alongside Théoden’s Eorlingas. Legolas rode with Gimli, whose horsemanship left much to be desired, enabling the mighty Dwarf to get into the heart of the fight early in the battle.

    This kit builds two metal Citadel miniatures representing Aragorn, Legolas and Gimli, the Three Hunters, as they appeared during the Warg Attack.

    The Three Hunters are a great addition to any Good army, providing hard-hitting power both up close and at range. Aragorn's inexhaustible Might resource makes him a potent asset, while Legolas' unerring accuracy with his bow and Gimli's wide range of attacks are tremendous support. Together, the three can take on many times their number in enemies.

    This 6-part metal kit comes supplied with 2x Citadel 40mm Round Bases.
