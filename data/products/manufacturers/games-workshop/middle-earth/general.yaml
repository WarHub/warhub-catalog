    An elite band of warriors formed of the nobles in Elrond's house, the Knights of Rivendell are formidable cavalrymen. Their devastating charges leave shield walls in tatters, whilst their nimble steeds can weave and dodge through even dense woodland with ease.

    These 6 Knights of Rivendell miniatures are highly dynamic figures. With their cloaks billowing around them, they wearing elegant Elven armour and carry ornate shields, and long lances - though there is also an option for one to carry a banner. They come in multiple poses, each one a variant of a Knight of Rivendell riding their steed into battle. The kit also comes with casualties, to denote a fallen Knight of Rivendell.

    This multi-part plastic kit contains 54 components and 6 40mm round bases with which to make 6 Knights of Rivendell.
