  description: |-
    Knights of Arnor are armed with long spears and clad in thick plate armour. The charge of these skilled horseback riders has a devastating impact upon those who stand before them, shattering shields and scattering battle lines as they defend their kingdom from the shadow of Angmar.

    This multipart resin kit builds two Knights of Arnor for use in the Middle-earth Strategy Battle Game. These mounted fighters charge into battle atop galloping horses, brandishing their war spears and protected by sturdy shields embellished proudly with the iconography of Arnor.

    This kit contains 18 resin components and 2x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectible item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
