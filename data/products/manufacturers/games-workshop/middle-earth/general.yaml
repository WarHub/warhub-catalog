    One of the foremost Captains of Rohan, Elfhelm fought alongside Théodred at the Ford of Isen, and later led a company of Rohirrim in the charge that broke the lines of Mordor in the Battle of the Pelennor Fields. Elfhelm is a talented horseman and renowned for his skill with a throwing spear. As a Hero of Fortitude, Elfhelm can lead a warband of up to 12 followers, and can hurl throwing spears to strike down foes with pinpoint accuracy.

    Elfhelm is a 20-part set cast in finely detailed Citadel resin and, once assembled, creates a miniature on foot and a second mounted on horseback.
