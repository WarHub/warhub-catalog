  description: |-
    Amongst the deadliest of creatures under Azog's command are the Trolls of Gundabad. These massive beasts are clad in crude metal armour and wield either a huge wooden club capable of turning even the mightiest warriors to paste, or a pair of deadly scythe gauntlets that can effortlessly slice Man and beast in two. The sight of such a fearsome foe is enough to cause doubt in even the bravest of hearts.

    Gundabad Trolls are both a Monster and a Warrior for the Azog’s Legion army list, allowing you to take multiple examples of these brutish creatures in your force. The Gundabad Troll with Scythe Gauntlets can hack an opponent in half with a single, swift strike, and has a particular hatred of Elves and Dwarves, fighting with increased fury when pitted against either. Its bulky form is encased in hastily cobbled-together plates of armour, virtually bursting at the seams with strength it would be unwise to underestimate. This model’s head is an especially ugly highlight – but should you wish for a different look, the head can be exchanged for the helmet-clad one found in the Gundabad Troll with Crushing Club.

    This multipart resin kit comes as 7 components, and is supplied with an 80mm round base.
