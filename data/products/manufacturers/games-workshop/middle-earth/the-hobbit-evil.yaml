  description: |-
    Bolg is a savage and ruthless Orc who fights with staggering strength and brutality, aiming to sever limbs and shed blood with every swing of his huge war pick. He will follow any task his father sets him with complete loyalty, whether that be to track and hunt the company of Thorin Oakenshield through the forest of Mirkwood and beyond, or to command the vast legions of Mount Gundabad to wage war upon the Lonely Mountain.

    This multipart plastic kit builds Bolg, both on foot and mounted on a Fell Warg, for your Army of Gundabad or Azog's Hunters armies in the Middle-earth Strategy Battle Game. The Orc bow on his back is optional, but he always carries a massive two-handed weapon to bludgeon his way through enemy warriors. This burly hero deals in slaughter and torture and is ideal for anyone looking for an unsubtle approach to battle.

