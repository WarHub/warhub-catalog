  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499047_RuinsofDolGuldurLead.jpg
  description: |-
    Since the coming of Sauron to Dol Guldur, the surrounding Greenwood had become a place of fear and darkness. Corrupted by the influence of the Necromancer, it had become known by the new name of Mirkwood. Yet the shadow that had grown over the forest had not gone unnoticed by the wise. To keep his return to Middle-earth secret, Sauron fled to the East, and his influence over the forest faded in the ensuing years, and Dol Guldur fell into ruin.

    This terrain set contains a selection of plastic ruined scenery sections, themed on the dilapidated fortress of Dol Guldur – the Hill of Sorcery – in the southern reaches of Mirkwood.

    The kit includes a statue, a staircase, a metal gate, a dead tree, and creeping vines, as well as skulls and skeletal remains. The Ruins of Dol Guldur are fully modular, so they can be assembled in a variety of ways, allowing you to create your own unique scenery piece. For even more variation or to build a larger terrain piece, you can combine several Ruins of Dol Guldur sets.

    This terrain kit is comprised of 136 components. This scenery is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.
