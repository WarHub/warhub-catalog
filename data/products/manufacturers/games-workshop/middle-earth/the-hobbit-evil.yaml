- name: Gundabad Troll with Crushing Club
  productCode: prod3480211-99861466004
  sku: 99861466004
  productType: single_kit
  priceGbp: 81
  url: https://www.warhammer.com/en-GB/shop/Gundabad-Troll-with-Crushing-Club
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561466003_GundabadTrollwithCrushingClub01.jpg
  status: current
  description: |-
    Amongst the deadliest of creatures under Azog's command are the Trolls of Gundabad. These massive beasts are clad in crude metal armour and wield either a huge wooden club capable of turning even the mightiest warriors to paste, or a pair of deadly scythe gauntlets that can effortlessly slice Man and beast in two. The sight of such a fearsome foe is enough to cause doubt in even the bravest of hearts.

    Gundabad Trolls are both a Monster and a Warrior for the Azog’s Legion army list, allowing you to take multiple examples of these brutish creatures in your force. The Gundabad Troll with Crushing Club is capable of easily squashing an enemy flat with a single downward swipe, and has a particular hatred of Elves and Dwarves, fighting with increased fury when pitted against either. Its bulky form is encased in hastily cobbled-together plates of armour, virtually bursting at the seams with strength it would be unwise to underestimate. This model’s head is clad in a sinister metal helmet – should you wish for a different look, the head can be exchanged for the one found in the Gundabad Troll with Scythe Gauntlets.

    This multipart resin kit comes as 7 components, and is supplied with an 80mm round base.
- name: Smaug™
  productCode: prod2720268-99811466017
  sku: 99811466017
  productType: box_set
  priceGbp: 453.5
  url: https://www.warhammer.com/en-GB/shop/Smaug
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811466017_Smaug01.jpg
  status: current
  description: |-
    Smaug is a Fire-drake hailing from the mountains far to the north, and it is doubtless that he is the largest and most powerful of his kind left in Middle-earth. His greed led him to covet the great wealth of Erebor for himself, and so he took wing, caring not that in order to claim his prize he had to assail the greatest kingdom of Durin's folk. So were Erebor and the neighbouring Dale, City of Men laid to ruin, and the survivors forced to flee their ancestral homes.

    This magnificent multipart miniature depicts Smaug, the infamous dragon who brought desolation to Erebor. The kit is hand cast in high quality resin to produce a model with extremely fine detail – every scale, horn and battle-scar has been expertly reproduced to create a beatifically authentic collectors piece. Smaug is built upon a stunningly detailed scenic base that depicts the vast treasures of Erebor. The Arkenstone can be clearly seen amongst the gems and gold as Smaug looms over the would-be burglar Bilbo Baggins.

    Weighing in at 2.4kgs, the height of the miniature from the bottom of the base to the tip of Smaug’s wing is 8.4 inches (or 21.4 cm).

    This kit comprises 42 resin components, and comes with a 231x133mm oval base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectible item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over. Some preparation and cleaning will be required prior to painting. Small areas of flash and mould lines will need to be filed or sanded, and larger casting gates will need to be removed before construction.
