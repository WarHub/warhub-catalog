  description: |-
    The denizens of Goblin Town are stunted, degenerate creatures that have been afflicted by all manner of mutations and deformities. Their sinister appearance is quite fitting, however, for they are spiteful, evil creatures with a penchant for cruelty and violence. Individually weak, feeble even, as a group these Goblins overwhelm their foes with weight of numbers and shocking feats of violence.

    The Goblin Warriors are wiry, muscular little creatures, with bulging eyes and ferocious expressions. They are sculpted in all manner of hunched or misshapen poses. Covered in dubious boils and lumps, they wear loincloths and various straps, and hold an array of primitive weapons, from axes to swords.

    This kit contains 36 components and 36 25mm round bases with which to make 36 Goblin Warriors.
