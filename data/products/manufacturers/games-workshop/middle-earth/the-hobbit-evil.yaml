  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499047_RuinsofDolGuldurLead.jpg
  status: current
  description: |-
    Since the coming of Sauron to Dol Guldur, the surrounding Greenwood had become a place of fear and darkness. Corrupted by the influence of the Necromancer, it had become known by the new name of Mirkwood. Yet the shadow that had grown over the forest had not gone unnoticed by the wise. To keep his return to Middle-earth secret, Sauron fled to the East, and his influence over the forest faded in the ensuing years, and Dol Guldur fell into ruin.

    This terrain set contains a selection of plastic ruined scenery sections, themed on the dilapidated fortress of Dol Guldur – the Hill of Sorcery – in the southern reaches of Mirkwood.

    The kit includes a statue, a staircase, a metal gate, a dead tree, and creeping vines, as well as skulls and skeletal remains. The Ruins of Dol Guldur are fully modular, so they can be assembled in a variety of ways, allowing you to create your own unique scenery piece. For even more variation or to build a larger terrain piece, you can combine several Ruins of Dol Guldur sets.

    This terrain kit is comprised of 136 components. This scenery is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: The Keeper of The Dungeons
  productCode: prod4420146-99851462007
  sku: 99851462007
  productType: single_kit
  priceGbp: 19.5
  url: https://www.warhammer.com/en-GB/shop/Keeper-Of-The-Dungeons-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551462007_KeeperDungeonsLead.jpg
  status: current
  description: |-
    The Keeper of the Dungeons guards the prisoners brought to the fortress of Dol Guldur. He is a huge and barbaric Orc who revels in the torture and disfigurement of his victims. Tasked with obtaining the Elven ring from Gandalf, it took Galadriel herself to prevent the Keeper of the Dungeons from completing his master's bidding.

    Armed with a two-handed pick, a sword and a knife, the Keeper of the Dungeons relishes inflicting pain on his prey. He's ideal if you need to slay anyone wearing one of the three Elven Rings of Power, as he gets a bonus when fighting anybody who wears one – he won't let anything get in the way of his master's orders. This unique Orc model will make a fine addition to a Dol Guldur army.

    This kit is supplied in six highly detailed resin components and makes one Keeper of the Dungeons. It is supplied with one 25mm Citadel round base.

    Rules for using him in games of Middle-earth Strategy Battle Game can be found in *Armies of The Hobbit*™.
- name: Nazgûl of Dol Guldur™
  productCode: prod4320144-99861466011
  sku: 99861466011
  productType: box_set
  priceGbp: 129.5
  url: https://www.warhammer.com/en-GB/shop/The-Nazgul-Of-Dol-Guldur-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99021487015_NazgulDolGuldurCollection01.jpg
  status: current
  description: |-
    Appearing at Dol Guldur in a very different form to that of the Black Riders, at this point in their existence the Nazgûl are much swifter with a blade than the robed figures that appear many years later. Summoned into being by the Necromancer of Dol Guldur, the Nazgûl engage the White Council in a grim ballet of whirling blades and darting movement. Able to constantly return to battle once banished, the servants of the Dark Lord are a deadly foe unlike any the White Council has faced before.

    The Nazgûl of Dol Guldur represent nine Heroes from the Dark Powers of Dol Guldur army list – each a fell lieutenant of the Dark Lord Sauron in his guise as the Necromancer.

    **The set comprises the following models:**
    - The Witch-King of Angmar
    - Khamûl the Easterling
    - The Dark Headsman
    - The Forsaken
    - The Lingering Shadow
    - 2 Abyssal Knights
    - 2 Slayers of Men

    The set contains nine resin miniatures, each supplied with a Citadel 25mm Round Base. Their rules can be found in *Armies of The Hobbit*™.
- name: Goblin Warriors
