  status: current
  description: |-
    Théodred is the only son of Théoden and the rightful heir to the throne of Rohan. A highly skilled and strong warrior, he has commanded Rohan's forces across numerous battles and proven his worth many times over.

    This multipart resin kit builds Théodred, both on foot and mounted, for your Kingdom of Rohan or Fords of Isen armies in the Middle-earth Strategy Battle Game. He's ideal for leading your charge in the defence of Rohan.

    This kit comprises 15 resin components, 1x Citadel 40mm Round Base, and 1x Citadel 25mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using Théodred, Prince of Rohan in Kingdom of Rohan armies can be found in the *Armies of The Lord of the Rings*™ publication, available separately. Rules for using him in Fords of Isen armies can be found in the *Armies of Middle-earth* publication, also available separately.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Fréaláf Hildeson™, Olwyn™ & Lief™, Heroes of Rohan™
  productCode: P-226979-99121464039
  sku: 99121464039
  ean: 5011921244997
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-frealeaf-hildeson-and-olwyn-and-lief-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464039_MiddleEarthFrealafHildesonOlwynAndLiefHeroesofRohan01.jpg
  status: current
  description: |-
    Rohan has no shortage of noble and experienced warriors to lead them into battle. The nephew of Helm Hammerhand, Fréaláf, is the First Marshal of the Riddermark and the Lord of Harrowdale. The Shieldmaiden Olwyn is an exceptional warrior who will fight valiantly to protect those she is close to, in particular Hera, to whom she imparts the ways of the Shieldmaidens of old. The young esquire to the king, Lief, acts as Helm's personal attendant within his court.

    This multipart plastic kit builds three mighty warriors – Olwyn, Shieldmaiden of Rohan and Lief, Page of Helm, for your Army of Edoras and Defenders of the Hornburg armies, and Fréaláf, First Marshal of the Riddermark, for your Armies of Edoras forces in the Middle-earth Strategy Battle Game. There are two versions of each hero – mounted or on foot, opening up more tactical options for your army. Whichever version you select, they bring a range of special abilities that will give you the edge in battle.

    This kit comprises 43 plastic components, 1x Citadel 40mm Round Hex Hole Base, 2x Citadel 40mm Round Bases, and 3x Citadel 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using Olwyn, Lief, and Fréaláf in the Middle-earth Strategy Battle Game can be found in the *Armies of the Lord of the Rings*™ publication, which is available separately.
- name: Helm Hammerhand™, King of Rohan™
  productCode: P-226977-99121464041
  sku: 99121464041
  ean: 5011921245017
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 23.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-helm-hammerhand-king-of-rohan-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464041_MiddleEarthHelmHammerhandKingofRohan01.jpg
  status: current
  description: |-
    Helm Hammerhand is one of the greatest kings in the history of Rohan – his name has gone down in legend and songs for his heroic deeds. A noble but stubborn warrior-king, Helm has never been one to suffer the indignity of being disrespected, and can let his temper get the better of him. It is this hot-headedness that leads Helm to accidentally kill Freca after the Lord of the West March challenges his authority – a single punch of Helm's mighty fist felled Freca instantly. When Freca's son raises an army to assail Edoras, Helm leads his warriors in the city's defence, showing no fear as he uses his great strength and martial prowess to protect his people and lay waste to any who dare try to usurp the throne of Rohan.

    This multipart plastic kit builds Helm Hammerhand, both on foot and mounted, for your Army of Edoras armies in the Middle-earth Strategy Battle Game. The ultimate leader for your mighty musterings of the Rohirrim, Helm can lead infantry or cavalry armed with his massive two-handed hammer. His unmounted miniature can be assembled with or without his signature helmet.

    This kit comprises 27 plastic components, 1x Citadel 40mm Round Base, and 1x Citadel 25mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using Helm in the Middle-earth Strategy Battle Game can be found in the *Armies of the Lord of the Rings*™ publication, which is available separately.
- name: Cave Drake
  productCode: P-213930-99811466025
  sku: 99811466025
  ean: 5011921037162
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-cave-drake-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811466025_MiddleEarthCaveDrakeCharacter1.jpg
  status: current
  description: |-
    Cave Drakes are scaled predators that dwell within the bowels of the mountain ranges of Middle-earth. Fiercely territorial and vicious creatures, They will defend their nests from any who threaten their young or their eggs, slashing and snapping at intruders with razor-sharp claws and teeth.

    This multipart resin kit builds one Cave Drake, a vicious beast for your Moria or Dragons of the North armies in the Middle-earth Strategy Battle Game. Possessed of vicious claws, deadly fangs, and the ability to unhinge its jaw and swallow enemies whole, it's a force to be reckoned with in battle. The kit also includes a nest marker, which can either be added to the base as a cosmetic element, or given its own base for use in games.

    This kit comprises 10 resin components, 1x Citadel 100mm Round Base, and 1x Citadel 25mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Cave Drake in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, which is available separately.
- name: Dragon
  productCode: P-213928-99811466024
  sku: 99811466024
  ean: 5011921024582
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-dragon-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811466024_MiddleEarthDragonCharacter1.jpg
  status: current
  description: |-
    Dragons fight with a ferocity all but unmatched by most creatures in Middle-earth – their claws can pierce armour and a snap of their jaws will cleave a Man in two. However, not all Dragons have the same abilities – some have thick, scaly hides that arrows bounce off, others manipulate magic to confound their foes, and a few can unleash huge gouts of flame to reduce whole settlements to ash.

    This multipart resin kit builds one Dragon, a mighty winged creature for your Dragons of the North or Moria armies in the Middle-earth Strategy Battle Game. Dragons spread fear and terror across the land, and can easily swing a battle in your favour.

    This kit comprises 12 resin components, and 1x Citadel 130mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Dragon in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, which is available separately.
- name: Beregond™, Guard of the Citadel
  productCode: P-213893-99061464238
  sku: 99061464238
  productType: single_kit
  priceGbp: 12
  url: https://www.warhammer.com/en-GB/shop/beregond-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464238_MEBeregond01.jpg
  status: current
  description: |-
    Beregond has spent many years serving within the ranks of the Citadel Guard, having pledged himself into the service of the Steward of Gondor. Like all those within the Guard, he is unshakably loyal to the White Tower and is a skilled warrior with both blade and bow. Yet he is no unthinking servant, and possesses a great sense of right and wrong.

    This metal kit builds Beregond, a Gondor Hero of Fortitude for your Minas Tirith, Atop the Walls, Defenders of the Pelennor, or Men of the West armies in the Middle-earth Strategy Battle Game. This versatile warrior is a solid fighter both in melee and at range – his flexibility is an asset to any force.

    This kit comprises 1 metal component, and 1x Citadel 25mm Round Slotta Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using Beregond, Guard of the Citadel in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, which is available separately.
- name: Durbûrz™ & Drûzhag™, Goblins of Moria™
  productCode: P-213891-99061462088
  sku: 99061462088
  productType: single_kit
  priceGbp: 19
  url: https://www.warhammer.com/en-GB/shop/durburz-and-druzhag-goblins-of-moria-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061462088_MEDruzhagDurburzGoblinsOfMoria01.jpg
  status: current
