  description: |-
    One of the oldest and wisest captains that lead the Rohirrim in battle, Gamling is a close advisor of King Théoden. Upon the battlefield of the Pelennor it is Gamling who bears the Royal Standard of Rohan as the Rohirrim charge into the fray. Ever at the side of his liege, Gamling rides with Théoden, sharing in his king’s every danger.

    Háma is the captain of Théoden’s palace guard and one of the king’s personal bodyguards. Háma could only watch as his lord fell into despair under the foul influence of Saruman and his lackey Gríma Wormtongue. Placing his trust in the hands of Gandalf and his companions, Háma hopes that the arrival of the White Wizard will see the renewal of his liege and the kingdom of Rohan.

    Inspire your Rohirrim and bolster their courage with these two loyal Captains of Rohan. They make thematic and powerful additions to any force that includes Théoden, but also serve as capable warband leaders in their own right.

    The set contains 3 metal miniatures – a model of each on foot as well as a mounted version of Gamling – and comes supplied with a Citadel 40mm Round Base and two Citadel 25mm Round Bases. Their rules can be found in Armies of *The Lord of The Rings™*.
- name: Narzug™ and Fimbul™, Hunter Orc Captains
  productCode: prod4320147-99811462043
  sku: 99811462043
  ean: 5011921137107
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Narzug-And-Fimbul-Hunter-Orc-Captains-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811462043_NarzugFimbulHunterOrcCaptains01.jpg
  status: current
  description: |-
    One of the captains of Azog's Hunter Orcs, Narzug possesses an unusually exceptional skill with a bow for an Orc. His arrows are laced with a deadly toxin, and those who are pierced by one will soon be left choking on the poison that rushes through their veins. Like all of those who lead packs of Hunter Orcs, Narzug is a vicious fighter and well-versed in both the art of stealth and brutal hand-to-hand combat.

    Fimbul is a wily lieutenant of Azog's Hunters. A cunning Orc, accomplished in pursuing his prey, Fimbul has proven his worth to Azog's cause many times over the years. He takes great pride in his skills as a tracker and will doggedly hunt his foes without ever tiring from the chase.

    Narzug and Fimbul are two formidable Heroes from the Azog's Hunters army list. Narzug is skilled with bow and blade, while Fimbul is a dangerous adversary on foot, but deadlier still when riding his Warg!

    The set contains three resin miniatures – Fimbul (both on foot and riding a Warg) and Narzug – supplied with 2 Citadel 25mm Round Bases and 1 Citadel 40mm Round Base. Their rules can be found in Armies of *The Hobbit*™.
- name: Elrond™ and Lindir, Lords of Rivendell™
  productCode: prod4300236-99811463023
  sku: 99811463023
  ean: 5011921136384
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Elrond-And-Lindir-Lords-Of-Rivendell-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811463023_MEElrondLindirLordsofRivendell01.jpg
  status: current
  description: |-
    A mighty and renowned warrior, Elrond has been at the forefront of many great battles. He fought against Sauron in the War of the Last Alliance and bore witness to the Dark Lord’s downfall. It was he who tried to convince Isildur to destroy the One Ring for good, an act that would have saved much suffering in the Third Age. Blessed with the gift of foresight, Elrond is able to provide great wisdom for his allies.

    Lindir is an Elven noble and one of the stewards of the last homely house. Although he is a skilled musician and songwriter, Lindir’s true value is as an advisor to Lord Elrond, who will often seek his counsel in times of need. When pushed to the task, Lindir is a fine warrior, capable of heroic deeds upon the battlefield.

    These two Elven lords are integral members of the Rivendell army list. Whether mounted or on foot, Elrond is among the greatest Elven warriors, able to cut down opponents with his sword, Hadhafang, and assail them with a variety of magical powers. Lindir's presence bolster's Elrond's formidable might further still, by offering his master wise counsel and a strong sword arm.

    This set contains three resin miniatures – Elrond, Master of Rivendell (mounted and on foot)and Lindor of Rivendell – supplied with two Citadel 25mm Round Bases and a Citadel 40mm Round Base.

    Rules for these Heroes can be found in the Armies of The Lord of the Rings™.
- name: Shirriffs™ of the Shire™ – Holfoot Bracegirdle and Robin Smallburrow
  productCode: prod4270186-99851461002
  sku: 99851461002
  productType: single_kit
  priceGbp: 16.5
  url: https://www.warhammer.com/en-GB/shop/Holfoot-Bracegirdle-And-Robin-Smallburrow-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551461002_HolfootBracegirdleandRobinSmallburrow01.jpg
  status: current
  description: |-
    Holfoot Bracegirdle has been a member of the Shirriffs for a good many years, and during his time has risen to the post of Shirriff-leader. Though it is his duty to oversee peace in the Shire, Holfoot, and most other Shirriffs for that matter, never expected to have to fight.

    Affectionately known as 'Cock-Robin' to his friends due to his easily influenced nature, Robin Smallburrow was one of the Shirriff's of the Shire. Under the rule of the Chief, Robin and the Shirriffs were forced to arrest their friends, spy on well-to-do Hobbits, and generally enforce the newly implemented rules. The return of the Travellers helped Robin remember why he became a Shirriff, and he joined them in fighting back against their oppressors.

    Holfoot Bracegirdle and Robin Smallburrow may not be the bravest (and definitely among the smallest) inhabitants of Middle-earth but they both have a crucial part to play in the events of the Scouring of the Shire. They make great additions to a Hobbit collection.

    **The set includes the following resin miniatures:**

    1x Holfoot Bracegirdle
    1x Robin Smallburrow
- name: Déorwine, Chief of the King's Knights, Foot and Mounted
  productCode: prod4210156-99851464009
  sku: 99851464009
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Deorwine-Chief-of-the-Kings-Knights-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464009_DeorwineFootandMounted01.jpg
  status: current
  description: |-
    Unwaveringly loyal, Déorwine is the Chief of the King’s Knights – the royal bodyguards of Théoden. Déorwine accompanied his liege to the Battle of Pelennor Fields, and joined the glorious charge of the Rohirrim that smashed aside all who stood in their path.

    As a Hero of Fortitude, Déorwine can command a warband of up to 12 followers (some Rohan Royal Guard would be perfect!). He is among the most capable fighters in the Rohan army, well armoured, and can be fielded on foot or on horseback. Déorwine works especially well alongside King Théoden, as he can call a Heroic Combat for free to protect his liege in battle.

    These miniatures come as 15 components, and are supplied with a Citadel 25mm Round base and a Citadel 40mm Round base, which includes a textured base topper featuring a battlefield littered with discarded weapons.
- name: Legolas Greenleaf™ & Tauriel™
  productCode: prod4070156-99121463011
  sku: 99121463011
  ean: 5011921114955
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 23.5
  url: https://www.warhammer.com/en-GB/shop/Legolas-Greenleaf-And-tauriel-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121463011_LegolasGreenleafTauriel01.jpg
  status: current
  description: |-
    Legolas is the captain of the King’s Guard and is tasked with hunting down Orc invaders that enter his father’s realm. Although Legolas cannot match his father’s ability with a blade, he is still an exceptional warrior. Tauriel is a tremendous fighter, matchless in the deadly press of combat, weaving through the ranks of foes with her blades and leaving nought but stumbling corpses in her wake.

    This multipart plastic kit contains the components necessary to assemble Legolas Greenleaf and Tauriel. Armed with an elven bow and pair of daggers, Legolas is posed scampering up the side of a tree trunk; Tauriel wields the same weapons but is perched on a tree trunk. These miniatures come as 11 components and are supplied with 2 25mm sculpted round bases.
- name: Guritz & Gothmog’s Enforcer
  productCode: prod3960206-99851462004
  sku: 99851462004
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Guritz-Gothmogs-Enforcer-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551462004_GuritzGothmogsEnforcer01.jpg
  status: current
  description: |-
    Under the command of Gothmog, Guritz is given the task of organising the reserve forces at the battle of Pelennor Fields, directing Sauron’s forces to where they were needed most to crush the armies of Gondor. A calculating Orc, Guritz has had plenty of experience in war, having fought in countless battles across the Third age.

    Unlike most Orc Captains within the Mordor armies, Gothmog’s Enforcer often shies away from a fight and did not claim his position through strength or by vile atrocities committed in the Dark Lord’s name. Instead, it was this Orc’s unwavering loyalty to Gothmog that saw him rise to the post he now holds.

    This multipart resin kit contains the components necessary to assemble Guritz & Gothmog’s Enforcer, 2 hero miniatures to add to your Mordor army list. Guritz comes with a two-handed pick and sword, while Gothmog’s Enforcer simply carries a sword. These miniatures come as 6 components, and are supplied with 2 25mm round bases.
- name: Hilda & Percy
  productCode: prod3770146-99851464003
  sku: 99851464003
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/Hilda-Bianca-Percy-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464003_HildaandPercy01.jpg
  status: current
  description: |-
    A resident of Esgaroth, Hilda Bianca leads the charge of the women, old and wounded from the great hall. Whilst not versed in combat, Hilda Bianca demonstrates tremendous courage. Armed with a fishing spear and rallying others behind her, she joins the men of Lake-town in the fight for Dale, knowing full well that this could be her end.

    The former porter of Lake-town, Percy was a humble man and an upstanding pillar of the community. During The Battle of the Five Armies, he rose to the occasion to become second-in-command under Bard the Bowman™. Percy proved himself to be as skilled an archer as he is a leader, rallying the survivors of Lake-town to stand defiant amidst the heat of battle.

    This multipart resin kit contains the components necessary to assemble Hilda Bianca & Percy, Heroes of Lake-town. Hilda Bianca is posed defiantly, bunching her skirts out of the way with one hand, an enormous barbed fishing spear in the other. Percy, with his detailed long hair and beard, wields his bow in his left hand, drawing it back with the other. On his hip is modelled a quiver, peeking out from beneath his overcoat.

    These 2 models come as 5 components, and are supplied with 2 25mm round bases.
- name: Gwaihir™ the Wind Lord
  productCode: prod3530283-99861499005
  sku: 99861499005
  productType: single_kit
  priceGbp: 76
  url: https://www.warhammer.com/en-GB/shop/Gwaihir-the-wind-lord-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561499005_GwaihirWindLord01.jpg
  status: current
  description: |-
    Although Gwaihir and his Great Eagles care little for the strivings of the earth-bound Men and Dwarves, they often find common cause against evil creature such as Orcs and Wargs. Gwaihir himself is the mightiest and most noble of the Eagles, known as the Windlord, and his power and dominion are incredible.

    A magnificent Eagle, with wide wingspan and fierce expression, Gwaihir is a spectacularly detailed resin model which can be taken as a Hero in a Good army. He is presented on a rocky diorama base, one enormous set of talons pinning down the Warg he is attacking with the other. An unfortunate Orc is involved in the turmoil; his leg trapped beneath the Warg, he is forced to desperately wave his sword about in the fading hope that he may live to see another battle…

    Packaged in a Character Series box, this model comes in 15 components and is supplied with a 60mm round base.
- name: Vanquishers of the Necromancer™
  productCode: prod2770143-99801499020
  sku: 99801499020
  ean: 5011921054855
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/the-white-council-vanquishers-of-necro-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801499020_MEVanquishersOfTheNecromancerLead.jpg
  status: current
  description: |-
    As head of the White Council, Saruman the White has the final say in sanctioning any actions its members make. Though he had previously opposed moving openly against the Necromancer of Dol Guldur, believing him to be no real threat, recent events have forced him to take action. Saruman now leads the White Council in unleashing its full power against Sauron.

    Amongst the eldest and most powerful of her kind, Galadriel is a part of the White Council that ventures to Dol Guldur to save Gandalf from the Necromancer. Galadriel cares for Gandalf deeply, so much so that she will not allow harm to come to him – a fact that the Keeper of the Dungeons finds out first-hand. Able to banish the Nazgûl through force of will and bearing the Light of Eärendil, Galadriel confronts Sauron, threatening to destroy him if he does not return to the void from whence he came.

    A mighty and renowned warrior, Elrond has been at the forefront of many great battles. He fought against Sauron in the War of the Last Alliance and bore witness to the Dark Lord's downfall. It was he who tried to convince Isildur to destroy the Ring for good, an act that would have saved much suffering in the Third Age. Blessed with the gift of foresight, Elrond provides great wisdom for his allies.

    Each of these Heroes is a mighty champion of Middle-earth. Saruman the White is a potent Wizard, Galadriel a being of pure power, protecting her allies and striking down her foes, and Elrond is a legendary warrior. The three of them together are an army unto themselves, though you can add them to a variety of Good armies, including The White Council.

    This set contains three resin Heroes: 1x Saruman the White, 1x Galadriel, Lady of the Light, and 1x Elrond, Master of Rivendell. Each model is supplied with an appropriate base

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Sauron™ the Necromancer
  productCode: prod1500527a-99111464103
  sku: 99111464103
  ean: 5011921920846
  eanSource: shopify:goblingaming.co.uk
