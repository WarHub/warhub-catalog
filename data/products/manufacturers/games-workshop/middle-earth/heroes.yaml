    Only the most ruthless of Corsairs are able to seize the honour of captaining their own ship within the Corsair fleets. To be captain not only means commanding their fellows but also getting the greatest share of the plunder. As a result, strength is paramount for any Corsair Captain, as there are always others who will seek to launch a mutiny to take command for themselves. Bo'suns are their strong and loyal companions that help keep the crew in line in return for being well paid and looked after.

