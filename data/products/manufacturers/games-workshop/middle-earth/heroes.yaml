    This multipart metal kit builds Círdan and Erestor, a pair of Elven heroes who fight for Rivendell armies in the Middle-earth Strategy Battle Game. Círdan wears simple robes and adds magical mastery to your army, while Erestor is clad in elegant heavy armour and wields twin Noldorin daggers, making him a force to be reckoned with in combat.

