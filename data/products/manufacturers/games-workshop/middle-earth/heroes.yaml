    For many long years, a darkness has dwelt in the southern reaches of Mirkwood, an evil known only as the Necromancer. Eventually, the Free Peoples dicovered that this being was none other than Sauron, the Lord of the Rings. Though his power is weakened by the loss of the Ruling Ring and his physical form was destroyed in the war of the Last Alliance, Sauron is still a force to be reckoned with, and his power is growing.

    This set contains Sauron the Necromancer, a metal minature in 2 components supplied with a 40mm round base.
- name: Moria™ Goblin Commanders
  productCode: prod1460153a-99811462010
  sku: 99811462010
  ean: 5011921029556
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29
  url: https://www.warhammer.com/en-GB/shop/Moria-Goblin-Commanders
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811462010_MoriaGoblinCommandersNEW01.jpg
  status: current
  description: |-
    Moria Goblins are small, mean-spirited creatures that live a troglodyte existence in the numerous mines beneath the Misty Mountains, and many of the once-great Dwarven halls are now home to these loathsome beings. They scuttle through the tunnels with amazing dexterity, attacking, destroying and consuming intruders that venture into their dark realm. They are a low kind of degenerate Orc that rely on large numbers to overwhelm the foe. Amongst these degenerate creatures are the Captains and heralds of Moria - those who have fought for The Dark Lord Sauron for many years, and who now lead his armies into battle, inspiring their fellow Goblins to fight harder and stronger than ever before.

    This boxed set contains a set of Moria Goblin Commanders. These models are resin cast miniatures, including a Goblin Captain, a Goblin Shaman and 2 Goblin Drummers with a Moria War Drum. They are supplied as 5 separate components, and come with 5 25mm round bases.
- name: Théodred™, Prince of Rohan™
  productCode: P-226981-99851464042
  sku: 99851464042
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-theodred-prince-of-rohan-2025
