    This multipart resin kit builds Bard in two forms – one on foot, armed with a bow, and one aiming a famed Windlance, the deadly siege engine he uses to take on Smaug. This legendary warrior can be taken in your Army of Lake-town force, where he makes a fine leader, putting his skill with the bow to good use. Give him the Windlance for some serious monster-killing power – ideal for taking on an opponent that relies on the support of such brutes.

