  status: current
  description: |-
    The Hill Tribes around Rohan are each commanded by their own chieftain who leads their people in whichever way they see fit. Ruthless and savage, these chieftains are the strongest in their tribe and will often gain their post through slaying the previous chief in cold blood.

    **Ruthlessly Rule the Hill Tribes**

    This multipart plastic kit builds 3 Hill Tribesmen Commanders to lead your Usurpers of Edoras, Besiegers of the Hornburg, and Army of the White Hand armies in the Middle-earth Strategy Battle Game. You'll find 1 Hill Tribes Chieftain, 1 Hill Tribesman Warrior with a banner, and 1 Hill Tribesman Warrior with a war horn. The chieftain can be armed with a large two-handed weapon or a hand weapon and shield, and can alternatively be built as a Wild Man Oathmaker.

    **Contents:**
    – 33 plastic components
    – 3 Citadel 25mm Round Bases
    – 1 construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Warhammer Colour paints

    Rules for these miniatures can be found in the *Armies of The Lord of the Rings*™ publication, available separately.
- name: Warriors of Rohan™ Commanders
  productCode: P-248841-99121464042
  sku: 99121464042
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-warriors-of-rohan-commanders-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464042_MEWarriorsOfRohanCommanders01.jpg
  status: current
  description: |-
    Those who captain bands of Rohan's armies come from many walks of life. Whether village herdsmen, or the noble lords of greater settlements, these captains all share the same traits – a great skill from horseback, wisdom and patience on the battlefield, and the loyalty of those they lead. When marauding bands of Wild Men of Dunland, Orcs, or Uruk-hai assault the lands of Rohan, these captains will lead their warriors in defence of the kingdom without hesitation.

    **Inspire the Troops**

    This multipart plastic kit builds 3 Warriors of Rohan Commanders to lead your Kingdom of Rohan, Defenders of Helm's Deep, Men of the West, Army of Edoras, Defenders of the Hornburg, Fords of Isen, and The Grief of Éomer armies in the Middle-earth Strategy Battle Game. This kit includes one Rohan Captain, one Rohan Warrior with Banner, and one Rohan Warrior with War Horn. The captain can be built with either standard or heavy armour, and you'll have a choice between a helmet or a bare head. The warrior holding a banner has a choice of 2 heads.

    **Contents:**
    – 29 plastic components
    – 3 Citadel 25mm Round Bases
    – 1 construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Warhammer Colour paints

    Rules for these miniatures can be found in the *Armies of The Lord of the Rings*™ publication, available separately.
- name: Rúmil™ & Orophin™
  productCode: prod4980285-99851463002
  sku: 99851463002
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/middle-earth-rumil-and-orophin-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851463002_RumilOrophinLead.jpg
  status: current
  description: |-
    Rúmil is brother to Haldir and, like his sibling, tirelessly protects the borders of the Golden Wood. Whilst Haldir excels at archery, Rúmil is an expert swordsman. His skills with a blade are renowned across Middle-earth, and his agility and lightning-fast reflexes have made Rúmil a feared foe.

    Each warrior has a unique style of fighting. Rúmil has mastered a defensive style of combat, while Orophin has spent his years becoming a skilled swordmaster capable of striking his foes with lightning speed.

    This set consists of 7 components cast in high-quality resin with which you can build one Rúmil and one Orophin, and is supplied with 2x 25mm Round bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.
- name: Dale™ Commanders
  productCode: prod4920216-99851464027
  sku: 99851464027
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/dale-commanders-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851464027_CommandersDaleLead.jpg
  status: current
  description: |-
    Dale's wealth ensures that its soldiers are equipped with armour of the highest quality and armed with fine Dwarf-forged weapons, crafted by their allies in Erebor. Well-trained and disciplined, these brave men are often seen marching together, bound for distant wars, when not guarding their homeland from the predations of their enemies. The Captains of Dale are seasoned warriors who have fought in numerous battles before rising to command. When their homeland is threatened, these leaders are the first of the city's defenders into the fray.

    This multipart resin kit builds a finely-detailed Captain of Dale with two possible poses – his sword drawn, or in a scabbard at his side, as well as two finely-detailed Warriors of Dale, one with a war horn and one with a banner. The armies of Dale are well-equipped and trained, and with the addition of these commanders, they become a truly elite fighting force..

    This kit comprises 10 resin components, and comes supplied with 3x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Captains of Erebor™
  productCode: prod4920203-99801465021
  sku: 99801465021
  ean: 5011921153848
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 19
  url: https://www.warhammer.com/en-GB/shop/captains-of-erebor-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801465021_MESBGCaptainsOfEreborLead.jpg
  status: current
  description: |-
    Those who command the Grim Hammers are chosen to lead for their strength in battle. These headstrong warriors fight with a grim determination and a fury seldom seen outside their ranks. Upon the battlefield these captains can be counted upon to be fighting where the going is hardest, smashing the shields of their enemies aside and piercing their armour.

    Battle-tested warriors lead the Dwarves of Erebor into battle. These two indomitable Heroes have access to a range of skills, powerful weapons, and stalwart armour that make them ideal commanders for your Army of Thrór.

    The kit is comprised of 4 resin components, with which you can construct a Captain of Erebor and a Grim Hammer Captain, supplied with 2x Citadel 25mm round bases. Rules for these miniatures can be found in the Armies of The Hobbit™ supplement.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Lake-town™ Captains
  productCode: prod4920202-99801464107
  sku: 99801464107
  ean: 5011921175222
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 19
  url: https://www.warhammer.com/en-GB/shop/lake-town-captains-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801464107_MELakeTownCaptainsLead.jpg
  status: current
  description: |-
    The Captains of the Lake-town™ Guard have seen more fighting than most within Esgaroth™ –though they may still lack the steely determination of a true professional soldier. Nonetheless, they serve the town well, for it is their home –and their paymaster.

    Members of the Lake-town Guard who survived Smaug's wrath aided Bard in seeing the refugees to relative safety, and the Survivors of Lake-town looked to the toughest and hardiest of this militia to lead them during the defence of Dale™, fighting fiercely to secure the city – and a new home for the people of Esgaroth.

    The Lake-town Guard Captain and Lake-town Militia Captain are among the bravest and strongest of the warriors of Dale. They are able to lead their fellow troops with a host of useful abilities and have access to a suite of powerful equipment.

    The kit is comprised of 8 resin components, with which you can construct a Lake-town Guard Captain and a Lake-town Militia Captain, supplied with 2x Citadel 25mm bases. Rules for these miniatures can be found in the Armies of The Hobbit™ supplement.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Thráin the Broken and Gandalf™ the Grey
  productCode: prod4790171-99801499027
  sku: 99801499027
  ean: 5011921173921
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 19
  url: https://www.warhammer.com/en-GB/shop/thrain-the-broken-and-gandalf-the-grey-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801499027_METhraintheBrokenAndGandalfTheGreyLead.jpg
  status: current
  description: |-
    One of the few Istari, Gandalf the Grey has been tasked with guiding the Free Peoples of Middle-earth in defeating Evil and restoring peace. To this end, Gandalf advises Thorin Oakenshield to gather together a company of Dwarves to reclaim their homeland from the clutches of the Dragon, Smaug. Gandalf joins them and the plucky Bilbo Baggins on their quest to Erebor – for he fears that if it is not dealt with, then a dark force will seek to gain the Dragon's allegiance.

    Captured and tortured, Thráin is now a broken being who can barely remember his name, let alone his proud history and heritage. He’s still dangerous, however, for deep in his damaged mind lies the instincts of a proud Dwarf Warrior.

    While Gandalf is one of the most powerful Wizards in all Middle-earth and a potent warrior to boot, Thráin is a wildcard that can fight with berserker strength or turn on his allies. Gandalf can be taken in Thorin’s Company, Survivors of Laketown, The White Council, the Fellowship, and the Shire armies. Thráin can be taken in either The White Council or Dark Powers of Dol Guldur armies. Gandalf can also be assembled with or without his signature hat.

    This set contains two resin miniatures: 1x Gandalf the Grey and 1x Thráin the Broken. Each model is supplied with an appropriate base.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: King Dáin Ironfoot™ and Thorin III 'Stonehelm'
  productCode: prod4620178-99851465015
  sku: 99851465015
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/King-Dain-Ironfoot-and-Thorin-Stonehelm-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851465015_KingDainThorinStonehelmLead.jpg
  status: current
  description: |-
    Having succeeded his cousin, Thorin Oakenshield, as King Under the Mountain, Dáin has ruled Erebor ever since the Battle of the Five Armies. Now he is burdened by many years, but Dáin is still a mighty warrior and a direct descendant of Durin, and he can hold his own upon the battlefield. Though age may have begun to get the better of him, and he may not be as great a warrior as he once was, the sight of Dáin Ironfoot is enough to inspire all those around him to never surrender while he still stands.

    Thorin III is the son of Dáin Ironfoot and has inherited much from his father, including the same martial prowess that Dáin was famed for. Though he has gained much from Dáin and is like his father in many ways, Thorin possesses a calmer and cool-headed nature, which lends itself well to tactical insight upon the battlefield. Yet this does not mean that he is less formidable when he goes to war, and those who underestimate the Dwarven prince are swiftly cut down. It was during the Battle of Dale where Thorin came into his own, driving back the Easterling forces from Erebor and avenging the death of his father.

    Dáin Ironfoot, King Under the Mountain, and Thorin III Stonehelm are the beating heart of the Erebor Reclaimed army list. If you're looking to set your battles during the time of the War of the Ring, they're the perfect options to lead your Dwarves to victory. They also have the added advantage of being two of the mightiest Heroes available to the forces of Good!

    This kit comprises 7 resin components with which you can assemble 1x Dáin Ironfoot, King Under the Mountain, and 1x Thorin III 'Stonehelm'. It comes supplied with 2x Citadel 25mm Round Bases.
- name: Treebeard™, Mighty Ent™
  productCode: prod4590155-99121499046
  sku: 99121499046
  ean: 5011921138852
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/Treebeard-Mighty-Ent-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499046_METreebeardMightyEntLead.jpg
  status: current
  description: |-
    Greatest of the ancient race of Ents, Treebeard is immensely old and has potentially roamed the forests of Middle-earth from the dawn of the world. Since the loss of the Entwives, Treebeard has cared little for the goings-on of those outside Fangorn Forest, instead concerning himself with shepherding those under his care. Should a threat come to Fangorn, Treebeard will undoubtedly unleash his wrath against it.

    Meriadoc Brandybuck, a Hobbit often just called Merry, is a known troublemaker and practical joker. More than once he has been responsible for setting off Gandalf's fireworks, much to the annoyance of the Grey Wizard. However, Merry is ready to help Frodo in his quest and sets out from the Shire into a life of adventure and discovery that will change him forever.

    Peregrin Took, or Pippin to those who know him, is a carefree Hobbit who is content with his life of mischief alongside his best friend, Merry. But when Pippin volunteers to be part of the Fellowship of The Ring, he has little idea of the perils that lie ahead – and the fact that he will have to leave second breakfast behind in The Shire.

    Treebeard is a natural leader of the Fangorn army list, both in terms of the narrative of Middle-earth and his near-unstoppable power on the battlefield. He can bear Merry and Pippin to battle, as he did while leading the Last March of the Ents, and the kit includes the option to include both Hobbits atop his shoulder branches. Merry and Pippin also feature in the set as models on foot in their own right – in fact, they’re a little taller than normal, as they’ve recently imbibed Ent-draught, which has given them an enchanted growth spurt!

    This kit comprises 63 plastic components with which you can assemble 1x Treebeard (who can be assembled with or without ‘mounted’ versions of Merry and Pippin), 1x Meriadoc Brandybuck on foot, and 1x Peregrin Took on foot. It comes supplied with 1x Citadel 60mm Round Base and 2x Citadel 25mm Round Bases.
- name: Dáin Ironfoot™, Lord of the Iron Hills
  productCode: prod4580403-99861465001
  sku: 99861465001
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/Dain-Ironfoot-Lord-of-the-Iron-Hills-FW-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561465001_DainIronfoot01.jpg
  status: current
  description: |-
    Dain Ironfoot is the cousin to Thorin Oakenshield and the lord of the Dwarven stronghold in the Iron Hills. A stubborn and hotheaded warlord, Dain is quick to anger even at the cost of wisdom. Yet what Dain lacks in tact, he more than makes up for with his martial prowess. There are few who can stand against this mighty Dwarven lord and those who try will often be felled by a vicious swing of his massive hammer.

    In the Strategy Battle Game, Dain Ironfoot is both a fearsome warrior and an excellent leader, ideal for commanding your ranks of Iron Hills Dwarves in battle. This kit comes with two versions of Dain, one mounted upon his iconic war boar and one on foot incase he should become dismounted during the game. Dain is one of the best fighters available to the forces of Good. Incredibly tough and strong, he can effortlessly wield his great two-handed hammer, crushing the skulls of his enemies with terrifying ease. Upon his war boar Dain is capable of smashing through ranks of enemies, leaving untold devastation in his wake. Even on foot Dain is a formidable opponent, using his own thick skull as a weapon should the need arise. Powerful though he is, perhaps his greatest strength is the courage he inspires in his army. The sight of this mighty Dwarven lord upon the battlefield drives his followers onwards to deeds of great valour, braving any threat they find themselves facing.

    This highly detailed, multipart resin kit makes two models: Dain Ironfoot on foot and Dain Ironfoot mounted on his War Boar. Each model wears heavy Dwarf armour and wields a two-handed hammer. A 40mm round base and a 25mm round base are included.
- name: Personalities of Bree™
  productCode: prod4530330-99851464017
  sku: 99851464017
  productType: single_kit
  priceGbp: 33.5
  url: https://www.warhammer.com/en-GB/shop/Personalities-of-Bree-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464017_PersonalitiesofBreeLead.jpg
  status: current
  description: |-
    The innkeeper of the Prancing Pony, Barliman Butterbur is a jolly and round-faced man who is constantly in high spirits. He goes out of his way to help Frodo and his companions when they come to Bree, ensuring they are sheltered and well fed, even when his inn is all but full.

    Old Barliman is an excellent judge of character and, as they say in Bree, can even see through a brick wall in time. Even when events in Bree grow dark, and Sharkey's Ruffians are commonplace in Bree and the Shire, Barliman remains loyal to his friends and other good-natured folk, though he will not hesitate to give troublemakers a swift clonk round the head with his cudgel if needs be.

    Harry Goatleaf is an old man of Bree, and has held the position of Gatekeeper for many years within the village. It is the job of the Gatekeeper to keep an eye on those who enter the village and to ask questions after nightfall of those he does not know in order to keep troublemakers and unsavoury-looking folk at bay. Though his role within Bree was originally for the good of the people, Harry Goatleaf was eventually turned by greed, joining Sharkey's cause in bullying the Hobbits of the Shire.

    Formerly a weak and frail pony belonging to Bill Ferny, Bill the Pony was enlisted into The Fellowship in order to carry their provisions and was cared for well by those he served, giving him a new lease of life. Sam was especially fond of Bill and would defend him courageously should the need arise.

    This highly detailed multipart resin kit builds one Barliman Butterbur, one Harry Goatleaf and one Bill the Pony and is supplied with two Citadel 25mm Round Slotta Bases and one Citadel 40mm Round Base.
- name: The Champions of Erebor™
  productCode: prod4380155-99811465020
  sku: 99811465020
  ean: 5011921142873
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 91
  url: https://www.warhammer.com/en-GB/shop/The-Champions-Of-Erebor-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811465020_ChampionsofEreborLead.jpg
  status: current
  description: |-
    Thorin’s Company found themselves in sole possession of the Lonely Mountain… and its enormous treasure hoard. Yet their joy was to be short lived, as they were soon to be confronted by a large army of Thranduil's Wood Elves and Bard’s refugees of Laketown. So it was that the Champions of Erebor armed and armoured themselves with the finest wargear of their people and vowed to protect their ancestral home at all costs.

    This set contains Bilbo Baggins and the entire Company of Thorin Oakenshield, armed and armoured with the choicest wargear from the treasure hoard of Erebor, including:

    - Thorin Oakenshield, King Under the Mountain – equipped with heavy Dwarf armour and a sword
    - Kili the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a sword
    - Fili the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a sword
    - Balin the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a two-handed mace
    - Dwalin the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour, a two-handed axe and two axes
    - Bifur the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a hand-and-a-half axe
    - Bofur the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a hand-and-a-half hammer
    - Bombur the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a flail
    - Ori the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a hand-and-a-half axe.
    - Nori the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour, mace and a shield
    - Dori the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a two-handed mace
    - Oin the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour, a sword and a shield
    - Gloin the Dwarf, Champion of Erebor – equipped with heavy Dwarf armour and a two-handed axe
    - Bilbo Baggins, Master Burglar – equipped with The One Ring, a mithril coat and Sting

    The set contains 14 resin miniatures, each supplied with a Citadel 25mm Round Base.
- name: Boromir™, Captain of the White Tower
  productCode: prod4380136-99111464206
  sku: 99111464206
  ean: 5011921145911
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Boromir-Captain-Of-The-White-Tower-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99111464206_BoromirLead.jpg
  status: current
  description: |-
    The boldest and most able commander that Minas Tirith has to offer, it is Boromir who has led the armies of the White City to victory in countless battles. Wherever he fights, the efforts of his troops are doubled and hope is rekindled. More than once has Boromir inspired those around him to steal victory from the very edge of defeat. Minas Tirith's fate is tied to that of Boromir, and she will surely fall should Boromir be slain. That is, unless, another worthy hero takes up her defence...

    Boromir is among the game’s mightiest Heroes, and never more so than when bearing the inspirational Banner of Minas Tirith to battle. The set includes two models of Boromir on foot – one carrying a shield, the other with the famed banner of the White City – both of which are clad in heavy armour. The mounted version is also bedecked in heavy armour and comes with the option to assemble him with sword or banner held aloft.

    The set contains three metal miniatures – two on foot and the other mounted on a horse – supplied with 1x Citadel 40mm Round Base and 2x Citadel 25mm Round Bases.
- name: Snaga and Grishnákh™
  productCode: prod4370385-99851462006
  sku: 99851462006
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/Snaga-and-Grishnakh-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551462006_SnagaGrishnakh01.jpg
  status: current
  description: |-
    Grishnákh leads the Orcs sent from Minas Morgul to Isengard to keep an eye on Saruman's progress. A ruthless Orc, Grishnákh has honed his skills over the years in combat and in the raiding of nearby settlements. This has left him in a position of relative power within the Orcish ranks. Following the slaughter of the Orcs and Uruk-hai at the hands of Éomer's Eored, Grishnákh pursued Merry and Pippin into Fangorn – only to receive a welcome befitting a trespassing Orc.

    A sneaky and vindictive Orc, Snaga was a part of the band of Orcs that was sent by Sauron to keep an eye upon the actions of his puppet Saruman. Along with Grishnákh and his Orcs, Snaga met with Uglúk's warband of Uruk-hai Scouts following their capture of Merry and Pippin in order to take the Halflings back to Isengard. Yet having not eaten in days, Snaga's mind turns towards eating their prisoners – a train of thought that leads to Snaga becoming the main course.

    Add some narrative flair to your Isengard collection with a warband of Mordor Orcs led by Grishnákh and Snaga. Both wear crude armour and carry swords.

    The set contains two resin miniatures, each supplied with a Citadel 25mm Round Base.
- name: Rosie Cotton™ and Gaffer Gamgee
  productCode: prod4370137-99851461006
  sku: 99851461006
  productType: single_kit
  priceGbp: 19.5
  url: https://www.warhammer.com/en-GB/shop/Middle-Earth-Rosie-Cotton-and-Gaffer-Gamgee-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551461006_RosieCottonGafferGamgee01.jpg
  status: current
  description: |-
    Before the Ruffians invaded the borders of the Shire, Rosie Cotton had been the barmaid at the Green Dragon pub in the heart of Hobbiton, and it was here that she caught the eye of the young Samwise Gamgee. Following Sam's return to the Shire as a hero, Rosie was delighted to hear of his safe return. Even with all manner of Evil things going on, Sam was concerned for Rosie's safety and would fight to make sure she was not harmed.

    The father of Samwise, Hamfast Gamgee is a well-respected Hobbit who has lived in Hobbiton for many years, and his wise and knowledgeable persona has earned him the nickname of Gaffer. Much like his son, Hamfast is a keen gardener and has spent countless hours tending to the flowers and trees that grow around his home. When the Ruffians came to the Shire and uprooted the Gaffer's garden in Bagshot Row, Hamfast rallied together those Hobbits who shared his passion for things that grow to take the fight to Sharkey's Rogues.

    This highly detailed multipart resin kit builds one Rosie Cotton and one Hamfast Gamgee, each supplied with a Citadel 25mm Round Base.
- name: Saruman™ the White & Gríma
  productCode: prod4360196-99121464029
  sku: 99121464029
  ean: 5011921133130
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Saruman-The-White-and-Grima-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464029_SarumanWhiteGrima01.jpg
  status: current
  description: |-
    Once the leader of the Council of the Wise, and the eponymous head of the White Council, Saruman the White allowed himself to be corrupted by the persuasive powers of the Dark Lord as he gazed jealously into the Palantír of Orthanc. In so doing he embarked on a road that would see him stripped of his nobility and twisted into a treacherous parody of a true Istari. So aligned, he turned his prodigious intellect to building an army to rival the Dark Lord’s own. What Saruman hoped to ultimately gain from his betrayal is shrouded in mystery, but he nonetheless used his magical knowledge against his former friend Gandalf the Grey and, in a stroke, sentenced thousands to die by fire and sword as his legions invaded Rohan.

    Gríma is a man of Rohan who willingly sold his services to Saruman in exchange for promises of wealth and power, a despicable act that saw him inveigle his way into the services of King Théoden where he could cause the most harm. When Rohan’s need for heroic leadership was greatest, the counsel of Gríma was words of despair. So it was that a lord of great promise was stripped of his will to act, sitting indolent and oblivious as the Westfold burned. Though he is no warrior, Gríma’s strength lies in his ability to twist the words and thoughts of those around him, robbing even the wise of their heroism.

    Saruman the White and Gríma Wormtongue make for a highly effective combination of sorcery and corrupting influence on the battlefield, perfectly complimenting the raw brutality of the Uruk-hai they lead.

    The set contains 4 plastic miniatures – Saruman on foot and mounted, Gríma Wormtongue and a Palantír on a plinth. The models come supplied with one Citadel 40mm Round Base and three Citadel 25mm Round Bases. Their rules can be found in Armies of *The Lord of The Rings™*.
- name: Gamling and Háma
  productCode: prod4360181-99111464201
  sku: 99111464201
  ean: 5011921137183
  eanSource: shopify:goblingaming.co.uk
