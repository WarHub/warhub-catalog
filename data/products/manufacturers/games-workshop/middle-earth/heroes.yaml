    Dragons fight with a ferocity all but unmatched by most creatures in Middle-earth – their claws can pierce armour and a snap of their jaws will cleave a Man in two. However, not all Dragons have the same abilities – some have thick, scaly hides that arrows bounce off, others manipulate magic to confound their foes, and a few can unleash huge gouts of flame to reduce whole settlements to ash.

    This multipart resin kit builds one Dragon, a mighty winged creature for your Dragons of the North or Moria armies in the Middle-earth Strategy Battle Game. Dragons spread fear and terror across the land, and can easily swing a battle in your favour.

