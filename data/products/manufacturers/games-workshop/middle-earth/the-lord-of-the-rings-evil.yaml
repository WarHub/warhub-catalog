  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811464022_HaradrimCommandersNEW01.jpg
  status: current
  description: |-
    The Haradrim hail from the southernmost lands of Middle-earth, where the landscape is dominated by serpent-infested plains and arid deserts. They are a cruel race of Men, their hearts long ago hardened by the weight of a bloody history and their destiny tied irrevocably to that of Sauron. While they are not bound by his rule like many of his vassals, they choose to fight alongside his armies out of enmity with Gondor. When the Haradrim put aside their petty squabbling and unite under one banner, they do so in numbers that rival the armies of Mordor itself. Swarms of lightly armoured warriors descend upon their foes, peppering them to death with poisoned arrows or attacking them with long, barbed spears. What they lack in terms of skill and training, the men of Harad more than make up for with barbaric cruelty. Amongst these evil men are the Captains and heralds of Harad - those who have fought for The Dark Lord Sauron for many years, and who now lead his armies into battle, inspiring their fellow men to fight harder and stronger than ever before.

    This boxed set contains a set of Haradrim Commanders. These models are resin cast miniatures, including a Haradrim Captain, a Warrior with war horn, a banner bearer, and a Taskmaster. They are supplied as 6 separate components, and come with 4 25mm round bases.
- name: Easterling Commanders
  productCode: prod1460145a-99811464019
  sku: 99811464019
  ean: 5011921027330
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Easterling-Commanders
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811464019_EasterlingCommandersNEW01.jpg
  status: current
  description: |-
    Easterlings are amongst the most fanatical followers of the Dark Lord and the best equipped of all the warriors at his command. Unlike the rabble of Orcs that spew forth from the Black Gate, the armies of the East are well-trained and disciplined warriors that will fight fiercely for Sauron, who they view as a vengeful deity. As children they are schooled in the art of war, and their womenfolk fight alongside the men as equals - in Rhûn all are prepared to fight for the Dark Lord. Amongst these evil men are the Captains and heralds of the Easterling Realm - those who have fought for The Dark Lord Sauron for many years, and who now lead his armies into battle, inspiring their men to fight harder and stronger than ever before.

    This boxed set contains a set of Easterling Commanders. These models are resin cast miniatures, including an Easterling Captain, a Dragon Knight on foot, a banner bearer, and an Easterling War Priest. They are supplied as 4 separate components, and come with 4 25mm round bases.
- name: 'The Path of Cirith Ungol™: Shelob™ & Gollum™'
  productCode: P-236863-99121499065
  sku: 99121499065
  ean: 5011921263943
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/the-path-of-cirith-ungol-shelob-and-gollum-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499065_MiddleEarthPathOfCirithUngolShelobAndGollum01.jpg
  status: current
  description: |-
    It is said that a dark terror stalks the mountain pass high above Cirith Ungol, traversing its winding tunnels and hunting any who stray into its domain. This creature is Shelob, the spawn of Ungoliant – a giant, bloated spider that has dwelt within Mordor for millennia. Over the Ages, countless beings have been ensnared in the webs of Shelob. Yet Shelob likes to feed on fresh, warm blood, preferring to inject her prey with a paralysing venom before entangling them in webbing to save for later.

    This multipart plastic kit builds Gollum, a twisted fighter for your Garrison of Ithilien armies, Shelob, a mighty spider for your Army of the Great Eye and Cirith Ungol armies, and an envenomed Frodo for use in the Middle-earth Strategy Battle Game. The hulking Shelob is a terrifying foe, and a treat for painters and collectors, covered with details that show her age, along with scenic base elements. Gollum shares a similarly rocky scenic base, over which he can be seen creeping. The webbed Frodo miniature can be used as a marker for scenarios found in the *Middle-earth Strategy Battle Game Journal: The Treachery of Gollum* supplement, which is available separately.

    This kit comprises 42 plastic components, 1x Citadel 80mm Round Base, and 2x Citadel 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for these miniatures can be found in the *Armies of The Lord of the Rings*™ and *Armies of Middle-earth* supplements, both available separately.
- name: Corsairs of Umbar™ Crossbowmen
  productCode: P-213895-99061464242
  sku: 99061464242
