  description: |-
    The bullies and scoundrels that flocked to Sharkey's call to invade the Shire could be considered among the worst examples of the race of Men. Their hearts were filled with greed for that which others had earned, and bitterness towards the joy of those around them. This manifested itself cruelly in a way in which they swiftly and violently oppressed the Hobbits.

    As their name suggests, Ruffians are a bunch of crudely equipped bullies who serve Sharkey. The set includes a total of 12 Ruffians, armed as follows:

