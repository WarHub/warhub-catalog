  description: |-
    A Shade is a grotesque amalgam of tortured spirits, contorted and bound to the will of the Witch-king of Angmar. These unfortunate souls have become an embodiment of terror and despair – their very presence can sap the courage and freeze the hearts of even the boldest of warriors.

    This multipart metal kit builds a single Shade, a union of lost souls that serves the armies of Angmar in the Middle-earth Strategy Battle Game. This powerful spirit is clad in flowing spectral robes, with crowned, wailing faces and accusing hands protruding from its shapeless form. Such an entity is a terrifying foe, conjuring fell mists and draining the life from any who stand against the Witch-king.

    This kit contains 2 metal components and 1x Citadel 40mm Round Base.

