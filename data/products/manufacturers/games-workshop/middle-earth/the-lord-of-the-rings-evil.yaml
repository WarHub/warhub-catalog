    The chieftains of the Wild Wargs that roam the north are ferocious creatures, having asserted themselves as the leader of their pack. Only the very strongest of these beasts can remain as chieftain, for they are constantly challenged by younger Wargs for dominance. The many scars they possess are a testament to how many challenges to their rule they have overcome; the more they bear, the deadlier they have become.

    This set contains a Wild Warg Chieftain, a metal miniature supplied with a 40mm round base.
- name: The Dark Lord Sauron™
  productCode: prod1500537a-99811466002
  sku: 99811466002
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/The-Dark-Lord-Sauron
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811466002_TheDarkLordSauronNEW01.jpg
  status: current
  description: |-
    Sauron is the Dark Lord, the Enemy, the Lord of the Ring. He is driven by a consuming desire to dominate all of Middle-earth and by a burning hatred of Elves, Men and all who stand in his way. It was Sauron who crafted the great Rings of Power and gave them as gifts to the rulers of the free races of Middle-earth. Yet still, he held the One Ring, the one that ruled all others, and it was through this mighty tool that Sauron enslaved the other ring bearers to his will. His vast armies of Orcs and other fell creatures were unleashed upon the world, but the Last Alliance of Men and Elves defeated his hordes and finally laid siege to his fortress of Barad-dûr in the land of Mordor. There, at a terrible price, the One Ring was cut from his hand and he was finally vanquished. Though not destroyed...

    This boxed set contains The Dark Lord Sauron and the prone forms of Elendil and Isildur. These models are resin cast miniatures supplied as 10 separate components, and come with 2 40mm round bases.
