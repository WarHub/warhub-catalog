  description: |-
    There are some Goblins who thrive upon the idea of an unfair fight – who dwell in the shadows, waiting to strike without being noticed. These Prowlers are often employed by aspiring Goblin Kings to instill fear and loyalty, and to squash any dissension within the Goblin ranks. Goblin Prowlers, although more skilled than their lowly kin, are most deadly when they are able to outnumber and corner their intended victims.

    Goblin Prowlers excel in bullying their opponents. They can fell even mighty warriors using weight of numbers and underhanded tactics, trapping them in order to land a flurry of sneaky attacks. Should this fail, their trusty two-handed axes are more than a match for most.

    The kit contains of two sets of 3 metal Goblin Prowler miniatures, supplied with a 6x Citadel 25mm round slotta bases.

