  description: |-
    Moria Goblins are small, mean-spirited creatures that live a troglodyte existence in the numerous mines beneath the Misty Mountains, and many of the once-great Dwarven halls are now home to these loathsome beings. They scuttle through the tunnels with amazing dexterity, attacking, destroying and consuming intruders that venture into their dark realm. They are a low kind of degenerate Orc that rely on large numbers to overwhelm the foe.

