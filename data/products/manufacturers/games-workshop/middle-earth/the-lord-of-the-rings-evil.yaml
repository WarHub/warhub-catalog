  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061462071_FightingUrukHaiCommand01.jpg
  status: current
  description: |-
    Saruman’s defection to the service of the Dark Lord left him with one monstrous obsession – to build an army worthy of Mordor. To that end, the beautiful grounds of Orthanc were reduced to the sprawl of industry as he had his new orcish servants raise up an army of hideous creations, the Fighting Uruk-hai. Warriors as tall and broad as the mightiest of Men, resistant to sunlight and able to fight without tiring, these would be his weapon against the Free Peoples. Against Rohan, he unleashed Uruk-hai warriors by the thousand, clad in thick armour and armed with pikes, shields and crossbows made in the heinous forges beneath Isengard.

    These three commanders offer your Fighting Uruk-hai a variety of powerful options – the fighting skill and leadership of a Captain, the magical powers of a Shaman and the inspirational effects of a Banner Bearer.

    The set contains three metal miniatures – an Uruk-hai Captain, Shaman and Banner Bearer – each supplied with a Citadel 25mm Round Base.
- name: Lurtz and Uglûk™
  productCode: prod4300220-99061462068
  sku: 99061462068
  ean: 5011921136438
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 22
  url: https://www.warhammer.com/en-GB/shop/Lurtz-And-Ugluk-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061462068_MELurtzUgluk01.jpg
  status: current
  description: |-
    The mightiest of Saruman’s Uruk-hai, Lurtz is entrusted with leading the mission to capture the Ringbearer. At the head of a contingent of scouting Uruk-hai, this relentless hunter is dogged in his pursuit, tracking the Fellowship of the Ring to Amon Hen, and there dispatching Boromir with merciless efficiency.

    A captain in Lurtz’s raiding force, Uglûk takes command of the Uruk-hai scouts after the ambush at Amon Hen and their leader's death, driving his warriors (and their Hobbit prisoners) onwards towards Isengard. Unflinching obedience to Saruman’s orders is all that drives Uglúk onwards, and when Grishnákh’s Orcs threaten his prisoners, Uglúk is swift to act, restoring order and loyalty within the ranks (and putting meat back on the menu!) with a single sweep of his blade.

    These Uruk-hai Heroes are powerful leaders of their brutish kin. Lurtz is armed with an Uruk-hai bow, shield and scimitar, while Uglûk carries a bloodied scimitar and the freshly severed head of an Orc that has displeased him.

    This set contains two metal miniatures – Lurtz and Uglûk – supplied with two Citadel 25mm Round Bases.

    Rules for these Heroes can be found in the Armies of The Lord of the Rings™.
