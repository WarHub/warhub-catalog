    The Morannon Orcs are a hardy strain found within the armies of the Black Gate and Barad-dûr. Those who lead such warriors have fought for the Dark Lord Sauron for many years, and now lead his armies into battle, inspiring their fellow Orcs to fight all the harder.

    This multipart metal kit builds a Captain, a banner-bearing warrior, and a Mordor Orc rallying the troops with a drum, for use in your Barad-dûr, Army of Gothmog, Cirith Ungol, The Black Gate, Minas Morgul, and Legions of Mordor armies. These essential leaders are ideal for bolstering the strength of your force, adding hitting power, and inspiring the troops under their command.

    This kit contains seven metal components, and 3x Citadel 25mm Round Slotta Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Shade of Angmar™
  productCode: P-188911-99061466055
  sku: 99061466055
