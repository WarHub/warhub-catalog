  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464192_SerpentRiders01.jpg
  status: current
  description: |-
    Some of the Serpent Guard will mount themselves upon horseback and ride to battle alongside their lord. Every bit as skilled as their counterparts on the ground, these riders charge into their enemy with a deadly force, their spear covered in the same poisons as those used by their king. In return for their absolute loyalty, Suladân rewards his personal guard with the first pick of the spoils of war, after himself, of course.

    Each Serpent Rider rides a swift steed and bears a spear laced with deadly poisons. They make for thematic (and incredibly deadly) bodyguards for Suladân, the Serpent Lord, or the Nazgûl known as the Betrayer.

    This 11-part metal kit contains two Serpent Riders, and comes supplied with 2x Citadel 40mm Round Bases.
- name: Ruffian Leaders
  productCode: prod4270151-99851464010
  sku: 99851464010
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/Ruffian-Leaders-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464010_MERuffiansLeaders01.jpg
  status: current
  description: |-
    The leader of Sharkey's Ruffians, Sid Briarthorn was a huge brute of a man who possessed great strength – at least in the eyes of the Hobbits of the Shire. His enforcer, Rowan Thistlewood, revelled in bullying and tormenting the Hobbits of the Shire and burning the Hobbit-holes at Woody End. Completing the trio of rogues is Bill Ferny, a minor spy from Bree who had dealings with the four Travellers as they left the Prancing Pony for Rivendell – and was given a swift kick in the behind by Bill the Pony for his trouble!

    These three Ruffians are armed with a mix of weaponry and each carry a set of manacles. They are perfect for tormenting any Hobbits that get in your way as you seek to claim control over the Shire.

    This highly detailed multipart resin kit builds one Sid Briarthorn, one Rowan Thistlewood and one Bill Ferny. It is supplied with three 25mm Citadel round bases.
- name: Râza and Delgamar
  productCode: prod4170144-99851464008
  sku: 99851464008
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/Raza-and-Delgamar-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464008_MERazaandDelgamar01.jpg
  status: current
  description: |-
    The highest-ranked Corsair Captain under Dalamyr’s command, Delgamar has been granted the station of Gatemaster of Umbar. Though this requires him to spend the majority of his time guarding the ports and gateways into the shadowed city, Delgamar still captains his ship on raids up and down the southern coastlines of Gondor. Those under Delgamar’s command will follow his every order, for those who disobey the Gatemaster of Umbar will feel the searing pain of the lash of the captain’s whip.

    When Suladân’s rise to power began, other ambitious chieftains often sought to dethrone the future Serpent Lord. Whenever such conflict arose, Suladân would call on Râza, his own personal bodyguard. Unshakably loyal, Râza would be commanded to seek out the enemies of his master and dispatch them in such a way as to make an example of them for their treachery. With Râza under his command, it wasn't long before Suladân’s rule was cemented, and Râza would earn the moniker of the Fang of the Serpent.

    This set contains not one, but two Heroes for your Evil army in the Middle-earth Strategy Battle Game! Used together in the same army make a cracking team – the former leading fellow Corsair Warriors in battle, the latter being a supreme hunter of other Heroes. Râza is a Hero of Fortitude for the Haradrim, while Delgamar is a Hero of Valour for the Corsairs of Umbar.

    This kit is supplied in 10 resin components, with 2x 25mm plastic bases. Râza is armed with a spear, and has a choice of two heads – one with scarf over his face, the other with face showing. Delgamar is armed with a sword, whip and throwing daggers.
