  description: |-
    Gothmog is the highest ranking of Sauron's Orcs, and the Castellan of Minas Morgul. A veteran of countless battles, Gothmog bears the many wounds and scars of the wars he has fought in Sauron's name. Although his skill in battle may have diminished by injury, Gothmog possesses something more valuable – his skill as a tactician makes him the master of any battlefield he sets foot upon, a trait that is seldom found within the race of Orcs.

    This impressively versatile multipart plastic kit builds Gothmog, Lieutenant of Sauron, both on foot and on the back of a vicious Warg. Both versions are clad in heavy armour, and can be equipped with either a sword or mace, plus an optional shield. The mounted model can also be assembled without glue, allowing you to dismount Gothmog during the game and keep his Warg in play. Any player fielding the armies of Mordor will want this superlative Orcish general on the table for his ability to command the forces of Evil and spread his hatred to fellow Orcs, while his iconic appearance makes him ideal for collectors and painters.

    This kit comprises 25 plastic components, and comes with a Citadel 25mm Round Base and a Citadel 40mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Dragon Emperor of Rhûn™
  productCode: prod4920220-99861464023
  sku: 99861464023
  productType: single_kit
  priceGbp: 89
  url: https://www.warhammer.com/en-GB/shop/the-dragon-emperor-of-rhun-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861464023_DragonEmperorLead.jpg
  status: current
  description: |-
    There are few, if any, who know the true identity of the Dragon Emperor – his past is shrouded in mystery, and those who speak too openly of him often vanish. In truth, the Dragon Emperor is the greatest of all the Easterlings, ruling the lands and people of Rhûn with an iron fist. It was under the Dragon Emperor's command that Amdûr founded the Order of the Black Dragons, a warrior cult dedicated to their liege – their sole purpose to carry out his will. When Sauron commanded that the Easterlings wage war upon the north, the Dragon Emperor himself led them into battle standing upon his Royal Palanquin. From atop this mighty structure he wields an exquisite glaive, and it is said that he has never once been bested in a duel.

    This multipart resin kit builds one Dragon Emperor atop his Royal Palanquin with a coterie of six Black Dragon bearers, as well as one separate Dragon Emperor on foot. This Hero of Legend grants massive benefits to all nearby Easterlings, who fight all the harder in the presence of their ruler. If you’re planning to mount an Easterling invasion of the northern lands, you’ll want the Dragon Emperor leading it.

    This kit comprises 63 resin components, and comes supplied with a Citadel 25mm Round Base and a Citadel 80mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints. This resin modelling kit is not a toy – it is a collectible item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Easterling™ Black Dragon Warriors
  productCode: prod4920219-99861464022
  sku: 99861464022
  productType: single_kit
  priceGbp: 49.5
  url: https://www.warhammer.com/en-GB/shop/easterling-black-dragon-warriors-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861464022_EasterlingBlackDragonWarriorsLead.jpg
  status: current
  description: |-
    At the highest echelons of the Easterling army stand the Black Dragons, a mysterious warrior cult fanatically dedicated to warfare in the name of Sauron. Within its ranks, many Easterlings undergo vigorous and ruthless training in order to hone their martial skills and dexterity. Should they survive their training, they will advance to Dragon Cult Acolytes, before finally becoming fully-fledged Dragon Knights, and one of the most elite warriors in the Easterling armies.

    This multipart resin kit builds six finely-detailed Black Dragon Warriors armed with heavy armour, shields, and either a sword or pike. One warrior can be assembled with a banner, sword, and shoulder-slung shield. Every Easterling army will want a cadre of these vicious warriors on the front lines – they are stronger and more resilient than normal Easterling Warriors, and boast more ornate shields, armour, and helmets as well, giving them a distinctly sinister appearance on the battlefield. These models can also be used to represent the palanquin-bearers of the Dragon Emperor of Rhûn, when he dismounts.

    This kit comprises 48 resin components, and comes supplied with 6x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Rutabi and Brórgîr, Heroes of Rhûn
  productCode: prod4870193-99851464021
  sku: 99851464021
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/brorgir-and-rutabi-heroes-of-rhun-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851464021_MEBrogirAndRutabiLead.jpg
  status: current
  description: |-
    A gifted fighter even by the standards of the Easterlings, Rutabi has been trained personally by Amdûr and even the Dragon Emperor himself. This has seen her rise swiftly through the ranks of the Easterling army to become General of the Dragon Legion, and one of the Emperor's most trusted commanders. A cold and ruthless fighter who will slay any warrior she defeats, there are few who have crossed blades with Rutabi and lived to tell the tale.

    Brórgîr is the head of the Easterling War Priests – those who have pledged themselves to worshipping the Dark Lord with a frenzied devotion. Brórgîr has delved deeper than his fellow War Priests into ancient scrolls and texts, developing his dark powers to the point that he can even splinter the very ground before him.

    These two Heroes are among the foremost leaders of the Easterlings. If you're looking to complete your Rhûn collection, or take your army of Easterlings to the next level in battle, look no further than this pair –one a ruthlessly skilled fighter and consummate commander; the other, the most highly skilled spellcaster of his order.

    This kit comprises 13 resin components with which you can assemble 1x Rutabi and 1x Brórgîr. It comes supplied with 2x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Easterling Dragon Cult Acolytes
  productCode: prod4590160-99851464018
  sku: 99851464018
  productType: single_kit
  priceGbp: 23
  url: https://www.warhammer.com/en-GB/shop/Easterling-Dragon-Cult-Acolytes-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464018_EasterlingDragonCultAcolytesLead.jpg
  status: current
  description: |-
    Within the Dragon Cult, only those who show true promise will progress from the Black Dragons to the Dragon Cult Acolytes. It is here, within the order, that the Acolytes learn to develop the greater sense of agility and dexterity that they require to become fully fledged Dragon Knights. Yet the trials are rigorous; Acolytes don much lighter armour to aid their fluid movement and will often spend hours on end forced to evade the blades and arrows of their sparring partners as they hone their skills. Constant practice makes the Dragon Cult Acolytes fearsome foes when they are unleashed upon the battlefield.

    Give your Easterling army a honed edge and cut your way through the enemy battleline with these elite killers. Their combination of throwing daggers, twin swords, and murderous profile enable Dragon Cult Acolytes to engage and swiftly overwhelm multiple opponents at once.

    This kit comprises 18 resin components with which you can assemble 3x Dragon Cult Acolytes, and it comes supplied with 3x Citadel 25mm Round Bases.
- name: The Black Riders™
  productCode: prod4570177-99111466053
  sku: 99111466053
  ean: 5011921154371
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/Middle-earth-The-Black-Riders-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99111466053_MEBlackRidersLead.jpg
  status: current
  description: |-
    The Ringwraiths, The Nazgûl, The Nine, The Black Riders – all are names for the terrifying undead servants of Sauron. Once they were the kings of the races of Men who were gifted rings of power by Sauron. However, they became corrupted by the power of the Dark Lord and fell into nothingness, their bodies faded and their minds twisted by malice and cruelty. They now serve Sauron unwaveringly, for they are utterly enslaved to his will.

    The Black Riders comprise nine of Sauron’s most powerful servants. Whether leading warbands of the Dark Lord’s minions or riding together as they did in search of the Ringbearer, each Ringwraith is a formidable opponent, and none more so than their leader, the Witch-king of Angmar.

    The set contains three metal miniatures, each supplied in three components and with a Citadel 40mm Round Base. Their rules can be found in the Armies of *The Lord of the Rings*.
- name: Mordor™ Uruk-hai™
