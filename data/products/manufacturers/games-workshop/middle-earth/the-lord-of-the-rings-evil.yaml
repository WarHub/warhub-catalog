  status: current
  description: |-
    Corsair Crossbowmen make their first strikes as the black-sailed ships of Umbar pull alongside the hulls of their intended conquests. From behind their wooden pavises, they unleash a flurry of crossbow bolts towards their foes, allowing the remainder of their crewmates to board unchallenged and take the ship for their own. It is commonplace for Corsairs to place hefty wagers amongst each other as to who can shoot down the most enemy crewmembers.

    This multipart metal kit builds three Corsairs of Umbar Crossbowmen, vicious ranged fighters for your Corsair Fleets or Grand Army of the South forces in the Middle-earth Strategy Battle Game. Their tall shields protect them from retaliation as they rain down bolt after deadly bolt on their foes.

    This kit contains 7 metal components, and 3x Citadel 25mm Round Slotta Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Corsairs of Umbar Crossbowmen in Corsair Fleets can be found in the *Armies of The Lord of the Rings*™ publication, which is available separately. Rules for using them in a Grand Army of the South can be found in the *Armies of Middle-earth* publication, also available separately.
