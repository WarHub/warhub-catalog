    This plastic boxed set contains 30 components, with which to build 24 Corsairs of Umbar: 8 with spear, 8 with hand weapon and shield, and 8 with bow. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Haradrim™ Warriors
  productCode: prod3940197-99121464023
  sku: 99121464023
  ean: 5011921110544
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Haradrim-Warriors-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464023_HaradrimWarriorsLead.jpg
  status: current
  description: |-
    The Haradrim hail from the southernmost lands of Middle-earth, where the landscape is dominated by serpent-infested plains and arid deserts. They are a cruel race of Men, their hearts long ago hardened by the weight of a bloody history and their destiny tied irrevocably to that of Sauron. While they are not bound by his rule like many of his vassals, they choose to fight alongside his armies out of enmity with Gondor. When the Haradrim put aside their petty squabbling and unite under one banner, they do so in numbers that rival the armies of Mordor itself. Swarms of lightly armoured warriors descend upon their foes, peppering them to death with poisoned arrows or attacking them with long, barbed spears. What they lack in terms of skill and training, the men of Harad more than make up for with barbaric cruelty.

    Life amongst the perpetually warring tribes of Harad has always been hard, for even when there is no greater conflict, the inter-tribal raids grant little peace, and such continual warfare has left the menfolk hardened to the arts of battle.

    This plastic boxed set contains 32 components, with which to build 24 Haradrim Warriors: 24 with spear, or 24 with bow. This set comes with 24 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Easterling Warriors
  productCode: prod3940192-99121464018
  sku: 99121464018
  ean: 5011921109289
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Easterling-Warriors-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121464018_EasterlingWarriors.jpg
  status: current
  description: |-
    Easterlings are amongst the most fanatical followers of the Dark Lord and the best equipped of all the warriors at his command. Unlike the rabble of Orcs that spew forth from the Black Gate, the armies of the East are well-trained and disciplined warriors that will fight fiercely for Sauron, who they view as a vengeful deity. As children they are schooled in the art of war, and their womenfolk fight alongside the men as equals - in Rhûn all are prepared to fight for the Dark Lord. Trained to fight in deadly phalanxes, their spears form a hedge of sharpened blades that is virtually impenetrable - only a foolish general would send his warriors to take on a block of Easterlings head on.

    This plastic boxed set contains 54 components, with which to build 20 Easterling Warriors: 8 with sword and shield, 8 with bow, and 4 with spear and shield. This set comes with 20 25mm round bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
