  description: |-
    The Iron Guard are a group of elite warriors, grim of face and stout of heart. Traditionally, the role of these warriors was to guard the trade routes between the varying kingdoms of the Dwarves, protecting those that travelled between them. Because of this, it has become a requirement that the Iron Guard adopt a more aggressive nature than their kin. Many Goblin raids have been halted by these warriors, with thrown axes and sword thrusts felling their foes.

    This pack contains 4 Dwarf Iron Guard. These models are resin cast miniatures, supplied as 4 separate components, and come with 4 25mm round bases.
