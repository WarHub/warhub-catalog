  description: |-
    The tunnels beneath The Misty Mountains can be a dangerous place to roam; Goblins and other foul creatures are forever lurking in the shadows. It is for this purpose that the Vault Warden teams were created to blockade tunnels against the Goblin threat. Always fighting as a pair, the front Dwarf wields a great Iron Shield, preventing their enemies from reaching the Dwarven lines, whilst the rear Dwarf skewers his foe with a huge foe spear – a deadly combination.

    This pack contains a Dwarf Vault Warden Team. These models are resin cast miniatures, supplied as three separate components, and come with two 25mm round bases.
- name: Dwarf Iron Guard
  productCode: prod1500393a-99801465002
