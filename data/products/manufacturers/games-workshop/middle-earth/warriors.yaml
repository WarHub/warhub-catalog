    The bulk of Saruman's legions are composed of Uruk-hai, some of the most deadly and savage warriors in Middle-earth. Clad in plate armour and armed with powerful crossbows, they provide long-range fire support for the advancing army. Many an armoured knight has thought himself safe at a distance, only to find his horse shot from beneath him by these deadly marksmen.

    This pack contains four Uruk-hai with Crossbows. These models are resin cast miniatures, supplied as 8 separate components, and come with 4 25mm round bases.
