    Khazâd Guard are heavily-armoured infantry that can be used in armies of The Kingdom of Khazad-dûm™. Their deadly two-handed axes allow them to effortlessly cut down swathes of enemies effortlessly, while their armour allows them to stoically protect the army's leaders as bodyguards.

    This kit comprises eight single-piece metal Khazâd Guard miniatures, and is supplied with 8x Citadel 25mm Round Bases.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Spiders of Middle-earth™
  productCode: prod4790152-99111466050
  sku: 99111466050
  ean: 5011921153855
