    Morgul Knights are the embodiment of all the cruelty and malice in Mordor. They are the elite of Sauron's armies, cruel and silent warriors astride dark steeds who wield wicked lances with fearsome skill. Each Morgul Knight is touched by a portion of Sauron's malice, and only the noblest of beings can summon courage enough to stand against them in battle.

    This box set contains 6 plastic Morgul Knights. This 40-piece set includes 6 different Morgul Knight bodies, 6 different helmets, 3 variations of horse, 6 different lance arms, a sword arm, 3 variations of shield, and a banner with sculpted detailing. Models supplied with 40mm round bases.
- name: Goblin Mercenaries
  productCode: prod3860120-99861462003
  sku: 99861462003
  productType: single_kit
  priceGbp: 58.5
  url: https://www.warhammer.com/en-GB/shop/Goblin-Mercenaries-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561462003_GoblinMercenaries01.jpg
  status: current
  description: |-
    Following the death of the Goblin King at the hands of Thorin's Company, the Goblins of Goblin Town have joined Azog's forces at the Battle of the Five Armies. Eager to avenge their fallen king, these mercenaries have been provided with better equipment than that of the Goblins still in Goblin Town and can arrive at the battle seemingly from out of nowhere. The promise of revenge was enough to convince their leaders to take up arms against the Dwarves. Life in the Misty Mountains has made the captains of the Goblin Mercenaries more cunning than those they command, able to launch ambushes from seemingly impossible situations.

    This multipart resin kit contains the components necessary to assemble 13 Goblins – 12 Mercenaries and a Mercenary Captain. Wiry and misshapen, the Goblin Mercenaries are at the very least a little more well-equipped than standard Goblins; their horrid boils and spindly limbs are for the most part encased in armour, with plates, spikes and buckles on their legs, arms and chests. Each can be armed with your choice of sword – these are vicious, serrated blades more suited to bludgeoning than subtle swordplay – or bone pick, which consist of sharp bones lashed together on a wooden stave with thick cord. The Captain can be distinguished by his sinister full-face helm; included is a scenic base for him to stand on, depicting a rocky outcrop.

    This kit comes as 66 components, and is supplied with 13 25mm round bases.
- name: Troll Brute
  productCode: prod3530282-99861466005
  sku: 99861466005
  productType: box_set
  priceGbp: 103
  url: https://www.warhammer.com/en-GB/shop/Troll-brute-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561466005_TrollBrute01.jpg
  status: current
  description: |-
    Tortured and mutilated by Orcs, these Trolls have been specifically bred for war. Many of them have had limbs removed and replaced with crude and merciless weaponry. With every lumbering stride, they crush and mangle those in their path, spiked feet and swinging flails leaving a trail of broken bodies and splattered gore in their wake. A Monster for an Evil army, the Troll Brute is particularly adept at annihilating enemies – the enormous metal flails that have replaced his arms, and the spiked metal balls in place of his feet are certainly up to the task. Lacking armour, clad only in a hastily-arranged loincloth, his skin is marked with the scars of many, many battles; in a particularly grisly detail his eyes have been plucked out and replaced with the chains his rider uses as guidance.

    The kit comes with a choice of two different riders: A Gundabad Orc, or Bofur the Dwarf. The latter is capable, with the help of his kin, of mounting the Troll Brute, slaying its rider and taking control with devastating effect.

    This multipart resin kit comes in 21 components, and is supplied with an 80mm round base.
- name: Gundabad Berserkers
  productCode: prod3380279-99851462001
  sku: 99851462001
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Gundabad-Berserkers
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551462001_GundabadBerserkers01.jpg
  status: current
  description: |-
    From the great fortress of Gundabad, Bolg leads his army of Orcs and foul creatures towards the Battle of the Five Armies. Sprinting ahead of this mighty throng are the fearsome Gundabad Berserkers, creatures of heaving muscle and snarling malice with a monstrous craving for flesh. It is these hulking beasts that are first to reach Ravenhill and engage Thorin Oakenshield™, Dwalin and Bilbo Baggins™ amid the ruins. The scent of battle drives these Orcs into a frenzy, making them oblivious to all but the most fatal of blows.

    Gundabad Berserkers are an excellent elite unit for an Azog’s Legion army. The combination of their high Strength value, multiple attacks and the ability to take a variety of weapons allows them to butcher their foes with sheer brutality. On top of this, the Gundabad Berserkers are bloodthirsty killers driven into madness by the spilling of blood. Blinded by the frenzy that overtakes them, they are oblivious to the pain that is inflicted by their foes, allowing them to fight on even with debilitating injuries. This kit includes three Gundabad Berserkers and a total of nine weapon options: three swords, three axes and three two-handed picks, allowing you to equip your Berserkers with whichever combination of weapons you wish.

    This is a multipart resin kit that includes multiple weapon options and makes three complete miniatures. 3 25mm round bases are included.
