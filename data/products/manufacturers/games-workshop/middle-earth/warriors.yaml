  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861465018_MEIHDwarfWarriorWbandwMattocks02.jpg
  status: current
  description: |-
    The Dwarves of the Iron Hills will follow their lord into battle without question. Equipped with huge mattocks, their unbending resolve and will to fight driving them forwards even in the face of unassailable odds. Just as with Dwarven armour, no weakness is permitted in the Iron Hills army, so the Dwarves of Dáin’s army are the finest of their kind.

    Start your hardy Iron Hills or Erebor Reclaimed army – or add to your existing collection – with this set of 14 resin miniatures for use in your games of the Middle-earth™ Strategy Battle Game.

    This warband is led by an Iron Hills Dwarf Captain, hand-picked for the role by Dáin himself, who leads from the front and will be found fighting right in the thick of battle – his combat skill and tactical prowess setting him apart from the Dwarves under his command. Following his command is an Iron Hills Dwarf carrying a banner and 12 Iron Hills Dwarves equipped with mattocks – savage axe-like weapons that are designed to smash through armour with ease.

    **This set includes:**
    - 1x Iron Hills Dwarf Captain with mattock
    - 1x Iron Hills Dwarf Warrior with banner
    - 12x Iron Hills Dwarf Warriors mattock

    This kit comprises 30 resin components and comes with 14x Citadel 25mm Round Bases. The miniatures in this set are supplied unassembled and unpainted – we recommend using Citadel Colour paints. Rules for using these miniatures in the Middle-earth™ Strategy Battle Game can be found in the *Armies of The Hobbit*™ book.
