    High Elves are the deadliest warriors in all of Middle-earth, combining skill-at-arms with expertly fashioned wargear. They are proficient with swords, spears and bows, and are the bravest of all troops that march under the banners of the Free Peoples.

    These are highly detailed High Elf Warriors. Each model wears superbly crafted attire including long flowing robes and intricately detailed armour. Each of these Warriors grips a long glaive. They also carry a flamboyant shield featuring daedal patterns and with a large gem set into it.

