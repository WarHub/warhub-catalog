  description: |-
    The Sentinels wander the paths far from the settlements of the Elves. As such they’re often the first to encounter any enemies that stray onto their lands. It’s their duty to warn the realms of the Elves of any danger and aid in the woodland's protection. The sentinels carry lutes, horns, and other musical instruments on their patrols – the music they play is laden with magical properties to lead their foes astray and strengthen their allies.

    Wood Elf Sentinels can be taken as a Warrior choice for the armies of both Lothlórien and the Halls of Thranduil. Armed with bows, swords, and simple cloaks, they grant boons to friendly models and strike fear in the hearts of Evil foes.

    This set contains three single-piece metal Sentinels. Each model is supplied with an appropriate base.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
