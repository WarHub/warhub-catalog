    Elven Captains are highly skilled warriors, more than a match for even the most powerful Evil Heroes. They serve as reliable warband leaders for the Thranduil's Halls army list.

    The set contains three resin miniatures – a Palace Guard Captain, a Mirkwood Ranger Captain and a Mirkwood Armoured Captain – supplied with 3 Citadel 25mm Round Bases. Their rules can be found in Armies of *The Hobbit*™.
- name: Warriors of Erebor™
  productCode: prod4070161-99121465009
  sku: 99121465009
  ean: 5011921115013
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
