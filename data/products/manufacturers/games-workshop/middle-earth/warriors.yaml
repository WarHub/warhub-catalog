  status: current
  description: |-
    The Men of Númenor fought alongside the Elves to defeat Sauron at the end of the Second Age.

    This set contains 3 Warriors of Númenor with spears. Note that a variety of designs are available and are supplied at random.

    These are metal Citadel models which are supplied unpainted and require assembly. We recommend using Citadel Paints.
- name: The Woses™ of Drúadan Forest™
  productCode: P-213908-99111464239
  sku: 99111464239
  productType: single_kit
  priceGbp: 69.5
  url: https://www.warhammer.com/en-GB/shop/the-woses-of-druadan-forest-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99111464239_MEWosesOfDruadanForest01.jpg
  status: current
  description: |-
    The Woses of Drúadan Forest rarely venture beyond the borders of their woodland realm. Though they are affable and merry during times of peace, the Woses are dangerous foes for any who tread the forest paths uninvited. Ghân-buri-Ghân is the chief of the Woses – his hatred for Orc-kind burns deep, for the destruction the servants of the Dark Lord have wrought within his borders.

    This multipart metal kit builds 15 Woses Warriors, and one Ghân-buri-Ghân, for your Paths of the Drúadan armies in the Middle-earth Strategy Battle Game. These warriors are armed with simple stone spears and blowpipes, yet their hatred and poisoned darts make them deadly foes for Orcs, Goblins, and any who underestimate them.

    This kit comprises 17 metal components, and 16x Citadel 25mm Round Slotta Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using The Woses of Drúadan Forest in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, which is available separately.
- name: Black Numénórean™ Warriors
  productCode: P-213904-99061464246
  sku: 99061464246
  productType: single_kit
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/black-numenorean-warriors-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061464246_MEBlackNumenoreanWarriors01.jpg
  status: current
  description: |-
    Black Númenórean Warriors are descended from the Men who sided with the Dark Lord during the Second Age. They have been gifted unnaturally long lives in exchange for their fealty, but this came at a price – they are twisted and contorted into a horrific corruption of their former selves, devoid of mercy and filled with malice. Clad in thick-plated armour and robes as black as night, the Black Númenóreans resemble the Black Riders themselves – a truly terrifying sight to behold.

    This metal kit builds three Black Numénórean Warriors for use in your Army of the Great Eye, Umbar, Barad-dûr, or Legions of Mordor armies in the Middle-earth Strategy Battle Game. These imposing warriors are clad in ornate heavy armour and carry shields, making them remarkably durable as they sow terror and hack apart the forces of Good.

    This kit contains 3 metal components, and 3x Citadel 25mm Round Slotta Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Black Numénórean Warriors in an Army of the Great Eye or Umbar army in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, which is available separately. Rules for using them in a Barad-dûr or Legions of Mordor army can be found in the *Armies of The Lord of the Rings*™ publication, also available separately.
