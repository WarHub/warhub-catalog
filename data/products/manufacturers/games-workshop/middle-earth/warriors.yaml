  description: |-
    Mirkwood is haunted by many sinister and creeping things that have been twisted and mutated by the dark power corrupting the forest. The spiders of Mirkwood are perhaps chief amongst them – huge bloated creatures with dark intellect and a taste for blood. Many a warrior has succumbed to these creatures, trapped by the thick, sticky webbing they shoot to ensnare their prey.

    These massive spiders skitter across the battlefield with incredible speed, infecting their foes with primal terror before enveloping them in sticky webs and sinking venomed fangs into their flesh.

    This set contains two metal Giant Spiders and two resin Mirkwood Spiders. Each model is supplied with an appropriate base.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Crebain™
  productCode: prod4580333-99861499011
  sku: 99861499011
  productType: single_kit
  priceGbp: 31.5
  url: https://www.warhammer.com/en-GB/shop/Middle-Earth-SBG-Crebain-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561499011_MECrebainLead.jpg
  status: current
  description: |-
    There are all manner of creatures that are under the influence of Saruman, used as spies to discover the whereabouts of the Ringbearer. Of all the creatures in Saruman's service, the Crebain of Dunland are arguably the most effective. These large crow-like birds patrol the lands around the Gap of Rohan in search of the Fellowship, and swiftly bring news to the White Wizard. It is the keen sight of these creatures that make them excellent spies, for they are able to spot beings that would remain hidden from view.

    Crebain are swift and relentless, their sheer numbers rendering them all but impervious to the arrows of their quarry. Yet their strength comes in their ability to pick out even the most well-concealed prey. If you’re looking to give your host of Isengard an edge in battle, look no further!

    The set contains two resin swarms of Crebain birds, each supplied with a Citadel 40mm Round Base.
- name: Gundabad War Bats
  productCode: prod4560158-99851466012
  sku: 99851466012
  productType: single_kit
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/Gundabad-War-Bats-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551466012_GundabadWarBatsLead.jpg
  status: current
  description: |-
    Dwelling in the northern fortress of Gundabad, these bats have been bred solely for war. Flying ahead of Bolg's army, the War Bats are the first of Bolg's reinforcements to reach the Battle of the Five Armies. Razor-sharp talons pluck warriors from the field of battle, piercing armour and tearing flesh as they fling their prey to the ground.

    Support your ground forces with the unprecedented mobility of Gundabad War Bats! These vicious creatures are not only swift, but pack a punch too, making them an especially dangerous threat to any vulnerable targets that are exposed, such as archers and war machine crew.

    The set contains two resin miniatures, each supplied with a Citadel 40mm Round Base. Their rules can be found in the *Armies of the Hobbit*™ book.
