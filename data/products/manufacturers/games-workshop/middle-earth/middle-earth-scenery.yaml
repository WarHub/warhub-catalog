  url: https://www.warhammer.com/en-GB/shop/ruined-watchtower-amon-sul-at-weathertop-mto-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861499022_RuinedWatchtowerofAmonSulMTO.jpg
  description: |-
    Weathertop was once the location of a strategically placed watchtower known as Amon Sûl. By the time the events of the films take place, it is a crumbling edifice.

    This multipart resin terrain piece represents the Ruined Watchtower of Amon Sûl, as depicted in *The Lord of the Rings: The Fellowship of the Ring*™. Filled with delightful details pulled straight from the screen, including toppled statues, it makes a great backdrop for the Middle-earth Strategy Battle Game – and is especially ideal for the Weathertop Narrative Scenario, which can be downloaded for free from the Warhammer Community website.

    This kit comprises 16 resin components, requires assembly, and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.

    **This kit is available on a Made to Order basis until 08:00am GMT on 16 March 2026, and will be shipped within 180 days of ordering.**
