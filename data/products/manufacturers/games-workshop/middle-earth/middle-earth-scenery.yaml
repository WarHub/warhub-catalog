    This multipart resin terrain piece represents the Seeing Seat at Amon Hen, as depicted in *The Lord of the Rings: The Fellowship of the Ring*™. Filled with delightful details pulled straight from the screen, including statues and an imposing platform, it makes a great backdrop for the Middle-earth Strategy Battle Game – and is especially ideal for the Amon Hen Narrative Scenario, which can be downloaded for free from the Warhammer Community website.

