  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121462007_GoblinTownNEW01.jpg
  description: |-
    A sinister kingdom, lorded over by the giant, bloated form of the Goblin King, Goblin Town is a dishevelled realm inhabited by stunted, twisted creatures. This mockery of a court, with its cruel bully-kind, is home to creatures of a deadly nature, troglodyte denizens of implacable cruelty.

    Goblin Town is a fantastically detailed scenery piece. It is made largely of long strips of timber that have been haphazardly combined to provide long, rickety walkways suitable for the inhabitants of Goblin Town. As well as chain detailing and wide ladders, it is scattered with ones and skulls, and some fragments of bones are strapped like totems to the large poles that hold the walkways up. Rugged and erratic, this is impressive scenery piece can be constructed in a number of different configurations.

    This kit contains 22 plastic components with which to construct Goblin Town.
