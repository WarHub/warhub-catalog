  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861464024_DaleWindlanceLead.jpg
  status: current
  description: |-
    Forged by the Dwarves of Erebor and gifted to the city of Dale, a Windlance is a weapon of exceptional craftsmanship. This war engine launches barbed spears toward the enemy, powerful enough to pierce nearly any armour or hide, and its ingenious design requires only a single operator to load and fire, though a second is usually assigned to spot or step in as needed. It was a Windlance that Girion, Lord of Dale, used to launch a Black Arrow at the Dragon Smaug – though it did not slay the beast, it loosened a scale that would one day prove to be Smaug's undoing...

    This multipart resin kit builds one finely-detailed Windlance, as well as a crew of two Warriors of Dale. One Warrior of Dale is posed firing the weapon, and the other stands by, bellowing orders and preparing the next arrow. This mighty engine of war fires an incredibly powerful arrow that’s fully capable of felling nearly anything in Middle-earth. Amies of Dale would do well to add one or two of these siege engines to fend off rampaging Dragons – and anything else that happens to rear its ugly head.

    This kit comprises 14 resin components, and comes supplied with a Citadel 50mm Round Base and 2x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Gondor™ Avenger Bolt Thrower
  productCode: P-213924-99801464110
  sku: 99801464110
  productType: single_kit
  priceGbp: 20.5
  url: https://www.warhammer.com/en-GB/shop/gondor-avenger-bolt-thrower-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801464110_MEGondorAvengerBoltThrower01.jpg
  status: current
  description: |-
    The Gondor Avenger Bolt Thrower is a work of mechanical genius – a device able to self reload and quickly fire multiple bolts in the same time it would take other siege engines to fire once. The sheer force with which it launches its bolts is enough to pierce both armour and flesh with frightening ease, making these siege engines one of the deadliest weapons the forces of Gondor can use to protect the walls of Minas Tirith.

    This multipart resin kit builds an Avenger Bolt Thrower, plus a crew of three, for your Minas Tirith, Atop the Walls, or Defenders of the Pelennor armies in the Middle-earth Strategy Battle Game. This advanced weapon is capable of firing multiple shots in one turn, making it a daunting obstacle for your enemies.

    This kit comprises 7 resin components, 3x Citadel 25mm Round Slotta Bases, and 1x Citadel 40mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Gondor Avenger Bolt Thrower in the Middle-earth Strategy Battle Game can be found in the *Armies of Middle-earth* publication, available separately. Rules for using it in Minas Tirith, Atop the Walls, and Defenders of the Pelennor armies can be found in the *Armies of The Lord of the Rings*™ publication, also available separately.
- name: Mordor™ Siege Bow
  productCode: P-213851-99061462086
  sku: 99061462086
  productType: single_kit
  priceGbp: 20.5
  url: https://www.warhammer.com/en-GB/shop/mordor-siege-bow-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061462086_MEMordorSiegeBow01.jpg
  status: current
  description: |-
    Mordor Siege Bows are simple but effective war machines that hurl massive bolts capable of piercing even the thickest armour and flinging their targets sprawling backwards. When the forces of Mordor bring their siege bows to battle, even the bravest warriors become nervous, knowing that should a bolt find its mark, neither armour nor dexterity will save them from death.

    This multipart metal kit builds a Mordor Siege Bow, plus a crew of three Orcs, for your Army of the Great Eye, Barad-dûr, Army of Gothmog, or Legions of Mordor armies in the Middle-earth Strategy Battle Game. This unsubtle weapon will cause havoc from afar, and can even take out multiple enemy warriors with a single bolt.

    This kit contains 8 metal components, 1x Citadel 40mm Round Base, and 3x Citadel 25mm Round Slotta Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using a Mordor Siege Bow in an Army of the Great Eye army list can be found in the *Armies of Middle-earth* publication, which is available separately. Rules for using them in Barad-dûr, Army of Gothmog, and Legions of Mordor armies can be found in the *Armies of The Lord of the Rings*™ publication, also available separately.
- name: Gundabad™ Catapult Troll
  productCode: P-213847-99861466014
  sku: 99861466014
  productType: box_set
  priceGbp: 145.5
  url: https://www.warhammer.com/en-GB/shop/gundabad-catapult-troll-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861466014_MiddleEarthGundabadCatapultTrollCharacter01.jpg
  status: current
  description: |-
    Gundabad Catapult Trolls are unleashed to breach the walls of enemy cities – great siege weapons are strapped to the back of the largest Trolls and are manned by crews of Goblins from the Misty Mountains. The boulders launched from these imposing war machines can level a city's walls with a single direct hit, and anyone unfortunate enough to be beneath one when it strikes shall be left as no more than a bloody smear.

    This multipart resin kit builds a hulking Catapult Troll, as well as a scurrying crew, for use in your Army of Gundabad armies in the Middle-earth Strategy Battle Game. Combining the sheer power and brutality of a Troll with a massive siege engine, anything that survives its ranged attack will be torn to shreds in melee.

    This kit comprises 70 resin components, and 1x Citadel 160mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Gundabad Catapult Troll in the Middle-earth Strategy Battle Game can be found in the *Armies of The Hobbit*™ publication, which is available separately.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Mordor™ War Catapult
  productCode: P-201874-99811462046
  sku: 99811462046
