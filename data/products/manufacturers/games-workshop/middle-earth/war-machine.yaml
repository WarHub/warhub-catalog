  status: current
  description: |-
    War Catapults are used by the armies of Mordor to breach the fortifications of their enemies. Huge Trolls load rocks into the catapult before they are flung across the battlefield. Whether they hit the stone walls or the defenders of a city is irrelevant – anything unfortunate enough to find itself under the path of a rock hurled by these machines will soon be broken and destroyed.

    This multipart resin kit builds a Mordor War Catapult, along with a huge Mordor Siege Troll, and three Mordor Orc Siege Crew for use in Barad-dûr, Army of Gothmog and Legions of Mordor armies. This huge siege engine is a great way to devastate your foes from afar with massive rocks.

    This kit contains 21 resin components, 1x Citadel 120mm by 90mm Oval Base, 1x Citadel 60mm Round Base, and 3x Citadel 25mm Round Slotta Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
