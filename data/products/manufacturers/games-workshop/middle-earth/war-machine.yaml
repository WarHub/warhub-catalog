  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861464040_MECorsairsOfUmbarBallista01.jpg
  status: current
  description: |-
    Corsairs of Umbar line their ships with deadly ballistae. These war machines are used by raiding parties to wreak havoc upon the settlements of Gondor from afar, firing huge bladed bolts that smash through barricades and impale any unfortunate enough to find themselves in their lethal path. Such is the force that these bolts can be fired with, that they are easily capable of piercing thick-plated armour as if it were nothing.

    This multipart resin kit builds a Corsairs of Umbar Ballista, plus three crew, for your Corsair Fleets or Umbar armies in the Middle-earth Strategy Battle Game. This simple but effective siege engine is lightweight, engineered for versatility, and incredibly potent against massed ranks of enemies.

    This kit comprises 28 resin components, 1x Citadel 40mm Round Base, and 3x Citadel 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using the Corsairs of Umbar Ballista in Corsair Fleets armies in the Middle-earth Strategy Battle Game can be found in the *Armies of The Lord of the Rings*™ publication, which is available separately.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
