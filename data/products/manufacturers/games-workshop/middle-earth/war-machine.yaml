  description: |-
    The battlecry trebuchets of Gondor are used to defend the gates of Minas Tirith from the forces of Mordor. Great wooden constructs, these machines hurl huge boulders across the battlefield to crash into the foe, crushing anything unfortunate enough to be caught in their path.

    This multipart resin kit builds a mighty siege engine for Atop the Walls, Realms of Men, and Defenders of the Pelennor armies, plus three crew to operate it. These war machines are as much a psychological weapon as a destructive one – forcing your opponent to deal with the siege engine at the expense of the rest of your army.

    This kit comprises 17 resin components, 1x Citadel 92mm by 120mm Oval Base, and 3x Citadel 25mm Round Slotta Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
