  status: current
  description: |-
    The Dwarves of the Iron Hills will follow their lord without question into battle. Their unbending resolve and will to fight drives them forwards against unassailable odds. Many Dwarves are equipped with huge mattocks or crossbows, whilst others are armed with long spears and broad shields; these Dwarves are highly trained in the art of forming a nigh-impenetrable shieldwall. Just as with Dwarven armour, no weakness is permitted in the army of the Iron Hills, and so the Dwarves of Dain's army are the finest of their kind.

    This multipart resin kit contains the components necessary to assemble 3 Iron Hills Dwarves with Crossbows, warriors for a Good army. They come armed with a powerful underslung crossbow each, and the three models are depicted in suitably dynamic poses wearing exceptionally chunky armour, ready to use their weapons to unleash deadly piercing bolts.

    This is a multipart resin kit that makes 3 complete miniatures from 9 components. 3 25mm round bases are included.
- name: Iron Hills Chariot
  productCode: prod3510145-99861465013
  sku: 99861465013
  productType: box_set
  priceGbp: 135.5
  url: https://www.warhammer.com/en-GB/shop/Iron-Hills-Chariot-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561465013_IronHillsChariot02.jpg
  status: current
  description: |-
    The vanguard of Dain's army, these Chariots run ahead of the Dwarves of the Iron Hills taking out any enemy scouts who dare to oppose them. Pulled by six goats at a time and with razor-sharp scythes attached to its wheels, anyone that is unfortunate enough to get in the way of a charging Chariot will end up considerably shorter!

    A highly detailed resin model, the Iron Hills Chariot makes a great Warriors unit for the Iron Hills Dwarf Army. The six large, horned goats that pull it are attached via collars of iron and wood, with a strong wooden brace in the middle. At the front of the intimidatingly spiked chariot stands a dwarf gripping the firing mechanism of a rapid-fire bolt thrower, with a dwarf wielding a sword by his side. On a raised platform stands the driver, who can be optionally replaced with an Iron Hills Captain (who is included in the kit.)

    The kit comprises 83 components, and is supplied with a 170x105mm oval base.
- name: Thranduil™, King of the Woodland Realm on Elk
  productCode: prod3480335-99861463001
  sku: 99861463001
  productType: single_kit
  priceGbp: 51.5
  url: https://www.warhammer.com/en-GB/shop/Thranduil-King-of-the-Woodland-Realm-on-Elk-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99561463001_ThranduilOnElk01.jpg
  status: current
  description: |-
    The ruler of Mirkwood, Thranduil is a wise but proud king who cares little for those beyond his own borders. Journeying to Erebor to reclaim the white gems of Lasgalen that dwell within the mountain, gems that Thranduil desires above all else in order to remember his late wife, when his attempt to barter the Arkenstone™ for the return of these gems fails, Thranduil prepares to launch an assault upon Erebor. However, the arrival of Azog's armies cuts short the feud between Elves and Dwarves, and Thranduil must now prepare for a battle he did not expect. Riding his mighty Elk into battle, the Elvenking's skill with a blade is unmatched within his own realm, as countless Orcs would discover at The Battle of the Five Armies.

    A swordsman of consummate skill, Thranduil is one of the mightiest heroes available, capable of hacking down countless enemies with his Elven blades. This resin model, which comes in a presentation box as part of *The Hobbit: Motion Picture Trilogy*™ Character Series, is a fantastically detailed rendition of Thranduil, King of the Woodland Realm charging into battle atop a powerful war Elk, blade held aloft. Not only does this model feature intricate details – the armour, hair and cloak of Thranduil as well as the mane of the Elk are picked out elegantly – but it features a lavishly-sculpted scenic base, depicting a broken archway and pillars with a slain enemy lying prone. The scenic base comes apart, and Thranduil can be lifted out on his own gaming base.

    This resin kit comes as 19 components, and is supplied with a 50mm round base and a 105x70mm oval scenic base.
