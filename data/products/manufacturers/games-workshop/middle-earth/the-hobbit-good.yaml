    The ballista of the Iron Hills Dwarves is an ingenious military invention that serves as both offense and defense. Attached to the huge wooden bolts fired by the ballistae are a series of chains that spin furiously, slicing their foe’s arrows to kindling before careening into their ranks and causing maximum carnage.

    This multipart resin kit builds an Iron Hills Dwarf Ballista, as well as four Siege Crew, for your Iron Hills armies. These legendary weapons provide long-range support for the massed cavalry charges and large infantry formations the Iron Hills Dwarves are known for. They are excellent for decimating enemy infantry and provide protection from enemies that rely on massed firepower – frustrating your opponent's best laid plans.

