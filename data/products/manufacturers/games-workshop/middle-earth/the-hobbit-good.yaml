- name: 'The Lords of Erebor™: Thror, The Last King Under The Mountain & Thrain'
  productCode: prod3690249-99801465018
  sku: 99801465018
  ean: 5011921094899
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 26
  url: https://www.warhammer.com/en-GB/shop/Thror-And-Thrain-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801465018_ThrorandThrain01.jpg
  status: current
  description: |-
    Thror was the king of the Lonely Mountain at the height of its glory. Possessor of the Arkenstone and a ring of power, he was gold-hungry – a fact that bound him to his eventual fate. In spite of his failings, however, he was a powerful warrior and a goodly king, and as such his kinsmen followed him willingly into battle. His son Thrain is a grim Dwarf warrior who bears the scars of many hard-fought battles. Stoically loyal, Thrain commands the army of the Lonely Mountain at his behest.

    Collecting these 2 models together, this multi-part resin kit contains the components necessary to assemble Thror and Thrain. Thror wears a tunic, chainmail, serrated armour and carries a shield, all of which are sumptuously decorated, and Thrain wields a huge hammer, wearing an ornate fur-trim cloak with chain mail and elegant armour panels. Both models feature splendid, decorated braided beards and Thrain features long, flowing hair.

    These models come as 6 resin components, and are supplied with 2 Citadel 25mm round bases.
- name: The Master of Lake-town™ and Alfrid the Councilor
  productCode: prod3690248-99801464103
  sku: 99801464103
  ean: 5011921094882
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 26
  url: https://www.warhammer.com/en-GB/shop/The-7-Of-Lake-town-Alfrid-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801464103_MasterofLaketownandAlfrid01.jpg
  status: current
  description: |-
    Though prone to long-winded speeches, the Master of Lake-town is a wise, charismatic and capable leader. He is, however, a better businessman than a warrior, and his lust for gold is greater than his will to fight. Alfrid the Councilor serves the Master of Lake-town, advising him in matters of diplomacy, trade and the defence of Lake-town. At heart though, he is a power-hungry sycophant, and his counsel cannot always be relied upon to serve anyone other than himself.

    Collecting these 2 models together, this multi-part resin kit contains the components necessary to assemble the Master of Lake-town and Alfrid the Councilor. The Master of Lake-town is clad in opulent robes, with a gold-clasped belt and feathered hat (and cheerfully ruddy expression) while Alfrid the Councilor is slightly less spectacularly dressed, clutching a book and feather quill, along with a rather eye-catching unibrow.
- name: Bard's Family
  productCode: prod3530561-99851464002
  sku: 99851464002
  productType: single_kit
  priceGbp: 24
  url: https://www.warhammer.com/en-GB/shop/Bards-Family-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99551464002_BardsFamily01.jpg
  status: current
  description: |-
    Like his father, Bain is a descendant of the noble lords of Dale. Brave and loyal, Bain will stop at nothing to protect his family, even going as far as to join his father in facing Smaug atop the burning roofs of Lake-town. Although young and inexperienced, Bain proves to be a capable fighter, taking up arms to protect his sisters from the battle raging through the streets of Dale.

    Sigrid and Tilda are the daughters of Bard. Young and unaccustomed to matters of warfare, they have no place on a battlefield. As The Battle of the Five Armies rages on, both are placed in great peril. Their presence spurring on both Bard and Bain to acts of great heroism and courage in order to protect the two young girls from harm.

    This multipart resin kit contains the components necessary to build Bain, Sigrid and Tilda, three models who can be fielded alongside Bard the Bowman in order to add courage and motivate him to fight ever harder. Bain comes armed with a sword and armour, while Sigrid and Tilda are unarmed; the latter models, if slain, cause Bard to automatically pass all Courage tests and do everything in his power to kill the model who slew them.

    The 3 models come as 10 components, and are supplied with 3 25mm round bases. Rules can be found in *The Hobbit: Motion Picture Trilogy™: There And Back Again*.
- name: Iron Hills Dwarves With Crossbows
  productCode: prod3530327-99851465014
