  url: https://www.warhammer.com/en-GB/shop/iron-hills-dwarf-warrior-warband-with-spears-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861465017_MEIHDwarfWarriorWbandwSpears02.jpg
  status: current
  description: |-
    The Dwarves of the Iron Hills will follow their lord into battle without question. Armed with long spears and broad shields, these Dwarves are highly trained in the art of forming a nigh-impenetrable shieldwall. Just as with Dwarven armour, no weakness is permitted in the Iron Hills army, so the Dwarves of Dáin’s army are the finest of their kind.

    Start your hardy Iron Hills or Erebor Reclaimed army – or add to your existing collection – with this set of 14 resin miniatures for use in your games of the Middle-earth™ Strategy Battle Game.

    This warband is led by an Iron Hills Dwarf Captain, hand-picked for the role by Dáin himself, who leads from the front and will be found fighting right in the thick of battle – his combat skill and tactical prowess setting him apart from the Dwarves under his command. Following his command is an Iron Hills Dwarf carrying a banner and 12 Iron Hills Dwarves equipped with spears and shields – allowing them to form a bristling shieldwall in battle.

    **This set includes:**
    - 1x Iron Hills Dwarf Captain with spear and shield
    - 1x Iron Hills Dwarf Warrior with banner
    - 12x Iron Hills Dwarf Warriors with spear and shield

    This kit comprises 42 resin components and comes with 14x Citadel 25mm Round Bases. The miniatures in this set are supplied unassembled and unpainted – we recommend using Citadel Colour paints. Rules for using these miniatures in the Middle-earth™ Strategy Battle Game can be found in the *Armies of The Hobbit*™ book.
- name: Beornings™
  productCode: prod4920307-99851499016
  sku: 99851499016
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/beornings-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851499016_MEBeorningsLead.jpg
  status: current
  description: |-
    The Beornings are great woodsmen that dwell within the vales of the Anduin between Mirkwood and the Great River. Though few in number, they possess great strength, carrying mighty axes and great bows made of yew. Under the rule of Grimbeorn, the Beornings keep the roads between the Misty Mountains and Mirkwood clear of the servants of Sauron, though their services come at a price. If it wasn't for the work of the Beornings, it is likely that the regions they protected would be overrun with Orcs.

    Beornings are sturdy, versatile fighters. Each of them can be armed for either melee or ranged combat, and each body also has a choice of two heads to add variety to larger units. They’re even stronger when Grimbeorn or Beorn are nearby, which makes them ideal bodyguards for these powerful heroes.

    This kit contains 25 resin components with which you can assemble 3x Beornings. Each can be armed with either an axe or bow, and you can choose from two different heads for each body. They come supplied with 3x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Grimbeorn™
  productCode: prod4920306-99851499014
  sku: 99851499014
  productType: single_kit
  priceGbp: 48.5
  url: https://www.warhammer.com/en-GB/shop/grimbeorn-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851499014_MEGrimbeornLead.jpg
  status: current
  description: |-
    The son of Beorn, and natural leader of the Beornings, Grimbeorn is a tall and burly woodsman who dwells in the Carrock between the Misty Mountains and Mirkwood. Just as his father before him, Grimbeorn possesses the ability to transform into a large bear at will, unleashing primal fury upon the Orcs and Goblins that dare to enter his lands. When the forces of Sauron invaded Mirkwood, he led the Beornings against them, using their unbridled power to break their enemies.

    Grimbeorn is a dynamo on the table. In the form of a (very large) man, this Hero of Valour is a powerful warrior, fighting at range and up close. This fierce woodsman wields his huge axe to cut his enemies to size like so much cordwood. When needs must, he can transform into his bear form, amplifying his damage-dealing potential even further. He and the Beornings can be taken as a Legendary Legion, or added as an ally to a variety of aligned Good factions, as detailed in his rules.

    This kit contains 13 resin components with which you can assemble 1x Grimbeorn and 1x Grimbeorn the Bear. It comes supplied with 1x Citadel 25mm Round Base, and 1x Citadel 60mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: King Brand & Bard II of Dale™
  productCode: prod4730196-99851464020
  sku: 99851464020
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/me-King-Brand-and-Bard2-Of-Dale-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851464020_MEKingBrandBardllDaleLead.jpg
  status: current
  description: |-
    King Brand is the grandson of Bard the Bowman, and he reigned during the time of the War of the Ring. Though the Nazgul had approached him to join with Sauron, Brand rallied his people to stand beside the Dwarves of the Lonely Mountain against the Easterling threat when the armies from the east marched to war upon Erebor. Every bit as skilled as his bloodline would suggest, Brand fought valiantly in the Battle of Dale but was unfortunately slain while facing off against impossible odds.

    Bard II is the son of King Brand and the heir to the throne of Dale. Having joined the ranks of the Knights of Dale at a young age, Bard quickly developed exceptional martial skill, worthy of the name bestowed upon him. He rose through the ranks to eventually become commander of the Knights. At the Battle of Dale, Bard fought alongside his father against the Easterling army. Though his father was slain and their forces driven back to Erebor, Bard, along with Thorin Stonehelm, rallied his people to push out from Erebor, facing the Easterling armies head-on and winning a great victory.

    Both of these legendary heroes make ideal leaders for a Garrison of Dale army. They’re tough, hit hard, and fit in perfectly with the rest of your forces. Both of them will strengthen your army and add some serious hitting power to your front lines.

    This kit contains 8 components with which you can build 1x King Brand and 1x Bard II in high-quality resin and is supplied with two 25mm round bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Knights of Dale™
  productCode: prod4730195-99851464019
  sku: 99851464019
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/me-Knights-Of-Dale-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99851464019_MESBGKnightsofDaleLead.jpg
  status: current
  description: |-
    Founded by the ancestors of Girion and reinstated under the rule of King Bard following the rebuilding of Dale, the Knights of Dale are the elite of the city's armies. These warriors protect the royal families of the city upon the battlefield. Clad in thick plated armour and wielding both shields and spears, the Knights of Dale are highly skilled combatants and are often led by the city's future kings. At the time of the War of The Ring, the king's son, Bard II, commands the Knights of Dale.

    In your games, these elite units act as formidable bodyguards to your Garrison of Dale Heroes. They are extremely dangerous to charge, so your enemies will think twice about trying to rush your units. Their unusual design is based on a piece of unused concept art, giving you a glimpse into an expanded aesthetic not yet seen on the battlefield. The three styles of head will work with any of the bodies, allowing you to mix and match them for added variation.

    This kit contains 12 components with which you can build 3 Knights of Dale in high-quality resin, including 3x 25mm round bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
- name: Young Thorin™, Balin™ and Dwalin™
  productCode: prod4320146-99801465019
  sku: 99801465019
  ean: 5011921094905
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Young-Thorin-Balin-And-Dwalin-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99801465019_YoungThorinBalinDwalin01.jpg
  status: current
  description: |-
    As a prince of Erebor, Thorin held a position of respect and honour among the Dwarven hosts who strode to war in the name of his grandsire. Even as a youth, Thorin possessed an impressive skill-at-arms and the courage to match it. This stood him in great stead when Smaug wrought such terrible devastation upon his home, and even more so at the great Battle of Moria many years later. In that battle, when all hope seemed lost and the line of Durin faced extinction, Thorin prevailed in spite of the odds, and earned himself the moniker 'Oakenshield'.

    Thorin's able companion and comrade-in-arms, Dwalin is one of the most skilled fighters – and perhaps the strongest Dwarf – in all of Erebor. When Thorin escaped the wrath of Smaug, Dwalin and his brother Balin were beside him and, years later, they remained so at the Battle of Moria. In a melee there is no Dwarf more unflinchingly violent than Dwalin and, when armed with his paired axes 'Grasper' and 'Keeper', he is capable of taking a bloody tally of his foe.

    Wherever Dwalin travelled, his older brother, Balin, was sure to be found. Wise, even in his youth, Balin was the kind of Dwarf that others sought out for sage counsel, although he was in no way lacking for skill-at-arms. At the Battle of Azanulbizar, Balin joined Thorin in rallying the wavering Dwarven hosts, charging to victory up the corpse-strewn slopes beside his beloved kinsman.

    Thorin, Dwalin and Balin are foremost among the Heroes in the Erebor army list. Thorin carries a sword and the improvised shield of oak from which he later took his name, while Dwalin wields his trusty pair of axes and Balin, his sword-mace.

    The set contains three resin miniatures – Thorin, Dwalin and Balin in their youth – supplied with 3 Citadel 25mm Round Bases. Their rules can be found in Armies of *The Hobbit*™.
- name: Thorin Oakenshield™ & Company
  productCode: prod4070164-99121499039
