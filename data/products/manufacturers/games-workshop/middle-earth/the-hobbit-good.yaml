    Dale's wealth ensured that its soldiers were equipped with armour of the highest quality and armed with fine Dwarf-forged weapons, crafted by their allies in Erebor. Well-trained and disciplined, these brave Men were often seen marching together, bound for distant wars, when not guarding their homeland from the predations of their enemies.

    The Warriors of Dale kit is made up of 20 uniquely posed miniatures. Each one wears chainmail, thick tunics, sturdy boots and long flowing robes, and they also carry a range of weapons - bow, spear and sword - as well as a richly decorated shield. Particularly notable about these miniatures are their ornate fur-lined helmets that finish in a point.

    This plastic kit contains 54 components and 20 25mm round bases with which to make 20 Warriors of Dale.
