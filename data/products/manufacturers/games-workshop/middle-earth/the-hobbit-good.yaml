    When the Dwarves gather to mete out a terrible vengeance, the vanguard is often made of Grim Hammers. Stalwart Dwarf warriors shod head to toe in gleaming battle plate and shining mail, they advance with deadly intent.

    These 24 Grim Hammers are stout and sturdy figures, and come appropriately equipped for defending the halls of Erebor. Each wears chainmail and is covered from beard to toe in heavy armour. Each model takes a unique pose, swinging their pick hammers or sharp axes at different angles. Their glorious beards hang down underneath masked helmets.

    This multi-part plastic kit kit contains 60 components and 24 25mm round bases with which to make 24 Grim Hammers.
