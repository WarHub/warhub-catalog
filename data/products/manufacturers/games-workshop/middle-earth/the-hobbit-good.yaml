    This resin kit contains 7 components which make 2 miniatures: Bard the Bowman, Girion Lord of Dale's Heir on foot and Bard the Bowman, Girion Lord of Dale's Heir mounted on a horse. Supplied with a 25mm round base and a 40mm round base.
