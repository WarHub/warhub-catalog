  url: https://www.warhammer.com/en-GB/shop/hill-trolls-of-angmar-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861466015_HillTrollsAngmarRegiment1.jpg
  status: current
  description: |-
    Hill Trolls of Angmar tower over the forces of Men and Elves, flinging crumpled bodies around with malicious joy. These beasts are put to good use within forces of Evil, spearheading attacks and breaking down fortress walls and doors.

    This multipart resin kit builds a pair of surly Hill Trolls, ready to smash through your enemy's battle lines for Buhrdûr's Horde and Army of Carn Dûm forces in the Middle-earth Strategy Battle Game. While they excel as line breakers, they're also tough enough to be used in a defensive role as well. Either way, your opponents will have a hard time dealing with them.

    This kit contains 21 resin components, and 2x Citadel 50mm Round Bases. They are supplied unpainted and require assembly – we recommend using Citadel paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Cave Troll
  productCode: P-201885-99061466060
