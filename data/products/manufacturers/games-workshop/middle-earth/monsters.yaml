  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99061466060_MECaveTrollCharacterRerelease01.jpg
  status: current
  description: |-
    Cave Trolls can be found within many of the caverns and tunnels of the Misty Mountains – lumbering and loathsome creatures that seek the darkness. These great beasts often fight alongside Moria Goblins, their great strength the ideal complement to the teeming Goblin hordes, smashing aside any foes, their thick leathery hides protecting them from incoming blows.

    This multipart metal kit builds a single towering Cave Troll, the ideal support for your Depths of Moria army. Exceptionally tough, and capable of taking on almost any enemy while the rest of your army surges forward. This one is armed with a Troll chain and a huge club to take advantage of its beastly strength.

    This kit contains six metal components and 1x Citadel 50mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
