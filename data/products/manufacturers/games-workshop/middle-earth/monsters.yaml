  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99121499062_GreatEaglesandFledglings1.jpg
  description: |-
    The Great Eagles of the Misty Mountains soar high above the realms and kingdoms of Middle-earth, holding themselves apart from the world below. Yet in times of great need, the Eagles will still flock down to aid the free peoples, using their huge beaks and razor-sharp claws to carve through enemy armour and flesh.

    While the Great Eagles are ancient beings, some of them are still young by their own standards. The fledglings have yet to reach full maturity and can be spotted by their white under feathers they still have within their majestic plumes. Yet this doesn't make them any less deadly, and even a fledgling Great Eagle is easily capable of tearing through their enemies with frightening ease.

    This multipart plastic kit builds two majestic Great Eagles for use in The Eagles, Battle of the Five Armies, and Men of the West armies. Each is a powerful beast, able to bypass defenses and attack behind enemy lines, harry flanks, and take down priority targets. They can also be used to represent Fledgeling Great Eagles.

    This kit contains 16 plastic components, 2x Citadel 60mm Round Bases, 2x Citadel Small Flying Bases, and 4x Citadel Ball Socket Stems. These miniatures are supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
