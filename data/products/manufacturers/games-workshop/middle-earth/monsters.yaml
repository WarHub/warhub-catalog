  url: https://www.warhammer.com/en-GB/shop/shank-and-wrot-orc-scavengers-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99861466018_MELotRsWotRShankWrotSnowtroll01.jpg
  description: |-
    Shank and Wrot live within the tunnels and caves of the White Mountains. Shank is a slender, more conniving Orc, while Wrot is thick-set and dim-witted, though particularly tough in a fight. Yet it is not just the two Orcs that emerge to scavenge, Shank can summon forth a great Snow Troll that can tear through any that threaten them.

    This multipart resin kit builds the Orcs Shank and Wrot, plus a vicious Snow Troll. These minor heroes can be taken in your Besiegers of the Hornburg armies. While the Orcs might lack in individual strength, they grant a number of benefits, including the ability to call in the Snow Troll to even things up in the thick of the fight.

    This kit contains 25 resin components, 2x Citadel 25mm Round Bases, and 1x Citadel 50mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
