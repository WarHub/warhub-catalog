  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99811466026_MEWatcherInTheWaterCharacterRerelease01.jpg
  description: |-
    The Watcher in the Water is a creature of unfathomable terror that lurks in a murky pool of water outside the West-gate of Moria. Silently watching from beneath the water's surface, this tentacled creature will lash out and strike at any who disturb the waters, dragging them to the depths or lifting them high before dropping them into its gaping maw.

    This multipart resin kit builds one Watcher in the Water for use in your Depths of Moria army. This nightmarish creature adds strength to your hordes of Moria Goblins, and can drag even the mightiest enemy warrior to their doom.

    This kit contains 19 resin components, and 1x Citadel 130mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
