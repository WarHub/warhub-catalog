  description: |-
    Champions of the Ironhead Squat Prospectors are known as Drill Masters. Hardy fighters and skilled explorers, their true value lies in their ability to sniff out the hidden wealth of Necromunda. They keep the Drill-kyn and Diggers in line, often with little more than a gruff word or hard stare.

    This multipart resin kit builds one Drill Master armed with a mining laser for your Ironhead Squat Prospector gang. This powerful weapon is just as capable of melting through heavily armoured enemies and vehicles as it is slag deposits. When the fighting gets up close and personal, the circular stone saw mounted to their armour can carve up just about anything that gets in your way. With no distinguishing rank insignia, this model can also be used to represent a Charter Master.

    This kit comprises 15 resin components, and a Citadel 28mm Round Base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
