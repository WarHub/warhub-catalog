    This multipart resin kit builds one Silberlant Sevos, a Hanger-on for your gang in games of Necromunda. From his suspensor chair, he offers a number of benefits before, during, and after your battles as he uses his ill-gotten information to give you an upper hand. If you like to get the drop on your enemies and use sneaky tactics to give you an advantage in a fight, he's your man.

