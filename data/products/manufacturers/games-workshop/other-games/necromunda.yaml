    – 2x Hive Data Stack Clusters
    – 2x free-standing Alcoves
    – 12x removable data crystal stacks

    This set comprises 66 plastic components. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints. Note that some components are intended to be assembled without glue.
- name: Wasteland Giant Rats
  productCode: P-174356-99850599119
  sku: 99850599119
  productType: single_kit
  priceGbp: 22
  url: https://www.warhammer.com/en-GB/shop/necromunda-giant-rats-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599119_NECOutlandGiantRats2.jpg
  status: current
  description: |-
    Wasteland Giant Rats are ubiquitous on Necromunda. It's said, only half in jest, that if you throw a spanner in a hive, it’s more likely to hit a rat than the floor. Incredibly resilient and in numbers that make the teeming mass of humanity seem insignificant, these common hive critters are intelligent and surprisingly loyal when trained.

    This multipart resin kit builds two Wasteland Giant Rats, which can be used alongside a Beastmaster or as narrative elements in your games of Necromunda. While hardly as shocking as some of the other denizens of the underhive, these mutated rats can tear apart a foe in moments when they swarm together.

    This kit contains 11 resin components, and 2x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Outland Beastmaster with Wasteland Giant Rat
  productCode: P-174353-99850599081
