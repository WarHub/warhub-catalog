- name: Slopper and Scabber
  productCode: prod4850188-99850599061
  sku: 99850599061
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-slopper-and-scabber-2022
