- name: Van Saar Archeoteks & Grav-cutters
  productCode: prod4560155-99120599024
  sku: 99120599024
  ean: 5011921138807
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Van-Saar-Archeoteks-and-Grav-cutters-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599024_NECVanSaaeArcheoteksGravcuttersLead.jpg
  status: current
  description: |-
    Reckless and young, Neoteks have yet to feel the full effects of the wasting inflicted on the Van Saar by their use of their STC’s technologies. They favour either untested or dangerous tech, and are perhaps most well-known for their use of grav-cutters. Far more respected are the Archeoteks, who can be found at all levels of Van Saar society, including holding valued positions within the clan's gags.

    Expand your Van Saar gang with these six fighters. The Archeoteks are Van Saar Champions that have access to the best technology that the clan can provide – one of these models comes equipped with a deadly rad beamer while the other has an esoteric spider-rig. The Neoteks each fly into action aboard a grav-cutter. They each carry a laspistol and an energy shield, and the kit comes with four different heads.

    This 138-part kit makes two Archeoteks and four Neoteks. It comes supplied with four 32mm Necromunda Bases, two 25mm Necromunda Bases, and six 45mm Groove Stems.

    Rules for using these fighters in games of Necromunda can be found in the House of Artifice book.
- name: 'Zone Mortalis: Gang Stronghold'
  productCode: prod4530427-99120599030
  sku: 99120599030
  ean: 5011921141616
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 64.5
  url: https://www.warhammer.com/en-GB/shop/Zone-Mortalis-Gang-Stronghold-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599030_ZoneMortalisGangStrongholdLead.jpg
  status: current
  description: |-
    The Zone Mortalis is literally "the deadly ground" – short-range gunflights take place as fighters dart between cover, and brutal melee is almost impossible to escape from. Even in such a lethal environment, a gang needs somewhere to live.

    Create a headquarters for your gang so that they have their own little corner of the underhive to call home. The Stronghold can be assembled in a variety of ways and multiple kits can easily be combined to grow the size of your base. It's also fully compatible with the other Zone Mortalis kits, meaning that you can create epic Necromunda terrain. The Stronghold can be used as the focal point of a scenario, with one gang defending their home turf from a rival.

    **This 157-part plastic kit makes one Zone Mortalis: Gang Stronghold, consisting of:**
    – 1x Watchtower
    – 1x Gunk Tank
    – 1x Set of Stronghold Gates
    – 4x Stronghold Walls
    – 2x Stronghold Corners
    – 1x Stronghold Wall Extension

    The set includes rules and direction for using the various more unique elements of the terrain set in games of Necromunda, including rules for the stronghold gate, the watchtower, the gunk tank and firing ports along the edge of the Stronghold.
- name: Escher Champion with Power Hammer
  productCode: prod4530282-99850599044
  sku: 99850599044
  productType: single_kit
  priceGbp: 24
  url: https://www.warhammer.com/en-GB/shop/Escher-Champion-with-Power-Hammer-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599044_EscherChampionPowerHammerLead.jpg
  status: current
  description: |-
    Gang Matriarchs are drawn from the craziest, wildest, and most homicidal of the Gang Queen's girls, each one a natural killer. Favouring even more outlandish dress than most Escher, and carrying the deadliest weapons they can lay their hands on, a Matriarch is both gang enforcer, underhive assassin, and debutant of death all rolled into one.

    Support your Gang Queen with an extra Matriarch. Armed with the finest weapons that the clan can supply, they single-handedly take on almost any other fighter in the underhive. Her combi-pistol can fire explosive bolts and toxic needles, making her a threat at range, while her power hammer gives her the edge in close combat.

    This highly detailed resin kit comes in six parts and makes one Escher Gang Matriarch armed with a combi-needle pistol and power hammer. It is supplied with a 25mm Necromunda base.
- name: Goliath Stimmers and Forge-born
  productCode: prod4380142-99120599018
  sku: 99120599018
  ean: 5011921133178
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Goliath-Stimmers-And-Forgeborn-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599018_GoliathStimmers01.jpg
  status: current
  description: |-
    In House Goliath, Stimmers are established gangers. While seeking to achieve the peak of the Goliath's aspirational physical and musculature performance, they have become addicted to growth and combat stimms. Meanwhile, Forge-born, are gang prospects. They have not yet proven themselves to the Goliath, so they are not yet fully inducted into the Goliath Gang culture. As such, they often undertake the more dangerous tasks for the gang in an effort to prove themselves.

    Expand your Goliath Gang with these six additional fighters. As with all members of the House of Chains, they excel in fighting up close and personal. Stimmers are those gang members who have eschewed the path of leadership and instead focus on the mastery of brutal violence, while Forge-born are the hot headed youths who will be the future of the gang.

    This kit is supplied as 112 components that make 2 Goliath Stimmers, one armed with paired pulverizers and one armed with assault grenade launchers, and 4 Goliath Forge-born, two armed with storm-welders and two armed with heavy rock saws. It comes supplied with 2 Necromunda 40mm bases and 4 Necromunda 25mm bases.

    Rules for using the Goliath Stimmers and Goliath Forge-born in games of Necromunda can be found in Necromunda: House of Chains.
- name: Corpse Grinder Cult Gang
  productCode: prod4370296-99120599013
  sku: 99120599013
  ean: 5011921127696
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Corpse-Grinder-Cult-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599013_CorpseGrinderCult01.jpg
  status: current
  description: |-
    Voicing chants to the Lord of Skin and Sinew, the Corpse Grinder Cults rise up, emerging from their hidden corners of the underhive. With their bodies grown hard and muscular on a diet of forbidden flesh, they bring full-blown rebellion to Necromunda.

    This set of ten Corpse Grinder Cultists have been designed to give you a huge amount of variety and options when it comes to assembling them, ensuring that no two cults need ever look the same. This kit is ideal for starting a new cult or adding to an existing one, containing 6 Skinners – including options to build a Butcher \(Leader\) and a Cutter \(Champion\) – and 4 Initiates. Butchers, Cutters and Skinners are armed with a brutal array of chain cleavers and rotary flensing saws, while Initiates have access to chain cleavers, boning swords and autopistols.

    Also included are six 32mm Necromunda round bases and four 25mm Necromunda round bases.

    Rules for using a Corpse Grinder Cult in games of Necromunda can be found in Necromunda: The Book of Ruin and Necromunda: Dark Uprising.
- name: Palanite Subjugator Patrol
  productCode: prod4370295-99120599012
  sku: 99120599012
  ean: 5011921127689
  eanSource: shopify:goblingaming.co.uk
