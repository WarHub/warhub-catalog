- name: Vandoth the Fallen
  productCode: P-213329-99850599110
  sku: 99850599110
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-vandoth-the-fallen-bounty-hunter-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599110_VandothFallen1.jpg
  status: current
  description: |-
    Vandoth the Fallen is a giant of a man bound in layers of crimson muscle who can crush a man’s skull with one hand and turn aside blades with his hardened skin. Most disturbing of all though are the tales of his unquenchable thirst for blood – he has long canine fangs, and it is said that after he kills, the gigantic warrior stoops over his prey to drain them dry.

    This multipart resin kit builds Vandoth the Fallen, a hulking Hired Gun for your Outlaw gangs in games of Necromunda. Strong, sturdy, and armed with a powerful boltgun, he's the man your gang needs to take care of some of their toughest foes. Clad in heavy carapace armour, he's a glutton for punishment – and the blood of his enemies – if rumours are true. No matter who, or what, he is, he's an undeniable asset to your gang.

    This kit comprises 10 resin components, and 1x Necromunda 32mm Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using Vandoth the Fallen in your games of Necromunda are included with the kit. Additional rules and background information for this Hired Gun can be found in *Necromunda: The Book of Ruin*, which is available separately.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Palanite Enforcer Tauros Venator
  productCode: P-165810-99120599065
  sku: 99120599065
  ean: 5011921203321
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/necromunda-palanite-enforcer-tauros-venator-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599065_PalaniteEnforcerTaurusVenatorConcussionCannons1.jpg
  status: current
  description: |-
    The Tauros Venator is an all-terrain vehicle, favoured by the Palanite Enforcers as a rapid interceptor ideal for policing the vital ridgeways that criss-cross Necromunda's ash wastes. The Enforcers only have a limited presence beyond the hive cities, so these swift but well-armed vehicles are vital for traversing the outlands at speed and bringing brutal justice to those who would threaten wealthy guild convoys or respectable hiver travellers.

    This multipart plastic kit builds an Enforcer Tauros Venator – a sturdy, six-wheeled vehicle employed by Palanite Enforcers. The Venator's turret sports a choice of heavy weapons – twinned heavy stubbers or concussion cannons – and can be assembled without glue, allowing you to swivel it around mid-battle. The Palanite Ranger in the driver's seat can be built with two different poses, while the gunner comes with a choice of helmet or rebreather mask. The kit also includes three items of stowage to accessorise your Venator, such as spare fuel and wasteland gear.

    This set comprises 97 plastic components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using the Enforcer Tauros Venator can be found in the Necromunda: The Aranthian Succession – Ruins of Jardlan supplement, which is available separately.
- name: Van Saar Ash Wastes Arachni-rig
  productCode: P-159367-99120599056
  sku: 99120599056
  ean: 5011921181452
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-van-saar-ash-wastes-arachni-rig-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599056_VanSaarArachnirig2.jpg
  status: current
  description: |-
    Ash Wastes Arachni-rigs – known to House Van Saar as Arachnika Ash-jumpers – are armoured exoskeletons designed to traverse Necromunda’s rugged surface. Jump jets allow them to boost over obstacles, leap free of trouble, or unexpectedly drop in amongst their foes. Heavy weapons and surprising mobility make Ash-jumpers a match for rival vehicles and Nomad war parties, as they carve through Cargo-8 trains with laser and plasma blasts, clear rough terrain with flamers and rad guns, and snag targets with harpoons.

    This multipart plastic kit builds two Van Saar Ash Wastes Arachni-rigs, outland variants of the Arachni-rig that can be added to any Van Saar gang. These mobile exosuits are heavily armoured and fitted with powerful jump boosters. Each sports twinned heavy las carbines on its hull, a pair of mechanical servo-arms, and your choice of two arm-mounted guns – a plasma gun or flamer, and a rad gun or a harpoon launcher.

    Each Ash Wastes Arachni-rig can be assembled with a closed canopy, or an open canopy revealing the pilot, who comes with two different heads. They’re posed leaping through the air – adventurous hobbyists can also remove the pegs from joints in the arms and legs, allowing you to adjust the pose further.

    This set comprises 120 plastic components, and comes with 2x Citadel 50mm Round Bases with flying stems. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.

    Rules for using Van Saar Ash Wastes Arachni-rigs can be found in the *Necromunda: The Aranthian Succession – Ruins of Jardlan* supplement, which is available separately.
