    The Palanite Enforcers are the mailed hand wrapped around Necromunda's throat, struggling to keep the hive down even as it rages against their grip. They are led by brave, promising veterans of the force who have shown they have what it takes to be ruthless and thorough in their judgment. Often, they are given special equipment and a certain amount of license to act as they wish.

    This multipart plastic kit builds two Palanite Enforcer Captains, two Palanite Enforcer Sergeants, two Palanite Enforcer Subjugator Sergeants, and a pair of Hardcase Cyber-mastiffs for your Palanite Enforcer gangs in games of Necromunda. Armed with the precinct's best weaponry and carrying advanced equipment, they'll give you the edge against anyone you declare to be criminals.

    This kit is loaded with options so you can customise your miniatures. The Palanite Enforcer Sergeants can each be armed with either an autopistol and power maul, or an Enforcer boltgun with optional las-projector or combi-grenade launcher. They also have three head designs and two neck options each. The Subjugator Sergeants can be armed with a repulsion pattern chem-thrower, or a heavy stubber with a bio-scanner, grenade, or magazine in their left hand. They also have a choice of two different heads and necks each. The Palanite Enforcer Captains can each be armed with either a bolt pistol or plasma pistol, and a helmet, sheathed power sword, or drawn power sword in the other hand. They also come with a choice of two heads and two necks. The Hardcase Cyber-mastiffs each have a choice of two different head options, offering even more opportunities for personalisation as you track down the criminals of Necromunda.

