  productCode: P-163574-99850599101
  sku: 99850599101
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-squat-prospectors-claim-jumper-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599101_NMSquatClaimJumper02.jpg
  status: current
  description: |-
    Claim Jumpers are vital specialists for surveying the exhausted resources of Necromunda, experienced Ironhead Squats who can sniff out seams of scrap, pools of fermented waste, and a hundred other exotic resources up for grabs in the ash wastes and shadowy sump-depths. Staking such claims – and defending them – is a dangerous business, and these daring prospectors go about their work heavily armed, accompanied by a Techmite Autoveyer drone of their creation that can bore through rockcrete and steel in search of treasures their master might have missed.

    This multipart resin kit builds one Claim Jumper and his Techmite Autoveyer – a Hanger-on and accompanying Exotic Beast for your Ironhead Squat Prospectors. Clad in hardy mesh armour and laden with tools and sensors, the Claim Jumper defends their prizes with a power fist, power pick, and Ironhead autopistol. The gem extractor rig on their back is used for industrial work, but also comes in handy in a scrap, while their Techmite familiar opens up both loot crates and skulls with its built-in drills.

    This highly detailed kit comprises 19 resin components, and comes with a Citadel 28mm Round Base and a Citadel 25mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes two Fighter reference cards, one for the Claim Jumper and one for the Techmite Autoveyer, detailing their profiles and abilities.
- name: Urson Grimjarl, Jardlan Nomad Hunter
  productCode: P-162506-99850599106
  sku: 99850599106
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/urson-grimjarl-jardlan-nomad-hunter-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599106_UrsonGrimjarlJardlanNomadHunter2.jpg
  status: current
  description: |-
    It takes a certain kind of Squat to live the life of a nomad hunter. Urson Grimjarl, older brother of Orrin Grimjarl, long ago left the Jardlan Holdfast to wander the wasteland hunting nomads for bounties. In the decades he has travelled the Great Equatorial Wastes and beyond, earning a reputation for having an uncanny ability to track down and kill even the most cunning nomad raiders. This has made him a target to the wasteland tribes, and even nomad champions have sought to make their name by hunting down the ornery old Squat – usually with fatal results. For the nomad.

    This multipart resin kit builds Urson Grimjarl, a Bounty Hunter available for hire by any law-abiding gang. The kit also includes a Techmite Oculi, a floating robotic Exotic Beast. Urson’s expertise as a sniper will give your gang an edge at range before enemy fighters can get up close and personal.

    This highly detailed kit comprises 9 resin components, and comes with a Citadel 28mm Round Base, a Citadel 25mm Round Base, and a Groove Stem flying stand. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes two fighter reference cards – one for Urson Grimjarl, and one for the Techmite Oculi, detailing their profiles and abilities.
- name: Orrin Grimjarl, Last Charter Lord of Jardlan
  productCode: P-162505-99850599104
  sku: 99850599104
  productType: single_kit
  priceGbp: 27.5
  url: https://www.warhammer.com/en-GB/shop/orrin-grimjarl-last-charter-lord-of-jardlan-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599104_GrimjarlLastCharterLord2.jpg
  status: current
  description: |-
    A brilliant, if somewhat eccentric, engineer, Orrin is an outcast from the technical doctrines of his clan and has created all manner of bespoke wargear and weaponry for his own personal use. The most unusual of these is his ‘fractal pulse beamer’ – a negative energy laser weapon created with dozens of opposable lenses – capable of cutting down into rich mineral seams or just as equally carving limbs off troublesome wasters.

    This multipart resin kit builds Orrin Grimjarl, a House Agent who will join your Ironhead Squat Prospector or Imperial House-allied gangs when they need a helping hand. The kit also makes a Techmite Exovator – a more powerful version of the Autoveyer exotic beast. His powerful custom weaponry will help any worthy gang score a crucial advantage in the chaos of territorial scraps.

    This highly detailed kit comprises 18 resin components, and comes with a Citadel 28mm Round Base and a Citadel 25mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes two fighter reference cards – one for Orrin Grimjarl, and one for the Techmite Exovator, detailing their profiles and abilities.
- name: Mind-locked Wyrd and Cephalopod Spektors
  productCode: P-160804-99860599102
  sku: 99860599102
  productType: single_kit
  priceGbp: 47.5
  url: https://www.warhammer.com/en-GB/shop/mind-locked-wyrd-and-cephalopod-spektors-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99860599102_NMMindLockedWyrdAndCephalopodSpektors02.jpg
  status: current
  description: |-
    Mind-locked Wyrds are unsanctioned psykers who have been broken to the will of the Psi-Syndica, suborned by psychic modifications and cranial implants. These illegal psychic foot soldiers serve their criminal lords without risk of betrayal, and are often sent to aid the Psi-Syndica's allies. The shadowy House Delaque are particularly favoured partners of this psychic cartel, and employ Mind-locked Wyrds alongside their engineered creations – such as the Cephalopod Spektors, cybernetic watchdogs built around fragment-brains cloned from their bonded master.

    This multipart resin kit builds one Mind-locked Wyrd and three Cephalopod Spektors. The Mind-locked Wyrd is a specialist Hired Gun, available to any gang allied with the Psi-Syndica – a group with especially close relations to House Delaque – who wields unnatural psychic abilities at her employer's behest. She carries a skull-tipped staff to help channel her innate but untamed power, while her long coat and hair billow in a wild psychic maelstrom.

    The Cephalopod Spektors are engineered Exotic Beasts, exclusive to Delaque gangs. These floating cybernetic sentries feature different sinister poses, using their prehensile shock tendrils to creep across the underhive or spring onto the attack. Their bodies are covered with elegant plating and sensor arrays, while an exposed brain hangs from the rear of each mechanical frame.

    This highly detailed kit comprises 24 resin components, and comes with 4x Citadel 25mm Necromunda Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Mind-locked Wyrd and Cephalopod Spektor, detailing their profiles and abilities. Full rules for using these miniatures in your games can be found in the Necromunda: House of Shadow supplement.
- name: Escher Cutters
  productCode: prod5000392-99120599046
  sku: 99120599046
  ean: 5011921172603
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-escher-cutters-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599046_EscherCuttersLead.jpg
  status: current
  description: |-
    Cutters are fast, agile jetbikes, reflecting House Escher's preference for deadly speed over brutish durability. Borne across the skies of the ash wastes by a staggeringly powerful engine, Cutters are seldom the stablest or safest of rides – but leave any rivals choking on clouds of dust and trails of corrosive chem-exhaust. Soaring over obstacles and barricades, a descending Cutter can slice through the enemies of the House of Blades with a hail of gunfire, then jink away before the foe can respond.

    This multipart plastic kit builds four Escher Cutters, lightning-fast jetbikes that can be added to any Escher gang. These ferocious flying machines boast a powerful front turbine with exposed engine cylinders, providing thrust for their sleek, bladed chassis. Each Cutter has a deadly gas trap launcher installed on its undercarriage, and sports a pair of mounted weapons on either side of the jetbike – you can choose between twin-linked grenade launchers, twin-linked heavy stubbers, or twin-linked plasma guns. The kit includes a choice of two different head designs and four interchangeable hairstyles, to give each of your Escher riders their own distinct appearance.

    This set consists of 124 plastic components, and is supplied with 4x Citadel 60x35mm Oval Bases, each with a ball top flying stem. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using Escher Cutters in your games of Necromunda can be found in The Aranthian Succession: Cinderak Burning supplement.
- name: Goliath Champion with Renderizer
  productCode: prod5000184-99850599090
  sku: 99850599090
  productType: single_kit
  priceGbp: 24
  url: https://www.warhammer.com/en-GB/shop/goliath-champion-with-renderizer-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599090_NMGoliathChampionwithRenderizerLead.jpg
  status: current
  description: |-
    A good Forge Boss knows how to walk the line between being a second-in-command and being the heir to the throne. Forge Tyrants choose their Forge Bosses from those fighters who will challenge their dominance rather than grovel at their feet – a Goliath is nothing if they cannot test their muscles and prove their physical superiority. It is the ambition of the Forge Boss, therefore, to replace the Forge Tyrant, and everything they do works toward this goal, constantly testing the strength of the leader until such time as they sense weakness, allowing them to assume their rightful place at the top.

    This multipart resin kit builds one Goliath Forge Boss, a Champion for gangs of House Goliath. He's clad in his House's signature armour and armed with an improbably-large two-headed axe known affectionately as a renderizer, held in one bionic arm – the other holds a combi-pistol with flamer, and is slung with a combi-bolter with a grenade launcher. That's more than enough weaponry for any one man, even if they are a vat-born Goliath hulk. He's the perfect choice to support your gang leader – or usurp him entirely!

    This highly detailed kit comprises 4 components, and is supplied with a Citadel 32mm Necromunda Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    Rules for using the Goliath Forge Boss in your games can be found in the *Necromunda: House of Chains* supplement.
- name: Hive Scum
  productCode: prod4850165-99120599039
