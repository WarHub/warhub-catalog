  status: current
  description: |-
    The Skalvian Explorator is an indomitable example of Ironhead Squat technology, a heavy all-terrain exploration and excavation vehicle suited to extracting the wealth of the Great Equatorial Wastes, surviving its many perils, and ferrying cargo back to safety. Though the Ironhead Squat Prospectors are master weapon makers, much of their equipment is based upon mining tools, and the Explorator's armoured bulk makes it a match for many purpose-built war machines.

    This multipart resin kit builds one Ironhead Squat Prospectors Skalvian Explorator – a rugged vehicle capable of enduring the toughest conditions, perfect for navigating the treacherous ash wastes. Although it's an industrial vehicle, the Explorator is far from defenceless – it's equipped with a turret-mounted heavy stubber, as well as a crushing Ironhead claw that features an integrated flamer. The Explorator's armoured hull and suspended tracks are loaded with mechanical detail, and feature grated walkways that gangers can ride and fight atop, plus a ladder to climb.

    This highly detailed kit comprises 67 resin components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes rules for using this miniature in your games of Necromunda. Rules can also be found in *Necromunda: The Aranthian Succession – Ruins of Jardlan*.
