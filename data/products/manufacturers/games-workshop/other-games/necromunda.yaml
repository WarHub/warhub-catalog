  description: |-
    Hive Secundus is a crumbling wasteland, infested with twisted Malstrain Genestealer broods. There are very few reasons to go there, but data crystal stacks are a compelling trophy for those with the will to secure them. Ancient structures remain each housing a number of these stacks in armoured alcoves, which allowed many of them to survive the destruction. They may look like junk, but they're a veritable gold mine for the savvy.

    This multipart plastic kit allows you to build two Hive Data Stack Clusters for use as terrain in games of Necromunda. They're designed as fully three dimensional replacements for the artwork on the Hive Secundus game board, and matching the aesthetic of the Zone Mortalis terrain kits, which are available separately. Each piece features four alcoves connected to a central unit, and a separate additional alcove. The data crystal stacks are fully removable, allowing you plenty of options to model yours how you like.

