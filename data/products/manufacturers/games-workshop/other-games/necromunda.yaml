  url: https://www.warhammer.com/en-GB/shop/outland-beastmaster-w-wastelnd-giant-rat-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599081_NECOutlandBeastmasterGiantRat2.jpg
  status: current
  description: |-
    Outland Beastmasters employ lures, animal calls, and shock staves to capture and train the creeping, crawling, and biting horrors that infest hive cities and wasteland settlements. For a price, a Beastmaster will lend their talents and critters to a gang. The giant, mutated rats that thrive across Necromunda are common, if downright nasty, companions – these creatures are resilient, cunning, and extremely easy to replace.

    This multipart resin kit builds one Outland Beastmaster and a Wasteland Giant Rat – a Hanger-on for any gang, accompanied by a mutated Exotic Beast. Clad in rugged ash wastes gear with a rodent-skull helmet, the Beastmaster uses their shock stave and shotgun to get an edge in high-stakes scraps. Their Wasteland Giant Rat is a vile mutant creature, with a pair of snarling heads to give your gang some extra bite\(s\).

    This kit contains 13 resin components, 1x Citadel 28mm Round Base, and 1x Citadel 40mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Outland Beastmaster and Giant Rat, detailing their profiles and abilities. Full rules for using the Outland Beastmaster in your games can be found in the Necromunda: Book of the Outlands supplement.
