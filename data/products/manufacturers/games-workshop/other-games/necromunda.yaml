  status: current
  description: |-
    Orlock Road Captains are, without exception, hard men and women willing to thumb their nose at authority and forge their own path. However, Orlock gangers respect independence as much as strength, and a successful Road Captain needs to be the embodiment of both of these traits.

    A good Road Sergeant can take orders from their Captain but has enough initiative to break the rules to get the job done. The very best Sergeants know just when to question their Captains and anticipate what they want before they even have a solid plan in mind.

    The bulk of Orlock gangs are made up of Gunners, hive-hardened men and women with a rebellious streak a mile wide. Most often they are drawn up from the drudging classes, where they never really fit in among work crews and mining towns. The gangs are their last chance to prove their worth.

