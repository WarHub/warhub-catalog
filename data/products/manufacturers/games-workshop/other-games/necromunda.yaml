  description: |-
    Fixers and Proxies are common in situations where common gangs get mixed up in the confusing and dangerous world of dealing with the powerful guilds of Necromunda. Fixers use their connections to help out should a gang get close to breaching a contract, and Proxies connect Outlaw gangs to more official functionaries. Both are crucial to keeping the byzantine political structure of the hive churning on.

    This multipart resin kit builds one Fixer, and one Proxy – Hangers-on to be hired by your Necromunda gang. If your Outlaw gang is trying to make some more legitimate profit, a Proxy is all but essential to open doors. A Fixer is who you'll want to call if you're in hot water with a Guild, getting you out of tight spots. Meanwhile, your gang will appreciate the extra firepower they bring to your scraps as well.

    This highly detailed resin kit contains 13 parts, and builds one Fixer, and one Proxy. It comes supplied with two Necromunda 25mm Round Bases, plus two gang fighter cards so you can use them in your games.

    Rules for using these models in your games of Necromunda can also be found in the *Book of Judgement*, which is available separately.
