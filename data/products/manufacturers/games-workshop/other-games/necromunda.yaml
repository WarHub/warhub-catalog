  status: current
  description: |-
    Ozostium Aranthus hails from a time before the Imperium itself, when Necromunda was the crown jewel in the verdant Araneus star system. Though he seems perfect in every way, gaps in his armour and cracks in his control reveal glimpses at the ugly truth – whatever lies beneath that expertly crafted plating can barely be called alive. Alongside Ozostium drones an eternally loyal Caryatid-servitor.

    This multipart plastic kit builds Ozostium Aranthus, a House Agent, and his Caryatid-servitor for your Aranthian-aligned gangs in games of Necromunda. He is an expert at close combat and a master psyker, giving you a significant boost in your underhive battles. This imposing figure is covered in finery and intricate details, and can be built with or without the mask and chest plate of his master-crafted armour – giving you the option of revealing the decaying skin beneath.

    This kit comprises 32 plastic components, 1x Necromunda 40mm Round Base, and 1x Necromunda 25mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
