- name: Outland Beastmaster with Millisaurs
  productCode: prod5090247-99850599077
  sku: 99850599077
  productType: single_kit
  priceGbp: 49.5
  url: https://www.warhammer.com/en-GB/shop/outland-beastmaster-with-millisaurs-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599077_BeastmasterMillisaurs2.jpg
  status: current
  description: |-
    Outland Beastmasters capture and train the countless critters that infest wasteland settlements and the underhive depths. For a price, a Beastmaster will lend their talents – and their beasts – to a gang, taking foes by surprise as murderous vermin strike from the shadows. The worm-like, rock-skinned Millisaurs that infest Necromunda are especially unsettling companions – these subterranean creatures burrow through everything from radioactive sand to solid rockcrete, emerging from hidden vents and forgotten tunnels in a flurry of drool and razor-sharp teeth.

    This multipart resin kit builds one Outland Beastmaster and two Millisaurs – a Hanger-on for any gang, accompanied by a brace of Exotic Beasts. Clad in the armoured skin of a dead pet, the Beastmaster uses their shock stave to ward off wild creatures and enemy gangers. They also carry a tank of supplies for venturing deep into the wastes or underhive, and a horn to signal their pets from above ground. Their Millisaurs are a pair of grotesque, needle-legged worms with toothy circular maws, leashed by chains hammered directly into their rocky hides.

    This kit comprises 14 resin components, and comes with 1x Citadel 28mm Round Base and 2x Citadel 32mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Outland Beastmaster and Millisaurs, detailing their profiles and abilities. Full rules for using the Outland Beastmaster in your games can be found in the Necromunda: Book of the Outlands supplement.
- name: Ashwood Stranger, Outcasts Leader
  productCode: prod5080161-99850599097
  sku: 99850599097
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-ashwood-stranger-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599097_AshwoodStranger1.jpg
  status: current
  description: |-
    The gunfighter known as Ashwood, or more commonly ‘Stranger’, is a loner who wanders from settlement to settlement, a legend who brings justice for the powerless. His origins and motives are a mystery – some reckon Ashwood to have once been an Enforcer, for he has a habit of turning up wherever the Palanite Enforcers are making their presence known, bringing down rogue Enforcers when even the Merchant Guild won’t put a bounty on their heads. One thing that is in no doubt about Ashwood – when his job is done, he disappears back into the outlands, becoming just another soul wandering the wastes.

    This multipart resin kit builds Ashwood Stranger, a mysterious Bounty Hunter and vigilante Outcasts Leader. This well-travelled wanderer has a haggard appearance of cobbled together clothing and equipment, including a battered set of Palanite Enforcer flak armour and a rebreather. He carries a nomad blade on his back, toting a pair of jury-rigged custom pistols in his hands.

    This highly detailed kit comprises six resin components, 1x Citadel 32mm base, and a fighter card with Ashwood Stranger's full profile. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes a Fighter reference card for Ashwood Stranger, detailing his profile and abilities. Full rules and background for Ashwood Stranger can be found in the Necromunda: Book of the Outcasts supplement.
- name: Enforcer 'Sanctioner' Pattern Automata
  productCode: prod5080155-99120599042
  sku: 99120599042
  ean: 5011921163434
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-enforcer-sanctioner-automata-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599042_NECEnforcerSancAutomata02.jpg
  status: current
  description: |-
    Sanctioners are semi-sentient servo-automata, employed by Palanite Enforcers in times of particular crisis. These hulking cybernetic brutes are controlled by the salvaged cranial remains of particularly merciless Enforcers, psycho-conditioned for utter dedication to the letter of the law. As such, they are known on the streets of Necromunda as ‘Lawtomata’, relentless armoured constructs protected by thick carapace plating, shrugging off small arms fire and putting down whole uprisings with heavier weaponry than any flesh-and-blood Enforcer could bring to bear.

    This multipart plastic kit builds two Enforcer 'Sanctioner' Pattern Automata, armoured robots that can be used by any Palanite Enforcer gang. Each of these cybernetic sluggers sports a built-in grenade launcher and can be armed with a variety of fearsome weaponry – the kit includes two right-handed pacifier assault claws, as well as two heavy shock batons, two concussion cannons, two assault rams, and two mancatchers that can be mounted on either arm, or even both. Each Sanctioner's arms can be posed as you see fit, and the kit offers multiple ways to pose their legs, adding extra variety to your robot reinforcements.

    The kit comprises 104 plastic components, and comes with 2x Necromunda 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using the Enforcer 'Sanctioner' Pattern Automata in your games of Necromunda can be found in The Aranthian Succession: Vaults of Temenos supplement.
- name: Lady Haera, 13th Daughter of Lord Helmawr
  productCode: prod5080137-99850599096
  sku: 99850599096
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/lady-haera-13th-daughter-of-lord-helmawr-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599096_LadyHaera1.jpg
  status: current
  description: |-
    Even by the grim standards of Necromunda’s nobility, Lady Haera is a backstabbing murderer – this Trueborn heir of House Helmawr was torturing and manipulating servants before she left her nursery chambers, and has grown into a dangerous young woman, as deadly as any underhive ganger and just as mean. Trained by the finest blademasters of the spire, armed with the finest weaponry her fabulous wealth can buy, Haera is the equal of any noble duellist. Her most fearsome attribute, however, is her mind. She exploits her many rivals, turning them against each other to advance her ambitions– or simply for her own amusement.

    This multipart resin kit builds Lady Haera, 13th Daughter of Lord Helmawr – a superlative and cunning fighter who may respond to the petitions of gangs allied to the Imperial House. She's clad in all the finery you'd expect from a noble of her stature, accompanied by floating watch-skulls and protected by the refractor field built into her bespoke and beautiful carapace armour. In one hand she carries an exceedingly rare phase sword, capable of bypassing enemy defenses, and in the other she wields an exquisite power spear which can be hurled at nearby foes and then teleport back into her hand. Combined with lifelong training in the killing arts, she's a force to be reckoned with in games of Necromunda.

    This highly detailed kit comprises 18 resin components, 1x Citadel 40mm Necromunda Base, and Lady Haera's fighter card. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes a Fighter reference card for Lady Haera, detailing her profile and abilities. Full rules for using Lady Haera in your games can be found in the Necromunda: The Aranthian Succession – Cinderak Burning supplement.
- name: Cawdor Ridge Walkers
  productCode: prod5040160-99120599057
  sku: 99120599057
  ean: 5011921181469
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-cawdor-ridge-walkers-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599057_CawdorRidgeWalkers2.jpg
  status: current
  description: |-
    Way-Brethren are the outriders of the Redemption’s wasteland crusades. Mounted on mechanical Ridge Walkers, these tireless pilgrims range ahead of the teeming masses of the faithful, blazing a trail between the shrines and holy sites of Necromunda's ash wastes for those that follow. Ridge Walkers are hardy engine-steeds that turn the Way-Brethren into swift and deadly combatants, capable of charging down foes or bullying through enemy lines with almost knightly vigour.

    This multipart plastic kit builds four Cawdor Ridge Walkers, ramshackle warmachines that can be added to any Cawdor gang. These bipedal constructs are built from scrap and spare parts, littered with exposed mechanisms and makeshift repairs. The Way-Brethren can be armed with a motley collection of weapons – this set includes autoguns, frag lances, krak lances, and flails for each of them, as well as two stub guns and two reclaimed autopistols. The kit offers a choice of eight different head designs, plus interchangeable bodies and backpacks to give each of your Cawdor riders a distinct appearance, as well as extra armour and foot-skids to personalise your Ridge Walkers.

    This set comprises 100 plastic components, and is supplied with 4x Citadel 60x35mm Oval Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using Cawdor Ridge Walkers in your games of Necromunda can be found in The Aranthian Succession: Vaults of Temenos supplement.
- name: Mercator Pallidus Corpse Harvesting Party
  productCode: prod5030288-99860599087
  sku: 99860599087
  productType: single_kit
  priceGbp: 59.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-corpse-harvesting-party-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99860599087_NECCorpseHarvestingParty01.jpg
  status: current
  description: |-
    Recycled meat is vital to the continued survival of Necromunda, and the Merchant Guild is continually acquiring fresh sources for the Corpse Grinders. Pale Consorts and Bone Scriveners are corpse prospectors, ever scouring the hives looking for new and plentiful veins of dead meat to be turned into the next batch of corpse-starch rations. Hidden behind macabre masks, often with ornamental rebreathers to block out the stench of their work, Pale Consorts and their Bone Scriveners use a collection of ancient surgical tools to determine the worth of their catch. Often, they will be seen exploring the aftermath of battles between gangs, or stalking the streets of a settlement savaged by outlanders, stooping over the dead.

    There’s nothing quite like a Corpse Harvesting Party, a band of agents in service to the Corpse Guild, tasked with finding, well… fresh\(ish\) meat. If your gang is allied to the guild, they can be added as Hangers-on, bringing with them valuable firepower and muscle along with the other benefits of the guild. Sure, sometimes they’ll want to harvest your own injured fighters, but at least you’ll eat well! Both the Pale Consort and Bone Scrivener are equipped with a Medi Skull and Gun Skull \(respectively\) in addition to their other gear, while the Corpse Grinders are more than a match for most foes in melee with their vicious chain glaives.

    **This kit builds the following resin models:**
    - 1x Pale Consort
    - 1x Bone Scrivener
    - 1x Gun Skull
    - 1x Medi Skull
    - 2x Corpse Grinders

    This highly detailed resin kit comprises 31 components, 4x 32mm Necromunda bases, and 2x 25mm Necromunda bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Corpse Harvesting Party, detailing their profiles and abilities. Full rules for using the Corpse Harvesting Party in your games can be found in the *Necromunda: House of Faith* supplement.
- name: Ajex Gorgoth, Lord of the Fist
  productCode: prod5030287-99850599088
  sku: 99850599088
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-ajex-gorgoth-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599088_NECAjaxGorgoth01.jpg
  status: current
  description: |-
    The Fist of Hive Primus is the largest Goliath enclave on Necromunda, and Ajex Gorgoth is its master. One of the eight Alphas of Hive Primus, he serves Over-tyrant Varran Gor by ruling the manufactorums, slave pits, fighting arenas, and forges of the Fist. Unlike his counterparts in other Clan Houses, Ajex is far from some middling bureaucrat or hive overseer, content to live his life counting quotas and gathering up tithe chits. The Lord of the Fist is a far more ‘hands on’ master, either fighting in the House of Pain – the Fist’s largest fighting pit – or descending into the underhive to expand the territories of the clan and gather slaves for its factories.

    This multipart resin kit builds Ajex Gorgoth, a high-ranking Goliath House Agent. From the bladed tip of his glorious mohawk to his cape made of chains, this man looks the business. Despite his rank, he enjoys getting his hands dirty, and any Goliath gang may petition his services, which consist primarily of absolutely stomping any and all enemies into bloody giblets. What his servo claw doesn’t crush, his great chainsword cleaves. Ajex wears a suit of heavy carapace armour as well, ensuring he’ll stick around to give you your credit’s worth.

    This highly detailed kit comprises 22 components, 1x Citadel 32mm Necromunda base, and a fighter card with Ajex Gorgoth’s full profile. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes a Fighter reference card for Ajex Gorgoth, detailing his profile and abilities. Full rules for using Ajex Gorgoth in your games can be found in the *Necromunda: Book of Chains* supplement.
- name: Rex Spires and Estus Jet
  productCode: prod5030286-99850599073
  sku: 99850599073
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-rex-spires-and-estus-jet-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599073_NECRexSpiresEstusJet01.jpg
  status: current
  description: |-
    The bounty hunting career of Rex Spires started in the scrapheaps of the underhive. His freedom was delivered in the form of a nearby manufactorum explosion tearing through the hive dome. Three days later he crawled from the rubble, granted clarity from the experience. Now he fashions crude explosives, trying to recapture the feeling and making a living hiring himself out.

    As a child, Estus Jet was the only survivor of a Ratskin ambush. The only clue to her identity was a tarnished collar, reading \_EST SU\_JE\_T. She was taken in by the Deep 9 Orphanarium, and taught harsh lessons in survival. She earned a living along with the other girls as a Guilder guard and hired gun, before eventually striking out on her own.

    This multipart resin kit builds the bounty hunter Rex Spires and hired gun Estus Jet. Rex can be added to any gang looking for a little extra boom, while Jet lends her toxin-laced blades to Outlaw gangs. Rex Spires is armed with a variety of explosives, while Estus Jet favours knives and her trusty autopistol.

    This highly detailed kit comprises 13 components, 2x 25mm Necromunda bases, and a fighter card for each, including their profiles. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for both Rex Spires and Estus Jet, detailing their profiles and abilities. Full rules for using Rex Spires in your games can be found in the *Necromunda: Book of Perils* supplement, while Estus Jet's rules can be found in *Necromunda: Book of Judgement*.
- name: Ash Waste Nomads Herder with Arthromite Duneskuttler
  productCode: prod5030274-99860599076
  sku: 99860599076
  productType: single_kit
  priceGbp: 46.5
  url: https://www.warhammer.com/en-GB/shop/ash-wastes-herder-and-arthrommite-duneskuttler-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99860599076_BeastHerderDunestalker1.jpg
  status: current
  description: |-
    Ash Waste Nomads have a strange affinity for the creatures of the wasteland, and few vermin-beasts are as feared as Arthromite Duneskuttlers. Large enough to bite a man’s head off, these predatory insects stalk through ash dunes and city sewers to ambush hapless prey. The only ones who can control such creatures are Arthromite Herders – imposing figures clad in cast-off carapaces, wielding long polearms to fearsome effect. Tamed Duneskuttlers act as shock troops for Nomad raiding bands, charging at the enemy in a hulking flail of mandibles and scythed limbs.

    This multipart resin kit builds one Nomad Arthromite Herder and one Arthromite Duneskuttler – a Hanger-on accompanied by a mighty Brute, both exclusive to Ash Waste Nomads gangs. Clad in the mysterious ash cloak and concealing rebreather-facemask of the Ash Waste Nomads, the Arthromite Herder uses a hunter's polearm crafted from harvested chitin to point out targets for their beast – and force enemies to keep their distance. The Duneskuttler is a nightmarish creature, covered in a thick carapace with six clawed limbs and a set of mandibles that can easily crunch through armour and bone.

    This highly detailed kit comprises 21 components, and is supplied with 1x Citadel 25mm Round Base and 1x Citadel 90x52.5mm Oval Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Nomad Arthromite Herder and Arthromite Duneskuttler, detailing their profiles and abilities. Full rules for using them in your games can be found in the *Necromunda: Book of the Outlands* supplement.
- name: 'Necromunda: Brute Handler & Chem Dealer'
  productCode: prod5020149-99850599074
  sku: 99850599074
  productType: single_kit
  priceGbp: 30.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-brute-handler-and-chem-dealer-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599074_BruteHandlerandChemDealer01.jpg
  status: current
  description: |-
    Many gangs employ experts to aid in their underhive wars, hired professionals with unique skills. Chem Dealers are dedicated suppliers for a gang in need of chems – in exchange for protection and creds, they can secure a variety of chemical enhancements both legal and illicit, from stimms to frenzon... until a deal goes wrong. Those gangs who herd savage Brutes into battle benefit greatly from the services of a Brute Handler. Often drawn from ex-pit fighters or factorum overseers who know how to get the most out of muscle, these vicious instructors can train the most dull-witted hulks to heed a master's commands.

    This multipart resin kit builds one Brute Handler and one Chem Dealer, specialist Hangers-on available to any gang – but particularly common amongst the gangs of House Goliath. The Brute Handler is a burly figure with chains and manacles slung over one shoulder, riddled with bionics from hazardous training sessions – one cybernetic arm ends in a coiled shock whip. The Chem Dealer is clad in concealing robes, with a full-face rebreather connected to a tank of dubious substances. They're loaded with phials and canisters containing their wares, posed to offer a sample.

    This highly detailed kit comprises 12 components, and is supplied with 1x Citadel 25mm Necromunda Base and 1x Citadel 32mm Necromunda Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Brute Handler and Chem Dealer, detailing their profiles and abilities. Full rules for using these Hangers-on in your games can be found in the *Necromunda: House of Chains* supplement.
- name: 'Necromunda: Outland Beastmaster With Ripperjacks'
  productCode: prod5020148-99850599072
  sku: 99850599072
  productType: single_kit
  priceGbp: 49.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-outland-beastmaster-with-ripperjacks-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599072_OutlandBeastmasterRipperjacks1.jpg
  status: current
  description: |-
    Outland Beastmasters capture and train the countless critters that infest wasteland settlements and the underhive depths. For a price, a Beastmaster will lend their talents – and their beasts – to a gang, taking foes by surprise as murderous vermin strike from the shadows. The Beastmasters themselves are also no small threat, often having learned a few tricks from their pets. Abominable alien ripperjacks make for particularly vicious companions – flying fanged horrors that have made Necromunda their home despite generations of attempted purges, these creatures are the reason smart gangers scan the ceiling before entering an abandoned dome.

    This multipart resin kit builds one Outland Beastmaster and two Ripperjacks – a Hanger-on for any gang, accompanied by a brace of Exotic Beasts. Clad in hardy outlands wear and an intimidating tusked mask, the Beastmaster uses their shock stave to ward off both wild creatures and enemy gangers. The Ripperjacks themselves are nightmarish, flying xenos predators, using their leathery wings to envelop prey and feed upon them with slavering jaws.

    This highly detailed kit comprises of 15 components, and is supplied with 1x Citadel 25mm Round Base and 2x Citadel 32mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Outland Beastmaster and Ripperjacks, detailing their profiles and abilities. Full rules for using the Outland Beastmaster in your games can be found in the *Necromunda: Book of the Outlands* supplement.
- name: Underhive Traders
  productCode: prod5010310-99850599095
  sku: 99850599095
  productType: single_kit
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-underhive-traders-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599095_NECUnderhiveTraders01.jpg
  status: current
  description: |-
    Necromunda is a world built upon commerce. From deepest corners of the underhive to the very heights of the spires, goods are bought, sold, and bartered without end. A canny trader can make their fortune if they know where to sell their wares, and the underhive is a rich source of potential customers – especially gangers, who flood the markets in search of everything from cheap ammo and fine-tuned firearms to exotic pets and religious artefacts.

    This multipart resin kit builds three different Underhive Traders – specialist Hangers-on who can provide mercantile services to Necromunda's various gangs. The Beastwrangler hoists a young sumpkroc in one hand, a small menagerie of tamed beasts lurking around their ankles and shoulders. The Relicmonger is shrouded in mysterious robes and cybernetics, brandishing a holy reliquary and accompanied by a lockbox-bearing cherubim. The Gun-smyth is slung with ammo and firearms, leaning on a massive heavy bolter too big for them to lift.

    **This set contains:**
    - 1x Beastwrangler
    - 1x Gun-smyth
    - 1x Relicmonger

    This highly detailed set comprises 23 resin components, and is supplied with 1x Citadel 32mm Round Base and 2x Citadel 25mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Relicmonger, Beastwrangler, and Gun-smyth, detailing their profiles and abilities. Full rules for using these Hangers-on in your games can be found in the *Necromunda: Book of the Outcast* supplement.
- name: Chronos Pattern Ironcrawler
  productCode: prod5010238-99860599075
  sku: 99860599075
  productType: vehicle
  priceGbp: 99
  url: https://www.warhammer.com/en-GB/shop/necromunda-chronos-pattern-ironcrawler-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99860599075_Ironcrawler1.jpg
  status: current
  description: |-
    Heavily-armoured transports employed by the Guild of Coin, Chronos-pattern Ironcrawlers are used to escort important convoys across the ash wastes, carrying a payload of hired gangers to ward off the raiders that plague Necromunda's trading routes. Originally based on the chassis of a Cargo-8 Ridgehauler, these vehicles load up on additional armour plating and exchange wheels for heavy-duty tracks, allowing them to stray from the safety of the roads and protect a gang's investments across any terrain.

    This multipart plastic and resin kit builds a Chronos-pattern Ironcrawler, for use with any gang except the Ash Waste Nomads. This vehicle's armoured hull is covered in details, such as vents, fuel tanks, ladders, headlights, and towing cables. The top of the Ironcrawler features two hatches, both of which can be built closed or with a gunner – a frontal hatch, which can be equipped with a pintle-mounted heavy stubber or grenade launcher, and a central hatch, which can be armed with a heavy stubber. The vehicle's rear boasts a transport cage for gangers to ride aboard, shooting its rear deck or the safety of its armoured fire points.

    This set comprises 131 plastic components and 35 resin components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    Rules for using this miniature in your games of Necromunda are included in the construction booklet.
- name: Gorshiv Hammerfist, Bounty Hunter
  productCode: prod5010232-99850599089
  sku: 99850599089
  productType: single_kit
  priceGbp: 30.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-gorshiv-hammerfist-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599089_NECGorshivHammerfist01.jpg
  status: current
  description: |-
    The infamous Rogue Doc Shiv has created some impressive specimens over the years, but none quite as glorious as Gorshiv Hammerfist. Arguably the most powerful Stimmer to ever bear the title, Gorshiv was created – if rumours are to be believed – from the parts of a dozen failed experiments, bone and muscle grafted together before being pumped full of custom genetic-stimulants. Gorshiv is fanatically loyal to his creator, perhaps because Shiv keeps injecting him with her own blend of stimms and growth-chems. When he first left her labs, Gorshiv was little more than a thug looking to make trouble – now, years later, the Stimmer is a towering murder machine.

    This multipart resin kit builds Gorshiv Hammerfist, a hulking Bounty Hunter who can be hired by any Necromunda gang. Clad in the carapaced hide of a slaughtered wasteland beast, this hulking Goliath monster wields a pair of massive, custom-made power hammers – dubbed 'Wreck and Ruin' – which he swings with crushing force. A holstered stub gun hangs from his waist, for dealing with any foes too cowardly to get within hammer-range.

    This highly detailed kit comprises 16 components, and is supplied with a Citadel 40mm Necromunda Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes a Fighter reference card for Gorshiv Hammerfist, detailing his profile and rules. Rules for using him can also be found in the *Necromunda: The Aranthian Succession – Cinderak Burning* supplement.
- name: Promethium Tanks on Cargo-8 Ridgehauler Trailer
  productCode: prod5000505-99120599060
  sku: 99120599060
  ean: 5011921193622
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/necromunda-promethium-tanks-on-cargo-8-trailer-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599060_NECPromethiumTanksonCargo8RidgehaulerTrailerLead.jpg
  status: current
  description: |-
    The Guild of Coin rules the roads of Necromunda. They transport material between hives and, for a hefty price, they'll even smuggle weapons and people. Crossing the arid, violent, and irradiated ash wastes is a risky business, so the guild employs convoys of Cargo-8 Ridgehaulers. These hulking vehicles can cart huge volumes of resources through the most dangerous outlands – such as tanks of promethium, the highly volatile and equally valuable fuel employed throughout the Imperium. A secure fuel supply is the lifeblood of the wastes, and the payoff for a successful delivery is well worth the risks of perching atop a tanker of explosive gas during a roadside firefight.

    This multipart plastic kit allows you to build a Ridgehauler Trailer with a set of Promethium Tanks, for use with a Cargo-8 Ridgehauler. You can construct this trailer with six or eight wheels, and the Ridgehauler Trailer's modular assembly options allow you to field it with a flatbed cargo bay capable of carrying gang fighters and freight goods, or with a pair of Promethium Tanks that can be built in a variety of sizes, complete with an overflow tank and a walkway that gangers can ride atop. The Ridgehauler Trailer can also be fielded with an adjustable rear coupling, allowing you to hook additional trailers onto your land train – each Cargo-8 Ridgehauler can tow up to four trailers.

    The kit also includes a variety of accessories:
    – 1x Crate, with a choice of two interiors
    – 1x Hose
    – 2x Wrenches
    – 2x Blowtorches
    –1x Spanner set

    This set comprises 125 plastic components, and is supplied with a Cargo-8 Ridgehauler Transfer Sheet featuring a variety of vehicular decals and gang logos. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints. Note that some components are intended to be assembled without glue.

    Rules for using the Ridgehauler Trailer and the Cargo-8 Ridgehauler can be found in Necromunda: Book of the Outlands.
- name: Athera, Blade of the Matriarch – Escher House Agent
  productCode: prod5000403-99850599093
  sku: 99850599093
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-athera-blade-of-the-matriarch-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599093_NECAtheraBladeoftheMatriarchLead.jpg
  status: current
  description: |-
    Athera is the bodyguard, champion, and gene-sister of House Escher's Matriarch Primus, known and feared across Necromunda as the Matriarch's Blade. The two share a special bond as clone children of Queen Vhoadycia, and Athera is often dispatched to act as Adina's proxy in matters of honour. More than one opponent has openly backed down from a dispute upon seeing Athera step from the shadows, casually balancing her chainaxe on her shoulder as she tells her companion Stix all the ways she plans to deal with them. This diminutive pet is a Caryatid – a winged psychic creature whose kind infests the underhive. It latched onto Athera in the depths of Hive Primus, near the chem river for which she named it, and has brought her good fortune ever since.

    This multipart resin kit builds Athera, the feared Matriarch's Blade – and her Caryatid companion Stix. This exceptionally-skilled Escher House Agent wears a luxurious high-collared coat over carapace armour decorated with spikes and feathers, her braided hair flowing in the wind. She hefts a master-crafted chainaxe in one hand, issuing a challenge to her foes, while gripping an elegant plasma pistol in the other. Stix sits in a cross-legged sulk, adorned with robes and bangles to suit a prized pet, its membranous wings and childlike body marked by the swirling tattoo-patterns characteristic of Caryatids.

    This highly detailed kit comprises 13 components, and is supplied with a Citadel 32mm Necromunda Base and a Citadel 25mm Necromunda Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for Athera and Stix, as well as the special rules for both characters. Their full rules can also be found in The *Aranthian Succession: Cinderak Burning* supplement.
- name: Escher Shivver & Apprentice Clan Chymist
  productCode: prod5000401-99850599085
  sku: 99850599085
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-escher-shivver-and-apprentice-chymist-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599085_NECEscherShivverApprenticeClanChymistLead.jpg
  status: current
  description: |-
    House Escher employs many specialists to meet the unique needs of its gangs. Clan Chymists often spend their apprenticeships in the underhive, where they learn how best to concoct and apply toxins, and experiment on fighters with their elixirs – when a ganger falls in battle, they may even help revive the unfortunate subject as an Escher Death-maiden. Gang sisters who wish to avoid such a fate may pay a visit to the Shivver, a hive oracle sheltered by House Escher for her precognitive talents. A Shivver's glimpses of the future can save a gang from calamities or lead them to great riches – though at other times, they may mislead them to disaster.

    This multipart resin kit builds one Shivver and one Apprentice Clan Chymist, specialist Hangers-on for any House Escher gang. The Shivver is bedecked with the artefacts of her fortune-telling craft, from cards of the Emperor's Tarot to a psi-crystal orb carried by a hovering servo-skull, with an impressive headdress of cybernetic cables extending from her cranium. The Apprentice Clan Chymist is busy applying experimental toxins to a fine Escher blade, with additional flasks and potion bottles strapped to her belt alongside a holstered needle pistol. She's clad in goggles, a rebreather mask, and a coat and long gloves to guard against the alchemical spills of her profession.

    This highly detailed kit consists of 15 resin components, and is supplied with 2x Citadel 25mm Necromunda Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Shivver and Apprentice Clan Chymist, detailing their profile and abilities. Full rules for using these Hangers-on in your games can be found in the *Necromunda: House of Blades* supplement.
- name: Axon Hammer, Outlaw Goliath House Agent
  productCode: prod5000186-99850599092
  sku: 99850599092
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-axon-hammer-goliath-house-agent-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599092_AxonHammerLead.jpg
  status: current
  description: |-
    Axon Hammer is one of the most wanted outlaws in the ash wastes. The leader of the Irontree Reavers has robbed countless Guilder and Orlock convoys, netting himself an eye-watering bounty – and a reputation compounded by his many wild adventures out into the wastes. As such, Axon finds himself frequently petitioned for aid by Goliath gangs. On a good day, he'll only fleece them for a handful of credits. On others, he takes more than a fair share. Sometimes, he feels his prodigious skills aren't needed at all. Regardless of the outcome, the legend of Axon Hammer continues to grow – just like his stash of credits.

    This multipart resin kit builds Axon Hammer, a legendary Outlaw and Goliath House Agent. This caped caravan-raider can be petitioned for aid by gangs of House Goliath, helping them only when he sees fit – but if your coffers are deep and your luck holds true, he's well worth the effort. Along with his impressive jaw and fists of steel, Axon brings along a powerful combi-bolter with a built-in plasma gun, protected from harm by his personal refractor field.

    This highly detailed kit comprises 5 components, and is supplied with a Citadel 32mm Necromunda Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes a Fighter reference card for Axon Hammer, detailing his profile and special rules.
- name: Durgan Kill-Fist, Outlaw Bounty Hunter
  productCode: prod5000185-99850599091
  sku: 99850599091
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/durgan-kill-fist-outlaw-bounty-hunter-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599091_DurganKillfistLead.jpg
  status: current
  description: |-
    Durgan Kill-Fist is a rarity among the Goliaths, in that everyone in the underhive of Hive Trazior has heard of him, but no one seems to have actually met him. Head of a gang known as the Knuckle Boys, Durgan has been linked to dozens of illicit pit fights and pit fighter gangs. The Guild and the Enforcers both offer hefty rewards for this outlaw's capture, especially after he and his outcasts turned an entire underhab zone into their own personal arena – claiming the winners of their 'games' as their own.

    This multipart resin kit builds Durgan Kill-Fist, an Outlaw Bounty Hunter who can also lead Outcast gangs. Armed with the bespoke spiked gauntlet that has granted him the epithet Kill-Fist, Durgan is a hardy Bounty Hunter for Outcast Gangs. Not satisfied with just caving in heads with his massive gauntlet, Drugan comes with a brutal spiked maul known as Cruncher, and a slew of frag grenades strewn around his person for foes he cannot pulverise with his raw strength.

    This highly detailed kit comprises 8 components, and is supplied with a Citadel 32mm Necromunda Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes a Fighter reference card for Durgan Kill-Fist, detailing his profile and rules. Full rules for using Durgan Kill-Fist as part of an Outcasts gang can be found in *Necromunda: Book of the Outcast*.
- name: Gaen & Vunder Gorvos
  productCode: prod5000183-99850599083
  sku: 99850599083
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-gaen-and-vunder-gorvos-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599083_NMGaenandVunderGorvosLead.jpg
  status: current
  description: |-
    It’s difficult to find entitled and spoiled underhivers, given the crushing poverty and endemic violence of their surroundings – but they do exist, and the Gorvos siblings are among them. Both Gaen and Vunder are scions of the notorious Gorvos clan of the Two tunnels triumvirate – though Gaen shares none of her brother's delusions about the world. Vunder genuinely believes himself a hive noble, aping any uphive fashions or affectations he happens to hear about, and is universally despised as a result. Gaen, on the other hand, knows that the only way for the Gorvos clan to hold onto power is through fear and violence – that, and getting rid of her stupid brother.

    This multipart resin kit builds Gaen Gorvos and Vunder Gorvos, a pair of Dramatis Personae available to Outlaw gangs. These gutter-noble siblings are clad in all the finery the underhive has to offer, with coats and coiffed hairstyles – and in Vunder's case, a bizarre pet perched on his shoulder. Both wield an elegant sword – Vunder is also armed with two master-crafted stub guns in holsters and a belt-slung shotgun, while his sister Gaen 'The Gunk Queen' Gorvos heads into battle with an autogun, toxin-laced throwing knives, and her trademark gunk bombs.

    This highly detailed kit comprises 14 components, and is supplied with 2x Citadel 25mm Necromunda Bases. These miniatures are supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for Gaen and Vunder Gorvos, detailing their profiles. Full rules for using these Hired Guns in your games can be found in the *Necromunda: Book of Judgement* supplement.
- name: Propagandist & Agitator
  productCode: prod5000182-99850599082
  sku: 99850599082
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-propagandist-and-agitator-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599082_NMPropagandistandAgitatorLead.jpg
  status: current
  description: |-
    Necromunda's many Houses, Guilds, cults, and criminals all use propaganda to publicise their messages throughout the hive. Specially trained individuals give speeches, paint slogans on walls, and spread favourable rumours among the citizenry. These Propagandists and Agitators might be dedicated members of the faction they represent, or simply professional rabble-rousers with a knack for getting the word out.

    This multipart resin kit builds one Propagandist and one Agitator, rumour-spreading Hangers-on for any Law Abiding or Outlaw gang, respectively. The Propagandist sports bulky cybernetic enhancements suited to his profession, allowing him to bellow his gang's message from massive vox-speakers and display their sigil on a banner pole mounted with display screens. The Agitator bears the marks of a fervent subversive – brandishing a stolen Enforcer helmet from atop a crate, with a paint spray in his other hand, and the eight-pointed star carved into his head and hanging from his belt. Both are armed with a holstered pistol.

    This highly detailed kit comprises 16 components, and is supplied with 2x Citadel 25mm Necromunda Bases. These miniatures are supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for the Propagandist and Agitator, detailing their profile and abilities. Full rules for using the Propagandist in your games can be found in the *Necromunda: Book of Judgement* supplement, while rules for the Agitator can be found in *Necromunda: Book of Ruin*.
- name: Corpse Grinder Cult Weapons Set
  productCode: prod4980322-99850599071
  sku: 99850599071
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/corpse-grinder-weapons-set-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599071_CorpseGrinderWeaponsSetLead.jpg
  status: current
  description: |-
    Driven to ravening heresy by the grim sickness of Necromunda's charnel houses, the Corpse Grinder Cults take up arms and make bloody offerings to the Lord of Skin and Sinew. The weapons wielded by these frenzied cannibal gangs are a mixture of black market armaments and industrial butcher's tools, just as suited to hacking through living flesh as dead meat. Customise your gang with an assortment of alternate weapons, designed to work perfectly with the plastic Corpse Grinder Cult gang kit.

    **This highly-detailed resin upgrade kit builds 17 weapons, including:**
    - 2x Chain glaives
    - 2x Two-handed axes
    - 2x Boning swords
    - 1x Heavy rock cutter
    - 1x Rotary flensing saw \(can also be built as a heavy rock cutter\)
    - 1x Fighting knife
    - 1x Butcher's cleaver
    - 2x Hand flamers
    - 2x Autopistols
    - 1x Flamer
    - 1x Heavy flamer
    - 1x Harpoon launcher
    - 1x Cult icon

    This upgrade kit comprises 40 resin components, designed to be assembled with the plastic Corpse Grinder Cult models, which are sold separately. These components are supplied unpainted - we recommend using Citadel paints.
- name: Delaque Spyker
  productCode: prod4980321-99850599068
  sku: 99850599068
  productType: single_kit
  priceGbp: 26.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-delaque-spyker-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599068_DelaqueSpykerLead.jpg
  status: current
  description: |-
    Spykers are equal parts telepathic eavesdropper and gibbering psychic powerhouse, engineered by House Delaque to serve its gang leaders. In a process that can take months or even years, an individual with a glimmer of psychic potential is dosed up with concentrated Ghast solutions - strapped into a medicae harness as their body atrophies and their cranium expands. Those who don’t suffer catastrophic biological collapse become Spykers - too weak to stand, these non-sanctioned psykers use their powers to glide across the battlefield and unleash terrifying mental assaults.

    This multipart resin kit builds one Spyker, a psychic Hanger-on for House Delaque. This mutated creature's bulging skull has grown to the point that it can no longer support its own weight - a highly-detailed cybernetic harness keeps its head as upright as possible, while incorporating a variety of arcane devices such as medical tubing and the mechanical injectors poised over its vein-studded scalp. The Spyker's atrophied limbs are folded across its chest and bound to its harness - instead of walking, it floats unnaturally above the ground, cutting an ominous figure on the tabletop as a long Delaque-style greatcoat drags behind it.

    This kit comprises 14 components, and is supplied with a Citadel 40mm Necromunda Base. This miniature is supplied unpainted and requires assembly - we recommend using Citadel Colour paints.

    This pack includes a Fighter reference card for the Spyker, detailing its profile and Wyrd Powers. Full rules for using Spykers in your games can be found inside the *Necromunda: House of Shadow* supplement.
- name: Goliath Maulers
  productCode: prod4980315-99120599034
  sku: 99120599034
  ean: 5011921162789
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-goliath-maulers-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599034_NECGoliathMaulersLead.jpg
  status: current
  description: |-
    Maulers are bulky, heavily armoured vehicles, perfectly suited to the gang members of House Goliath. Their hydraulic drive combines tracks and wheels to keep moving regardless of the terrain, while a front-mounted power ram inflicts horrendous damage on anything foolish enough to stand in its path. Brutal, loud, and almost impossible to stop, an oncoming Mauler is a terrifying sight to behold – the very spirit of the House of Chains, made manifest in steel and fumes.

    This multipart plastic kit builds two Goliath Maulers, destructive vehicles that can be added to any Goliath gang. These monstrous bikes are loaded with armour plates and spiked power rams, and can each be built with an oversized front tyre or a grinding wheel mechanism. They feature a weapon hardpoint on either side of the vehicle, which can be mounted with a choice of two weapon options – twin-linked bolters, or twin-linked grenade launchers. Each Mauler is piloted by a Goliath Road Thug – the kit includes a choice of four different heads and two interchangeable head crests, to help build distinctive riders for each of your vehicles.

    This set comprises 84 plastic components, and is supplied with 2x Citadel 90mm x 52.5mm Oval Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.

    Rules for using Goliath Maulers in your games of Necromunda can be found in The Aranthian Succession: Cinderak Burning supplement.
- name: Ironhead Squat Prospectors Vartijan Exo-Driller
  productCode: prod4960416-99850599084
  sku: 99850599084
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-squat-vartijan-exo-driller-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599084_VartijanExoDrillerLead.jpg
  status: current
  description: |-
    Exo-armour is among the many tools and machines employed by the Squat Mining Clans of Necromunda – originally designed for protecting Squat miners in adverse environments, these suits have been adapted over the centuries to incorporate heavier weaponry and better defences against Necromunda’s unique environment. The most widely used of these suits is the Vartijan – Charter Masters find the suit’s ability to carry heavy weaponry into difficult-to-reach regions often makes the difference between claiming a dig site or getting driven back by nomad attacks. These days it is not unusual for the heavy stomping of an exo-driller, or the harsh glare of its spotlights, to accompany prospectors into dangerous situations.

    This multipart kit builds one Vartijan Exo-Driller, a mechanized Brute for adding some serious punch to Ironhead Squat Prospector gangs. Equipped with a mechanical, five-clawed Vartijan fist with an in-built seismic crusher, this hulking fighter is more than capable of pulping enemy fighters that come too close. It's also armed with your choice of ranged weapon – a heavy bolter for laying down covering fire, or a heavy flamer for scouring enemies from cover. These weapons can be mounted on either arm, allowing a greater variety of builds if you plan to run more than one Exo-Driller in your gang. The miniature also includes plenty of mechanical details, such as industrial cabling and a power pack laden with mining equipment.

    The kit comprises 17 resin components, and is supplied with a Citadel 50mm Oval Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    Rules for using the Vartijan Exo-Driller in your games of Necromunda can be found in the *Necromunda: Book of the Outlands* supplement.
- name: Vespa 'Minx' Merdena, Orlock Bounty Hunter
  productCode: prod4940202-99860599070
  sku: 99860599070
  productType: single_kit
  priceGbp: 39.5
  url: https://www.warhammer.com/en-GB/shop/vespa-minx-merdena-orlock-bounty-hunter-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99860599070_NECVespaMinxMerdenaOrlockBountyHunterLead.jpg
  status: current
  description: |-
    The kid sister of Margo Merdena, and youngest of Slate Merdena's twelve daughters, Vespa is a loose cannon – quite literally! When her rebellious nature started causing problems for the family business, her father sent her out into the ash wastes. This turned out to be a wasted effort, as no sooner had Vespa arrived in Cinderak City than she fell in with a crowd of outland Orlocks and began raiding convoys all across the Great Equatorial Wastes – perhaps in an effort to impress her older sister, the Road Boss.

    As a concession to Vespa's wild nature, Slate sent one of his old crew, Big Pete Plainsman, to look out for his little girl. Of course, it didn't take very long for Vespa to wrap the old ganger around her little finger, and now Pete regularly drives her quad while Vespa hangs off the back laying down barrages with her belt-fed rocket launcher, 'Mischief'. Pete’s an exceptional driver – when sober – throwing himself between danger and his precocious charge should the need arise.

    This multipart kit builds one Vepsa 'Minx' Merdena, riding atop a customised Orlock outrider quad. Minx is a fantastic addition to any Orlock gang operating in the ash wastes. Not only do you get another, tougher quad with better driver skills, but ‘Mischief’, Vespa's custom rocket launcher, is a versatile and deadly weapon that can take on anything your gang might encounter. Big Pete keeps them moving forward at full speed, or pulls risky manoeuvres to get into tight spots, while Vespa drops enemy fighters with impunity.

    The kit comprises 68 resin and plastic components, with which you can assemble Vespa, her quad, and Pete, and is supplied with a Citadel 90mm Oval Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    A profile card for Vespa 'Minx' Merdena is included in the construction booklet for this miniature. Rules for using vehicles in games of Necromunda can be found in the *Necromunda: Book of the Outlands* supplement, as well as the *Necromunda: Ash Wastes* construction booklet
- name: Ash Waste Nomads Wy'tari Stormcaller
  productCode: prod4940201-99850599067
  sku: 99850599067
  productType: single_kit
  priceGbp: 48.5
  url: https://www.warhammer.com/en-GB/shop/ash-waste-nomads-wytari-stormcaller-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850599067_WytariStormcallerLead.jpg
  status: current
  description: |-
    Violent storms are a constant in the ash wastes, often descending from the roiling clouds or appearing over the horizon without warning. Stormcallers are the mystics of the Ash Waste Nomads, and have a connection to the ebb and flow of Necromunda’s ravaged weather patterns that is ill understood. Whether it is via some unfathomable warp magic, or perhaps the strange archaeotech all Stormcallers seem to carry, they can summon or dismiss storms seemingly at will – a handy talent when it comes to concealing a raiding party or covering one’s tracks.

    This multipart kit builds one Wy'tari Stormcaller, a shamanistic Champion for Ash Waste Nomads gangs. Armed with an archeotech stormcaller staff, this mystic gives your gang the ability to manipulate the very skies in your favour, changing the visibility of the ash wastes to suit your preferred tactics. The Stormcaller is also mounted atop a swift-clawed Dustback Helamite, with access to skills that make them an excellent source of backup leadership. The miniature includes plenty of unusual details and imposing back-mounted banners that will set it apart from the rest of your Nomad fighters, while fitting in perfectly alongside them.

    The kit comprises 20 resin components, and is supplied with a Citadel 75mm Oval Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    Rules for using the Stormcaller in your games of Necromunda can be found in *Necromunda: Book of the Outlands*.
- name: Cargo-8 Ridgehauler Gunner Frames
  productCode: prod4940195-99120599055
  sku: 99120599055
  ean: 5011921179985
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/cargo-8-ridgehauler-gunner-frames-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599055_Cargo8RHGunnerFrameLead.jpg
  status: current
  description: |-
    The Guild of Coin rules the roads of Necromunda. They transport material between hives and, for a hefty price, they'll even smuggle weapons and people. Crossing the arid, violent, and irradiated ash wastes is a risky business, so the guild employs convoys of Cargo-8 Ridgehaulers. These hulking vehicles haul trailers of armoured containers across the Great Equatorial Wastes – it takes little effort to outfit their cargo beds with enough guns to make them a mobile fortress, ready to repel gang ambushes and raids.

    This multipart plastic upgrade kit can be used to equip Munitorum Armoured Containers with heavy stubbers, as part of a Cargo-8 Ridgehauler Trailer. It contains four heavy stubbers, allowing you to outfit up to two separate trailers with two heavy stubbers each, instead of the storm bolters provided in the Cargo-8 Ridgehauler Trailer set. The kit also includes four gunners and four closed hatches, giving you lots of variety for your convoys.

    This upgrade kit comprises 48 plastic components and is designed to be assembled with the Cargo-8 Ridgehauler Trailer set, which is sold separately. These components are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.

    Rules for using the Ridgehauler Trailer and the Cargo-8 Ridgehauler can be found in *Necromunda: Book of the Outlands*.
- name: Cargo-8 Ridgehauler Trailer
  productCode: prod4940194-99120599054
  sku: 99120599054
  ean: 5011921179831
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/necromunda-cargo-8-ridgehauler-trailer-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599054_Cargo8TrailerLead.jpg
  status: current
  description: |-
    The Guild of Coin rules the roads of Necromunda. They transport material between hives and, for a hefty price, they'll even smuggle weapons and people. Crossing the arid, violent, and irradiated ash wastes is a risky business, so the guild employs convoys of Cargo-8 Ridgehaulers. These hulking vehicles are perfect for traversing the dunes, and can be easily outfitted with guns to fend off raiders and rivals. Hooked up to its chain of transport beds, a Ridgehauler resembles a true land train, hauling trailers of armoured containers and transport carriages across the Great Equatorial Wastes.

    This multipart plastic kit allows you to build a Ridgehauler Trailer with a Munitorum Armoured Container, for use with a Cargo-8 Ridgehauler. You can construct this trailer with six or eight wheels, and the Ridgehauler Trailer's modular assembly options allow you to field it with a flatbed cargo bay capable of carrying gang fighters and freight goods, or with a Munitorum Armoured Container, which can be fitted with up to two mounted storm bolters. The Ridgehauler Trailer can also be fielded with an adjustable rear coupling, allowing you to hook additional trailers onto your land train – each Cargo-8 Ridgehauler can tow up to four trailers.

    The kit includes a variety of additional components for use with its flatbed cargo bay:
    – 2x Large Crates
    – 2x Small Crates
    – 3x Barrels

    This set comprises 114 plastic components, and is supplied with a Cargo-8 Ridgehauler Transfer Sheet featuring a variety of vehicular decals and gang logos. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints. Note that some components are intended to be assembled without glue.

    Rules for using the Ridgehauler Trailer and the Cargo-8 Ridgehauler can be found in *Necromunda: Book of the Outlands*.
- name: Cargo-8 Ridgehauler
  productCode: prod4940193-99120599043
  sku: 99120599043
  ean: 5011921165681
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 64.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-cargo-8-ridgehauler-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599043_NECCargo8RidgehaulerLead.jpg
  status: current
  description: |-
    The Guild of Coin rules the roads of Necromunda. They transport material between hives and, for a hefty price, they'll even smuggle weapons and people. Crossing the arid, violent, and irradiated ash wastes is a risky business, so the guild employs convoys of Cargo-8 Ridgehaulers. These hulking vehicles are perfect for traversing the dunes thanks to their massive wheels and sturdy engines, hauling trailers of armoured containers and transport carriages across the Great Equatorial Wastes, but their true appeal comes from their modularity – it takes little effort to outfit one with enough guns to make it a mobile fortress, ready to repel gang ambushes and raids.

    This multipart plastic kit allows you to build a Cargo-8 Ridgehauler, for use with any gang except the Ash Waste Nomads. You can construct this vehicle with six or eight wheels, and the choice of a cab-mounted grenade launcher or heavy stubber. The Ridgehauler's modular assembly options allow you to field it with a flatbed cargo bay capable of carrying gang fighters and freight goods, or with a Munitorum Armoured Container. The Container can be mounted with up to two heavy stubbers or storm bolters, and built with two gunners or closed hatches. The Cargo-8 Ridgehauler can also be fielded with an adjustable rear coupling, allowing it to tow a Ridgehauler Trailer and form your own land train.

    The kit includes a variety of additional components for use with its flatbed cargo bay:
