  status: current
  description: |-
    Ogryns are one of the most commonly seen strains of abhuman throughout the Imperium. What they lack in intelligence they more than make up for in terms of strength. As such they are in great demand in the underhive, where they fulfill a variety of roles. Of course, some gangs are known to take their Servitor Ogryns into battle with them where they can prove to be a fantastic equalizer against better equipped gangs.

    Add some extra strength to your gang with these two Ogryns – either add them to your Slave Ogryn gang or hire them as Brutes for any other gang. However you field them, these Ogryns provide the brute strength necessary to dominate the underhive.

    This 57-part plastic kits makes two Jotunn H-Grade Servitor Ogryns. It comes with multiple head options, including a Lobo-slave variant and also features different bodies, optional backpacks, augmetic fists, storm-welders, spud-jackers and the option to make Ogryns with only one arm – though they're far from 'armless! The kit is supplied with two Necromunda 40mm round bases.

    Rules for adding an Ogryn Brute to any gang can be found in Gangs of the Underhive, House of Chains and House of Blades.
- name: Escher Death-maidens and Wyld Runners
  productCode: prod4510223-99120599019
  sku: 99120599019
  ean: 5011921133277
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Escher-Death-Maidens-and-Wyld-Runners-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599019_EscherDMWRLead.jpg
  status: current
  description: |-
    Death Maidens and Wyld Runners represent the two ends of the Escher lifecycle. All Escher adolescents grow up in the Wyld, learning everything they need to know about hive life free from the oppressive societies imposed by most other Clan Houses. As they come of age, they either join the clan or become Wyld Runners, reckless and bold explorers and beast wranglers. Death Maidens are fallen warriors of the Escher, raised from their graves in order to seek revenge for the House of Blades.

    Expand your Escher gang with these six fighters and their cute but deadly pets. Wyld Runners may be armed with low-tech weaponry, in the form of whips and bows, but are no less lethal for it. Death Maidens come armed with a needle pistol and venom claw, allowing them to kill their enemies with the finest poisons from the House of Blades.

    **This 138-part plastic kit makes:**
    – 2x Death Maidens with needle pistols and venom claws
    – 4x Wyld Runners, two with wyld bows and two with whips
    – 4x Phelynx

    This kit is a treat for customisers and converters. Each Phelynx can be kitted out with a choice of interchangeable heads, while the Death Maidens and Wyld Runners feature the same arm and head fittings as the Escher Gang kit, allowing you to mix and match them for greater variety!

    It is supplied with 10 Necromunda 25mm round bases.

    Rules for using these models in games of Necromunda can be found in House of Blades.
- name: Scrutinator-Primus Servalen
  productCode: prod4420187-99850599049
  sku: 99850599049
  productType: single_kit
  priceGbp: 27.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Scrutinator-Primus-Servalen-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599049_ScrutinatorPrimusServalenLead.jpg
  status: current
  description: |-
    Feared by the criminals of Necromunda, Scrutinator-Primus Servalen's reputation precedes her. As a psychic null, she is best known for hunting down unsanctioned psykers and delivering them Helmawr's justice with her Scrutinator stub gun.

    Bring justice to the underhive with Servalen. Available to be hired by any law abiding gang, she can also be accompanied by her loyal Hardcase Cyber-Mastiff, KB-88. Equipped with an impressive amount of wargear, she can deal with any threat that she comes across. The model comes with a choice of heads – one with her respirator deployed and one without.

    This highly detailed resin kit is supplied in 18 parts and makes one Scrutinator-Primus Servalen and one Cyber-Mastiff, KB-88. It comes supplied with a round 32mm Necromunda base and a round 25mm round Necromunda base.

    Rules for using Servalen and KB-88 in games of Necromunda are supplied with the model.
- name: Rattus Tatterskin, House Cawdor Hive Scum
  productCode: prod4420186-99850599047
  sku: 99850599047
  productType: single_kit
  priceGbp: 24
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Rattus-Tatterskin-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599047_NECRattusTatterskinLead.jpg
  status: current
  description: |-
    Within the Redemption, the worship of false idols is a grievous heresy, and the word-keepers are swift to punish those who see the divine in sanctioned places. This of course does not stop members of Clan Cawdor from making effigies to the God-Emperor from hive detritus or building shrines beneath particularly auspicious looking gunk-stains. Then there are men like Rattus Tatterskin who hear the Emperor's voice in the incessant squeaking of his rats.

    Tatterskin claims to have spoken with the spirit of the Emperor, who he says inhabits the body of a gigantic rat deep in the depths of the underhive. The 'Emperor' sent some of His servants to Tatterskin, so that Cawdor scum might understand His divine will. As it turns out, the divine will of the Rat-Emperor is that the hive be purged of the enemies of the Redemption, something Tatterskin has taken to with great vigour.

    Rattus Tatterskin is a Hired Gun for Necromunda and can be used exclusively by House Cawdor gangs. He and his heavy stubber can boost a Cawdor gang's firepower – and as his rats whisper the words of the Rat-Emperor to him \(yes, really!\), he can go insane and become even more dangerous.

    This 7-piece resin kit builds one Rattus Tatterskin with a heavy stubber and flak armour. This model is also supplied with a 25mm Necromunda round base.

    Rules for Rattus Tatterskin are included in the pack.
- name: Bigby Crumb, Ratling Slopper
  productCode: prod4390187-99850599040
  sku: 99850599040
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Bigby-Crumb-Ratling-Slopper-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599040_BigbyCrumbRatlingSlopperLead.jpg
  status: current
  description: |-
    Unlike most sloppers, who pass themselves off as culinary experts just because they know how to siphon a water still, Bigby can actually cook. This has put him in high demand, although the price for hiring Bigby is often joining him on one of his legendary \(and dangerous\) ingredient hunts. The Ratling delves deep into the badzones of the underhive in his search for exotic plants and animals to fill his slop pot. Some say he is merely looking to add new recipes to his repertoire, though others claim he seeks to create the perfect dish, one good enough to win his way into the spire.

    A well-fed gang is a happy gang! Keep your fighters fit and healthy with a Ratling slopper who can also help out in turf wars with his stub gun and trusty ladle. He comes with a seperate slop pot, which stands on top of the grill and contains his latest culinary creation.

    This highly detailed, 9-part resin kit makes one Bigby Crumb and is supplied with a 25mm Necromunda base. His slop pot can be assembled closed, open with the lid held up by a tentacle or without the lid so that you can see the boot he has added to improve the flavour.

    Rules for using sloppers in games of Necromunda can be found in Necromunda: Gangs of the Underhive, while Bigby Crumb's fighter card is available as a PDF download.
- name: Mercator Sanguis Slaver Entourage
  productCode: prod4380152-99860599043
  sku: 99860599043
  productType: single_kit
  priceGbp: 59.5
  url: https://www.warhammer.com/en-GB/shop/Mercator-Sanguis-Slaver-Entourage-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560599043_MercatorSanguisSlaversLead.jpg
  status: current
  description: |-
    On Necromunda, Chain Lords and Shaklemen are the bloated fight masters and slave drivers of the Merchants Guild readily dealing in both human flesh and human misery. The greatest Chain Lords trade in entire domes, settlements or manufactorums of slaves, sealing the fate of thousands with a single sweep of their hand. For most though, they bring their merchandise with them, dragging lines of bent-backed men and women to market.

    Improve your Goliath Gang's chances of success in the underhive by forming an alliance with a Slave Guild. This opens up the option of including a Slaver Entourage in your forces, offering even more close combat hitting power to your gang.

    This highly-detailed resin kit comes in 37 components and builds a Chain Lord, armed with shock whip and chainaxe and equipped with light carapace armour, a bio-booster and a stimm-slug stash, a Shakleman armed with shock stave and harpoon launcher, equipped with flak armour and a cult icon, and 2 Pit Fighters, each armed with chain glaives and equipped with flak armour and a stimm-slug stash. It comes supplied with 4 Necromunda 32mm bases.

    Rules for using Mercator Sanguis Slaver Entourage in games of Necromunda can be found in *Necromunda: House of Chains* and *Necromunda: The Book of Peril*.
- name: Goliath 'Zerker
  productCode: prod4380151-99850599042
  sku: 99850599042
  productType: single_kit
  priceGbp: 30.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Goliath-Zerker-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599042_GoliathZerker01.jpg
  status: current
  description: |-
    A type of Brute exclusive to House Goliath, the 'Zerker is a fighter whose body has become warped and swollen to gigantic proportions by the effects of the combat stimms pumping through their veins. While a Stimmer is fully in control of this process, the 'Zerker is entirely at its mercy, their system unable to control the rapid and chaotic changes to their bones and muscles.

    If you need even more brutality than that provided by a Goliath Bruiser or Stimmer, send in the 'Zerker. What they lack in intelligence, they more than make up for in crude strength – any rival ganger unlucky enough to be caught will soon regret their mistake. Not even an Ambot is safe from these massive, muscular mutants.

    This highly detailed resin kit comes in 13 components and builds one Goliath 'Zerker. It comes supplied with a Necromunda 40mm base and also includes one 'Zerker fighter card.

    Rules for using the Goliath 'Zerker in games of Necromunda can be found in Necromunda: House of Chains.
- name: The Eightfold Harvest Lord
  productCode: prod4370314-99850599041
  sku: 99850599041
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-The-Eightfold-Harvest-Lord-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599041_EightfoldHarvestLord01.jpg
  status: current
  description: |-
    Even on a world as violent as Necromunda, the crimes of the Eightfold Harvest Lord have turned the stomachs of hardened Enforcers and jaded Guilders. Its arrival always precedes the spreading of starvation, madness and cannibalism throughout the underhive. Wrapped in fluttering strips of human skin, it advances on its prey, desperate to spill the blood of the living.

    The Eightfold Harvest Lord is a Bounty Hunter available only to a Corpse Grinder Cult, Chaos Helot or Chaos Corrupted gang. Armed with paired heavy chain cleavers, it can easily slice through any non-believers in the underhive, adding their remains to its impressive trophy rack.

    This 12-part, highly detailed resin kit makes one Eightfold Harvest Lord and is supplied with a 32mm Necromunda base. Rules for using this model in games of Necromunda can be found in *Necromunda: The Book of Ruin*.
- name: Necromunda Zone Mortalis Platforms and Stairs
  productCode: prod4370298-99120599015
  sku: 99120599015
  ean: 5011921131419
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 49.5
  url: https://www.warhammer.com/en-GB/shop/Zone-Mortalis-Platforms-And-Stairs-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599015_NECZMPlatformsStairs01.jpg
  status: current
  description: |-
    The Zone Mortalis is literally "the deadly ground" – short-range gunflights take place as fighters dart between cover and brutal melee is almost impossible to escape from.

    Add to your Zone Mortalis terrain with additional platforms and stairs. This set contains:
    – 2 Stairs
    – 16 Platforms
    – 2 Wide Platforms
    – 12 Railings
    – 4 Ladders
    – 1 Lift

    This highly detailed plastic kit has been designed to be as interchangeable as possible offering maximum opportunity to create different layouts. It's fully compatible with all other Zone Mortalis kits and makes ideal terrain for games of Necromunda, Warhammer 40,000 and even Kill Team.
- name: Necromunda Zone Mortalis Columns and Walls
  productCode: prod4370297-99120599014
  sku: 99120599014
  ean: 5011921131402
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 62
  url: https://www.warhammer.com/en-GB/shop/Zone-Mortalis-Columns-And-Walls-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599014_ZMCW01.jpg
  status: current
  description: |-
    The Zone Mortalis is literally "the deadly ground" – short-range gunflights take place as fighters dart between cover and brutal melee is almost impossible to escape from.

    Add to your Zone Mortalis terrain with additional columns and walls. This multipart plastic set contains:
    – 6 Columns
    – 1 Wide Wall
    – 4 Walls
    – 2 Wide Doors
    – 2 Doors

    This highly detailed plastic kit has been designed to be as interchangeable as possible, offering maximum opportunity to create different layouts. It's fully compatible with all other Zone Mortalis kits and makes ideal terrain for games of Necromunda, Warhammer 40,000 or even Kill Team.
- name: Apollus Kage & Krotos Hark
  productCode: prod4270149-99850599039
  sku: 99850599039
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Apollus-Kage-And-Krotos-Hark-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599039_NECApollusKageKrotosHark01.jpg
  status: current
  description: |-
    Apollus Kage was a member of the Orlock gang the Sump Dogs, but after a failed leadership challenge he decided it was time to go freelance. Krotos Hark, on the other hand, is a former Goliath who was born with that most dangerous of gifts – intelligence.

    Having left behind their former House alliances, these two Hired Guns can be taken on by any gang that needs some support to survive the savagery of the underhive. Apollus Kage has also been specially designed so that his head, arms and backpack are compatible with a large proportion of the Necromunda miniatures range should you wish to use them for conversions.

    These models are made of resin, and supplied with 1x 25mm Necromunda round base, 1x 32mm Necromunda round base. Rules are supplied in the packaging, making using them in your games easy.
- name: Ragnir Gunnstein, Squat Ammo-jack
  productCode: prod4210216-99850599037
  sku: 99850599037
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Ragnir-Gunnstein-Squat-Ammojack-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599037_NECRagnirGunnsteinSquatAmmojack01.jpg
  status: current
  description: |-
    If your gang has been having issues with ammunition, then Ragnir Gunnstein is the Hanger-on for you. This Squat Ammo-jack comes covered in bullets and grenades, and carries a wealth of tools that he uses to fix weapons. In-game, he allows you to re-roll any failed Ammo checks that roll a natural 1 and can be taken whether you are an attacker or defender \(not just on your own territory\). If you need to keep on shooting, then you need to hire Ragnir.

    Ragnir is a 10-part model, cast in highly detailed resin and comes supplied with one 25mm Necromunda base. His Dramatis Personae rules are supplied with him, or he can be used as an ordinary Ammo-jack, the rules for which you can find in Gangs of the Underhive.
- name: The Headsman, House Cawdor Executioner
  productCode: prod4210215-99850599020
  sku: 99850599020
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/The-Headsman-House-Cawdor-Executioner-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599020_TheHeadsmanHouseCawdorExecutioner01.jpg
  status: current
  description: |-
    Each Executioner of House Cawdor is recognisable by the means of justice that they hand out. The Headsman carries a giant two-handed axe with which to enforce the will of the Redemption. These grim killers hide their face behind a mask and their true identities are known only to the Thane of Cawdor himself.

    The Headsman is a Bounty Hunter who can be hired by any Cawdor gang. His axe will bring swift judgement to unbelievers and believers alike, while his candles light the way for true followers.

    This is a complete resin kit and is supplied with a 25mm Necromunda Base. Rules for using this model are included in the packaging.
- name: Kal Jericho and Scabs
  productCode: prod4190366-99120599010
  sku: 99120599010
  ean: 5011921118762
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Kal-Jerico-and-Scabs-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599010_KalJerichoandScabs01.jpg
  status: current
  description: |-
    In the underhive of Necromunda, many Bounty Hunters ply their trade – but none are as successful or infamous as Kal Jericho. Rogue, swashbuckler and illegitimate son of the world's ruler, he is expert at getting himself \(and his long-suffering companion, Scabs\) into danger – and fighting his way out.

    Kal Jericho and Scabs can be hired by any Necromunda gang looking for a leg-up on their foes. Kal is deadly at close range, an expert shot with his two hotshot laspistols, and if any enemies survive his barrage, he's pretty handy with the duelling sabre he carries as well. If you're getting up-close and personal with an opposing gang, he's a great choice to bolster your forces. If any enemies do slip by Kal, Scabs will be watching his back. His stub gun and plasma gun ensure that he's a match for any enemy, making him a fantastic supporting player to any mission involving Kal, and giving the pair of them a place alongside any gang.

    This set contains two plastic miniatures, the heroic Kal Jericho and his faithful sidekick Scabs. They come supplied in 14 components, along with two plastic Necromunda bases – 32mm for Kal, and 25mm for Scabs.

    Rules for Kal Jericho and Scabs can be found in Necromunda: The Book of Peril.
- name: 'Hired Guns: Yar Umbra & the Deserter'
  productCode: prod4180192-99850599034
  sku: 99850599034
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Hired-Guns-Yar-Umbra-and-The-Deserter-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599034_HiredGunsYarUmbraTheDeserter01.jpg
  status: current
  description: |-
    Many Hired Guns ply their bloody trade in the depths of Necromunda's underhive, among them Yar Umbra and the Deserter.

    Yar Umbra came to Hive Primus from another world. Unfortunately for Yar, when his ship left he wasn't on it. He now sells his services to the highest bidder, trying to scrape together the credits to get off Necromunda and return to his old life.

    None know the Deserter's identity, but his tattoos mark him as a veteran of the legendary Necromundan 8th. The crazy old soldier lives downhive in a booby-trapped warren, and there are few individuals as talented when it comes to laying traps or setting ambushes.

    Both Yar Umbra and the Deserter can be hired by any gang in your games of Necromunda. Yar Umbra makes an excellent sniper, his long lasrifle perfect for picking off unwary gangers who find themselves out of cover. The Deserter can be used as a medic, and allows gangs that hire him to earn extra experience, representing the skills and knowledge he earned in service to the Emperor.

    This 15-piece resin kit makes 2 miniatures, one for Yar Umbra and the other the Deserter. Rules for using them in your games are included in the packaging, and can also be found in the Gangs of the Underhive expansion.
- name: Cawdor Bomb Delivery Rats
  productCode: prod4150169-99850599033
  sku: 99850599033
  productType: single_kit
  priceGbp: 16.5
  url: https://www.warhammer.com/en-GB/shop/Cawdor-Bomb-Delivery-Rats-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599033_CawdorBombRats01.jpg
  status: current
  description: |-
    Training the rats that teem beneath the underhive to perform tricks to entertain the downtrodden masses is a common pastime among the helots of House Cawdor, and the art has long been put to good use by Cawdor gang members to deliver grenades with precision.

    Having problems with enemies skulking in cover? Fear not – the solution is at hand in the form of the Cawdor Bomb Delivery Rats!

    The Cawdor Bomb Delivery Rats set contains five miniatures, comprising 11 components cast in high-quality resin and five 25mm round bases. Their rules can be found in Gangs of the Underhive.
- name: Luther Pattern Excavation Automata "Ambot"
  productCode: prod4150163-99120599009
  sku: 99120599009
  ean: 5011921116881
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Ambot-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599009_NECAmbot01.jpg
  status: current
  description: |-
    The Luthor pattern Excavation Automata is a heavy construct built in imitation of the Ambull, a huge, roughly humanoid xenos creature common to hot, arid worlds. These automata are commonly used for slag mining and ash excavation. However, there is always an underhive gang waiting for the opportunity to liberate such a prized commodity and utilise it as a weapon against their rivals!

    Available to any gang as a Brute option, Ambots might not be subtle – but when you can reduce a fully armoured Goliath ganger to paste in moments, you don't need to be!

    This kit contains two highly customisable Ambots with two distinct poses, two different heads, plus an optional melta or grav weapon if you're looking to equip your Ambot for ranged combat. With two Ambots in the set, it’s great for splitting with a friend – after all, having one Ambot in a campaign is deadly enough, but two is a bloodbath.

    This set is supplied in 112 plastic components and contains 2x 40mm Necromunda bases, featuring pre-sculpted industrial detail.
- name: Ortruum 8-8, Psi-hound Bounty Hunter
  productCode: prod4130175-99850599031
  sku: 99850599031
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Ortruum-8-8-Psi-Hound-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599031_Ortruum88Psihound01.jpg
  status: current
  description: |-
    Ortruum 8-8 is the product of one of Lord Helmawr’s Psykanariums; inbred from the fractured genus of dozens of Psyker bloodlines to create a horrifying, yet potent psychic weapon.

    Ortruum 8-8 is one of Necromunda’s only Wyrds; deadly psykers whose strange powers can tip the balance of power in your favour in your campaigns. If you’ve got the creds, you’ll find Ortruum 8-8 invaluable, capable of illuminating enemy fighters and making them easier to shoot at, or blasting them aside with telekinetic waves.

    This resin set is supplied in 7 components, and comes with 1x 32mm Necromunda Base and 1x Clear Flight Stem. Rules for this model can be found in Gangs of the Underhive, available separately.
- name: Baertrum Arturos III, Bounty Hunter
  productCode: prod4130174-99850599030
  sku: 99850599030
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Baertrum-Aruros-III-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599030_BaertrumArurosIlI01.jpg
  status: current
  description: |-
    Not all Bounty Hunters are desperados, loners or venators. Baertrum Arturos the Third is a member of the Adjurators, the Guilds’ own private Order of hunters, concerned with the recovery of their own property and the reprimand of those responsible for taking it.

    Baertrum Arturos the Third is an elite Bounty Hunter. Swift and deadly, he’s great for hunting down particularly dangerous enemies with his artisan needle pistol with auto loader.

    This resin kit is supplied in 5 components and includes 1x 25mm Necromunda Base. Rules for this model can be found in Gangs of the Underhive, sold separately, while a sample profile is provided with the set.
- name: Thaetos 23-2, Wyrdlock Bounty Hunter
  productCode: prod4130173-99850599029
  sku: 99850599029
  productType: single_kit
  priceGbp: 22
  url: https://www.warhammer.com/en-GB/shop/Thaetos-23-2-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599029_Thaetos232Wyrdlock01.jpg
  status: current
  description: |-
    Thaetos, Imperial designation 23-2, was a Mutie wyrdling recovered from the depths of Bighole. Captured by Guild slavers and transformed into a living weapon, Thaetos went rogue, retreating into the underhive and offering his services for hire…

    Thaetos is a Wyrdlock Bounty Hunter – if you’ve got the creds, you’ll be able to add him to your gang in your campaigns. Armed with a number of terrifying psychic powers, he’s a deadly force on the battlefields of the underhive. Best of all, you’re able to hire him alongside other Bounty Hunters, allowing you to pack even more deadly killers into your chosen mission.

    This resin kit is supplied in one component, and contains 1x 25mm Necromunda Base. Rules for this model can be downloaded for free, and are included in the packaging.
- name: Delaque Gang
  productCode: prod4070247-99120599008
  sku: 99120599008
  ean: 5011921115280
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Delaque-Gang-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599008_DelaqueGang01.jpg
  status: current
  description: |-
    Conquer the underhive with stealth, subterfuge and sabotage with the new plastic Delaque gang! While other Clan Houses proudly proclaim their strengths, proclaiming their dominance to all who will listen, Delaque silently waits and watches, leaving others to wonder what dark thoughts the House of Secrets harbours.

    Lovingly designed to update the classic Necromunda gang, this kit allows you to build a deadly squad of Delaque gangers. Inside, you'll find a huge range of customisation options, allowing you to equip each ganger with deadly and unusual weapons, including exotic options like the longrifle and flechette pistol. A host of heads and accessories, meanwhile, allow you to personalise each ganger and ensure no two look alike. In short – if you've got your rules and you're raring to kick off your Delaque gang or you're bolstering an existing force, this is the place to start.

    This box contains 10 multipart plastic Delaque gangers and 10x 25mm Necromunda bases. Rules for your Delaque gang can be found in Necromunda Gangs of the Underhive and the December 2018 issue of White Dwarf.
- name: Goliath Sumpkroc
  productCode: prod4030172-99850599019
  sku: 99850599019
  productType: single_kit
  priceGbp: 23
  url: https://www.warhammer.com/en-GB/shop/Goliath-Sumpkroc-2108
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599019_GoliathSumpkroc01.jpg
  status: current
  description: |-
    Hive legend has it that many thousands of years ago, during a different age of Necromunda, a now long-extinct type of reptile became the fashion accessory of choice for uphive nobility. Today, the Sumpkrocs that House Goliath keep are somewhat different to the original creature, with centuries of genetic cloning causing a few changes and they no longer wholly resemble the creature first imported…

    Add an Exotic beast to your Goliath gangs in games of Necromunda – a strange and wonderful beast loyal to its owner, with its own unique stats and skills – with this multipart resin kit. Goliath Sumpkroc is a bountifully fanged Sumpkroc, a hardy beast of muscle and tooth. He comes as 6 components, and is supplied with a 40mm Necromunda base.
- name: Kria the Huntress, House Escher Bounty Hunter
  productCode: prod3980120-99850599015
  sku: 99850599015
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Kria-The-Huntress-House-Escher-Bounty-Hunter-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599015_KriatheHuntress01.jpg
  status: current
  description: |-
    Kria Kytoro died with a sneer on her lips and her blade buried in her rival’s throat. Single-minded in her pursuit of her enemies, Kria earned the moniker of ‘Huntress’ because none prey-marked by her crew, the Bittersweet Blades, ever escaped for long. When Kria tangled with Gorgon, boss of the Irontree Lords, she met her match in ferocity and cunning, the Goliath leader emptying his shotgun into Kria’s chest even as her knife opened up his throat. Kria’s story might have ended there, had the alchymyst fleshteks of House Escher not already had their eye on her. Hauling her body from the Sump, the fleshteks began the process to turn Kria into a death-maiden, a resurrected warrior of House Escher. Kria proved an excellent subject, and within the cycle, she was hauling herself from an amniotic tank, her veins pulsing with chems.

    This multipart resin kit contains the components necessary to assemble Kria the Huntress, a Bounty Hunter available to House Escher gangs in games of Necromunda: Underhive. A shining example of the ostentatious flair characterising this gang, Kria wears tight flak armour, with metal shoulder pads, breastplate and knee pads offering protection from the travails of the underhive. Her headdress is certainly eye-catching – featuring enormous curved horns, an animal skull \(with extra studs\) and a huge array of massive feathers, it makes Kria look even taller than her already-impressive stature. From the back, 3 thick plaits hang down to waist level; these are secured by thick webbing tied at the ends. Kria carries a pistol in her right hand, with a large rifle in her left, slung over her shoulder.

    Kria the Huntress comes as 7 resin components, and includes a 25mm Necromunda base. Rules for fielding Kria are included.
- name: Cawdor Gang
  productCode: prod3930181-99120599007
  sku: 99120599007
  ean: 5011921111510
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Cawdor-Gang-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599007_CawdorGang01.jpg
  status: current
  description: |-
    The men and women of House Cawdor are the bonepickers, scrap herders and midden-thieves of Necromunda, their vast empire built on the discarded scraps of other clans and bound together by an unshakeable faith – devotion to the Cult of the Redemption guides the actions of all members of House Cawdor, as they unearth and make use of ‘blessed’ relics from amongst the detritus of the underhive.

    Assemble a Cawdor gang to use in games of Necromunda: Underhive with this set of 10 plastic miniatures. They’ve been designed to provide you with a huge amount of variety and options in assembly, meaning every gang can be unique. Included:

    - 10 bodies – 2 each of 5 unique designs –covered in the recovered detritus they deem worthy of the Emperor, with candles, ritual bindings and nooses \(!\) featuring heavily. These have been designed with specific weapon options in mind, though of course you are free to model them as you see fit;
    - 12 heads – 2 each of 6 unique designs – with a similar selection of recycled equipment;
    - Weapons! There are quite a lot of these: 2 incendiary charges, 2 flails, 4 skin knives, 2 serrated blades, 4 autopistols, 4 stubbers, 4 autoguns, 2 cult icons, 2 polearms \(with attached autogun\), 2 heavy crossbows, 2 hand flamers and 2 more polearms \(these each feature a blunderbuss lashed to the end\).

    Supplied with 10 25mm Round bases, which feature sculpted textures that match the game board’s aesthetic.
- name: Belladonna, Bounty Hunter
  productCode: prod3810266-99850599012
  sku: 99850599012
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Belladonna-Bounty-Hunter-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599012_BelladonnaBountyHunter01.jpg
  status: current
  description: |-
    As the ancient saying goes ‘don’t mess with a woman wronged’, and Belladonna has been oh so wronged! The noble bounty huntress is one of the seven daughters of Orlena Escher – matriarch of the Seven Spire Killer Cult – and once one of the most feared assassins in the Palatine Custer. She stalks the underhive as a Bounty Hunter for hire, seeking her husband’s killers and the identity of the mysterious faction that sundered the alliance of Escher and Ran Lo before the ink was even dry on the marriage contract.

    This multi-part resin kit contains the components necessary to assemble Belladonna, a Bounty Hunter for use by any gang in games of Necromunda: Underhive. Every bit the tragic, wronged bridal figure, she features a towering hairpiece, secured by a bow – this is where the romance ends, as even this bow has a skull for a clasp… Her left arm and leg are each replaced with bionics; spikes, claws and hydraulics are in place of weak human things like hands and feet. She’s not exactly heavily armoured, but the parts that are covered are covered in harsh metal studs and leather, and she confidently wields a large power axe in her right hand.

    This resin kit comes as 4 components, and is supplied with a 25mm Necromunda base. Rules for fielding Belladonna as part of any gang in games of Necromunda: Underhive are included.
- name: Eyros Slagmyst, Bounty Hunter
  productCode: prod3810265-99850599011
  sku: 99850599011
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Eyros-Slagmyst-Bounty-Hunter-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599011_EyrosSlagmyst01.jpg
  status: current
  description: |-
    Eyros was once an underhive dome-rigger from Cogtown, one of the sweating, emaciated souls responsible for repairing the rusting pipe networks that fed the dismal settlement. Deep down in the sump wells, close to hive bottom, he found and donned a strange archaeo-rig which, though it gave him strength and life, it also gave him a burning thirst. As it turned out, while water can be found in many things, few things in Necromunda have quite as much as humans. Eyros leaves only dust and scrap in his wake, searching endlessly for fresh victims from which to strip every morsel of fluid. These days it is hard to tell how much of Eyros is left under the archaeo-cybernetics, and no telling what Eyros will become once the archaeotech is done with him.

    This multi-part resin kit contains the components necessary to assemble Eyros Slagmyst, a Bounty Hunter for use by any gang in games of Necromunda: Underhive. Barely visible under the vast array of archaeotech that irreversibly changed his life, Eyros cuts a mysterious figure, clad in a flowing robe. His wide-brimmed hat is in fact just the top panel for a series of cables, syringes and bone-flutes which have replaced almost his whole body – beneath the hat, lenses and a respirator peer out in place of eyes and a mouth. He is carrying a number of vessels, in which his precious supplies of water, stolen from the living bodies of others, slosh about. His hands – apparently the only part of him still fleshy – poke out from under the robe, clutching his gun.

    This model comes as 4 components, and is supplied with a 25mm Necromunda base.
- name: Slate Merdena & Macula, Orlock Hired Gun
  productCode: prod3810264-99850599010
  sku: 99850599010
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Orlock-Gang-Leader-Cyber-Mastiff-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599010_SlateMerdena01.jpg
  status: current
  description: |-
    The Sump Dogs are one of the hardest gangs to ever ride the ash roads of the Spider Points, and their success can be attributed to one man: Slate Merdena. Slate controls a dozen Hive Primus Ash Gates in the name of House Orlock, and has earned a reputation for being nigh unkillable – having survived bullets to the chest, blades between the shoulders and even being thrown under the wheels of his own rig. Often the mere sight of Slate and his faithful Cyber Mastiff Macula, are enough to send enemies running, lest the end their days as a mile-marker on the Spider Points, like so many before them.

    This multi-part resin kit contains the components necessary to assemble Slate Merdena – an Orlock Road Boss – and Macula, his faithful Cyber Mastiff and Exotic Beast. Slate Merdena is a shining example of Orlock leadership – decked out in standard duster jacket, heavy boots and slit-eye goggles, he’s carrying a wide array of tools, grenades and chains on his waist, with a plasma pistol by his side in his left hand and a large hammer slung over his right shoulder. Macula is a different proposition entirely; though recognisable as a dog, he has undergone countless augmentations. His front left leg has been replaced with a powerful cybernetic limb, around which the flesh is giving way to metal, and his metal spine is visible at the base of his neck. Other than this \(well, and the sensor array in place of his eye\), he’s a fairly standard pooch, albeit one with frankly irresponsible levels of muscle…

    This kit comes as 8 components and is supplied with a 25mm and a 32mm Necromunda base. Rules for using Slate Merdena as a House Orlock-specific Hired Gun are available in Gang War 2, and rules for using him as an Orlock Leader with his Cyber Mastiff are available as a PDF download.
- name: Grendl Grendlsen, Squat Bounty Hunter
  productCode: prod3810261-99850599007
  sku: 99850599007
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Grendl-Grendlsen-Squat-Bounty-Hunter-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599007_GrendlGrendlsen01.jpg
  status: current
  description: |-
    Despite the dire circumstances of his coming to Hive Primus, Grendl Grendlsen quickly established a new life, finding gainful employment as a bodyguard to various underhive figures. At length, he earned the right to practice as a sanctioned Bounty Hunter, and now serves any master who will pay his fee. Grendl is famed for protecting his charges from their rivals and subsequently claiming the bounty on the would-be assassins’ heads, and so far there has been no shortage of foolhardy rivals eager to test his skills, and his infamous hammer.

    This multi-part resin kit contains the components necessary to assemble Grendl Grendlsen, a Squat Bounty Hunter. Reasonably diminutive and stocky in stature – he’s a Squat, after all – he’s impressively well organised and kitted out, far beyond some of his rival bounty hunters. From head to toe he carries loads of equipment: pouches and bags are attached to his belt \(along with a few grenades…\), his boots and coat are padded and well-armoured and he even features some nice tactical eye protection. He also carries a large backpack featuring sensors, and in his hand are the essential tools of his trade – a bolter in the right, and his legendary power hammer in the left.

    This kit comes as 4 components, and is supplied with a 25mm Necromunda base. Rules for using Grendl Grendlssen as part of any gang in games of Necromunda: Underhive are included.
- name: Orlock Gang
  productCode: prod3730248-99120599005
  sku: 99120599005
  ean: 5011921101344
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Orlock-Gang-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599005_OrlockGang01.jpg
  status: current
  description: |-
    House Orlock is known as the House of Iron, due to its roots in the ferrous slag pits located across the blasted surface of Necromunda. Orlock controls not only the mines, but the most vital transmotive lines between them, and are famed for their tough and fearless fighters who defend them from ash waste nomads and rival House agents alike.

    Assemble an Orlock gang to use in games of Necromunda: Underhive with this set of 10 plastic miniatures. They’ve been designed to provide you with a huge amount of variety and options in assembly, meaning every gang can be unique. Included:

    - 10 bodies – 2 each of 5 unique designs – each wearing furnace plate armour. These have been designed with specific weapon options in mind, though of course you are free to model them as you see fit;
    - 20 heads – 2 each of 10 unique designs – featuring a variety of photo-goggles, chunky respirator masks and bandanas;
    - 10 sets of shoulder pads, in 5 unique designs;
    - Weapons! There are quite a lot of these: 2 harpoon launchers, 6 fighting knives, 2 heavy stubbers, 6 drum fed autopistols, 6 combat shotguns, 8 stub guns, 2 sawn-off shotguns, 2 servoclaws and 4 autoguns, along with 10 additional sets of frag and krak grenades, and a set of blasting charges.

    Supplied with 10 25mm Round bases, which feature sculpted textures that match the game board’s aesthetic.
- name: Necromunda Hired Guns
  productCode: prod3710155-99860599003
  sku: 99860599003
  productType: single_kit
  priceGbp: 30.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Hired-Guns-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560599003_NecromundaHiredGuns01.jpg
  status: current
  description: |-
    Bounty Hunters are amongst the toughest and most dangerous of all Necromunda underhivers. They will hire their services to a gang leader, though, if there are no decent bounties to be had or if their interests are aligned, but such allegiances tend to be temporary.

    Hive Scum, or Scummers, are masterless or itinerant hivers who will fight for anyone who offers them coin. Scum are too wild and independent to submit to the leadership of anyone for very long, and they hire out their services as they feel like it. Despite their carefree lifestyle and happy-go-lucky attitude, Scummers are good fighters, so their services are always in demand.

    This multi-part resin kit contains the components necessary to build 2 Hive Scum and a Bounty Hunter, for use in games of Necromunda: Underhive.

    Yolanda Skorn, the Bounty Hunter, carries a stilettos knife and holstered stub gun, which she is modelled reaching for with her cybernetic hand. Her face is mostly covered with a ragged veil, which hides the exile scars she received from House Escher. Her miniature is covered in the details you’d expect from a Bounty Hunter, with spikes and leather making up the bulk of her armour, and radio equipment attached to the goggles pushed up over her head.

    Grub Targeson and Mad Dog Mono, the 2 Hive Scum, are much larger and more grizzled prospects – Grub, with his wide, hunched shoulders and impressive beard, clutches a combat shotgun and combat knife, while Mad Dog holds a stub gun and glaive. Grub is covered in chunky armour plating, while Mad Dog favours a more minimal approach, with a standout feature being his selection of equipment pouches on his toolbelt.

    These models come as 8 components, and are supplied with 3 sculpted Necromunda 25mm Round bases. Rules for using these characters are included.
- name: Gor Half-horn, Beastman Bounty Hunter
  productCode: prod3680204-99850599002
  sku: 99850599002
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Gor-Half-horn-Beastman-Bounty-Hunter-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550599002_GorHalfHornBountyHunter01.jpg
  status: current
  description: |-
    Gor is a Beastman – a mutant of the strain Homo Sapiens Variatus – and as such is possessed of horribly animalistic features and an unpredictable and violent temperament. These characteristics serve to make Gor a figure of dread in the underhive, but equally, they make him a target for every raving zealot he encounters. As a sanctioned Bounty Hunter, Gor is entitled, in theory at least, to go wherever he will in pursuit of his targets; in reality, he has often found himself the quarry, though so far none have bested him.

    This is a multi-part resin kit which makes Gor Half-horn. He’s an appropriately grotesque miniature, as you’d expect from someone horribly mutated in the underhives – his animalistic facial features are distorted further by the cybernetic augmentations \(and the grim, cigar-chomping expression of a beastman who’s ready to kill.\) He’s absolutely covered in the tools of his trade – extra grenades and pouches are attached to the his upper body armour, and his furred, digitigrade legs feature a stiletto knife. He carries two holstered guns – a stubgun and a shotgun – which accompany the plasma pistol clutched in his left hand nicely. His right hand? That’s given over to a huge chainsword.

    Gor Half-horn can be added to any Necromunda gang, in games of Underhive and Gang War: a Fighter Card is included. The kit comprises 7 resin components, and is supplied with a 32mm round Necromunda base, featuring sculpted detail that matches the game board tiles.
- name: Goliath Gang
  productCode: prod3670126-99120599003
  sku: 99120599003
  ean: 5011921095711
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Goliath-Gang-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/60010599001_NecromundaUnderhive04.jpg
  status: current
  description: |-
    The gangers that fight in the name of House Goliath are hulking brutes, each a pillar of muscle and pent-up violence ready to be unleashed. Far larger and stronger than an ordinary human, they flaunt their strength wherever they go and it is difficult to ignore the air of brutality which Goliaths wear like a mantle.

    Assemble your own Goliath gang – or add to the miniatures found in the Necromunda: Underhive box – with this set of 10 plastic miniatures. They’ve been designed to provide you with a huge amount of variety and options in assembly, meaning every gang will be unique. Included:

    - 10 bodies – 2 each of 5 unique designs – each wearing furnace plate armour. These have been designed with specific weapon options in mind, though of course you are free to model them as you see fit;
    - 20 heads – 2 each of 10 unique designs – 4 featuring respirator masks. There are 10 mohawks, which can fit onto whichever head you choose;
    - 10 chest plates, in 5 unique designs, with shoulder pads and leg plates for each miniature;
    - Weapons! There are quite a lot of these: 2 brute cleavers, 2 pud-jackers, 4 stub cannon, 2 combat shotguns, 2 ‘Renderizer’ serrated axes, 2 automatic grenade launchers, 2 power hammers, 2 plasma combi-stubbers, 2 ‘Krumper’ rivet cannon and 2 stub guns are included, along with additional frag and krak grenades, 2 sheathed knives and 4 sets of stim stashes.

    Supplied with 10 32mm Round bases, which feature sculpted textures that match the game board’s aesthetic.
- name: Escher Gang
  productCode: prod3670123-99120599004
  sku: 99120599004
  ean: 5011921095889
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Necromunda-Escher-Gang-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/60010599001_NecromundaUnderhive02.jpg
  status: current
  description: |-
    House Escher is unique among the great Houses of Necromunda, for its gangs are made up entirely of women. Masters of pharmaceuticals and chemical manipulation, what an Escher may lack in terms of raw physical strength, she more than makes up for in speed, skill and sheer psychotic flair.

    Assemble your own Escher gang – or add to the miniatures found in the Necromunda: Underhive box – with this set of 10 plastic miniatures. They’ve been designed to provide you with a huge amount of variety and options in assembly, meaning every gang will be unique. Included:

    - 10 bodies – 2 each of 5 unique designs – each wearing flak armour. These have been designed with specific weapon options in mind, though of course you are free to model them as you see fit;
    - 18 heads – 2 each of 9 unique designs – 4 featuring respirator masks. There are 14 different hairpieces – 2 each of 7 different designs – which can fit onto whichever head you choose;
    - Weapons! There are quite a lot of these: 6 lasguns, 8 laspistols, 6 stiletto blades, 2 shotguns, 4 power swords, 2 autopistols, 2 shock whips, 2 needler/bolters, 2 plasma pistols, 2 chem-throwers and 2 autoguns, along with additional frag, krak and choke gas grenades, 4 sheathed stiletto blades and 2 sets of chem-synth packs.

    Supplied with 10 25mm Round bases, which feature sculpted textures that match the game board’s aesthetic.
- name: Underhive Hangers-on
  productCode: P-234576-99120599084
  sku: 99120599084
  ean: 5011921249039
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27
  url: https://www.warhammer.com/en-GB/shop/necromunda-underhive-hangers-on-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599084_NecromundaUnderhiveHangerson1.jpg
  status: current
  description: |-
    Hangers-on are an essential part of the Necromundan Underhive, providing their services to local gangs and earning a modest, if dangerous, living. They help with everything from feeding the gangs to alerting them of danger, path-finding, and supplying plentiful ammunition for their hungry weapons.

    This multipart plastic kit builds a set of five Hangers-on and an accompanying medi skull, skilled reinforcements for any gang in games of Necromunda. This motley crew will give your fighters the edge both during and between battles.

    **This kit builds:**
    – 1x Ammo-jack
    – 1x Slopper
    – 1x Hive Watcher
    – 1x Dome Runner
    – 1x Rogue Doc
    – 1x Medi skull

    The Ammo-jack is festooned with additional bullets, ensuring your fighters will never be short when the need arises. They are also armed with a brutal power hammer – ideal for tipping the balance in a close skirmish. The Slopper provides a steady supply of "fresh" food to help keep your gang active – just don't ask what's in his bowl! A Hive Watcher knows where all the secret tunnels, chambers, and lifts in the underhive are, helping to protect your gang from ambushes. The Dome Runner, armed with a long las, knows the best places to shoot from, as well as where the best loot can be found. The Rogue Doc can patch up injured fighters, and with the help of their medi skull, will have the wounded back in action in no time. The Rogue Doc has a choice of two masked heads, offering a degree of customisation.

    This kit comprises 65 plastic components and 6x Necromunda 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Palanite Enforcer Weapons & Upgrades
  productCode: P-234575-99120599109
  sku: 99120599109
  ean: 5011921275175
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-enforcer-weapons-and-upgrades-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599109_NecromundaEnforcerWeaponsUpgrades1.jpg
  status: current
  description: |-
    Palanite Enforcers are equipped with some of the best weapons available in the underhive, ensuring they have an edge on the lawless thugs they hunt down. From web guns and concussion carbines to subdue without lethal force, to flamers and sniper rifles when force is required, their precinct arsenals are packed with special weapons and equipment.

    This multipart plastic kit includes a selection of weapons and upgrades for your Palanite Enforcer gangs in games of Necromunda. With deadly specialised weaponry and equipment, you'll be ready for everything the underhive and ash wastes have to throw at you. Also included in this kit are alternative heads to personalise your fighters even further.

    **This 88-piece plastic kit includes:**
    – 10x heads
    – 4x shock batons
    – 4x assault shields
    – 4x shield hands
    – 2x magnacles
    – 4x power knives
    – 4x autopistols
    – 2x flamers
    – 2x web guns
    – 2x concussion carbines
    – 2x autoguns
    – 2x sniper rifles
    – 4x necks
    – 20x left arms
    – 20x right arms

    These parts are compatible with the Palanite Enforcer Patrol and Palanite Enforcers Captains & Sergeants kits, both available separately. These components require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Ironhead Squat Charter Masters and Drill Masters
  productCode: P-234574-99120599092
  sku: 99120599092
  ean: 5011921259380
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-ironhead-squat-charter-and-drill-masters-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120599092_NecromundaIronheadSquatCharterDrillMasters1.jpg
  status: current
  description: |-
    Ironhead Squat Charter Masters and Drill Masters are seasoned warriors who have survived and thrived, climbing the ranks until they stand at the top. Unsurprisingly, only the most veteran Squats rise to this level. Often hundreds of years old, these grizzled explorers of the wasteland are armed with the finest weapons their clan can provide. More important than their gear is their grim determination to plunder the mineral riches of Necromunda.

    This multipart plastic kit builds two Exo Masters, two Charter Masters, two Drill Masters, and two Techmite Autoveyors for your Ironhead Squat prospectors gangs in games of Necromunda. No matter your preferred playstyle, you'll find some hard-hitting options to defend your claims and stake some new ones.

    The Exo Masters each have a choice of two heads and can be armed with a heavy melta or a heavy drill and an Ironhead combat shotgun. The Charter Masters can be armed with a bolt spitter and either an Ironhead inferno pistol or a two-handed chainaxe. The Drill Masters each have a choice of three heads and can be armed with an Ironhead grenade launcher or an Ironhead power fist and an axe. The Techmite Autoveyors are both armed with bolt spitters to add to your gang's firepower.

