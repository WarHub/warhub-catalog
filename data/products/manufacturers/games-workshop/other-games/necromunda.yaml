  status: current
  description: |-
    Haunts are the most ‘stable’ of Lord Helmawr’s psykers, chosen for their control over their power, mental fortitude and, most importantly, their loyalty to the Imperial House. The most common Haunts are telepaths, known as psyrenders and telekinetics, and as bonecrushers. Psyrenders peel back the psyche of their targets, pulling out their secrets and dismantling their sanity. Bonecrushers are less subtle, crumpling the barricades protecting outlaw strongholds with telekinetic force or, as their name implies, shattering the bodies of their foes.

    This multipart resin kit builds one Psyrender and one Bonecrusher, sanctioned psykers for your Palanite Enforcer gangs in games of Necromunda. Wearing hardened flak armour, they stand out amongst the rest of your fighters, and their formidable psychic powers will give you the edge in battle. The Psyrender manipulates the minds of enemy fighters to dismantle their sanity. The Bonecrusher is far less subtle, shattering bones with the power of their mind.

    This kit comprises 25 resin components, 1x Necromunda 25mm Round Base, and 1x Necromunda 32mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Palanite Companions
  productCode: P-226407-99850599121
  sku: 99850599121
  productType: single_kit
  priceGbp: 27.5
  url: https://www.warhammer.com/en-GB/shop/necromunda-palatine-companions-2025
