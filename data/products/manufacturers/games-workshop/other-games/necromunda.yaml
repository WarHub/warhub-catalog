  status: current
  description: |-
    Palanite Companions are the elite Enforcers of the spire. Hand-picked from the most loyal subjects of Lord Helmawr’s Palanite battalions, they are utterly devoted to their noble masters. Each one undergoes extensive psycho-conditioning until their single-minded purpose is to protect those of Helmawr blood − or those deemed important by the House nobility. Companions are so named because they seldom leave the side of their masters − Lord Helmawr’s personal retinue is never more than a handful of strides from his side, ready to protect him from all dangers.

    This multipart resin kit builds two Palanite Companions for your Law Abiding gangs in games of Necromunda. Highly trained and well-equipped, they are the cream of the crop when it comes to personal protection. As well as ensuring the safety of a chosen friendly fighter, they are capable of erasing enemies from existence with their fearsome disintegration guns.

    This kit comprises 13 resin components and 2x Necromunda 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
