    The kit comprises 46 plastic components, 2x Citadel 60mm by 35mm Oval Bases, 1x Citadel 25mm Round Base, and 3x 45mm Groove Flying Stems. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
