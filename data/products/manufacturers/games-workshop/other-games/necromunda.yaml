    Hagthor Jarlun and Aster Felsturn are an unusual Abyssal Ferryman team with a bond that defies conventional logic. Aster is always making modifications to their rig – the Harpy – while Hagthor makes sure the old girl stays running. Aster is also willing to take on more risky contracts and travel to the more perilous regions of the Abyss, while Hagthor’s level-headedness makes sure they never stick their necks out too far. It is an alliance that has earned them a reputation in Port Styx as the guides you want on your side when things go awry, as they so often do down in the darkness of the pit.

    This multipart resin kit builds Hagthor Jarlun and Aster Felsturn, an Abyssal Ferryman team or Hive Scum for your gangs in games of Necromunda. Clad in makeshift armour and carrying tools that double as weapons \(or are they weapons that double as tools?\), they are ready to fix their rig and scrap it out in equal measure. This odd duo brings a range of unique skills and weaponry to your gang fights, giving you the upper hand over your opponents.

