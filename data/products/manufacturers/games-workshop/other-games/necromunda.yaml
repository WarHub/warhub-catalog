    Ash Waste Chieftains are terrifying warriors clad in layers of tattered rags, adorned with talismans, fetishes, bones, and anything they can find to give them a fearsome appearance when they lead Nomad raiding parties in the desert. Many legends surround these mysterious figures, claiming supernatural gifts that only heighten their reputation as forces of nature.

    This multipart resin kit builds a Chieftain with Venom Caster for your Ash Wastes Nomads. Their unusual weapon is excellent for denying the enemy access to an area of the board, or blasting tightly-packed gangers in a corrosive spurt. Though they look motley, your rivals will think twice before challenging this Chieftain.

    This kit contains 13 resin components, and 1x Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Champion with Mining Laser
  productCode: P-169755-99850599109
  sku: 99850599109
