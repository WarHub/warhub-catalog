  description: |-
    Palanite Justicars hunt down renegade nobles, rogue heirs, and aberrations in noble bloodlines. Upon arriving in a region, they will set up tribunals in the centre of the settlement, closing all nearby roads. Then, from their seat at the head of the tribunal, the Magistrate will pass judgement on local criminals, invariably condemning them to death. Once judgement is passed, the Executioner carries out the sentence immediately in front of the assembled local population, whose attendance is compulsory. If any in the crowd are foolish enough to object, the Bailiffs step forward to restrain them with the Tools of Judgement so they too can face justice.

    This multipart plastic kit builds a five-strong Palanite Justicar delegation, allies for your law-abiding gangs in games of Necromunda. Their selection of esoteric weaponry will give you the edge in any gang battles. The Magistrate is armed with a bolt pistol and a gavel – a symbol of office and a dangerous weapon in its own right, while the Executioner wields a brutal axe. Both of these miniatures have a choice of two different faces. One Bailiff can be armed with either a shotgun or a shock pistol and a heavy club. Another can be armed with either a fulmen pattern man-catcher or a shotgun. The final Bailiff can be assembled standing or kneeling, and can be armed with either a fulmen pattern man-catcher or a shock pistol and a heavy club.

    This kit comprises 70 plastic components, 2x Necromunda 32mm Round Bases, and 3x Necromunda 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
