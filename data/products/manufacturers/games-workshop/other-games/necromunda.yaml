- name: Asun'ghar, The Lady of Ash
  productCode: P-163921-99860599105
  sku: 99860599105
  productType: single_kit
  priceGbp: 43.5
  url: https://www.warhammer.com/en-GB/shop/asunghar-the-lady-of-ash-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99860599105_NECAshWastesNomadsAsungherTheLadyOfAsh01.jpg
  status: current
  description: |-
    Asun'ghar is a mysterious and enigmatic figure of Necromundan legend, a powerful spirit speaker known to many as the Lady of Ash. To her people, she is a Great Spirit, an embodiment of the wasteland's scavenger creatures. To the enemies of the Ash Waste Nomads, she is a storm-birthed devil who leaves nought but bones in her wake. Whatever her true nature, Asun'ghar triggers palpable, animalistic terror in those who stand before her, and displays an uncanny bond with the dangerous beasts of the wasteland, even directing them toward the enemies of the Tsun'ghar.

    This multipart resin kit builds Asun'ghar, the Lady of Ash, accompanied by Terror's Shadow – her fearsome macro-grapplehawk. Asun'ghar wields a long spirit stave, equal parts electro-shock weapon and ritual tool, but also keeps a stalking knife at her belt and a blast pistol dangling from her backpack. Her nomad robes are laden with signs of her role as a spirit speaker, from her skull-like rebreather mask and taloned glove to the bone fetishes at her waist. Terror's Shadow is a brutal avian creature of sinew and bionics, capable of tearing through armour and flesh in seconds.

    This highly detailed kit comprises 19 resin components, and comes with a Citadel 32mm Round Base and a Citadel 28.5mm Round Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This pack includes Fighter reference cards for Asun'ghar and Terror's Shadow, as well as the special rules for both characters. Their full rules can also be found in *The Aranthian Succession: Ruins of Jardlan* supplement.
- name: Ironhead Squat Prospectors Skalvian Explorator
  productCode: P-163920-99860599098
  sku: 99860599098
  productType: vehicle
  priceGbp: 135.5
  url: https://www.warhammer.com/en-GB/shop/squat-prospectors-skalvian-explorer-2023
