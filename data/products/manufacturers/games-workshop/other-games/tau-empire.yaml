  url: https://www.warhammer.com/en-GB/shop/XV8-Crisis-Battlesuits
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120113072_TAUCrisisBattlesuitLead.jpg
  status: current
  description: |-
    An iconic rendering of T'au technological progress and ingenuity, the XV8 Crisis Battlesuit is a thing of joy to behold in battle - unless you're its target. Skimming along on the jets of their repulsor engines, Crisis Battlesuits close on their enemy with a surprising speed, unloading their diverse weaponry and leaping away in a split second. Only the best T'au warriors are allowed to pilot these machines, spending years on the front line before even being considered for this honour. Able to be dropped from a planet's upper atmosphere, slamming into ranks of enemies like a tidal wave, the XV8 Crisis Battlesuit is the ultimate balance of firepower, speed and resilience.

    This multi-part plastic kit contains everything needed to build three XV8 Crisis Battlesuits, with six accompanying drones. There's an impressive level of customisation available, with ball fittings allowing unprecedented posability. One miniature can be optionally assembled as a Shas'vre, with a special head and chest plate, and there's a prodigious amount of advanced T'au weaponry in the box: four plasma rifles, three flamers, four fusion blasters, four burst cannons, three missile pods and three shield generators. The accompanying drones have options for gun, shield or marker variants, and you can build a total of six drones, with up to three of any one type. The kit also includes an assortment of battlesuit electronics systems. One model in the kit can even be built as the new, experimental Iridium-class XV8-02 Crisis Battlesuit - distinguishable by its thicker armour and aggressive appearance. Huge variety!

    152 components are included in total, with three Citadel 50mm Round bases and three Citadel small Flying bases.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: 'Kill Team: Farstalker Kinband'
  productCode: P-198765-99120114003
  sku: 99120114003
  ean: 5011921228959
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/kill-team-farstalker-kinband-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120114003_KTFarstalkerKinband2.jpg
  status: current
  description: |-
    Farstalker Kinbands are opportunistic mercenaries, often operating years from the Kroot home world. They are experienced raiders, scouts, and infiltrators, setting masterful ambushes from which to unleash the deadly weapons they have amassed over long careers as ruthless bounty hunters.

    This multipart plastic kit builds 10 veteran Kroot mercenaries, accompanied by two savage Kroot Hounds. These miniatures can be used as Farstalker Kinband operatives in games of Kill Team, or fielded with T'au Empire armies in games of Warhammer 40,000. The kit includes options and accessories to customise your kill team, plus components to build specialists such as the bionic Cold-blood, cunning Stalker, and bird-taming Tracker.

    Inside the box, you will also find a sheet of 39 double-sided Farstalker Kinband tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This kit contains 142 plastic components, and comes with 10x Citadel 28.5mm Round Bases, 1x Citadel 28mm Round Base, and 1x Citadel 32mm Round Base.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: 'Kill Team: XV26 Stealth Battlesuits'
  productCode: P-236764-99120113102
  sku: 99120113102
  ean: 5011921253579
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/kill-team-xv26-stealth-battlesuits-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120113102_KTXV26StealthBattlesuits01.jpg
  status: current
  description: |-
    XV26 Stealth Battlesuits are well adapted to operating independently of the primary T'au Empire forces. Using specialised equipment, they infiltrate behind enemy lines to sabotage, harass, and disrupt the enemy, completing vital objectives for the Greater Good.

    This multipart plastic kit builds eight XV26 Stealth Battlesuits operatives. These miniatures can be used as chameleonic XV26 Stealth Battlesuits warriors in games of Kill Team, or fielded in a T'au Empire army in games of Warhammer 40,000. The kit includes options, accessories, and different heads to customise your kill team, plus components to build specialists like the signal-jamming Neutraliser, camouflaged Infiltrator, maverick Lodestar, and more.

    Inside the box, you will also find a sheet of 38 double-sided XV26 Stealth Battlesuits tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This kit is supplied with 1x T’au Empire Infantry Decals – Vior’la Sept Transfer Sheet, containing 177 high-quality waterslide transfers. These include symbols for Stealth Battlesuits and other T’au Empire units, including Pathfinder Teams, XV95 Ghostkeel Battlesuits, and more.

    This kit comprises 105 plastic components, 3x Citadel 28.5mm Round Bases, 5x Citadel 32mm Round Bases, and 2x Ball Socket Stems. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    You will need a copy of the *Kill Team: Core Book* and the XV26 Stealth Battlesuits Datacards, both available separately, to make full use of the contents of this box.

    Rules for using these miniatures in your games of Warhammer 40,000 can be downloaded for free from the Warhammer Community website.
