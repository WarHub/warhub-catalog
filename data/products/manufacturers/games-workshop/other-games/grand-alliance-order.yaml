  description: |-
    The Questor Soulsworn are gatherings of Stormcast Questors – typically solitary figures who carry the burden of their divine missions alone. There are labours so vital or challenging that even a hero of the Stormcast Eternals may not be able to complete them by themselves.

    This multipart plastic kit builds six Questor Soulsworn, elite infantry for your Stormcast Eternals armies in games of Warhammer Age of Sigmar. These heavy-hitters can take on anything the enemies of the God-King can throw at them – ideal for keeping foes away from crucial objectives.

    **Contents:**
    – 2x Errant-Questors, each armed with grandblade or grandhammer \(can alternatively be built as Questor Knight-Relictors\)
    – 2x Errant-Questors, each armed with grandaxe or grandspear \(can alternatively be built as Questor-Primes\)
    – 2x Errant-Questors, each armed with grandhammer or grandaxe \(can alternatively be built as Errant-Questor Duellists\)

    The Questor-Prime and Errant-Questors each have a choice of two different heads, and some miniatures have a choice of different shoulder pads to further customise your solitary warriors.

    This kit comprises 130 plastic components, and 6x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
