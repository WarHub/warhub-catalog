  description: |-
    Shadowstalkers are the elite assassins and agents of Morathi-Khaine. These silent killers wear the mircath – the shademark – a brand woven from Ulguan sorcery that grants them supernatural powers, allowing them to leap between shadows to outflank their prey before charging forth in a murderous blur of sorcery and flashing knives.

    This multipart plastic kit builds a warband of Khainite Shadowstalkers – aelven assassins that can be fielded in Daughters of Khaine armies in Warhammer Age of Sigmar, or used as a complete warband in games of Warcry. Commanded by an imposing faceless Shroud Queen, these saboteurs are clad in shadowy cloaks, and can be armed with a variety of swords, spears, and crossbows to cut down those who would oppose the will of Morathi.

    **This set contains 9 plastic miniatures:**
    - 1x Shroud Queen
    - 1x Slaughtershade
    - 2x Darkflame Warlocks
    - 5x Shroudblades

    This kit comprises 91 plastic components, and comes supplied with 1x Citadel 40mm Round Base and 8x Citadel 28.5mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using the Khainite Shadowstalkers in games of Warcry can be found in the Warcry: Compendium book and downloaded from the Warhammer Community website.
