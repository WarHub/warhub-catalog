  description: |-
    The Rotmire Creed are artisans of virology, relentless in their pursuit of the perfect plague. A swamp-dwelling cult that worships Nurgle in his aspect as Lord Leech, their blowpipe darts and cruel barbs are daubed with deadly alchemical contagions. Once unleashed, these diseases spread quickly through the ranks of their enemies – a testament to their infectious craft.

    This multipart plastic kit builds 10 Rotmire Creed cultists, alchemists and poisoners for your Maggotkin of Nurgle armies in games of Warhammer Age of Sigmar. These lowly mortals have perfected the art of infecting their targets from a distance, offering you new vectors of contagion. When used wisely, they can disrupt enemy plans and weaken tough units.

    These miniatures can also be used as a warband in games of Warcry using free rules, downloadable from the Warhammer Community website.

    **Contents:**
    – 1x Witherlord
    – 1x Bloated One, armed with raker-claws or a raker-claw and hooked net
    – 2x Carrion Catchers, each armed with a snatcher-hook or impaler
    – 6x Mirefolk Outcasts, each armed with bilewood weapons or a bilewood weapon and shield

    This kit comprises 71 plastic components, 2x Citadel 32mm Round Bases, 6x Citadel 25mm Round Bases, and 2x Citadel 28.5mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
