  description: |-
    Askurgan Trueblades feast upon the blood of beasts and monsters, using the inherent power of these potent fluids to enhance their already devastating combat skills. Few can stand in the face of their efficient strikes, which come so swiftly and precisely that the foe is often reduced to a ruined corpse before they can even draw a breath.

    This multipart plastic kit builds eight Askurgan Trueblades, elite monster-hunting infantry for your Soulblight Gravelords armies in games of Warhammer Age of Sigmar. If you're looking for something to take on larger enemy creatures, they're an ideal choice. The unit includes a champion and a bestial Curseblood. Five of the Trueblades have weapon options, making it easy to customise your unit.

    These miniatures can also be used as a warband in games of Warcry using free rules, downloadable from the Warhammer Community website.

    **Contents:**
    – 1x Askurgan Exemplar
    – 1x Askurgan Pariah
    – 1x Curseblood
    – 2x Askurgan Ascetics, each armed with a howling glaive or charnel mace
    – 3x Askurgan Acolytes, each armed with a bonehilt falchion or throat-taker

    This kit comprises 74 plastic components, 4x Citadel 32mm Round Bases, 1x Citadel 40mm Round Base, and 3x Citadel 28.5mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
