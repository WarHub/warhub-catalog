    Grashnak has cut a swathe of destruction through leagues and tournaments, his unstoppable blitzes and penchant for hyper-violence racking up an impressive tally of kills second only to the great Morg ‘n’ Thorg. Often, just the sight of the towering Minotaur snorting and stamping on the line of scrimmage is enough to send lesser players running for their dugouts, and more than one team has refused to take to the field upon discovering the bestial Star Player opposing them.

    This resin kit builds Grashnak Blackhoof. If your "Favoured of..." team needs a little extra hitting power... oh, who are we kidding – a LOT of hitting power, look no further than this enraged minotaur, blessed with extra horns and plenty of extra muscle, making him even more deadly than usual. You'll want to hire this Star Player to take out the toughest teams in your relentless march to the trophy.

    This kit comprises 12 resin components and is supplied with a Citadel 40mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Kiroth Krakeneye
