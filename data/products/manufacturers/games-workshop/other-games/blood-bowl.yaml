    Kiroth is famed for the tall tales of the exploits of both his crews and his teams, like the time he and his finest players travelled deep beneath the waves to play the Southstorm Squids. Sadly, he was the only survivor, as the rest of his team drowned. As a consolation prize, his hosts gave him a magical sports helmet in the shape of a squid, which chills opponents' blood and comes to supernatural life to interfere with play.

    This resin kit builds Kiroth Krakeneye. This eccentric former Corsair takes the cephalopod schtick seriously, with a magical mask that grants him extra powers. As a skilled runner, he's as slippery as a squid, giving your team even more options for getting the ball down the pitch. If your Elven Kingdoms League team isn't bizarre enough, hire this Star Player and watch your opponents squirm as they figure out how to deal with him.

    This kit comprises 7 resin components and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
