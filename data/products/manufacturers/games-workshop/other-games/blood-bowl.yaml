  status: current
  description: |-
    Vargheists are becoming an increasingly more common sight on the pitches of Sylvania. Some claim they are former Vampire Blitzers that have fallen deeper into their crazed bloodlust and are kept on by their teams out of gratitude for years of service, while others suggest that it’s all a matter of price, and that Vargheists are paid solely in blood.

    On the pitch, these vicious creatures have one thing, and one thing only, on their mind at all times – blood. Should they be deprived of their most desired delicacy for too long then it’s best to give them a wide berth unless you fancy being part of the messiest feeding frenzy outside of a post-match Halfling banquet!

    Vargheists can be powerful additions to Vampire Blood Bowl teams, bringing their superior strength, utter fury, and unnaturally sharp claws to the gridiron. These unforgiving players smash foes aside with furious determination.

    This finely-detailed resin miniature is supplied in 10 components, and comes with a Citadel 40mm Round Base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Ivan 'the Animal' Deathshroud
  productCode: P-156142-99850999045
