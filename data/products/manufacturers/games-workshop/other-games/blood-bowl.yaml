  ean: 5011921205554
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-old-world-alliance-team-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999018_OldWorldAlliance2.jpg
  status: current
  description: |-
    Mixed teams are found throughout the Blood Bowl leagues, uniting players from a variety of races and cultures on the pitch. Old World Alliance teams like the Middenheim Maulers are drawn from great cities across the Empire, Estalia, Kislev, and beyond. These bustling streets are packed with cosmopolitan Humans, Dwarfs, and Halflings, ready to be forged into winning teams that are greater than the sum of their parts.

    Old World Alliance teams boast a flexible roster of Humans, Dwarfs, and Halflings. Each of these groups brings their own innate talents to the pitch – Human flexibility, Dwarfen toughness, and Halfling, er… greasy slipperiness? Cooking skills? If you're looking to cover classic weaknesses, discover new tactical opportunities, and face fresh challenges of co-operation, look no further than the Old World Alliance.

    This multipart plastic kit builds an Old World Alliance team of 15 players for games of Blood Bowl. Using components from the existing Human, Dwarf, and Halfling team sets, you'll be able to build 3 Halfling Hopefuls, 3 Human Linemen, 1 Human Blitzer, 1 Human Thrower, 1 Human Catcher, 3 Dwarf Blockers, 1 Dwarf Runner, 1 Dwarf Blitzer, and 1 Dwarf Troll Slayer. Some of these players include cosmetic options such as different heads to help you customise your own team. The box also includes six balls, two double-sided Blood Bowl coins, and two turn markers – split evenly between Dwarf and Human designs – and a sheet of Old World Alliance transfers with team logos, numbers, and positionals.

    This kit comprises 73 plastic components, and comes with 15x Citadel 32mm Round Bases as well as an Old World Alliance Transfer Sheet. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    The rules to use Old World Alliance teams in your games of Blood Bowl can be found in *Blood Bowl – The Official Rules*.
- name: Dribl & Drull
  productCode: prod5090206-99850999057
  sku: 99850999057
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-dribl-and-drull-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999057_DrullDrible2.jpg
  status: current
  description: |-
    Drull and Dribl were born as the only two Skinks in the spawning pool – a rare event and seen either as a portent of great honour or great doom. Both also have wickedly forked tails, a trait rare to most Skinks. The twins started their careers with the Sotek Vipers, where they developed their signature "Skink Sidewinder'' move – Drull uses his blade to slice through the calves and hamstrings of players, before Dribl stomps them when they hit the ground.

    The two have almost telepathic communication with each other and are inseparable – on and off the pitch – meaning that any Lustrian Superleague team who wants to offer them gold must take the twins as a pair. Since their Blood Bowl debut, these fast and agile Skink Star Players have garnered a reputation on the pitch for their underhanded tactics and dirty plays – Drull often makes use of his ceremonial dagger, while Dribl favours assaulting opponents with a barrage of kicks.

    This kit comprises 13 components with which to make two finely-detailed resin miniatures and comes with 2x Citadel 32mm Round Bases. All the rules you need to use Dribl and Drull are included in the pack.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Withergrasp Doubledrool
  productCode: prod5090205-99850999054
  sku: 99850999054
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-withergrasp-doubledrool-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999054_WithergraspDoubledrool1.jpg
  status: current
  description: |-
    Two heads are usually better than one – unless that is, they lead you to be cast out by your family to die in exile. Thankfully for Blood Bowl fans, Withergrasp Doubledrool survived this unfortunate start in life and – after a professional career that began with the Drakwald Beasts – became a legendary Star Player for whichever Chaos team offers the biggest bag of gold.

    A heavily mutated Beastman with two heads and a mass of writhing tentacles, Withergrasp can utilise these unique ‘gifts’ on the Blood Bowl pitch to strike the opposition and avoid oncoming opponents. Though he sports grotesque boils that seep fluids and wears the symbol of Nurgle, he is happy to play for any 'Favoured of...' teams, including Chaos Chosen, Chaos Renegade, Nurgle Team, Khorne, and Norse Teams.

    This finely-detailed resin miniature comprises seven components and comes with a 32mm Round Base. All the rules you need to use Withergrasp Doubledrool are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Cindy Piewhistle & Puggy Baconbreath
  productCode: prod5080221-99850999055
  sku: 99850999055
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-puggy-baconbreath-and-cindy-piewhistle-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999055_BBPuggyBaconbreathAndCindyPiewhistle01.jpg
  status: current
  description: |-
    If your Blood Bowl season needs a little seasoning, look no further. Cindy Piewhistle (sister of Mindy Piewhistle of Spike! Magazine fame) and Puggy Baconbreath are legendary in the Blood Bowl fandom – mostly with other Halflings, but what can you do? Puggy has the distinction of being one of the very few Halflings who takes his career seriously enough to train, though it’s fair to say he’s also unnaturally lucky. Cindy is a master baker, who has figured out how to turn her signature pies into viable weapons, filled with piping hot ingredients that are every bit as damaging as the explosives used by the likes of Goblins.

    In your games of Blood Bowl, each of these Star Players brings something tasty to the table (and the dugout). Cindy Piewhistle is quite a good shot with either the ball or her deadly pies. Puggy Baconbreath is one of the most intimidating and toughest Halflings around (though that’s a very relative term) – and he’s also quite reliable, with his Halfling Luck. Both of them allow a savvy coach to create new plays and have a shot at maybe even winning a game now and then.

    These finely-detailed resin miniatures are supplied as 7 components, and come with 2x 32mm Round Bases. All the rules you need to use both Cindy Piewhistle and Puggy Baconbreath are included in the pack, and can also be found in *Spike! Presents: 2022 Almanac*!

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Nobbla Blackwart & Scrappa Sorehead
  productCode: prod5030174-99850999052
  sku: 99850999052
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-nobbla-blackwart-and-scrappa-sorehead-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999052_BBNobblaBlackwartaandScrappaSorehead01.jpg
  status: current
  description: |-
    Nobbla Blackwart and Scrappa Sorehead are excellent examples of what a little ingenuity and a complete lack of self preservation can do for a game of Blood Bowl. Nobbla is undoubtedly a sadistic lunatic, using his chainsaw to foul downed opponents in the most blatant manner possible. Scrappa is considered quite clever for a Goblin, using his “fancy” pogo stick to leap high into the air and snatch a tossed ball right out of the air.

    These fiendish Goblin Star Players give a savvy coach plenty of new plays to try out, and can be hired by any Badlands Brawl or Underworld Challenge team. All the rules you need to use Nobbla Blackwart and Scrappa Sorehead are included in the pack.

    These finely-detailed resin miniatures are supplied as nine components, and come with 2x Blood Bowl 32mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Glotl Stop
  productCode: prod5000295-99850999053
  sku: 99850999053
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-glotl-stop-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999053_BBGlotlStopLead.jpg
  status: current
  description: |-
    Glotl Stop is known by many names across the world. The Primordial Nightmare, the Killer Krox, the Scaled Slasher. Whatever you call him, he's a fan favourite among those who prefer a more simplistic – that is to say, gloriously violent – approach to the game of Blood Bowl. Just don't ask what happened to his first team...

    His bloodthirsty instincts honed to a razor-toothed edge, Glotl is even stronger and more ferocious than his Kroxigor kin and, an absolute menace on the pitch. Though occasionally gripped by a savagery that causes him to chomp down on team-mates, it's that same unpredictability that makes him such a danger to the opposition.

    This finely-detailed resin miniature is supplied as 9 components and comes with a Blood Bowl 40mm Round Base. All the rules you need to use Glotl Stop are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Boa Kon'ssstriktr
  productCode: prod5000294-99850999051
  sku: 99850999051
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-boa-konssstriktr-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999051_BBBoaKonssstriktrLead.jpg
  status: current
  description: |-
    A mysterious Snakeman of origins unknown, Boa Kon'ssstriktr slithered from the jungles of Lustria and onto the Blood Bowl pitch. With an eye for tactics honed by watching countless games from the trees, this cunning player has risen to prominence through unorthodox – some would say downright sneaky – manoeuvres that cost his rivals the ball, the game, and their nerve.

    The Scheming Serpent possesses a wealth of skills for tripping up the opposition – both figuratively and literally, thanks to his Prehensile Tail – but when even his Hypnotic Gaze isn't enough to turn the tide, this master manipulator can use his once-per-game special rule, Look Into My Eyes. All your opponent can do is watch, as a mesmerised player cheerfully hands over the ball right into Boa's waiting, friendly grasp.

    This finely-detailed resin miniature is supplied as 8 components and comes with a Blood Bowl 32mm Round Base. All the rules you need to use Boa Kon'ssstriktr are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Estelle La Veneaux
  productCode: prod5000293-99850999046
  sku: 99850999046
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-estelle-la-veneaux-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999046_BBEstellelaVeneauxLead.jpg
  status: current
  description: |-
    Some believe that Estelle la Veneaux is an ancient embodiment of the Amazonian goddess Rigg, sent unto the game of Blood Bowl to destroy those who would threaten the delicate balance of nature. Others say that she's just a half-crazed Amazon hermit who prefers pet frogs to civilised company. Whatever the truth, the Baroness of the Bayou is a terror on the pitch.

    Estelle is possessed of strange powers that she unleashes on the enemies of nature – as well as rival teams, littering fans, and noisy commentators. Her special rule, Baleful Hex, allows her to curse an opposing player into a stupor, robbing them of their Tackle Zone and next activation. Combined with her Disturbing Presence and Guard, this Star Player is a frighteningly disruptive force on the attack or defence.

    This finely-detailed resin miniature is supplied as 5 components and comes with a Blood Bowl 32mm Round Base. All the rules you need to use Estelle la Veneaux are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: 'Amazon Blood Bowl Team: Kara Temple Harpies'
  productCode: prod5000276-99120999016
  sku: 99120999016
  ean: 5011921173099
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-amazon-team-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999016_BBAmazonTeamLead.jpg
  status: current
  description: |-
    Highly skilled and agile, Amazons are among the very best players of Nuffle’s sacred game. These warrior-athletes possess an exceptional blend of agility, tactical prowess, and violence that makes them thrilling to watch on the pitch, with an acrobatic style of play honed by years spent darting through dense rainforest and evading apex predators. With tactics moulded around the deadliest animals of their jungle home, these players unleash vicious hit-and-run moves that dazzle Blood Bowl fans and opponents alike.

    On the pitch, Amazon teams are a force to behold – though relatively lightly armoured, their agility allows them to dance around sluggish teams, while raining down blows on the Old World's complacent weaklings. With a fearsome reputation as both warriors and players, it’s no surprise that these explosively agile teams regularly crush competition at the very top of the sport.

    The multipart plastic kit allows you to assemble the Kara Temple Harpies, an Amazon team for use in games of Blood Bowl. The team is made up of 6 Eagle Warrior Linewomen, 2 Piranha Warrior Blitzers, 2 Python Warrior Throwers, and 2 Jaguar Warrior Blockers. In addition, the box includes 2 double-sided Blood Bowl coins, 2 turn and re-roll markers, 4 balls, and a transfer sheet with 292 decals, all themed around Amazon teams.

    Rules for using Amazon teams in your games of Blood Bowl can be found in Spike! Journal 15.

    This kit comprises 102 plastic components, and is supplied with 12x Citadel 32mm Round Bases and 1x Amazon Team Transfer Sheet. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Rumbelow Sheepskin
  productCode: prod4920215-99850999043
  sku: 99850999043
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-rumbelow-sheepskin-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999043_RumbelowSheepskinLead.jpg
  status: current
  description: |-
    Rumbelow Sheepskin and his surly ram, Longshanks, are just what a Halfling coach needs to beef up a wilted Line of Scrimmage. While able to be hired by a variety of teams, Rumbelow looks his best when playing with Halfling teams, where his relative speed and toughness make him the star of their line-up.

    The combination of an angry beast and quick-witted rider gives you the oomph you need to take on tough opponents, and maybe even score a touchdown now and then! His special Ram rule allows you to modify either an Armour or Injury roll after the dice have been thrown, giving you some reliable damage-dealing potential.

    This finely-detailed resin miniature is supplied as 11 components and comes with a 32mm Blood Bowl Round Base. All the rules you need to use Rumbelow Sheepskin are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Skrorg Snowpelt
  productCode: prod4910145-99850999042
  sku: 99850999042
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-skrorg-snowpelt-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999042_SkrorgSnowpeltLead.jpg
  status: current
  description: |-
    Skrorg was once so wild and bloodthirsty that he needed to be sent to Rockbeard's Rage Rehab to turn his life around. After his rehabilitation, Skrorg emerged back onto the pitch as a changed Yhetee – instead of butchering teammates, Skrorg now opts to follow tactics, a team player through and through.

    This level-headed, well-groomed creature loves nothing more than playing to the adoration of the crowds. Unlike other Yhetees, Skrorg opts to take good care of his luxurious coat, ensuring it is carefully treated and combed to perfection. His special rule, Pump Up the Crowd, allows Skrorg to bask in the bloodthirsty cheers when he removes an enemy as a Casualty with a Block action – and gain a team re-roll into the bargain!

    This finely-detailed resin miniature is supplied as 10 components and comes with a 40mm Blood Bowl Round Base. All the rules you need to use Skrorg Snowpelt are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Thorsson Stoutmead
  productCode: prod4910144-99850999041
  sku: 99850999041
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-thorsson-stoutmead-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999041_ThorssonStoutmeadLead.jpg
  status: current
  description: |-
    Also known as the Beer-Barrel-Bowling Bombardier, Thorsson Stoutmead’s ability to drink is matched only by his ability to knock his opponents over. He has truly mastered the art of emptying barrels of ale and hurling them at the opposition. Thorsson's drinking habits are starting to get the better of him, however, as the beer belly stretching his tight uniform can attest.

    Thorsson Stoutmead’s unique once-per-drive special rule, Beer Barrel Bash, allows him to perform a Throw Keg Special action, tossing his emptied barrel at an opponent to leave them Knocked Down (and stinking of booze). Beware, though – a roll of 1 causes Thorsson himself to be Knocked Down, as he fails his throw in a drunken stupor.

    This finely-detailed resin miniature is supplied as nine components and comes with a 32mm Blood Bowl Round Base. All the rules you need to use Thorsson Stoutmead are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Ivar Eriksson
  productCode: prod4910143-99850999040
  sku: 99850999040
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-ivar-eriksson-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999040_BBIvarErikssonLead.jpg
  status: current
  description: |-
    Ivar always seemed destined for life on the gridiron. Even as a youngster he could be found practicing with a ball or tackling his friends – whether they wanted it or not! This ultimately led to Ivar being signed by his boyhood favourite team, the Norsca Rampagers, at the tender age of 16.

    Though he may be a calm and collected individual on the pitch, that doesn’t make Ivar any less of a threat. Now in his prime, Ivar has become an imposing physical specimen, able to punch, scrap, and brawl with the very best the game has to offer. His once-per-drive signature ability, Raiding Party, allows a nearby Open player on his team to make a hasty move – meaning the 'War Raider' can quickly seize control of the pitch.

    This finely-detailed resin miniature is supplied as seven components and comes with a 32mm Blood Bowl Round Base. All the rules you need to use Ivar Eriksson are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Blood Bowl Yhetee
  productCode: prod4910142-99850999039
  sku: 99850999039
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-yhetee-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999039_BBYheteeLead.jpg
  status: current
  description: |-
    One of the great mysteries of Norse teams is how they ever managed to convince the blood-crazed and savage Yhetees to play Blood Bowl. That said, fans of Norse teams are too enthralled by the displays of Yhetee brutality to ask many questions! These hulking, muscular beasts are equipped with dagger-like teeth and rending claws and, of course, an unkempt mane of white fur – perfect for blending into a mid-game snowstorm and catching an unsuspecting ball carrier off-guard.

    This finely-detailed resin miniature is supplied in seven components, and comes with a 40mm Blood Bowl Round Base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: 'Norse Blood Bowl Team: Norsca Rampagers'
  productCode: prod4910136-99120999015
  sku: 99120999015
  ean: 5011921163281
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-norse-team-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999015_BBNorseTeamLead.jpg
  status: current
  description: |-
    Norse teams enjoy nothing more than a good scrap – and that’s certainly how they perform best on the pitch! Norscans have spent their entire lives in the harsh, freezing north, making them quite a tough bunch. These hardened players excel in getting up close and personal with the opposition, throwing blocks left and right as they mercilessly hammer their way to the end zone – and no doubt the tavern that lies beyond!

    Of course, it’s not only about causing a punch-up in the middle of the gridiron; there is also the small matter of scoring those all-important touchdowns. Norse teams work best when they can use their abundance of hitting power to punch a hole in the opposition’s defence, allowing their Valkyries to use their impressive speed to run through and claim victory.

    The multi-part kit is comprised of 120 plastic components with which you can assemble the Norsca Rampagers, a Norse team for use in games of Blood Bowl. The team is made up of 6 Norse Raider Linemen, 2 Beer Boar, 2 Norse Berserkers, 2 Ulfwereners and 2 Valkyries. In addition, there are 2 double-sided Blood Bowl coins, 2 turn and re-roll markers, 4 balls, and a transfer sheet with 292 decals.

    The rules for using Norse teams in your games of Blood Bowl can be found in Spike! Journal 14. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Fungus The Loon and Bomber Dribblesnot
  productCode: prod4870147-99850909006
  sku: 99850909006
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-fungus-the-loon-and-bomber-dribblesnot-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850909006_BBFungusTheLoonBomberDribblesnotLead.jpg
  status: current
  description: |-
    Fungus the Loon and Bomber Dribblesnot have it made – these famous Blood Bowl players get to maim people in the match itself, then kick back and feast on mushrooms at half time.

    Fungus is the ultimate fanatic, hurling a giant spiked ball and chain around the pitch that's almost as big as he is. Where he'll stop, nobody knows – not even Fungus himself – but if you're lucky, it'll be right in the opponent's scrimmage line. Dribblesnot is somehow the more sensible of the two, despite being a pint-sized pyromaniac with a penchant for deadly explosives. He's able to put an almighty spring in anyone's step with his powerful rockets and bombs, and his mask's large nose protects him from any blow-back – be it shrapnel or limbs.

    These Star Players will play for any Badlands Brawl or Underworld Challenge teams that can front their hiring fees – just make sure you've got a health supply of mushrooms available.

    This finely-detailed resin kit is supplied in 11 pieces and comes with two 32mm Round Blood Bowl Bases. All the rules you need to use Fungus the Loon and Bomber Dribblesnot in your games of Blood Bowl are included in the pack.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.
