- name: 'Black Orc Blood Bowl Team: The Thunder Valley Greenskins'
  productCode: prod4620209-99120909005
  sku: 99120909005
  ean: 5011921139354
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Black-Orc-Team-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120909005_BlackOrcTeamLead.jpg
  status: current
  description: |-
    Black Orcs have been splitting off and forming their own teams for years now. Smarter, stronger, and more serious than their kin, they were tired of soaking up all the big hits and giving up all the glory. Their biggest weakness is a lack of speed – but that's where the Goblins come in. Well drilled in comparison to their peers, the little guys are quick to run the ball through any gaps the Black Orcs open up for them. Even the trolls on Black Orc teams are well trained, which is an impressive feat!

    Teams like the Thunder Valley Greenskins have made a name for themselves with their impressive athleticism and discipline as much as their capacity for grievous violence. If you like your plays rather unsubtle, this is the team for you. Grind down the pitch, crushing the other players underfoot, until your Goblins are close enough to make a dash for the End Zone. Score. Repeat.

    Incredibly strong on offence and hard to shift on defence, a well-managed Black Orc team is a fearsome thing to face off against across the Line of Scrimmage.

    This multipart plastic kit contains all the components you need to build the Thunder Valley Greenskins, a Black Orc team for use in games of Blood Bowl. **It contains 12 players:**
    – 6 Black Orcs
    – 6 Goblin Bruiser Linemen

    You'll also find 2 turn counters, 2 coins, 4 balls (2 with sturdy spikes and 2 with a horned beast icon), 12 32mm Round Blood Bowl bases, and a transfer sheet.

    The rules to use Black Orc teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules and Spike! Journal Issue 12.
- name: 'High Elf Blood Bowl Team: The Caledor Dragons'
  productCode: P-240935-99120910001
  sku: 99120910001
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-high-elf-blood-bowl-team-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120910001_HighElvesTeam1.jpg
  status: current
  description: |-
    Smack bang in the middle of the Great Ocean sits Ulthuan, the picturesque ancestral land of Elves everywhere. Known for their high spires, high fashion, and high opinions of themselves, the High Elves love to try to enforce a measure of elegance on Blood Bowl games, darting to and fro as they toss the ball around – after all, they can't be expected to actually physically interact with the unwashed hordes that are regular Blood Bowl players!

    **The Epitome of Grace and Skill**

    High Elves are a refined and deadly hybrid team, blending martial strength with unmatched passing precision. Their armour gives them staying power few agility teams can match, while their Thrower opens up the field with pinpoint strikes at just the right moment. With disciplined positioning and careful protection of their elite players, High Elves can pick apart cages, outmanoeuvre bash teams, and score with effortless grace. Coached well, they don't just win, they do it in style, as only true sons of Ulthuan can!

    **The Pinnacle of Passing**

    This multipart plastic kit builds a High Elf team for use in games of Blood Bowl. White Lions are ready to pounce on their prey, taking on heavy hitters, while Phoenix Warrior Throwers and Dragon Princes are nimble and athletic. High Elf Linemen boast some of the best stats of any team. They are ideal for any coach who likes an agile and graceful playstyle.

    **The team of 12 miniatures is comprised of:**
    – 6 High Elf Linemen
    – 2 White Lions
    – 2 Dragon Princes
    – 2 Phoenix Warriors

    **This kit also includes:**
    – 2 Dragonling balls
    – 2 Shimmering Stone balls
    – 2 Double-sided coins
    – 2 Turn and Re-roll markers

    Four of the High Elf Linemen each have 2 head and plume options, and the other two have plume options. Both White Lions have 2 head options and 2 left arm options. The Dragon Princes each have 2 mask options and 2 right arm options.

    **Contents:**
    – 120 Plastic components
    – 12 Citadel 32mm Round Bases
    – 1 High Elf Blood Bowl Team Transfer Sheet
    – 1 Construction guide

    The High Elf Blood Bowl Team Transfer Sheet features 342 high-quality waterslide transfers. These include Caledor Dragons symbols, other High Elf icons, position names, and numbers to decorate your miniatures.

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Citadel Plastic Glue
    – Citadel Colour paints

    Rules for using these miniatures in your games of Blood Bowl can be found in *Spike! Journal Issue 21*, available separately.
