    – 6x Bretonnian Squire Linemen
    – 2x Knight Catchers
    – 2x Knight Throwers
    – 2x Grail Knight Blitzers

    The Bretonnian Squire Linemen each have two head options, and two of the Bretonnian Squire Linemen have two left arm options. Both Knight Throwers have two head options and two left arm options. The Grail Knight Blitzers each have two left arm options, two head options, and two helmet topper options. Each Knight Catcher has three head topper options – all offering a degree of customisation for your team.

    **This kit also includes:**
    – 2x Ornate balls
    – 2x Blessed balls
    – 2x Double-sided coins
    – 2x Turn and Re-roll markers

    This kit is supplied with a Bretonnian Blood Bowl Team Transfer Sheet, featuring 320 high-quality waterslide transfers. These include fleur-de-lys and grail icons, role identifications, and numbers for you to decorate your miniatures.

