    With the wind in her sails, and the promise of gold, plunder, and rum ever on the horizon, ‘Captain’ Karina von Riesz is only getting started in her Blood Bowl career, and is showing no signs of slowing down. In the few years in which she has been playing the great sport, Karina’s unique style of play and short temper have seen her stock rise within the world of Blood Bowl, with many pundits saying she is one to watch over the coming seasons – especially for fans of excessive amounts of arterial spray.

    'Captain' Karina can be added to any Sylvanian Spotlight Blood Bowl team, as a swift and deadly Star Player, and one with no qualms about ripping apart the opposition, and feasting on their delicious lifeblood.

