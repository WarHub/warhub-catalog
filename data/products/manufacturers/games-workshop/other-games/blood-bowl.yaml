  status: current
  description: |-
    In life, Ivan 'the Animal' Deathshroud was a particularly bloodthirsty and vicious Warlord who terrorised the Dwarfs of the Worlds Edge Mountains long ago when war still tainted the world and nobody knew of Nuffle’s infinite wisdom. Subsequently awoken back to unlife as a Wight, Ivan has decided that the entirety of his undead existence shall be dedicated to inflicting pain and carnage upon the gridiron.

    This large skeletal Blitzer towers over most Blood Bowl players, clad in fluted armour adorned with the bat wing motifs that are staple design elements of undead players. In an attempt to inflict as much damage as possible, Ivan wears spiked boots and bladed gauntlets, perfect for beating and cutting up all opposition (but especially Dwarfs – he really does have a bone to pick with them). Wearing his hatred with pride, Ivan carries a trophy of a fallen Dwarf on his back, their head now covered in cobwebs.

    Ivan 'the Animal' Deathshroud is a Star Player that can be added to any Sylvanian Spotlight Blood Bowl team, adding extra strength, armour, and undead-fervour to your roster.

