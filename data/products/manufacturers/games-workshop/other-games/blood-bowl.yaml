  url: https://www.warhammer.com/en-GB/shop/blood-bowl-barik-farblast-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999037_BBBarikFarblastLead.jpg
  status: current
  description: |-
    Barik Farblast is a Hall of Famer whose use of crafty ball-launching technology has garnered him a reputation as one of the best throwers in the league – quite the feat for a Dwarf!

    If your team needs a Thrower who can land a pass from anywhere on the pitch with pinpoint accuracy, prepare to be disappointed – there's no such player in Blood Bowl! However, it you want the nearest thing to it, Barik Farblast is your ma– er, Dwarf. His 'ballzooka' may be a Secret Weapon, but it gives him an edge over any other Thrower in the game in terms of range and precision.

    What's more, like a true Dwarf, he follows the money – he'll play for any Halfling Thimble Cup, Old World Classic, or Worlds Edge Superleague teams that can front his hiring fee.

    This finely-detailed resin model is supplied in 13 pieces and comes with a 32mm Round Blood Bowl Base. All the rules you need to use Barik Farblast are included in the pack.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Blood Bowl Kroxigor
  productCode: prod4790259-99850999038
  sku: 99850999038
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-kroxigor-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999038_BBKroxigorLead.jpg
  status: current
  description: |-
    Surprising as it may seem, Kroxigor are the gentle giants of the Lizardmen race. Thought to have been created as builders and labourers to be strong and powerful, Kroxigor coexist contentedly with Skinks. Yet there are few sights more terrifying than a Kroxigor roused to anger. Capable of effortlessly tearing a man limb from limb, these mighty creatures have served in the armies of the Slann for millennia. Today, they are considered a great boon to any Blood Bowl team. Their long muscular arms and rows upon rows of serrated teeth set into powerful jaws make them a terror on the Line of Scrimmage. Woe betide any player unfortunate enough to be tasked with marking a Kroxigor!

    Add some raw strength to the speed and skill of your Lizardman team with a mighty Kroxigor. They'll smash through any player foolish enough to try and stand in their way on the Line of Scrimmage.

    This highly detailed 11-part kit makes one Kroxigor model and is supplied with one 40mm Citadel Round base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Scyla Anfingrimm
  productCode: prod4790257-99850999034
  sku: 99850999034
  productType: single_kit
  priceGbp: 48.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-scylla-anfingrimm-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999034_BBScylaAnfinngrimmLead.jpg
  status: current
  description: |-
    The fate of Scyla Anfingrimm is a cautionary tale to any who would accept the blessings of the Blood God too readily. Scyla bears many such gifts, from a prehensile tail ending in a tooth-lined maw to a spiked, brass collar – an iconic sign of Khorne's favour – about his neck. Yet even though his body has devolved beyond all recognition, Scyla Anfingrimm's power is beyond question, and the devastation he leaves in his wake on the astrogranite has made him a living legend.

    Hiring the ultra-violent services of Scyla Anfingrimm is a statement of intent – more specifically, an intent to kill your opponent's players! Get him on the pitch, set him loose, and watch as he leaves a trail of broken bodies in his wake. Any 'Favoured of…' team can add this Star Player to their roster.

    This finely-detailed resin model is supplied in 14 pieces, and comes supplied with a Citadel 40mm Round Closed Base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Khorne Bloodspawn
  productCode: prod4790256-99850999033
  sku: 99850999033
  productType: single_kit
  priceGbp: 30.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-khorne-bloodspawn-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999033_BBKhorneBloodspawnLead.jpg
  status: current
  description: |-
    The Blood God gifts his most dedicated slaughterers with mutations that better enable them to kill in his name. A Bloodspawn is especially 'blessed' in this manner, having become horribly swollen and distorted with Khorne's murderous power. Huge, bulging muscles, razor-sharp bone spurs, vicious talons, and more are the hallmarks of a Bloodspawn. When one is herded onto a pitch and unleashed in all its destructive glory, the ensuing carnage can turn the stomach of even the most bloodthirsty fans.

    The Bloodspawn will inevitably dominate any area of the pitch, either through the application of extreme violence or the intimidation factor of its murderous capabilities. If you want a player to deal with other Big Guys or smash a cage with impunity, waste no time in adding the spectacularly brutal Bloodspawn to your Khorne team's roster.

    This finely-detailed resin model is supplied in 8 pieces and comes with a Citadel 40mm Round Closed Base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Max Spleenripper
  productCode: prod4790255-99850999032
  sku: 99850999032
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-max-spleenripper-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999032_BBMaxSpleenripperLead.jpg
  status: current
  description: |-
    A Chaos Cultist dedicated to Khorne, Max Spleenripper has earned a terrifying reputation on the pitch thanks to his penchant for inflicting maximum carnage with his trusty chainsaw.

    The final word in ultra-violence on the pitch, Max Spleenripper is worth every coin of his hiring fee if you need an opposing player permanently dealt with at the end of his chainsaw. Any 'Favoured of…' team can add him to their roster.

    This finely detailed resin model is supplied in 6 pieces and comes with a Citadel 32mm Round Blood Bowl Base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Khorne Blood Bowl Team - Skull-tribe Slaughterers
  productCode: prod4790235-99120901003
  sku: 99120901003
  ean: 5011921133192
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-khorne-team-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120901003_KhorneTeamLead.jpg
  status: current
  description: |-
    Khornate Blood Bowl teams often find themselves at a disadvantage in leagues due to their inability to put scoring touchdowns ahead of goring their opponents. Against all odds, the Skull-tribe Slaughterers buck this trend, believing that the higher they rank in leagues, the better calibre of skull they will be able to claim for Khorne. As a result, the Skull-tribe Slaughterers have made their extremely bloody mark in the NAF as one of the greatest teams around.

    Want a team that can both mutilate your opponent with ease, and score a good touchdown? Khorne teams have plenty of brawn and just enough brain to make it happen. Marauder Linemen are hardy enough to withstand plenty of punishment and smart enough to remember to pass the ball once in a match. Those who endure the brutal training regimes of Khornate teams become Bloodseekers. Impressively violent and single-mindedly bloodthirsty, they specialise in putting the opposition out of commission while offloading any erstwhile Blood Bowl balls to the team's Khorngors – houndlike Beastmen who are utterly intent on scoring touchdowns.

    The multipart kit is comprised of 64 plastic components with which you can assemble The Skull-tribe Slaughterers, a Khorne team for use in games of Blood Bowl. The team is made up of six Bloodborn Marauder Linemen, four Bloodseekers, and two Khorngor. This box also contains two double-sided Blood Bowl coins, two turn and re-roll markers, four Blood Bowl balls, and a transfer sheet with 222 symbols and icons to customise your team with. This kit is also supplied with 12x 32mm Citadel Round Blood Bowl bases.

    Rules for using Khorne teams in your games of Blood Bowl can be found in Spike! Presents: 2021 Almanac.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Kreek ‘the Verminator’ Rustgouger
  productCode: prod4780174-99850999036
  sku: 99850999036
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-kreek-the-verminator-rustgouger-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850999036_BBKreekTheVerminatorRustgougerLead.jpg
  status: current
  description: |-
    Rat Ogres are natural Blood Bowl players with size, speed, and animal cunning that make them sought after by Skaven coaches all under the world. You could wait for them to improve through experience and careful training, or you can simply enhance them with warpstone-powered mechanical augmentations and give them a massive weapon to swing around. Such is the case with Kreek ‘the Verminator’ Rustgouger.

    Save up your warpstone and hire this Star Player to give your team the extra punch it needs. His services don’t come cheap, but you can hardly imagine a stronger lynchpin around which to run winning plays. Kreek wields his ball and chain to deadly effect, but he’s so tremendously popular (and frightening) that the refs allow him to stay on the pitch a bit longer than they should.

    This finely detailed resin model is supplied in 5 pieces and comes with a 32mm Round Blood Bowl Base. The package includes all the rules you’ll need to use Kreek ‘the Verminator’ Rustgouger in your games of Blood Bowl.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Wilhelm Chaney
  productCode: prod4780173-99850907002
  sku: 99850907002
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-wilhelm-chaney-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850907002_BBWilhelmChaneyLead.jpg
  status: current
  description: |-
    Though Wilhelm Chaney is now regarded as an exceptional talent and a true professional, this was not always the case for ’the Wolfman’. Bitten by a werewolf at a young age, he was forced to spend most of his adolescent years as an outcast from society, and it is this that is widely accepted as the cause of his erratic behaviour both on and off the pitch.

    If you love werewolves, Wilhelm Chaney can do everything they do, and then some. The Wolfman hits harder, mauls more viciously, and his lifelong interest in the game of fetch means he can catch a long bomb. What a good boy! Your Sylvanian Spotlight teams will never be the same.

    This finely-detailed resin model is supplied in 9 pieces and comes with a 32mm Round Blood Bowl Base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.
- name: Elf and Dwarf Biased Referees
  productCode: prod4620212-99120999010
  sku: 99120999010
  ean: 5011921145973
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 14
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Elf-And-Dwarf-Biased-Referees-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999010_BiasedRefereesLead.jpg
  status: current
  description: |-
    Blood Bowl referees carry the weighty responsibility of interpreting and enforcing the sacred writings of Nuffle. They're entrusted with the vital duty of upholding the values of the beautiful game and ensuring both teams strictly follow the rules and compete fairly. Good job so many of them are open to Bribes then, because that sounds a bit boring.

    Purchase a Biased Referee for your games and use these awesome models to remind you of any remaining Bribe attempts while making your games more immersive.

    These plastic models are supplied in 8 components, allowing you to assemble one Dwarf and one Elf referee. The models are supplied with 2x 32mm Round Blood Bowl bases.
- name: 'Imperial Nobility Blood Bowl Team: The Bögenhafen Barons'
  productCode: prod4620208-99120902002
  sku: 99120902002
  ean: 5011921139347
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Imperial-Nobility-Team-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120902002_BBImperialNobilityTeamLead.jpg
  status: current
  description: |-
    In addition to being an incredibly popular pastime, beloved by an impressively broad and diverse fanbase, Blood Bowl is also a shockingly lucrative business. Imperial Nobility teams have been springing up out of the woodwork of late, the seemingly bottomless coffers of their patrons hiring top talent, providing the finest equipment and training facilities, and supporting their teams through extensive advertising campaigns. The Bögenhafen Barons are the most popular of such teams, exploding onto the scene and shaking things up.

    While superficially similar to Human teams, the Imperial Nobility have a different skill set that makes them very tricky to play against. A well-coached team can keep their opponents guessing while setting up the solid Noble Blitzers to score. They look absolutely incredible whether they're winning or losing, clad in the finest equipment you're likely to see on any pitch.

    This multipart plastic kit contains all the components you need to build the Bögenhafen Barons, an Imperial Nobility team for use in games of Blood Bowl. **It contains 12 players:**
    – 4 Imperial Retainer Linemen
    – 4 Bodyguards
    – 2 Noble Blitzers
    – 2 Imperial Throwers

    You'll also find 2 turn counters, 2 coins, 4 balls, 12 32mm Round Blood Bowl bases, and a transfer sheet.

    The rules to use Imperial Nobility teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules and Spike! Journal Issue 12.
- name: 'Human Team: Reikland Reavers'
  productCode: prod4580340-99120902003
  sku: 99120902003
  ean: 5011921146260
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Reikland-Reavers-Blood-Bowl-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120902001_ReiklandReaversTeam01.jpg
  status: current
  description: |-
    Known during their first few seasons as the Altdorf Acolytes, the team who became the Reikland Reavers quickly established a reputation for their great skill and ability on the pitch. Some judicious transfer decisions, helped by the impressively deep pockets of original owner DD Griswell Snr., has seen the team rise to the top during their long life. Now, with DD’s great-grandson JJ Griswell Jr. at the helm, the Reikland Reavers are probably the finest all-round team in the world.

    This multi-part plastic kit contains the components necessary to assemble the Reikland Reavers, a Human team for use in games of Blood Bowl. It contains:

    - 2 Blitzers
    - 2 Throwers
    - 2 Catchers
    - 6 Linemen

    as well as 6 balls, a double-sided score coin and a decal sheet. Supplied with 12 32mm Blood Bowl round bases, featuring holes to slot the ball into when your miniature has possession.
- name: Ogre Blood Bowl Team – Fire Mountain Gut Busters
  productCode: prod4580339-99120913002
  sku: 99120913002
  ean: 5011921146253
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Ogre-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120913001_FireMountainGutbusters01.jpg
  status: current
  description: |-
    Ogres are natural Blood Bowl players, with a long tradition of playing for other teams who can afford to feed them (woe betide the coach who fails to account for their appetite). Ogre teams, however, bring a new level of violence to the game, as their rosters feature not just one or two of these massive brutes, but often 4 of them! Of course, they're also accompanied by a veritable swarm of Gnoblars, tiny greenskin runts who have no natural athletic ability, but enough cunning and wit to know they're supposed to grab the ball from time to time whilst the Ogres are busy pummeling their opponents. Once in a while, the Ogres will give the ball-holders a little kick towards the End Zone, thus scoring some points with a bit of luck.

    If you want to play some smashy Blood Bowl, you can do no better than an Ogre team. They play unlike anything else, excelling at deleting the opposing team, one by one, until they can walk the ball across the pitch unopposed. You’ll focus on hiring a handful of Ogres, and the utterly replaceable gnoblars fill out the rest of your slots. Ogres are a blast to play, and a nightmare to go up against.

    This multipart plastic kit contains all the components you'll need to build the Fire Mountain Gut Busters, an Ogre team for use in games of Blood Bowl, containing 4 Ogres (1 of which can be built as a Runt Punter), and 12 Gnoblars with interchangeable heads! You'll also find a roster sheet, transfers, 2 turn counters and 2 coins, 4 Ogre-themed balls, and a mix of 14x 25mm Citadel Round bases and 4x 32mm Citadel Round Blood Bowl bases.

    Rules for using Ogre teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Dark Elf Blood Bowl Team – Naggaroth Nightmares
  productCode: prod4580338-99120912002
  sku: 99120912002
  ean: 5011921146222
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Dark-Elf-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120912001_NaggarothNightwings01.jpg
  status: current
  description: |-
    A new team founded after the collapse of the NAF, many Nightmares players previously played for the disbanded Naggaroth Nightwings who fell into receivership when the head coach took flight with the team treasury. Despite their status as a new team then, they have an influx of incredible talent, and are already proving themselves to be nightmares (do you see?) for their opponents…

    This multi-part plastic kit contains the components necessary to assemble the Naggaroth Nightmares, a Dark Elf Blood Bowl team. The team consists of 6 Linemen, 2 Blitzers, 2 Runners and 2 Witch Elves – each is clad in some pretty spikesome armour, with the hides of Cold Ones draped over their shoulders. The Witch Elves are ...slightly less armoured, and can be modelled either with hands pointing imperiously toward their opponents – or clutching a still-beating heart. The Linemen have 3 different designs of head.

    There are a host of extras in the kit – 2 turn markers, 2 double-sided score coins featuring a Dark Elves icon and 4 balls – 2 kraken eggs (with protruding tentacles) and 2 balls made from the hide of a Cold One, lacking pegs.

    Supplied with 12 32mm Blood Bowl bases, a 1,000,000 GP roster and a Dark Elf transfer sheet.
- name: 'Goblin Team: Scarcrag Snivellers'
  productCode: prod4580337-99120909007
  sku: 99120909007
  ean: 5011921146215
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Goblin-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120909002_ScarcragSnivelersTeam01.jpg
  status: current
  description: |-
    The Scarcrag Snivellers made a decision a long time ago to make an attempt at playing Blood Bowl without all the sneaky tricks employed by most Goblin teams. Eleven Goblins line up at the start of the match – no Trolls, no Secret Weapons – and do their very best to last at least a couple of drives before they’re stomped into the ground. Bizarrely, this doesn’t always end as badly for them as it probably should, and somehow the Scarcrag Snivellers seem to make it from season to season without being utterly wiped out…

    Pick up a Goblin team for your games of Blood Bowl with this set of plastic miniatures. In it, you’ll find 12 multi-part Goblins, featuring 6 pairs of unique bodies and 7 pairs of unique heads, meaning no two Goblin teams need look alike! There are also 6 Goblin team balls, featuring the kind of dirty tricks the Scarcrag Snivellers frown upon – 2 deflated, 2 with Goblins stuck in them and 2 stuffed with dynamite – 2 turn counters and 2 double-sided team tokens. The 54-component kit is supplied with 12 32mm Blood Bowl bases and a 1,000,000 gold piece roster, including 8 (eight!) team re-rolls and Fan Factor 4!

    Rules for Goblin teams can be found in Blood Bowl Death Zone Season Two.
- name: 'Shambling Undead-Team: Champions of Death'
  productCode: prod4580266-99120907003
  sku: 99120907003
  ean: 5011921146147
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Champions-of-Death-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120907001_ChampionsofDeathTeam01.jpg
  status: current
  description: |-
    Shambling Undead teams are drawn from a mix of vicious undead creatures and former Blood Bowl players that died on the pitch and – through the art of necromancy – have been given the chance of a second career! Most famous of all the Shambling Undead teams that have graced (or stained) the pitch over the years are the mighty Champions of Death.

    The Champions of Death team set contains 14 multipart plastic players covered in rusted armour, and eight thematic gaming accessories:

    - 2 Mummies
    - 2 Wights
    - 2 Ghouls
    - 4 Zombies
    - 4 Skeletons
    - 4 Shambling Undead Blood Bowl Balls
    - 2 Turn Markers
    - 2 Double-sided Score Coins

    In addition, the set includes a Champions of Death transfer sheet, with decals that feature player numbers and the team’s logo, and a sample team roster to get you started.
- name: Gretchen Wächter
  productCode: prod4580207-99850999031
  sku: 99850999031
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Gretchen-Wachter-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999031_BBS2GretchenWachterLead.jpg
  status: current
  description: |-
    There are some poor souls who find themselves wedded to a Blood Bowl fan of such boundless enthusiasm that it encroaches into every aspect of daily life. Important dates and anniversaries are ignored or forgotten, and family functions are avoided. Before long, the unfortunate lover begins to resent the beautiful game. In time, a strong hatred of Nuffle, and all his wonders, is fostered and domestic bliss becomes a thing of the past! Such was the case with Gretchen Wächter, whose husband was utterly obsessed with Blood Bowl when they were still alive. The Necromancer and aspiring coach Dirk the Abhorrent turned the animosity Gretchen held for the game into a finely-honed weapon and unleashed her scorn against her rival players – the pitch has never been the same since.

    The legendary 'Blood Bowl Widow' is a frighteningly solid Star Player, despite being wholly incorporeal. Gretchen's set of skills make it hard for your opponents to get their hands on her, robbing their momentum and frustrating even their Big Guys. She can be Induced to play for any Sylvanian Spotlight team, bolstering their defensive line and skipping right past their biggest players on offence.

    This finely-detailed resin model is supplied in 7 pieces, and comes supplied with a 32mm Round Blood Bowl Base. You can find all the rules you need to use her in Blood Bowl – The Official Rules
- name: Skrull Halfheight
  productCode: prod4580206-99850907001
  sku: 99850907001
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Skrull-Halfheight-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550907001_BBSkrullHalfheightLead.jpg
  status: current
  description: |-
    Every once in a while, a player appears that breaks the mould. Skrull Halfheight was a Dwarf blessed with a prodigious passing ability. Unfortunately for Skrull, his receivers were Dwarfs, and as he waited for one of them to trundle slowly into position, the opposition executed a career-ending tackle on the unfortunate Thrower. This beautiful game wasn't done with Skrull, though, and he was resurrected by none other than famous Necromancer coach, Tomolandry, eager to try out a long game for his own Champions of Death.

    A Dwarf Thrower, they ask with eyebrows raised incredulously? Your opponents won't underestimate him more than once... This unconventional Star Player can be Induced by any Sylvanian Spotlight and Worlds Edge Superleague team to add a frankly impressive passing strategy. As befitting a player with no flesh and blood, Skrull is cool under pressure and very survivable (so to speak, anyway) – ideal for mixing it up on the Line of Scrimmage and then sending the ball sailing out to a breakaway catcher on the other side.

    This finely-detailed resin model is supplied in 7 pieces, and comes supplied with a 32mm Round Blood Bowl Base.
- name: Zolcath The Zoat
  productCode: prod4540307-99850999030
  sku: 99850999030
  productType: single_kit
  priceGbp: 48.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Zolcath-The-Zoat-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999030_ZolcathZoatLead.jpg
  status: current
  description: |-
    Zoats are an exceptionally rare sight, and to find one on the Blood Bowl pitch is all but unheard of. Zolcath seems to play as much for his own amusement as anything else, he will only allow a team to hire him once they find his hidden lair.

    Not only is Zolcath a strong player in his own right, with the stats and skills to dominate the gridiron, he’s a Zoat! Your opponents will gaze in awe when you put him on the table, and so will the players lining up against him on the Line of Scrimmage.

    This finely-detailed resin model is supplied in 16 pieces, including a 40mm round base. Zolcath the Zoat is available to play for Lustrian Superleague and Elven Kingdoms League teams.
- name: 'Blood Bowl: Ogre'
  productCode: prod4540304-99120999011
  sku: 99120999011
  ean: 5011921146154
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 21.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Ogre-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999011_BBOgreLead.jpg
  status: current
  description: |-
    Able to smash, crash and bash through even the toughest opponents, Ogres provide Human teams with that touch of utter brutality sometimes missing from their rosters. It’s not that the Humans they play alongside are puny, far from it – it’s just that sometimes a wall of linemen needs to be shattered, and an Ogre can get the job done much more quickly, and with much nastier results. It’s just more efficient!

    This multi-part plastic kit contains the components necessary to assemble a Blood Bowl Ogre. He comes supplied with a 32mm Blood Bowl round base, featuring a hole to slot the ball into when your miniature has possession.
- name: Treeman
  productCode: prod4540303-99120999007
  sku: 99120999007
  ean: 5011921133734
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 21.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Treeman-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999007_TreemanLead.jpg
  status: current
  description: |-
    Treemen have become a fixture of modern Blood Bowl, playing for a variety of teams. They hold down the Line of Scrimmage as the ultimate defensive players, adding staying power to some of the squishier teams like Halflings and Wood Elves.

    This fantastic kit will build one of two different types of Treemen. The Altern Forest version blends in nicely with your Halflings (including the infamous Akhorne the Squirrel), while the Loren Forest Treeman features an ornate face mask that looks right at home in a Wood Elf team. Their slow speed is balanced by high strength and resilience, both sorely needed on those teams…

    This plastic model is supplied in 13 components, including a 40mm round base. Treemen are available to play for Wood Elf, Halfling, and Old World Alliance teams. You can find all the rules you need to use them in your games of Blood Bowl in the Second Season Official Rules.
- name: Orc Blood Bowl Team - Gouged Eye
  productCode: prod4540302-99120909006
  sku: 99120909006
  ean: 5011921146185
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Orc-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120909006_BBOrcTeamLead.jpg
  status: current
  description: |-
    We are Orcs and dat’s no lie
    We’ll make yoo screem an’ make yoo cry…

    Once a laughing stock, the Gouged Eye has employed filthy tactics, brute force and lots of punching to rise through the ranks and become big players in the upper echelons of Blood Bowl. They’ve won the title before, and they can do it again – a far cry from the early days of the team, when it was a miracle if their Throwers were facing the right way.

    We’ll pull yore hair and pinch yore thigh…

    This box contains 12 ‘orrible plastic Orc Blood Bowl players – 2 Blitzers, 2 Throwers, 2 Black Orc Blockers and 6 Linemen. The set also includes a number of balls, team counters, a decal sheet covered in Orc symbols and 12 32mm Citadel Round Blood Bowl bases, featuring holes to slot the ball into when your miniature has possession.

    And if dat don’t work, we’ll gouge your eye!

    Rules for using Orc Teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Lizardmen Blood Bowl Team – Gwaka'moli Crater Gators
  productCode: prod4540301-99120908002
  sku: 99120908002
  ean: 5011921146178
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Lizardmen-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120907002_BBS2LizardmenTeamLead.jpg
  status: current
  description: |-
    If rumours are to be believed, the origins of Blood Bowl lay in Lustria, home of the ancient and powerful Slann, and their Lizardmen servants, at the very dawn of time. Though the game has moved on and evolved in the Old World, the Lustrian League is working with the NAF to bring the old and new closer together. The Gwaka'moli Crater Gators have made the leap across the world-pond to match their skills against some of the biggest names in the sport, and their natural talent and unconventional playing style have proven to be a massive hit with fans.

    If you're looking for a funky and fresh new twist to the game, Lizardmen teams are where it's at. They have access to the best of both worlds, with players that are strong and tough, plus fast and agile ones. Once you get the hang of using your Saurus Blockers (not to mention Kroxigors if you really want to make an impact) to protect the nimble Skinks long enough to perform some slick plays, you'll find yourself scoring again and again. Add their unconventional aesthetic to the mix, and you've got a team that looks great, plays well and scores big.

    This multipart plastic kit contains all the components you need to assemble the Gwaka'moli Crater Gators, a Lizardmen team for use in games of Blood Bowl, containing 6 Saurus Blockers, 4 Skink Runners, and 2 Chameleon Skinks, plus a roster sheet. Also includes a transfer sheet, 2 Slann-statue turn markers, egg-themed balls, and 12x 32mm Citadel Round Blood Bowl bases which feature holes to place the ball.

    Rules for using Lizardmen teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Necromantic Horror Blood Bowl Team – The Wolfenburg Crypt-stealers
  productCode: prod4540300-99120907002
  sku: 99120907002
  ean: 5011921138838
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Necromantic-Horror-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120907002_NecromanticTeamLead.jpg
  status: current
  description: |-
    Blood Bowl is a gloriously violent game, but the best players don't let anything as pedestrian as death keep them down. The Necromancers of Sylvania discovered some time ago that their magical talents made for a viable career as a coach. They soon began making dark pacts with Ghouls, Wraiths, and even Werewolves – or simply stitching together Flesh Golems from the beefiest body parts they could scare up.

    Slow but durable Zombies flesh out your lineup. Combined with a variety of specialised players to choose from, a savvy Necromancer can tailor the team to a variety of play styles. Ghouls and Werewolves bring speed, Wraiths are slippery, and Flesh Golems are strong and tough. And as the dead don't rest easy, they'll always be up for more, win or lose.

    This multipart plastic kit contains all the components you'll need to build the Wolfenburg Crypt-Stealers, a Necromantic Horror team for use in games of Blood Bowl. It contains 14 players:

    – 6 Zombie Linemen
    – 2 Ghoul Runners
    – 2 Wraiths
    – 2 Werewolves
    – 2 Flesh Golems

    You'll also find 2 turn counters, 2 coins, 4 spooky balls, 14 32mm Citadel Round Blood Bowl bases, and a transfer sheet.

    Rules for using Necromantic Horror teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Skaven Blood Bowl Team – Skavenblight Scramblers
  productCode: prod4540299-99120906002
  sku: 99120906002
  ean: 5011921146239
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Skaven-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120906002_BBSkavenTeamLead.jpg
  status: current
  description: |-
    The only team to have ever won the Blood Bowl trophy two years on the run (Blood Bowl XVII and XVIII, fact fans,) the Skavenblight Scramblers are at least a bit legendary. They’ve had a run of bad luck since then, but since the recent appointment of their new head coach, Sandch Blackpelt, they’ve seen a new lease of life. Being Skaven, they naturally have a love for absolute, mindless violence, and their recent uptick in confidence and aggression has seen them elected Team of the Year 2493 in Spike! Magazine. Perhaps another trophy is within their grasp…

    This multi-part plastic kit contains the components necessary to assemble a Skaven team for use in games of Blood Bowl. You’ll receive 2 Blitzers, 2 Throwers, 2 Gutter Runners and 6 Linemen, the perfect core for your roster. Also included are a transfer sheet, turn markers, extra balls, an example roster sheet, and 12 Citadel 32mm Round Blood Bowl bases featuring holes to keep the ball in.

    Rules for using Skaven teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: 'Chaos Chosen Team: The Doom Lords'
  productCode: prod4540296-99120901004
  sku: 99120901004
  ean: 5011921146123
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Chaos-Chosen-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120901001_DoomlordsChaosTeam01.jpg
  status: current
  description: |-
    The exact identity of the owner of the Doom Lords is unknown – he is referred to commonly as ‘The Overfiend’. When establishing his team, the Overfiend cut no corners. He hired the best coach money could buy and equipped him with the best assistants, entered into numerous dark pacts with various daemonic entities and searched long and hard for the best players who could be coerced into joining him. Those who refused soon learned that the Overfiend has a very literal interpretation of the term ‘headhunting’...

    This multi-part plastic kit contains the components needed to assemble The Doom Lords, a Chaos Chosen Blood Bowl team. The team consists of 4 Chaos Blockers and 8 Beastmen – each Beastman’s head is interchangeable, meaning your team can represent a unique fielding of horned aberrations! The Blockers’ heads are interchangeable amongst themselves, too.

    There are a host of extras in the kit – 2 turn markers, 2 double-sided score coins in the shape of Chaos stars and 6 balls – 2 each of a flaming ball, a skull ball and another skull ball, these lacking pegs. Supplied with 12 32mm Blood Bowl bases, a 1,000,000 GP roster and an Chaos transfer sheet.
- name: Snotling Blood Bowl Team – Crud Creek Nosepickers
  productCode: prod4510212-99120909008
  sku: 99120909008
  ean: 5011921146277
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Crud-Creek-Nosepickers-Team-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120909004_CrudCreekNosepickersLead.jpg
  status: current
  description: |-
    Snotlings have long admired the game of Blood Bowl from the sidelines, but rarely have they taken to the pitch for… obvious reasons. Well all that’s about to change, as the “Mighty” Crud Creek Nosepickers have blasted down the barriers to bravely (or foolishly) pave the way for their diminutive kin. They're ready to flood the gridiron with a squirming, stinking wave of pint-sized players, along with all the zany contraptions and silly tricks they could dream up in their mushroom-addled brains.

    While Snotlings may make Halfling teams look downright athletic, and Goblins seem burly in comparison, what these little blighters have in spades is, well, lots more of themselves! They're so small and energetic, the refs can never keep count of how many are on the field at once! Their numerical advantage, combined with a willingness to bend and break the rules, makes them very unpredictable indeed. In short, Snotlings are all about the sort of wild shenanigans that make Blood Bowl an absolute pleasure to play. Not only are they fun, but they have some devious tricks that can actually win a game from time to time, quite literally keeping your opponent on their toes.

    This multipart plastic kit contains all the components you'll need to build the Crud Creek Nosepickers, a Snotling team for use in games of Blood Bowl, containing 12 Snotlings, 2 Snotling Fungus Flingas, 2 Snotling Fun-Hoppas, 2 Snotling Stilty Runnas, and 2 Snotling Pump Wagons! You'll also find 2 turn counters, 2 coins, 4 Snotling-themed balls, 20x 25mm bases, and 2x 32mm Citadel Round Blood Bowl bases with holes.

    Rules for using Snotling teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Gloriel Summerbloom
  productCode: prod4370224-99850999029
  sku: 99850999029
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Gloriel-Summerbloom-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999029_GSummerbloom01.jpg
  status: current
  description: |-
    Gloriel Summerbloom is famously whimsical and carefree, even for a Wood Elf! She revels in the beauty and grace of a well-played game, though she doesn't care for the violence which everyone else seems to enjoy so much. Her fans find this refreshing, whilst her detractors find it hopelessly naive. What none dispute, however, is her almost supernatural throwing accuracy and agility on the pitch.

    Your Wood Elf team can hire this Star Player to ensure a stunning passing game. Not only is the model incredible, encapsulating the grace and fluidity of Wood Elfs, but her Skill list is amazing. She’s posed mid-leap, holding the ball back in a wind-up to a throw, her long braid and sash flowing around her. If you're looking for a fun painting project, the detailed leaves, vines, and hair will make for a suitably impressive display piece!

    This finely detailed resin model is supplied in 9 components, including a 32mm round base. Gloriel Summerbloom is exclusively available to play for Wood Elf teams.
- name: Willow Rosebark
  productCode: prod4240249-99850999028
  sku: 99850999028
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Willow-Rosebark-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999028_BBWillowRosebark01.jpg
  status: current
  description: |-
    Nobody is quite certain why this especially mysterious and mercurial Dryad started playing Blood Bowl. She often appears unbidden before a match to lend her deadly talents and, well, she’s quite scary so it’s unwise to refuse. Willow has a penchant for spectacular displays of violence, which naturally makes her a firm favourite in the hearts of many Blood Bowl fans.

    Willow Rosebark excels as a Blocker on Wood Elf teams, where her skills make her surprisingly resilient in a team that’s generally not famous for it. Faster than a treeman, she adds flexibility to a Wood Elf or Halfling line-up, bringing some much-needed strength that can be where it's needed to turn the tide of a match.

    This finely-detailed resin model is supplied with 2 separate Spites which can be used to decorate her 32mm round base. Willow Rosebark is available to play for Wood Elf, Amazon and Halfling teams.
- name: Wood Elf Blood Bowl Team – Athelorn Avengers
  productCode: prod4240218-99120904002
  sku: 99120904002
  ean: 5011921146130
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-The-Athelorn-Avengers-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120904001_BBAtherlornAvengersTeam01.jpg
  status: current
  description: |-
    The Athelorn Avengers exemplify everything that makes Wood Elves some of the best teams in Blood Bowl: stunning speed and agility, unexpected savagery and natural talent. Star Players like Jordell Freshbreeze and Gloriel Summerbloom have become household names for Blood Bowl fans everywhere. Wood Elf teams are incredibly popular, as they're known to put on an impressive show – they're just as likely to (literally) dance circles around their rivals as they are to get smashed in (literally) spectacular fashion. They play the game better than just about anyone else, and they look stunning while they're at it.

    Wood Elves hit hard and fast, but they're not known for their endurance and resilience, alas. They’re the proverbial glass dagger, but in the hands of a skilled coach they can produce impressive results. If you're content to scrape by with minimal effort, this isn't the team for you – it takes finesse and skill to win games, but when you succeed, you know you've earned it. For their part, Wardancers are amongst the most impressive starting players in the game, all your Wood Elf players start with at least 7 Movement, and they have access to one of the wildest collections of Star Players to be found anywhere.

    This multipart plastic kit contains all the components you need to assemble the Athelorn Avengers, a Wood Elf team for use in games of Blood Bowl, containing 2 Catchers, 2 Throwers, 2 Wardancers and 6 Line Elves, plus a roster sheet. Also included are a transfer sheet, 2 turn markers featuring a Wood Elf motif, 3 thematic balls, and 14 Citadel 32mm Round bases featuring holes in which to place the ball.

    Rules for using Woold Elf teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Deeproot Strongbranch
  productCode: prod4190373-99860999026
  sku: 99860999026
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/Deeproot-Strongbranch-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560999026_DeeprootStrongbranch01.jpg
  status: current
  description: |-
    A classic Star Player is reborn, or rather he's so ancient he just grew a bit larger and more imposing. He's one of the largest Big Guys available to any team, and the fact he stands with Halflings only makes him more impressive. Though his services don't come cheap for an up-and-coming team, if you want to win with the Greenfield Grasshuggers you'll find his strength and toughness too tempting to pass up.

    This finely-detailed resin model is supplied in 25 components, including a 40mm round base. You'll enjoy looking for tiny details tucked away in various nooks and crannies, hinting at both his venerable history, and the forests he calls home. Deeproot Strongbranch is only available to play for Halfling teams.
- name: Halfling Blood Bowl Team – Greenfield Grasshuggers
  productCode: prod4190367-99120999012
  sku: 99120999012
  ean: 5011921146161
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Greenfield-Grasshuggers-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999004_GreenfieldGrasshuggersTeam01.jpg
  status: current
  description: |-
    The Greenfield Grasshuggers are one of the most esteemed teams in the game. After all, who doesn't love an underdog? Formed back in 2418, these eager and earnest Halflings have had to fight twice as hard to make a name for themselves. They're full of heart, determination, and enough sausage and ale to choke a troll. They’re a joy to face off against on the pitch, not least of which because you might be able to nick one of the best mince pies you've ever had when they're not looking.

    If you catch yourself thinking Blood Bowl is too easy, or you want to impress your friends with your impeccable coaching skills, there are few challenges greater than running a Halfling team. They might not be the most competitive in the game, but they're certainly one of the most fun. If you have a defiant streak, or just enjoy a fun and chaotic game, pick up a box for yourself and get ready for the good times.

    This multipart plastic kit contains all the components you need to assemble the Greenfield Grasshuggers, a Halfling team for use in games of Blood Bowl. You'll receive 2 Catchers, 2 Hefties and 8 Hopefuls, plus a roster sheet. Supplied with a transfer sheet, 2 sausage-wielding turn markers, 3 extra “balls”, and 12 Citadel 32mm Round bases featuring holes in which to place the ball.

    Rules for using Halfling teams in your games of Blood Bowl can be found in Blood Bowl – The Official Rules.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Lord Borak the Despoiler
  productCode: prod4180149-99850999025
  sku: 99850999025
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Lord-Borak-the-Despoiler-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999025_LordBoraktheDespoiler01.jpg
  status: current
  description: |-
    Lord Borak the Despoiler is one of Blood Bowl’s most popular Star Players – and not just for his bone-crunching skills on the pitch. After all, he’s been Spike! Journal’s favourite agony uncle for longer than anyone can remember, always willing to offer his ultra-violent advice in his regular column, 'Ask Lord Borak'. However, this Hall of Famer forged his legend on the gridiron, cracking skulls and tearing off limbs with nothing more that brute strength and a hyper-belligerent attitude.

    Lord Borak is an excellent all-rounder on the pitch, with a Strength to rival Big Guys and an Agility that means even ball-handling isn't out of the question. The miniature sees Borak giving a thumbs up to his adoring fans. Around his neck is his lucky set of talismans, displaying the symbols of the four Dark Gods and a Chaos Star.

    Lord Borak the Despoiler is a 10-part resin miniature and is supplied with a 32mm Blood Bowl Round Base and a resin Blood Bowl token, with Lord Borak's icon on one side.

    Coaches of Chaos Chosen and Nurgle teams can recruit Lord Borak the Despoiler using the rules found in the Blood Bowl Almanac 2018.
- name: Blood Bowl Nurgle Rotspawn
  productCode: prod4150170-99850999024
  sku: 99850999024
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Nurgle-Rotspawn-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999024_NurgleRotspawn01.jpg
  status: current
  description: |-
    Nurgle is ever-generous with his gifts, bestowing them upon his followers with reckless abandon. If a player receives too many gifts, or is granted them too quickly, their body may be warped too far and their mind affected, causing their form to constantly twist and writhe with new mutations and leaving their sanity shattered. Rotspawn of Nurgle are such cursed champions. They can no longer understand a game plan and need careful handling, but they are kept around for the strength they bring and the disruption they cause.

    The Nurgle Rotspawn is not just a brawler, but a lynchpin of the line of scrimmage. Its combination of Tentacles and Disturbing Presence can lock down the centre of the pitch by disrupting your opponent's actions, and Foul Appearance can confound their attempts to take it on directly. And it hits like… well, a bloated mass of muscle and tentacles!

    The Nurgle Rotspawn is a high-quality resin kit comprising four parts and supplied with a 40mm round plastic base.
- name: Goblin Killer Kontraptions
  productCode: prod4130157-99850909005
  sku: 99850909005
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Goblin-Killer-Kontraptions-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550909005_BBGoblinKillerKontraptions01.jpg
  status: current
  description: |-
    There is a long, messy history of Blood Bowl teams sneaking weapons onto the pitch, but few do it with such regularity (not to mention unapologetic brazenness) as Goblins. With very few exceptions, Goblin teams tend to have ready access to a well-stocked arsenal of unusual equipment at their disposal, most of which is hilariously deadly.

    Goblin teams don't play fair, and nor should you! Rally crowd support with an ’Ooligan, and threaten your opponent’s End Zone with the super-quick and agile Pogoer and Doomdiver.

    **Goblin Killer Kontraptions is a 16-piece set cast in high-quality resin, and makes the following three Goblin Blood Bowl miniatures:**

    - 1 ’Ooligan
    - 1 Pogoer
    - 1 Doomdiver
- name: Helmut Wulf
  productCode: prod4100152-99850999022
  sku: 99850999022
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Helmut-Wulf-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999022_HelmutWulf01.jpg
  status: current
  description: |-
    Helmut Wulf, a hitherto unremarkable Lineman for the Bruendar Grimjacks, once volunteered to try out a risky new piece of equipment at his coach’s request. He picked up a chainsaw for the first time and a lifelong bond was forged. It is quite likely that since that day he’s never gone more than five minutes without at least one chainsaw in his hands – certainly, he’s never been seen in public without one.

    In 2483 it is the height of the chainsaw craze and Helmut Wulf has risen to prominence as a master of his craft. In a memorable match against the now-disbanded Bogstaff Beardlings, he broke a strong cage formation single-handedly by leaping into the middle and spinning around wildly. How he survived (especially considering how very slippery it suddenly gets) is a mystery, but there’s no doubt that the man’s got style.

    Helmut Wulf is a Star Player who can be included in the following teams: Amazon, Chaos Renegades, Human, Lizardmen, Norse, Vampire. His unique brand of carnage and mayhem means that your opponent will be running scared from the first kickoff, and the revving of his chainsaw will haunt their nightmares for nights to come.

    This is a complete, multipart resin kit which contains one Helmut Wolf. He is supplied with a 32mm Blood Bowl base, and his rules can be found in the Inaugural Blood Bowl Almanac.
- name: Karla von Kill
  productCode: prod4100151-99850999021
  sku: 99850999021
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Karla-Von-Kill-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999021_KarlaVonKill01.jpg
  status: current
  description: |-
    Karla von Kill takes a day off from the family pig farm to watch some Blood Bowl at a local stadium with some friends. Having never seen the sport up-close before (only having caught the occasional big match on the crystal ball in the local tavern), she is immediately taken with the flashy plays, colourful commentary and over-the-top violence. She sticks around after the match to help clear up and manages to speak to some of the Hochstadt Hellfires, who convince her to abandon the provincial life and join them on the road. She spends the next few weeks driving carts, raising stands, selling tickets and dealing with troublemakers, but it isn’t long before the Hellfires open their doors for new recruits. Karla is one of the first in line, where her passion for the sport impresses head coach Krüber. She takes a spot on the reserves bench and never looks back.

    In 2483 Karla helped the Hellfires quit the backwater circuit and start hitting some of the bigger stadiums. She has proven herself a natural Blitzer, always leading the team from the front. When they came up against the Bloodskull Brutes, she coordinated the front offence to bring down both of the team’s Trolls in short order, and was awarded the position of team captain in recognition of her efforts.

    Karla von Kill is a Star Player who can be included in the following teams: Amazon, Halfling, Human, Norse. This highly detailed miniature makes a fantastic addition to any team that can afford to hire her.

    This is a complete, multipart resin kit which contains one Karla von Kill. She comes with a 32mm Blood Bowl base and her rules can be found in the Inaugural Blood Bowl Almanac.
- name: The Swift Twins
  productCode: prod4030174-99850999020
  sku: 99850999020
  productType: single_kit
  priceGbp: 37.5
  url: https://www.warhammer.com/en-GB/shop/The-Swift-Twins-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999020_TheSwiftTwins01.jpg
  status: current
  description: |-
    When it comes to Blood Bowl, the Swift twins have got it all: the looks, the charisma, the incredible outfits and, of course, the pure skill. There must have been something in the water where they grew up! Lucien (‘The Silver Bullet’, according to his official merchandise) was the first to rise to fame, as team captain and star Blitzer of the Galadrieth Gladiators. Under his leadership they won Blood Bowl X and Lucien himself amassed a serious haul of awards and plaudits. His brother Valen later followed in his footsteps, captaining the Elfheim Eagles and setting them up as one of the most promising new teams in the league. In recent years, tired of competing to top the leaderboards, the twins have begun hiring out their services as a pair.

    This multipart resin kit contains the components necessary to assemble The Swift Twins. These models are a pair of Star Players for High Elf, Dark Elf and Elven Union Blood Bowl teams – they refuse to work alone, only as a pair. This means they’re quite expensive, but worth the gold – you won’t find a finer Thrower and Blitzer. The rules for using the Swift Twins can be found in The Inaugural Blood Bowl Almanac.

    This kit comes as 12 components, and is supplied with 2 32mm Blood Bowl bases.
- name: Roxanna Darknail
  productCode: prod3960183-99850999017
  sku: 99850999017
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Roxanna-Darknail-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999017_RoxannaDarknail01.jpg
  status: current
  description: |-
    As one of the Darkside Cowboys’ most successful players, Roxanna makes such a show of spilling the blood of her foes that it is rare indeed when she does not end a match with her skin slick with the blood of fallen opponents. And the fans love it, especially the cruel-hearted Dark Elves and other, equally mean-spirited types. Some, however, claim that Roxanna uses her status and role as a means of retaining her youthful features and soft, pale skin, and indeed several cosmetics brands have sought to sponsor her in order to be associated with such a starkly beautiful player. Others whisper that as a Witch Elf, Roxanna is compelled to bathe in the blood of her enemies lest she age and wither into a stooped crone – none to have voiced such a suspicion, however, have lived to repeat it.

    This multipart resin kit contains the component necessary to assemble Roxanna Darknail, a Star Player for use in Elven Kingdoms League teams. She’s very much the archetypal Witch Elf – minimal armour, an enormous headdress, incredibly long hair (whose weighty plaits are not something you'd want to be whipped by…). She can be modelled either running with a ball or with a spiked fist on her left hand.

    This kit comes as 7 components, and is supplied with a 32mm Blood Bowl base.
- name: Dark Elf Assassins
  productCode: prod3960182-99850912001
  sku: 99850912001
  productType: single_kit
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Dark-Elf-Assassins-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550912001_DarkElfAssassins01.jpg
  status: current
  description: |-
    Trained in the arts of silent murder their whole lives, assassins are the means by which Druchii society turns and maintains its vitality. Many vacancies in various political or financial institutions have popped open to the benefit of a young aspirant at the point of an assassin's blade. The Dark Elves revel in this aspect of their society and take a perverse pride in the elegant manner by which progress is driven forwards.

    A great many assassins are attracted to Blood Bowl, and their skills are in high demand as the sudden removal from this mortal coil of a troublesome opposition player is always welcome with the players, whilst the fans are ever delighted to see a firm crowd favourite expire unexpectedly in a shower of arterial blood.

    This multi-part resin kit contains the components necessary to assemble 2 Dark Elf Assassins, for use in your Dark Elf Blood Bowl team. Both models are clad in the swishing finery assassins tend to gravitate toward – 1 is almost completely obscured by the cloak, hood and facemask atop their light armour, the other a little freer and looser, their cape billowing out behind them and their face visible beneath a metal helm. Both models clutch wicked-looking knives – of course, they’re assassins!

    This resin kit is supplied as 7 components, and includes 2 32mm Blood Bowl bases.
- name: Nurgle’s Rotters - Nurgle Blood Bowl Team
  productCode: prod3960176-99120901005
  sku: 99120901005
  ean: 5011921146208
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Nurgles-Rotters-Team-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120901002_BBNurglesRottersTeam01.jpg
  status: current
  description: |-
    The Rotters rose to fame long ago, having the distinction of being one of the earliest Chaos teams on the circuit to dedicate themselves to a single Chaos god – Grandfather Nurgle himself. Their patron was delighted, lavishing gifts and mutations upon his favoured followers. Today, despite numerous recent setbacks, the Rotters stand poised to once again spread their influence across the leagues and tournaments of the world, bringing Nurgle’s blessings to lands far and wide…

    This multi-part plastic kit contains the components necessary to assemble Nurgle’s Rotters, a particularly foul and dripsome Nurgle team for use in games of Blood Bowl. Appropriately putrid and ‘orrible, each player is mutated and pus-covered with exposed guts, claws and warts featuring heavily. The team consists of 4 Bloaters, 2 Pestigor and 6 Rotters.

    There are a host of extras in the kit – 2 turn markers, 2 double-sided score coins in the shape of Nurgle’s icon and 4 balls – 2 of these are being chomped upon by a cheeky Nurgling, and 2 have… something… emerging from them, all gribbly teeth and eldritch horror. Supplied with 12 32mm Blood Bowl bases, a 1,000,000 GP roster and a Nurgle transfer sheet.
- name: Eldril Sidewinder
  productCode: prod3930316-99850999014
  sku: 99850999014
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Eldril-Sidewinder-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999014_BBEldrilSidewinder01.jpg
  status: current
  description: |-
    Eldril Sidewinder has played Blood Bowl as long as most can remember, partly due to the incredibly long life span of his race, but mainly thanks to his sheer skill on the pitch. The secret of his success (and longevity) lies in his belonging to a singular class within Wood Elf and Sea Elf society – the Wardancers. These warriors combine athleticism and deadly skill, and are capable of dashing through a melee, weaving and leaping about their opponents while transfixing them with their grace such that foes are unable to react or even to think clearly. So beguiling are the movements of a skilled Wardancer that some claim it to be some manner of boon from the dark gods, a misconception that Sidewinder is ever keen to refute.

    Should you be looking high and low for a Star Player for your Dark Elf, Wood Elf, High Elf or Elven Union Blood Bowl team – you can stop looking because here, in the lithe shape of Eldril Sidewinder, is one! Bemohawked and lightly armoured – clad in a leather harness and shoulder protector, gauntlets, pants and running shoes (with some pretty hefty studs in the soles, no doubt ready to splinter the shins of all who stand before him), Edril is a prime example of the sort of cheekbones and jawline you only get from Elves. His rules are available in Blood Bowl Death Zone Season One.

    This resin kit is supplied with a 32mm Blood Bowl base.
- name: Josef Bugman, Coach & Star Player
  productCode: prod3870121-99850999018
  sku: 99850999018
  productType: single_kit
  priceGbp: 30.5
  url: https://www.warhammer.com/en-GB/shop/Bb-Josef-Bugman-Coach-Star-Player-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999018_BBJosephBugman01.jpg
  status: current
  description: |-
    The name Josef Bugman is as synonymous with Blood Bowl as Goblins are with being cheating gits. Pitches bear the Bugman’s B, while the bearded face of the master brewer grins down on players from massive billboards. When Bugman turns up at a match in person it is a spectacle to behold.

    Bugman is no mere spectator, however, as the stout brewer owns numerous teams, and coaches them from his private dugout as he knocks back beer after beer. For all his bluster, and the vast quantities of XXXXXX he consumes, Bugman is actually a fair coach, having a good eye for the ebb and flow of the game – the problem arises when things don’t go his team’s way, or he gets excessively drunk, or some combination of the two, and he staggers out onto the field to take matters into his own hands…

    This resin kit contains the components necessary to assemble 2 models – both of which depict the iconic, stout figure of Josef Bugman. The first is Josef as coach, pipe and rulebook in hand, watching over his team with a stern, furrowed look and one foot resting on a beer barrel – the second depicts Bugman in a rather less disciplined state (probably something to do with the beer barrel mentioned earlier…) – this is Josef Bugman, Star Player, holding a ball aloft in his left hand and a foaming stein of XXXXXX in the other.

    This kit is supplied as 9 components, and includes 2 32mm round Blood Bowl bases. Rules are included for fielding Josef Bugman as a part of Dwarf, Halfling, Norse, Human, Amazon and Ogre Blood Bowl teams.
- name: 'Elven Union Team: Elfheim Eagles'
  productCode: prod3690191-99120999014
  sku: 99120999014
  ean: 5011921146246
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Elfheim-Eagles-Blood-Bowl-Team-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999003_ElfheimEaglesTeam01.jpg
  status: current
  description: |-
    The Elfheim Eagles are notable for eschewing the fancy outfits and extravagant parties of Elven teams past in favour of drills, training sessions and even more drills. The fans may have disapproved at first, but after the Elfheim Eagles nudged out Nurgle’s Rotters to win Blood Bowl XX they became known as one of the finest passing play teams to ever grace the pitch.

    This multi-part plastic kit contains the components needed to assemble The Elfheim Eagles, an Elven Union Blood Bowl team. The team consists of 6 Linemen (4 of which are actually Linewomen), 2 Blitzers, 2 Throwers and 2 Catchers, each of whom are as impressively-cheekboned and beautiful as you might expect from an Elven team. The heads and shoulder pads are interchangeable between the miniatures, meaning your team can look unique.

    There are a host of extras in the kit – 2 turn markers, 2 double-sided score coins and 6 balls, 4 of which are encrusted with opulent gemstones. Supplied with 12 32mm Blood Bowl bases and an Elven Union transfer sheet.
- name: Glart Smashrip
  productCode: prod3530366-99850906003
  sku: 99850906003
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Glart-Smashrip-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550906003_GlartSmashrip01.jpg
  status: current
  description: |-
    2472: An impressively obese Smashrip attends the tryouts for the Warpfire Wanderers, but is laughed out of the line-up. His chances aren't improved when he eats the team’s assistant coach to prove a point, but news travels fast, and it isn't long before the Skavenblight Scramblers scout him out and offer him a place on their roster. Eventually, after some unpleasantness including a lifetime ban for eating a referee (which was eventually overturned) he became a free agent, bombarded with offers...

    Field the gloriously portly Glart Smashrip as a Star Player in your 'Favoured of...’ or Underworld Challenge teams by picking up this resin kit. The first thing you'll notice about Glart is his size – there’s no hiding that this is a Skaven of impressive girth, who barely fits into the ramshackle armour that has been attached to his bulk with creaking straps. He isn’t bothering with head protection as there aren't any helmets that would fit and, honestly, they just get in the way of eating stuff. Luckily, someone has found a swathe of cloth large enough to hide most of his unmentionables, and he features the usual spiky bits on his shoulders and knee pads.

    The resin kit comes as 8 components with a 32mm round Blood Bowl base.
- name: Goblin Secret Weapons
  productCode: prod3530242-99850999007
  sku: 99850999007
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Goblin-secret-weapons-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999007_BBGoblinSecretWeapons01.jpg
  status: current
  description: |-
    There is a long, messy history of Blood Bowl teams sneaking weapons onto the pitch, but few do it with such regularity (not to mention unapologetic brazenness) as Goblins. With very few exceptions, Goblin teams tend to have ready access to a well-stocked arsenal of unusual equipment at their disposal, most of which is hilariously deadly. Some weapons (like the ball and chain) have their roots in wider Goblin culture, while others (such as the fan-favourite chainsaw) have long been a part of Blood Bowl tradition, no matter what the refs say. As for the bombs? Well, Goblins are nothing if not innovative, especially when it comes to thinking up outlandish ways to tip the odds in their favour…

    Give yourself a sneaky fighting chance by adding these unsportsmanlike Secret Weapons to your Goblin team – 3 in total, 1 Bomma, 1 Looney and 1 Fanatic. Each wear quite a lot of armour, hoping to delay their inevitable smearing across the pitch. The Fanatic wields an evil-looking ball and chain, the Looney strides purposefully forward with a small yet perfectly formed chainsaw and the Bomma… well, he’s carrying a bomb larger than his head, emitting a plume of noxious smoke as the fuse edges dangerously close to something of a violent exothermic reaction. If you’re going to cheat, bombs are a pretty good way to do it!

    These 3 resin miniatures come as 12 components, supplied with 3 32mm Blood Bowl bases. Their rules can be found in Death Zone Season 2.
- name: Grombrindal And The Black Gobbo
  productCode: prod3510366-99850999010
  sku: 99850999010
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Blood-bowl-grombrindal-the-black-gobbo-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999010_GrombrindolBlackGobbo01.jpg
  status: current
  description: |-
    Grombrindal’s reputation is almost mythological. Tales abound of his shrewd tactical advice on the field of battle; on the Blood Bowl pitch this translates to a mastery of team strategies and the ability to draw the very best out of the players around him.

    The Black Gobbo is legendarily devious, as evidenced by his countless elaborate schemes to undermine the White Dwarf. Before he even thinks about setting foot on the pitch, it’s a given that he will have already established a web of bribery, hostage taking and other sneakiness that ensures the cooperation of the match officials.

    Legendary heroes, this Star Player duo can be used in games of Blood Bowl as long as one player has a Dwarf, Halfling, Human or Norse team and the other has a Chaos Renegade, Goblin, Orc or Underworld Denizen team. They’re not hired in the same way as other Star Players – things like contract negotiations, legal issues or basic civility are pretty alien to them, honestly – and both must appear in your game.

    Grombrindal is looking in fine form: his miniature features a splendid shock of white hair and a magnificent beard covering a purposeful scowl, with plenty of Dwarven iconography appearing on his kit. The Black Gobbo is appropriately robed and behatted, with sneakily studded armour beneath the robes – and a bomb. He’s clutching a bomb. That probably isn’t going to end well.

    These resin miniatures come as 8 components, and are supplied with 2 32mm Blood Bowl bases.
- name: Grim Ironjaw
  productCode: prod3510365-99850999009
  sku: 99850999009
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-bowl-grim-ironjaw-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999009_GrimIronjaw01.jpg
  status: current
  description: |-
    The Slayer Cult is a strange but well-documented aspect of life for a Dwarf, seen as the only option for those who have committed a shameful act. Shedding their worldly possessions and symbolically greasing their hair with pig fat, these contrite Dwarfs seek only a pure death in combat against the most terrifying foes imaginable. Traditionally, they had sought their fate on the battlefield, but all of that changed when Grim Ironjaw joined the Black Mountain Blades.

    Following a successful first season, Ironjaw spent several years moving from team to team, always striving to move up in the league rankings. After all, as he saw it, the most glorious death to be found on the pitch must surely be at the Blood Bowl itself, facing off against one of the NAF’s most accomplished teams. In the years since he has yet to compete in the fabled tournament, but with each passing season, his chances are greater and his legend grows ever more impressive. Who knows – maybe this is his year!

    Field Grim Ironjaw as a Star Player in your Halfling Thimble Cup, Old World Classic, and Worlds Edge Superleague teams with this resin kit. He’s a particularly stocky example of Dwarf strength, with bulging muscles beneath a frankly glorious beard featuring plaited-in details (skulls! He has skulls in his beard!) His mohawk is tall, and his fist clutches a terrifying-looking blade – truly, he’s an all-crushing Slayer and a half.

    This resin miniature comes as 5 components, and is supplied with a 32mm Blood Bowl base.
- name: Hakflem Skuttlespike
  productCode: prod3500131-99850906002
  sku: 99850906002
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Hakflem-Skuttlespike-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550906002_HakflemSkuttlespike01.jpg
  status: current
  description: |-
    Hakflem Skuttlespike, the result of decades of unpleasant Skaven experiments, a player upon whose shoulders Clan Rigens immediately placed the future of the Skaven game of Blood Bowl. A petty, jealous and vicious example of Skaven cunning, he ensured that no other player would be created to rival him by killing any Clan Rigens experiment or creation that looked like a potential equal.

    Now, given the sheer amount of time spent ensuring the demise of any Skaven who look able to rival him, you might think that Hakflem Skuttlespike neglects his duties on the hallowed Blood Bowl pitch. Not so! With this bizarre, two-headed resin kit, you can field him as a Star Player in any 'Favoured of...’ or Underworld Challenge team you choose. Furious, muscular and bedecked with spiky bits, he is posed in an appropriately aggressive manner, both of his sharply toothed maws likely shrieking unintelligible threats at whichever poor opponent is in the way. Each of his four (count ‘em!) hands is ready to kill, with metal gloves and a spiked ball among the turmoil. There’s even space for some Skaven symbols on his armour.

    This resin kit comprises 10 components, and includes 2 32mm round bases, one featuring a hole to slot a ball into, indicating possession of the ball in your games of Blood Bowl.
- name: Dwarf Deathroller
  productCode: prod3480210-99860905001
  sku: 99860905001
  productType: single_kit
  priceGbp: 57.5
  url: https://www.warhammer.com/en-GB/shop/Dwarf-Deathroller
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560905001_Deathroller01.jpg
  status: current
  description: |-
    One of the most spectacular, if not the most efficient, secret weapons fielded by any Blood Bowl team is the Dwarf Deathroller. It was first used by the Dwarf Warhammerers back in ’64 and has been a regular part of many a Dwarf team's arsenal ever since. The Deathroller’s continuing popularity is no doubt due to the fact that it’s so easily improvised from the rollers found at the more sophisticated and well-kept grass-laid stadiums. Referees have done their best to keep Deathrollers off the playing field, and quite a few have ended up as flat as a pancake as a result!

    Should you be looking for an especially eye-catching and killsome Secret Weapon for your Dwarf Blood Bowl teams, this resin kit is the machine for you. Covered in appropriately boisterous details, from the goblin being mashed underfoot to the dwarf pilot cheerfully brandishing a foaming tankard of ale (we do not condone drinking and piloting anything, especially powerful death machinery). There are spikes, cogs, and an evil-looking set of lawnmower blades and even some dwarf iconography!

    This kit comprises 22 components, and includes a 32mm round base.
- name: Blood Bowl Troll
  productCode: prod3480198-99120999013
  sku: 99120999013
  ean: 5011921146192
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 21.5
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-Troll
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999002_BloodBowlTroll01.jpg
  status: current
  description: |-
    Do you want to add a fearsome and slightly absurd Troll to your Orcish Blood Bowl team? Or maybe a Goblin team? You’ve come to the right place. This excellent multi-part plastic kit contains the parts you need to assemble a rather large Troll (look at him – he’s wearing a human’s helmet as a knee pad, for Nuffle’s sake), winding up to fling a Goblin into the end zone.

    Supplied with a 32mm Blood Bowl round base, featuring a hole to slot the ball into when he has possession.
- name: 'Dwarf Team: The Dwarf Giants'
  productCode: prod3430144-99120905002
  sku: 99120905002
  ean: 5011921154920
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/Blood-Bowl-The-Dwarf-Giants
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120905001_DwarfGiants01.jpg
  status: current
  description: |-
    The Dwarf Giants are an old team with a very long and distinguished history. They were one of the original Blood Bowl sects, and have been present for every major development in the game’s history. In more recent times they have consolidated their talents and re-launched themselves as major players in the modern Blood Bowl leagues.

    Field the Dwarf Giants Blood Bowl team on the pitch with this set of 12 plastic miniatures! In the box you’ll find 2 Troll Slayers, 2 Blitzers, 2 Runners and 6 Linemen, with alternative heads for the Troll Slayer and Blitzer, as well as 6 Dwarf balls, 2 double-sided score coins and 2 turn counters.

    There’s also a decal sheet featuring symbols for the Dwarf Giants, and a 1,000,000 gp roster allowing a coach to use the team straight out of the box, and 12 32mm bases.

    Full rules for putting together your own Dwarf teams can be found in *Death Zone Season 1*.
- name: The Mighty Zug
  productCode: prod3420159-99850999004
  sku: 99850999004
  productType: single_kit
  priceGbp: 25.5
  url: https://www.warhammer.com/en-GB/shop/The-Mighty-Zug
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550999004_MightyZug01.jpg
  status: current
  description: |-
    Gifted with not only hefty bulk, strength and power but the ability to use them properly, The Mighty Zug is an expert at incapacitating opponents with a single swipe of his gigantic paw. A firm favourite with the fans despite (or because of) his brutish, ugly and stupid demeanour, he’s the Star Player of choice for Blood Bowl coaches who just want to get the job done. Nothing fancy – just a trail of smashed faces leading to victory.

    Add The Mighty Zug as a Star Player to any Halfling Thimble Cup, Lustrian Superleague, and Old World Classic teams with this resin kit. He can be built clutching the ball in his left arm, or modelled without; all the better for smashing faces in with a swipe of his enormous forearm. On the pitch, his plays mostly involve moving forward with the unstoppable grace of an angry continent.

    This resin kit comes in 7 components, with a 32mm round base and a 32mm round Blood Bowl base, featuring a slot for the ball.
- name: Ogre Team Booster
  productCode: P-240936-99850913002
  sku: 99850913002
  productType: single_kit
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-ogre-team-booster-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99850913002_OgreTeamBooster1.jpg
  status: current
  description: |-
    Ogres are among the least subtle of all Blood Bowl teams. They make up for a lack of tactical nuance by being really, really big. Though few in number, the Ogres are more than capable of bashing through their opposition.

    **Double Your Stomping Power**

    This multipart resin kit builds 2 Ogres and 1 Gnoblar Lineman for your Ogre teams in games of Blood Bowl. The Ogres can be used to represent either Ogre Blockers or Ogre Runt Punters, and have interchangeable heads and shoulder pads, making them easy to customise. The Gnoblar can be seen holding the severed limb of an unfortunate victim, perhaps offering it as a mid-match snack for one of their large teammates.

    **Contents:**
    – 16 resin components
    – 2 Citadel 32mm Round Bases
    – 1 Citadel 25mm Round Base

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Citadel Colour paints

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: 'Blood Bowl: Official Game Tokens'
  productCode: P-231944-99120999021
  sku: 99120999021
  productType: single_kit
  priceGbp: 15.5
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-official-game-tokens-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120999021_BloodBowlSeason3Tokens1.jpg
  status: current
  description: |-
    The game of Blood Bowl is chaotic and violent – sometimes it's challenging to keep track of what's going on, from players knocked prone to those who've made bold blitz plays.

    This set of plastic tokens makes it a breeze to keep track of status effects during your games of Blood Bowl. You'll find helpful markers for a variety of events, from Rooted treemen to players who have had their eyes gouged. In addition to these, there's also a double-sided token to keep track of the ball, with an indent so it can fit under a player's base, and a double-sided thrown player target and bomb token. Streamline your experience with this set of handy gaming aids.

    **This set includes 37 tokens:**
    – 14x Stunned/Prone tokens
    – 1x Blitz token
    – 6x Distracted tokens
    – 5x Eye Gouge tokens
    – 4x Chomped tokens
    – 2x Rooted tokens
    – 2x Dodgy Snack tokens
    – 1x Thrown Player/Bomb token
    – 1x Ball token (with possession and loose ball sides)
    – 1x Blood Bowl ball

    This kit contains 37 plastic components. These tokens are supplied unpainted – we recommend using Citadel Colour paints.
- name: 'Tomb Kings Blood Bowl Team: The Nehekhara Nightmares'
  productCode: P-231936-99120917001
  sku: 99120917001
  ean: 5011921245451
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 34
  url: https://www.warhammer.com/en-GB/shop/blood-bowl-tomb-kings-team-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120917001_ENGBloodBowlSeason3CoreGame3.jpg
  status: current
  description: |-
    The Nehekhara Nightmares are verifiably one of the oldest teams in existence, having played the game in life before their empire fell. They found the game had changed when they were finally freed from their catacombs, with young races using new tactics. It took the team a while to adapt, but their climb back to the top has been a historic one. It helps that they can call on the once-star players of their past to return again and again.

    **Show These Young Upstarts How it's Done**

    Much like the passage of time, Tomb Kings teams excel at relentlessly grinding down everything in their path, making a slow but calculated march towards the opponent’s End Zone. These teams don't rely on dodging or intricate plays – instead, they favour a steady advance of bone–crunching violence.

    **What’s in the Kit?**
    This multipart plastic kit builds a Tomb Kings team for use in games of Blood Bowl. The Linemen are the backbone of the team, while the Blitzers make use of their speed to perform headlong charges. Tomb Guardians are brutal bruisers, and Throwers are vital for securing the ball.

    **The team of 14 miniatures is comprised of:**
    – 2x Tomb Kings Blitzers
    – 2x Tomb Kings Throwers
    – 4x Tomb Guardians
    – 6x Skeleton Linemen

    Two of the Tomb Guardians have two head options each, while the other two each have two right arm options and two head options. The Skeleton Linemen have six interchangeable heads in three designs.

    **This kit also includes:**
    – 2x Canopic Jar balls
    – 2x Sphynx balls
    – 2x Double-sided coins
    – 2x Turn and Re-roll markers

    This kit is supplied with a Tomb Kings Blood Bowl Team Transfer Sheet, featuring 298 high-quality waterslide transfers. These include Tomb Kings icons, decorative elements, role identifications, and numbers for you to decorate your miniatures.

    **Contents:**
    – 114 Plastic components
    – 14x Citadel 32mm Round Bases
    – 1x Tomb Kings Blood Bowl Team Transfer Sheet
    – 1x Construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Citadel Plastic Glue
    – Citadel Colour paints
- name: 'Bretonnian Blood Bowl Team: The Brionne Barons'
