    This kit collects four Order-themed warbands for Warhammer Underworlds. All the miniatures are push-fit, moulded in coloured plastic, and include scenic bases on the frames so you can start playing quickly. You'll also find warscroll cards and fighter cards for each warband. The Shadeborn are an aggressive Strike warband, Xandire's Truthseekers are a versatile Flex warband, The Starblood Stalkers are a tough Take and Hold warband, and Elathain's Soulraid features the Mastery playstyle, which rewards players for careful management.

    **This set includes the following 19 miniatures:**
    – **4x Xandire's Truthseekers** – Calthia Xandire, Dhoraz, Luxa, Taros
    – **4x The Shadeborn** – Slythael, Drusylla, Sylarc, Valyssa
    – **6x The Starblood Stalkers** – Kixi-Taka, Klaq-Trok, Huachi, Xepic, Tok, Otapatl
    – **5x Elathain's Soulraid** – Elathain, Fuirann, Tammael, Duinclaw, Spinefin

    **The box also includes:**
    – 19x double-sided fighter cards
    – 16x double-sided warscroll cards \(in English, French, German, Spanish, Italian, Chinese, and Japanese\)

    The double-sided fighter cards measure 63mm x 88mm, and the double-sided warscroll cards measure 105mm x 148mm.

    This kit contains 97 plastic components, including integrated scenic bases. These push-fit miniatures can be assembled without glue and are supplied unpainted – we recommend using Citadel Colour paints.
