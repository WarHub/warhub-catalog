  url: https://www.warhammer.com/en-GB/shop/kill-team-wolf-scouts-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120101457_KTWolfScouts01.jpg
  status: current
  description: |-
    Wolf Scouts are a wild pack that's capable of operating far from the rest of their battle-brothers. Chosen for their maverick nature, every member of a Wolf Scouts kill team has their own equipment and loadout, and their own saga to write.

    This multipart plastic kit builds six Wolf Scouts operatives. These miniatures can be used as hard-bitten Wolf Scouts warriors in games of Kill Team, or fielded in a Space Wolves army in games of Warhammer 40,000. The kit includes options, accessories, and different heads to customise your kill team, plus components to build specialists like the shamanistic Fangbearer, instinctive Hunter, psychic Rune Priest Skjald, and more.

    Inside the box, you will also find a sheet of 34 double-sided Wolf Scouts tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This kit is supplied with 1x Space Wolves Transfer Sheet, containing 419 high-quality waterslide transfers. These include symbols for the Blackmanes, the Champions of Fenris, the Bloodmaws, the Spirit Wolves, and the Deathwolves Great Companies, along with vehicle and saga markings.

    This kit comprises 115 plastic components, 5x Citadel 32mm Round Bases, and 1x Citadel 60mm by 35mm Oval Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    You will need a copy of the *Kill Team: Core Book* and the Wolf Scouts Datacards, both available separately, to make full use of the contents of this box.

    Rules for using these miniatures in your games of Warhammer 40,000 can be downloaded for free from the Warhammer Community website.
