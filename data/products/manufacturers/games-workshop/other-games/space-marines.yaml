  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120108119_KTDeathwatch01.jpg
  status: current
  description: |-
    The Deathwatch are a Space Marine Chapter unlike any other – tasked with ruthlessly hunting down and destroying the xenos menace at the bidding of the Inquisition. Composed of individuals from almost every other Chapter, they pool their knowledge and share what they've learned to enhance their already formidable fighting prowess.

    This multipart plastic kit builds five Deathwatch miniatures. These miniatures can be used as versatile Deathwatch operatives in games of Kill Team, or fielded in Space Marine armies in games of Warhammer 40,000. The flexible kit includes weapon options and accessories to customise each miniature, plus components to build specialists like the duelling Aegis, brutal Demolisher, and stealthy Headtaker.

    Inside the box, you will also find a sheet of 39 double-sided Deathwatch tokens, so you can easily keep track of your weapons loadout and in-game effects in the heat of battle.

    This kit comprises 146 plastic components, 1x Citadel 40mm Round Base, and 4x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
