    The Malcador Infernus and Valdor Tank Hunter are both variants of the ubiquitous Malcador tank, using its resilient and mobile chassis to carry specialised heavy weaponry. The raw power of the Malcador Infernus is almost inescapable for its foes, as it shoots terrifying jets of all-consuming flame for extended periods. Conversely, the Valdor Tank Hunter focuses on hardened targets, living up to its name by unleashing its neutron beam laser on armoured vehicles to devastating effect.

    This multipart plastic kit builds four epic scale Solar Auxilia heavy tanks, built around the formidable Malcador chassis – two Malcador Infernus flame tanks, and two Valdor Tank Hunters. The Malcador Infernus is mounted with an inferno gun for burning infantry out of dense cover, and trailed by a separate fuel tanker, while the Valdor Tank Hunter is armed with a powerful neutron beam laser. Each of these heavy tanks can be built with or without a tank commander, and comes with a choice of autocannon or lascannon sponsons.

    **The set includes:**

