    This multipart plastic kit builds 10 epic scale Legiones Astartes Rhinos, rugged transports that carry Space Marine infantry across the battlefields of Legions Imperialis. Each comes with pintle-mounted twin-linked bolters as standard, and the kit includes two pintle-mounted havoc launchers and four multi-meltas to provide greater fire support. You’ll also find cosmetic build options to help customise your vehicles, including dozer blades, hunter-killer missiles, and split or paired twin-linked bolters.

