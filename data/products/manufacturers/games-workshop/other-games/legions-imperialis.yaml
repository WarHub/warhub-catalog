  description: |-
    The Mastodon is one of the heaviest assault transports in the arsenal of the Legiones Astartes and is reserved for use against the most heavily fortified positions. Several times the size of a Land Raider, it can convey over forty Space Marines through the most perilous of battlefields and protect them from incoming fire. The Mastodon’s primary role is to deliver these troops directly into the breach created with the siege melta array mounted on its armoured prow. Few fortifications can withstand this fearsome weapon, the Legionaries passing through the melted stone and steel directly into the heart of the enemy position.

    This multipart plastic kit builds two Mastodon Super-heavy Assault Transports, hulking vehicles for your Legiones Astartes armies in games of Legions Imperialis. Their Void Shields make them the pinnacle of infantry delivery, allowing them to withstand punishing firepower, as your opponent desperately tries to bring them down before they unleash their deadly cargo – sending a stream of elite infantry directly to where the fighting is fiercest. Their siege melta array is designed to destroy enemy bunkers, but is just as adept at taking down Knights and even Titans. The Mastodon features a skyreaper battery to keep enemy flyers at bay, plus sponson-mounted heavy flamers to clear out infantry. The kit also includes a choice of sponson-mounted heavy bolters or lascannons, and there are two top hatches, one of which can be assembled open with a tank commander surveying the battlefield.

