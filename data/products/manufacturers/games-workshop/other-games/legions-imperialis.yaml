    This multipart resin and plastic kit builds two epic scale Marauder Pathfinders. Each sports a nose-mounted heavy bolter and a dorsal heavy bolter turret, with an array of augury equipment scanning the battlefield from their underside. The kit also includes an array of hellstrike missiles and wing bombs, which can be mounted under the wings.

