    – 1x sponson-mounted autocannon
    – 1x sponson-mounted lascannon
    – 1x Solar Auxilia Vehicle Transfer Sheet

    This kit comprises 124 plastic components and a transfer sheet. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using Malcador Infernus Tanks and Valdor Tank Hunters can be found in *Warhammer: The Horus Heresy Legions Imperialis – The Great Slaughter*, and a copy of *Warhammer: The Horus Heresy – Legions Imperialis Rulebook* is required to use these miniatures. Both of these books are available separately.
