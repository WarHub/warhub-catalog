  status: current
  description: |-
    The Warlord-Sinister is a thing that should not be, the fusion of a mighty god-machine with psychic technologies both designed and forbidden to all others by the Emperor himself. Fear is the constant companion of this terrible beast, which projects nightmarish psychic phenomena across the battlefield. Each Warlord-Sinister is equipped with a massive psi-cannon known as the Sinistramanus Tenebrae – the Left Hand of Darkness. More akin to a weaponised warp engine than any conventional armament, its targets are cast into the warp molecule by molecule.

    This multipart plastic and resin kit builds one epic scale Warlord-Sinister Psi-Titan. An arcane variant of the Warlord Titan, this god-engine uses its spinal Ciricrux Anima to channel devastating psychic energies, while its signature weapon, the Sinistramanus Tenebrae, unleashes bolts of shadow that hurl its enemies into depths of the warp.

    In addition to these eldritch armaments, the Warlord-Sinister features a set of carapace-mounted laser blasters, two torso-mounted mauler bolt cannons, a pair of rear-mounted lascannon turrets, and an additional arm weapon – the kit includes a choice of sunfury plasma annihilator or Arioch power claw.

    This kit offers plenty of ways to customise your Titan. In addition to the ominous blank-faced resin head and psychic machinery, you'll find paired pauldrons – one with sculpted Great Crusade designs, and one left blank. The kit features joints at various points, allowing you to pose your Titan at its head, knees, waist, and more. Many of its weapons are also adjustable, so you can aim them appropriately.

    This model can be used in games of Legions Imperialis, as well as games of Adeptus Titanicus using the included Adeptus Titanicus Command Terminal.

    **The set includes:**
    - 1x Warlord Battle Titan
    - 1x set of Warlord-Sinister Psi-Titan resin upgrades, including a head and Sinistramanus Tenebrae arm weapon
    - 1x sunfury plasma annihilator
    - 1x Arioch power claw
    - 1x set of paired laser blasters
    - 1x Legions Imperialis 120mm Oval Base
    - 1x Adeptus Titanicus Warlord Titan Transfer Sheet
    - 1x Warlord-Sinister Psi-Titan Command Terminal
    - 8x Warlord-Sinister Psi-Titan Weapon Cards

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

