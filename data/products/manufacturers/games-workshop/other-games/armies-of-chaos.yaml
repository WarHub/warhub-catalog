  productCode: P-189757-99120102182
  priceGbp: 47
  url: https://www.warhammer.com/en-GB/shop/kill-team-nemesis-claw-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120102182_KTNemesisClaw1.jpg
  description: |-
    A Nemesis Claw is made up of the most psychotic and savage of Chaos Spaces Marines from the twisted Night Lords Legion. Whether picking their victims off from range or eviscerating and flensing them at close quarters, they are diabolical foes.

    This multipart plastic kit allows you to build 10 Nemesis Claw Chaos Space Marines – twisted and sadistic killers from the Night Lords Legion. These miniatures can be used as Nemesis Claw kill team operatives in games of Kill Team, or fielded with Chaos Space Marines armies in games of Warhammer 40,000. This kit includes various weapons, heads, and accessories, allowing you to assemble a unique squad and build some as specialists for your kill team – such as a cruel Fearmonger, grotesque Ventrilokar, and a Skinthief wielding a vicious Nostraman chainglaive.

    Inside the box you will also find a set of 39 Nemesis Claw tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This set comprises 196 plastic components and is supplied with 10x Citadel 32mm Round Bases. This set also includes 1x Chaos Space Marines Transfer Sheet containing 364 high-quality waterslide transfers for you to further decorate your models.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
