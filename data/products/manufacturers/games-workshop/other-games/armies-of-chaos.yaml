  description: |-
    Myphitic Blight-haulers use their all-terrain mobility and heavy armaments to hunt down the enemy’s tanks and provide fire support even in the most dangerous environments. Should the enemy get too close, these Daemon Engines pounce with fanged maws and sprays of bile.

    This multipart plastic kit builds one Myphitic Blight-hauler, a corrupted Daemon Engine for your Death Guard armies in games of Warhammer 40,000. These swift and lightweight vehicles are an unpleasant combination of machine and putrid rotting meat. Armed with a gnashing maw, multi-melta, missile launcher, and horrific bile spurted from the depths of its gastric boilers, it's ideal for dealing with enemy vehicles.

    This kit contains 13 plastic components, and 1x Citadel 80mm Round Hex Hole Base. This push-fit miniature can be assembled without glue and is supplied unpainted – we recommend using Citadel Colour paints.
