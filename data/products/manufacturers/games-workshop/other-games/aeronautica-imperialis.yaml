  description: |-
    The Legio Custodes hold the most sacred of duties, for they are the Emperor’s own bodyguards, protecting the Imperial Palace on Terra. As befitting their importance, the Custodes have access to numerous examples of esoteric technology, including deadly armoured gunships that carry them into battle. The Ares Gunship is a terror weapon dating back to the Unification Wars - protected under the shadow of its Eclipse shield, it soars over enemy lines and lays waste to the monuments and edifices the foe holds most dear. A handful of demonstrations of the Ares’ power is enough to quell all but the most stubborn of foes; those who do not relent are torn apart in a storm of fire.

    The Ares Gunship is easily one of the most powerful aircraft in the war-torn skies of the Horus Heresy. While classed as a fighter, its sturdy hull and exceptionally potent mid-range weaponry go far beyond what other aircraft of its class are capable of - while its optional firebomb clusters even allow the Ares to flex into the role of a heavy bomber. Adding one or two of these superlative aircraft to your Legiones Astartes or Divisio Aeronautica roster will send your opponents scrambling to stay out of their firing lines, allowing you to disrupt their plans.

    This 18-part resin kit builds one Legio Custodes Ares Gunship, equipped with a heavy blaze cannon and magna-blaze cannon. Also included is 1x Aeronautica Base and an Ares Gunship Aircraft Card. This miniature is supplied unpainted and requires assembly - we recommend using Citadel paints.

    Rules for the Ares Gunship can be found in the included Aircraft Card.
