  description: |-
    The Tomb Worlds of the Necrons are eternal mausoleums composed of strange xenos machinery. Within their labyrinthine corridors, you'll find teleport pads, deactivated Necron warriors, and a great many sarcophagi containing dormant Necrons and their constructs.

    This multipart plastic kit builds 25 modular terrain pieces for use in your games of Kill Team. They have been designed to accommodate a dizzying variety of configurations. Together, they represent the twisting corridors of a Necron Tomb World – ideal for playing close-quarters games of Kill Team. You'll also find a double-sided game board measuring 606mm by 703mm, the standard size for a game of Kill Team.

    **Contents:**
    – 1x Double-sided Tomb World game board
    – 2x Short walls with hatchway and pillars
    – 2x Long walls with hatchway and pillars
    – 2x Long walls with hatchway
    – 2x Long walls with breach point
    – 2x Short walls with breach point
    – 2x Short walls
    – 2x Short walls with pillars
    – 2x Long walls with pillars
    – 16x Pillars
    – 2x Wall ends
    – 1x Sarcophagus
    – 2x Teleport pads
    – 4x Debris pieces

    This kit comprises 74 plastic components. These terrain pieces require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using this Killzone in your games of Kill Team can be downloaded for free from the Warhammer Community website.
