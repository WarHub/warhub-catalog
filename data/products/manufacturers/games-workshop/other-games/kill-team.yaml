    In the swirl of combat between elite operatives, any advantage makes the difference between glorious success and ignominious failure. A perfectly-timed pop of concealing smoke, a piece of heavy cover that deflects an enemy barrage, or a handy ladder that allows you to get the drop on a well-dug-in sniper – a savvy kill team will adapt to changing battlefield conditions to seize the initiative.

    This multipart plastic kit builds a crucial set of accessories to enhance your games with universal equipment available to every kill team. From advanced comms and razor wire, to caches of ammo, barricades, grenades, and even ladders, these tools can give a vital edge over your foes. Every piece of equipment you give to your operatives gives you new tactical options to exploit for a surprising advantage.

    **This kit contains 30 accessories including:**
    - 2x Ladders
    - 2x Collapsed Ladders
    - 2x Light Barricades
    - 2x Heavy Barricades
    - 2x Razor Wires
    - 2x Smoke Grenades
    - 2x Smoke Grenades –activated
    - 2x Portable Barricades
    - 2x Mines
    - 2x Comms Devices
    - 2x Ammo Caches
    - 2x Krak Grenades
    - 2x Stun Grenades
    - 2x Frag Grenades
    - 1x 6" Range Marker
    - 1x 3" Range Marker

    This set comprises 30 plastic components and is supplied unpainted – we recommend using Citadel Colour paints.
