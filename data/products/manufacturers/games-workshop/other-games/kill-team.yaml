  description: |-
    The *Gallowdark* is a derelict space hulk – a conglomeration of ships pressed together over many centuries, filled with buckled corridors, bulkheads, and jagged metal. Filled with technology, relics, or the mysteries of the past, small teams of warriors will often cross paths with enemy operatives in the twisted corridors.

    This set includes a game board, and a multipart plastic kit that builds 34 pieces of terrain to create Killzone: Gallowdark to enhance your games of Kill Team. This Killzone features a claustrophobic twist of corridors and small rooms that restrict lines of sight, encouraging close, tense games. Each side of the game board features different art – combined with modular corridors and pillars, so you'll never have to fight on the same table twice.

    **This kit contains:**
    - 1x 606mm x 703mm double-sided game board
    - 16x Pillars
    - 4x Wall Ends
    - 4x Short Walls with Hatchway and Pillars
    - 2x Short Walls
    - 2x Short Walls with Hatchway
    - 2x Long Walls with Pillars
    - 2x Long Walls with Hatchway
    - 2x Long Walls

    This kit contains 108 plastic components. These miniatures are supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
