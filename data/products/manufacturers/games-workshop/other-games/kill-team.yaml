  description: |-
    The toxic seas of Bheta-Decima are deadly, but they contain the remains of a vital facility containing relics and technology that could turn the tide of war. Teams of elite operatives clash over the exposed gantries, contending with the hungry depths as much as the enemy.

    This set includes a game board, and a multipart plastic kit that builds nine pieces of terrain to create Killzone: Beta-Decima to enhance your games of Kill Team. Featuring highly restricted movement, multiple vertical planes, and open lines of sight, this brutal Killzone will test you in ways no other will. Each side of the game board gives you a different basic setup – combined with the modular Sector Mechanicus terrain, you'll never have to fight on the same table twice.

    **This kit contains:**
    - 1x 30" by 22" double-sided game board
    - 1x Ferratonic Furnace
    - 2x Large Gantries
    - 2x Small Gantries
    - 4x Medium Gantries

    This kit contains 76 plastic components. These miniatures are supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
