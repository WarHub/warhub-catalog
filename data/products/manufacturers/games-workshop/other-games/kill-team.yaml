    This multipart plastic kit builds a crucial set of accessories to enhance your games with universal equipment available to every kill team. From advanced comms and razor wire, to caches of ammo, barricades, grenades, and even ladders, these tools can give a vital edge over your foes. Every piece of equipment you give to your operatives gives you new tactical options to exploit for a surprising advantage.

