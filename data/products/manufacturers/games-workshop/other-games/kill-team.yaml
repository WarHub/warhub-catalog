  description: |-
    Ambulls are monstrous beasts that lurk in subterranean depths across the galaxy. They – or the remains of their victims – have been found on countless worlds, as well as aboard voidships and orbital stations. Feared throughout the Imperium and beyond, they are recognised by spacefaring species as both an utterly lethal and sinisterly invasive threat.

    **A Hulking Subterranean Nemesis Operative**

    This multipart plastic kit builds 1 Ambull and 2 Borewyrm Infestations, non-player operatives for your games of Kill Team. These hulking xenos are incredibly dangerous, often requiring a concerted effort from a dedicated hunting team to take down. Use them as a Nemesis Operative for a dynamic challenge in either cooperative or solo play, or add them to head-to-head games to spice things up. You'll find full rules and an Ambull Mission Pack in the *Kill Team: Nemesis Operatives* book, available separately.

    **Contents:**
    – 10 plastic components
    – 1 Citadel 50mm Round Hex-Hole Base
    – 2 Citadel 25mm Round Slotta Bases
    – 1 construction guide

    **These push-fit miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour paints

    You'll need a copy of the *Kill Team: Core Book*, and *Kill Team: Nemesis Operatives*, which are both available separately, to make full use of these miniatures.
