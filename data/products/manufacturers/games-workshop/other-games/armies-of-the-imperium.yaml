  description: |-
    Battleclades are teams of combat servitors led by a Technoarcheologist, assembled to aid them in dangerous but crucial missions. Their augmentations are specialised and of the highest quality, and their weapons systems and auxiliary systems prepare them to take on anything the enemy can throw at them. They will stop at nothing to complete the mission – it’s what they were made for.

    This multipart plastic kit builds 10 Battleclade miniatures which can be used as efficient and specialised operatives in games of Kill Team, or fielded in an Adeptus Mechanicus army in games of Warhammer 40,000. The kit includes interchangeable weapon arms and heads to customise your kill team, plus components to build specialists like a thrall-reprogramming Servitor Underseer, crude Technomedic Servitor, data-relaying Auto-Proxy Servitor, and more.

    Inside the box, you will also find a sheet of 39 double-sided Battleclade tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This kit comprises 108 plastic components, 1x Citadel 32mm Round Slotta Base, 3x Citadel 32mm Round Bases. 6x Citadel 25mm Round Bases, and 1x Battleclade Transfer Sheet containing 64 high-quality waterslide transfers to decorate your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using the Battleclade in games of Warhammer 40,000 are free to download from the Warhammer Community website.
