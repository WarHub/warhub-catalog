  status: current
  description: |-
    The Wrecka Krew revel in destruction, even by Ork standards. Sent on sabotage missions, or to reduce industry to crumpled ruin, they use rockets and hammers to destroy enemy machinery and anything else that gets in their way.

    This multipart plastic kit builds eight Wrecka Krew miniatures. These miniatures can be used as aggressive Wrecka Krew operatives in games of Kill Team, or fielded in an Ork army in games of Warhammer 40,000. The kit includes head options and accessories to customise your kill team, plus components to build specialists like the brutal Wrecka Boss Nob, destructive Tankbusta Rokkiteer, expendable Bomb Squigs, and more.

    Inside the box, you will also find a sheet of 38 double-sided Wrecka Krew tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This kit comprises 129 plastic components, 1x Citadel 40mm Round Base, 5x Citadel 32mm Round Bases, and 2x Citadel 25mm Round Bases. This set also includes 1x Ork Transfer Sheet, containing 438 high-quality waterslide transfers to customise your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
