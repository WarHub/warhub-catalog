    This multipart metal kit builds Orion and his two hunting hounds for use in your Wood Elf Realms armies in games of Warhammer: The Old World. As a god of the forest, He stands head and shoulders over the Elves and wields weapons befitting his stature – the legendary Spear of Kurnous, and his massive bow, the Hawk's Talon. When he blows his horn to signal the Wild Hunt, his armies fight all the harder in his presence. He is accompanied by two spectral hounds who act as his hunting dogs. Orion is a fantastic centrepiece model for your collection, an absorbing painting challenge, and an absolute beast in combat.

