    Across the Old World, mighty kings and powerful warlords raise glorious armies and grim hordes without number.

    From the arid deserts of ancient Nehekhara, vast legions of skeletal soldiers heed the commands of their kings and incantations of wizards, rising up from beneath the baking sands to slaughter those that would claim the distant reaches of their forgotten empire.

    The Tomb Kings are the true monarchs of the Undead. They ruled a vast and mighty civilisation at a time when other human nations were still barbarians, and now, thousands of years after their deaths, they have been awakened. Rising from their sarcophagi, the mummified Tomb Kings possess the same thirst for conquest that drove them in life. They march forth to reclaim their rightful dominion over the kingdoms of the living, and woe betide any that stand in their way.

    **Tomb Kings of Khemri Edition**

    Warhammer: The Old World is an exciting tabletop game for two or more players. This core box contains the main rules of the game, enough miniatures for one player to create their own Tomb Kings army, plus gaming accessories such as dice and templates. Take command of the mighty legions of Khemri and lead them to victory against the armies of your opponents in the World of Legend.

    **This boxed set contains 93 multipart plastic Citadel Minatures:**

    – 1x Liche Priest on Necrolith Bone Dragon
    – 1x Tomb King
    – 40x Skeleton Warriors
    – 32x Skeleton Archers
    – 16x Skeleton Horsemen
    – 3x Skeleton Chariots

    **It also contains the following rules, and gaming accessories:**

    – 1x 352-page *Warhammer: The Old World Rulebook*
    – 1x 24-page *Tomb Kings of Khemri Edition Construction Guide & Introductory Army List*
    – 1x 4-page Warhammer: The Old World Reference Sheet
    – 20x six-sided D6 dice
    – 1x six-sided scatter dice
    – 2x 18 red plastic measuring sticks
    – 3x weapon templates in translucent orange plastic

    All models come with their appropriate bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
