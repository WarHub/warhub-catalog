  description: |-
    The magic wielded by Goblin Shamans is no less destructive than that of their larger Orcish peers, but while Orc Shamans chant and gyrate around the battlefield, Goblin Oddnobs and Oddgits skulk close by their kin, working spells and spitting curses far from the eyes of the enemy. It is unclear how this affects their magic, but Goblin Shamans seem to live longer than their Orc counterparts...

    This multipart plastic kit builds one Goblin Shaman, a diminutive but powerful wizard of the Orc & Goblin Tribes. The Shaman's skull-tipped staff is strung with arcane trinkets, perfect for channeling the power of Mork \(or possibly Gork\). He's posed atop a mushroom-studded rock, hunched over a mystical mortar and pestle made from the remains of an unfortunate 'umie victim.

    This kit comprises five plastic components, and comes with a Citadel 25mm Square Base. It includes a Citadel 20mm Square Base with sculpted scenic features, not meant for game use – elements of which have been used as basing material in the pictures shown here.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
