    This multipart plastic kit builds 15 Goblin Wolf Riders, outriders for the Orc & Goblin Tribes. Each Wolf Rider can be armed with either a spear and a crude shield, or a shortbow and quiver of arrows – as well as the claws and fangs of their lupine mounts, of course. This kit also provides all the command upgrades you'll need, whether you field your Wolf Riders in small groups or one large mob – you can build musicians, champions, and standard bearers with a choice of banners.

