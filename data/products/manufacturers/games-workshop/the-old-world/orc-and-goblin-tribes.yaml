  status: current
  description: |-
    Ogdruz Swampdigga is strange, even by the bemusing standards of Orc Shamans. So strange, that the members of his tribe wanted nothing to do with him, expelling him from the relative safety of their camp to fend for himself in the dangerous wilds of the Badlands. Unexpectedly adopted by a Troll Hag who mistook him for a malnourished runt, he came to develop many odd, Trollish traits, and is even said to have mastered their unusual magic.

    This multipart resin kit builds Ogdruz Swampdigga, a Troll-loving wizard of the Orc and Goblin Tribes in Warhammer: The Old World. This hulking shaman has a peculiar affinity for Trolls, and is draped in a shawl of River Troll hide. He wields his unusual magic with the help of a carved bog-wood staff and a Snotling familiar, eagerly stirring a grim concoction.

    This kit comprises 11 resin components, and comes with 2x Citadel 30mm Square Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectible item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
