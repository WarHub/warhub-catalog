- name: Warrior Priests of Ulric on Foot & Mounted
  productCode: P-200530-99062702012
  sku: 99062702012
  productType: character
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/empire-of-man-warrior-priests-of-ulric-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99062702012_WarriorPriestsUlricfootMounted1.jpg
  status: current
  description: |-
    Warrior Priests of Ulric follow the mighty god of battle, wolves, and winter – a proud warrior-god who expects his followers to make their way in the world by directness, bravery, and force of arms. Many of his priests find their calling in formal armies and mercenary regiments, strengthening the faith of Ulric’s followers by their own example.

    This multipart metal and plastic kit builds two Warrior Priests of Ulric for use in Empire of Man armies in Warhammer: The Old World. Both are grisly axe-wielding warriors, befitting their rough and ready reputation, one is mounted on a barded warhorse while the other is on foot. These priests are best used to get stuck in along with your massed charge, expressing their faith with a keen blade.

    This kit contains 2x metal components, 4x plastic components, 1x Citadel 25mm Square Slotta Base, and 1x Citadel 30mm by 60mm Rectangle Slotta Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Grand Master of the Blazing Sun
  productCode: P-200528-99062702009
  sku: 99062702009
  productType: character
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/empire-of-man-grandmaster-of-the-blazing-sun-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99062702009_GrandMasterBlazingSun1.jpg
  status: current
  description: |-
    The Knights of the Blazing Sun are vigilant students of war who strive for perfection on the battlefield. They can trace their origins back to the Battle of Magritta. During the fighting, a mighty earthquake caused a bronze statue of the warrior-goddess Myrmidia to fall and crush their enemies. Ever since, the Knights of the Blazing Sun have honoured Myrmidia as their patron.

    This multipart metal and plastic kit builds a Grand Master of the Blazing Sun – a mighty leader for use in Empire of Man armies in games of Warhammer: The Old World. This noble warrior rides to war upon a barded warhorse and sporting a large crest with sun iconography on their helm, which clearly marks them as a member of the Knightly Order of the Blazing Sun. Personalise your Grand Master with a choice of four shields.

    This kit contains 1x metal and 8x plastic components, and 1x Citadel 30mm by 60mm Rectangular Slotta Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
