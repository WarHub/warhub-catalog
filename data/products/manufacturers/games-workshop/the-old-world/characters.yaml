  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99862702003_EoMHaraldGemunsenGrandmasterOfTheKnightsPanther01.jpg
  status: current
  description: |-
    Harald Gemunsen is the Grand Master of the Knights Panther – the only warrior with the authority to call the entire order to war. He ensures the chapter houses garrisoning whole rosters of knights and their retainers are ready to answer the call and defend the Empire, free of political bias.

    This multipart resin kit builds Harald Gemunsen, the Grand Master of the Knights Panther, for Empire of Man armies in games of Warhammer: The Old World. He's an ideal choice to lead the charge of your knights from this fabled order. Armed with the enchanted axe, Beast Reaver, he can cut down any opponent that stands in his way.

    This kit contains 14 resin components, and 1x Citadel 30mm by 60mm Rectangular Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
