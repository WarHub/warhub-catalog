  status: current
  description: |-
    The Order of the Knights Panther is dedicated to the eradication of Chaos and its corrupt followers. This courageous brotherhood is known and respected throughout the Empire, and its warriors often ride into battle wearing the pelts of outlandish creatures as trophies of their victories.

    This multipart metal and plastic kit builds a Grand Master of the Knights Panther – a mighty leader for use in Empire of Man armies in games of Warhammer: The Old World. This noble warrior rides to war upon a barded warhorse, sporting a large crest with panther iconography on their helm and shield, along with a fine cloak made from a wild cat. Personalise your Grand Master with a choice of 8 shields.

