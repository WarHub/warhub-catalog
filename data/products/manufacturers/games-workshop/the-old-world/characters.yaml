  description: |-
    ​​Warrior Priests of Sigmar lead and inspire troops in battle, and also minister to their spiritual well-being. On many occasions, a rousing speech or tour of camp by one of these faith-filled preachers has restored faith, brought hope, or stayed a mutiny when the words of even the most respected general have fallen on deaf ears.

    This multipart kit builds three Warrior Priests of Sigmar for use in Empire of Man armies in games of Warhammer: The Old World. Each of these frenzied fighters has different weapons and equipment, offering you different tactical options on the tabletop. These spiritual leaders are all ideal for leading the charge or for building your battle line around.

