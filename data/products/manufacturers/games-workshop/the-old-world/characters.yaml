  description: |-
    Captains of the Empire are trusted officers chosen to lead their province’s forces. Many such officers will also be of noble birth, educated in martial pursuits from an early age, whereas others have risen through the ranks from humble origins.

    This multipart plastic kit builds a Captain of the Empire for use in Empire of Man armies in games of Warhammer: The Old World. Lead your force from the front and inspire your warriors to victory with this experienced commander. The kit comes with options for either a fine feathered helm or hat.

    This kit contains 7 plastic components, and 1x Citadel 25mm Square Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Elementalist and Familiar
  productCode: P-202579-99852702008
  sku: 99852702008
  productType: character
  priceGbp: 28.5
  url: https://www.warhammer.com/en-GB/shop/empire-of-man-elementalist-and-familiar-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99852702008_EoMElementalistWizardAndFamiliar01.jpg
  status: current
  description: |-
    Elementalists are able to bend the Winds of Magic to their will to such an extent that they can harness the power of the elements themselves. Such mages summon gale-force winds and torrential rains from the heavens, raise earthen ramparts, and even call forth elemental spirits to do their bidding.

    This multipart resin kit builds one Elemental Wizard for use as a Wizard Lord or Master Mage in Empire of Man armies in games of Warhammer: The Old World. Unleash the wrath of nature upon your foes with powerful elemental magic, and ensure you always have the spells you need when you need them thanks to a toad-like familiar.

    This kit contains 8 resin components, and 2x Citadel 25mm Square Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
