  status: current
  description: |-
    ​​Warrior Priests of Sigmar lead and inspire troops in battle, and also minister to their spiritual well-being. On many occasions, a rousing speech or tour of camp by one of these faith-filled preachers has restored faith, brought hope, or stayed a mutiny when the words of even the most respected general have fallen on deaf ears.

    This multipart metal kit builds a Warrior Priest of Sigmar for use in Empire of Man armies in games of Warhammer: The Old World. This frenzied fighter and spiritual leader is ideal for leading the charge or for building your battle line around.

    This kit contains 3x metal components, and 1x Citadel 25mm Square Slotta Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
