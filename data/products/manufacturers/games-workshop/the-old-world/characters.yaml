    Witch Hunters are ever vigilant for outbreaks of rebellion and myriad evil threats. These religious warriors roam the land in the service of all the great churches and temples, intent upon casting out that which their patron considers most evil.

    This multipart metal kit builds an imposing Witch Hunter for your Empire of Man army in Warhammer: The Old World. This relentless infantry character is armed with a massive great sword and a pistol, and is ideal for hunting down mutants, heretics, witches, and the undead.

