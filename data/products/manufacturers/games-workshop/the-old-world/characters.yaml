  description: |-
    Imperial Engineers are eccentric scientists, often tinkering with new and experimental technologies. Some of them have been known to carry Hochland Long rifles into battle, allowing them to snipe foes from afar.

    This multipart plastic kit builds an Empire Engineer with Hochland Long Rifle for use in Empire of Man armies in games of Warhammer: The Old World. Snipe at enemy characters and champions from afar. This miniature can alternatively be built holding a telescope for rangefinding and guiding artillery.

    This kit contains 9 plastic components, and 1x Citadel 25mm Square Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
