  description: |-
    Hans von Löwenhacke was destined to serve the Empire, and he has long done so with distinction. He has fought alongside almost every major power within the nation, and has earned a reputation as a pragmatic and skilful commander.

    This multipart resin kit builds General Hans von Löwenhacke, a veteran leader for Empire of Man armies in games of Warhammer: The Old World. As well as inspiring his troops, he leads from the front, his heavy armour protecting him while he smites foes with his enormous warhammer, Judgement.

    This kit contains 12 resin components, and 1x Citadel 25mm Square Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
