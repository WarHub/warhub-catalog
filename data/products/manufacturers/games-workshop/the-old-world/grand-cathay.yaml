    This multipart plastic kit builds Miao Ying in both her dragon and human forms for your Armies of Grand Cathay in games of Warhammer: The Old World. In her human form, she appears to be floating above the battlefield, revelling in her power as she commands her armies. Her dragon form is majestic, flying low across the battlefield, ready to wield her fangs and wicked claws to deadly effect. In either form, she is a formidable general and powerful wizard. Whether you are a gamer, a painter, or a collector, the Storm Dragon is a stunning centrepiece miniature.

    This kit comprises 80 plastic components, 1x Citadel 50mm Square Base, and 1x Citadel 100mm by 150mm Rectangle Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
