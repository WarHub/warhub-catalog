  description: |-
    Peasant levies are recruited from villages and towns, small settlements that lie outside the towering walls of Cathayan grand cities. These provincial troops are not as well-equipped as the professional armies of the empire, favouring simple weapons such as spears and bows, but they are far more numerous and no less well organised in battle.

    **From the Field to the Front Line**

    This multipart plastic kit builds 20 Peasant Levy infantry soldiers for your Armies of Grand Cathay in games of Warhammer: The Old World. Plentiful and well-disciplined, their value lies in their numbers more than their skill. The peasant soldiers can be equipped with your choice of warbows or long spears, making this a flexible kit that deserves a place in your armies.

    **Customise Your Commonfolk**

    The contents of this box can be assembled as 1 large unit of 20 warriors, or 2 smaller units of 10 warriors – each with their own optional musician, standard bearer, and champion, who can be equipped with a warbow or shield and has a choice of 2 heads. There are a number of interchangeable parts, which makes it easy to customise your warriors of wind and field.

    **Interchangeable parts:**
    – 24 bare heads (of 6 designs)
    – 24 straw hat heads (of 6 designs)
    – 20 straw hats (of 5 designs)
    – 20 arrow quivers (of 5 designs)

    **Contents:**
    – 298 plastic components
    – 20 Citadel 25mm Square Bases
    – 1 construction guide

