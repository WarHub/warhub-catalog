    Jade Lancers are mounted regiments of considerable skill and discipline, drawn from the soldiers of the great cities. In addition to being a potent tool in the open field, Jade Lancers train to fight in the constricted streets of their cities and the dense terrain of their environs. They are able to launch devastating charges through narrow alleyways, across bridges and through the tunnels that pierce the city walls, as well as through dense undergrowth or deep mud.

    This multipart plastic kit builds 10 Jade Lancers, heavy cavalry for Armies of Grand Cathay in games of Warhammer: The Old World. These hardened veterans make excellent shock troops and are agile defenders who can support your infantry quickly. They can be assembled as either one large unit or two units of 5 Jade Lancers – each with their own optional champion, standard bearer, and musician.

