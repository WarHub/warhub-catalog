  description: |-
    Jade Warriors are named for a stone sacred to the Dragon Emperor – one that represents the implacable nature of his empire. Armed with polearms and equipped with heavy armour and shields, they are the bastion upon which the enemy breaks, whether they are defending the walls of their city or the centre of the battle line.

    This multipart plastic kit builds 20 Jade Warriors, heavy infantry for your Armies of Grand Cathay in games of Warhammer: The Old World. These troops make an ideal battleline for your army, able to defend your territory or march forward to claim ground.

    They can be assembled as one large unit or two units of 10 warriors, each with their own optional champion, standard bearer, and musician. The Jade Warriors can be armed with either a hand weapon and shield, or a halberd, offering you tactical flexibility. There are 40 heads included in the set, in 10 different designs, which are interchangeable across the miniatures, as are the top knots and cosmetic accessories, which include pouches and teapots.

    This kit comprises 292 plastic components, 20x Citadel 25mm Square Bases, and 1x Grand Cathay Jade Warriors and Lancers Transfer Sheet containing 404 high-quality waterslide transfers to decorate your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
