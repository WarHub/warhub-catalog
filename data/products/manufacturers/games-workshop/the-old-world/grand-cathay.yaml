    Grand Cannons are shaped like roaring dragons, each one able to belch fire or spit flaming cannonballs. The armies of Grand Cathay also employ a great number of Fire Rain Rocket Batteries. Inaccurate but deadly, they hurl explosives long distances, usually in great numbers to saturate an entire area in flame and shrapnel, but are equally able to deliver single massive explosive rockets against monsters or fortifications.

    This multipart plastic kit builds two artillery pieces and their crew for your Armies of Grand Cathay in games of Warhammer: The Old World. Each one can be built as a devastating Cathayan Grand Cannon or barrage-firing Fire Rain Rocket Battery. The artillery pieces each come with three crew, who have cosmetic options to match the weapon they accompany. There is also a pair of optional Ogre Loaders to keep your artillery firing in the heat of battle – these mercenaries have a choice of two heads, and can be armed with either a mace or a sword, offering even more variety to your crew.

