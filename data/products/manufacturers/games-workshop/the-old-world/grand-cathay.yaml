  url: https://www.warhammer.com/en-GB/shop/grand-cathay-defenders-of-the-great-bastion-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99122720009_GrandCathayDefendersoftheGreatBastion1.jpg
  description: |-
    In times of great need, the lowly peasants, farm workers, and commonfolk of Grand Cathay take up arms to defend their homes. Though not as well-equipped or highly drilled as the Jade Warriors, they are a fierce and powerful fighting force. Using black powder rifles and long spears, they put up a staunch defence against some of the most horrible foes a mortal could ever face.

    This packed boxed set is ideal for starting a new Armies of Grand Cathay collection – or expanding an existing army – to unleash in games of Warhammer: The Old World. Led by a pair of Astromancers, one on foot and one mounted, these reinforcements are well supported with magic. The majority of the force is composed of a Peasant Levy, who can overwhelm even tough foes with their numbers. Crane Gun Teams and Iron Hail Gunners add considerable firepower, capable of taking down any enemy at range. This box is the first place you can get your hands on all of these new miniatures.

    **This boxed set builds 53 multipart plastic Armies of Grand Cathay miniatures:**
    – 1x Astromancer on foot
    – 1x Astromancer mounted on Cathayan Warhorse
    – 1x Familiar
    – 8x Crane Gun Teams
    – 12x Iron Hail Gunners
    – 30x Peasant Soldiers

    The miniatures in this box offer a degree of customisation. The Astromancers both have a choice of two heads and two weapons for their right hands.

    Each of the Peasant Levy can be armed with either a warbow or a long spear. There are parts to build up to three optional champions – each with a choice of two heads, three optional musicians, and three optional standard bearers. There are 72 heads, which are a mix of bare and those with hats. The heads, hats, quivers, and weapons are all interchangeable across the bodies.

    This kit comprises 696 plastic components, 1x Citadel 30mm by 60mm Rectangular Base, 8x Citadel 50mm by 25mm Rectangular Bases, and 44x Citadel 25mm Square Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    These miniatures will be available separately at a later date. This boxed set is only available while stocks last.
