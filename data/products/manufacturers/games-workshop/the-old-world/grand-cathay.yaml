    This multipart plastic kit builds two Gate Masters of the Celestial Cities – one on foot and one atop a Cathayan Warhorse – distinguished leaders that can represent a Gate Master or a Gate Keeper for your Armies of Grand Cathay in games of Warhammer: The Old World. They are ideal for commanding from the front, inspiring your forces to victory in the World of Legend.

