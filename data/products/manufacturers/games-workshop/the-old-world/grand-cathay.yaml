  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99122720013_WHtOWBattalionEmpireofGrandCathayBoxedArmy01.jpg
  description: |-
    The vast nation of Grand Cathay is one of the oldest civilisations in the World of Legend, rivalling the great realms of the Elves or Dwarfs in its scope and power. It is a harmonious land that has survived largely unchanged for thousands of years – an empire that stands eternally as a bulwark against the evils of the world.

    This boxed set builds a solid core of an Armies of Grand Cathay force for use in games of Warhammer: The Old World. Elite Jade Lancers – heavily armoured cavalry – lead the charge to shatter the enemy front lines. Behind them are implacable lines of Jade Warriors, ready to defend your territory or march forward to claim ground. Supporting the attack are two artillery pieces, raining down fire from afar.

    **This boxed set contains 50 multipart plastic miniatures:**
    – 2x Cathayan Grand Cannons \(which can alternatively be built as Fire Rain Rocket Batteries\)
    – 10x Jade Lancers
    – 30x Jade Warriors

    The miniatures in this box are easy to customise. The Jade Lancers can be assembled as one large unit or two units of five warriors – each with their own optional champion, standard bearer, and musician.

    The Jade Warriors can be assembled as one large unit, two units of 15 warriors, or three units of 10 warriors – each with their own optional champion, standard bearer, and musician. They can be armed with either a hand weapon and shield or a halberd, and the heads, top knots, and cosmetic accessories are interchangeable across the miniatures.

    The Cathayan Great Cannons can alternatively be built as Fire Rain Rocket Batteries – both options come with three artillery crews and an optional ogre loader.

    No matter how you choose to build them, this box makes for a fantastic way to start a new Armies of Grand Cathay force, or expand your collection and save money over buying each kit separately.

    This kit comprises 734 plastic components, 2x Citadel 25mm by 50mm Rectangular Bases, 2x Citadel 40mm Square Bases, 2x Citadel 60mm by 100mm Rectangular Bases, 10x Citadel 30mm by 60mm Rectangular Bases, and 36x Citadel 25mm Square Bases.

    This set also includes 1x Jade Warriors/Lancers Transfer Sheet containing 404 high-quality waterslide transfers to decorate your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    The miniatures in this box will be available separately at a later date.
