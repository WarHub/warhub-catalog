  description: |-
    Sky Lanterns are wonders of Cathayan ingenuity used by the Celestial Dragon’s armies to observe enemies from on high and direct troops in battle. Beneath the lantern hangs an armoured gondola, from which one of Grand Cathay’s many Magistrates uses fans and banners to signal troops, or direct the fire of the army’s war machines. Should enemy flyers or missile troops get too close, pairs of Crane Gunners snipe from their exceptional vantage point.

    This multipart plastic kit builds one imposing Sky Lantern, an unusual engine of war for your Armies of Grand Cathay in games of Warhammer: The Old World. These floating gondolas can be equipped to suit a variety of battlefield roles, from ranged airborne artillery to bomb-dropping platforms. The kit includes parts to build a Magistrate who can be mounted on the Sky Lantern or assembled on foot. The crew can be armed with Sky Lantern Crane Guns, or iron hail guns and gunpowder or dragon fire bombs. An optional rack for Sky Lantern bombs can be added to the gondola. No matter how you equip it, this miniature is effective on the tabletop and a centrepiece for your collection.

    The kit comprises 128 plastic components, 1x Citadel 100mm Square Base, 1x Citadel 25mm Square Base, 1x Citadel Large Flying Stem, and 1x Sky Lantern Transfer Sheet containing 115 high-quality waterslide transfers to decorate your miniatures.

    This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
