  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99122720006_WHtOWGrandCathayCathayanSentinelExtra01.jpg
  description: |-
    Cathayan Sentinels are creations born of the Dragon’s mastery of the Elemental Winds – each one a towering animated statue fashioned in the form of a great warrior. Although the people of Grand Cathay speak widely of ‘Terracotta Sentinels’, it is only those that stand guard along the Great Bastion that are crafted from this magically charged red earth. Sentinels can be made of any stone, usually matching the land which they protect. No matter what they're made of, in battle they are fearsome indeed – almost impervious to physical attacks, and able to decimate entire formations of troops with each swing of their enormous weapons.

    This multipart plastic kit builds one Cathayan Sentinel, a living statue for your Armies of Grand Cathay in games of Warhammer: The Old World. Tough and deadly, a single Sentinel is capable of turning the course of a battle in your favour. Use them offensively to smash through enemy lines or defensively as an anvil for your foe to break upon. Towering over regular infantry, the Cathayan Sentinel is a fine centrepiece for your collection.

    This impressive miniature can be assembled in one of two poses. It has the option of two different faceplates, and two different blades for its mighty weapon, making it easy to customise.

    The kit comprises 167 plastic components, and 1x Citadel 100mm by 150mm Rectangular Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
