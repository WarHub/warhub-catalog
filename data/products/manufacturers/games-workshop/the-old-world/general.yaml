  description: |-
    Empire Greatsword regiments are made up of distinguished and decorated State Troops veterans. They are personally chosen to serve amongst the ranks of the elite by their commanding officers.

    This multipart plastic kit builds 20 Empire Greatswords for use in Empire of Man armies in games of Warhammer: The Old World. These elite melee soldiers may be fielded as one large unit of 20, or two smaller units of 10, each with an optional Champion, musician, and standard bearer. Both the horn-blowing musician and the standard bearer come with a choice of an axe or a sword as their hand weapon, and you can choose between two different tops for your banner poles. The arms, heads, and weapons in the kit are interchangeable across the miniatures, making it easy to customise your units.

    This kit contains 264 plastic components, and 20x Citadel 25mm Square Bases.

    This set also includes 1x Empire of Man Infantry Transfer Sheet, containing 290 high-quality waterslide transfers for you to use to decorate your models.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
