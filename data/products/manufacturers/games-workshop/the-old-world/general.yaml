  description: |-
    Chaos Warhounds are tireless hunters built of little more than muscle and fang, made all the more horrifying by the warping effect of Chaos, causing them to sprout horns, tusks and spines. They prowl the wilderness in ravening packs, running down prey that ranges in size from stray children to young ice mammoths.

    This multipart plastic kit builds 20 Chaos Warhounds, beasts of war, to add to your Warriors of Chaos armies in games of Warhammer: The Old World. Hideously mutated and powerfully muscled, they are fast and capable harassment units. You'll find ten separate bodies, repeated twice, and they feature modular, interchangeable horns and tails, making it easy to add variety to your packs.

    This kit comprises 100 plastic components, and is supplied with 20x Citadel 25x50mm Rectangular Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
