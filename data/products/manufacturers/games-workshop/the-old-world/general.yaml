    Empire State Troops march forth from every province and city-state. They are well-drilled to fight together – swordsmen fight shoulder to shoulder with spearmen, the close range parries and ripostes of swords complementing the longer reach of the spear.

    This multipart plastic kit builds 30 Empire State Troops for use in Empire of Man armies in games of Warhammer: The Old World. They can be fielded as one large 30 man unit, or two units of 15 soldiers each. The kit includes components to build optional Champions, standard bearers, and musicians for both units. Every miniature can be armed with a halberd or a spear – giving you the flexibility to take on any foe.

    This kit contains 291 plastic components, and 30x Citadel 25mm Square Bases.

    This set also includes 1x Empire of Man Infantry Transfer Sheet, containing 290 high-quality waterslide transfers for you to use to decorate your models.

