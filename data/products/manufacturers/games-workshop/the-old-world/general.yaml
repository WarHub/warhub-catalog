  description: |-
    Flagellants are hordes of penniless zealots who band together under the leadership of some ranting preacher of apocalyptic doom. They travel the towns and cities of the Old World, following in the wake of marching armies to spread their nightmarish vision of doom and despondency.

    This multipart plastic kit builds 30 Flagellants for use in Empire of Man armies in games of Warhammer: The Old World. These can be fielded as one huge mob of 30, or two smaller groups of 15, each with an optional Champion and standard bearer to goad these zealots into fits of fury. The arms and heads in the kit are interchangeable across the miniatures, and a wealth of accessories and weapon options makes it easy to customise your units.

    This kit contains 414 plastic components, and 30x Citadel 25mm Square Bases.

    This set also includes 1x Empire of Man Infantry Transfer Sheet, containing 290 high-quality waterslide transfers for you to use to decorate your models.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
