  description: |-
    Arcane Ruins are littered across the Old World – forgotten relics of bygone eras. The pitted stone and crumbling columns are a foreboding sight, and more often than not exude a palpable aura of menace, while some are infused with potent magics that linger still.

    This multipart modular plastic kit builds a collection of worn, crumbling structures to use as terrain in your games of Warhammer: The Old World. Whether you scatter them across your battlefield as pure scenery, or bring them together as a dark and foreboding ruin, they'll look great on the table and make for a satisfying addition to your terrain. The versatile kit can be assembled in a number of different ways, and you can combine multiple kits to create even larger structures. You'll also find a variety of skulls and sinister carvings that can be added just about anywhere to mix things up.

    **This terrain kit includes:**
    - 1x Obelisk
    - 1x Arcane Ruins Base
    - 3x Arches
    - 6x Columns
    - 6x Ruined Columns

    This kit contains 55 plastic components.

    These miniatures are supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
