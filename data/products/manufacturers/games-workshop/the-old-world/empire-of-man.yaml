    This kit contains 25 plastic components, 1x Citadel 30mm by 60mm Rectangular Base, and 1x Citadel 25mm Square Base. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
