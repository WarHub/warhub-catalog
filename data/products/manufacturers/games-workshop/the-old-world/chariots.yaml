  description: |-
    Chaos Chariots weigh so much that when they have gathered pace, nothing short of a castle wall can halt their charge. Worse still, their stout wheels sport great spinning scythes that scream and shriek as they slice into the foe.

    This multipart plastic kit builds a pair of Chaos Chariots – viciously spiked war machines for your Warriors of Chaos army in Warhammer: The Old World. The kit includes numerous options to personalise your chariots, including a choice of frontal plates, different tusk designs, and eight-pointed stars or skull-studded trophy racks. The armoured rider has a choice of three weapons and can be built with six different heads and an optional cloak. Their fellow charioteer is armed with a lashing whip and comes with a choice of two heads.

    This kit can alternatively build Gorebeast Chariots – mighty engines drawn by mutant creatures of Chaos, which come with head options for the mighty Gorebeast. Either version of chariot is ideal for smashing through enemy lines.

    This kit comprises 148 plastic components, and is supplied with 2x Citadel 60x100mm Rectangular Bases. This set also includes 1x Warriors of Chaos Transfer Sheet containing 621 high-quality, waterslide transfers for you to further decorate your models.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
