    This multipart resin kit builds Lady Élisse Duchaard, a famed Prophetess mounted on atop her unicorn Ariandir. Élisse carries the gnarled Staff of the Elements by her side, a conduit for her potent magical abilities, and raises high the Chalice of Brionne – a holy relic of the Lady. Her imposing mount is a force unto itself, rearing up to smash enemies aside with hoof and horn, while giving Élisse the speed to keep up with the famed cavalry of Bretonnia. This impressive miniature makes a fine centrepiece in your army, perfectly encapsulating the graceful and beautiful aspect of Bretonnia.

