  description: |-
    Rough Riders are potent cavalry troops fielded by the Astra Militarum – the most famous of which are recruited from the steppes of Attila. Their combat skill and sheer mobility makes these horsemasters a powerful force, whether spearheading an attack or outflanking the foe. When the moment comes to launch a charge, the Rough Riders plunge their hunting lances into the foe and detonate the deadly tips, lending an explosive impact to the assault.

    This multipart plastic kit builds five Attilan Rough Riders. These rugged warriors are mounted on horses loaded with battlefield gear, from flasks and bedrolls to holstered laspistols and saddle-slung lasguns. Each Rough Rider wields an explosive hunting lance, which can be built with an infantry-shredding frag tip or tank-busting melta tip. One Rough Rider can also be built with an electrical goad lance, and the kit includes components to assemble a Rough Rider Sergeant with a choice of two plumed heads and an optional power saber – brandished for the attack, or sheathed at the hip.

    There are loads of cosmetic choices and interchangeable options to make each squad of Rough Riders your own – you'll find different lance-wielding arm poses, a huge variety of multipart heads, and a host of front and rear bandoliers, laden with items like grenades, pouches, and a curved Attilan dagger.

    This kit comprises 122 plastic components, and is supplied with 5x Citadel 60x35mm Oval Bases. Also included is a Cadian Infantry Transfer Sheet with 597 transfers, and an Astra Militarum Vehicle Transfer Sheet with 475 transfers from a variety of regiments. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Heavy Weapons Squad
  productCode: prod5030162-99120105097
  sku: 99120105097
