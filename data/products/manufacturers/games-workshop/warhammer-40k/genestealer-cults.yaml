  description: |-
    The Taurox is a swift armoured transport, designed to exploit gaps in the enemy battle line or plug holes torn in the Astra Militarum’s own. Its sturdy tracks enable it to cross difficult terrain with ease, while autocannons mow down the foe as it roars forward – eliminating threats to its passengers as they rapidly disembark.

    This multipart plastic kit builds one Taurox – a fast-moving transport armed with a pair of autocannons. These primary weapons can be mounted on its turret or on either side of its hull, and can be supplemented by a pintle-mounted storm bolter. It features a fully-detailed interior complete with a driver, a hatch that can be built closed or open, a turret gunner who can be positioned at a height of your choice, and other accessories to customise your Taurox – including armour plates, bull bars, and a sledgehammer.

    This kit can alternatively be used to build a Taurox Prime – a dedicated assault vehicle for the Militarum Tempestus.

