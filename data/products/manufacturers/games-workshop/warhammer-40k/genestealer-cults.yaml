    Scout Sentinels feature open compartments and simple augur devices, which enable their pilots to survey the enemy with ease. Their lighter armour and gyro-stabilisers assist them in swiftly traversing the toughest terrain and bringing their heavy weapons to bear suddenly from unexpected angles.

    This multipart plastic kit builds one Scout Sentinel, a light walker toting heavy firepower on an agile chassis for your Astra Militarum or Genestealer Cults armies in games of Warhammer 40,000. Thanks to its speed and manoeuvrability, it’s an ideal way to deliver heavy weapons fire where your enemy least expects it.

