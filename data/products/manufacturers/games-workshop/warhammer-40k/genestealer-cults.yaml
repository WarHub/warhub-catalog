  description: |-
    Heavy Weapons Squads are teams of gun crews that can swiftly set up their arsenal of portable armaments. They bolster battle lines and provide close fire support with adaptable loadouts of precise or indiscriminate firepower. While massed infantry can overwhelm the foe, it often falls to these teams to deliver the killing blow.

    This multipart plastic kit builds three Heavy Weapons Teams – paired infantry soldiers crewing portable guns – for your Astra Militarum armies in games of Warhammer 40,000. Each team can be armed with your choice of a heavy bolter, missile launcher, mortar, autocannon, or lascannon, meaning you'll always have the right weapon for the right target. Whichever weapon choice you go for, you'll be able to rain down fire on your enemies before they get close. The kit includes multiple cosmetic options to personalise your miniatures, making it easy to customise your weapon teams.

    This kit comprises 127 plastic components, 3x Citadel 50mm Round Bases, and 1x Cadian Infantry Transfer Sheet containing 597 high-quality waterslide transfers to decorate your miniatures. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Abominant
  productCode: prod4140165-99070117018
  sku: 99070117018
  ean: 5011921171897
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 20.5
  url: https://www.warhammer.com/en-GB/shop/Genestealer-Cults-Abominant-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070117009_GSCAbominant01.jpg
  status: current
  description: |-
    A champion amongst the mutant aberrants of the cult, the Abominant is a misshapen wrecking ball of muscle and chitin that wields a heavy bludgeoning instrument as if it weighs no more than a switch of willow. Only when the roaring, demented brute crushes all before it in a spasmodic frenzy, crying out in a mixture of anger, pain and self-loathing, does the true horror of its existence become clear. It is guided by a Mindwyrm Familiar, a diminutive bio-psychic construct that is given life in the decaying slurry found in a Patriarch's lair.

    The Abominant is a devastating close combat specialist, able to deliver huge amounts of damage with his power sledgehammer and rending claw. It gives Genestealer Cults players a melee-focussed Elites choice whose Mindwyrm Familiar helps to protect it and other nearby friendly units from psychic attacks.

    This pack contains a single multipart plastic miniature featuring an Abominant guided by a Mindwyrm Familiar. It comes as 11 components and is supplied with a 40mm round base.
- name: Goliath Rockgrinder
