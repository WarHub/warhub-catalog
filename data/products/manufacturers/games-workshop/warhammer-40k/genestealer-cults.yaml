  url: https://www.warhammer.com/en-GB/shop/goliath-rockgrinder-2016
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120117002_Rockgrinder01.jpg
  status: current
  description: |-
    Built to withstand the pressures and challenges of underground mining, the Goliath Rockgrinder is a devastating piece of equipment when turned to aggression. Surging forward into the massed ranks of the enemy, servo-mounted weaponry seeking and destroying priority targets, the Rockgrinder drives ever-forward, its sawtoothed drilldozer ripping apart anything foolish enough to stand in its path. The fourth-generation cultist standing atop the vehicle efficiently uses its industrial equipment as a weapon of war – heavy mining lasers, seismic cannons and clearance incinerators, though designed for mining and gathering resources, are perfectly suited to annihilation.

    This multi-part plastic kit contains the components necessary to assemble a Goliath Rockgrinder, armoured weapon platform of the Genestealer Cults. It comes with a number of weapon options – heavy stubber, mining laser, drilldozer blade, clearance incinerator and seismic cannon – and features a ton of customisation opportunities – the crewmen have their own options, and the Rockgrinder can be modelled sitting low on its wheels due to the weight of the weaponry it carries.

    This kit can also be assembled as a Goliath Truck.
- name: Goliath Truck
  productCode: prod3290292-99120117018
  sku: 99120117018
  ean: 5011921171927
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/goliath-truck-2016
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120117002_Goliath01.jpg
  status: current
  description: |-
    Infinitely adaptable, hard-wearing and rugged, the Goliath Truck is a mainstay of the Genestealer Cults. Fast and manoeuvrable, it bounces around the battlefield laying down walls of gunfire, heavy stubbers and autocannons ablaze. Once dedicated to the shadows, the crew manning the Goliath – proudly emblazoned with insignia of the Cult – now do everything in their power to get as close to the enemy, screaming rapidly across even the most hostile terrain to slam open their cargo compartment and disgorge broods of up to 10 scuttling Hybrids.

    This multi-part plastic kit contains the components necessary to assemble a Goliath Truck, transport and offensive vehicle of the Genestealer Cults. It comes armed with a heavy stubber and twin-linked autocannon, and features a ton of customisation opportunities – the 4 crewmen have their own options and the wheels can be attached with high ground clearance.

    This kit can also be assembled as a Goliath Rockgrinder.
