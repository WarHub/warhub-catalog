  description: |-
    Hellhounds are terrifying close assault tanks, with fearsome variants designed to flush enemies out of dense terrain with gouts of promethium, sunder armour with the searing touch of melta weaponry, or choke alien hordes with clouds of noxious gas. Those few who volunteer to serve in these tanks often have a cavalier attitude, and revel in their reputation for reckless destruction.

    This multipart plastic kit builds one Hellhound – a swift and deadly vehicle designed for short range firefights. The tank boasts your choice of powerful turret-mounted weapon – either an inferno cannon, chem cannon, or melta cannon – fed by ammo tanks installed in its rear. The kit also includes a choice of hull-mounted secondary weapon – a heavy bolter, heavy flamer, or multi-melta. The vehicle can be built with a spotter or a closed turret hatch.

