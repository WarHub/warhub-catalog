- name: Reductus Saboteur
  productCode: prod4920185-99070117011
  sku: 99070117011
  ean: 5011921163090
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/genestealer-cults-reductus-saboteur-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070117011_GCReductusSaboteurLead.jpg
  status: current
  description: |-
    There is no engine of the oppressors that a Reductus Saboteur cannot lay low, and there are few materials they cannot fashion into an explosive given a little time to tinker. Flitting through the shadows, they lace the battlefield with booby traps and deploy powerful explosives that make short work of enemy armour.

    If you're looking to give your Genestealer Cults an edge against an enemy that’s heavy on tanks, or you just like to blow stuff up, you need a Reductus Saboteur in your army. With a bomb for every occasion, a savvy general will find all sorts of tricks up their too-many sleeves.

    This 11-piece plastic kit builds one Reductus Saboteur, who can be assembled with scarred head or one with a pair of goggles, and one separate pile of explosives. It’s supplied with 1x 32mm round base and 1x 25mm round base.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Abominant
  productCode: prod4140165-99070117018
  sku: 99070117018
  ean: 5011921171897
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 20.5
  url: https://www.warhammer.com/en-GB/shop/Genestealer-Cults-Abominant-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070117009_GSCAbominant01.jpg
  status: current
  description: |-
    A champion amongst the mutant aberrants of the cult, the Abominant is a misshapen wrecking ball of muscle and chitin that wields a heavy bludgeoning instrument as if it weighs no more than a switch of willow. Only when the roaring, demented brute crushes all before it in a spasmodic frenzy, crying out in a mixture of anger, pain and self-loathing, does the true horror of its existence become clear. It is guided by a Mindwyrm Familiar, a diminutive bio-psychic construct that is given life in the decaying slurry found in a Patriarch's lair.

    The Abominant is a devastating close combat specialist, able to deliver huge amounts of damage with his power sledgehammer and rending claw. It gives Genestealer Cults players a melee-focussed Elites choice whose Mindwyrm Familiar helps to protect it and other nearby friendly units from psychic attacks.

    This pack contains a single multipart plastic miniature featuring an Abominant guided by a Mindwyrm Familiar. It comes as 11 components and is supplied with a 40mm round base.
- name: Atalan Jackals
  productCode: prod4130154-99120117024
  sku: 99120117024
  ean: 5011921171989
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Genestealer-Cults-Atalan-Jackals-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120117014_GSCAtalanJackals01.jpg
  status: current
  description: |-
    Atalan Jackals are fourth generation Neophytes who form the outriders of their gene-sect. They roam the corners of the host planet in search of new regions for their cult to infest.

    Atalan Jackals provide fast-moving firepower and rapid assault support for your Genestealer Cults army. Capable of traversing the battlefield with incredible speed, they're great for exploiting weak points in your opponent's line or snatching key objectives.

    This set builds one squad of 5 Atalan Jackals – four on dirtcycles, accompanied by an Atalan Wolfquad. You'll be able to customise your squads with a host of melee weapons, blasting charges and ranged weapons, letting you kit the unit out for a range of battlefield roles. Likewise, the Wolfquad features options for a mining laser, Atalan incinerator or heavy stubber, offering you even more flexibility. All arms in the kit are interchangeable with one another, and you'll have a huge choice heads and accessories to individualise your models.

    This kit is supplied in 89 plastic components and contains 4x 60mm oval bases and 1x 60mm round base.
- name: Scout Sentinel
  productCode: prod5030166-99120105103
  sku: 99120105103
  ean: 5011921182275
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/astra-militarum-scout-sentinel-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120105103_AMSentinel01alt.jpg
  status: current
  description: |-
    Scout Sentinels feature open compartments and simple augur devices, which enable their pilots to survey the enemy with ease. Their lighter armour and gyro-stabilisers assist them in swiftly traversing the toughest terrain and bringing their heavy weapons to bear suddenly from unexpected angles.

    This multipart plastic kit builds one Scout Sentinel, a light walker toting heavy firepower on an agile chassis for your Astra Militarum or Genestealer Cults armies in games of Warhammer 40,000. Thanks to its speed and manoeuvrability, it’s an ideal way to deliver heavy weapons fire where your enemy least expects it.

    The Sentinel can be armed with your choice of autocannon, heavy flamer, lascannon, missile launcher, multi-laser, or plasma cannon on its right side hardpoint, meaning that this flexible walker can be used in any battlefield role. There’s also an optional posable Sentinel chainsaw on its left side hardpoint for more melee punch, and an optional hunter-killer missile for even more firepower. You'll find a variety of cosmetic options, including a searchlight and smoke launchers, stowage and spare equipment racks, extra fuel canisters, and four different heads for the pilot.

    This miniature can alternatively be built as an Armoured Sentinel with an enclosed cockpit, which trades speed for extra durability in the harshest war zones.

    This kit is supplied with 1x Astra Militarum Vehicle Transfer Sheet, containing 475 high-quality waterslide transfers to decorate your miniatures. These include heraldry for regiments from Cadia, Catachan, Valhalla, Vostroya, Mordian, Tallarn, Krieg, and Tanith, along with squad markings, numerals, and more.

    This kit comprises 91 plastic components and 1x Citadel 80mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Achilles Ridgerunner
  productCode: prod4140167-99120117025
  sku: 99120117025
  ean: 5011921171996
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Genestealer-Cults-Achilles-Ridgerunner-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120117015_GSCAchilliesRidgerunner01.jpg
  status: current
  description: |-
    Achilles Ridgerunners range into deadly frontier environments, their pilots scanning for promising resource deposits and communicating their location back to base. Though well equipped to engage enemy scouts and outriders, the Achilles Ridgerunner's true qualities lie in its ability to rove ahead of the cult's main forces, scouting out potential ambush sites and routes of ingress into the foe's territory.

    Achilles Ridgerunners are fast-moving buggies capable of carrying a significant amount of ordnance. They can also operate as a vital support vehicle for units of Atalan Jackals, giving that unit even more manoeuvrability. Equipped with two heavy stubbers, it can also take either a heavy mining laser, a heavy mortar or a missile launcher, providing any Genestealer Cults player with useful toolbox for dealing with any enemy.

    This pack contains a single plastic Achilles Ridgerunner armed with two heavy stubbers, and a choice of either a heavy mining laser, a heavy mortar, or a missile launcher. It comes with a host of other options and optional wargear, and a single 120mm oval base.
- name: Goliath Rockgrinder
  productCode: prod3290293-99120117018
  sku: 99120117018
  ean: 5011921171927
