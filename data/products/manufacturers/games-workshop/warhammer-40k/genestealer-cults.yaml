  description: |-
    The Death Korps of Krieg's grim regiments excel in the most gruelling of conditions – their famous siege troops holding key positions no matter the onslaught unleashed upon them. They're not unlike a pitiless cult of sacrifice – with their legendary endurance, death often claims their foes first.

    This multipart plastic kit builds 10 stalwart Death Korps of Krieg troopers for your Astra Militarum armies in games of Warhammer 40,000. Armed with utilitarian lasguns and equipped with gas masks, they are ready to enter the meatgrinder of war.

    This kit is extremely versatile, with lots of options to customise your unit. One miniature can be built as a Watchmaster – armed with a plasma pistol, laspistol, or bolt pistol, and a chainsword or power weapon in the other hand. One miniature can be equipped with a sharpshooter's long-las, one with a flamer, one with a grenade launcher, and one with a plasma gun or meltagun. The vox-operator can be assembled with either binoculars or a grenade in their left hand, and one miniature can be built carrying a medi-pack. There are also plenty of cosmetic accessories to further decorate your miniatures, including bayonets, pickaxes, belt pouches, grenades, and more.

    This kit comprises 130 plastic components, and 10x Citadel 25mm Round Bases. This set also includes 1x Death Korps of Krieg Transfer Sheet containing 803 waterslide transfers to customise your models.

    These miniatures are unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
