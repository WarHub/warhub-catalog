    This multipart plastic kit builds a Catachan Command Squad, unyielding leaders for your Astra Militarum armies in games of Warhammer 40,000. The unit consists of a Catachan Commander and four Veteran Guardsmen who bring a wealth of experience and special abilities to your army.

    The Commander can be equipped with a plasma pistol, bolt pistol, or laspistol, and can also take a boltgun, chainsword, power fist, or power weapon. The kit includes a sniper rifle, heavy flamer, plasma gun, grenade launcher, flamer, and meltagun to arm your Veteran Guardsmen. Alternatively, one Veteran Guardsman can be equipped with a medi-pack, one with a master vox, and one with a regimental standard – there are two different banner options in the kit. There is also a range of optional cosmetic accessories to further decorate your miniatures, making it easy to personalise your squad.

