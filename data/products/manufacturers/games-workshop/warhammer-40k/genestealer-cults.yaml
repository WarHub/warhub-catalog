    Infinitely adaptable, hard-wearing and rugged, the Goliath Truck is a mainstay of the Genestealer Cults. Fast and manoeuvrable, it bounces around the battlefield laying down walls of gunfire, heavy stubbers and autocannons ablaze. Once dedicated to the shadows, the crew manning the Goliath – proudly emblazoned with insignia of the Cult – now do everything in their power to get as close to the enemy, screaming rapidly across even the most hostile terrain to slam open their cargo compartment and disgorge broods of up to 10 scuttling Hybrids.

    This multi-part plastic kit contains the components necessary to assemble a Goliath Truck, transport and offensive vehicle of the Genestealer Cults. It comes armed with a heavy stubber and twin-linked autocannon, and features a ton of customisation opportunities – the 4 crewmen have their own options and the wheels can be attached with high ground clearance.

    This kit can also be assembled as a Goliath Rockgrinder.
- name: Broodcoven
  productCode: prod3290256-99120117017
  sku: 99120117017
  ean: 5011921171910
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/Genestealer-Cults-Broodcoven
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120117001_Broodcoven01.jpg
  status: current
  description: |-
    The Patriarch and his Broodcoven dominate the minds and hearts of the cultists in their thrall. Masters of psychic and physical power, they muster and command the actions of the cult’s many generations to ensure their targets are torn down in short order. Every word spoken by the Magus or Primus is obeyed to the letter by their faithful congregation, for they speak on behalf of the Star Saviour himself. This cocktail of psychic power, inspirational presence and dark charisma is a potent stimulant to the cultists around them. Perhaps realising they would soon be doomed should their masters leave them, the lesser warriors of the cult will fight tooth and claw to defend them – and on the day of battle, the best form of defence is attack...

    This box contains all the parts necessary to assemble the Broodcoven, a formation found in Codex: Genestealer Cults. You’ll receive a Patriarch, a Primus armed with needle pistol, bonesword and toxin injector, and a Magus, armed with autopistol and force stave and including 2 Genestealer Familiars – a charismatic and deadly combination of Genestealer Cults miniatures.
