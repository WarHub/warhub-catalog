    Cadian Castellans are strategic senior officers, often formally ranked as Captains or Colonels. These authoritative leaders of the Astra Militarum's forces bear a panoply of armaments and insignia that mark their high office, wielding their array of weapons as skilfully as they command the countless soldiers beneath them.

    This multipart plastic kit builds a Cadian Castellan – a senior leader of the Astra Militarum. This hugely customisable miniature can be armed with a las pistol, bolt pistol, or plasma pistol in one hand, or instead point sternly forward. In the other hand, they can wield a chainsword, power sword, boltgun, or a power fist with a back-mounted generator. The kit also includes a variety of aesthetic options, including a choice of two torso poses, various arm poses, four distinctive heads, and accessories such as pistol holsters, purity seals, pouches, and a sheathed sword.

    The miniature also features a scenic base, allowing the Castellan to be posed in an appropriately commanding and heroic manner.

