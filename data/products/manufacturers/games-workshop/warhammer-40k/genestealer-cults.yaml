  description: |-
    A Stormsword is ideal for clearing enemy-held choke points. The shells fired by its siege cannon release a concentrated concussive wave on detonation. Those not pulverised outright are torn apart by slivers of the cover they cowered behind, turning barricades to lacerating shards and battlements to storms of razor-edged fragments.

    This gargantuan multipart plastic kit builds a super heavy Stormsword, a thundering tank that wields a full arsenal and is able to absorb punishment that would annihilate a small army. If you’re looking for a lynchpin around which a mighty armoured column can be built, a super heavy tank is a fine choice that can shock your foes and soak up incredible amounts of firepower, sparing the rest of your army. This massive tank is armed with a mighty stormsword siege cannon on the turret, 2 lascannons on side turrets, twin heavy bolters on a forward hull turret, and 2 twin heavy flamers in sponson mounts. The sponson flamers can be replaced with another 2 twin heavy bolters, and extra sponsons can be added with additional lascannons and either twin heavy bolters or twin heavy flamers. That’s a LOT of firepower.

    You’ll also find cosmetic options included, like extra stowage, additional armour plating on the treads, tow hooks, fuel, and options for gunners and tank commanders in the hatches, including a choice of different heads. You can alternatively build the tank commander on foot, armed with a bolt pistol or laspistol in one hand, and a power sword or pointing hand in the other. No matter how you build it, your bits box will appreciate all the extra plastic left over.

    **This massive kit can alternatively build a variety of other super-heavy tanks:**
    - Baneblade – armed with a baneblade cannon for maximum versatility
    - Banesword – armed with a quake cannon to punish vehicles and fortifications at extreme range
    - Shadowsword– armed with a tank-slagging volcano cannon
    - Doomhammer – armed with a titan-slaying magma cannon and troop-carrying capacity
    - Banehammer – armed with a tremor cannon to slow down an aggressive opponent
    - Stormlord – armed with a vulcan mega-bolter and large troop-carrying capacity
    - Hellhammer – armed with a hellhammer cannon for close-quarters warfare

