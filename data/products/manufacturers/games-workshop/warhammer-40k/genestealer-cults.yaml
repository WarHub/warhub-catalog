  status: current
  description: |-
    Ordnance Teams crew some of the largest human-portable weapons fielded by the Astra Militarum. From bombast field guns that lob heavy shells over buildings and intervening squads, to the barrage of warheads fired from malleus rocket launchers, or the searing energy lances unleashed by heavy lascannons, these Field Ordnance Batteries are powerful assets to any general.

    This multipart plastic kit builds two Ordnance Teams – mobile artillery platforms which together form a Field Ordnance Battery. Each Ordnance Team features a gunner and two spotters or loaders, crewing your choice of heavy gun – a wide-saturation malleus rocket launcher, indirect-firing bombast field gun, or vehicle-pounding heavy lascannon. The spotters and loaders are also armed with lasguns and frag grenades.

    The crew members can be mixed up with a variety of cosmetic options, including a choice of twelve different heads and a variety of arms, ammunition, poses, and accessories. The gun carriage can be optionally built without the gunner, and thanks to a parital glueless assembly, the carriages legs can pivot, or the carriage to be built with its legs closed, as if it's ready to be hooked up to a vehicle and towed away.

    This kit comprises 154 plastic components and is supplied with 2x Citadel 100mm Round Bases. Also included is an Astra Militarum Vehicle Transfer Sheet, with 475 transfers featuring numerals, sigils, and a variety of regimental heraldry.

    These miniatures are supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Cadian Shock Troops
  productCode: prod5030164-99120105101
