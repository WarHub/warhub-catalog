    This multi-part plastic kit contains the components necessary to assemble a Goliath Truck, transport and offensive vehicle of the Genestealer Cults. It comes armed with a heavy stubber and twin-linked autocannon, and features a ton of customisation opportunities – the 4 crewmen have their own options and the wheels can be attached with high ground clearance.

