    The Taurox Prime incorporates arcane technologies not available to the wider Astra Militarum, enabling it and its Tempestus Scion cargo to operate in the most hazardous of war zones. More heavily armed than the standard Taurox, it fulfils a tactical support role, with adaptability suited to the specialist missions of its operators.

    This multipart plastic kit builds one Taurox Prime – a fast-moving transport with a versatile range of powerful armaments. The Taurox Prime boasts a choice of turret-mounted heavy weapons – either a battle cannon, gatling cannon, or missile launcher – as well as a pair of autocannons or hot-shot volley guns mounted on either side of its hull. These weapons can be further supplemented by a pintle-mounted storm bolter.

    The tank features a fully-detailed interior complete with a driver, a hatch that can be built closed or open, a turret gunner with a helmeted or bare head who can be positioned at a height of your choice, and other accessories to customise your Taurox Prime – including decorative armour panels, an ornate grille-plate, and a stowed sledgehammer. This kit can alternatively be used to build a standard Taurox.

