- name: Stormlord
  productCode: prod5030186-99120105107
  sku: 99120105107
  ean: 5011921184088
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 120
  url: https://www.warhammer.com/en-GB/shop/astra-militarum-stormlord-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120105107_AMBanebladeLeadStormlord.jpg
  status: current
  description: |-
    Boasting an expanded transport capacity, the Stormlord is the ultimate assault vehicle. From firing steps, the squads it carries level their own firepower at the enemy, but their shots are eclipsed by the hurricane of huge, mass-reactive shells unloaded by the twin barrels of the Stormlord's vulcan mega-bolter.

    This gargantuan multipart plastic kit builds a super heavy Stormlord, a thundering tank that wields a full arsenal and is able to absorb punishment that would annihilate a small army. If you’re looking for a lynchpin around which a mighty armoured column can be built, a super heavy tank is a fine choice that can shock your foes and soak up incredible amounts of firepower, sparing the rest of your army. The Stormlord is armed with a vulcan mega-bolter on the turret, 2 lascannons on side turrets, twin heavy bolters on a forward hull turret, and 2 twin heavy flamers in sponson mounts. The sponson flamers can be replaced with another 2 twin heavy bolters, and extra sponsons can be added with additional lascannons and either twin heavy bolters or twin heavy flamers. That’s a LOT of firepower. That's not to mention the troop-carrying capacity and firing deck for embarked units.

    You’ll also find cosmetic options included, like extra stowage, additional armour plating on the treads, tow hooks, fuel, and options for gunners and tank commanders in the hatches, including a choice of different heads. You can alternatively build the tank commander on foot, armed with a bolt pistol or laspistol in one hand, and a power sword or pointing hand in the other. No matter how you build it, your bits box will appreciate all the extra plastic left over.

    **This massive kit can alternatively build a variety of other super-heavy tanks:**
    - Baneblade – armed with a baneblade cannon for maximum versatility
    - Banesword – armed with a quake cannon to punish vehicles and fortifications at extreme range
    - Shadowsword– armed with a tank-slagging volcano cannon
    - Doomhammer – armed with a titan-slaying magma cannon and troop-carrying capacity
    - Stormsword – armed with a bunker-busting stormsword siege cannon
    - Banehammer – armed with a tremor cannon to slow down an aggressive opponent
    - Hellhammer – armed with a hellhammer cannon for close-quarters warfare

    This kit is comprised of staggering 381 plastic components and one Baneblade Transfer Sheet with 253 transfers.

    This miniature is supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
