    This multipart plastic kit builds three Ironkin Steeljacks, immensely strong and resilient warriors for your Leagues of Votann armies in games of Warhammer 40,000. These hulking creations make ideal shock troops and are an excellent way to add more character to your collection, both tactically and aesthetically, given their height and mechanical nature.

    The unit can be armed with heavy volkanite disintegrators to obliterate enemies at distance, or an Autoch-pattern bolter, and either a plasma sword or concussion gauntlet, to devastate them in melee. There are also parts to build one of the Ironkin Steeljacks as an optional Steeljack Theyn.

    This kit comprises 82 plastic components, 3x Citadel 40mm Round Bases, and 1x Leagues of Votann Transfer Sheet containing 555 high-quality waterslide transfers to decorate your miniatures.

