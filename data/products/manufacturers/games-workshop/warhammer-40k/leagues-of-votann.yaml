  description: |-
    Vynn Bane‑slayer is renowned amongst his kindred as an executioner of the most dire threats and a ruthless guardian of his people’s future. He leads a flexible strike force of versatile Hearthkyn Warriors, elite Einhyr Hearthguard, and heavy Brôkhyr Thunderkyn to expand the Kin's holdings.

    If you want to secure your claim in the name of the Ancestors, this box is the perfect way to start a new Leagues of Votann collection – or expand an existing army – and save money compared to buying the kits individually. The force is led by Vynn Bane-slayer, a mighty hero equipped with heavy exoarmour, and accompanied by a bodyguard of Einhyr Hearthguard. A unit of Brôkhyr Thunderkyn provides ranged support as Hearthkyn Warriors claim key objectives. These 19 plastic miniatures represent a complete Bane‑slayer's Bulwark force for use in tight, tactical Combat Patrol games of Warhammer 40,000. The rules for this Combat Patrol are available as a free download on the Warhammer Community website.

    **This boxed set builds 19 multipart plastic Leagues of Votann miniatures:**
    – 1x Einhyr Champion
    – 3x Brôkhyr Thunderkyn
    – 5x Einhyr Hearthguard
    – 10x Hearthkyn Warriors

    The miniatures in this box are easy to customise. The Einhyr Champion has a choice of a mass hammer or darkstar axe, as well as two options for overhead crests, two heads to choose from, and two designs for their RAM shield.

    The Brôkhyr Thunderkyn can each be armed with the choice of bolt cannons, graviton blast cannons, or powerful SP conversion beamers. There are also seven interchangeable heads and four different visors.

    The Einhyr Hearthguard are each equipped with either an EtaCarn plasma gun or volkanite disintegrator, and either a concussion gauntlet or plasma blade gauntlet. There are also parts to build an optional squad leader who can alternatively be armed with a graviton hammer and has a choice of two different crests. There are 19 interchangeable heads, including male, female, and fully closed visors.

    Each of the Hearthkyn Warriors can be armed with either an Autoch-pattern bolt pistol or an ion blaster. There are parts to build an optional squad leader, who can be armed with a special pistol and a close combat weapon. There is a magna-rail rifle, HYLas auto rifle, L7 missile launcher, EtaCarn plasma beamer, and a pair of plasma knives to upgrade your warriors, along with cosmetic options, including a medipack, multiwave comms array, pan spectral scanner, and 21 interchangeable heads.

    This kit comprises 382 plastic components, 4x Citadel 40mm Round Bases, 5x Citadel 32mm Round Bases, 10x Citadel 28.5mm Round Bases, and 2x Leagues of Votann Transfer Sheets, each containing 555 high-quality waterslide transfers to decorate your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
