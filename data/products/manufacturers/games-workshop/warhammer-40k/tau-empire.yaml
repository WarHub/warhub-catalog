  description: |-
    The Razorshark Strike Fighter is a sleek atmospheric aircraft that is capable of sweeping down from the skies and blasting ground targets with its potent payload. Built along a design pattern modified from this aircraft, the Razorshark Strike Fighter forgoes an Interceptor Drone in favour of additional manoeuvring thrusters, and it trades the pulse bomb generator for a fearsome quad ion turret.

    The Razorshark Strike Fighter kit shows the elegant design of the T'au in all its glory. Its front wingtips are tilted downwards, as are its stabilisers, and these are connected in a way that frames a quad ion turret. Details include Air caste insignia sculpted onto the top of the model, and an array of metal panels, grills and two engines positioned either side of the nose. There are also additional detail such as lights and an aerial. Other weapons options include a twin-linked ion rifle, burst cannon, missile pod, networked markerlight, seeker missiles, as well as two Interceptor Drones that are docked within the wings, but which can be disconnected.

    This multi-part plastic kit contains 51 components and a T'au transfer sheet with which to make either a Sun Shark Bomber or a Razorshark Strike Fighter.

    This kit comes supplied unpainted and requires assembly - we recommend using Citadel Plastic Glue and Citadel Colour Paints.
