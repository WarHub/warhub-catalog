    - 1x Commander in Enforcer Battlesuit \(can alternatively build 1x Commander in Coldstar Battlesuit\)
    - 1x Devilfish
    - 10x Breacher Fire Warriors \(can alternatively build 10x Strike Team Fire Warriors\)
    - 10x Pathfinders
    - 7x Drone models for use as tokens, including 5x Tactical Drones, 1x Recon Drone, and 1x Support Turret
    - 3x T’au Empire Infantry Decals transfer sheets
    - 1x T’au Empire Vehicle Decals transfer sheet

    All models come with their appropriate bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
