    Fight for the Greater Good with Combat Patrol: T'au Empire! This boxed set is loaded with a balanced force of versatile units, offering enough mobility and firepower to sweep the battlefield clear. This box also allows you to save money compared to buying each kit individually, making it an excellent way to start your army or expand an existing collection. These miniatures can also be used as a complete T'au Empire force for Combat Patrol games of Warhammer 40,000 – the Combat Patrol rules are available as a [free download on the Warhammer Community website](https://www.warhammer-community.com/warhammer-40000-downloads/#combat-patrol-datasheets).

