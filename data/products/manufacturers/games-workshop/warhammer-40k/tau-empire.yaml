  url: https://www.warhammer.com/en-GB/shop/combat-patrol-kroot-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120113100_TAUCombatPatrolKroot1.jpg
  description: |-
    The Kroot are pledged to the T'au Empire, but often form their own hunting parties that range far ahead of the main forces. They wield weapons unique to their culture, combining their own preferred tactics with advanced technology, and granting the T'au a contingent of melee specialists. Kroot is a general term for a range of different creatures, including everything from muscled Krootox beasts to agile Kroot Hounds.

    **Get Ready To Hunt**

    This packed box is the perfect way to start a new Kroot-themed T'au Empire collection – or expand an existing army – and save money compared to buying the kits individually. The army is led from the front by a Kroot Lone-spear sitting on the back of a lizard-like Kalamandra. Behind him charge Krootox Rampagers, an elite melee line-breaker unit. The core of the force is composed of a Farstalker Kinband, deadly hunters and versatile warriors capable of taking and holding vital objectives. Supporting the force is a Krootox Rider equipped with a heavy weapon. These 17 multipart plastic miniatures represent a complete T'au Empire force for use in tight, tactical Combat Patrol games of Warhammer 40,000. The rules for this Combat Patrol are available as a free download on the Warhammer Community website. This boxed set is only available while stocks last.

    **This boxed set builds 17 multipart plastic T'au Empire miniatures:**
    – 1x Kroot Lone-spear
    – 1x Krootox Rider
    – 3x Krootox Rampagers
    – 12x Farstalker Kinband warriors

    The miniatures in this box are easy to customise. The Kroot Lone-spear can be armed with either a massive Kroot long gun for sniping prey at a distance, or an explosive blast javelin and a quiver of razor-tipped hunting javelins for taking out high-value victims up-close. There’s a choice of two heads for the Lone-spear, as well as two head options and two poses for their Kalamandra.

    The Krootox Rider carries one of two heavy weapons into battle – either a rapid-fire repeater cannon or a tanglecannon. The Krootox and rider both have a choice of two heads.

    One of the Krootox Rampagers has a choice of two heads for both the rider and the mount, and the rider can be armed with a pistol or a blade. Another rider can choose between a blade and an axe.

    The Farstalker Kinband is a versatile kit. The Kill-broker leader can be armed with either a Farstalker firearm or a T'au-tech rifle. Six of the Farstalkers have a choice of two different firearms, one can be optionally equipped for melee, one can take a Pech'ra, and another can take a Dvorgite skinner or a Londaxi tribalest. There are 13 interchangeable heads, 13 optional accessories, and the two Kroot Hound heads are interchangeable.

    This kit comprises 297 plastic components, 1 Citadel 90mm by 52.5mm Oval Base, 1 Citadel 32mm Round Base, 4 Citadel 50mm Round Bases, and 11 Citadel 28.5mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
