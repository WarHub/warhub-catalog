  status: current
  description: |-
    The battlefields of the 41st Millennium are filled with the ruins of buildings, hulks of strange machines, and dangerous remnants of toxic structures. The soldiers of this benighted time are thankful for them nonetheless, providing scraps of cover to shield their advance as they duck and dodge between crumbling masonry, ruptured pipes, and rusted gears.

    This multipart plastic kit builds an Autochoral Transmitter, a piece of thematic battlefield terrain for your games of Warhammer 40,000. It's fully compatible with the modular Battlezone: Manufactorum range, meaning it will fit right in with the rest of your collection, while adding interest and focus.

    The Autochoral Transmitter stands at 165mm tall, and includes interesting details and features that hint at its purpose, such as the tech-priest like statue, bank of power cells, loads of skulls, and internal wires and contacts behind the decorative elements.

    This kit comprises 7 plastic components. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Terrain rules can be found in the *Warhammer 40,000 Core Book*, which is available separately.
