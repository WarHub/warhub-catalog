    The claiming of war trophies by victorious forces has been commonplace for millennia. While in centuries past, these souvenirs may have taken the form of flags, art, weapons, or other trinkets, in the grim darkness of the 41st Millennium, the spoils of war are much more macabre.

    Customise your miniatures with the contents of this morbid kit, featuring a huge variety of components that can be added to bases or used as narrative elements. This collection includes skulls – human, alien, and other – as well as severed heads, some still wearing the helmets of their previous owner. Also included are other grim tokens such as parts of servo skulls, and an – almost – complete fallen Space Marine.

