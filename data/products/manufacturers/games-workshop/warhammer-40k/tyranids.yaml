  url: https://www.warhammer.com/en-GB/shop/combat-patrol-tyranid-assault-brood-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120106081_TyranidAssaultBroodCombatPatrol1.jpg
  description: |-
    Tyranids come in a shocking variety of forms, each more terrible than the last. Small disruption forces have been observed, led by a so-called Parasite of Mortrex. Forces are protected by slab-armoured Tyrant Guard and supported by walking artillery known as Biovores, who lob living spore mines high across the battlefield. Perhaps the most dangerous element is the aggressive and stealthy Genestealers, rushing forward to rend and tear with long, razor-sharp claws.

    If you want to consume all of the biomass in the galaxy, this box is the perfect way to start a new Tyranids collection – or expand an existing army – and save money compared to buying the kits individually. Leading the force is a nightmarish Parasite of Mortrex, infecting its prey with a barbed ovipositor. Three Tyrant Guard can smash through even the toughest of enemies while Genestealers scuttle forwards to mop up any survivors. Finally, a Biovore provides long-ranged support. These 18 plastic miniatures represent a complete Tyranid Assault Brood for use in tight, tactical Combat Patrol games of Warhammer 40,000 – the rules for this Combat Patrol are available as a free download on the Warhammer Community website.

    **This set builds 18 plastic Tyranid miniatures:**
    – 1x Parasite of Mortrex
    – 3x Tyrant Guard \(which can alternatively be built as Hive Guard\)
    – 1x Biovore \(which can alternatively be built as a Pyrovore\)
    – 3x Spore Mines
    – 10x Genestealers

    The miniatures in this box are easy to customise. The Genestealers each have a choice of head option, and the Biovore can alternatively be built as a flame-spewing Pyrovore.

    The Tyrant Guard can be armed with crushing claws, scything talons, or a bone sword and lash whip. The heads, bodies, tails, legs, arms, and weapons are interchangeable across the miniatures, meaning you can unleash your inner Hive Mind when building them. They can alternatively be built as Hive Guard, armed with either an impaler cannon or shockcannon.

    This kit comprises 260 plastic components, 1x Citadel 80mm Round Base, 1x Citadel 40mm Round Base, 3x Citadel 25mm Round Base, 3x Citadel 50mm Round Bases, and 10x Citadel 32mm Round Bases.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
