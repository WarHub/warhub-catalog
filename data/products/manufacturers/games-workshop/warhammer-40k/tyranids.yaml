  description: |-
    Barbgaunts are little more than living weapons, their bodies and biological cannons slaved to the will of a pulsating ganglio-parasite that piggybacks them into battle. Once there, they unleash volleys of chitinous barbs that detonate with the fury of violent muscle-spasms, transfixing nearby victims with a hail of jagged projectiles.

    This multipart plastic kit builds five Barbgaunts – Tyranid creatures engineered as biological artillery. Each of these hunched and hulking gaunt-forms is fused to a grotesque barblauncher – five stout limbs serve to support its living weapon or provide a stable firing platform, while the sixth is little more than an atrophied talon. These beasts of burden are controlled by cerebral parasites, fleshy tendrils digging into each Barbgaunt's eyeless skull to direct its organic payload.

