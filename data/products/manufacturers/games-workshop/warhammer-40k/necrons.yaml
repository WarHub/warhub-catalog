    Many Necron invasions begin with Night Scythes flitting through a world’s void defences. Potent aerial fighters in their own right, Night Scythes also employ invasion beams to generate captive wormholes through which invading infantry can march direct from distant Necron tomb worlds to begin their conquests anew.

    The crescent-shaped Night Scythe is an impressive model. It’s numerous, elegant panels are covered in Necron iconography, and there are many orbs and grills located around the model, alongside a spine-like engine. As well as a Necron pilot tucked away in the centre of the model, it sports a twin-linked tesla destructor. The Night Scythe can devastate lightly armoured foes with these weapons, before delivering its payload of passengers onto the battlefield to capture key objectives.

