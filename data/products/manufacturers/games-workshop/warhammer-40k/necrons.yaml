  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110052_NecronWarriorsLead.jpg
  status: current
  description: |-
    Necron Warriors form the majority of a tomb world's nigh-inexhaustible armies. They are a corps of fleshless mechanoids, ranged in their millions against the vital races of the galaxy. Ancient limbs are corroded with age, yet the strength of their metal sinews has not faded, nor has the hard-wired loyalty to their Overlords.

    Canoptek Scarab Swarms are found throughout tomb worlds and Necron spacecraft, where automated routines compel them to break down damaged matter of all kinds with their entropic mandibles. They feed on organic and non-organic matter alike, converting it into energy which is re-routed into repair protocols.

    Whether you're looking to cut down the enemy at range with gauss flayers or march inexorably forward to shred them at close range with gauss reapers, all the while assailing them with swarms of Canoptek Scarabs, this is the perfect kit to build your Necron army around.

    This kit builds ten Necron Warriors – each with a choice of two heads and the option of either a gauss flayer or gauss reaper – as well as three Scarab Swarms. Push-fit construction means you won't need any glue to build it. The kit is supplied in 70 plastic components and comes with ten Citadel 32mm Round Bases and three Citadel 40mm Hex Hole Round Bases.
- name: Skorpekh Destroyers
  productCode: prod4530326-99120110051
  sku: 99120110051
  ean: 5011921138586
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Skorpekh-Destroyers-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110051_SkorpekhDestroyersLead.jpg
  status: current
  description: |-
    Striding forward in a rush of ungainly steps, their weaponised limbs sweeping in a whirlwind of gore, Skorpekh Destroyers feed their need to kill whenever they are unleashed upon the battlefield. Nothing else can override the hard-wired desire to kill that empowers these deranged Necrons.

    Canoptek Plasmacytes use their monomolecular proboscis to inject an infectious, sentient energy into the degranged members of the Destroyer Cults. This hateful substance – as dangerous as it is powerful – heightens their nihilistic insanity and drives their mindless annihilation to new heights.

    Skorpekh Destroyers are among the most lethal close-combat killers within the ranks of the Necron legions. If tearing the enemy army asunder is what you seek, then look no further than these gloriously insane slaughterers, whose killing prowess you can amplify even further with the attention of the Plasmacyte!

    This kit builds three Skorpekh Destroyers – two armed with hyperphase threshers and one with a hyperphase reap-blade – as well as a Plasmacyte. Push-fit construction means you won't need any glue to build it. The kit is supplied in 29 plastic components and comes with three Citadel 50mm Hex Hole Round Bases and one Citadel 28.5mm Hex Hole Round Base.
- name: Hexmark Destroyer
  productCode: prod4530325-99120110048
  sku: 99120110048
  ean: 5011921135196
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Hexmark-Destroyer-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110048_HexmarkDestroyerLead.jpg
  status: current
  description: |-
    Hexmark Destroyers were once Deathmarks. Bursting from their dimensional oubliettes like ambush predators, these hunchbacked monsters unleash inescapable hails of enmitic fire. Independent ocular targeting and optimised firing patterns leave their prey with no escape.

    All but unrivalled in close-range firepower, each Hexmark Destroyer is like a mobile gun battery, able to blast its way through hordes of enemy infantry with impunity. If you're looking to support your advance or shore up a flank with some formidable fire support, a Hexmark Destroyer will serve you well.

    This kit builds a single Hexmark Destroyer, armed with six enmitic disintegrator pistols, and comes with a choice of two heads. The kit is supplied in 19 plastic components and one Citadel 50mm Round Base.
- name: Tomb Blades
  productCode: prod4510311-99120110059
  sku: 99120110059
  ean: 5011921139149
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Necron-Tomb-Blades-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110059_NECTombBladesLead.jpg
  status: current
  description: |-
    The Tomb Blade has a curious motion for a craft of its design, eschewing the arrow-straight attack vectors of other jetbikes and fighter craft. It often corkscrews across the battlefield rather than taking a more direction approach. No flesh and blood pilot could ever hope to contend with such an anarchic approach without succumbing to blackouts and nausea, but such hazards have no hold over machines. Tomb Blades often operate far ahead of the main army, striking at lightly defended positions, supply convoys and other targets of opportunity. Such is the Tomb Blade's unpredictable advance that the piercing whine of its dimensional repulsors is often the only clue to its approach. Astute enemies dive for any cover they can find; others disintegrate as the air around them explodes in a blaze of unstable energy.

    Tomb Blades are the perfect unit for taking out your enemy's most irritating units. People who fight against your Necron army imagine them to be an implacable wall of metal, which advances steadily across the battlefield. Your enemies will be pretty surprised, therefore, when a wave of razor-sharp, fast-moving Tomb Blades descend from the sky and mow down their troops with concentrated tesla fire.

    This multi-part plastic boxed set contains 162 components with which to build three Necron Tomb Blades. This set comes with 2 small flying stems, 2 long flying stems, 3 small flying bases and 2 Necron transfer sheets.
- name: Necron Catacomb Command Barge
