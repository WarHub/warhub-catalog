  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110058_TriarchLychguardLead.jpg
  status: current
  description: |-
    The Lychguard are the wardens of the nobility, said to be utterly dedicated to their charges. While most Necrons wear a suit of living metal, the Lychguard wear huge suits of ancient armour.

    The Lychguard models are highly detailed, and display the rich iconography and dynastic glyphs in all their glory, be that on their ancient armour or on the heavy coffin-shaped shields. As well as the classic skeletal metal frame, they wear segmented metallic loincloths and carry bulky weaponry including heavy-bladed warscythes, though some carry hyperphase swords and dispersion shields.

    This multi-part plastic boxed set contains 111 components, five Citadel 32mm Round Bases and two Necron transfer sheets with which to build five Necron Lychguard or five Triarch Praetorians.
- name: Illuminor Szeras
  productCode: prod4470147-99120110049
  sku: 99120110049
  ean: 5011921136964
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Necrons-Illuminor-Szeras-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110049_IlluminorSzerasLead.jpg
  status: current
  description: |-
    Illuminor Szeras labours to unravel the mysteries of life, for he fears that he would be a poor sort of god without the secrets of life at his fingertips. Szeras has been on the brink of understanding for many centuries, yet somehow final comprehension always escapes him. Though this is his obsession, his aptitude for augmenting the weaponry and even the mechanical bodies of his fellow Necrons is peerless. On occasion, Szeras' talents are in such demand that he can name his own price – invariably a harvesting raid targeted against a world of his choosing. Above all, Szeras cherishes Aeldari subjects, as they inevitably produce more intriguing results than any other of the galaxy's creatures. Once seized, his specimens can look forward only to a pain-filled, though not necessarily brief, existence in the bloodstained laboratory catacombs of Zantragora.

    Illuminor Szeras is a powerful HQ choice for the Necrons army, able to mechanically augment his warriors to new heights of battlefield potency. He wields an eldritch lance – an ancient and terrible weapon that can be used to smite foes from afar or strike them down in combat.

    This pack is supplied as 34 plastic components and comes with a Citadel 80mm Round Base. The updated Warhammer 40,000 datasheet for Illuminor Szeras is included in the box.
- name: C'tan Shard of The Deceiver
  productCode: prod1380048a-99810110003
