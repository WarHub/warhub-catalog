  description: |-
    The Necrons rise across the galaxy, android legions emerging from stasis-crypts after millions of years in deathless slumber. Amonhotekh's Guard stalk the worlds that once belonged to their master, the Overlord Amonhotekh, to cleanse the flesh-vermin and lesser civilisations that now infest his ancient territories. He will stop at nothing to eradicate these pests, calling upon mighty Canoptek constructs, mindless warrior phalanxes, and even the raving Destroyer Cults to eliminate all trespassers.

    Reclaim the galaxy with Combat Patrol: Necrons! This boxed set contains all the units you need to start your army or expand an existing collection, and will save you money compared to buying the contents individually. These miniatures provide a balanced core for any Necrons army, and can also be used as a complete force for Combat Patrol games of Warhammer 40,000 – the Combat Patrol rules are available as a free download on the [Warhammer Community website](https://www.warhammer-community.com/warhammer-40000-downloads/#combat-patrol-datasheets).

