  status: current
  description: |-
    The Nightbringer was once death incarnate – a sadistic god with the power to unmake the stars and a hunger for the life of the galaxy. Like its fellow C’tan, it was shattered by the Necrons, and its insane fragments have ever since been enslaved by those it once ruled. A single shard of the Nightbringer can destroy entire armies. They extrude scythe‑shaped blades from their necrodermis, using them to cull their enemies with great sweeps of entropic unmaking. Their very gaze, meanwhile, is death itself, capable of leeching the essential animus from their victims.

    This multipart plastic kit builds a C'tan Shard of the Nightbringer, the most dangerous of the star god fragments, for your Necrons army in games of Warhammer 40,000. While no longer able to unmake the stars themselves, it can still reap a terrible toll of enemies upon the battlefield with its powerful scythe, and its gaze can wither and weaken even the mightiest of foes. The Shard of the Nightbringer is ideal for getting stuck in where the fighting is thickest, rewarding an aggressive playstyle. It’s also a stunning centrepiece miniature for any collection, and painters will love the digital fragmentation of the robes, swarm of scarabs, and living metal body.

    This kit comprises 31 plastic components and 1x Citadel 90mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using this miniature in Warhammer 40,000 are available as a free download on the Warhammer Community website.
