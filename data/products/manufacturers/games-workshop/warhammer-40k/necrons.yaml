  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110086_KTCanoptekCircle01.jpg
  status: current
  description: |-
    A Canoptek Circle is a unit of sleepless sentinels that defend a Necron Tomb World by tapping into esoteric power matrices to empower their insectile forms. Led by a Cryptek Geomancer, these constructs are extremely difficult to kill, and even when they are seemingly destroyed, they can be quickly repaired and returned to the fight.

    This multipart plastic kit builds eight Canoptek Circle miniatures. These miniatures can be used as relentless Canoptek Circle operatives in games of Kill Team, or fielded in a Necron army in games of Warhammer 40,000. The kit builds one Geomancer, two Tomb Crawlers, and five Macrocyte Warriors. A choice of weapon options is included in the kit to customise your Tomb Crawlers and Macrocyte Warriors, plus components to build specialists like the empowering Macrocyte Accelerator and repairing Macrocyte Reanimator.

    Inside the box, you will also find a sheet of 28 double-sided Canoptek Circle tokens, so you can easily keep track of your weapons loadout and in-game effects in the heat of battle.

    This kit comprises 70 plastic components, 3x Citadel 50mm Round Bases, and 5x Citadel 28.5mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
