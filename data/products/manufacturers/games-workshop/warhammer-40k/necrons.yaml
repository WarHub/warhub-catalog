  url: https://www.warhammer.com/en-GB/shop/necrons-orikan-the-diviner-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110081_OrikanDiviner1.jpg
  status: current
  description: |-
    Orikan is a master astromancer, a Necron Cryptek who uses his knowledge of astral conjunctions to predict the tides of battle and empower himself with cosmic energies. He supplements these skills with chronomantic abilities that allow him to see events before they happen and alter the patterns of the past, helping him evade harm and aim his blows to devastating effect. Through careful study and scrutiny, the Diviner has meddled in monumental events and insignificant occurences throughout history, guiding the Necrons toward a future of his choosing.

    This multipart plastic kit builds Orikan the Diviner, the greatest Chronomancer across all the Necron dynasties. Held eerily aloft by his prehensile spine, this legendary figure clutches an active chronometron alongside the Staff of Tomorrow, a temporal instrument that exists half a second ahead of 'now', striking before he even moves. Orikan is festooned with eldritch spheres to drive his divinatory calculations, and draped in a segmented mantle and striking headdress befitting a high Cryptek.

    This kit comprises 15 plastic components and comes with a Citadel 40mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
