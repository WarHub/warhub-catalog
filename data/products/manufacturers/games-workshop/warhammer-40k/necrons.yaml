  status: current
  description: |-
    Lokhust Destroyers are the deranged agents of annihilation whose sole reason for existence is centred around an unshakeable yearning to quench the flames of life. On the battlefield, they shatter enemy formations with heavy fire, before swooping down upon the survivors to ensure that none remain alive.

    This set contains 51 components to make three multi-part plastic Lokhust Destroyers armed with gauss cannons. The kit comes with a Destroyer Transfer Sheet.

    These kits are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Necron Warriors
