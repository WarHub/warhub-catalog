  status: current
  description: |-
    Overlords lead the Necron dynasties into battle. Their android minds are tremendously swift, their bodies are implacably resilient, but their indomitable wills are perhaps most fearsome of all. The armouries of the Overlords contain weapons eldritch and lethal. A shimmering hyperphase blade slices right through dimensional states, while the wrist-mounted tachyon arrow launches an unstoppable thunderbolt of destructive energy.

    This multipart plastic kit builds a Necron Overlord, armed with a tachyon arrow and a deadly blade. He's posed as though assessing his warriors, one leg raised atop fallen rubble, with a tiny scarab-construct scuttling at his feet. His metallic form is covered in mechanical details such as cabling, power nodes, and an armoured carapace, and bears numerous Necrontyr glyphs, symbols of rank, and decorative tassels that sway from his torso.

    This kit comprises five plastic components and comes with a Citadel 40mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
