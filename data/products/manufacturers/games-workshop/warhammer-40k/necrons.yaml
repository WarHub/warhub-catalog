  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/necrons-nekrosor-ammentar-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110089_NecronsNekrosorAmmentar01.jpg
  status: current
  description: |-
    If the being known as Nekrosor Ammentar ever had a true name or identity, it has long since been lost. It is said by some to have been the first to succumb to the Destroyers' madness, and everywhere it goes, murderous insanity follows. Every element of Nekrosor Ammentar’s form has been tailored with the destruction of organic victims in mind. Multiple bladed limbs bear scything edges of monomolecular destabilisation, a serpentine tail grants it exceptional mobility, and enmitic projectors tip its additional limbs.

    This multipart plastic kit builds Nekrosor Ammentar, the primary vector of the Destroyer Cults, for your Necron armies in games of Warhammer 40,000. Truly a bizarre and hulking brute, this heavily modified construct is designed to annihilate the living, which it does with blades and enmitic weaponry. If you favour an aggressive force, it makes a fitting leader to charge forward with your fastest units, eager to tear enemies apart and spurring your army on with its sanity-bending presence. As a painting project, the scenic base elements and dynamic pose make it an excellent showcase for your skills, and it will look equally impressive on the tabletop and your display shelves.

    This kit comprises 29 plastic components and 1x Citadel 80mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Rules for using this miniature in Warhammer 40,000 are available as a free download on the Warhammer Community website.
- name: 'Kill Team: Canoptek Circle'
  productCode: P-232088-99120110086
