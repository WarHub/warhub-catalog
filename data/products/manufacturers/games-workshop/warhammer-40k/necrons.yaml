    Psychomancers study the science of fear. They are expert manipulators, conjuring phantasms and temporary hard-light constructs that trigger primal survival instincts in their victims’ minds or overload even the most advanced sensoria. No being is safe from the creeping tendrils of the Psychomancer’s art.

    Add this fearsome character to your Necrons army and watch even the toughest of enemies cower in abject terror! Armed with an abyssal lance, the Psychomancer can unleash the worst fears of your foes against them. They say that Space Marines feel no fear– well, they haven't met this Cryptek yet.

    This 28-part plastic kit makes one Necron Psychomancer for use in games of Warhammer 40,000. It comes supplied with a 40mm Citadel Round base.
- name: C'tan Shard of the Void Dragon
  productCode: prod4530382-99120110054
  sku: 99120110054
  ean: 5011921138616
  eanSource: shopify:goblingaming.co.uk
