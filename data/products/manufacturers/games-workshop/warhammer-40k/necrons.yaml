  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110079_NECOverlordWithTanslocationShroud01.jpg
  status: current
  description: |-
    Overlords lead the Necron dynasties into battle. Their android minds are tremendously swift, their bodies are implacably resilient, but their indomitable wills are perhaps most fearsome of all. Furnished with a translocation shroud drawn from the dynastic vaults, an Overlord can phase through nether-dimensions, passing through rigid defences and even the flesh of mortal guardians to reach whatever prey or prize they demand.

    This multipart plastic kit builds a Necron Overlord with a translocation shroud, an artefact of arcane dimensional science. He's depicted phasing through space itself, and portions of his body and wargear are already dematerialised into streamers of energy that swirl around him. One of his folded arms carries a deadly hyperphase blade, while the other clutches a resurrection orb. His metallic body is covered in Necrontyr glyphs, as well as mechanical details such as the power nodes that fuel the translocation shroud.

    This kit comprises five plastic components and comes with a Citadel 40mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Orikan the Diviner
  productCode: P-163831-99120110081
  sku: 99120110081
  ean: 5011921205240
  eanSource: shopify:goblingaming.co.uk
  productType: character
