  status: current
  description: |-
    The Seraptek Heavy Construct is one of the largest and most destructive weapons in the Necron arsenal – a mechanised insectoid creation that wields energies that can disintegrate organic and mechanical matter. Despite its bulk, the Seraptek is an agile machine, exerting dominance over nearby Canoptek-class constructs.

    This multi-part resin kit builds a Seraptek Heavy Construct armed with synaptic obliterators and transdimensional projectors – a powerful walking weapons platform for use in Necrons armies in games of Warhammer 40,000. This menacing machine is ideal for smashing through enemy lines with devastating firepower from its arcane weaponry.

    Rules for using this miniature in games of Warhammer 40,000 can be downloaded for free from the Warhammer 40,000 Downloads section of the Warhammer Community website.

    This kit comprises 83 resin components. The miniature is supplied unassembled and unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
