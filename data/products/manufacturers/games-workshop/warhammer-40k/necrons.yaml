    Annihilation Barges are the Necrons favoured anti-infantry support platforms. Each is armed with a linked pair of tesla destructors - enormous energy cannons that fire arcs of eldritch lightning.

    The Annihilation Barge is a striking and imposing model. Adorned with Necron iconography and dynastic glyph, metal panelling and segmented tubes, it makes a fine addition to any Necron collection. It features a scythe-like mid section, the points of which surround two Necron minions that are attending the control dashboard. Above them sits is a huge twin-linked tesla destructor.

    This multi-part plastic boxed set contains 84 components, two Citadel Flying Stems, one Citadel 60mm Flying Base, one Citadel 32mm Round Base and two Necron transfer sheets, with which to build one Annihilation Barge or one Necron Catacomb Command Barge.
