  url: https://www.warhammer.com/en-GB/shop/necrons-royal-warden-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070110007_RoyalWarden1.jpg
  status: current
  description: |-
    Royal Wardens ensure that a Necron noble's will is carried out by their dynasty’s vast armies. They possess the initiative to adapt the strategies of the phalanxes under their command with engrammatic logic, but while they retain independence of thought, protocols buried deep within their living metal cortices render them unquestioningly loyal.

    This multipart plastic kit builds a Royal Warden, an adjutant and enforcer for the greater Necron nobility. The Warden is armed with a sophisticated gauss blaster, more powerful than those wielded by his Immortal comrades, and posed striding forward to lead the Necron legions from the front. His armoured, mechanical body is engraved with a collar of Necrontyr glyphs, indicating his station, and decorated by interlocking metal plates that hang like a cloak of office.

    This kit comprises seven plastic components, and comes with a Citadel 32mm Round Hex Hole Base. This push-fit miniature can be assembled without glue, and is supplied unpainted – we recommend using Citadel Colour paints.
- name: Overlord with Tachyon Arrow
