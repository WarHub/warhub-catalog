  url: https://www.warhammer.com/en-GB/shop/CTan-Shard-of-the-Void-Dragon-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120110054_CTanShardoftheVoidDragonLead.jpg
  status: current
  description: |-
    Shards of the Void Dragon fill the air around them with a searing scream of distorted static. With a gesture they can unmake the war engines of the lesser races, dragging the resultant disintegrating matter into themselves like the gravity well of a black hole and using it to replenish their own, ever flickering forms.

    This amazing model seems to be hovering above the battlefield, empowered by the crackling energy of mysterious blackstone. Its incredible necrodermis is almost indestructible while nothing can survive an attack from its spear. Not only will it dominate games of Warhammer 40,000, this incredible centrepiece kit represents a fantastic painting challenge.

    This 33 part plastic kit makes one C'tan Shard of the Void Dragon. It is supplied with one 80mm Citadel round base.
- name: Ophydian Destroyers
