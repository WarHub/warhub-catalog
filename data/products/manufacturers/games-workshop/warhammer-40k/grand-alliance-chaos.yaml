- name: Tormentbringer / Bladebringer
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5011921032686'
  eanSource: shopify:goblingaming.co.uk
  sku: '99129915012'
  productCode: prod5000419-99129915012
  priceGbp: 23
  url: https://www.warhammer.com/en-GB/shop/tormentbringer-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915012_TormentBringerChariotSlaaneshUpdateLead.jpg
  description: |-
    Heralds of Slaanesh who claim a chariot for their own are known to mortals as Tormentbringers or Bladebringers. Whether mounted atop the spinning blades of a hungry Hellflayer or racing aboard a Seeker Chariot, these vain creatures luxuriate in standing above their lesser kin, revelling in the joyous speed and power afforded by their magnificent engines of destruction.

    This multipart plastic kit builds one Herald of Slaanesh mounted atop a daemonic chariot – either a bladed Hellflayer or a slick Seeker Chariot. These imposing war machines mingle delicate metalwork with an eye-watering array of vicious spokes and blades, with a choice of frontal spikes. While the Herald stands triumphant atop her dais, lesser Daemonettes with interchangeable heads either pilot the chariot or ride the sinuous, scaled Seekers who draw it.

    This kit can alternatively be assembled as a Seeker Chariot or a Hellflayer. In addition, you can combine the components of two of these kits to build a mighty Exalted Seeker Chariot.

    The kit comprises 96 plastic components, and is supplied with a Citadel 120x92mm Oval Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
