  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99079915006_KaranakHoundofVengeance01.jpg
  status: current
  description: |-
    Ever watchful, ever hungry, Karanak is the physical manifestation of the Blood God’s wrathful vengeance. Once he has the scent of his quarry, this tireless predator will not cease in his hunt until he tastes their torn flesh between his fangs.

    As a Daemon, you can use Karanak in both Warhammer 40,000 and Warhammer Age of Sigmar. Regardless of which system you use him in, he’s a deadly hero-hunter, who can tear apart even the most durable foe with ease. Capable of denying psychic powers and dispelling magic, he’s great at countering any coward who’d hide behind foul sorceries!

    This set allows you to build Karanak, the Hound of Vengeance for yourself. This three-headed hound will look great alongside your other Flesh Hounds, or as a striking painter’s project.

    This set is supplied in 13 plastic components and is supplied with a 75mm oval base.
- name: Great Unclean One
  productCode: prod3700247-99129915063
  sku: 99129915063
  ean: 5011921170418
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/Great-Unclean-One-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915063_NURMoNGreatUncleanOneLead.jpg
  status: current
  description: |-
    Great Unclean Ones possess the same boundless energy as a swift-spreading virus. Their booming voices roll across the battlefield, their cruel jollity and the perverse pride they take in the achievements of their underlings horribly at odds with the misery and disease they spread.

    This multipart plastic kit builds a Great Unclean One, a greater daemon for your Death Guard or Chaos Daemons armies in games of Warhammer 40,000, or your Maggotkin of Nurgle armies in games of Warhammer Age of Sigmar. They are among the most resilient creatures in the galaxy, capable of absorbing and generously doling out the most grievous damage. The Great Unclean One can be equipped with either a rusted bilesword or a doomsday bell, and a plague flail or bileblade. They also have a choice of two different heads, making it easy to customise your diseased behemoth. The kit includes six Nurglings clutching items such as censers or just hanging about. They can be added to the miniature anywhere you like.

    This kit can alternatively be built as Rotigus, a favoured greater daemon of Nurgle – capable of casting foul sorceries in addition to being just as hard to kill as a Great Unclean One.

    This kit comprises 59 plastic components, and 1x Citadel 130mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Lord of Change
  productCode: prod3260146-99129915065
  sku: 99129915065
  ean: 5011921178650
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/lord-of-change-2016
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915028_LordofChange01.jpg
  status: current
  description: |-
    Lords of Change are infinitely cunning sorcerers and manipulators. Their malevolent gaze lays bare the souls of their victims, and blasts the sanity of even the staunchest mortal, while their ensorcelled weapons and unholy magicks violently reshape reality itself into ever-mutating forms.

    This multipart plastic kit builds a Lord of Change, a Greater Daemon of Tzeentch, for your Thousand Sons or Chaos Daemons armies in games of Warhammer 40,000, or your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. This twisted creature is a force to be reckoned with. Between blasts of sorcerous power and strikes from their magic-infused weapons, they deliver terrifying amounts of damage to your enemies. The kit is highly customisable – you can model the wings in two different configurations, choose from one of three different heads, and it can be equipped with a rod of sorcery, a baleful sword, or carry a Staff of Tzeentch in both hands. Such a majestic miniature will surely be the jewel of your collection – just as planned.

    This kit can alternatively be built as the legendary Kairos Fateweaver, a favoured Greater Daemon of Tzeentch.

    This kit comprises 72 plastic components and 1x Citadel 100mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
