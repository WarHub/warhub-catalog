  url: https://www.warhammer.com/en-GB/shop/blue-horrors-2016
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915029_BlueHorrors01.jpg
  description: |-
    Blue Horrors are sullen, malevolent entities, as likely to throttle victims with their rubbery fingers out of sheer spite as to melt them like tallow with conjured gouts of mutating warpflame. Should one of these wretched beings be slain, it bursts into a roiling cloud of fume from which a pair of crackling Brimstone Horrors emerge.

    This multipart plastic kit builds 10 Blue Horrors and 10 Brimstone Horrors, daemonic infantry for your Thousand Sons or Chaos Daemons armies in games of Warhammer 40,000, or your Disciples of Tzeentch in games of Warhammer Age of Sigmar. The Blue Horrors are larger, wielding an assortment of daemonic flames, fanged maws, and cruel blades. When slain, their bodies tear apart to reveal a pair of Brimstone Horrors – spiteful daemons made of leaping, animated fire. This makes them especially hard to get rid of, soaking up loads of damage and tying up important enemy units.

    This kit comprises 40 plastic components, and 20x Citadel 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
