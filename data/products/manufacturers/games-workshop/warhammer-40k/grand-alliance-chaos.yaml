  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5011921032686'
  eanSource: shopify:goblingaming.co.uk
  sku: '99129915012'
  productCode: prod5000418-99129915012
  priceGbp: 23
  url: https://www.warhammer.com/en-GB/shop/hellflayer-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915012_HellflayerUpdateLead.jpg
  description: |-
    Mortal myth describes the Hellflayers as devices for tending the gruesome pleasure-gardens of the Dark Prince’s realm, dismembering those cursed to lie there in purgatory. Their efficacy in war is undeniable, however, as wild Daemonette crews unleash the whirl-bladed murder engines upon the enemies of excess, delivering death by a thousand cuts.

    This multipart plastic kit builds one Hellflayer, a blade-axled daemonic chariot. These imposing constructs mingle delicate metalwork with an eye-watering array of vicious spokes and threshing blades, with a choice of different styles of frontal spike. The chariot is drawn by a pair of sinuous, scaled Seekers, and controlled by a trio of Daemonettes with a choice of head options – one mounted atop its platform, two riding the Seekers and wielding hooked whips.

    This kit can alternatively be assembled as a Seeker Chariot, or as a Herald of Slaanesh mounted atop either a Hellflayer or Seeker Chariot. In addition, you can combine the components of two of these kits to build a mighty Exalted Seeker Chariot.

    The kit comprises 96 plastic components, and is supplied with a Citadel 120x92mm Oval Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
