- name: Fateskimmer, Herald of Tzeentch on Burning Chariot
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5011921077328'
  eanSource: shopify:goblingaming.co.uk
  sku: '99129915030'
  productCode: prod3270135-99129915030
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/herald-of-tzeentch-on-burning-chariot-2016
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915030_HeraldonBurningChariot01.jpg
  description: |-
    Trailing arcane flames and maniacal laughter, a Fateskimmer streaks across the skies. While the Herald conjures firestorms to engulf the foe, the Burning Chariot it rides seeks to sear all those in its path, the Screamers at its fore biting their prey as they speed by. These Heralds of Tzeentch ride upon Burning Chariots – arcane constructs fashioned from the energies of dread omens and foretelling. They hurtle along illogical trajectories that defy all physical laws, conjuring firestorms to engulf the enemies of Change.

    This multipart plastic kit builds one Fateskimmer, a daemon sorcerer of Tzeentch mounted on a Burning Chariot. The versatile Herald model comes with a choice of three heads – a toothy Horror's maw, a screeching bird's head, and a leering lunar mask – as well as a huge variety of sorcerous accessories and armaments to create your own arcane champion. Its otherworldly disc is drawn across the skies by a pair of tusked Screamers, trailing eldritch tendrils and mounted with books of magical lore or capering Blue Horrors.

    This extensive kit includes the components necessary to assemble a wide variety of Tzeentch models – in addition to a Fateskimmer, it can be used to also build an Exalted Flamer and three Blue Horrors. Alternatively, it can be used to assemble a Changecaster and either an Exalted Flamer or a Burning Chariot.

    This kit comprises 49 plastic components, and is supplied with a Citadel 32mm Round Base, 3x Citadel 25mm Round Bases, a Citadel 120x92mm Oval Base, and a Citadel 75x42mm Oval Base, to account for all the possible build options. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
