  description: |-
    Kommandos aren't trusted by any right-thinking Orks – they sneak up on the enemy rather than charging in headlong, and have an unhealthy fascination with very big knives and their application to people's backs, throats, and guts. That said, having a band of Kommandos ambush the enemy mid-battle definitely has its uses.

    This multipart plastic kit builds 12 Kommandos, sneaky gits for your Orks armies in games of Warhammer 40,000. Unlike most Orks, they use stealth to get close to the enemy before cutting them down in cold blood, which opens new tactical options for a cunning (but brutal) warlord. This highly customisable kit builds 9 Kommandos armed with sluggas and choppas and a Boss Nob, plus a Bomb Squig and Distraction Grot. There are loads of build options to customise your miniatures, along with ammo pouches, grenades, sheathed knives, holstered weapons, and some of the Kommandos also have head options.

    **The kit contains:**
    – 1x Boss Nob armed with a slugga and either power klaw or big choppa
    – 1x Kommando armed with a slugga and choppa, or a pair of choppas
    – 1x Kommando armed with a slugga and choppa, or a rokkit launcher
    – 1x Kommando armed with a slugga and choppa, or a custom sniper-style shoota
    – 1x Kommando armed with a slugga and choppa, or extra communication equipment
    – 1x Kommando armed with a slugga and choppa, or a breacher ram
    – 1x Kommando armed with a slugga and choppa, or a burna
    – 1x Kommando armed with a slugga and choppa, or a kustom shoota
    – 2x Kommandos, each armed with a slugga and choppa
    – 1x Distraction Grot
    – 1x Bomb Squig

    This kit comprises 150 plastic components, 10x Citadel 32mm Round Bases, 2x Citadel 25mm Round Bases, and 1x Ork Transfer Sheet containing 438 high-quality waterslide transfers to decorate your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
