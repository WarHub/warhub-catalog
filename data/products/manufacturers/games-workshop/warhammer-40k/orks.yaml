    This multipart plastic kit builds one Big Mek, an imposing Ork engineer absolutely covered with mechanical gubbins. This bionik brute is fitted with a teleporting shokk-boosta harness, and laden with kustom weaponry. The kit includes two weapon options for each 'arm' of the suit – the shooty side can take either a kustom mega-blasta or a traktor blasta, while the krumpin' side can wield a power klaw or a drilla. You'll also find two distinct head options, meaning you can build different Big Meks to tend to your teknologikal needs.

