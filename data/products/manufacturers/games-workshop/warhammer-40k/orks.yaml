    When a Speedwaaagh! Is unleashed, entire planets become Ork speedways. The xenos tear across battlefields at breakneck pace, blazing away at anything in their path. Soon enough, the once-proud ranks of the foe are reduced to mangled ruin and the Orks race onward towards the next battle.

    **High-Octane Energy**

    This thrilling boxed set is ideal for starting a new Orks collection – or expanding an existing army – to unleash in games of Warhammer 40,000, and save money compared to buying the kits separately. The force is built around a core of Deffkoptas, rapid-response vehicles ideal for harassing the foe and grabbing objectives. A Deffkilla Wartrike is equipped to get to grips with the enemy fast, with a mix of weapons designed for short-range devastation. One Rukkatrukk Squigbuggy rides in support, lobbing live squigs at the enemy to sow chaos and destruction. When taken together, they are swift, hard-hitting, and ideal for representing a Speedwaaagh! Detachment – the rules for which are found in Armageddon: The Return of Yarrick – Detachments, which is available separately.

    **This boxed set builds 8 multipart plastic Ork miniatures:**
    – 1 Deffkilla Wartrike
    – 1 Rukkatrukk Squigbuggy
    – 6 Deffkoptas

    The miniatures in this box offer some customisation. The Deffkilla Wartrike's driver has a choice of 2 heads, and the Rukkatrukk Squigbuggy has an optional snotling, buzzer squig, and mine squig you can add to the vehicle.

    **Contents:**
    – 213 plastic components
    – 2 Citadel 150mm by 95mm Oval Bases
    – 6 Citadel 75mm Oval Slotta Bases
    – 3 construction guides

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Citadel Colour paints

    This boxed set is only available while stocks last.
