  description: |-
    Plague Marines have disgusting, rotted bodies that stink of decay. Their rotting brains are inured to the agony of bodily corruption, making them all but immune to the pain or debilitation caused by battle wounds. In battle, they are led by veterans of countless wars, champions who are specially blessed by Grandfather Nurgle.

    This multipart plastic kit builds a Plague Marine Champion, an indomitable warrior for your Death Guard armies in games of Warhammer 40,000. Clad in bulging, rusted power armour, he comes with a choice of two variant heads – one helmeted, and one bare with an unsettlingly large horn. Befitting his status as a champion, he's armed with a massive corrupted power fist. This champion makes an ideal alternative to lead your Plague Marines squad and is the only miniature to feature the sassiest of Nurglings.

    This kit comprises 8 plastic components, and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
