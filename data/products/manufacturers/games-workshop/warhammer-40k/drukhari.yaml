  productType: vehicle
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Ravager
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112011_RavagerNEW01.jpg
  status: current
  description: |-
    The Ravager gunship is arrow-swift. Armed with three devastatingly powerful heavy weapons, it provides the Drukhari with armoured fire support, engaging the heaviest of enemy targets. Ravager gunships are so fast and manoeuvrable that they can ambush an enemy tank and destroy it in a single devastating pass disappearing again before the enemy knows what hit them.

    This box set contains one multi-part Drukhari Ravager. This 157-piece set includes: darklances, disintegrator cannons, a selection of aethersail configurations and prow designs that allow you to create a whole armada of distinctive Ravagers. Model supplied with a large flying base.
- name: Hellions
  productCode: prod900153a-99120112009
  sku: 99120112009
  ean: 5011921020263
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 21.5
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Hellions
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112009_HellionsNEW01.jpg
  status: current
  description: |-
    Hellions are airborne killers. Feral Drukhari, they descend upon their prey in a flurry of hooked blades before hurtling away to safety. Hellions ride to war upon skyboards, single-pilot anti-gravity boards, and pump their systems full of combat drugs. They are crazed terror troops who swoop into the midst of the foe, screaming curses and severing limbs with their murderously sharp hellglaives.

    This box set contains five multi-part plastic Drukhari Hellions. This 83-piece set includes: three variations of skyboard, 10 different heads, five different bodies (three male and two female). Also included are weapon options including Hellglaives and an agoniser. Models supplied with small flying bases.
- name: Wyches
  productCode: prod900152a-99120112044
  sku: 99120112044
  ean: 5011921155811
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Wyches
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112008_WychesNEW01.jpg
  status: current
  description: |-
    Wyches are acrobatic murder-artists, exhibiting their incredible arena skills to slay with precision and flair. They wield exotic weapons – hooks, barbed chains or flensing blades – that require superior ability. These are deadly in their hands as they dart, twist and blur around the clumsy attacks of their foes.

    This multipart plastic kit builds ten Wyches, gladiatorial infantry for your Drukhari armies in games of Warhammer 40,000. They can also be used in a Ynnari force in Aeldari armies. These warriors are lethal in melee and ideal for slicing through enemy lines.

    One member of the squad can be assembled as an optional Hekatrix who can be armed with a splinter pistol or blast pistol, and a Hekatarii blade, power sword, or agoniser. They can also take an optional phantasm grenade launcher. The kit includes hydra gauntlets, razorflails, and a shardnet and impaler, along with 14 different heads. The legs, bodies, arms, and heads are all interchangeable, making it easy to customise your unit.

    This kit comprises 92 plastic components, and 10x Citadel 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Lelith Hesperax
  productCode: prod4640177-99120112042
  sku: 99120112042
  ean: 5011921138906
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Drukhari-Lelith-Hesperax-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112042_LelithHesperaxLead.jpg
  status: current
  description: |-
    Lelith Hesperax’s athleticism is far beyond those of other Wyches. She has raised death to a high art, wielding nothing more than simple knives. Gifting her victims with precise wounds in a blur of blade and flesh, she finishes in a bloody finale with a gory flourish.

    There are few fighters in the game with the ability to slaughter enemies wholesale and duel enemy Characters with equally effortless ease, but Lelith Hesperax is no mere fighter! If you're looking for someone not so much to lead your force as to blend their way through the enemy army in a whirlwind of blades, be sure to add this gladiatrix supreme to your collection.

    This kit builds 1x Lelith Hesperax. It comes in 10 plastic components and includes a Citadel 32mm Round Base.
- name: Drazhar
  productCode: prod4390159-99120112050
  sku: 99120112050
  ean: 5011921155873
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Drukhari-Drazhar-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112040_Drazhar01.jpg
  status: current
  description: |-
    In Drazhar, the Incubi ideal of violent perfection is exquisitely personified. His every strike exemplifies the tenets of his order, and each life he claims serves as a gruesome liturgy for his dark brethren. Those Incubi who fight in the presence of Drazhar set aside their deep-seated jealousy and are driven by his unquestionable skill to even greater extremes of martial expertise. Drazhar invariably becomes the locus of murder on the battlefield, the calm centre in a storm of beautifully enacted violence.

    Equipped with the Executioner's demiklaives, nothing can stand before the Master of Blades in combat as he easily slices his way through anyone who dares to challenge him. Clad in segmented armour that is even more ornate than that of the Incubi who follow him, Drazhar makes an amazing painting project as well as an incredible battlefield leader.

    This kit is supplied in 16 plastic components and comes with a 40mm round base. Rules for using Drazhar in games of Warhammer 40,000 can be found in Psychic Awakening: Phoenix Rising.
- name: Talos
  productCode: prod3740157-99120112048
  sku: 99120112048
  ean: 5011921155859
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Talos-Pain-Engine-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112030_Cronos01.jpg
  status: current
  description: |-
    The Talos Pain Engines are seen as the pinnacle of the Haemonculi's art. Creations of mad genius, each one is part organic and part mechanical, festooned with surgical apparatus and horrible-looking weapons of war.

    Only the sickest minds could have created the bewildering Talos Pain Engine. From hooks to chains, to fat curved and serrated blades, there is an eye-watering array of barbaric implements. Within the armoured, shell-like carapace and scorpion-like aesthetic lurks a muscular beast that has been somehow blended with machine in the most horrific manner.

    This multi-part plastic kit contains 89 components with which to make one Drukhari Talos Pain Engine or one Cronos Parasite Engine. The box includes all manner of features: chain-flails, ichor injectors, a liquefier gun and many syringes, as well as several variant heads and arms. It is a remarkably macabre addition to any Drukhari collection.
- name: Cronos
  productCode: prod3740156-99120112048
  sku: 99120112048
  ean: 5011921155859
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Cronos-Parasite-Engine-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112030_Talos01.jpg
  status: current
  description: |-
    The Cronos Parasite Engine is a disturbing, bizarre creation and is used, much like the Talos, as a torture device and war machine.

    Within the armoured, shell-like carapace of the Cronos Parasite Engine lurks a muscular beast that has been somehow blended with machine in the most horrific manner. From hooks to chains, to the numerous segmented tendrils that give it the impression it's drifting along, it comes with an eye-watering array of barbaric implements.

    This multi-part plastic kit contains 89 components with which to make one Cronos Parasite Engine or one Talos Pain Engine. The set includes chain-flails, ichor injectors, a liquefier gun, syringes and adrenaline boosters, as well as several variant heads and arms.
- name: Venom
  productCode: prod3590134-99120112049
  sku: 99120112049
  ean: 5011921155866
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 27
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Venom-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112013_VenomNEW_01.jpg
  status: current
  description: |-
    The Venom is a light transport that uses raw speed to strike at the heart of the enemy’s defence, chase down stragglers, and encircle the foe’s outriders. For the clique of warriors on board, Venoms are mobile firebases and gore-splashed chariots in one, with flickering shields that confound attempts to bring them down.

    This multipart plastic kit builds one Venom, a swift transport for your Drukhari armies in games of Warhammer 40,000. It can also be used in a Ynnari force in Aeldari armies. It's ideal for deploying a small squad right into the heat of the action before supporting them with withering firepower.

    For even more firepower, the twin splinter rifle can be swapped out for an additional splinter cannon. There are lots of cosmetic options in the kit, including two different canopies for the pilot, optional trophy racks and chainsnares, and a choice of three different banner poles. Three optional Wych riders can be added to the Venom – one firing the splinter cannon, and two others holding on. Their heads are interchangeable, and the two passengers can be assembled with a variety of weapons, making it easy to customise your transport.

    This kit comprises 62 plastic components, and 1x Citadel Large Flying Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Haemonculus
  productCode: prod3590121-99070112005
  sku: 99070112005
  ean: 5011921087341
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/Haemonculus-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070112002_Haemonculus01.jpg
  status: current
  description: |-
    Haemonculi are deranged flesh-sculptors that dwell in the dank bowels of Commorragh. They are master torturers, expert poisoners and dark alchemists that are capable of transcending death itself. Their ability to alter the bodies of their victims to create obscene horrors wrought of flesh and bone is an invaluable dark gift, with many of their creations proven to be essential assets when war is waged in realspace.

    This 11-piece plastic kit makes one Haemonculus equipped with an array of deadly surgical instruments and a splinter pistol. His body is born aloft by a grotesquely elongated spine, as he drifts across the field of battle with a macabre elegance, gifting a slow and painful death to all those who cross its path.
- name: Voidraven Bomber
  productCode: prod2680172-99120112020
  sku: 99120112020
  ean: 5011921054473
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 58
  url: https://www.warhammer.com/en-GB/shop/Voidraven-Bomber
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112020_DEVoidRavenBomber01.jpg
  status: current
  description: |-
    The Voidraven Bomber is designed to provide heavy support to Drukhari forces. This sleek, terrifying attack craft is capable of supersonic speeds while delivering a devastating void mine - a bomb that detonates two warheads, one establishes a crackling sphere of energy, the second releases a particle of pure darklight which annihilates anything trapped within the energy field.

    This 71-piece plastic kit is a fantastic centrepiece miniature. When assembled this imposing model has a mighty nine and a half inch wingspan. Positioned halfway up the Voidraven's fuselage is the pilot's cockpit, while the bombardier lies in an armoured crystal dome right at the front, ready to select his next target with the aid of the targeting graphics sculpted onto the clear plastic of the dome. The Voidraven is powered by four huge jet engines that are built into the back of the double-delta wing design that matches the sleek profile of the Razorwing Jetfighter.

    The Voidraven is equipped with a void mine, which is designed to be sited in one of two positions, stowed or ready to drop, under the main fuselage. Two void lances are secured under the wings, which can be exchanged for two dark scythes.
- name: Razorwing Jetfighter
  productCode: prod1230010a-99120112015
  sku: 99120112015
  ean: 5011921022878
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 38.5
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Razorwing-Jetfighter
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112015_RazorwingJetfighterNEW_01.jpg
  status: current
  description: |-
    The Drukhari employ Razorwing Jetfighters to sow destruction and panic in the midst of the foe. No prey is fast enough to outpace these aggressive and consummately skilled fighter craft, for each of their pilots was once a member of the Reaver elite, and to them fighting at breakneck speed is second nature. To ensure the total destruction of their enemies, the Razorwing is equipped with a huge array of weapons with which they can rend, blast, shred and melt their targets. Most deadly of all is the monoscythe missile, engineered to explode at head-height in a horizontal wave of energy that will decapitate anyone nearby.

    This multi-part plastic kit contains one Drukhari Razorwing Jetfighter in 58 components. There are enough parts to equip it with either monoscythe missiles or necrotoxin missiles and a clear plastic canopy, giving you the option to paint the pilot and still be able to see him once the kit is fully assembled. This set is supplied with a clear plastic flying stand and a large oval base. This miniature is supplied unpainted and requires assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Scourges
  productCode: prod1230009a-99120112047
  sku: 99120112047
  ean: 5011921155842
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Dark-Eldar-Scourges
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112014_ScourgesNEW_01.jpg
  status: current
  description: |-
    A rich and daring Drukhari may surrender himself to the Haemonculi, requesting that his bones be hollowed out, that bands of new muscle be grafted onto his torso, and powerful wings and adrenaline dispensers be attached to his shoulders so that he is capable of true flight. The Kabal overlords pay handsomely for these veteran warriors to fight for them and as a result the Scourges will often equip themselves with the best weaponry and armour that they can find. It is rare for the Scourges to engage the enemy up close, preferring to lay down a withering hail of fire before flying away out of harm's reach.

    This multi-part plastic set contains five Drukhari Scourges in 80 components, including plenty of weapon upgrades in the form of a shredder, splinter cannon, haywire blaster, heat lance, blaster and a dark lance. There are also several weapon options should you wish to upgrade one of the Scourges into a Solarite to lead the unit. The set includes five 32mm bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Plastic Glue and Citadel Paints.
- name: Wracks
  productCode: P-228988-99120112033
  sku: 99120112033
  ean: 5011921087518
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/drukhari-wracks-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112033_DRUWracksSquad01.jpg
  status: current
  description: |-
    Wracks are inured to pain – their gnarled hide little more than a leathery mass of old scars. These adepts of fleshcrafting serve the wizened masters of the covens and are as much experiments in stitch and sinew as apprentices to the Haemonculus’ gruesome craft. They are granted a host of cruel tools, butchering blades and arcane bioweapons with which they inflict maximum agony.

    This multipart plastic kit builds 10 Wracks, walking instruments of torture for your Drukhari armies in games of Warhammer 40,000. They're ideal for claiming objectives, and once in place, they're difficult to shift. The miniatures are also incredibly easy to customise, allowing you to live out your flesh-shaping dreams of being a Haemonculus.

    The kit includes the following interchangeable parts:
    – 7x right-handed torturer's tools
    – 10x left-handed torturer's tools
    – 2x liquifier guns
    – 2x ossefactors
    – 2x hexrifles
    – 2x stinger pistols
    – 16x masks
    – 10x backpacks
    – 20x injectors
    – 8x pairs of hip armour plates

    There are also parts to build an optional Acothyst who has a choice of three masks, two trophy racks, and can be armed with an electrocorrosive whip, power weapon, scissorhand, or any of the above weapons. Extra parts are included to convert Wracks into crew for Raiders and Venoms, both of which are available separately.

    This kit comprises 172 plastic components and 10x Citadel 25mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Lady Malys
  productCode: P-228960-99120112054
  sku: 99120112054
  ean: 5011921189687
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/drukhari-lady-malys-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112054_DRULadyMalys01.jpg
  status: current
  description: |-
    Lady Malys is more than a match for most galactic war leaders, with a talent for weaving complex strategic webs around her foes. Whatever schemes her enemies may have, Malys has already foreseen and put contingencies in place, leaving opponents reeling in confusion and easy prey for her flickering blades.

    This multipart plastic kit builds Lady Malys, a powerful strategic leader for your Drukhari armies in games of Warhammer 40,000. Her tactical brilliance will give you an edge in battle. When deployed to the front lines, there is little her long blade and razor fan can't slice through in melee, unleashing a blinding flurry of blows on her hapless foes. The kit includes two different scenic base toppers and a choice of two different heads – one with a veil and one with an uncovered face, offering a degree of customisation for your expert killer.

    This kit comprises 19 plastic components and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: 'Kill Team: Mandrakes'
  productCode: P-189756-99120112055
  sku: 99120112055
  ean: 5011921204120
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 49.5
  url: https://www.warhammer.com/en-GB/shop/kill-team-mandrakes-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112055_KTMandrakes1.jpg
  status: current
  description: |-
    Drukhari Mandrakes creep and crawl closer to their prey like eldritch nightmares in the shadows, appearing suddenly with hateful leers dancing across their inconstant features. Those who survive the impact of their soul-freezing baleblasts soon fall prey to the slash of their glimmersteel blades.

    This multipart plastic kit allows you to build 10 Mandrakes, otherworldly shadow-assassins from the outer depths of the Drukhari's Dark City, Commorragh. These miniatures can be used as Mandrakes operatives in games of Kill Team, or fielded with Drukhari armies in games of Warhammer 40,000. This kit includes various weapons, heads, and accessories, allowing you to assemble a unique squad and build some as specialists for your kill team – such as a balefire-slinging Abyssal, a terrifying Nightfiend, and a greatblade-wielding Chooser of the Flesh.

    Inside the box you will also find a set of 38 Mandrakes tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This set comprises 124 plastic components and is supplied with 10x Citadel 28.5mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: 'Kill Team: Hand of the Archon'
  productCode: P-198768-99120112058
  sku: 99120112058
  ean: 5011921228980
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 36
  url: https://www.warhammer.com/en-GB/shop/kill-team-hand-of-the-archon-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112058_KTHandArchon2.jpg
  status: current
  description: |-
    A Hand of the Archon kill team is formed by the most cunning, cruel, and ambitious of Drukhari Kabalites. These sinister raiders sow terror and pain during their murderous assaults behind enemy lines.

    This multipart plastic kit builds 10 Kabalites, insidious agents of Drukhari warlords. These miniatures can be used as Hand of the Archon operatives in games of Kill Team, or fielded in Drukhari armies in games of Warhammer 40,000. The kit includes loads of components to customise your models and build specialists like the stalking Skysplinter Assassin, flail-wielding Crimson Duellist, toxic Elixicant, and more.

    Inside the box, you will also find a sheet of 38 double-sided Hand of the Archon tokens, so you can easily keep track of your equipment and in-game effects in the heat of battle.

    This kit contains 126 plastic components and 10x Citadel 25mm Round Bases.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
