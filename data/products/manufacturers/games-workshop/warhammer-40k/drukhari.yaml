  productType: combat_patrol
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/combat-patrol-drukhari-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120112057_DRUCombatPatrol01.jpg
  status: current
  description: |-
    The Haemonculus Covens of the Drukhari are known for being sadistic, twisted flesh crafters. Their ranks are filled with mutated Wracks, supported by hulking Talos and Cronos pain engines – tortured creatures that revel in raiding realspace. Haemonculus masters are eager to test their creations in the crucible of battle, and war gives their agonised forces a chance to inflict pain and suffering upon their ill-fated victims.

    If you want to launch a realspace raid to claim more victims for your experiments, this box is the perfect way to start a new Drukhari collection – or expand an existing army – and save money compared to buying the kits separately. The Haemonculus is accompanied into battle by a unit of cruel Wracks, while a Cronos and a Talos provide heavier support as you inflict pain upon unsuspecting foes. These 13 plastic miniatures represent a complete Drukhari Coven of Agonies for use in tight, tactical Combat Patrol games of Warhammer 40,000.

    **This boxed set builds 13 multipart plastic Drukhari miniatures:**
    – 1x Haemonculus
    – 1x Cronos (which can alternatively be built as a Talos)
    – 1x Talos (which can alternatively be built as a Cronos)
    – 10x Wracks

    The miniatures in this kit are easy to customise. The Cronos has a choice of two heads and can take an optional spirit vortex.

    The Talos has a choice of four heads and can be armed with a stinger pod, twin haywire blaster, twin heat lance, or twin splinter cannon. One of its macro-scalpels can be replaced with a twin liquifier gun, one set of chain flails, a Talos gauntlet, or a Talos ichor injector.

    The Wracks can be equipped with a host of interchangeable weapons and equipment, including torturer's tools, two liquifier guns, two ossefactors, two hexrifles, two stinger pistols, masks, and backpacks. There are also parts to build an Acothyst who can additionally be armed with an agoniser, power weapon, or scissorhand.

    This kit comprises 361 plastic components, 11x Citadel 25mm Round Bases, 2x Large Flying Bases, and 2x Ball Top Flying Stems. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Ravager
  productCode: prod900155a-99120112011
  sku: 99120112011
  ean: 5011921020386
