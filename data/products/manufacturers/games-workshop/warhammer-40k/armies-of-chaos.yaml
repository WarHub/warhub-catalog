  description: |-
    Skull Cannons of Khorne are monstrous fusions of daemonic spirit and hellforged machine. Their twisted and clinkered forms burn with the desire to shed blood and crush bones, to exalt Khorne with every trampled foe.

    The Skull Cannon of Khorne is an industrious creation, a hybrid of flesh and daemon engine, and comes bedecked in icons of Khorne. The body is based around a large, curved, frame, which from one angle looks like a huge open mouth rolling forwards upon barbed, cylindrical wheels; yet from others is very much a machine. There are metal tubes, wires and pistons as well as horns, skulls, spikes and open maw motifs. There is a large armoured cannon positioned on the top of the main body, to which two Bloodletters are chained. This immense weapon features serrated plating and decorative details such as metal skulls and teeth, while at the tip of the cannon there is a ferocious open maw.

    This multi-part plastic kit contains 84 components with which to make either a Skull Cannon of Khorne or a Blood Throne of Khorne.

