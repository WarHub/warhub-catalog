  sku: '99129915030'
  productCode: prod5000417-99129915030
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/changecaster-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915030_ChangecasterChariotUpdateALT.jpg
  description: |-
    Whirling amidst capering masses of Horrors, the Changecasters are daemonic Heralds of Tzeentch who lope into battle on foot. These potent sorcerers unleash storms of mutating sorcery against their enemies, jabbering and cackling as they transform the foes of the Change God into living, screaming torches and wreak gruesome havoc on the enemy lines.

    This multipart plastic kit builds one Changecaster, a daemon sorcerer of Tzeentch. This versatile model comes with a choice of three heads – a toothy Horror's maw, a screeching bird's head, and a leering lunar mask – as well as a huge variety of sorcerous accessories and armaments, including daemonic scrolls, talismans, tentacles, and a choice of hands offering arcane gestures, a ritual dagger, a forbidden tome, magical flames, and a staff of change with two different heads.

    This extensive kit includes the components necessary to assemble a wide variety of Tzeentch models – in addition to a Changecaster, it can be used to also build an Exalted Flamer or a Burning Chariot of Tzeentch. Alternatively, it can be used to assemble both a Fateskimmer and an Exalted Flamer, as well as three Blue Horrors.

    This kit comprises 49 plastic components, and is supplied with a Citadel 32mm Round Base, 3x Citadel 25mm Round Bases, a Citadel 120x92mm Oval Base, and a Citadel 75x42mm Oval Base, to account for all the possible build options. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
