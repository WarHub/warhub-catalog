  productCode: prod4580132-99120102124
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Death-Guard-Blightlord-Terminators-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120102074_DeathGuardBlightLordTerminators01.jpg
  description: |-
    Blightlord Terminators are incredibly tough. Thanks to their cursed Cataphractii armour and Nurgle’s gifts, they are experts in breach assaults, boarding actions, and sudden teleport strikes. Due to long periods spent aboard pox-ridden warships, they are saturated with foulness, which pours off them to rot flesh and corrode metal.

    This multipart plastic kit builds five Blightlord Terminators, disease-spreading veterans for your Death Guard armies in games of Warhammer 40,000. These shock troops are forever fused to their filth-smeared Cataphractii armour, making them incredibly resilient. They also have the pick of tainted armouries, meaning they have the best weapons to deal with any foolish enough to stand before the chosen of Nurgle.

    **They can be assembled with a fearsome array of wargear, and the kit includes the following weapon options, giving you massive tactical flexibility:**
    – 4 Combi-bolters
    – 6 Bubotic blades
    – 1 Reaper autocannon
    – 1 Plague spewer
    – 1 Blight launcher
    – 1 Flail of corruption
    – 1 Combi-weapon

    The kit also includes cosmetic options, including different heads and shoulder pads, making it easy to customise your unit.

    This kit comprises 64 plastic components, and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
