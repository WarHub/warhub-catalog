  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915022_DaemonsofKhorneBloodCrushers01.jpg
  description: |-
    Bloodcrushers are the shock cavalry of Khorne. Daemonic Bloodletters ride Juggernauts – unholy fusions of daemon and machine whose blood is fire and whose every step is thunder. They bear down on their victims like battering rams and the destruction when their charge hits home is hideous to behold.

    This multipart plastic kit builds 6 Bloodcrushers, vicious daemonic cavalry for your World Eaters or Chaos Daemons armies in games of Warhammer 40,000, or your Blades of Khorne armies in games of Warhammer Age of Sigmar. These brutal beasts will help you deliver the wrath of Khorne exactly where it is needed on the battlefield.

    The kit includes parts to build an optional champion, musician, and icon bearer. There are 8 Juggernaut heads, 10 Juggernaut horns, and 10 Bloodletter heads, all interchangeable, along with other cosmetic options including chains and icons, which makes it simple to customise your unit.

    This kit comprises 89 plastic components, and 6x Citadel 90mm by 52mm Oval Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
