  url: https://www.warhammer.com/en-GB/shop/Death-Guard-Biologus-Putrifier-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070102005_BiologusPutrifier01.jpg
  description: |-
    Biologus Putrifiers take obscene delight in developing myriad plagues to spread in battle. They carry all manner of blight grenades, bloated with the latest strains of blossoming contagions. With their injector pistols, they implant killing maladies into the enemy before extracting samples of their ruined flesh.

    This multipart plastic kit builds one Biologus Putrifier, a refiner of diseased slurry for your Death Guard armies in games of Warhammer 40,000. He’s clad in the usual corrupted armour of the Death Guard, which is covered in the symbols of Nurgle along with burn marks and melted panels from using the caustic potions he experiments with. An enormous rack of hyper blight grenades hangs from his back, along with a dozen or more plague-filled explosive containers ready to be thrown into the heart of the enemy. They are ideal for clearing away hordes of enemies and threatening even the toughest of warriors with their vile injector pistols.

    This kit comprises 10 plastic components, and 1x Citadel 40mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
