  description: |-
    Ahriman fights with a singular focus and frightening determination. At range, he unleashes storms of psychic fury that transmogrify, mutate, and erase from existence all who stand before him. Swooping low upon his Disc of Tzeentch, the Arch-Sorcerer strikes down anyone who survives with his terrifying Black Staff.

    This multipart plastic kit builds Ahriman, a psyker of prodigious power for your Thousand Sons armies in games of Warhammer 40,000. The Arch-Sorcerer of Tzeentch can change the outcome of a battle with just a thought and can smash aside even the mightiest of enemy warriors with his legendary force staff.

    This kit comprises 26 plastic components, and 1x Citadel 40mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Angron – Daemon Primarch of Khorne
  category: miniatures
  packaging: single
  status: current
  availability: in_stock
  firstSeen: '2026-07-07'
  ean: '5011921173242'
  eanSource: shopify:goblingaming.co.uk
  sku: '99120102152'
  productCode: prod5040152-99120102152
  priceGbp: 105.5
  url: https://www.warhammer.com/en-GB/shop/world-eaters-angron-daemon-primarch-of-khorne-2023
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120102152_AngronDaemonPrimarch1.jpg
  description: |-
    Angron is the Red Angel, Lord of the World Eaters, the Daemon Primarch of Khorne. Raised as a slave in the brutal fighting pits of Nuceria, this maddened demigod sought glorious death in the battles of the Horus Heresy – only to be damned to an eternity of undying rage. For ten thousand years he has savaged the Imperium, fury given immortal form, the butchers of the XII Legion following in his bloody wake. When he steps forth into realspace, Angron is an unstoppable engine of destruction with the strength to tear apart bastions with his bare hands and stop Titans in their tracks. His very presence drives those around him into a frenzy of wrath and fear, as he carves his way through entire armies in a whirlwind of apocalyptic bloodshed.

    This multipart kit builds Angron, Daemon Primarch of Khorne – the eternal master of the World Eaters Legion. This imposing warrior towers head and shoulders above most miniatures on the battlefield, including his own frenzied sons amongst the World Eaters. He's armed with his massive chainaxe, Spinegrinder, and the brutal rune-etched daemon sword known as Samni’arius – both weapons chained to his wrists in true Nucerian style. His warped form is festooned with grisly trophies and World Eaters iconography, with a barbed club-tail whipping behind him, shadowed by a pair of sinister spiked wings. Even his base is littered with skulls, as his hooved feet mount a broken rocky outcrop.

    Angron's monstrous visage can be built in a fanged roar or close-mouthed snarl, and he can be assembled with his infernal musculature laid bare, or clad in the twisted Armour of Mars – the same gladiatorial plate that he wore during the Horus Heresy, warped to match his daemonic form. However you build him, the powerful physique, dynamic pose, and sheer size of this fallen Primarch commands immediate attention, making him a truly impressive centrepiece in any World Eaters army and an absolute treat for painters and collectors of all stripes.

    This kit comprises 77 plastic components, and is supplied with a Citadel 100mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
