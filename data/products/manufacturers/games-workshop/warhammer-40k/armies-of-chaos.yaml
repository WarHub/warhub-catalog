    This kit can alternatively be assembled as a Hellflayer, or as a Herald of Slaanesh mounted atop either a Hellflayer or Seeker Chariot. In addition, you can combine the components of two of these kits to build a mighty Exalted Seeker Chariot.

    The kit comprises 96 plastic components, and is supplied with a Citadel 120x92mm Oval Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
