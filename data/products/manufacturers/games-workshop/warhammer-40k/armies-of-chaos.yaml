  url: https://www.warhammer.com/en-GB/shop/red-corsairs-lords-of-the-maelstrom-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120102110_ChaosSpaceMarinesRedCorsairsLordsoftheMaelstrom1.jpg
  description: |-
    The Red Corsairs are the undeniable masters of the Maelstrom, and they are rightly feared by all who tread too close to this benighted area of the galaxy. Striking out in raiding parties composed of elite Chaos Space Marines and scores of traitor guardsmen, they pillage what and where they want to scavenge material and grow their infernal empire.

    This packed box is ideal for starting a new Red Corsairs-themed Chaos Space Marines collection – or expanding an existing army – to unleash in games of Warhammer 40,000, and it saves money compared to buying the kits separately. This savage force is led by a Red Corsairs Reave-Captain, a merciless warrior who rules with an iron fist. At his side are Red Corsairs Raiders, renegade Space Marines who have broken their vows to follow the Tyrant of Badab. Veteran Legionaries and Chaos Terminators are also counted among Huron Blackheart's followers, their long years of combat experience further bolstering the Red Corsairs. Traitor Guardsmen are adept at holding objectives or throwing themselves at weakened enemies. When taken together, they are a vicious and terrifying force, ideal for representing a Renegade Warband Detachment – the rules for which are found in *The Maelstrom: Lair of the Tyrant – Detachments* booklet, available separately.

    **This boxed set builds 36 multipart plastic Chaos Space Marines miniatures:**
    – 1x Red Corsairs Reave-Captain
    – 10x Red Corsairs Raiders
    – 5x Red Corsairs Chaos Terminators
    – 10x Red Corsairs Legionaries
    – 10x Traitor Guardsmen
    – 1x Red Corsairs Upgrade Frame

    The miniatures in this box are easy to customise. The Red Corsairs Reave-Captain can be equipped with either a power maul or a power sword, and a plasma pistol or a plundered trophy. He has a choice of three heads, two bandoliers, and two backpack toppers.

    One of Red Corsairs Raiders can be built as an optional champion, and the kit includes 14 interchangeable heads, 16 interchangeable shoulder pads, and different weapons, including boltguns, bolt pistols, and vicious reaver’s blades.

    The Chaos Terminators come with a range of weapon options, including five combi-weapons, three power fists, a heavy flamer, a reaper autocannon, a chainfist, and a pair of lightning claws. The heads, shoulder pads, and trophy racks are also interchangeable across the miniatures.

    One of the Legionaries can be built as an optional champion, armed with a plasma pistol, boltgun, or bolt pistol, and a power fist, power axe, power sword, or power maul. The kit also includes interchangeable heads, shoulder pads, backpacks, boltguns and bolt pistols, close combat weapons, and weapon options, including a meltagun, plasma gun, flamer, missile launcher, and heavy bolter.

    The sergeant of the Traitor Guardsmen can be armed with a corrupted pistol or boltgun, and a chainsword, close combat weapon, or power sword. The rest of the squad have weapon options, including a meltagun, plasma gun, flamer, Cultist sniper rifle, and Cultist grenade launcher.

    The Red Corsairs upgrade frame is designed to work with the Legionaries and Chaos Terminator Squad miniatures. It includes five bare heads, 10 shoulder pads for power armour, five shoulder pads for Terminator armour, and accessories like bandoliers, hanging trophies, and chainswords.

    This kit is also supplied with 2x Red Corsairs Transfer Sheets, each containing 248 high-quality waterslide transfers. These include a selection of infantry and vehicle-sized transfers depicting Red Corsairs iconography, skulls, kill tallies, and other cursed sigils.

    This kit comprises 602 plastic components, 6x Citadel 40mm Round Bases, 10x Citadel 25mm Round Bases, and 20x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    The Red Corsairs Reave-Captain, Red Corsairs Raiders, and Red Corsairs Upgrade Frame will be available separately at a later date. This boxed set is only available while stocks last.
