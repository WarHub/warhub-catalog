  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/Daemons-Of-Khorne-Bloodthirster
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915024_DaemonsofKhorneBloodThirster01.jpg
  description: |-
    Bloodthirsters are commanding warriors – ferocious embodiments of the Blood God’s rage and murderlust. Champions of the Khornate daemon legions, they possess supreme martial skills, wield destructive weapons of appalling power, and slaughter all in their paths.

    This multipart plastic kit builds one Bloodthirster, a behemoth of battle for your World Eaters or Chaos Daemons armies in games of Warhammer 40,000, or your Blades of Khorne armies in games of Warhammer Age of Sigmar. The kit allows you to make any one of three specific types of Bloodthirster for your Blades of Khorne – the Wrath of Khorne Bloodthirster, the Bloodthirster of Insensate Rage, or the Bloodthirster of Unfettered Fury. Acting as the generals for the Blood God's hellish hordes, they are ideal for smashing through enemy lines, revelling in the glory of battle as they claim more skulls for Khorne.

    This miniature is easy to customise into the daemon of your darkest nightmares. There is a choice of two sets of legs – either running or taking flight, leaving behind a trail of flame. Three different torso fronts, two designs of belly plates, three distinct heads, two choices of loincloth, optional chains to be added to the wings, and optional armour plating for the legs and torso are also included in the kit. The Bloodthirster can be armed with a great axe of Khorne, a bloodflail and an axe of Khorne, or a lash of Khorne and an axe of Khorne.

    This kit comprises 80 plastic components, and 1x Citadel 120mm by 92mm Oval Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
