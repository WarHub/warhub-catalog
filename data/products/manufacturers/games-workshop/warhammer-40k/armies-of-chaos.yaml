  description: |-
    The Styrix is a Knight of ill omen, its name linked to the massacres of the Age of Strife and the Great Crusade that followed, and its machine spirit well-accustomed to slaughter and death. To bond with such a steed stains the reputation and soul of any Noble scion – yet such is its grim efficiency in wholesale extermination that many will take on the maddening burden regardless. The Styrix reduces great swathes of infantry to ash with the deadly beams of its volkite chieorovile, while its graviton gun pins victims in place for waves of radiation to boil flesh from bone. Even armour is no defence, for its pincered siege claw tears enemy engines asunder with ease.

    This multipart resin and plastic kit builds one Knight Styrix, an ominous Knight for your Questoris Households or Mechanicum armies in games of Warhammer: The Horus Heresy. It's armed with a cable-powered volkite chieorovile, a carapace-mounted graviton gun, and a three-fingered siege claw with an in-built irad-cleanser. Based on the same chassis as its Questoris-class cousins, this war machine sports a distinctive segmented carapace and pauldrons covered in the cog-tooth trim of the Mechanicum. The Styrix can be built in a variety of articulated poses, and comes with several cosmetic components, including a choice of four faceplates – a cybernetic Mechanicum skull, and three standard Questoris faceplates.

    This kit comprises 22 resin components, 139 plastic components, and 1x Citadel 170mm by 109mm Oval Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
