  description: |-
    Bloodletters are hate and violence made manifest. Attacking in berserk packs or in martial marching ranks, they hack apart their victims with monstrous hellblades. These weapons glow red-hot with the fury of their wielders, and even the slightest wound they inflict can see the victim bled dry in seconds.

    This multipart plastic kit builds 10 Bloodletters, malevolent foot soldiers for your World Eaters or Chaos Daemons armies in games of Warhammer 40,000, or your Blades of Khorne armies in games of Warhammer Age of Sigmar. These agile, muscular creatures are ideal for hacking your way across the battlefield.

    The kit includes parts to build an optional champion, musician, and standard bearer, who can be assembled with your choice of two icons. The heads and arms are interchangeable across the bodies in the set, making it easy to customise your hate-filled unit.

    This kit comprises 85 plastic components, and 10x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
