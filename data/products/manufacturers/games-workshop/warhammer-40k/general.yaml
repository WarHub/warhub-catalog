  description: |-
    Catachan Heavy Weapons Squads provide fire support, targeting the biggest and most lethal threats when their army finds itself outmatched by lumbering monsters or heavy armour. Hailing from a death world teeming with horrific fauna, they are well used to bringing down big game.

    This multipart plastic kit builds three Heavy Weapons Teams – paired infantry soldiers crewing portable guns – for your Astra Militarum armies in games of Warhammer 40,000. Each team can be armed with your choice of a heavy bolter, missile launcher, mortar, autocannon, or lascannon, meaning you'll always have the right weapon for the right target. Whichever weapon choice you go for, you'll be able to rain down fire on your enemies before they get close. The kit includes multiple cosmetic options to personalise your miniatures, including plants so your jungle fighters feel right at home.

    This kit comprises 132 plastic components, and 3x Citadel 60mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
