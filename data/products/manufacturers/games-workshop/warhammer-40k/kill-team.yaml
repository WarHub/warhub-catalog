  description: |-
    Fortified bunkers are a common sight in the cities of the Imperium – defensible hardpoints standing long after the surrounding buildings have been brought to ruin. They form a natural strategic asset to small strike forces, often becoming the centre of any conflict.

    This multipart plastic kit builds 14 modular terrain pieces for use in your games of Kill Team. They have been designed to integrate with the terrain in Killzone: Volkus, available separately, and are ideal for adding new strategic and narrative options to your fast-paced tactical games.

    **Contents:**
    – 2x Large bunkers
    – 6x Fire steps
    – 6x Stockade walls

    This kit comprises 32 plastic components. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
