    This kit comprises 253 plastic components, and comes with a Citadel 170x109mm Oval Base. It also includes an Age of Darkness Cerastus Knight Transfer Sheet, containing 517 optional markings and icons for the Knight Households of the Horus Heresy. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.

