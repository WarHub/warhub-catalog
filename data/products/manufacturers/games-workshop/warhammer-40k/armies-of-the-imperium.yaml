  url: https://www.warhammer.com/en-GB/shop/imperial-knights-knight-armigers-armiger-helverin-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120108015_IKArmigerHelverins01.jpg
  description: |-
