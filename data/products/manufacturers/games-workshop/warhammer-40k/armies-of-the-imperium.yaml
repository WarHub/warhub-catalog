  url: https://www.warhammer.com/en-GB/shop/Adepta-Sororitas-Battle-Sisters-Squad-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120108033_SoBSquad01.jpg
  description: |-
    Battle Sisters make up the vast majority of the forces of the Adepta Sororitas Orders Militant, gunning down heretic, xenos, and traitor alike with their holy trinity of weaponry – bolter, melta and flamer. Wherever they advance, the light of the Emperor spreads like a holy dawn, miraculously turning aside the strikes of the enemy or consuming foes in fires of righteous retribution. Onwards the Battle Sisters march, their exultant prayers ringing out, and with every squeeze of their triggers they silence more of the unworthy abominations that dare stand against the Master of Mankind.

    This multipart plastic kit builds 10 Battle Sisters, accompanied by an Incensor Cherub. Each Battle Sister is equipped with a boltgun, and one can carry a sacred simulacrum imperialis, wrought from the bones of a saint. They are led by a Sister Superior with an arsenal of weapon options – a chainsword or power sword for close combat, alongside a plasma pistol, bolt pistol, boltgun, condemnor, or a variety of combi-weapons. The kit also includes a variety of special weapons to equip your Battle Sisters – flamers, meltaguns, and storm bolters – as well as a heavy bolter and heavy flamer for even more intense firepower.

    You’ll find plenty of cosmetic options to personalise your Battle Sisters – including more than 30 different interchangeable heads, allowing you to build an entire squad with helmets or bare heads. This set can alternatively build a squad of 10 Dominions, weapon specialists of the Adepta Sororitas.

    This kit comprises 179 plastic components, and comes with 10x Citadel 32mm Round Bases and 1x Citadel 25mm Round Base, as well as an Adepta Sororitas Transfer Sheet. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
