  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108172_AcastusKnightPorphyrion01.jpg
  description: |-
    Acastus-class armour is perhaps the most heavily-armed and armoured of all Knight suits in the Imperium, rare beyond belief amongst even the greatest Knight Households. Equipped with ranged armaments of incredible magnitude, these mighty engines serve as both battlefield supremacy weapons and icons of the Machine God's divinity – the Knight Porphyrion, in particular, often serves as the supreme enforcer of a House's dominion, passing judgement on fellow Knights over issues of honour. The Porphyrion's magna lascannons scour the battlefield with great blasts of devastating light, sufficient in power to threaten even one of the Collegia Titanica.

    This multipart resin kit builds one Acastus Knight Porphyrion, a truly colossal Knight armed with a pair of massive twinned magna lascannons. This gigantic walker also sports your choice of secondary weapons – any combination of two autocannons or lascannons – and an impressive hull-mounted missile system armed with ironstorm missiles or anti-air warheads. Approaching the size of a Warhound Titan, this extensively-detailed war machine makes for an incredible centrepiece on the tabletop, while its enclosed, overlapping armour plates are the perfect canvas for any hobbyist. The Knight Porphyrion features a degree of posability – in addition, its missile bay can be built open or closed, and the kit includes a choice of four sculpted icons to affix to its hull.

    This kit comprises 126 resin components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
