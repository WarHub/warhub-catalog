  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120108033_SoBDominions1.jpg
  description: |-
    Dominion Squads are the close-fire weapon specialists of the Adepta Sororitas. They strike as swift and furious as holy lightning, storming the enemy's lines armed with a plethora of storm bolters, meltaguns, and flamers with which they dispense short-range devastation. Wherever heretics must be cleared from a command bunker or a captured holy site, wherever blasphemers' battle lines must be smashed asunder ahead of the advance, wherever a dangerous apostate's assault must be blunted with burning hatred and explosive ferocity, there do the Dominions strike.

    This multipart plastic kit builds 10 Dominions, accompanied by an Incensor Cherub. Each Dominion is equipped with a boltgun, but up to four of them can instead be armed with a powerful special weapon – the kit includes a choice of flamers, meltaguns, and storm bolters. One can also carry a sacred simulacrum imperialis, and they are led by a Dominion Superior with an arsenal of weapon options – a chainsword or power sword for close combat, alongside a plasma pistol, bolt pistol, boltgun, condemnor, or a variety of combi-weapons.

    You’ll find plenty of cosmetic options to personalise your Dominions – including more than 30 different interchangeable heads, allowing you to build an entire squad with helmets or bare heads. This set can alternatively build a squad of 10 Battle Sisters, steadfast footsoldiers of the Adepta Sororitas.

    This kit comprises 179 plastic components, and comes with 10x Citadel 32mm Round Bases and 1x Citadel 25mm Round Base, as well as an Adepta Sororitas Transfer Sheet. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
