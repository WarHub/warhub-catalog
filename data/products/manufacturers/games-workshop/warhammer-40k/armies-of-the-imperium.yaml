  description: |-
    The Knight Castellan is built upon a Dominus‑class chassis and features a dual plasma core that fuels an array of weapon systems that make it among the foremost artillery Knights of the houses. The combined fire of several of these engines can equal that of an Imperial Navy warship battery, and tear the heart out of an enemy army.

    This multipart plastic kit builds one Knight Castellan, a titanic walker for your Imperial Knights armies in games of Warhammer 40,000. They can also be fielded as a Freeblade for your Space Marines, Astra Militarum, Adepta Sororitas, Adeptus Custodes, Adeptus Mechanicus, or Imperial Agents armies. It can alternatively be built as a Knight Valiant, or a Knight Tyrant for your Chaos Knight armies. The Knight Tyrant can also be fielded as a Dreadblade in your Chaos Space Marines, Death Guard, Emperor's Children, Thousand Sons, or World Eaters armies. The Knight Castellan is a walking fortress with an array of weaponry that can take on any foe.

    **This kit can build one of the following miniatures:**
