    This multipart plastic kit builds one Knight Preceptor, a noble war machine for your Imperial Knights armies, or a Freeblade for your Space Marines, Astra Militarum, Adepta Sororitas, Adeptus Custodes, Adeptus Mechanicus, or Imperial Agents armies in games of Warhammer 40,000. It can alternatively build a mighty Imperial Knight in one of six other configurations, or a Knight Despoiler for your Chaos Knight armies, which can also be fielded as a Dreadblade in your Chaos Space Marines, Death Guard, Emperor's Children, Thousand Sons, or World Eaters armies. The Knight Preceptor is able to devastate enemies from a distance with its las-impulsor before smashing aside any survivors with either a thunderstrike gauntlet or a reaper chainsword.

