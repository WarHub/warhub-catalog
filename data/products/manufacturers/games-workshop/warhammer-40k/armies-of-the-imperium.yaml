    – **Knight Valiant**, armed with conflagration cannon, thundercoil harpoon, and either two shieldbreaker missile launchers and a twin siegebreaker cannon, or a shieldbreaker missile launcher and two twin siegebreaker cannons
    – **Knight Tyrant**, armed with brimstone volcano lance and ectoplasma decimator, or darkflame cannon and warpshock harpoon. It can also take two gheiststrike missile launchers and a twin Desecrator cannon, or a gheiststrike missile launcher and two twin Desecrator cannons

    Whichever class you choose to build will bring an arsenal of weapons loaded with terrible power. Just one of these mighty war machines can change the outcome of an entire battle. With a choice of different heads and options for poses, you'll be able to create a truly unique engine of war.

    This kit comprises 172 plastic components, 1x Citadel 170mm by 109mm Oval Base, and 1x Imperial Knights Transfer Sheet containing 583 high-quality waterslide transfers to decorate your miniatures.

