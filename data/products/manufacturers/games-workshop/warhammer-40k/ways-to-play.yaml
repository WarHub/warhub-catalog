  description: |-
    The tomb worlds of the Necrons hide sprawling underground complexes filled with labyrinthian corridors, slumbering xenos, and bizarre technology. Only the bravest warriors attempt to breach them, and rarely do they return unscathed.

    This multipart plastic kit builds 50 modular Necron-themed terrain pieces for use in your games of Warhammer 40,000. They have been designed to accommodate a dizzying variety of configurations. Together, they represent the twisting corridors of a Necron tomb world – ideal for playing close-quarters Boarding Actions games.

    **Contents:**
    – 4x Short walls with hatchway and pillars
    – 4x Long walls with hatchway and pillars
    – 4x Long walls with hatchway
    – 4x Long walls with breach point
    – 4x Short walls with breach point
    – 4x Short walls
    – 4x Short walls with pillars
    – 4x Long walls with pillars
    – 32x Pillars
    – 4x Wall ends
    – 2x Sarcophagi
    – 4x Translocator daises
    – 8x Debris pieces
    – 2x Double-sided Tomb World game boards, each measuring 606mm by 703mm

    This kit comprises 148 plastic components. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    You'll need a copy of *Warhammer 40,000: Boarding Actions* or *500 Worlds: Titus – The Battle for Unity Begins*, both available separately, to make full use of this terrain set.

    This terrain set is only available while stocks last.
