  description: |-
    Aleguzzler Gargants often accompany Gloomspite hordes to war, lured by the promise of crude fungus brew. The inevitable raging hangover only worsens their already-poor tempers, making each Aleguzzler Gargant a staggering, cursing terror on the battlefield – fighting for more barrels of the same foul stuff, to drown their sorrows once more.

    This multipart plastic kit builds one Aleguzzler Gargant, a looming monster drunk on fermented fungi. This comprehensive kit includes a huge variety of cosmetic choices, allowing you to build each gargant as a distinct character. It offers alternate heads, gargant-sized weapons, a variety of hands, and different pairs of feet, as well as accessories such as arrows from unlucky victims, a selection of loot and plunder from across the Mortal Realms, and components intended for the base – such as a screaming victim, a squashed grot, and a skeletal signpost. This kit can alternatively build a Mancrusher Gargant for the Sons of Behemat, or a Chaos Gargant for the Beasts of Chaos.

    This kit comprises 75 plastic components and is supplied with a Citadel 90x52mm Oval Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
