    - [Kraken-eater Mega-Gargant](https://www.games-workshop.com/kraken-eater-mega-gargant-2022) – a greedy coast-raider available to any Order or Destruction force
    - [Warstomper Mega-Gargant](https://www.games-workshop.com/warstomper-mega-gargant-2022)– a veteran battle-brute available to any Chaos or Destruction force
    - [Gatebreaker Mega-Gargant](https://www.games-workshop.com/gatebreaker-mega-gargant-2022) – a grim garrison-smasher available to any Death or Destruction force

