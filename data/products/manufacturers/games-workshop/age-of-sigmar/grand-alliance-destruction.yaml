    Beast-smashers are Mega-Gargants on a divine mission – to find the largest beasts roaming the realms and crush them into an unrecognisable paste. Driven to fanatical mania by the primal energy of the Waaagh!, these frenzied gargants believe themselves to embody the spirit of Gorkamorka. Plagued by visions, they rely on startling killer instincts to seek out and crush the worthiest prey with their menhir clubs.

    This multipart plastic kit builds a Beast-smasher Mega-Gargant, an absolutely titanic monster-hunter armed with a sharpened menhir club. This massive miniature towers over almost anything on the battlefield, conveying a staggering sense of momentum and weight, and makes for both an awe-inspiring centrepiece and a truly colossal painting project. The Mega-Gargant is loaded with detail, from its ragged clothes – stitched together out of the banners and awnings of smaller folk – to the beast-fur collar, tusked earring, and false eye made from a skull. The kit offers a variety of interchangeable bits and bobs to personalise your own Mega-Gargant, such as trophies and skulls, improvised armour, and arrows fired by luckless victims, allowing you to ensure that no two tabletop titans look the same.

    This colossal kit can alternatively build a variety of other Mega-Gargants:
