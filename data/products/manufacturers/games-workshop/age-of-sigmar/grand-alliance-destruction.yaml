    This colossal kit can alternatively build a variety of other Mega-Gargants:
    - [King Brodd](https://www.games-workshop.com/sons-of-behemat-king-brodd-2022) – undisputed ruler of the Mega-Gargants, armed with the colossal Obelisk of Tor Crania
    - [Kraken-eater Mega-Gargant](https://www.games-workshop.com/kraken-eater-mega-gargant-2022) – a greedy coast-raider available to any Order or Destruction force
    - [Beast-smasher Mega-Gargant](https://www.games-workshop.com/beast-smasher-maga-gargant-2022) – a crazed monster-hunter available to any Destruction force
    - [Gatebreaker Mega-Gargant](https://www.games-workshop.com/gatebreaker-mega-gargant-2022) – a grim garrison-smasher available to any Death or Destruction force

    This kit comprises 167 plastic components and is supplied with a Citadel 130mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
