    This multipart plastic kit builds a Webspinner Shaman on Arachnarok Spider. A towering beast covered in chitinous plates, the Arachnarok sports eight bladed legs that can be assembled in a variety of poses. The wooden platform on its back hosts a crude altar to the Spider God, tended by a Webspinner Shaman – this wizard is accompanied by eight grots wielding bows and crooked spears, who can be positioned as you choose. The kit also includes 12 smaller spiders of different sizes, and a pair of web-coated tree trunks to decorate the base.

