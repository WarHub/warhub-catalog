    - A Celestian Vortex: this is a whirling tornado of Azyrite magic, which carries a storm of hammers cast in the image of Ghal Maraz, the Great Shatterer. Anyone caught in the vortex’s path is hurled, smashed and broken, into the dirt;
    - A Dais Arcanum: this circular platform inscribed with icons of the 8 winds of magic and orbited by 3 twin-tailed comets bears a rider upon the winds of Azry and bolsters their mastery of the arcane arts;
    - An Everblaze Comet: a shooting star plucked from the firmament and slammed down into enemy lines, this is a large meteoric rock with a sculpted base depicting its devastating impact.

    This kit comes as 12 components supplied on gold-coloured plastic, and includes 2 Citadel 65mm Round bases and a Citadel 50mm Round base. Warscrolls are found in Battletome: Stormcast Eternals.
