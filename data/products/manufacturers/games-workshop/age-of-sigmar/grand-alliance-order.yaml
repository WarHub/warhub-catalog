    This multipart plastic kit builds five Grundstok Thunderers, the professional fighting force of the Kharadron Overlords. Each Thunderer is clad in a heavy suit of atmosphere-sealed armour and equipped with a powerful aethershot rifle. The kit also includes a variety of impressively chunky special weapon options – a gas-spewing aetheric fumigator, a Grundstok mortar with a spare bomb for the base, a five-barrelled decksweeper gun, and an aethercannon with a blast shield for its wielder.

