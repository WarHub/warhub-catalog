  status: current
  description: |-
    Dark Riders are most commonly employed to range ahead of the main warhost. In battle, they take delight in skirting the enemy flanks to attack war machines and cut off lines of supply.

    The Dark Riders are mounted on 5 Dark Steeds and are distinguished by the 5 cloaked torsos. There are a variety of options to add to the miniatures including 5 stowed repeater crossbows; 4 spears; 5 unique embossed shields; 5 sheathed swords; and a choice of 14 heads \(6 helmeted, 5 masked, 2 with scarves over their mouths, and 1 with twin hair braids that can be used as the Herald\). There are also additional parts to make a standard bearer and hornblower.

    The Dark riders come as 98 components, and are supplied with 5 60mm Oval bases. The kit can optionally be used to assemble 5 Doomfire Warlocks.
- name: Sisters of Slaughter
  productCode: prod3750241-99120212034
  sku: 99120212034
  ean: 5011921177523
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Daughters-Of-Khaine-Sisters-of-Slaughter-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212034_DoKWitchAelvesSistersofSlaughterLead02_a.jpg
  status: current
  description: |-
    Merciless masters of the lash, the Sisters of Slaughter leap into the fray and do not cease until all their foes lie dead. Sometimes even that is not enough to stop these vicious killers, for to them mutilation and bloodshed are acts of purest devotion to their cruel deity. To them, combat is everything – melee is worship, and each drop of blood spilled is an offering to Khaine. They fight in an exaggerated style, spinning, leaping and posing dramatically as they use their whips and blades to trace ancient runes in enemy flesh. Those who would join the Sisterhood permanently graft leering masks of living metal – the survivors of this, and the ceremonial duels that follow, become gladiatrixes insanely dedicated to fighting in the name of Khaine.

    This multi-part plastic kit contains the components necessary to assemble a set of 10 Sisters of Slaughter. They wear lightweight, minimal armour in order to move and flow more freely in their devotional bloodlust – what armour is there is beautifully ornate, finished by high leather boots. Each Sister carries a long barbed whip, featuring metal hooks and blades at the end, and a buckler with a long, extremely sharp blade, and each wears a terrifying metal mask, its face twisted into an expression of bloodthirsty, leering rage. 16 of these masks are supplied, with 2 each of 8 different designs. The leader of the unit is a Handmaiden, who has a special twin-tailed whip, and her mask features a forked tongue. There are 2 banners with 3 different banner tops for standard bearers and a horn to denote the unit’s hornblower.

    The Sisters of Slaughter come as 67 components, and are supplied with 10 Citadel 25mm Round bases and a banner transfer sheet. This kit can be optionally used to assemble 10 Witch Aelves.
