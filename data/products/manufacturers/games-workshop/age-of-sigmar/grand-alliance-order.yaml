  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219004_Volturnos02.jpg
  status: current
  description: |-
    Whether directing a raid for souls upon a coastline or heading the defence of an underground stronghold, the Akhelian Kings are the mightiest warriors of the Idoneth. They are the military leaders whose commands and personal heroics will determine the difference between victory and defeat. He must be swift and strong, able to best any of his comrades in single combat. Yet martial skill is not enough to make an aelf lord, for a king is first and foremost a leader. To repel an attacking sea monster, thwart a tide of ravenous voracudas or defeat an army upon a field of battle, an Akhelian King’s mind must be as deft as his swordplay. He must make tactical decisions without hesitation, and possess the ability to inspire his troops, pressing any advantage or rallying his warriors should any advantage falter.

    This multi-part plastic kit contains the components necessary to assemble an Akhelian King. Very much prepared for war, he wears splendid, heavy plate armour – of particular note are the leg and shoulder coverings, which extend far further than his actual shoulders, providing support for the enormous, wide cloak which billows outward and downward, featuring Idoneth symbols at the edges. The Akhelian King has several weapon options – in his right hand he can carry either a bladed polearm or a greatsword, and in his left a king’s shield or falchion. There are 3 head options – these feature different crests, a transverse sail, parallel sail and fish net are included, above an aggressive-looking closed-face helm. He rides a Deepmare – an massive, scaled creature with a single piercing horn, whose forelegs end in huge talons and whose rear half splits into 3 powerful tails. An aelven waystone is included as an atmospheric piece of detail for the base.

    This kit comes as 45 components, and is supplied with a Citadel 60mm Round base. The kit can optionally be used to assemble Volturnos, High King of the Deep.
- name: Namarti Reavers
  productCode: prod3810182-99120219032
  sku: 99120219032
  ean: 5011921229536
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Namarti-Reavers-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219010_NamartiReavers01.jpg
  status: current
  description: |-
    Namarti Reavers provide the archers and scouts for the Idoneth Deepkin phalanxes. The Akhelians recognise the need for reconnaisance, picket forces and massed missile fire, but regard such duties as beneath them – thus, the Reavers are assembled from the quickest and lithest of the Namarti. Their weapons training concentrates upon how to swiftly aim and fire the silent whisperbow, as well as how to defend themselves with short keening blades designed for stabbing. In battle the Namarti Reavers move quickly, probing defences, seeking out vulnerable quarry and harrying the enemy’s most formidable war assets, providing a distraction as the Akhelians line up their devastating charges.

    This multi-part plastic kit contains the components necessary to assemble 10 Namarti Reavers. Clad in less-ornate armour than their commanders and superiors, as befits their withering souls and disposable nature, they still cut impressive figures – each is powerful and muscular. 10 heads are included, which are interchangeable – each is hairless and blind, with blank, empty sockets where eyes should be. There are choices in the way you can depict them – 10 pairs of arms holding whisperbows are included, each specific to a torso, with a further 10 alternative pairs holding whisperbows and keening knives. There are options for an icon bearer – this model is distinguished by their back banner, a huge wrought Idoneth Thrall rune which towers over them from behind. Included is a decorative component for one of the bases – a long, sinuous eel with bared fangs and a distended jaw, ready to strike.

    This kit comes as 93 components, and is supplied with 10 Citadel 32mm Round bases.
- name: Volturnos, High King of the Deep
  productCode: prod3810181-99120219028
  sku: 99120219028
  ean: 5011921173563
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Volturnos-High-King-Of-The-Deep-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219004_Volturnos01.jpg
  status: current
  description: |-
    He was the first of his kind, and is the last of the Cythai still alive. All Ionrach bow before him, their one acknowledged leader, the eldest and greatest of their race. He is Volturnos, High King of the Deep, and he holds undisputed authority at the Idoneth’s assembrals. He rides to battle atop his Deepmare Uasall, and sends a surge of pride coursing through all who fight beneath him. A leader of legendary status, it is said that none can read the flow of battle better than Volturnos. He carries a sword known as the Astra Solus, which cuts through armour with ease, leaving a blazing trail of luminescence; and a shield which can swallow hostile magic, rendering it null – Volturnus is not content to lead his troops from afar.

    This multi-part plastic kit contains the components necessary to assemble Volturnus, High King of the Deep. Very much prepared for war, he wears splendid, heavy plate armour – of particular note are the leg and shoulder coverings, which extend far further than his actual shoulders, providing support for the enormous, wide cloak which billows outward and downward, featuring Idoneth symbols at the edges. In his gauntleted right hand he holds the Astra Solus, a wicked-looking serrated blade, and in the left hefts Cealith, the High King’s shield. Above his shaved head \(complete with eyepatch!\) is the Crest of the High Kings – a tall, majestic banner with carved metal Idoneth symbols and a large jewel featuring prominently. His mount, Uasall, is a Deepmare of renown – a massive, scaled creature whose forelegs end in huge talons and whose rear half splits into 3 powerful tails, distinguishable from other Deepmares by his larger piercing horn. An aelven waystone is included as an atmospheric piece of detail for the base.

    This kit comes as 45 components, and is supplied with a Citadel 60mm Round base. The kit can optionally be used to assemble an Akhelian King.
- name: Eidolon of Mathlann – Aspect of the Sea
  productCode: prod3810178-99120219029
  sku: 99120219029
  ean: 5011921229505
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 91
  url: https://www.warhammer.com/en-GB/shop/Eidolon-Aspect-of-the-sea-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219005_EidolonAspectSea01.jpg
  status: current
  description: |-
    Idolised echoes of a bygone era, the Eidolons of Mathlann are summoned to life in times of dire need. These are no divine avatars, however, but collective manifestations of the ancestral souls of the Idoneth Deepkin, spirits of vengeance wrapped in the image of a lost aelven god. Eidolons are formed from the combined energies of the souls that can be roused from an enclave’s chorrileum – a living coral reef, storing the essence of expired Idoneth. When an Eidolon is summoned in the aspect of the sea, it can summon cloying sea mists, release golden energies to heal the Idoneth’s wounded and lull the most bloodthirsty enemies into a mystic slumber from which they never wake.

    This multi-part plastic kit contains the components necessary to assemble an Eidolon of Mathlann, in his form as an Aspect of the Sea. Towering over the other Idoneth, he comes armed with a psi-trident – a massive 3-pronged spear in his left hand, which can summon blasts of abyssal energy; and a deep-sea sceptre wrought with jewels and used to club anything that gets too close. His armour resembles a set of scales, topped of by an open-face helm and enormous fanned crest. The most striking feature of both Eidolon models, either of which can be built from this kit is definitely the cloak – representing the unimaginable power of the seas, it is styled as a cascading torrent of ocean water. There are plenty of detailed basing options included, with corals, sea creatures and other detritus from beneath the waves included – you’ll have a lot of spares left over to decorate other Idoneth miniatures. As well as this, an ethereal Stormshoal fights alongside the Eidolonn.

    This kit comes as 51 components, and is supplied with a Citadel 100mm Round base. The kit can alternately be used to assemble the Eidolon of Mathlann – Aspect of the Storm.
- name: Gloomtide Shipwreck
  productCode: prod3810165-99120299050
  sku: 99120299050
  ean: 5011921096862
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Etheric-Vortex-Gloomtide-Shipwreck-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120299050_GloomtideShipwreck01.jpg
  status: current
  description: |-
    When the Idoneth Deepkin go to war, they bring their supernatural sea with them. Ethereal creatures, fish and corals flicker into existence, while features of the seabed manifest themselves eerily on the battlefield. Barnacle-encrusted shipwrecks become havens for aquatic creatures, and shoals of etherfish dart out to protect the Idoneth Deepkin or assail any foes who draw near.

    This multi-part plastic kit contains the components necessary to assemble a Gloomtide Shipwreck. This is an Etheric Vortex scenery piece, which models with the Idoneth Deepkin allegiance have access to. The Shipwreck itself is a sea-dessicated hull, the skeleton of some long-forgotten vessel now home to barnacles, coral and creatures sympathetic to the Idoneth. The model is in 2 pieces, which can be placed separately on the battlefield, or together to form one wrecked hull – each section is encrusted with barnacles, littered with bones and trinkets, and feature ship details such as a broken sextant, a ruined rudder, a lantern and a ship’s bell. Alluding to the wreck’s former life, there are plenty of Sigmarite details, with a figurehead holding a hammer, a twin-tailed comet on the mast and a plaque at the rear. Also included are 6 shoals of sea creatures – these can be added to the wreck as you please, though make excellent additions to the base of any Idoneth Deepkin miniature.
- name: Namarti Thralls
  productCode: prod3810164-99120219011
  sku: 99120219011
  ean: 5011921097555
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Namarti-Thralls-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219011_NamartiThralls01.jpg
  status: current
  description: |-
    Like all aelves, Namarti Thralls possess a physical grace that to other races appears supernatural. The Thralls march to war for the Idoneth as the main body of their infantry, and it is their task to engage and hold the enemy in place. In battle the Namarti fight with an array of weapons known as lanmari – two-handed swords, great scythe-axes or pole-axes of intricate design. The weight and reach of such weapons are useful when driving off the enormous sea creatures that bedevil the Idoneth enclaves, while their broad blades are suited to scything through the teeming swarms of predatory fish that seek to prey upon the aelves.

    This multi-part plastic kit contains the components necessary to assemble 10 Namarti Thralls. Clad in less-ornate armour than their commanders and superiors, as befits their withering souls and disposable nature, they still cut impressive figures – each is powerful and muscular. There are 11 heads in the kit, which can be placed on whichever models you wish; each is hairless and blind, with blank, empty sockets where eyes should be. 10 elaborate neck crests are included, which curve upward and behind their heads, giving the impression of spiked horns. There’s plenty of choice in their weapons – each wields a two-handed lanmari, as follows: 4 can take a choice of glaive or sword, 3 have a choice of axe or sword, 2 carry swords and 1 carries an axe. There is an option for an icon bearer – they have a specific head, and a large mathlann slave rune which forms part of their neck crest. As an added bit of detail the kit comes with 6 pieces of scenery and fish for the bases, which can be added to any model you like..

    This kit comes as 90 components, and is supplied with 10 Citadel 32mm Round bases.
- name: Lotann, Warden of the Soul Ledgers
  productCode: prod3810163-99120219006
  sku: 99120219006
  ean: 5011921097500
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Lotann-Warden-Of-The-Soul-Ledgers-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219006_IdonethLotann01.jpg
  status: current
  description: |-
    Gifted with the spirit-sight and keen analytical minds, the Soul Wardens keep a tally of interred souls, tending to them and calculating how many are needed for certain tasks. Ordinarily they do not accompany the phalanxes to war, but there is one exception – Lotann of the Ionrach. Such is Lotann’s obsessive commitment to his duty, his willpower stains the ethersea, a presence that inspires the Idoneth to fight with heightened zeal. His highly intelligent multi-limbed Ochtar familiar aids him in his task of scribing his catalogue of souls, by keeping aggressors at bay with a serrated blade and spiked cudgel.

    This multi-part plastic kit contains the components necessary to assemble Lotann, Warden of the Soul Ledgers. Hardly concerned with the violence and melee going on all around him, Lotann is utterly absorbed in the Catalogue of Souls – an enormous parchment scroll clutched in his left hand, on which he tallies the Idoneth’s captured souls. He uses a bone quill to do so – on occasion, he’ll use this to stab an encroaching enemy, but for the most part his defense is left to his Ochtar familiar. This is a large, octopus-like creature which looms over Lotann’s right shoulder, brandishing a cudgel, a serrated blade and even thoughtfully carrying a spare scroll, should the tally of souls grow too large to count.

    Lotan, Warden of the Soul Ledgers comes as 8 components, and is supplied with a Citadel 40mm Round base.
- name: Eidolon of Mathlann – Aspect of the Storm
  productCode: prod3810162-99120219029
  sku: 99120219029
  ean: 5011921229505
  eanSource: shopify:goblingaming.co.uk
