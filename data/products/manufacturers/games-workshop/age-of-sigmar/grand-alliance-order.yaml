  productType: single_kit
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/stormcast-eternals-vigilors-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120218053_SCEVigilorsLead.jpg
  status: current
  description: |-
    Vigilors are Thunderstrike-armoured advance scouts. Rangers who forge ahead of the main Stormcast Eternal forces, Vigilors function similarly to the Vanguard chamber for the newly forged Stormhosts composed mainly of Thunderstrike warriors.

    Like their Justicar brethren, Vigilors are keen shots. Their compact stormcaller bows can punch through light armour with ease. Each volley is accompanied by flashes of coruscating lightning, marking out unlucky enemies for follow-up fire from their heavier-hitting allies.

    This multipart plastic kit comprises 190 components, with which you can build 10 Vigilors wearing sleek Thunderstrike armour with flowing ranger-style robes, and armed with compact stormcaller bows and stormblades. Each miniature has two build options and can also be given helmeted or unhelmeted heads.

    With this kit, there is also the option to build up to two Vigilor-Prime models. The kit comes supplied with 10x 40mm Citadel Round bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Lord-Commander Bastian Carthalos
  productCode: prod4780163-99120218052
  sku: 99120218052
  ean: 5011921154289
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/stormcast-eternals-lord-commander-bastian-carthalos-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120218052_SCELordCommanderBastianCarthalosLead.jpg
  status: current
  description: |-
    There is no higher rank in a Stormhost than Lord-Commander, and in the Hammers of Sigmar this esteemed position is held by Bastian Carthalos, the Thunderborn. Once reforged with the power of the ninth Great Bolt, Skjordamar, Carthalos is a master tactician and an indomitable warrior. Sigmar has once again unleashed this mighty warrior to oversee the many crusades undertaken by the Stormcast Eternals. Carthalos has also returned to the battlefield, where he fiercely smites his foes with his legendary warhammer, Uskavar, the Sunderer, while issuing commands to his allies and challenges to his enemies with a voice that booms like a thunderclap.

    This multipart plastic kit comprises 29 components, with which you can build Lord-Commander Bastian Carthalos. You can choose to construct Carthalos holding his warhammer Uskavar in one or two hands, as well as with or without a helmet.

    This kit comes supplied with one 50mm Citadel Round base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Knight-Relictor
  productCode: prod4780161-99070218057
  sku: 99070218057
  ean: 5011921161119
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/stormcast-eternals-knight-relictor-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070218057_SCEKnightRelictorLead.jpg
  status: current
  description: |-
    The Knight-Relictor is a sombre guardian of the sepulchral Temple of Ages. In battle these macabre-looking warriors chant prayers to the God-King in order to invoke his divine might to smite their opponents and energise their allies.

    Armed with hefty relic mauls, wearing Thunderstrike armour embellished with grim details and adorned with dark fabrics, these paragons of devotion and military might carry the bones of saints and martyrs into battle. They burn these in ghastly, skull-faced censers in an attempt to nullify dark powers and protect their brethren from the whispers of the many dark and devious gods that rage against the forces of Order.

    This 10 part plastic kit makes one Knight-Relictor and comes supplied with one 40mm Citadel Round base. This miniature is supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Stormstrike Chariot
  productCode: prod4740268-99120218051
  sku: 99120218051
  ean: 5011921154272
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/stormcast-eternals-stormstrike-chariot-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120218051_StormstrikeChariotLead.jpg
  status: current
  description: |-
    Stormstrike Chariots are the Stormcasts specialist linebreaker units. Pulled by two specially bred gryph-chargers, these chariots are swift enough to evade enemy fire and to respond with either a mighty charge or thunderous long-range fire.

    The Stormstrike Chariot itself bears the maker's mark of Grungni himself and resembles the shields wielded by Vindictors. Its riders wear a unique lighter variant of the brand new thunderstrike armour. Whilst the driver is armed with a stormstrike axe, the Stormcast passenger can be built wielding either a great stormbow or a tempestuous spear.

    This 32-piece push-fit kit makes one Stormstrike Chariot for use in Stormcast Eternals armies in Warhammer Age of Sigmar. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Warsong Revenant
  productCode: prod4650150-99120204042
  sku: 99120204042
  ean: 5011921179466
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Sylvaneth-Warsong-Revenant-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120204027_WarsongRevLead.jpg
  status: current
  description: |-
    Given life by spirits held within the Oak of Ages Past, the Warsong Revenants sprang forth as Alarielle's Rite of Life rippled across Ghyran and added their Spirit Song to her chorus. To their Sylvaneth allies, the music emanating from their flutes is a joyous tune, full of hope and uplifting vigour, but to their enemies, it blares a sonic assault of crippling potency.

    Though few in number, the Warsong Revenants are a powerful addition to the ranks of the Sylvaneth. The songs they play bolster the hearts of allies and demoralise enemies, while the Revenants themselves weave arcane forces with an ease that belies their youth. While seemingly fragile and ethereal spirits, the magical power of their arboreal cloaks helps defend their soul seed from harm.

    This kit is comprised of 22 plastic components, with which you can assemble one Warsong Revenant, and is supplied with a Citadel 105mm Oval Base.
- name: Gardus Steel Soul
  productCode: prod4630142-99120218072
  sku: 99120218072
  ean: 5011921165407
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27
  url: https://www.warhammer.com/en-GB/shop/Stormcast-Eternals-Gardus-Steel-Soul-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120218048_StormcastEternalsGardusSteelSoulLead.jpg
  status: current
  description: |-
    As the revered Lord-Celestant of the Hallowed Knights and a living symbol of hope to all citizens of Order, Gardus Steel Soul shines like a beacon of divine light at the head of his Stormcast Eternals war host. Wielding his faith as surely as he does his runeblade and warhammer, Steel Soul never tires in service of his God-King and the innocents he's pledged to safeguard.

    Gardus Steel Soul is just as adept at leading his Hallowed Knights as he is cutting down the enemies of Order in close combat, so don't be afraid to let him get stuck into the fray. He is depicted mid-landing having been projected from Azyr upon a Sigmarite thunderbolt, with his war cloak billowing up behind him from the force of impact, recreating the iconic artwork from Black Library novel *Hallowed Knights: Black Pyramid*. This stunning model can be assembled either wearing a helmet or without.

    This multipart plastic kit is comprised of 15 components, with which you can assemble one Gardus Steel Soul, and is supplied with 1x Citadel 50mm Round Base.
- name: Hurakan Spirit of the Wind
  productCode: prod4620161-99120210050
  sku: 99120210050
  ean: 5011921179503
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Hurakan-Spirit-of-the-Wind-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210027_SpiritofWindLead.jpg
  status: current
  description: |-
    Enraged as they were forced to watch the Ten Paradises become corrupted by the presence of Chaos, the sentient winds of Hysh were given focus by the Lumineth and resolved to fight in defence of their home. With arcane arrows and storms of rocky shards they swirl across the battlefield and bring whirling death to the agents of disorder.

    Lightning fast, and armed with a mighty Bow of the Wind's Vengeance, the Hurakan Spirits of the Wind are almost impossible to catch and shoot with unerring accuracy on the move. The combination of speed and power makes them a perfect choice for countering the enemy's strongest models, be they elite infantry or legendary heroes.

    The kit is comprised of 26 plastic components, with which you can assemble one Hurakan Spirit of the Wind, and is supplied with 1x Citadel 60mm Round Base. This model can alternatively be assembled as Sevireth, Lord of the Seventh Wind.
- name: Vanari Bannerblade
  productCode: prod4610171-99120210032
  sku: 99120210032
  ean: 5011921128259
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Vanari-Bannerblade-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210032_LRLVanariBannerbladeLead.jpg
  status: current
  description: |-
    Bearing majestic standards into battle at the head of a Vanari host, Bannerblades are honoured champions of the Lumineth trusted with the sacred duty of defending the enchanted banners even in the thick of combat. These standards are magical artefacts blessed by each of the four aelementiri temples, embodying the balance that all Realm-lords strive for.

    The near-weightless World Banners are powerful sources of inspiration for the Lumineth, who are emboldened merely by fighting in its presence. Such is the magical power of these standards that the essence of a Hyshian dawn can be unleashed to blind and sear any foe who sets their eyes on it.

    The kit is comprised of 12 plastic components, with which you can assemble one Vanari Bannerblade, and is supplied with 1x Citadel 40mm Round Base.
- name: Hurakan Windmage
  productCode: prod4610169-99120210051
  sku: 99120210051
  ean: 5011921179510
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 27
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Hurakan-Windmage-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210028_HurakanWindmageLead.jpg
  status: current
  description: |-
    Hurakan Windmages are the wisest of their order, aelimentiri of such prowess that the winds of their homeland regard them as kin. More at home flying through the skies than walking on land, these mages are born aloft on an aelementor wind visible only as a rolling blur of energy.

    Experts at the manipulation of wind currents, the Windmages are adept at supporting their fellow Hurakan disciples and wielding the aelementors' fury both. Able to cross the battlefield with ease and cast spells from unexpected quarters, they're the perfect choice for a Lumineth general who needs a spot of magic in the right place at the right time.

    The kit is comprised of 21 plastic components, with which you can assemble one Hurakan Windmage, and is supplied with 1x Citadel 60mm x 35mm Oval Base.
- name: Sevireth, Lord of the Seventh Wind
  productCode: prod4610168-99120210050
  sku: 99120210050
  ean: 5011921179503
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Sevireth-Lord-of-the-Seventh-Wind-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210027_SevirethLead.jpg
  status: current
  description: |-
    Of all the seven sentient winds of Hysh, none have suffered so greatly at the hands of Chaos as Sevireth. Manifesting in physical form to defend the Ten Paradises, the spirit also known as the Red Gale seeks to tear down the monuments of its foes with scouring magical sandstorms, all the while plunging arrow after enchanted arrow into the black hearts of the realm's invaders.

    As fast as the searing winds that race across the deserts of Hysh, Sevireth soars around the battlefield picking off key opponents with Enathrai, his giant magical bow. The scorching desert squalls that billow in his wake are capable of stripping flesh from bone, and scouring the magical essence out of the profane monuments of his foes.

    The kit is comprised of 26 plastic components, with which you can assemble one Sevireth, Lord of the Seventh Wind, and is supplied with 1x Citadel 60mm Round Base. This model can alternatively be assembled as a Hurakan Spirit of the Wind.
- name: Vanari Lord Regent
  productCode: prod4600122-99120210053
  sku: 99120210053
  ean: 5011921179534
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Vanari-Lord-Regent-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210031_LRLLyriorUthralleVanariLordRegentLeadAlt.jpg
  status: current
  description: |-
    Representatives of Tyrion's will among the Vanari warhosts, Lord Regents speak with an authority unmatched among their militant kin. Bedecked with dazzlingly pure aetherquartz and displaying feats of surpassing martial skill, these august warriors inspire their comrades through both word and deed.

    Fast and durable, Lord Regents are powerful supporting heroes for Lumineth armies, particularly those containing Vanari troops. While perfectly comfortable dazzling enemy troops in the heat of battle, they also empower their nearby allies, making them a valuable centrepiece for your warhost.

    The kit is comprised of 42 plastic components, with which you can assemble one Vanari Lord Regent, and is supplied with 1x Citadel 90mm x 52.5mm Oval Base. This model can alternatively be assembled as Lyrior Uthralle, Warden of Ymetrica.
- name: Shrine Luminor
  productCode: prod4590199-99120210035
  sku: 99120210035
  ean: 5011921133673
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Shrine-Luminor-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210035_LRLShrineLuminorLead.jpg
  status: current
  description: |-
    The Shrines Luminor, carried atop a realmstone-rich metalith that hovers gracefully above the ground, are bastions of cleansing purity in the tumultuous aftermath of the Age of Chaos.

    Garrison your heroes in these graceful monuments to provide a range of powerful benefits for your army, for both wizards and commanders alike. Use your Shrine Guardian to channel the metalith's power and spread casting bonuses far and wide!

    The kit is comprised of 36 plastic components, with which you can assemble one Shrine Luminor terrain piece.
- name: Vanari Bladelords
  productCode: prod4590198-99120210054
  sku: 99120210054
  ean: 5011921179541
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Vanari-Bladelords-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210033_LRLVanariBladelordsLead.jpg
  status: current
  description: |-
    Soldiers and scholars both, the Vanari Bladelords are a walking contradiction of Lumineth philosophies. Although they hail from the Tyrionic nations and dedicate themselves to mastery of combat in all its forms, they make their home in Teclian cities and devote just as much time to studying the theory of battle. In return for the knowledge gained from the most learned of Scinari aelves, Bladelords act as their guardians on the fields of war, cutting a whirling swath through any who would threaten the mystics and sages of their people.

    Armed with sunmetal greatswords, the preternaturally skilled Bladelords present a swirling storm of blades to anyone foolish enough to engage these masters of the martial arts. You'll be able to choose between two styles of combat to better suit their opponents, from single heavy hits that strike with perfect accuracy to a blistering whirlwind of steel that punishes hordes of closely packed infantry. The banners on their backs, given to them by the Scinari and woven from magical thread, shield them from enemy spells to better protect their charges.

    The kit is comprised of 48 plastic components, with which you can assemble 5 Vanari Bladelords, with an option for assembling one as a male or female Seneschal armed with a Sunmetal Greatblade or Sunmetal Dual Blades. These models are supplied with 5x Citadel 32mm Round Bases.
- name: Lyrior Uthralle, Warden of Ymetrica
  productCode: prod4590197-99120210053
  sku: 99120210053
  ean: 5011921179534
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Lyrior-Uthralle-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210031_LRLLyriorUthralleVanariLordRegentLead.jpg
  status: current
  description: |-
    Lyrior Uthralle, Warden of Ymetrica, voice of the Lord Phoenix, is no normal lord of the Vanari. Speaking with the authority of Tyrion himself, the Lord Regent Supreme is a peerless commander and figurehead for all of the Tyrionic nations of Hysh. Renowned for his logical and cool-headed attitude in battle, in truth Lyrior is an aelf possessed of an all-consuming grief for the loss of his family to a Flesh-eater invasion, for which he blames himself alone.

    Mounted upon Farael, his nimble lightcourser steed, the Warden of Ymetrica darts across the battlefield spearing foes and hurling beams of searing light with his lance, Daemonbane. He is also a commander of unsurpassed skill among the Lumineth, making him a perfect choice to lead your forces into battle.

    The kit is comprised of 42 plastic components, with which you can assemble one Lyrior Uthralle, Warden of Ymetrica, and is supplied with 1x Citadel 90mm x 52.5mm Oval Base. This model can alternatively be assembled as a Vanari Lord Regent.
- name: Ellania and Ellathor, Eclipsian Warsages
  productCode: prod4590196-99120210029
  sku: 99120210029
  ean: 5011921128228
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Ellania-And-Ellathor-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210029_LRLEllaniaEllathorLead.jpg
  status: current
  description: |-
    Prodigal twins exemplifying the Teclian and Tyrionic martial philosophies favoured by the Lumineth, Ellania and Ellathor have already displayed an unrivalled level of skill despite their mere fifty years of age. Unfortunately, their meteoric rise earned them as many enemies as friends, and now they wander the Mortal Realms fighting alongside the many forces of Order in their quest to further the cause of justice and enlightenment.

    Available as allies to all armies with an Order general, these twins combine exemplary physical and magical prowess into a single model, allowing them to seamlessly combine powerful spellcasting with close combat domination. The godly blade Altairi and the divine staff Dianaer makes both supporting your allies and destroying your foes a matter of contemptuous ease for these heroes of the Lumineth.

    The kit is comprised of 12 plastic components, with which you can assemble one Ellania and Ellathor, Eclipsian Warsages, and is supplied with 1x Citadel 40mm Round Base.
- name: 'Endless Spells: Daughters of Khaine'
  productCode: prod4580305-99120212026
  sku: 99120212026
  ean: 5011921141678
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Endless-Spells-Daughters-Of-Khaine-2021
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212026_DoKEndlessSpellsLead.jpg
  status: current
  description: |-
    When the Daughters of Khaine march to war, their wizards and priestesses can conjure blood and shadow into dangerous magicks to harry their foes.

    The Bloodwrack Viper is an enormous serpent formed from boiling blood, a manifestation of hatred and bitterness that binds its prey into a crushing embrace before squeezing so forcefully that the victim explodes in a shower of gore.

    Carried through the air by a tempest of blood, the Bladewind carves a bloody path through anything in its way, slicing through armour with unnatural ease to get to the flesh and blood beneath.

    The most devout of Khaine's priestesses can summon a manifestation of his Iron Heart, a blood-dripping icon that burns with supernatural rage. Those bathed in its wrathful aura continue to fight and kill even when stricken with mortal wounds.

    The Daughters of Khaine endless spells offer diverse and powerful tactical options to your army, designed to slay your foes and offer helpful boons to your own units. This set contains models for all two endless spells and an Invocation of Khaine, two of which can be cast by your wizards, while the third can be summoned by priestesses.

    **This 42-piece kit builds three miniatures for Daughters of Khaine armies:**

    – Bloodwrack Viper
    – Bladewind
    – Heart of Fury

    This kit also includes a 100mm round base and two 50mm round bases.

    Warscrolls for these models can be found in Battletome: Daughters of Khaine.
- name: Alarith Spirit of the Mountain
  productCode: prod4530170-99120210058
  sku: 99120210058
  ean: 5011921179589
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 80
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Sprit-of-the-Mountain-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210039_LRLAvalenorStoneheartKingAlt.jpg
  status: current
  description: |-
    Spirits of the Mountain are the war forms of the stony peaks that the Alarith temples have taken as their patrons. Avatars of incredible toughness and strength, they can smash castle gates and steam tanks with a single swing of their worldhammers.

    An Alarith Spirit of the Mountain is a monstrous combatant that'll devastate anything it gets into combat with. Ideal for hunting other monsters or heroes, the Spirit of the Mountain can disrupt foes and enhance your Alarith units!

    This kit builds an Alarith Spirit of the Mountain. Two build options allow you to vary the pose of your Spirit of the Mountain. Alternatively, it can be used to build Avalenor, the Stoneheart King. It is supplied in 87 plastic components and comes with a 100mm round base.
- name: Vanari Dawnriders
  productCode: prod4530169-99120210043
  sku: 99120210043
  ean: 5011921137084
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/Lumineth-Realm-lords-Vanari-Dawnriders-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120210043_LRLVanDawLead.jpg
  status: current
  description: |-
    The Dawnriders charge the foe in tight formation, thundering into the enemy ranks and punching their lances through the chests of their foremost adversaries before leaping over their corpses so that their noble steeds might trample those behind.

    Vanari Dawnriders are infantry-slaying shock cavalry, ideal for scything through hordes of skeletons, grots or anyone else unfortunate enough to be caught in their path! They're perfect for cutting through enemy lines or using their superior speed to flank vulnerable war machines and wizards in the back line.

    This kit builds 5 Vanari Dawnriders, with options to build a Steedmaster and Standard Bearer. Interchangeable shields and helmet crests allow for customisation. It is supplied in 79 plastic components and comes with 5 60mm x 35mm oval bases.
