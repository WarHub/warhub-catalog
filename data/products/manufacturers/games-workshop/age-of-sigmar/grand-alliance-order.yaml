  description: |-
    Slann Starmasters are amongst the greatest wizards in all the realms, ancient beings created to serve the unfathomable Old Ones. It is their cold and distant intellect that guides the Seraphon to carry out the Great Plan, deciphered from glimpses of a grand cosmic equation. A Starmaster may reshape reality itself with a languid gesture, wielding the energies of the stars to annihilate the enemies of true order.

    This multipart plastic kit builds a Slann Starmaster – a toad-like mage-priest seated atop a floating palanquin. The Starmaster visibly exudes ancient wisdom and magical power, and the kit includes a huge variety of customisation options to make them your own. You'll find a choice of two heads – one with an open mouth, delicate necklace, and elaborate feathered crown, and one with a closed mouth, ornate talismans, and optional diadem. There's also two left arms – one carrying a sceptre, the other a crystal skull – and two right arms in different mystical poses, one of which comes with an optional arcane orb.

    Even the palanquin can be personalised – the kit offers a choice of carved upper panels, engraved frontpieces, and scenic base elements such as rubble and vines. Skink attendants can perch on either side of the Starmaster, one carrying a spear and shield, the other carrying your choice of Seraphon artefacts – each can also be replaced by a small lizard pet. It's a truly magnificent centrepiece to any Seraphon collection.

    This kit comprises 57 plastic components, and comes with a Citadel 80mm Round Base. This miniature is supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
