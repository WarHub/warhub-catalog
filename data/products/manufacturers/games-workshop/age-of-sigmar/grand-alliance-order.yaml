  status: current
  description: |-
    Endrinmasters are the senior mechanics of Kharadron airfleets, taskmasters who oversee the work of Endrinrigger crews. Many take to the skies themselves in master-crafted dirigible suits, aether-turbines roaring as they zoom toward skyvessels in need of repair. Such artificers have no patience for interruptions, and their in-built weapons array blasts any enemies into pieces without missing a beat.

    This multipart plastic kit builds an Endrinmaster with Dirigible Suit – a brilliant Kharadron technician strapped into a flying harness. This skyborne shipwright wields a hefty aethercannon and an aethermatic saw, backed up by the six mechanical arms that extend from their personal aether-endrin. Each arm is tipped with a deadly weapon or equally deadly tool, and can be attached in whatever arrangement you prefer. With a dramatic pose perfect for an emergency landing, this model is ready to assist any beleagured skyvessel.

    This kit comprises 26 plastic components, and comes with a Citadel 40mm Round Base and a flying stem. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
