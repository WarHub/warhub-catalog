    Aether-Khemists are masters of alchemy and atmospheric analysis, employing advanced sensors to literally sniff out deposits of aether-gold. When violence is needed to secure their claim, an Aether-Khemist employs their arcane technology to unleash gouts of toxic gas, augment allied aethershot with catalytic chem-fog clouds, and rip the very breath from the lungs of their enemies.

    This multipart plastic kit builds an Aether-Khemist, a specialist surveyor of the Kharadron airfleets. He's armed with an atmospheric anatomiser – a bulky piece of scientific equipment that can also choke foes with targeted vacuums or pressurised bursts of foul smog – and carries a heavy instrument useful both for analysing his finds and bludgeoning anyone who gets in his way. His sealed, armoured suit is loaded with mechanical detail, from the condensor chambers on his backpack to the various filter-tubes that make up the metal beard of his facemask, allowing him to ‘taste’ the elemental composition of the air.

    This kit comprises 12 plastic components, and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Arkanaut Ironclad
  productCode: prod3480383-99120205055
  sku: 99120205055
  ean: 5011921195985
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 91
  url: https://www.warhammer.com/en-GB/shop/Kharadron-Overlords-Arkanaut-Ironclad-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120205028_ArkanautIronclad01.jpg
  status: current
  description: |-
    Arkanaut Ironclads are amongst the heaviest Kharadron ships of the line, providing a floating fortress at the heart of any airfleet. These massive and majestic skyvessels bristle with weaponry, bombarding their targets from afar with explosive shells and armour-piercing torpedoes. Its heavily armoured hull allows the Ironclad to shrug off any assault, while its deep cargo holds can ferry whole companies of Kharadron privateers around the battle.

    This multipart plastic kit builds an Arkanaut Ironclad, a truly imposing Kharadron flagship. The Ironclad is armed to the teeth, with aethershot carbines and aethershock torpedoes set into gun ports in its hull, a pair of bomb racks loaded with various explosives, a massive supremacy mine, and a choice of turret-mounted prow gun – a great sky cannon, great skyhook, or great volley cannon. This impressively-sized vessel has a duardin crew to match – a captain at the wheel, a navigator in the crow's nest, a gunner for the turret, a signaller with a telescope, and an endrineer dangling from the side.

    The Ironclad is absolutely covered in industrial details, from the portholes, doors, and ladders on its rivet-studded hull to the extensive rigging strung across its massive dirigible endrins. A bevy of valves, pipes, cogs, propellers, and exhausts demonstrate the vessel's mechanical power – there's even a grille incorporated into its glaring ancestor figurehead.

    The kit also includes a selection of ship's paraphernalia to place wherever you like, such as spare pistols, tools, and even a gangplank for captives to walk. The turret, carbines, rudder, and propellers all offer glueless assembly, allowing you to adjust their position mid-game.

    This kit comprises 152 plastic components, and is supplied with a Citadel 170mm x 105mm Oval Base and a 50mm ball and socket flying stem. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
