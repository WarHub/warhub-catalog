    This multipart plastic kit builds three Kroxigor Warspawned – hulking Seraphon with a fearsome crocodilian aspect. Each Warspawned wields a formidable drakefang war-pick, and one can instead be armed with an ornate starfang war-pick. The kit offers a wealth of customisation options – every model has a choice of two arm poses to swing its massive weapon, and the kit includes three distinct war-pick heads and five bony tail tips that can be used with any Warspawned, as well as a variety of necklaces and scenic base elements.

