    This multipart plastic kit builds Lord Kroak, the oldest wizard in all the Mortal Realms. This mummified mage-priest is a majestic and indomitable figure, despite his withered physical body – he sits atop an elaborate magical palanquin covered in ornate carvings, sacred engravings, and tangled jungle vines. His platform floats serenely above the earth, propelled by ancient Seraphon technology and surrounded by crumbling rings reminiscent of an astrolabe.

    Lord Kroak himself grips two ancient relic-staves in lifeless hands, his arms and legs folded in eternal rest, accompanied by a faithful spear-wielding skink attendant. He can be built with a ceremonial death mask, or with his frog-like skull bared to the world and topped by a ritual headdress.

