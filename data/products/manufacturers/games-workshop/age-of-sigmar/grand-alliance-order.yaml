  description: |-
    Endrinmasters are the senior mechanics of Kharadron airfleets, and take pride in squeezing ever-greater speed and firepower out of their skyvessels. No strangers to performing emergency repairs in the heat of battle, Endrinmasters will often outfit themselves with a strength-boosting endrinharness that allows them to grapple with the heaviest misaligned mechanisms and even heft a fearsome aethermight hammer.

    This multipart plastic kit builds an Endrinmaster with Endrinharness – a brilliant Kharadron technician clad in a powered suit. This tenacious tinkerer carries an aethermight hammer, a weapon so heavy it requires two mechanical arms to wield, and their sealed suit is covered in details such as pipes, pistons, and an ornate chimney stack. Always ready for the task at hand, the Endrinmaster carries repair tools and even an anvil attached to their backpack, while their mask incorporates a monocular laser-welder, with a set of diagnostic goggles pushed up onto its brow.

    This kit comprises 13 plastic components, and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
