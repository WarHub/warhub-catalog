- name: Hag Queen on Cauldron of Blood
  productCode: prod3750187-99120212018
  sku: 99120212018
  ean: 5011921095506
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/Haq-Queen-on-Cauldron-Blood-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212018_HagQueenCauldronofBlood01.jpg
  status: current
  description: |-
    For a battle worthy of their finest offerings, the war covens of the Daughters of Khaine bring forth the greatest of their religion’s icons – the Cauldron of Blood. Mounted on iron-shod wheels, these mobile shrines grind forward propelled solely by the incantations of their riders, as if the machine itself were lured onwards by the promise of carnage. When a Hag Queen accompanies the altar, she brings the blood within to a furious boil, giving off clouds of crimson steam which afford strange protections and increased martial prowess to nearby Daughters of Khaine.

    This multi-part plastic kit contains the components necessary to assemble a Hag Queen on Cauldron of Blood. Despite its imposing name and equally terrifying aspect, this is actually a reasonably simple structure – the titular Cauldron is borne aloft on a six-wheeled iron chassis, covered in spikes, chains and blades, with serpentine icons adorning the front. A set of 2 staircases, on which 2 Witch Aelves stand, twist upward toward the cauldron, behind which stands the Hag Queen herself. Behind her is an enormous icon of Khaine, standing tall in elaborate armour and wielding a huge sword in his right hand. When this kit is built as a Hag Queen on Cauldron of Blood, you can also build an accompanying Slaughter Queen on foot and Bloodwrack Medusa.

    The Hag Queen on Cauldron of Blood comes as 95 components, and is supplied with a Citadel 120mm Oval base, a Citadel 40mm Round base and a Citadel 25mm Round base. This kit can be optionally built as a Slaughter Queen on Cauldron of Blood, or a Bloodwrack Shrine.
- name: Blood Sisters
  productCode: prod3750186-99120212033
  sku: 99120212033
  ean: 5011921177516
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Daughters-Of-Khaine-Melusai-Blood-Sisters-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212033_DoKBloodSistersLead01.jpg
  status: current
  description: |-
    Blood Sisters are powerful warriors used as bodyguards to High Priestesses or Bloodwrack Medusae, or as a potent vanguard for the war covens. Each Blood Sister is equipped with a heartshard glaive – a heavy polearm ideal for driving driving through armour and ribs to cut out an opponent’s heart. Blood Sisters can also channel the blackness of their tainted souls into a strike known as the ‘scáth touch,’ solidifying victims into an unmoving crystal statue that remains horrifically aware. The ultimate in cruelty is for a Blood Sister to thrust her glaive quickly enough to tear out a foe’s beating heart even as the scáth touch turns them to crystal, trapping them forever in a state of unimaginable agony.

    This multi-part plastic kit contains the components necessary to assemble 5 Blood Sisters. The first thing you’re likely to notice about these miniatures is their legs, or rather their lack – reshaped in the image of their creator Morathi, everything below their torso has been reshaped into that of a sinister, twisted serpent. Above the this they feature metal waist pieces with attached sashes, and armoured breastplates. The Blood Sisters feature intimidating full-face masks, each with expressions of fury and snakes framing their wild, swept-back hair. You have the option to build 1 model as a Gorgai, the unit leader: she can be distinguished by her uniquely jeweled mask, specific heartshard glaive and her grisly trophy – the heart of an unfortunate victim, clutched proudly in her left hand.

    The Melusai Blood Sisters come as 100 components, and are supplied with 5 Citadel 40mm Round bases. This kit can optionally be used to assemble 5 Melusai Blood Stalkers.
- name: Khinerai Heartrenders
  productCode: prod3750185-99120212032
  sku: 99120212032
  ean: 5011921177509
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Daughters-Of-Khaine-Khinerai-Heartrenders-2018
