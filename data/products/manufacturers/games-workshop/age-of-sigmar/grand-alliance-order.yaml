  priceGbp: 91
  url: https://www.warhammer.com/en-GB/shop/Eidolon-Of-Mathlann-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219005_EidolonAspectStorm01.jpg
  status: current
  description: |-
    Idolised echoes of a bygone era, the Eidolons of Mathlann are summoned to life in times of dire need. These are no divine avatars, however, but collective manifestations of the ancestral souls of the Idoneth Deepkin, spirits of vengeance wrapped in the image of a lost aelven god. Eidolons are formed from the combined energies of the souls that can be roused from an enclave’s chorrileum – a living coral reef, storing the essence of expired Idoneth. When an Eidolon is summoned in the aspect of the storm, it appears swelling like a tidal wave before crashing into the foe. Here is the power of the sea as destroyer, anger pent up so long its release is unstoppable.

    This multi-part plastic kit contains the components necessary to assemble an Eidolon of Mathlann, in his form as an Aspect of the Storm. He comes armed with a fuathar – a spear of repressed fury – and a crulhook; the former is a long, barbed spear held in the Eidolon’s left hand, while the latter is a set of serrated blades attached to his right arm by a strong chain. His armour resembles a set of scales, topped of by a closed-face helm and enormous crest which resembles a spiked net. The most striking feature of both Eidolon models which can be built from this kit is definitely the cloak – representing the unimaginable power of the seas, it is styled as a cascading torrent of ocean water. There are plenty of detailed basing options included, with corals, sea creatures and other detritus from beneath the waves included – you’ll have a lot of spares left over to decorate other Idoneth miniatures. As well as this, an ethereal Stormshoal fights alongside the Eidolonn.

    This kit comes as 51 components, and is supplied with a Citadel 100mm Round base. This kit can alternatively be used to assemble an Eidolon of Mathlan – Aspect of the Sea.
- name: Blood Stalkers
  productCode: prod3770157-99120212033
  sku: 99120212033
  ean: 5011921177516
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Daughters-Of-Khaine-Melusai-Blood-Stalkers-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212033_DoKBloodSistersLead02.jpg
  status: current
  description: |-
    The Blood Stalkers are Morathi’s elite archers, a venomous guard who rain death from afar. Each bears a heartseeker bow, a weapon carved from the wood of the sentient ashdusk tree. The arrows loosed by such bows are bloodseekers. shafts blessed by the Queen and imbued with the same enchantments as those that guide Morathi’s own spear, Heartrender. With uncanny accuracy, these missiles streak across the battlefield to pierce their targets through the heart. In close combat, Blood Stalkers wield scianlar, long daggers forged to absorb the energies from enemies’ vital organs. These are no gore offerings to Khaine, but tributes destined to strengthen the Melusai’s true master, Morathi.

    This multi-part plastic kit contains the components necessary to assemble 5 Blood Stalkers. The first thing you’re likely to notice about these miniatures is their legs, or rather their lack – reshaped in the image of their creator Morathi, everything below their torso has been reshaped into that of a sinister, twisted serpent. Above the this they feature metal waist pieces with attached sashes, and armoured breastplates. The Blood Stalkers feature open-face masks, giving them better peripheral vision and tracking abilities essential to their role as archers – as a nod to their abilities in close combat, each model also carries a sacrificial knife, a scianlar, on their waists. You have the option to build 1 model as a Krone, the unit leader: she can be distinguished by her unique heartseeker bow, modelled with serpentine heads at each end of the handle.

    The Melusai Blood Stalkers come as 100 components, and are supplied with 5 Citadel 40mm Round bases. This kit can optionally be used to assemble 5 Melusai Blood Sisters.
- name: Khinerai Lifetakers
  productCode: prod3770156-99120212032
  sku: 99120212032
  ean: 5011921177509
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Daughters-Of-Khaine-Khinerai-Lifetakers-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212032_DoKKhineraiHeartrendersLifetakersLead02_a.jpg
  status: current
  description: |-
    Tucking their wings close, the Khinerai known as Lifetakers plummet down at high speeds. At the last moment they spread their leathery pinions, snapping their descent as they swing their sickle-blades with maximum force. Foes that survive this devastating assault can strike back, but the Lifetakers are masters at turning their heartpiercer shields to not only parry blows but to puncture organs. Even as nearby enemies rally to pin the Lifetakers in combat, they rise above the melee in a flurry of beating wings, looking for the next target. For such unfortunates, the last thing they will hear is a sudden rush of wind before the Lifetakers’ deadly assault reaps its toll.

    This multi-part plastic kit contains the components necessary to assemble 5 Khinerai Lifetakers. These Khinerai wear open-face helmets, making the twisted sneers of their bloodlust plainly visible as they soar through the skies on enormous, spiked wings. Their armour is minimal, designed more to be streamlined for aerial maneuvers than actual protection – thick plate would drag them down, providing a disadvantage to these high-speed killers. Each Lifetaker carries a horrific barbed sickle in one hand, with a heartpiercer shield in the other; these shields are aptly named, featuring large, sharp spikes. You can build a Harridynn, which is the unit leader – she is denoted by her unique hairpiece and loincloth. Each model is attached to its base via a sculpted ruin to which their base connects, providing the dynamic, aerial look they require.

    The Khinerai Lifetakers come as 61 components, and are supplied with 5 Citadel 40mm Round bases. This kit can optionally be used to assemble 5 Khinerai Heartrenders.
- name: Bloodwrack Shrine
  productCode: prod3750244-99120212018
  sku: 99120212018
  ean: 5011921095506
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/Bloodwrack-Shine-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212018_BloodwrackShrine01.jpg
  status: current
  description: |-
    Propelled by unseen magics, the bladed Bloodwrack Shrine grinds forward to crash into the enemy battle line. Two shrineguards armed with long goadspears strike out, while the writhing Medusa uses her whisperclaw, spear and deadly gaze to join the slaughter. As formidable as the shrine is in close combat, however, it has another, more sinister purpose. As a strange mirror known as a scáthmre stands at the shrine’s centre, reflecting not just the Medusa’s deadly gaze but also an agonising aura, a shadowy projection of the scathing hatred harboured by the monstrous serpentine creature.

    This multi-part plastic kit contains the components necessary to assemble a Bloodwrack Shrine. An iron chassis with 6 bladed iron wheels forms the base of the structure, with spikes, blades and chains making up the bulk of the lower section of the kit. At the front, a staircase flanked by serpentine icons splits into 2, which snake their way upward toward the Shrine itself. This is guarded by a Bloodwrack Medusa, a Witch Aelf who has undergone a monstrous transformation into the half-serpentine creature clutching a Bloodwrack Spear, that now writhes alongside the 2 Shrinekeepers. Behind these creatures stands a tall, strange mirror – the scáthmre – which is framed by a beautifully symmetric set of snake decorations. When this kit is built as a Bloodwrack Shrine, you can also build a Slaughter Queen, a Hag Queen \(each on foot\) and an Avatar of Khaine.

    The Bloodwrack Shrine comes as 95 components, and is supplied with a Citadel 120mm Oval base, a Citadel 40mm Round base and a Citadel 25mm Round base. This kit can be optionally built as a Slaughter Queen on Cauldron of Blood, or a Hag Queen on Cauldron of Blood.
- name: Slaughter Queen on Cauldron of Blood
  productCode: prod3750243-99120212018
  sku: 99120212018
  ean: 5011921095506
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/Slaughter-Queen-on-Cauldron-of-Blood-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120212018_SlaughterQueenCauldronofBlood01.jpg
  status: current
  description: |-
    For a battle worthy of their finest offerings, the war covens of the Daughters of Khaine bring forth the greatest of their religion’s icons – the Cauldron of Blood. Mounted on iron-shod wheels, these mobile shrines grind forward propelled solely by the incantations of their riders, as if the machine itself were lured onwards by the promise of carnage. It is said that the Cauldrons of Blood are gifts from Khaine himself, who bestowed them upon his Daughters as a reward for their dedication to his cause.

    This multi-part plastic kit contains the components necessary to assemble a Slaughter Queen on Cauldron of Blood. Despite its imposing name and equally terrifying aspect, this is actually a reasonably simple structure – the titular Cauldron is borne aloft on a six-wheeled iron chassis, covered in spikes, chains and blades, with serpentine icons adorning the front. A set of 2 staircases, on which 2 Witch Aelves stand, twist upward toward the cauldron, behind which stands the Slaughter Queen herself. Behind her is an enormous icon of Khaine, standing tall in elaborate armour and wielding a huge sword in his right hand. When this kit is built as a Slaughter Queen on Cauldron of Blood, you can also build an accompanying Hag Queen on foot and Bloodwrack Medusa.

    The Slaughter Queen on Cauldron of Blood comes as 95 components, and is supplied with a Citadel 120mm Oval base, a Citadel 40mm Round base and a Citadel 25mm Round base. This kit can be optionally built as a Hag Queen on Cauldron of Blood, or a Bloodwrack Shrine.
