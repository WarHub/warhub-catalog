    Summoned by the blazing will of the Runemasters and Runesmiters, Magmic Invocations are magical constructs forged of arcane fire that bring death to the foes of the Fyreslayers.

    In this set, you’ll be able to build a set of Magmic Invocations of your own, allowing you to mater the full might of your Fyreslayers army. Inside, you'll find:

    - **The Zharrgron Flame-spitter**, a geyser of molten lava that deals devastating damage to massed infantry
    - **The Runic Fyrewall**, a barrier of gold and flame that shields your units from harm
    - **The Molten Infernoth**, a raging elemental that rampages across the battlefield, slaying your enemies while leaving the Fyreslayers untouched

    This kit is supplied in 22 plastic components, and is packed with 1x 120mm oval base.
- name: Akhelian Ishlaen Guard
  productCode: prod3840172-99120219031
  sku: 99120219031
  ean: 5011921229529
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Idoneth-Deepkin-Akhelian-Ishlaen-Guard-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219008_IdonethIshlaenGuard01.jpg
  status: current
  description: |-
    No troops exemplify the Idoneth Deepkin way of life more than the Akhelian Guard. Mounted atop Fangmora Eels, they fight in a loose formation ideal for rapid assaults and sudden retreats, typifying the hit-and-run style of war common amongst the aelves of the depths. Ishlaen Guard wield helsabres, and harness the bioelectricity of the Fangmoras into their galv-shields to turn aside enemy blows with their arcing energy fields. Thus the Ishlaen are better able to shrug off missile fire, and have much greater staying power in prolonged combat than their spear-armed kin, their Fangmora Eels lashing out with their tails and ripping apart the foe with their wicked bites.

    This multi-part plastic kit contains the components necessary to assemble 3 Ishlaen Guard. Each is mounted on a Fangmora Eel, a lithe, sinuous bond-beast controlled by the armoured blinders and reins attached to their heads, attacking with their fanged maws and lashing tails. The Akhelians who ride them wear heavy armour chest plates, with their arms bare and their legs covered in mail and cloth for mobility. They wield helsabres – vicious-looking serrated swords – and galv-shields, and feature bladed crests on their sinister closed-face helmets – there is an extra, specific helmet included for the leader, a Lochian Prince, with a specifically-shaped blade. There are options for a musician, who carries a conch shell and has an open faceplate; and a standard bearer, whose Fangmora Eel is equipped with a towering pennant. The kit comes with plenty of accessories used to decorate the Eels and the bases – nets, ropes, bottles and lamps are included.

    This kit comes as 80 components, and is supplied with 3 Citadel 60x35mm Oval bases. The kit can optionally be used to assemble 3 Akhelian Morrsarr Guard.
- name: Akhelian Leviadon
  productCode: prod3830158-99120219027
  sku: 99120219027
  ean: 5011921229482
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 91
  url: https://www.warhammer.com/en-GB/shop/Idoneth-Deepkin-Akhelian-Leviadon-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219009_AkhelianLeviadon01.jpg
  status: current
  description: |-
    Shrugging off enemy missiles, the Akhelian Leviadon plunges into the fray. Scythed fins dismember foes while the beast’s powerful jaws clamp down with enough force to crush tempered steel. Should the aelves on its back come under assault, they strike out with hooks and blades, while the Ma’harr, the master of the reins and a high-ranking Akhelian, impales foes on his twin-pronged spear. Protected by its thick scales and nigh-impenetrable shell, the Leviadon acts as an indomitable anchor point in an Idoneth phalanx. Whether used as a living battering ram or as a mobile weapons platform, these enormous bond-beasts have proven themselves in battle time and again.

    This multi-part plastic kit contains the components necessary to assemble an Akhelian Leviadon. A large centrepiece model, it looms large above the Thralls and Reavers of an Idoneth army. 6 fins, 3 either side, propel it through the phantasmal seas; the frontmost pair of these are fitted with segmented blades, with the others featuring smaller but equally effective spurs, and each pair – along with the tail section, also fitted with piercing spurs – can be modelled in differing positions allowing for the illusion of flowing movement. Its head features an aggressive profile, with horns and spikes \(and the option of a closed or open mouth\), but the most notable feature is the blinders and chains – this beast is enslaved to the Ma’harr who stands to the front of the howdah, guiding it into battle. 2 crew either side each man a razorshell harpoon launcher and a Void Drummer – whose insistent pounding beat distorts light itself, providing cover from enemy fire – stands at the back.

    The Leviadon includes a host of accessories for adding detail – 13 items, including bottles, jars, bags, lamp cases, cauldrons and nets. These accessories make perfect additions to the howdah, providing a lived-in atmosphere.

    This kit comes as 90 components, and is supplied with a Citadel 120x92mm Oval base, and a 75mm flying stem.
- name: Akhelian Morrsarr Guard
  productCode: prod3830157-99120219031
  sku: 99120219031
  ean: 5011921229529
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Idoneth-Deepkin-Akhelian-Guard-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219008_IdonethMorrsarrGuard01.jpg
  status: current
  description: |-
    No troops exemplify the Idoneth Deepkin way of life more than the Akhelian Guard. Mounted atop Fangmora Eels, they fight in a loose formation ideal for rapid assaults and sudden retreats, typifying the hit-and-run style of war common amongst the aelves of the depths. Morrsarr Guard are armed with volt-spears and galv-shields, channeling the powerful electrical energies of their Fangmora mounts into the tips of their spears, releasing the charge as a lethal short-range bolt. Some legends tell of Morrsarr Guard formations so large that the brightness of their combined biovoltaic blasts left the entire enemy army blinded and reeling.

    This multi-part plastic kit contains the components necessary to assemble 3 Morsarr Guard. Each is mounted on a Fangmora Eel, a lithe, sinuous bond-beast controlled by the armoured blinders and reins attached to their heads, attacking with their fanged maws and lashing tails. The Akhelians who ride them wear heavy armour chestplates, with their arms bare and their legs covered in mail and cloth for mobility. They wield voltspears and galv-shields, and feature splendid crests on their helmets – there is an extra, specific helmet included for the leader, a Lochian Prince, which features a sail. There are options for a musician, who carries a conch shell and has an open faceplate; and a standard bearer, whose Fangmora Eel is equipped with a towering pennant. The kit comes with plenty of accessories used to decorate the Eels and the bases – nets, ropes, bottles and lamps are included.

    This kit comes as 80 components, and is supplied with 3 Citadel 60x35mm Oval bases. The kit can optionally be used to assemble 3 Akhelian Ishlaen Guard.
- name: Akhelian Allopex
  productCode: prod3830156-99120219030
  sku: 99120219030
  ean: 5011921229512
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Idoneth-Deepkin-Akhelian-Allopex-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120219007_IdonethAllopex01.jpg
  status: current
  description: |-
    At first they appear as spectral blurs in the ethersea, distant streamlined shapes that seem to materialise from nowhere. With powerful thrusts of their sickle-finned tails, the forms grow all too quickly as they launch their attack. Sleek, muscular and built for dealing death, Allopexes are legendary predators of the deep oceans. Attracted to blood, they feed upon anything they can fit into their large jaws. The mouth of an Allopex is lined with serrated triangular teeth, razor-edged saws which can bite man-sized holes in prey. With blades attached to their fins and riders manning harpoon launchers atop their backs, the Allopex is a living weapon of war.

    This multi-part plastic kit contains the components necessary to assemble an Akhelian Allopex. A large, fierce-looking bond-beast with a shark-like silhouette, its fins are modified with sharp blades and its head and eyes covered with metal armour, to facilitate its control by its riders. 2 Akhelian Guard mount the beast – the foremost clutches the reins in his left hand, with a barbed blade \(or optional barbed hook\) in his right ready to cut down any nearby enemy who survives the attentions of the Allopex’s ferocious bite. Behind him stands a Guard manning the razorshell harpoon launcher atop a specially-built platform – this can optionally be built as a retarius net launcher, both options equally devastating and featuring a cache of harpoons behind the weapon. The pilot features a helmet with no crest – allowing the harpoon launcher a clear shot – and the gunner, almost seeming to make up for this, features a particularly large crest; both feature the heavy plate and bare arms that typify the Akhelian Guard. You have the option to model the Allopex with mouth closed or open, and a selection of accessories – fishing net, rope and grapple hook, fiasco bottles, normal bottles and bottle and case – used to decorate the creature and base.

    This kit comes as 47 components, and is supplied with a Citadel 90mm Oval base & flying stand.
- name: Isharann Tidecaster
  productCode: prod3810256-99070219011
  sku: 99070219011
  ean: 5011921229475
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 20.5
  url: https://www.warhammer.com/en-GB/shop/Idoneth-Deepkin-Isharann-Tidecaster-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070219006_IsharannTidecaster01.jpg
  status: current
  description: |-
    It is the Tidecasters who conjure the phantasmal sea that allows aelf and aquatic beast to move and breathe as if they were in their own natural environment. They are able to conjure spells from the repressed anguish of the Idoneth, the curse that echoes still from their ancestors’ torture within Slaanesh. Such magics take the form of crushing waves of despair, black pits of hopelessness or raging maelstroms of horror that shatter the minds of the foe, leaving them open to attacks from the Namarti and Akhelians. So potent are these enchantments that some victims believe themselves to be trapped underwater, causing them to drown in their own fear and sorrow.

    This multi-part plastic kit contains the components necessary to assemble an Isharann Tidecaster. Standing atop a large, fallen aelven ruin \(the head of a statue, featuring a carved rune on the forehead\), she is posed very much in the manner of a wizard summoning something dark – her eyes are closed, and she clutches a rune in her right hand \(the aelven rune for water in fact, an indication of the phantasmal seas she controls\). She is clad in metal plate armour, with spiked shoulder pads holding the large cloak that billows behind her. Above her head is a finned crest attached to her helmet, with a shell at the centre. Denoting her wizardly status further is a scroll case and a set of potion bottles that hang from her hip. She is armed with a pelagic staff, and is accompanied a spirit guardian which swims around her, keeping her from harm.

    This kit comes as 12 components, and is supplied with a Citadel 32mm Round base.
- name: Isharann Soulrender
  productCode: prod3810254-99070219004
  sku: 99070219004
  ean: 5011921097456
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 20.5
  url: https://www.warhammer.com/en-GB/shop/Idoneth-Deepkin-Isharann-Soulrender-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070219004_IsharannSoulrender01.jpg
  status: current
  description: |-
    The Soulrenders are unusual amongst the Isharann, for they are trained alongside the Akhelians, and are well accustomed to acting at the forefront of battle. Upon each Soulrender’s helm dangles a lurelight, its strange glow attracting and absorbing souls. Armed with a hooked polearm known as a talúnhook, Soulrenders fight alongside the Namarti, replenishing their subordinates’ ranks even as they reap spirit-stuff. A rope-catch attached to the talúnhook is ideal for snaring foes that attempt to flee, and each Soulrender employs a Rakerdart, a bond-beast that glides at its master’s feet, ready to stab prey with its sharp bill to ensure none can escape.

    This multi-part plastic kit contains the components necessary to assemble an Isharann Soulrender. Far more heavily armoured than the Namarti he fights alongside, this model is clad in thick metal plate, with enormous shoulder pads in the shape of nets giving the model a particularly aggressive silhouette. The lower half is covered by a large robe featuring embroidered waves, from under which his heavy boots peek – his left foot is standing on a barnacle-encrusted rock, which decorates the base. His helmet is a standout feature – partially closed, a large metal structure looms out and over the top of his head, ending with the lurelight he uses to attract the soulstuff that fuels his kin. His talúnhook is massive – longer than he is tall – and ends in a wicked serrated blade, curving into an evil-looking hook, with its rope-catch dangling beneath. The Rakerdart that accompanies him is clearly a creature accustomed to combat, with plates running the length of its body and a large spike providing offensive weaponry.

    This kit comes as 7 components, and is supplied with a Citadel 32mm Round base.
- name: Akhelian King
  productCode: prod3810188-99120219028
  sku: 99120219028
