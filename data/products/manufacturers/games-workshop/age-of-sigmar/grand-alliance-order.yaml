  status: current
  description: |-
    Endrinriggers are daring sky-mechanics, floating alongside a Kharadron airfleet in order to conduct vital field repairs on damaged ships. Carried aloft by the personal aether-endrins strapped to their backs, these steely-nerved duardin have no problem with putting their aether-powered tools to violent use when danger approaches, riddling foes with red-hot rivets or slicing through armour and bone with whirring sawblades.

    This multipart plastic kit builds three Endrinriggers – flying duardin tasked with skyvessel repairs. Each Endrinrigger is armed with a rapid-fire rivet gun and an aethermatic saw, mechanical tools that can take apart enemies as easily as ship hulls. One Endrinrigger can instead be armed with an aethermatic volley gun, and another can be armed with a choice of skyhook, drill cannon, or grapnel launcher. There's also a unique head to mark out a Mizzenmaster champion.

    This kit offers a boatload of customisation options – three different designs for heads, saws, and guns that can be combined as you see fit, as well as interchangeable aether-endrins, rigs, backpacks, and rudders. There's also a selection of cosmetic tools to hang from belts and bandoliers, allowing you to build a varied team of Endrinriggers.

    This kit can alternatively build three Skywardens, pike-wielding airborne Arkanaut warriors.

