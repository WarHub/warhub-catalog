  status: current
  description: |-
    Realmshaper Engines are arcane devices that reorder the worlds around them in line with the Old Ones' will, transforming disparate lands into the sweltering primordial havens favoured by the Seraphon. The Starborne transport their Realmshaper Engines to the field from vast temple-ships, while Coalesced Seraphon dwell for long years in the jungles created by these celestial totems.

    This multipart plastic kit builds a Realmshaper Engine – an imposing piece of faction terrain for the Seraphon. A stepped ziggurat covered in ornate carvings and sculpted relief plates, the Engine is topped with an arcane mechanism that crackles with heavenly energy. The kit's innovative design allows you to build your Realmshaper Engine with a well-maintained, clean edifice, or as a vine-choked relic. You can even combine several sets to build a temple-city of your own.

    This kit comprises 42 plastic components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Arch-Revenant
  productCode: prod4380139-99120204041
  sku: 99120204041
