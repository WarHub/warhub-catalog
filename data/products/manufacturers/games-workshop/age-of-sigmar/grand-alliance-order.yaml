    This multipart plastic kit builds three Skywardens – airborne Arkanaut warriors . Each Skywarden is armed with a skypike and a vulcaniser pistol, as well as a brace of timed charges that float from the back of their mechanical aether-endrins. One Skywarden can instead be armed with an aethermatic volley gun, and another can be armed with a choice of skyhook, drill cannon, or grapnel launcher. There's also a unique head to mark out a Custodian champion.

    This kit offers a boatload of customisation options – three different designs for heads, pikes, and pistols that can be combined as you see fit, as well as interchangeable aether-endrins, rigs, charges, backpacks, and rudders. There's also a selection of cosmetic tools to hang from belts and bandoliers, allowing you to build a varied team of Skywardens.

    This kit can alternatively build three Endrinriggers, flying Kharadron field mechanics.

    This kit comprises 88 plastic components and comes with 3x Citadel 32mm Round Bases, as well as 3x flying stems of differing heights – 30mm, 32.5mm, and 35mm. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
