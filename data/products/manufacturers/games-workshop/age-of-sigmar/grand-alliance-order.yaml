    Aetheric Navigators are an invaluable presence on any Kharadron skyvessel, masters of the guiding winds who use cutting-edge aethermatic science to decipher the ever-changing wind patterns of the Mortal Realms. These aero-cartographers employ arcane instruments to read patterns both meteorological and magical, plotting the optimal course for allied skyvessels and disrupting hostile flows of sorcerous power.

    This multipart plastic kit builds an Aetheric Navigator, a duardin wayfinder of arcane insight. He strikes a dramatic pose, clutching his zephyrscope and peering into an analytical gadget with a ranging pistol at his hip. The Navigator's sealed suit is covered head to toe in other devices used to gauge the aeronautical conditions and guide skyvessels to their goal – including magical lenses, filters, map cases, a sextant, and an anemometer mounted on his backpack. He's a striking example of Kharadron science and ingenuity.

    This kit comprises 10 plastic components, and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
