    Arkanaut Admirals are the cream of the Kharadron officer class, intrepid leaders who direct whole airfleets from their favoured flagship. To reach the rank of Admiral requires proven excellence and tremendous profit – each one is a battle-hardened veteran of a thousand aerial engagements, whose booming commands inspire their crew to mighty deeds in the search for gain and glory.

    This multipart plastic kit builds an Arkanaut Admiral, a proud commander of the Kharadron airfleets. This duardin overseer leads by example, wielding an aether-powered skalfhammer and a masterwork volley pistol as he charges into the fray. The Admiral's heavy sealed armour is covered in pipes, valves, and other mechanisms that fuel his weapons and aid him in combat – not to mention ornate decorations that attest to his years of profitable service. He's stood atop a scenic base of crystal-studded rock – the perfect vantage point from which to survey the battlefield.

