  description: |-
    The Ydrilan Riverblades are lithe warriors of the Lumineth Realm-lords. Agile as a skimming stone and relentless as the driving current, the aelves of the Ydrilan temples serve the sacred aelementors of the realms’ rivers. They defend their blessed waterways with swift and merciless judgement, purifying those tributaries befouled by corruption and slaying any who interfere.

    This multipart plastic kit builds a full Ydrilan Riverblades warband, for use in games of Warcry. These acrobatic warrior-monks are led by a Pureflood Seneschal, who guides skilled Crestdancers and lightly-armoured Stream-runner acolytes to fight in harmony as they defend the sacred waters of the realms. Together, the Riverblades sweep foes aside in a rushing flood of dancing blades, elegant spears, and flashing darts.

    These miniatures can also be used as part of a Lumineth Realm-lords army in games of Warhammer Age of Sigmar, using free rules [available to download](https://www.warhammer-community.com/warhammer-age-of-sigmar-downloads/) on the Warhammer Community website.

    **This set contains 10 plastic miniatures:**
    - 1x Pureflood Seneschal, armed with master's blades, ythara darts, or a Ydrilan warglaive
    - 1x Crestdancer, armed with a twin-spear or roped sickle
    - 3x Crestdancers, armed with twin-spears
    - 1x Stream-runner, armed with crestblades or riversteel weapons
    - 4x Stream-runners, armed with riversteel weapons

    **This set also includes:**
    - An Ydrilan Riverblades abilities card, to help you purify the land in games of Warcry \(in English, French, Italian, German, Spanish, Chinese, and Japanese\)
    - 7x Ydrilan Riverblades fighter cards, for referencing your rules and stats at a glance
    - 2x wound divider cards, for tracking your fighters in battle

    This kit comprises 63 plastic components, and comes with 5x Citadel 32mm Round Bases, and 5x Citadel 28.5mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
