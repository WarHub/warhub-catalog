    This multipart plastic kit builds a Grundstok Gunhauler, a compact but powerful Kharadron attack vessel. The Gunhauler is armed with an aethershot carbine, two bomb racks loaded with a variety of explosives, and a choice of bow-mounted gun – a sky cannon or a drill cannon, each with an appropriate stack of munitions. It is crewed by two duardin from the Grundcorps – a pilot operating a rack of arcane instruments, and a gunner sat behind the ship's primary weapon.

