  description: |-
    Domicile Shells are the beginning of new buildings under construction as a Dawnbringer Crusade town or outpost grows. When the forces of order strike out into the wilds of the Mortal Realms, they bring arcane caravans full of the materials needed to forge new settlements.

    This multipart plastic kit builds one Domicile Shell with Winch, and a small stack of columns, terrain pieces representing an unfinished home for your games of Warhammer Age of Sigmar. It’s packed with details, including the ropes, scaffolds, and pulleys that are used to construct such a building. Adorned with symbols, it represents Order's dominion over the lands they had previously lost. It can be combined with other scenery pieces, available separately, to build your own nascent settlement for armies and warbands to fight over.

    This kit comprises 17 plastic components. These push-fit miniatures can be assembled without glue and are supplied unpainted – we recommend using Citadel Colour paints.
