  status: current
  description: |-
    Guardian Idols are towering constructs made of stone and gold that are placed around the perimeter of a stronghold or town. They ward away beast and invader alike with a mix of shielding magic and intimidating, ornately wrought features.

    This multipart plastic kit builds one Guardian Idol, a terrain piece for Warhammer Age of Sigmar. Built on top of the ruins of a previous structure, this platform and statue are fashioned to remind the denizens of the Mortal Realms of Sigmar's majesty. The architecture of the columns and platform matches other scenery pieces, which are available separately. The idol has a choice of two heads – one of noble countenance and the other a grim skull.

    This kit comprises 15 plastic components. This push-fit miniature can be assembled without glue and is supplied unpainted – we recommend using Citadel Colour paints.
