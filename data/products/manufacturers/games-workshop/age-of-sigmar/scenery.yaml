  description: |-
    The ravages of time and the footfalls of hundreds of rampaging armies have laid waste to many of the God-King’s Stormvaults, though the vengeful spirits of the guardians leashed to them still linger.

    Need some extra scatter terrain for your board? This Dominion of Sigmar set turns any gaming table into a storied battlefield, with a collection of 13 ruins designed to fight over. Abandoned temples, fallen kingdoms – you'll find this set is ideal for creating them all. On their own, they're ideal for providing some additional cover, while combined with the rest of the Dominion of Sigmar range, they're perfect for fleshing out your larger structures and tying them into your gaming boards. A free warscroll, meanwhile, gives this terrain piece it’s own thematic rules.

    This set is supplied in 34 plastic components.
