  status: current
  description: |-
    The Mortal Realms are inhabited by many strange and deadly creatures. The Megadroths of Ghur are one such beast – titans that stride the plains and swamps, preying on other megafauna. When they die, their fossilised remains often become points of conflict – some seek to claim the primordial amber energy that still suffuses their bones, while others use the bones as makeshift shelters.

    This multipart plastic kit builds Megadroth Remains, a terrain piece for Warhammer Age of Sigmar. All that's left of this one is the head, spinal column, and a few broken ribs. This imposing piece is ideal for depicting the wild and savage realm of Ghur, and gives your units a measure of cover to advance behind. The jaw can be assembled open or closed.

    This kit comprises 23 plastic components. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
