  description: |-
    There is a Nexus Syphon at the heart of every new Sigmarite Stronghold. These magical constructs are designed to draw raw geomantic energy from the realm to power and protect the burgeoning settlement surrounding it.

    This multipart plastic kit builds a Nexus Syphon, a terrain piece for Warhammer Age of Sigmar. Built on top of the ruins of a previous structure, this bulbous tower can be seen drawing a swirling ball of energy out of the ground. It can be combined with other scenery pieces, available separately, to build your own nascent settlement for armies and warbands to fight over.

    This kit comprises 23 plastic components. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
