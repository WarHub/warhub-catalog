  description: |-
    Cleansing Aqualiths are magical shrine-engines used by the Dawnbringer Crusades to bring fresh water to newly founded settlements. Designed by Collegiate mages, forged by Ironweld engineers, and blessed by Sigmarite priests, these floating metaliths absorb ambient magic to generate an endless stream of purified water. Cleansing Aqualiths can be found throughout the Mortal Realms, in growing settlements and abandoned outposts, chained to the ground and topped with holy statues.

    This multipart plastic kit builds one Cleansing Aqualith, a magnificent terrain piece for your games of Warhammer Age of Sigmar. This floating shrine looks right at home on any battlefield, and can be combined with other scenery pieces, available separately, to build your own nascent settlement for armies and warbands to fight over.

    This kit comprises 74 plastic components. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
