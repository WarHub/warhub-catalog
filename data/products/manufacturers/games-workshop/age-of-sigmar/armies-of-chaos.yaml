  url: https://www.warhammer.com/en-GB/shop/Keeper-of-Secrets-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915056_DoSKeeperofSecrets01.jpg
  status: current
  description: |-
    Keepers of Secrets are darkly intelligent, horribly beguiling, and deadly in battle – they are the greatest champions of Slaanesh’s daemonic legions. Wielding unclean yet beautiful weapons and the sorcerous power of obsession and torment, these daemons cut an elegantly hideous swathe across the battlefield.

    This multipart plastic kit builds one Keeper of Secrets for your Emperor's Children or Chaos Daemon armies in games of Warhammer 40,000, or your Hedonites of Slaanesh armies in games of Warhammer Age of Sigmar. As the most powerful and dangerous of Slaanesh’s servants, these towering combatants can scythe through enemy warriors with a flurry of attacks.

    The Keeper of Secrets can be assembled with a choice of two heads, and can have an open claw, or carry a ritual knife, living whip, or shining aegis, making it easy to customise your insanity-spreading daemon. The kit alternatively builds Shalaxi Helbane.

    This kit comprises 51 plastic components, and 1x Citadel 100mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Sloppity Bilepiper
  productCode: prod3700238-99129915083
  sku: 99129915083
  ean: 5011921259137
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Sloppity-Bilepiper-Herald-Of-Nurgle-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99079915004_SloppityBilepiper01.jpg
  status: current
  description: |-
    While the jokes and songs of Plaguebearers infected by the Chortling Murrain find little purchase amidst the glum Plaguebearers, Nurgle’s other daemons find the antics of the Sloppity Bilepipers hilarious. Unfortunately for their foes, this disease is incredibly infectious, and can cause mortals to laugh until their sides literally split. Despite their roles amusing the warbands of Nurgle as they march to war, the Sloppity Bilepiper is resigned to grim fate, eventually being reshaped into a set of pestilent gutpipes for the next victim of the Chortling Murrain to take up.

    This multi-part plastic kit contains the components necessary to assemble a Sloppity Bilepiper. Surprisingly lithe and cheerful, he is posed in a somewhat capering manner, holding his marotter aloft and his gutpipes in the crook of his arm. The marotter is a strange weapon, essentially a big stick with a Plaguebearers head stuck on the end, clad in a jester’s cap with spiked censers at the end of each of the three flaps. The gutpipes are another thing entirely – a large, miscellaneous organ with a bunch of ramshackle valves and pipes jammed into it, tied together with bits of rag and leather. The Bilepiper himself features jolly bells tied to his ankles and wrists, an icon-adorned hood and a split in his pot belly through which his guts dangle hilariously. A Nurgling is included, which can be placed at the Bilepiper’s feet, dancing joyously along to the wheezing and groaning noises issued from the sphincters of his gutpipes.

    The Sloppity Bilepiper comes as 9 components, and is supplied with a Citadel 32mm Round base. This model can be added to Warhammer Age of Sigmar and Warhammer 40,000 armies.
- name: Screamers
  productCode: prod3430150-99129915033
  sku: 99129915033
  ean: 5011921077359
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/screamers-2016
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915033_TzeentchScreamers01.jpg
  status: current
  description: |-
    Screamers are predatory daemons that strike like sudden and inescapable change. They emit unearthly shrieks as they swoop down upon their prey on scintillating tides of sorcery, slicing victims to ribbons with razor-keen fins, and latching on with fanged jaws from which corrosive empyric energies flow.

    This multipart plastic kit builds three Screamers of Tzeentch – sleek, ray-like beasts for your Thousand Sons or Chaos Daemons armies in games of Warhammer 40,000, or your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. These swift daemons can threaten enemy units across the battlefield, and their vicious lamprey bite easily tears apart flesh and armour. The kit includes five fang-filled maws and five tails, all interchangeable across the three bodies, making it easy to customise your shoal of hunters.

    This kit comprises 27 plastic components, 3x Small Flying Bases, and 3x Ball and Socket Flying Stems. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Tzaangor Enlightened
  productCode: prod3430129-99120201143
  sku: 99120201143
  ean: 5011921178636
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Tzaangor-Enlightened
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120201064_TzaangorEnlightened01.jpg
  status: current
  description: |-
    Tzaangor Enlightened are blessed amongst their mutated kind – they can see the skeins of fate through communion with Tzeentch. They surge atop daemonic Discs on the hunt for esoteric knowledge. In battle, they close on their targets, emitting screeches of anticipatory triumph, and their divining spears hum as they sense their predestined prey.

    This multipart plastic kit builds three Tzaangor Enlightened, elite melee units for your Thousand Sons armies in games of Warhammer 40,000, or your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. They ride to battle atop bizarre, bladed Discs of Tzeentch, giving them great speed with which to get stuck in as fast as possible. The kit includes parts to build an optional champion, and the gouts of flame that raise up the discs are interchangeable. The miniatures can alternatively be built on foot, or as Tzaangor Skyfires – an elite ranged unit armed with ornate bows.

    This kit comprises 62 plastic components, and 3x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Skarbrand
  productCode: prod2780350-99129915089
  sku: 99129915089
  ean: 5011921259229
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/Skarbrand-Bloodthirster
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915071_Skarbrand1.jpg
  status: current
  description: |-
    Skarbrand storms across realspace, never pausing, never relenting, hacking apart every luckless foe in its path. Worse, all who find themselves in the presence of the daemon are seized by its feral murderlust, a madness that sees even elegant strategies collapse into clashes of primal savagery.

    This multipart plastic kit builds one Skarbrand, a hubristic warrior of blood, murder, and fury for your World Eaters or Chaos Daemons armies in games of Warhammer 40,000, or your Blades of Khorne armies in games of Warhammer Age of Sigmar. Armed with legendary axes Carnage and Slaughter, it is ideal for leading a Blood Crusade and leaving a mountain of enemy skulls in its wake.

    This kit comprises 72 plastic components, and 1x Citadel 100mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Plague Drones
  productCode: prod3610130-99129915038
  sku: 99129915038
  ean: 5011921085545
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/plague-drones-of-nurgle-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915017_PlagueDrones01.jpg
  status: current
  description: |-
    Plague Drones ride monstrous rot flies to war. These vile steeds scrabble and rip at their prey, impaling them on dripping proboscis or biting the heads off their victims. The finest stolen craniums are recovered and fashioned into filth-swollen projectiles – death’s heads – for the daemonic riders to hurl at their foes.

    This multipart plastic kit builds three Plague Drones, daemonic flying cavalry for your Death Guard or Chaos Daemons armies in games of Warhammer 40,000, or your Maggotkin of Nurgle armies in Warhammer Age of Sigmar. These elite units combine the speed of rot flies with the resilience of Plaguebearers, causing havoc among enemy lines while soaking up incredible amounts of damage.

    This kit includes the parts to make an optional champion, icon bearer, and bell-ringing musician. There are six interchangeable heads for the Rot Flies – three with an elongated proboscis and three with teeth – and interchangeable stingers – three with mouths and three lethally sharp ones.

    This kit comprises 86 plastic components, 3x Citadel 60mm Round Bases, and 3x Citadel Flying Stems. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
