  description: |-
    Maestros of discordance, Infernal Enrapturesses fill the battlefield with screams of pain and unrestrained elation. They are virtuosos among Slaanesh’s infernal choir, towards whom the Dark Prince’s daemonic legions are drawn.

    The Infernal Enrapturess is a key support character for a Slaanesh army. While they're capable of shredding foes at range with sonic blasts, their strength lies in a suite of useful abilities, whether you're using them in Warhammer 40,000 or Warhammer Age of Sigmar. You’ll find Daemons of Slaanesh easier to summon, while enemy psykers and sorcerers will find casting spells or using their powers much more dangerous.

    This kit builds one Infernal Enrapturess, and is supplied in 24 plastic components. It comes with a 60mm oval base.
- name: Bloodmaster, Herald of Khorne
  productCode: prod4150237-99129915084
  sku: 99129915084
  ean: 5011921259168
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 20.5
  url: https://www.warhammer.com/en-GB/shop/Bloodmaster-Herald-of-Khorne-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99079915005_BloodmasterofKhorneBox01.jpg
  status: current
  description: |-
    Each swing of the Bloodmaster’s blade opens throats and splits torsos, while truly worthy victims find their heads severed from their bodies. Around the Herald, the Bloodletters of Khorne fight all the harder, driven to a frenzy by his murderous aura.

    Bloodmasters are a must-have in any Khorne army, whether you’re conquering the 41st Millennium or the Mortal Realms. As well as being deadly combatants in their own right, these champions of the Blood God will also make your Bloodletters even deadlier with handy aura abilities.

    In this set, you'll find everything you need to build your own Bloodmaster. Styled after the Bloodletters he leads, but larger and wearing extra armour, he'll look right at home on the front lines of your army.

    This set is supplied in 14 plastic components and is supplied with a 40mm round base.
- name: Burning Chariot of Tzeentch
  productCode: prod3430147-99129915030
  sku: 99129915030
  ean: 5011921077328
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Burning-Chariot-of-Tzeentch
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915030_BurningChariot01.jpg
  status: current
  description: |-
    Burning Chariots of Tzeentch are often seen in the visions and nightmares of mortals as blazing omens of ill fortune. On the battlefield, these cryptic warnings become self-fulfilling prophecies – the eldritch war engines serving to deliver the very devastation and misery that their coming portended.

    This multipart plastic kit builds one Burning Chariot, a daemonic construct of Tzeentch. This otherworldly disc is drawn across the skies by a pair of tusked Screamers, trailing arcane fire in its wake. A trio of gibbering Blue Horrors caper across its surface in a parody of a chariot's crew, while a mighty Exalted Flamer belches a gout of billowing warpflame to engulf anyone unfortunate enough to stand in its way.

    This extensive kit includes the components necessary to assemble a wide variety of Tzeentch models – in addition to a Burning Chariot, it can be used to also build a Changecaster. Alternatively, it can be used to assemble both an Exalted Flamer and a Fateskimmer or Changecaster, as well as three Blue Horrors.

    This kit comprises 49 plastic components, and is supplied with a Citadel 32mm Round Base, 3x Citadel 25mm Round Bases, a Citadel 120x92mm Oval Base, and a Citadel 75x42mm Oval Base, to account for all the possible build options. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Tzaangors
  productCode: prod3430130-99120201144
  sku: 99120201144
  ean: 5011921178643
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Tzaangors-AoS
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120201065_TzaangorWarriors01.jpg
  status: current
  description: |-
    Tzaangors surge into battle to the sound of brayhorn blasts and avian shrieks – the mutated shock troops wield baroque blades or roaring chainswords with vicious skill. Whirling skeins of dark sorcery deflect return shots and blows, for these creatures belong to Tzeentch, body and soul.

    This multipart plastic kit builds 10 Tzaangors, mutant melee units for your Thousand Sons armies in games of Warhammer 40,000, or your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. These twisted warriors are ideal for grabbing objectives.

    The Tzaangors can each be armed with a blade and a shield or a pair of blades, and there are parts to build an optional champion, standard bearer, and musician. The beaks, horns, manes, weapons and shields are interchangeable across the miniatures. You can optionally build two heavily mutated Tzaangors, and you can arm up to four miniatures with vicious two-handed blades, making the unit easy to customise.

    This kit comprises 142 plastic components, and 10x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Tzaangor Shaman
  productCode: prod3430128-99070201030
  sku: 99070201030
  ean: 5011921178612
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Tzaangor-Shaman
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070201021_TzaangorShamen01.jpg
  status: current
  description: |-
    Tzaangor Shamans possess prodigious sorcerous abilities stemming from their faith in Tzeentch and can unleash ferocious psychic bombardments against the foe as they soar high upon their daemonic Discs. The mere presence of these bestial champions inspires the herds they lead to ever greater heights of violence.

    This multipart plastic kit builds a Tzaangor Shaman, a flying sorcerer for your Thousand Sons armies in games of Warhammer 40,000, or your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. This screeching spellcaster wears an elaborate war-mask and feathered headdress, and hefts a ritual dagger and a burning staff of change. Arcane scrolls, talismans, and a sorcerous elixir hang at the Shaman's waist, with a wizardly half-robe flowing in the winds kicked up by their otherworldly mount. This elite warrior combines the power of potent magics with the speed offered by a Disc of Tzeentch, making them a threat nearly anywhere on the battlefield. They are an ideal leader for armies that need a little extra tzap.

    This kit comprises 16 plastic components, and 1x Citadel 40mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Seekers of Slaanesh
  productCode: prod2300147-99129915005
  sku: 99129915005
  ean: 5011921013357
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 21.5
  url: https://www.warhammer.com/en-GB/shop/Seekers-of-Slaanesh
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915005_SeekersLeadNEW.jpg
  status: current
  description: |-
    Seekers ride swift Steeds of Slaanesh to pursue their mortal prey with an obsessive delight. Very few can hope to outpace these vicious entities, while those who stand and fight soon find their ranks smashed asunder by charging shock cavalry drawn from the depths of nightmare.

    This multipart plastic kit builds five Seekers for your Emperor's Children or Chaos Daemon armies in games of Warhammer 40,000, or your Hedonites of Slaanesh armies in games of Warhammer Age of Sigmar. These fast-moving cavalry are ideal for claiming distant objectives or harassing far-flung enemy units trying to keep their distance. The Steeds are nimble, unsettling creatures with muscular limbs and long, terribly poisonous tongues – it is said a single caress from a Steed's tongue is enough to drive a man into a deathly rapture. The Seekers are no less deadly, with lethal claws to slash and slice at their foes.

    This kit includes parts to build an optional champion, standard bearer, and musician. The standard bearer has a choice of two different icons, and the champion has a choice of two different heads and two different sets of claws. Each Steed has a choice of two different neck frills, and the heads, riders, and claws are interchangeable across the miniatures, making it easy to personalise your unit.

    This kit comprises 59 plastic components, and 5x Citadel 60mm Oval Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
