  productCode: prod3430148-99129915067
  sku: 99129915067
  ean: 5011921178667
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/flamers-of-tzeentch-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915031_TzeentchFlamers01.jpg
  status: current
  description: |-
    Flamers are bizarre daemons that bound through the air in convulsive leaps. The warpflame that drools from their many maws seethes with the raw power of change. When spat forth in roaring sheets, it sends its victims into agonies of mutation, their forms altering repeatedly before collapsing into distorted ruin.

    This multipart plastic kit builds three Flamers of Tzeentch, reality-mutating creatures for your Thousand Sons or Chaos Daemons armies in games of Warhammer 40,000, or your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. These horrifying creatures are filled with daemonic flames, making every orifice a weapon capable of burning both flesh and reality itself. One can be assembled as an optional champion, and the arms, heads, and additional tentacles are interchangeable across the miniatures, making them easy to customise.

    This kit comprises 36 plastic components, and 3x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Kairos Fateweaver
  productCode: prod3430145-99129915065
  sku: 99129915065
  ean: 5011921178650
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/Kairos-Fateweaver-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915028_KairosFateweaver01.jpg
  status: current
  description: |-
    Kairos Fateweaver wields the Staff of Tomorrow and is able to predict all that may come to pass while knowing all that has already transpired, making them one of the galaxy’s most canny strategists. What the daemon lacks in physical and martial prowess, it more than makes up for in pure Tzeentchian cunning.

    This multipart plastic kit builds Kairos Fateweaver, a favoured Greater Daemon of Tzeentch, for use in your Thousand Sons or Chaos Daemons armies for Warhammer 40,000, or your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. Towering over your infantry, he makes a magnificent centrepiece to your force. His two heads give the miniature a manic energy, and you'll delight in picking out all the wonderful Tzeentchian detail like the all-seeing eye on his open palm. In battle, his sorcerous powers allow you to blast your foes apart with eldritch energy while he uses the Staff of Tomorrow to punish any who dare to get too close. The wings on this miniature can be assemble in two different configurations, offering a degree of customisation.

    This kit can alternatively be built as a Lord of Change, a Greater Daemon of Tzeentch.

    This kit comprises 72 plastic components, and 1x Citadel 100mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
