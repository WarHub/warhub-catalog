    This multipart plastic kit builds 10 Jade Obelisk cultists, mortal warriors for your Disciples of Tzeentch armies in games of Warhammer Age of Sigmar. These well-armoured warriors are ideal for claiming objectives as enemy attacks deflect from their stone-cursed skin. They wield former tools of construction, which are just as effective against flesh as they are against blasphemous effigies.

