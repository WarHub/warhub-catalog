  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120201036_KhorneBloodWarriors01.jpg
  description: |-
    Creatures whose rage has taken them over completely, who know nothing but the appropriate red mist of anger, whose fury is such that it literally radiates off them in visible waves of livid heat, the Blood Warriors of Khorne are a mass of intense aggression and sheer bloodlust. Even striking one down offers no respite, as even the most traumatically wounded of these terrifying warriors will fight on in a trancelike frenzy.

    This multi-part plastic kit gives you everything necessary to build ten Blood Warriors. You’ll get some impressive customisation options - each can be armed with either a Goreaxe and Gorefist or two Goreaxes. One model can be built as Chaos Champion with a special, even more intimidating axe; this really is a kit for the axe-inclined among you! One model can be upgraded with a special weapon, the Goreglaive, and one can be built as an Icon Bearer. Includes ten Citadel 32mm Round Bases.
