  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120201038_BlaobRotSpawn01.jpg
  description: |-
    From afar, the chaos sorcerer Bloab Rotspawned appears to be constantly surrounded by swarms of unnatural insects. Only his fellow warriors in the Icehorn tribe know that Bloab is in fact the swarm, and the swarm is Bloab.

    This seventy-three piece plastic kit makes one Bloab Rotspawned riding the pox maggoth, Bilespurter. Clad in corroded Chaos armour and armed with a great weapon, Bloab’s status as living vessel of Father Nurgle is depicted in every part of the miniature. His face is bloated and swollen by fat, wriggling maggots and daemonflies billow about him like a cloak. Includes one Citadel 100mm Round Base.

    Rules for Bloab Rotspawned can be found in the Warriors of Chaos Warscroll Compendium - alternatively this kit can be assembled as Orghott Daemonspew or Morbidex Twiceborn.
