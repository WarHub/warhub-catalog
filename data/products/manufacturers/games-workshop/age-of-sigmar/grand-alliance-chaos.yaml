  productCode: prod2990343-99120201151
  priceGbp: 118
  url: https://www.warhammer.com/en-GB/shop/Archaon-Exalted
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120201045_ArchaonEverchosen01.jpg
  description: |-
    Spoken of in fearful whispers by warlords and kings, Archaon is the shadow of Chaos falling upon the Mortal Realms. Greatest of the Dark Gods’ champions, the Exalted Grand Marshal of the Apocalypse, he is the Everchosen - the doom of all. Uniting the armies of Chaos with his fist of iron, wielding the legendary daemon sword known as the Slayer of Kings and mounted upon the terrifying, three-headed beast Dorghar, he rides out to meet the forces of Order and tighten the grip of Chaos. The Three-Eyed King, the World Razor, the Thirsting Predator – Archaon will see to the end of Sigmar, and unmake the Mortal Realms in his own terrible, howling glory.

    This multipart plastic kit builds Archaon, the Everchosen – the ultimate champion of Chaos, absolutely staggering in size and power. He is adorned with countless dark gifts of Chaos, clad in the horned Crown of Domination and the Armour of Morkar, inscribed with runes of warding and malice. His rune-shield displays the symbols of the Dark Gods, and he clutches the burning sword U'zuhl, Slayer of Kings. His vast mount, Dorghar, boasts countless horrific mutations granted by consuming daemons and the souls of Archaon’s bested foes – huge wings, three daemonic heads, and a hide studded by the remains of unfortunate Stormcast Eternals whose souls remain trapped within.

    This kit comprises 85 plastic components, and is supplied with a Citadel 160mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
