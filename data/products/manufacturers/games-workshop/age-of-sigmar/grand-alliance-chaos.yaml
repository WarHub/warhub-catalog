  url: https://www.warhammer.com/en-GB/shop/helsmiths-of-hashut-bull-centaurs-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120211007_HelsmithsofHashutBullCentaurs01.jpg
  description: |-
    Bull Centaurs are mutants believed to be blessed by Hashut. They are reared as living demigods, their every whim indulged in exchange for fanatical loyalty to the Father of Darkness’s cult. Most Bull Centaurs are organised into stampeding herds, given the holy task of breaking the foe’s battleline to demonstrate their inferiority. Snarling and roaring, they gallop across the field while utterly convinced of their might, crashing clean through formations with maces and mauls swinging.

    This multipart plastic kit builds three Bull Centaurs, powerful line-breakers for your Helsmiths of Hashut armies in games of Warhammer Age of Sigmar. Powerfully muscled, with hooves and horns, they are especially deadly as they charge into combat, pulping their enemies with blows from their brazen mauls. These imposing miniatures encapsulate everything brutal and intimidating about the Helsmiths of Hashut, making them a key unit in any collection and a great place to showcase your painting skills. The kit includes four sets of interchangeable horns and parts to build an optional unit champion.

    These miniatures can alternatively be built as Anointed Sentinels, elite melee guardians and warriors chosen from the most zealous of the Bull Centaur herds.

    This kit is supplied with one Helsmiths of Hashut Transfer Sheet, containing 450 high-quality waterslide transfers. These include symbols for the Ur-Zorn, Muspelzharr, Zharr Vyxa, and The Forge Anathema ziggurats, along with other cursed sigils and runes to decorate your miniatures.

    This kit comprises 74 plastic components and 3x Citadel 75mm by 42mm Oval Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
