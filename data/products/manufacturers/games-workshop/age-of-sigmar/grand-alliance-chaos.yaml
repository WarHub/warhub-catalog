    – 1x Nephrite Priestess
    – 1x Obelisk Bearer
    – 1x Idolarc
    – 3x Desecrators, each armed with iconoclast warpicks or statue-smasher hammers
    – 4x Defacers, each armed with antithete bows or stonecutter tools

    The Priestess has a choice of two heads, and two sets of arms – one holding a recently removed heart aloft. There are also additional tools and daggers to further customise your statue-hating cultists.

    This kit comprises 83 plastic components, 5x Citadel 32mm Round Bases, and 5x Citadel 28.5mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
