  description: |-
    The Acolyte Globadiers of the Clans Skryre are a step above the thrall-rats that toil on the production lines or serve as fodder for weapons testing. They are tinkers, miners, and munitionists, who constantly scheme in hopes of attaining the status of Warlock – a fact which sees their masters hurl them into battle carrying fragile spheres of volatile toxic gas, the better to thin out any future rivals.

    This multipart plastic kit builds five Acolyte Globadiers, noxious gas-wielding infantry of the Clans Skryre. Each Globadier carries a payload of poisoned wind globes, ready to shatter and unleash a toxic cloud of death, alongside a rusty knife for foes who get too close. The kit includes five different masked heads, robed bodies, and pressurised back-tanks, which can all be used in any combination to create loads of variety amongst your Skryre skirmishers. You'll also find an extra crested head and a more impressive knife, which can be used to build a champion from one of your Acolytes.

    This kit contains 45 plastic components, and 5x Citadel 28.5mm Round Bases. These miniatures are supplied unassembled and unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
