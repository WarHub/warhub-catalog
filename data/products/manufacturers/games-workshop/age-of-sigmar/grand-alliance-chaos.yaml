  url: https://www.warhammer.com/en-GB/shop/Beast-Of-Nurgle-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99129915044_BeastofNurgle01.jpg
  description: |-
    Beasts of Nurgle heave themselves into battle filled with dim-witted ebullience at odds with their diseased and nightmarish forms. They are drawn instinctively to mortal playthings, whose desperate cries and frantic flight they mistake for participation, at least until their luckless new friends have twitched their last.

    This multipart plastic kit builds one Beast of Nurgle, a bloated slug-like creature for your Death Guard or Chaos Daemons armies in games of Warhammer 40,000, or your Maggotkin of Nurgle armies in games of Warhammer Age of Sigmar. Slithering across the battlefield at alarming speed, they're great at holding up key enemy units with their crushing mass, chomping mouths, and strangling tentacles.

    This kit includes three options for the belly of the beast – one with a toothed maw, one with deep cuts, and one with a large gaping wound showing a variety of internal organs. There are two sets of hands – one is webbed, and the other is clawed. Also included are three distinct faces, two tentacle crests, and a pair of different tongues, making it easy to personalise your twisted daemon.

    This kit comprises 48 plastic components, and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
