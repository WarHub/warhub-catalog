  url: https://www.warhammer.com/en-GB/shop/darkoath-brands-oathbound-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120201178_S2DBrandsOathband01.jpg
  description: |-
    The Brands are regarded as an especially ruthless tribe of Darkoath warriors. To command such esteem demands malign strength and scant pity. Gunnar Brand and his Oathbound are champions of just such fell calibre. They seek to earn the strength offered by the Dark Gods in the traditional manner of Darkoath warlords – by swearing to complete the most gruelling and bloody-minded of deeds in their name.

    This multipart plastic kit builds Brand's Oathbound, a war-party of Darkoath champions led by Gunnar Brand himself. Gunnar carves his way to glory with dual axes, accompanied by his swift-riding daughter Singri, whose warbow picks off anyone that draws close. They are joined by the mighty Dendrel Direbrand and the ambitious Warqueen Tanari, both ferocious warriors in their own right, as well as the zealous shaman known as Broken Nadja, who wields the energies of ruin itself.

    **This set includes the following:**
    - 1x Gunnar Brand
    - 1x Singri Brand
    - 1x Warqueen Tanari
    - 1x Dendrel Direbrand
    - 1x Broken Nadja

    This kit comprises 33 plastic components, and all models are supplied with integrated bases. These push-fit miniatures can be assembled without glue, and are supplied unpainted – we recommend using Citadel Colour paints.
