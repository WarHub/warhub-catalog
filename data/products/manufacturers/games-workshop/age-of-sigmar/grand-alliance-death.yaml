  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Endless-Spells-Flesh-Eater-Courts-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207071_FECEndlessSpells01.jpg
  status: current
  description: |-
    Unleash the malignant magic of the Flesh-eater Courts with these endless spells! Each is a summoned sorcery with strange and powerful effects, usable only by your Flesh-eater Courts, or Nagash himself. Inside this set, you'll find:

    - The Cadaverous Barricade, a grisly bulwark that provides cover and slows down enemies
    - The Chalice of Ushoran, which heals your Heroes and restores nearby models to life
    - The Corpsemare Stampede, a crushing tide of undead horses which deals mortal wounds

    This set is supplied in 20 coloured plastic components, and includes 1x 50mm round base and 1x 120mm round base.
- name: Charnel Throne
  productCode: prod4140171-99120207070
  sku: 99120207070
  ean: 5011921118779
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Flesh-Eater-Courts-Charnel-Throne-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207070_CharnelThrone01.jpg
  status: current
  description: |-
    Formed from the bones of those killed by an abhorrant’s insane magic, a Charnel Throne exudes madness and necrotic energies. They are the seats of power for Archregents and Ghoul Kings, blazing beacons to mordants, and structures of abject horror for the enemies of the Flesh-eater Courts.

    The Charnel Throne is a terrain feature available to all Flesh-eater Courts armies. Costing no matched play points, it’ll inspire your own units, increasing their bravery, while reducing that of nearby foes. Abhorrant Archregents, meanwhile, can use the power of the throne to summon even more units to the battlefield.

    This set contains one Charnel Throne terrain piece, supplied in 14 plastic components.
- name: Bladegheist Revenants
  productCode: prod3930176-99120207244
  sku: 99120207244
  ean: 5011921257218
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Nighthaunt-Bladegheist-Revenants-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207125_NHBladegheistRevenantsLead.jpg
  status: current
  description: |-
    Moving like a ghostly cyclone, the creatures known as Bladegheist Revenants spin in a frenetic fashion. They are souls taken from those who met particularly tormenting ends – those sealed in spike-riddled encasements, choked beneath water or buried alive. Their last living thoughts were a frenzy of desperation, a last flurry of defiance in an attempt to break free. Thanks to Nagash’s terrible curse, that horrible ending moment has been preserved forever in the Bladegheist Revenants.

    This multi-part plastic kit contains the components necessary to assemble 10 Bladegheist Revenants. Eternally tormented spirits, they are clad in tattered cloaks which fade away into ethereal elements, appropriate to the panicked, frantic fighting style they exemplify. Each is posed swooping and jinking unpredictably; the chains that bind them to Shyish are swinging wildly about their forms. Within the cloaks, metallic face masks peer out – there are 10 of these included, each a different design, which can be modelled on any cloak assembly you desire. There are 10 tomb greatblades included, each of which is slightly different.

    This kit comes as 43 components, and is supplied with 10 32mm Round bases.
- name: Chainrasp Hordes
  productCode: prod3930175-99120207236
  sku: 99120207236
  ean: 5011921257133
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Etb-Chainrasp-Hordes-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207120_ChainraspsLead_a.jpg
  status: current
  description: |-
    The most numerous of all the spirits that join Nighthaunt processions are the Chainrasp Hordes. These gheists are created from the spirits of the most vicious and irredeemable criminals to have lived in the Mortal Realms. They are lesser spirits, held together in the afterlife by nothing other than their own never-ending spite and all-consuming madness, a negative energy which saps the will of their enemies. Chainrasps may have thought death to be an escape from terrible imprisonment but, in truth, it was merely the beginning.

    As with many Nighthaunt, the Chainrasp Hordes are little more than wisps of ethereal form willed into reality by sheer force of hatred. Each of these models is essentially a floating hooded cloak, from beneath which a twisted skull-face glares; hung variously from each models’ neck and arms is a heavy length of chain ending in an iron weight, a symbol of their deviant criminal history in life \(1 model even has his wrist bound in stocks…\) They are armed with malignant weapons – swords, axes and spiked maces – and the kit includes options for a Dreadwarden; this is the unit leader, face locked in an iron helm, carrying a large candelabra along with a set of heavy iron keys.

    This kit comes as 20 push-fit components to build 10 Chainrasps, and is supplied with 10 Citadel 25mm Round Bases. These push-fit miniatures can be assembled without glue and are supplied unpainted – we recommend using Citadel Colour paints.
- name: Lord Executioner
  productCode: prod3930171-99070207008
  sku: 99070207008
  ean: 5011921100842
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 25
  url: https://www.warhammer.com/en-GB/shop/Nighthaunt-Liekoron-The-Executioner-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99070207008_LiekoronExecutioner01.jpg
  status: current
  description: |-
    In the living world executioners are tasked with the ending of life, often by axe stroke or noose. The headsmen of the Mortal Realms who knowingly slay the innocent as well as the guilty attract the gaze of Nagash, and upon death are remade into the spectral forms of Lord Executioners. Each bears a massive decapitating axe, with which they are charged to slay heroes, champions, kings and anyone who defies the law of Nagash, all the while harangued by the spirits of the innocent souls the Executioner cut down during life – souls who ironically protect the Executioner from danger, not out of kindness, but due to their inability to escape.

    This multi-part plastic kit contains the components necessary to assemble Liekoron the Executioner, a Nighthaunt Lord-Executioner. Looming large over a ruined headstone, Liekoron is depicted as a sinister, hunched spirit, half corporeal and half ethereal, whose skull-like face is picked out beneath a ragged cowl. He holds a well-used decapitating greataxe in his right hand, notched and worn by constant use; his left hand can be modelled clutching a grave-sand filled hourglass, or alternately pointing toward his next victim. Around him whirl 3 furious spirits, the shrieking ghosts of innocents wrongly murdered by the Executioner in life, bound to him forever.

    This kit comes as 8 components, and is supplied with a Citadel 32mm Round base.
- name: Dreadblade Harrows
  productCode: prod3900201-99120207241
  sku: 99120207241
  ean: 5011921257188
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/Etb-Nighthaunt-Dreadblade-Harrows-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207122_DreadbladeHarrowsLead_a.jpg
  status: current
  description: |-
    The Dreadblade Harrows are the officers beneath the Knights of Shrouds. In life, each of these wights watched their leader’s betrayal, neither helping nor hindering. Even for Nighthaunts, Deadblade Harrows are especially discorporate, phantasmal figures who can disappear and reappear at will. They are the Knights of Regret, full of bitter recrimination, who in battle serve as bodyguards and lieutenants or are despatched as outriders. Rearing upon their spectral steeds, they vanish into wisps of mist only to gallop out of thin air elsewhere to carry out the most unchivalrous commands – culling the vulnerable, cutting off retreating warriors, and other heinous tasks.

    The Dreadblade Harrows are a pair of mounted spectral knights, seemingly a touch more solid than many of their Nighthaunt brethren, but no less sinister. Each is armed with a dreadblade held aloft in their right hand, with their left hands clutching the reins – one set spiked, one set ornate – of their steed. Not much else is visible of the Harrows themselves, with a helmeted skull peering out from beneath their cloak. Their mount is large and muscular; its ethereal skin is torn and tattered, making its ribcage visible, with its head being no more than a skull. The rear of the steed is depicted as tailing off into ethereal vapour, as the Harrow emerges from nothing to attack.

    This kit comes as 12 push-fit components to build two Dreadblade Harrows, and is supplied with 2 textured 60mm oval bases – these feature the graveyard detritus expected from the Nighthaunt. These push-fit miniatures can be assembled without glue and are supplied unpainted – we recommend using Citadel Colour paints.
- name: Kurdoss Valentian, The Craven King
  productCode: prod3900200-99120207239
  sku: 99120207239
  ean: 5011921257157
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Kurdoss-Valentian-The-Craven-King-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207121_NHKurdossValentianTheCravenKingLead.jpg
  status: current
  description: |-
    In life, Kurdoss Valentian had a ruthless desire to rule, and many were his wicked deeds to secure power. Nagash ensured that his ultimate dream was secured in name only, however, making him little more than a strongman fated to always follow the lead of Lady Olynder. The dire presence of Kurdoss Valentian is announced by dirgeful trumpets and grim proclamations of his basest deeds. The Craven King sits silent and motionless upon his drifting throne until he closes with the enemy, and then he wields the Sepulchral Sceptre to deadly effect, mercilessly slaying all whom his queen bids.

    This multi-part plastic kit contains the components necessary to assemble Kurdoss Valentian, the Craven King. Seated silent and unmoving on his cracked, crumbling throne, Kurdoss is a hunched, slumped figure who nonetheless exudes an aura of pure menace, with his sinister, 3-pointed crown entirely enclosing his face in a skull-like mask. One hand clutches the arm of his throne, while the other holds the Sepulchral Sceptre – far from an ornate, bejeweled ceremonial staff, this is a solid weapon designed to crack open the skulls of those who rouse Kurdoss’ fury. Flanking him on either side are his accompanying Wraith Heralds, who are bound to him eternally – one as a banner-bearer, the other carrying a trumpet. The twisted forms of tormented souls rise high above Kurdoss, and the whole miniature is borne aloft on a swirling column of ethereal energy which attaches to the base.

    This kit comes as 19 components, and is supplied with a Citadel 60mm Round base.
- name: Reikenor the Grimhailer
  productCode: prod3900198-99120207233
  sku: 99120207233
  ean: 5011921257102
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29
  url: https://www.warhammer.com/en-GB/shop/Etb-Nighthaunt-Reikenor-The-Grimhailer-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207119_ReikenorGrimhailerLead.jpg
  status: current
  description: |-
    Once a sorcerer-king rich in the knowledge of amethyst magic, Reikenor ran afoul of Nagash. Now, in undeath, the Grimhailer is cursed to serve the Great Necromancer, acting as his chief reaper of souls. There are few sights more ominous than the macabre wraith-wizard atop his winged steed, lit by the eerie light of his corpse candles. Through his incantations, Reikenor can summon a wraithstorm – a cyclone of amethyst magic that stirs those souls recently separated from their bodies. His spell incites them to savagely attack their former comrades, a hurricane that hacks and pulls down the living; thus is a dark vengeance delivered to those who would thwart Nagash.

    Reikenor the Grimhailer is an impressively aggressive-looking and sinister Nighthaunt miniature. His ethereal form is clad in a tattered cloak, beneath which is visible a skeletal mask, and thin arms grasping his weapon – a great scythe known as Fellreaper, which features a grave-sand filled hourglass hanging from a chain – and the reins of his mount, a winged Nightmare named Kyallaron. This steed is magnificent, despite its necrotic status – large, tattered wings sprout from its back, and on the whole it has the appearance of impressively muscular power, even with its ribs visible and its legs being nothing more than bone. Its armoured helm is covered in dripping corpse candles, as is Reikenor’s, and the whole miniature is depicted swooping low over a graveyard scene, a sinister winged skeleton statue providing the support.

    This kit comes as 11 components to build Rekenor the Grimhailer, and is supplied with a Citadel 75mm Oval scenic base. This push-fit miniature can be assembled without glue and is supplied unpainted – we recommend using Citadel Colour paints.
- name: Grimghast Reapers
  productCode: prod3880198-99120207243
  sku: 99120207243
  ean: 5011921257201
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Nighthaunt-Grimghast-Reapers-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207124_NHGrimghastReapersLead.jpg
  status: current
  description: |-
    In life, those who were to become Grimghast Reapers were careful and meticulous killers. In death, they never cease in their long, sweeping strokes that mercilessly cut the enemy down a rank at a time, and they never tire. Like clockwork, they endlessly repeat their deadly shearing strikes. The grim spectres move quickly, hovering down to attack, doing so with jarring motions antithetical to the graceful movements of the living. They seem to start and stop, travelling in convulsive bursts; but they are fast for all that.

    This multi-part plastic kit contains the components necessary to build 10 Grimghast Reapers. These indiscriminate spectral killers are notable for consisting of little more than a heavy robe atop a wisp-like ethereal form. Their tortured faces are wrapped in a scrap of sanctified shroud, which prevents them from vision – either physical or witch-sight – a curse which keeps them in a white-hot fury. Each carries a slasher scythe, which they are posed sweeping in a lunging motion; you have the option to build 1 miniature as an Extoller of Shyish, the unit leader. The Extoller of Shyish carries a death knell – a great bell whose tolling strikes to honour the Supreme Lord of the Undead. 2 death knells are included. Each miniature is attached to its base via a gravestone from which its form exudes; an appropriately macabre detail.

    This kit comes as 32 components, and is supplied with 10 Citadel 32mm Round bases.
- name: Lady Olynder, Mortarch of Grief
  productCode: prod3880197-99120207242
  sku: 99120207242
  ean: 5011921257195
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Nighthaunt-Lady-Olynder-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207123_NHLadyOlynderMortarchofGriefLead.jpg
  status: current
  description: |-
    She is the Mourning Bride, the Unrequited Queen, the Veiled Lady and the Mortarch of Grief. She is despair made manifest, gloom given form. She is Lady Olynder, and in her are bound all the sorrows and anguishes of the realms. Her power transcends the melancholic, for she exudes mind-crippling waves of pure desolation. Mortals in her presence are overwhelmed by a gloom so heavy that only the strongest willed can stay upright. Most fall to their knees, mentally battered by their own utter hopelessness. It is a sorrow potent enough to cause a mother to forsake her child, a warrior to lay down his sword and accept the inevitable, to stop a beating heart.

    This multi-part plastic kit contains the components necessary to assemble Lady Olynder, Mortarch of Grief. As the Mortarch of Grief, she is surrounded by an aura of absolute misery – this miniature does an impressive job of capturing the bleakness. Hovering above the ground in her ghastly bridal dress and veil, little can actually be seen of her form other than the outline of a skull. Her bridal train, ruined and shredded, flows out behind her, with a wisp of this ethereal garment attaching the miniature to its base. Thorny vines of grave-roses, which sprout wherever she floats, wrap themselves around her waist and up to her headdress, which itself resembles a thorned briar. In her right hand she wields the Staff of Midnight, an ornate stave topped with a polished gemstone of vitrified grave-sand. She is accompanied by 2 macabre Banshee Handmaidens, horrifying skull-faced spectres. Each carries a gift – an ensorcelled grave-sand hourglass given by Nagash himself which can be smashed asunder with lethal effect, and a sealed casket, the contents of which are a mystery; hardly likely to be anything at all positive...

    This model comes as 23 components, and is supplied with a Citadel 60mm Round base.
- name: Spirit Torment and Chainghasts
  productCode: prod3880196-99120207060
  sku: 99120207060
  ean: 5011921100828
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29
  url: https://www.warhammer.com/en-GB/shop/Crawlocke-The-Jailor-And-Chainghasts-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207060_CrawlocketheJailor01.jpg
  status: current
  description: |-
    Spirit Torments such as Crawlocke are entrusted with a duty Nagash considers vitally important – it is their role to capture the souls of transgressors, those who have escaped their due fate. A Spirit Torment draws its victim’s soul into its shacklegheist chains, heavy bonds forged of malefic iron and tempered by fell ritual. The accompanying Chainghasts are such eternally-imprisoned victims, bound to automatically obey every command of their Spirit Torment master, doomed to an inexplicable but impossible yearning for freedom.

    This multi-part plastic kit contains the components necessary to assemble Crawlocke the Jailor – a Spirit Torment – and 2 accompanying Chainghasts. Crawlocke himself is little more than an ethereal wisp, with emaciated arms reaching from under a shroud – featuring the tormented faces of the damned – to grasp his large, ensorcelled padlock and set of heavy keys, which are used to belabour the living. There are 3 choices of grim face mask for the Spirit Torment, and his ethereal form is trapped within a confining gibbet cage, from which a grave-sand filled hourglass dangles. The accompanying Chainghasts each carry a pair of Ghastflails, with robes covering their forms. There are 4 different masks available for the Chainghasts, each entirely closed and sinister, and there are included 8 pieces of scenery detritus – sections of gibbet, broken locks and metal – with which to decorate the bases.

    This kit comes as 30 components, and is supplied with 2 Citadel 32mm Round bases and a Citadel 40mm Round base.
- name: Hexwraiths
  productCode: prod3880195-99120207054
  sku: 99120207054
  ean: 5011921098927
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 30
  url: https://www.warhammer.com/en-GB/shop/Nighthaunt-Hexwraiths-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207045_Hexwraiths01.jpg
  status: current
  description: |-
    Hexwraiths were once knights. Now these proud and cruel ethereal killers are bound by Nagash to rise eternally, visiting pain and death upon the living in his name. Upon ghostly steeds, they ride straight through their foes, turning blood to ice and snatching souls from screaming warriors.

    This multipart plastic kit builds five Hexwraiths, spectral cavalry for your Nighthaunt armies in games of Warhammer Age of Sigmar. These cursed cavaliers are relentless hunters, able to use their speed to run down any quarry before reaping a terrible bounty with their spectral scythes. The horses' heads and riders' legs are interchangeable across the miniatures, and select riders' heads are interchangeable across some riders' bodies, allowing you to customise your incorporeal warriors.

    You can also alternatively build five Barrow Knights. [This unit is also available in an updated kit here](https://www.warhammer.com/shop/soulblight-gravelords-barrow-knights-2025).

    This kit comprises 91 plastic components, and 5x Citadel 60mm by 35mm Oval Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: 'Endless Spells: Nighthaunt'
  productCode: prod3880194-99120207053
  sku: 99120207053
  ean: 5011921098620
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Battlemagic-Nighthaunt-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207053_NHEndlessSpellsUpdateLead.jpg
  status: current
  description: |-
    The cataclysmic necroquake of Shyish has flooded the Mortal Realms with the powers of the aether. Incantations summon forth new conjurations of unprecedented power and frightful sentience, but beware – such endless spells can be treacherous, as likely to turn upon their caster as they are to devastate the enemy. From unleashing disembodied gnashing jaws to devour your foes, to raising prismatic barricades to protect your flanks, doing battle in the time of the Arcanum Optimar is unlike anything that has come before.

    This multi-part plastic kit contains the components necessary to assemble 3 Endless Spells usable by Nighthaunt wizards in games of Warhammer Age of Sigmar. Included:

    - A Shyish Reaper: the ultimate manifestation of finality and death, this is an enormous scythe which swings through the air tearing away mortal souls, sending them screaming into the underworlds;
    - A Vault of Souls: this chest siphons away souls – 5 of which are visible as skulls, protruding from the Vault itself – eventually bursting under the pressure, sending forth a lethal explosion that strikes all nearby;
    - A Mortalis Terminexus: an hourglass of fate, standing on a column of ethereal energy, which can interfere with the passage of time. This can restore youth and vitality – or wither and age, in the merest blink of an eye.

    This kit comes as 16 components supplied on gold-coloured plastic, and includes 2 Citadel 50mm Round bases and a Citadel 100mm Oval base. Warscrolls are found in Battletome: Nighthaunt.
- name: Myrmourn Banshees
  productCode: prod3850177-99120207230
  sku: 99120207230
  ean: 5011921257072
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 13.5
  url: https://www.warhammer.com/en-GB/shop/Etb-Nighthaunt-Myrmourn-Banshees-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207117_MYRBansheesLead.jpg
  status: current
  description: |-
    The Myrmourn banshees have a diabolical hunger, for they feast solely upon magic. No enemy spell is safe from the ravenous spirits, and they haunt the Mortal Realms in search of arcane energies to consume. Myrmourn Banshees are drawn to magic as carrion are drawn to the dead, and such is their bitterness toward life that any mortal creature in their way is likely to receive a swift jab from their cursed chill daggers.

    Sinister and shrieking, the Myrmourn banshees are a set of 4 Nighthaunt miniatures with a sense of despair about them – little more than empty bodices surrounded by ethereal vapour, shrouds covering skulls trapped in a screaming rictus, they drift and swoop weightlessly clutching their chill daggers. Each is hollow – this can be clearly seen, with the inside of each miniature visible.

    This kit comes as 16 components to build four Mymourn Banshees, and is supplied with 4 32mm sculpted round bases – these depict a sepulchral scene, with bones, broken statues and roses littering the graveyard the Banshees drift above. These push-fit miniatures can be assembled without glue and are supplied unpainted – we recommend using Citadel Colour paints.
- name: Morghast Harbingers
  productCode: prod3710223-99120207048
  sku: 99120207048
  ean: 5011921094912
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/Morghast-Harbingers-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207028_DeathLordsMarghastsHarbingers01.jpg
  status: current
  description: |-
    Once they were known as hammurai, the winged heralds of Ptra, God of light, who were sent to destroy the Great Necromancer. When they failed, Nagash took their ruined corpses and created a host of sentient vassals to lead his armies. Thus the Morghasts were born.

    This multi-part plastic kit can be assembled as two Morghast Harbingers. Possessed with the might of demigods, they wield spirit swords – fashioned long ago on Ptra’s solar forge – that blaze with the energies of the slain, the souls trapped within driven to drag others to share their fate.

    This kit can also be assembled as Morghast Archai.

    Includes two Citadel 60mm Round bases.
- name: Morghast Archai
  productCode: prod3710212-99120207048
  sku: 99120207048
  ean: 5011921094912
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/Morghast-Archai-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207028_DeathLordsMarghastsArchai01.jpg
  status: current
  description: |-
    The Archai are Nagash’s elite guard and the greatest of the Morghast. Only Nagash’s closest lieutenants can command them and only the mightiest heroes of the mortal race have the power to defeat them.

    This multi-part plastic kit can be assembled as two Morghast Archai. They are clad in ebon-wrought armour which channels the magic of the world into their accursed forms. Possessed with the might of demigods, they wield spirit halberds that blaze with the energies of the slain, the souls trapped within driven to drag others to share their fate.

    This kit can also be assembled as Morghast Harbingers.

    Includes two Citadel 60mm Round bases.
- name: Wight King
  productCode: prod3690252-99120207207
  sku: 99120207207
  ean: 5011921254644
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 12.75
  url: https://www.warhammer.com/en-GB/shop/Deathrattle-Wight-King-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207207_SoulblightGravelordsWightKingUPDATE1.jpg
  status: current
  description: |-
    Wight Kings are deathless tyrants, ruling over barrow empires populated entirely by skeletal thralls. They exist only to dominate others, having long ago sacrificed emotion and passion on the altar of their obsessive lust for triumph. In battle, few can withstand their relentless assault.

    This multipart plastic kit builds one Wight King, a skeletal leader for your Soulblight Gravelords armies in games of Warhammer Age of Sigmar. Heavily armoured and wielding a baleful tomb blade, they can hold their own in combat while inspiring their fellow Deathrattle warriors to even greater feats.

    This kit comprises 5 plastic components, and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Abhorrant Ghoul King on Royal Zombie Dragon
  productCode: prod3150264-99120207035
  sku: 99120207035
  ean: 5011921070411
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 47
  url: https://www.warhammer.com/en-GB/shop/Abhorrant-Ghoul-King-on-Zombie-Dragon-2016
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120207035_FleshEatersKingonDragon01.jpg
  status: current
  description: |-
