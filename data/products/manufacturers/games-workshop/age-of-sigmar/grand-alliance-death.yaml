    Vokmortian’s task is to ensure that the bone-tithe is met by all of Nagash’s vassals – willingly or otherwise. To this end, he roams the Mortal Realms with dispassionate diligence in pursuit of those in debt to the Ossiarch Empire, sending a chill through those who spy him outside their city gates.

    This box builds the Heralds of the Bone-tithe – a Regiment of Renown for your Flesh-eater Courts, Nighthaunt, and Soulblight Gravelords armies in games of Warhammer Age of Sigmar. The individual units can also be used in your Ossiarch Bonereapers army, and you'll save money compared to buying the kits individually. The force is led by Vokmortian, Master of the Bone-tithe. He is protected by a unit of Immortis Guard, elite bodyguards with massive shields and halberds. The rest of the force is composed of Mortek Guard, stalwart line troops excellent at taking and holding objectives. Add a tough and hard-hitting contingent to give your armies a boost.

    **This boxed set builds 14 multipart plastic Ossiarch Bonereapers miniatures:**
    – 1x Vokmortian, Master of the Bone-tithe
    – 3x Immortis Guard \(which can alternatively be built as Necropolis Stalkers\)
    – 10x Mortek Guard

    The miniatures in this box are easy to customise. The Immortis Guard have three chest plates that are interchangeable across the miniatures. They can alternatively be built as Necropolis Stalkers, multi-armed duellists wielding massive swords.

    The Mortek Guard include parts to build an optional champion with a choice of two heads and either a double-handed sword, or a sword and shield. There are also parts to assemble an optional standard bearer with a choice of two heads and two banner toppers. Each of the Mortek Guard can be armed with a nadirite sword or spear, and the heads, shields, and weapons are interchangeable across the unit.

