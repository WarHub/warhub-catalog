  description: |-
    A mass of corded muscle and thick, scaled hide, covered in an intimidating latticework of scars new and ancient, the Saurus Oldbloods are mighty war leaders of the seraphon. Striding into battle with furious intent, they are as proud reptilian gods, scattering the cowering foe and rending almost indiscriminately with tooth and claw. Such is the aura of their command that the seraphon under their lead need not be told what to do, or guess at their master's orders - their instincts react to the will of an Oldblood, and thus does his disciplined fury spread across the battlefield as a wave of untamed savagery.

    This multi-part plastic kit contains one Saurus Oldblood - a finely detailed kit that comes in eight components including a fully detailed 25mm square base.
