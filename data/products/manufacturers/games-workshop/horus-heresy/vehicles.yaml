  status: current
  description: |-
    Malcador Heavy Tanks are mighty armoured vehicles, based on ancient designs dating back to the Age of Strife on Terra itself. These imposing battle tanks are larger and heavier than the Leman Russ, but boast a truly formidable battle speed for their size thanks to highly sophisticated – if somewhat temperamental – drive systems. Operating with the support of Solar Auxilia infantry sections and more flexible armoured assets, a Malcador Heavy Tank can unleash a terrifying fusillade of frontal firepower.

    This multipart plastic kit builds one Malcador Heavy Tank, an imposing Solar Auxilia armoured vehicle. The tank can be armed with one of three turret weapons – a battlecannon, twin heavy lascannons, or a long-barrelled Vanquisher battlecannon. It also sports a hull-mounted gun and a pair of sponson weapons – the kit provides two heavy bolters, lascannons, autocannons, multi-lasers, and heavy flamers which can be used on any mount, plus a demolisher cannon exclusively for the hull. The turret and weapon mounts feature glueless assembly, allowing you to adjust their positions mid-game.

    The kit includes components to upgrade your Malcador Heavy Tank with a hunter-killer missile, flare shield, and dozer blade. The turret hatch can be built with closed doors, or opened for a Solar Auxilia gunner with a pintle-mounted weapon – a heavy flamer, multi-laser, or heavy stubber. You'll also find plenty of cosmetic options, such as sigils, armour patches, a spotter, and a choice of crew heads.

    This kit comprises 170 plastic components, as well as a Solar Auxilia Vehicle Transfer Sheet containing 180 high-quality waterslide transfers. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
