  description: |-
    Heavily armed and impressively armoured, the Leviathan Siege Dreadnought is a powerful siege and hunter-killer engine that can crush any opposition. Yet such overwhelming strength comes at a cost – a Leviathan's systems place a lethal strain upon its occupant, the entombed incumbent burning brightly but only briefly. The ranks of the Dark Angels boast some of the most venerable warriors and fearsome weaponry in the galaxy, a legacy of the secretive honours they earned on Terra itself. When both are combined in a Dreadnought, the result is a warrior-machine without peer, fielded by the Ironwing in overwhelming onslaughts of firepower and mechanical strength.

    This multipart resin kit builds a Leviathan Siege Dreadnought for your Dark Angels armies in games of Warhammer: The Horus Heresy. This looming, detailed walker is designed to perfectly suit the sons of the Lion, featuring the iconography and numerals of the I Legion alongside decorations such as sculpted leonine heraldry and an armoured hood. The Dreadnought's torso houses a pair of additional weapons – your choice of heavy flamers or twin volkite calivers – and it can also be armed with an optional hull-mounted phosphex discharger. This miniature's joints can be assembled to produce a range of poses, and it comes with two pairs of feet – one straight, one bent – allowing you to build it as though standing or striding forward.

    This kit does not include weapon arms. It is compatible with the Leviathan Siege Claw, Leviathan Storm Cannon, Leviathan Cyclonic Melta Lance, Leviathan Siege Drill, and Leviathan Grav-Flux Bombard kits, each available separately.

    This kit comprises 27 resin components and 1x Citadel 80mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
