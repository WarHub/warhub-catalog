  description: |-
    The Rhino is the most widely used armoured personnel carrier in the Imperium. Based on ancient STC technology, the fundamental design is robust, reliable, and easy to maintain, with an adaptive power plant that can run off a wide variety of fuels, making it perfect for the wide-ranging armies of the Great Crusade – and the wars of the Horus Heresy. As such, the Rhino chassis serves as a basis for many other war machines, and these transports are produced in their thousands – several distinct patterns are in common use throughout the galaxy, with the heavily-armed Deimos being the most widespread amongst the Space Marine Legions.

    This multipart plastic kit builds one Legion Rhino Transport, in the distinctive Deimos pattern. This efficient transport vehicle has the capacity to carry a 10-man squad of Legionaries across the battlefields of the 31st Millennium, with room for characters to join the unit. Protected from enemy fire by thick armour plating and its defensive smoke launchers, the Legion Rhino Transport is armed with two pintle-mounted bolters, and can be further customised with a range of weapons and utility gear. This kit includes the components to add a pintle-mounted havoc launcher, heavy bolter, heavy flamer, multi-melta, or a combi-weapon with five configurations (bolter, flamer, melta, plasma, or volkite), as well as a searchlight, a dozer blade, and a hunter-killer missile. It also offers a number of cosmetic options, such as towing hooks and a choice of a Space Marine gunner, spotter, or closed hatch.

    This miniature has no Legion markings, allowing Warhammer hobbyists to paint it in whichever colours they choose.

    This kit comprises 102 plastic components and 1x Legiones Astartes Vehicle Transfer Sheet with 44 optional markings and iconography for the Sons of Horus and Imperial Fists Legions. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Krios Battle Tank/Venator
  productCode: P-211394-99123016009
  sku: 99123016009
  ean: 5011921222575
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
