    The Armiger Knight is a lighter, more agile cousin to the Questoris Knight, piloted by warriors from outside of the noble Houses, such as retainers and peons who have shown great valour in the service of a Questoris House. They excel at picking off threats from enemies beneath the notice of the larger Knights, such as swarming throngs of infantry attempting to breach the protective barriers of their ion shields, or lesser war machines who dare to aim their guns at a noble scion. Armiger Helverins are armed with paired autocannons, suited to laying down blistering hails of protective firepower.

    This multipart plastic kit builds two Armiger Helverins, fast-moving knights that are designed to stalk the battlefield and pick off elite infantry and light vehicles. Each Armiger is armed with two Phaeton autocannons, as well as your choice of a carapace-mounted heavy stubber or meltagun. You can build these models in a variety of poses, and customise them with a choice of six unique faceplates to help set them apart. This kit can alternatively be built as two Armiger Warglaives.

