  status: current
  description: |-
    Javelin attack speeders are both rare and highly valued, utilising a range of antigrav impellor technologies so esoteric that some amongst the Mechanicum regard them with overt distrust. Regardless of their technical complexity, these hovering vehicles are fast, highly manoeuvrable, have an extended operational range and – perhaps most importantly – can carry a heavy payload of weapon systems, qualities which keep them in high demand throughout the Legiones Astartes.

    This multipart resin and plastic kit builds one Javelin, a powerful attack speeder for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. The Javelin is propelled by its powerful rear-facing thrusters, guided by the sensor spine on its undercarriage, and is crewed by two Space Marines – one pilot, and one gunner firing a mounted heavy bolter. The Javelin's crew, hull, and sponson-mounted cyclone missile launcher are all resin – and also comes with a variety of plastic sponson weapons, allowing you to replace the cyclone missile launcher with a pair of heavy bolters, lascannon, or volkite culverins. The sponsons can be assembled without glue, allowing you to adjust their positioning mid-battle.

    This kit comprises 36 resin components, 44 plastic components, 1x Citadel 60mm Round Base, and 1x Citadel Flying Stand. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
