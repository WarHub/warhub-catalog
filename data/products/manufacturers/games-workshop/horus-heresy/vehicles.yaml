  description: |-
    The Thousand Sons Legion acknowledge the usefulness of the unliving might of battle-automata as obedient, resilient, and ultimately expendable shock assault units. As with every other facet of warfare, the use of such battle-automata is something the Legion believes they can improve upon with their psychic arts. The Castellax-Achea is governed by a psi-sensitive crystal matrix – an illegal innovation which allows the Legion's psykers to directly manipulate these robots like murderous puppets with a degree of limited self-will.

    This multipart resin kit builds one Castellax-Achea Automata, armed with an Æther-fire cannon, for your Thousand Sons armies in games of Warhammer: The Horus Heresy. This elegant battle-automata is covered in the iconography of the Thousand Sons, such as sculpted flames and scarabs, as well as mechanical details including exposed cabling, hydraulic pistons, and the psi-sensitive crystal that serves as the robot's brain. It also boasts an impressive degree of posability, with a great range of motion in the legs, waist, and arms, as well as sharpened Achea force claws which can be modelled closed or open and include two in-built bolters. The automaton's primary weapon, its shoulder-mounted Æther-fire cannon, is connected to its power pack by thick industrial wires.

    This kit comprises 29 resin components and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
