- name: Javelin Land Speeder
  productCode: prod5090231-99863001708
  sku: 99863001708
  productType: vehicle
  priceGbp: 82
  url: https://www.warhammer.com/en-GB/shop/legiones-astartes-javelin-land-speeder-2023
