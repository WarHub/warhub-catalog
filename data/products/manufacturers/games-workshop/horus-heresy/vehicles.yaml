    The Malcador Infernus is, in effect, a huge flamer on tracks, with a fuel trailer towed behind it. They are generally deployed to lead advances against enemy forces occupying especially dense terrain, such as trench lines, city ruins, or heavily forested areas.

    This multipart plastic kit builds the Malcador Infernus, an infantry-roasting heavy tank for your Solar Auxilia armies in games of Warhammer: The Horus Heresy. This kit includes options to customise your tank, including auxiliary weapons and support systems. Two side sponsons can mount heavy bolters, lascannons, autocannons, multi-lasers, or heavy flamers. You'll also find a flare shield, hunter-killer missile, dozer blade, and other optional accessories. The top hatch can be built closed, or with a crew-member, and can also sport a pintle-mounted heavy flamer, multi-laser, or heavy stubber.

