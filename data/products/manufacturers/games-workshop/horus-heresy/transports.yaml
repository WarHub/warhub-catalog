  description: |-
    The Arvus Lighter is a utility shuttle used by the Imperialis Armada for transferring supplies or small groups of personnel. It's a workhorse, used to insert infantry sections and command units into a war zone with pinpoint accuracy.

    This multipart plastic kit builds an Arvus Lighter, a utility vehicle that can ferry small units for your Solar Auxilia army in games of Warhammer: The Horus Heresy. This kit includes several customisation options including an optional rear door gunner with multi-laser, as well as full interior detail. The "little pig" just might win you a battle by getting elite troops or command sections to the right place at the right time.

    This kit contains 105 plastic components, plus 5 clear plastic canopy components, 1x Citadel 120mm by 92mm Oval Base, and 1x 115mm Ball Socket Flight Stand. This set also includes 1x Age of Darkness Divisio Aeronautica Transfer Sheet containing 149x high-quality waterslide transfers to customise your model.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
