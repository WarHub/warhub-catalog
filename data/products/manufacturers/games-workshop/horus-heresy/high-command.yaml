  description: |-
    Praetors are the mightiest warriors and battle-leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. Those who favour Tartaros Terminator armour enjoy an impregnable defence with no loss of mobility, allowing them to lead from the front and claim victory no matter the battlefield. This holds true in the XVII Legion, for the sons of Lorgar are led by zealous commanders who inspire whole armies with their diabolical fervour.

    This multipart resin kit builds one Legion Tartaros Praetor, a heavily armoured commander for the Word Bearers Legion. Armed with a tainted power maul wreathed in flames, and a combi-melta slung around his shoulder, this warrior's Tartaros Terminator armour is etched all over with Colchisian runes, and sports a huge number of other ritualistic details – from the fiery piping on his armour to the brazier-like iron halo and shoulder-mounted candles, as well as a daemonic face on his belt-buckle and the Book of Lorgar strapped to his pauldron. The kit includes a choice of two different heads – a bare head with a rebreather and ritual scars, and a daemonic helmet.

    This kit comprises 19 resin components and is supplied with a Citadel 40mm Round Base. This miniature is supplied unpainted and requires assembly - we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
