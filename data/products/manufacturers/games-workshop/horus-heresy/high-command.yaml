- name: Erebus and Kor Phaeron
  productCode: prod2680559-99863002165
  sku: 99863002165
  productType: character
  priceGbp: 78
  url: https://www.warhammer.com/en-GB/shop/Erebus-and-Kor-Phaeron
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102165_HighChaplainErebusandKorPhaeron01.jpg
  status: current
  description: |-
    Erebus first counselled Lorgar that if the Emperor was not worthy of his veneration, then other, older powers were. The Primarch would have declared his new-found revelation to the entire galaxy there and then, but it was Erebus again who counselled caution, for he had his own plans. Erebus also set in motion a chain of events that led to the damnation of Horus, revealing himself as the ultimate pawn of the powers of the Warp.

    Kor Phaeron was Lorgar’s surrogate father and his tutor in the ancient ways and rites of Colchis. By the time the XVII Legion was united with its Primarch, Kor Phaeron was too old to undergo the full implantation process, but so favoured was he in the eyes of his Primarch that he received the most potent of augments possible to bestow upon a man, short of elevation to the Legiones Astartes, and was declared First Captain.

    This multipart resin kit builds Erebus and Kor Phaeron, a pair of legendary warriors for your Word Bearers armies in games of Warhammer: The Horus Heresy. Carrying his ever-burning staff, Erebus is a true harbinger of Chaos, able to unleash the powers of the pantheon he worships in battle. Kor Phaeron is armed with a pair of vicious claws that allow him to fight among the enhanced ranks of the Space Marines without being outmatched. This kit comes with a removable display base depicting a ruined battlefield, making a small diorama for both miniatures as they spread their dark oratory.

    This kit comprises 27 resin components, 1x Citadel 120mm x 92mm Oval Base, 1x Citadel 40mm Round Base, and 1x Citadel 25mm Round Base. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
