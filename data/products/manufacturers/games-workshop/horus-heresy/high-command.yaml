  description: |-
    Praetors are the mightiest warriors and battle-leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. Each is an experienced warrior and warlord who has writ for themselves a legend in blood, and carries into battle the finest wargear known to humanity. This holds true in the III Legion, for the sons of Fulgrim are led by highly-decorated perfectionists who pursue elegance and excellence above all else, demanding ever-greater achievements from those under their command.

    This multipart resin kit builds one Legion Praetor, a finely detailed commander for the Emperor's Children Legion. This proud officer is clad in Mark VI 'Corvus Armour', festooned to the point of gaudiness with honorific badges and ornate decorations. He's equipped with both a Phoenix power spear and a Phoenix rapier – elegant power weapons unique to his Legion. The model includes a choice of two different heads – a bare head with a surgically augmented sonic shrieker mouthpiece, and a beaked, bejewelled helmet with a luscious topknot.

    This kit comprises 12 resin components and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
