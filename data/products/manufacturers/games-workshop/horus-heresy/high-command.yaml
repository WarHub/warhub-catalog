  description: |-
    Calas Typhon once pursued a role in the Legion’s Librarius, but with the Primarch Mortarion harbouring a deep-rooted distrust of those who wielded the powers of the psyker, Typhon suppressed his gift and strove instead to serve as a war leader. His strength, skill and demeanour led him to high rank, culminating in his command of the warship Terminus Est and the deadly alchemical payload held within its arsenal.

    This multipart resin kit builds Calas Typhon, a legendary commander for your Death Guard armies in games of Warhammer: The Horus Heresy. Clad in modified Cataphractii pattern Terminator armour, he can wade through even the heaviest of fighting, reaping a terrible toll with his heavy bladed scythe, Lakrimae. This miniature comes with a removable display base depicting battlefield ruins, and also includes a choice of heads – one helmeted and one bare.

    This kit comprises 9 resin components, 1x Citadel 40mm Round Base, and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
