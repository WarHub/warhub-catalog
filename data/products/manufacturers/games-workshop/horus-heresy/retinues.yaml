  description: |-
    The Iron Circle was first deployed as a bodyguard for Perturabo after the Battle of Phall, where he judged his sons had failed him. Variants of the Domitar/Conqueror pattern, they were built as unyielding instruments of their creator’s will and designed for the kind of warfare their master favoured most. Initially limited to deployment by their master’s side, as the Age of Darkness went on, more were constructed and found service elsewhere in the Legion.

    This multipart resin kit builds an Iron Circle Domitar-Ferrum Class Battle-automata, a resilient construct for your Iron Warriors armies in games of Warhammer: The Horus Heresy. They are equipped with a Karceri battle shield, augmented with power fields, making these automata nigh-on unstoppable. Armed with a mighty graviton crusher, they obliterate anything they face in melee.

    This kit comprises 37 resin components and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
