  description: |-
    Made available to the Legions only in limited quantities before the outbreak of the Horus Heresy, Leviathan Pattern Siege Dreadnoughts were highly valued and recognised as savagely powerful hunter-killer units. These constructs placed an onerous and ultimately lethal strain upon their occupants, with the Leviathan's incumbent burning brightly but briefly in their second life. Many in the Mechanicum were deeply uneasy over the design, but for a legion as murderous and torturous as the Night Lords, they were not only a terrifying tool to deploy against their enemies, but also a grim tomb for those warriors who had not been devious or intelligent enough to avoid their first death.

    Leviathan dreadnoughts are hulking machines capable of bringing devastating weaponry to bear on their foe both at range and in close combat. The Night Lords version of this unit is no different, and has been sculpted to include various ornamentations associated with Konrad Curze's legion, including leering skulls, flayed flesh and the red-winged sigil synonymous with the VIII Legion.

    The Night Lords Leviathan Pattern Siege Dreadnought is a multi-part resin kit. This kit comprises 36 resin components and is supplied with 1x Citadel 80mm Round Base. It includes a choice of torso-mounted heavy flamers, volkite calivers, and an optional Phosphex discharger. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
