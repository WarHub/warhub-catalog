    Lion El'Jonson is regarded as the most pragmatic and ruthlessly efficient commander of the Great Crusade. He’s tasked with rooting out those threats which the Imperium most fears, and he undertakes this duty with peerless valour. During the Great Crusade, under his command, the remorseless Dark Angels acted not for glory and honours, but only for victory – to vanquish their foes and leave the enemies of Humanity in quiet and forgotten ruin.

