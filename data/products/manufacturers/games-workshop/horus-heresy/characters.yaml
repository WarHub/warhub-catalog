  description: |-
    Ahzek Ahriman has the unique distinction of being both the first and last Chief Librarian of the Thousand Sons, and is the most gifted mystic among their already-formidable psyker corps. A respected commander even before his Legion's reunion with its missing Primarch, Ahriman's keen intelligence and talent in warpcraft soon made him Magnus' foremost apprentice, but his greatest strength is his indefatigable will. Ultimately, this determination would see him play a pivotal role in the burning of Prospero – and walk strange and terrible paths long after the close of the Horus Heresy.

    This multipart plastic kit builds Ahzek Ahriman, Chief Librarian of the Thousand Sons. Armed with his elegant force stave, the Corvidaean Sceptre, and adorned with the occultic talismans and symbology of the XV Legion, Ahriman is a powerful psyker who takes to the field crackling with arcane energies. As master of the soothsaying Corvidae Cult, Ahriman uses his prophetic powers to guide allies on the battlefield – combined with his abilities as a field commander and close-quarters combatant, he is an ideal linchpin around which to build a Thousand Sons army for Warhammer: The Horus Heresy.

    This set comprises 6 plastic components and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
