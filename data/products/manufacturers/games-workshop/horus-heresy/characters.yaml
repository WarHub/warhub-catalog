    This multipart resin kit builds one Magistus Amon, Captain of the Ninth Fellowship for the Thousand Sons Legion. He wears the Armour of Shades, his beautifully-detailed artificer armour, which features psychically-charged Prosperan iconography and an ornate wing extending from one pauldron. Arcane tomes and scrolls are tucked into his flowing robes, which billow dramatically as he leaps into combat, suiting his dynamic pose and furious expression. One hand is outstretched to channel psychic power, while the other clutches the Reliquary of Dust – his powerful Achean-pattern force staff, which contains the psychic remains of deadly mind-parasites. This model is posed atop scattered rubble and the broken armour of a fellow Thousand Sons warrior, but can be slotted into a stunning scenic display base featuring the ruins of Prospero, making for a magnificent centrepiece to your collection.

