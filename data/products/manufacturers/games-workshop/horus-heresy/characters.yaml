  description: |-
    A veteran of the Unification Wars, Evander Garrius distinguished himself in the early years of the Great Crusade with a merciless approach to war that earned the praise of Horus himself. When Rogal Dorn was reunited with his Legion, Garrius found himself assigned to garrison duties, far from his Primarch's side – for despite his unquestioning loyalty, his casual brutality contrasted starkly with the new ideals of the VII Legion. Still determined to prove his worth, Garrius rejoiced when his Primarch called on him to retake Cthonia, vowing that he would be moved from that forsaken world only by the hand of Dorn himself.

    This multipart resin kit builds Lord Castellan Evander Garrius – the Tyrant of Cthonia, and Captain of the 456th Company for your Imperial Fists armies in games of Warhammer: The Horus Heresy. This brutal warlord is protected by his personal suit of Cataphractii Terminator armour, known as the Tyrant's Regalia, decorated by a furred cloak and many hard-earned honours. His armour incorporates the Subjugator – a brutal power gauntlet claimed from a tyrant of Old Earth – as well as Incineratus, a unique and radioactive volkite charger. He's posed atop a scenic base, stepping on the half-melted carcass of an enemy Legionary, and comes with a choice of two heads – a knightly helmet or a bare head.

