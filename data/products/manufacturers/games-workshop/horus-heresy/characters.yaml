  description: |-
    Dominion Zephon was a warrior and artist of great renown whose exemplary record was abruptly cut short by devastating injury during the Great Crusade. When the bionics rebuilding his body refused to integrate, Zephon solemnly accepted a diplomatic role in the Crusader Host on Terra, far from his Legion. There he languished in this inglorious duty until the outbreak of the Horus Heresy.

    This multipart plastic kit builds Dominion Zephon, the Bringer of Sorrows, for your Blood Angels armies in games of Warhammer: The Horus Heresy. With bionics designed by the fabled Arkhan Land, he's itching to take the fight to the Traitors. Thanks to his jump pack, paired volkite pistols, and artisan power sword, he's ready to smash through anyone who gets in his way. Featuring in several Black Library Siege of Terra novels, including Saturnine and Echoes of Eternity, you can now take this legendary warrior from the page to the tabletop. The kit includes a choice of heads – helmeted or bare.

    This kit comprises 24 plastic components and 1x Citadel 40mm Round base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
