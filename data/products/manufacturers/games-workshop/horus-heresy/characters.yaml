  description: |-
    Argel Tal was among the first to gaze into the madness known as the Eye of Terror - and was forever damned when that dark abyss gazed back into him. Bonded with the warp-entity Raum, Argel Tal has become a fusion of human soul and daemonic power - held up as a prime example of his Primarch's intentions for the future of humanity, venerated and envied among the Word Bearers. Alongside his brothers in the Gal Vorbak, the Crimson Lord cuts a bloody swathe across the galaxy, sending uncounted Loyalist souls screaming into the warp.

    This multipart resin kit builds one Argel Tal - the Crimson Lord of the Word Bearers Legion. This corrupted champion is a looming fusion of Daemon and Astartes, bristling with hellish details. His armour is cracked and flowing as though warped by otherworldy heat, distorted into organic ribs, horns, and talons even as his mutated flesh and bone tears through its seams from within. Traces of Argel Tal's human self still remain - such as the icon of the Serrated Sun Chapter emblazoned on his chest - but there is no mistaking the unnatural power of his new form, leathery wings flapping as he hefts a bisected Space Marine in one taloned hand, the other half crushed beneath a monstrous hoof.

