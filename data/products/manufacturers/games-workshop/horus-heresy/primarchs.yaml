  description: |-
    Reunited with the Emperor, and at the head of the Word Bearers Legion, Lorgar Aurelian conquered not simply through strategy, overmatching power, or simple brute violence, but by the subtle craft of exaltation, liberation, and example. In his literal interpretation of the meaning of the Great Crusade, however, he and his Legion strayed from the path that had been laid for them.

    For his failings, Lorgar received disdain, contempt, and censure from his siblings and father. His greatest success, the city of Monarchia, built as a shrine to the Emperor, was rendered to dust and ashes at the Emperor's command. He sought no worship from his son – only swift victories to hasten his works. With his beliefs shattered, anger and resentment set in, and Lorgar began to adopt new and darker truths. Both betrayer and betrayed, it was he who would set the stage for the nightmare of the Horus Heresy.

    This multipart resin kit builds Lorgar, an accomplished orator and mighty warrior for your Word Bearers armies in games of Warhammer: The Horus Heresy. He is clad in the impressive Armour of the Word, a special suit of power armour covered in Colchisian markings. Lorgar is armed with a heavy mace known as Illuminarum, which is both a brutal weapon and a mark of office. He comes with a 40mm scenic base that fits into a larger display representing the steps up to Lorgar’s pulpit.

    This kit comprises 17 resin components, 1x Citadel 40mm Round Base, and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
