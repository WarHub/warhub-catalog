  description: |-
    The shadowed and sinister Mortarion is primarch of the Death Guard Legion. Raised upon a nightmare world of fell secrets and necromantic horror, where humans were hunted like animals, the darkness that surrounded Mortarion seeped into his soul, never to leave him.

    Fiercely driven and relentless, the Pale King has led his Legion to become wrathful liberators – spectres of death and judgment to whom no battlefield is insurmountable and no foe too terrible to face. With lies and half-truths did Horus sway Mortarion to his cause, and the price that he and his Legion pay for their role in the Heresy is nightmarish beyond imagining.

    Mortarion is presented as a highly detailed miniature, complete with a gaming and display base. He wields the immense scythe Silence, a formidable weapon that earned him the epithet of the Reaper. Gaunt and menacing, Mortarion looms out from The Barbaran Plate, sculpted with an attention to detail which captures its unadorned, practical form, and presents a unique painting challenge for expert Warhammer hobbyists. At his side hangs his prized pistol, The Lantern, and a clutch of deadly phosphex bombs. His hunched back is covered with a flowing cape and complex backpack designed to cycle the toxins of his home planet Barabrus through his breathing apparatus. He stands on a brutal chunk of battlefield, which fits within a larger industrial-themed display base.

