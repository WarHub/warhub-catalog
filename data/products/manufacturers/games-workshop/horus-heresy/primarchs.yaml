  description: |-
    The Wolf King is ferocious beyond measure and dauntlessly loyal to the Emperor and his Imperium. For all his skill in battle, Leman Russ also possesses wisdom that belies his Legion’s barbaric appearance. The primarch of the VI Legion and the Space Marines at his command can be counted on to undertake any mission or campaign, no matter how brutal the fighting will be, without complaint. The unique culture of the Space Wolves, perhaps more than any other Legion, reflects their primarch’s philosophy and way of war, gleefully charging into the thick of the fighting.

    Leman Russ is here depicted wielding the ancient sword Mjalnar, and the great frost axe Helwinter, its murderous edge made with the kraken-teeth of a mighty beast Russ slew himself. His warplate is a suit of singular artificer power armour, incorporating unique exothermic field generators, otherwise unknown in the Imperium’s arsenal of technology. He’s depicted charging to battle through the ruins of Prospero, featuring icons of the Thousand Sons Legion, with a larger removable scenic base.

    The Primarch of the Space Wolves is supplied in 26 resin components. He’s supplied with a 40mm gaming base, which slots into an 80mm display base.

    Rules for Leman Russ in your games of Warhammer: The Horus Heresy can be found in *Liber Astartes – Loyalist Legiones Astartes Army Book*. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

