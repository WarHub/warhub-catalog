    Guilliman's mastery of strategy makes him not only a skilled commander but also a lethal combatant. An expert in the arts of war, he possesses a vast selection of personal weapons and wargear. The most iconic of these include the Hand of Dominion, a unique power gauntlet, the Gladius Incandor, a shimmering blade of great artifice, and the Arbitrator, a customised combi-bolter.

