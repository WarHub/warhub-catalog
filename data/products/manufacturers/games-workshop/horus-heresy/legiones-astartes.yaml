  description: |-
    Assault Squads are the rapid attack infantry of the Space Marine Legions. Armed with wargear optimised for close-quarter fighting and hit-and-run tactics, equipped with jump packs that allow them to soar quickly across the battlefield, these squads strike at vulnerable targets or impact the enemy line with shocking force. These abilities make them a devastating tactical asset, as they leap past intervening terrain and fortified positions to engage their adversaries in savage melee combat.

    This multipart plastic kit builds 10 Space Marine Assault Legionaries, clad in Mark VI 'Corvus' armour. Every Legionary is equipped with a Warhawk jump pack, and wields a bolt pistol alongside a chainsword. The kit also includes optional combat shields for each warrior, held in their left hand. One model can be built as a Legion Assault Sergeant with alternative heads, accessories, and extra weapon options – a power fist, a lightning claw, or paired lightning claws, as well as a melta bomb.

    This kit includes a variety of interchangeable heads, arms, poses, and pauldrons to mix up your Assault Squad, as well as accessories such as grenades, pouches, and pistol holsters to customise each Legionary's look.

    These models have no Legion markings, allowing Warhammer hobbyists to paint them in whichever colours they choose. However, the box includes a transfer sheet with 293 optional markings and iconography for the Sons of Horus and Imperial Fists Legions.

    This kit comprises 200 plastic components, and comes with 10x Citadel 32mm Round Bases and 1x Legiones Astartes Infantry Transfer Sheet.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
