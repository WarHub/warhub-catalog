  status: current
  description: |-
    The Deredeo Dreadnought is a walking heavy weapons platform, designed to combine superior firepower with the flexibility and durability of a Dreadnought chassis. Though highly resource-intensive to produce and maintain, its undoubted survivability and killing power ensures the Deredeo is in high demand by Traitor and Loyalist Legions alike from the few Forge Worlds able to fashion them.

    This multipart plastic kit builds a Deredeo Dreadnought in the Boreas configuration. This intimidating combat engine can be assembled with either a heavy-infantry shredding volkite falconet or an armour-killing Arachnus heavy lascannon battery for its primary, arm-mounted weapons, along with either twin-linked heavy bolters or twin-linked heavy flamers embedded in its torso. As if this wasn't enough firepower, the walking gun platform also has four powerful Boreas air defence missiles mounted on top of its hull.

    The kit comes with multiple cosmetic build options. Different leg poses, knee pads, armour panels, carapace armour, and head options allow you to enjoy customising this miniature into the perfect fit for your Legiones Astartes force – whether you've thrown your lot in with the Loyalists, or Traitors.

    This kit contains 140 plastic components, 1x Citadel 80mm Round Base, and 1x Legiones Astartes Vehicle Transfer Sheet containing 44x high-quality waterslide transfers to customise your model.

    This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Legion Command Upgrade Set
  productCode: P-182032-99123001039
  sku: 99123001039
  productType: single_kit
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/legiones-astartes-legion-command-upgrade-set-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123001039_THHLegionCommandUpgrades01.jpg
  status: current
  description: |-
    Legion Command Squads are selected from the most disciplined, worthy, and trusted veterans of the Legiones Astartes, accompanying their commanders to war as bodyguards and adjutants. Such squads are also entrusted with carrying one of their Legion’s great standards, making them a rallying point on the battlefield for Space Marine troops. These chosen Space Marines have access to the finest wargear and training, embodying the Legion's honour in war.

    You can use this plastic upgrade kit to promote Legionaries from a Legiones Astartes Tactical Squad set, creating a formidable Legion Command Squad. The kit includes five power swords and five combat shields that can be assembled with a variety of arm poses, plus one sheathed sword and another held in a bionic arm. You'll find two different Legion standards for your troops to rally around, and a choice of four icons to top them – two Loyalist, and two Traitor. The kit also provides an arsenal of cosmetic parts to decorate your veterans in a manner befitting their status, including ornate crested helmets, distinguished bare heads, and impressive artificer pauldrons.

    **This upgrade set includes:**

    – 2x Legion standards with 4x optional crests \(2x Traitor crests and 2x Loyalist crests\)
    – 2x alternative power swords with sheaths
    – 4x artificer pauldrons
    – 5x power swords
    – 5x combat shields
    – 5x shield hands
    – 1x bolt pistol
    – 11x heads \(3x bare and 8x helmeted\)
    – 15x arms \(8x left arms and 7x right arms\)

    This set also includes 1x Legion Command Transfer Sheet, featuring 463 high-quality waterslide transfers for you to add even more detail and personalisation to your miniatures.

    This upgrade kit comprises 58 plastic components and is designed to be assembled with a variety of Legiones Astartes kits, which are sold separately.

    These components are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
