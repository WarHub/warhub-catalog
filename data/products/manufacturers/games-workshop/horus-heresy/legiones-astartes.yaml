  status: current
  description: |-
    Champions are chosen from the best blades of their Legion and serve to embody the honour of their Chapter or company in battle. Armed and armoured in the finest panoply of war, their sworn task is to seek out the foe’s mightiest warriors and slay them in glorious single combat. Such victories are a crushing blow to enemy morale and an object lesson in their Legion's superiority. Those pledged to the Traitor Legions take pleasure in cutting down any Loyalist lapdogs foolish enough to stand in their way.

    This multipart resin kit builds one Traitor Champion Consul – a paragon of martial expertise and an expert in the art of dealing death to the followers of the false Emperor. He’s armed with a deadly paragon blade for parrying blows and lopping off Loyalist heads while wielding a volkite serpenta to melt through enemy armour at range.

    The bulky and tough Artificer Armour worn by this legion champion is multi-layered, giving even more protection, and is adorned with the icon of the Eye of Horus. The kit includes a choice of heads – one wearing a unique and intimidating spiked helm and one bare head with a rebreather.

    This kit comprises 11 resin components and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Siege Breaker Consul
  productCode: P-170552-99853001689
  sku: 99853001689
  productType: character
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/horus-heresy-siege-breaker-consul-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99853001689_SiegeBreakerConsul1.jpg
  status: current
  description: |-
    Siege Breakers are officers of the Legiones Astartes whose speciality lies in precisely applied destruction against strategic targets. They are the wreckers of cities, the shatterers of strongholds, the demolishers of mighty war engines. Often placed in command of armoured spearhead assaults and frontline artillery units, these Consuls do not sit idly behind battlefield lines, but closely observe their deadly work in order to adapt and optimise their Legion's attack patterns from moment to moment.

    This multipart resin kit builds one Siege Breaker Consul – a master of battlefield demolition, depicted co-ordinating an assault through his holographic command terminal. He's armed with a thunder hammer, perfect for shattering enemy armour in person, and carries a holstered pistol and corrosive phosphex bombs at his belt, allowing him to turn entire areas of the battlefield into crawling waves of fire. His heavily-customised MKVI artificer armour integrates a nuncio-vox communications system, and the kit offers a choice of head options – a bare head with exposed bionics, or a beaked helmet featuring additional sensory modifications.

    This kit comprises 14 resin components and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
