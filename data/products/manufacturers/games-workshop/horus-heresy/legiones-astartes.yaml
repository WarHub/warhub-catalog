  description: |-
    Traitor Overseer Consuls command human soldiery drawn from the Solar Auxilia or, in times of dire need, of the Imperialis Militia. The Overseer is entrusted to ensure the conduct of Auxilia or Militia troops meets the expectations of the higher Legion command and that orders are disseminated in a manner that is understood by unaugmented human warriors.

    This multipart resin kit builds a Traitor Overseer Consul for your Traitor Legion armies in games of Warhammer: The Horus Heresy. Armed with a power lash, they represent the frightening power of the Space Marines and are ideal for herding lesser troops into the meatgrinder of war. Their sinister armour features no specific Legion imagery, making it easy to add them to the Traitor force of your choice, and they can also be built with either a helmet or bare head.

    This kit comprises 11 resin components, and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
