  description: |-
    Apothecaries are the battlefield healers of the Legiones Astartes. They aid the wounded, return the injured to the fray, and minister final mercy to those in need of it. Their most onerous duty, however, is recovering the Legion's gene-seed zygotes, for implantation in future generations of Space Marines. As such, these learned warriors are typically found in the thickest fighting, tending to the injured and fallen regardless of the danger around them.

    This multipart resin kit builds two Apothecaries, specialised warrior-medics for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Both are equipped with a chainsword and a holstered pistol, along with a narthecium – a complex dispenser of healing serums and unguents, capable of penetrating even a Space Marine's armour to provide treatment. One is clad in sleek MKVI 'Corvus' armour, while the other wears a more baroque MKV 'Heresy' suit. Draped in medical gear and the symbols of the Apothecarion, they fit into any Space Marines force as vital support officers.

    This kit comprises 22 resin components and 2x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
