  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99853001718_IHShadrakMedusonMasterShatteredLeg1.jpg
  status: current
  description: |-
    Following a series of catastrophic encounters with Traitor forces in the aftermath of the Isstvan V massacre, many of Shadrak Meduson’s superiors were wounded beyond the capacity to lead or slain. This allowed him to take command of the remaining survivors and reorganise them into a flexible and effective fighting force.

    This multipart resin kit builds Shadrak Meduson – Master of the Shattered Legions. This master tactician is clad in artificer armour with a servo arm displaying his disregard for the weakness of the flesh. He wields a custom bolt weapon called Storm's Wrath, and an artificer-wrought power sword made of Albian steel.

    This kit comprises 14 resin components and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    Rules for using Shadrak Meduson – Master of the Shattered Legions in games of Warhammer: The Horus Heresy can be found in the *Campaigns in the Age of Darkness: The Battle for Beta-Garmon* book, which is available separately.
