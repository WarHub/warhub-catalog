  description: |-
    Hibou Khan greatly respected Horus and his Legion and was a member of the warrior lodges seeded throughout the V Legion before the heresy began. Resentful of Jaghatai and the increasing Chogorian influences among the Legion, Hibou pledged his Brotherhood of the Dawn Sky to the Traitor cause. He saw the error of his ways and was tasked to spend the rest of the Horus Heresy hunting down Traitors wherever he could find them.

    This multipart resin kit builds Hibou Khan, a melee expert for your White Scars armies in games of Warhammer: The Horus Heresy. This fierce and imposing warrior is clad in artificer armour with a billowing cloak and tabard. He wields a Chogorian curved power sword named The Breath of the Storm, and can be depicted with a bare head or a plumed helmet.

    This kit comprises 14 resin components and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
