  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99853002361_TSLibrarian1.jpg
  description: |-
    Librarians fought for many years at the forefront of the Space Marine Legions, and none with greater mastery than the Thousand Sons. These battle-psykers fuse esoteric powers with superhuman might, and provoked such fear and superstition that the Council of Nikaea banned the psychic arts from the Legiones Astartes entirely. The Thousand Sons secretly refused to end their pursuit of arcane knowledge, however – and in the Age of Darkness, the Librarians of the XV Legion wield their forbidden abilities with open abandon.

    This multipart resin kit builds one Librarian Consul belonging to the Thousand Sons Legion, for games of Warhammer: The Horus Heresy. This skilled psyker carries a blade-tipped force staff, with a holstered pistol and arcane scrolls hung at his waist. His other hand clutches a scarab talisman, ready to channel his psychic abilities. The Librarian's highly customised armour features an Achean winged scarab, ornate decorative trim, and flowing robes. The kit includes a choice of two different heads – a bare head, and an Achean-pattern helmet with a Prosperine ritual headdress.

    This kit comprises 14 resin components and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
