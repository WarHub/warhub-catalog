  status: current
  description: |-
    Dark Emissaries are said to be the eyes of the Warmaster, heralds sent out from the Sons of Horus Legion to observe and guide those forces that pledged themselves to the Traitor’s cause. They act as an example of the martial skill the Warmaster demands from his followers, and as executioners for those who fail to fulfil their duty.

    This multipart resin kit builds one Dark Emissary Consul, an advisor and enforcer from the Sons of Horus Legion. His imposing Staff of Dark Authority is both a symbol of rank and a lethal weapon in its own right. He's clad in artificer armour adorned with the heraldry of the Warmaster, leaving no question as to where his loyalties lie. He's a mighty warrior and an inspiring presence, whether supporting a full Sons of Horus army or overseeing other allies to the Traitor cause.

    This kit comprises 12 resin components and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
