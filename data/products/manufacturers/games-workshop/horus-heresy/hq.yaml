  status: current
  description: |-
    Captain of the 405th Company of the Imperial Fists Legion, Alexis Polux is a tactical genius with a talent for void warfare, marked for greatness by the Legion's greatest fleet masters. Inwit-born, Polux is a physical giant even among his brothers of the VII Legion, with an emotionless and unyielding character, as though cast from stone. Thrust into command by the dark events of the Warmaster's betrayal, Polux is nevertheless a mighty figure who relies on his strength in the bloody melee of close-quarters combat and his undeniable tactical abilities.

    This multipart resin kit builds Alexis Polux, a legendary commander for your Imperial Fists armies in games of Warhammer: The Horus Heresy. This brilliant hero is clad in highly detailed artificer armour chased with his Legion's insignia and inscribed with High Gothic lettering. Armed with a Solarite power gauntlet befitting his title of 'The Crimson Fist', he also sports a wrist-mounted combi-melta and bears an ornate Vigil pattern storm shield.

    Alexis Polux is posed climbing the metal steps of a boarded ship or conquered fortress. As part of The Horus Heresy Character Series, his gaming base can be slotted into an incredible display base featuring a banner of the Iron Warriors cast at his feet, making for a magnificent centrepiece to your collection.

    This kit comprises 12 resin components, is presented in a black Horus Heresy Character Series box, and is supplied with 1x Citadel 32mm Round Base and 1x Citadel 50mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
