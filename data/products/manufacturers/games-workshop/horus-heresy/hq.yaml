  description: |-
    Lead your Legion to victory with the Blood Angels Praetor - a supreme champion of the Legion styled in splendor worthy of Sanguinius.

    Praetors are the mightiest warriors and battle-leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. These lords of the Imperium hold the power of life and death over whole worlds, with the direct control of entire war fleets and armies in their hands.

    This Praetor is designed specially to match the rest of your Blood Angels collection, this magnificent miniature features a wealth of baroque detail reflecting the noble history and fine artisanship of the Blood Angels Legion. Armed with a deadly Paragon Blade, he’s the ideal front-line commander for your forces. If you're looking to make yours stand out even more, there’s even a choice of heads.
- name: Lord Castellan Evander Garrius, The Tyrant of Cthonia
  category: miniatures
  packaging: single
