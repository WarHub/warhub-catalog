  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99853001726_BloodAngelsAsterCrohneShroudmaker1.jpg
  description: |-
    Aster Crohne is a veteran of the IX Legion, recruited from the killing fields of Saiph. Of all of the officers attached to the Blood Angels 94th Company, only Aster emerged from the fires of Signus alive. In the years following, Sanguinius tasked Crohne with rebuilding his former company, casting aside his former role for the greater glory of the Legion.

    This multipart resin kit builds Aster Crohne, the Shroudmaker, a Captain to lead your Blood Angels armies in games of Warhammer: The Horus Heresy. Clad in stunningly worked artificer armour, he burns through Traitor lines with a pair of hand flamers before hacking down survivors with a mighty Saiphan shard-axe. He's ideal to lead the charge of your recently inducted IX Legion Space Marines.

    This kit comprises 14 resin components, and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    Rules for using Aster Crohne in your games of Warhammer: The Horus Heresy can be found in *Campaigns of The Age of Darkness: The Martian Civil War*, which is available separately.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
