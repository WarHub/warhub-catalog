  description: |-
    A Secutarii Axiarch is a field officer that will often take tactical command of larger forces. They have been rebuilt so that very little of the living being remains – becoming an inhumanly stalwart, nigh indestructible soldier likened to the god-engines they are charged to protect, in both fabricated body and machine spirit-ridden psyche.

    This multipart resin kit builds a Secutarii Axiarch, a leader for your Mechanicum armies in games of Warhammer: The Horus Heresy. They wear Titanshard armour, which contains recovered fragments from a fallen god-engine, and carry an arc lance and mag-inverter shield, making them dangerous in close combat. These augmented warriors are ideal for leading your Secutarii into battle.

    This kit comprises 11 resin components, and 1x Citadel 28mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item, and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
