  status: current
  description: |-
    The Falchion was developed long before the outbreak of the Horus Heresy, and as such, its prey was not the enemy Titans it would later see extensive combat against. As the Great Crusade expanded, it encountered a staggering array of foes, some of whom were of a truly gargantuan scale. The Falchion’s neutron-wave cannon is one of the most powerful vehicle mounted, anti-tank weapons in the Imperium’s arsenal.

    **A Mobile Titan Killer**

    This multipart plastic kit builds a Falchion Super-heavy Tank Destroyer, a piece of mobile artillery for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Equipped with a neutron-wave cannon, it can take on the very heaviest enemy assets, including the god-machines of the Legio Titanicus.

    **Prepare for Battle**

    The side sponsons can mount your choice of lascannon arrays, laser destroyers, or gravis heavy bolter batteries. You can add a pintle-mounted twin-linked bolter, combi-weapon (with a choice of flamer, melta, plasma, or volkite charger), a havoc launcher, heavy flamer, heavy bolter, or multi-melta.

    The hatch can be assembled closed or open with either a gunner for the pintle-mounted weapon, or a tank commander. Additional upgrades include a searchlight, hunter-killer missile, and smoke launchers.

    **Contents:**
    – 296 plastic components
    – 1 Legiones Astartes Super-Heavy Vehicle Transfer Sheet
    – 1 construction guide

    The Legiones Astartes Super-Heavy Vehicle Transfer Sheet features 718 high-quality waterslide transfers. These include Imperial Fists, Sons of Horus, Salamanders, and Iron Warriors icons, plus numbers and other markings to decorate your tank.

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Warhammer Colour paints
