  url: https://www.warhammer.com/en-GB/shop/Kytan-Daemon-Engine-of-Khorne
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102227_Kytan01.jpg
  status: current
  description: |-
    The Kytan is an engine of destruction intended to challenge the martial prowess of the Questoris Familia. Matching a Cerastus Knight in size, design and power, each Kytan is forged from adamantine and brass, infused with life by a malevolent entity of bloodlust and hatred called forth from the Warp. On the battlefield, it charges forth with frightening speed, unleashing its deadly weapons to annihilate the foe.

    This multipart resin and plastic kit builds a Kytan Daemon Engine, a devastating walker for your Dark Mechanicum armies in games of Warhammer: The Horus Heresy. This stunning kit stands 20cm tall and is armed with a Kytan gatling cannon for obliterating foes at range, and a truly brutal cleaver of slaughter to tear through entire squads in close combat. Very little can stand up to the power of the Kytan, and soon the battlefield will be slick with the blood of its enemies.

    This kit comprises 30 resin components, 57 plastic components, and 1x Citadel 170mm Oval Base. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
