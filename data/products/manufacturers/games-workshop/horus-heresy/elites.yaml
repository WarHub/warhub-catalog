- name: Clade Vanus Infocyte Assassin
  productCode: prod5000453-99853008232
  sku: 99853008232
  productType: character
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/hh-clade-vanus-infocyte-assassin-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99853008232_HHCladeVanusInfocyteAssassinLead.jpg
  status: current
  description: |-
    Assassins like none other, the agents of the Clade Vanus are superlative warriors – but are foremost manipulators and seekers of information. The mind of a Vanus Infocyte is trained and augmented to sift through vast quantities of data – hacking into vox, wire, and noospheric networks, and utilising covert devices to gather ever-more knowledge. The Infocyte forms a comprehensive profile of their target based on every iota of information available, from casual conversations to the macro-view of geopolitical-planetary impact. They then viciously exploit this information to instigate the kill – employing bribed agents, hacked machines, and engineered coincidences as deadly weapons.

    This multipart resin kit builds one Clade Vanus Infocyte Assassin, an Assassinorum agent in the employ of the Imperial Regent. Clad in a body glove suit for stealth operations, this operative's head is encased in a faceless, sensor-studded helm that filters waves of information from the battlefield. Their harness supports a winding set of autonomic servo-limbs, with a skull-mounted vox disruptor array sat beside them. Twin laspistols hang at their sides for close-range shooting, while each wrist features a concealed sympatic dataspike – with one sliding out to strike.

    This kit comprises 9 resin components, and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Dark Angels – Dreadwing Interemptor Squad
  productCode: prod4390162-99863001644
  sku: 99863001644
  productType: single_kit
  priceGbp: 54.5
  url: https://www.warhammer.com/en-GB/shop/Dark-Angels-Legion-Interemptors-2020
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99563001644_DALegionInteremptorsLead.jpg
  status: current
  description: |-
    Even among the brethren of the infamous Dreadwing, the Interemptors are a grim breed, dedicated as they are to a singular purpose – the utter annihilation of the enemy. Armed with fearsome plasma burners and plasma incinerators, when the Interemptors attack they leave behind no trace of those they conquer – no bodies, no ruins, nothing. They take no trophies of their victories and tell no tales of those that have fallen before them – those consigned to death at their hands are forgotten forever.

    This multipart resin kit builds five Dreadwing Interemptors, experts in esoteric weaponry dating back to Old Night. Each Interemptor is covered in the detailed, ornate heraldry of the Dark Angels and the Dreadwing, and is equipped with a plasma burner – an ancient and deadly weapon unseen outside of the First Legion. One model can be assembled reloading his plasma burner. The kit also includes optional components to equip a member of the squad with a heavy weapon – either a plasma incinerator or missile launcher.

    This kit comprises 46 resin components and is supplied with 5x Citadel 32mm Round Bases. These miniatures are supplied unpainted and requires assembly – we recommend using Citadel paints.

    You will need a copy of the *Warhammer: The Horus Heresy – Age of Darkness Rulebook* and the *Liber Astartes: Loyalist Legiones Astartes Army Book* to make full use of these models in games of Warhammer: The Horus Heresy.
- name: Blood Angels – The Angel's Tears with Grenade Launchers
  productCode: prod4370260-99863001642
  sku: 99863001642
  productType: single_kit
  priceGbp: 63.5
  url: https://www.warhammer.com/en-GB/shop/The-Angels-Tears-With-Grenade-Launchers-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99563001642_ATGrenadeLaunchers01.jpg
  status: current
  description: |-
    The Angel’s Tears serve the Blood Angels in place of the more common Destroyers of other Legions. They take to the field only at the direct command of Sanguinius himself, serving as his agents on those rare occasions when the Great Angel deems an enemy worthy of total annihilation. Armed with lethal weaponry suited to the swift destruction of those beyond forgiveness, the Angel's Tears descend upon the foe suddenly and unannounced, faces concealed in the silver death-masks of their Order and oaths of retribution on their lips.

    This multipart resin kit builds five Angel's Tears for the Blood Angels Legion, armed with grenade launchers. The Erelim of the Angel's Tears wear menacing silver death masks, and armour sculpted with musculature and resplendent with the Ninth Legion's iconography. They are equipped with powerful jump packs adorned with the symbol of Destroyer squads, and wield Angel's Tears grenade launchers that fire rad grenades – ancient terror weapons that can reduce even the strongest enemy to a feeble wreck. This kit also includes an ornate helmet to indicate an Arch-Erelim squad leader.

    The kit comprises 40 resin components, and is supplied with 5x Citadel 32mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.

    You will need a copy of the *Warhammer: The Horus Heresy – Age of Darkness Rulebook* and the *Liber Astartes: Loyalist Legiones Astartes Army Book* to make full use of these models in games of Warhammer: The Horus Heresy.
- name: Justaerin Terminator Squad
  productCode: prod4150189-99863002137
  sku: 99863002137
  productType: single_kit
  priceGbp: 62.5
  url: https://www.warhammer.com/en-GB/shop/Sons-of-Horus-Justaerin-Terminators-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590102137_SonsofHorusJustaerinTerminatorsLead.jpg
  status: current
  description: |-
    The Justaerin are the pride of the First Company and their Legion. Tasked with forming the ‘point of the spear’ of countless assaults, they fearlessly go where the fighting is thickest, their attacks usually directed at destroying the heart of an opposing target or conducting the decapitation strike of an enemy force. Early proponents of the use of Tactical Dreadnought Armour, these black-and-gold-clad killers rely on the resilience this grants to smash aside any resistance, butchering those who dare stand before them.

    This multipart resin kit builds five Justaerin Terminator bodies for your Sons of Horus armies in games of Warhammer: The Horus Heresy. From Isstvan III to the Siege of Terra, they are always at the forefront of the fighting, and are ideal for getting stuck in on the tabletop. The heads, torsos, arms, and shoulder pads are interchangeable across the miniatures, making it easy to customise your speartip strike. Please note that the weapons shown in some images are available separately.

    This kit comprises 40 resin components and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Space Wolves - Deathsworn Pack
  productCode: prod4130178-99863001614
  sku: 99863001614
  productType: single_kit
