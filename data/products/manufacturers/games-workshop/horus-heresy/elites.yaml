  description: |-
    The Deathsworn are the dark heart of the VI Legion, the embodiment of its insatiable hunger for death. Consumed by the bloody deeds of the Great Crusade and the predatory taint of their own gene-seed, these hollow and murderous warriors embrace the Fenrisian Cult of Morkai, guided by the Death Wolf's grim ministers to feast only upon the enemies of humanity.

    This multipart resin kit builds five Deathsworn, warrior-cultists for the Space Wolves Legion. These skull-helmed Space Marines are clad in customised artificer armour, adorned with the symbols of their Fenrisian faith - wolf-skulls, furs, runes, gems, and the sculpted armourial of the Cult of Morkai. Each Deathsworn is armed with a bolt pistol and ornate power axe - they also carry hourglass-shaped Ymira-class stasis bombs.

    This kit comprises 42 resin components, and is supplied with 5x Citadel 32mm Round Bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Colour paints.
- name: Space Wolves – Varagyr Wolf Guard Terminators
  productCode: prod3730199-99863001596
  sku: 99863001596
  productType: single_kit
  priceGbp: 81
  url: https://www.warhammer.com/en-GB/shop/Space-Wolves-Legion-Varagyr-Wolf-Guard-terminator-Squad-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101596_VaragyrTerminatorSquad01.jpg
  status: current
  description: |-
    The Varagyr are the chosen warriors of Leman Russ, hand-picked from his own Great Company to form his personal guard and close companions in war and council. Each of the Varagyr have distinguished themselves in battle many times over, each forging their own saga worthy of telling. More than any of his sons, the Varagyr are the wolves of Russ's pack, foregoing the chance to lead their brothers in battle. The Varagyr watch while others strike, stand fast rather than seeking the glory of battle. When such coldly-withheld fury is finally unleashed, it falls like a thunderbolt upon the foe.

    This multipart resin kit builds five Varagyr Wolf Guard Terminators for the Space Wolves Legion. As the guardians of the Wolf King himself, they wear Cataphractii Terminator armour decorated with Fenrisian knotwork, runes, fangs, and the great beast pelts that mark them as their Primarch's chosen. Their heads are left bare, exposing fierce snarls, plaited beards, and wild hair, with large topknots billowing out behind them. Each Varagyr is armed with a combi-bolter, as well as a frost axe adorned with further sculpted knotwork.

    The kit comprises 30 resin components, and is supplied with 5x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.

    You will need a copy of the *Warhammer: The Horus Heresy – Age of Darkness Rulebook* and the *Liber Astartes: Loyalist Legiones Astartes Army Book* to make full use of these models in games of Warhammer: The Horus Heresy.
