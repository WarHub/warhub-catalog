    This multipart resin kit builds 10 Veletaris Vanguard Section shock troops for your Solar Auxilia armies in games of Warhammer: The Horus Heresy. Armed with heavy flamers, they excel at eradicating hordes of enemy infantry in gouts of horrifying fire. One miniature is a squad leader, who is armed with a charnabal tabar and hand flamer, and has a choice of two heads – one with his visor up, and one with his visor down. Clad in reinforced void armour, they're ready to take on the worst that the enemy can throw at them.

