  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99563001642_ATGrenadeLaunchers01.jpg
  status: current
  description: |-
    The Angel’s Tears serve the Blood Angels in place of the more common Destroyers of other Legions. They take to the field only at the direct command of Sanguinius himself, serving as his agents on those rare occasions when the Great Angel deems an enemy worthy of total annihilation. Armed with lethal weaponry suited to the swift destruction of those beyond forgiveness, the Angel's Tears descend upon the foe suddenly and unannounced, faces concealed in the silver death-masks of their Order and oaths of retribution on their lips.

    This multipart resin kit builds five Angel's Tears for the Blood Angels Legion, armed with grenade launchers. The Erelim of the Angel's Tears wear menacing silver death masks, and armour sculpted with musculature and resplendent with the Ninth Legion's iconography. They are equipped with powerful jump packs adorned with the symbol of Destroyer squads, and wield Angel's Tears grenade launchers that fire rad grenades – ancient terror weapons that can reduce even the strongest enemy to a feeble wreck. This kit also includes an ornate helmet to indicate an Arch-Erelim squad leader.

    The kit comprises 40 resin components, and is supplied with 5x Citadel 32mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.

    You will need a copy of the *Warhammer: The Horus Heresy – Age of Darkness Rulebook* and the *Liber Astartes: Loyalist Legiones Astartes Army Book* to make full use of these models in games of Warhammer: The Horus Heresy.
- name: Ebon Keshig Terminators
  productCode: prod4210218-99863001626
  sku: 99863001626
  productType: single_kit
  priceGbp: 81
  url: https://www.warhammer.com/en-GB/shop/White-Scars-Ebon-Keshig-Terminators-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101626_WSLegionEbonKeshigTerminators01.jpg
  status: current
  description: |-
    The Ebon Keshig is a unique formation in the White Scars Legion, where the heavy protection of Terminator armour is often shunned in favour of speed and mobility. Made of the Kharash – warriors seeking ritual atonement for breaches of honour – the Ebon Keshig are always found at the forefront of high-intensity conflicts. Clad in black ceramite, they earn redemption by protecting their brothers, acting as a shield for the more fragile contingents of a White Scars assault – only those who survive this hazardous role are deemed worthy of returning to the ranks.

    This multipart resin kit builds an Ebon Keshig cohort of five Kharash, elite warriors clad in advanced Tartaros Terminator armour for your White Scars armies in games of Warhammer: The Horus Heresy. These suits of armour are decorated with the iconography of the White Scars, including Legion numerals, Chogorian patterns, and segmented armour-skirts. Each warrior sports a dynamic pose and is armed with a distinctive power glaive. These miniatures are fully compatible with weapons and upgrade packs for Legion Tartaros Terminators, which are available separately.

    This kit comprises 56 resin components and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Blood Angels - Crimson Paladins
  productCode: prod4150190-99863001616
  sku: 99863001616
  productType: single_kit
  priceGbp: 81
  url: https://www.warhammer.com/en-GB/shop/Blood-Angels-Crimson-Paladins-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101616_BACrimsonPaladinSquad01.jpg
  status: current
  description: |-
    The Crimson Paladins of the Blood Angels stand as the guardians of the Primarch’s halls. When these elite warriors take to the field, clad in the reliquary Terminator armour of their Order and cloaked in the names of the Immortals, they stand as a bulwark against the foe and a shield for the sons of Sanguinius. They form the unyielding anchor upon which the Crimson Host turns - a single unshakeable bastion of blades and shields. By their sacrifice and indomitable resolve are the Blood Angels freed to give vent to the noble fury of their Legion.

    This multipart resin kit builds five Crimson Paladins, mighty Terminators unique to the Blood Angels Legion. Clad in highly-detailed Cataphractii Terminator armour, these warriors are richly decorated with robes and baroque embellishments that illustrate the artistry of the IX Legion. Each Paladin is armed with a power sword and a Coriolis-pattern power shield, adorned with further sculpture - the kit also includes the components to arm one Paladin with an Iliastus assault cannon, and the unit leader with a two-handed Spear of Perdition.

    This kit comprises 38 resin components, and is supplied with 5x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Colour paints.
