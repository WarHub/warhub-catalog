    The Gal Vorbak is built upon the remnants of the Serrated Sun Chapter of the Word Bearers Legion, who looked into the depths of the Eye of Terror itself and in doing so were changed for all time. Their psyches infiltrated by creatures from the darkness of the æther, the survivors are named the Gal Vorbak, or ‘Blessed Sons’ in the language of Colchis. In battle, their already mighty forms swell, armour running like tallow into horrific new forms as hands turn into rending talons and jaws into slavering, fang-filled maws.

    This multipart resin kit builds five Gal Vorbak, tainted killers for your Word Bearers armies in games of Warhammer: The Horus Heresy. Strong, fast, and tough, they are ideal for spreading fear and confusion through enemy lines. These characterful miniatures are packed with detail, including mutated flesh, distended bones, and the remnants of their once noble armour.

