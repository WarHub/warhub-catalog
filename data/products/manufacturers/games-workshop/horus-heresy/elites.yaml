  url: https://www.warhammer.com/en-GB/shop/Space-Wolves-Legion-Deathsworn-Pack-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101614_SWDeathswornPack01.jpg
  status: current
  description: |-
    The Deathsworn are the dark heart of the VI Legion, the embodiment of its insatiable hunger for death. Consumed by the bloody deeds of the Great Crusade and the predatory taint of their own gene-seed, these hollow and murderous warriors embrace the Fenrisian Cult of Morkai, guided by the Death Wolf's grim ministers to feast only upon the enemies of humanity.

    This multipart resin kit builds five Deathsworn, warrior-cultists for the Space Wolves Legion. These skull-helmed Space Marines are clad in customised artificer armour, adorned with the symbols of their Fenrisian faith - wolf-skulls, furs, runes, gems, and the sculpted armourial of the Cult of Morkai. Each Deathsworn is armed with a bolt pistol and ornate power axe - they also carry hourglass-shaped Ymira-class stasis bombs.

    This kit comprises 42 resin components, and is supplied with 5x Citadel 32mm Round Bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Colour paints.
- name: Thousand Sons – Khenetai Occult Blade Cabal Upgrade Set
  productCode: prod3490130-99853002258
  sku: 99853002258
  productType: single_kit
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Khenetai-Occult-Blade-Cabal-Upgrade-Set-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550102258_KhenetaiOccultBladeUpgradeSet01.jpg
  status: current
  description: |-
    The Khenetai Occult are a mystical sect within the Order of the Jackal, elite guardians who protect the reliquaries and sanctums of the Thousand Sons Legion. Bound together by ritually-forged psychic bonds, the foremost warriors of the Khenetai form cabals of ‘blades’ – sublime warriors who wield their psychic abilities and martial skills as an integrated whole. Armed with dual force swords shaped from psycho-crystalline materials, these Khenetai Occult fight with eerie precision and unity – seeming almost like a single warrior manifested many times over.

    This resin upgrade set allows you to upgrade five Legionaries wearing Mark IV armour into Khenetai Blades – the.psychic blademasters of the Thousand Sons Legion. The kit includes five torsos decorated with an ornate scarab, five heads clad in the signature helmet of the Khenetai, and 10 arms – five left arms, five right arms – wielding curved Achea force swords in a variety of poses.

    This upgrade kit comprises 20 resin components and is designed to be assembled with the MKIV Tactical Squad set, which is sold separately. These components are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Emperor’s Children Phoenix Power Spears
  productCode: prod3370122-99853002254
  sku: 99853002254
  productType: single_kit
  priceGbp: 21
  url: https://www.warhammer.com/en-GB/shop/Emperors-Children-Phoenix-Power-Spears
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99853002254_ECPhoenixSpearsUpdateLead.jpg
  status: current
  description: |-
    Patterned in imitation of the deadly and arcane power halberds wielded by the Legio Custodes, these elegant power blades are hugely lethal weapons in their own right. As well as the lightning-swift Phoenix Terminators, Phoenix power spears were a the weapon of choice among the most experienced Sergeants and Commanders in the Legion.

    This set includes five Phoenix Powers Spears for Emperor’s Children Legion Characters. There are three spears wielded in two hands and one wielded one handed for Space Marines in power armour, and single power spear in a one handed grip for a Space Marine in Terminator armour. Also included are the arms needed for the two handed spears, a left power armoured arm with open hand, and on open left hand for Terminator armour.

    This is a multi-part resin upgrade kit.
- name: Headhunter Kill Team Upgrade Set
  productCode: prod3050169-99853002240
  sku: 99853002240
  productType: single_kit
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Alpha-Legion-Head-Hunter-Kill-Team-Upgrade-Set
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550102240_AlphaLegionHeadHunterKillTeamUpgradeSet01.jpg
  status: current
  description: |-
    Headhunter Kill Teams are skilled infiltrators, specialising in creating conditions of all-consuming chaos among the enemy’s ranks, sowing confusion by eliminating key officers, positions, and assets. They have access to some of the most prized wargear their Legion can provide, including Banestrike weaponry conceived specifically to penetrate Legiones Astartes battle plate, and deadly power daggers, affording these operatives multiple opportunities to complete their murderous task.

    This multipart resin kit lets you upgrade five miniatures to be a Headhunter Kill Team, expert assassins for your Alpha Legion armies in games of Warhammer: The Horus Heresy. They are each armed with a Banestrike combi-bolter – a weapon specifically designed to breach the ceramite power armour of Space Marines. Take out key enemy targets and escape in the confusion that you've caused.

    **The kit includes:**
    – 5x torsos
    – 5x Banestrike combi-bolters
    – 5x heads
    – 10x shoulder pads
    – 2x hip plates
    – 2x hip plates with power daggers
    – 1x hip plate with grenades

    These parts are compatible with the MkIV Tactical Squad, which is available separately.

    This kit comprises 30 resin components. These parts are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
