- name: Red Butcher Terminator Squad
  productCode: prod2680627-99863002185
  sku: 99863002185
  productType: single_kit
  priceGbp: 67.5
  url: https://www.warhammer.com/en-GB/shop/World-Eaters-Legion-Red-Butchers
