  status: current
  description: |-
    Red Butchers are World Eaters driven beyond simple rage by their cranial implantations known as the Butcher’s Nails, rendering them into raving beasts that crave only violence. Thrashing against their bonds, and able only to exercise a marginal degree of control over their actions, these warriors are fit only to be unleashed upon the enemy as berserkers, freed from the concerns of military strategy and solely focused on violently dismembering their foes in a murderous frenzy.

    This multipart resin kit builds five Red Butchers, frenzied warriors for your World Eaters armies in games of Warhammer: The Horus Heresy. Clad in specially modified Terminator plate designed to serve as both protective, ablative armour and a restraint and confinement system, they are each armed with a pair of butcher power axes to hack foes to pieces. The squad leader can alternatively be armed with a pair of butcher chainfists to add even more killing power to your unit.

    This kit comprises 29 resin components and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

