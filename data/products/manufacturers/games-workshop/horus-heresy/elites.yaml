    The Khenetai Occult are elite guardians who protect the reliquaries and sanctums of the Thousand Sons Legion. Bound together by ritually forged psychic bonds, the foremost warriors of the Khenetai form cabals of ‘blades’ – sublime warriors who wield their psychic abilities and martial skills as an integrated whole. Armed with dual force swords shaped from psycho-crystalline materials, these Khenetai Occult fight with eerie precision and unity – seeming almost like a single warrior manifested many times over.

    This multipart resin kit upgrades five MkIV Tactical Legionaries with paired Achea force swords for games of Warhammer: The Horus Heresy. When they fight together in concert, no foe can stand before them, as they are laid low in a storm of charged blades.

