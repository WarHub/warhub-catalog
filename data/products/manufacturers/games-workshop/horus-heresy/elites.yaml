    Headhunter Kill Teams are skilled infiltrators, specialising in creating conditions of all-consuming chaos among the enemy’s ranks, sowing confusion by eliminating key officers, positions, and assets. They have access to some of the most prized wargear their Legion can provide, including Banestrike weaponry conceived specifically to penetrate Legiones Astartes battle plate, and deadly power daggers, affording these operatives multiple opportunities to complete their murderous task.

    This multipart resin kit lets you upgrade five miniatures to be a Headhunter Kill Team, expert assassins for your Alpha Legion armies in games of Warhammer: The Horus Heresy. They are each armed with a Banestrike combi-bolter – a weapon specifically designed to breach the ceramite power armour of Space Marines. Take out key enemy targets and escape in the confusion that you've caused.

