    The Mor Deythan are a small cadre of infiltration squads within a Legion already well known for its nigh unsurpassed skill in such tactics. At the beginning of the Horus Heresy, the Mor Deythan were few in number, having fought countless campaigns over eight decades at their master’s side. They rarely admit new recruits into their ranks, and most who remain are grizzled veterans, supremely confident in their abilities.

    This multipart resin kit builds five Mor Deythan, expert snipers for your Raven Guard armies in games of Warhammer: The Horus Heresy. They are ideal for sneaking through enemy lines before taking out key targets, and then fading back into the shadows. The kit comes with six heads – five helmeted and one bare – offering some level of personalisation for your assassins.

