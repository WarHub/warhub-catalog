    The sunfury plasma annihilator is a weapon of terrifying and indiscriminate power, capable of incinerating entire cityscapes and rendering the strongest armour into steaming vapour. Developed from designs intended for the broadside batteries of void warships, plasma annihilators such as the sunfury can only be mounted on the largest of the Imperium's war machines, such as Warlord Titans, due to the reactor-strength required to charge them and the motive power needed to wield them.

    This multipart resin kit builds a sunfury plasma annihilator for a Warlord Titan in games of Warhammer: The Horus Heresy. It is a massively destructive weapon, firing multiple barrages of intense, searing energy that will tear through even the toughest armour of your foes. This extensively detailed weapon can be mounted on the Warlord Titan's left or right arm.

