  description: |-
    Arioch power claws are designed to allow the Warlord Titan to shatter fortifications as well as engage war machines of their own kind in brutal hand-to-hand combat. They are immeasurably strong and durable, able to rend metres-thick steel and granite as a predatory beast rends the flesh of its prey. Many carry additional in-built secondary weapons, such as the Vulcan mega-bolter cannon, to deal with lesser threats such as swarming infantry and fast-moving attack craft beyond the Titan's reach.

    This multipart resin kit builds an Arioch power claw for a Warlord Titan in games of Warhammer: The Horus Heresy. It is a terrifyingly destructive weapon, capable of easily crushing Knights and smaller Titans. This extensively detailed weapon comes with an integrated Vulcan mega-bolter, and can be mounted on the Warlord Titan's left or right hand.

