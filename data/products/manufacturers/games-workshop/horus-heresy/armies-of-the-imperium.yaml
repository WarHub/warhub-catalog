    Titan plasma blastguns are immense versions of the plasma weapons carried by infantry. Powered by the reactor of a Titan, they unleash projectiles of super-heated plasma capable of melting armour and flesh with ease, while also stripping off the void shields of larger god-engines.

    This multipart resin kit builds a plasma blastgun for a Warhound Titan in games of Warhammer: The Horus Heresy. It is a massively destructive weapon that can threaten most enemy targets. This extensively detailed weapon can be mounted on the Warhound Titan’s left or right arm.

    This kit comprises 6 resin components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

