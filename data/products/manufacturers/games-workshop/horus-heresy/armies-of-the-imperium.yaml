  description: |-
    Prosecutors advance unflinching into the heart of battle, protected from the malevolence of witches by their rare anti‑psychic mutation, and shielded from the bullets and blades of the foe by their finely crafted power armour. Their bolters thunder ceaselessly, each explosive shell ending another heretic's life.

    This multipart plastic kit builds five Prosecutors, expert witch hunters for your Adeptus Custodes armies in games of Warhammer 40,000, or your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. Armed with bolters, they specialise in taking out enemy psykers at range. The kit includes parts to build an optional squad leader with their own loincloth, shoulder pad, and choice of two heads. There are eight other heads, and five shoulder pads, which are interchangeable across the miniatures, making it easy to customise your witch-hunting warriors.

    This kit can alternatively be built as greatblade-carrying Vigilators or flamer-armed Witchseekers.

    This kit comprises 67 plastic components and 5x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
