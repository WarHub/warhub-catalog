  url: https://www.warhammer.com/en-GB/shop/legiones-astartes-contemptor-dreadnought-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123001007_ContemptorLead.jpg
  status: current
  description: |-
    Perhaps the most advanced Dreadnought engine in the arsenal of the Great Crusade, the Contemptor Dreadnought fuses traditional technologies with arcane cybernetic lore. A powerful atomantic reactor fuels the Dreadnought's impressive speed and strength, while also supplying the defensive energy fields that further increase its battlefield durability. Equipped with a versatile armoury of weapons that allow it to serve as a mobile heavy weapons platform, assault powerhouse, or versatile linebreaker, the Contemptor has found a place within every Legion, no matter their preferred tactics.

    This multipart plastic kit builds one Contemptor Dreadnought, an impressive combat walker with an absolute trove of weapon options. The kit provides eight different ranged weapons to choose from – a conversion beam cannon, Gravis autocannon, Gravis bolt cannon, Gravis lascannon, Gravis melta cannon, Gravis plasma cannon, Kheres assault cannon, and volkite dual-culverin – each of which can be mounted on either of the Contemptor's arms. The kit also includes two melee fists, each of which can be built as either a Gravis power fist or Gravis chainfist, and sports your choice of in-built weapon – a combi-bolter, graviton gun, heavy flamer, meltagun, or plasma blaster. The model can even be built with a hull-mounted havoc launcher or head-mounted helical targeting array.

    You’ll also find a variety of alternate components and cosmetic options, including two heads, four different carapace designs, a choice of claws or fingers for the power fists, and scrollwork and tilting shield accessories. The model's joints, head, and power fist digits can all be assembled to offer a wide range of poses, ensuring that no two Contemptors look quite the same.

    This kit comprises 164 plastic components and is supplied with a Citadel 60mm Round Base, as well as a Legiones Astartes Vehicle Transfer Sheet containing 44 optional markings and icons for the Sons of Horus and Imperial Fists Legions. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.

    This kit is compatible with the Contemptor Dreadnought Weapon Frames, allowing you to outfit your Dreadnought with two copies of the same arm-mounted ranged weapon.
- name: Legio Custodes Ares Gunship
  productCode: prod4240174-99860108214
  sku: 99860108214
  productType: vehicle
  priceGbp: 364.5
  url: https://www.warhammer.com/en-GB/shop/Legio-Custodes-Ares-Gunship-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108214_CustodesAresGunship01a.jpg
  status: current
  description: |-
    The Ares is a potent terror weapon, bypassing enemy armies as it blazes over their lines in the shadow of its eclipse shields. Using its immensely destructive Arachnus magna-blaze cannon against the monuments and edifices which an enemy culture hold most dear to their hearts, it strikes a decisive blow against their will to wage war.

    This heavily-armed super-heavy gunship is ideal for taking out large targets such as monsters and vehicles, and even packs enough of punch to take down the void shields of Titans. It is protected by its eclipse shield, making it nigh-on impervious to return fire.

    This highly-detailed 80 part resin kit builds one Legio Custodes Ares Gunship. It comes supplied with one 160mm Citadel round base and a plastic flying stand (to use when flying) and a smaller resin flying stand (to use when hovering).
- name: Battle Titan Volcano Cannon
  productCode: prod4050165-99863008205
  sku: 99863008205
  productType: vehicle
  priceGbp: 89
  url: https://www.warhammer.com/en-GB/shop/Battle-Titan-Volcano-Cannon-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108205_BattleTitanVolcanoCannon01.jpg
  status: current
  description: |-
    The volcano cannon is one of the most powerful weapons used by Humanity, unleashing terawatts of power in one devastating blast, with enough force to bore through even a Warlord Titan in a single shot. Drawing on the plasma reactors of a Battle Titan, this is one of the most rightly feared weapons in the arsenal of the Legio Titanicus.

    This multipart resin kit builds a volcano cannon for a Reaver Titan or a Warbringer Nemesis Titan in games of Warhammer: The Horus Heresy. This utterly devastating weapon is the ideal way to threaten enemy god-engines. The extensively detailed volcano cannon can be mounted on a Titan’s left or right arm.

    This kit comprises 10 resin components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This kit is compatible with the Mars Pattern Reaver Titan Body, Chaos Reaver Titan Body, and Nemesis Warbringer Titan Body, all available separately.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
- name: Custodian Wardens
  productCode: prod3710209-99120108077
  sku: 99120108077
  ean: 5011921172054
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Adeptus-Custodes-Custodian-Wardens-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120108013_CustodianWardens01.jpg
  status: current
  description: |-
    Custodian Wardens are level‑headed warriors who have sworn to fight as living fortresses no foe shall breach. With frightening intensity, and immense sweeps of their energised spear and axe blades, these warriors cleave their foes in two.

    This multipart plastic kit builds five Custodian Wardens, tempered sentinels for your Adeptus Custodes armies in games of Warhammer 40,000, or your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. Clad in armour covered in beautiful sculpted details, with gemstones, eagles, lightning bolts, and filigree, they shrug off incoming firepower before delivering the Emperor's judgement.

    Each member of the squad can be armed with your choice of a guardian spear or a castellan axe. There are 5x heads, 5x top knots, 5x left shoulder pads, and 5x sets of hip plates that are interchangeable across the miniatures, making it easy to customise your towering champions. There are also parts to build an optional Shield-Captain with a choice of two heads, and one miniature can be assembled proudly carrying a vexilla.

    This kit comprises 78 plastic components and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Custodian Guard
  productCode: prod3710168-99120108073
  sku: 99120108073
  ean: 5011921172016
