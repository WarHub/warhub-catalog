- name: Thunderbolt Heavy Fighter
  productCode: prod2691423-99863008017
  sku: 99863008017
  productType: vehicle
  priceGbp: 136.5
  url: https://www.warhammer.com/en-GB/shop/Imperial-Navy-Thunderbolt-Heavy-Fighter
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590108017_ThunderboltFighter01.jpg
  status: current
  description: |-
    The Thunderbolt forms the bulk of the Imperialis Armada’s intra-atmosphere fighter aircraft. With a rugged and reliable design, it is possessed of a sheer resilience that enables it to land riddled with damage that would down a lesser craft, making it loved by its crews and feared by its enemies.

    **A Flexible Flyer**

    This multipart resin kit builds one Thunderbolt Heavy Fighter, a multi-role aircraft for your Solar Auxilia armies in games of Warhammer: The Horus Heresy. Armed with a Gravis autocannon and twin lascannon, it is equally effective against enemy aircraft or ground targets. This kit features a fully detailed interior, including a pilot, and its landing gear can be built retracted or extended.

    This miniature has no cohort-specific markings, so you can use it in any Solar Auxilia force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    **Contents:**
    – 59 resin components
    – 1 clear acetate sheet
    – 1 Citadel 120mm by 92mm Oval Base
    – 1 Citadel Flying Stem
    – 1 construction guide

    The clear acetate sheet is for cutting window components from, and measures approximately 74mm by 105mm.

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Citadel Colour paints

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Marauder Bomber
  productCode: prod2691421-99863008015
  sku: 99863008015
  productType: vehicle
  priceGbp: 275.5
  url: https://www.warhammer.com/en-GB/shop/Imperial-Navy-Marauder-Bomber
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590108015_MARAUDERBOMBER1.jpg
  status: current
  description: |-
    The Marauder is the archetypal heavy bomber of the Divisio Aeronautica, granted substantial operational reach by rugged engines and capacious fuel tanks, which allow squadrons to operate effectively in times of sporadic resupply. They are often based upon orbital spacecraft due to the craft’s ability to operate in the vacuum of space.

    **High Altitude Heavy Explosives**

    This multipart resin kit builds one Marauder Bomber, a long-range ground attack aircraft for your Solar Auxilia armies in games of Warhammer: The Horus Heresy. Alongside its devastating macro-bomb cluster, it has a twin lascannon-armed front turret, and twin heavy bolter-armed rear and dorsal turrets. Drop your bombs on far-flung objectives or enemy units so your infantry can advance across the battlefield with impunity. This kit features a fully detailed interior, including a pilot, navigator, and gunners, and its landing gear can be built retracted or extended. The turrets rotate, and the Marauder has an intimidating wingspan of 450mm.

    This miniature has no cohort-specific markings, so you can use it in any Solar Auxilia force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    **Contents:**
    – 66 resin components
    – 1 clear acetate sheet
    – 1 Citadel 120mm by 92mm Oval Base
    – 1 Citadel Flying Stem
    – 1 construction guide

    The clear acetate sheet is for cutting window components from, and measures approximately 74mm by 105mm.

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Citadel Colour paints

    Legends rules for using the Marauder Bomber in games of Warhammer: The Horus Heresy and Warhammer 40,000 can be downloaded for free from the Warhammer Community website.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
