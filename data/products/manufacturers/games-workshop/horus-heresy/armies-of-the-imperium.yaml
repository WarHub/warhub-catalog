- name: Mars Pattern Warhound Titan Vulcan Mega-bolter
  productCode: prod2691436-99863008068
  sku: 99863008068
  productType: vehicle
  priceGbp: 56.5
  url: https://www.warhammer.com/en-GB/shop/Mars-Pattern-Warhound-Titan-Mega-Bolter-Left-Arm-only
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590108068_VulcanMegaBolterMarsAlpha01.jpg
  status: current
  description: |-
    The Vulcan mega-bolter is a short-ranged but extremely deadly multiple-barrelled autocannon that fires a hail of projectiles at anyone foolish enough to stray too close. Able to fire hundreds of rounds per minute, it is extremely effective at breaking up massed infantry assaults and has been known to gun down entire formations of troops in a single burst.

    This multipart resin kit builds a Vulcan mega-bolter for a Warhound Titan in games of Warhammer: The Horus Heresy. This enormous multi-barrelled version of the bolter is capable of shredding enemy infantry formations with ease. The extensively detailed mega-bolter can be mounted on a Titan’s left or right arm.

    This kit comprises 2 resin components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This kit is compatible with the Mars Pattern Warhound Titan Body, which is available separately.

