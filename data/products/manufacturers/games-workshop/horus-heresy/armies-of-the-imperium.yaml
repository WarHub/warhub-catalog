  ean: 5011921172016
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 40
  url: https://www.warhammer.com/en-GB/shop/Adeptus-Custodes-Custodian-Guard-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/60010101002_BurningProsperoENG02.jpg
  status: current
  description: |-
    Custodian Guard form the backbone of the shield companies, and every one is a terrifying force of destruction equal to the strongest of the foe. Whether armed with guardian spear or sentinel blade, their shots are perfectly placed, and every cut, thrust and parry is a masterclass in bladesmanship.

    This multipart plastic kit builds five Custodian Guards, the Emperor's personal bodyguards, for your Adeptus Custodes armies in games of Warhammer 40,000, or your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. These masters of war excel in both ranged and close combat and are ideal for taking out elite enemy units.

    Each member of the squad can be armed with your choice of a guardian spear, or a sentinel blade and praesidium shield. There are 5x chest plates, 5x heads, 5x top knots, 5x left shoulder pads, and 5x sets of hip plates that are interchangeable across the miniatures, making it easy to customise your resplendent champions. There are also parts to build an optional Shield-Captain with a choice of two heads, and one miniature can be assembled proudly carrying a vexilla.

    This kit comprises 100 plastic components and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Legio Custodes Telemon Dreadnought Iliastus Accelerator Culverin
  productCode: prod3650180-99853008192
  sku: 99853008192
  productType: vehicle
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/Legio-Custodes-Telemon-Dreadnought-Iliastus-Accelerator-Culverin-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550108192_IliastusAcceleratorCulverin01NEW.jpg
  status: current
  description: |-
    Fewer than a handful of Telemon Dreadnoughts are to be found within the ranks of the Legio Custodes. Rare is the foe who can stand against the array of esoteric, hand-crafted weapons that grace its chassis or the ferocious will and warrior skill of the master Custodian interred within.

    This is a 4-component resin kit which allows you to build 1 Iliastus Accelerator Culverin, with 2 separate elbow guards making it possible to mount this weapon on either arm of a Telemon Heavy Dreadnought.
- name: Legio Custodes Aquilon Terminators
  productCode: prod3530473-99863008190
  sku: 99863008190
  productType: single_kit
  priceGbp: 67.5
  url: https://www.warhammer.com/en-GB/shop/Legio-Custodes-Aquilon-Terminators-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108190_AquilonTerminators01.jpg
  status: current
  description: |-
    Within the ranks of the Legio Custodes, Aquilon Terminator Sodalities are employed only as needed. This includes rare occasions which require the Custodians to operate in ‘Zone Mortalis’ environs. Where the Legio is loath to risk unwarranted loss of life, it relies on the superior defences of Aquilon Terminator armour to provide a platform of mobile heavy firepower.

    This multipart resin kit builds three Aquilon Terminators, veteran warriors in advanced armour for your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. Noticeably more complex-looking than standard Tactical Dreadnought armour, additional integrated power systems and capacitors add detail to the miniatures. Each Terminator is armed with a Solarite power gauntlet, with an option of Adrathic combi-destructor or Lastrum storm bolter in the other hand. Three different helmets are included, with one bare head option. The breastplates, pauldrons, and top plates are detailed with Imperial iconography, and there are three plumes, made up of two different designs.

    This resin kit comprises 43 components and 3x Citadel 50mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Questoris Knight Magaera
  productCode: prod2730134-99863008120
  sku: 99863008120
  productType: character
  priceGbp: 163.5
  url: https://www.warhammer.com/en-GB/shop/Questoris-Knight-Magaera
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590108120_QuestorisKnightMagaera01.jpg
  status: current
  description: |-
    The Knight Magaera is a technological marvel rarely seen outside the vassal Houses of the Mechanicum, who jealously guard the secrets of its creation. Armed with a lightning cannon that blasts apart heavy infantry and vehicles alike and a siege claw which can breach even the strongest enemy fortifications, the Knight Magaera is often placed at the forefront of Household assaults.

    This multipart resin and plastic kit builds a Knight Magaera, an advanced walker for your Questoris Household armies in games of Warhammer: The Horus Heresy. It's an ideal shock assault unit, capable of breaching the most heavily defended enemy positions while shrugging off heavy weapons fire. To aid in this role, it is armed with a complex lightning cannon, using focused electromagnetic beams to vaporise infantry and blast apart armour.

    This kit comprises 20 resin components, 139 plastic components, and 1x Citadel 170mm by 109mm Oval Base. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
- name: Vigilator Squad
  productCode: prod3480205-99120108074
  sku: 99120108074
  ean: 5011921172023
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/Vigilator-Squad
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99120108007_VigilatorSquad01.jpg
  status: current
  description: |-
    Vigilators know the surest way to bring an end to a witch’s malefic rampage is to strike their head from their body. This is their doctrine as they ghost across the battlefield before charging headlong into battle, their double‑handed power blades singing a keening song of death.

    This multipart plastic kit builds five Vigilators, expert witch hunters for your Adeptus Custodes armies in games of Warhammer 40,000, or your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. Armed with executioner greatblades, they specialise in taking out enemy psykers in close combat. The kit includes parts to build an optional squad leader with their own loincloth, shoulder pad, and choice of two heads. There are eight other heads, and five shoulder pads, which are interchangeable across the miniatures, making it easy to customise your witch-hunting warriors.

    This kit can alternatively be built as bolter-carrying Prosecutors or flamer-armed Witchseekers.

    This kit comprises 67 plastic components and 5x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
