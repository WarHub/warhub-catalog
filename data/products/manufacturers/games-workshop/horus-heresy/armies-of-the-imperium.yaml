  url: https://www.warhammer.com/en-GB/shop/Adeptus-Custodes-Custodian-Guard-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/60010101002_BurningProsperoENG02.jpg
  status: current
  description: |-
    Custodian Guard form the backbone of the shield companies, and every one is a terrifying force of destruction equal to the strongest of the foe. Whether armed with guardian spear or sentinel blade, their shots are perfectly placed, and every cut, thrust and parry is a masterclass in bladesmanship.

    This multipart plastic kit builds five Custodian Guards, the Emperor's personal bodyguards, for your Adeptus Custodes armies in games of Warhammer 40,000, or your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. These masters of war excel in both ranged and close combat and are ideal for taking out elite enemy units.

    Each member of the squad can be armed with your choice of a guardian spear, or a sentinel blade and praesidium shield. There are 5x chest plates, 5x heads, 5x top knots, 5x left shoulder pads, and 5x sets of hip plates that are interchangeable across the miniatures, making it easy to customise your resplendent champions. There are also parts to build an optional Shield-Captain with a choice of two heads, and one miniature can be assembled proudly carrying a vexilla.

    This kit comprises 100 plastic components and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Legio Custodes Orion Assault Dropship
  productCode: prod3600184-99863008193
  sku: 99863008193
  productType: vehicle
  priceGbp: 377.5
  url: https://www.warhammer.com/en-GB/shop/Custodes-Gunship-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108193_OrionDropship01.jpg
  status: current
  description: |-
    Created as a dedicated assault dropship for the Legio Custodes, the Orion can carry a full task force of the Emperor’s Talons into combat. Protected by frontal armour superior to that of the Legiones Astartes Thunderhawk Gunship, its Arachnus heavy blaze cannon and Lastrum bolt cannon can swiftly clear a landing zone of hostile infantry and armour with brutal efficiency, allowing the units within to deploy before it soars back into the sky to unleash death upon any foe who dares approach.

    This multi-part resin kit contains the components necessary to assemble a Legio Custodes Orion Assault Dropship, a Lord of War choice for your Talons of the Emperor army. This is an especially dense example of a flyer – it’s not covered head to toe in bells and whistles, but certainly features enough weaponry to make it an incredibly efficient part of your arsenal. It features 2 Lastrum bolt cannon, turret-mounted on either side of the cockpit, 2 Spiculus bolt launchers with vent systems and 2 Arachnus heavy blaze cannon – the latter is complete with cooling systems, mounts, power supplies and fuel cells visible. Appropriate to its ability to carry units into the fray, it can be modelled with the rear open – within, walls and benches are visible, with a ramp attached to the rear for the troops within to descend.

    This kit comes as 71 components, and is supplied with a flying stem and 160mm round base. Rules for using the Legio Custodes Orion Gunship in games of The Horus Heresy are available as a PDF download.
- name: Legio Custodes Aquilon Terminators with Infernus Firepikes
  productCode: prod3530474-99863008191
  sku: 99863008191
  productType: single_kit
  priceGbp: 67.5
  url: https://www.warhammer.com/en-GB/shop/Legio-Custodes-Aquilon-Terminators-with-Infernus-Firepikes-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108191_AquilonTerminatorsFirepikes01.jpg
  status: current
  description: |-
    Although the Tactical Dreadnought Armour project was conceived first and foremost for the use of the Legiones Astartes, it was inevitable given the success of Terminator armour that its principles could also be adapted for Legio Custodes use. The first pattern developed was what became known as Aquilon armour. Advancing yet further upon the Cataphractii Terminator armour patterns, the Aquilon pattern takes into account the enhanced physique of the Legio Custodes as being able to bear more weight and strain than even a Space Marine, and so is fitted with additional integrated power systems and capacitors which make up for some of the limitations of the origin pattern. This allows for the Cataphractii Terminator armour’s famous durability to be retained in the Aquilon pattern, but with a degree of speed and manoeuvrability the former lacks.

    This multi-part resin kit contains the components necessary to assemble 3 Legio Custodes Aquilon Terminators with Infernus Firepikes. Sharing much of their components with the standard Aquilon Terminators, they are noticeably more complex-looking than standard Tactical Dreadnought armour, with additional integrated power systems and capacitors adding detail to the model. They differ from the standard Terminators in that each is armed with an Infernus firepike and Solerite power talon. 3 different helmets are included, with 1 bare head option. The breastplates, pauldrons and top plates are detailed with Imperial iconography, and there are 3 plumes, made up of 2 different designs.

    This kit comes as 31 components, and is supplied with 3 50mm round bases.
- name: Legio Custodes Telemon Heavy Dreadnought Body
  productCode: prod3530281-99863008185
  sku: 99863008185
  productType: character
  priceGbp: 66.5
  url: https://www.warhammer.com/en-GB/shop/Legio-custodes-heavy-dreadnought-body-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108185_TelemonDreadBody01.jpg
  status: current
  description: |-
    Fewer than a handful of Telemon Dreadnoughts are to be found within the ranks of the Legio Custodes, each intended to stand sentinel over its charges, no matter the forces brought against it. The honour of interment in one of the few existing Telemon sarcophagi is awarded to only the most celebrated warriors. Rare is the foe who can stand against the array of esoteric, hand-crafted weapons that grace its chassis or the ferocious will and warrior skill of the master Custodian interred within.

    This multipart resin kit builds the body of a Legio Custodes Telemon Heavy Dreadnought, a mighty walker for your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. It’s a model of impressive heft, with immense pauldrons giving it an iconic shape. The legs are extremely posable, offering a wealth of modelling options (including an optional stepping foot for dynamic posing), and the kit includes a Spiculus missile launcher positioned above the sarcophagus.

    This kit comprises 24 resin components and 1x Citadel 100mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    Please note, this kit does not include arms – it is compatible with the Telemon Iliastus accelerator culverin, Telemon Arachnus storm cannon, and Telemon caestus, all available separately.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Legio Custodes Gyrfalcon Pattern Jetbike
  productCode: prod3480273-99863008184
  sku: 99863008184
  productType: single_kit
  priceGbp: 48.5
  url: https://www.warhammer.com/en-GB/shop/Legio-Custodes-Gyrfalcon-Pattern-Jetbike
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108184_GryfalconJetbike01.jpg
  status: current
  description: |-
    Charging across the battlefield on armoured Gyrfalcon Pattern Jetbikes, Agamatus squadrons are tasked with hunting down threats to the main Legio Custodes force and destroying fleeing enemy units. Armed with a powerful lastrum bolt cannon, they can annihilate enemy infantry and armour with surgical precision, their jetbikes augmented to provide tremendous bursts of speed on command.

    This multipart resin kit builds a Gyrfalcon Pattern Jetbike for your Talons of the Emperor army in games of Warhammer: The Horus Heresy. Modelled to evoke speed and manoeuvrability with its sweeping lines and streamlined silhouette, it’s an ideal rapid response and suppression option that can screen the rest of your force. The jetbike can be armed with a lastrum bolt cannon, Adrathic devastator, or twin corvae las-pulsar, and the rider can be assembled with their right hand on the handlebar, or carrying a Solarite power lance.

    This kit comprises 21 resin components, 2x Small Flying Stems, and 1x Citadel 60mm Flying Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
