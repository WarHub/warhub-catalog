  description: |-
    Hulking creatures of twisted muscle and sharpened bone, Daemon Brutes are the vanguard of the horde, created to break the fragile ranks of mortal armies and serve as a bulwark for the smaller minions of Chaos that follow in their wake. Each of these brutish monsters towers over even the enhanced warriors of the Legiones Astartes and is capable of shrugging aside the mass reactive projectiles of boltguns as though they were mere irritations.

    These terrifying monsters sunder any formation and break any line set against them. Unlike other Ruinstorm Daemon units, they can be set up at the beginning of a battle, giving you more tactical options. They can also accompany a Ruinstorm Daemon Lord as its retinue, creating a truly destructive unit.

    This 30-part highly detailed resin kit makes three Ruinstorm Brutes, one armed with a sword, one with an axe and one with a double-handed hammer. It comes supplied with three 50mm round Citadel bases.
