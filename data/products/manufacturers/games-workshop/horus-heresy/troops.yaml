  description: |-
    Tactical Squads are the mainstay of the Space Marine Legions, highly versatile infantry units that can attack or defend at will, assault heavily fortified positions, and take and hold strategic objectives – or simply slaughter the enemy – in almost any terrain or situation. All 18 Legions make heavy use of Tactical Squads in different ways. It is by the fighting power of thousands of superhuman warriors such as these, armed with deadly bolters and armoured for battle in the harshest of war zones, that the Imperium has beaten a bloody path across the galaxy at the head of the Great Crusade.

    MKVI 'Corvus' Power Armour is the most advanced mark of power armour approved for mass production at the time of the Horus Heresy, featuring an iconic 'beakie' helmet packed with additional sensor equipment. Production of these suits continued even as Forge Worlds were rocked by vicious civil wars, and the armour became commonplace in the years following the end of the Heresy.

    This multipart plastic kit builds 20 Space Marine Legionaries, which can be fielded in games of Warhammer: The Horus Heresy as one Legion Tactical Squad unit of 20 miniatures, or two units of 10 miniatures. Each of these Legionaries is armed with an Umbra-pattern bolter and bolt pistol, with a variety of additional components such as grenades and pouches, and can also be equipped with a bayonet or chain bayonet for melee fighting. You can also build up to two Legionaries with a Legion vexilla, two with a nuncio-vox, and two with an augury scanner. Accessories and alternate heads are included to build a Legion Tactical Sergeant for each of your squads – the kit offers a variety of extra weapon options for these unit leaders, including plasma pistols, power swords, power fists, and lightning claws. These miniatures have no Legion markings, allowing Warhammer hobbyists to paint them in whichever colours they choose. The box includes a transfer sheet with 293 optional markings and iconography for the Sons of Horus and Imperial Fists Legions.

    **These miniatures can also be used to represent:**
    – Veteran Tactical Squad
    – Tactical Support Squad (with the Special Weapons Upgrade Set, available separately)
    – Heavy Support Squad (with a Heavy Weapons Upgrade Set, available separately)
    – Praetorian Command Squad or Centurion Command Squad (with the Legion Command Upgrade Set, available separately)
    – Despoiler Squad (with the Melee Weapons Upgrade Set, available separately)

    This kit comprises 352 plastic components, 20x Citadel 32mm Round Bases, and 1x Legiones Astartes Infantry Transfer Sheet. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
