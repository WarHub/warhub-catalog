  description: |-
    Lasrifle Sections make up the core of the Solar Auxilia, soldiers trained to wage war on battlefields across the galaxy. Clad in their signature void armour, these troopers can fight through toxic killzones, alien death worlds, and even the cold vacuum of space. Whether arrayed in disciplined ranks to stand firm against an alien horde, or launching a massed assault against enemy positions, a Lasrifle Section can unleash volley after volley of concentrated laser fire until the field is won.

    This multipart plastic kit builds 20 Solar Auxiliaries, which you can field as a Lasrifle Section of 20 models or two units of 10 models. These troopers are clad in sealed void armour and equipped with sophisticated lasrifles. You can mix-and-match arm, body, and head poses for loads of variety, and further customise your troopers with additional items such as frag grenades, krak grenades, pouches, and flasks, as well as charge-packs and bayonets for their lasrifles.

    The kit also includes components to build command gear for each of your squads. You'll find vox interlocks, proud Auxilia vexillas with a choice of icons, and Sergeants with decorated chestplates, head options, and loads of extra weaponry – power fists, power swords, and charnabal swords, as well as laspistols, blast pistols, needle pistols, plasma pistols, and hand flamers.

    This kit comprises 380 plastic components, 20x Citadel 25mm Round Bases, and a Solar Auxilia Infantry Transfer Sheet containing 152 high-quality waterslide transfers. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
