    The apocalypse missile launcher is a weapon of immense devastation, designed to be mounted on the carapace of a Reaver Titan. It has the equivalent destructive capacity of an entire artillery company. A single salvo covers a vast area and its incredible range means no enemy is ever safe.

    This multipart resin kit builds an apocalypse missile launcher for a Reaver Titan in games of Warhammer: The Horus Heresy. It is a massively destructive weapon, firing multiple barrages of missiles capable of wiping out entire tank squadrons at a time. This extensively detailed weapon can be mounted on the Reaver Titan’s carapace.

    This kit comprises 23 resin components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This kit is compatible with the Mars Pattern Reaver Titan Body, which is available separately.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
