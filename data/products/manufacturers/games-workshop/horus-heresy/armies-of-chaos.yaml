- name: Battle Titan Melta Cannon
  productCode: prod4050163-99863008203
  sku: 99863008203
  productType: vehicle
  priceGbp: 89
  url: https://www.warhammer.com/en-GB/shop/Battle-Titan-Melta-Cannon-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108203_BattleTitanMeltaCannon01.jpg
  status: current
  description: |-
    The Titan melta cannon uses a miniature fusion reactor to produce a blast of immense heat capable of melting even the thickest armour and reducing battle tanks to molten slag. Directed at an enemy Titan, it can inflict devastating damage, often winning an engine duel with a single well-placed shot.

    This multipart resin kit builds a melta cannon for a Reaver Titan, Chaos Reaver Titan, or Warbringer Nemesis Titan in games of Warhammer: The Horus Heresy. It is a massively destructive weapon, which can obliterate enemy armour. This extensively detailed weapon can be mounted on your Titan's left or right arm.

    This kit comprises 10 resin components, requires assembly, and is supplied unpainted – we recommend Citadel Colour paints.

    This kit is compatible with the Reaver Titan Body, Chaos Reaver Titan Body, and Warbringer Nemesis Titan Body, all available separately.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
- name: Battle Titan Gatling Blaster
  productCode: prod4050160-99863008200
  sku: 99863008200
  productType: vehicle
  priceGbp: 89
  url: https://www.warhammer.com/en-GB/shop/Battle-Titan-Gatling-Blaster-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108200_BattleTitanGatlingBlaster01.jpg
  status: current
  description: |-
    The gatling blaster is among the deadliest weapons available to Humanity. An immense rotary weapon with six barrels, it is mounted on battle titans where it can be brought to the front lines on a mobile and highly defensible platform. When fired, it unleashes a torrent of shells so dense they can tear entire formations of enemy vehicles to ragged scrap.

    This multipart resin kit builds a gatling blaster for a Reaver Titan or a Warbringer Nemesis Titan in games of Warhammer: The Horus Heresy. This utterly devastating weapon can easily blast holes in Knights and Dreadnoughts and can strip void shields from enemy god-engines. The extensively detailed gatling blaster can be mounted on a Titan’s left or right arm.

    This kit comprises 12 resin components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This kit is compatible with the Mars Pattern Reaver Titan Body, Chaos Reaver Titan Body, and Nemesis Warbringer Titan Body, all available separately.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
- name: Mars Pattern Warlord Titan Apocalypse Missile Launchers
  productCode: prod2980139-99863008143
  sku: 99863008143
  productType: vehicle
  priceGbp: 142.5
  url: https://www.warhammer.com/en-GB/shop/Mars-Pattern-Warlord-Titan-Apocalypse-Missile-Launcher-x2
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108143_MarsPatternWarlordTitanApocalypseMissileLauncher01.jpg
  status: current
  description: |-
    Build your complete Titan with the Warlord Titan Builder.

    The Apocalypse Missile Launcher is a Titan-class support weapon capable of firing volleys of missiles to saturate a wide target area. The superior elevation and mobility of a Battle Titan as a firing platform makes the Apocalypse launcher a surpassingly flexible weapon. When mounted in pairs on the Mars pattern Warlord Titan, the Apocalypse launcher becomes even more deadly.

    This multi-part resin kit includes components to build two Warlord Apocalypse Missile Launchers.
- name: Mars Pattern Warlord Titan Belicosa Volcano Cannon
  productCode: prod2910147-99863008137
  sku: 99863008137
  productType: vehicle
  priceGbp: 118
  url: https://www.warhammer.com/en-GB/shop/mars-pattern-warlord-titan-belicosa-volcano-cannon
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108137_TitanBelicosaVolcannoCannon01.jpg
  status: current
  description: |-
    The Belicosa pattern volcano cannon is one of the most potent energy weapons produced by the forges of the Mechanicum, short of the continent-razing guns mounted on the warships of the Imperialis Armada. It is a weapon so fearsome that only the plasma reactor of a mighty Warlord Titan can feed its ravenous appetite for power and make possible the destruction of the most terrible foes of Humanity.

    This multipart resin kit builds a Belicosa volcano cannon for a Warlord Titan in games of Warhammer: The Horus Heresy. It is a massively destructive weapon, capable of obliterating the toughest of targets. This extensively detailed weapon can be mounted on the Warlord Titan's left or right arm.

    This kit comprises 12 resin components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This kit is compatible with the Mars Pattern Warlord Titan Body, which is available separately.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
- name: Questoris Knight Magaera
  productCode: prod2730134-99863008120
  sku: 99863008120
  productType: character
  priceGbp: 163.5
  url: https://www.warhammer.com/en-GB/shop/Questoris-Knight-Magaera
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590108120_QuestorisKnightMagaera01.jpg
  status: current
  description: |-
    The Knight Magaera is a technological marvel rarely seen outside the vassal Houses of the Mechanicum, who jealously guard the secrets of its creation. Armed with a lightning cannon that blasts apart heavy infantry and vehicles alike and a siege claw which can breach even the strongest enemy fortifications, the Knight Magaera is often placed at the forefront of Household assaults.

    This multipart resin and plastic kit builds a Knight Magaera, an advanced walker for your Questoris Household armies in games of Warhammer: The Horus Heresy. It's an ideal shock assault unit, capable of breaching the most heavily defended enemy positions while shrugging off heavy weapons fire. To aid in this role, it is armed with a complex lightning cannon, using focused electromagnetic beams to vaporise infantry and blast apart armour.

    This kit comprises 20 resin components, 139 plastic components, and 1x Citadel 170mm by 109mm Oval Base. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 and over.
