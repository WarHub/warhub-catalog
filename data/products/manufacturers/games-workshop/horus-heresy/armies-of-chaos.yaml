  description: |-
    Acastus-class armour is perhaps the most heavily-armed and armoured of all Knight suits in the Imperium, rare beyond belief amongst even the greatest Knight Households. Equipped with ranged armaments of incredible magnitude, these mighty engines serve as both battlefield supremacy weapons and icons of the Machine God's divinity – the Knight Asterius is even more scarce than most, a walking siege engine with a machine spirit of all-consuming fire. While its arcane conversion weaponry reduces fortress walls and enemy Titans to dust with escalating beams of antimatter, the radioactive warheads launched by the Asterius leave the land itself unfit for life or defence.

    This multipart resin kit builds one Acastus Knight Asterius, a truly colossal Knight armed with a pair of twinned heavy conversion beam cannons. This massive walker also sports two secondary volkite culverin, as well as an impressive hull-mounted missile system loaded with radiological Karacnos mortar shells. Approaching the size of a Warhound Titan, this extensively-detailed war machine makes for an incredible centrepiece on the tabletop, while its enclosed, segmented armour plates are the perfect canvas for any hobbyist. The Knight Asterius features a degree of posability – in addition, its mortar bay can be assembled gluelessly, allowing you to adjust its positioning and close the shutters or expose its rows of rad-shells as you choose.

    This kit comprises 153 resin components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
