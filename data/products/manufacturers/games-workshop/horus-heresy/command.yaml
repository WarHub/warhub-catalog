    Praetors are the mightiest warriors and battle-leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. Each is an experienced warrior and warlord who has writ for themselves a legend in blood, and carries into battle the finest wargear known to humanity. This holds true in the XIV Legion, for the sons of Mortarion are led by stalwart and merciless commanders who wade through fire and poison to claim victory, wielding their soldiers like a reaper's scythe.

    This multipart resin kit builds one Legion Praetor, a finely detailed commander for the Death Guard Legion. This intimidating officer is clad in Mark III 'Iron Armour', extensively customised with industrial tubing, chainmail, and grim trophies carved with the numeral of his Legion. He's armed with a sinister power scythe, a sweeping polearm unique to the Death Guard, as well as a combi-flamer – typically upgraded to an alchem combi-flamer. The model includes a choice of two different heads – a bare head with a bulky rebreather for filtering out toxins, and a reinforced helmet topped with a prominent trench spike.

    This miniature makes an excellent addition to any Death Guard army, festooned with wargear characteristic of his Legion – but he's also a fantastic painting project for collectors. Dripping with details and a variety of textures, he's a perfect opportunity to flex your hobby skills.

    This kit comprises 11 resin components and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
