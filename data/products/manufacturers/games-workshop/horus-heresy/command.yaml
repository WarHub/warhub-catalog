    Praetors are the mightiest warriors and battle-leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. Those that march to war clad in Cataphractii Terminator armour will stride into the thickest fighting with impunity, leading their warriors to victory across hundreds of battlefields. This holds true in the XIV Legion, for the sons of Mortarion are led by stalwart and merciless commanders who will wade through fire and poison to claim victory.

