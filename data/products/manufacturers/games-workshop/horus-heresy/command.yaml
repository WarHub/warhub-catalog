    Praetors are the mightiest warriors and battle-leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. Those that march to war clad in Cataphractii Terminator armour will stride into the thickest fighting with impunity, leading their warriors to victory across hundreds of battlefields. This holds true in the XVI Legion, for the sons of the Warmaster are led by ambitious officers eager to claim the Imperium they helped build.

    This multipart resin kit builds one Legion Cataphractii Praetor, a heavily armoured commander for the Sons of Horus Legion. Armed with a lethal combi-melta and an intimidating power maul designed to mimic his Primarch's own weapon, this warlord's cloak, topknot, and furs billow behind him as he strides forth, crushing his scenic basing with each step. His ornate Cataphractii armour boasts plenty of decorations to proclaim his rank, from Cthonian kill-marks and trophies to the ever-glaring Eye of Horus, making him an excellent centrepiece on the tabletop.

