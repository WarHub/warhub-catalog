  description: |-
    Rampager squads were shock assault units, formed from the most bloodthirsty warriors in a Legion already known for its fury in battle. All possessed the prohibited psycho-surgery that drove them to ever greater heights of rage, some too far gone to be left unrestrained between battles. They were simply known as the Caedere or the ‘Butchers’ by the rest of their Legion.

    This multipart resin kit builds five Rampagers, savage slaughterers for your World Eaters armies in games of Warhammer: The Horus Heresy. Armed with a variety of brutal weapons, they are ideal for running amok through Loyalist lines. They are packed with Legion-specific details, including World Eaters symbols, and bare heads showing off their Butcher's Nails. The kit includes a selection of vicious Caedere weapons – 2x meteor hammers, 2x excoriator chainaxes, 2x barb-hook lashes, and 1x paired falax blades – so you can always find the right tool for your bloodletting.

    This kit comprises 54 resin components and 5x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
