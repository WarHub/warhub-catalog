  description: |-
    Elite shock troops adept at sowing panic and dismay with their arrival, the Contekar are murderers of a high order, called upon when the VIII Legion wishes to go beyond terror, bringing abject despair and destruction upon a foe as they topple the very foundations of their civilisation. A haughty warrior class recruited from Nostramo's ruling elite, the Contekar are obsessed with status, fighting only for those they deem worthy – and are often dispatched by the rulers of the Night Lords to wrest command from those deemed unfit to lead.

    This multipart resin kit builds five Contekar Terminators, the cruel nobility of the Night Lords Legion. Each is clad in a suit of Tartaros Terminator armour decorated by grisly trophies, from flayed skin to rows of bones, and adorned with the iconography of the Night Lords, including gothic collars, sculpted Legion armourials, and leering skull-faced helms. The Contekar are armed with vicious chainblades and a choice of ranged weapon – the kit provides three heavy flamers and two volkite cavitors. It also includes an optional bare head, as well as an Escaton power claw to replace the chainblade of the unit leader. This kit's components are interchangeable between models, allowing you to ensure each of your Terminators looks unique.

    This kit comprises 48 resin components and is supplied with 5x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
