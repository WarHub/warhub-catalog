  description: |-
    Though the Alpha Legion maintains and fields the entire spectrum of Legiones Astartes unit configurations, few know of the Lernaean Terminator Squads. This is not because they seek to obscure their existence, but rather because they rarely leave behind any witnesses of their deeds. The Lernaeans are an unformed legend, and the object of shrouded dread. They advance relentlessly upon the foe, descending with controlled fury and slaying any enemy not driven to rout before them. Having secured their objective, they hold it stubbornly against all counter-attacks, like a great beast with its jaws clamped firmly about its doomed prey.

    This multipart resin kit builds five Lernaean Terminators for the Alpha Legion. These anonymous killers wear modified Cataphractii Terminator armour, sculpted with delicate scales and adorned by the serpentine symbols of the XX Legion, as well as sleek bladed crests atop their visored helms. Each Lernaean is armed with a searing volkite charger and an ornate power axe – the kit also includes an optional conversion beam cannon, a heavy weapon which can be used to replace the volkite charger of one model.

    The kit comprises 41 resin components, and is supplied with 5x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
