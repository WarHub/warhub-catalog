    The Gorgon pattern of Tactical Dreadnought Armour is one of the most extreme technological examples of Iron Hands innovation. The design replaced the field generators embedded in the armour with experimental systems that converted incoming electromagnetic and kinetic energy into bursts of blinding light, able to incapacitate foes.

    This multipart resin kit builds five Gorgon Terminators, veterans in technologically advanced armour for your Iron Hands armies in games of Warhammer: The Horus Heresy. They can withstand no end of punishment with their advanced armour, and they can dish it back out too with their thunder hammer and artificer power axes.

