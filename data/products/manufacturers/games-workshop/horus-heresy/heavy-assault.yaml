  description: |-
    The Pyroclasts are the burning fury of the Salamanders Legion given form. Shunning conventional Destroyer units, save for a small cadre retained for xenocide operations, Vulkan created the Pyroclasts to fulfil the role of bringers of utter destruction. To the Salamanders, fire is more than a weapon – it has a mystical function and truth, and embodies both purifying destruction and the potential for rebirth and redemption.

    This multipart resin kit builds five Pyroclasts, remorseless warriors for your Salamanders armies in games of Warhammer: The Horus Heresy. They are each armed with a Pyroclast flame projector, created by the Primarch Vulkan himself, and are both more elegant and far more potent than the standard flamer wielded by the Space Marine Legions. With these, they can burn through enemy hordes or even melt through tank armour. The kit includes an optional power weapon or power fist for the squad leader.

    This kit comprises 37 resin components and 5x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
