    This multipart resin kit builds five Angel's Tears for the Blood Angels Legion, armed with volkite serpenta. The Erelim of the Angel's Tears wear menacing silver death masks, and armour sculpted with musculature and resplendent with the Ninth Legion's iconography. They are equipped with powerful jump packs adorned with the symbol of Destroyer squads, and wield paired volkite serpenta – thermal ray weapons that can unleash a withering hail of searing firepower. This kit also includes an ornate helmet to indicate an Arch-Erelim squad leader.

