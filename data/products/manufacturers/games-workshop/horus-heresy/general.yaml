    This multipart resin and plastic kit builds five Sekhmet Terminators for the Thousand Sons Legion. These psychic warriors are clad in Cataphractii Terminator armour decorated with the iconography of the XV Legion – most notably the signature winged scarab of the Sekhmet, as well as three different designs of resplendent headpiece. Each Sekhmet Terminator is armed with a combi-bolter and an elegant Achean-pattern force axe, reminiscent of a khopesh. The kit also includes one plastic Cataphractii Terminator Squad sprue, allowing you to replace each Terminator's force axe with your choice of power fist, lightning claw, or chainfist.

