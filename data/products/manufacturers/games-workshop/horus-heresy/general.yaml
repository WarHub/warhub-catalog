  description: |-
    A rising star in the annals of the Great Crusade, Corswain’s name is recognised throughout the Imperium as an exemplar of his Legion's greatest qualities. His is a righteous paladin – a son of Caliban, but not an ingrained scion of the Order. Corswain was uniquely placed to bridge the divisions within the Legion in its formative years under Lion El'Jonson, and was groomed by his Primarch to occupy a champion's position. Corswain commands the respect of all with his level-headed command, disciplined authority, and determined mastery of the blade.

    This multipart resin kit builds Corswain – Paladin of the Ninth Order, Champion of the Dark Angels Legion. This famed paragon is posed in a righteous lunge, a fine surcoat and the furred Mantle of the Champion flowing with his every movement, atop a scenic base that includes a discarded enemy chainsword. Corswain's signature weapon is The Blade – a masterwork greatsword he wields with both hands. He's clad in the Armour of the Forest – a highly detailed and ornate suit of artificer armour forged by the Lion himself, which is covered in the symbols of his high rank within his Legion, such as the keys hung from his belt and Hexagrammaton mark adorning his buckle. He comes with a choice of two heads – a winged helmet, or a bare head with the hood of his mantle raised.

    This kit comprises 13 resin components, and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Clade Adamus Assassin
  productCode: prod5000452-99853008221
  sku: 99853008221
  productType: character
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/hh-clade-adamus-assassin-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99853008221_HHCladeAdamusAssassinLead.jpg
