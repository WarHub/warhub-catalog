- name: Sigismund, First Captain of the Imperial Fists
  productCode: prod2900299-99863001443
  sku: 99863001443
  productType: character
  priceGbp: 58.5
  url: https://www.warhammer.com/en-GB/shop/sigismund-first-captain-of-the-imperial-fists
