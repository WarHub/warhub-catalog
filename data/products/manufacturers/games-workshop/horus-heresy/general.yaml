  description: |-
    Breacher Squads are sent into the most hazardous spheres of warfare, such as boarding actions on spacecraft or the first wave of attackers into a fortress. Since the early days of the Great Crusade, specialised wargear and tactics have been under continuous development, including the use of heavy shields to resist enemy fire and specialised weaponry to bypass bulkheads and shatter strongpoints.

    This multipart plastic kit builds ten Breacher Squad Legionaries, well-protected close-quarters specialists for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Equipped with boarding shields and one-handed bolters, they can shrug off firepower that would take down a standard Tactical Legionary. They are ideal for adding durability and close to mid-range hitting power to your force without sacrificing flexibility.

    The kit includes parts to build an optional Sergeant, Legionary with nuncio-vox, Legionary with vexilla, and Legionary with augury scanner. The Sergeant has a choice of two heads – one bare and one helmeted. He can be armed with a power sword, power fist, or lightning claw, and can also take an optional melta bomb. One Legionary can be armed with an optional graviton gun, and another can be armed with an optional lascutter. There are also accessories – including grenades, pistol holsters, and pouches – that are interchangeable across the miniatures.

    These miniatures have no Legion-specific markings, so you can use them in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit is supplied with 1x Legiones Astartes Infantry Transfer Sheet, containing 618 high-quality waterslide transfers. These include symbols for the Iron Warriors, Sons of Horus, Salamanders, and Imperial Fists, along with numerals, honour markings, generic markings, script, and command icons.

    This kit comprises 249 plastic components and 10x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
