    Horus is the primarch of the Luna Wolves Legion, renamed the Sons of Horus in his honour, and is the greatest among his superhuman kin. A tactical genius, charismatic battle leader, and adept envoy and statesman, Horus proved himself over the course of the Great Crusade as a warlord second only to the Emperor whom he served and called father. So it was that when the Emperor took leave of the burden of command of the Great Crusade, it was Horus that he named Warmaster in his stead. But ambition and pride now fester within the Warmaster's heart, leading him to sedition, along with half of all the Legiones Astartes.

    Horus the Warmaster is here depicted at the height of his glory, wielding the Warmaster's Talon and the great power maul Worldbreaker, and wearing a unique suit of Terminator armour known as the Serpent's Scales. This model stands atop a scenic base depicting a ruined Imperial balustrade and stone staircase, and is also provided with a smaller, removable base for gaming use.

