    Renowned throughout the Legions as an exemplary swordsman, Captain Lucius is hailed as the greatest blade of the III Legion. Though his pursuit of perfection in the art of personal combat is undeniable, Lucius fights primarily for himself – to hone his excellence and prove his superiority over the rest of the galaxy. The ambitions of the Faultless Blade have become an obsession, laid bare for all to see in the self-inflicted scars that mar his once-perfect features. For Lucius, the cataclysmic tragedy of the civil war engulfing humanity is simply the stage of a cosmic theatre – a grand opportunity for him to carve his legend in blood.

