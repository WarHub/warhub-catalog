  description: |-
    Perhaps the oldest order of Assassins that operate with Imperial sanction, the Clade Adamus draws its roots from the forbidden blade-master traditions of the Panpacific Terran region. To practice the ways of the Clade Adamus is to study the enemy, to learn their martial language, and to reflect it against them, countering their strengths and revealing their weaknesses. When the lesson is complete, the killing blow is struck. Though its history is shrouded by the losses of the Dark Age of Technology, scholars have posited that name of the Clade Adamus stems from an ancient theologic provenance, meaning 'the first blades'.

    This multipart resin kit builds one Clade Adamus Assassin, an Assassinorum agent in the employ of the Imperial Regent. Clad in a sleek body glove suit with a sinister full-face mask, this supreme martial artist is posed in a dynamic lunge, dashing backwards as they fire explosive bolts and envenomed darts from their needlespine blaster. Their other hand is ready to draw the nemesii blade sheathed on their back, to sever the head of an enemy commander with a perfect killing blow.

    This kit comprises 9 resin components, and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Jaghatai Khan, Primarch of The White Scars Legion
  productCode: prod4830218-99863001655
  sku: 99863001655
  productType: character
  priceGbp: 103
  url: https://www.warhammer.com/en-GB/shop/jaghatai-khan-primarch-of-white-scars-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99863001655_HHJaghataiKhanPrimWhiteScarsLeadDisplay.jpg
  status: current
  description: |-
    Jaghatai Khan is the unexpected storm – a sudden and devastating gale that comes and goes as it pleases. Of all his brothers, he found the Great Crusade most to his liking, an endless hunt in the dark places of the galaxy. As the Great Crusade raged across the galaxy, he sat at its heart, always fighting and always on the move, laughing as he killed. Yet the Great Khan is no simple berserker, for in even the simplest task, he seeks perfection through discipline. His is the quiet competence of a master, seeking no acclaim from others, but only the satisfaction to be found in a perfect stroke of the sword or a well-placed word.

    This multipart resin kit builds Jaghatai Khan, the hallmark of his Legion, for your White Scars armies in games of Warhammer: The Horus Heresy. In one hand, he wields his signature weapon, the White Tiger Dao. His armour, the bespoke and exquisite Wildfire Panoply, is wrought with incredible, ornate detail. Over it, he wears a long, flowing cloak, befitting his status as leader of the White Scars. This miniature will provide an excellent challenge for painters, featuring a wide variety of finely sculpted details. His face is determined yet serene, and along with his pose, it captures the majesty of Jaghatai, perhaps the greatest warrior and tactician of all the Primarchs. As well as a 40mm gaming base, complete with a rocky outcropping, he is also supplied with a 60mm diorama base depicting a crumbling fortification with a dead Death Guard Traitor in MKIII armour.

    This kit comprises 26 resin components, 1x Citadel 40mm Round Base, and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
