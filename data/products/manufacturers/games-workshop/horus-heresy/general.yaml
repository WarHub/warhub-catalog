- name: Rogal Dorn, Primarch of the Imperial Fists Legion
  productCode: prod3730198-99863001595
  sku: 99863001595
  productType: character
  priceGbp: 103
  url: https://www.warhammer.com/en-GB/shop/Rogal-Dorn-Primarch-of-the-Imperial-Fists-Legion-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101595_RogalDorn01.jpg
  status: current
  description: |-
    A being of thunderous zeal and stone made manifest, Rogal Dorn believes in his father’s dream for the Imperium without reservation and without question. To the Primarch of the VII Legion, there is no higher purpose to the existence of the Legiones Astartes than the unification of Humanity, and its illumination by the Imperium’s ideals. This resolution drives Dorn and his Legion ever onwards, never compromising, never stinting in any aspect of their duty. The stone in Dorn's soul allows him to do whatever the Emperor requires of him, making him both a master of defence, and an indomitable fighter on the attack.

    This multipart resin kit builds Rogal Dorn, a brutal warrior and experienced leader for your Imperial Fists armies in games of Warhammer: The Horus Heresy. This is a miniature of exceptional detail, befitting Dorn’s status – his auric armour is absolutely covered in beautiful sculpted details such as multiple Imperial Eagle motifs, making this miniature a rewarding challenge for expert Warhammer painters. His bare head, with his expression set into a determined scowl, is framed by an eagle crest, and a large cloak billows behind him. His chainblade, Storm’s Teeth, is clutched in both hands, resting point-down on the ground at Dorn's feet. The Voice of Terra is stowed safely in a holster on his hip. The scenic display base that Rogal Dorn’s gaming base fits into depicts a shattered urban environment with the corpse of a Space Marine, and the scattered remains of another, prominently displayed.

    This kit comprises 24 resin components, 1x Citadel 40mm Round Base, and 1x Citadel 105mm by 70mm Oval Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
