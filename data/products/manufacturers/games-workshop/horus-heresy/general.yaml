    This multipart resin kit builds one Legion Praetor, a finely detailed commander for the Word Bearers Legion. Clad in corrupted artificer armour etched with countless Colchisian runes, this warrior is covered in details displaying his dark allegiance – from his flame-like armour trim and iron halo, to the eldritch tomes fitted at his belt and shoulderpad. Armed with a plasma pistol and a decorated power sword, he makes for an excellent centrepiece miniature. The kit includes a choice of two different heads – a bare head with a bionic eye and surgical staples, and a crested helmet etched with further symbols.

