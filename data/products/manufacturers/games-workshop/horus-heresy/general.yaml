- name: Constantin Valdor, Captain-General of the Legio Custodes
  productCode: prod3730200-99863008197
  sku: 99863008197
  productType: character
  priceGbp: 86
  url: https://www.warhammer.com/en-GB/shop/Constantin-Valdor-Captain-General-of-the-Legio-Custodes-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99863008197_ConstantinValdorCaptainGeneralofLegioCustodesUPDATE1.jpg
  status: current
  description: |-
    Constantin Valdor sits at the right hand of the Emperor as his most trusted companion and guardian, a watchman of purpose and all but unmatched fighting skill. Such is Valdor’s martial power and superhuman physical and mental abilities that there are those, even within the Imperial Court, who have in whispers called him ‘Primarch’ in all but name. This is no doubt a disingenuous claim, for Valdor was made and trained to serve a different and far more focused purpose, that of Lord Commander of the Custodian Guard. To Valdor, the petty concerns of conquest and glory, dominion and victory are as nothing when compared to his own sworn duty.

    This multipart resin kit builds Constantin Valdor, a legendary warrior and veteran commander for your Talons of the Emperor armies in games of Warhammer: The Horus Heresy. This is an exceptionally detailed miniature, which painters will delight in tackling – there’s barely any flat surface at all on his ornate power armour, with skulls, eagles and lightning bolts modelled finely on every panel. Chains, furs, and strips of cloth feature heavily, with even the greaves featuring sculpted buckles and faces. Over the left shoulder is mounted the head of some great horned creature, while a heavily augmented bird sits on the right. Constantin’s head is bare, with cabling running from his jaw and temples, connecting him to his power armour. He wields the Apollonian Spear, which incorporates a bolter and a power blade capable of reducing anything it touches to its component molecules. The miniature's base is made up of three components – a 40mm round base featuring rocks, ruins and remains upon which Constantin is posed, a 60mm scenic round base providing a backdrop, and a further outcrop which is used to lock the model into place.

    This kit comprises 17 resin components, 1x Citadel 40mm Round Base, and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

