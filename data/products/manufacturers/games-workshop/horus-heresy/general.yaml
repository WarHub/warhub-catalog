    Born on Cthonia and recruited from the maze of tunnels below the planet's surface, Vheren Ashurhaddon quickly gained a reputation amongst the Luna Wolves as a skilled fighter. His dedicated zeal, pioneering tactics, and daring assaults earned him both the respect of his brethren and the moniker 'The First Reaver'. Though as much a Traitor as his fellow Sons of Horus, Ashurhaddon sees no need to sully Cthonian superiority with otherworldly powers – and on the eve of Horus' invasion of the Sol System, he departed to reconquer Cthonia, secure the XVI Legion’s future, and rekindle its old glory.

    This multipart resin kit builds Vheren Ashurhaddon – Master of the True Sons, and Cadre-captain of the Sons of Horus Legion. This embittered raider wields a curved dagger alongside the Axe Serpentis – a Carsoran power axe said to have been crafted by Horus himself from the weapons of slain Cthonian gang lords. A pair of bolt pistols are holstered at his hips, modified to fire armour-piercing banestrike ammunition, and he's clad in the Panoply of the Void – his personal suit of armour, decorated with the symbols of his Legion and topped by a banner strung with trophy-skulls. He comes with a choice of two heads – a Cthonian war-helm or a bare head, both with a flowing top-knot.

