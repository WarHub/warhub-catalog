  description: |-
    The Cenobites of the Orders Militant are among the finest warriors of the First Legion, and each bears the most potent secrets and powerful weapons gathered by the Dark Angels over their many long years of battle. The Cenobites of the Inner Circle are called upon when that knowledge is the key by which the Legion might unlock victory in the most terrible of battlefields and most dire of campaigns. It is by the edges of their well-honed blades that the Dark Angels have conquered enemies beyond count.

    This multipart resin kit builds five Inner Circle Knights Cenobium of the Dark Angels Legion. Clad in the most exquisite Cataphractii Terminator Armour, each Cenobite carries a unique Terranic greatsword and is covered in the iconography of the Dark Angels Legion. These proud warriors are found wherever the fighting is the most brutal, protected by their ornate armour while their wrist-mounted plasma-casters destroy enemy infantry with ease.

