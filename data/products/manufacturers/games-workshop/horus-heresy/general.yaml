  description: |-
    Prideful and impetuous, Geigor Fell-Hand is a Thegn of the Space Wolves with a long record of valorous deeds. Yet despite his skill and fury as a warrior, Geigor's record as a commander is marred by a number of battlefield reversals – most notably the loss of his entire war pack while fighting alongside the Thousand Sons, after his allies retreated in the face of an Ork onslaught. Geigor harboured a bitter grudge against the XV Legion for this perceived betrayal and leapt at the chance to punish them in the Censure of Prospero.

    This multipart plastic kit builds Geigor Fell-Hand, Commander of the Broken Claw. Armed with his relic frost claw, The Fell-Hand, and decorated with the furs and knotwork characteristic of Fenris, Geigor is a devastating close combat fighter with a particular fondness for hunting down enemy leaders alongside a retinue of elite warriors. As a Thegn of the Space Wolves, Geigor is a commander to equal any other Legion's Praetors, making him an ideal choice to lead a Space Wolves army in games of Warhammer: The Horus Heresy when fast, brutal assaults are the best course of action.

