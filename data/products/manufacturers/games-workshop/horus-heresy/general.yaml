    Rampager squads were shock assault units, formed from the most bloodthirsty warriors in a Legion already known for its fury in battle. All possessed the prohibited psycho-surgery that drove them to ever greater heights of rage, some too far gone to be left unrestrained between battles. They were simply known as the Caedere or the ‘Butchers’ by the rest of their Legion.

