    This multipart resin kit builds Archmagos Draykavac on foot, or in his floating abeyant, for your Dark Mechanicum armies in games of Warhammer: The Horus Heresy. This infamous traitor is ideal for commanding your Taghmata as it cuts a bloody swathe across the Imperium. The abeyant can be armed with your choice of a graviton gun, conversion beamer, rotor cannon, or meltagun. The kit comes with two head options and can alternatively be built as an Archmagos on foot, or on abeyant.

