    The Grave Wardens bring a lingering, ugly death to whatever crosses their paths. As the traitorous Death Guard are unleashed on the Imperium in the wake of the Warmaster’s betrayal, weapons which had previously only been used against the foulest and most resilient forms of alien life are turned upon Humanity instead, and the Death Guard’s tally of murder grows world by world.

    This multipart resin kit builds five Grave Wardens, veterans armed with esoteric weapons for your Death Guard armies in games of Warhammer: The Horus Heresy. Clad in modified Terminator armour and each armed with an assault grenade launcher, they are ideal for close-ranged encounters. Alternatively, one can be armed with a heavy alchem flamer, the squad leader can take a combi-weapon, and there are parts to upgrade any member of the squad's power fists into a chainfist. The heads, torsos, and weapons are interchangeable, making it easy to customise your toxin-spreading warriors.

