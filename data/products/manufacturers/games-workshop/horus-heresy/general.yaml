  status: current
  description: |-
    The mercurial and prideful Fulgrim, the Phoenician, strives to be a paragon of all things. He has passed on his values to his Legion, for whom they became a remorseless dedication to perfection in warfare. Such all-consuming ambition came at the price of vainglory and hubris in both the Emperor’s Children Legion and their master, which led to them all being swiftly ensnared in the Warmaster’s conspiracy against the Emperor.

    Fulgrim is modelled in the thick of bloody combat, his arrogance and condescension given way to fratricidal anger and battle-born wrath. This dynamic miniature showcases the full opulence of the III Legion primarch, here captured leaping above the charred rock of Isstvan V. The Phoenician presents both a painting challenge for those Warhammer hobbyists who chase perfection, and an exquisite centrepiece for any III Legion collection. He is armed with the Blade of Laer, the daemonic weapon which he used to slay his brother primarch, Ferrus Manus of the X Legion. He is sculpted as wearing the Gilded Panoply, his personal master-crafted armour.

