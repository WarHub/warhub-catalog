  description: |-
    Armillus Dynat, Harrowmaster of the Alpha Legion, is a formidable strategist with a penchant for unorthodox and highly intricate attack plans, often designed to pull apart and maim enemy formations before a killing blow is delivered – indeed, his clash with the Ultramarine Marius Gage over the issue is among the few confirmed appearances of this mysterious commander. A master of integrated fast armour and close air support tactics, Dynat wields his weapons much like his strategies – an ostentatious but deadly flurry that disguises a thunderstrike death-blow.

    This multipart resin kit builds one Armillus Dynat – the Harrowmaster of the Alpha Legion. This sinister commander is clad in highly detailed personal artificer armour, decorated with sculpted scales, serpents, and the sigils of the XX Legion – all set off by a flowing cape and loincloth, with tactical comms devices incorporated into the suit. His belt is strung with grenades, including exotic venom spheres and a phosphex bomb, but his primary weapons are the Prince and the Prophet – a sheathed power sword held at his waist, and a mighty thunder hammer adorned with his Legion's hydra armourial.

    Armillus Dynat is posed above the broken cybernetic limbs of a fallen battle-automata – as part of The Horus Heresy Character Series, he can be slotted into an eye-catching display base featuring the sundered walls and machines of his victory at Paramar V, making for a magnificent centrepiece to your collection.

    This kit comprises 17 resin components, presented in a black Horus Heresy Character Series box, and is supplied with a Citadel 32mm Round Base as well as a Citadel 50mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
