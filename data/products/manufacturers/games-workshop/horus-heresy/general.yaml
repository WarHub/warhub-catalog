    Endryd Haar was among the first initiates of the XII Legion, but was thought long-dead by the time the World Eaters rebelled, lost alongside his warriors in the Great Crusade. Haar returned to find the Imperium riven by civil war, and has sworn vengeance against both the Warmaster and his former brothers. The Riven Hound now fights as a fierce Loyalist, leading the Fangs of the Emperor – a warband of Blackshields, shorn of all Legion insignia and honours, accepting any mission, whatever the odds of survival, so long as it will spill the blood of the enemy.

