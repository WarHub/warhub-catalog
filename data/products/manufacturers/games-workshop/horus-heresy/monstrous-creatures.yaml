  description: |-
    Vorax are hunter-killer units, created on pre-Imperial Mars to fulfil the role of a search-and-destroy weapon capable of exterminating rogue machines, dispatching mutant vermin, and culling surplus population. This class of battle-automata is known to possess particularly predatory and vicious Cybernetica cortex engrams – such are the bestial instincts that sleep within their mechanical bodies that numerous override cantos must be hardwired into their programming to prevent these tireless hunting machines from devolving into the feral renegades they prey upon.

    This multipart resin kit builds three Vorax battle-automata, predatory robots armed with paired rotor cannons and hooked power blades. These stalking, insect-like machines feature plenty of mechanical details, from their trailing ammo feeds to the pistons on their deadly limbs, and can be built in a variety of poses. Each Vorax also has a powerful lightning gun mounted on its upper carapace – the kit includes an optional irad-cleanser to replace one of these weapons.

    This kit comprises 62 resin components, and is supplied with 3x Citadel 60mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
