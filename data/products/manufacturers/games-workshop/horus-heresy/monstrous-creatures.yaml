  description: |-
    Called forth by the dark rites of the traitorous Word Bearers Legion, the Ruinstorm unleashed a vast horde of the malevolent denizens of the Warp upon the Imperium. Most deadly among them were those that came to be known as the Daemon Princes of the Ruinstorm. Among their number was the vile, pestilent and ever-hungry Cor’bax Utterblight.

    Those who have witnessed this loathsome disciple of Nurgle in action tell of a tidal wave of rot and disease which spills before Cor’bax as he enters the battlefield. Life corrupts at his touch, and any mortals unfortunate enough to survive are snapped up whole within his gaping maw to slowly perish and fuel the gifts of Nurgle Cor’bax will generously bestow upon the next world he attacks.

    This multipart resin kit builds Cor’bax Utterblight, a cruel and corpulent creature for your Daemons of the Ruinstorm armies in games of Warhammer: The Horus Heresy. Armed with reaping claws, he sweeps the bodies of the dead and still living into his gaping mouth, before spewing them back out in a torrent of highly acidic vomit. Cor’bax stands more than twice the height of a man, and his body is festooned with tentacles, spikes, and the remains of those he has devoured, whilst a bloated tongue protrudes from his tooth-filled maw. A trio of Nurglings are also included to make it clear who his patron deity is.

    This kit comprises 16 resin components, is presented in a black Horus Heresy Character Series box, and is supplied with 1x Citadel 120mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
