  url: https://www.warhammer.com/en-GB/shop/Legion-Praevian-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550101612_LegionPraevian01.jpg
  status: current
  description: |-
    Praevians are the keepers of the Legion’s bound automata, those soulless machines sworn to the Legion’s service and inducted into their ranks as honorary Legionaries after decades of service. Initiated into the rites of the Mechanicum’s Cybernetica Tech-arcana, these officers oversee the maintenance and programming of their charges and ensure that loyalty to the Legion and its traditions is enshrined in their core logic.

    This multipart resin kit builds a Legion Praevian, a master of robotic war machines for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. They allow you to add devastating Battle-automata to your force, opening up new tactical options. This miniature comes with a choice of two heads – helmeted or bare.

    This miniature has no Legion-specific markings, so you can use it in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit comprises 17 resin components and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

