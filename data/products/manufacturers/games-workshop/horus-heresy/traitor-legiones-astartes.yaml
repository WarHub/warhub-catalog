- name: Thousand Sons – Contemptor-Osiron Dreadnought
  productCode: prod3480360-99863002256
  sku: 99863002256
  productType: vehicle
  priceGbp: 67.5
  url: https://www.warhammer.com/en-GB/shop/Thousand-Sons-Legion-Osiron-Pattern-Contemptor-Dreadnought-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99863002256_TSOsironContemptorLead.jpg
  status: current
  description: |-
    An innovation driven by the will of Magnus himself, the Contemptor-Osiron is a truly esoteric variant of the Dreadnought chassis – one capable of medically sustaining the mind and powers of a mortally wounded psyker. Interfaced into the crowning psychometric lattice from which the Osiron takes its name, the fallen psykers of the Thousand Sons Legion walk the battlefield once more, wielding the formidable firepower and indomitable armour of a Contemptor Dreadnought alongside massive force blades and their own arcane might – with unnervingly potent results.

    This multipart resin kit builds one Contemptor-Osiron Dreadnought for the Thousand Sons Legion. This stunning psychic war machine is designed as a perfect centrepiece for the sons of Prospero, featuring the armourial and iconography of the XV Legion with tons of details such as Achean scarabs, sorcerous scrollwork and sashes, etched rows of Prosperine glyphs, and a truly magnificent ritual headdress. The Contemptor-Osiron is armed with a curved Gravis force blade, attached to a posable fist that incorporates your choice of an in-built combi-bolter or heavy flamer. This miniature's joints can be assembled to produce a range of poses, and it comes with two pairs of feet – one straight, one bent – allowing you to build it as though standing or striding forward.

    This kit includes one arm for use with its force blade, but does not include any further arm-mounted weapons for Contemptor Dreadnoughts – these are shown for illustrative purposes only. This kit comprises 29 resin components and is supplied with a Citadel 60mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
