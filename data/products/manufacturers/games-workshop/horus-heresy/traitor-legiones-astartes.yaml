    Armed with murderous, artificer-crafted lightning claws – named Mercy and Forgiveness – and micro-serrated throwing blades, Konrad Curze tears through his enemies, making short work of entire units. Despite his great size, he is a master of stealth and concealment, moving in darkness and stalking his target. Few can stand to face him, and none can look on the Night Haunter and not feel the ice of fear in their hearts.

    This imposing, highly detailed miniature depicts Konrad Curze mid-battle. Konrad’s Nightmare Mantle armour is decorated with trophies of an impressive number of kills, including skulls and flayed skin – making this miniature a unique painting challenge for even expert Warhammer hobbyists. Kurze is perched on a ruined archway that makes up part of his gaming base. He slots into a scenic display base that includes the corpses of Konrad’s latest victims, a pair of Solar Auxilia warriors, one of them torn limb-from-limb.

