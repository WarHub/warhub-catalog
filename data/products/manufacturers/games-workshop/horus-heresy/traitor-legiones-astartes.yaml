    Tyrant Siege Terminators are the vanguard of any Iron Warriors siege formation. Clad in thick Cataphractii plate and spitting a relentless hail of missiles from their armour-mounted rocket launchers, these implacable Astartes are fortress-breakers of unparalleled skill. The Tyrants possess a cold grasp of the mathematics of war, and will wade through storms of lasfire and shells without regard for their own survival, stoically smashing apart any obstacle before them in a bleak grind of chainfist and krak blast alike.

    This multipart resin kit builds five Tyrant Siege Terminators for the Iron Warriors Legion. These elite vanguard fighters wear heavy Cataphractii Terminator armour, covered with the brutal rivets, bonding studs, and numerals of the IV Legion, as well as details like armoured tassets, bionic limbs, grim skull-helms reminiscent of the Legion's symbol, and sculpted hazard stripes on certain segments of armour. This kit's components are interchangeable between models, allowing you to ensure each of your Terminators looks unique. Each Tyrant is armed with a combi-bolter, power fist, and armour-mounted rocket launcher – the kit also includes an optional omni-scope targeter, used to indicate the Siege Master unit leader.

    The kit comprises 46 resin components, and is supplied with 5x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.

