  description: |-
    Zardu Layak's true name is now lost, but he was once a devout believer in the Imperial Truth, sending countless temples and holy books to the flames. Shamed and sickened by the XVII Legion's brutal censure at Monarchia, he descended into madness and embraced the Primordial Truth – growing in both power and forbidden wisdom. Now known by a name that means 'Eater of Wisdom', the Crimson Apostle of the Word Bearers walks his bloody path accompanied by a pair of bodyguards – his Anakatis Kul, unnaturally warped Astartes possessed of daemonic strength, who cut a swathe through their master's foes with a barely controlled hunger for slaughter.

