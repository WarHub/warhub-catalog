  status: current
  description: |-
    Of all the primarchs, Alpharius is without doubt the most steeped in mystery, legend, contradiction, and deliberate falsification. Like the hydra he and his Legion take as their symbol, Alpharius commands his Legion to fight by repeated attacks from multiple and unexpected quarters. None can predict where or how the primarch will strike, what weapons he will bring to bear, or which of his many different forces will fight at his side.

    Alpharius is here clad in the Pythian Scales, a set of unique and beautiful armour. Alpharius is well-equipped for battle, with a grenade pack and master-crafted plasma blaster on his belt, and the Pale Spear in his hands. His scenic base includes an unfortunate Space Marine attempting to escape the primarch's wrath.

