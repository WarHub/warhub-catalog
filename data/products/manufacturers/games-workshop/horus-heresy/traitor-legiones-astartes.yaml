    This kit comprises 15 resin components, presented in a black Horus Heresy Character Series box, and is supplied with 1x Citadel 32mm Round Base and 2x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

