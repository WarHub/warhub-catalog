    This multipart resin kit builds one Mhara Gal Dreadnought, an unholy fusion of machine and flesh for your Word Bearers armies in games of Warhammer: The Horus Heresy. It is wracked with horrifying mutations that fuse metal and flesh – jaws splitting open its chestplate, claws and horns breaking through its armour, and a warped, jagged carapace. The Dreadnought is covered in Colchisian astrological sigils, torn pages, and a full copy of the Book of Lorgar – details that make it a truly imposing centrepiece for your Word Bearers army. Its grotesque warpfire cannon unleashes blasts of aetheric ectoplasma, while its techno-organic tainted claw crushes anything unfortunate enough to get within reach.

