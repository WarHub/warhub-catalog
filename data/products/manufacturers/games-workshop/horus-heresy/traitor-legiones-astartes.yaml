  status: current
  description: |-
    Reaver squads epitomised the Sons of Horus’ way of warfare. Influenced by the tactics of the incessant tribal warfare of Cthonia, Reaver units specialised in lightning assaults which maimed and disabled a foe, striking down leaders and sowing disorder in those who remained. Each Reaver unit was effectively a warband in its own right, and its warriors fought more as individuals than regimented soldiers.

    This multipart resin kit builds five Reavers, infamous butchers for your Sons of Horus armies in games of Warhammer: The Horus Heresy. They are ideal for taking out key enemy units and excel at getting up close and personal. These characterful miniatures are packed with Legion-specific details that emphasise the vicious nature of the Reavers. The heads and weapons are interchangeable across the miniatures, and the kit includes 5x bolt pistols, 5x chainaxes, 1x hand flamer, 1x power fist, and 1x bare head to denote your squad leader.

    This kit comprises 48 resin components and 5x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

