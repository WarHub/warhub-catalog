- name: Legion Proteus Land Speeder - Set 2
  productCode: prod4050145-99863001610
  sku: 99863001610
  productType: vehicle
  priceGbp: 69.5
  url: https://www.warhammer.com/en-GB/shop/Proteus-Pattern-Land-Speeder-Set-2-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101610_ProteusLandSpeederSet201.jpg
  status: current
  description: |-
    Mainstays of most Space Marine Legion armouries, Land Speeders are high-speed reconnaissance and rapid attack skimmers that utilise antigravity technology to achieve extraordinary battlefield mobility and speed. These lightly armoured two-man craft require the kind of reflexes that only a Space Marine can bring to bear, and rely on their extreme manoeuvrability and speed for survival. Land Speeder squadrons provide the Legiones Astartes with flexible, rapidly deployable firepower, and are often called upon to operate as a rapid reaction force, armed with a variety of specialised weapons.

    This multipart resin kit builds one Land Speeder Proteus, a classic variant of the iconic Land Speeder vehicle. This flying fighting craft can be armed with a wide variety of weapons, both mounted atop its hull and attached to an underslung turret - this set offers a volkite culverin, havoc launcher, and two heavy bolters, as well as two hunter-killer missiles that can be separatedly equipped to the sides of the Land Speeder. The kit also includes two Space Marine crew, clad in Mark IV power armour - one gunner and one pilot, both compatible with a range of Space Marine and Legion accessories.

    This kit comprises 43 resin components, and is supplied with a Citadel 60mm Round Base with a Citadel Flying Stem. This miniature is supplied unpainted and requires assembly - we recommend using Citadel Colour paints.
