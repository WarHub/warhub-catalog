  description: |-
    The Phoenix Guard form an elite cadre, serving primarily as Fulgrim’s personal retinue. They are ceremonial honour guards and sacred aquilifers, replete in polished, tyrian-chased armour and bearing gold-chased arms of intricate manufacture. On the field of battle, the Phoenix Guard are no less impressive. Providing an impenetrable ring of courage and steel, they bar the approach of any enemy who dares challenge their Primarch.

    This multipart resin kit builds five Phoenix Terminators, warriors of the highest standard for your Emperor's Children armies in games of Warhammer: The Horus Heresy. Resplendent with fine details and the iconography of their Legion, each member of the squad is armed with a Phoenix power spear – ideal for driving through the imperfect defence of your foes. The arms are interchangeable across the miniatures, making it easy to customise your Primarch's bodyguards.

