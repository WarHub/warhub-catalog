    This multipart resin kit builds five Justaerin Terminator bodies for your Sons of Horus armies in games of Warhammer: The Horus Heresy. From Isstvan III to the Siege of Terra, they are always at the forefront of the fighting, and are ideal for getting stuck in on the tabletop. The heads, torsos, arms, and shoulder pads are interchangeable across the miniatures, making it easy to customise your speartip strike. Please note that the weapons shown in some images are available separately.

    This kit comprises 40 resin components and 5x Citadel 40mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Legion Dreadnought Drop Pod
  productCode: prod4150185-99860101617
  sku: 99860101617
  productType: vehicle
  priceGbp: 84
  url: https://www.warhammer.com/en-GB/shop/Dreadnought-Drop-Pod-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101617_SMLegionDreadnoughtDropPod01.jpg
  status: current
  description: |-
    Legion Dreadnought drop pods are larger than the general service drop pods employed by the infantry of the Legiones Astartes, with a sturdier frame and more powerful engine designed to support the formidable machine shell of a Dreadnought. As a result, these armoured capsules strike with unprecedented speed, making a dangerously meteoric descent from orbit to deliver their lethal cargo. Legions value these drop pods both for their ability to deploy Dreadnoughts safely onto the battlefield, and for the sheer impact of a mighty combat walker arriving from the skies.

    This multipart resin kit builds one Legion Dreadnought Drop Pod, a transport which can be used to deploy the various Dreadnoughts available to Legiones Astartes armies. This model features a detailed internal cargo bay, as well as glueless, hinged assembly on all three doors, allowing you to open and close them as you see fit. This model has no Legion markings, allowing Warhammer hobbyists to paint it in whichever colours they choose.

    This set comprises 21 resin components. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    You will need a copy of the Warhammer: The Horus Heresy – Age of Darkness Rulebook and either the *Liber Astartes: Loyalist Legiones Astartes Army Book* or *Liber Hereticus: Traitor Legiones Astartes Army Book* to make full use of this model.
- name: Night Lords Legion Praetor in Tartaros Terminator Armour
  productCode: prod4130171-99853002296
  sku: 99853002296
  productType: character
  priceGbp: 35.5
  url: https://www.warhammer.com/en-GB/shop/Night-Lords-Praetor-in-Terminator-Armour-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550102296_NLPraetorTerminatorArmour01.jpg
  status: current
  description: |-
    Praetors are the mightiest warriors and battle leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. These lords of the Imperium hold the power of life and death over whole worlds, with the direct control of entire war fleets and armies in their hands. Each is a vastly experienced warrior and warlord, unique in character, who has writ a legend in blood for themselves, and carries into battle the finest wargear and weapons known to humanity. In their ranks can be found Chapter Masters and Lord Commanders, First Captains, Khans and Tribunes as the traditions of their Legions dictate. They are the masters of war and have commanded the hosts of the Great Crusade that have conquered worlds unnumbered.

    This multipart resin kit contains the components necessary to assemble a Night Lords Praetor in Tartaros Terminator Armour. Posed at a standstill and firing his wrist-mounted volkite serpenta, he holds a chainglaive in his left hand and his armour is adorned with all manner of grisly trophies.

    The kit comes in 13 components – including a choice of bare or helmeted heads – and is supplied with a 40mm round base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    This resin modelling kit is not a toy – it is a collectible item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Legion Praevian
  productCode: prod4050154-99853001612
  sku: 99853001612
  productType: character
