  description: |-
    The Palatine Blades existed outside of the rigid formations of the Emperor’s Children’s military order – a warrior fraternity drawn from among the finest swordsmen of the Legion. They were an elite duelling society to whose ranks many aspired and on whom Fulgrim looked with particular favour and interest.

    This multipart resin kit builds five Palatine Blades, master duellists for your Emperor's Children armies in games of Warhammer: The Horus Heresy. Their weapons are created by a master swordsmith to the specifications of its wielder. In the hands of the master swordsmen of the Emperor’s Children, these perfectly weighted blades cut effortlessly and with deadly precision. The heads, shoulder pads, and backpacks are interchangeable across the miniatures, offering a degree of customisation to your superior swordsmen.

