  description: |-
    Ezekyle Abaddon, First Captain of the Sons of Horus and Master of the Justaerin, was one of the most renowned and fanatically loyal commanders of the XVI Legion. A hulking brute of a Space Marine, whispered rumour had long speculated that he was the clone-progeny of the Warmaster himself. Regardless, Abaddon walked willingly into treachery alongside his master, slaughtering many of his former comrades on the blasted fields of Isstvan III, and soon his name was among the most feared and despised of the traitor Horus’s followers.

    Garviel Loken once commanded the 10th Company of the Luna Wolves Legion, later the Sons of Horus. He was a well-respected and senior commander, and one of Horus’s closest advisors. His idealism and staunch loyalty to the Emperor and Humanity saw him selected to command the Sons of Horus contingent in the assault against the recidivists of Isstvan III. When the true scope of betrayal was revealed, Loken and his comrades cast aside their Legion name and proclaimed themselves Luna Wolves once more.

