    The Rhino is the most widely used armoured personnel carrier in the Imperium. Produced in the thousands and with several distinct patterns in common use – the Deimos being most widespread in the Space Marine Legions, it has also served as the basis for other war machines.

    This multipart resin kit consists of two Deimos pattern Rhino doors, displaying Death Guard iconography, to upgrade your transports in games of Warhammer: The Horus Heresy. Add resilient style to your mechanised support and let your enemies know it's the XIV Legion that spells their doom.

