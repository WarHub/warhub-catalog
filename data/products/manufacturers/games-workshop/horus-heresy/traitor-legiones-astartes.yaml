- name: Magistus Amon
  productCode: prod3530323-99863002259
  sku: 99863002259
  productType: character
  priceGbp: 58.5
  url: https://www.warhammer.com/en-GB/shop/Thousand-Sons-Magistus-Amon-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102259_MagistusAmon01.jpg
  status: current
  description: |-
    Magistus Amon was known well beyond his Legion during the time of the Great Crusade, for he often served both as his Primarch’s equerry and emissary to other Space Marine Legions and the Imperium’s circles of power. The Keeper of the Keys is nevertheless a solitary and mysterious figure, even to his brothers – he is said to have served as Magnus’ tutor on Prospero, and joined the Thousand Sons as both a cunning warrior and powerful psyker. Many believe he also serves as master of his Legion’s intelligence gathering organisation, known as the ‘Hidden Ones’ , employing his talents to blind the eyes of those who would look too deeply into the affairs of the Thousand Sons.

    This multipart resin kit builds one Magistus Amon, Captain of the Ninth Fellowship for the Thousand Sons Legion. He wears the Armour of Shades, his beautifully-detailed artificer armour, which features psychically-charged Prosperan iconography and an ornate wing extending from one pauldron. Arcane tomes and scrolls are tucked into his flowing robes, which billow dramatically as he leaps into combat, suiting his dynamic pose and furious expression. One hand is outstretched to channel psychic power, while the other clutches the Reliquary of Dust – his powerful Achean-pattern force staff, which contains the psychic remains of deadly mind-parasites. This model is posed atop scattered rubble and the broken armour of a fellow Thousand Sons warrior, but can be slotted into a stunning scenic display base featuring the ruins of Prospero, making for a magnificent centrepiece to your collection.

    This kit comprises 9 resin components, presented in a black Horus Heresy Character Series box, and comes supplied with 1x Citadel 32mm Round Base as well as 1x Citadel 50mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    You will need a copy of the *Warhammer: The Horus Heresy – Age of Darkness Rulebook* and the *Liber Hereticus: Traitor Legiones Astartes Army Book* to make full use of this model in games of Warhammer: The Horus Heresy.
- name: Castellax-Achea Automata with Asphyx Bolt Cannon
  productCode: prod3480267-99853008181
  sku: 99853008181
  productType: vehicle
  priceGbp: 57.5
  url: https://www.warhammer.com/en-GB/shop/Castellax-Achea-Battle-automata-with-Mauler-pattern-Bolt-cannon-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550108181_CastellaxAceaMaulerCannon01.jpg
  status: current
  description: |-
    The Thousand Sons Legion acknowledge the usefulness of the unliving might of battle-automata as obedient, resilient, and ultimately expendable shock assault units. As with every other facet of warfare, the use of such battle-automata is something the Legion believes they can improve upon with their psychic arts. The Castellax-Achea is governed by a psi-sensitive crystal matrix – an illegal innovation which allows the Legion's psykers to directly manipulate these robots like murderous puppets with a degree of limited self-will.

    This multipart resin kit builds one Castellax-Achea Automata, armed with an Asphyx bolt cannon, for your Thousand Sons armies in games of Warhammer: The Horus Heresy. This elegant battle-automata is covered in the iconography of the Thousand Sons, such as sculpted flames and scarabs, as well as mechanical details including exposed cabling, hydraulic pistons, and the psi-sensitive crystal that serves as the robot's brain. It also boasts an impressive degree of posability, with a great range of motion in the legs, waist, and arms, as well as sharpened Achea force claws which can be modelled closed or open and include two in-built bolters. The automaton's primary weapon, its shoulder-mounted Asphyx bolt cannon, is loaded with psycho-reactive Asphyx shells by an impressive ammo feed connected to the miniature's back.

    This kit comprises 28 resin components and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Legion Moritat with Volkite Serpenta
  productCode: prod3480265-99853001543
  sku: 99853001543
  productType: character
  priceGbp: 29.5
  url: https://www.warhammer.com/en-GB/shop/Legion-Moritat-with-Volkite-Serpenta
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550101543_MoritatVolkiteSerpenta01.jpg
  status: current
  description: |-
    Said by some to be no less than death incarnate, and by others to be dishonourable murderers with no place in the Imperium’s order of battle, Moritats are lone killers operating outside the Legion’s usual command structures at the behest, or at least sufferance, of its high commanders. Regarded usually as dangerously unstable outcasts – perhaps created by some seldom-exposed flaw of gene-seed or indoctrination – they are also savage and proficient warriors, having become one with the act of killing, honing their superhuman reflexes to gun down the foe at close quarters.

    This multipart resin kit builds one Legion Moritat equipped with two volkite serpenta and a jump pack. This rugged operator is clad in patched, reinforced armour, with the symbol of the Moritat on his right shoulder pad, and a sinister targeting system built into his helm. His volkite serpenta are each powered by hefty feeds that connect to his jump pack – perfect for leaping into position to unleash his deadly firepower. His elevated pose is supported by a piece of fallen rubble, including details such as ammo shells and the helmet of a fallen Space Marine. This model has no Legion markings, allowing Warhammer hobbyists to paint it in whichever colours they choose.

    This kit comprises 10 resin components and is supplied with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    You will need a copy of the *Warhammer: The Horus Heresy – Age of Darkness Rulebook* and the *Liber Astartes: Loyalist Legiones Astartes Army Book* or *Liber Hereticus: Traitor Legiones Astartes Army Book* to make full use of this model in games of Warhammer: The Horus Heresy.
- name: Nostraman Chainglaives Upgrade Set
  productCode: prod3380277-99853002252
  sku: 99853002252
  productType: single_kit
  priceGbp: 21
  url: https://www.warhammer.com/en-GB/shop/Night-Lords-Legion-Nostraman-Chainglaives
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550102252_NightLordLegionNostramanChainglaives01.jpg
  status: current
  description: |-
    Nostraman Chainglaives are designed as much to horrify the foe with their use as to inflict harm. The Night Lords favour these weapons over all others, and when they take to the field of battle, it is to the sound of growling chainblades and howling motors. Promising a painful and gruesome death to their victim, the Chainglaive was a weapon of choice among the officers of the Legion.

    This multipart resin kit lets you upgrade up to five miniatures with Nostraman Chainglaives, brutal weapons for your Night Lords armies in games of Warhammer: The Horus Heresy. There are two chainglaives wielded in two hands, two wielded one-handed for Space Marines in power armour, and a single chainglaive in a one-handed grip for a Space Marine in Terminator armour. Also included are the arms needed for the two-handed chainglaives, two open power-armoured left hands, and one open right hand for Terminator armour.

    This kit comprises 12 resin components. These parts are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Leviathan Cyclonic Melta Lance
  productCode: prod3100186-99853001516
  sku: 99853001516
  productType: vehicle
  priceGbp: 17.5
  url: https://www.warhammer.com/en-GB/shop/Leviathan-Cyclonic-Melta-Lance
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550101516_LeviathanCyclonicMeltaLance01.jpg
  status: current
  description: |-
    The ranged weapons of the Leviathan pattern Siege Dreadnought were designed to be used at closer range than those carried by most classes of dreadnought. The Leviathan Cyclonic Melta Lance is a rapid cycling melta weapon, firing faster, with more powerful shots than a standard multi-melta, though at the reduced range common to Leviathan pattern weaponry.

    The Leviathan Cyclonic Melta Lance is a multi-part resin kit that can be built as either the left or right weapon arm for the Leviathan pattern Siege Dreadnought.
- name: Leviathan Siege Claw
  productCode: prod2990360-99853001486
  sku: 99853001486
  productType: vehicle
  priceGbp: 17.5
  url: https://www.warhammer.com/en-GB/shop/Leviathan-Pattern-Siege-Dreadnought-Siege-Claw
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550101486_LeviathanPatternSiegeClaw04.jpg
  status: current
  description: |-
    The close combat weapons of the Leviathan pattern Siege Dreadnought were developed to be even more destructive than those of other dreadnoughts. The Leviathan Siege Claw was designed to sever flesh and bone, slicing the Leviathan’s foe apart in a single cut. It also incorporates a melta-gun and, as with all of the Leviathan’s close combat weapons, excels at tearing through the walls of enemy fortifications.

    The Leviathan Siege Claw is a multi-part resin kit that can be built as either the left or right weapon arm for the Leviathan pattern Siege Dreadnought.
- name: Lord Commander Eidolon
  productCode: prod2920170-99863002232
  sku: 99863002232
  productType: character
  priceGbp: 58.5
  url: https://www.warhammer.com/en-GB/shop/Lord-Commander-Eidolon-of-the-Emperor-s-Children
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102232_HorusHeresyLordCommanderEidolonUPDATE1.jpg
  status: current
  description: |-
    Lord Commander Eidolon was once hailed as the exemplar of all that the Emperor’s Children aspired to. If Eidolon had any imperfection, it was overconfidence, a characteristic that bore rotten fruit as it was twisted into overweening arrogance. In striving towards the perfection embodied by his Primarch, Eidolon submitted himself to the attentions of Chief Apothecary Fabius, receiving augmentations that allowed him to project a psycho-sonic dirge as formidable as any weapon.

    This multipart resin kit builds Lord Commander Eidolon, a skilled and aggressive warrior for your Emperor's Children armies in games of Warhammer: The Horus Heresy. Armed with a masterwork hammer, he specialises in smashing his foes in a single blow, while his jump pack ensures he can get wherever he is most needed on the battlefield. This miniature comes with a removable display base depicting the remains of a shattered Deredeo pattern Dreadnought, and also includes a choice of heads – one helmeted and one bare.

    This kit comprises 12 resin components, 1x Citadel 50mm Round Base, and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Mhara Gal Dreadnought
  productCode: prod2840148-99863002221
  sku: 99863002221
  productType: vehicle
  priceGbp: 76
  url: https://www.warhammer.com/en-GB/shop/Word-Bearers-Mhara-Gal-Tainted-Dreadnought
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102221_MharaGalTaintedDreadnought01.jpg
  status: current
  description: |-
    The Mhara Gal is terrifying in both its otherworldly aspect and its unearthly power – a Contemptor Dreadnought twisted by unholy practices and daemonic power. This machine-creature's fire-blackened armour runs like molten wax as its plates crack open to pour out blood and choking black flames. The bonds of reality bend and buckle at its step, the ground itself seeming to shudder, flesh blistering and metal burning with black empyreal fire at its passing. The first of these cybernetic travesties is believed to have been created from one of the original Gal Vorbak, grievously wounded at Isstvan V and punished with life beyond death in a Dreadnought shell.

    This multipart resin kit builds one Mhara Gal Dreadnought, an unholy fusion of machine and flesh for your Word Bearers armies in games of Warhammer: The Horus Heresy. It is wracked with horrifying mutations that fuse metal and flesh – jaws splitting open its chestplate, claws and horns breaking through its armour, and a warped, jagged carapace. The Dreadnought is covered in Colchisian astrological sigils, torn pages, and a full copy of the Book of Lorgar – details that make it a truly imposing centrepiece for your Word Bearers army. Its grotesque warpfire cannon unleashes blasts of aetheric ectoplasma, while its techno-organic tainted claw crushes anything unfortunate enough to get within reach.

    This kit comprises 14 resin components and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Death Guard - Deathshroud Terminators
  productCode: prod2680615-99863002139
  sku: 99863002139
  productType: single_kit
  priceGbp: 67.5
  url: https://www.warhammer.com/en-GB/shop/Death-Guard-Deathshroud-Terminators
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590102139_DeathGuardDeathshroudTerminators01.jpg
  status: current
  description: |-
    The Deathshroud are an elite cadre of warriors within the XIV Legion, singled out by their Primarch for skill at arms, fearlessness, and proven endurance. Often drawn from those Legionaries who survived where their comrades had fallen, the Deathshroud form Mortarion's silent bodyguard and faceless enforcers – each sworn to absolute secrecy, and listed as dead on all official rolls. Clad in hulking Terminator armour and wielding the power scythe favoured by their master, the Deathshroud embody the ominous fame of their Legion.

    This multipart resin kit builds five Deathshroud Terminators, the chosen elite of the Death Guard Legion. Armed with vicious power scythes and wrist-mounted alchem pistols fed by thick tubing, these terrifying warriors stand out as a battlefield centrepiece. Their unique Tartaros Terminator armour is rife with studs, segmented skirts, and industrial grilles and tubing befitting XIV Legion's spartan philosophy – each also sports the Death Guard's skull-armourial, and one features a crossed-scythes symbol sculpted onto a greave.

    This kit comprises 45 resin components and is supplied with 5x Citadel 40mm Round Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Legion Anvillus Pattern Dreadclaw Drop Pod
  productCode: prod2680608-99863001384
  sku: 99863001384
  productType: vehicle
  priceGbp: 86
  url: https://www.warhammer.com/en-GB/shop/Legion-Anvillus-Pattern-Dreadclaw-Drop-Pod
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590101384_LegionDreadclaw01.jpg
  status: current
  description: |-
    The Dreadclaw is a unique variant of the standard Legiones Astartes Drop Pod that allows for greater mobility for the forces transported as it is able to take off again after landing.

    This is a complete resin and plastic kit.
- name: Calas Typhon
  productCode: prod2680561-99863002188
  sku: 99863002188
  productType: character
  priceGbp: 48.5
  url: https://www.warhammer.com/en-GB/shop/Calas-Typhon-First-Captain-of-the-Death-Guard
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102188_CalasTyphon01.jpg
  status: current
  description: |-
    Calas Typhon once pursued a role in the Legion’s Librarius, but with the Primarch Mortarion harbouring a deep-rooted distrust of those who wielded the powers of the psyker, Typhon suppressed his gift and strove instead to serve as a war leader. His strength, skill and demeanour led him to high rank, culminating in his command of the warship Terminus Est and the deadly alchemical payload held within its arsenal.

    This multipart resin kit builds Calas Typhon, a legendary commander for your Death Guard armies in games of Warhammer: The Horus Heresy. Clad in modified Cataphractii pattern Terminator armour, he can wade through even the heaviest of fighting, reaping a terrible toll with his heavy bladed scythe, Lakrimae. This miniature comes with a removable display base depicting battlefield ruins, and also includes a choice of heads – one helmeted and one bare.

    This kit comprises 9 resin components, 1x Citadel 40mm Round Base, and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Fulgrim, Primarch of the Emperor's Children Legion
  productCode: prod2680558-99863002152
  sku: 99863002152
  productType: character
  priceGbp: 86
  url: https://www.warhammer.com/en-GB/shop/Fulgrim-Primarch-of-the-Emperor-s-Children
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102152_Fulgrim01.jpg
  status: current
  description: |-
    The mercurial and prideful Fulgrim, the Phoenician, strives to be a paragon of all things. He has passed on his values to his Legion, for whom they became a remorseless dedication to perfection in warfare. Such all-consuming ambition came at the price of vainglory and hubris in both the Emperor’s Children Legion and their master, which led to them all being swiftly ensnared in the Warmaster’s conspiracy against the Emperor.

    Fulgrim is modelled in the thick of bloody combat, his arrogance and condescension given way to fratricidal anger and battle-born wrath. This dynamic miniature showcases the full opulence of the III Legion primarch, here captured leaping above the charred rock of Isstvan V. The Phoenician presents both a painting challenge for those Warhammer hobbyists who chase perfection, and an exquisite centrepiece for any III Legion collection. He is armed with the Blade of Laer, the daemonic weapon which he used to slay his brother primarch, Ferrus Manus of the X Legion. He is sculpted as wearing the Gilded Panoply, his personal master-crafted armour.

    This complete multi-part resin kit is supplied with a 40mm gaming base, which slots into a 60mm scenic diorama base for display. The base of Fulgrim can also be combined with that of Ferrus Manus to create a diorama of the two primarchs duelling, This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Sons of Horus Justaerin Weapons Set
  productCode: prod2680514-99853002138
  sku: 99853002138
  productType: single_kit
  priceGbp: 18.5
  url: https://www.warhammer.com/en-GB/shop/Sons-of-Horus-Justaerin-Weapons-Set
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550102138_JustaerinTerminatorsWeaponSet01.jpg
  status: current
  description: |-
    The black-armoured Justaerin were the pride of the XVI Legion Astartes. Tasked with forming the ‘point of the spear’, their attacks were directed at the heart of an opposing target or a decapitation strike against an enemy force. The Justaerin and their commander, First Captain Ezekyle Abaddon, were early proponents of Tactical Dreadnought armour, and many entered combat in singularly-modified Cataphractii pattern Terminator plate.

    The set contains a multi-melta, four Phobos-pattern combi-bolters and five Cthonian-pattern power axes.
- name: Legion Champion and Master of the Signal
  productCode: prod2680462-99853001286
  sku: 99853001286
  productType: character
  priceGbp: 36.5
  url: https://www.warhammer.com/en-GB/shop/Legion-Champion-and-Master-of-the-Signal
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550101286_LegionChampionMasterofSignal02.jpg
  status: current
  description: |-
    Ranked below the Praetors who command the massed ranks of the Legiones Astartes into battle, is a substantial cadre of battle commanders and officers who control and co-ordinate hundreds of thousands of Space Marines across a given conflict. Commonly referred to as Centurions, more specialised officers and ranks are also included under this level in the chain of command. The Legion Champion and Master of Signal are two such commanders; both ranked equally but with very different battlefield roles.

    A Legion Champion’s sworn task is to hunt down and slay the commanders and heroes of an enemy force in single combat. Armed with the finest weapons available, these deadly fighters embody the honour of their Legion.

    A Master of Signal will commonly be attached to the forward elements of a Space Marine assault, providing communications support across the wider warzone, and is capable of calling down a pinpoint bombardment from either orbiting fleet assets or static artillery positions nearby, engulfing the foes of Mankind in flaming destruction.

    The set comprises two detailed multi-part resin miniatures.
- name: MKIII Breacher Squad
  productCode: P-238420-99123001072
  sku: 99123001072
  ean: 5011921248247
  eanSource: shopify:goblingaming.co.uk
  productType: single_kit
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/horus-heresy-mk3-breacher-squad-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123001072_HorusHeresyLegionesAstartesMkIIIBreacherSquad1.jpg
  status: current
  description: |-
    Breacher Squads are sent into the most hazardous spheres of warfare, such as boarding actions on spacecraft or the first wave of attackers into a fortress. Since the early days of the Great Crusade, specialised wargear and tactics have been under continuous development, including the use of heavy shields to resist enemy fire and specialised weaponry to bypass bulkheads and shatter strongpoints.

    This multipart plastic kit builds ten Breacher Squad Legionaries, well-protected close-quarters specialists for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Equipped with boarding shields and one-handed bolters, they can shrug off firepower that would take down a standard Tactical Legionary. They are ideal for adding durability and close to mid-range hitting power to your force without sacrificing flexibility.

    The kit includes parts to build an optional Sergeant, Legionary with nuncio-vox, Legionary with vexilla, and Legionary with augury scanner. The Sergeant has a choice of two heads – one bare and one helmeted. He can be armed with a power sword, power fist, or lightning claw, and can also take an optional melta bomb. One Legionary can be armed with an optional graviton gun, and another can be armed with an optional lascutter. There are also accessories – including grenades, pistol holsters, and pouches – that are interchangeable across the miniatures.

    These miniatures have no Legion-specific markings, so you can use them in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit is supplied with 1x Legiones Astartes Infantry Transfer Sheet, containing 618 high-quality waterslide transfers. These include symbols for the Iron Warriors, Sons of Horus, Salamanders, and Imperial Fists, along with numerals, honour markings, generic markings, script, and command icons.

    This kit comprises 249 plastic components and 10x Citadel 32mm Round Bases. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: 'Legiones Astartes: Combat Force'
  productCode: P-226968-99123001092
  sku: 99123001092
  ean: 5011921270026
  eanSource: shopify:goblingaming.co.uk
  productType: box_set
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/horus-heresy-legiones-astartes-combat-force-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123001092_HorusHeresyLegionesAstartesCombatForceArmyBox1.jpg
  status: current
  description: |-
    The forces of the Legiones Astartes are built around a core of elite infantry. Equipped with power armour and weapons that can lay low any foes they may face, they strike hard and true. Supported by powerful Dreadnoughts and other engines of war, there is little they cannot take down.

