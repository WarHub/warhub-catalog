  priceGbp: 113
  url: https://www.warhammer.com/en-GB/shop/Anacharis-Scoria-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102293_AnacharisScoria01.jpg
  description: |-
    The history of Anacharis Scoria has been lost. Still, fragmentary evidence places him as a magos dominus in the service of Xana, with the rank of the Vodian Magister – the chief enforcer of cult doctrine on his shadowed and secretive world. At some point, Scoria was cast down and removed from all records, caged in the depths of a prison-forge until he was released by a Loyalist covert operation known as the Xana Incursion. His former jailors destroyed, Scoria is more powerful than ever, and now turns his dark genius to the Traitor cause – rendering Xana the first of the so-called 'Hell Forges'.

    This multipart resin kit builds Anacharis Scoria – the Xanophane Tyrant, a corrupt lord for your Dark Mechanicum armies in games of Warhammer: The Horus Heresy. Obscured beneath sinister machinery and grim augmentations, this feared mastermind is a terrifying example of just how far the Mechanicum can take their self-modification. Though his impassive face is still visible from beneath his cowl, and he grips his forklike Vodian Sceptre in one human hand, Scoria's remaining biomass is dwarfed by the robotic augmentations. He sports a machinator array of snapping claws, three looming tails mounted with a photon thruster and twin archaeotech pistols, and a variety of other arcane cybernetics, all supported by his eight hydraulic legs.

    As part of The Horus Heresy Character Series, Anacharis Scoria is posed on an impressive scenic base – scuttling over the crumbling industrial rubble of a fallen Forge World, making for a magnificent centrepiece to your collection.

    This kit comprises 38 resin components, presented in a black Horus Heresy Character Series box, and is supplied with 1x Citadel 80mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
