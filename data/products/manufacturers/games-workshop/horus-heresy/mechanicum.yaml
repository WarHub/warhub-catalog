  description: |-
    The Armiger Knight is a lighter, more agile cousin to the Questoris Knight, piloted by warriors from outside of the noble Houses, such as retainers and peons who have shown great valour in the service of a Questoris House. They excel at picking off threats from enemies beneath the notice of the larger Knights, such as swarming throngs of infantry attempting to breach the protective barriers of their ion shields, or lesser war machines who dare to aim their guns at a noble scion. Armiger Warglaives are armed with menacing thermal lances and fearsome reaper chainblades, well suited to the belligerent and aggressive nature of their pilots.

    This multipart plastic kit builds two Armiger Warglaives, swift and deadly knights that are designed to quickly close the distance on enemy war machines and obliterate them with specialised weaponry. Each Armiger is armed with a reaper chainblade and a thermal lance, as well as your choice of a carapace-mounted heavy stubber or meltagun. You can build these models in a variety of poses, and customise them with a choice of six unique faceplates to help set them apart. This kit can alternatively be built as two Armiger Helverins.

    This kit comprises 148 plastic components, and is supplied with 2x Citadel 100mm Round Bases. Also included is an Age of Darkness Armiger Transfer Sheet, featuring 298 optional markings and icons for the Knight Households of the Horus Heresy. These miniatures are unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel paints.
