    Developed in the lost and ancient days long before the Imperium, the Secutarii Titan Guard were created as the honour guard and protectors of the Titan Legions. While a Battle Titan might shatter a mighty fortress or blast a tank company to ruin, it is the role of the Secutarii to eradicate such threats its survivors might still pose as the Titans press on to more important targets, and to hunt down and slay those who seek to flee from the Machine God’s wrath.

    This multipart resin kit allows you to upgrade a plastic Skitarii squad into Secutarii Peltasts, infantry for your Legio Titanicus armies in games of Warhammer: The Horus Heresy. They seek targets of flesh and bone that would attempt harm on the great god-machines. Each armed with a galvanic caster, the Secutarii Peltasts are equipped to deal with all manner of targets. This electro-galvanically driven, multi-function projectile launcher has multiple firing modes that may fire rapid bursts of low velocity, razor-edged metallic flechettes, attack concealed targets with retina-burning ignis charges, fire an armour-piercing inert slug-shot at supersonic velocities, or even fire a barrage of blind canister shot to confuse and disorientate the enemy. The kit includes a head to upgrade a Secutarii into an optional squad leader.

    **Contents:**
    – 10x Heads
    – 1x Alpha head
    – 10x Backpacks
    – 11x Left arms
    – 11x Right arms with galvanic casters

    This upgrade kit comprises 43 resin components and is designed to be used with the Adeptus Mechanicus Skitarii kit, which is available separately. These components require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
