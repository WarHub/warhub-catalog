    A sophisticated variant of the ancient Conqueror class, Domitar battle-automata are larger and swifter than the more common Castellax war-robots, built to cross the open battlefield at speed and crash into the enemy with shattering force. Even the Domitar’s armoured frame is designed as a weapon, while its blows are amplified by in-built gravitational hammers that allow it to pulverise tanks and even Legiones Astartes Dreadnoughts in combat. The Domitar is unparalleled as a line-breaker in the Mechanicum’s arsenal – its tactical flexibility further augmented by a missile launcher armed with a variety of munitions.

    This multipart resin kit builds one Domitar battle-automaton, a looming armoured robot with a pair of graviton hammers mounted on its mechanical fists. The Domitar incorporates a missile launcher into its upper carapace – the weapon's housing can be built open, with exposed warheads ready to fire, or closed. This model can be built in a variety of poses.

    This kit comprises 26 resin components, and is supplied with a Citadel 60mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
