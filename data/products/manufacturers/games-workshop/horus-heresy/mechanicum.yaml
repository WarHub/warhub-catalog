  description: |-
    The Reaver is a battle titan and a mainstay of the great Titan Legios. While smaller and lighter than the massive Warlord class, it is still a vast machine, protected by thick adamantium armour plates and carrying devastating firepower. A truly ancient design, each Titan Legio maintains an active number of Reavers of various patterns. The Mars pattern Reaver is said to be the oldest of all titans forged on the Red Planet, its origins long since forgotten by even the most knowledgeable of magi.

    This multipart resin kit builds the body of a Mars Pattern Reaver Titan, a mighty god-machine for your Legio Titanicus armies in games of Warhammer: The Horus Heresy. Armed with devastating weapons and able to crush enemies under its tread by the score, the ground shakes as the it advances and the enemy is left with a simple choice – flee or die. This stunning centrepiece miniature is incredibly detailed and stands around 400mm tall. The head also features a fully detailed interior with a Princeps on command throne and two Moderati.

    This kit comprises 190 resin components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    Please note, this kit does not include carapace weapons or arms – it is compatible with the Reaver Titan Powerfist, Reaver Titan Apocalypse Missile Launcher, Battle Titan Gatling Blaster, Battle Titan Melta Cannon, Battle Titan Laser Blaster, and Battle Titan Volcano Cannon, all available separately.

