- name: 'Mechanicum: Combat Force'
  productCode: P-226964-99123016015
  sku: 99123016015
  ean: 5011921233830
  eanSource: shopify:goblingaming.co.uk
  productType: box_set
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/horus-heresy-mechanicum-combat-force-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123016015_HorusHeresyMechanicumCombatForceArmy1.jpg
  status: current
  description: |-
    The Mechanicum makes heavy use of both cybernetically enhanced thralls and automata to enact their will on the battlefield. These machines are capable of marching and fighting for days without fatigue, as well as being exceptionally resilient and equipped with powerful weapons supported by their power plants.

    If you want to claim the galaxy in the name of the Omnissiah (whether you believe that to be the Emperor or not), this box is the perfect way to start a new Mechanicum collection – or expand an existing army – and save money compared to buying the kits individually. You'll find a Thallax Cohort armed with powerful lightning guns, and a pair of Castellax Battle-automata equipped with a pair of claw-like shock chargers and heavy weaponry. The bruiser in the box is a towering Thanatar Cavas Siege-automata – their primary weapon is a shoulder-mounted plasma mortar, able to blast apart your enemies at range, before it charges in to crush survivors with its shock chargers.

    **This boxed set builds 9 multipart plastic miniatures:**
    – 1x Thanatar Cavas Siege-automata
    – 2x Castellax Battle-automata
    – 6x Thallax

    The miniatures in this kit are easy to customise. The Thanatar Cavas Siege-automata can be built in your choice of two poses, and its devastating plasma mortar can be assembled open or closed.

    Both of the Castellax can be armed with a mauler bolt cannon, multi-melta, or darkfire cannon for causing devastation at range, and either shock chargers or power blade arrays – each with either an underslung flamer or bolter – to tear or slice enemies apart in melee.

    The Thallax each have an optional chain bayonet for their lightning guns, and there are 2x phased plasma fusils, 2x photon thrusters, and 2x multi-meltas to increase their firepower.

    This kit comprises 598 plastic components, 1x Citadel 120mm Oval Base, 2x Citadel 60mm Round Bases, 6x Citadel 40mm Round Bases, 2x Mechanicum Macro-constructs Transfer Sheets each containing 394 high-quality waterslide transfers, and 2x Mechanicum Constructs Transfer Sheets each containing 558 high-quality waterslide transfers to customise your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
