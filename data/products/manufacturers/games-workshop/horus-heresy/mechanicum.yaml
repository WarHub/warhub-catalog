  url: https://www.warhammer.com/en-GB/shop/questoris-households-knight-questoris-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123008001_HHKnightQuestorisLead.jpg
  description: |-
    The Knight Questoris is the most prominent variety of Knight Armour on the battlefields of the Horus Heresy, striding forth alongside the Legiones Astartes, Taghmata Omnissiah, and in the great armies of Knight Households. Such was its popularity amongst the noble scions of the Questoris Households that it was reconfigured in myriad ways with weapon options and hull augments, and given names such as Paladin, Errant, Warden, Gallant, and Crusader to reflect their traditions, lineage, and fighting styles.

    This multipart plastic kit builds one mighty Knight Questoris, a towering war machine armed with colossal weapons designed to lay waste to infantry, vehicles, and opposing Knights. The kit can be built with a huge variety of weapon combinations – it includes an arm-mounted reaper chainsword, thunderstrike gauntlet, rapid-fire battle cannon, avenger gatling cannon, thermal cannon, and las-impulsor. The hull features your choice of a heavy stubber, multi-laser, or meltagun, and its carapace can be mounted with an optional twin-linked icarus autocannon, ironstorm missile pod, or stormspear rocket pod. There are also a wealth of cosmetic options for personalising this engine of war, including tilting plates, carapace icons, banners, and faceplates. This kit also builds one Household Scion on foot, and the Knight itself can be built with an open carapace showing the Scion piloting his mechanical steed.

    This kit comprises 250 plastic components and is supplied with a Citadel 170x109mm Oval Base and a Citadel 25mm Round Base, as well as an Age of Darkness Knight Questoris Transfer Sheet containing 386 optional markings and icons for the Knight Households of the Horus Heresy. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.
- name: Anacharis Scoria – The Xanophane Tyrant
  category: miniatures
  packaging: single
