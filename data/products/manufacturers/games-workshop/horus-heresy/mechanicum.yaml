- name: Castellax Battle-automata Maniple
  productCode: P-189471-99123016003
  sku: 99123016003
  ean: 5011921218745
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 49.5
  url: https://www.warhammer.com/en-GB/shop/mechanicum-castellax-battle-automata-maniple-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123016003_ADMECHCastellaxBattleAutomataManiple1.jpg
  status: current
  description: |-
    The Castellax Battle-automata are general purpose combat robots, developed from older designs during the Great Crusade. Primarily intended for siege work and shock assaults, these terrifying, humanoid machines stand three times the height of a man, with notoriously aggressive and responsive machine spirits. The Castellax class is a mainstay of both the Legio Cybernetica and the elite defensive formations of many forge worlds, who rely on its formidable power, armoured endoskeleton, and atomantic shielding technology for their protection.

    This multipart plastic kit builds two Castellax Battle-automata, core constructs of the Mechanicum in the age of the Horus Heresy. Each Castellax Battle-automata can be equipped with a pair of claw-like shock charges, or one may be equipped with circular power blades, and each may equip a choice of in-built bolters or flamers for either weapon. The kit also contains a choice of shoulder-mounted weapon options – you'll find two mauler bolt cannons, as well as a darkfire cannon and a multi-melta.

    You can further customise your mechanical monsters with a choice of three different arm joints for each automaton, plus joints in their waist and shoulders, allowing you to create a variety of poses. Should you choose to arm your automata with shock chargers, you can choose to have their claws gripped shut, or open and ready to grab the enemy.

    This kit contains 191 plastic components, and 2x Citadel 60mm Round Bases. This set also includes 1x Mechanicum Constructs Transfer Sheet containing 558x high-quality waterslide transfers for you to use to customise your miniatures.

    These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Anacharis Scoria – The Xanophane Tyrant
  productCode: prod3930319-99863002293
  sku: 99863002293
  productType: character
  priceGbp: 113
  url: https://www.warhammer.com/en-GB/shop/Anacharis-Scoria-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102293_AnacharisScoria01.jpg
  status: current
  description: |-
    The history of Anacharis Scoria has been lost. Still, fragmentary evidence places him as a magos dominus in the service of Xana, with the rank of the Vodian Magister – the chief enforcer of cult doctrine on his shadowed and secretive world. At some point, Scoria was cast down and removed from all records, caged in the depths of a prison-forge until he was released by a Loyalist covert operation known as the Xana Incursion. His former jailors destroyed, Scoria is more powerful than ever, and now turns his dark genius to the Traitor cause – rendering Xana the first of the so-called 'Hell Forges'.

    This multipart resin kit builds Anacharis Scoria – the Xanophane Tyrant, a corrupt lord for your Dark Mechanicum armies in games of Warhammer: The Horus Heresy. Obscured beneath sinister machinery and grim augmentations, this feared mastermind is a terrifying example of just how far the Mechanicum can take their self-modification. Though his impassive face is still visible from beneath his cowl, and he grips his forklike Vodian Sceptre in one human hand, Scoria's remaining biomass is dwarfed by the robotic augmentations. He sports a machinator array of snapping claws, three looming tails mounted with a photon thruster and twin archaeotech pistols, and a variety of other arcane cybernetics, all supported by his eight hydraulic legs.

    As part of The Horus Heresy Character Series, Anacharis Scoria is posed on an impressive scenic base – scuttling over the crumbling industrial rubble of a fallen Forge World, making for a magnificent centrepiece to your collection.

    This kit comprises 38 resin components, presented in a black Horus Heresy Character Series box, and is supplied with 1x Citadel 80mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
