    This multipart plastic kit builds six Myrmidon Destructors, elite heavy infantry for your Mechanicum armies in games of Warhammer: The Horus Heresy. They can be equipped with armour-busting darkfire cannons or infantry-melting irradiation engines. When the fighting gets close, they employ their shock chargers to crush their foes. This durable unit is a great way to provide ranged support as it advances alongside the rest of your army. Each Myrmidon Destructor has a choice of two heads – hooded or unhooded – and there are six servo-skulls, which are interchangeable across the miniatures.

