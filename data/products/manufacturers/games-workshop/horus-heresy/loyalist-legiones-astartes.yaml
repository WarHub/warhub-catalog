  description: |-
    The Contemptor-Incaendius Dreadnought is a custom chassis manufactured only within the Mechanicum enclave that clings to the irradiated surface of Baal’s first moon. The key differentiator of the Incaendius is its external booster pack – a volatile, single-burn, magnetoplasma engine powerful enough to propel its armoured bulk in a shallow leap at significant velocity. The Contemptor-Incaendius serves the Blood Angels as a shock assault unit of unparalleled ferocity, for the half-dead warrior entombed within suffers none of the disorientation such tactics inflict on the living, and can secure even a heavily contested drop zone for the infantry that follow on its heels.

    This multipart resin kit builds one Contemptor-Incaendius Dreadnought for the Blood Angels Legion. This custom class of Contemptor Dreadnought is covered in ornate detail characteristic of the sons of Sanguinius, from Legion symbols to elegant filigree. It is primarily distinguished by the impressive Incaendius booster pack mounted on the rear of its chassis. This massive, single-use thruster allows the Contemptor-Incaendius to descend from the skies or jet across the battlefield with terrifying speed, putting its razor-sharp Talons of Perdition to good use. These clawed fists each come with a choice of in-built weapon – a heavy flamer, meltagun, or Iliastus-pattern assault cannon – allowing you to arm your Contemptor-Incaendius for different opponents.

    This kit comprises 53 resin components and 1x Citadel 60mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
