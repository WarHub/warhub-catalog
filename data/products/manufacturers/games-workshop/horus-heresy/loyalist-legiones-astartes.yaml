- name: The Wolf-kin of Russ
  productCode: prod3430156-99863001542
  sku: 99863001542
  productType: character
  priceGbp: 93
  url: https://www.warhammer.com/en-GB/shop/The-Wolf-kin-of-Russ
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101542_WolfKin01.jpg
  status: current
  description: |-
    Said to be companions of the Wolf King from his earliest days as a foundling upon the bleak desolation of Fenris, Freki and Geri are beasts of prodigious size, formidable intelligence, and a physical power that would beggar belief in purely ‘natural’ creatures of their type. The guardians of the Wolf King’s hearth and a symbol of his spiritual connection to Fenris itself, the Wolf-kin follow the Primarch into battle, ripping his hated foes limb from limb.

    This multipart resin kit builds both Wolf-kin of Russ – Freki and Geri – which can be taken as a pair in any army that includes Leman Russ himself. These large, highly-detailed models make an ideal centrepiece, with thick fur, snarling jaws, enormous teeth and claws, and other details such as Fenrisian rune charms. They are posed atop scenic rubble, tearing apart several unfortunate enemy Astartes – clad in the signature iconography of the Thousand Sons Legion.

    The kit comprises 20 resin components, presented in a black Horus Heresy Character Series box, and is supplied with 2x Citadel 90mm Oval Bases. These miniatures are supplied unpainted and require assembly – we recommend using Citadel paints.

    You will need a copy of the *Warhammer: The Horus Heresy – Age of Darkness Rulebook* and the *Liber Astartes: Loyalist Legiones Astartes Army Book* to make full use of these models in games of Warhammer: The Horus Heresy.
