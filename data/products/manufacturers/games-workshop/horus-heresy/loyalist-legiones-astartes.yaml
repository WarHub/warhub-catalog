    The Sokar Stormbird is a dedicated attack lander, developed during the Unification Wars on Ancient Terra and adapted by the Emperor for Legion use. It was conceived as a specialised, high-durability orbital assault craft – almost a mobile bastion and firebase – which could land a Space Marine strike force and withstand heavy ground fire while its passengers forced a landing zone.

