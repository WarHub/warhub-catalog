  productCode: prod3470135-99853001540
  sku: 99853001540
  productType: single_kit
  priceGbp: 21
  url: https://www.warhammer.com/en-GB/shop/Imperial-Fists-Legion-Cataphractii-Storm-Shields
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550101540_CataphractiiStormShields01.jpg
  status: current
  description: |-
    The Imperial Fists were the first to utilise the enhanced Vigil pattern storm shield design, which featured a uniquely potent field generator far exceeding those found elsewhere. The first of these had entered service with the Legion after the Ullanor Campaign, but difficulties in production meant only a few hundred had entered full service at the outset of the wars of the Horus Heresy.

    This multipart resin kit upgrades five Imperial Fists Terminators with Vigil pattern storm shields for games of Warhammer: The Horus Heresy. They make your elite veterans even more survivable – ideal for boarding actions, fighting in a Zone Mortalis, or for advancing at the head of your army as you take the battle to the Traitors.

    **Contents:**
    – 5x Vigil pattern storm shields
    – 5x Right arms

    This upgrade kit comprises 10 resin components and is designed to be used with the Cataphractii Terminators with Combi-bolters and Power Fists and Cataphractii Terminators with Volkite Chargers and Power Mauls squads, both available separately. These components require assembly and are supplied unpainted – we recommend using Citadel Colour paints.

