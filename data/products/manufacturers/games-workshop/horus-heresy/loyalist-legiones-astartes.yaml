    This resin upgrade set allows you to upgrade five Legionaries wearing Mark IV armour into Phalanx Warders – boarding fighters of the Imperial Fists Legion. The kit includes five torsos with unique ornate decorations, six helmets in three designs, a bare head for a Warder Sergeant, five power axes, five boarding shields and boarding-shield arms, and 10 pauldrons – five bearing the Legion armourial, and five with the crossed axes of a Zone Mortalis veteran. It also provides components for additional wargear – a Legion vexilla, a nuncio-vox, and a breaching charge.

    This upgrade kit comprises 40 resin components and is designed to be assembled with the MKIV Tactical Squad set, which is sold separately. These components are supplied unpainted and require assembly – we recommend using Citadel Colour paints.
- name: Fire Raptor Gunship
  productCode: prod2691224-99863001350
  sku: 99863001350
