    Tactical squads are the mainstay of the Space Marine Legions and the force by which the Great Crusade reconquered much of the galaxy. As a highly flexible unit, they are efficient in attack or defence, can assault fortified positions, take and hold strategic objectives, and reliably operate in any terrain or situation.

    When first created, Mark II ‘Crusade’ armour was the epitome of Space Marine technology – a void-sealed, radiation-shielded suit of battle plate able to withstand an unprecedented degree of punishment. Despite its age, it was still used extensively when the Horus Heresy broke out.

    This multipart plastic kit builds 20 Space Marines Legionaries for use as a Tactical Squad in games of Warhammer: The Horus Heresy. They are ideal for holding key objectives, gunning down enemy units with volleys of bolter fire, and reinforcing front lines to turn the tide of battle.

    This kit can build one large unit, or two smaller units of 10, each with its own optional Sergeant, Legionary with nuncio-vox, and Legionary with vexilla. The Sergeant has a choice of three heads – two bare, and one helmeted with a transverse crest. He can be armed with a bolter or a plasma pistol, and a power sword, power fist, or lightning claw. He can also take an optional melta bomb. The Legionaries with bolters can take an optional bayonet or chain bayonet, and the heads and accessories – including grenades, pistol holsters, and pouches – are interchangeable across the miniatures.

    **These miniatures can also be used to represent:**
    – Veteran Tactical Squad
    – Tactical Support Squad \(with the Special Weapons Upgrade Set, available separately\)
    – Heavy Support Squad \(with a Heavy Weapons Upgrade Set, available separately\)
    – Praetorian Command Squad or Centurion Command Squad \(with the Legion Command Upgrade Set, available separately\)
    – Despoiler Squad \(with the Melee Weapons Upgrade Set, available separately\)

    These miniatures have no Legion-specific markings, so you can use them in any Space Marines force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit comprises 344 plastic components, 20x Citadel 32mm Round Bases, and 1x Horus Heresy Legion Infantry Transfer Sheet containing 618 high-quality waterslide transfers – featuring Legion iconography for the Sons of Horus, Imperial Fists, Iron Warriors, and Salamanders – to decorate your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour Paints.
