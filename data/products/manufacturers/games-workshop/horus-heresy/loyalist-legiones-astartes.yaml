    A larger and bulkier version of the Combat Shield, Storm Shields are powered shields providing more effective defence against attack. Wielded by those clad in Cataphractii Terminator armour, they form a near-impenetrable barrier.

    This set of 5 resin Storm Shields features Imperial Fists iconography, and is designed to upgrade 5 Space Marines in Cataphractii Terminator Armour, attaching via the included arms.
- name: Corvus Corax, Primarch of the Raven Guard Legion
  productCode: prod3040137-99863001475
  sku: 99863001475
  productType: character
  priceGbp: 98
  url: https://www.warhammer.com/en-GB/shop/Corvus-Corax
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560101475_CorvusCorax01.jpg
  status: current
  description: |-
    The master of stealth and rapid strikes, Corvus Corax wields the XIX Legion with precision and guile. The primarch of the Raven Guard presents a striking countenance with his alabaster skin and stark, black eyes. His sable armour is edged with fine, golden filigree and upon his back is mounted a jet pack formed into a pair of articulated pinions that he wields as a murderous, bloody-edged cutting weapon.

    Like most of the primarchs, Corax is blessed of an extensive armoury of artificer-wrought weapons, but those he most often bears to war are a pair of metre-long lightning claws and a coiled whip at his belt. Though few even amongst his sons know of it, Corax is blessed with the ability to pass unnoticed should he will it, this preternatural ability allowing him to slip from the perception of his enemies even when standing in plain view.

    Corvus Corax is here depicted descending into battle on his Korvidine Pinions, smashing aside terrain and attacking a traitor Space Marine. He is sculpted in the intricate Sable Armour and armed with The Panoply of the Raven Lord, which consists of many weapons – twin artificer-crafted lightning talons, two archaeotech pistols, and a coiled whip stored below his backpack. This host of exceptionally detailed parts makes this miniature a true challenge for expert-level Warhammer hobbyists who want to create a genuinely memorable centrepiece for their Warhammer: The Horus Heresy collection.

    This 30-part resin kit is supplied with a 40mm gaming base, which slots into a 60mm scenic diorama base for display. This miniature is supplied unpainted and requires assembly – we recommend using Citadel paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Legion MKIV Techmarine
  productCode: prod2920169-99853001462
  sku: 99853001462
  productType: character
  priceGbp: 32.5
  url: https://www.warhammer.com/en-GB/shop/Techmarine-in-Mk-IV-Armour
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550101462_MkIVTechmarine01.jpg
  status: current
  description: |-
    Techmarines are specialists in the engineering needs of their Legion, trained in the rites and secrets of the Mechanicum. These technologists hold alliances to both their Legion and the Machine Cult of Mars, and are vital to any Legion's ability to wage war, tasked as they are with overseeing the maintenance and manufacture of its arsenal. Techmarines are often found in the heart of battle, repairing damaged vehicles and incanting words of supplication to troubled machine-spirits.

    This multipart resin kit builds one Legion Techmarine, a battlefield engineer for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Clad in heavily modified and extensively reinforced MkIV 'Maximus Armour', this specialist is covered in details suggestive of his technological skill – from the Mechanicum cog-skull symbol sculpted into his pauldron, to the mechadendrites trailing out from his backpack. He's armed with a bolt pistol, a long-handled power axe with exposed cabling, and a crushing back-mounted servo-arm suited to both field repairs and melee combat.

    This miniature has no Legion-specific markings, so you can use it in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit comprises 11 resin components and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
