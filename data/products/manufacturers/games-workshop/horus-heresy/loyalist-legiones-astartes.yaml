  status: current
  description: "The Terrax Pattern Termite Assault Drill is a specialised transport vehicle, capable of deploying a full squad of warriors onto the battlefield while bypassing enemy fortifications and sentries. It tunnels rapidly through even the densest of materials at speeds comparable to surface transport craft, thanks to the Termite's grinding drill, which utilises a linked array of melta cutters and phase-shield generators to aid in its progress. Once at its target location, it emerges onto the surface, or even directly into the lower level of macro-fortifications, scattering nearby enemies with its melta cutters before disgorging its deadly cargo.< br/>< br/>This multipart resin kit builds a Terrax Pattern Termite Assault Drill, a subterranean transport vehicle for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Designed with practicality in mind, this vehicle eschews the aggressive look of many of its contemporaries, spending much of its time underground. It is essentially a long capsule – able to transport a full squad – with five sets of tracks along its body, which serve both to pull it along the tunnels it digs and deposit rocks and earth behind it. An enormous drill assembly takes up the vehicle’s front, with four rings of blades giving way to a large ring of grinders and crushers. It has a pair of pintle-mounted combi-bolters, which can be optionally upgraded to twin volkite chargers or heavy flamers. The hatch on the hull can be assembled open or closed, offering a degree of customisation for your brutal transport.< br/>< br/>This miniature has no Legion-specific markings, so you can use it in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.< br/>< br/>This kit comprises 39 resin components. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.< br/>< br/>This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over."
