    The Land Raider is regarded by many as the finest armoured fighting vehicle of its class in the Imperium’s arsenal, and is the mainstay battle tank of the Space Marine Legions. It is a phenomenally powerful war machine, its multi-layered composite armour and reinforced hull all but impervious to even heavy weapons, being a sealed unit designed to resist enemy attack from any approach. Intended to serve in almost any environment as both war machine and exploration vehicle, it can operate freely in war zones ranging from acid swamps to rad-deserts without any noticeable impediment to its performance, and can even operate in hard vacuum, ensuring there is no open battlefield on which its armoured wrath cannot be unleashed.

    This multipart plastic kit builds one Land Raider Proteus, a mighty battlefield transport employed by the Legiones Astartes. This vehicle can be assembled as either a Proteus Carrier with a frontal assault ramp for delivering troops or a Proteus Explorator with a dozer blade for traversing broken terrain. Both variants sport two sets of sponson-mounted lascannons, and can be equipped with your choice of hull-mounted weapon – twin-linked heavy bolters, heavy flamers, or lascannons. The Proteus Explorator also offers an alternate frontal hull with sealed armour plating and a visor.

    The kit also includes components to upgrade the Land Raider Proteus with a pintle-mounted weapon – a havoc launcher, heavy bolter, heavy flamer, multi-melta, or a combi-weapon with five configurations \(bolter, flamer, melta, plasma, or volkite\) – as well as a searchlight, a hunter-killer missile, and a number of cosmetic options, such as towing hooks, sigils, and a choice of a Space Marine gunner, spotter, or closed hatch.

    This kit comprises 159 plastic components, and is supplied with a Legiones Astartes Vehicle Transfer Sheet containing 44 optional markings and icons for the Sons of Horus and Imperial Fists Legions. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel paints.
