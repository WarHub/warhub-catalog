    Reconnaissance Squads are formed from Space Marines experienced in operating behind enemy lines, sudden flanking manoeuvres, and infiltration attacks in support of their main force. Serving as the eyes and ears of the Legion in the field, they are armed and equipped with a variety of specialised wargear, including long-range weaponry, sensor auspex, and stealth gear.

    This multipart resin kit builds five Recon Legionaries, covert infantry for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. They can each be armed with an Astartes shotgun for blasting apart enemies at close range during an ambush, or Nemesis bolters for making precision shots at distance. The kit comes with six interchangeable heads – five helmeted and one bare.

