    This multipart resin kit builds one Sokar Stormbird, an airborne transport and weapons platform for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. This colossal attack lander can transport dozens of infantry, Contemptor Dreadnoughts, and even a Rhino right into the heart of the enemy. Thanks to its thick armour and void shields, it can swoop through even the thickest of enemy anti-aircraft fire while returning in kind with hull, wing, and turret-mounted weaponry.

