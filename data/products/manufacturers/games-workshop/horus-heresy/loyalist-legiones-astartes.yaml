    Medusan Immortals are made up of Iron Hands Legionaries who had failed their father’s rigid standards and bleak code in battle, whether tasting defeat by the fickle whims of fate or laid low by wounds too terrible to bear. Armed and armoured mainly as breacher units and featuring a high level of cybernetic rebuild among them, it is their lot and their pride to fight and die with steadfast, cold fury, never breaking ranks, marching relentlessly into the jaws of hell.

    This multipart resin kit builds five Medusan Immortals, vengeance-seeking warriors for your Iron Hands armies in games of Warhammer: The Horus Heresy. Equipped with breacher shields, they can march through even the heaviest incoming firepower before unleashing return fire as they seek their redemption. These characterful miniatures are packed with details, including X Legion iconography and cybernetic limbs. There is also an optional lascutter and graviton gun to give you even more firepower.

