  status: current
  description: |-
    Moritats are lone killers operating outside the Legion’s usual command structures at the behest, or at least sufferance, of its high commanders. Regarded usually as dangerously unstable outcasts – perhaps created by some seldom-exposed flaw of gene-seed or indoctrination – they are also savage and proficient warriors, having become one with the act of killing by honing their superhuman reflexes to gun down the foe at close quarters.

    This multipart resin kit builds one Legion Moritat, equipped with two overcharged plasma pistols and a jump pack, for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. This rugged murderer is clad in patched, reinforced armour, with the symbol of the Moritat on his right shoulder pad, and a sinister targeting system built into his helm. His overcharged plasma pistols are each powered by cable systems that connect to his jump pack – perfect for leaping into position to unleash his deadly firepower. His elevated pose is supported by a piece of fallen rubble, including details such as ammo shells and the helmet of a fallen Space Marine.

    This miniature has no Legion-specific markings, so you can use it in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit comprises 10 resin components and 1x Citadel 32mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Imperial Fists Legion Cataphractii Storm Shields
  productCode: prod3470135-99853001540
