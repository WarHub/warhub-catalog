    Praetors are the mightiest warriors and battle-leaders of the Space Marine Legions, second only to the god-like Primarchs in martial skill and generalship. Each is an experienced warrior and warlord who has written for themselves a legend in blood and carries into battle the finest wargear known to humanity. This holds in the V Legion, for the sons of the Khan are led by peerless warrior-poets who have plundered the galaxy's farthest reaches.

    This multipart resin kit builds one Legion Praetor, a finely detailed commander for your White Scars armies in games of Warhammer: The Horus Heresy. This mighty warrior is armed with a Chogorian power glaive, bedecked in customised MkII power armour, posed in a dynamic lunge and covered in the iconography of the Legion. He’s an ideal front-line commander for your forces and comes with a choice of two heads – helmeted or bare.

