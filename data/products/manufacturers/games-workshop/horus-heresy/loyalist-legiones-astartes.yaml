  status: current
  description: |-
    Often considered to be the greatest of his kin, Sanguinius is a peerless warrior, masterful strategist, and beloved hero of the Imperium. Among the Primarchs, few would speak ill of him, with even grim figures such as Perturabo and Ferrus Manus offering grudging praise of their winged brother.

    Many among that legendary brotherhood were surprised to find that the Emperor named Horus as Warmaster, rather than choosing Sanguinius. Those who survived the Age of Darkness have been known to speculate that this was their father’s great mistake. For even as the wars of the Horus Heresy tore the Imperium apart and set even the noblest of his brothers on dark paths, Sanguinius remained untarnished and resolute, a beacon of hope that outshone even the darkness of that age.

    This multipart resin kit builds Sanguinius, the legendary Primarch for your Blood Angels armies in games of Warhammer: The Horus Heresy. He is sculpted in the midst of battle, wings spread as he swoops down to deliver a killing blow to an unseen enemy. The miniature is held aloft by a spire of stone, giving the illusion of flight. Sanguinius' ornately designed armour, and the animal pelt he wears draped over it, provide a variety of details sure to delight painters. His face is a mix of majesty and fury that perfectly reflects the duality of the Blood Angels Legion. A choice of weapons – the Blade Encarmine and the Spear of Telesto – allow the miniature to be customised as you choose.

    This kit comprises 26 resin components and a Citadel 40mm Round Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

