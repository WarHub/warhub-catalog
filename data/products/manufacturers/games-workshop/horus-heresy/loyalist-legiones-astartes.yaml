    This multipart resin kit builds one Legion Techmarine, a battlefield engineer employed by all of the Legiones Astartes. Clad in a customised suit of Mark III 'Iron Armour', this specialist is covered in details that relay his technological skill - from the extensive bionics on his bare head and the Mechanicum cog-skull symbol sculpted into his pauldron, to the mechadendrites trailing out from his backpack. He's armed with a bolt pistol, a long-handled power axe with exposed cabling, and a crushing back-mounted servo-arm, rearing up to strike a nearby foe.

