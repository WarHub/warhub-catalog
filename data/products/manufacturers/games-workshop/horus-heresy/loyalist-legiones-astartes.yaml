    This multipart plastic kit builds a Legion Sicaran Venator, a high-speed vehicle designed for anti-tank operations. The Venator's chassis is dominated by the long barrel and detailed mechanisms of its neutron beam laser, a devastating mid-range energy weapon. The tank also boasts a pintle-mounted heavy bolter and a pair of sponson-mounted secondary weapons – your choice of heavy bolters, heavy flamers, lascannons, or volkite culverins, which can be attached without glue to adjust their positioning as you see fit.

