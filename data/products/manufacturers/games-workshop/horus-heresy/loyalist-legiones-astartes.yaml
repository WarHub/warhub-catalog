  description: |-
    Many of the Legiones Astartes make heavy use of MkIV 'Maximus' power armour. The most visibly distinct details of this mark of armour are the separated, squared knee pads, thin-trimmed shoulder pads, and helmets with long, broad face guards with slanting vents.

    **A Balanced Force**

    This loaded box is ideal for starting a new Legiones Astartes collection – or expanding an existing army – to take the battle to your enemies in games of Warhammer: The Horus Heresy, and it saves money compared to buying the kits separately. This force is built around a core of MkIV Tactical Legionaries and MkIV Assault Legionaries, and supported by a mighty Sicaran Battle Tank and a Contemptor Dreadnought. When taken together, they are a versatile and balanced army.

    **This boxed set builds 32 multipart plastic Legiones Astartes miniatures:**
    – 20 MkIV Tactical Legionaries
    – 2 Horus Heresy Tactical Marine accessory frames
    – 10 MkIV Assault Legionaries
    – 1 Sicaran Battle Tank
    – 1 Contemptor Dreadnought

    The miniatures in this box are easy to customise. The MkIV Tactical Squad kit allows you to build up to two Sergeants, each armed with a plasma pistol, and either a power fist, lightning claw, or power sword. 2 of them can be built with a nuncio-vox, and another 2 with a back-mounted Vexilla. You'll find 20 interchangeable helmeted heads, 12 bare heads, and 36 shoulder pads, and the kit is compatible with the Horus Heresy Tactical Marine accessory frame. The kit can alternatively build a Veteran Tactical Squad.

    The MkIV Assault Squad includes parts to build a Sergeant with either 2 power fists, 2 power claws, or a power fist or claw and a bolt pistol. The kit includes interchangeable components: 10 helmeted heads, 2 bare heads, 18 shoulder pads, 10 power lance upgrades, and 15 accessories.

    The Sicaran Battle Tank is equipped with turret-mounted accelerator autocannons, a hull-mounted heavy bolter, and a pair of sponson weapons – your choice of heavy bolters, heavy flamers, lascannons, or volkite culverins. The kit includes components to upgrade this vehicle with a pintle-mounted weapon – a havoc launcher, heavy bolter, heavy flamer, multi-melta, or a combi-weapon with five configurations (bolter, flamer, melta, plasma, or volkite) – as well as a searchlight, a hunter-killer missile, and cosmetic options such as towing hooks, a dozer blade, and a choice of a Space Marine gunner, spotter, or closed hatch.

    The Contemptor Dreadnought includes 8 different ranged weapons to choose from – a conversion beam cannon, Gravis autocannon, Gravis bolt cannon, Gravis lascannon, Gravis melta cannon, Gravis plasma cannon, Kheres assault cannon, and volkite dual-culverin – each of which can be mounted on either of the Contemptor's arms. The kit also includes two melee fists, each of which can be built as either a Gravis power fist or Gravis chainfist, and sports your choice of in-built weapon – a combi-bolter, graviton gun, heavy flamer, meltagun, or plasma blaster. The miniature can even be built with a hull-mounted havoc launcher or head-mounted helical targeting array. You'll also find a variety of alternate components and cosmetic options, including two heads, four different carapace designs, a choice of claws or fingers for the power fists, and scrollwork and tilting shield accessories.

    These miniatures have no Legion-specific markings, so you can use them in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    **Contents:**
    – 918 plastic components
    – 1 Citadel 60mm Round Base
    – 30 Citadel 32mm Round Bases
    – 2 Legiones Astartes Infantry Transfer Sheets
    – 2 Legiones Astartes Vehicle Transfer Sheets
    – 4 construction guides

    Each Legiones Astartes Infantry Transfer sheet features 618 high-quality waterslide transfers, and the Legiones Astartes Vehicle Transfer Sheets each feature 210 high-quality waterslide transfers. These include icons and markings for the Sons of Horus, Iron Warriors, Salamanders, and Imperial Fists Legions to decorate your miniatures.

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Warhammer Colour paints

    This boxed set is only available while stocks last.

    The MkIV Tactical Squad and MkIV Assault Squad will be available separately at a later date. The Sicaran Battle Tank and Contemptor Dreadnought are currently available separately.
