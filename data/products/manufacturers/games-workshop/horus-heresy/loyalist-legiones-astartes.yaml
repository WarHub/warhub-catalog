    Vigilators are the eyes of their Legion on the ground, their wisdom paramount in scouting out the foe’s disposition and strength, and determining the best place to strike. Often selected from Reconnaissance Squads, these peerless shots can operate with these formations or conduct their operations individually. Many commanders conducted entire campaigns based on the careful observations of a trusted Vigilator.

    This multipart resin kit builds a Vigilator, an expert sniper and master scout for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. They are ideal for sneaking into the right spot and taking out crucial enemy warriors with shots from their Nemesis rifle. This miniature comes with a choice of two heads – helmeted or bare.

