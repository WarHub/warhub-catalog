    This multipart resin and plastic kit builds three Legion Outriders - bike-mounted Space Marines clad in Mark IV power armour. The kit includes two weapon options for each Spatha combat bike - twin-linked bolters or twin-linked plasma guns. Each Space Marine biker is compatible with a range of Space Marine and Legion accessories.

    This kit is supplied with 3x Citadel 70 x 25mm Oval Bases. These miniatures are supplied unpainted and require assembly - we recommend using Citadel Colour paints.
