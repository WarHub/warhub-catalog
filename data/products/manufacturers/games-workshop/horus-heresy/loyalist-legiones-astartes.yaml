  description: |-
    Tactical Squads are the mainstay of the Space Marine Legions, highly versatile infantry units that can attack or defend at will, assault heavily fortified positions, take and hold strategic objectives – or simply slaughter the enemy – in almost any terrain or situation. All 18 Legions make heavy use of Tactical Squads in different ways – it is by the fighting power of thousands of superhuman warriors such as these, armed with deadly bolters and armoured for battle in the harshest of war zones, that the Imperium has beat a bloody path across the galaxy at the head of the Great Crusade.

    Mark IV 'Maximus Armour' was designed to offer a fine balance of agility and durability, exploiting many of the advanced technologies recovered by the Great Crusade. Its comparatively lightweight design, armoured external cabling, and redesigned helm make it prized amongst the Legiones Astartes – in the Age of Darkness, the Mark IV is perhaps the most common pattern of power armour seen across the galaxy.

    This multipart plastic kit builds 20 Space Marine Legionaries, which can be fielded in games of Warhammer: The Horus Heresy as one Legion Tactical Squad of 20 Legionaries, or two units of ten Legionaries. Each of these Legionaries is armed with a Tigrus-pattern bolter and bolt pistol, and can also be outfitted with a variety of additional components, including combat knives, grenades, and pouches. Up to two Legionaries can be outfitted with a back-mounted Legion vexilla. Accessories and alternate heads are included to build a Legion Tactical Sergeant for each of your squads. The kit offers a variety of extra weapon options for these unit leaders, including plasma pistols, chainswords, power swords, power fists, lightning claws, melta bombs, and combi-weapons with three configurations \(flamer, melta, or plasma\). These models have no Legion markings, allowing Warhammer hobbyists to paint them in whichever colours they choose.

    This set comprises 344 plastic components, 20x Citadel 32mm Round Bases, and 1x Legiones Astartes Infantry Transfer Sheet with 339 optional markings and iconography for the Sons of Horus and Imperial Fists Legions. These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    This kit also includes the components to equip Legionaries with up to two plasma guns, two melta guns, two flamers, two heavy bolters, and two missile launchers – note that these options are not valid for a Legion Tactical Squad as found in the Liber Astartes rulebooks, but can be used to create a Legion Veteran Squad, reinforce your Legion Tactical Support or Heavy Support Squads, or build Tactical Squads for games of Warhammer 40,000.
