  description: |-
    The Whirlwind Missile Tank provides mobile fire support to the Legiones Astartes, destroying or heavily suppressing enemy forces in support of advancing Legionaries. Its high mobility allows it to fire before repositioning, keeping it safe from enemy barrages or infantry assault.

    This multipart plastic kit builds one Whirlwind Missile Tank, a mobile artillery piece for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Based on the ubiquitous Rhino chassis, the troop-carrying capacity is entirely replaced with a powerful missile array capable of launching a variety of warheads to rain down on different targets. It’s ideal for striking enemy units with impunity from the other side of the battlefield, clearing out key objectives for your infantry to claim.

    In addition to its two pintle mounted bolters and smoke launchers, this kit includes components to upgrade the Whirlwind with an extra optional pintle-mounted weapon – a havoc launcher, heavy bolter, heavy flamer, multi-melta, or a combi-weapon with 5 configurations (bolter, flamer, melta, plasma, or volkite charger) – as well as a searchlight, a dozer blade, a hunter-killer missile, and cosmetic options like towing hooks, sigils, and a choice of a Space Marine gunner, spotter, or closed hatch.

    This miniature has no Legion-specific markings, so you can use it in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit is supplied with a Legiones Astartes Vehicle Transfer Sheet, featuring 288 high-quality waterslide transfers. These include Imperial Fists, Sons of Horus, Salamanders, and Iron Warriors icons, plus numbers and other markings to decorate your tank.

    This kit comprises 124 plastic components. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
