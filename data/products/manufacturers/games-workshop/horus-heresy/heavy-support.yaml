  description: |-
    Heavily-armed and impressively armoured, the Leviathan Siege Dreadnought is a powerful siege and hunter-killer engine that can crush any opposition. Yet such overwhelming strength comes at a cost - a Leviathan's systems place a lethal strain upon its occupant, the entombed incumbent burning brightly but only briefly. Incarceration within a Dreadnought chassis holds a particular horror for the White Scars, who value the joys of life more than any other. Such deathless warriors shoulder the burden of their endless watch with tragic solemnity, and are known in the Chogorian tongue as the 'Uhaan Solban’ - the Guardians of the Morning and Evening Stars.

    This multipart resin kit builds one Leviathan Siege Dreadnought for the White Scars. This looming and highly-detailed walker is designed to perfectly suit the sons of the Great Khan, featuring the iconography and numerals of the V Legion alongside decorations such as Chogorian glyphs, beaten-metal armour plates, and fur coverings. The Dreadnought's torso houses a pair of additional weapons - your choice of heavy flamers or twin-linked volkite calivers - and it can also be armed with an optional hull-mounted phosphex discharger. This miniature's joints can be assembled to produce a range of poses, and it comes with two pairs of feet - one straight, one bent - allowing you to build it as though standing or striding forward.

    This kit does not include arm-mounted weapons for the Leviathan Dreadnought - these are shown for illustrative purposes only, and are available separately.

    This kit comprises 25 resin components, and is supplied with a Citadel 80mm Round Base. This miniature is supplied unpainted and requires assembly - we recommend using Citadel Colour paints.
