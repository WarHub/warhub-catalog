  description: |-
    Heavily armed and impressively armoured, the Leviathan Siege Dreadnought is an alternative development of the highly successful Contemptor design. These rare and mighty engines are prized by Astartes commanders, recognised as savagely powerful siege and hunter-killer units that can crush any opposition with an unstoppable wrecking charge. Yet such overwhelming strength comes at a cost – a Leviathan's systems place an onerous and ultimately lethal strain upon its occupant, the entombed incumbent burning brightly but only briefly in their second life.

    This multipart plastic kit builds one Leviathan Siege Dreadnought, an intimidating armoured walker equipped with deadly melee weapons, for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. Each of the Leviathan's mechanical fists is armed with a built-in meltagun, and can be assembled as either a crushing siege claw, or a grinding siege drill with individually posable digits. The Dreadnought's torso houses a pair of additional weapons – your choice of heavy flamers or twin-linked volkite calivers – and it can also be armed with an optional hull-mounted phosphex discharger. This impressively customisable kit includes a choice of three different chest plates, two different cowls, and three different inguinal armour plates. The Dreadnought's joints and head can all be positioned separately for a range of poses, with alternate cables for different arm poses, and foot options to give the appearance of stomping forward or planting its feet to receive a charge.

    This miniature has no Legion-specific markings, so you can use it in any Space Marines force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    This kit comprises 153 plastic components, 1x Citadel 80mm Round Base, and 1x Legiones Astartes Vehicle Transfer Sheet containing 44 optional markings and icons for the Sons of Horus and Imperial Fists Legions. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    This kit is compatible with the Leviathan Dreadnought Ranged Weapons Frame, which is available separately, allowing you to outfit your walker to destroy enemies from afar.
