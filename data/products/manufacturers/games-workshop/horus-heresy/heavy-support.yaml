  description: |-
    The Krios Battle Tank originated on Mars, and arcane integrated systems well outside the purview of most facilities are used to build or maintain them. Its durability is provided by interlocking defensive energy fields, rather than physical armour, lending it a deceptively skeletal appearance. Many armament patterns and hull variants of the Krios exist but the most common mount varieties of heavy energy weapons unique to the Mechanicum, such as the lightning cannon and pulsar-fusil.

    This multipart plastic kit builds either a Krios Battle Tank or Krios Venator for your Mechanicum armies or as allies in your Legiones Astartes or Solar Auxilia armies in games of Warhammer: The Horus Heresy. Each variant mounts different, yet equally terrifying, heavy weaponry – the Krios Battle Tank is armed with either a lightning cannon or irradiation blaster, while the Venator mounts a pulsar-fusil. These light and manoeuvrable tanks get your heavy firepower right where you need it without sacrificing protection due to their interlocking energy-field defences. Both variants can also be armed with a pair of optional volkite calivers.

    This kit comprises 138 plastic components, and 1x Mechanicum Macro-constructs Transfer Sheet containing 394 high-quality waterslide transfers to decorate your miniature.

    This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
