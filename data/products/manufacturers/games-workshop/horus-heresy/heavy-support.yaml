  description: |-
    The Leman Russ Assault Tanks used by the Solar Auxilia are aggressive, heavily armoured vehicles, augmented with Solar-pattern survival systems that allow both tank and crew to operate in the harshest conditions. Squadrons of Assault Tanks are fielded in direct assaults, boasting enough raw firepower to smash through fortified positions in close support of infantry tercios.

    This multipart plastic kit builds one Solar Auxilia Leman Russ Assault Tank, a formidable vehicle with a selection of powerful guns. Its turret houses one of three primary weapons – an explosive demolisher cannon, advanced Executioner plasma cannon, or a searing volkite macro-saker. It also sports a hull-mounted weapon – a heavy bolter, lascannon, autocannon, multi-laser, or heavy flamer. The turret and both weapons feature glueless assembly, allowing you to adjust their positions mid-game.

    The kit includes components to upgrade your Leman Russ with a hunter-killer missile and dozer blade, and the turret hatch can be built with closed doors, or opened for a Solar Auxilia gunner with a pintle-mounted weapon – a heavy flamer, multi-laser, or heavy stubber. You'll also find plenty of cosmetic options, such as sigils, armour patches, a spotter, and a choice of crew heads.

    This kit comprises 166 plastic components, as well as a Solar Auxilia Vehicle Transfer Sheet containing 180 high-quality waterslide transfers. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
