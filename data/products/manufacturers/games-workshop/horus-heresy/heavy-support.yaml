  description: |-
    The Fire Raptor is a variant of the Storm Eagle, created with the aim of providing overwhelming aerial firepower to Legiones Astartes assault forces. In addition to a twin nose-mounted Avenger bolt cannon and an array of rockets or missiles, the Fire Raptor replaces the Storm Eagle's capacious transport bay with ammunition and targeting cogitators for two independent ball turrets.

    **Aerial Close Support**

    This multipart resin and plastic kit builds one Fire Raptor Gunship, an aircraft that provides overwhelming airborne firepower for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. It’s armed with a twin Avenger bolt cannon, and its gyroscopic ball turrets can be equipped with either Gravis heavy bolter batteries or Gravis autocannon batteries. Your devastating volleys will shred infantry and destroy light-to-medium enemy armour. The kit features a fully detailed interior, including a pilot and 2 gunners, and its landing gear can be built retracted or extended.

    This miniature has no Legion-specific markings, so you can use it in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    **Contents:**
    – 67 resin components
    – 100 plastic components
    – 4 clear plastic window components
    – 1 Citadel 120mm by 92mm Oval Base
    – 1 Citadel Flying Stem
    – 1 construction guide

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Citadel Colour paints

    Legends rules for using the Fire Raptor Gunship in games of Warhammer 40,000 can be downloaded for free from the Warhammer Community website.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
