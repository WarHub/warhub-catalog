  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123005011_THHSolarAuxilliaHermesLightSentinelSquadron01.jpg
  status: current
  description: |-
    Hermes Sentinels are employed as scout walkers and mobile fire platforms by the Solar Auxilia. Fast-moving squadrons of Light Sentinels can strike at enemy formations and disengage before significant resistance is brought to bear, while more heavily-armoured Veletaris Sentinels support aggressive frontal assaults by pressuring the target's vulnerable flanks.

    This multipart plastic kit builds two Hermes Light Sentinels or Hermes Veletaris Sentinels – swift combat walkers for the Solar Auxilia. Each Hermes Light Sentinel is ridden by a pilot in void armour, and can be armed with either a multi-laser or a grenade launcher. The Hermes Veletaris Sentinels are piloted by elite Veletaris soldiers in reinforced armour, and feature additional plating on their legs and sides – they can be armed with a heavy flamer or a volkite caliver.

    Both styles of pilot have poseable heads, and each Sentinel's legs can be assembled in different poses to add variety and character to your squadrons. An adventurous hobbyist can even remove the pegs, for full poseability on every leg-joint!

    This kit comprises 110 plastic components, 2x Citadel 60mm Round Bases, and a Solar Auxilia Vehicle Transfer Sheet containing 180 high-quality waterslide transfers. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Storm Eagle Assault Gunship
  productCode: prod2691213-99863001247
  sku: 99863001247
  productType: vehicle
  priceGbp: 156.5
  url: https://www.warhammer.com/en-GB/shop/Storm-Eagle
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99863001247_SMStormEagleLead.jpg
  status: current
  description: |-
    The Storm Eagle assault gunship is one of the most numerous designs found in a Space Marine Legion airfleet. As a tactical strike unit, its primary roles are orbital assault deployment of Legion forces and low-level ground attack. The Storm Eagle is a rugged and durable machine, heavily armed for its size, and protected by armour plating, although it lacks the speed and manoeuvrability of true fighters.

    **Fly Into Any Hotspot**

    This multipart resin and plastic kit builds one Storm Eagle, a heavily armed airborne transport for your Legiones Astartes armies in games of Warhammer: The Horus Heresy. After swooping in and dropping off your deadly cargo, you can support your army with a range of devastating weaponry – choose from twin heavy bolter or twin multi-melta on the nose mount, and tempest rockets or twin lascannon in the wings to support your hull-mounted missile launchers. The kit features a fully detailed interior, including a pilot, and its landing gear can be built retracted or extended.

    This miniature has no Legion-specific markings, so you can use it in any Legiones Astartes force, whether you're loyal to the Emperor or have joined Horus in his rebellion.

    **Contents:**
    – 33 resin components
    – 100 plastic components
    – 4 clear plastic window components
    – 1 Citadel 120mm by 92mm Oval Base
    – 1 Citadel Flying Stem
    – 1 construction guide

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Citadel Colour paints

    Legends rules for using the Storm Eagle in games of Warhammer 40,000 can be downloaded for free from the Warhammer Community website.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
