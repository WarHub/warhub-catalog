  description: |-
    Vultarax automata make use of a complex cortex unit that allows them to control the various gravitic impellers and jets that hold them aloft, and grant them more affinity for independent action. While the Magos of the Mechanicum employ the Vultarax as a forward unit, ranging ahead to engage and harass the foe, those automata they grant the Skitarii Conclaves are employed primarily as scout surveyors. In this secondary role, the Mechanicum permit some Stratos-automata to be retrofitted with additional auspex scanning arrays.

    This multipart plastic kit builds a Vultarax Stratos-Automata, a floating weapons platform for your Mechanicum and Skitarii Conclave armies in games of Warhammer: The Horus Heresy. Armed with an arc blaster, Vultarax missile launcher, and dendrite talons, this fast unit is a threat at range and at close quarters. There are a variety of different dendrite talons and tendril designs, offering a degree of customisation.

    This miniature has no allegiance-specific markings, so you can use it in any Mechanicum force, whether you believe the Emperor to be the true Omnissiah or a false prophet.

    This kit is supplied with 1x Mechanicum Constructs Transfer Sheet, containing 558 high-quality waterslide transfers. These include symbols for Opus Machina, Opus Taghmata, Iungum Cybernetica, Covenant Cybernetica, and Fracta Aedificium, along with other lines, markings, and cogs to decorate your miniatures.

    This kit comprises 92 plastic components, 1x Citadel 100mm Round Base, and 1x 115mm Ball Stem Adapter. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
