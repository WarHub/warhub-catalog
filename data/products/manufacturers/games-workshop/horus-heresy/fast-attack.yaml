  description: |-
    The Ursarax are heavy, rapid-moving close combat killing machines. Like the Thallax, Ursarax are thralls rather than servitors – selected from suitable human candidates for conversion. Their living components retain a consciousness and dim recollection of their former humanity, providing them with superior tactical abilities and the instinct to kill.

    This multipart plastic kit builds 6 Ursarax, a terrifying elite melee unit for your Mechanicum armies or as allies in your Legiones Astartes or Solar Auxilia armies in games of Warhammer: The Horus Heresy. Their utan jump boosters make them swift, and their lightning claws and volkite incinerators make them deadly – allowing them to range ahead of your army to disrupt enemy plans. Two of the six may alternatively be built with power fists, making them even more devastating when they get up close and personal.

    This kit comprises 262 plastic components and 6x Citadel 40mm Round Bases. This set also includes 1x Mechanicum Constructs Transfer Sheet containing 558 high-quality waterslide transfers to decorate your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
