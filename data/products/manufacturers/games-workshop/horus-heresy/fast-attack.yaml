  description: |-
    The Golden Keshig are heavy assault jetbike squads, ranked amongst the most prestigious of the White Scars main combat units. These superlatively skilled riders serve as linebreakers par excellence, sundering enemy formations as the speartip of the Legion. The lightning speed of the Shamshir jetbike allows the Golden Keshig to encircle and strike with unstoppable momentum, armed with a Kontos power lance capable of piercing even the thickest tank armour.

    This multipart resin kit builds builds one Golden Keshig Rider, an elite jetbike cavalier for Golden Keshig Squadrons of the White Scars Legion. Mounted on a Shamshir jetbike with an underslung scatterbolt launcher, this skyborne hunter is covered in mechanical details, from the jetbike's many exhaust vents to its powerful rear engine. The rider is clad in modified Mark III power armour sporting the sculpted iconography of the V Legion, and wields a long-handled Kontos power lance - the signature weapon of the Golden Keshig - plus your choice of a power sword or power axe.

    This kit is supplied with a Citadel 60mm Flying Base and a Citadel Flying Stem. This miniature is supplied unpainted and requires assembly - we recommend using Citadel Colour paints.
