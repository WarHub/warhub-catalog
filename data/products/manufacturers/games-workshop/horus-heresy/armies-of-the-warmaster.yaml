  status: current
  description: |-
    The Cults Abominatio are a dark mirror of the Divisio Assassinorum, aiding the Traitor cause with inhuman operatives created through a fusion of long-forbidden techniques, heretek augmentation, and compacts with corrupting otherworldly powers. The Infernus Abomination is one such creature – a terrifying, shapeshifting killer fuelled by the pain and suffering of its victims. Fragmentary reports from near-insane survivors speak of the Infernus as a shapeless apparition haunting the battlefield, its anatomy dissolving and reforming into new and nightmarish aspects designed specifically for each victim.

    This multipart resin kit builds one Infernus Abomination, an engineered monstrosity of the Cults Abominatio. Wrapped in a wraithskin body glove that ripples and shifts as it pushes the host's warped form beyond normal limits, this mutated operative also wears a technological face mask marked with Chaos iconography. The Infernus Abomination's transmutative armaments are formed from its very biology, allowing it to sprout unnatural talons, painful spikes, and a boneshard spitter that drips with deadly toxins.

    This kit comprises nine resin components, and comes with a Citadel 32mm Round Base. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Colour paints.
- name: Ka'bandha, Daemon General of Signus
  productCode: prod4920205-99863002310
  sku: 99863002310
  productType: character
  priceGbp: 248.5
  url: https://www.warhammer.com/en-GB/shop/ka-bandha-daemon-general-of-signus-2022
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99863002310_KaBandaLead.jpg
  status: current
  description: |-
    Of all the dark legends spawned by the daemonic incursions that harrowed the Imperium during the Age of Darkness, that of Ka’bandha cast the darkest shadow across history. This bat-winged terror, clad in heavy bronze plate and capable of cleaving a dozen men in twain with each swing of its talons and hell-forged weapons, would herald the end for dozens of Imperial worlds, scouring them clean with fire and fury.

    This multipart resin kit builds Ka’bandha, Daemon General of Signus, arch-enemy of the IX Legion, for your Daemons of the Ruinstorm armies in games of Warhammer: The Horus Heresy. Armed with an ornate daemonic axe and whip, he’s ready to cut a bloody swathe through the sons of Sanguinius or anyone else you point him at.

    He stands at an imposing 25cm tall with a 27cm wingspan. From his hellish visage to his brutal bronze armour and vast wings, Ka'bandha is a paragon of fury – and a wonderful project for painters who want to create a stunning centrepiece for their collection. He can be assembled with a daemonic helm or a bare, snarling head. Underneath one of his mighty hooves sits a pile of rubble alongside an Astartes corpse, and a ruined Leviathan Dreadnought belonging to the Blood Angels Legion.

    This kit comprises 49 resin components and 1x Citadel 170mm Oval Base. This miniature requires assembly and is supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: Ruinstorm Daemon Brutes
  productCode: prod4270234-99860102300
  sku: 99860102300
  productType: single_kit
  priceGbp: 94
  url: https://www.warhammer.com/en-GB/shop/Ruinstorm-Daemon-Brutes-2019
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102300_HHRuinstormDaemonBrutes01.jpg
  status: current
  description: |-
    Hulking creatures of twisted muscle and sharpened bone, Daemon Brutes are the vanguard of the horde, created to break the fragile ranks of mortal armies and serve as a bulwark for the smaller minions of Chaos that follow in their wake. Each of these brutish monsters towers over even the enhanced warriors of the Legiones Astartes and is capable of shrugging aside the mass reactive projectiles of boltguns as though they were mere irritations.

    These terrifying monsters sunder any formation and break any line set against them. Unlike other Ruinstorm Daemon units, they can be set up at the beginning of a battle, giving you more tactical options. They can also accompany a Ruinstorm Daemon Lord as its retinue, creating a truly destructive unit.

    This 30-part highly detailed resin kit makes three Ruinstorm Brutes, one armed with a sword, one with an axe and one with a double-handed hammer. It comes supplied with three 50mm round Citadel bases.
- name: Cor'bax Utterblight, Daemon Prince of the Ruinstorm
  productCode: prod2920160-99863002228
  sku: 99863002228
  productType: character
  priceGbp: 98
  url: https://www.warhammer.com/en-GB/shop/Cor-bax-Utterblight-Daemon-Prince-of-the-Ruinstorm
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102228_CorbaxUtterblight01.jpg
  status: current
  description: |-
    Called forth by the dark rites of the traitorous Word Bearers Legion, the Ruinstorm unleashed a vast horde of the malevolent denizens of the Warp upon the Imperium. Most deadly amongst them were those that came to be known as the Daemon Princes of the Ruinstorm, and counted amongst their number was the vile, pestilent and ever-hungry Cor’bax Utterblight.

    Those who have witnessed this loathsome disciple of Nurgle in action tell of a tidal wave of rot and disease which spills before Cor’bax as he enters the battlefield. Life corrupts at his touch, and any mortals unfortunate enough to survive are snapped up whole within his gaping maw to slowly perish and fuel the gifts of Nurgle Cor’bax will generously bestow upon the next world he attacks.

    Cor’bax Utterblight, Daemon Prince of the Ruinstorm, is part of Forge World’s Horus Heresy Character Series. He stands more than twice the height of a man and his body is festooned with tentacles, spikes and the remains of those he has devoured, whilst a bloated tongue protrudes from his tooth-filled maw. A trio of Nurglings are also included for you to position on Cor’bax Utterblight or over his 120mm oval base.

    This is a complete, multi-part resin kit.
- name: Samus, Daemon Prince of the Ruinstorm
  productCode: prod2870170-99863002224
  sku: 99863002224
  productType: character
  priceGbp: 98
  url: https://www.warhammer.com/en-GB/shop/Samus-Daemon-Prince-of-the-Ruinstorm
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560102224_Samus01.jpg
  status: current
  description: |-
    A Daemon Prince of the Ruinstorm, spreading madness and slaughtering all before him in baleful frenzy, Samus is here! A hulking monstrosity, towering over mortals, Samus, a daemon of murder made manifest, was incarnated at the height of his powers as the walls between reality and the Warp were stretched thin by the Word Bearers’ dark rites at Calth. If his corporeal flesh was destroyed, he would soon return again to wreak havoc and claim more souls for the powers of Chaos, the sound of his name echoing through the Warp and in the minds of men.

    Samus, Daemon Prince of the Ruinstorm is the latest model in the Horus Heresy Character Series. Presented in a collectors edition black box, Samus can be built with his right hand clutching a dismembered Space Marine or as an open claw. Samus can be used in Word Bearers Legion armies and Codex: Chaos Daemon armies in Horus Heresy games.

    This is a complete, multi-part resin kit.
