  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99550102289_AlphaLegionDeimosRhinoDoors.jpg
  description: |-
    The Rhino is the most widely used armoured personnel carrier in the Imperium. Produced in the thousands and with several distinct patterns in common use – the Deimos being most widespread in the Space Marine Legions, it has also served as the basis for other war machines.

    This multipart resin kit consists of two Deimos pattern Rhino doors, displaying Alpha Legion iconography, to upgrade your transports in games of Warhammer: The Horus Heresy. Let your undercover agents know that mechanised support has arrived and teach your enemies to fear the XX Legion.

    These doors are compatible with the Deimos pattern Rhino and Scorpius Missile Tank, both available separately.

    This kit comprises 2 resin components. These parts are supplied unpainted – we recommend using Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
