    The Deathshroud are an elite cadre of warriors within the Death Guard Legion, clad in thick Terminator plate and armed with fearsome alchem casters and great powered scythes. Singled out by Mortarion and chosen for their skill-at-arms, fearlessness and proven endurance, they were often selected from Death Guard who had survived where their comrades had fallen. The Deathshroud formed Mortarion’s silent bodyguard, barring any from disturbing their lord with crossed blades and silent, unblinking stares.

