  description: |-
    The Dark Angels are a Legion of proud and aloof knights, true Angels of Death whose greatest deeds are shrouded in impenetrable secrecy. The I Legion wage war as the pinnacle of the Astartes, their six specialist Wings operating in uncompromising concord across each theatre of combat to outflank and exterminate. The victories achieved by the sons of the Lion place their abilities beyond reproach – their loyalties, however, are another question entirely.

    This upgrade kit allows you to customise Legionaries from the MKVI Tactical Squad set with shoulder pads that proudly display the winged sword icon of the Dark Angels. The kit includes 10 shoulder pads, each bearing a raised, sculpted icon that makes them simple to paint in the Legion's signature colours, with a rimless design perfectly suited to the sleek MKVI 'Corvus Armour'. Spread these components around your army and combine them with transfers to add some First Legion flavour, or outfit entire squads for an elite, unified look. The pack includes five distinct designs of shoulder pad, with different indents and sockets.

    This upgrade kit comprises 10 resin components and is designed to be assembled with the MKVI Tactical Squad set, which is sold separately. These components are supplied unpainted and require assembly – we recommend using Citadel paints.
