  description: |-
    The Legiones Astartes recruited Space Marines from across the galaxy – and though they may seem anonymous when clad in their power armoured helmets, each Legionary is an individual hero in their own right. Whether born on war-torn Terra, a Legion home world, or a far-flung planet reclaimed by the Great Crusade, the ranks of the Space Marines include an endless variety of visages, temperaments, battle scars, and even hairstyles.

    This resin upgrade kit provides 15 bare heads to customise your Space Marine miniatures, adding character and variation to your individual warriors. These heads sport a diverse range of facial features, expressions, scars, bionics, hair, and accessories, and all include a standard ball joint at the base of the neck, allowing them to be used with a wide variety of Space Marine miniatures in both plastic and resin. None of the heads bear specific Legion markings, meaning they can be used for any Legion.

