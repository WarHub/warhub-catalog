- name: Custodian Dreadnought
  productCode: P-245382-99123043006
  sku: 99123043006
  productType: single_kit
  priceGbp: 47
  url: https://www.warhammer.com/en-GB/shop/legio-custodes-custodian-dreadnought-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123043006_CustodesCustodianDreadnought1.jpg
  status: current
  description: |-
    The Dreadnoughts of the Legio Custodes are advanced, beautiful machines that wed phenomenal strength and speed with the interred warrior’s own unmatched martial skill. In those isolated cases where a Custodian has sustained irrevocable harm with their mind intact, internment within the cold and unyielding body of a Dreadnought is assured, for no Custodian would tolerate an end to their service short of death.

    **A Gleaming God of War**

    This multipart plastic kit builds one Custodian Dreadnought, a mighty war machine for your Legio Custodes armies in games of Warhammer: The Horus Heresy. They excel in melee, where the machine's power is combined with the interned Custodian's ability to create an almost unstoppable team. On the front lines, in the thick of the fighting, these gleaming walkers can turn the tide of any battle in your favour.

    **Customise Your Dreadnought**

    The stunningly detailed Contemptor Dreadnought can be built in one of 2 configurations – the dreadspear-armed Achillus, or the Galatus, equipped with a warblade and a Gravis praesidium shield. Both patterns are highly poseable. The Achillus has a choice of 2 spear heads, can be armed with a lastrum storm bolter, infernus incinerator, or Adrathic combi-destructor on each arm, and has the option of a closed or open left hand. There are also lots of cosmetic options, including 2 helmet facemasks, 2 helmet tops, 2 sculpted shoulder pad decorations, 2 chest decorations, and optional pteruges, making it easy to customise your devastating walker.

    **Contents:**
    – 162 plastic components
    – 1 Citadel 60mm Round Base
    – 1 Legio Custodes Dreadnought Transfer Sheet
    – 1 construction guide

    The Legio Custodes Dreadnought Transfer Sheet features 165 high-quality waterslide transfers. These include Custodian symbols, text for locations of great battles, and more to decorate your miniature.

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Citadel Colour paints
- name: Rapier Fire Support Battery
  productCode: P-247765-99123005019
  sku: 99123005019
  productType: single_kit
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/solar-auxilia-rapier-fire-support-battery-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123005019_SOLARAUXILIARAPIERFIRESUPPORTBATTERY2.jpg
  status: current
  description: |-
    The Rapier weapons carrier is used extensively by the Solar Auxilia – its rugged track assembly can transport support weaponry too heavy for an auxiliary to carry. The Rapier fulfils a number of battlefield roles in both attack and defence, and can be deployed alongside all manner of different force types, from vanguard exploration to full-scale planetary assault.

    **Bring Out the Big Guns**

    This multipart plastic kit builds 2 Rapier Carriers and 2 additional crew on foot, heavy support weapons for your Solar Auxilia armies in games of Warhammer: The Horus Heresy. These mobile platforms allow you to support the implacable advance of your infantry formations while also being able to quickly redeploy as the tactical situation requires.

    **Gear Up Your Gunners**

    Each Rapier can be armed with either a 'Thudd Gun' quad launcher for taking out infantry formations or a mole mortar for attacking dug-in enemies and the vulnerable bottom armour of tanks. The crew on foot have interchangeable arms, including options carrying rifles, scopes, and a map. There are also options to carry extra ammunition for each weapon type.

    Rules for this unit can be found in the *Warhammer: The Horus Heresy Journal Tactica: The Battle for Tallarn – Part One* supplement, available separately.

    **Contents:**
    – 198 plastic components
    – 2 Citadel 90mm by 52.5mm Oval Bases
    – 2 Citadel 25mm Round Bases
    – 1 construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Warhammer Colour paints
