- name: Jenetia Krole, Knight-Commander of the Silent Sisterhood
  productCode: prod3940218-99863008199
  sku: 99863008199
  productType: character
  priceGbp: 48.5
  url: https://www.warhammer.com/en-GB/shop/Jenetta-Krole-2018
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108199_KroleKnightCommander01.jpg
  status: current
  description: |-
    Assassin, general, avenger and soul-chilling terror, Jenetia Krole was a creature of dark legend long before she was committed as part of the honour guard tasked with the retrieval of the Primarch Magnus. Upon the battlefield of Tizca, Krole was personally responsible for the division of her ranks into protectorate detachments for the remainder of the Censure Host, a matter which allowed them to ensure the near-destruction of the Thousand Sons Legion at the sacrifice of thousands of her troops, while she herself sought out and slew many of the Thousand Sons’ most vaunted sorcerers in hand-to-hand combat. By the time of the battle’s ending, she appeared a spectral figure of some ancient myth, bedecked in the white dust of shattered marble and the spilled blood of multitudes.

    This multipart resin kit contains the components necessary to assemble Jenetia Krole, Knight-Commander of the Silent Sisterhood, who can be added to Talons of the Emperor armies. Wearing ornate artificer armour covered in Imperial iconography, with an enhanced voidsheen cloak, she carries the Sword of Oblivion in her right hand – this is a hefty blade indeed, the length of Jenetia’s arm and half again. Stowed on her hip is an archaeotech pistol, whose holster is attached via a jewelled leather belt. The voidsheen cloak that billows out behind her has 2 attached purity seals, and Jenetia features a choice of 2 heads – 1 features a protective metal mask which shields the lower half of her face, the other head is bare; both heads are supplied with their own distinct hair options. The model is supplied with a 32mm round scenic base, featuring a large, rocky outcrop.
- name: Sisters Of Silence Kharon Pattern Acquisitor
  productCode: prod3530418-99863008189
  sku: 99863008189
  productType: vehicle
  priceGbp: 116
  url: https://www.warhammer.com/en-GB/shop/Sisters-Of-Silence-Kharon-Pattern-Acquisitor-2017
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99560108189_KharonPatternAcquisitor01.jpg
  status: current
  description: |-
    Built to approach its targets silently and with utmost stealth, the Kharon Pattern Acquisitor is deliberately made to be a thing of mystery and terror when its presence is unveiled. Used primarily in a paramilitary role by the Sisters of Silence, it can suppress civilian resistance with lethal effect, its hellion cannon cutting through rampaging mobs and destroying makeshift barricades. Against greater threats, various payloads of missiles can be deployed, including sophisticated antipsyker warheads.

    This multi-part resin kit contains the parts needed to assemble a Kharon Pattern Acquisitor, a Dedicated Transport for a Talons of the Emperor army list. It’s an interestingly shaped craft, with an almost organic-looking hull dotted all over with the vents and exhausts needed to allow its stealthy movement on the battlefield. There are two options for the access hatch – closed, with thick armour covering it, or open, with the iris door clearly visible, ready to disgorge the warriors inside. The hull contains holes for inserting 2 8mm magnets \(not included\) to allow you to switch between the closed and open access hatch assemblies on the fly – of course, if you strongly prefer one, you can always glue it in place. As well as these details, the Acquisitor is armed with 2 missile launchers and 2 hellion cannon, one of each placed on either side of the hull.

    This kit comes as 19 resin components, and is supplied with a 170 x 105mm oval base and a clear flying stem.
- name: Solar Auxilia Stormhammer
  productCode: prod2800202-99863005385
  sku: 99863005385
  productType: vehicle
  priceGbp: 211
  url: https://www.warhammer.com/en-GB/shop/Solar-Auxilia-Stormhammer
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99590105385_SolarAuxiliaStormhammer01.jpg
  status: current
  description: |-
    The Stormhammer is the pre-eminent super-heavy assault tank of the Solar Auxilia. Equipped with a fearsome array of weapons with overlapping arcs of fire, it is often found in the vanguard of the Imperium’s invasion and pacification forces and is able, and often expected, to plunge into the heart of an enemy force and obliterate multiple units in short order.

    This multipart plastic and resin kit builds one Stormhammer, a mighty battle tank for your Solar Auxilia armies in games of Warhammer: The Horus Heresy. Drive straight through the centre of enemy lines and merrily blast apart your foes with an impressive array of weaponry – a turret-mounted Stormhammer cannon with co-axial multi-laser, a hull-mounted twin battlecannon, a hull-mounted lascannon, and six sponson-mounted multi-lasers, heavy flamers, heavy bolters, or lascannon.

    This kit comprises 60 resin components and 169 plastic components. This miniature requires assembly and is supplied unpainted – we recommend Citadel Colour paints.

    This resin modelling kit is not a toy – it is a collectable item and construction should only be undertaken by expert Warhammer hobbyists aged 15 years and over.
- name: 'Solar Auxilia: Combat Force'
  productCode: P-226966-99123005021
  sku: 99123005021
  ean: 5011921261819
  eanSource: shopify:goblingaming.co.uk
  productType: box_set
  priceGbp: 105
  url: https://www.warhammer.com/en-GB/shop/horus-heresy-solar-auxilia-combat-force-2025
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123005021_HorusHeresySolarAuxiliaCombatForceArmy1.jpg
  status: current
  description: |-
    The Solar Auxilia is an elite fighting force that relies on the weight of numbers, both in infantry and heavy armour assets, to grind their opponents down. Their equipment and fittings are as well suited to fighting in the void of space as they are on planet surfaces, fully sealed against the environment, no matter how harsh.

    If you want to hold the line to protect the Emperor or join the march to overthrow him, this box is the perfect way to start a new Solar Auxilia collection – or expand an existing army – and save money compared to buying the kits individually. You'll find a Lasrifle Section, excellent at holding objectives and controlling the battlefield with numbers. A Tactical Command Section leads them into battle while speedy Hermes Sentinels outflank the enemy. A mighty Leman Russ Strike Tank provides the heavy firepower, forcing your foes to keep their heads down with constant barrages.

    **This boxed set builds 28 multipart plastic miniatures:**
    – 1x Leman Russ Strike Tank
    – 2x Hermes Light Sentinels \(which can alternatively be built as Hermes Veletaris Sentinels\)
    – 5x Tactical Command Section members \(which can alternatively be built as a Legatine Command Section or Line Command Section\)
    – 20x Lasrifle Section Auxiliaries

    The miniatures in this kit are easy to customise. The Lasrifle Section miniatures can be fielded as one large unit, or two smaller ones of 10 Auxiliaries, each with their own optional Auxilia Sergeant, Auxiliary with vox interlock, and Auxiliary with auxilia vexilla. The Sergeants can be armed with your choice of laspistol, blast pistol, needle pistol, volkite serpenta, plasma pistol, or hand flamer, and a power fist, power sword, or charnabal sabre. Each Auxiliary's lasrifle can be upgraded with an optional bayonet.

    The Tactical Command Section builds an Auxilia Captain, armed with your choice of laspistol, blast pistol, needle pistol, volkite serpenta, plasma pistol, or hand flamer, and power fist, power sword, or charnabal sabre. The rest of the squad have options to take a command vox, augury scanner, and cohorts vexilla. They can also be used as a Line Command Section or Legatine Command Section, whose Legate Marshal can be armed with volkite serpenta, inferno pistol, archaeotech pistol, laspistol, blast pistol, needle pistol, plasma pistol, or hand flamer, and a thunder hammer, paragon blade, power fist, power sword, or charnabal sabre.

    The Hermes Light Sentinels can each be armed with either a multi-laser or a Hermes grenade launcher. They can alternatively be built as Hermes Veletaris Sentinels with additional armour and your choice of heavy flamer or a volkite caliver.

    The Leman Russ Strike Tank can be armed with one of four turret weapons – a battlecannon, twin lascannon, gravis autocannon, or vanquisher cannon with a co-axial mounted heavy stubber. You can also choose from five different hull-mounted weapons – a heavy bolter, lascannon, autocannon, multi-laser, or heavy flamer. There's an optional hunter-killer missile, searchlights, and dozer blade, along with a pintle-mounted heavy flamer, multi-laser, or heavy stubber. There is also a cognis-signum to upgrade to a Command Tank, and an optional flare shield if you choose to do so.

    This kit comprises 790 plastic components, 2x Citadel 60mm Round Bases, 25x Citadel 25mm Round Bases, 2x Solar Auxilia Infantry Transfer Sheets each containing 152 high-quality waterslide transfers, and 2x Solar Auxilia Vehicle Transfer Sheets each containing 180 high-quality waterslide transfers to customise your miniatures.

    These miniatures require assembly and are supplied unpainted – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Hermes Light/Veletaris Sentinel Squadron
  productCode: P-178257-99123005011
  sku: 99123005011
  ean: 5011921215690
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 42.5
  url: https://www.warhammer.com/en-GB/shop/solar-auxilia-hermes-sentinel-squadron-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123005011_THHSolarAuxilliaHermesLightSentinelSquadron01.jpg
  status: current
  description: |-
    Hermes Sentinels are employed as scout walkers and mobile fire platforms by the Solar Auxilia. Fast-moving squadrons of Light Sentinels can strike at enemy formations and disengage before significant resistance is brought to bear, while more heavily-armoured Veletaris Sentinels support aggressive frontal assaults by pressuring the target's vulnerable flanks.

    This multipart plastic kit builds two Hermes Light Sentinels or Hermes Veletaris Sentinels – swift combat walkers for the Solar Auxilia. Each Hermes Light Sentinel is ridden by a pilot in void armour, and can be armed with either a multi-laser or a grenade launcher. The Hermes Veletaris Sentinels are piloted by elite Veletaris soldiers in reinforced armour, and feature additional plating on their legs and sides – they can be armed with a heavy flamer or a volkite caliver.

    Both styles of pilot have poseable heads, and each Sentinel's legs can be assembled in different poses to add variety and character to your squadrons. An adventurous hobbyist can even remove the pegs, for full poseability on every leg-joint!

    This kit comprises 110 plastic components, 2x Citadel 60mm Round Bases, and a Solar Auxilia Vehicle Transfer Sheet containing 180 high-quality waterslide transfers. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Aethon Heavy Sentinel
  productCode: P-173959-99123005009
  sku: 99123005009
  ean: 5011921203390
  eanSource: shopify:goblingaming.co.uk
  productType: vehicle
  priceGbp: 38
  url: https://www.warhammer.com/en-GB/shop/solar-auxilia-aethon-heavy-sentinel-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123005009_AethonHeavySentinel2a.jpg
  status: current
  description: |-
    Aethon Heavy Sentinels are a common sight among the ranks of the Solar Auxilia and are most often piloted by grizzled veterans adept at identifying key enemy targets. These robust machines are able to traverse void station interiors and ruined cityscapes with ease, often forming the lynchpin around which many a successful close-quarters assault has swung.

    This multipart plastic kit builds one Aethon Heavy Sentinel, an armoured combat walker for the Solar Auxilia. The Sentinel comes with an arsenal of heavy weaponry, and can be armed with one of six dorsal guns – a volkite culverin, autocannon, heavy incinerator, lascannon, multi-laser, or a melta lance. It also features paired ordnance systems on its sides – either an Aethon missile battery, or a set of four hunter-killer missiles.

    The Aethon Heavy Sentinel's weapon mounts allow for glueless assembly, so you can adjust their positions mid-game. Its legs can also be assembled in different poses to add variety and character to your squadrons – an adventurous hobbyist can even remove the pegs, for full poseability on every leg-joint!

    This kit comprises 75 plastic components, a Citadel 80mm Round Base, and a Solar Auxilia Vehicle Transfer Sheet containing 180 high-quality waterslide transfers. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
- name: Solar Auxilia Tactical Command Section
  productCode: P-173934-99123005003
  sku: 99123005003
  ean: 5011921203307
  eanSource: shopify:goblingaming.co.uk
  productType: character
  priceGbp: 21.5
  url: https://www.warhammer.com/en-GB/shop/solar-auxilia-tactical-command-section-2024
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123005012_THHSolarAuxLaunchBox09.jpg
  status: current
  description: |-
    Solar Auxilia Tactical Command Sections are specialists in battlefield command and control. Led by a Captain or similar sub-commander, these expert sections facilitate the flow of orders, direct the tercios, and co-ordinate artillery and orbital operations. This vital role is mirrored by the junior Line Command Sections who lead frontline troops, while the most powerful and celebrated officers of the Solar Auxilia, known broadly as Legate Marshals, instead go to war with personal guards equipped from their private armouries.

    This multipart plastic kit builds a Solar Auxilia Tactical Command Section, comprising one Auxilia Captain and four Auxilia Companions. These soldiers are clad in finely decorated void armour, and carry command gear alongside their lasrifles – the kit includes an augury scanner, a command vox, and a proud cohorts vexilla, as well as a lethal melta bomb. The Captain comes with a choice of heads, and loads of extra weaponry – a power fist, power sword, or charnabal sword, as well as a laspistol, blast pistol, needle pistol, plasma pistol, or hand flamer.

    This highly versatile kit can alternatively build a lower-ranking Line Command Section, wearing less ornate armour and carrying a more austere vexilla. It can also be used to build a Legate Marshal, accompanied by four Lifewards. You'll find even more weapons for the Legate Marshal – a volkite serpenta, inferno pistol, or archeotech pistol, and a thunder hammer or paragon blade – and the Lifewards can be armed with some of their lord's spare wargear!

    This kit comprises 137 plastic components, 5x Citadel 25mm Round Bases, and a Solar Auxilia Infantry Transfer Sheet containing 152 high-quality waterslide transfers. These miniatures are supplied unpainted and require assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.

    Note that this kit includes enough components to build an additional Auxilia Companion, if you have a spare Citadel 25mm Round Base.
- name: Dracosan Armoured Transport
  productCode: P-173748-99123005001
  sku: 99123005001
  ean: 5011921203284
