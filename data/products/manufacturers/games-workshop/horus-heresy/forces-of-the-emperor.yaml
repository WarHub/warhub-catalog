  description: |-
    Shield Captains are warriors of consummate and superhuman ability, rare insight, acumen, and knowledge. Afforded the finest of the Imperium’s arms, each of these legendary fighters commands the Legio Custodes against all manner of threats – they bear the might and power of the Legio, manifested in a single indomitable warrior.

    **An Exemplar of Terra’s Might**

    This multipart plastic kit builds one Shield Captain, an exemplary warrior and strategist for your Legio Custodes armies in games of Warhammer: The Horus Heresy. They are clad in the finest armour and lavished in details, including sculpted iconography and filigree, giving an ornate appearance. This leader is equipped with a praesidium shield and an eternity blade, which is both a mark of office and a deadly weapon. The miniature comes with a choice of 2 heads – helmeted and bare – offering a degree of customisation for your mighty leader.

    This miniature can be used to represent a Tribune – a mighty leader held in immense esteem by their fellow Custodians.

    **Contents:**
    – 24 plastic components
    – 1 Citadel 40mm Round Base
    – 1 construction guide

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Citadel Colour paints
- name: Venatari Sodality
  productCode: P-245359-99123043003
  sku: 99123043003
  productType: single_kit
  priceGbp: 49.5
  url: https://www.warhammer.com/en-GB/shop/legio-custodes-venatari-sodality-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123043003_CustodesVenatariSodality1.jpg
  status: current
  description: |-
    The role of Custodian Venatari is a high honour among their Legio and is reserved for those who have proven themselves successful in the Blood Games. Their domain resides among the rooftops and spires of the Imperial Palace and in the skies above any Custodian assault, overseeing and assessing potential threats below before swooping into a killing dive.

    **Strike From the Skies**

    This multipart plastic kit builds 6 Venatari, elite airborne infantry for your Legio Custodes armies in games of Warhammer: The Horus Heresy. Held aloft on their Custodian jump harnesses, they fly over the battlefield, hunting their targets. Armed with advanced archaeotech weapons, these swift killers excel at using their speed to take out isolated enemy targets.

    **Hunt in Style**

    Each member of the unit can be equipped with either a tarsus buckler and brutal kinetic destroyer to slay the Emperor’s enemies from afar, or a verutum lance to strike down foes in close combat. They can each take an optional neutronium cascade mine to destroy vehicles at the molecular level, and 2 Ventari can be assembled carrying these baleful devices in their hands. There are also a number of interchangeable parts, which make it easy to customise your swooping predators.

    **Interchangeable parts:**
    – 10 heads (of 5 designs)
    – 6 tarsus bucklers (of 3 designs)
    – 8 Custodian jump harnesses (of 3 designs)
    – 12 left shoulder pads (of 2 designs)
    – 12 right shoulder pads (of 2 designs)

    **Contents:**
    – 196 plastic components
    – 6 Citadel 40mm Round Bases
    – 1 construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Citadel Colour paints
- name: Custodian Guard Sodality
  productCode: P-245358-99123043005
  sku: 99123043005
  productType: single_kit
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/legio-custodes-custodian-guard-sodality-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123043005_CustodesCustodianGuard1.jpg
  status: current
  description: |-
    The Custodian Guard are terrifyingly potent fighters – stronger, faster and more resilient than even Space Marines. Clad in uniquely alloyed armour and armed with lethal guardian spears, they are both living symbols of the Emperor’s authority and unrivalled warriors.

    **Guardians of the Golden Throne**

    This multipart plastic kit builds 6 Custodian Guards, the pinnacle of genecrafted warriors for your Legio Custodes armies in games of Warhammer: The Horus Heresy. Armed with the iconic guardian spear, they can unleash a barrage of bolts before expertly delivering the coup de grâce. Fast and deadly, they excel at marching across the battlefield to claim crucial objectives from any Traitors foolish enough to stand in their way.

    **In Auramite Clad**

    Each Custodian Guard is lavished in details, including sculpted iconography and filigree, giving them the ornate appearance you’d expect from the Emperor’s bodyguards. One of the Custodian Guards can optionally replace their guardian spear with a magisterium vexilla. The kit also includes 23 interchangeable heads – 12 helmeted and 11 bare – and 6 plumes that are interchangeable across the helmets, making it easy to customise your legendary warriors.

    **Contents:**
    – 128 plastic components
    – 6 Citadel 40mm Round Bases
    – 1 construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Citadel Colour paints
- name: Caladius Annihilator Grav-tank
