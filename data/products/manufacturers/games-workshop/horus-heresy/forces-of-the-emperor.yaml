  description: |-
    The Leman Russ Strike Tanks fielded by the Solar Auxilia are robust armoured vehicles, augmented with Solar-pattern survival systems that allow both tank and crew to operate in the harshest conditions. Squadrons of Strike Tanks are often used to perform wide flanking advances, guided by a Leman Russ Command Tank in order to engage an enemy at the precise moment the cohort's infantry sections launch their own assault.

    This multipart plastic kit builds one Solar Auxilia Leman Russ Strike Tank, a powerful tank of the line with a versatile loadout. Its turret houses one of four primary weapons – a battlecannon, twinned heavy lascannons or autocannons, or a long-barrelled Vanquisher battlecannon with a co-axial autocannon. It also sports a hull-mounted weapon – a heavy bolter, lascannon, autocannon, multi-laser, or heavy flamer. The turret and both weapons feature glueless assembly, allowing you to adjust their positions mid-game.

    The kit includes components to upgrade your Leman Russ with a hunter-killer missile and dozer blade, and the turret hatch can be built with closed doors, or opened for a Solar Auxilia gunner with a pintle-mounted weapon – a heavy flamer, multi-laser, or heavy stubber. You'll also find plenty of cosmetic options, such as sigils, armour patches, a spotter, and a choice of crew heads.

    You can alternatively use this kit to build a Leman Russ Command Tank, outfitted with an electromagnetic flare shield and a cognis-signum array for battlefield communication and co-ordination.

    This kit contains 163 plastic components, as well as a Solar Auxilia Vehicle Transfer Sheet containing 180 high-quality waterslide transfers. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
