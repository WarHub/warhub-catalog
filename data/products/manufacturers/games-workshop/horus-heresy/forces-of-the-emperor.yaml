    This multipart plastic kit builds a Solar Auxilia Tactical Command Section, comprising one Auxilia Captain and four Auxilia Companions. These soldiers are clad in finely decorated void armour, and carry command gear alongside their lasrifles – the kit includes an augury scanner, a command vox, and a proud cohorts vexilla, as well as a lethal melta bomb. The Captain comes with a choice of heads, and loads of extra weaponry – a power fist, power sword, or charnabal sword, as well as a laspistol, blast pistol, needle pistol, plasma pistol, or hand flamer.

