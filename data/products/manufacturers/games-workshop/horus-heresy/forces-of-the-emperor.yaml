- name: Charonite Ogryn Section
  productCode: P-247763-99123005017
  sku: 99123005017
  productType: single_kit
  priceGbp: 44.5
  url: https://www.warhammer.com/en-GB/shop/solar-auxilia-charonite-ogryn-section-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123005017_SOLARAUXILIACHARONITEOGRYNSECTION1a.jpg
  status: current
  description: |-
    Charonite Ogryns are biochemically and cybernetically altered abhumans. Mutilated in mind and body, they are creatures of brute obedience and drug-induced frenzy. The difficult and unstable technologies used in their creation were deemed unholy by the Mechanicum and may, in part, have alien origins.

    **Augmented Abhumans**

    This multipart plastic kit builds 4 Charonite Ogryns, ruthless line-breaking infantry for your Solar Auxilia armies in games of Warhammer: The Horus Heresy. Their hands and forearms have been replaced by a brutal collection of weapons that amplify their already fearsome strength, so they can rip through armour plating and flesh with ease. They are ideal for the ferocious close confines of boarding actions or the deadly press of melee, where they easily devastate foes.

    **Armed for War**

    The torsos are interchangeable across the legs in the kit, allowing you to customise your brutes, and 2 of the torsos each have a choice of 2 heads – masked or unmasked – with a choice of 2 faces. You can choose from some suitably terrifying weapons – power armour-breaching claws, horde-slaying blades, tank-busting crushers, or the appropriately named shredders.

    **The kit includes interchangeable weapons:**
    – 6 Charonite claws (of 3 designs)
    – 2 Charonite blades
    – 2 Charonite crushers
    – 2 Charonite shredders

    Each of these brutal implements can be grafted onto the left or right arm of your Ogryns. One of the claw designs can be assembled open or closed, and the crushers each have a choice of crushing device.

    Rules for this unit can be found in the *Warhammer: The Horus Heresy Journal Tactica: The Battle for Tallarn – Part One* supplement, available separately.

    **Contents:**
    – 228 plastic components
    – 4 Citadel 50mm Round Bases
    – 1 construction guide

    **These miniatures require assembly and are supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Warhammer Colour paints
