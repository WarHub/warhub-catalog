  status: current
  description: |-
    The Dracosan Armoured Transport is a heavily armed personnel carrier, manufactured to the highest standards and configured with systems that allow the Solar Auxilia to traverse the most hazardous battlezones. The Dracosan is large enough to accommodate a full strength section of 20 Solar Auxilia infantry, protecting them from all but the most intense enemy fire while using its own weaponry to pound enemy positions to dust.

    This multipart plastic kit builds one Dracosan Armoured Transport, a bulky Solar Auxilia troop conveyer. This huge vehicle is loaded with protective plating and environmental systems to keep its cargo alive, and features a heavily-armoured access door on both sides. The Dracosan's hull supports one of two weapons, allowing it to support your infantry even after delivering them to the front lines – a heavy lascannon for picking off enemy armour, or an explosive demolisher cannon to make short work of bunkers.

    The kit includes components to upgrade your Dracosan Armoured Transport with hunter-killer missiles, a flare shield, and a dozer blade. The rear hatch can be built with closed doors, or opened for a Solar Auxilia gunner with a pintle-mounted weapon – a heavy flamer, multi-laser, or heavy stubber. You'll also find plenty of cosmetic options, such as sigils, armour patches, a spotter, and a choice of crew heads.

    This kit comprises 154 plastic components, as well as a Solar Auxilia Vehicle Transfer Sheet containing 180 high-quality waterslide transfers. This miniature is supplied unpainted and requires assembly – we recommend using Citadel Plastic Glue and Citadel Colour paints.
