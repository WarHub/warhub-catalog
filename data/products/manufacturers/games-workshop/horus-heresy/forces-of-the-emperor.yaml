  url: https://www.warhammer.com/en-GB/shop/legio-custodes-caladius-grav-tank-annihilator-2026
  imageUrl: https://www.warhammer.com/app/resources/catalog/product/920x950/99123043009_CustodesCaladiusGravTankAnnihilator1.jpg
  status: current
  description: |-
    The Caladius Annihilator Grav-tank provides the Legio Custodes with a mobile, protected platform upon which to mount one of the heaviest elements of their arsenal – a twin Arachnus blaze carronade. With this fusion of advanced systems and weapons, the Caladius Annihilator is perhaps the most powerful battleline armoured unit of its size in the Imperium’s forces.

    **Annihilate Heavy Infantry**

    This multipart plastic kit builds one Caladius Annihilator Grav-tank, a swift, powerful tank for your Legio Custodes armies in games of Warhammer: The Horus Heresy. Equipped with a turret-mounted twin Arachnus blaze carronade, it can shred even power-armoured infantry in an instant, making for a potent addition to your heavy arsenal. Combined with a fast and well-armoured chassis, this tank can turn the tide of battle in your favour. Its sleek design and antigrav technology make it stand out from the tracked vehicles used by the Legiones Astartes and Solar Auxilia, and it has a choice of hull-mounted weapon – either an infantry-slaying twin lastrum bolt cannon or a horde-clearing twin neutronium cascade projector.

    **Contents:**
    – 116 plastic components
    – 1 Citadel 150mm by 95mm Oval Base
    – 1 Custodes Vehicle Flight Stem
    – 1 Legio Custodes Vehicle Transfer Sheet
    – 1 construction guide

    The Legio Custodes Vehicle Transfer Sheet features 210 high-quality waterslide transfers. These include Custodian symbols, text for locations of great battles, and more to decorate your miniature.

    **This miniature requires assembly and is supplied unpainted. We recommend:**
    – Citadel Tools: Super Fine Detail Cutters
    – Warhammer Colour Plastic Glue
    – Citadel Colour paints
