- name: Beyond the Other Side - Expansion
  sku: WYR40014
  ean: 9781735910956
  eanSource: shopify:giveusyourmoneypleasethankyou-wyrd.com
  productType: single_kit
  priceUsd: 35.00
  url: https://giveusyourmoneypleasethankyou-wyrd.com/products/beyond-the-other-side-soft-cover
  imageUrl: https://cdn.shopify.com/s/files/1/0825/4481/files/WYR40014_BeyondTheOtherSide_FRONT.png?v=1690234935
  status: current
  description: |-
    After expelling occupying Guild forces, Japan, China, and Vietnam have formed the Three
    Kingdoms. This uneasy alliance occurs just in time to provide a united defense against the Kimon: legions of spirits and oni emerging from the Beyond to claim Earth for themselves.

    The Other Side is a game about allegiances doing battle across the Earth in a fight for supremacy and survival. Using 32mm miniatures, players will control squads of troops and massive titans as they attempt to defeat their foes and seize control of Earth. Conflict is resolved through the use of a deck of cards, allowing players more control over their own destinies.

    Beyond the Other Side is an expansion to The Other Side, allowing players to field armies of the cunning Three Kingdoms and monstrous Kimon hosts.

    This softcover manual spans 176 pages and is a definitive guide to expanding your tactical prowess and immersing yourself even deeper into the thrilling world of The Other Side. It's a must-have for both veterans of the game and those eager to join the fight for Earth's future.
