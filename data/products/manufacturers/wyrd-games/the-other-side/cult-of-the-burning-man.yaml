  description: |-
    **The Other Side: Fate Deck**

    The Other Side resolves actions with a standard deck of cards called a Fate Deck. Flip a card, add your stat, and compare it to the target number. Simple, fast, and consistent at the table.

    The Fate Deck also fuels your Company’s Control Hand. Cards in your hand can replace flipped results, giving you the ability to secure important actions and avoid disastrous moments when it matters most.

    Contents:
    • One Fate Deck for use in The Other Side

    Printed on high quality cardstock for regular play.
