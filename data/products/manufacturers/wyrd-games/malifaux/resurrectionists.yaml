    Faction: Resurrectionists
    Keyword: Tormented

    He hangs eternal, a reminder that every crime carries a shadow behind it. Jack Daw watches Malifaux from the end of the rope that once held him, silent and patient as guilt festers in the hearts of the living. When the branch bends and the knot loosens, he walks again. Confessions spill. Sinners break. Innocents are collateral in a justice that no longer cares for mercy. When the work is done, Jack returns to the tree and waits for the next soul to crack.

    The Spirit of Betrayal crew thrives on punishment returned, control through fear, and the slow constriction of every escape route.

