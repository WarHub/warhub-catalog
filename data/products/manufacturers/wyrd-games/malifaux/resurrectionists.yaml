    Keyword: Experimental

    Dr. McMourning does not heal. He harvests. Flesh becomes a resource, bone becomes architecture, and the human body is nothing more than a puzzle to be improved. Under his scalpels, the dead do not rest and the living do not remain whole for long. His operating theater is the city itself and every alley is a fresh cadaver waiting for revision.

