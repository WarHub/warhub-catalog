    Faction: Outcasts
    Keyword: Infamous

    Ahoy! Captain Zipp raids the skies for many reasons. His crew seeks riches, rum, and a good brawl. Zipp enjoys those things too, but what he truly lives for is spectacle. A monologue louder than cannon fire, a heist retold for years, a legend big enough to blot out the sun. If you are going to leave a mark, it should be explosive, unforgettable, and preferably on fire.

    The Dread Pirate leaves chaos in his wake, plundering with style, swagger, and a crew just reckless enough to enjoy the ride.

