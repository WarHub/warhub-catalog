  description: |-
    **Malifaux Fourth Edition: Two Player Starter**
    Faction: Neverborn and Outcasts
    Keywords: Ampersand and Banished

    Dive into the dangerous world of Malifaux with this two player starter box, featuring two complete crews ready to hit the table. Inside you will find the rusted precision of Ampersand pitted against the tide dragged horrors of the Banished, everything prepared for fast deployment and immediate play.

    The box includes two full crews, two Fate Decks, tools, tokens, and a streamlined Quickstart Guide that teaches gameplay through action. Shuffle, measure, cheat fate, and begin your journey into a place where nothing comes without a price.

    **Contents:**
    • Malifaux Fourth Edition Quickstart Guide
    • Fate Decks x2
    • Measuring Widgets x2
    • Tokens and Markers x2

    **Ampersand Crew**
    • Clockwork Queen, Matriarch of the Machine
    • Bucket Bot
    • The Fortune Teller
    • Steiner
    • Mechanical Misfits x3

    **Banished Crew**
    • Silken King, Long Live
    • Urchin
    • The Colony
    • Silent Siren
    • Shorebound Sentinels x3

    • All stat and upgrade cards needed to play these crews

    Malifaux models are 32mm heroic scale miniatures made of high quality plastic. All miniatures in this box come pre assembled.
