  priceUsd: 45.00
  url: https://giveusyourmoneypleasethankyou-wyrd.com/products/iconic-a-wild-ride
  imageUrl: https://cdn.shopify.com/s/files/1/0825/4481/files/WYR19003-Iconic-A-Wild-Ride_FRONT.png?v=1713281424
  description: |-
    A Wild Ride features both the Dreamer and his favorite Teddy going on a wagon ride they won’t soon forget. As a young boy still figuring out both his capabilities and darkest fears \(of which they often intertwine\), the malevolent but ever-present Teddy is there to guide him, even if it means they have to take a few unexpected twists and turns first.

    This Iconic box includes both a youthful Dreamer and his friend, Teddy, sitting in a wagon at 63mm tall that will look fantastic painted up and showcased on your shelf. This model will come unassembled in hard PVC so that the fine details will be kept without the complexity of building a large model. Additionally, a **preassembled** playable version of the sculpt will also be included so that you can field a smaller version of the Dreamer in your next game of Malifaux.

    An M3E stat card for the original Dreamer will also be included.
