    As the Governor’s Secretary, Lucius wields bureaucracy like a blade. Every signature is a noose, every piece of paper another chain binding those beneath him. He delights in tormenting underlings while cloaking himself in civility, his masks hiding more than just his inhuman nature.

    In Plain Sight thrives on manipulation. This version of Lucius bends the board to his will, forcing enemies into place and warping the flow of the fight. His crew executes his schemes with ruthless precision, every shift on the table playing into his plan.

