  description: |-
    Scorch the Soul features Sonnia Criid in the Yellow Crypt after she has captured a sorcerer who has tapped into the magical aether emanating from the world of Malifaux. Turning their power inward, Sonnia sears their minds and turns them into something else entirely: a Witchling Thrall.

    This Iconic box includes this incredible piece of art of Sonnia breaking an Arcanist mage down as a 75mm sculpt that will look fantastic painted up and showcased on your shelf. This model will come unassembled in hard PVC so that the fine details will be kept without the complexity of building a large model. Additionally, a **preassembled** playable version of the sculpt will also be included so that you can field a smaller version of this iconic character in your next game of Malifaux.

    An M3E stat card for the original Sonnia will also be included.
