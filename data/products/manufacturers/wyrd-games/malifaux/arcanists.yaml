  imageUrl: https://cdn.shopify.com/s/files/1/0825/4481/files/WYR24305_Colette-Star-of-the-Show_Front.png?v=1764123159
  description: |-
    **Malifaux Fourth Edition: Colette Du Bois, Star of the Show**
    Faction: Arcanists
    Keyword: Performer

    Center stage belongs to Colette Du Bois. Master illusionist of The Star Theater and darling of Malifaux’s nightlife, Colette dazzles crowds with effortless grace while her crew works behind the curtain. Sleight of hand becomes misdirection, misdirection becomes disappearance, and before anyone knows what happened the Performers have already claimed their prize.

    Colette, Star of the Show, blends movement tricks, illusionary swaps, and rapid-fire positioning to dictate where the spotlight falls. When the curtain rises, her crew shines as one.

    **Contents:**
    • Colette Du Bois, Star of the Show
    • Mechanical Doves x3
    • Cassandra Felton
