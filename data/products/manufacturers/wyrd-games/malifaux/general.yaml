  description: |-
    ### Hog Wild Expansion for Bayou Bash

    **Overview:** Get ready for a wilder, more exciting race with the Hog Wild expansion for Bayou Bash! This expansion introduces new ways to race, new game modes, and even more chaotic fun for all players.

    **Expansion Description:** Hog Wild is all about variety and the spice of life, giving racers new ways to make their way down the track and various new options for play. Hog Wild cards can be introduced at the start of any race, adding wrinkles into the plan of any jockey. These cards can be played by themselves or combined to suit the racing style, whether you want more ramming and player fighting or to encourage a good clean race to the finish \(as clean as Gremlins can be, that is\).

    **Key Features:**

    - **Hog Wild Cards:** Add exciting new twists and challenges to each race with these versatile cards. Customize your racing experience to fit your style, whether it's chaotic collisions or strategic maneuvers.
    - **Big Bayou Mode:** Race with up to eight players on a double-wide track for a thrilling competition. Grab seven of your closest friends and race to the finish line on an epic scale.
    - **Greenbellies:** Introduce these old and cranky racers to your game for added strategy and excitement, even in races with as few as two players. The Greenbellies live on the track and bring a new level of challenge to every race.

    **Specifications:**

    - **Player Count:** Expands the base game to support up to 8 players
    - **Age Range:** 12 and up
    - **Playtime:** 30-45 minutes

    **Enhance your Bayou Bash experience with the Hog Wild expansion, where every race is a new adventure filled with unpredictable twists and turns!**
