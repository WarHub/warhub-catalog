  imageUrl: https://cdn.shopify.com/s/files/1/0825/4481/files/WYR11103-Wyld-FRONT.webp?v=1753662987
  description: |-
    ### Wyld: Capture Your Wyld Side!

    **Overview:**
    Wyld is a competitive tableau-building card game for 2 to 5 players. Each player captures creatures and cryptids known as Wyldlings and works to rehabilitate them in one of four unique Habitats. The player who builds the best set of Habitats wins.

    **Game Description:**
    In Wyld, players take turns capturing and placing Wyldlings into their Habitats. Each Wyldling is worth points, but many come with special abilities that can shift the course of play. Two rounds give players a chance to reposition, outmaneuver rivals, and maximize their final score.

    Simple to learn and packed with character, Wyld is all about managing your menagerie, timing your moves, and keeping an eye on your opponents.

    **Key Features:**

    - **Build Your Habitats** by capturing Wyldlings with different strengths and styles
    - **Easy to Learn** rules that get you playing in just a few minutes
    - **Strategic Play** with point values, abilities, and habitat matching
    - **Player Interaction** through helpful and disruptive Wyldling abilities
    - **Replayable Format** with two rounds and shifting outcomes every game

    **Specifications:**

    - **Player Count:** 2 to 5 players
    - **Playtime:** 15 to 20 minutes
    - **Age Range:** 8 and up

    Capture your Wyld side and compete to build the most vibrant, balanced, and mischievous Habitats.![]()![]()
