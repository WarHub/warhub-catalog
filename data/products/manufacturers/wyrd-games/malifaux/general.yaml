    - **Fan Favorite:** Impress the crowd with daring stunts and crazy tricks to win the most fans and claim victory.

    **Specifications:**

    - **Player Count:** 2-4 players
    - **Age Range:** 12 and up
    - **Playtime:** 30-45 minutes

    \*\*Gear up, get ready, and race to become the ultimate fan favorite in **Bayou Bash**!
