  url: https://giveusyourmoneypleasethankyou-wyrd.com/products/vagrantsong
  imageUrl: https://cdn.shopify.com/s/files/1/0825/4481/products/Wyrd_Vagrantsong_Box_Mockup_FRONT.png?v=1629833601
  description: |-
    ### Vagrantsong

    **Overview:** Vagrantsong is a cooperative, story-driven boss battler where up to 4 players take on the roles of Vagrants trying to escape a supernatural ghost train. Encounter Haints, the lingering spirits of the Silver Ferryman, who will stop at nothing to ensure the Vagrants lose all their Humanity and stay aboard forever.

    **Game Description:** In Vagrantsong, you and your fellow Vagrants must navigate the eerie corridors of the Silver Ferryman, a ghostly train filled with sinister spirits. Each game session presents unique challenges as you face off against Haints, restore lost Humanity, and uncover the secrets of the train. With each encounter, strategic cooperation and quick thinking are essential to surviving the supernatural perils that await.

    **Key Features:**

    - **Cooperative Gameplay:** Team up with 1-3 other players to face the ghostly threats and find a way off the train.
    - **Story-Driven Adventure:** Immerse yourself in a rich narrative as you uncover the mysteries of the Silver Ferryman and its spectral passengers.
    - **Boss Battler:** Engage in intense battles against powerful Haints, each with unique abilities and tactics.
    - **Replayability:** Each game offers different scenarios and challenges, ensuring a fresh and exciting experience every time you play.

    **Specifications:**

    - **Player Count:** 2-4 players \(co-op\)
    - **Playtime:** 30+ minutes per player
    - **Age Range:** 14 and up

    **Will you and your Vagrant friends survive the twists, turns, and tribulations that await you aboard the Silver Ferryman? Can you find your way off this train while restoring the Humanity of those who have failed before you? Or will your souls be lost forever, infinitely drifting in-between worlds to the song of the fiddle player?**
