    **Game Description:** Bayou Bash is a chaotic racing game for 2-4 players, filled with rambunctious racers who will do anything to win over the most fans before crossing the finish line. Each player takes control of a unique racer with special abilities and must battle for victory across a customizable track while gaining fans along the way. In Bayou Bash, it’s not just about who crosses the finish line first, but who pulls off the craziest tricks during the race!

