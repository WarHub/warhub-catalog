    Whether you're looking to ward off nightmares, or perhaps inspire a few, Cotton Carnage is your go-to companion. Perfect for collectors of the quirky and unusual, or as a gift for those who appreciate a touch of the bizarre. Adopt yours today and let the eerie cuddles begin!
