  description: |-
    ### Smyle: Lie Through Your Teeth

    **Overview:** Smyle is a light-hearted memory game for 2-5 players that runs on a mouthful of mischief, trickery, and a whole bunch of teeth! Play as a tooth fairy determined to get the best pearly whites, often by stealing them from your friends. Find out why 9/10 dentists recommend Smyle!

    **Game Description:** In Smyle, players are tooth fairies collecting the best teeth. Each turn, select Fairies and Gadgets, resolving them in order of Initiative. Will you risk a powerful, low-Initiative card or play it safe?

    Fairies have different preferences for teeth, from pristine to rotten. Watch out for the Troubled Tooth! Use X-Ray Cards to see hidden problems. Remember where teeth are placed, as there's no peeking! At the end of each round, fairies reveal their stolen teeth. Some teeth have special effects, while others might be full of Tooth Decay.

    Aim to have the best haul of teeth when the Decay Token hits the Final Round. Winning should be easy... unless you picked the wrong teeth!

    **Key Features:**

    - **Rapid Fire Rounds:** Games take 20 minutes or less.
    - **Fun for All:** Easy-to-learn rules.
    - **Strategic Mischief:** Choose Fairies and Gadgets wisely.
    - **Variety of Fairies:** Each has unique abilities.
    - **Exciting Twists:** Use X-Ray Cards to uncover hidden truths.

    **Specifications:**

    - **Player Count:** 2-5 players
    - **Playtime:** 20 minutes
    - **Age Range:** 8 and up

    **Get ready for a game night full of laughter and strategy with Smyle: Lie Through Your Teeth! Can you outsmart your friends and collect the best teeth, or will you fall victim to their tricks?**
