  description: |-
    **Malifaux Fourth Edition: Wong, The Wonderful**
    Faction: Bayou
    Keyword: Wizz Bang

    Things only got stranger after Wong found the talking bag, but he listened and the Bayou has never been the same. Now he performs across the swamps with crackling fireworks and bursts of arcane spectacle, a walking carnival of brilliance, explosions, and questionable safety. Audiences cheer, blink through the smoke, and sometimes catch fire. Wong considers that a sign the show is working.

    Fast, showy, and unpredictable, The Wonderful’s stage show bedazzles enemies and takes advantage of their ability to cast magic on the move to keep up the damage.

    **Contents:**
    • Wong, The Wonderful
    • Olivia Bernard
    • Alphonse
    • Lightning Bugs x3
    • All stat and upgrade cards needed to play this crew

