    **Malifaux Fourth Edition: The Clampetts, Fisherfolk**
    Faction: Bayou
    Keyword: Angler

    The Clampetts know there’s no finer day than hauling the whole family down to the shoreline for sun, sand, and something big on the hook. Of course, the Bayou never makes it easy. Something deep always rises eventually, scales flashing and teeth churning the surf. Anything that crawls out of the tides learns quick that the Clampetts do not scare and they never run. They fish for keeps.

    **Contents:**
