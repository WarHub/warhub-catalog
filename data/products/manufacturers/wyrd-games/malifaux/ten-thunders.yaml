  description: |-
    **Malifaux Fourth Edition: Jakob Lynch, Wild Card**
    Faction: Ten Thunders
    Keyword: Honeypot

    Jakob Lynch deals in risks, rewards, and debts that never quite stay paid. Some call him a charming magnate of entertainment. Others know better. The Honeypot shines bright, but its shadows are thick with whispers and favors owed. Beneath the velvet and warm laughter lies something older and far less human, a hungry presence wearing Lynch like a well-tailored suit.

    This box brings Lynch and Hungering Darkness to the table in full glamor, every hand a gamble, every soul a wager waiting to be claimed.

    **Contents:**
    • Jakob Lynch, Wild Card
    • Hungering Darkness, Beneath the Bets
    • Kitty DuMont
    • Illuminated x3
    • All stat and upgrade cards needed to play this crew

