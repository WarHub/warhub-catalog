# Manufacturer colour-chart sources for swatch extraction (scripts/gen_paint_swatches.py).
# Two chart kinds:
# - default (pdf-chart): the code-label regex, the pages carrying the REAL chart (codes
#   reappear in combination tables and indexes), and the sampling rectangle in PDF points
#   relative to each code label's (x0, top) -- negative dy means the chip sits above the
#   label.
# - type: grid-image -- raster chart image: grid geometry in pixels (origin + cell pitch +
#   cols/rows), the sequential code spec the cells spell out (prefix/start/pad, maxCount
#   stops before logo-covered or unprinted trailing cells, skipCells punches mid-grid
#   holes), and the per-cell sampling sub-region as cell fractions (dodges the printed
#   code/name text).
# Offsets are calibrated against the rendered contact sheets in data/review/swatches/
# (regenerate and eyeball them whenever a chart URL/revision changes).
ak-interactive:
  uaProfile: browser # same WAF as mfr-ak-interactive (bot UAs 403'd)
  charts:
    - id: briefcase-235
      type: grid-image
      url: https://ak-interactive.com/wp-content/uploads/2020/12/BRIEFCASE_235COLORS-CHART.jpg
      # 1600x810 JPG, 20x12 grid of 80 x 67.5 px cells, codes AK11001.. left-to-right
      # top-to-bottom. Despite the briefcase's marketed 236 colours only 235 are PRINTED:
      # cell (11,15) -- would-be AK11236 Crackle Medium -- is blank white (full-cell
      # stdev 0.0) and the AK logo covers the rest of row 12, hence maxCount 235.
      # Calibration 2026-07-24 vs Arcturus hex (232 coded cells): median dRGB 11.5,
      # 97.4% within 40; the outliers are saturated inks whose chart print clips a
      # channel (e.g. AK11200), not misalignment.
      grid: { originX: 0, originY: 0, cellWidth: 80, cellHeight: 67.5, cols: 20, rows: 12 }
      codes: { prefix: AK, start: 11001, pad: 5, maxCount: 235 }
      # Cells print the code at ~y 0.10-0.25 and the name at ~y 0.63-0.75; this band
      # samples pure fill between the two.
      sample: { x0: 0.10, y0: 0.30, x1: 0.90, y1: 0.58 }
vallejo:
  uaProfile: browser # same WAF as mfr-vallejo (bot UAs 403'd)
  charts:
    - id: cc339-true-metallic-metal
      url: https://acrylicosvallejo.com/wp-content/uploads/2026/06/CC339-True_Metallic_Metal.pdf
      codePattern: '77\.\d{3}'
      pages: [0] # page 1 repeats every code in mixing-combination tables
      set: True Metallic Metal
      # Chip grid: brushed-metallic photo strips directly above each code, ~44pt column pitch.
      sample: { dx: 0, dy: -36, width: 44, height: 30 }
    - id: cc331-diorama-fx
      url: https://acrylicosvallejo.com/wp-content/uploads/2024/11/CC331-R00-Diorama-FX-NewIC.pdf
      codePattern: '26\.\d{3}'
      # Page 1 ONLY: page 0 mixes card styles and the configured offset lands on descriptive
      # text for the Water-FX codes (contact-sheet review 2026-07-24) -- transparent gels that
      # arguably should not carry a flat hex anyway. Unfilled codes can return later via a
      # chip-grid chart (Catalogo) config.
      pages: [1]
      set: Diorama FX
      # Product cards: texture-photo panel right of the jar shot, anchored to the "Ref." code.
      sample: { dx: 304, dy: -6, width: 78, height: 78 }
    - id: cc336-pigment-fx
      url: https://acrylicosvallejo.com/wp-content/uploads/2025/03/CC336-R00-Pigment-FX-NewIC.pdf
      codePattern: '73\.\d{3}'
      # Page 1 ONLY -- same contact-sheet finding as cc331 (page 0 is boxed set panels/text).
      pages: [1]
      set: Pigment FX
      # Same NewIC card family as CC331.
      sample: { dx: 304, dy: -6, width: 78, height: 78 }
    - id: cc329-model-color
      url: https://acrylicosvallejo.com/wp-content/uploads/2024/03/CC329-R00-Model-Color-NewIC.pdf
      codePattern: '70\.\d{3}'
      pages: [0, 1]
      set: Model Color
      # Chip grid (calibrate on first run).
      sample: { dx: 0, dy: -36, width: 44, height: 30 }
    - id: cc298-game-air
      url: https://acrylicosvallejo.com/wp-content/uploads/2025/09/CC298-Game_Air.pdf
      codePattern: '76\.\d{3}'
      pages: [0, 1]
      set: Game Air
      sample: { dx: 0, dy: -36, width: 44, height: 30 }
