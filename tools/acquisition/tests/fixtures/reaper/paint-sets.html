    var calcTax = function(price, currency){
        // state Texas gets .065 // UK gets .2 // Do not calculate for other countries
        var taxRate = {
            USD: 0.065,
            AUD: 0,
            CAD: 0,
            GBP: 0.2,
            EUR: 0.2
        };
        if (currency != 'USD') {
            // USD calculated at Checkout
            return Math.ceil(price * taxRate[currency])
        }
        return price
    };



    Vue.filter("imagepath", function (context, size) {
        if (!context) {
            return ""
        }
        if (!size) {
            size = 4;
        }
        return ("https://images.reapermini.com/" + size + "/" + context);
    });



    Vue.filter("splitCamel", function (context) {

        if (!context) {
            return ""
        }
        return context.replace(/([A-Z]+)/g, " $1").replace(/([A-Z][a-z])/g, " $1")
    });


    Vue.filter("getMainImage", function (context) {
        if (!context) {
            return ""
        }
        var mainImage = context[0];
        if (mainImage && mainImage.filename) {
            return ("https://images.reapermini.com/6/" + mainImage.filename);
        } else {
            return false;
        }
    });


    Vue.filter("nl2br", function (context) {
        if (!context) return "";
        return context.replace(/\r|\n|\r\n/g, '<br />');
    });




    Vue.filter("getProductPrice", function(product, currency) {

    	if (currency === 'USD') {
    		return product.price;
        }

		var divisor = {
            EUR: 1.039,
            GBP: 1.201,
            AUD: 0.55,
            CAD: 0.73,
            USD: 1.00
        }

    	var price = product.prices && product.prices[currency];

        if (!price || price <= 0) {
        	// do conversion
            price =  Math.trunc(Math.ceil(product.price / divisor[currency]))

            if (divisor === 'AUD') {
			    price = Math.round(price / 5) * 5
		    }
        }
        return price;
    });



	Vue.filter("moneyWithTax", function (price, currency) {

		if (currency == 'USD') {
			return price
		}

		if (price === 0) return "0.00";

		if (!price) return "";

		var tax = calcTax(price, currency);

        var total = (Number(price) + Number(tax)) // convert cents/pence into Dollars/Pounds

        return total; // Money with any applicable tax added */
	});


    Vue.filter("decimalize", function (context) {
        if (context === 0) return "0.00";
		if (!context) return "";
		var price = parseInt(context, 10) / 100
		return price.toFixed(2)
    });



	Vue.filter("roundingError", function (context) {
		if (context === 0) return "0.00";
		if (!context) return "";
		var price = (context / 100).toFixed(3);

		if ( price.slice(-1) == '0' ) {
			return price.slice(0, -1); // remove trailing zero
		}
		var fractioned = price.split('');
		fractioned[fractioned.length - 1] = '<span style="color: #cc0000; font-size: 0.85rem">' + fractioned[fractioned.length - 1] + ' *</span>';
		return fractioned.join('')
	});







	Vue.filter("dekebab", function (context) {
        if (!context) return "";
        return context.replace('-', ' ');
    });

    Vue.filter("deunderscore", function (context) {
    if (!context) return "";
    return context.replace('_', ' ');
    });


    Vue.filter("tags", function (context, delimiter) {
    	if (!delimiter) {
    		delimiter = ','
        }
        if (!context) return "";
        var str = context;
        var temp = str.split(delimiter);
        var tags = [];
        // done this way, to remove any empty tags.
        var i;
        for (i = 0; i < temp.length; i++) {
            i && tags.push(i);
        }
        return tags;
    });

			getInventory: function(sku) {
				var obj = _.find(this.paints, function(o) {

				return ((obj && obj.inventory) <= 0 ) ? 'None in stock' : ''

			updateInventory: function(sku) {
				var obj = _.find(this.paints, function(o) {
					return o.sku === sku;
				});
                var inventory = obj.inventory - 1;

                this.$set(obj, 'inventory', inventory)

			},
			isDisabled: function(sku) {
